body:
  text: 卷四武帝優給安平王孚喪事詔王勳德超世尊寵無二期頤在位朕之所倚庶永百齡咨仰訓導奄忽殂隕哀慕感切其以東園溫明祕器朝服一具衣一襲緋練百匹絹布各五百匹錢百萬穀千斛以供喪事諸所施行皆依漢東平獻王蒼故事晉書安平王孚傳以山濤為吏部尚書詔議郎山濤至性簡靜淩虛篤素立身行已足以勵俗其以濤為吏部尚書北堂書鈔六十引晉起居注答山濤詔君雖乃心在於色養然職有上下旦夕不廢醫藥且當割情以隆在公晉書山濤傳濤遷尚書以母老辭職詔云云下太學詔已試經者留之其餘遣還郡國大臣子弟堪受教者令入學宋書禮志一通典五十三以羊祜為車騎將軍開府詔使持節都督荊州諸軍事衛將軍羊祜歷位文武有佐命之勳其以祜為車騎將軍開府如三司之儀書鈔五十二引王隱晉書詔責鄭徽讜言謇諤直意盡辭所望於左右也人主常以阿媚為患豈以爭臣為損乎陶所執不愆此義而徽越職奏之豈朕意乎群書治要二十九引孫盛陽秋泰始八年帝問右將軍皇甫陶論事陶固執所論與帝爭言散騎常侍鄭徽表求治罪詔云云乃免徽官答何曾固讓領司徒詔司徒舊丞相之職自古及今總論人物治化之本以君弘道故選於衆而復盤桓非所聞也御覽二百八引晉書以下邳王晃為安西將軍詔益州險遠素號難治宜以重將親賢撫之南中郎將下邳王晃清亮中正體行明潔才周政理有文武策識其以晃為使持節都督寧益二州諸軍事安西將軍領益州刺史晉書下邳王晃傳又見書鈔七十二引晉起居注作泰始元年詔許鄭沖致仕詔太傅韞德深粹履行高潔恬遠清虛確然絶世艾服王事六十餘載忠肅在公慮不及私遂應衆舉歷登三事仍荷保傅之重綢繆論道之任光輔翼世亮茲天工迪宣謀猷弘濟大烈可謂朝之雋老衆所具瞻者也朕昧於政道庶事未康挹仰耆訓導揚厥蒙庶賴顯德緝熙有成功公屢以年高疾篤致仕告退惟從公志則朕孰與咨謀譬彼涉川罔知攸濟是用未許迄于纍載而高讓彌篤至意難違覽其盛指俾朕憮然夫功成弗有上德所隆成人之美君子與焉豈必遂朕憑賴之心以枉大雅進止之度哉今聽其所執以壽光公就第位同保傅在三司之右公宜頤精養神保衛太和以究遐福其賜几杖不朝古之哲王欽祗國老憲行乞言以彌縫其闕若朝有大政皆就咨之晉書列傳以鄧艾孫為郎中詔艾有功勳受罪不逃刑而子孫為萌隸朕常愍之其以嫡孫朗為郎中魏志鄧艾傳妾媵不得為嫡正詔嫡庶之別所以辨上下明貴賤而近世以來多皆內寵登妃后之職亂尊卑之序自今以後皆不得登用妾媵以為嫡正晉書武帝紀奪情起山濤為吏部尚書詔吾所共致化者官人之職是也方今風俗陵遲人心進動宜崇明好惡鎮以退讓山太常雖尚居諒暗情在難奪古人亦墨絰從戎方今務殷何得遂其志邪其以濤為吏部尚書晉書山濤傳又見北堂書鈔六十藝文類聚四十八引王隱晉書又詔山濤方今多事嘉謀良圖委以老成也初學記十一引晉書山濤傳尚書表辭才下年老詔云云賜諡荀顗詔侍中太尉行太子太傅臨淮公顗清純體道忠允立朝歷司內外茂績既崇訓傅東宮徽猷弘著可謂行歸于周有始有卒者矣不幸薨殂朕甚痛之其賜溫明祕器朝服一具衣一襲諡曰康晉書荀顗傳賜荀顗家錢詔太尉不恤私門居無館宇素絲之志沒而彌顯其賜家錢二百萬使立宅舍晉書荀顗傳拜三夫人九嬪禮儀詔拜授可依魏氏故事晉書禮志下賜諡后母詔皇后逮事先后常冀能終始永奉宗廟一旦殂隕痛悼傷懷每自以夙喪二親於家門之情特隆又有心欲改葬父祖以頃者務從儉約初不有言近垂困説此意情益愍之其使領前軍將軍駿等自克改葬之宜至時主者供給葬事賜諡母趙氏為縣君以繼母段氏為鄉君傳不云乎慎終追遠民德歸厚且使亡者有知尚或喜之晉書武元楊皇后傳追贈太原王瓌詔壞乃心忠篤智器雅亮歷位文武有幹事之績出臨封土夷夏懷附鎮守許都思謀可紀不幸早薨朕甚悼之今安厝在近其追贈前將軍晉書安平王孚附傳以文立為散騎常侍詔太子中庶子文立忠貞清實有思理器幹前在濟陰政事修明後事東宮盡輔導之節昔光武平隴蜀皆修其賢才以敘之蓋所以拔幽滯而濟殊方也其以立為散騎常侍晉書儒林文立傳又見華陽國志十一作皆收其才秀所以援濟殊方伸敘幽滯也止文立辭散騎常侍詔常伯之職簡才而授何謙虛也華陽國志十一以程咸為散騎常侍通直詔黃門郎程咸博聞洽通文藻清敏歷職左右劬勞內侍乃心在公夙夜不懈其以咸為散騎常侍左通直郎北堂書鈔五十八引王隱晉書又引臧榮緒晉書詔答山濤君為管人倫之職此輩應為清議與不便當裁處之通典二十三引山濤啓事曰臣欲以郤生為溫令詔可尋又啓曰訪聞詵喪母不時葬遂於所居屋後假葬有異同之議請更選之詔云云賜劉廙葬錢詔故侍中劉廙以清識明鑒有聲前代昔宣皇帝接以師友之恩廙墓為盜賊所發甚用惻然其子阜素甚清貧今當殯葬其給轜車銘旌賜錢給作藏人功至時遣使者祭之御覽五百五十六賜傅嘏夫人鮑葬錢詔故太常傅嘏者昔以令德賢才為先帝所接登龍之際有翼贊盡忠之勳早代殞歿不終功業每念其遺績常存於心今嘏夫人鮑當葬賜錢十萬給作葬藏人功嘏墓開祭以少牢御覽五百五十六以李胤領司隸校尉詔胤忠允高亮有匪躬之節使領司隸校尉晉書李胤傳恤侯史光家詔光厲志守約有清忠之節家極貧儉其賜錢五十萬晉書侯史光傳以華表為太常卿詔表清賢履道內圓外順歷位忠恪言行不玷其以表為太常卿御覽二百二十八引臧榮緒晉書以劉毅為國子祭酒詔劉毅博學多聞其以毅為散騎常侍國子祭酒書鈔六十七引臧榮緒晉書詔免庾純官先王崇尊卑之禮明貴賤之序著溫克之德記沈酗之禍所以光宣道化示人軌儀也昔廣漢陵慢宰相獲犯上之刑灌夫託醉肆忿致誅斃之罪純以凡才備位卿尹不惟謙敬之節不忌覆車之戒陵上無禮悖言自口宜加顯黜以肅朝倫晉書庾純傳原庾純詔自中世以來多為貴重順意賤者生情故令釋之定國得揚名於前世今議責庾純不惟溫克醉酒沈湎此責人以齊聖也疑賈公亦醉若其不醉終不於百客之中責以不去官供養也大晉依聖人典禮制臣子出處之宜若有八十皆當歸養亦不獨純也古人云由醉之言俾出童羖明不責醉恐失度也所以免純者當為將來之醉戒耳齊王劉掾議當矣復以純為國子祭酒加散騎常侍晉書庾純傳以王濟為中書侍郎詔駙馬都尉王濟忠篤好學問有文章器幹其以濟為中書侍郎北堂書鈔五十七引晉起居注凡二條案本傳云年二十拜中書郎又云先渾死年四十六則此詔當在泰始中許華表致仕詔表清貞履素有老成之美久幹王事靜恭匪懈而以疾固辭章表懇至今聽如所上以為太中大夫賜錢二十萬床帳褥席祿賜與卿同門施行馬晉書華表傳參訪竇允詔當官者能潔身修己然後在公之節乃全身善有章雖賤必賞此興化立教之務也謁者竇允前為浩舋長以修勤清白見稱河右是輩當擢用使立行者有所勸主者詳復參訪有以旌表之晉書良吏竇允傳公主嫁儀詔公主嫁由夫氏不宜皆為備物賜錢使足而已惟給璋餘如故事晉書禮志下優賜李熹詔光祿大夫特進李熹杖德居義當升台司毗亮朕躬而以年尊致仕雖優遊無為可以熙神而虛心之望能不憮然其因光祿之號改假金紫置官騎十人賜錢五十萬祿賜班禮一如三司門施行馬晉書李喜傳
