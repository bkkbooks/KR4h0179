body:
  text: 卷九十七陸機文賦并序文賦并序余每觀才士之所作竊有以得其用心夫其放言遣辭良多變矣妍蚩好惡可得而言每自屬文尤見其情恆患意不稱物文不逮意蓋非知之難能之難也故作文賦以述先士之盛藻因論作文之利害所由他日殆可謂曲盡其妙至於操斧伐柯雖取則不遠若夫隨手之變良難以辭逮蓋所能言者具於此云爾佇中區以玄覽頤情志於典墳遵四時以歎逝瞻萬物而思紛悲落葉於徑秋喜柔條於芳春心懍懍以懷霜志眇眇而臨雲詠世德之駿烈誦先人之清芬遊文章之林府嘉麗藻之彬彬慨投篇而援筆聊宣之乎斯文其始也皆收視反聽耽思傍訊精騖八極心遊萬仞其致也情曈曨而彌鮮物昭晣而互進傾群言之瀝液漱六藝之芳潤浮天淵以安流濯下泉而潛浸於是沈辭怫悅若遊魚銜鉤而出重淵之深浮藻聯翩若翰鳥纓繳而墜層雲之峻收百世之闕文採千載之遺韻謝朝華於已披啓夕秀於未振觀古今於須臾撫四海於一瞬然後選義按部考辭就班抱景者咸叩懷響者畢彈或因枝以振葉或沿波而討源或本隱以之顯或求易而得難或虎變而獸擾或龍見而鳥瀾或妥帖而易施或岨峿而不安罄澄心以凝思眇衆慮而為言籠天地於形內挫萬物於筆端始躑躅於燥吻終流離於濡翰理扶質以立幹文垂條而結繁信情貌之不差故每變而在顏思涉樂其必笑方言哀而已歎或操觚以率爾或含毫而邈然伊茲事之可樂固聖賢之所欽課虛無以責有叩寂寞而求音函綿邈於尺素吐滂沛乎寸心言恢之而彌廣思按之而愈深播芳蕤之馥馥發青條之森森粲風飛而猋豎鬱雲起乎翰林體有萬殊物無一量紛紜揮霍形難為狀辭程才以效伎意司契而為匠在有無而僶俯當淺深而不讓雖離方而遁圓期窮形而盡相故夫誇目者尚奢愜心者貴當言窮者無隘論達者唯曠詩緣情而綺靡賦體物而瀏亮碑披文以相質誄纏綿而悽愴銘博約而溫潤針頓挫而清壯頌優遊以彬蔚論精微而朗暢奏平徹以間雅説煒曄而譎誑雖區分之在茲亦禁邪而制放要辭達而理舉故無取乎冗長其為物也多姿其為體也屢遷其會意也尚巧其遣言也貴妍暨音聲之迭代若五色之相宣雖逝止之無常固崎錡之難便苟達變而識次猶開流以納泉如失機而後會恆操末以續巔謬玄黃之秩敘故淟涊而不鮮或仰逼於先條或俯侵於後章或辭害而理比或言順而義妨離之則雙美合之則兩傷考殿最於錙銖定去留於毫芒苟銓衡之所裁固應繩其必當或文繁理富而意不指適極無兩致盡不可益立片言而居要乃一篇之警策雖衆辭之有條必待茲而效績亮功多而纍寡故取足而不易或藻思綺合清麗千眠炳若縟繡悽若繁絃必所擬之不殊乃暗合乎曩篇雖杼軸於豫懷怵他人之我先苟傷廉而愆義亦雖愛而必捐或苕發穎豎離衆絶致形不可逐響難為係塊孤立而特峙非常音之所緯心牢落而無偶意徘徊而不能揥石韞玉而山暉水懷珠而川媚彼榛楛之勿翦亦蒙榮於集翠綴下里於白雪吾亦濟夫所偉或託言於短韻對窮迹而孤興俯寂寞而無友仰寥廓而莫承譬偏絃之獨張含清唱而靡應或寄辭於瘁音言徒靡而弗華混妍蚩而成體纍良質而為瑕象下管之偏疾故雖應而不和或遺理以存異徒尋虛以逐微言寡情而鮮愛辭浮漂而不歸猶絃么而徽急故雖和而不悲或奔放以諧合務嘈囋而妖冶徒悅目而偶俗固聲高而曲下寤防露與桑間又雖悲而不雅或清虛以婉約每除煩而去濫闕大羹之遺味同朱絃之清泛雖一唱而三嘆固既雅而不豔若夫豐約之裁俯仰之形因宜適變曲有微情或言拙而喻巧或理朴而詞輕或襲故而彌新或沿濁而更清或覽之而必察或研之而後精譬猶舞者赴節以投袂歌者應絃而遣聲是蓋輪扁所不得言故亦非華説之所能精普辭條與文律良余膺之所服練世情之常尤識前修之所淑雖濬發於巧心或授蚩於拙目彼瓊敷與玉藻若中原之有菽同橐籥之罔窮與天地乎並育雖紛藹於此世嗟不盈於豫掬患挈瓶之屢空病昌言之難屬故踸踔於短垣放庸音以足曲恆遺恨以終篇豈懷盈而自足懼蒙塵於叩缶顧取笑乎鳴玉若夫感應之會通塞之紀來不可遏去不可止藏若景滅行猶響起方天機之駿利夫何紛而不理思風發於胸臆言泉流於唇齒紛葳蕤以馺遝唯毫素之所擬文徽徽以溢目音泠泠而盈耳及其六情底滯志往神留兀若枯木豁若涸流攬營魂以探賾頓精爽於自求理翳翳而愈伏思乙乙其若抽是以或竭情而多悔或率意而寡尤雖茲物之在我非余力之所勠故時撫空懷而自惋吾未識夫開塞之所由伊茲文之為用固衆理之所因恢萬里而無閡通億載而為津俯貽則於來葉仰觀象於古人濟文武於將墜宣風聲於不泯塗無遠而不彌理無微而弗綸配霑潤於雲雨象變化乎鬼神被金石而德廣流管絃而日新鼓吹賦原鼓吹之攸始蓋稟命於黃軒播威靈於茲樂亮聖器而成文騁逸氣而憤壯繞煩手乎曲折舒飄颻以遐洞卷徘徊其如結及其悲唱流音倣徨依違合歡嚼弄乍數乍稀音躑躅於唇吻舌將舒而復回鼓砰砰以輕投簫嘈嘈而微吟詠悲翁之流思怨高臺之難臨顧穹谷以含哀仰歸雲而落音節應氣以舒卷響隨風而浮沉馬頓迹而增鳴士嚬蹙而霑襟若乃巡郊澤戲野坰奏君馬詠南城慘巫山之遐險歡芳樹之可榮宮備衆聲體僚君器飾聲成文雕音作蔚響以形分曲以和綴放嘉樂於會通宣萬變於觸類適清響以定奏期要妙於豐金邈拊搏之所管務戛歷之為最初學記卷十六漏刻賦偉聖人之制器妙萬物而為基形罔隆而弗包理何遠而不之寸管俯而陰陽效其誠尺表仰而日月與之期玄鳥懸而八風以情應玉衡立而天地不能欺既窮神以盡化又設漏以考時爾乃挈金壺以南羅藏幽水而北戢擬洪殺於編鍾順卑高而為級激懸泉以遠射跨飛途而遙集伏陰蟲以承波吞恆流其如挹是故來象神造去猶鬼幻因勢相引乘靈自薦口納胸吐水無滯咽形微獨繭之緒逝若垂天之電偕四時以合最指昏明乎無殿籠八極於千分度晝夜乎一箭抱百刻以駿浮仰胡人而利見夫其立體也簡而效績也誠其假物也粗而致用也精積水不過一鐘導流不過一筳而用天者因其敏分地者賴其平徵聽者假其察貞觀者借其明考計歷之潛慮測日月之幽情信探賾之妙術雖無神其若靈寤蟾蜍之栖月識金水之相緣文選卷五六陸倕新刻漏銘注羽扇賦昔楚襄王會於章臺之上山西與河右諸侯在焉大夫宋玉唐勒侍皆操白鶴之羽以為扇諸侯掩麈尾而笑襄王不悅宋玉趨而進曰敢問諸侯何笑諸侯曰昔者武王玄覽造扇於前而五明安衆世繁於後各有託於方圓蓋受則於箑蒲舍茲器而不用顧奚取於鳥羽宋玉曰夫創始者恆朴而飭終者必妍是故烹飪起於熱石玉輅基於椎輪安衆方而氣散五明圓而風煩未若茲羽之為麗固體俊而用鮮彼凌霄之偉鳥播鮮輝之蒨蒨隱九皋以鳳鳴遊芳田而龍見醜靈龜而遠期超長年而久眄纍懷璧於美羽挫千載乎一箭委曲體以受制奏雙翅而為扇則其布翮也差洪細秩長短稠不逼稀不簡發若蕭史之鳴金籟趡若大容之羅玉琯於是鏤巨獸之齒裁奇木之幹憲靈朴於造化審真則而妙觀移圓根於正體因天秩乎舊貫鳥不能別其是非人莫敢分其真膺翩姍姍以微振風飉飉以垂婉妙自然以為言故不積而能散其執手也安其應物也誠其招風也利其播氣也平混貴賤而一節風無往而不清發芳塵之郁烈拂鳴弦之泠泠斂揮汗之瘁體灑毒暑之幽情諸侯曰善宋玉遂言曰伊茲羽之駿敏似南箕之啓扉垂皓曜之奕奕含鮮風之微微襄王仰而拊節諸侯伏而引非皆委扇於楚庭執鳥羽而言歸屬唐勒而為之辭曰伊鮮禽之令羽夫何翩翩與眇眇性徑健以利每箕張而雲布反寒暑於一掌之末回八風乎六翮之杪引凝涼而響臻拂隆暑而到驅囂塵之鬱述流清氣之悄悄符𤤷空以煩輪道洞房而窈窕北堂書鈔卷一百三十四列仙賦夫何列仙玄妙超攝生乎世表因自然以為基仰造化而聞道性沖虛以易足年緬邈其難老爾乃呼翕九陽抱一含元引新吐故雲飲露餐違品物以長盻妙群生而為言爾其嘉會之仇息宴遊栖則昌容弄玉洛宓江妃觀百化於神區覲天皇於紫微過太華以息駕越流沙而來歸即絳闕于朝霞太平御覽卷八騰煙霧之霏霏文選卷五五劉孝標廣絶交論注凌霄賦挾至道之容微狹流俗之紛沮揚余節以遠模風扶搖而相豫削陋迹於分丘省遊仙而投軌凱情纍以遂濟豈時俗之云阻判煙雲之騰躍半天步而無旅詠凌霄之飄飄永終焉而弗悔昊蒼煥而運流日月翻其代序下霄房之靡迄卜良晨而復舉陟瑤臺以投轡步玉除而容與因扶桑而東顧兮大傾光之可駭惑渾輿之茫茫兮心濛蔽而無緒織女賦足躡刺繡之履北堂書鈔卷一百三十六瓜賦佳哉瓜之為德邈衆果而莫賢殷中和之淳祜播滋榮於甫田背芳春以初載迎朱夏而自延奮修系之莫邁延秀瓞之綿綿赴廣武以長蔓粲煙接以雲連感嘉時而促節蒙惠霑而增鮮若乃紛敷雜錯鬱悅婆娑發彼適此迭相經過熙朗日以熠耀扇和風其如波有葛虆之簟及相椒聊之衆多發金榮於秀翹結玉實於柔柯蔽翠景以自育綴修莖而星羅夫其種族類數則有括樓定桃黃㼐白傳金文蜜筒小青大班玄骭素碗貍首虎蹯東陵出於秦谷桂髓起於巫山五色比象殊形異端或濟貌以表內或惠心而醜顏或攄文而抱緑或披素而懷丹氣洪細而俱芬體修短而必圓芳郁烈其充堂味窮理而不䬼德弘濟於飢渴道殷流而貴賤若夫濯以寒水淬以夏凌越氣外斂溫液密凝體猶握虛離若剖冰桑賦并序桑賦并序皇太子便坐蓋本將軍直廬也初世祖武皇帝為中壘將軍植桑一株世更二代年漸三紀扶踈豐衍抑有瑰異焉夫何佳樹之洪麗超託居乎紫庭羅萬根以下洞矯千條而上征豈民黎之能植乃世武之所營故其形瑰族類體豔衆木黃中爽理滋榮煩縟緑葉興而盈尺崇條蔓而層尋希太極以延峙映承明而廣臨華飛梟之流響想鳴鳥之遺音唯歷數之有紀恆依物以表德豈神明之所相將我皇之先識誇百世而勿翦超長年以永植舋稚節以夙茂蒙徑風而後凋文選卷二十二鮑照行藥至城東橋詩注果賦中山之縹李太平御覽卷九六八鱉賦并序鱉賦并序皇太子幸于釣臺漁人獻鱉命侍臣作賦其狀也穹脊連脅玄甲四周遁方圓於規矩徒廣狹以妨循盈尺而腳寸又取具於指掌鼻嘗氣而忌脂耳無聽而受響是以栖居多逼出處寡便尾不副首足不運身於是從容澤畔肆志汪洋朝戲蘭渚夕息中塘越高波以燕逸竄洪流而潛藏咀蕙蘭之芳荄翳華藕之垂房總美惡而兼融播萬族乎一區文選卷三十陶淵明詠貧士詩注薦賀循郭訥表伏見武康令賀循德量邃茂才鑒清遠服膺道素風操凝峻歷試二城刑政肅穆前蒸陽令郭訥風度簡曠器識朗拔通濟敏悟才足幹事循守下縣編名凡悴訥歸家巷棲遲有年皆出自新邦朝無知己居在遐外志不自營年時倏忽而邈無階緒實州黨愚智所為恨恨臣等伏思臺郎所以使州州有人非徒以均分顯路惠及外州而已誠以庶士殊風四方異俗壅隔之害遠國益甚至於荊揚二州戶各數十萬今揚州無郎而荊州江南乃無一人為京城職者誠非聖朝待四方之本心至於才望資品循可尚書郎訥可太子洗馬舍人此乃衆望所積非但企及清塗苟充方選也謹條資品乞蒙簡察晉書卷六十八賀循傳又見三國志吳書賀邵傳注太平御覽卷六三二北堂書鈔卷三十三薦張暢表伏見司徒下諫議大夫張暢除當為豫章內史丞暢才思清敏志節貞厲秉心立操早有名譽其年時舊比多歷郡守惟暢陵遲自首未齒而佐下藩遂蹈碎濁於暢名實居之為劇前後未始有此愚以為宜解舉試以近縣太平御覽卷二五三又見北堂書鈔卷七十七詣吳王表臣本吳人靖居海隅朝廷欲抽引遠人綏慰遐外故太傅所辟殿下東到淮南發詔以臣為郎中令太平御覽卷二百四十八相國參軍率取臺郎臣獨以高賢見取非私之謂北堂書鈔卷六十九謝吳王表殿中以臣為郎中命轉中兵郎復以頗涉文學見轉為殿中郎太平御覽卷二一五與吳王表臣以職在中書詔命所出而臣本以筆札見知北堂書鈔卷五十七禪文本草今見在中書一字一迹自可分別文選卷三七陸機謝平原內史表注引謝齊王表臣以職在中書制命所出而臣本以筆札見知慮逼迫不獲已乃詐發內妹喪出就弟雲哭泣受弔片言隻字文不關其間初學記卷十一又見太平御覽卷二二零謝平原內史表一首謝平原內史表一首陪臣陸機言今月九日魏郡太守遣兼丞張含齎板詔書印綬假臣為平原內史拜受祗竦莫知所裁臣機頓首死罪死罪臣本吳人出自敵國世無先臣宣力之效才非丘園耿介之秀皇澤廣被惠濟無遠擢自群萃纍蒙榮進入朝九載歷官有六身登三閣官成兩宮服冕乘軒仰齒貴遊振景拔迹顧邈同列施重山嶽義足灰沒遭國顛沛無節可紀雖蒙曠蕩臣獨何顏俯首頓膝憂愧若厲而橫為故齊王冏所見枉陷誣臣與衆人共作禪文幽執囹圄當為誅始臣之微誠不負天地倉卒之際慮有逼迫乃與弟雲及散騎侍郎袁瑜中書侍郎馮熊尚書右丞崔基廷尉正顧榮汝陰太守曹武思所以獲免陰蒙避回崎嶇自列片言隻字不關其間事蹤筆迹皆可推校而一朝翻然更以為罪蕞爾之生尚不足吝區區本懷實有可悲畏逼天威即罪惟謹鉗口結舌不敢上訴所天莫大之釁日經聖聽肝血之誠終不一聞所以臨難慷慨而不能不恨恨者唯此而已重蒙陛下愷悌之宥回霜收電使不隕越復得扶老攜幼生出獄戶懷金拖紫退就散輩感恩惟咎五情震悼局天蹐地若無所容不悟日月之明遂垂曲照雲雨之澤播及朽瘁忘臣弱才身無足采哀臣零落罪有可察苟削丹書得夷平民則塵洗天波謗絶衆口臣之始望尚未至是猥辱大命顯授符虎使春枯之條更與秋蘭垂芳陸沉之羽復與翔鴻撫翼雖安國免徒起紆青組張敞亡命坐致朱軒方臣所荷未足為泰豈臣蒙垢含吝所宜忝竊非臣毀宗夷族所能上報喜懼參并悲慚哽結拘守常憲當便道之官不得束身奔走稽顙城闕瞻係天衢馳心輦轂臣不勝屏營延仰謹拜表以聞大田議臣聞隆名之主不改法而下治陵夷之世不易術而民怠夫商人逸而利厚農人勞而報薄導農以利則耕夫勤節商以法則遊子歸晉書限斷議三祖實終為臣故書為臣之事不可不如傳此實録之謂也而名同帝王故自帝王之籍不可以不稱紀則追王之義初學記卷二十一至洛與成都王箋王室多故禍難薦有羊玄之乘寵凶豎專記朝政姦臣賊子是為比周皇甫商同惡相求共為亂階至令天子飄颻甚於贅旒伏惟明公匡濟之舉義命方宣元戎既啓風威電赫機以駑暗文武寡施猥蒙橫授委任外梱輒承嚴教董率諸軍唯力是視與趙王倫箋薦戴淵蓋聞繁弱登御然後高墉之功顯孤竹在肆然後降神之曲成是以高世之主必假遠邇之器蘊櫝之才思託太音之和伏見處士廣陵戴若思年三十清沖履道德量允塞思理足以研幽才鑒足以辨物安窮樂志無風塵之慕砥節立行有井泄之潔誠東南之遺寶宰朝之奇璞也若得託迹康衢則能結軌驥騄曜質廊廟必能垂光璵璠矣夫枯岸之民果於輸珠潤山之客列於貢玉蓋明暗呈形則庸識所甄也惟明公垂神採察不使忠允之言以人而廢晉書卷六十九戴若思傳又見世説新語自新第十五注引虞預晉書太平御覽卷六三二北堂書鈔卷三十三謝成都王箋慶雲惠露止於落葉文選卷五九齊故安陸昭王碑文注引與弟雲書此間有傖父欲作三都賦須有成當以覆酒甕耳晉書卷九十二左思傳聽訟觀東作百丈廊屋太平御覽卷一八五仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也太平御覽卷七一七監徒武庫建始殿諸房中見有兩足猴真怪物也太平御覽卷九一零天淵池養山雞甚可嬉太平御覽卷九一八天淵池東南角有果各作一林無處不有縱橫成行一果之間輒作一堂太平御覽卷九六四張騫為漢使外國十八年得塗林安石榴也太平御覽卷九七零門有三層高百尺魏明帝造水經注卷十六穀水思苦生疾文選卷十七陸機文賦注與長沙顧母書痛心拔腦有如孔懷顧氏家訓文章引與長沙夫人書士璜亡恨一襦少便以機新襦衣與之太平御覽卷六九五
