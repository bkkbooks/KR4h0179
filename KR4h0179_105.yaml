body:
  text: 黃章龍馬賦夫龍馬之所出于太蒙之荒域分虞淵之幽濬通天光之所極生河海之濱涯被華文而朱翼稟神祇之純化乃大宛而再育資玄螭之表像似靈虯之注則奪騕褭之體勢逸飛免之高蹤兼驥騄之美質豈驊駵之足雙耳如剡筩目象明星雙璧似月蘭筋參情蓺文類聚九十三又略見初學記二十九文選赭白馬賦注或有噓天慷慨骨騰肉飛文選江賦注七命注台有奇貌絕足蓋為聖德而生文選赭白馬賦注揚鸞鑣之瑣錫書鈔一百二十六為吳令謝詢求為諸孫置守冢人表臣聞成湯革夏而封杞武王入殷而建宋春秋征伐則晉脩虞祀燕祭齊廟夫一國為一人興先賢為後愚廢誠仁聖所哀悼而不忍也故三王敦繼絕之德春秋貴柔服之義昔漢高受命追存六國凡諸絕祚一時竝祀親與項羽對爭存亡逮羽之死臨哭其喪將以位嘗侔尊力嘗均勢雖功奪其成而恩與其敗且暴興疾顛禮之若舊殘戮之尸乃以公葬若使羽位承前緒世有哲王一朝力屈全身從命則楚廟不隳有後可冀伏惟大晉應天順民武成止戈西戎有即敘之人京邑開吳蜀之館興滅加乎萬國繼絕接于百世雖三五弘道商周稱仁洋洋之義未足以喻是以孫氏雖家失吳祚而族蒙晉榮子弟量才比肩進取懷金侯服佩青千里當時受恩多有過望臣聞春雨潤木自葉流根鴟鴞恤功愛子及室故天稱罔極之恩聖有綢繆之惠追惟吳偽武烈皇帝遭漢室之弱值亂臣之強首唱義兵先眾犯難破董卓于陽人濟神器于甄井威震群狡名顯往朝桓王才武弱冠承業招百越之士奮鷹揚之勢西赴許都將迎幼主雖元勳未終然至忠已著夫家積義勇之基世傳扶危之業進為徇漢之臣退為開吳之主而蒸嘗絕于三葉園陵殘于薪采臣竊悼之伏見吳平之初明詔追錄先賢欲封其墓愚謂二君竝宜應書故舉勞則力輸先代論德則惠孝江南正刑則眾非晉寇從坐則異世已輕若列先賢之數蒙詔書之恩裁加表異以寵亡靈則人望克厭誰不曰宜二君私奴多在墓側今為平民乞差五人蠲其徭役使四時脩護頹毀埽除塋壟永以為常文選蓺文類聚四十上詩表勞者歌其事貴露蚩鄙文選任昉荅敕示七夕詩啟注輿棺詣闕上書理愍懷太子伏見赦文及牓下前太子遹手疏以為驚愕自古以來臣子悖逆未有如此之甚也幸賴天慈全其首領臣伏念遹生于聖父而至此者由于長養深宮沈淪富貴受饒先帝父母驕之每見選師傅下至群吏率取膏粱擊鍾鼎食之家希有寒門儒素如衛綰周文石奮疏廣洗馬舍人亦無汲黯鄭莊之比遂使不見事父事君之道臣案古典太子居以士禮與國人齒以此明先王令知先賤然後乃貴自頃東宮亦微大盛所以致敗也非但東宮歷觀諸王師友文學皆豪族力能得者率非龔遂王陽能以道訓友無亮直三益之節官以文學為名實不讀書但菳鮮衣怒馬縱酒高會嬉遊博奕豈有切磋能相長益臣常恐公族陵遲以此歎息今遹可以為戒恐其被斥棄逐遠郊始當悔過無所復及昔戾太子無狀稱兵距命而壺關三老上書有田千秋之言猶曰子弄父兵罪應笞耳漢武感悟之築思子之臺今遹無狀言語悖逆受罪之日不敢失道猶為輕于戾太子尚可禁持撿著目下重選保傅如司空張華道德深遠乃心忠誠以為之師光祿大夫劉寔寒苦自立終始不衰年同呂望經籍不廢以為之保尚書僕射裴頠明允恭肅體道居正以為之友置游談文學皆選寒門孤宦以學行自立者及取服勤更事涉履艱難事君事親名行素聞者使與共處使嚴御史監護其家絕貴戚子弟輕薄賓客如此左右前後莫非正人師傅文學可令十日一講使其論議于前敕使但道古今孝子慈親忠臣事君及思愆改過之義皆聞善道庶幾可全昔太甲有罪放之三年思庸克復為殷明王又魏文帝懼于見廢夙夜自祗意能自全及至明帝因母得罪廢為平原侯為置家臣庶子師友文學皆取正人共相匡矯兢兢慎罰事父以孝父沒事母以謹聞于天下于今稱之漢高皇帝數置酒于庭欲廢太子後四皓為師子房為傅竟復成就前事不忘後事之戒孟軻有云孤臣孼子其操心也危慮患也深故多善功李斯云慈母多敗子嚴家無格虜由陛下驕遹使至于此庶其受罪以來足自思改方今天下多虞四夷未寍將伺國隙儲副大事不宜空虛宜為大計小復停留先加嚴誨依平原侯故事若不悛改棄之未晚也臣素寒門無力仕宦不經東宮情不私遹念昔楚國處女諫其王曰有龍無尾言年四十未有太子臣嘗備近職雖未得自結天日情同閽寺悾悾之誠皆為國計臣老母見臣為表乃為臣卜封云書御即死妻子守臣涕泣見止臣獨以為頻見拔擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輒具棺絮伏須刑誅晉書閻纘傳又見群書治要二十九引晉書皇太孫立復上疏臣前上書訟太子之枉不見省覽昔壺關三老陳衛太子之冤而漢武築思子之臺高廟令田千秋上書不敢正言託以鬼神之教而孝武大感月中三遷位至丞相乘車入殿號曰車氏恨臣精誠微薄不能有感竟使太子流離沒命許昌向令陛下即納臣言不致此禍天贊聖意三公獻謀庶人賜死罪人斯得太子以明臣恨其晚無所復及詔書慈悼迎喪反葬復其禮秩誠副眾望不意呂霍之變復生于今日伏見詔書建立太孫斯誠陛下上順先典以安社稷中慰悼冤魂之痛下令萬國心有所繫追惟庶人所為無狀幾傾宗廟賴相國太宰至忠憤發潛謀俱斷春贊聖意以成神武雖周誅二叔漢埽諸呂未足以喻臣願陛下因此大更釐改以為永制禮置太子居以士禮與國人齒為置官屬皆如朋友不為純臣既使上厭至望以崇孝道又令不相嚴憚易相規正昔漢武既信奸讒危害太子復用望氣之言欲盡誅詔獄中囚邴吉以皇孫在焉閉門距命後遂擁護皇孫督罰乳母卒至成人立為孝宣皇帝苟志于忠無往不可歷觀古人雖不避死亦由世教寬以成節吉雖距詔書事在于忠故宥而不責自晉興已來用法太嚴遲速之閒輒加誅斬一身伏法猶可彊為今世之誅動輒滅門昔呂后臨朝肆意無道周昌相趙三召其王而昌不遣先徵昌入乃後召王此由漢制本寬得使為快假令如今呂后必謂昌已反夷其三族則誰敢復為殺身成義者哉此法宜改可使經遠又漢初廢趙王張敖其臣貫高謀弒高祖高祖不誅以明臣道田叔孟舒十人為奴髡鉗隨王隱親侍養故令平安向使晉法得容為義東宮之臣得如周昌固護太子得如邴吉距詔不坐伏死諫爭則聖意必變太子以安如田叔孟舒侍從不罪者則隱親左右姦凶毒藥無緣得設太子不夭也臣每責東宮臣故無侍從者後聞頗有于道路望車拜辭而有司收付洛陽獄奏科其罪然臣故莫從良有以也又本置三率盛其兵馬所以宿衛防虞而使者卒至莫有警嚴覆請審者此由恐畏滅族今皇孫沖幼去事多故若有不虞彊臣專制姦邪矯詐雖有相國保訓東宮擁佑之恩同于邴吉適可使玉體安全宜開來防可著于今自今已後諸有廢興倉卒群臣皆得輒嚴須錄詣殿前面受口詔然後為信得同周昌不遣王節不聽臣子隱親得如田叔孟舒不加罪責則永固儲副以安後嗣之遠慮也來事難知往事可改臣前每見詹事裴權用心懇惻舍人秦戢數上疏啟諫而爰倩贈以九列權有忠意獨不蒙賞謂宜依倩為比以寵其魂推尋表疏如秦戢輩及司隸所奏諸敢拜辭于道路者明詔稱揚使微異于眾以勸為善以獎將來也晉書閻纘傳又陳宜選擇東宮師傅今相國雖已保傅東宮保其安危至于旦夕訓誨輔導出入動靜劬勞宜選寒苦之士忠貞清正老而不衰如城門校尉梁柳白衣南安朱沖比者以為師傅其侍臣以下文武將吏且勿復取盛戚豪門子弟若吳太妃家室及賈郭之黨如此之輩生而富溢無念脩己率多輕薄浮華相驅放縱皆非所補益于吾少主者也皆可擇寒門篤行學問素士更履險易節義足稱者以備群臣可輕其禮儀使與古同于相切磋為益昔魏文帝之在東宮徐榦劉楨為友文學相接之道竝如氣類吳太子登顧譚為友諸葛恪為賓臥同床帳行則參乘交如布衣相呼以字此則近代之明比也天子之子不患不富貴不患人不敬畏患于驕盈不聞其過不知稼穡之艱難耳至于甚者乃不知名六畜可不勉哉昔周公親撻伯禽曹參笞窋二百聖考慈父皆不傷恩今不忍小相維持令至闕失頓相罪責不亦誤哉在禮太子朝夕視膳昏定晨省跪問安否于情得盡五日一朝于敬既𥳑于恩亦疏易致搆閒故曰一朝不朝其閒容刀五日之制起漢高祖身為天子父猶庶人萬機事多故闕私敬耳今主上臨朝太子無事專主孝養宜改此俗文王世子篇曰王季一飯亦一飯再飯亦再飯安有逸豫五日一覲哉晉書閻纘傳今迎太子神柩孤魂獨行太孫幼沖不可涉道謂可遣妃奉迎遠路令其父衍隨行衛護皇太子初見誣陷臣家門無祐三世假親具嘗辛若以家觀國固知太子有變臣故求副監國欲依邴吉故事距違來使供養擁護身親飲食醫藥冀足救危主者以臣名資輕淺不肯見與世人見笑謂為此職退難居有必死憂臣獨以為苟全儲君賈氏所誅甘心所願今監國御史直副皆當三族侍衛無狀實自宜然臣謂其小人不足具責故孔子曰可以託六尺之孤臨大節而不可奪是以聖王慎選故河南尹向雄昔能犯難葬故將鍾會文帝嘉之始拔顯用至于先帝以為右率如閒之事若得向雄之比則豈可觸哉此二使者但為愚怯亦非與謀但可誅身自全三族如郭俶郭斌則于刑為當又東宮亦宜妙選忠直亮正如向雄比陛下千秋萬歲之後子孫幼沖選置兵衛宜得柱石之士如周昌者世俗淺薄士無廉節賈謐小兒恃寵恣睢而淺中弱植之徒更相翕習故世號魯公二十四友又謐前見臣表理太子曰閻兒作此為健然觀其意欲與諸司馬家同皆為臣寒心伏見詔書稱明滿奮樂廣侍郎賈胤與謐親理而亦疏遠往免父喪之後停家五年雖為小屈有識貴之潘岳繆徽等皆謐父黨共相沈浮人士羞之聞其晏然莫不為怪今詔書暴揚其罪竝皆遣出百姓咸云清當臣獨謂非但岳徽二十四人宜皆齊黜以肅風教晉書閻纘傳海賦昔在帝媯巨唐之代天綱浡潏為凋為瘵洪濤瀾汗萬里無際長波涾沱迆涎八裔于是乎禹也乃鏟臨崖之阜決陂潢而相沷啟龍門之岝峉墾陵巒而鏨鑿群山既略百川潛渫泱漭澹泞騰波赴勢江河既導萬穴俱流掎拔五嶽竭涸九州瀝滴滲淫薈蔚雲霧涓流泱瀼莫不來注於廓靈海長為委輸其為廣也其為怪也宜其為大也爾其為狀也則乃浟湙瀲灩浮天無岸浺瀜沆瀁渺瀰湠漫波如連山乍合乍散噓噏百川洗滌淮漢襄陵廣舄㶀㵧浩汗若乃大明轡于金樞之穴翔陽逸駭于扶桑之津彯沙礐石蕩𩘻島濱于是鼓怒溢浪揚浮更相觸摶飛沫起濤狀如天輪膠戾而激轉又似地軸挺拔而爭迴岑嶺飛騰而反覆五嶽鼓舞而相磓𣽴濆淪而滀漯鬱沏迭而隆頹盤汙激而成窟𣺰𣵢滐而為魁㴸泊柏而迆颺磊匒匌而相豗驚浪雷奔駭水迸集開合解會瀼瀼溼溼葩華踧沑濎濘潗㵫若乃霾曀潛銷莫振莫竦輕塵不飛纖蘿不動猶尚呀呷餘波獨湧澎濞灪䃶碨磊山壟爾其枝岐潭瀹渤蕩成汜乖蠻隔夷迴互萬里若乃偏荒速告王命急宣飛駿鼓楫汎海淩山于是候勁風揭百尺維長綃掛帆席望濤遠決冏然鳥逝鷸如驚鳧之失侶倏如六龍之所掣一越三千不終朝而濟所屆若其負穢臨深虛誓愆祈則有海童邀路馬銜當蹊天吳乍見而髣髴蝄像暫曉而閃屍群妖遘迕眇䁘冶夷決帆摧橦戕風起惡廓如靈變惚怳幽暮氣似天霄靉靅雲布䨹電百色妖露呵㗵掩鬱矆睒無度飛澇相磢激勢相沏崩雲屑雨浤浤汨汨𧿒踔湛𤄶沸潰渝溢瀖泋濩渭蕩雲沃日于是舟人漁子徂南極東或屑沒于黿鼉之穴或挂罥于岑㟼之峰或掣掣洩洩于裸人之國或汎汎悠悠于黑齒之邦或乃萍流而浮轉或因歸風以自反徒識觀怪之多駭乃不悟所歷之近遠爾其為大量也則南澰朱崖北灑天墟東演析木西薄青徐經途瀴溟萬萬有餘吐雲霓含龍魚隱鯤鱗潛靈居豈徒積太顛之寶貝與隨侯之明珠將世之所收者常聞所未名者若無且希世之所聞惡審其名故可仿像其色靉霼其形爾其水府之內極深之庭則有崇島巨鼇峌𡸣孤亭擘洪波指太清竭磐石栖百靈颺凱風而南逝廣莫至而北征其垠則有天琛水怪鮫人之室瑕石詭暉鱗甲異質若乃雲錦散文于沙汭之際綾羅被光于螺蚌之節繁采揚華萬色隱鮮陽冰不冶陰火潛然熺炭重燔吹炯九泉朱焰綠煙䁏眇蟬蜎魚則橫海之鯨突扤孤遊戛巖㟼偃高濤茹鱗甲吞龍舟噏波則洪漣踧蹜吹澇則百川倒流或乃蹭蹬窮波陸死鹽田巨鱗插雲鬐鬣刺天顱骨成嶽流膏為淵若乃巖坁之隈沙石之嶔毛翼產鷇剖卵成禽鳧雛離褷鶴子淋滲群飛侶浴戲廣浮深翔霧連軒洩洩淫淫翻動成雷擾翰為林更相叫嘯詭色殊音若乃三光既清天地融朗不汎陽侯乘蹻絕往覿安期于蓬萊見喬山之帝像群仙縹眇餐玉清涯履阜鄉之留舄被羽翮之襂纚翔天沼戲窮溟甄有形于無欲永悠悠以長生且其為器也包乾之奧括坤之區惟神是宅亦祇是廬何奇不有何怪不儲芒芒積流含形內虛曠哉坎德卑以自居弘往納來以宗以都品物類生何有何無文選蓺文類聚八上司徒府言楊俊故梁州刺史楊欣女以九月二十日出赴姊喪殯而欣息俊因喪服二十六日強嫁妹與南陽韓氏而韓氏就楊家共成婚姻韓氏居妻喪不顧禮義三旬內成婚傷化敗俗非冠帶所行下品二等第二人今為第四請正黃紙通典六十南陽中正張輔言司徒府與孫秀牋輔徒知希慕古人當官而行不復自知小為身計今義陽王誠弘恕不以介意然輔母年七十六常見憂慮恐輔將以怨疾獲罪願明公留神省察輔前後行事是國之愚臣而已晉書張輔傳名士優劣論管仲不若鮑叔知所奉知所投管仲奉主而不能濟所奔又非濟事之國二歸反坫皆鮑不為晉書張輔傳世人論司馬遷班固才之優劣多以固為勝余以為失遷之箸述辭約而事舉敘三千年事唯五十萬言固敘二百年事乃八十萬言煩省不敵固之不如遷一也良史述事善足以獎勸惡足以鑒戒人道之常中流小事亦無取焉而班皆書之不如二也毀敗鼂錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞詞流離亦足以明其大才也故述辯士則辭藻華靡敘實錄則隱核名檢此真所以長史也晉書張輔傳蓺文類聚二十二御覽四百四十七世人見魏武皇帝處有中土莫不謂勝劉玄德也余以玄德為勝夫撥亂之主先以能收相獲將為本一身之善戰不足恃也世人以玄德為呂布所襲為武帝所走舉軍東下而為陸遜所覆雖曰為呂布所襲未若武帝為徐榮所敗失馬被創之危也玄德還據徐州形勢未合在荊州劉景升父子不能用其計舉州降魏手下步騎不滿數千為武帝大眾所走未若武帝為呂布北騎所禽勒突火之急也玄德為陸遜所覆未若武帝為張繡所困挺身逃遁以喪二子也若令高祖死于彭城世人方之不及項羽遠矣武帝于宛下將獲謂不及張繡矣而其忌克安忍無親董公仁賈文和恆以佯愚自免荀文若楊德祖之徒多見賊害孔文舉桓文林等以宿恨見殺良將不能任行兵三十餘年無不親征功臣謀士曾無列土之封仁愛不加親戚惠澤不流百姓豈若玄德威而有恩勇而有義寬弘而大略乎諸葛孔明達治知變殆王佐之才玄德無強盛之勢而令委質張飛關羽皆人傑也服而使之夫明闇不相為用能否不相為使武帝雖處安強不為之用也況在危急之閒勢弱之地乎若令玄德據有中州將與周室比隆豈徒三傑而已哉蓺文類聚二十二御覽四百四十七樂毅諸葛孔明之優劣或以毅相弱燕合五國之兵以破強齊雪君王之恥圍城而不急攻將令道窮而義服此則仁者之師莫不謂毅為優余以為五國之兵共代一齊不足為強大戰濟西伏尸流血不足為仁夫孔明抱文武之德劉玄德以知人之明屢造其廬咨以濟世至如奇策泉涌智謀從橫遂東說孫權北抗大魏以乘勝之師翼佐取蜀及玄德臨終禪登大位在擾攘之際立童蒙之主設官分職班敘眾才文以寍內武以折衝然後布其恩澤于中國之民其行軍也路不拾遺毫毛無犯勳業垂濟而隕觀其遺文謀謨弘遠雅規恢廓己有功則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈振于遐邇者也孟子曰聞伯夷之風貪夫廉余以為覩孔明之忠姦臣立節矣殆將與伊呂爭儔豈徒樂毅為伍哉蓺文類聚二十二御覽四百四十七左思三都賦略解序余觀三都之賦言不苟華必經典要品物殊類稟之圖籍辭義瓌瑋良可貴也有晉徵士故太子中庶子安定皇甫謐西州之逸士耽籍樂道高尚其事覽斯文而慷慨為之都序中書著作郎安平張載尚書郎濟南劉逵竝以經學洽博才章美茂咸皆悅玩為之訓詁其山川土域草木鳥獸奇怪珍異僉皆研精所由紛散其義矣余嘉其文不能默已聊藉二子之遺忘又為之略解祇增煩重覽者闕焉晉書左思傳作陳留衛瓘乃權之誤魏志衛臻傳注權作左思吳都賦敘及注敘粗有文辭至于為注了無所發明直為塵穢紙墨不合傳寫也又瓘乃衛覬子河東安邑人而云陳留衛瓘是轉刻之誤無疑注左思蜀都吳都賦序觀中古已來為賦者多矣相如子虛擅名于前班固兩都理勝其辭張衡二京文過其義至若此賦擬議數家傅辭會義抑多精致非夫研覈者不能練其旨非夫博物者不能統其異世咸貴遠而賤近莫肯用心于明物斯文吾有異焉故聊以餘思為其引詁亦猶胡廣之于官箴蔡雍之于典引也晉書左思傳議蘇宙事事君之道資于事父委質之日貳乃辟也宙受署而退義已周矣諸侯五月而葬同盟至所以哀其喪矜其孤也苟能致書言弔祭闕之可也通典九十九秦罷侯置守漢氏因循郡守喪官有斬衰負土成墳此可謂竊禮之不中過猶不及者也至于赴奔弔祭故將非禮典所載是末代流俗相習委巷之所行耳非聖朝之明式也今之郡守內史一時臨宰轉移無常君遷于上臣易于下猶都官假合從事耳又當故將未殯之前已受天子肅命之任王事敦我密勿所職詩不云乎王事靡盬不遑將父孝子之情猶不得將養父母而況遠是弔祭故將乎其議貶者可謂行人失辭仲尼所以非子路由爾責于人終無已也通典九十九上言請攷榮晦初矯詔者至公承詔當免即便奉送章綬雖有兵仗不施一刃重敕出第單車從命如僑詔之文唯免公官右軍以下即承詐偽違其本文輒戮宰輔不復表上橫收公子孫輒皆行刑賊害大臣父子九人伏見詔書為楚王所誑誤非本同謀者皆弛遣如書之旨謂里舍人被驅齎白杖者耳律受教殺人不得免死況乎手害功臣賊殺忠良雖云非謀理所不赦今元惡雖誅殺賊猶存臣懼有司未詳事實或有縱漏不加精盡使公父子讎賊不滅冤魂永恨訴于穹蒼酷痛之臣悲于明世臣等身被創痍殯斂始訖謹條瓘前在司空時帳下給使榮晦無情被黜知瓘家人數小孫名字晦後轉給右軍其夜晦在門外揚聲大呼宣詔免公還第及門開晦前到中門復讀所齎偽詔手取公章綬貂蟬催公出第晦案次錄瓘家口及其子孫皆兵仗將送著東亭道北圍守一時之閒便皆斬斫害公子孫實由于晦及將人劫盜府庫皆晦所為攷晦一人眾奸皆出乞驗盡情偽加以族誅晉書衛瓘傳
