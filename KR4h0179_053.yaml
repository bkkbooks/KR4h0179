body:
  text: 李秉家誡昔侍坐于先帝時有三長吏俱見臨辭出上曰為官長當清當慎當勤修此三者何患不治乎竝受詔既出上顧謂吾等曰相誡敕正當爾不侍坐衆賢莫不贊善上又問必不得已而去于斯三者何先或對曰清固為本次復問吾吾對曰清慎之道相須而成必不得已慎乃為大夫清者不必慎慎者必自清亦由仁者必有勇勇者不必有仁是以易稱括囊無咎藉用白茅皆慎之至也上曰卿言得之矣可舉近世能慎者誰乎諸人各未知所對吾乃舉故太尉荀景倩尚書董仲連僕射王公仲竝可謂為慎上曰此諸人者溫恭朝夕執事有恪亦各言其慎也然天下之至慎者其惟阮嗣宗乎每與之言言及玄遠而未曾評論時事臧否人物真可謂至慎矣吾每思此言亦足以為明誡凡人行事年少立身不可不慎勿輕論人勿輕說事如此則悔吝何由而生禍患無從而至矣魏志李通傳注引王隱晉書秉嘗答司馬文王問因以為家誡又世說德行篇注及御覽四百三十引王隱晉書竝作李康因秉字俗寫作秉與康形近而誤也李康字蕭遠中山人文選運命論注引劉義慶集林康早卒未必入晉也又案世說言語篇注引晉中興書李充江夏鄳人祖康父矩皆有美名彼康字亦秉之誤請除九品疏先王議制以時因革因革之理維變所適九品始于喪亂軍中之政誠非經國不刊之法也且其檢防轉碎徵形失實故朝野之論僉謂驅動風俗為弊已甚而至于議改又以為疑臣以革法創制當先盡開塞利害之理舉而錯之使體例大通而無否滯亦未易故也古者諸侯之治分土有常國有定主人無異望卿大夫世祿仕無出位之思臣無越境之交上下體固人德歸厚秦反斯道罷侯置守風俗淺薄自此來矣漢革其弊斟酌周秦竝建侯守亦使分土有定而牧司必各舉賢貢士任之鄉議事合聖典比蹤三代方今聖德之隆光被四表兆庶顒顒欣覩太平然承魏氏雕弊之跡人物播越仕無常朝入無定處郎吏蓄于軍府豪右聚于都邑事體駮錯與古不同謂九品既除宜先開移徙聽相并就且明貢舉之法不濫于境外則冠帶之倫將不分而自均即上斷之實行矣又建樹官司功在簡久階級少則人心定久其事則政化成而能否著此三代所以直道而行也以為選例九等當今之要所宜施用也聖王知天下之難常從事於其易故寄檃括于閭伍則邑屋皆為有司若任非所由事非所核則雖竭聖智猶不足以贍其事由此而觀誠令二者既行即人思反本修之于鄉華競自息而禮讓日隆矣晉書李重傳通典十四請優禮朱沖疏凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺高義也昔先帝患風流之弊而思反純朴乃咨詢朝衆搜求隱逸咸寧二年始以太子中庶子徵安定皇甫謐四年又以博士徵安南朱沖太康元年復以大子庶子徵沖雖皆以病疾不至而朝野悅服陛下遠邁先帝禮賢之旨臣訪沖州邑言其雖年近耋耄而志氣克壯耽道窮藪老而彌新操尚貞純所居成化誠山栖耆德足以表世篤俗者也臣以為宜垂聖恩及其未沒顯加優命晉書李重傳奏駮恬和所表二事先王之制士農工商有分不遷其業所以利用厚生各肆其力也周官以土均之法經其土地井田之制而辨其五物九等貢賦之序然後公私制定率土均齊自秦立阡陌建郡縣而斯制已沒降及漢魏因循舊跡王法所峻者唯服物車器有貴賤之差令不僭擬以亂尊卑耳至于奴婢私産則實皆未嘗曲為之立限也八年已巳詔書申明律令諸士卒百工以上所服乘皆不得違制若一縣一歲之中有違犯者三家洛陽縣十家已上官長免如詔書之旨法制已嚴令如和所陳而稱光幹之議此皆衰世踰侈當時之患然盛漢之初不議其制光等作而不行非漏而不及能而不用也蓋以諸侯之軌既滅而井田之制未復則王者之法不得制人之私也人之田宅既無定限則奴婢不宜偏制其數懼徒為之法實碎而難檢方今聖明垂制每尚簡易法禁已具和表無施晉書李重傳大中大夫恬和表陳便宜稱漢孔光魏徐幹等議使王公已下制奴婢限數及禁百姓賣田宅中書啓可屬主者為條制重奏云云奏霍原應舉寒素案如癸酉詔書廉讓宜崇浮競宜黜其有履謙寒素靖恭求己者應有以先之如詔書之旨以二品繫資或失廉退之士故開寒素以明尚德之舉司徒總御人倫實掌邦教當務峻準評以一風流然古之厲行高尚之士或栖身巖穴或隱跡丘園或克己復禮或耄期稱道出處默語唯義所在未可以少長異操疑其所守之美而遠同始終之責非所謂擬人必于其倫之義也誠當考之于邦黨之倫審之于任舉之主沈為中正親執銓衡陳原隱居永志篤古好學學不為利行不要名絶迹窮山蘊韣道藝外無希世之容內全遁逸之節行成名立縉紳慕之委質受業者千里而應有孫孟之風嚴鄭之操始舉原先咨侍中領中書監華前州大中正後將軍嬰河南尹軼去三年諸州還朝幽州刺史許猛特以原名聞擬之西河求加徵聘如沈所列州黨之議既舉又刺史班詔表薦如此而猶謂草野之譽未洽德禮無聞舍所徵檢之實而無明理正辭以奪沈所執且應二品非所求備但原定志窮山修述儒道義在可嘉若遂抑替將負幽邦之望傷敦德之教如詔書所求之旨應為二品晉書李重傳燕國中正劉沈舉霍原為寒素司徒府不從沈又抗詣中書奏原而中書復下司徒參論司徒左長史荀組以為不應舉重奏云云又略見文選王康琚反招隱詩注引王隱晉書奏駮介登貶秩居官事臣聞立法垂制所以齊檢邪非必曲尋事情而理無所遺也故所滯者寡而所濟者衆今如登郡比者多若聽其貶秩居官動為準例懼庸才負遠必有黷貨之纍非所以肅清王化輯寧殊域也臣愚以為宜聽鑒所上先召登還且使體例有常不為遠近異制晉書李重傳司隸校尉石鑒奏鬱林太守介登役使所監求召還尚書荀愷以為遠郡非人情所樂奏登貶秩居官重駮云云雜奏議古之聖王建官垂制所以體國經治而功在簡易自帝王而下世有增損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九卿雖置五曹尚書令僕射之職始于掌封秦以宣內外事任尚輕而郡守牧民之官重故漢宣稱所與為治唯良二千石其有殊效者輒璽書勉勵或賜爵進秩禮遇豐厚得為治大體所以遠蹤三代也及至東京尚書雖漸優顯然令僕出為郡守鍾離意黃香胡廣是也郡守入為三公虞延第五倫桓虞鮑昱是也近自魏朝名守杜畿滿寵田豫胡質等居郡或十餘年或二十年或秩中二千石假節猶不去郡或還不易方此亦古人苟善其事雖沒世不徙官之義也漢魏以來內官之貴于今最隆太始以前多以散官補臺郎亦徑補黃門中書郎而今皆數等而後至衆職率亦如此陵遲之俗未反篤上之風未洽及百事等級遂多遷補轉徙如流能否無以著黜陟不得彰此為治之大弊也夫階級繁多而冀官久官不久而冀治功成不可得也虞書云三考黜陟幽明周官三年大計群吏之治而行其誅賞漢法官人不得真秩京房為魏郡太守以八百石居之魏初用輕資先亦試守不稱則繼以左遷然則俊才登進無能降退此則所謂有知必試而使人以器者也臣以為今宜大併群官等級使同班者不得復稍遷又𥳑法外議罪之制明試守左遷之例則官人之理盡士必量能而受爵矣居官者日久則政績可考人心自定務求諸己矣案晉書李重傳于時內官重外官輕兼階級繁多重議之見百官志檢今晉書職官志無此奏議治要所用是王隱晉書即李重傳所稱見百官志者也薦曹嘉啓魏氏宗室屈滯每聖恩所存東莞太守曹嘉才幹學義不及志翕而良素修潔性業踰之又已歷二郡臣以為優先代之後可以嘉為員外散騎侍郎魏志楚王彪傳注引王隱晉書吏部郎李重啓云吏部尚書針序重忝曹郎銓管九流品藻清濁雖祗慎莫知所寄初學記十一又文選褚潚碑注引李重集作銓管人流風賦尋之莫見其終迎之莫知其來四方為之易位八維為之輪回游聚則天地為一消聚則六合洞開藝文類聚一春遊賦蓋適性莫畼乎遊而時和莫喻乎春御覽二十懷愁賦在中秋之遙夜兮直崇禮之禁闈初學記十一玄宗賦慕玄風之遐裔余皇祖曰伯陽文選江淹雜體詩注穆天子賦其馬則赤驥盜驪驊騮緑耳楊和齊鑣一瞬萬里御覽三百五十八郭有道九賢頌峨峨有道英風霞爽玄覽洞照慧心秀朗管徵君管生含道養志頤神抱璞秉和履信依仁陳太丘懿矣太丘惟德之紀弭迹下邑戢景百里華太尉亹亹敬侯誕縱淑姿令迹鳳翔清塵龍飛嵇中散肅肅中散俊明宣哲籠罩宇宙高蹈玄轍竝初學記十七起居誡溫良恭儉仲尼以為貴小心翼翼文王所以稱美聖德周達無名斯亦聖中之目也中人而有斯行則亦聖人之一隅矣而末俗謂守慎為拘𠫤退慎為怯弱不遜以為勇無禮以為達異乎吾所聞也藝文類聚二十三床頭書疏亦不足觀或他事私密不欲令人見之縱能不宣誰與明之若有泄露則傷之者至矣御覽五百九十五軍書羽檄非儒者之事但家奉道法言不及殺語不虛誕而檄不切厲則敵心陵言不誇壯則軍容弱請姑舍之以待能者御覽五百九十七學針老子云絶仁棄義家復孝慈豈仁義之道絶然後孝慈乃生哉蓋患乎情仁義者寡而利仁義者衆也道德喪而仁義彰仁義彰而名利作禮教之弊直在茲也先王以道德之不行故以仁義化之行仁義之不篤故以禮律檢之檢之彌繁而僞亦愈廣老莊是乃明無為之益塞爭欲之門夫極靈智之妙總會通之和者莫尚乎聖人革一代之弘制垂千載之遺風則非聖不立然則聖人之在世吐言則為訓辭蒞事則為物軌運通則與時隆理喪則與世弊矣是以大為之論以標其旨物必有宗事必有主寄責于聖人而遺纍乎陳迹也故化之以絶聖棄智鎮之以無名之朴聖教救其末老莊明其本本末之塗殊而為教一也人之迷也其日久矣見形者衆及道者鯊不覿千仞之門而逐適物之迹逐迹逾篤離本逾遠遂使華端與薄俗俱興妙緒與淳風竝絶所以聖人長潛而迹未嘗滅矣懼後進惑其如此將越禮棄學而希無為之風見義教之殺而不觀其隆矣略言所懷以補其闕引道家之弘旨會世教之適當義不違本言不流放庶以袪困蒙之蔽悟一往之惑乎其辭曰芒芒太初悠悠鴻荒蚩蚩萬類與道兼忘聖迹未顯賢名不彰怡此鼓腹率我猖狂資生既廣群塗思通暗實師明匪豫求蒙遺己濟物而天下為公大庭唱基羲農宏贊六位時成離暉大觀澤洽雨濡化流風散比屋同塵而人罔僭亂爰暨中古哲王胥承質文代作禮統迭興事籍用以繁化因阻而凝動非性擾靜豈神澄名之攸彰道之攸廢乃損所隆乃崇所替刑作由于德衰三辟興乎叔世既敦既誘乃矯乃厲敦亦既備矯亦既深雕瑑生文抑揚成音群能騁技衆巧竭心野無陸馬山無散林風罔不動化罔不移人之失德反正作奇乃放欲以越禮不知希競之為病違彼夷塗而遵此險徑狡兔陵岡游魚遁川至賾深妙大象幽玄棄餌收罝而責功蹄筌先統喪歸而寄旨忘言政異徵辭拔本塞源遁迹永日尋響窮年刻意離性而失其常然世月險夷運有通圮損益適時升降惟理道不可以一日廢亦不可以一朝擬禮不可為千載制亦不可以當年止非仁無以長物非義無以齊恥仁義固不可遠去其害仁義者而己力行猶懼不逮希企邈以遠矣室有善言應在千里況乎行止復禮克己風人司針敬貽君子晉書李充傳登安仁峰銘正月七日厥日惟人策我良駟陟彼安仁藝文類聚四初學記四良弓銘弓矢之作爰自曩時鄉村載禮招命在詩力稱顏高功發由基不爭之美亦以詳疑藝文類聚六十初學記二十二壺壽銘投壼籌禮揖敘先後通風月數分為主部御覽七百五十三博銘夫無用心博奕猶賢方平處下有不邪偏御覽七百五十四舟楫銘舟楫之利譬猶車馬重載歷遠以濟天下相風視波窮究川野安審懼慎終無不可御覽七百七十弔嵇中散先生挺藐世之風資高明之質神蕭蕭以宏遠志落落以遐逸忘尊榮于華堂括卑靜于蓬室寧漆園之逍遙安柱下之得一寄欣孤松取樂竹林尚想蒙莊聊與抽簪味孫觴之濁膠鳴七弦之清琴慕義人之元旨詠千載之徽音淩晨風而長嘯託歸流而詠吟乃自足乎丘壑孰有慍乎陸沈馬樂原而翅足龜悅塗而曳尾疇廟堂而足榮豈和鈴之足視久先生之所期羌元達于遐旨尚遺大以出生何殉小而入死嗟乎先生逢時命之不丁冀後凋于歲寒遭繁霜于夏零滅皎皎之玉質絶琅琅之金聲援明珠以彈雀損所重而為輕諒鄙心之不爽非大雅之所營御覽五百九十六翰林論或問曰何如斯可謂之文答曰孔文舉之書陸士衡之議斯可謂成文矣初學記二十一御覽五百八十五潘安仁之為文也猶翔禽之羽毛衣被之綃縠初學記二十一御覽五百九十九容象圖而讚立宜使辭簡而義正孔融之讚楊公亦其義也御覽五百八十八表宜以遠大為本不以華藻為先若曹子建之表可謂成文矣諸葛亮之表劉主裴公之辭侍中羊公之讓開府可謂德音矣御覽五百九十四駮不以華藻為先世以傅長虞每奏駮事為邦之司直矣御覽五百九十四研玉名理而論難王馬論貴于允理不求支離若嵇康之論文矣御覽五百九十五在朝辨政而議奏出宜以遠大為本陸機議晉斷亦名其美矣御覽五百九十五盟檄發于師旅相如喻蜀父老可謂德音矣御覽五百九十七雪賦何時雪之嘉澤亦應變而俱凝隨同雲而下降固霑渥之所興藝文類聚二雷賦伊青陽之肇化兮陶萬殊于天壤結鬱蒸以成雷兮鼓訇輘之逸響應厲風以相薄兮包群動而為長乘雲氣之鬱蓊兮舒電光之炯晃驚蟄蟲于始作兮懼遠邇之異象爾其發也則騰躍濆薄砰磕隱天起偉霆于霄際摧徑木于巖巔驅宏威之迅烈若崩嶽之置置斯實陽靈之變化固大壯之宗源也若乃駭氣奔激震響交搏濆淪隱轔崩騰磊落來無徹跡去無阡陌君子恐懼而修省聖人因象以制作審其體勢觀其曲折輕如伐鼓轟若走轍嶪猶地傾繣似天裂比五音而無當校衆響而稱傑于是上穆下明順天承法戒刑獄以致亨孰非善而可攝正震體于東方立不易之恆業豫行師以景奮解宥過而人協若夫洪細靡常興廢難克殷其山陽勸義崇德起五龍于河始戕武乙于渭北啓周成之沖昧罰展氏之凶慝雖通塞于萬形猶違虛而守盈肆大夏而有烈奮嚴冬而弗經保恬靜以處順乃上善以屏營夫有往而為間若大音之希聲藝文類聚二初學記一悲四時賦悲春日兮悲陽澤之方宣建靈威以延蟄叩東震而饗天布和氣之烟熅舒朗景之淑鮮雲興滋于秀石飆鳴柯于崇山平皋眇莽中林蔥青野馬飛澗晨虹垂旌陽燕南徂陰雁北征素華浩浩丹秀熒熒藝文類聚三口芃芃而含秀葉靄而敷榮北堂書鈔一百五十四悲夏日兮悲炎節之赫羲覽祝融之御轡遊井耀兮南離晞辰凱之長吹蔭緑柳之揚枝雲鬱律以泉涌雨淋澡而方篩奮駭霆之奔磕舒驚電之橫摛藝文類聚三秋日悲兮火流天而滌暑風入林而疏條菊挺葩于緑莖蘭飛馨于翠翹北堂書鈔一百五十四雲黮䨴以時興雪聯翩驟密枯枝皎如瓊翰空岫朗若玉室御覽十二感興賦風觸波而文動兮露沾卉而珠凝初學記三淩仙賦瞻蓬萊之秀嶼冀東叟之可尋將乍至而反墜患巨浪之相臨初學記六案廣宏明集有大乘賦謂是魏李顒作檢魏書北史未見其人也今姑録入元魏文此不録龜賦質應離象位定坎居賤彼朵頤賁我靈符浮洛川見緯書洞祕賾通元虛初學記三十御覽九百三十一鏡論日之照鏡光燭乎壁水對鏡相照而已日為鑒水之族也光來無漸孰有往反也北堂書鈔一百三十六阮彥倫誄積土纍功以為雲臺文選謝宣遠答靈運詩注
