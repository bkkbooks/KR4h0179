body:
  text: 左思齊都賦𡸷嶺鎮其左水經巨洋水注四扈推移御覽九百二十三其艸則有杜若蘅菊石蘭芷蕙紫莖丹穎湘蔈縹蔕初學記二十七勝火之木衝水之草御覽九百六十露桃霜李御覽九百六十八三都賦序序蓋詩有六義焉其二曰賦揚雄曰詩人之賦麗以則班固曰賦者古詩之流也先王采焉以觀土風見綠竹猗猗則知衛地淇澳之產見在其版屋則知秦野西戎之宅故能居然而辨八方然相如賦上林而引盧橘夏熟揚雄賦甘泉而陳玉樹青蔥班固賦西都而歎以出比目張衡賦西京而述以遊海若假稱珍怪以為潤色若斯之類匪啻于茲攷之果木則生非其壤校之神物則出非其所于辭則易為藻飾于義則虛而無徵且夫玉卮無當雖寶非用侈言無驗雖麗非經而論者莫不詆訐其研精作者大氐舉為憲章積習生常有自來矣余既思摹二京而賦三都其山川城邑則稽之地圖其鳥獸草木則驗之方志風謠歌舞各附其俗魁梧長者莫非其舊何則發言為詩者詠其所志也升高能賦者頌其所見也美物者貴依其本讚事者宜本其實匪本匪實覽者奚信且夫任土作貢虞書所著辯物居方周易所慎聊舉其一隅攝其體統歸諸詁訓焉蜀都賦有西蜀公子者言于東吳王孫曰蓋聞天以日月為綱地以四海為紀九土星分萬國錯跱崤函有帝皇之宅河洛為王者之里吾子豈亦曾聞蜀都之事歟請為左右揚摧而陳之夫蜀都者蓋兆基于上世開國于中古廓靈關以為門包玉壘而為宇帶二江之雙流抗峨眉之重阻水陸所湊兼六合而交會焉豐蔚所盛茂八區而菴藹焉于前則跨躡犍牂枕輢交趾經途所亙五千餘里山阜相屬含谿懷谷崗巒糺紛觸石吐雲鬱葐蒀以翠微崛巍巍以峨峨干青霄而秀出舒丹氣而為霞龍池滈瀑濆其隈漏江伏流潰其阿汨若湯谷之揚濤沛若濛氾之涌波于是乎卭竹緣嶺菌桂臨崖旁挺龍目側生荔枝布綠葉之萋萋結朱實之離離迎隆冬而不凋常曄曄以猗猗孔翠群翔犀象競馳白雉朝雊猩猩夜啼金馬騁光而絕景碧雞鯈忽而曜儀火井沈熒于幽泉高爓飛煽于天垂其閒則有虎珀丹青江珠瑕英金沙銀礫符采彪炳暉麗灼爍于後則卻背華容北指崑崙緣以劍閣阻以石門流漢湯湯驚浪雷奔望之天迥即之雲昏水物殊品鱗介異族或藏蛟螭或隱碧玉嘉魚出于丙穴良木攢于褒谷其樹則有木蘭梫桂杞櫹椅桐椶枒楔樅梗枏幽藹于谷底松柏蓊鬱于山峰擢脩榦竦長條扇飛雲拂輕霄羲和假道于峻阪歧陽烏迴翼乎高標巢居栖翔聿兼鄧林穴宅奇獸窠宿異禽熊羆咆其陽鵰鶚鴥其陰猨狖騰希而競捷虎豹長嘯而永吟于東則左緜巴中百濮所充外負銅梁于宕渠內函要害于膏腴其中則有巴菽巴戟靈壽桃枝樊以蒩圃濱以鹽池𧒀蛦山棲黿龜水處潛龍蟠于沮澤應鳴鼓而興雨丹沙赩熾出其坂蜜房郁毓被其阜山圖采而得道赤斧服而不朽若乃剛悍生其方謠尚其武奮之則賨旅翫之則渝舞銳氣剽于中葉蹻容世于樂府于西則右挾岷山涌瀆發川陪以白狼夷歌成章坰野草昧林麓黝儵交讓所植蹲鴟所伏百藥灌叢寒卉冬馥異類眾夥于何不育其中則有青珠黃環碧砮芒消或豐綠荑或蕃丹椒麋蕪布濩于中阿風連莚蔓于蘭皋紅葩紫飾柯葉漸苞敷蕊葳蕤落英飄颻神農是嘗盧跗是料芳追氣邪味蠲癘痟其封域之內則有原隰墳衍通望彌博演以潛沬浸以緜雒溝洫脈散疆里綺錯黍稷油油稉稻莫莫指渠口以為雲門灑滮池而為陸澤雖星畢之滂沱尚未齊其膏液爾乃邑居隱賑夾江傍山棟宇相望桑梓接連家有鹽泉之井戶有橘柚之園其園則有林檎枇杷橙柹梬楟榹桃函列梅李羅生百果甲宅異色同榮朱纓春熟素柰夏成若乃大火流涼風厲白露凝微霜結紫梨津潤樼栗罅發蒲桃亂潰若榴競裂甘至自零芬芬酷烈其園則有蒟蒻茱萸瓜疇芋區甘蔗辛薑陽蓲陰敷日往菲薇月來扶疏任土所麗眾獻而儲其沃瀛則有攢蔣叢蒲綠菱紅蓮雜以蘊藻糅以蘋蘩總莖柅柅裛葉蓁蓁蕡實時味王公羞焉其中則有鴻儔鵠侶䳲鷺鵜鶦晨鳧旦至侯雁銜蘆木落南翔冰泮北徂雲飛水宿哢吭清渠其深則有白黿命鱉玄獺上祭鱣鮪鱒魴鮷鱧魦鱨差鱗次色錦質報章躍濤戲瀨中流相忘于是乎金城石郭兼市中區既麗且崇實號成都闢二九之通門畫方軌之廣塗營新宮于爽塏擬承明而起廬結陽城之延閣飛觀榭乎雲中開高軒以臨山列綺窗而瞰江內則議殿爵堂武義虎威宣化之闥崇禮之闈華闕雙邈重門洞開金鋪交映玉題相暉外則軌躅八達里閈對出比屋連甍千廡萬室亦有甲第當衢向術壇宇顯敞高門納駟庭扣鍾磬堂撫琴瑟匪葛匪姜疇能是恤亞以少城接乎其西市廛所會萬商之淵列隧百重羅肆巨千賄貨山積纖麗星繁都人士女袨服靚妝賈貿墆鬻舛錯縱橫異物崛詭奇于八方布有橦華麪有桄榔卭杖傳節于大夏之邑蒟醬流味于番禺之鄉輿輦雜沓冠帶混并累轂疊跡叛衍相傾諠譁鼎沸則哤聒宇宙囂塵張天則埃壒曜靈闤闠之裏伎巧之家百室離房機杼相和貝錦斐成濯色江波黃潤比筒籯金所過侈侈隆富卓鄭埒名公擅山川貨殖私庭藏鏹巨萬鈲摫兼呈亦以財雄翕習邊城三蜀之豪時來時往養交都邑結儔附黨劇談戲論扼腕抵掌出則連騎歸從百兩若其舊俗終冬始春吉日良辰置酒高堂以御嘉賓金罍中坐肴槅四陳觴以清醥鮮以紫鱗羽爵執競絲竹乃發巴姬彈弦漢女擊節起西音于促柱歌江上之飉厲紆長袖而屢舞翩躚躚以裔裔合樽促席引滿相罰樂飲今夕一醉累月若夫王孫之屬卻公之倫從禽于外巷無居人竝乘驥子俱服魚文玄黃異校結駟繽紛西踰金隄東越玉津朔別期晦匪日匪旬蹴蹈蒙籠涉𨆍寥廓鷹犬倏眒罻羅絡幕毛群陸離羽族紛泊翕響揮霍中網林薄屠麖麋翦旄塵帶文蛇跨彫虎志未騁時欲晚追輕翼赴絕遠出彭門之闕馳九折之坂經三峽之崢嶸躡五屼之蹇滻戟食鐵之獸射噬毒之鹿皛貙氓于葽草彈言鳥于森木拔象齒戾犀角鳥鎩翮獸廢足殆而朅來相與第如滇池集于江洲試水客艤輕舟娉江婓與神遊罨翡翠釣鰋鮋下高鵠出潛虯吹洞簫發櫂謳感鱏魚動陽侯勝波沸涌珠貝氾浮若雲漢含星而光耀洪流將饗獠者張帟幕會平原酌清酤割芳鮮飲御酣賓旅旋車馬雷駭轟轟闐闐若風流雨散漫乎數百里閒斯蓋宅土之所安樂觀聽之所踴躍也焉獨三川為世朝市若乃卓犖奇譎倜儻罔已一經神怪一緯人理遠則岷山之精上為井絡天帝運期而會昌景福肸蠁而興作碧出萇弘之血鳥生杜宇之魄妄變化而非常羌見偉于疇昔近則江漢炳靈世載其英蔚若相如皭若君平王褒韡曄而秀發揚雄含章而挻生幽思絢道德擒藻掞天庭攷四海而為儁當中葉而擅名是故遊談者以為譽造作者以為程也至乎臨谷為塞因山為障峻岨塍埒長城豁險吞若巨防一人守隘萬夫莫向公孫躍馬而稱帝劉宗下輦而自王由此言之天下孰尚故雖兼諸夏之富有猶未若茲都之無量也文選吳都賦東吳王孫囅然而咍曰夫上圖景宿辨于天文者也下料物土柝于地理者也古先帝代曾覽八紘之洪緒一六合而光宅翔集遐宇鳥策篆素玉牒石記鳥聞梁岷有陟方之館行宮之基歟而吾子言蜀都之富禺同之有瑋其區域美其林藪矜巴漢之阻則以為襲險之右徇蹲鴟之沃則以為世濟陽九齷齪而筭顧亦曲士之所歎也旁魄而論都抑非大人之壯觀也何則土壤不足以攝生山川不足以周衛公孫國之而破諸葛家之而滅茲乃喪亂之丘墟顛覆之軌轍安可以儷王公而著風烈也翫其磧礫而不窺玉淵者未知驪龍之所蟠也習其弊邑而不覩上邦者未知英雄之所躔也子獨未聞大吳之巨麗乎且有吳之開國也造自太伯宣于延陵蓋端委之所彰高節之所興建至德以刱洪業世無得而顯稱由克讓以立風俗輕脫躧于千乘若率土而論都則非列國之所觖望也故其經略上當星紀拓土畫疆卓犖兼并包括干越跨躡蠻荊婺女寄其曜翼軫寓其精指衡岳以鎮野目龍川而帶坰爾其山澤則嵬嶷嶢屼巊冥鬱岪潰渱泮汗滇㴐淼漫或涌川而開瀆或吞江而納漢磈磈䃬䃬滮滮涆涆嶔崟乎數州之閒灌注乎天下之半百川派別歸海而會控清引濁混濤并瀨濆薄沸騰寂寥長邁濞焉洶洶隱焉礚礚出乎大荒之中行乎東極之外經扶桑之中林包湯谷之滂沛潮波汨起迴復萬里歊霧漨浡雲蒸昏昧泓澄淵潫澒溶沆瀁莫測其深莫究其廣澶湉漠而無涯總有流而為長瓌異之所叢育鱗甲之所集往于是乎長鯨吞航修鯢吐浪躍龍騰蛇鮫鯔琵琶王鮪鯸鮐鮣龜鱕䱜鳥賊擁劍䵶鼊鯖鰐涵泳乎其中葺鱗鏤甲詭類舛錯泝洄順流噞喁沉浮鳥則鵾雞鸀鳿鸘鵠鷺鴻鶢鶋避風候雁造江鸂鶒鷛𪆂鶄鶴鶖鶬鸛鷗鷁鸕氾濫乎其上湛淡羽儀隨波參差理翮整翰容與自翫彫啄蔓藻刷盪漪瀾魚鳥聱耴萬物蠢生芒芒黖黖慌罔奄欻神化翕忽函幽育明窮性極形盈虛自然蚌蛤珠胎與月虧全巨鼇贔㞒首冠靈山大鵬繽翻翼若垂天振盪汪流雷抃重淵殷動宇宙胡可勝原島嶼緜邈洲渚馮隆曠瞻迢遞迴眺冥蒙珍怪麗奇隙充徑路絕風雲通洪桃屈盤丹桂灌叢瓊枝抗莖而敷蕊珊瑚幽茂而玲瓏增岡重阻列真之宇玉堂對霤石室相距藹藹翠幄嫋嫋素女江婓于是往來海童于是宴語斯實神妙之響象嗟難得而覼縷爾乃地勢坱圠卉木镺蔓遭藪為圃值林為苑異荂蓲蘛夏曄冬蒨方志所辨中州所羨草則藿蒳豆蔻薑彙非一江蘺之屬海苔之類綸組紫絳食葛香茅石帆水松東風扶留布濩皋澤蟬聯陵丘夤緣山嶽之岊冪歷江海之流扤白蔕銜朱蕤鬱兮䓲茂曄兮菲菲光色炫晃芬馥肸蠁職貢納其包匭離騷詠其宿莽木則楓柙樟栟櫚枸桹緜杬杶櫨文欀楨橿平仲桾櫏松梓古度枏榴之木相思之樹宗生高岡族茂幽阜擢本千尋垂蔭萬畝攢柯挐莖重葩殗葉輪囷虯蟠𡍪㙷鱗接榮色雜糅綢繆縟繡宵露霮䨴旭日晻㫲與風颻颺䬀瀏颼飀鳴條律畼飛音響亮蓋象琴筑并奏笙竽俱唱其上則猨父哀吟𤟤子長嘯狖鼯猓然騰趠飛超爭接縣垂競游遠枝驚透沸亂牢落翬散其下則有梟羊麡狼猰㺄貙象鳥菟之族犀兕之黨鉤爪鋸牙自成鋒穎精若燿星聲若震霆名載于山經形鏤于夏鼎其竹則篔簹箖箊桂箭射筒柚梧有篁篻簩有叢苞荀抽節往往縈結綠葉翠莖冒霜停雪橚矗森萃蓊茸蕭瑟檀欒蟬蜎玉潤碧鮮梢雲無以踰嶰谷弗能連鸑鷟食其實鵷雛擾其閒其果則丹橘餘甘荔枝之林檳榔無柯椰葉無陰龍眼橄欖棎榴禦霜結根比景之陰列挺衡山之陽素華斐丹秀芳臨青壁系紫房鷓鴣南翥而中留孔雀綷羽以翱翔山雞歸飛而來棲翡翠列巢以重行其琛賂則琨瑤之阜銅鍇之垠火齊之寶駭雞之珍頳丹明璣金華銀樸紫貝流黃縹碧素玉隱賑崴㠢雜插幽屏精曜潛穎硩陊山谷碕岸為之不枯林木為之潤黷隋侯于是鄙其夜光宋王于是陋其結綠其荒陬譎詭則有龍穴內蒸雲雨所儲陵鯉若獸浮石若桴雙則比目片則王餘窮陸飲木極沈水居泉室潛織而卷綃淵客慷慨而泣珠開北戶以向日齊南冥于幽都其四野則畛畷無數膏腴兼倍原隰殊品窊隆異等象耕鳥耘此之自與穱秀菰穗于是乎在煮海為鹽採山鑄錢國稅再熟之稻鄉貢八蠶之緜徒觀其郊隧之內奧都邑之綱紀霸王之所根柢開國之所基趾郛郭周帀重城結隅通門二八水道陸衢所以經始用累千祀憲紫宮以營室廓廣庭之漫漫寒暑隔閡于邃宇虹蜺回帶于雲館所以跨跱炳萬里也造姑蘇之高臺臨四遠而特建帶朝夕之濬池佩長洲之茂苑窺東山之府則瓌寶溢目𧢮海陵之倉則紅粟流衍起寢廟于武昌作離宮于建業闡闔閭之所營采夫差之遺法抗神龍之華殿施榮楯而捷獵崇臨海之崔巍飾赤鳥之韡曄東西膠葛南北崢嶸房櫳對櫎連閣相經閽闥譎詭異出奇名左稱彎碕右號臨硎彫欒鏤楶青瑣丹楹圖以雲氣畫以仙靈雖茲宅之夸麗曾未足以少寍思比屋于傾宮畢結瑤而搆瓊高闈有閌洞門方軌朱闕雙立馳道如砥樹以青槐亙以綠水玄蔭耽耽清流亹亹列寺七里俠棟陽路屯營櫛比廨署棊布橫塘查下邑屋隆夸長干延屬飛甍舛互其居則高門鼎貴魁岸豪傑虞魏之昆顧陸之裔岐嶷繼體老成奕世躍馬疊跡朱輪累轍陳兵而歸蘭錡內設冠蓋雲蔭閭閻闐曀其鄰則有任俠之靡輕訬之客締交翩翩儐從奕奕出躡珠履動以千百里讌巷飲飛觴舉白翹關扛鼎拚射壺博鄱陽暴謔中酒而作于是樂只衎而歡飫無匱都輦殷而四奧來暨水浮陸行方舟結駟唱櫂轉轂昧旦永日開市朝而竝納橫闤闠而流溢混品物而同塵并都鄙而為一士女佇眙商賈駢坒紵衣絺服雜沓傱萃輕輿案轡以經隧樓船舉颿而過肆果布福湊而常然致遠流離與珂䌖賄紛紜器用萬端金鎰磊砢珠琲闌干桃笙象簟韜于筒中蕉葛升越弱于羅紈㒊譶澩㺒交貿相競諠譁喤呷芬葩蔭映揮袖風飄而紅塵晝昏流汗霢霂而中逵泥濘富中之甿貨殖之選乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌趫材悍壯此焉比廬捷若慶忌勇若專諸危冠而出竦劍而趨扈帶鮫函扶揄屬鏤藏鍦于人去瞂自閭家有鶴膝戶有犀渠軍容蓄用器械兼儲吳鉤越棘純鈞湛盧戎車盈于石城戈船掩乎江湖露往霜來日月其除草木節解鳥獸腯膚觀鷹隼誡征夫坐組甲建祀姑命官帥而擁鐸將校獵乎具區鳥滸狼㬻夫南西屠儋耳黑齒之酋金鄰象郡之渠驫駥飍矞靸霅警捷先驅前塗俞騎騁路指南司方出車檻檻被練鏘鏘吳王乃巾玉輅軺驌驦旂魚須常重光攝烏號佩干將羽旄揚蕤雄戟耀芒貝冑象弭織文鳥章六軍袀服四騏龍驤峭格周施罿罻普張罼罕瑣結罠蹏連綱阹以九疑禦以沅湘輶軒蓼擾彀騎煒煌袒裼徒摶拔距投石之部猿臂骿脅狂趭獷猤鷹瞵鴞視䟃𧽼翋𦑶若離若合者相與騰躍乎莽䍚之野千鹵殳鋋暘夷勃盧之旅長𥍟短兵直髮馳騁儇佻坌竝銜枚無聲悠悠旆旌者相與聊浪乎昧莫之坰鉦鼓疊山火烈熛林飛爓浮煙載霞載陰菈擸雷硠崩巒弛岑鳥不擇木獸不擇音虣甝虪䋶麋麖驀六駮追飛生彈鸞鶁射猱㹶白雉落黑鴆零陵絕嶚嶕聿越巉險跇踰竹柏㺦猭杞柟封狶䓼神螭掩剛鏃潤霜刃染于是弭節頓轡齊鑣駐蹕徘徊徜佯寓目幽蔚覽將帥之拳勇與士卒之抑揚羽族以觜距為刀鈹毛群以齒角為矛鋏皆體著而應卒所以挂扢而為創痏衝踤而斷筋骨莫不衂銳挫芒拉捭摧藏雖有石林之岝崿請攘臂而靡之雖有雄虺之九首將抗足而跐之顛覆巢居剖破窟宅仰攀鵕鸃俯蹴豺獏刦剞熊羆之室剽掠虎豹之落猩猩啼而就禽狒狒笑而被格屠巴蛇出象骼斬鵬翼掩廣澤輕禽狡獸周章夷猶狼跋乎紘中忘其所以睒睗失其所以去就魂褫氣懾而自踢䟮者應弦飲羽形憤景僵者累積而增益雜襲錯繆傾藪薄倒岬岫巖𤕠無豜豵翳薈無𪋐鷚思假道于豐隆披重霄而高狩籠鳥兔于日月窮飛走之栖宿嶰澗闃岡岵童罾罘滿效獲眾迴靶乎行睨觀魚乎三江汎舟航于彭蠡渾萬艘而既同弘舸連舳巨檻接艫飛雲蓋海制非常模疊華樓而島跱時髮髴于方比鷁首而有裕邁餘皇于往初張組幃構流蘇開軒幌鏡水區篙工楫師選白閩禺習御長風狎翫靈胥責千里于寸陰聊先期而須臾櫂謳唱簫籟鳴洪流響渚禽驚弋磻放稽鷦䳟虞機發留鵁鶄鉤鉺縱橫網罟接緒術兼詹公巧傾任父筌魱䲛鱺鱨魦罩兩魪罺鰝鰕乘鱟黿鼉同罛共羅沈虎潛鹿馽龓僒束鰴鯨輩中于群犗攙搶暴出而相屬雖復臨河而約鯉無異射鮒于井谷結輕舟而競逐迎潮水而振緡想萍實之復形訪靈夔于鮫人精衛銜石而遇繳文鰩夜飛而觸綸北出亡其翔翼西海失其遊鱗雕題之士鏤身之卒比飾虬龍蛟螭與對簡其華質則亄費錦繢料其虓勇則鵰悍狼戾相與早潛險搜瓌奇摸蝳蝐捫觜蠵剖巨蚌于回淵濯明月于漣漪畢天下之至異訖無索而不臻谿壑為之一罄川瀆為之中貧哂澹臺之見謀聊襲海而徇珍載漢女于後舟追晉賈而同塵汨乘流以砰宕翼颸風之䬟䬟直衝濤而上瀨常沛沛以悠悠汔可休而凱歸揖天吳與陽侯指包山而為期集洞庭而掩留數軍實乎桂林之苑饗戎旅乎落星之樓置酒若淮泗積肴若山丘飛輕軒而酌綠酃方雙轡而賦珍羞飲烽起釂鼓震士遺倦眾懷欣幸乎館娃之宮張女樂而娛群臣羅金石與絲竹若鈞天之下陳發東歌操南音胤陽阿詠𩎟任荊豔楚舞吳愉越吟翕習容裔靡靡愔愔若此者與夫唱和之隆響動鍾鼓之鏗耾有殷坻頹干前曲度難勝皆與謠俗汁協律呂相應其奏樂也則木石潤色其吐哀也則淒風暴興或超延露而駕辯或踰綠水而采菱軍馬弭髦而仰秣淵魚竦鱗而上升酣湑半八音并歡情留良辰征魯陽揮戈而高麾迴曜靈于太清將轉西日而再中齊既往之精誠昔者夏后氏朝群臣于茲土而執玉帛者以萬國蓋亦先王之所高會而四方之所軌則春秋之際要盟之主闔閭信其威夫差窮其武內果五員之謀外騁孫子之奇勝強楚于柏舉棲勁越于會稽闕溝乎商魯爭長于黃池徒以江湖嶮陂物產殷充繞霤未足言其固鄭白未足語其豐士有陷堅之銳俗有節概之風睚眥則挺劍喑鳴則彎弓擁之者龍騰據之者虎視麾城若振槁搴旗若顧指雖帶甲一朝而元功遠致雖累葉百疊而富強相繼樂湑衎其方域列仙集其地桂父練形而易色赤須蟬蛻而附麗中夏比焉畢世而罕見丹青圖其珍瑋貴其寶利也舜禹游焉沒齒而忘歸精靈留其山阿翫其奇麗也剖判庶士商搉萬俗國有鬱鞅而顯敞邦有湫阨而踡跼伊茲都之函弘傾神州而韞櫝仰南斗以斟酌兼二儀之優渥繇此而揆之西蜀之于東吳小大之相絕也亦猶棘林螢耀而與夫樳木龍燭也否泰之相背也亦猶帝之懸解而與桎梏疏屬也庸可共世而論巨細同年而議豐确乎暨其幽遐獨邃寥廓閑奧耳目之所不該足趾之所不蹈倜儻之極異誳詭之殊事藏理于終古丌未寤于前覺也若吾子之所傳孟浪之遺言略舉其梗概而未得其要妙也文選魏都賦魏國先生有睟其容乃盱衡而誥曰异乎交益之士蓋音有楚夏者土風之乖也情有險易者習俗之殊也雖則生常固非自得之謂也昔市南宜僚弄丸而兩家之難解聊為吾子復翫德音以釋二客競于辯囿者也夫泰極剖判造化權輿體兼晝夜理包清濁流而為江海結而為山獄列宿分其野荒裔帶其隅巖岡潭淵限蠻隔夷峻危之竅也蠻陬夷落譯道而通鳥獸之氓也正位居體者以中夏為喉不以邊垂為襟也長世字甿者以道德為藩不以襲險為屏也而子大夫之賢者尚弗曾庶翼等威附麗皇極思稟正朔樂率貢職而徒務于詭隨匪人宴安于絕域榮其文身驕其險棘繆默語之常倫牽膠言而踰侈飾華離以矜然假倔強而攘臂非醇粹之方壯謀踳駮于王義孰愈尋靡萍于中逵造沐猴于棘刺劍閣雖嶚憑之者蹶非所以深根固蔕也洞庭雖濬負之者北非所以愛人治國也彼桑榆之末光踰長庚之初輝況河冀之爽塏與江介之楸湄故將語子以神州之略赤縣之畿魏都之卓犖六合之樞機于時運距陽九漢綱絕維姦回內贔兵纏紫微翼翼京室耽耽帝宇巢焚原燎變為煨燼故荊棘旅庭也殷殷寰內繩繩八區鋒鏑縱橫化為戰場故麋鹿寓城也伊洛榛曠崤函荒蕪臨菑牢落鄢郢丘墟而是有魏開國之日締構之初萬邑比焉亦獨犨麋之與子都培塿之與方壼也且魏地者畢昴之所應虞夏之餘人先王之桑梓列聖久遺塵攷之四隈則八珽埏之中測之寒暑則霜露所均卜偃前識而賞其隆吳札聽歌而美其風雖則衰世而盛德形于管絃雖踰千祀而懷舊蘊于遐年爾其疆域則旁極齊秦結湊冀道開胸殷衛跨躡燕趙山林幽岟川澤迴繚恆碣碪于青霄河汾浩涆而皓溔南瞻淇澳則綠竹純茂北臨漳滏則冬夏異沼神鉦迢遞于高巒靈響時驚千四表溫泉毖涌而自浪華清蕩邪而難老墨井鹽池玄滋素液厥田惟中厥壤惟白原限畇畇墳衍厈厈或嵬罍而複陸或爌朗而拓落乾坤交泰而絪縕嘉祥徽顯而豫作是以兆眹振古萌柢疇昔藏氣讖緯閟象竹帛迴時世而淵默應期運而光赫暨聖武之龍飛肇受命而光宅爰初自臻言占其良謀龜謀筮亦既允臧修其郛郭繕其城隍經始之制牢籠百王畫雍豫之居寫八都之宇鑒茅茨于陶唐察卑宮于夏禹古公草創而高門有閌宣王中興而築室百堵兼聖哲之軌并文質之狀商豐約而折中準掌年而為量思重爻摹大壯覽荀卿采蕭相𠊩拱木于林衡授全模于梓匠遐邇悅豫而子來工徒擬議而騁巧闡鉤繩之筌緒承二分之正要揆日晷攷星耀建社稷作清廟築曾宮以迴帀比岡隒而無陂造文昌之廣殿極棟宇之弘規㠚若崇山崛起以崔嵬髧若玄雲舒蜺以高垂瓌材巨世𡍪㙷參差枌橑複結欒櫨疊施丹梁虹申以竝亙朱桷森布而支離綺井列疏以懸蔕華蓮重葩而倒披齊龍首而涌霤時梗概于滮池旅楹閑列暉鑒柍振榱題黮𪒡階𨺠嶙峋長庭砥平鍾虡夾陳風無纖埃雨無微津巖巖北闕南端逌遵竦峭雙碣方駕比輪西闢延秋東啟長春用覲群后觀亨頤賓左則中朝有赩聽政作寢匪樸匪斲去泰去甚木無彫鎪土無綈錦玄化所甄國風所稟于前則宣明顯陽順德崇禮重闈洞出鏘鏘濟濟珍樹猗猗奇卉萋萋蕙風如薰甘露如醴禁臺省中連闥對廊直事所繇典刑所藏藹藹列侍金蜩齊光詰朝陪幄納言有章亞以柱後執法內侍符節謁者典璽儲史膳夫有官藥劑有司肴醳順時腠理則治于後則椒鶴文石永巷壺術楸梓木蘭次舍甲乙西南其戶成之匪日丹青煥炳特有溫室儀形宇宙厤象賢聖圖以百瑞綷以藻詠芒芒終古此焉則鏡有虞作繪茲亦等競右則疏圃曲池綷以藻詠芒芒終古此焉則鏡有虞作繪茲亦等競右則疏圃曲池下畹高堂蘭渚莓莓石瀨湯湯弱葼係實輕葉振芳奔龜躍魚有𥉻呂梁馳道周屈于果下延閣胤宇以經營飛陛方輦而徑西三臺列峙以崢嶸亢陽臺于陰基擬華山之削成上累棟而重霤下冰室而沍冥周軒中天丹墀臨猋增構峨峨清塵彯彯雲雀踶甍而矯首壯翼摛鏤于青霄雷雨窈冥而未半皦日籠光于綺寮習步頓以升降御春服而逍遙八極可圍于寸眸萬物可齊于一朝長塗牟首豪徼互經晷漏肅唱明宵有程附以蘭錡宿以禁兵司衛閑邪鉤陳罔驚于是崇墉濬洫嬰堞帶涘四門轍轍隆廈重起憑太清以混成越埃壒而資始藐藐標危亭亭峻趾臨集原而不怳誰勁捷而无葸與岡岑而永固非有期乎世祀陽靈停曜于其表陰祗濛霧于其裏苑以玄武陪以幽林繚垣開囿觀宇相臨碩果灌叢圍木竦尋篁篠懷風蒲陶結陰回淵漼積水深蒹葭贙雚蒻森丹藕凌波而的皪綠芰泛濤而浸潭羽翮頡頏鱗介浮沈栖者擇木雊者擇音若咆渤澥與姑餘常鳴鶴而在陰表清籞勒虞箴思國卹忘從禽樵蘇往而無忌即鹿縱而匪禁腜腜坰野奕奕菑畝甘荼伊蠢芒種斯阜西門溉其前史起灌其後墱流十二同源異口畜為屯雲泄為行雨水澍稉稌陸蒔稷黍黝黝桑柘油油麻紵均田畫疇蕃廬錯列薑芋充茂桃李蔭翳家安其所而服美自悅邑屋相望而隔踰奕世內則街衝輻輳朱闕結隅石杠飛梁出控漳渠疏通溝以濱路羅青槐以蔭塗比滄浪而可濯方步櫩而有踰習習冠蓋莘莘蒸徒斑白不提行旅讓衢設官分職營處署居夾之以府寺班之以里閭其府寺則位副三事官踰六御奉常之號大理之名廈屋一揆華屏齊榮肅肅階䦳重門再扃師尹爰止毗代作楨其閭閻則長壽吉陽永平思忠亦有戚里窴宮之東閈出長者巷苞諸公都護之堂殿居綺窗輿騎朝猥蹀㩻其中營客館以周坊飭賓侶之所集瑋豐樓之閈閎起建安而首立葺牆冪室房廡雜襲剖劂罔掇匠斲積習廣成之傳無以疇稿街之邸不能及廓三市而開廛籍平逵而九達班列肆以兼羅設闤闠以襟帶濟有無之常偏距日中而畢會抗旗亭之嶢嶭侈所覜之博大百隧轂擊連軫萬貫憑軾捶馬袖幕紛半壹八方而混同極風采之異觀質劑平而交易刀布貿而無筭財以工化賄以商通難得之貨此則弗容器周用而長務物背窳而就攻不鬻邪而豫賈著馴風之醇醲白藏之藏富有無隄同賑大內控引世資賨幏積墆琛幣充牣關石之所和鈞財富之所底慎燕弧盈庫而委勁冀馬填廄而駔駿至乎勍敵糾紛庶土罔寍聖武興言將曜威靈介冑重襲旍旗躍莖弓珧解檠矛鋋飄英三屬之甲縵胡之纓控紘𥳑發妙擬更嬴齊被練而銛戈襲偏裻以䜋列畢出征而中律執奇正以四伐碩畫精通目無匪制推鋒積紀鋩氣彌銳三接三捷既晝亦月剋翦方命吞滅咆烋雲撤叛換席卷虔劉祲威八紘荒阻率由洗兵海島刷馬江洲振旅䡘䡘反旆悠悠凱歸同飲疏爵普疇朝無刓印國無貴留喪亂既弭而能宴武人歸畜而去戰蕭斧戢柯以柙刃虹旌攝麾以就卷斟洪範酌典憲觀所恆通其變上垂拱而司契下緣督而自勸道來斯貴利往則賤囹圄寂寥京庾流衍于是東鯷即序西傾順軌荊南懷憓朔北思韙緜緜迥塗驟山驟水繈負賮贄重譯貢篚髽首之豪鐻耳之傑服其荒服斂衽魏闕置酒文昌迥張宿設其夜未遽庭燎晰晰有客祁祁載華載裔岌岌冠縰纍纍辮髮清酤如濟濁醪如何凍醴流澌溫酎躍波豐肴衍衍行庖皤皤愔愔醧讌酣湑無譁延廣樂奏九成冠韶夏冒六莖傮響起疑震霆天宇駭地廬驚億若大帝之所興作二嬴之所曾聆金石絲竹之恆韻匏土革木之常調干戚羽旄之飾好清謳微吟之要妙世業之所日用耳目之所聞覺雜糅紛錯兼該泛博鞮鞻所掌之音𩎟昧任禁之曲以娛四夷之君以陸八荒之俗既苖既狩爰遊爰豫藉田以禮動大閱以義舉備法駕理秋御顯文武之壯觀邁梁騶之所著林不槎枿澤不伐夭斧斨以時罾𦉾以道德連木理仁挺芝草皓獸為之育藪丹魚為之生沼矞雲翔龍澤馬于阜山圖其石川形其寶莫黑匪烏三趾而來儀莫赤匪狐九尾而自擾嘉穎離合以䔿䔿醴泉涌流而浩浩顯禎祥以曲成固觸物而兼造蓋亦明靈之所酬酢休徵之所偉兆旼旼率土遷善罔匱休浴福應宅心醰粹餘糧栖畝而弗收頌聲載路而洋溢河洛開奧符命用出翩翩黃鳥銜書來訊人謀所尊鬼謀所秩劉宗委馭巽其神器闚玉策于金縢案圖籙于石室攷厤數之所在察五德之所莅量寸旬涓吉日陟中壇即帝位改正朔易服色繼絕世修廢職徽幟以變器械以革顯仁翌明藏用玄默菲言厚行陶化染學讎校篆籀篇章畢覿優賢著于揚歷匪孼形于親戚本枝別幹蕃屏皇家勇若任城才若東阿抗旍則威噞秋霜摛華則華縱春葩英哲雄豪佐命帝室相兼二八將猛四七赫赫震震開務有謐故令斯民覩泰階之平可比屋而為一算祀有紀天祿有終傳業禪祚高謝萬邦皇恩綽矣帝德沖矣讓其天下臣至公矣榮操行之獨得超百王之庸庸追互卷領與結繩睠留重華而比蹤尊盧赫胥羲農有塵雖自以為道洪化以為隆世篤玄同奚遽不能與之踵武而齊其風是故料其建國析其法度諮其考室議其舉厝復之而無斁申之而有裕非疏糲之士所能精非鄙俚之言所能具至于山川之倬詭物產之魁殊或名奇而見稱或實異而可書生生之所厚洵美之所不渝其中則有鴛鴦交谷虎澗龍山掘鯉之淀蓋節之淵翅翅精衛銜木償怨常山平干鉅鹿河閒列真非一往往出焉昌容練色犢配眉連玄俗無影木羽偶仙琴高沈水而不濡時乘赤鯉而周旋師門使火以驗術故將去而林燔易陽壯容衛之稚質邯鄲噁步趙之鳴瑟真定之梨故安之栗醇酎中山流湎千日淇洹之筍信都之棗雍丘之梁清流之稻錦繡襄邑羅綺朝歌緜纊房子縑總清河若此之屬繁富夥夠非可單究是以抑而未罄也蓋比物以錯辭述清都之閑麗雖選言以𥳑章徒九復而遺旨覽大易與春秋判殊隱而一致未上林之隤牆本前脩以作糸其軍容弗犯信其果毅糾華綏戎以戴公室元勳配管敬之績歌鍾析邦君之肆則魏絳之賢有令聞也閒居隘巷室邇心遐富仁寵義職競弗羅千乘為之軾廬諸侯為之止戈則干木之德自解紛也貴非吾尊重士踰山親御監門嗛嗛同軒搦秦起趙威振八蕃則信陵之名若蘭芬也英辯榮枯能濟其厄位加將相窒隙之策四海齊鋒一口所敵張儀張祿亦足云也摧惟庸蜀與鴝鵲同窠句吳與䵷黽同穴一自以為食鳥一自以為魚鱉山阜猥積而踦𨄅泉流迸集而咽隰壤瀸漏而沮洳林藪石留而蕪穢窮岫泄雲日月恆翳宅土熇暑封疆瘴癘蔡莽螫刺昆蟲毒噬漢罪流禦秦餘徙㡂肖貌蕞陋稟質遳脆巷無杼首里罕耆耋或魋髻而左言或鏤膚而鑽髮或明發而嬥歌或浮泳而卒歲風俗以韰惈為嫿人物以戕害為藝威儀所不攝憲章所不綴由重山之束阨因長川之裾勢距遠關以闚𨵦時高樔而陛制薄戍緜冪無異蛛蝥之網弱卒瑣甲無異螳蜋之衛與先世而常然雖信險而剿絕揆既往之前迹即將來之後轍成都迄已傾覆建業則亦顛沛顧非累卵于疊綦焉至觀形而懷怚權假日以餘榮比朝華而菴藹覽麥秀與黍離可作謠于吳會先生之言未卒吳蜀二客䂄焉相顧𥉈焉失所有靦瞢容神蕊形茹弛氣離坐㥏墨而謝曰僕黨清狂怵迫閩濮習蓼蟲之忘辛翫進退之惟谷非常寐而無覺不覩皇輿之軌躅過以𠆩剽之單慧歷執古之醇聽兼重悂以貤繆偭辰光而罔定先生玄識深頌靡測得聞上德之至盛匪同憂于有聖抑若春霆發響而驚蟄飛競潛龍浮景而幽泉高鏡雖星有風雨之好人有異同之性庶覿蔀家與剝廬非蘇世而居正且夫寒谷豐黍吹律暖之也昏情爽曙箴規顯之也雖明珠兼寸尺壁有盈曜車二六三傾五城未若申錫典章之為遠也亮曰日不雙麗世不兩帝天經地緯理有大歸安得齊給守其小辯也哉文選白髮賦星星白髮生于鬢垂雖非青蠅穢我光儀策名觀國以此見疵將拔將鑷好爵是縻白髮將拔惄然自訴稟命不幸值君年暮逼迫秋霜生而皓素始覽明鏡惕然見惡朝生晝拔何罪之故子觀橘柚一暠一曄貴其素華匪尚綠葉願戢子之手攝子之鑷咨爾白髮觀世之途靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠來仕童髫獻謨甘羅乘軫子奇剖符英英終賈高論雲衢拔白就黑此自在吾白髮臨欲拔瞑目號呼何我之冤何子之誤甘羅自以辯惠見稱不以髮黑而名著賈生自以良才見異不以烏鬢而後舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢德光明何必去我然後要榮咨爾白髮事故有以爾之所言非不有理曩貴耆耋今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之變見歎孔子髮乃辭盡誓以固窮昔臨玉顏今從飛蓬髮膚至昵尚不克終聊用擬辭比之國風蓺文類聚十七御覽三百七十三七略闓甲第之廣袤建雲陛之嵯峨文選齊安陸王碑文注七諷文心雕龍指瑕篇左思七諷說孝而不從反道若斯餘不足觀矣
