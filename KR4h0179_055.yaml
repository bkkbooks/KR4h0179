body:
  text: 袁準二禮政袁子正書治國之大體有四一曰仁義二曰禮制三曰法令四曰刑罰四本者具則帝王之功立矣所謂仁者愛人者也愛人父母之行也為民父母故能興天下之利也所謂義者能辨物理者也物得理故能除天下之害也興利除害者則賢人之業也禮者何也緣人情而為之節文者也嚴父愛親之情也尊親敬長之義也夫仁義禮制者治之本也法令刑罰者治之末也無本者不立無末者不成何則夫禮教之治先之以仁義示之以敬讓使民遷善日用而不知也儒者見其如此因謂治國不須刑法不知刑法承其下而後仁義興于上也法令者賞善禁淫居治之要會商韓見其如此因曰治國不待仁義不知仁義為之體故法令行于下也是故導之以德齊之以禮則民有恥導之以政齊之以刑則民苟免是治之貴賤者也先仁而後法先教而後刑是治之先後者也夫遠物難明而近理易知故禮讓緩而刑罰急是治之緩急也夫仁者使人有德不能使人知禁禮者使人知禁不能使人必仁故本之者仁明之者禮也必行之者刑罰也先王為禮以達人之性理刑以承禮之所不足故以仁義為不足以治者不知人性者也是故失教失教者無本也以刑法為不可用者是不知情偽者也是故失威失威者不禁也故有刑法而無仁義久則民怨民怨則怒也有仁義而無刑法則民慢民慢則姦起也故曰本之以仁成之以法使兩通而無偏重則治之至也夫仁義雖弱而持久刑殺雖強而速亡自然之治也經國先王之制立爵五等所以立蕃屏利後嗣者也是故國治而萬世安春秋鄭莊公封母弟于京祭仲曰都城過制國之害也其後卒相攻伐國內大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也于是去五等之爵而置郡縣雖有親子母弟皆為匹夫及其政衰一夫大呼而天下去及至漢家見亡秦之以孤特亡也于是大封子弟或連城數十廓地千里自關已東皆為王國力多而權重故亦有七國之難魏興以新承大亂之後民人損減不可則以古治于是封建侯王皆使寄地空名而無其實王國使有老兵百餘人以衛其國雖有王侯之號而力儕于匹夫縣隔千里之外無朝聘之儀鄰國無會同之制諸侯遊獵不得過三十里又為設防輔監國之官以司察之王侯皆思為布衣而不能得既違宗國蕃屏之義又虧親戚骨肉之恩昔武王既克殷下車而封子弟同姓之國五十餘然亦卜世三十卜年七百至乎王赧之後海內無主三十餘年故諸侯之治則輔車相持翼戴天子以禮樂征伐雖有亂君暴主若吳楚之君者不過恣雎其國惡能為天下害乎周以千乘之賦封諸侯今也曾無一成之田何周室之奢泰而今日之儉少也豈古今之道不同而今日之勢然哉未之思耳夫物莫不有弊聖人者豈能無衰能審終始之道取其長者而已今雖不能盡建五等猶宜封諸親戚使少有土地制朝聘會同之義以合親戚之恩講禮以明其職業黜陟以討其不然如是則國有常守兵有常強保世延祚長久而有家矣設官古者三公論王職六卿典事業事大者官大事小者官小今三公之官或無事或職小又有貴重之官無治事之實此官虛設者也秦漢置丞相九卿之官以治萬機其後天子不能與公卿造事外之而置尚書又外之而置中書轉相重纍稍執機事制百官之本公卿之職遂輕則失體矣又有兵士封侯者古之尊貴者以職大故貴今列侯無事未有無職而空貴者也世衰禮廢五等散亡故有賜爵封侯之賞既公且侯失其制今有卿相之才居三公之位修其治政以安寧國家未必封侯也而今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寧天下者乎安寧天下者不爵斬一將之功者封侯失封賞之意矣夫離古意制外內不一小大錯貿轉相重纍是以人執異端窺欲無極此治道之所患也先王置官各有分職使各以其屬達之于王自已職事則是非精練而官奏則下情不塞先王之道也政略夫有不急之官則有不急之祿國之蛑賊也明主設官使人當于事人當于事則吏少而民多民多則歸農者衆吏多則所奉者寡使吏祿厚則養足則無求于民姦軌息矣祿足以代耕則一心于職一心于職則政理政理則民不擾民不擾則不亂其農矣養生有制送終有度嫁娶宴享皆有分節衣服食味皆有品帙明設其禮而嚴其禁如是則國無違法之民財無無用之費矣此富民之大略也非先王之法行不得行非先王之法言不得道名不可以虛求貴不可以偽得有天下坦然知所去就矣本行而不本名責義而不責功行莫大于孝敬義莫大于忠信則天下之人知所以措身矣此教之大略也夫禮設則民貴行分明則事不錯民貴行則所治寡事不錯則下靜一此富民致治之道也禮重而刑輕則士勸愛施而罰必則民服士勸則忠信之人至民服則犯法者寡德全則教誠教誠則感神行深則著厚著厚則流遠尚義則同利者相覆尚法則貴公者相刻相刻則無親相覆則無疏措禮則政平政平則民誠設術則政險政險則民偽此禮義法術之情也論兵夫為政失道可思而更也兵者存亡之機一死不可復生也故曰天下難事在于兵今有人于此力舉重鼎氣蓋三軍一怒而三軍之士皆震世俗見若人者謂之能用兵矣然以吾觀之此亡國之兵也夫有氣者志先其謀無策而徑往怒心一奮天下若無人焉不量其力而輕天下之物偏遇可以幸勝有數者禦之則必死矣凡用兵正體不備不可以全勝故善用兵者我謂之死則民盡死我謂之生則民盡生我使之勇則民盡勇我使之怯則民盡怯能死而不能生能勇而不能怯此兵之半非全勝者也夫用戰有四有大體者難與持久有威刑者難與爭險善柔者待之以重善任勢者禦之以堅用兵能使民堅重者則可與之赴湯火可與之避患難進不可詭退不可追所在而民安盡地而守固疑間不能入權譎不能設也堅重者備物者也備物者無偏形無偏形故其變無不之也故禮與法首尾也文與武本末也故禮正而後法明文用而後武法故用兵不知先為政則亡國之兵也用人有四一曰以功業期之二曰與天下同利三曰樂人之勝己四曰因才而處任以功業期之則人盡其能與天下同利則民樂其業樂人勝己則下無隱情因才擇任則衆備舉人各有能有不能也是以智者不以一能求衆善不以一過掩衆美不遺小類不棄小力故能有為也夫治天下者其所以行之在一一者何也曰公而已矣故公者所以攻天下之邪屏讒慝之萌兵者傾危之物死生之機一物不至則衆亂興矣故以仁聚天下之心以公塞天下之隙心公而隙塞則民專而可用矣公心明故賢才至一公則萬事通一私則萬事閉兵者死生之機也是故貴公王子主失有王子者著主失之書子張甚善之為袁子稱之曰夫人之所以貴于大人者非為其官爵也以其言忠信行篤敬人主授之不虛人臣受之不妄也若居其位不論其能賞其身不議其功則私門之路通而公正之道塞矣凡世之所患非患人主之有過失也患有過欲改而不能得也是何也夫姦臣之事君固欲苟悅其心夫物未嘗無似象似象之言浸潤之諛非明者不能察也姦臣因以似象之言而為之容説人主不能別也是而悅之惑亂其心舉動日繆而常自以為得道此有國之常患也夫佞邪之言柔順而有文忠正之言簡直而多逆使忠臣之言是也人主固弗快之矣今姦臣之言已掩于人主不自以為非忠臣以逆忤之言説之人主方以為誣妄何其言之見聽哉是以大者刳腹小者見奴忠臣涉危死而言不見聽姦臣饗榮利而言見悅則天下奚蹈夫危死而不用去夫榮利而見聽哉故有被髮而為狂有竄伏于窟穴此古今之常也凡姦臣者好為難成之事以徼幸成功之利而能先得人主之心上之人不能審察而悅其巧言則見其賞而不見其罰矣為人臣有禮未必尊無禮未必卑則姦臣知所以事主矣雖有今日之失必知明日所以復之塗也故人主賞罰一不當則邪人為巧滋生其為姦滋甚知者雖見其非而不敢言為將不用也夫先王之道遠而難明當世之法近而易知凡人莫不違其疏而從其親見其小而暗其大今賢者固遠主矣而執遠而難明之物姦人固近主矣而執近而易知之理則忠正之言奚時而得達哉故主蔽于上姦成於下國亡而家破伍子胥為吳破楚令闔閭霸及夫差立鴟夷而浮之江樂毅為燕王破強齊報大恥及惠王立而驅逐之夫二子之于國家可謂有功矣夫差惠王足以知之矣然猶不免于危死者人主不能常明而忠邪之道異故也又況于草茅孤遠之臣而無二子之功涉姦臣之門經傾險之塗欲其身達不亦難哉今人雖有子産之賢而無子皮之舉有解狐之德而無祁奚之直亦何由得達而進用哉故有祁奚之直而無宣子之聽有子皮之賢而無當國之權則雖荊山之璞猶且見瓦耳故有管仲之賢有鮑叔之友必遇桓公而後達有陳平之智有無知之友必遇高祖而後聽桓公高祖不可遇雖有三子之才夫奚得用哉厚德恃門戶之閉以禁盜者不如明其刑也明其刑不如厚其德也故有教禁有刑禁有物禁聖人者兼而用之故民知恥而無過行也不能止民惡心而欲以刀鋸禁其外雖日刑人于市不能制也明者知制之在于本故退而修德為男女之禮妃匹之合則不淫矣為廉恥之教知足之分則不盜矣以賢制爵有民德厚矣故聖人貴恆恆者德之固也聖人久于其道而天下化成未有不恆而可以成德無德而可以持久者也用賢治國有四一曰尚德二曰考能三曰賞功四曰罰罪四者明則國治矣夫論士不以其德而以其舊考能不以其才而以其久而求下之貴上不可得也賞可以勢求罰可以力避而求下之無姦不可得也為官長非苟相君也治天下也用賢非以役之尚德也行之以公故天下歸之故明王之使人有五一曰以大體期之二曰要其成功三曰忠信不疑四曰至公無私五曰與天下同憂以大體期之則臣自重要其成功則臣勤懼忠信不疑則臣盡節至公無私則臣盡情與天下同憂則臣盡死夫唯信而後可以使人昔者齊威王使章子將而伐魏人言其反者三威王不應也自是之後為齊將者無有自疑之心是以兵強于終始也唯君子為能信一不信則終身之行廢矣故君子重之漢高祖山東之匹夫也無有咫尺之土十室之聚能任天下之智力舉大體而不苛故王天下莫之能禦也項籍楚之世將有重于民橫行天下然而卒死東城者何也有一范增不能用意忌多疑不信大臣故也寬則得衆用賢則多功信則人歸之悅近孔子曰為上不寬吾何以觀之苛政甚于猛虎詩人疾掊克在位是以聖人體德居簡而以虛受人夫有德則謙謙則能讓虛則寬寬則愛物世俗以公刻為能以苛察為明以忌諱為深三物具則國危矣故禮法欲其簡禁令欲其約事業欲其希簡則易明約則易從希則有功此聖賢之務也漢高祖山東之匹夫也起兵之日天下英賢奔走而歸之賢士輻湊而樂為之用是以王天下而莫之能禦唯其以簡節寬大受天下之物故也是故寬則得衆虛則受物信則不疑不忌諱則下情達而人心安夫高祖非能舉必當也唯以其心曠故人不疑況乎以至公處物而以聰明治人乎堯先親九族文王刑于寡妻物莫不由內及外由大信而結由易簡而上安由仁厚而下親今諸侯王國之制無一成之田一旅之衆獨坐空宮之中民莫見其面其所以防禦之備甚于仇讎內無公族之輔外無藩屏之援是以兄弟無睦親之教百姓無光明之德弊薄之俗興忠厚之禮衰近者不親遠者不附人主孤立于上而本根無庇蔭之助此天下之大患也聖人者以仁義為本以大信持之根深而基厚故風雨不愆伏也貴公治國之道萬端所以行之在一一者何曰公而已矣唯公心而後可以有國唯公心可以有家唯公心可以有身身也者為國之本也公也者為身之本也夫私人之所欲而治之所甚惡也欲為國者一不欲為國者萬凡有國而以私臨之則國分為萬矣故立天子所以治天下也置三公所以佐其王也觀事故而立制瞻民心而立法制不可以輕重輕重即頗邪法不可以私倚私倚即姦起古之人有當市繁之時而竊人金者人問其故曰吾徒見金不見人也故其愛者必有大迷宋人有子甚醜而以勝曾上之美故心倚于私者即所知少也亂于色者即目不別精粗沈于聲者則耳不別清濁偏于受者即心不別是非是以聖人節欲去私故能與物無尤與人無爭也明主知其然也雖有天下之大四海之富而不敢私其親故百姓超然背私而向公公道行即邪私無所隱矣向公即百姓之所道者一向私即百姓之所道者萬一向公則明不勞而姦自息一向私則繁刑罰而姦不禁故公之為道言甚約而用之甚博治亂治國之要有三一曰食二曰兵三曰信三者國之急務存亡之機明主之所重也民之所惡者莫如死豈獨百姓之心然雖堯舜亦然民困衣食將死亡而望其奉法從教不可得也夫唯君子而後能固窮故有國而不務食是責天下之人而為君子之行也伯夷餓死于首陽之山傷性也管仲分財自取多傷義也夫有伯夷之節故可以不食而死有管仲之才故可以不讓而取然死不如生爭不如讓故有民而國貧者則君子傷道小人傷行矣君子傷道則教虧小人傷行則姦起夫民者君之所求用也民富則求盡得民貧則所求盡失用而不得故無強兵求而皆失故無興國明主知為國之不可以不富也故率民于農富國有八政一曰儉以足用二曰時以生利三曰貴農賤商四曰常民之業五曰出入有度六曰以貨均財七曰抑談説之士八曰塞朋黨之門夫儉則能廣時則農修貴農則穀重賤商則貨輕有常則民一有度則不散貨布則并兼塞抑談説之士則百姓不淫塞朋黨之門則天下歸本知此八者國雖小必王不知此八者國雖大必亡凡上之所以能制其下者以有利權也貧者能富之之謂利有罪者能罰之之謂權今為國不明其威禁使刑賞利祿一出于己則國貧而家富離上而趣下矣夫處至貴之上有一國之富不可以不明其威刑而納公實之言此國之所以治亂也至貴者人奪之至富者人取之是以明君不敢恃其尊以道為尊不敢恃其強以法為強親道不親人故天下皆親也愛義不愛近故萬里為近也天下同道萬里一心是故以人治人以國治國以下天治天下聖王之道也凡有國者患在壅塞故不可以不公患在虛巧故不可以不實患在詐偽故不可以不信三者明則國安三者不明則國危苟功之所在雖疏遠必賞苟罪之所在雖親近必罰辨智無所橫其辭左右無所開其説君子卿大夫其敬懼如布衣之慮故百姓蹈法而無徼幸之心君制而臣從令行而禁止壅塞之路閉而人主安太山矣夫禮者所以正君子也法者所以治小人也治在于君子功在于小人故為國而不以禮則君子不讓制民而不以法則小人不懼君子不讓則治不立小人不懼則功不成是以聖人之法使貴賤不同禮賢愚不同法毀法者誅有罪者罰爵位以其才行不計本末刑賞以其功過不計輕重言必出于公實行必落于法理是以百姓樂義不敢為非也太上使民知逆其次使民知心其下使民不得為非使民知道者德也使民知心者義也使民不得為非者威禁也威禁者賞必行刑必斷之謂也此三道者治天下之具也欲王而王欲霸而霸欲強而強在人主所志也損益夫服物不稱則貴賤無等于是富者踰侈貧者不及小人乘君子之器賈豎襲卿士之服被文繡佩銀黃重門而玉食其中左右叱咄頤指而使是故有財者光榮無財者卑辱上接卿相下雄齊民珍寶旁流而刑放于賄下而法侵能無虧乎世治天地之道貴大聖人之道貴寬無分寸之曲至直也以是繩之則工不足于材矣無纖分之短至善也以是規之則人主不足于人矣故凡用人者不求備于一人桓公之于寧戚也知之矣夫有近會者無遠期今之為法曰選舉之官不得見人曰以絶姦私也夫處深宮之中而選天下之人以為明奚從而知之夫交接人之道不可絶也故聖人求所以治交而不求絶交人莫問不交以人禁人足以私禁私也先王之用人不然不論貴賤不禁交遊以德底官以功底祿具賞罰以待其歸雖使之遊誰敢離道哉刑法禮法明則民無私慮事業專則民無邪偽百官具則民不要功故有國者為法欲其正也事業欲其久也百官欲其常也天下之事以次為爵祿以次進士君子以精德顯夫德有次則行修官有次則人靜事有次則民安農夫思其疆畔百工思其規矩士君子思其德行群臣百官思其分職上之人思其一道侵官無所由離業無所至夫然故天下之道正而民一夫變化者聖人之事也非常者上智之任也此入于權道非賢者之所窺也才智至明而好為異事者亂之端也是以聖人甚惡奇功天下有可赦之心而有可赦之罪無可赦之心而無可赦之罪明王之不赦罪非樂殺而惡生也以為樂生之實在于此物也夫思可赦之法則法出入法出入則姦邪得容其議姦邪得容其議則法日亂犯罪者多而私議並興則雖欲無赦不可已夫數賞則賢能不勸數赦則罪人徼幸明主知之故不為也夫可赦之罪千百之一也得之于一而傷之于萬治道不取也故先王知赦罪不可為也故所俘虜一斷之于法務求所以立法而不求可赦之法也法立令行則民不犯法法不立令不行則民多觸死故曰能殺而後能生能斷而後仁立國之治亂在于定法定法則民心定移法則民心移法者所以正之事者也一出而正再出而邪三出而亂法出而不正是無法也法正而不行是無君也是以明君將有行也必先求之于心慮先定而後書之于策言出而不可易也令下而不可反也如陰陽之動如四時之行如風雨之施所至而化所育而長夫天之不可逆者時也君之不可逆者法也使四時而可逆則非天也法令而可違是非君也今有十人彍弩于百萬之衆未有不震怖者也夫十矢之不能殺百萬人可知也然一軍皆震者以為唯無向則已所中必死也明君正其禮明其法嚴其刑持滿不發以牧萬民犯禮者死逆法者誅賞無不信刑無不必則暴亂之人莫敢試矣故中人必死一矢可懼萬人有罪必誅一刑可以禁天下是以明君重法慎令人主人主莫不欲得賢而用之而所用者不免于不肖莫不欲得姦而除之而所除者不免于罰賢若是者賞罰之不當任使之所由也人主之所賞非謂其不可賞也必以為當矣人主之所罪非以為不可罰也必以為信矣智不能見是非之理明不能察浸潤之言所任者不必智所用者不必忠故有賞賢罰暴之名而有戮能養姦之實此天下之大患也致賢雖有離婁之目不能兩視而明夔曠之耳不能兩聽而聰仲尼之智不能兩慮而察夫以天下之至明至智猶不能參聽而俱存之而況于凡人乎故以目雖至明有所不知以因雖凡人無所不得故善學者假先王以論道善因者借外智以接物故假人之目以視奚適夫兩見假人之耳以聽奚適夫兩聞假人之智以慮奚適夫兩察故夫處天下之大道而智不窮興天下之大業而慮不竭統齊群言之類而口不勞兼聽古今之辨而志不倦者其唯用賢乎明賞罰夫干祿者唯利所在智足以取當世而不能日月不違仁當其用智以禦世賢者有不如也聖人明于此道故張仁義以開天下之門抑情偽以塞天下之戶相賞罰以隨之賞足榮而罰可畏智者知榮辱之必至是故勸善之心生而不軌之姦息賞一人而天下知所從罰一人而天下知所避明開塞之路使百姓曉然知軌疏之所由是以賢者不憂知者不懼干祿者不邪是故仁者安仁智者利仁畏罪者強仁天下盡為仁明法之謂死者人之所甚惡也殺人者仁人之所不忍也人之于利欲有犯死罪而為之先王制肉刑斷人之體徹膳去樂咨嗟而行之者不得已也刑不斷則不威避親貴則法日弊如是則姦不禁而犯罪者多惠施一人之身而傷天下生也聖人計之于利害故行之不疑是故刑殺者乃愛人之心也涕泣而行之故天下明其仁也雖貴重不得免故天下知其斷也仁見故民不怨立斷下不犯聖王之所以禁姦也先王制為八議赦宥之差斷之以三槐九棘之聽服念五六日至于旬時全正義也而後斷之仁心如此之厚故至刑可為也已上十七篇並見群書治要已下各書引見篇名缺或問袁子曰故少府楊阜豈非忠臣哉見人主之非則勃然怒而觸之與人言未嘗不道也豈非所謂王臣謇謇非躬之故者歟答曰然可謂直士忠臣則吾不知也何者夫仁者愛人施于君謂之忠施于親謂之孝忠孝者其本一也故仁愛之至者君親有過諫而不入求之反覆不得已而言不忍宣也今為人臣見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳群則不然其談論終日未嘗言人主之非書數十上而外人不知君子謂陳群于是乎長者此為忠矣三國志陳群傳注北堂書鈔五十四藝文類聚二十二長短經臣行御覽四百四十七禮者兼仁義北堂書鈔八十當是禮政篇文長安九醞中山清酤北堂書鈔一百四十八比年九穀不登菜蔬不熟不可不深慮唯得賣棘栗瓜梨凡不給之物若甘蔗之屬皆可權禁北堂書鈔一百五十六藝文類聚八十七御覽九百七十四語曰歲在申酉乞漿得酒歲在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也北堂書鈔一百四十四又一百五十六御覽十七又三十五又八百六十一滑釐曰今當凶年有欲與子隨侯之珠者又有欲與子一鍾粟者子將何擇釐曰吾取粟可以救窮御覽三十五立德蹈禮謂之英子産季札人之英也文選任昉哭范僕射詩注堯避舜于濟陰今定陶有堯冢信乎御覽八十桀紂有民左億之衆四嶽三塗之險京山終南之固及在鳴條之野一朝而失天下御覽八十二目以見小為明耳以聽大為聰御覽三百六十六聖人之治也若平地然聾盲跛蹇皆能履之法若丘陵也非有逸足不能超也御覽四百一唯聖知聖唯賢知賢信乎御覽四百一楊子曰莊周何人哉袁子曰太不檢重而畏禍智人也御覽四百三十二孔子稱蘧伯玉國無道可卷而懷也今李膺居濁世之中皎然與世殊塗此西山餓夫之儔耳卒死于非罪惡得為雅人御覽四百四十七李膺言出于口人莫得違也有難李膺之言者則鄉黨非之禮君子與人同輿載則名聞天下御覽四百四十七學莫大于博行莫大于約聖人者天下之至智者也博學以聚之兼聽而辨之御覽六百一十二非所事而強學猶以百萬之師積于河濟之中其用舟楫固不如江漢之良御覽七百六十九方丈之食不過一飽綈袍之繡不過一暖御覽八百四十九牛馬之為人駕乘者非樂負千鈞之重行千里之險鞭策痛矣御覽八百九十七袁子曰吾嘗與陳茅息于鄴東門之外見一老父方坐而食其子授之蒜食畢有餘欲棄則惜欲持去則暑遂盡食于是火辛螫其腸胃兩目盡赤陳子笑之吾謂之曰子之牛羊數千而不敢食天暑有暍死者而後食之病子之軀亦猶是也御覽九百七十七袁子曰諸葛亮重人也而驟用蜀兵此知小國弱民難以久存也今國家一舉而滅蜀自征伐之功未有如此之速者也方鄧艾以萬人入江由之危險鍾會以二十萬衆留劍閣而不得進三軍之士已飢將使劉禪數日不降則二將之軍難以反矣故功業如此之難也國家前有壽春之役後有滅蜀之勞百姓貧而倉廩虛故小國之慮在于時立功以自存大國之慮在于既勝而力竭成功之後戒懼之時也案此下五條但稱袁子其為正論正書不能分別録置卷末袁子曰張子布薦亮于孫權亮不肯留人問其故曰孫將軍可謂人主然觀其度能賢亮而不能盡亮吾是以不留三諸志諸葛亮傳注袁子曰或問諸葛亮何如人也袁子曰張飛關羽與劉備俱起爪牙腹心之臣而武人也晚得諸葛亮因以為佐相而群臣悅服劉備足信亮足重故也及其受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑如此即以為君臣百姓之心欣戴之矣行法嚴而國人悅服用民盡其力而下不怨及其兵出入如寡行不寇芻蕘者不獵如在國中其用兵也止如山進退如風兵出之日天下震動而人心不憂亮死至今數十年國人歌思如周人之思召公也孔子曰雍也可使南面諸葛亮有焉又問諸葛亮始出隴右南安天水安定三郡人反應之若亮速進則三郡非中國之有也而亮徐行不進既而官兵上隴三郡復亮無尺寸之功失此機何也袁子曰蜀兵輕鋭良將少亮始出未知國中強弱是以疑而嘗之且大會者不求近功所以不進也曰何以知其疑也袁子曰初出遲重屯營重復後轉降未進兵欲戰亮勇而能鬭三郡反而不速應此其疑徵也曰何以知其勇而能鬭也袁子曰亮之在街亭也前軍大破亮屯去數里不救官兵相接又徐行此其勇也亮之行軍安靜而堅重安靜則易動堅重則可以進退亮法令明賞罰信士卒用命赴險而不顧此所以能鬭也曰亮帥數萬之衆其所興造若數十萬之功是其奇者也所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去之如始至勞費而徒為飾好何也袁子曰蜀人輕脫亮故堅用之曰何以明其然也袁子曰亮治實而不治名志大而所欲遠非求近速者也曰亮好治官府次舍橋梁道路此非急務何也袁子曰小國賢才少故欲其尊嚴也亮之治蜀田疇辟倉廩實器械利蓄積饒朝會不譁路無醉人夫本立故末治有餘力而後及小事此所以勸其功也曰子之論諸葛亮則有證也以亮之才而少其功何也袁子曰亮持本者也其于應變則非所長也故不敢用其短曰然則吾子美之何也袁子曰此固賢者之遠矣安可以備體責也夫能知所短而不用此賢者之大也知所短則知所長夫前識與言而不中亮之所不用也此吾之所謂可也三國志諸葛亮傳注袁子曰魏家置吏部尚書專選天下百官夫用人人君之所司不可以假人者也使治亂之柄制在一人之手權重而人才難得居此職稱此才者未有一也是百亂而一治者矣北堂書鈔六十藝文類聚四十八御覽二百十四袁子曰命士已上皆有冠冕謂之冠族之家文選任昉宣德皇后令注
