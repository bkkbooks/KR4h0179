body:
  text: 慕容廆與陶侃箋明公使君轂下振德耀威撫寧方夏勞心文武士馬無恙欽高仰止注情彌久王途嶮遠隔以燕越每瞻江湄延首遐外天降艱難禍害屢臻舊都不守奄為虜庭使皇輿遷幸假勢吳楚大晉啓基祚流萬世天命未改玄象著明是以義烈之士深懷憤踴猥以功薄受國殊寵上不能掃除群羯下不能身赴國難仍縱賊臣屢逼京輦王敦倡禍于前蘇峻肆毒于後凶暴過于董卓惡逆甚于傕汜普天率土誰不同忿深怪文武之士過荷朝榮不能滅中原之寇刷天下之恥君侯植根江陽發曜荊衡杖葉公之權有包胥之志而白公五員殆得極其暴竊為丘明恥之區區楚國子重之徒猶恥君弱臣強不及先大夫厲已辨衆以服陳鄭越之種蠡尚能弼佐句踐取威黃池況今吳土英賢比肩而不聞輔翼聖主陵江北伐以義聲之直討逆暴之羯檄命舊都之士招懷存本之人豈不若因風振落頓坂走輪哉且孫氏之初以長沙之衆摧破董卓志匡漢室雖中罹寇害雅志不遂原其誠心乃忽身命及權據楊越外杖周張內憑顧陸拒魏赤壁克取襄陽自茲以降世主相襲咸能侵逼除豫令魏朝旱忘食不知今之江表為賢俊匿智藏其勇略邪將呂蒙淩統高蹤曠世哉況今凶鞨虐暴中州人士逼迫勢促顛沛之危甚于纍卵假號之彊衆心所去敵有釁矣易可震蕩王郎袁術雖自詐僞皆基淺根微禍不旋踵此皆君侯之所見聞者矣王司徒清虛寡欲善于全已昔曹參亦崇此道著畫一之稱也庾公居元舅之尊處申伯之任超然高蹈明智之權戍于寇難之際受大晉纍世之恩自恨絶域無益聖朝徒繫心萬里望風懷憤今海內之望足為楚漢輕重者惟在君侯若戮力盡心悉五州之衆據兗豫之郊使向義之倒戈釋甲則羯寇必滅國恥必除廆在一方敢不竭命孤軍輕進不足使勒畏首畏尾則懷舊之士欲為內應無由自發故也故遠陳寫言不盡宣晉書載紀慕容廆傳又見十六國春秋二十三上晉成帝表臣究觀前代昏明之主若能親賢竝建則政致升平若親黨后族必有傾辱之禍是以周之申伯號稱賢舅以其身藩于外不握朝權降及秦昭足為令主委信二舅幾至亂國逮于漢武推重田蚡萬機之要無不決之及蚡死後切齒追恨成帝暗弱不能目立內惑豔妻外恣五舅卒令王莽坐取帝位每覽斯事孰不痛惋設使舅氏賢若穰侯王鳳則但有二臣不聞有二主若其不才則有竇憲梁冀之禍凡此成敗亦既然矣苟能易軌可無覆墜陛下命世天挺當隆晉道而遭國多難殷憂備嬰追述往事至今焚灼迹其所由實因故司空亮居元舅之尊勢業之重執政裁下輕侮邊將故令蘇峻祖約不勝其忿遂致敗國至令太后發憤一旦升遐若社稷不靈人神無助豺狼之心當可極邪前事不忘後事之表而中書監左將軍冰等內執樞機外擁上將昆弟竝列人臣莫儔陛下深敦渭陽冰等自宜引領臣常謂世主若欲榮顯舅氏何不封以藩國豐其祿賜限其勢利使上無偏優下無私論如此榮辱何從而生噂𠴲何辭而起往者惟亮一人宿有名望尚致召變況今居之者素無聞焉且人情易惑難以戶告縱令阰下無私于彼天下之人誰謂不私乎臣與冰等名位殊班出處懸邈又國之戚昵理應降悅以適事會臣獨矯抗此言者上為陛下退為冰計疾苟容之臣坐鑒得失顛而不扶焉用彼相昔徐福陳霍氏之戒宣市不從至令忠臣更為逆族良由察之不審防之無漸臣今所陳可謂防漸矣但恐陛下不明臣之忠不用臣之計事過之後更處焦爛之日耳王章劉向每上封事未嘗不指斥王氏故令二子或死或刑谷永長禹依違不對故容身苟免取譏于世臣被髮殊俗位為上將風夜惟憂罔知所報惟當外殄寇讎內盡忠規陳力輸誠以答國恩臣若不言誰當言者晉書載紀慕容皓傳又十六國春秋二十五上言征慕容仁正月十二日臣躬征平郭遠假陛下天地之威將士竭命精誠感靈海為結冰淩行海中三百餘里臣自立國及問諸故老云初無海水凍冰之歲初學記七御覽六十又六十六竝引王隱晉書又見十六國春秋二十四下令賜封裕覽封記室之諫孤實懼焉君以黎元為國黎元以穀為命然則農者國之本也而二千石令長不遵孟春之令惰農弗勸宜以尢不修闢者措之刑法肅厲屬城主者明詳推檢具狀以聞苑囿悉可罷之以給百姓無田業者貧者全無資産不能自存各賜牧牛一一頭若私有餘力樂取官牛墾官田者竝依晉魏舊法溝洫溉灌有益官私主者量造務盡水陸之勢中州未平兵難不息勳誠既多官僚不可以滅也待克平凶醜徐更議之百工商賈數四佐與列將速定大員餘者還農學生不任訓教者亦除員祿夫人臣關言于人主至難也妖妄不經之事皆應蕩然不問擇其善者而從之王憲劉明雖罪應禁黜亦由孤之無大量也可悉復本官仍居諫司封生蹇蹇深得土臣之體詩不云乎無言不酬其賜錢五萬宣示內外有欲陳孤過者不拘貴賤勿有所諱晉書載紀慕容皓傳又十六國春秋二十五下令罪宋該夫孝廉者道德沈敏貢之王庭偏往助叛徒迷固之罪至王威臨討憑城醜詈此則悖逆之甚者也奈何舉之剖符于朝何所取信該下吏可正四歲刑偏行財祈進虧亂王典可免官禁錮終身御覽六百五十一引前燕録遼東內史宋該舉韓偏為孝廉慕容皓令云云又見今十六國春秋三十一與庾冰書君以椒房之親舅氏之昵總據樞機出內王命兼擁列將州司之位昆弟網羅顯布畿甸自秦漢以來隆赫之極豈有若此者乎以吾觀之若功就事舉必享申伯之名如或不立將不免梁竇之迹矣每觀史傳未嘗不寵恣母族使執權亂朝先有殊世之榮尋有負乘之纍所謂愛之適足以為害吾嘗忿歷代之主不盡防萌終寵之術何不業以一土之封令藩國相承如周之齊陳如此則永保南面之尊復有黜辱之憂乎竇武何進好善虛己賢士歸心雖為閹豎所危天下嗟痛猶有能履以不驕圖國亡身故也方今四海有倒懸之急中夏逋僭逆之寇家有漉血之怨人有復讎之憾寧得安枕逍遙雅談卒歲邪吾雖寡德蒙先帝列將之授以數郡之人尚欲并吞強虜是以自頃及今交鋒接刃一時務農三時用武而猶師徒不頓倉有餘粟敵人日畏我境日廣況乃天者之威堂堂之勢豈可同年而語哉晉書載紀慕容皓傳又十六國春秋二十五與顧和書今致繡襪一量䬫糊十斤人參十斤麻黃五斤御覽九百九十三手令敕常煒卿本不為生計孤以州里相存耳今大亂之中諸子盡至豈非天所念邪天且念卿況于孤乎十六國春秋二十六下令追崇祖考追崇祖考古人之令典心其追尊武宣王廆為高祖武宣皇帝文明王皓太祖文明皇帝十六國春秋二十六下書定冠冕制周禮冠體制君臣略同中世以來亦無常體今特制燕平上冠悉賜廷尉以下使瞻冠思事刑斷詳平諸公冠悉顏裹屈竹錦纏作公字以代梁處施之金瑱令僕尚書置瑱而已中祕監令別施珠瑱庶能敬慎威儀示民軌則十六國春秋二十七答慕容恪慕容評朕以不天早傾乾覆先帝所託惟在二公二公懿親碩德勳高魯衛翼贊王室輔導朕躬宣慈惠和坐而待旦虔誠夕惕美亦至矣故能外掃群凶內清九土四海晏如政和時洽雖宗廟社稷之靈抑亦二公之力也今關右有未賓之氏江吳有遺燼之虜方賴謀猷混寧六合豈宜虛已謙沖以違委任之重王其割二疏獨善之小以成公旦補袞之大晉書載紀慕容暐傳又十六國春秋二十八夫建德者必以終善為名位命者則以功成為效二公與先帝開構洪基膺天明命將廓夷群醜紹復隆周之迹今災眚橫流乾光墜曜朕以眇躬猥荷大業不能上成先帝遺志致使二虜遊魂所以功未成也豈宜沖退且古之王者不以天下為榮憂四海若荷擔然後仁讓之風行則比屋而可封今道化未純鯨鯢未殄宗廟之重非惟朕身二公所憂也當思所以寧濟兆庶靖難敦風垂美將來侔蹤周漢不宜崇飾常節以違至公晉書載紀慕容暐傳又十六國春秋二十八下書祈雨朕以寡德蒞政多違亢陽三時光陰錯緒農植之辰而零雨莫降其今有司徹樂大官以菜食常供祭奠十六國春秋二十八上言宜討素連木津等求諸侯莫如勤王自古有為之君靡不杖上以成事業者也今連津跋扈王師覆敗蒼生屠膾豈甚此乎豎子外以龐本為名內實幸而為寇封仗君以誅本請和而毒害滋深遼東傾沒垂已二周中原兵亂州師屢敗勤王杖義今其時也單于宜明九伐之威救倒懸之命數連津之罪合義兵以誅之上則興復遼邦下則并吞二郡忠義彰于本朝私利歸于我國此則吾鴻漸之始也終可以得志于諸侯晉書載紀慕容廆傳又十六國春秋二十三與此小異因水旱表請遜位臣以朽暗器非經國過荷先帝援握之恩又蒙陛下殊殊常之遇猥以輕才竊位宰祿不能上諧陰陽下釐庶政致使水旱愆和彝倫失序轅弱任重夕惕惟憂臣聞王者則天建國辨方正位司必量才官惟德舉台傅之重參理三光苟非其人則靈曜為虧尸祿貽殃負乘招悔由來常道未之或差以姬旦之勳聖猶近則二公不悅遠則管蔡流言況臣等寵緣戚來榮非才授而可久點天官塵蔽賢路是以中年拜表披陳丹款聖恩歲舊未忍遐棄奄冉偷榮愆責彌厚自待鼎司歲餘辰紀忝昌宰衡七載于茲雖乃心經略而思不周務至令二方干紀跋扈未庭同文之詠有慚盛漢深乖先帝託付之規甚違陛下垂拱之義臣雖不敏竊聞君子之言敢忘虞廷避賢之美輒循兩疏知止之分謹送太宰大司馬太傅司徒章綬惟垂昭許晉書載紀慕容暐傳時暐境內多水旱慕容恪慕容評竝稽首歸政請遜位還第云云暐不許遂斷其讓表恪評等乃止又見十六國春秋二十八說慕容廆通使勸進琅邪今兩京傾沒天子蒙塵琅邪制江東實人命所係明公雄據海朔跨總一方而諸部怙衆稱兵未遵道化者蓋以官非王命又自以為彊今宜通使琅邪勸承大統然後敷宣帝命以伐有罪誰敢不從晉書載紀慕容廆傳又十六國春秋二十三駮宋該等議表請廆為燕王自群胡乘閒人嬰茶毒諸夏蕭條無復綱紀明公忠武篤誠憂勤社稷抗節孤危之中建功萬里之外終古勤王之義未之有也夫立功者患信義不著不患名位不高故桓文有寧復一匡之功亦不先求禮命以令諸侯今宜繕甲兵候機會除群凶清四海功成之後九錫自至且要君以求寵爵者非為臣之義也晉書載紀韓恆傳又十六國春秋二十三又三十一上疏陶侃府請封慕容廆為燕王自古有國有家鮮不極盛而衰自大晉龍興克平崏會神武之略邁蹤前史惠皇之末后黨搆難禍結京畿釁成公族遂使羯逆乘虛傾覆諸夏舊都淪滅山陵掘毀人神悲悼幽明發憤昔玁狁之強胸奴之盛未有如今日羯逆之暴跨躡華夷盜稱尊號者也天授有晉挺拔英傑車騎將軍慕容廆自弱冠蒞國忠于王室明允恭肅志在立勳屬海內分崩皇輿遷幸元皇中興初唱大業肅祖繼統蕩平江外廆雖限以山海隔以羯寇翹首引領係心京師常假寤寐欲憂國亡身貢篚相尋連舟載路馬不稅駕動成義舉今羯寇滔天怙其醜類樹基趙魏跨略燕齊廆雖率義衆誅討大逆然管仲相齊猶曰寵不足以御下況廆輔翼王室有匡霸之功而位卑爵輕九命未加非所以寵異藩翰敦妭殊勳者也方今詔命隔絶王路嶮遠貢使往來動彌年載今燕之舊壤北周沙漠東盡樂浪西暨代山南極冀方而悉為虜庭非復國家之域將佐等以為宜遠遵周室近準漢初進封廆為燕王行大將軍事上以總統諸部下以割損賊境使冀州之人望風向化廆得祇承詔命率合諸國奉辭夷逆以成桓文之功苟利社稷專之可也而廆固執謙光守節彌高每詔所加讓動積年非將佐等所能敦逼今區區所陳不欲苟相崇重而愚情至心實為國計晉書載紀慕容廆傳廆與陶侃箋井齎其東夷校尉封抽行遼東相韓矯等三十餘人疏上侃俯云云又見十六國春秋二十三諫慕容皓臣聞聖王之宰國也薄賦而藏于百姓分之以三等之田十一而稅之寒者衣之飢者食之使家給人足雖水旱而不為災者何也高選葨官務盡勸課人治周田百畝亦不假牛力力田者受旌顯之賞惰農者有不齒之罰又量事置官量官置人使官必稱須人不虛位度歲入多少裁而祿之供百僚之外藏之太倉三年之耕餘一年粟以斯而積公用于何不足水旱其如百姓何雖務農之令屢發二千石今莫有志勤在公鋭盡地利者故漢祖知其如此以墾田不實徵殺二千石以十數是以明章之世號次升平自永嘉喪亂百姓流亡中原蕭條千里無烟飢寒流隕相繼溝壑先王以神武聖略保全一方威以殄姦德以懷遠故九州之人塞表殊類繈負萬里若赤子之歸慈父流人之多于舊土十倍有餘人殷地狹故無田者十有三四焉殿下以英聖之資克廣先業南摧強趙東滅句驪拓境三千增戶十萬繼武闡廣之功有高西伯宜悉罷諸苑以業流人人至而無資産者賜之以牧牛人既殿下之人牛豈失乎善藏者藏于百姓若斯而已矣邇者深副樂土之望中國之人皆將壺飱奉迎石虎誰與居乎且魏晉雖道消之世猶削百姓不至于七八特官牛田者官得六分百姓得四分私牛而官田者與官中分百姓安之人皆悅樂臣猶曰非明王之道而況增乎且水旱之厄堯湯所不免王者宜濬治溝澮循鄭白西門史起溉灌之法旱則決溝為雨水則入于溝瀆上無雲漢之憂下無昏墊之患句驪百濟及宇文段部之人皆兵勢所徙非如中國慕義而至咸有思歸之心今戶垂十萬狹湊都城恐方將為國家深患宜分其況弟宗屬徙于西境撫之以恩檢之以法使不得散在居人知國之虛實今中原未平資畜宜廣官司猥多游食不少一夫不耕歲受其飢必取于耕者而食之一人食一人之力游食數萬損亦如之安可以家給人足治致升平殿下降覽古今之事多矣政之巨患莫甚于斯其有經出世才稱時求者自可隨須置之列位非此已往其耕而食蠶而衣亦天之道也殿下聖王性寬明思言若渴人故人盡芻蕘有犯無隱前者參軍王憲大夫劉明竝竭忠獻款以貢至言雖頗有逆鱗意在無責主者奏以妖言犯上致之于法殿下慈弘包納恕其大辟猶削黜禁錮不齒于朝其言是也殿下固宜納之如其非也宜亮其狂狷罪諫臣而求直言亦猶北行詣越豈有得有得邪右長史宋該等阿媚苟容輕劾諫士巳無骨鯁嫉人之有掩蔽耳目不忠之甚四業者國之所資教學者有國盛事習戰務農尤其本也百工商賈猶其末耳宜量軍國所須置其員數已外歸之于農教之戰法學者三年無成亦宜歸之于農不可充大員以塞聰俊之路臣之所言當也願速施行非也登加罪戮使天下知朝廷從善如流罰惡不掩王憲劉明忠臣也願宥忤鱗之愆收其藥石之效晉書載紀慕容皓傳又十六國春秋二十五上疏請征呂護輒以家奴婢五十口馬七十匹年四十頭以供軍資十六國春秋三十二上疏請防秦苻堅雖聘使相尋託輔車為諭然抗均鄰敵勢同戰國明其甘于取利無慕善之心終不能守信存和以崇久要也頃來行人纍續兼師出洛川夷險要害具之耳目觀虛實以措姦圖聽風塵而伺國隙者寇之常也今吳王外奔為其謀主伍員之禍不可不慮洛陽并州壺關諸城竝宜增兵益守以防未兆晉書載紀慕容暐傳又十六國春秋二十九戒子殷書王彌曹嶷必有子孫汝善招撫勿尋舊怨以長亂源十六國春秋三十一鞠殷傳上言祖父未葬者權宜銓選大燕雖革命創制至于朝廷銓謨亦多因循魏晉惟祖父不殮葬者獨不聽官身清朝斯誠王教之首不刊之式然禮貴適時世或損益是以高祖制三章之法秦人安之自頃中州喪亂遭兵積年或遇傾城之敗覆車之禍坑師沈卒往往而然孤孫煢子十室而九兼三方嶽峙父子異邦存亡吉凶杳成天外或便假一時或依嬴博之制孝子糜身無補順孫心喪靡及雖招魂虛葬以敘罔極之情又禮無招葬之文令不此載若斯之流抱琳琅而無申懷英才而不齒誠可痛也恐非明揚側陋務盡時珍之道吳起二陳之疇終將無所展其才幹漢祖何由免于平城之圍郅支之首何以懸于漢關謹案戊辰詔書蕩清瑕穢與天下更始以明惟新之慶五六年閒尋相違伐于則天之體臣竊未安晉書載紀慕容俊傳又十六國春秋二十七將死誡其子吾所以在此朝者非要貴也直是避禍全身耳葬可埋圓石于吾墓前首引之云晉有微臣明岌之冢以遂吾本志也北堂書鈔一百六十引三十國春秋上言定冤冕制夫名尊禮重先王之制冠冕之式代或不同漢以蕭曹之功有殊群辟故履劍上殿入朝不趨世無其功則禮宜闕也至于東宮體此為儀魏晉因循制不納舄今皇嗣過謙準同百僚禮卑逼下有違朝式太子有統天之重而與諸王齊冠遠遊非所以辨章貴賤也祭享朝慶禮宜正服袞衣九文冠冕旒又仲冬長至太陰數終黃鐘産氣綿微于下此月閉關息旅后不省方禮記日是月也事欲靜君子齊戒去聲色惟周官有天子之南郊從八能之說或以有事至靈非朝饗之節故有樂作之禮王者慎微禮從其重前來二至闕鼓不宜有設今之鏗鎗蓋以常儀二至之禮事殊餘節猥動金聲驚越神氣施之宣養實為未盡又朝服雖是古禮絳構始于秦漢迄于今伐遂相仍準朔望正旦乃具袞舄禮諸侯旅見天子不得終事者三雨沾服失容其在一焉今或朝日天雨未有定儀禮貴適時不在過恭近以地溼不得納舄而以袞襈改履案稱朝服所以服之而朝一體之間上下二制或廢或存實乖禮意大燕受命侔蹤虞夏諸所施行宜損益定之以為皇代永制晉書載紀慕容傳又十六國春秋二十七上疏陳時務臣聞有漢宣有言與朕治天下者其唯良二千石乎是以特重此選必妙盡英才莫不拔自貢土歷資內外用能仁感猛獸惠致群祥今者守宰或握自匹夫兵將之間或因寵戚藉緣時會非但無聞于州閭亦不經于朝廷又無考績黜陟幽明貪惰為惡無刑戮之懼清勤奉法無爵賞之勸百姓窮斃侵賕無已兵士逋逃乃相招為盜賊風頽化替莫相糾挕且吏多則政煩由來常患今之見戶不過漢之一大郡而備置百官加之新立軍號兼重有過往時虛假名位廢棄農業公私驅擾人無聊生宜并官省職務勸農桑秦吳二虜僻僭一時尚能任道損情肅諧僞部況大燕纍聖重光君臨四海而可美政或虧取陵奸寇哉鄰之有善衆之所望我之不修彼之願也秦吳狡猾地居形勝非唯守境而已乃有吞噬之心中州豐實戶兼二寇弓馬之徑秦晉所憚雲騎風馳國之常也而比赴敵後機兵不速濟者何也皆由賦法靡恆役之非道郡縣守宰每于差調之際無不舍越殷彊首先貧弱行留俱窘資贍無所人懷嗟怨遂致奔亡進闕共國之饒退離蠶農之要兵豈在多貴于用命宜嚴制軍科務先饒復習兵教戰使偏伍有常從戎之外足營私業父兄有陟岵之觀子弟懷孔爾之顧雖赴水火何所不從節儉約費先王格謨去華敦朴哲后恆憲故周公戒成王以嗇財為本漢文以皂幃變俗孝景宮人弗過千餘魏武寵賜不盈十萬薄葬不墳儉以率下所以割肌膚之惠全百姓之力謹案後宮四千有餘僮侍廝艱通兼十倍日費之重價盈萬金綺縠羅紈歲增常調戎器弗營奢玩是務令帑藏虛竭軍土無襜褕之賚宰相侯王迭以侈麗相尚風靡之化積習成俗臥薪之諭未足甚焉宜罷浮華非要之役峻明婚姻喪葬之條禁絶奢靡浮煩之事出傾宮之女均商農之賦公卿以下以四海為家信賞必罰綱維肅舉者溫猛之首可懸之白旗秦吳二主可以禮之歸命豈唯不復侵寇而己哉陛下若不遠追漢宗弋綈之模近崇先帝補衣之美臣恐頽風斃俗亦革變靡途中興之歌無以軫之絃詠又拓守兼并不在一城之地控制戎夷者懷之以德今魯陽上郡重山之外雲陰之北四百有餘而未可以羈服塞表為平寇之基徒孤危託落令善附內駭宜攝就并豫以臨二河通接漕穀擬之丘陵重晉陽之戊增南藩之兵戰守之備衒以千金之餌蓄力待時可一舉而滅如其虔劉送死俟入境而斷之可令匹馬不反非唯絶二賊窺𨵦乃是戡殄之要惟陛下覽焉晉書載紀慕容暐傳又見十六國春秋二十九
