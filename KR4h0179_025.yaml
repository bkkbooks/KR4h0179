body:
  text: 卷二十五王羲之雜帖雜帖四太保思一散知足下歸乃至孔建安家熱乃爾往還以十實非乏所堪若之不復更剋近道惟命是往矣恐有簿書之煩益屬所事可立制縣不給下貧而給饒有之家開令治國別許為盛田不平者嚴制如此事省而虛實可知其或非所樂而絕付給者今為不賦得里人遂安黃籍前年皆斯人非復一條可歎今便獨坐令白郗侯求官邈等想必可得君亦當得見書若萬一不樂想可共思得州數十家見經營不爾無坐此理也別當以具慰深共思不待煩言十二月二十二日羲之白節近感歎情深得去月二十三日書知君故苦日耿耿善護之往不僕得大寒疾不堪甚力還不具王羲之白十四日疏昨信未即取遣適得孔彭祖書得其弟都下七日書說雲子暴霍亂亡人理乃當可耳惋惋桓公周生之痛豈可為心農敬親同日至至數日耳道路平安為慰妹且停為大慶知弟不果行吾不佳面近也適書至也知足下明還行復剋面王羲之白又小大佳也賢兄如猶當小佳然下不斷尚憂之近所示欲依上虞別上申一期尋案臺報不聽上當戮力於事不可但復解散君縣乃是今勝縣而復以為難耶知足下以界內有此事便欲去縣豈有此理此縣弊久因足下始有次第耳必無此理便當息意今勑諸處事及縣者省馳書於臺中論必釋然故遣旨信示意羲之死罪累白至也辱十四日告慰情念轉塞想善平和下官至匆匆自力白羲之死罪諸人何似耿耿遣令使白恐不時至耳奉黃甘二百不能佳想故得至耳船信不可得不知前者至不云停雲子代萬頃桓公至今令荀臨淮權領其府懷祖都共事已行月十三日羲之頓首追傷切割心不能自勝奈何奈何昨反想至向來快雨想君佳方得此雨為佳深為欣喜信既乏劣又頭痛甚無疾力不具王羲之頓首兄靈柩垂至永惟崩慕痛貫心膂痛當奈何計慈顏幽翳十三年而吾勿勿不知堪臨始終不發言哽絕當復奈何吾頃至劣劣比加下羲之頓首想創轉差僕其爾未欲佳憂憒力知問王羲之頓首三月十三日羲之頓首近反亦至念足下哀悼之至不可勝更寒外足下何如吾劣劣力遣知問王羲之頓首書雖備至聚宜有以宣事情今遣羊參軍西諸懷所具必欲今觀想可思今得時面克令得還也羲之白一日殊不敘闊懷得書知足下咳劇甚耿耿護之冀以散力不一一王羲之白知德孝故平平想當轉得散力每耿耿不忘懷足下小大佳不忽然夏中感懷冷冷不適足下復何似耿耿吾故不佳得遠近問不虞生何當來遲一集昨見無奕十九日書二十六日西也云仁祖服石散一齊不覺佳酷羸至可憂力知問王羲之書白羲之頓首白雨無已小兒猶小差力不一一王羲之頓首省告攝功曹事一一屬以所求寬逋廢守命必欲肅之是以間意其志既立不得不必行與殷侯物示當爾不可不卿定之勿疑李母猶小小不和馳情伏想行平康郗新婦大都小差卿大小佳近書至也得十八日書為慰雨蒸比各可不參軍轉差也懸耿吾胛痛劇灸不得力至患之不得書自力數字足下當為遠慮不可計目前省示知足下奉法轉到勝理極此此故蕩滌塵垢研遺滯累可謂盡矣無以復加漆園比之殊誕謾如下言也吾所奉設教意政同但為形跡小異耳方欲盡心此事所以重增辭世之篤今雖形係於俗誠心終日常在於此足下試觀其終適都十五日問清和傳賦問定寂寂當是虛也然始興郡奴屯結不肯出恐成令人邑邑想官吏長制之耳雨寒卿各佳不諸患無賴力書不一一羲之問庾雖篤疾謂必得治力豈圖凶問奄至痛惋情深半年之中禍毒至此尋念相摧不能已已況弟情何可任遮等荼毒備盡當何可忍視言之酸心奈何奈何此公立德由來而嬰斯疾每以惋慨常冀積善之慶當獲潛佑契同昔人尋憶事緬然永絕哀惋深至未能喻心省足下書固不可言已矣可復奈何絕筆流涕又足下各可耳復雨可厭若吾所噉日去不復辭此意想足下明必顧之遲散羲之頓首六日西也云仁祖服石散一齊不覺佳酷羸至可憂力知問王羲之書白書成得十一日疏甚慰三舍動靜馳情先書已具不得一一知汝表出便去不得見汝此何可言想秋必還恐此書不復及汝不一一九家真慰鸞開鶴瑞集客登秦望書一紙孔侍郎著作朝當時侍從庾參軍兄弟三人輒承命參軍弟至都孫道常約孔東遷駒承命長曹言切勑侍從承命謝功曹長旭故夫謝輶死罪死罪奉命輒侍從孔孝廉前吏孔琨死罪命違輒侍從王征東郎最言輒當侍從孫參軍定伯承命王逸少頓首謝七日登秦望可俱行當早也諸患者復何如懸心比疏已具不復一一桓安西觀自代蜀五書勿勿未得遣信又不知足下問吾既不快弱小疾苦甚無賴損尚小停有定去日更與足下相聞還不具王羲之白適書至也此人須當令埿想足下可為停之故示王羲之頓首又六月三日羲之白徂暑此歲已半感慨深可得二十七日書知足下安頓耿耿愁增患耶善消息吾至勿勿常恐一夏不可過不一一王羲之白賊以還不知遇官軍云何可深憂之欲依上虞初到別上今勑聽之縣事不同直不相連耳旦奉祠感思悲慟得書知問吾乏劣力不一一王羲之問重熙去具今子日與曹諭謝嶧吾又不下蔡書一一足下清談想必有理耳長任比得解未吾與江生論書答如此足下思所向示之要至懷也須卿示誠非復至書言所然於義故後來之今不能忘懷王逸少頓首敬謝各可不欲小集想集後能果想曹參軍疾者已往必能同來得告慰為妹下斷以為至吾比日至未果殊有邑想王羲之頓首見弘遠二書皆以達也動散即佳為慰足下晚各何以恒灼灼吾坦之欲不復堪事內然力不一一王羲之頓首又足下各復何以恒灼灼故問王羲之白足下似有董仲舒開閉陰陽法可勑令料付不雨憂之深珍重謝二侯曹庾王六君別羲之頓首君可不語差也耿耿力乏問王羲之頓首上下無恙從妹佳也得敬和近問不人有至憂其疾者令人深憂隔久何日能來曹參軍羲之頓首君比各可不僕近下數日勿勿腫劇數爾進退憂之轉深亦不知當復何治下由食穀也自食穀小有肌肉氣力不勝更生餘患去月盡來停穀噉麵復平平耳知玄度在彼善悉也無繇見之此何可言今與王會稽丘山陰書借人想故當有所得又語丘令臨葬必得耳知劉公差甚慰甚慰知前乃爾委頓追以怛然今轉平復也阮公近聞不萬轉差也知汝殊愁且得還為佳也冠軍蹔暢釋當不得極蹤可恨吾病來不辦行動潛不可耳終年纏此當復何理耶且方有此分張不知比去復得一會不講竟不竟可恨汝還當思更就理一昨遊悉誰同故數往虎丘不此甚蕭索祖希時面因行藥欲數處看過還復共集散耳不見奴粗悉書云見左軍彌數聽論政也今欲歸復何適報之遣不知總散討竝侍郎耶言別事有及過謝憂勤二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息得長風書靈柩幽隔卅年心想平昔痛慕崩絕豈可居處抽裂不能自勝謝書已乞日安厝即其情事長畢奈何松等隕慟哀情頓泄亦難可言郗還未卜聊示友中郎相憂不去心感遠懷近增傷惋每見范母子哀號使人情悲適得書知足下問吾欲中治甚憒憒向宅上靜佳眠都不知足下來門甚無意恨不蹔面王羲之知欲東先期共至謝欲處云何欲行想忘耳過此如命差涼君可不今日寔顧不遲面力知問王羲之比奉對對兄以釋豈一奄至此禍情願不遂緬然永絕痛之深至情不能已況汝豈可勝任奈何奈何無由敘哀悲酸伏想嫂安和自下悉佳松上下至乖隔十八年復得一集且悲且慰何指喻嫂疾至篤憂懷甚深穆松難為情地自慰猶小差然故忽忽冀得涼漸和耳此諸賢粗可時見省甚為簡闊遠頃異多小患而吾疾篤不得數為歎耳宰相安和殷生無恙時面兄當宣兄懷噉豆鼠傷如佳今送能噉不秋中感懷雨冷冀足下各可耳胛風遂欲成患甚憂之力知問王羲之頓首又不能不痛熙孝亡政爾復何於求之度政當求之內事餘理不絕求之一條當有冀不信罔然前塗願乙乙誨之以悟其心疾不退潛損亦當日深豈可以常理待之此豈常憂不審食復何如云肌色可可所堪轉勝復以此為慰馳竦耳夫人遂善平康也足下各可不冀行復面王羲之頓首想小大悉佳蔡家賓至君情感益深惟當撥遣之耳知足下散勢小差此慰無以為喻云氣力故爾復以悒怛想散患得差餘當以漸消息耳吾頃無一日佳衰老之獘日至夏不得有所噉而猶有勞務甚劣劣昨得熙廿六日書云患氣懸情知足下連不快何爾耿耿善將適吾積羸困而下積日不斷情慮尚深殊乏自力不能悉小佳更致問一一適脩載書平安羲之白奉告慰反側伏想比安和伯熊過見之悲酸大都可耳惟垂心羲之平平一日白比具羲之白送此鯉魚征與敬耶不在不乃邑邑不今遣鄉里人往口具也又四月二十三日羲之頓首昨書不悉君可不腫劇憂之力遣不具又羲之頓首闊別稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸賢從就理當不疏吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非遠耳深敬宜音問在數遇信悤遽萬不一陳卿與虞休意書有所問足下旨為致誠答令旨意致來勿忘此意自決今以資嚴知小大疾患念勞心吾昨得一日一起腹中極調適無所為憂但顧情不可言耳不得臨川問懸心不可言子嵩之子來數有使冀因得問示之想弟必有過理得蹔寫懷若此不果後期欲難冀臨書多歎吾不復堪事比成此書便大頓月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針灸力不甚懸情當深寬割情通省苦遣不具王羲之白長素差不懸耿小大佳也得敬豫九日問故進退憂之深知念許君與足下意政同但今非致言地甚勑勑亦不知范生以居職未以卿示輒便及之吾尚不能惜小節目但一開無解已又亦終無能為益適足為煩瀆足下呼爾不每念長風不可居忍昨得其書既毀頓又復壯溫深可憂謝生多在山下不復見且得書疾惡冷耿耿想數知問雖能還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔罔初月二日羲之頓首忽然今年感遠兼傷情痛切心奈何奈何念君哀窮不已羲之皇恐足下時事少可數來至人相尋下官吏不東西未委若為言敘乖足下不返重遣信往問願知心素吾怪足下參朝少晚不審有何事情致使如然也王羲之再拜前從洛至此未及就彼參承願夫子勿悒悒矣當日緣明府共飲遂闕問願足下莫見責羲之頓首十一月廿七日羲之報得十四十八日二書知問為慰寒切此各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具羲之報十月七日羲之報前過足下所得其書想殊有勞弊然叔兄子孫有數人足慰目前情至取答委曲故具示可令必達以副此志且山川甚有形勢遠想慨然又出藥精要有驗信比可致當大惠也從弟分別吾深憂慮卿女轗軻想何可處差充喜言不多耳羲之廿日羲之頓首節日感歎深念君增傷災雨君可也僕可耳力數字王羲之頓首定聽他母子哀此遂不還可令未也適重熙書如此果爾乃堪可憂張平不立勢向河南者不知諸侯何以當之熙表故未出不說說荀侯疾患想當轉佳耳若熙自勉此一役當可言淺見實不見今時兵任可處理二謝在此近終日不同之此歎恨不得方回知春後問令人怛怛近遣傳散有書想旦夕還近健步還得二十八日書吳興又道此月一日不知何以情恕修歎乃復以示法謝峰事秋便冷要且令必果不知夜來下意竟乏新故之際致歎良深君亦同懷近信過得告故云腹痛懸情災雨比復何似氣力能勝不僕為爾耳力不具一一王羲之七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾問觸暑遠涉憂卿不可言吾故羸乏力不具王羲之白得都下九日書見桓公當陽去月九日書久當至洛但運遲可憂耳蔡公遂委篤又加㿃下日數十行深可憂慮得仁祖廿六日問疾更委篤深可憂當今人物眇然而艱疾若此令人短氣謝光祿亦垂命可憂念念一朝奄忽傷人懷今年彫落可哀歎徂暑感懷深得書知足下故頓乏食差不耿耿吾故爾耳未果為結力不具王羲之皇象章草旨信送之勿勿當付良信遠婦疾猶爾其餘可耳今取書付想具羲之白君晚可不想比果力不具王羲之白得遠嘉興書計今日必度喜遲可言足下至慰今有書想足下有旨信別告具之云足下尚停數日半百餘武瞻望不得一見卿此何可言足下疾苦晴便大熱小舩中至不易可得過夏不甚憂卿還具示問得告承長平未佳善得適適君如常也知有患苦耿耿念勞心食少勞甚頓還白不具王羲之再拜省飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍太常故患胛灸俞體中可可耳僕射事已行以表讓未知恕不未復司州旨告懸竦鄱陽歲使應有書而未得向亦得萬書委曲備悉使人慨然見足下乃悉知叔虎剋昨發月半略必至未見勞參軍熱日更甚得書知足下不堪之同此無賴早且乘涼行欲往遲散也王羲之知賢室委頓何以使爾甚助耿耿念勞心知得廿四問亦得叔虎廿二日書云新年乃得發安石昨必欲剋潘家欲剋廿五日也足下以語張令未前所經繇足下近如似欲見今送七月六日羲之白多日不知問邑邑得二日書知足下昨問耿耿今已佳也期已至遲還具足下問耳當力東論道家無緣省苦但有悲慨不得東此月問信云舍子別送乃是北方物也何以欲此欲幾許致此四紙飛白以為何以能學不月末必往遲見君無以為喻鄉里人擇藥有發夢而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫亦嘗見者謝二侯昨見君歡復無喻然未善悉想宿昔可耳脅中云何一善消息值周轉勝也耿耿疾患小差與弘遠俱詣遲共寫懷王羲之知遠比當造次遲見此子真以日為歲足下得審問旨令吾荀侯佳不未果就卿深企懷耳安好音信明公還得歸洛也計令解有懸休尋知君當有分住者念處窮毒而復分乖尚可居情想反理斷當旦反想至所苦晚差不耿耿僕腳中不堪沈陰重痛不可言不知何以治之憂深力不具王羲之頓首深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示問晚復毒熱想足下所苦竝以佳猶耿耿吾至頓劣劣冀涼意散力知問王羲之頓首足下家極知無可將接為雨遂乃不復更諸弟兄問疾深護之不具王羲之白僕近脩小園子殊佳致果雜藥深可致懷也儻因行往希見比二處動靜故之常患馳情散騎癰轉利慶慰姊故諸惡反側永嘉至奉集欣憙無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君竝何為耶此猶未得盡集理行大剋遲此無喻知彼清晏歲豐又所使有無一鄉故是名處且山川形勢乃爾何可以不游目彼鹽井火井皆有不足下目見不為欲廣異聞具示足下今年政七十耶知體氣常佳此大慶也想復懃加頤養吾年垂耳順推之人理得爾以為厚幸但恐前路轉欲逼耳以爾要欲一游目汶領非復常言足下但當保護以俟此期勿謂虛言得果此緣一叚奇事也
