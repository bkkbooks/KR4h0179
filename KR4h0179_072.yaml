body:
  text: 辛曠與皇甫謐書夫三光懸象式揚天德嶽瀆山澤廣開地道賢人顯進實與聖治故力牧佐黃而涿鹿之征捷舜禹翼唐而滔天之災殄阿衡在商而成湯之功著薑望入周而文武之業建聖人光濟四海欲垂大化者莫不收才取良而致股肱忠賢大才之人願立名迹思在利見大人而王聖時治此所以應天順民之神龜利涉大川之元吉大晉合天地之中和經日月之重光四目視其明四聰達其聽巖穴出其隱四門啓其矇登高陽之八子御高辛之群龍俊才在官時亮天工鳥獸非君子之儔九皋無長鳴之鶴萬國黎獻咸仰南風之仁而抱聖化之隆此其至治也而先生固執沖虛塞淵其心殉文人之耿介亡宣尼之所沽步幽山之窮徑背漢津之明衢日月遂往時不我須此惜寸陰者之所以為懼而臨川者之所懷慨也竊謂先生降匪石于高岡回羽儀于皇京順震驚而翔撫振六翮于天庭邈禹稷之遐蹤騁大任之夷塗詔不世之洪勳同先哲之丕模使瞻仰者所以藉之美世希藉人六義之一獻斯一篇惟蒙采覽伏惟先生黃中通理經綸稽古既好斯文述而不作將邁卜商于洙泗之上超董生于儒林之首含光烈于千載之前吐英聲于萬世之後亦已盛矣曠以不敏感佩厚惠願附驥尾撫塵而遊咨覩未因而西望延企藝文類聚三十七柳谷石文説柳谷石文説夫大者盛之極也金者晉之行也中者物之會也吉者福之始灺此言司馬氏之王天下感德而生應正吉而王之符也宋書符瑞志上魏之初興也張掖刪丹縣金山柳谷有石生焉周圍尋中高一仞蒼質白章有五馬麟鹿鳳皇仙人之象始見于建安形成于黃初文備于太和于中布列有文字曰上上三天王述大金討大曹金但取之金立中大金馬一匹中正大吉關壽此馬甲寅述水凡三十五字既而晉以司馬氏受禪太尉屬程猗説日云云柳谷石文贊柳谷石文贊皇德遐通實降嘉靈乾生其象坤育其形玄石既表素文以成瑞虎合仁白麟耀精神馬自圖金言其形體正而王中允克明關壽無疆於萬斯齡宋書符瑞志上敘管輅夫晉魏之士見輅道術神妙占候無錯以為有隱書及象甲之數辰每觀輅書傳惟有易林風角及鳥鳴仰觀星書三十餘卷世所共有然輅獨在少府官舍無家人子弟隨之其亡沒之際好奇不哀喪者盜輅書惟餘易林風角及鳥鳴書還耳夫術數有百數十家其書有數千卷書不少也然而世鮮名人皆由無才不由無書也裴冀州何鄧二尚書反卿里劉太常潁川兄弟以輅稟受天才明陰陽之道吉凶之情一得其源遂涉其流亦不為難常歸服之輅自言與此五君共語使人精神清發昏不暇寐自此以下殆白日欲寢矣又自言當世無所願欲得與魯梓慎鄭裨竈晉卜偃宋子韋楚甘公魏石申共登靈臺披神圖步三光明災異運蓍龜決狐疑無所復恨也辰不以暗淺得因孔懷之親數與輅有所咨論至于辨人物析臧否説近義彈曲直拙而不工也若敷皇羲之典揚文孔之辭周流五曜經緯三度口滿聲溢微言風集若仰眺飛鴻漂漂兮景沒若俯臨深溪杳杳兮精絶逼以攻難而失其端欲受學求道尋以迷昏無不扼腕椎指追響長歎也昔京房雖善卜及風律之占卒不免禍而輅自知四十八當亡可謂明哲相殊又京房目見遘讒之黨耳聽青蠅之聲面諫不從而猶道路紛紜輅處魏晉之際藏智以朴卷舒有時妙不見求愚不見遺可謂知機相邈也京房上不量萬乘之主下不避佞諂之徒欲以天文洪範利國利身困不能用卒陷大刑可謂枯龜之餘智高燭之末光豈不哀哉世人多以輅疇之京房辰不敢許也至于仰察星辰俯定吉凶遠期不失年歲近期不失日月辰以甘石之妙不先也射覆名物見術流速東方朔不過也觀骨形而審貴賤覽形色而知生死許負唐舉不超也若夫疏風氣而探微候聽鳥鳴而識神機亦一代之奇也向使輅官達為宰相大臣膏腴流于明世華曜列乎竹帛使幽驗皆舉祕言不遺千載之後有道者必信而貴之無道者必疑而怪之信者以妙過真夫妙與神合者得神則無所惑也恨輅才長命短道貴時賤親賢遐潛不宣于良史而為鄙弟所見追述既自暗濁又從來久遠所載卜占事雖不識本卦捃拾殘餘十得二焉至于仰觀靈曜説魏晉興衰及五運浮沈兵革災異十不收一無源何以成河無根何以垂榮雖秋菊可採不及春英臨文慷慨伏用哀慚將來君子幸以高明求其義焉往孟荊州為列人典農嘗問亡兄昔東方朔射覆得何卦正知守宮蜥蜴二物者亡兄于此為安卦生象辭喻交錯微義豪起變化相推會于辰巳分別龍蛇各使有理言絶之後孟荊州長歎息曰吾聞君論精神騰躍殆欲飛散何其汪汪乃至于斯邪魏志管輅傳注輅見何晏何曰頃連夢青蠅數十來在鼻上驅之不肯去何也輅曰夫鼻者艮也天中之山而蠅集之位駿者危輕者亡後遂被誅御覽四百裴祗乞絶從弟耽喪服議祗表稱二叔放流鄭段不弟大義滅親至公之道然猶作鴟梟之詩成王封其子胡于蔡明王篤愛親親無已之意也今耽直由病喪神故有悖言非管蔡鄭段之元惡而祗等心棄引致不加痛傷于禮不喪于情不安通典一百一昔公孫敖為亂而亡襄仲猶帥兄弟而哭不廢親愛春秋所善也耽狂疾積年亡歿之後追論往意絶不為服竊所未安通典一百一劉維先王制禮因情而興五服之議以恩為主是以明親親之分正恩紀屬恩崇則制重意殺則禮降昔周公誅管蔡鄭伯克叔段皆正以王法不為親昵耽凶頑悖戾背義忘親存無歡接之恩絶無禮服之制循名責實不服當矣宜如祗所上通典一百一五服之制本乎親屬故賢不加崇愚不降禮昔公孫敖既納襄仲之妻又以幣奔莒至其卒也仲欲勿哭傳曰喪親之終也情雖不同無絶其愛親親之道也叛君為逆納弟妻為亂亂逆之罪猶不廢喪故胤子啓明而唐堯不繼象之傲狠有虞加矜周公戮弟義先王室鄭伯滅段傳不全與議者稱此皆非所據今諸侯絶周公族為戮然猶私喪之也喪禮大制動為典式與其必疑寧居于重通典一百一昔閼伯實沈親尋干戈而延于商夏朱象頑傲凶國害家然唐無絶姓之文虞有封庳之厚斯以重天性篤所承也周公刑叔罪在黨協祿父欲周之亡蓋為王室耳非以流言毀公為戮也召公猶懼天下未解特使兄弟之義薄乃作棠棣之詩以示恩親也耽以凶愚命卒骨肉所哀夫行過乎仁喪過乎哀未宜絶也通典一百一思舊賦并序思舊賦并序余與嵇康呂安居止接近其人並有不羈之才然嵇志遠而疏呂心曠而放其後各以事見法嵇博綜技藝于絲竹特妙臨當就命顧視日影索琴而彈之余逝將西邁經其舊廬于時日薄虞淵寒冰凄然鄰人有吹笛者發聲寥亮追思曩昔遊宴之好感音而歎故作賦云將命適于遠京兮遂旋反而北徂濟黃河以汛舟兮經山陽之舊居瞻曠野之蕭條兮息余駕乎城隅踐二子之遺迹兮歷窮巷之空廬歎黍離之愍周兮悲麥秀于殷墟惟古昔以懷今兮心徘徊以躊躇棟宇存而弗毀兮形神逝其焉如昔李斯受罪兮犬而長吟悼嵇生之永辭兮顧日影而彈琴託運遇于領會兮寄餘命于寸陰聽鳴笛之慷慨兮妙聲絶而復尋停駕言其將邁兮遂援翰而寫心文選藝文類聚三十四晉書本傳難嵇叔夜養生論難曰若夫節哀樂和喜怒適飲食調寒暑亦古人之所修也至于絶五穀去滋味寡情欲抑富貴則未之敢許也何以言之夫人受形于造化與萬物並存有生之最靈者也異于草木草木不能避風雨辭斤斧殊于鳥獸鳥獸不能遠網羅而逃寒暑有動以接物有智以自輔此有心之益有智之功也若閉而默之則與無智同何貴于有智哉有生則有情稱情則自然若絶而外之則與無生同何貴于有哉且夫嗜欲好榮惡辱好逸惡勞皆生于自然夫天地之大德曰生聖人之大寶曰位崇高莫大于富貴然富貴天地之情也貴則人順己以行義于下富則所欲得以有財聚人此皆先王所重關之自然不得相外也又曰富與貴是人之所欲也但當求之以道義在上以不驕無患持滿以損儉不溢若此何為其傷德邪或覩富貴之過因懼而背之是猶見食之有噎因終身不飧耳神農唱粒食之始后稷纂播植之業鳥獸以之飛走生民以之視息周孔以之窮神顏冉以之樹德賢聖珍其業歷百代而不廢今一旦云五縠非養生之宜肴醴非便性之物則亦有和羹黃耇無疆為此春酒以介眉壽皆虛言也博碩肥腯上帝是饗黍稷惟馨實降神祇神祇且猶重之而況于人乎肴糧入體不踰旬而充此自然之符宜生之驗也夫人含五行而生口思五味目思五色感而思室飢而求食自然之理也但當節以禮耳今五色雖陳目不敢視五味雖存口不得嘗以言爭而獲勝則可焉有勺藥為茶蓼西施為嫫母忽而不欲哉苟心識可欲而不得從性氣困于防間情志鬱而不通而言養之以和未之聞之也又云導養得理以盡性命上獲千餘歲下可數百年未盡善也若信可然當有得者此人何在目未之見此殆影響之論可言而不可得縱時有耆壽耇老此自特受一氣猶木之有松柏非導養之所致若性命以巧拙為長短則聖人窮理盡性宜享遐期而堯舜禹湯文武周孔上獲百年下者七十豈復疏于導養邪顧天命有限非物所加耳且生之為樂以恩愛相接天理人倫燕婉娛心榮華悅志服饗滋味以宣五情納御聲色以達性氣此天理之自然人之所宜三王所不易也今若舍聖軌而恃區種離親棄歡約已苦心欲積塵露以望山海恐此功在身後實不可冀也縱令勤求少有所獲則顧影尸居與木石為鄰所謂不病而自災無憂而自默無喪而疏食無罪而自幽追虛徼幸功不答勞以此養生未聞其宜故相如曰必若欲長生而不死雖濟萬世猶不足以喜言背情失性而不本天理也長生且猶無歡況以短生守之邪若有顯驗且更論之嵇中散集律議勗所造聲高高則悲夫亡國之音哀以思其民困今聲不合雅懼非德政中和之音必是古今尺有長短所致然今鐘磬是魏時杜夔所造不與勗律相應音聲舒雅而久不知夔所造時人為之不足改易世説術解篇注引晉諸公贊又略見御覽十六與姑書胡婢遂生胡兒世説任誕篇注引阮孚別傳上巳會賦臨清川而嘉宴聊暇日以遊娛蔭朝雲而為蓋託茂樹以為廬好修林之蓊鬱樂草莽之扶疏列四筵而設席兮祈吉祥于斯塗酌羽觴而交酬獻遐壽之無疆同歡情而悅豫欣斯樂之愷慷發中懷而弦歌託情志于宮商藝文類聚四北堂書鈔一百五十五初學記四御覽三十患雨賦景元二年余耕陽武之野在乎沙堆汴水之陽北堂書鈔一百五十七大鵬贊蹌蹌大鵬誕自北溟假精靈翔神化以生如雲之翼如山之形海運水擊扶搖上征翕然層舉背負太清志存天地不屑雷霆鷽鳩仰笑尺鷃所輕超世高逝莫知其情晉書阮修傳藝文類聚九十二御覽九百二十七
