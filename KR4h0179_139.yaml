body:
  text: 郭元祖列仙傳讚讚曰易稱太極是生兩儀兩儀生然後有人民有人民然後有生死生死之義著明矣蓋萬物施張渾爾而就亦無所不備焉神矣妙矣精矣微矣其事不可得一一論也聖人仰則觀象于天俯則觀法于地日月運行四時分治五星受制于太微監無道之國吉凶預見以戒王者動靜言語應效相通有自來矣夫然雖不言其變化云為不可謂之無也周書序桑蟜問涓子曰有死亡而復云有神仙者事兩成邪涓子曰言固可兩有耳孝經援神契言不過天地造靈洞虛猶立五嶽設三台陽精主外陰精主內精氣上下經緯人物道治非一若夫草木皆春生秋落必矣而木有松柏橿檀之倫百八十餘種草有芝英萍實靈沼黃精白符竹翣戒火長生不死者萬數盛冬之時經霜歷雪蔚而不凋見斯其類也何怪于有仙邪余嘗得秦大夫阮倉撰仙圖自六代迄今有七百餘人始皇好遊仙之事庶幾有獲故方士霧集祈祀彌布殆必因迹託虛寄空為實不可用信也若周公黃録記太白下為王公然歲星變為寧壽公等所見非一家聖人所以不開其事者以其無常然雖有時著蓋道不可棄距而閉之尚貞正也而論語云怪力亂神其微旨可知矣赤松子眇眇赤松飄飄少女接手翻飛泠然雙舉縱身長風俄翼元圃妙達巽坎作範司雨寧封子奇矣封子妙稟自然鑠質洪爐畼氣五煙遺骨灰燼寄墳寧山人覩其迹惡識其元馬師皇師皇典馬廄無殘駟精感群龍術兼殊類靈虬報德彌鱗銜轡振躍天漢粲有遺蔚赤將子輿蒸民粒食孰享遐祚子輿拔俗餐葩飲露託身風雨邈然矯步雲中可遊性命可度黃帝神聖淵玄邈哉帝黃暫蒞萬物冠名百王化周六合數通無方假葬橋山超升昊蒼偓佺偓佺餌松體逸眸方足躡鸞鳳走超騰驤遺贈堯門貽此神方盡性可辭中智宜將容成公亹亹容成專氣致柔得一在昔含光獨游道貫黃庭伯陽仰儔玄牝之門庶幾可求方回方回頤生隱身五柞咀嚼雲英棲身隙漠卻閉幽室重關自廓印改掩封終焉不落老子老子無為而無不為道一生死迹入靈奇塞兌內鏡冥神絶涯德合元氣壽同兩儀關令尹尹喜抱關含德為務挹漱日華仰玩玄度候氣真人介焉獨悟俱濟流沙同歸妙趣涓子涓老餌朮享茲遐紀九仙既傳三才乃理赤鯉投符風雲是使拊琴幽巖高棲遐峙呂尚呂尚隱釣瑞得赬鱗通夢西伯同乘入臣沈謀籍世芝髓鍊身遠代所稱美哉天人嘯父嘯父駐形年衰不邁梁母遇之歷虛啓會丹火翼輝紫煙成蓋眇企升雲抑絶華泰師門師門使火赫炎其勢乃豢虬龍潛靈隱惠夏王虐之神存質斃風雨既降肅爾高逝務光務光自仁服食養真冥遊方外獨步常均武丁雖高讓位不臣負石自沈虛無其身仇生異哉仇生靡究其向治身事君老而更壯灼灼容顏怡怡德量武王祠之北山之上彭祖遐哉碩仙時惟彭祖道與化新綿綿歷古隱淪玄室靈著風雨二虎嘯時莫我猜侮卭疏八珍促壽五石延生卭疏得之鍊髓餌精人以百年行邁身輕寢息中嶽遊步仙庭介子推王光沈默享年遐久出翼霸君處契玄友推祿讓勤何求何取遁影介山浪迹海右馬丹馬丹官晉與時汙隆事文去獻顯沒不窮密網將設從禮迅風杳然獨上絶迹玄宮平常生穀城妙匹譎達奇逸出生入死不恆其質玄化忘形貴賤奚恤質除塵汙終騰雲室陸通接輿樂道養性潛輝見諷尼父諭以鳳衰納氣以和存心以微高步靈嶽長嘯峨嵋葛由木可為羊羊亦可靈靈在葛由一致無經爰陟崇綏舒翼揚聲知術者仙得挑者榮江妃二女靈妃豔逸時見江湄麗服微步流盼生姿交甫遇之憑情言私鳴佩虛擲絶影焉追范蠡范蠡御桂心虛志遠受業師望載潛載惋龍見越鄉功遂身返屣脫千金與道舒卷琴高琴高晏晏司樂宋宮離世孤逸浮沈涿中出躍赬鱗入藻津清沖是任水解其樂無窮寇先寇先惜道術不虛傳景公戮之尸解神遷歷載五十撫琴來旋夷俟宋門畼意五絃王子喬妙哉王子神遊氣爽笙歌伊洛擬音鳳響浮丘感應接手俱上揮策青崖假翰獨往幼伯子周客戢容泯迹泥蟠夏服重纊冬振輕紈作不背本義不獨安乃眷周氏祐其艱難安期先生寥寥安期虛質高清乘光適性保氣延生聊悟秦始遺寶阜亭將遊蓬萊絶影清泠桂父偉哉桂父挺直遐畿靈葵內潤丹桂外綏怡怡柔顏代代同輝道播東南奕世莫違瑕丘仲瑕丘通玄謫脫其迹人死亦死泛焉言惜遨步觀化豈勞胡驛苟不覩本誰知其謫酒客酒客蕭綷寄沽梁肆何以標異醇醴殊味屈身佐時民用不匱解紱晨征莫知所萃任光上蔡任光能鍊神丹年涉期頤曄爾朱顏頃適趙子縱任所安升軌柏梯高飛雲端蕭史蕭史妙吹鳳雀舞庭嬴氏好合乃習鳳聲遂攀鳳翼參翥高冥女祠寄想遺音載清祝雞翁人禽雖殊道固相關祝翁傍通牧雞寄歡育鱗道洽棲雞樹端物之致化施而不刊朱仲朱仲無欲聊寄賈商俯窺驪龍捫此夜光發迹會稽曜奇咸陽施而不德歷世彌彰修羊公卓矣修羊韜奇含靈枕石大華餐茹黃精漢禮雖隆道非所經應變多質忽爾隱形稷丘君稷丘洞徹修道靈山鍊形濯質變白還年漢武行幸攜琴來延戒以升陟逆覩未然崔文子崔子得道術兼祕奧氣癘降喪仁心攸悼朱幡電麾神藥捷到一時獲全永世作效赤須子赤須去豐爰憩吳山三樂竝御朽貌再鮮空往師之而無使延顧問小智豈識巨年東方朔東方奇達混同時俗一龍一蛇豈豫榮辱高韻沖霄不羈不束沈迹五湖騰影暘谷鉤翼夫人婉婉弱媛廟符授鉤誕育嘉嗣皇祚惟休武之不達背德致仇委身受戮尸滅芳流犢子犢子山棲採松餌苓妙氣充內變白易形陽氏奇表數合理冥乃控靈犢倏若電征騎龍鳴騎鳴養龍結廬虛池專至俟化乘雲驂螭紆轡故鄉告以速移洞鏡災祥情眷不離主柱主柱同窺道士精徹玄感通山丹沙出穴熒熒流丹飄飄飛雪宕長悟之終然同悅園客美哉園客顧曄朝華仰吸玄精俯捋五葩馥馥芳卉采采文娥淑女宵降配德升遐鹿皮公皮公興思妙巧纏綿飛閣懸趣上挹神泉肅肅清廟愔愔二間可以閒處可以永年昌容殷女忘榮曾無遺戀怡我柔顏改華標蒨心與化遷日與氣鍊坐臥奇貨惠及孤賤溪父溪父何故欲在幽谷下臨青㵎上翳委蓐仙客舍之導以祕籙形絶埃壒心在舊俗山圖山圖抱患因毀致全受氣使身藥輕命延寫哀墳柏天愛猶纏數周高舉永絶俗緣谷春谷春既死停尸猶溫棺闔五稔端委于門顧視空柩形逝衣存留軌太白納氣玄根陰生陰生乞兒人厭其黷識真者稀纍見囚辱淮陰忘吝況我仙屬惡肆殃及自災其屋毛女婉孌玉姜與時遁逸真人授方餐松秀實因敗獲成延命深吉得意巖岫寄歡琴瑟子英子英樂水遊捕為職靈鱗來赴有煒厥色養之長之挻角傅翼遂駕雲螭超步大極服閭服閭遊祠三仙是使假寐須臾忽超千里納寶毀形未足多恥攀龍附鳳逍遙終始文賓文賓養生納氣玄虛松菊代御鍊質鮮膚故妻好道拜泣踟蹰引過告術延齡百餘商丘子胥商丘幽棲韞櫝妙術渴飲寒泉飢茹蒲朮吹竽牧豕卓犖奇出道足無求樂茲永日子主子主挺年理有所資寧主祠秀拊琴龍眉以道相符當與訟微匡事竭力問昭我師陶安公安公縱火紫炎洞熙翩翩朱雀銜信告時奕奕朱虬蜿然赴期傾城仰覿回首顧辭赤斧赤斧頤真發秀戎巴寓迹神祠澒鍊丹沙髮雖朱蕤顏曄丹葩采藥靈山觀化南遐呼子先三靈潛感應若符契方駕茅狗蜿爾龍逝參登太華自稱應世事君不端會之有惠負局先生負局神端披褐含秀術兼和鵲心託宇宙引彼萊泉灌此絶岫欲返蓬山以齊天壽朱璜朱璜寢瘕福祚相迎真人投藥三尸俱靈心虛神瑩騰贊幽冥毛赬髮黑超然長生黃阮丘蔥靄巖嶺實棲若人被裘散髮輕步絶倫含道養生妙觀通神發驗朱璜告遍下民女丸玄素有要近取諸身彭聃得之五卷以陳女丸蘊妙仙客來臻傾書開引雙發絶塵陵陽子明陵陽垂釣白龍銜鉤終獲瑞魚靈術是修五石溉水騰山乘虬子安果沒鳴鶴何求邗子邗子尋犬宕入仙穴館閣峨峨青松列列受符傳藥往來交結遂棲靈岑音響昭徹木羽司命挻靈産母震驚乃要報了契定未成道足三五輕駟宵迎終然報德久乃遐齡玄俗質虛影滅時惟玄俗布德神丸乃寄鹿贖道發河間親寵方渥騰龍不制超然絶足道藏本列仙傳
