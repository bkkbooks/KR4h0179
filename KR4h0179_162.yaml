body:
  text: 釋慧遠二沙門袒服論或問曰沙門袒服出自佛教是禮與答曰然問曰三代殊制其禮不同質文之變備於前典而佛教出乎其外論者咸有疑焉若有深致幸誨其未聞答曰玄古之民大朴未虧其禮不文三王應世故與時而變因茲以觀論者之所執方內之格言耳何以知其然中國飲所無或得之於異俗其民不移故其道未亡是以天竺國法盡敬於所尊表誠於神明率皆袒服所謂去飾之基者也雖記籍未流茲土其始似有聞焉佛出於世因而為教明所行不左故應右袒何者將辨貴賤必存乎位位以進德則尚賢之心生是故沙門越名分以背時不退己而求先又人之所能皆在於右若動不以順則觸事生纍過而能復雖中賢猶未得況有下於此者乎請試言言之夫形以左右成體理以邪正為用二者之來各乘其本滯根不拔則事求愈應而形理相資其道微明世習未移應微難辨袒服既彰則形隨事感理悟其心以御順之氣表誠之體而邪正兩行非其本也是故世尊以袒服篤其誠而間其邪使名實有當敬慢不雜然後開出要之路導真性於久迷令淹世之賢不自絶於無分希進之流不惑塗而旋步於是服膺聖門者咸履正思順異亦同軌緬素風而懷古背華俗以洗心尋本達變即近悟遠形服相愧理深其感如此則情化專向修之弗倦動必以順不覺形之自恭斯乃如來勸誘之外因斂粗之妙迹而衆談未喻或欲革之反古之道何其深哉弘明集五答何無忌難沙門袒服論敬尋問旨蓋是開其遠塗照所未盡令精粗並順內外有歸三復斯誨所悟良多常以為道訓之與名教釋迦之與周孔發致雖殊而潛相影響出處誠異終期則同但妙迹隱於常用指歸昧而難尋遂令至言隔於世典談士發殊塗之論何以知其然聖人因弋釣以去其甚順四時以簡其煩三驅之禮失前禽而弗吝網罟之設必待化而方用上極行葦之仁內匹釋迦之慈使天下齊己物我同觀則是合抱之一毫豈直有間於優劣而非相與者哉然自迹而尋猶大同於兼愛遠求其實則階差有分分外之所通未可勝言故漸慈以進德令事顯於君親從此而觀則內外之教可知聖人之情可見但歸塗未啓故物莫之識若許其如此則袒服之義理不容疑來告記謂宜更詳盡故復教敘本懷原夫形之化也陰陽陶鑄受左右之體昏明代運有死生之説人情咸悅生而懼死好進而惡退是故先王既順民性撫其自然令吉凶殊制左右異位由是吉事尚左進爵以厚其生凶事尚右哀容以毀其性斯皆本其所受因順以通教感於事變懷其先德者也世飲所貴者不過生存生存而屈伸進退道盡於此淺深之應於是乎在沙門則不然後身退已而不謙卑時來非我而不辭辱卑於自牧謂之謙居衆人之所惡謂之順謙順不失其本則日損之功易積出要之路可遊是故遁世遺榮反俗而動動而反俗者與夫方內之賢雖貌同而實異何以明之凡在出家者達患纍緣於有身不存身以息患知生生由於稟化不順化以求宗推此而言固知發軫歸塗者不以生纍其神超落世務者不以情纍其生不以情纍其生則生可絶不以生纍其神則神可冥然則向之所謂吉凶成禮奉親事君者蓋是一域之言耳未始出於有封有封未出則是玩其文而未達其變若然方將滯名教以徇生乘萬化而背宗自至順而觀得不日立乎漸世之與遺俗指存於此弘明集五明報應論問曰佛經以殺生罪重地獄斯罰冥科幽司應若影響余有疑焉何者夫四大之體即地水火風耳結而成身以為神宅寄生栖照津畼明識雖託之以存而其理天絶豈惟精粗之間固亦無受傷之地滅之既無害於神亦猶滅天地間水火耳又問萬物之心愛欲森繁但私我有己情慮之深者耳若因情致報乘惑生應則自然之迹順何所寄哉答曰意謂此二條始是來問之關鍵立言之津要津要既明則群疑同釋始涉之流或因茲以悟可謂朗滯情於常識之表發奇唱於未聞然佛教深玄微言難辨苟未統夫指歸亦焉能畼其幽致當為衣傍大宗試敘所懷推夫四大之性以明受形之本則假於異物託為同體生若遺塵起滅一化此則慧觀之所入智忍之所遊也於是乘去來之自運雖聚散而非我寓群形於大夢實處有而同無豈復有封於所受有係於所戀哉若斯理自得於心而外物未悟則悲獨善之無功感先覺而興懷於是思弘道目明訓故仁恕之德存焉若彼我同得心無兩對遊刃則泯一玄觀交兵則莫逆相遇傷之豈惟無害於神固亦無生可殺此則文殊案劍迹逆而道順則復終日揮戈措刃無地矣若然者方將託鼓舞以盡神運干鏚而成化雖功被猶無賞何罪罰之有邪若反此而尋其源則報應可得而明推事而求其宗則罪罰可得而論矣旨嘗試言之夫因緣之所感變化之所生豈不由其道哉無明為惑綱之淵貪愛為衆纍之府二理俱遊冥為神用吉凶悔吝惟此之動無明掩其照故情想凝滯於外物貪愛流其性故四大結而成形形結則彼我有封情滯則善惡有主有封於彼我則私其身而身不忘有主於善惡則變其生而生不絶於是甘寢大夢昏於同迷抱疑長夜所存惟著是故失得相推禍福相襲惡積而天殃自至罪成則地獄斯罰此乃必然之數無所容疑矣何者會之有本則理自冥對兆之雖微勢極則發是故心以善惡為形聲報以罪福為影響本以情感而應自來豈有幽司由御失其道也然則罪福之應惟其所感感之而然故謂之自然自然者即我之影響耳於夫主宰復何功哉請尋來問之要而驗之於實難旨全許地水火風結而成身以為神宅此即宅有主矣問主之居宅有情邪無情邪若云無情則四大之結非主宅之所感若以感不由主故處不以情則神之居宅無情無痛癢之知神既無知宅又無痛癢以接物則是伐卉翦林之喻無明於義若果有情四大之結是主之所感也若以感由於主故處必以情則神之安宅不得無痛庠之知神既有知宅又受痛癢以接物固不得同天地間水火風明矣因茲以談夫形神雖殊相與而化內外誠異渾為一體自非達觀孰得其際邪苟未之得則愈久愈迷耳凡稟形受命莫不盡然也受之既然各以私戀為滯滯根不拔則生理彌固受源不除則保之亦深設一理逆情使方寸迷亂而況舉體都亡乎是故同逆相乘共生讎隙禍心未冥則構怨不息縱復悅畢受惱情無遺憾形聲既著則影響自彰理無先期數合使然也雖欲逃之其可得乎此則因情致報乘感此應但立言之旨本異故其會不同矣問曰若以物情重生不可致喪則生情之由私戀之惑耳宜朗以達觀曉以大方豈得就其迷滯以為報應之對哉答曰夫事起必由於心報應必由於事是故自報以觀事而事可變舉事以責心而心可反推此而言則知聖人因其迷滯以明報應之對不就其迷滯以為報應之對也何者人之難悟其日固久是以佛教本其所由而訓必有漸知久習不可頓之廢故先示之以罪福罪福不可都忘故使權其輕重輕重權於罪福則驗善惡以宅心善惡滯於私戀則推我以通物二理兼弘情無所繫故能尊賢容衆恕己施安遠尋影響之報以釋往復之迷迷情既釋然後大方之言可曉保生之纍可絶夫生纍者雖中賢猶未得豈常智之所達哉弘明集五三報論經説業有三報一曰見報二日生報三曰後報見報者善惡始於此身即此身受生報者來生便受後報者或經二生三生百生千生然後乃受受之無主必由於心心無定司感事而應應有遲速故報有先後先後雖異咸隨所遇而為對對有強弱故輕重不同斯乃自然之賞罰三報之大略也非夫通才達識入要之明罕得其門降慈己還或有始涉大方以先悟為蓍龜博綜內籍反三隅於未聞師友仁匠習以移性者差可得而言請試論之夫善惡之興由其有漸漸以之極則有九品之論凡在九品非其見報之所攝然則現報絶夫常類可知類非九品則非三報之所攝何者若利害交於目前而頓相傾奪神機自運不待慮而發發不待慮則報不旋踵而應此見報之一隅絶夫九品者也又三業殊體自同有定報定則時來必受非祈禱之所移智力之所免也將推而極之財義深數廣不可詳究故略而言之相參懷佛教者以有得之世或有積善而殃集或有凶邪致慶此皆見業未就而前行始應故曰禎祥遇禍妖孽見福疑似之嫌於是乎在何以謂之然或有欲匡主救時道濟生民擬步高迹志在立功而大業中傾天殃頓集或有棲遲衡門無悶於世以安步為輿優遊卒歲或時來無妄運非所遇世道交淪於其間習或有名冠四科道在入室全愛體仁慕上善以進德若斯人也含沖和而納疾履信順而天年此皆立功立德之舛變疑嫌之所以生也大義既明宜尋其對對各有本待感而發逆順雖殊其揆一耳何者倚伏之契定於在昔冥符告命潛相回換故令禍福之氣交謝於六府善惡之報舛互而兩行是使事應之際愚智內惑謂積善之無慶積惡之無殃感神明而悲所遇天殃之於善人咸謂名教之書無宗於上遂使大道翳於小成以正言為善誘應求實必至理之無此原其所由由世典以一生為限不明其外其外未明故尋理者自畢於視聽之內此先王即民心而通其分以耳目為關鍵者也如今合內外之道以弘教之情則知理會之必同不惑衆塗而駭其異若能覽三報以觀窮通之分則尼父之不答仲由顏冉對聖匠而如愚皆可知矣亦有緣起而緣生法雖預入諦之明而遺愛未忘猶以三報為華苑或躍而未離於淵者也推此以觀則知有方外之賓服膺妙法洗心玄門一詣之感超登上位如倫匹宿殃雖積功不在治理自安消非三報之所及因茲而言佛經所以越名教絶九流者豈不以疏神達要陶鑄靈丹窮源盡化鏡萬象於無象於無象者也宏明集五廬山記山在江州潯陽南南濱宮亭北對九江九江之南為小江山去小江三十里餘左挾彭蠡右傍通州引三江之流而據其會山海經云廬江出三天子都入江彭澤西一曰天子障彭澤也山在其西故舊語以所濱為彭蠡有匡續先生者出自殷周之際遁世隱時潛居其下或云續受道於仙人而適遊其巖遂託室巖岫即巖成館故時人感其所止為神仙之廬而名焉其山大嶺凡有七重圓其周回垂五百里風雨之所據江山之所帶高巖仄宇峭壁萬尋幽岫穿崖人獸兩絶天將雨則有白氣先摶而纓絡於山嶺下及至觸石吐雲則倏忽而集或大風振巖逸響動谷群籟競奏其聲駭人此其化不可測者矣衆嶺中第三嶺極高峻人之所罕經也太史公東遊登其峰遐觀南眺五湖北望九江東西肆目若登天庭焉其嶺下半里許有重巖上有懸崖古仙之所居也其後有巖漢董奉復館於巖下常為人治病法多神驗病愈者令栽杏五株數年之間蔚然成林計奉在人間近三百年容狀常如三十時俄而升仙絶迹於杏林其北嶺兩巖之間常懸流遙霑激勢相趣百餘仞中雲氣映天望之若山有雲霧焉其嶺臨宮亭湖下有神廟即以宮亭為號其神安侯也亭有所謂感化缺七嶺同會於東共成峰崿其巖窮絶莫有升之者昔野夫見人著沙彌服淩雲直上即至則踞峰良久乃與雲氣俱滅此似得道者當時能文之士咸為之異又所止多奇觸象有異北背重阜前帶雙流所背之山左有龍形有右塔基焉下有甘泉涌出冷暖與寒暑相變盈減經水旱而不異尋其源出自於龍首也南對高峰上有奇木獨絶於林表數十丈其下似一層浮圖白鷗之所翔玄雲之所入也東南有香罏山孤峰獨秀起遊氣籠其上則氤氳若香煙白雲映其外則炳然與衆峰殊別將雨則其下水氣涌出如馬車蓋此龍井之所吐其左則翠林青雀白猿之所憩玄鳥之所蟄西有石門其前似雙闕壁立千餘仞而瀑布流焉其中鳥獸草木之美靈藥萬物之奇略舉其異而已耳自託託此山二十三載再踐石門四遊南嶺東望香罏峰北眺九江傳聞有石井方湖中有赤鱗踊出野人不能敘直歎其奇而已矣世説遊山記自託此山二十二載凡再詣石門四遊南嶺東望香罏秀絶衆形北眺九流凝神覽視四巖之內猶觀之掌焉傳聞有石井方湖足所未踐御覽四十一阿毗曇心序阿毗曇心者三藏之要頌詠歌之微言管統衆經領其宗會故作者以心為名焉有出家開士字曰法勝淵識遠鑒探深研機龍潛赤澤獨有其明其人以為阿毗曇經源流廣大難卒尋究非贍智宏才莫能畢綜是以探其幽致別撰斯部始自界品訖於問論凡二百五十偈以為要解號之曰心其頌聲也擬象天樂若靈籥自發儀形群品觸物有寄若乃一吟一詠狀鳥步獸行也一弄一引類乎情也情與類遷則聲隨九變而成歌氣與數合則音協律呂而俱作拊之金石則百獸率舞奏之管絃則人神同感斯乃窮音聲之妙會極自然之象趣不可勝言者矣又其為經標偈以泣本述本以廣義先弘內以明外譬由根而尋條可謂美發於中湯於四肢者也發中之道要有三焉一謂顯法相以明本二謂定已性於自然三謂心法之生必俱遊而同感俱遊必同於感則照數會之相因已性定於自然則達至當之有極法相顯於真境則知迷情之可反心本明於三觀則覩玄路之可遊然後練神達思水鏡六府洗心淨慧擬迹聖門尋相因之數即有以悟無推至當之極每動而入微矣罽賓沙門僧伽提婆少玩茲文味之彌久兼宗匠本正關入神要其人情悟所參已亦已涉其津矣會遇來遊因請令譯提婆乃手執梵本口宣晉言臨文誡懼一章三復遠亦寶而重之敬慎無違然方言殊韻難以曲盡儻或失當俟之來賢幸諸明哲正其大謬釋藏迹十又略見世説文學篇注三法度經序三法度經者蓋出四阿含四阿含則三藏之契經十二部之淵府也以三法為統以覺法為道開而當名變而彌廣法雖三焉而類無不盡覺雖一焉而智無不周觀諸法而會其要辨衆流而同其原斯乃始涉之鴻漸舊學之華苑也有應真大人厥號山賢恬思間宇智周變通感達識之先覺愍後蒙之未悟故撰此三法因而名云自德品暨於所依凡三章九真度斯其所作也其後有大乘居士字僧伽先以為山賢所集雖辭旨高簡然其文猶經故仍前人章句為之訓傳演散本文以廣其義顯發事類以弘其美幽讚之功於斯乃盡自茲而後道光於世其教行焉於是振錫趣足者仰玄風而高蹈禪思入微者挹清流而洗心高座談對之士擬之而後言博識淵有之賓由之而贍聞也有遊方沙門出自罽賓姓睢曇氏字僧伽提婆昔在本國豫聞斯道雅玩神趣懷佩以遊其人雖不親承二賢音旨而諷味三藏之遺言志在分德誨人不倦每至講論嗟詠有餘遠與同集勸令宣譯提婆於是自執梵經轉為晉言雖音不曲盡而文不害意依實去華務存其本自昔漢興逮及有晉道俗名賢並參懷聖典其中弘通佛教者傳譯甚衆或文過其意或理勝其辭以此考彼殆兼先典後來賢哲若能參通晉梵善譯方言幸詳其大歸以裁厥中焉釋藏迹十大智論鈔序夫宗極無為以設位而聖人成其能昏明代謝以開運而盛衰合其變是故知嶮易相推理有行藏屈伸相感數有往復由之以觀雖冥樞潛應圓景無窮不能均四象之推移一其會通況時命紛謬世道交淪而不深根固蒂寧極以待哉若達開塞之有運時來非由遇則正覺之道不虛凝於物表弘教之情亦漸可識矣有大乖高士厥號龍樹生於天竺出自梵種精誠曩代契心在茲接九百之運撫穨薄之會悲蒙俗之茫昧蹈險迹而弗吝於是卷陰衡門雲翔赤澤慨文明之未發思或躍而勿用乃喟然歎曰重夜方昏非螢燭之能照雖白日寢光猶可繼以朗月遂自誓落簪表容玄服隱居林澤守間行禪靖慮研微思通過半因而悟曰聞之於前論大方無垠或有出乎其外者俄而回步雪山啓神明以訴志將歷古仙之所遊忽遇沙門於巖下請質所疑始知有方等之學及至龍宮要藏祕典靡不管綜滯根既拔則名冠道位德備三忍然後開九津於重淵朋鱗族而俱遊學徒如林英彥必集由是外道高其風名士服其致大乘之業於茲復隆矣其人以般若經為靈府妙門宗一之道三乘十二部由之而出故尤重焉然斯經幽奧厥趣難明自非達學鮮得其歸故敘天體統辨其深致若意在文外而蘊於辭輒寄之寡主假自疑以起對名曰問論其為要也發軫中衢啓惑智門以無當為實無照為宗無當則神凝於所趣無照則智寂於所行寂以行智則群邪革慮是非息焉神以凝趣則二諦同軌玄轍一焉非夫正覺之靈撫法輪而再轉孰能振大業於將穨紐遺綱之落緒令微言絶而復嗣玄音輟而復詠哉雖弗獲與若人並世叩津問道至於研味之際未嘗不一章三復欣於有遇其中可以開蒙朗照水鏡萬法固非常智之所辨請略而言生塗兆於無始之境變化構於倚伏之場咸生於未有而有滅於既有而無推而盡之則知有無回謝於一法相待而非原生滅兩行於一化映空而無主於是乃即之以成觀反鑒以求宗鑒明則塵纍不止而儀像可覩觀深則悟徹入微而名實俱玄將尋其要必先於此然後非有非無之談方可得而言嘗試論之有而在有者有於有者也無而在無者無於無者也有有則有無無則非無何以知其然無性之性謂之法性法性無性因緣以之生生緣無自相雖有而常無常無非絶有猶火傳而不息夫然則法無異趣始未淪虛畢竟同爭有無交歸矣故遊其奧者心不待慮智無所緣不滅相而寂不修定而間非神遇以期通焉識空空之為玄斯其至也斯其極也過此以往莫之或知又論之為體位始無方而不可詰觸類多變而不可窮或開遠理以發興或導近習以入深或闔殊塗於一法而弗雜或闢百慮於同相而不分此以絶夫壘瓦之談而無敵於天下者也爾乃博引衆經以贍其辭暢發義音以弘其美美盡則智無不周辭博則廣大悉備是故登其涯而無津挹其流而弗竭汪汪焉莫測其量洋洋焉莫比其盛雖百川灌河未足語其辨矣雖涉海求源未足窮其邃矣若然者非夫淵識曠度孰能與之潛躍非夫越名反數孰能與之淡漠非夫洞幽入冥孰能與之沖泊哉有高座沙門字曰童壽宏才博見智周群籍玩服斯論佩之彌久雖神悟發中必待感而應於時秦主姚王敬樂大法招集名學以隆三寶德洽殊俗化流西域是使其人聞風而至既達關右即勸令宣譯童壽以此論難卒精究因方言易省故約本以為百卷計所遺落殆過參倍而文藻之士猶以為繁咸纍於博罕既其實譬大羹不和雖味非珍神珠內映雖寶非用信言不美固有自來矣若遂令正典隱於榮華玄朴虧於小成則百家競辨九流爭川方將幽淪長夜背日月而昏逝不亦悲乎於是靜尋所由以求其本則知聖人依方設訓文質殊體故以文應質則疑者衆以質應文則悅者寡是以化行天竺辭朴而義微言近而旨遠義微則隱昧無象旨遠則幽莫尋故令玩常訓者牽於近習束名教者惑於未聞若開易進之路則階藉有由曉漸悟之方則始涉有津遠於是簡繁理穢以詳其中令質文有體義無所越輒依經立本繫以問論正其位分使類各有屬謹與同止諸僧共別撰以為集要凡二十卷雖不足增暉聖典庶無大謬如其未允請俟來哲釋藏迹十廬山出修行方便禪經統序夫三業之興以禪智宗雖精粗異分而階藉有方是故發軫分逵塗無亂轍革俗成務功不待積靜復所由則幽緒告微淵博難究然理不云昧庶旨統可尋試略而言禪非智無以窮其寂智非禪無以深其照然則禪智之要照寂之謂其相濟也照不離寂寂不離照感則俱遊應必同趣功玄在於用交養於萬法其妙物也運群動以至臺而不有廓大象於未形而不無無思無為而無不為是故洗心靜亂者以之研慮悟徹入微者以之窮神也若乃將入其門機在攝會理玄數廣道隱於文則是阿難曲承音詔遇非其人必藏之靈府何者心無常規其變多方數無定像待感而應是故化行天竺緘之有匠幽關莫開罕窺其庭從此而觀理有行藏道不虛授良有以矣如來泥洹未久阿難傳其共行弟子末田地末田地傳舍那婆斯此三應真咸乘至願冥契於昔功在言外經所不辨必暗軌元匠孱焉無差其後有優波崛弱而超悟智絶世表才高應寡觸理從簡八萬法藏所存唯要五部之分始自於此因斯而推固知形運以廢興自兆神用則幽步無迹妙動難尋涉粗生異可不慎乎可不察乎自茲已來感於事變懷其舊典者五部之學並有其人咸懼大法將穨理深共慨遂各述讚禪經以隆盛業其為教也無數方便以求寂然寂乎唯寂其揆一耳而尋條求根者衆統本運末者寡或將暨而不至或守方而未變是故經稱滿願之德高普事之風原夫聖旨非徒全其長亦所以救其短若然五部殊業存乎其人人不繼世道或隆替廢興有時則互相升降小大之目其可定乎又達節善變出處無際晦名寄迹無聞無示若斯人者復不可以名部分既非名部之所分亦不出乎其外別有宗明矣每慨大教東流禪數尤寡三業無統斯道殆廢頃鳩摩耆婆宣馬鳴所述乃有此業雖其道未融蓋是為山於一簣欣時來之有遇感寄趣於若人捨夫制勝之論而順不言之辨遂誓被僧那以至寂為已任懷德未忘故遺訓在茲其為要也圖大成於未象開微言而崇體悟惑色之悖德杜六門以寢患達忿競之傷性齊彼我以宅心於是異族同氣幻形告疏入深緣起見生死際爾乃闢九關於龍津超三忍以登位垢習凝於無生形纍畢於神化故曰無所從生靡所不生於諸所生而無不生今之所譯出自達摩多羅與佛大先其人西域之俊禪訓之宗搜集經要勸發大乘弘教不同故有詳略之異達摩多羅闔衆篇於同道開一色為恆沙其為觀也明起不以生滅不以盡雖往復無際而未始出於如故曰色不離如如不離色色不離如色則是如如不離色如則是色佛大先以為澄源引流固宜有漸是以始自二道開甘露門釋四義以反迷啓歸塗以領會分別陰異導以止觀畼散緣起使優劣自辨然後令原始反終妙尋其極其極非盡亦非所盡乃曰無盡入於無盡法門非夫道冠三乘智通十地孰能洞玄根於法身歸宗一於無相靜無遺照動不離寂者哉庾伽遮羅浮迷譯言修行道地釋藏榮七題作達摩多羅禪經序無作序人名又見迹九以為釋慧遠作念佛三昧詩集序夫稱三昧者何專思寂想之謂也思專則志一不分想寂則氣虛神朗氣虛則智恬其照神朗則無幽不徹斯二者自然之元符會一而致用也是故靖恭間宇而感物通靈御心惟正動必入微此假修以凝神積習以移性猶或若茲況乎尸居坐忘冥懷至極智落宇宙而暗蹈大方者哉請言其始菩薩初登道位甫窺元門體寂無為而無弗為及其神變也則令修短革常度巨細互相違三光回景以移照天地卷而入懷矣又諸三昧其名甚𦋯功高易進念佛為先何者窮元極寂尊號如來體神合變應不以方故令入斯定者昧然忘知即所緣以成鑒鑒明則內照交映而萬像生焉非耳目之所暨而聞見行焉於是覩夫淵凝虛鏡之體而悟相湛一清明自然察夫元音之叩心聽則塵纍每消滯情融朗非天下之至妙孰能與於此哉以茲而觀一覿之感乃發久習之流覆豁昏俗之重迷若以匹夫衆定之所緣固不得語其優劣居可知也是以奉法諸賢咸思一揆之契感寸陰之頽影懼來儲之未積於是洗心法堂整襟清向夜分忘寢夙宵惟勤庶夫貞詣之功以通三乘之志臨津濟物與九流而同往仰援超步拔茅之興俯引弱進垂策其後以此覽衆篇之揮翰豈徒文詠而已哉廣弘明集三十九襄陽丈六金像頌并序并序襄陽丈六金像頌昔衆祐降靈出自天竺託化王宮興於上國顯迹重冥開闢神路明暉宇宙光宅大千萬流澄源圓映無主覺道虛凝湛焉遺照於是乘變化以動物而衆邪革心跬神步以感時而群疑同釋法輪元運三乘並轍道世交興天人攸夢淨音既畼逸響遠流密風遐扇遠生善教末年垂千祀徒欣大化而運乖其會勿獲叩津沙門發明淵極魍魎神影餐服至言雖欣味餘塵道風遂邁擬足逸步元迹已邈每希想光晷髣佛容儀寤寐興懷若形心目冥應有期幽情莫發慨焉自悼悲憤靡寄乃遠契百念慎敬慕之思追述八王同志之感魂交寢夢而情悟於中遂命門人鑄而像焉夫形理雖殊階塗有漸精粗誠異悟亦有因是故擬狀靈範啓殊津之心儀形神模闢百慮之會使懷遠者兆元根於來葉存近者遘重劫之厚緣乃道福兼宏真迹可踐三源反流九神同淵於時四輩悅情道俗齊趣迹響和應者如林鑄均有虛室之供而進助者不以纖毫為挫勸佐有彌劫之勤而操務者不以昏疲告勞因物任能不日而成功自人事猶天匠焉夫明志莫如詞宣德莫如頌故志以詞顯而功業可存德以頌宣而形容可像匪詞匪頌將何美焉乃作頌曰堂堂天師明明遠度淩邁群萃超然先悟慧在恬虛妙不以數感時而興應世成務金顏映發奇相暉布肅肅靈儀峨峨神步茫茫造物元運冥馳偉哉釋迦與化推移靜也淵默動也天隨綿綿遠御亹亹長靡反宗無像光潛影離仰慕千載是擬是儀廣弘明集十六曇無竭菩薩讚亹亹大匠道玄數盡譬彼大壑百川俱引涯不俟津塗不旋軫三流開源於焉同泯初學記二十三萬佛影銘并序萬佛影銘并序夫滯於近習不達希世之聞撫常永日罕懷事外之感是使塵想制於玄襟天羅網其神慮若以之窮齡則此生豈遇以之希心則開悟靡期於是發憤亡食情百其慨靜慮間夜理契其心爾乃恩霑九澤之惠三復無緣之慈妙尋法身之應以神不言之化化不以方唯其所感慈不以緣冥懷自得譬日月麗天光影彌輝群品熙榮有情同順咸欣懸映之在己罔識曲成之攸寄妙物之談功盡於此將欲擬夫幽極以言其道髣佛存焉而不可論何以明之法身之運物也不物物而兆其端不圖終而會其成理玄於萬化之表數絶乎無形無名者也若乃語其筌寄則道無不在是故如來或晦先迹以崇基或顯生塗而定體或獨發於莫尋之境或相待於既有之場獨發類乎形相待類乎影推夫冥寄為有待邪為無待邪自我而觀則有間於無間矣求之法身原無二統形影之分孰際之哉而今之聞道者咸摹聖體於曠代之外不悟靈應之在茲徒知圓化之非形而動止其迹豈不誣哉昔尋先師奉侍歷載雖啓蒙慈訓託志玄籍每想奇聞以篤其誠遇西域沙門輒餐遊方之説故知有佛影而傳者尚未曉然及在此山值罽賓禪師南國筆學道士與昔聞既同並是其人遊歷所經因其詳問乃多有先微然後驗神道無方觸像而寄百慮所會非一時之感於是悟徹其誠應深其信將援同契發其真趣故與夫隨喜之賢圖而銘焉廓矣大像理玄無名體神入化落影離形回暉層巖凝映虛亭在陰不昧處暗愈明婉步蟬蛻朝宗百靈不同方迹絶兩冥其一茫茫荒字靡勸靡獎談虛寫容拂空傳像相具體微沖姿自朗白毫吐曜昏夜中爽感徹乃應扣誠發響留音停岫津悟冥賞撫撫之有會功弗由曩其二旋踵忘敬罔慮罔識三光掩暉萬象一色庭宇幽藹歸塗莫測悟之以靜震之以力慧風雖遐維塵攸息匪伊玄覽孰扇其極其三希音遠流乃眷東顧欣風慕道仰規玄度妙盡毫端運微輕素託彩虛凝殆映霄霧迹以像真理深其趣奇興開襟祥風引路清氣回於軒宇昏明交而未曙髣佛鏡神儀依俙若真遇其四銘之圖之曷營曷求神之聽之鑒爾所修庶茲臣軌映彼玄流漱情靈沼飲和至柔照虛應簡智落乃周深懷冥託霄想神遊畢命一對長謝百憂其五晉義熙八年歲在壬子五月一日共立此臺擬像本山因即以寄誠雖成由人匠而功無所加至於歲次星紀赤奮若貞於太陰之墟九月三日乃詳檢別記銘之於石爰自經始人百其誠道俗欣之感遺迹以悅心於是情以本應事忘其勞於時揮翰之賓僉焉同詠咸思存遠猷託相異聞庶來賢之重軌故備時人於影集大通之會誠非理所期至於佇襟遐慨固已超夫神境矣廣弘明集十六又高僧傳六有銘無序澡灌銘序得摩羅勒石澡灌一枚故以此銘答之北堂書鈔百三十五
