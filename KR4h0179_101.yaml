body:
  text: 卷一百零一陸雲九愍昔屈原放逐而離騷之辭興自今及古文雅之士莫不以其情而玩其辭而表意焉遂廁作者之末而述九愍修身裔皇聖之豐祐膺萬乘之多福真龍暉以底載啟元辰而誕育考度中以錫命端嘉令而自肅蘭情馥以芬香瓊懷皎其如玉希千載以遙想昶遠思而自怡範方地而式矩儀穹天而承規結丹款於璇璣協朱誠於四時咨中心之信修佩日月以為旗悲年歲之晚暮殉脩名而競心仰勳華之耿暉詠三辟之遐音握遺芳而自玩挹浩露於蘭林陰雲紛以興靄飆風起而回波黨朋淫以惡美疾傾宮之楊娥樹椒蘭於瑤圃掩夜光於瓊華遘貞心以誰忒毀玉質而蒙瑕甘莠言而棄予忽遐放其若遺瞻前軏而我先顧後乘而駕遲遵荒塗而伏軾撫鳴鸞而稱悲感瞻烏之有集嗟離瘼之焉歸靜沉思以自瘁願凌雲而天飛涉江逢天怒而離紛遘時咎於惟塵端周誠以恪居祗後命而自寅悲讒口之罔極高離情於參辰豈三錫之又晞乃裔予於遐賓運羽櫂以涉江浮鄂渚而駕言背夏首以窘逝兮泝行川而永歎結風回而薄水兮源波榮而重瀾情懷眷以疊結舟淹流而中盤昶愁心以自邁肅榜人而曾驅詔河馮以清川命湘娥而安流濟南詔以佇望野蕭條而振疇獸悲號以命旅鳥狂顧而鳴仇悲我行之悠悠怨同懷之莫求發辰陽而往彼緣湘沅而來假亦芳樹於縣車秣梁苗於樊馬山嵩高以藏景雲晻靄而荒野鳥拊翼於甍巔水回波於宇下指明星以脈路景即陰而無旅隨長川以問津響脩聲而和予聽歸音以自聞踐無迹以窮處雖遘愍之既多亦顛沛其何侮仰眾芳之遺情希絕風之延佇亂曰有烏翻飛集江湘兮彼美一人莫予將兮念茲涉江懷故鄉兮生日何短慼日長兮顧我愁景惟永傷兮悲郢積沉毒於苦心魂憑虛以飄蕩形息景於重陰虎鳴飆以拂谷螭回雲而結林操土音以懷郢涕頻代而盈襟辭終古之舊墟託茲邦而遙集望龍門而屢顧攀惟桑而祗泣悲愁心之難狀振枯形而獨立撫彫容之日頹怊炯思而弗及聞先黎之達教固積善於遺慶晞明休而受言想介福之保定靡心貞以祗服泝大順而委命君在初之嘉惠每成言而永日怨谷風之攸歎彌九齡而未徹願自獻於承間悲黨人之造膝舒幽情其曷訴卷永懷而淹恤嗟哲士之足歎傷邦家之殄瘁痛靈脩之匪懷頹九成於一匱忘大寶之勿假輕挈瓶之守器仰剪翮於凌霄俯歸飛於矰罻毀方城於秦川投江漢於泥渭悲彼黍之在郢悼宗楚之莫餼撫傷心以告哀將斯情之孰慰行吟登高山以遐望悲悠處之淹流豈大川之難濟悲利涉之莫由申脩誠以底節反內鑒而自求考余心其焉可往稽度於神謀訪斯言以卜居想貞龜以告猷將矯翼而塗險思振清而世濁羌釋筴而評子諒不疑其何卜朝彈冠以晞髮夕振裳而濯足有懷沙以赴淵無抱素而蒙辱愁纏綿以宅心長歎息而飲淚步江潭以彷徉頻行吟而含瘁遇漁父之戾止興讜言而來憩雖懷芳而握瑜懼惟塵之我穢顧虛景而端形矧同波於其醉迨伊人之逍遙聊仰葉於林側懷達心以遠寤怡哀顏而表色仰班荊之遺情想嘉訊而良食若有言而未吐勿棄予而凌波揮龍榜以鼓汰遺芬響而清歌俟滄浪之濯纓悲余壽之幾何愧褊心之歎渝恨爾謁之莫和捐江魚之言志營玄寢於汨羅苟懷忠而死節豈有生之足嘉紆思悲怨思之多感情惆悵而遠慕世玄黃而既渝心居貞而抱素冀斯氣之一清要佳人於天路考年載以遲之悲歲聿之已暮攬豐草於朝日思先晞於湛露規法圓而天象矩則方於地形祗信順以自範邀式穀於神聽悲登魂之無抗訊貞夢而遌靈悔相道而懷顧悲實蕃之已盈頓椒丘而息駕振初服而翱翔結瓊蕤之芳襟襲凌華之藻裳懷瑤林之珍秀握蘭野之芳香命巫咸以啟期訪百神而考祥靖永言以聽命欽靈誶而肅邁振華冕之玉藻樹象軒之高蓋率假翼以鳴和霓揮景而縈旆芳塵穆以煙熅彤雲起而深藹遊八極以大觀解飛轡以長想將結軏而世狹願援楫而川廣雖我服之方壯思振策其安往舒遠懷以弭節褰世羅於天網亂曰猗猗芳草殖山阿兮朝日來照發豐華兮秋風蕭瑟凝霜加兮傾葉懷春猶俟河兮考志徧周流而無過悲窮思之永久聽幽荒而罔詔眷寥廓而無友沉流液於繩樞逝回飆於甕牖呼寂寞而靡應攬虛無其何有神悠悠而永念憂綢繆而盈室哀惻心而響起時棄予而景逸招逝運其難徵儀遺範而無律雖芳林之將焚豈蘭響之可謐晞馥風於曠野思同芬而靡質命險太其靡常道離隆而匪易紆幽情而思古援在昔而立辟俟重華以同遊悲瑤圃之難適舟登陸其焉濟輪涉淵而無迹悲荒塗之既舛臨遵渚而投策欲隨波以周流恨匪石之難頹將從風而卷舒悲直矢之辭懷貞朗志而玉折厲勁心而蘭摧喟我懷以寤歎闡前鑒而自融忠與邪其莫可豈余命之所窮俯投迹而世洿仰晞志而道隆恥蒙垢於同塵思振揮於別風明爽心以畢志考吾道以自終感逝天機偏其挺蓋玉衡運而回襄景彌脩而日短時愈促而夜長和音變而改律乘風革而為商感秋林之夙暮悲芳草之中霜存攸忽而風過逝揮霍而雲散方輕焱而炯遲比收電而景宴將愉樂以夙興迢良日於昧旦痛予生之不辰逢此世之多難將譪藹而未颺世渾渾其難澄風頹山以離谷波平淵而為陵道曠世而朴散化固滯而物凝恨輶德以莫舉悲民鮮之孰勝景照明以妙見音振響而攄聞金淬堅以示斷芑靡質而效芬罄貞規以殉節反蒙謫於朋群咨小心以惴惴悲江草之芸芸亂曰浮雲晻藹天明息兮矰羅重設鳳矯翼兮梧桐逝矣樹榛棘兮思我芳林喟歎息兮征哀時命之險薄懷斯類以結憂手拊膺而永歎形顧景而長愁生遺年而有盡居靜言其何須將輕舉以遠覽眇天路而高遊結垂雲之翠虬駕琬琰之玉輿揮采旄以煙指靡華旌而電舒命日月以清天吾將遊乎九閡命屏翳以夕降式飛廉以朝興塗蒙雨而後清景貞暉而先登陪湘妃於彫輅列漢女以後乘瓊娥起而清嘯神風穆其來應騑憑雲而響駭驂噓天而景凌望紫微以振策坍太階而遂升飛芝蓋之翼翼回雲車之轔轔朝總轡於扶桑夕飲馬於天津伐河鼓以解微迄昆崙而凱振軌凌虛而遺迹塵蒙颷而絕輪豈遠遊之無樂懷故都而傷情靡龍首以還顧轉瑤衡而回縈泝凱風以流盻悲舊邦之穢傾眷南雲以興悲蒙東雨而涕零凌百川而絕蹈仰濯髮於崢嶸豈沉瘁之足弭將蟬蛻於長生痛世路之隘狹詠遂古而長悲鏡端形於三接照直影於太微祗中懷以眷慕豈鑒寐而忘歸悼天朝之遂晦構貝錦於繁文侈南箕以鼓物藹清陽而播芬迹同塵而壤絕景和光而天分俯隕息於縈波仰頹歎而崩雲折若華以翳日時靡靡而難停飡秋菊以卻老年冉冉其既盈欲假翼以天飛怨曾飆之我經思戢鱗以遁沼悲沉網之在淵有河清而志得挫千載之長年擠哀響於頹風寓悲音於絕弦嗟有生之必死固逸我以自休彼達人之遺物甘褰裳而赴流矧余情之沉毒資有生以速憂悼居世其何慼固形存其為尤想百年之促期悲樂少而難多脩與短其足吝曷久沉於汨羅投瀾漪而負石涉清湘以懷沙臨恒流而自墜蒙濬壑之隆波接申胥於南江鼓冕雲以攜手仰接景而登遐國起西園第表啟宜遵節儉制國起西園第表啟郎中令臣雲言伏見西園大營第室雖未審節度豐儉之制然用功甚嚴竊懼事不得濟愚臣管見輒敢瞽言臣竊見世祖武皇帝臨朝淵嘿訓世以儉即位二十有六載宮室臺榭無所新營屢發明詔厚戒豐奢國家纂承務在遵奉而世俗凌遲家競盈溢漸漬波蕩遂已成風雖嚴詔屢宣而侈俗滋廣每觀詔書眾庶嘆息清河王昔起墓宅未及極偉時手詔追述先帝節儉之教懇切之旨刑于四海清河王毀壞城宅以奉詔命海內聽望咸用憮然臣慮以先帝遺教日以凌替聖上憂勤猶未之振今與國家協崇大化追闡前蹤者實在殿下先敦素朴而後可以訓正四方示民知禁竊謂第室之設可使儉而不陋凡在崇麗一宜節之以制然後上厭帝心下允民望且自閒制國之用事從節省而方於此時大造第宅又非聖意從簡之旨臣以凡才殿下不以其駑闇特蒙拔擢將以臣能有狂夫之言可以裨補聖德臣自奉職已來亦思竭忠效節以報所受之施是以不慮犯逆敢陳所懷如愚臣言有可采乞垂三省臣雲言間一日敢獻瞽言以干聞聽天恩未加咎責猥發明令臣伏誦聖旨奉用歎息臣聞有國者不患宮室之不崇患在令名之不立是以賢人之在富貴莫不卑身節欲損己挹情能保其國家令聞百世歷觀古今以約失之者實寡以奢失之者蓋眾非天下之至德孰能居豐行儉在富能貧清儉節素自殿下家道此所以懷集四方而使兆民服者也世祖武皇帝富有四海貴為天子居無離宮之館身御家人之服先帝豈欲以此道止於治身而已者哉固將必欲遺訓百世貽燕子孫比固殿下所宜祗奉也昔淮南太妃當安厝臣兄比下墨機時為郎中令從行太妃令追稱先帝養生送終事從節儉今宜奉用遺制不事豐厚令旨懇切言歸于約清河昔起墓宅發手詔又還毀朝野之論于今未已竊以西園第宅用功方嚴雖知聖德節儉有素猶復思關愚言以補萬一亦臣繾綣微忠昊天罔極之誠也至被明令聖旨炳然嘉承至道奉以稱慶不勝下情謹疏以聞西園第既成有司啟觀疏諫不可西園第既成有司啟郎中令臣云言臣前啟西園第宅宜遵先帝節儉之制不宜使至豐麗被命優隆言歸謙素臣奉以欣憙而聞屋宇之制既自崇侈竊聞當復起觀六間既非前令之旨且臣亦竊用不安臣聞詩云昊天有成命二后受之成王不敢康今四祖創基既垂成命哲王繼體世祖恭儉殿下承之固宜奉不寧而自昔造第過度民歎其勞瘁士譏其過尤謗言未弭而又加以崇侈此誠不可不惜先帝背世曾未十年而儉德之亡國為其首此又所以慷慨酸心而不敢不盡狂夫之諫者也按晉魏以來諸侯奢靡第室滋廣未有如國今日之甚者也古人之戒猶云無為福始況今猶崇豐侈作為禍先此又臣所以寤寐憂歎忘寢與食者也殿下誕應運期首建大國固將憲章令典貽範萬世始基之制不可不慎今設為豐奢以示將來子孫象之又何以能國且先帝勤家如彼其素殿下承之若此其泰進傷奉國之典退虧隆家之業用之當身損盛德之譽垂之後嗣非興邦之制一舉而失四得此古人之所以長太息者也且第宅之過朝野所譏而監司結舌莫敢明言者實以殿下國之昵親朝所欽重故隱司過之鋒結執憲之繩耳後世直臣必將信威明法考制度禮愚以此觀有必毀之理苟此物不可終然誠不如不為使其無毀也今空設過制之物而終為直士之資臣又未見其可也唯殿下思愚臣之言時命有司必省此舉手懽遌伏用流汗王即位未見賓客群臣又未講啟宜饗宴通客及引師友文學觀書問道王即位未見賓客群臣又未講啟宜饗宴通客及引師友文學觀書問道郎中令臣雲言聞古之君子既盛德在身又外求諸物是以廣納俊士博觀載籍朝夕師傳夙夜勤禮賓友嘉客講義於前往古來今日聞于耳故知積德廣而流芳罔極伏惟殿下天資聰叡應期挺秀聖敬敷聞輝光日新即位已來仍遭不造大禮雖闋哀故滋有賓客無接覲之宴師友闕講誦之禮愚臣所以寤寐永歎而私懷慷慨者也愚以宜發通客之令使朝士有接見之緣又可時與師友文學披觀文籍坐而論道非學無以聞義非士無以行禮禮義既舉群望允塞此臣下所以拭目思德音之發者也臣區區所懷敢以聞令多喪故乃初未與群官會同比當請師友文學內外官屬也臣雲言臣前啟可與師友文學觀書論道今又天時清適正是講誦之日臣聞崇山之高不厭其峻滄海之量無限於廣是以周公一日萬事猶復旁觀百篇孔子假期玩年至於韋編三絕由是言之雖聖之弘亦不能不求之於學也伏惟殿下明德光邵天資秀朗方當光演文武允迪皇猷如復垂精古今之奧仰覽千載之籍則神道叡知無物不照且師友文學朝選於眾以德來教雖豐祿崇禮已隆其人而先王之道未簡聖聽在位累載官廢其職每聽其言亦懷慷慨臣以可於良日就講經學先闡大道永播芳風愚臣區區敢獻瞽言輿駕比出啟宜當入朝與輿駕比出啟宜當入朝郎中令臣雲言殿下自即第日來既仍多哀故聖體亦恒不安和自不朝見二宮已經年載前既比造趙軹近又自表出城至五日問訊輒以疾聞臣切所未安愚以此五日輿駕宜入朝臣聞事君之道苟在盡規知無不為是以愚臣敢獻瞽盲言事者啟使部曲將司馬給事覆校諸官財用出入啟宜信君子而遠小人言事者啟使部曲將司馬給事覆校諸官財用出入啟宜信君子而遠小人郎中令臣雲言伏見令書以部曲將李咸馮南司馬吳定給事徐泰等覆校諸官市買錢帛簿率日決咸南等治書以下無所復司而察錢帛重寶奸吏多情出入之用誠宜使虛實當法以防檢巧偽然臣愚以聖德龍興光有大國選眾官材庶工肄業臣以虛薄忝竊朝右雖質弱任重無益補察至於奉己思勤昊天罔極中尉該大農誕皆清德淑慎恪居所司次至眾官悉州閭一介蹀闇之咎雖可日聞至於處義用情庶無大戾今咸南軍旅小人定泰士卒厮賤非有清慎素著忠公足稱今猥使此等任以覆校大臣所關猶謂未詳咸等督察然後得信既非開國勿用之義又傷殿下推誠納下曠蕩之量雖使咸能盡節益國使功利百倍至於光輔國美猶未若開懷信士之無失況咸等所益不過姑息之利而名使小人用事大道凌替此臣所以慷慨也亂之所興在於小人得親治之所廢在於君子自替廢興治亂由此而已臣備位大臣職在獻可苟有管見敢不盡規以愚宜發明令必罷此等覆察眾士一付治書則無外之度照光遠大信臨下人思盡節矣謹隨啟以聞國人兵多不法啟宜峻其防以整之國人兵多不法啟宜峻其防以整之郎中令臣雲言國人兵於橫多行非法至使暴及市道聲聞京邑親信兵乃駡詈洛陽市丞遠近囂然聲論日廣而主者前復所報每蒙寬宥故群小敢肆其暴虐前輿駕當東時臣具以奏聞上立節度亦備嚴上下司察念在奉宣而親信卒泰矯稱突關強市民物至使行道哀窮路人歎惋臣下祗命幸使罪人時獲僉以泰宜加重戮以戒肅方來軍都督李嬰行實奸穢然身備王人雖不致法猶加捶楚主者奏泰依嬰決罰事寢不出而特令原泰泰之凶狡罰至大辟至於今日不蒙薄罰臣切以自今群醜虎視競為暴虐矣小人得志則下凌上替前卿顯言事大農文旨倨傲反成卻安功名之士議在不辱而顯等恃恩敢行侮慢臣時列啟并呈顯言事事寢不省是以自來拱嘿未敢多言而切見國法日侈而恩宥無已誠懼威禁遂頹醜聲滋聞愚謂自今宜齊之以法使下知禁有司所執猶宜時聽不然以往則監司之吏鋒鉅靡加而準繩替矣臣忝切非據與聞國政服事以來荏苒三年朝憲多違威御無列好問不登而流聲播越皆由執政之臣官非其人常思收迹自替以避賢路退惟受遇微報未效是以忍垢素餐敢用文諫唯殿下哀明愚臣繾綣愚臣不以前後干迕多見罪責臨紙慷慨言不自盡移書太常府薦張贍蓋聞在昔聖王承天御世殷薦明德思和人神莫不崇典謨以教思興禮學以陶遠是以帝堯昭煥而道協人天西伯質文而周隆二代大晉建皇崇配天地區夏既混禮樂將庸君侯應歷運之會贊天人之期博延俊茂熙隆載典伏見衛將軍舍人同郡張贍茂德清粹器思深通初慕聖門棲心重仞啟塗及階遂升樞奧抽靈匱於祕宮披金縢於玄夏思樂百氏博採其珍辭邁翰林言敷其藻探微集逸思心洞神論道屬書篇章光覿含奇宰府婆娑公門棲靜隱寶淪虛藏器褧裳襲錦褐衣被玉曾泉改路懸車將邁考槃下位歲聿屢遷縉紳之士具懷㑶恨方今太清闢宇四門啟籥玄綱括地天網廣羅慶雲興以招龍和風起而儀鳳誠巖穴耀穎之秋河津託乘之日也而贍沉淪下位群望悼心若得端委太學錯綜先典垂纓玉階論道紫宮誠帝室之瑰寶清廟之偉器廣樂九奏必登昊天之庭詔夏六變必饗上帝之祀矣
