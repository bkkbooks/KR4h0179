body:
  text: 范甯為豫章郡表新淦令孟佃民解列縣廳事前二丈陸地生蓮華入冬死十六年更生四枝今年三月復生故處繁殖轉多華有二十五枝鮮明可愛有異常蓮蓺文類聚八十二御覽九百九十九永修公國相萬主解列到縣巡行邑治縣西北出二里有林中兩桐樹下根相去一丈上枝相去丈八速合成一蓺文類聚九十八為豫章臨發上疏臣聞道尚虛𥳑政貴平靜坦公亮于幽顯流子愛于百姓然後可以輕夷嶮而不憂乘休否而常夷先王所以致太平如此而已今四境晏如烽燧不舉而倉庾虛耗帑藏空匱古者使人歲不過三日今之勞擾殆無三休停至有殘刑翦髮要求復除生兒不復舉養鰥寡不敢妻娶豐不怨結人鬼感傷和氣臣恐社稷之憂積薪不足以為喻臣久欲粗啟所懷日復一日今當永離左右不欲令心有餘恨請出臣啟事付外詳擇晉書范甯傳陳時政疏古者分土割境以益百姓之心聖主作制籍無黃白之別昔中原喪亂流寓江左庶有旋反之期故許其挾注本郡自爾漸久人安其業丘壟墳柏皆以成行雖無本邦之名而有安土之實今宜正其丘封疆以土斷人戶明考課之科修閭伍之法難者必曰人各有桑梓俗自有南北一朝屬戶長為人隸君子則有土風之慨小人則懷下役之慮斯誠并兼者之所執而非通理者之篤論也古者失地之君猶臣所寓之主列國之臣亦有違適之禮隨會仕秦致稱春秋樂毅宦燕見襃良史且今普天之人原其氏出皆隨世遷移何至于今而獨不可凡荒郡之人星居東西遠者千餘近者數百而舉召役調皆相資須期會差違輒致嚴坐人不堪命叛為盜賊是以山湖日積刑獄愈滋今荒小郡縣皆且并合不滿五千戶不得為郡不滿千戶不得為縣守宰之任宜得清平之人頃者選舉惟以卹貧為先雖制有六年而富足便退又郡守長吏牽置無常或兼臺職或帶府官夫府以統州州以監郡郡以莅縣如令互相領帖則是下官反為上司賦調役使無復節限且牽曳百姓營起廨舍東西流遷人人易處文書簿籍少有存者先之室宇皆為私家後來新官復應脩立其為獘也胡可勝言又方鎮去官皆割精兵器仗以為送故米布之屬不可稱計監司相容初無彈糾其中或有清白亦復不見甄異送兵多者至于千餘家少者數十戶既力入私門復資官廩布兵役既竭枉服良人牽引無端以相充補若是功勳之臣則已享裂土之祚豈應封外復置吏兵乎謂送故之格宜為節制以三年為斷夫人性無涯奢儉由勢今并兼之士亦多不贍非力不足以厚身非祿不足以富家是得之有由而用之無節蒱酒永日馳騖卒年一宴之饌費過十金麗服之美不可貲算盛狗馬之飾營鄭衛之音南畝廢而不墾講通闕而無聞凡庸競馳傲誕成俗謂宜驗其鄉黨攷其業尚試其能否然後升進如此匪惟家給人足賢人豈不繼踵而至哉官制謫兵不相襲代頃者小事便以補役一愆之違辱及累世親戚傍支罹其禍毒戶口減枆亦由于此皆宜料遣以全國信禮十九為長殤以其未成人也十五為中殤以為尚童幼也今以十六為全丁則備成人之役矣以十三為半丁所任非復童幼之事矣豈可傷天理違經典困苦萬姓乃至此乎今宜修禮文以二十為全丁十六至十九為半丁則人無夭折生長滋繁矣晉書范甯傳通典三奏烝祠案禮喪服傳有死宮中者三月不舉祭不別長幼之與貴賤也皇女雖曰嬰孩臣竊以為疑晉書禮志上通典五十二太元十一年九月皇女亡及應烝祠寍奏于是使三公行事祭殤議祭法王祭嫡殤下及五代愍懷太子殤太孫哀太孫沖太孫自是先帝嫡殤歷代彌久而廟祀之禮于今未廢謂非禮典之意宜從埋主例通典五十二為舊君服議弔服加麻輕末之服臣為君服斬衰舊群齊衰三月此古今所以得異甯謂臣有貴賤禮有隆殺州郡綱紀察舉辟命之吏聞舊君喪應即奔赴在官之人亦宜棄職而去雖不皆與禮合稱情立文也或曰州郡守牧喪官吏為之齊衰故服舊君緦麻所以為輕重之殺也臣為君服斬三代之達禮秦罷侯置守雖不繼位皆有吏臣豈不得準古諸侯也通典九十啟國子生假故事國學開建彌歷年載講誦之音靡聞攷課之績不著良由達道之訓未弘鑽仰之心弗至陵替文源宜見整正謂應斷假精加督勵嚴其師訓舉善黜違御覽六百三十四啟斷眾公受假故事啟斷眾公受假故事伏見內外眾官陳假紛紜煩黷無已舊有急假一月五急一年之中六十日為限不問虛實相率如此誣罔視聽煩穢官曹舉世行之不以為非急假之制唯以父母妻子為辭而伯叔兄弟制所不及長偷薄之風虧敦睦之化臣謂宜去病解之故制一年令賜表假日隨其所欲之適任其取日多少假寍令曰諸內外官五月給田假九月給受衣假為兩番各十五日田假若風土異宜種收不等通隨給之又曰諸百官九品私家附廟除程給假五日四時祭祀各給假四日去任所三百里內亦給程又曰諸文武官若流外己上者父母在三年給定假三十日其拜墓五年一假十日竝除程若己經還家者計還後給其五品己上所司審勘當于事母闕者奏不得輒自奏請親冠假三日五服內親冠給假一日竝不給程又曰諸婚給假九日除程周親婚嫁五日大功五日小功己下一日竝不給程己下無主者百里內除程若本服周親已上疾病危篤遠行久別及諸急難竝量給假同上又略見北堂書鈔三十二廚籍教籍官之大信而比散在眾曹此不可也可令作十五廚籍一縣一廚御覽七百十七文書教土紙不可以作文書皆令用藤角紙初學記二十一荅徐邈書禮郊牲必在滌三月公羊傳養二卜二卜者謂本卜養二牪也帝牲不吉則卜稷牲稷牲不吉則不郊蓋所以敬天神而後人鬼也無本郊不滌牲之禮牲唯具用非吾所聞也凡告用制幣先儒有明義也通典五十五子不得以爵命母妃是太子婦號必也正名寍可以稱母也通典七十二案公羊傳母以子貴當以此義為禮禮有君之母非夫人者以此推之王者之每亦何必皆后乎所為尊母非使極尊號也竝后匹嫡譏存春秋謂宜皇太夫人下皇后一等位比三公此君母之極號也稱夫人則先后之臣也加皇太則至尊之母也皇君之謂也君太夫人豈不允乎通典七十二與謝安書稱無子而養人子者自謂同族之親豈施于異姓今世行之甚眾是為逆人倫昭穆之序違經典紹繼之義也通典六十九難戴逵論馬鄭二義書傳云不滿八歲為無服則八歲以上不當引此此也尋制名之本意父之于子下殤小功猶有緦麻一階非為服已盡而不以緦麻服之者以未及人次耳通典九十一范甯與戴逵書問馬鄭二義逵荅云云甯又難逵荅王珣書論慧遠慧持孰愈誠為賢兄賢弟也高僧傳荅王朔之問天子為后父母服王朔之問范甯云至尊為后之父母服不意謂雖居尊位亦當不以己尊而便降也甯荅曰王者之于天下興諸侯之于一國義無以異今謂粗可依準通典八十荅譙王恬問王子為慈母服譙王司馬恬問范甯曰妾有二子而出嫁君命他妾兼子為其母所命妾今亡子當有服不荷曰昔男子外有傅內慈母君命教子何服之有通典八十一荅曹述初問為前妻父母服曹述初問范甯曰有人再娶後妻無父母而前妻父母亡當有服不甯荅曰禮小記云從服者所從主則已今妻既卒則無所從不應服也通典九十五又荅曹述初難述初又難曰妻為夫黨既為屬從至于夫卒服之無虧妻之父母而妻卒則已統例準情不見其義若以妻之父母不得準夫之旁親實所疑也小記所稱自謂臣為君黨妾子為君母黨服耳寍又荅曰世間行事鮮有同者此亦無準據殆是率心而行也通典九十五荅鄭澄問已拜時而夫死服鄭澄問弟女當適武留繇兒留去年自將兒來拜時其兒今卒不知弟女當奔弔否若弔著何服范甯荅曰禮曾子問娶女有吉日而女死如之何孔子曰壻齊衰而往弔既葬而除之夫死亦如之謂斬衰也謂既親拜舅寍當重于吉日耳通典九十九鄭又問若拜舅為重于吉日應服斬誠如來告若拜傍親復云何昔荀啟拜時而卒庾家女不往弔不被譏何也再荅曰三代殊制禮有因革意為娶女有吉日理輕于拜舅復重于拜餘人荀氏海內名族庾則異行之門想其不奔弔必有所據同上荅殷仲堪問改葬復虞殷仲堪問范甯曰荀訥議太后改葬既據言不虞朝廷所用賀要記云三月便止何也甯荅曰賀無此文或好事者為之邪不見馬鄭賀范說改葬有虞神已在廟虞何為哉通典一百二十荅王薈問喪服變除王薈問范甯曰人有父在遭母喪十七月乃得葬便當頓除更復練祥邪荅曰三年而後葬者必再祭練祥之祭也主喪不除未葬不變也十七月既祥即除服不禫可知也通典一百三十春秋穀梁傳集解序昔周道衰陵乾綱絕紐禮壤樂崩彝倫攸斁弒逆篡盜者國有淫縱破義者比肩是以妖災因釁而作民俗染化而遷陰陽為之愆度七曜為之盈縮川岳為之崩竭鬼神為之疵厲胡父子之恩缺則小弁之刺作君臣之禮廢則桑扈之諷興夫婦之道絕則谷風之篇奏骨肉之親離則角弓之怨彰君子之路塞則白駒之詩賦天垂象見吉凶聖作訓紀成敗欲人君戒慎厥行增修德政蓋誨爾諄諄聽我藐藐履霜堅冰所由者漸四夷交侵華戎同貫幽王以暴虐見禍平王以微弱東遷征伐不由天子之命號令出自權臣之門故兩觀表而臣禮亡朱干設而君權喪下陵上替僭逼理極天下蕩蕩王道盡矣孔子覩滄海之橫流迺喟然而歎曰文王既沒文不在茲乎言文王之道喪興之者在已于是就大師而正雅頌因魯史而脩春秋列黍離于國風齊王德于邦君所以明其不能復雅政化不足以被群后也于時則接乎隱公故因茲以託始該二儀之化育贊人道之幽變舉得失以彰黜陟明成敗以著勸誡拯穨綱以繼三五鼓芳風以扇遊塵一字之襃寵踰華袞之贈片言之貶辱過市朝之撻德之所助雖賤必申義之所抑雖貴必屈故附勢匿非者無所逃其罪潛德獨運者無所隱其名信不易之宏軌百王之通典也先王之道既弘麟感化而來應因事備而終篇故絕筆于斯年成天下之事業定天下之邪正莫善于春秋春秋之傳有三而為經之旨一臧否不同襃貶殊致蓋九流分而微言隱異端作而大義乖左氏以鬻拳兵諫為愛君文公納幣為用禮穀梁以衛輒拒父為尊祖不納子糾為內惡公羊以祭仲廢君為行權妾母稱夫人為合正以兵諫為愛君是人主可得而脅也以納幣為用禮是居喪可得而婚也以拒父為尊祖是為子可得而叛也以不納子糾為內惡是仇讎可得而容也以廢君為行權是神器可得而闚也以妾母為夫人是嫡庶可得而齊也若此之類傷教害義不可強通者也凡傳以通經為主經以必當為理夫至當無二而三傳殊說庸得不棄其所滯擇善而從乎既不俱當則固容俱失若至言幽絕擇善靡從庸得不竝舍以求宗據理以通經乎雖我之所是理未全當安可以得當之難而自絕于希通哉而漢興以來瓌望碩儒各信所習是非紛錯準裁靡定故有父子異同之論石渠分爭之說廢興由于好惡盛衰繼之辯訥斯蓋非通方之至理誠君子之所歎息也左氏豔而富其失也巫穀梁清而婉其失也短公羊辯而裁其失也俗若能富不巫清而不短裁而不俗則深于其道者也故君子之于春秋沒身而已矣升平之末歲次大梁先君北蕃迴軫崸駕于吳乃帥門生故吏我兄弟子姪研講六籍次及三傳左氏則有服杜之注公羊則有何嚴之訓釋穀梁傳者雖近十家皆膚淺末學不經師匠辭理典據既無可觀又引左氏公羊以解此傳文義違反斯害也己于是乃商略名例敷陳疑滯博示諸儒同異之說昊天不弔太山其頹匍匐墓次死亡無日日月逾邁跂及視息乃與二三學士及諸子弟各記所識并言其意業未及終嚴霜夏墜從弟彫落二子泯沒天實喪予何痛如之今撰諸子之言各記其姓名名曰春秋穀梁傳集解唐石經拓本王弼何晏論時以虛浮相扇儒雅日替甯以為其源始于王弼何晏二人之罪深于桀紂乃著論曰或曰黃唐緬邈至道淪翳濠濮輟詠風流靡託爭奪兆于仁義是非成于儒墨平叔神懷超絕輔嗣妙思通微振千載之頹綱落周孔之塵網斯蓋軒冕之龍門豪梁之宗匠嘗聞夫子之論以為罪過桀紂何哉荅曰子信有聖人之言乎夫聖人者德侔二儀道冠三才雖帝皇殊號質文異制而統天成務曠代齊趣王何蔑棄典文不遵禮度游辭浮說波蕩後生飾華言以翳實騁繁文以惑世搢紳之徒翻然改轍洙泗之風緬焉將墜遂令仁義幽淪儒雅蒙塵禮壞樂崩中原傾覆古之所謂言偽而辯行僻而堅者其斯人之徒歟昔夫子斬少正于魯太公戮華士于齊豈非曠世同誅乎桀紂暴虐正足以滅身覆國為後世鑒戒耳豈能迴百姓之視聽哉王何叨海內之浮譽資膏粱之傲誕畫螭魅以為巧扇無檢以為俗鄭聲之亂樂利口之覆邦信矣哉吾固以為一世之禍輕歷代之罪重自喪之釁少迷眾之愆大也晉書范甯傳禮雜問父母生之續莫大焉三千之罪無後為重夫立大宗所以銓序昭穆彌綸百代繫之以姓而弗別綴之以食而弗殊禮盡于此義誠重矣方之祖考于斯為薄若令拾重適輕為親就疏則是生不敬養沒不敬享生人之本不盡孝子之事靡終非所以通人子之情為經代之典夫嫡子存則奉養有主嫡子亡則烝嘗靡寄是以支子有出後之義而無廢嫡之文故嫡子不得後大宗但云以支子繼大宗則義已畼矣不應復云嫡子不得繼大宗此乃小宗不可絕之明文也若無大宗唯不得收族耳小宗之家反統昭穆何必亂乎通典九十六衛將軍謝石諡議石階藉門蔭屢登崇顯總司百揆翼贊三臺閑練庶事勤勞匪懈內外僉議皆曰與能當淮肥之捷勳拯危墜雖皇威遐震狡寇天亡因時立功石亦與焉又開建學校以延冑子雖盛化未洽亦愛禮存羊然古之賢輔大則以道事君侃侃終日次則厲身奉國夙夜無怠下則愛人惜力以濟時務此數者然後可以免惟塵之譏塞素飧之責矣今石位居朝端任則論道唱言無忠國之謀守職則容身而已不可謂事君貨黷京邑聚斂無厭不可謂厲身坐擁大眾侵食百姓大東流于遠近怨毒結于眾心不可謂愛人工徒勞于土木思慮殫于機巧紈綺盡于婢妾財用縻于絲桐不可謂惜力此人臣之大害有國之所去也先王所以正風俗理人倫者莫尚乎節儉故夷吾受謗乎三歸平仲流美于約已自頃風軌陵遲奢僭無度廉恥不興利競交馳不可不深防原本以絕其流漢文襲綈之服諸侯猶侈武帝焚雉頭之裘靡麗不息良由儉德雖彰而威禁不肅道自我建而刑不及物若存罰其違亡貶其惡則四維必張禮義行矣案諡法因事有功曰襄貪以敗官曰墨宜諡曰襄墨公晉書儒林范弘之傳與會稽王道子牋下官輕微寒士謬得廁在俎豆實懼辱累清流惟塵聖世竊以人君居廟堂之上智周四海之外者非徒聰明內照亦賴群言之助也是居舜之佐堯以啟闢為首咎繇謨禹以侃侃為先故下無隱情之責上收神明之功敢緣斯義志在輸盡常以謝石黷累應被清澄殷浩忠貞宜蒙襃顯是以不量輕弱先眾言之而惡直醜正其徒實繁雖仰恃聖主欽明之度俯賴明公愛物之隆而交至之患實有無賴下官與石本無怨忌生不相識事無相干正以國體宜明不應稍計彊弱與浩年時邈絕世于相及無復藉聞故老語其遺事耳于下官之身有何痛癢而當為之犯時千主邪每觀載籍志士仁人有發中心任直道而行者有懷知陽愚負情曲從者所用雖異而竝傳後世故比干處三仁之中箕子為名賢之首後人用捨參差不同各信所見率應而至或榮名顯赫或禍敗係踵此皆不量時趣以身嘗禍雖有脛脛之稱而非大雅之致此亦下宮所不為也世人乃云下官正直能犯艱難斯談實過下官知主上聖明明公虛已思求格言必不使盡忠之臣屈于邪枉之門也是以敢獻愚誠布之執事豈與昔人擬其輕重邪亦以臣之事君惟思盡忠而已不應復計利鈍事不允心則讜言悟主義感于情則陳辭靡悔若懷情藏意蘊而不言此乃古人所以得罪于明君明君所以致法于群下者也臣桓溫事跡布在天朝逆順之情暴之四海在三者臣子情豈或異凡厥黔首誰獨無心舉朝嘿嘿未有唱言者是以頓筆案氣不敢多云桓溫于亡祖雖其意難測求之于事止免黜耳非有至怨也亡父昔為溫吏推之情禮義兼他人所以每懷憤發痛若身首者明公有以尋之王珣以下官議殷浩諡不宜暴揚桓溫之惡珣感其提拔之恩懷其入幙之遇託以廢黜昏闇建立聖明自謂此事足以明其忠貞之節明公試復以一事觀之昔周公居攝道致升平禮樂刑政皆自己出以德言之周公大聖以年言之成王幼弱猶復遽避君位復子明辟漢之霍光大勳赫然孝宣年未二十亦反萬機故能君臣俱隆道邁千歲若溫忠為社稷誠存本朝便當仰遵二公式是令矩何不奉還萬機退守藩屏方提勒公王匡總朝廷豈為先帝幼弱未可親政邪將謂桓溫不能聽政邪又逼脅袁宏使作九錫備物光赫其文具存朝廷畏怖莫不景從惟謝安王坦之以死守之故得稽留耳會上天降怒姦惡自亡社稷危而復安靈命墜而復構晉自中興以來號令威權多出彊臣中宗肅祖斂衽于王敦先皇受屈于桓氏今主上親覽萬機明公光讚百揆政出王室人無異望復不于今大明國典作制百代不審復欲待誰先王統物必明其典誥貽厥孫謀故令問休嘉千歲承風願明公遠覽殷周近察漢魏慮其所以危求其所以安如此而已晉書范弘之傳與王珣書見足下荅仲堪書深具義發之懷夫人道所重莫過君親君親所係忠孝而已孝以揚親為主忠以節義為先殷侯忠貞居正心貫人神加與先帝隆布衣之好著莫逆之契契闊艱難夷嶮以之雖受屈姦雄志達千載此忠良之徒所以義千其心不獲以己者也既當時貞烈之徒所究見亦後生所備聞吾亦敢何苟避狂狡以欺聖明足下不推居正之大致而懷知已之小惠欲以幙府之小節奪名教之重義于君臣之際既以虧矣尊大君以殷侯協契忠規同戴王室志厲秋霜誠貫一時殷侯所以得宣其義聲實尊大君協贊之力也足下不能光大君此之直志乃感溫小顧懷其曲澤公在聖世欺罔天下使丞相之德不及三葉領軍之基一構而傾此忠臣所以解心孝子所以喪氣父子之道固若是乎足下言臣則非忠語子則非孝二者既亡吾誰畏哉吾少嘗過庭備聞祖考之言未嘗不發憤衝冠情見乎辭當爾之時惟覆亡是懼豈暇謀及國家不圖今日得操筆斯事是以上憤國朝無正義之臣次惟祖考有沒身之恨豈得與足下同其肝膽邪先君往亦嘗為其吏于時危懼恆不自保仰首聖朝心口憤歎豈復得計策名昔日自同在三邪昔子政以五世純臣子駿以下委質王莽先典既已正其道順後人亦已鑒其成敗每讀其事未嘗不臨文痛歎憤愾交懷以今況古乃知一揆耳晉書范弘之傳
