body:
  text: 孫楚雪賦堯九載以山棲兮湯請禱于桑林罔二聖以濟世兮孰繁衍以迄今嗟亢陽之踰時兮情反側以寢興豐隆灑雪交錯翻紛膏澤偃液普潤中田肅肅三麥實獲豐年藝文類聚二井賦倚崇丘以鑿井兮臨斥澤之淫洿苦行潦之滓濁兮靡清流以自娛乃喟爾而有感兮率鄰左之數夫脈厥土以興泉兮登甘醴于玄虛體象圓川下貫五仞幽泉騰涌津澤傍潤抱甕而汲不設機引絕彼淫飾安此璞慎俗尚其華我篤其信既處涅而不淄又磨之而不磷雖矢之而無妄實游心于大順渴人來翔行旅是賴輟耕息肩不期而會沈黃李浮朱柰雜貍首之班如飛清塵以洮汏枕玄石以盥漱喜遨怡以緩帶藝文類聚九初學記七笑賦有度俗之公子總萬物之細故心髣髴乎巢由以得意為至樂不拘戀乎凡流會親戚于高宇結宗盟于綢繆所以交頸偃仰推匈指掌亢洪聲于通谷順長風以流響氣參譚以相屬若將頹而復往或嚬蹙俛首狀似悲愁怫鬱唯轉呻吟郁伊或攜手悲嘯噓天長叫遲重則如陸沈輕疾則如水漂徐疾任其口頰圓合得乎機要或中路背叛更相毀賤傾倚叵我雕聲迄乎日晏信天下之笑林調謔之巨觀也藝文類聚十九笳賦并序笳賦并序頃還北館遇華髮人于潤水之濱向春風而吹長笳音聲寥亮有感余情爰作斯賦銜長葭以汎吹噭啾啾之哀聲奏胡馬之悲思詠北狄之遐征順谷風以撫節飄逸響乎天庭爾乃調脣吻整容止揚清矑隱皓齒徐疾從宜音引代起叩角動商鳴羽發徵若夫廣陵散吟三節白紵太山長曲哀及梁父似鴻雁之將雛乃群翔于河渚藝文類聚四十四韓王故臺賦并序韓王故臺賦并序酸棗寺門外夾道左右有兩故臺訪之故老云韓王聽訟觀也臺高十五仞雖樓榭泯滅然廣基似于山嶽召公大賢猶舍甘棠區區小國而臺觀隆崇驕盈于世以鑒來今故作賦曰望韓王之故臺尋往代之所營雙闕碣以峻峙貫雲氣而上征歷千載而特立顯妙觀于太清蔑丘陵之邐迤亞五嶽之嵯峨薄邯鄲之叢臺陋楚國之章華邈岧嶢以抗極豈岑樓之能加至乃宮觀弘敞增臺隱天伐文梓于萬仞發玉石于三泉優倡角烏鳥之聲蛾眉戲白雪之舞紛淫衍以低昂翳脩袖而容與水經濟水注二蓺文類聚六十二登樓賦有都城之百雉加層樓之五尋從明王以登極聊暇日以娛心涇渭泊以阻邁卉木鬱而成林晞朝陽之素暉羨綠竹之茂陰望秦墳于驪山覩八陵于北岑青石連岡終南嵯峨鳴鳩拂羽于桑榆游鳧濯翅于素波牧豎吟嘯于阡陌舟人鼓枻而揚歌營巷基峙列宅萬區黎民布野商旅充衢杞柳綢繆芙蓉吐芳俯依青川仰翳朱楊體象濛氾幽若扶桑白日為之晝昏鳥禽為之頡頏百僚雲集促坐華臺嘉肴滿俎旨酒盈杯談三墳而詠五典釋聖哲之所裁藝文類聚六十三引兩條初學記五又二十四相風賦伊聖皇之高烈美治道之穆清兼乾坤之普覆齊三光之朗明猶恭己以勞謙迄日昃而不寍慮聽政之有闕誡禍福于無形建殊才于辰極樹相風于紫庭爾乃神獸盤其根靈烏據其顛羽族翩飄羅其側翔風蕭聊出其閒藝文類聚六十八菊花賦彼芳菊之為草兮稟自然之醇精當青春而潛翳兮迄素秋而敷榮于是和樂公子雍容無為翱翔華林駿足交馳薄言采之手折纖枝飛金英以浮旨酒掘翠葉以振羽儀偉茲物之珍麗兮超庶類而神奇藝文類聚八十一蓮華賦有自然之麗草育靈沼之清瀨結根係于重壤森蔓延以騰邁爾乃紅花電發暉光煒煒仰曜朝霞俯照綠水潛緗房之奧密兮含珍藕之甘腴攢聚星列纖離相扶微若玄黎投幽夜粲若鄧林飛鵷騶藝文類聚八十二初學記二十七御覽九百七十五杕杜賦并序杕杜賦并序家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤無用獲全所以為貴有用獲殘所以為賤故賦之云爾惟有杕之為杜齊萬物而竝生其質菲薄既不施于器用華葉疏悴靡休陰之茂榮昔在邵伯聽訟述職甘棠作頌垂之罔極藝文類聚八十七御覽九百七十三茱萸賦有茱萸之嘉木植茅茨之前庭歷漢女而始育關百載而長生森蔓延以盛興布綠葉于紫莖鶉火西徂白藏授節零露既凝鷹隼飄厲攀紫房于纖柯綴朱實之酷烈應神農之本草療生民之疹疾藝文類聚八十九橘賦朱橘甘美紫棃甜脆御覽九百六十六鶴賦假使此鳥生自崑崙長于丹穴遊遨元圃縹霄之際御覽八雉賦體沖和之淑質飾羽儀于茂林斑五色之文章揚曒曒之清音設密網于巖阿飛輕激之雲浮上無逃而弗獲下無隱而不搜遂戢翼以就養隨籠棲而言歸恆逍遙于階庭蔭朝陽之盛暉藝文類聚九十鴈賦有逸豫之雋禽稟和氣之清沖候天時以動靜隨寒暑而污隆颯同集于曠野紛群翔于雲中翳朝陽之景曜角聲勢于晨風族類阜繁數則千億迎素秋而南遊背青春而北息泝長川以鳴號淩洪波以鼓翼任自然而相佯窮天壤于八極藝文類聚九十一初學記三十鷹賦并序鷹賦并序郭延考與余厚其後從者韝二鷹以侍側郭邊人也好戈獵顧盼心欲自娛樂請余為賦曰御覽九百二十六有金剛之俊鳥生井陘之巖阻超萬仞之崇巔蔭青松以靜處體勁悍之自然振肅肅之輕羽擒狡兔于平原截鶴鴈于河渚且其為相也疏尾闊臆高髻圓顱深目蛾眉狀似愁胡曲觜短頸足若雙枯麾則應機招則易呼背碣石以西遊經馬嶺而南徂于時商秋既邁歲在玄冥風霜激厲羽毛振驚爾乃策良驥服羔裘韝青骹戲田疇縈深谷繞山丘定心意審精眸獸馳厥足鳥矯其翼下赴幽谿上翔辰極隨指授以騰踊因升降以畢力紛連簿以攖竄遂陷首以摧臆藝文類聚九十一初學記三十御覽九百二十六蟬賦惟大化之廣御何品數之多名當仲夏而始出據長條而悲鳴翼如羅纏形如枯槁終日不銜一粒激哀響之煩擾藝文類聚九十七初學記三十龍見武庫井上言頃聞武庫井中有二龍群臣或有謂之禎祥而稱賀者或有謂之非祥無所賀者可謂楚既失之而齊亦未為得也夫龍或俯鱗潛于重泉或仰攀雲漢游乎蒼昊而今蟠于坎井同于蛙蝦者豈獨管庫之士或有隱伏廝役之賢沒于行伍故龍見光景有所感悟願陛下赦小過舉賢才垂夢于傅巖望想于渭濱脩學官起淹滯申命公卿舉獨行君子可惇風厲俗者又舉亮拔秀異之才可以撥煩理難矯世抗言者無繫世族必先逸賤夫戰勝攻取之勢并兼混一之威五伯之事韓白之功耳至于制禮作樂闡揚道化甫是士人出筋力之秋也伏願陛下擇狂夫之言晉書孫楚傳又見開元占經一百二十引晉陽秋奏廢九品為大小中正九品漢氏本無班固著漢書序先往代賢智以九條此蓋記鬼錄次第耳而陳群依之以品生人又魏武拔奇決于胸臆收人才不問階次豈賴九品而後得人今可令長守為小大中正各自品其編戶也御覽二百六十五引孫楚集奏論求才當今士子繁多略以萬計當思官少才多無地以處秀才自別是一種仕官非若漢代取人之例也假若秀才荅五問可稱孝廉荅一策能通此乃雕蟲小道何關治功得人以此求才徒虛語爾薦傅長虞牋楚聞騏驥不遺能于伯樂良寶不藏耀于卞和是以輝光夜射價連秦趙飛駟絕影終朝千里物尚有之士亦宜然藝文類聚五十三謝賜障日牋大恩賜鄣日其器雖小而禮遇甚宏昔衛綰賜六劍珍而不用楚雖不敏且受而藏之御覽六百八十七為石仲容與孫皓書為石仲容與孫皓書苞白蓋聞見機而作周易所貴小不事大春秋所誅此乃吉凶之萌兆榮辱之所由興也是故許鄭以銜璧全國曹譚以無禮取滅載籍既記其成敗古今又著其愚智矣不復廣引譬類崇飾浮辭苟以夸大為名更喪忠告之實今粗論事勢以相覺悟昔炎精幽昧厤數將終桓靈失德災釁竝興豺狼抗爪牙之毒生人陷荼炭之艱于是九州絕貫皇綱解紐四海蕭條非復漢有太祖承運神武應期征討暴亂克寍區夏協建靈符天命既集遂廓洪基奄有魏域土則神州中岳器則九鼎猶存世載淑美重光相襲固知四隩之攸同天下之壯觀也公孫淵承籍父兄世居東裔擁帶燕胡馮淩險遠講武盤桓不供職貢內傲帝命外通南國乘桴滄流交疇貨賄葛越布于朔土貂馬延乎吳會自以為控弦十萬奔走足用信能右折燕齊左振扶桑淩轢沙漠南面稱王也宣王薄伐猛銳長驅師次遼陽而城池不守桴鼓一震而元凶折首然後遠跡疆埸列郡大荒收離聚散咸安其居民庶悅服殊俗款附自茲遂隆九野清泰東夷獻其樂器肅慎貢其楛矢曠世不羈應化而至巍巍蕩蕩想所具聞吳之先主起自荊州遭時擾攘播潛江表劉備震懼亦逃巴岷遂依丘陵積石之固三江五湖浩汗無涯假氣游魂迄于四紀二邦合從東西唱和互相扇動距捍中國自謂三分鼎足之勢可與泰山共相終始相國晉王輔相帝室文武桓桓志厲秋霜廟勝之筭應變無窮獨見之鑒與眾絕慮主上欽明委以萬機長轡遠御妙略潛授偏師同心上下用力稜威奮伐冞入其阻并敵一向奪其膽氣小戰江介則成都自潰曜兵劍閣而姜維面縛開地五千列郡三十師不踰時梁益肅清使竊號之雄稽顙絳闕球琳重錦充于府庫夫虢滅虞亡韓并魏徙此皆前鑒之驗後事之師也又南中呂興深覩天命蟬蛻內向願為臣妾外失輔車脣齒之援內有毛羽零落之漸而徘徊危國冀延日月此猶魏武侯卻指河山以自強大殊不知物有興亡則所美非其地也方今百僚濟濟儁乂盈朝虎臣武將折衝萬里國富兵強六軍精練思復翰飛飲馬南海自頃國家整治器械修造舟楫𥳑習水戰伐樹北山則太行木盡濬決河洛則百川通流樓船萬艘千里相望自刳木日之盛者也驍勇百萬畜力待時役不再舉今日之謂也然主上眷眷未便電邁者以為愛民治國道家所尚崇城遂卑文王退舍故先開示大信喻以存亡殷勤之旨往使所究若能審識安危自求多福蹶然改容祗承往告追慕南越嬰齊入侍北面稱臣伏聽告策則世祚江表永為藩輔豐報顯賞隆于今日矣若猶侮慢不式王命然後謀力雲合指麾風從雍益二州順流而東青徐戰士列江而西荊楊兗豫爭驅八衝征東甲卒虎步秣陵爾乃皇輿整駕六師徐征羽檄燭日旌旗流星遊龍曜路歌吹盈耳士卒奔邁其會如林煙塵俱起震天駭地渴賞之士鋒鏑爭先忽然一旦身首橫分宗祀屠覆取誡萬世引領南望良以寒心夫治膏肓者必進苦口之藥決狐疑者必告逆耳之言如其迷謬未知所投恐俞附見其已困扁鵲知其無功也勉思良圖惟所去就石苞白文選藝文類聚二十五與董京書今堯舜之世胡為懷道迷邦尼父頌皇矣尼父聖哲之傑德比天地明齊日月周室陵遲大道蕪穢禮樂崩阻姦雄罔世乃養門徒廣延俊乂垂訓列國頌聲魯衛威震夾谷義厭陳蔡德之休明幽而彌泰超美三代風馳雲邁藝文類聚二十梁令孫侯頌梁令孫侯頌於穆君侯英才宣朗神鑒將來思通既往受佐陝西臨我邦壤聲之所振下應如響明斷決疑易于指掌野有寇盜惟侯屏之我有田疇惟侯闢之古人慎獄惟侯平之凡此三惠如何勿思藝文類聚五十顏回贊束身勵行宗事聖道鑽仰孜孜視予猶考藝文類聚二十管仲贊管生彎弓與桓是讎駿奔從糾塊為纍囚沐浴西郊鸞飛詹丘初學記十七季子贊季子聰哲思心精微玄覽幽寤觸類應機初學記十七八賢贊莊周贊莊周曠蕩高才英儁本道根貞歸于大順妻亡不哭亦何所懽慢弔鼓缶放此誕言殆矯其情近失自然藝文類聚三十六榮啟期贊榮公溫雅既怡既懌濁以徐清寂然澹泊援琴自娛詠此三樂眉壽無疆惟德之宅藝文類聚三十六原壤贊壤之輈張絕滅禮教實交仲尼同機合奧聖以之臧俗以之笑獨協區外孰知其妙藝文類聚三十六白起贊烈烈桓桓時維武安神機電斷氣濟師然南折勁楚走魏禽韓北摧馬服淩川成丹應侯無良蘇子入關噭噭讒口火燎于原遂焚杜郵與簫俱燔惟其歿矣古今所歎藝文類聚五十九韓信贊淮陰屈節盤于幽賤秦失其鹿英雄交戰踐楚知亡撫戈從漢遂寤明主超然虎奮威震趙魏擒項平難割據山川稱孤南面惜哉遘疑一朝書叛藝文類聚五十九樂毅贊樂生誕節實立弘度丹旄電麾秦韓景附威震濟西齊愍失據惠之不敏翻然高翥棲遲一丘以保皓素藝文類聚五十九反金人銘晉太廟左階之前有石人焉大張其口而書其胸曰我古之多言人也無少言無少事少言少事則後生何述焉我讀三墳五典八索九丘賾罔深而不探理無奧而不鉤故言滿天下而無口尤夫唯言立乃可長久胡為塊然生緘其口自拘廣庭終身叉手凡夫貪財烈士殉名盜跖為濁夷柳為清鮑肆為臭蘭圃為馨莫貴澄清莫賤滓穢二者言異歸于一會堯懸諫鼓舜立謗木聽采風謠惟日不足道潤群生化隆比屋末葉陵遲禮教彌衰承旨則順忤意則違時好細腰宮中皆飢時悅廣額下作細眉逆龍之鱗必陷斯機括囊無咎乃免誅夷顛覆厥德可為傷悲斯可用戒無妄之時假說周廟于言為蚩是以君子追而正之藝文類聚十九御覽五百九十石人銘大象無形元氣為母杳兮冥兮陶冶眾有御覽一論屈建文加籩之品菱芰存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝既毀就養無方之禮又失奉死如生之義奪平素欲建何忍焉御覽九百七十五王驃騎誄逍遙芒阿闔門不帷研精六蓺採賾鉤微御覽五十六故太傅羊祜碑稟二儀之純靈膺造化之沖氣文為辭宗行作世表遷黃門侍郎受祕書監公筭滅吳之略以為孟獻營虎牢而鄭人懼晏弱城東陽而萊子服乃進據險處開建五城收膏腴之地奪敵人之資于是江浦馳義繈負而至雖研精軍政用思滅敵然兼立學校闡揚典訓是以搢紳之士鱗集仰化雲翔衡門雖泮宮之詠魯侯菁莪之美育才無以過也銘曰金德發曜惟公作輔肇造嘉謨建我民主不憖遺公俾屏聖皇哲人其徂孰不增傷藝文類聚四十六鴈門太守牽招碑君體德允直才量高潔明鑒達于世變弘毅足以致遠聿振鴻翼于袞塵之表卓爾先覺于擬議之前君與劉備少長河朔英雄同契為刎頸之交俄而委質于太祖備遂鼎足于蜀漢所交非常為時所忌每自酌損在乎季孟之閒遷鴈門太守教民耕戰聽斷以情信賞必罰下服其命是以夷狄窘迫罔知所安譬秋枯之隕晨風激雹之不及掩耳也伐叛柔服威震沙漠遺種遠迹萬里無煙烈烈君侯文武允崇少兼七德翰飛撫戎名揚河朔威震漢中臨危運奇在難匪從迴旌束麾撫司徐青截彼降賊海岱以平剖符千里為國干城藝文類聚五十初學記十八和氏外孫道生哀文嗟爾道生和氏之寶玉顏豐下曜于懷抱暮春而育孟冬而夭二十三旬奇于五日方之期頤百分之一命之修短始則有終誰能長久與天無窮籛翁近千殤子幼沖俱反無形冥昧之中造化多少豈獨爾躬藝文類聚三十四和氏外孫小同哀文曄曄蕣華朝生夕落爾命方之猶為淺薄暫有冥質尋友冥漠譬彼蜉蝣不識晦朔死尚未知生亦焉知爾雖旬月我未之視萬物混焉天地一指杪末嬰孩安足稱誄大人達觀同之一揆藝文類聚三十四胡母夫人哀辭滔滔汶川浩浩雲漢乃眷洪族裁育英媛幼挺芳烈暉光日新有美其猗有彪其文華茂春芳志厲秋霜邂逅之遇遘茲良會豈惟中饋義形于外恆憑賢明以自休賴冀享永年偕老一世景命伊何忽然長逝藝文類聚三十四祭介子推文醴酪二盂棗飯二盤御覽三十又八百五十太原咸奉介君之靈至三月清明斷火寒食甚若先後一月府君僑耳北堂書鈔一百四十三高柔集敘柔字世遠樂安人才理清鮮安行仁義婚泰山胡母氏女年二十既有倍年之覺而姿色清惠近是上流婦人柔家道隆崇既罷司空參軍安固令營宅于伏川馳動之情既薄又愛翫賢妻便有終焉之志尚書令何充取為冠軍參軍僶俛應命眷戀綢繆不能相舍相贈詩書清婉辛切世說輕詆篇注吏部郎虞存誄存字道長會稽山陰人也祖陽散騎常侍父偉州西曹存幼而卓拔風情高逸歷衛軍長史尚書吏部郎世說政事篇注
