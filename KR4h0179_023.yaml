body:
  text: 卷二十三王羲之雜帖雜帖二知阮生轉佳甚慰甚慰會稽近患下始差諸謝粗佳足下差否甚耿耿喉中不復燥耳故知問具示王羲之白冷過足下夜得眠不祗差也復何治甚耿耿長史復何似故問具示王羲之白遂無雨候使人歎得諸孫書高田皆欲了得書知足下患癤念卿無賴思見足下冀脫果力不一一王羲之白此賢懷所禮也面一一謝二侯五月十四日羲之近反至也得七日書知足下故爾耿耿善將息吾腫得此霖雨轉劇憂深力不一一羲之適萬石去月五日書為慰尋得彭祖送萬九日露版再破賊有所獲想足摧寇越逸之勢宜適許司農書為慰無人未能得重故向餘杭間因緣示致問非書能悉想君行有旨信伯熊上下安和為慰可令知問叔夷子前恨不見可令熊知消息羊參軍還朝論長見敦恕其為慶慰無物以喻今又告誠先靈以文示足下感懷慟心又以表書示卿政當亦不痛念玄度立如志而更速禍可惋可痛者省君書亦增酸服食故不可乃將冷藥僕即復是中之者腸胃中一冷不可如何是以要春秋輒大起多腹中不調適君宜深以為意省君書亦比得之物養之妙豈復容言直無其人耳許君見驗何煩多云矣袁彭祖何日過江想安穩耳失此諸賢至不可言足下分離如何可言此假不見足下乃甚久遲面明行集冀得見卿得申近不問謝侯四月五日羲之報建安靈柩至慈蔭幽絶垂卅年永惟崩慕痛徹五內永酷奈何無繇言告臨紙摧哽羲之報十一月十八日羲之頓首頓首從弟子夭沒孫女不育哀痛兼傷不自勝奈何奈何王羲之頓首二蔡過葬來居此親親集事而君復出為因耳九月十八日羲之頓首茂善晚生兒不育痛之惻心奈何奈何轉寒足下可不可不不得問多日懸情吾故劣力不具王羲之頓首十月十一日羲之敬問得旦書知佳為慰吾為轉差力不一一羲之敬問二十七日告薑汝母子佳不力不一一耶告羲之頓首二孫女夭傷悼痛切心豈意一旬之中二孫至此傷惋之甚不能已已可復如何羲之頓首草八日羲之白得昨告承飲動懸情想小爾耳還旨不具王羲之再拜庾新婦入門未幾豈圖奄至此禍情願不遂緬然永絶痛之深至情不能已況汝豈可勝任奈何無何無由敘哀悲酸君服前賢弟逝沒一旦奄至痛當奈何當復奈何臨紙咽塞王羲之頓首頓首雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之書末云得諸為慰知汝姨欲西情事難處然今時諸不易得東安書甚不欲令汝姨出懇至想自思之上下可耳産行往當迎慶思之不可言今付吳興酢二器一日不暫展至恨叱而不已便懷不果東至可恨思敘想間暇必顧也適都使還諸書具一一須面具懷得征西近書委悉為慰不得安西許有問不知何久長風書平安今知殷侯不久留之甚善甚善舍內佳不中書何似家中疾篤恆救旦夕比知覺有省書想至義興何似懸情慕容遂來據鄴可深憂官復遣軍可以示義興中書昨得殷侯答書今寫示君承無怒意既而意謂速思順從或有怨理大小宜盤桓或至嫌也想復深思復征許也八月二十四日羲之頓首竟增哀感奈何奈何兩足下可耳不得問日懸心吾故劣劣王羲之頓首此雨足何耳故當收佳云彼甚快大事吳義興是蕩然可歎時行皆遍事輕耳彼云何道祖帶下乃危篤憂怛憂怛賊勢可見此云方軌萬萬如志但守之尚足令智者勞心此回書恆懷湯火處世不易豈惟公道諸人十二日書云慕容乃抄梁下得數目下疾疫非常乃以至京極有傷此憂之下者想君勤勤之復委篤恐無興理諸人書亦云爾也憂之怛怛得停乃公私大計也君頃以何永日憶去冬不可得知如何如何桓公以江州還臺選每事勝也不可當在誰耳源書以發吾欲路次見之亦不欲停甚官舍佳也得諸舍問不不知遮何日西言及辛酸卿不可懷期等故勿憂勿憂深近書及至也瞻望不遠而未期暫面如之何遲得問也謝侯數不在歎前知足下欲居此常喜遲知定不果悵恨未知見卿期當數音問也得都近問清和為慰云劉生近欲舉君為山陰以中當為最君期於未獲供養處相為慨然仕宦殆是想也君學書有意今相與草書一卷小大佳不可得司馬問懸情適安以中軍出鎮有避賢意乃云行得言面不知公私此理卒當之耶甚憂真本無集之者想今與君書一見此當何言恐今婦必門首有出復有將來之弊耳此願盡珍御理想彼人士平安二郗數也敬豫諸人近來停數日悉佳安石已南遷其諸兄弟此改殊命蕭索聞君以復入相府何時當應命未得坐處亦當愁罔思得為鄰豈常情恐君方處務此命難期如之何不一一小佳復意問也源遂差不云尚未恭命終之何聞真長知吳興想必如意南道差不君大小佳不松廬善斫也僕信還奉州將去月十二日告甚慰如曹失護語此君甚康壯常是肥渴耳實尋還遲之不可言二妹差佳慰問心期中冷頃時行可畏愁人不得司馬近問懸情近所送書即至也君信明早令得後得鄙書未至即想東不久耳此鄙問無恙諸從皆佳此諸數耳知劉阮數溫公在此前東北面還此復初散為慰便乞良不可言卿得知之復共一快樂武妹小大佳也知郡荒吾前東周旋五千里所在皆爾可歎江東自有大頓勢不知何方以救其弊民事自欲歎復為意卿示聊及數得桓公問疾轉佳也每懸胡云征事未有日佳也以逼勢不知卒云何爾見君小大佳不過此乃知熙佳覺少不得同萬恨萬恨云出便當西念遠別何可云遲見玄度今或以在道賓如人往不堪致心憶之不忘懷之妹不快憂勞餘平安未得安西問玄度忽腫至可憂慮得其昨書云小差然疾候自恐難耶與安石俱佳還七日增想投命積日不復知問弟佳寧善然復憂之不去懷吾遂沈滯兼下如近數日分無復理昨來增服陟釐丸得下不知遂斷不了無所噉而藥得停不知當復見弟理不獨下便長歎小蘇息更知問二奴庶諸人何以謝之想清和士人皆佳彭祖諸人得足下慰旦夕也此諸賢平安每面粗有歎慨追恨近日不得本善散無已已度足下還期不久耳比者數令知問懷足下可謂禮之今以志心寄卿想必至到論之救命不暇此事於今為奢遠耳要是事其本心所欲論事今付今與馮公論何産足下可思助明清談至是舉今又語真道今宣旨矣臣羲之言寒嚴不審聖體御膳何如謹付承動靜臣羲之言臣羲之言伏惟陛下天縱聖哲德齊二儀應期承運踐登大祚普天率土莫不同慶臣抱疾遐外不獲隨例瞻望宸極屏營一隅臣羲之言劉氏平安也梅妹可得袁妹腰痛冀當小爾耳汝母故若以不安食疾久憂憒當思平理也神意不同前者也今付北方脯二夾吳興鮓二器蒜條四千二百司馬雖篤疾久頃轉平除無他感動奄忽長逝痛毒之甚驚惋摧慟痛切五內當奈何奈何省書感哽雨寒卿各佳不諸患無賴力書不一一羲之問想官舍無恙吾必果二十日後乃往遲喜散恙比爾自相聞也九月三日羲之報敬倫遮諸人去晦祥禫情以酸割念卿傷切諸人豈可堪處奈何奈何及書不既羲之批九月二十五日羲之頓首便陟冬日時速感歎兼哀傷切不能自勝奈何得七月末時書為慰始欲寒足下常疾比何似每耿耿吾故不平復憂悴力困不一一王羲之頓首旦極寒得示承夫人復小咳不善得眠助反側想小爾復進何藥念足下猶悚息卿可不吾昨暮復大吐小噉物便爾旦來可耳知足下念王羲之頓首延期官奴小女並得暴疾遂至不救愍痛心奈何吾以西夕至情所寄惟在此等以禁慰餘年何意旬日之中二孫夭命日夕左右事在心目痛之纏心無復一至於此可復如何臨紙咽塞六月二十七日羲之報周嫂棄背再周忌日大服終此晦感摧傷悼兼情切劇不能自勝奈何奈何穆松垂祥除不可居處言以酸切及領軍信書不次羲之報頓首頓首亡嫂居長情所鍾奉始獲奉集冀遂至誠展其情願何圖至此未盈數旬奄見背棄情至乖喪莫此之甚追尋酷恨悲惋深至痛切心肝當奈何奈何兄子荼毒備嬰不可忍見發言痛心奈何奈何王羲之頓首頓首君頃復以何散懷鐵云秋當解褐行復分張想君比爾快為樂彥仁書云仁祖家欲至蕪湖單弱令俜何所成君書得載停郡迎喪甚事宜但異域之乖素已不可言何時可得發六日告薑復雨始晴快情汝母子平安二十七日告薑汝母子佳不力不一一耶告前使還有書哀猥不能敘懷情痛兼哀若割當奈何奈何省弟纍紙哀毒之極但報書難為心懷況卿處之何可具忍有始有卒自古而然雖當時不能無情痛理有大斷豈可以之致弊何由寫心絶筆猥咽不知何言也十二月六日羲之報一昨因暨主簿不悉昨得去月十五日二十三日二書為慰雨晝夜無解夜來復雪弟各可也此日中冷患之始小佳力及不一一羲之報羲之死罪前得雲子諸人書並毀頓胡之惟分推難為心當有分西者否羲之死罪七月五日羲之頓首昨便斷草葬送期近痛傷情深奈何奈何得去月二十八日告具問慰懷力還不次王羲之頓首七月十六日羲之報凶禍纍仍周嫂棄背大賢不救哀痛兼傷切割心情奈何奈何遣書感塞羲之報二十三日發至長安云渭南患無他然云苻健衆尚七萬苟及最近雖衆由匹夫耳即今剋此一假不知歲終云何守之想勝才弘之自當有方耳隔以久諸懷既不可言且今多慘戚遲君果前暫得一散懷知以多疾不果乃當秋事省告同此歎恨如何可言葬事不可倉卒當在九月初過此故欲一與吳興集冀無不剋耳然事來萬端不知如人意不非書能悉君數告以慰之耳六月十六日羲之頓首秋節垂至痛悼傷惻兼情切割奈何奈何此雨過得十日告知君如常吳興轉勝甚慰想得此涼日佳患散乃委頓耿耿且以佳興消息僕故是常耳劣劣解日力不次王羲之頓首歌章輒付卿或有寫書人者可寫一道與吾也付十一板書王散騎筆篤患餘不一一羲之死罪去冬在東鄮因還使白箋伏想至自頃公私無信便故不復承動靜至於詠德之深無日有隧省告可謂眷顧之至尋玩三四但有悲慨民年以西夕而衰疾日甚自恐無暫展語平生理也以此忘情將無其人何以復言惟願珍重為國為家時垂告慰絶筆情塞羲之死罪六月十一日羲之報道護不救疾惻怛傷懷念弟聞問悲傷不可勝奈何奈何曹妹纍喪兒女不可為心如何得二十三日書為慰及還不次王羲之報追尋傷悼但有痛心當奈何奈何得告慰之吾昨頻哀感便欲不自勝舉旦復服散行之益頓乏推理皆如足下所誨然吾老矣餘願未盡惟在子輩耳一旦哭之垂盡之年將無復理此當何益冀小卻漸消散耳省卿書但有酸塞足下念故言散所豁多也王羲之頓首向遣書想夜至得書知足下問當遠行諸懷何可言一十必早發想足下如向期也阮侯止於界上耳向書已具不復一一王羲之白宿息想足下安書吾猶不勝能佳一十早往遲王羲之頓首二十九日羲之報月終哀摧傷切奈何奈何得昨示知弟下不斷昨紫石散未佳卿先羸甚羸甚好消息吾比日極不快不得眠食殊頓勿令合陽冀當佳力不一一王羲之報九月二十八日羲之頓首頓首昨者書想至參軍近有慰阮光祿信在耳許中郎家欲因書比去報知庾君遂不救疾摧切心情不得自甚痛當奈何深當寬勉以不忘先心臨紙但有酸惻王羲之頓首羲之白不復面有勞得示足下佳為慰吾卻遽又睡甚勿勿力不具王羲之白十一月五日羲之報適為不吾悉不適弟各佳不吾至勿勿力數羲之報兄弟上下遠至此慰不可言嫂不和憂懷深期等殊勿勿燋心桓公不得敘情不可居處雲子諸人何似耿耿能數省否彥仁數問也修載暫來欣慰六月十九日羲之白使還得八日書知不佳爾何耿耿僕日弊而得此熱勿勿解日耳力遣不具王羲之白十二月一日羲之白昨得還書知極不加疾人甚憂耿耿消息比佳耳吾至乏劣為爾日日力不一一羲之報想明日可謝諸子十四日羲之白近反不悉兩足下佳不不得近問問無殊不佳頓劣因不一一羲之白羲之頓首得貺知意至諸君皆困乏常想無之何緣作此煩損今付還王羲之長高當暫還耶范公書如此今示君須庾見故當勸果之告旨語君遲而不可言一日多恨知足下散動耿耿護護吾至不佳劣劣不一一王羲之頓首司馬疾篤不果西憂之深公私無所成知比得丹陽書甚慰乖離之歎當復可言尋答其書足下反事復行便為索然良不可言此亦分耳遲面具比日尋省卿文集雖不能悉周遍尋玩以為佳者名固不虛序述高士所傳小有異同見卿一一問應止楊王孫前以共及意同可誠述敘之耶暇日無為想不忘之初月一日羲之白忽然改年新故之際致歎至深君亦同懷近過得告故云腹痛懸情災雨比復何似氣力能勝不僕為耳力不一一王羲之旦書至也得示為慰云小大多患念勞心遲見足下未果為結力不一一王羲之白三日先疏未得去得四日疏為慰兄書已具不復一一鎮軍昨至欣尚未見也尋見之悲欣不可言上下近問慰馳情不知何似絶不得松問汝得旨問馳白宜豫知分春事也吾日東可語期令知消息復數橘子即云乃好可噉久得新栗此院冬桃不能得多送觸事何當不存往恆語然獨折知書有去縣奔去誠意義官至也有禮制恐不必果耶且君在彼縣常以為得意宜思之耶意至故示羲之白兄子發尚未有定日當送至瀾遠乖不可復言適欲遣書會得足下一面故知示羲之頓首十九日羲之報近書反至也得八日書知吳故羸敬倫動氣發耿耿想得冷此為佳也敬文佳不一一羲之報省足下前後書未嘗不憂欲與事地相與有深情者何能不恨然古人云行其道忘其為身真卿今日之謂政自當豁其胸懷然得公平政直耳未能忘已便自不得行然此皆在足下懷願卿為復廣求於衆所悟故多山之高言次何能不十一月七日羲之報近因子卿書想行至霜寒弟可不頃日了不得食至為虛劣力及數字羲之報二十三日羲之報一日得書皆在計書所不得有反轉熱卿各佳不定何可得來遲面不一一王羲之報知須果栽便可遣取視君勢陳欲欲無出理近書至也得十八日書為慰雨蒸比各可不參軍轉差也懸耿吾胛痛劇灸不得力至患之不得書自力數字尊夫人向來復何如為何所患甚懸情念卿纍息具至羲之敬問想諸舍人小大皆佳弟摧之可為心且得集目下此慰多矣姊纍告安和梅妹大都可行袁妹極得石散力然故不善佳疾久尚憂之想野久恙至善分張諸懷可云不知其期何時可果永嘉競逐者有力恐難冀得大柿當種之篤不喜見客篤不堪煩事此自死不可化而人理所重如此都郡江東所聚自非復弱幹所堪足下未知之耳給領與卿同殊為過差交人士因開門以勉待之無所復言君遠在此乃受恩來今留之明晚其親親集想君未便至餘姚爾云殷生得快罔大事數謝生書但有藥耳云彥仁或宣城甚佳情事實宜今有云想深復征許也寂不得都問知卿云曰問故未知西審問使人憂耿得問示信使甚數而無還者似書疏不可得得問宜示告之知長翔田舍比卿還當知何候須得音副民望甚善羲之白霧氣足下各何如長素轉佳甚耿耿冀行面遣知問王羲之白昨送諸書令示卿想見之恐殷侯必行義望雖宜爾然今此集信為未易卿若便西者良不可言晴快足下各佳不長素轉佳也甚耿耿故知問具示王羲之白足下晚各何以恆灼灼吾坦之欲不復堪事內然力不一一王羲之頓首十二月草四日羲之報歲盡感歎得十二日書為慰大寒比可不吾故羸乏力不一一王羲之報藥湯諸人佳也今知問朱博士何當還君可致意令速還想無稽留吾至今目欲不復見字見君小大佳不過此乃知熙佳覺少不得同萬恨萬恨云出便當西念遠別何可云遲見玄度今或以在道賓諸人佳不皆致心憶之不忘懷妹不快憂勞餘平安初月十二日羲之纍書至得去月二十六日書為慰比可不僕下連連不斷無所一欲噉輒不化消諸弊甚不知何以救之罔極然及不一一羲之白昨近有書至此故不多也遲書不悉耳知尚書中郎差為慰不得吳興問懸心數吳中聞耳小奴在此忽患瘧比數發今日最為大都輕瘧耳尚小停今在吾廄中念猶懸心小患耳無所垂心須佳乃去此言不可乏得知足下問吾忽忽力數字直遣軍使者可各差十五人耶合三十人足周事足下足下知消息今故遣問使至具示之力書不一一王羲之白
