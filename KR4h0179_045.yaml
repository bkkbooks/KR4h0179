body:
  text: 卷四十五傅玄風賦嘉太極之開元美天地之定位樂雷風之相薄悅山澤之通氣御覽一綿綿眇眇喜霽賦喜陰霖之既霽嘉良辰之肇晴悅氛電之潛匿兮樂天鑒之孔明行潦歸于百川兮七氣徹于天庭東風穆而扇路重陽昇其舒靈去湮沒之憂患即通塗之敞平釋昏墊之蒙昧覩日月之光榮若幽龍之出泉兮超飛躍乎太清昔唐帝之欽明兮遘洪水之巨害在殷湯之盛時兮亢炎旱以歷歲伊我后之神聖兮敷皇道以居帝雖風雨之失度兮且嘉穀之無敗咸調畼以茲茂兮天人穆其交泰命怡樂之吐和兮播仁風于無外初學記二霽晴八陽春賦虛心定乎昏中龍星正乎春辰嘉句芒之統時宣太皞之威神素冰解而泰液洽玄獺祭而鴈北征乾坤絪縕沖氣穆清幽蟄蠢動萬物樂生依依楊柳翩翩浮萍桃之夭夭灼灼其榮繁華曄而曜野兮煒芬葩而揚英鵲營巢于高樹兮燕銜泥于廣庭覩戴勝之止桑兮聆布穀之晨鳴樂仁化之普宴兮異鷹隼之變形習習谷風洋洋綠泉丹霞橫嶺文虹竟天藝文類聚三初學記一又三文選王融曲水詩序注引作丹霞播景生氣方盛九陽奮發初學記三述夏賦四月惟夏運臻正陽和氣穆而扇物麥含露而飛芒清徵泛于琴瑟朱鳥感于炎荒鹿解角于中野草木蔚其條長鳳皇昇而王萯秀龍辰中而螢火翔藝文類聚三初學記三御覽二十三大寒賦五行倏而競騖兮四節紛而電逝諒暑往而寒來十二月而成歲日月會于析木兮重陰悽而增肅在中冬之大寒兮迅季旬而逾蹙彩虹藏于虛廓兮鱗介潛而長伏若乃天地凜冽庶極氣否嚴霜夜結悲風晝起飛雪山積蕭條萬里百川咽而不流兮冰凍合于四海扶木憔悴于暘谷若華零落于濛氾云云藝文類聚三北堂書鈔一百五十六初學記三元日朝會賦仰二皇之文象詠帝德乎上系攷夏后之遺訓綜殷周之典制采秦漢之舊儀定元正之嘉會于是先期戒事眾官允敕萬國咸亨各以其職翼翼京邑巍巍紫極前三朝之夜中庭燎晃以舒光華燈若乎火樹熾百枝之煌煌俛而察之如亢燭龍而照玄方仰而觀焉若披丹霞而鑒九陽閶闔闢天門開坐太極之正殿嚴嵯峨以崔嵬嘉廣庭之敞麗美升雲之玉階乘羽蓋之葳蕤相者從容俟次而入濟濟洋洋肅肅習習就位重列面席而立臚人齊列賓禮九重群后德讓海外來同束帛戔戔羔鴈邕邕獻贄奉璋人肅其容六鍾隱其駭奮鼓吹作乎雲中及震天而動地盪海岳而薄風雲流蘇粲粲華蓋重陰羽林虎旅長戟𢴍摻是時天子盛服晨興坐武帳憑玉几正南面以聽朝平權衡乎砥矢群司百辟進阼納觴皇恩下降休氣上翔禮畢饗讌進止有章六樂遞奏磬管鏗鏘淵淵鼓鐘嘒嘒笙簧搏拊琴瑟以詠先皇雅歌內畼頌聲外揚初學記十四又二十五藝文類聚四晉書禮志下宋書禮志一御覽二十九三百五十二五百三十九跱鳳虎之二樽清酤皆以停淵御覽七百六十一猛虡化其高驤樹羽燁以紛華設業兩廂飾以崇牙書鈔一百十一乃有海西名倡齊同材舞手無廢音足不徒附猨戲於雲表燕躍於輕機辟雍鄉飲酒賦時皇帝親枉萬乘之尊號以幸乎辟雍鹵簿齊列百官正容侍衛參差階戟百重乃延卿士乃命王公是日也定小會之常儀兮饗殊俗而見遠邦連三朝以攷學兮覽先賢之黃同揖讓而升有主有賓禮雖舊制其教惟新若其俎豆有數威儀翼翼賓主百拜貴賤修敕酒清而不飲肴乾而不食及至嘒嘒笙磬喤喤鐘鼓琴瑟安歌德音有敘樂而不淫好樸尚古四坐先迷而後悟然後知禮教之弘普也藝文類聚三十八正都賦錦牆雕柱御覽一百八十七撫琴瑟陳鍾虡吹鳴簫擊靈鼓奏新聲理祕舞修袖連娟長裙繽紛起若翔龍降若頹雲乃有材童妙妓都盧迅足緣修竿而上下形既變而景屬忽跟挂而倒絕若將墜而復續虯縈龍蜒委隨紆曲杪竿首而腹旋承嚴節之繁促手戲絕倒淩虛寄身跳丸擲堀飛劍舞輪于是神嶽雙立岡巖岑崟靈草蔽崖嘉木成林東父翳青蓋而遐望西母使三足之靈禽列仙逸唱熊虎聽音丹蛟吹笙文豹鼓琴素女撫瑟而安歌聲可意而入心偓佺起而鶴立和清響而哀吟藝文類聚六十一五采文身質美光炫激動風于秦罏飛光天之烈燄苗山之鋌鑄以為劍其利也陸斷犀兕水戲輕鴻灑奔駟于中衢斬雙蛟于大江將以威天下而禦群凶建乎禋祀祈福上帝天子乃反吉服襲大裘綖紐五采平冕垂旒質文彬彬帝容孔修列大駕于郊畛升八通之靈垓執鎮圭而進蒼璧思致美乎上乾爾乃大蔟為徵圓鍾為宮吹孤竹而拊雲和修軒轅之遺風類于圜丘六變既終則天神斯降可得而禮矣御覽五百二十七然後戒水軍遵川流越舼泛吳榜浮歌玄雲詠石留北堂書鈔一百三十七又一百三十八飛雲鷁首龍舟艎艨艟水城蜀艇吳航萬艘俱興雲帆齊張縣旆光天征鐸琳琅淩波泝流星列雁行北堂書鈔一百三十七一百三十八御覽三百三十四白日舒靈景于天文選左思詠史詩注引三都賦疑即正都之誤彤彤朱宮文選謝靈運九日登戲馬臺詩注引西都賦巍巍絳闕文選陸機五等論注引西都賦顏延年赭白馬賦注引北都賦疑皆正都之誤奏新聲理祕舞飆回風轉流采成文修袖連娟長裾繽紛赴若翔龍降若穨雲初學記十五引西都賦案藝文類聚引正都賦有奏新聲理祕舞二語明西都即正都之誤詠激楚之遺風耿陽河而位迥列騎齊驤輕袿翩熊頭豹尾詭譎啄遠皆九珠異百端馬如激電人象飛仙龍淵太阿巨闕干將純鉤莫邪辟閭步光綴以南海之珠飾以夏后之璜雖警道而後行猶建黃鉞以禦姦鸞旂即舉承以皮軒雲罕飛旒闟戟嬋媛潛通賦尺蠖屈體以求伸兮龍階木而升雲御覽九百四十八作傅奕矯情賦序我太宗文皇帝命臣作西征賦又命陳徐諸臣作箴皆含玉吐金爛然成章敘行賦序敘行賦序終南鬱以巍峨太幽淩乎昊蒼初學記五大言賦要佩六氣首戴天文御覽六百九十二駕五行書鈔十六筆賦𥳑修毫之奇兔撰珍皮之上翰濯之以清水芬之以幽蘭嘉竹翠色彤管含丹于是班匠竭巧名工逞術纏以素枲納以玄漆豐約得中不文不質爾乃染芳松之淳烟兮寫文象于紈素動應手而從心煥光流而星布藝文類聚五十八初學記二十一引兩條鋒鍔淋漓芒時鍼烈柔不絲屈剛不玉折硯賦採陰山之潛璞簡眾材之攸宜節方圓以定形鍛金鐵以為池設上下之剖判配法象乎二儀木貴其能輭石美其潤堅加采漆之膠固含沖德之清玄藝文類聚五十八初學記二十一引兩條御覽六百五團扇賦何皎月之纖素擬皓日而輭貞晞箑莆之芳烈隨變體而殊名朗勁節以立質象日月之定形北堂書鈔一百三十四極名工之機變總五方之奇妙同上出茲扇于懷袖激微風而增涼同上隆暑翕以鬱蒸炎氣燎於幽房相風賦竝序相風賦竝序昔之造相風者其知自然之極乎其達變通之理乎上稽天道陽精之運表以靈烏物象其類下憑地體安貞之德鎮以金虎玄成其氣風雲之應龍虎是從觀妙之徵神明可通夫能立成器以占吉凶之先見者莫精乎此乃構相風因象設形蜿盤虎以為趾建修竿之亭亭體正直而無撓度經高而不傾棲神烏于竿首候祥風之來征北堂書鈔一百三十藝文類聚六十八竝作傅玄琴賦并序琴賦并序神農氏造琴所以協和天下人性為至和之主齊桓公有鳴琴曰號鍾楚莊有鳴琴曰繞梁中世司馬相如有琴曰綠綺蔡邕有琴曰焦尾皆名器也北堂書鈔一百九又後漢蔡邕傳注文選張載擬四愁詩注又初學記十五引兩條作蔡邕有琴曰綠猗馬融譚思于止息文選琴賦注播之以八風文之以五聲北堂書鈔一百九琵琶賦世本不載作者聞之故老云漢遣烏孫公主嫁昆彌念其行道思慕故使工人知音者載琴箏筑箜篌之屬作馬上之樂今觀其器中虛外實天地之象也盤圓柄直陰陽之序也柱十有二配律呂也四絃法四時也以方語目之故云琵琶取其易傳于外國也杜摯以為嬴秦之末蓋苦長城之役百姓弦鞉而鼓之二者各有所據以意斷之烏孫近焉宋書樂志一又初學記十六引兩條通典一百四十四御覽五百八十三控修柄以布柱轉四時而發機書鈔一百十素手紛其若飄兮逸響薄于高梁弱腕忽以競騁兮象驚電之絕光飛纖指以促柱兮創發越以哀傷時旃以劫蹇兮聲撽籴以激揚啟飛龍之祕引兮逞奇妙于清商哀聲內結沈氣外澈舒誕沈浮徊翔曲折初學記十六然後眾弄雜會六引遞奏纖絃振舞迅手繁騖初學記十六合荊山之文梓規靈象而定婆吹西笛兮冗東歌箏賦并序箏賦并序世以為蒙恬所造今觀其器上崇似天下平似地中空準六合絃柱擬十二月設之則四象在鼓之則五音發體合法度節究哀樂斯乃仁智之器豈蒙恬亡國之臣所能關思運巧哉宋書樂志一初學記十六通典一百四十四追赴促彈急擊扣危洪纖雜奮或合或離初學記十六陰沈陽升柔屈剛興玄黃之分推故引新迭為主賓四時之陳同上清濁代興有始有終哀起清羽樂混大宮同上笳賦序笳賦序吹葉為聲文選李陵荅蘇子卿書注節賦黃鍾唱哥九韶興舞口非節不詠手非節不拊宋書樂志一通典一百四十四敘酒賦應酒旗之靈象明粲而在天推酒泉之嘉名北堂書鈔一百四十八引傅玄酒賦或三釀而速美或九醞而後成同上引敘酒賦課長安與中山比蒼梧與宜城造樂限以御味密甜而膽苦同上飲者柸無筭歐醴成川渠同上唐堯千鍾竭周文百觚泊有康樽定國同上投壺賦序投壺賦序投壺者所以矯懈而正心也御覽七百五十三彈碁賦序彈碁賦序漢成帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊所宜御乃因其體而作彈碁以解之今觀其道蹴鞠道也世說巧蓺篇注御覽七百五十五紫華賦并序紫華賦并序紫華一名長樂華舊生于蜀其東界特饒中國奇而種之余嘉其華純耐久可歷冬而服故與友生各為之賦有遐方之奇草稟二氣之純精仰紫微之景耀因令色以定名剛莖勁立纖條繁列從回風以搖動紛蘭畼而蕙潔蔚青蔥以增茂竝含華而未發于是散綠葉秀紫榮蘊若芝草之始敷灼若百枝之在庭炳參差以昭燿兮何光麗之難形葩豔挺于碧枝兮煥若珊瑚之萃英渙渙昱昱而奪人目精下無物以借喻上取象于朝霞妙萬物而比豔莫茲草之可嘉藝文類聚八十一御覽八百七鬱金賦葉萋萋兮翠青英蘊蘊而金黃樹菴藹以成蔭氣芳馥而含芳淩蘇合之殊珍豈艾網之足方榮曜帝寓香播紫宮吐芬揚烈萬里望風藝文類聚八十一芸香賦序芸香賦序月令仲春之月芸始生鄭玄云芸香草也世人種之中庭始以微香進入終于捐棄黃壤吁可閔也遂詠而賦之藝文類聚八十一御覽九百八十二蜀葵賦并序蜀葵賦序蜀葵其苗如瓜瓠嘗種之一年引苗而生華經二年春乃發既大而結鮮紫色曜日御覽九百九十四宜男花賦猗猗令草生于中方花曰宜男號應禎祥遠而望之煥若三辰之麗天近而察之明若芙蓉之鑒泉于是狡童媛女以時來征結九秋之永思含春風以娛情藝文類聚八十一御覽九百九十四充后妃之盛飾兮登紫薇之內庭爾雅翼三菊賦布濩河洛縱橫齊秦掇以纖手承以輕巾服之者長壽食之者通神藝文類聚八十一蓍賦春邁衡德于青陽混百卉而萌生逮朱夏而修茂暨商秋而堅貞雖離霜而未彫與潛龜乎通靈于是原極以道極形以度以類萬物之情以通天下之故豈唯終始于事業乃參天而倚數棄原野之蕭條升雲階而內御運茲莖于掌握爻象形而星布信鉤深而致遠實開物而成務藝文類聚八十二瓜賦調土下種播之有經應運俟時員甲徐生遂日就而月將既成母而盤縈次落莫之密葉兮交逶迤之修莖敷碧綠之純采金華炳其朗明育之以人功養之以六氣白者如素黑者如䵳黃逾金緗青侔含翠雖貍首之甘美兮未若東野之奇偉舊有蜜筩及青栝樓嘉味溢口異類寡儔一齧之頃至三搖頭選美芳園重簡其珍披以吳刀承以朱盤中割而破雖分若完質兼三味氣美芳蘭愈得冷而益甘兮頤神爽而解煩細肌密理多瓤少瓣豐旨絕異食之不䬼藝文類聚八十七初學記二十八御覽九百七十八龍眼生于南極甘盧引于崑山御覽九百六十七安石榴賦鳥宿中而纖條結龍辰升而丹華繁其在晨也灼若旭日棲枎桑其在昏也奭若燭龍吐潛光苞玄黃之烈輝緣煒曄而焜煌發朱榮于綠葉時從風而飄揚藝文類聚八十六御覽九百七十李賦植中州之名果兮結修根于芳園嘉列樹之蔚蔚兮美弱枝之爰爰既乃長條四布密葉重陰夕景迴光傍蔭蘭林于是肅肅晨風飄飄落英潛實內結豐彩外盈翠質朱變形隨運成清角奏而微酸起大宮動而和甘生既變洽熟五色有章種別類分或朱或黃甘酸得適美逾蜜房浮彩點駮赤者如丹入口流濺逸味難原見之則心悅含之則神安乃有河沂黃建房陵縹青一樹三色異味殊名乃上代之所不覩兮咸升御乎紫房周萬國之口實兮充薦饗于神靈昔怪古人之感貺乃荅之以寶瓊翫斯味之奇瑋兮然後知報之為輕藝文類聚八十六初學記二十八御覽九百六十八桃賦有東園之珍果兮承陰陽之靈和結柔根以列樹兮豔長畝而駢羅華落實結與時剛柔既甘且脃入口消流夏日先熟初進廟堂辛氏踐秋厥味益長亦有冬桃冷侔冰霜放神適意恣口所嘗華升御于內庭兮飾佳人之令顏實充虛而療飢兮信功烈之難原嘉放牛于斯林兮悅萬國之乂安望海島而慷慨兮懷度朔之靈山何茲樹之獨茂兮條枝紛而麗閑根龍虬而雲結兮彌千里而屈盤禦百鬼之妖慝兮列神荼以司奸辟凶邪而濟正兮豈唯榮美之足言藝文類聚八十八初學記二十八橘賦序橘賦序詩人覩王睢而詠后妃之德屈平見朱橘而申直臣之志焉御覽九百六十六棗賦有蓬萊之嘉樹植神州之膏壤擢剛莖以排虛誕幽根以滋長北陰塞門南臨三江或布燕趙或廣河東既乃繁枝四合豐茂蓊鬱斐斐素華離離朱實脃若離雪甘如含蜜脆者宜新當夏之珍堅者宜乾薦羞天人有棗若瓜出自海濱全生益氣服之如神初學記二十八引兩條御覽九百六十五蒲桃賦踰龍堆之險越懸度之阻涉乎三光之阪歷乎身熱之野御覽九百七十二桑椹賦繁實離離含甘吐液翠木三變或玄或白嘉味殊滋食之无斁御覽九百七十三柳賦美允靈之鑠氣兮嘉木德之在春何茲柳之珍樹兮稟二儀之清純受大角之禎祥兮生濛氾之遐濱參剛柔以定體兮應中和以屈伸長莖舒而增茂兮密葉布而重陰夾通塗與廣庭兮環清沼而成林于是玄雲反岳素景含暉泰液渥流朝露未晞似精靈之所鍾兮蔚鬱鬱以依依居者觀而弭思兮行者樂而忘歸夫其結根建本則固于泰山兼覆廣施則均于昊天雖尺斷而逾滋兮配生生于自然無邦壤而不植兮象乾道之屢遷紛猗靡以從風兮若將往而復旋若乃豐葩茂樹長枝夭夭阿那四垂凱風振條同志來遊攜手逍遙初學記二十八又略見藝文類聚八十九朝華賦序朝華賦序朝華麗木也藝文類聚八十九雉賦稟炎離之正氣應朱火之禎祥播五彩之繁縟被華文而成章冠列角之威儀翹從風而飄揚履嚴距之武節超鸞跱而鳳翔感天和而貽瑞進據鼎而祚商樂周道之方隆敷皓質于越裳飲以華泉之水食以玄山之粱藝文類聚九十御覽八百四十二山雞賦惟南州之令鳥兼坤離而體珍被黃中之五色敷文象以飾身翳景山之竹林超遊集乎水濱鑒中流以顧影晞雲表之清塵藝文類聚九十一鷹賦含災离之猛氣兮受金剛之純精獨飛跱于林野兮復迴翔于天庭初學記三十左看若側右視如傾勁翮二六機連體輕句爪縣芒足如枯荊觜利吳戟目類明星雄姿邈世逸氣橫生藝文類聚九十一初學記三十奮翅不得起撫翼無所翔飾五采之華絆結璇璣之金環初學記三十雖逍遙于廣廈思擊厲于中原同上
