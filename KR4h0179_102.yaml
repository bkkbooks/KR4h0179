body:
  text: 卷一百零二陸雲與兄平原書與兄平原書一日案行並視曹公器物床薦席具寒夏被七枚介幘如吳幘平天冠遠遊冠具在嚴器方七八寸高四寸餘中無鬲如吳小人嚴具狀刷膩處尚可識蹀批剔齒纖綖皆在拭目黃絮二在有垢黑目淚所沾汙手衣臥籠挽蒲棋局書箱亦在奏案大小五枚書車又作歧案以臥視書扇如吳扇要扇亦在書箱想兄識彥高書箱甚似之筆亦如吳筆硯亦爾書刀五枚琉璃筆一枚所希聞景初三年七月劉婕妤析之見此期復使人悵然有感處器物皆素今送鄴宮大尺間數前已白其繐帳及望墓田處是清河時臺上諸奇變無方常欲問曹公使賊得上臺而公但以變譎因旋避之若焚臺當云何此公似亦不能止文昌殿北有閣道去殿丈內中在東殿東便屬陳留王內不可得見也一日上三臺曹公藏石墨數十萬斤云燒此消復可用然煙中人不知兄頗見之不今送二螺省曹公遺事天下多意長才乃當爾作弊屋向百年于今正平夷塘乃不可得壞便以斧斫之耳爾定以知吏稱其職民安其業也雲再拜前省皇甫士安高士傳復作逸民賦今復送之如欲報稱久不作文多不悅澤兄為小潤色之可成佳物願必留思四言五言非所長頗能作賦為欲作十篇許小者以為一分生於愁思遂復文誨欲得雲論間在郡紛紛有所鉤定言語流行斷絶欲更定之而了不可以思慮今自好醜不可視想冬下體中佳能定之耳兄文章已自行天下多少無所在且用思困人亦不事復及以此自勞役閒居恐復不能不願當自消息謹啓雲再拜祠堂頌已得省兄文不復稍論常佳然了不見出語意謂非兄文之休者前後讀兄文一再過便上口語省此文雖未大精然了無所識然此文甚自難事同又相似益不古皆新綺用此已自為洋洋耳答少明詩亦未為妙省之如不悲苦無惻然傷心言今重復精之一日見正叔與兄讀古五言詩此生歎息欲得之謹啓雲再拜二祖頌甚為高偉雲作雖時有一佳語見兄作又欲成貧儉家無緣當致兄此謙辭又雲亦復不以苟自退耳然意故復謂之微多民不輟歎一句謂可省武烈未得有吳說桓王之事而云建其孤恐太祖不得為桓王之孫雲前作此頌及信以白兄作遊仙詩故自能劉氏頌極佳但無出言耳二頌不減復過所望如此已欲解此公之半歲暮賦甚欲成之而不可自用得此百數十字今送不知於諸賦者不罷少不想少佳成當送到洛陳琳大荒甚極自雲作必過之想終能自果耳謹啓雲再拜兵真凶事生來初不見習頃觀之正自使人意惡羊腸轉時極佳問人皆不解何以作此轉雖云欲相泄恐此正自取好耳說之不能工願兄試一說之張義元答員淵之回流崑崙吐河不體正自似急水中山石間是人謂回縳者但言之辭不工耳不知此中語於諸賦中何如頃日極勿勿病一十當出略通日在馬上此不可諧又恐信不及兄令以因休祖致又力作無錫書極無賴甚不備具如是更白問於中雲再拜爾乃使熊羆之士虓闞之將雄聲泉踊逸氣風亮超三軍以奔厲賈餘勇以成壯兆洪音於寂寞先無聲而高唱元兵時紛若屯雲煥若積波授教斯謐靜言勿譁嚴鼓隱其雲戒萬夫翕而咸和治安步以止立應金奏而靡戈進總干以乘言退揮旅而星羅禮既畢歸旅將振尋縈員轉因瀨蓋旋若疾流之繞駿沉驚飆之靡狂塵羊腸轉時命屏翳以夕降式飛廉而朝興涂蒙雨而後清景帶天而先澄陪畯臣於雕輅列名僚於後乘猛將起而虎嘯商風肅其來應士憑勢而響駭馬噓天而景凌雲再拜省諸賦皆有高言絶典不可復言頃有事復不大快凡得再三視耳其未精倉卒未能為之次第省述思賦流深情至言實為清妙恐故復未得為兄賦之最兄文自為雄非纍日精拔卒不可得言文賦甚有辭綺語頗多文適多體便欲不清不審兄呼爾不詠德頌甚復盡美省之惻然扇賦腹中愈首尾發頭一而不快言烏云龍見如有不體感逝賦愈前恐故當小不然一至不復滅漏賦可謂清工兄頓作爾多文而新奇乃爾真令人怖不當復道作文謹啓雲再拜祠堂贊甚已盡美不與昔同既此不容多說又皆一事非兄亦不可得見弔少明殊復勝前弔蔡君清妙不可言漢功臣頌甚美恐弔蔡君故當為最使雲作文好惡為當又可成耳至於定兄文唯兄亦怒其無遺情而不自盡耳丞相贊云披結散紛辭中原不清利兄已自作銘此但頌實事耳亦謂可如兄意真說事而已若當復屬文於引便當書前銘耳謹啓雲再拜誨欲定吳書雲昔嘗已商之兄此真不朽事恐不與十分好書同是出千載事兄作必自與昔人相去辨亡則已是過秦對事求當可得耳陳壽吳書有魏賜九錫文及分天下文吳書不載又有嚴陸諸君傳今當寫送兄體中佳者可並思諸應作傳及作引甚單常欲引之未得兄所作引甚好雲方欲更作引述思賦黨自竭厲然雲意皆已盡不知本復何言方當積思思有利鈍如兄所賦恐不可須願兄且以示伯聲兄弟前日觀習先欲作講武賦因欲遠言大體欲獻之大將軍才不便作大文得少許家語不知此可出不故鈔以白兄若兄意謂此可成者欲試成之大文難作庶可以為關睢之見微謹啓雲再拜往日論文先辭而後情尚潔而不取悅澤嘗憶兄道張公父子論文實自欲得今日便欲宗其言兄文章之高遠絶異不可復稱言然猶皆欲微多但清新相接不以此為病耳若復令小省恐其妙欲不見可復稱極不審兄由以為爾不茂曹碑皆自是蔡氏碑之上者比視蔡氏數十碑殊多不及言亦自清美愚以無疑不存三祖贊不可聞武帝贊如欲管管流澤有以常相稱美如不史願更視之小跛幾而悅奕為盡理雲今意視文乃好清省欲無以尚意之至此乃出自然張公在者必罷必復以此見調不知九愍不多不當小減九悲九愁連日鈔除所去甚多才本不精正自極此願兄小為之定一字兩字出之便欲得遲望不言謹啓雲再拜仲宣文如兄言實得張公力如子桓書亦自不乃重之兄詩多勝其思親耳登樓賦無乃煩感丘其弔夷齊辭不為偉兄二弔自美之但其呵二子小工正當以此言為高文耳文中有於是爾乃於轉句誠佳然得不用之益快有故不如無又於文句中自可不用之便少亦常云四言轉句以四句為佳往曾以兄七羡回煩手而沉哀結上兩句為孤今更視定自有不應用時期當爾復以為不快故前多有所去喜霽俯順習坎仰熾重離此下重得如此語為佳思不得其韻願兄為益之謹啓雲再拜嘗聞湯仲歎九歌昔讀楚辭意不大愛之頃日視之實自清絶滔滔故自是識者古今來為如此種文此為宗矣視九章時有善語大類是穢文不難舉意視九歌便自歸謝絶思兄常欲其作詩文獨未作此曹語若消息小佳願兄可試作之兄復不作者恐此文獨單行千載間常謂此曹語不好視九歌正自可歎息王褒作九懷亦極佳恐猶自繼真玄盛稱九辨意甚不愛雲再拜頃得張公封禪事平平耳不及李氏其文無比恐非其所作欲見此公劉氏世頌有信願付雲頃又為輔吳奮威作頌欲愈前頌然意並不以快遣信當送九愍三賦脫然謂可舉意假彼頌便有怯處想無又間便可耳大類不便作四言五言謹啓雲再拜誨二賦佳久不復作文又不復視文章都自無次第文章既自可羡且解愁忘憂但作之不工煩勞而棄力故久絶意耳在此悲思視書不能解前作二篇後為復欲有所作以慰小思慮便大頓極不知何以乃爾前登城門意有懷作登臺賦極未能成而崔君苗作之聊復成前意不能今佳而嬴瘁纍日猶云愈前二賦不審兄平之云何願小有損益一字兩字不敢望多音楚願兄便定之兄音與獻彥之屬皆願仲宣須賦獻與服繁張公語雲云兄文故自楚須作文為思昔所識文乃視兄作誄又令結使說音耳兄所撰願且可付之此有書者更校善書送信還望之謹啓雲再拜疏成高作未得去省登遐傳因作登遐頌須臾便成視之復謂可行今並送之尚未定利及此信今更有何所損益後八人了無事合會之才得二篇耳索度是淫鬼無緣在此中故不可作頌愁邑忽欲復作文欲定前於用功夫大小文隨了為以解愁作文臨時輒自云佳小久報不能視為此故息意爾今視所作不謂乃極更不自信恐年時間復捐棄之徒自困苦爾兄小加潤色便欲可出極不苦作文但無新奇而體力甚困瘁耳謹索幼安在此令之草今住一弘不呼作工謹啓雲再拜誨頌兄乃以為佳甚以自慰文章當貴經緯如謂後頌語如漂漂故謂如小勝耳九愍如兄所誨亦殊過望雲意自謂當不如三賦情難非體中所長欲遍周流雲意亦謂為佳耳然不云其愈於與漁父吾今多少有所定及所欲去留粗爾今送本往不審能勝故不意亦殊未以為了南去轉遠洛中勿勿少暇願兄勑所遺留為當爾可須來不佳思慮益處未能補所欲去徹與察皆不與日韻思惟不能得願賜此一字雲作文如兄所論已過所望況乃當敢今兄有張蔡之懷得此乃懷怖也謹啓雲再拜誨歲暮如兄所誨雲意亦如前啓情言深至述思自難希每憶常侍自論文為當復自力耳雲意呼發頭但當小不如復耳兄乃不好者試當更思之所誨雲文所比愁霖喜霽之徒實有可爾者登樓名高恐未可越爾楊四公黃胡頌恐此不得見比聞兄此誨若有喜懼交集祖德頌無大諫語耳然靡靡清工用辭緯澤亦未易恐兄未熟視之耳兄文方當日多但文實無貴於為多多而如兄文者人不饜其多也屢視諸故時文皆有恨文體成爾然新聲故自難復過九悲多好語可耽詠但小不韻耳皆已行天下天下人歸高如此亦可不復更耳兄作大賦必好意精時故願兄作數大文近日視子安賦亦對之歎息絶工矣兄誨又爾故自是高手謹啓雲再拜蔡氏所長唯銘頌耳銘之善者亦復數篇其餘平平耳兄詩賦自與絶域不當稍與比校張公昔亦云兄新聲多之不同也典當故為未及彥藏亦云爾又古今兄文所未得與校者亦惟兄所道數都賦耳其餘雖有小勝負大都自皆為雌耳張公父子亦語雲兄文過子安子安諸賦兄復不皆過其便可可不與供論雲謂兄作二京必得無疑久勸兄為耳又思三都世人已作是語觸類長之能事可見幽通賓戲之徒自難作賓戲客語可為耳答之甚未易東方士所不得全其高名頗有答極謹啓雲再拜誨九愍如所勑此自未定然雲意自謂故當是近所作上近者意又謂其與漁父相見以下盡篇為佳謂兄必許此條而淵弦意呼作脫可行耳至兄唯以此為快不知雲論文何以當與兄意作如此異此是情文但本少情而頗能作泛說耳又見作九者多不祖宗原意而自作一家說唯兄說與漁父相見又不大委曲盡其意雲以原流放唯見此一人當為致其義深自謂佳願兄可試更視與漁父相見時語亦無他異附情而言恐此故勝淵弦兄意所謂不善願疏勑其處緒亦欲成之令出意莫更感如惡所在以兄文雲猶時有所能得言雲前後所作謹啓雲再拜誨前二賦佳視之行已復不如初昔文自無可成藏之甚密而為復漏顯世欲為益者豈有謂之不善而不為懷此不成意想兄已得懷之耳有作文唯尚多而家多豬羊之徒作蟬賦二千餘言隱士賦三千餘言既無藻偉體都自不似事文章實自不當多古今之能為新聲絶曲者無又過兄兄往日文雖多瑰鑠至於文體實不如今日間在洛有所視已當赦而比更隆以今意觀文見此真臾以為不盡善文罷云故日向人歎兄文人終來同殆以此為病張公文無他異正自情省無煩長作文正爾自復佳兄文章已顯一世亦不足復多自困苦適欲白兄可因今清靜盡定昔日文但當鉤除差易為功力誨已定敬長誄意當暗與兄合雲久絶意於文章由前日見敦之後而作文解愁聊復作數篇為復欲有所為以忘憂貧家佳物便欲盡但有錢穀復羞出之而體中殊不可以思慮腹立滿背便熱亦誠可悲間視大荒傳欲作大荒賦既自難工又是大賦恐交自困絶異往經比干墓悵然欲弔之無又即意又事業雲再拜張公藏誄自過五言詩耳但雲自不便五言詩由己而言耳玄泰誄自不及士祚誄兄丞相針小多不如女史清約耳恐兄無緣思於此意猶云何而兄乃有高倫更復無意雲故日不作文而常少張公文今所作兄輒復云過之得作此公輩便可裴然有所謝故自為不及諸碑藏輩甚極不足與校歌亦平平彼見人讚敘者當與令伯倫吳百官次第公卿名伯略盡識少交當具頃作頌及吳事有愴然且公傳未成諸人所作多不盡理兄作之公私並敘且又非常業從雲兄來作之今略已成甚復可借事少功夫亦易耳猶可得五十卷謹啓義高家事正當付令文耳弟彥長昔作吳事云三十卷可令欽求謹啓雲再拜吳書是大業既可垂不朽且非兄述此一國事遂亦失兄諸列人皆是名士不知姚公足為作傳不可著儒林中耳不大識唐子正事愚謂常侍便可連於尚書傳下書定自難雲少作書至今不能令成日見其不易前數卷為時有佳語近來意亦殊已莫莫猶當一定之恐不全此七卷無意復望增欲作文章六七紙卷十分可令皆如今所作輩為復差徒爾文章誠不用多苟卷必佳便謂此為足今見已向四卷比五十可得成但恐胸中成疢爾恐兄胸疾必述作人故計兄凡著此之自損胸中無緣不病作書猶差易讚敘亦復無幾年歲限之猶當小復謹啓雲再拜一日會公大欽欣命坐者皆賦諸詩了不作備此日又病極得思惟立草復不為乃倉卒退還猶復多少有所定猶不副意與頌雖同體然佳不如頌不解此意可以王弘遠去當祖道似當復作詩搆作此一篇至積思復欲不如前倉卒時不知為可存録不諸詩未出別寫送弘遠詩極佳中靜作亦佳張魏郡作急就詩公甚笑燕王亦似不復祖道弘遠已作為存耳兄園葵詩清工然猶復非兄詩妙者雲詩亦唯為彼一語如佳先已先得便自委頓欲更作之昔如己身先此篇詩了不復仿佛識有此語此語於常言為佳謹啓雲再拜久不復作文了無復次第真玄昔屢聞周侯至論前比霖雨此不人亦作愁霖賦好醜見敦又因人見督自愁慘又了無復意此家勤勤難違之亦復毒此雨憂邑聊作之因以言哀思又作喜霽今送雲作為易得耳窮不好故都絶意此間人呼作者皆休故不得有所送不審此何成已出之故為存不棄耳謹啓雲再拜一日視伯喈祖德頌亦以述作宜褒揚祖考為先聊復作此頌今送之願兄為損益之欲令省而正自輒多欲無可如省碑文通大悅愈有似賦愚謂小復質之為佳前作此頌書之行欲遣信以白兄昨聞有賦消息愁憒無賴既冀又然又已成書聊以付信耳尋得李寵勸封禪草信自有才頗多煩長耳令送間人又有張公所作已令寫別送臨紙罔罔不知復所言謹啓近得洛消息滕永適去二十日書彥先訪為驃騎司馬又云似未成已訪難解耳敬屬司馬參軍此間復失之恨不得與周旋戴允治見訪大司馬謹啓雲再拜君苗文天才中亦少爾然自復能作文雲唯見其登臺賦及詩頌作愁霖賦極佳頗倣雲雲所如多恐故當在二人後然未究見其文見兄文輒云欲燒筆硯以為此故不喜出之曹志苗之婦公其婦及兒皆能作文頃借其釋詢二十七卷當欲百餘紙寫之不知兄盡有不李氏云雪與列韻曹便復不用人亦復云曹不可用者音自難得正謹啓近日復案行曹公器物取其剔齒殲一箇今送以見兄于道有古方泉其銘如此不審兄頗曾見此書種稷不近因魯引以問祕書中謹啓雲再拜令送君苗登臺賦為佳手筆云復更定復勝此不知能愈之不其人推能兄文不可言作文百餘卷不肯出之視仲宣賦集初述征登樓前耶甚佳其餘平平不得言情處此賢文正自欲不茂不審兄呼爾不真玄亦云兄文當作宣輩宣得此巍巍耳愁霖喜霽殊自委頓恐此都自易勝謹啓雲再拜誨頌兄意乃以為佳甚以自慰今易上韻不知差前不不佳者願兄小為損益令定下云靈旆電揮因兄見許意遂不恪不知可作蔡氏祖德頌比不景猷有蔡氏文四十餘卷小者六七紙大者數十紙文章亦足為多然其可貴者故復是常所文耳雲頃不佳思慮胸腹如鼓夜不便眠了不可又以有意兄不佳文章已足垂不朽不足又多謹啓雲再拜嵇紹周弼並處事不值免詔甚切甚念之悚息胡光祿亡宿士可痛含邠還云滔中書散騎並缺是其才不知何以乃古之謹啓雲再拜頃哀思更力成歲暮賦適且畢猶未大定自呼前後所未有是雲文之絶無又憶兄常云文後成者恆謂之佳貞小爾恐數自後轉不知今且欲寄之既未大定又恐此信至兄已發當因著洛謹啓雲再拜兄前表甚有深情遠旨可耽味高文也兄文雖復自相為作多少然無不為高體中不快不足復以自勞役耳前集兄文為二十卷適訖一十當黃之書不工紙又惡恨不精謹啓答兄書修庭樹蓬文選顏延之和謝靈運詩注與朱光祿書少長之禮教化所崇中葉陵遲舊章廢替追惟前訓思遵在昔敢慕高義謹奏下敬與張光祿書三首與張光祿書三首長幼之序人倫大司季世多難失敬在昔敢希令典求思自邁謹奏下敬以藉虔款顧令文彥先每宣隆眷彌泰之惠懷德惟慚守以反側既晞仁風委心自昵加與沛君分同骨肉憑賴之懷疑心如結加蒙顧遇重以傾倒唯亮歸誠石行文敦素篤邃道實茂淑器敏既美思學又快南州良德今者東行望風自託其意繾綣願厚接納副其乃心與嚴宛陵書少長之序禮之大司晚節陵替舊章殘棄瞻言令典既慕欽承仰憑高風實副邦民謹奏下敬以藉虔款思復未遠庶免悔吝
