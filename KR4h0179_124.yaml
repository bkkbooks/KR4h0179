body:
  text: 孔洐四府君遷主議別廟有非正之嫌似若降春不可行也通典四十八禁招魂葬議時有沒在寇賊失亡屍喪皆招魂而葬吾以為出于鄙陋之心委巷之禮非聖人之制而為愚淺所安遂行于時王者所宜禁也何則聖人制殯葬之意本以藏形而已不以安魂為事故既葬之日迎神而返不忍一日離也況乃招其魂而葬之反于人情而失其禮虛造師事以亂聖典宜可禁也通典一百三十荅李瑋難禁招魂葬議祭必立壇不可謂神必墓中也若神必墓中則成周雒邑之廟皆虛設也又帝丘及詩來格聿歸皆所以明魂無不從耳既葬三日祭墓亦猶飯含不忍其虛耳共姬之焚以明窮而彌正不必灰燼也就復灰燼骨肉雖灰灰則其實何緣舍埋灰之實而反當葬魂乎此皆未代失禮之舉非合聖人之舊也通典一百三十在窮記賊來入門時家見在絹布三千餘匹及衣被器物皆令婢使輦出著庭中恣其所取由是皆競取財物不暇復見殺蓺文類聚八十五遣信與義陽太守孫仲開相聞告其困乏得娟二匹壤車一乘賣得絹三匹以糴米一石橡二斛食口三十五人百日之中以此自活人皆鶴節無復血色御覽四百五十六趙大龍以鶉二十枚奉上老母御覽九百二十四遭亂之後隰陽令述祖送四幅綘被一領書鈔一百三十四乖離論聖人制禮以為經常人之教宜備有其文以別彰其義即今代父子乖離不知自處之宜情至者哀過于有凶情薄者禮習于無別此人倫大事禮所宜明謂莫測存亡則名不定名不定不可為制孝子憂危在心念至則然矣自然之情必有降殺故五服之章以周月為節況不聞凶何得過之雖終身不知存亡無緣更重于三年之喪也故聖人不別為其制也通典九十八武悼楊皇后服議楊后母養聖上蓋以曲情今以恩禮追崇不配世祖廟王者無慈養之服謂祖載之日可三朝素服發哀而已晉書禮志中告廬江郡教昔魏文侯軾干木之閭齊相曹參尊崇蓋公皆所以優賢表德敦勵末俗徵土杜君德懋行絜高尚其志頃流離道路聞其頓躓刺史忝任不能崇飾有道而使高操之士有此難屯今遣吏宣慰郡可遣一吏縣五吏恆營卹之常以市租供給家人糧廩勿令闕乏上言宜聽劉實致仕夫堂高級遠主尊相貴是以古之哲王莫不師其元崇養老之教訓示四海使少長有禮七十致仕亦所以優異舊德厲廉高之風太尉實體清素之操執不渝之潔懸車告老二十餘年浩然之志老而彌篤可謂國之碩老邦之宗模臣聞老者不以筋力為禮實年踰九十命在日制遂自扶輿冒險而至展哀山陵致敬闕庭大臣之節備矣聖詔殷勤必使實正位上台光飪鼎實斷章敦喻經涉二年而實頻上露板辭旨懇誠臣以為古之養老以不事為優不以吏之為重謂宜聽實所守晉書劉實傳固陳寧州事君亡親喪幽閉窮城萬里訴哀不垂愍救既慚包胥無哭秦之感又媿梁妻無崩城之驗存不若亡乞賜臣死晉書王遜傳李毅既卒城中百餘人奉毅女同守經年永嘉四年治中毛孟詣京師求刺史不見省孟固陳云云以王遜為寍州刺史長鳴鷄賦嘉鳴雞之令美智窮神而入冥審璇璣之迴遽定昏明之至精應青陽于將曙忽鶴立而鳳停乃拊翼以贊時遂延頸而長鳴若乃本其形像詳其羽儀朱冠玉璫彤素竝施紛葩赫奕彩色流離殊姿豔溢采曜華披雍容鬱茂飄颻風靡扇六翮以增暉舒毛毳而下垂違雙距之岌峨曳長尾之逶迤蓺文類聚九十一初學記三十蠟燈賦爾乃旋閒房升玉榻列華槃鑠凝蠟浮炷熲甚始燃祕闈于是乃闔旁映文楹仰暉丹桷赫如燭龍吐輝爛若翳陽復旭蓺文類聚八十安石榴賦安石榴賦縈紅根以磐峙擢修幹而扶疏荑應春以吐綠葩涉夏而揚朱蓺文類聚八十六膏凝玉潤光猶瑩削赬如丹砂粲若銀礫初學記二十八縞隔區分彫實綺錯紅膚帖素揉以紫的初學記二十八紅鬚內豔赬牙外標似華燈之映翠幕若丹瓊之列碧瑤御覽九百七十駮議減邵廣死罪自淳樸澆散刑辟仍作刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典刑者也且既許宗等宥廣死罪若復有宗比而不求贖父命者豈得不擯絕人倫同之禽獸邪案主者今奏云惟特聽宗等而不為永制臣以為王者之作動關盛衰笑夭之閒尚慎所加況于國典可以徒虧今之所以宥廣正以宗等耳人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩于今而開萬怨于後也晉書范堅傳通典二百六十六尚書右丞范堅駮在東陽郡表瑞所統長山諸縣林中木葉上朝有凝露其味如密夕乃溜地耆老咸謂甘露蓺文類聚九十八請嚴詔諭庾翼還鎮疏臣伏思安西將軍翼今至襄陽倉卒攻討凡百草創安陸之調不復為襄陽之用而玄冬之月沔漢乾涸皆當魚貫而行排推而進設一處有急勢不相救臣所至慮一也又既至之後桓宣當出宣往實翦豺狼之林招攜貳之眾待之以至寬御之以無法田疇墾闢生產始立而當移之必有嗷然悔吝難測臣所至慮二也讓陽頓益數萬口奉師之費皆當出于江南運漕之難船人之力不可不熟計臣之所至慮三也且申伯之尊而興邊將竝驅又東軍不進殊為孤懸兵書云知彼知此百戰不殆知彼不知此一勝一負賊誠衰獘然得臣猶在我雖方隆今實未暇而連兵不解患難將起臣所至慮四也翼豈不知兵家所患常在于此顧以門戶事任憂責莫大晏然終年非心情所安是以抗表輒行畢命原野以翼宏規經略文武用命忽遇釁會大事便濟然國家之慮常以萬全非至安至審王者不舉臣謂宜嚴詔論翼還鎮養銳以為後圖若少合聖聽乞密出臣表與車騎臣冰等詳共集議晉書范汪傳為舊君服議當今刺史郡守幕府事任皆重與古諸侯不異也安漢魏名臣為州郡吏者雖違適不同多為舊君齊衰三月通典九十范汪議一本作范經誤與王彪之書尋起居注九月是康皇帝忌月禮止云忌日不樂都無忌月語不審是疑不若當疑于九月建八月其閒當下六禮便為至逼不復展如此當伸至十月忌不應以為忌邪足下可以示曹諸賢取定也通典一百與江惇書孝子重覩靈櫬哀慟口踊何以緦服臨至親之喪三月而除此乃儀禮數字了無首尾令人有疑孫放改葬其祖放開壙服斬衰一門反服從行者待柩至以衰絰迎于郊二月事畢放父四月晦除放兄弟二月晦除此皆反服通典一百二十荅高崧問高崧問范汪曰案小功之末可以冠子已雖小功卒哭可以冠而鄭孫二家注竝云己太功卒哭可以冠求之于禮無可冠之文范汪荅曰大功之末可以冠子此于子已為無服又云父小功可以冠子疑與上章俱有末語特于下言已雖小功卒哭可以冠是為小功卒哭皆得行冠娶之事也大夫三月而葬葬而後虞虞而後卒哭是為父雖小功子服盡也大功許冠婚則小功便無所不可也高崧重問范汪曰下殤小功則不可而云小功之末可以冠婚何范汪荅曰下殤小功此是周服之下殤不可以服輕而恩疏也而冠亦禮之明文何以復于大功小功喪中每言冠乎荅曰在喪冠而巳不行冠禮也于大功小功之末故可行冠禮因喪而冠與備行冠禮殊也或問者曰禮大功之末可以冠子嫁子可以娶婦已雖小功既卒哭可以取妻案經大功之末雖云可以冠子嫁子不言己可以冠而鄭氏注云己大功卒哭而可以冠未解經又云大功之末而注云卒哭不知此言未便是卒哭為非卒哭邪荅曰記云大功之末可以冠子嫁子而注又云己大功卒哭而可以冠小功卒哭而可以冠娶妻者冠而後娶今既云冠嫁其子則于文不得復自著己冠故注家合而明之以小功得娶妻則大功亦可以得冠冠輕婚重故大功之末得自冠小功之末得自娶以記文不備故注兼明之注之有此比禮三月既葬卒哭于小功則餘有二月是末也于大功則止三分之一便謂之末意常以疑之然鄭氏注喪服經云葬喪之大事既畢故謂之末邪重問曰省及申釋注意甚為允也然猶僕有所未了禮小功卒哭可以娶者婚禮娶婦之家三日不舉樂明婚雖屬吉而有嗣親之感小功餘喪不重祖考之思故可以娶也大功可冠猶有疑焉夫吉禮將事必先筮賓然後成禮大功之末可以冠嫁其子者以己大功之末于子則小功服已過半情降既殊日算浸遠故子可以行吉事至于己身親有功布重制月數尚近而便釋親而字之死則以成人之喪埋之雜記女雖未許嫁年二十而笄禮之婦人執其禮燕則鬈首通典五十六荅高崧訪御史中丞高崧有從弟喪在服末欲為子婚書訪尚書范汪曰禮有大功之末可以嫁子小功之末可以娶婦下章云已雖小功既卒哭可以娶妻己有小功喪則父便應有大功喪以義例推之小功卒哭可以娶妻則大功卒哭可以娶婦邪范荅曰案禮大功之末可以冠子嫁子此于子為無服也以己尚在大功喪中猶未忍為子娶婦近于歡事也故于冠子嫁子則可娶婦則不可矣己有緦麻之喪于祭亦廢婚亦不通矣況小功乎崧又曰禮己雖小功既卒哭可以娶妻己有小功則父有大功己既小功卒哭可娶妻則父大功卒哭可以娶婦將不嫌邪汪曰五服之制各有月數月數之內自無吉事故曰縗麻非所以接弁冕也春秋左氏傳齊侯使晏子謂繼室于晉叔向對曰寡君之願也縗絰之中是以未敢請禮貴妾緦而叔向稱在縗絰之中推此而言雖絰喪之麻猶無婚姻之道也而敦本敬始之義每于冠婚見之矣雜記曰大功之末可以嫁子小功之末可以娶婦而下章云己雖小功卒哭可冠娶妻也二文誠為相代尋此旨為男女失時或繼嗣未立者耳非通例也禮男三十而娶女二十而嫁于仲春會男女便云于此時也奔者不禁此亦是權禮非經常之典也通典六十祭典廢小宗昭穆不亂廢大宗昭穆亂矣先王所以重大宗也豈得不廢小宗以繼大宗乎漢家求三代之後弗得此不立大宗之過也豈不以宗子廢絕圖籍莫紀若常有宗主雖喪亂要有存理或可分布掌錄或可藏之于名山設不盡存決不盡失且同姓百代不婚周道也而姓自變易何由得知夫既不知或容有得婚者此大違先王之典而傷自然之理由此言之宗子之重于天下久矣通典九十六大宗者人之本也尊之統也人不可以無其本所以立大宗也上繼祖禰尊尊之道著矣下理子孫親親之義明矣旁理昆弟天倫之理達矣存則合族以食序以昭穆導以德行別以禮義沒則禘祭太祖陳其親疏殤與無服莫不咸在此則孝子之事終矣立人之道竭矣小宗之家五代則遷安知始祖之所從出宗祀之所由來敬宗所以尊祖禰不為重乎然要當以穆繼昭既明大宗不可以絕則支子當有繼祖是無父者也通典九十六棊品謇字道真仕至郡功曹世說政事篇注
