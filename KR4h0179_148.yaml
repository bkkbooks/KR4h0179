body:
  text: 石勒下令絶劉曜孤兄弟之奉劉家人臣之道過矣若微孤兄弟豈能南面稱朕哉根基既立便欲相圖天不助惡使假手靳準孤惟事君之體當資舜求瞽瞍之義故復推崇今主修好如初圖長惡不悛殺奉誠之使帝王之起復何常邪趙王趙帝孤自取之名號大小豈其所節邪晉書載紀石勒傳上又十六國春秋十三下令論功自孤起軍十六年于茲矣文武將士從孤征伐者莫不蒙犯矢石備嘗艱苦其在葛陂之役厥功尢著宜為賞之先也若身見存爵封輕重隨功位為差死事之孤賞加一等庶足以忍答存亡申孤之心也晉書載紀石勒傳下又十六國春秋十三下令起建德殿去年水出巨材所在山積將皇天欲孤繕修宮宇也其擬洛陽之太極起建德殿遣從事中郎任汪帥使工匠五千採木以供之晉書載紀石勒傳下又十六國春秋十三復武鄉令武鄉石之豐沛萬歲之後魂靈當歸之其復之三世晉書載紀石勒傳下獲黑兔下令案記應白兔為瑞此黑兔何祥外檢舊典十六國春秋十二太和元年二月擒劉曜下令所欲擒者一人耳今已獲之其敕將士抑鋒止鋭縱其歸命之路晉書載紀石勒傳下又十六國春秋十三下書拒石虎等勸稱尊號孤猥以寡德忝答崇寵夙夜戰惶如臨深薄豈可假尊竊號取譏四方昔周文以三分之重猶服事殷朝小白居一匡之盛而尊崇周室況國家道隆殷周孤德卑二伯哉其亟止斯議勿復紛紜自今敢言刑茲無赦晉書載紀石勒傳上又十六國春秋十三下書採集律令之要今大亂之後律令煩滋其採集律令之要為施行條制晉書載紀石勒傳上又十六國春秋十三下書國人國人不聽報嫂及在喪婚娶其燒葬令如本俗晉書載紀石勒傳下又十六國春秋十三下書賜陳武妻昔周之興也四乳八子今武妻一乳四子可為慶過姬祥美比曩日二儀諧畼和氣所致其賜乳婢一口穀一百石雜綵四十匹庶以肅迎嘉祥十六國春秋十三黎陽人陳武妻一産三男一女勒下書又見晉書載紀石勒傳下少始未六句下書修祖氏墳墓祖逖屢為邊患逖北州士望也儻有首丘之思其下幽州修祖氏墳墓為置守冢二家晉書載紀石勒傳下又十六國春秋十三下書八座自今有疑難大事八座及委丞郎齊詣東堂詮詳平決其有軍國要務須啓者有令僕尚書隨局入陳勿避寒暑昏夜也晉書載紀石勒傳下又十六國春秋十三又下書自今諸有處法悉依科令吾所忿戮怒發中旨者若德位已高不宜行罰或服勤死事之孤邂逅罹門下皆各列奏之吾當思擇而行也晉書載紀石勒傳下又十六國春秋十三下書招賢令公卿百寮歲薦賢良方正直言秀異至孝廉清各一人對策上第者拜議郎中第中郎下第郎中其舉人得遞相薦引廣招賢之路晉書載紀石勒傳下又十六國春秋十三下書議復寒食寒食既并州之舊風朕生其俗不能異也前者外議以子推諸侯之臣王者不應為忌故從其議儻或由之而致斯災乎子推雖朕鄉之神非法食者亦不得亂也尚書其促檢舊典定議以聞晉書載紀石勒傳下又十六國春秋十三報劉琨事功殊途非腐儒所聞君當逞節本朝吾自夷難為效晉書載紀石勒傳上又十六國春秋十一逞節作效節上石勒疏勸進臣等聞有非常之度必有非常之功有非常之功必有非常之事是以三代陵遲五伯迭興靜難濟時績侔睿古伏惟殿下天縱聖哲誕膺符運鞭撻宇宙弼成皇業普天率土莫不來蘇嘉瑞徵祥日月相繼物望去劉氏威懷于明公者十分而九矣今山川夷靜星辰不孛夏海重譯天人係仰誠應升御中壇即皇帝位使攀附之徒蒙尺寸之潤請稱大將軍大單于領冀州牧趙王依漢昭烈在蜀魏王在鄴故事以河內魏汲頓丘平原清河巨鹿常山中山長樂樂平十一郡并前趙國廣平陽平章武渤海河間上黨定襄范陽漁陽武邑燕國樂陵十三郡合二十四郡戶二十九萬為趙國封內依舊改為內史準禹貢魏武復冀州之境南至盟津西達龍門東至于河北至于塞垣以大單于鎮撫百蠻罷并朔司三州通置部司以監之伏願欽若昊天重副群望也晉書載紀石勒傳上石季龍及張敬張賓左右司馬張屈六程遐文武等一百二十九人上疏云云又見十六國春秋十三敕敬佛圖澄司空李農朝夕親問太子諸公五日一朝表朕敬焉高僧傳九法苑珠林七十六又十六國春秋二十一敕麻秋受降如待敵將軍慎之晉書載記石虎傳上段遼遣使詐降虎使征東麻秋百里郊迎敕秋云云又見十六國春秋十五下書稱居攝趙天王王室多難海陽自棄四海任重故俯從推逼朕聞道合乾坤者稱皇德協人神者稱帝皇帝之號非所敢稱且可稱居攝趙天王以副天人之望晉書載紀石虎傳上又十六國春秋十五下書以錢穀麥贖刑刑贖之家得以錢代財帛無錢聽以穀麥皆隨時價輸水次倉晉書載紀石虎傳上又見十六國春秋十五下書尊佛圖澄和尚國之大寶榮爵不加高祿不受榮爵匪顧何以旌德從此以往宜衣以綾錦乘以雕輦朝會之日和尚升殿常侍以下悉助舉輿太子諸公扶翼而上主者唱大和尚至衆坐皆起以彰其尊高僧傳九法苑珠林七十六又十六國春秋二十一下書清定選制三載考績黜陟幽明斯則先王之令典政事之通塞魏始建九品之制三年一清定之雖未盡弘美亦縉紳之清律人倫之明鏡從爾以來遵用無改先帝創臨天下黃紙再定至于選舉銓為首格自不清定三載于茲主者其更銓論務揚清激濁使九流咸允也吏部選舉可依晉氏九班選制永為揆法選畢經中書門下宣示三省然後施行之其著此詔書于令銓衡不奉行者史彈坐以聞晉書載紀石虎傳上又見十六國春秋十五下書拒上尊號過相褒美猥見推逼覽增恧然非所望也其亟止茲議今東作告始自非京城內外皆不得表慶晉書載紀石虎傳六又十六國春秋十五下書問中書令佛號世尊國家所奉閭里小人無爵秩者應得事佛與否又沙門皆應高潔貞正行能能精進然後可為道士今沙門甚衆或有姦宄避役多非其人可料簡詳議真偽高僧傳九廣弘明集六又十六國春秋十五下書聽百姓為道士度議云佛是外國之神非天子諸華所可宜奉朕生自北鄙忝當期運君臨諸夏至于饗祀應兼從本俗佛是戎神正所應奉夫制由上行永世作則苟事允無虧何拘前代其夷趙百蠻有舍于淫祀樂事佛者悉聽為道士高僧傳九晉書佛圖澄傳廣弘明集六又十六國春秋十五因災異下書朕在位六載不能上和乾象下濟黎元以致星虹之變其令百僚各上封事解西山之禁蒲葦魚監除歲供之外皆無所固公侯卿牧不得規占山澤奪百姓之利晉書載紀石虎傳上時白虹出自太社經鳳陽門東南連天十餘刻乃滅虎下書云云又十六國春秋十六又下書前以豐國澠池二治初建徙刑徒配之權救時務而主者遂為恆法致起怨聲自今罪犯流徒皆當申奏不得輒配也京獄見囚非手殺人一皆原遣晉書載紀石虎傳上又十六國春秋十六因天變下書求極言蓋古明王之理天下也政以均平為首化以仁惠為本故能允協人和緝熙神物朕以眇薄君臨萬邦夕惕朝乾思遵古烈是以每下書蠲除徭役休息黎元庶俯懷百姓仰稟三方而中年已來變眚彌顯天文錯亂時氣不應斯由人怨于下譴感皇天雖朕之不明亦群后不能翼獎之所致也昔楚相修政洪災旋弭鄭卿勵道氛祲自消皆股肱之良用康群變而群公卿士各懷道迷邦拱默成敗豈所望于台輔百司哉其各上封事亟言無隱晉書載紀石虎傳上時白虹出自太祖經鳳陽門東南連天十餘刻乃滅虎下書云云又見十六國春秋十六假劉氏令嗣子幼沖先帝私恩所授皇業至重非所克堪其以遵嗣位晉書載紀石遵傳攻斬孫伏都等下令內外六鬥敢稱兵使者斬之晉書載紀石虎傳下又十六國春秋十八令城內近日孫劉構逆支黨伏誅良善一無也今日巳後與官同心者留不同心者各任所之十六國春秋十八晉書載紀石虎傳下有未二句頒令斬胡內外趙人斬一胡首送鳳陽門者文官進位三等武職悉拜牙門晉書載紀石虎傳下又十六國春秋十八下令改國號姓孔子曰死而王七月者七十有三國繼趙李讖書炳然且德星鎮衛宜改國號曰魏復姓冉氏十六國春秋十九遣使臨江告晉胡逆亂中原今巳誅之若能共討者可遣軍來也晉書載紀冉閔傳又十六國春秋十九上石勒書諫營新宮臣聞唐虞之治采椽茅茨士階三尺彰美于詩書漢文惜百金不營露臺稱之于千古逮夏商之瓊臺瑤陛楚之章華秦之阿房資財內竭華夷外叛十六國春秋十三建平三年因獲玄玉璽又勸進臣等謹案大趙水德玄龜者水德玄乙者水之精也玉者石之寶也分之數以象七政寸之紀以準四極昊天成命不可久違輒下史官擇吉日具禮儀謹昧死上皇帝尊號晉書載紀石虎傳上虎稱大趙天王武鄉長城徙人韓強獲玄玉璽方四寸七分龜紐金文詣鄴獻之拜強騎都尉復其一門夔安等又勸進云云又見十六國春秋十五諫石虎微行臣聞千金之子坐不垂堂萬乘之主行不履危陛下雖天生神武雄據四海乾坤冥贊萬無所慮然白龍魚服有豫且之禍海若潛遊罹葛陂之酷願陛下宮蹕路思二神為元鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變龍騰之勇不暇施也智土之計豈及設哉又自古聖王之營宮室未始不于三農之隙所以不奪農時也今或盛功于耘藝之辰或煩役于收穫之月頓斃屬途怨聲塞路誠非聖加仁合所忍為也昔漢明賢君也鍾離一言而德陽役止臣誠識慚昔土言無可採陛下道越前王所宜哀覽晉書載紀石虎傳上虎畋獵無度晨出夜歸又多微行躬察作役之所侍中韋謏諫云云又見十六國春秋十六啓諫冉閔胡羯皆我欴仇敵今來歸附苟存性命耳萬一為變悔之何及請誅屏降胡去單于之號以防微杜漸十六國春秋二十二韋謏傳閔拜其子胤為大單于以降胡一千處之麾下謏諫云云晉書載紀冉閔傳作啓諫而不載其文駮寒食議案春秋藏冰失道陰氣發泄為雹自子推已前雹者復何所致此自陰陽乖錯所為耳且子推賢者曷為暴虐如此求之冥趣必不然矣今雖為冰室懼所藏之冰不在固陰沍寒之地皆川池之側氣泄為雹也以子推忠賢令綿介之間奉之為允于天下則不通矣晉書載紀石勒傳下十六國春秋十三奏禁奏佛夫王者郊祀天地祭奉百神載在祀典禮有常饗佛出西域外國之神天不施民非天子諸華所應祀奉往漢明感夢初傳其道惟聽西域人得立寺都邑以奉其神其漢人皆不得出家魏承漢制亦循前軌今大趙受命率由舊章華戎制異人神流別外不同內饗祭殊禮華夏服禮不宜雜錯國家可斷趙人悉不聽詣寺燒香禮拜以尊典禮其百辟卿士下逮衆例皆禁之其有犯者興淫祀同罪其趙人為沙門者還從四民之服高僧傳九晉書佛圖澄傳又御覽六百五十三引晉書又廣宏明集六又十六國春秋十五扇上銘朱明赫離光啓窗來清風服綌嗽雲露體夷神自融初學記三表免雍奏望族戍役雍秦二州望族自東徙已來遂在戍役之例既衣冠華胄宜蒙優免晉書載紀石虎傳上又十六國春秋十五遣李宏還蜀事議今李宏以死自誓若得返魂蜀漢當鳩率宗族混同王化若遣而果也則不煩一旅欴師而坐定梁益就有進退豈在逃命一夫壽既號日月跨僭一方今若制詔或敢酬反則敢誚戎裔宜書答之并贈以楛矢使壽知我遐荒必臻也晉書載紀石虎傳上李壽將李宏自晉奔于石虎壽致書請之題曰趙王石君虎不悅中書監王波議云云又見十六國春秋十六諫任石宣石韜慶賞刑威后皇攸執名器至重不可以假人皆以防姦杜漸以示軌儀太子國之儲二朝夕視膳而不及政也庶人邃往以聞政致敗殷鑒不遠宜革而弗遵且二政分權鮮不及禍周有子穨之釁鄭有叔段之難此皆由寵之不道所以亂國害親惟陛下覽之晉書載紀石虎傳上又見十六國春秋十六西門豹祠堂東石柱銘趙建武中所修也水經濁漳水注華山玉版文歲在申酉不絶如線歲在壬子真人乃見晉書載紀慕容俊傳初石虎使人探策于華山得玉版文又見十六國春秋二十七
