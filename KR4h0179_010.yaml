body:
  text: 成帝拜敬保傅詔曲陵公等宣力前朝致勳皇家以德義優弘兼保傳朕躬朕遭家不造奄在哀疚稟訓未究誤事窮蹙其一遵先帝尊崇師傳之教拜敬加以明傅崇德永奉遺範通典六十七原孔恢詔恢自陷刑網罪當大辟但以其父年有老而有一子以為惻然可憫之御覽六百四十六引晉書咸和二年句容令孔恢罪棄市詔云云報庾亮詔省告懇惻執以感歎誠是仁舅處物宗之責理亦盡矣若大義既不開塞舅所執理勝何必區區其相易奪賊峻姦逆書契所未有也是天地所不容人神所不宥今年不反明年當反愚智所見也舅與諸公勃然而名正是不忍見無禮于君者也論情與義何得謂之不忠乎若以已總率征討事致敗喪有司宜明宜繩以肅國體誠則然矣且舅遂上告方伯席卷來下舅躬貫甲胄賊峻梟懸大事既平天下開泰衍得反正社稷乂安宗廟有奉豈非舅二三方伯亡身陳力之勳邪方當策勳行賞豈復議既往之咎乎且天下大弊死者萬計而與桀寇對岸舅且當上奉先帝顧託之旨弘濟艱難使衍沖人永有憑賴則天下幸甚晉書庾亮傳蘇峻平亮上疏乞骸骨詔云云詔譙王無忌王敦作亂閔王遇禍尋事原情今王何責然公私憲制亦已有斷王當以體國為大豈可尋繹由來以亂朝憲主者其申明法令自今以往有犯必誅晉書宗室譙王傳無忌父承為湘州刺史王敦攻承城陷王廙承敦旨害之咸和中無忌餞褚裒于板橋廙子耆之在坐無忌志欲復讎將手刃之救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪詔云云于是聽以贖論詔殿內制詔殿內平天通天冠竝不能佳可更修理之隋書禮儀志七引晉起居注報王導詔夫聖王御世動合至道運無不周故能人倫攸敘萬物獲宜朕荷祖宗之重託于王公之上不能仰陶玄風俯洽宇宙亢陽踰時兆庶胥怨邦之不臧惟豫一人公體道明哲弘猷深遠勳格四海翼亮三世國典之不墜實仲山甫補之而猥崇謙光引咎克讓元首之愆寄責宰輔秪增其闕博綜萬機不可一日有曠公宜遺履謙之近節遵經國之遠略門下速遣侍中以下敦喻晉書王導傳時大旱導上疏遜位詔云云遷新宮詔昔大賊縱暴宮室焚蕩元惡雖翦未暇營築有司屢陳朝會逼狹遂作斯宮子來之勞不日而成既獲臨御大饗群后九寡充庭百官象物知君子勤禮小人盡力矣思蠲密網咸同斯惠其赦五歲刑以下令諸郡舉力人能舉千五百斤以上者晉書成帝紀徵翟湯虞喜為散騎常侍詔尋陽翟湯會稽虞喜竝守道清貞不營世務耽學高尚操擬古人往雖徵命而不降屈豈素絲難染而搜引禮𥳑乎政道須賢宜納諸廊廟其竝以散騎常侍徵之晉書虞喜傳優給陸玩孔愈詔尚書令玩左僕射愈竝恪居官次祿不代耕端右任重先朝所崇其給玩親信三十人愈以二十人稟賜晉書孔愈傳北討詔制詔戎夷猾夏神州傾覆二帝辭宮幽沒虜庭永言厥艱夙夜慨憤自聞江表屢有事故剋平內難始漸夷泰征伐事大役不再舉是以廟算待期畜力觀釁今羯寇衰弊王略彌振時至理盡天人玄應大將軍涼州刺史西平公駿忠勳三代義誠壯烈總帥秦涼為國宣力今遣健步剋同征舉宜令影響相應萬里齊契其先普告遠近征鎮牧守諸軍竝令誡嚴須使還進討蕩滌區宇以雪國恥其忠臣義士徇功效命必加殊賞以旌勳節文館詞林六百六十二正會詔正會日百寮增祿賜醽酒人二升藝文類聚四引晉咸康起居注贈陶侃詔故使持節侍中太尉都督荊江雍梁交廣益寧八州諸軍事荊江二州刺史長沙郡公經德蘊哲謀猷弘遠作藩于外八州肅清勤王于內皇家以寧乃者桓文之勳伯舅是憑方賴大猷俾屏豫一人前進位大司馬禮秩榮命未及加崇昊天不弔奄忽薨殂朕用震悼于厥心今遣兼鴻臚追贈大司馬假蜜章祠以太牢魂而有靈嘉茲寵榮晉書陶侃傳戲兵詔內外諸軍戲兵於南郊之場宋書禮志一改元大赦詔有司條典虔奉郊祀燔柴既饗芳氣消穆其赦天下令咸得自新初學記二十贈建安君為豫章郡君詔朕少遭憫凶茲訓無稟撫育之勤建安君之仁也一旦薨殂實思報復永惟平昔咸痛哀摧其贈豫章郡君別立廟于京都晉書后妃下豫章君荀氏傳報衛直啓作皇后畫輸車詔所奏車何乃奢費爾更籌量北堂書鈔未刪改本一百三十九引晉起居注咸康元年兼殿中監衛直啓作皇后畫輪車詔云云許彭城王紘解官養疾詔王以明德茂親居宗師之重宜敷道養德靜一其操而頃游行煩數冒履風塵宜令官屬已下各以職奉衛不得令王復有此勞內外職司各慎其局王可解常侍光祿宗師先所給車牛可録取賜米布床帳以養疾晉書宗室彭城王權附傳授陸玩左光祿大夫詔玩體道清純雅量弘遠歷位內外風績顯著宜居台司以允衆望授左光祿大夫開府儀同三司加散騎常侍餘如故晉書陸玩傳求衛公山陽公後詔歷觀先代莫不褎崇明祀賓禮三恪故祀宋啓土光于周典宗姬侯衛垂美漢冊自頃喪亂庶邦殄悴周漢之後絶而莫繼其詳求衛公山陽公近屬有履行修明可以繼承其祀者依舊典施行晉書成帝紀壬辰詔書占山護澤彊盜律論贓一丈以上皆棄市宋書羊玄保傳有司撿壬辰詔書二云羊希以壬辰之制其禁嚴刻停除咸康二年壬辰之科議拜三公儀注詔三公鼎司皇帝有興拜之禮何以不設樂又正位南面何以不服冕通典七十一又一百四十七追恤卞壺詔壼立朝忠恪喪身凶寇所封懸遠租秩薄少妻息不贍以為慨然可給實口廩晉書卞壼傳桂皇后崩內外入臨詔外官五日一入臨內官旦一入而已過葬虞祭禮畢止宋書禮志二又通典七十九停凶門柏歷詔門如何處凶門柏歷大為繁費停之宋書禮志二有司奏犬行皇后陵所作凶門柏歷門號顯陽端門詔云云又見通典七十九又詔重壤之下豈宜崇飾無用陵中唯潔掃而已宋書禮志二通典七十九奔喪詔今輕此制於名教為不盡矣今宜以議者既衆不必改先制宜依濛所上施行通典八十葬恭杜皇后詔吉凶典儀誠宜備設然豐約之度亦當隨時況重壤之下而崇飾無用邪今山陵之事一從節儉陵中唯潔掃而已不得施塗車芻靈晉書成恭杜皇后傳皇后喪不廢三正吉禮詔今既以天下體大禮從權宜三正之饗宜盡用吉禮也至娛耳目之樂所不忍聞故關之耳事之大者不過上壽酒稱萬歲已許其大不足復闕鐘鼓鼓吹也晉書樂志下正會奏樂詔若元日大饗萬國朝宗庭廢鐘鼓之奏遂闕起居之節朝無磬折之音賓無蹈履之度其于事儀不亦闕乎諸人當準量輕以制事中則情典竝隨國無滯儀矣御覽二十九引晉起居注又見晉書樂志下有刪節下八座詔祖諱孰若君命之重耶下八座詳之通典一百四咸康八年詔以王允之為衛將軍會稽內史允之表郡與祖會名同乞改授詔曰云云為東海王沖立後詔哀王無嗣國統將絶朕所哀怛其以小晚生奕繼哀王為東海王晉書元四王東海王沖傳追贈刁協本官詔協情在忠主而失為臣之道故令王敦得託名公義而實肆私忌遂令社稷受屈元皇銜恥致禍之原豈不有由若極明國典則曩刑非重今正當以協之勤有可書敦之逆命不可長故議其事耳今可從協本位加之冊祭以明有忠於君者纖介必顯雖於貶裁未盡然或足有勸矣晉書刁協傳詔賜羊聃死此事古今所無何八議之有猶未忍肆之市朝其賜命獄所晉書羊曼傳曼子聃遷廬陵太守疑郡人簡良等為賊殺二百餘人有司奏聃罪當死以景獻皇后是其祖姑應八議成帝詔云云又見法苑珠林一百十引冤魂志作此事古今所未有此而可忍孰不可忍何八議之有可獄所賜命詔羊賁勿離婚罪不相及古令之令典也聃雖極法於賁何有其特不聽離婚晉書羊曼傳聃兄子賁尚公主自表求解婚詔云云原羊聃詔太妃惟此一舅發言摧咽乃至吐血情慮深重朕往丁荼毒受太妃撫育之恩同于慈親若不堪難忍之痛以致頓弊朕亦何顏以寄今便原聃生命以慰太妃渭陽之思晉書羊曼傳又見法苑珠林一百十引冤魂志遺詔朕以眇年獲嗣洪緒託于王公之上於茲十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寧處今遘疾殆不興是用震悼于厥心千齡眇眇未堪艱難司徒琅邪王嶽親則母弟體則仁長君人之風允塞時望肆爾王公卿士其輔之以祗奉祖宗明祀協和內外允執其中嗚呼敬之哉無墜祖宗之顯命晉書成帝紀贈諡溫嶠冊朕以眇身纂承洪緒不能光闡大道化洽時雍至乃狂狡滔天社稷危逼惟公明鑒特達識心經遠懼皇綱之不維忿凶寇之縱暴唱率群后五州響應首啓戎行元惡授馘王室危而復安三光幽而復明功格宇宙勳著八表方賴大猷以拯區夏天不憖遺早世薨殂朕用痛悼于厥心夫褎德銘勳先王之明典今追贈公侍中大將軍持節都督刺史公如故賜錢百萬布千匹諡曰忠武祠以太牢晉書溫嶠傳拜王導丞相冊朕夙罹不造肆陟帝位未堪多難禍亂旁興公文貫九功武經七德外緝四海內齊八政天地以平神人以和業同伊尹道隆姬旦仰思唐虞登庸雋乂申命群官允釐庶績朕思憑高謨弘濟遠猷惟稽古建爾于上公永為晉輔往踐厥職敬敷道訓以亮天工不亦休哉公其戒之晉書王導傳諡王導冊蓋高位以酬明德厚爵以答懋勳至乎闔棺標迹莫尚號諡風流百代于是乎在惟公邁達沖虛玄鑒劭邈夷淡以約其心體仁以流其惠棲遲務外則名雋中夏應期濯纓則潛算獨運昔我中宗肅祖之基中興也下帷委誠而策定江左拱己宅心而庶績咸熙故能威之所振寇虐改心化之所鼓檮杌易質調陰陽之和通彝倫之紀遼隴承風丹𤕠景附隆高世之功復宣武之績舊物不失公協其猷若乃荷負顧命保朕沖人遭遇難圯夷險委順拯其淪墜而濟之以道扶其顛傾而弘之以仁經緯三朝而蘊道彌曠方賴高謨以穆四海昊天不弔奄忽薨殂朕用震慟于心雖有殷之殞保衡有周之喪二南曷諭茲懷今遣使持節謁者僕射任瞻錫諡曰文獻祠以太牢魂而有靈嘉茲榮寵晉書王導傳贈郗鑒爵諡冊惟公道德沖邃體識弘遠忠亮雅正行為世表歷位內外勳庸彌著乃者約峻狂狡毒流朝廷社稷之危賴公以寧功侔古烈勳邁桓文方倚大猷藩翼時難昊天不弔奄忽薨殂朕用震悼于厥心夫爵以顯德諡以表行所以崇明軌迹丕揚徽劭今贈太宰諡曰文成祠以太牢魂而有靈嘉茲寵榮晉書郗鑒傳奔喪詔孝慈起於自然忠孝發於天成若道不喪豈有今弊弊至醨薄反之何期況以今日之弊而欲廢準式於穨俗求慈仁於吾朝其於理化也無乃迂乎通典八十周年不應改服詔君親名教之重也權制出於近代耳宋書禮志二通典八十以會稽王昱領太常詔太常職典天地兼掌宗廟其為任也可謂重矣是以古今選建未嘗不妙簡時望兼收儒雅會稽王叔履尚清虛志道無倦優游上列風議朝肆朕所咨仰甚以王領太常本官如故書鈔五十二御覽二百二十八引晉中興書又見晉書簡文帝紀答有司請權降喪禮詔禮之降殺因時而寢興誠無常矣至於君親相準名教之重莫之改也權制之作蓋出近代雖曰適事實弊薄之始先王崇之後世猶怠而況因循又從輕降義弗可矣晉書康帝紀詔遣使詣安西驃騎慕容皓摧殄羯寇乃云死沒八萬餘人將是其天亡之始也中原之事宜加籌量且戴開已帥部黨歸順宜見慰勞其遣使詣安西驃騎咨謀諸軍事晉書康帝紀十六國春秋卷十六無末句納皇后儀注詔所以正法服升太極者以敬其始故備其禮也今云何更闕所重而徹法物邪又恭后神主入廟先帝詔后禮宜降不宜建五牛旗而今猶復設之邪既不設五牛旗則旄頭罼罕欴物易具也晉書禮志下宋書禮志一詔省納后儀物舊制既難準且於今而備亦非宜府庫之儲惟當以供軍國之費耳法服儀飾粗令舉其餘兼副雜器停之晉書禮志下宋書禮志一案上二條通典五十八有刪節以謝尚為南中郎將詔尚往以戎戍事要故輟黃散以授軍旅所處險要宜崇其威望今以為南中郎將餘官如故晉書謝尚傳促顧和釋服就職詔百揆務殷端右總要而曠職經久甚以悒然昔先朝政道休明中夏隆盛山賈諸公恉釋服從時不獲遂其情禮況今日艱難百王之弊尚書令禮已過祥練豈得聽不赴急疾而遂罔極之情乎晉書顧和傳下東陽太守山遐詔東陽頃來竟囚每多入重豈郡多罪人將捶楚所求莫能自固邪晉書山濤附傳尚書增祿詔尚書萬事之本朕所責成也而廩秩儉薄甚非治體今雖軍國多費不為元凱惜祿其依令僕給尚書各親信五十人廩賜御覽二百十二引晉康帝起居注書陸女郎問誶如此可籌量之淳化閣帖一討石虎檄文石勒因釁前覆舊京窮凶極逆僞號纍祀百姓受灰沒之酷王室有黍離之哀不為少康之隆孰能祀夏不有宣王之興誰克舊物羯帥石虎僭襲凶葉負恃其衆陸梁河朔每念俯口之士懷仁抱義食膽飲血罹其禍酷心存倒懸而力不能奮今遣使持節荊州刺史亭都侯翼高旗連雲組練映日運孫吳之籌按尚父之略莫不張膽咀鐵人思自奮以此衆戰其猶烈火之燔秋蓬衡颷之掃落葉也十六國春秋十六以王洽為中書令詔敬和清裁貴令昔為中書郎吾時尚小數呼見意甚親之今所以用為令既機任須才且欲時時相見其講文章待以友臣之義而纍表固讓其違本懷其催洽令拜晉書王導附傳國妃終三年之服詔朝廷所以從權制者以王事奪之非為變禮也婦人傳重義大若從權制義將安託晉書禮志中宋書禮志二通典九十三穆帝時東海國言哀王薨踰年嗣王乃來不復追服群臣已反吉國妃亦宜同除詔曰云云止扶南天竺旃檀獻馴象詔昔先帝以殊方異獸或為人患禁之今及其未至可令還本土晉書穆帝紀此物勞費不少駐令勿送梁書扶南傳下詔罪王饒欣飛督王饒忽上吾鴆鳥以避惡此凶物豈宜妄進初學記二十四引何法盛晉中興書聽高嵩傳爵詔悝備位大臣違憲被黜事已久判其子嵩求直無已今特聽傳侯爵晉書高嵩傳詔桓溫實賴英宰淵謀文選褚淵碑注引晉中興書詔答許詢山陰舊為祇洹寺永興居為崇化寺造四層塔物産既罄猶缺露槃相輪一朝風雨相輪等自備時所訪問乃是剡縣飛來引建康實録許捨詢永興山陰二宅為寺家財珍異悉皆是給既成啓奏孝宗詔
