body:
  text: 魯勝上正天論表若臣言合理當得改先代之失而正大地之紀如無據驗甘即刑戮以彰虛妄之罪晉書隱逸魯勝傳正天論以冬至之後立晷測影準度日月星辰案日月裁徑百里無千里星十里不百里晉書魯勝傳注墨辨敘名者所以別同異明是非道義之門政化之準繩也孔子曰必也正名名不正則事不成墨子著書作辨經以立名本惠施公孫龍祖述其學以正刑名顯于世孟子非墨子其辨言正辭則與墨同荀卿莊周等皆非毀名家而不能易其論也必有形察莫如別色故有堅白之辨名必有分明分明莫如有無故有無序之辨是有不是可有不可是名兩可同而有異異而有同是之謂辨同異至同無不同至異無不異是謂辨同辨異同異生是非是非生吉凶取辨于一物而原極天下之汙隆名之至也自鄧析至秦時名家者世有篇籍率頗難知後學莫復傳習于今五百餘歲遂亡絶墨辨有上下經經各有說凡四篇與其書衆篇連第故獨存今引說就經各附其章疑者闕之又采諸衆雜集為刑名二篇略解指歸以俟君子其或興微繼絶者亦有樂乎此也晉書隱逸魯勝傳釋時論東野野丈人觀時以居隱耕汙腴之墟有冰氏之子者出自沍寒之谷過而問塗丈人曰子奚自曰自涸陰之鄉奚適曰欲適煌煌之堂丈人曰入煌煌之堂者必有赫赫之光今子困于寒而欲求諸熱無得熱之方冰子瞿然曰胡為其然也丈人曰融融者皆趣熱之士其得爐冶之門者惟挾炭之子苟非斯人不如其已冰子曰吾聞宗廟之器不要華林之木四門之賓何必冠蓋之族前賢有解韋索而佩朱韍舍徒擔而乘丹轂由此言之何恤而無祿惟先生告我塗之速也丈人曰嗚呼子聞得之若是不知時之在彼吾將釋子夫道有安危時有險易才有所應行有所適英奇奮于縱橫之世賢智顯于霸王之初當厄難則騁權譎以良圖值制作則展儒道以畼攄是則袞龍出于縕褐卿相起于匹夫故朝賤而夕貴先卷而後舒當斯時也豈計門資之高卑論勢位之輕重乎今則不然上聖下明時隆道寧群后逸豫宴安守平百辟君子奕世相生公門有公卿門有卿指禿腐骨不簡蚩儜多士豐于貴族爵命不出閨庭四門穆穆綜襦是盈仍叔之子皆為老成賤有常辱貴有常榮肉食繼踵于華屋疏飯襲迹于耨耕談名位者以諂媚附勢舉高譽者因資而隨形至乃空囂者以泓噌為雅量璅慧者以淺利為鎗鎗脢胎者以無檢為弘曠僂垢者以守意為堅貞嘲哮者以粗發為高亮韞蠢者以色厚為篤誠痷婪者以博納為通濟眂視視者以難入為凝清拉答者有沈重之譽嗛閃者得清勦之聲嗆啍怯畏于謙讓闒茸勇敢于叨諍斯皆寒素之死病榮達之嘉名凡茲流也視其用心察其所安責人必急于己恆寬德無厚而自貴位未高而自尊眼罔嚮而遠視鼻𪖷𪖐而刺天忌惡君子悅媚小人敖蔑道素懾吁權門心以利傾智以勢惛姻黨相扇毀譽交紛當局迷于所受聽採惑于所聞京邑翼翼群士千億奔集勢門求官買職童僕窺其車乘閽寺相其服飾親客陰參于靖室疏賓徙倚于門側時因接見矜厲容色心懷內荏外詐剛直談道義謂之俗生論政刑以為鄙極高會曲宴惟言遷除消息官無大小問是誰力今以子孤寒懷真抱素志陵雲霄偶景獨步直順常道關津難渡欲騁韓盧時無狡兔衆塗圮塞投足何錯于是冰子釋然乃悟曰富貴人之所欲貧賤人之所惡僕少長于孔顏之門久處于清寒之路不謂熱勢自共遮錮敬承明誨服我初素彈琴詠典以保年祚伯成延陵高節可慕丹轂滅族呂霍哀吟朝榮夕滅旦飛暮沈聃周道師巢由德林豐屋蔀家易著明針人薄位尊積罰難任三卻尸晉宋華咎深投扃正幅實獲我心晉書文苑王沈傳雲賦天地定位淳和肇分剛柔初降陰陽烟熅于是山澤通氣華岱興雲則縹眇翩綿鬱若升烟蹇盤縈以詰屈兮若虬龍之蟠蜿嶷岐岐以嶽立兮狀有似乎列仙東西絡繹南北油裔隨風徘徊流行菴藹豁兮仰披杳兮四會凝寒冰于朱夏飛素雪于玄冥灑膏液于天漢騰鴻泉于泰清乾坤以之交泰品物以之流形江海以之深滿川谷以之豐盈毛羽以之光澤草木以之葩榮菛芽以之挺殖苗秀以之積成始于觸石而出膚寸而征終于霑濡六合浸潤群生蕩滌塵穢含吐嘉祥施畼凱風惠加春陽擬神化于后土與三曜兮齊光藝文類聚一浮素霓之逶迤御覽十四刑禮論覽衆所抵精思構微迭為先後文若榮繁翩然相反豈彼繫未存厥中嘗試稽之天地考之人事旁貫品物綜核彝倫而刑禮之旨可略言也蓋刑禮之本經緯陰陽擬則乾坤先王所以化民理物興國濟治也或者取證于春秋有意乎尋本以綜末然猶未離于先後亦速難之始也夫陰陽異制化物則均萬物本一變而殊形故王者去彼而適此為生而于彼為死夫死者去此而適彼于此為死而于彼為生矣禮生于讓刑生于爭讓者割已以與人是刑加于而禮加于人也爭者奪人以崇己是刑施于人而禮施手己也由此言之讓非純禮爭非純刑也慶賞以勸善而為惡者懲如有所懲刑亦存矣刑罰以懲惡而為善者勸如有所勸禮亦存矣故亡刑則禮不獨施大道廢焉則刑禮俱錯大道行焉則刑禮俱興不合而成未之有也藝文類聚五十四阮籍銘峨峨先生天挺無欲玄虛恬淡混齊榮辱蕩滌穢纍婆娑止足胎胞造化韜光縕韣鼓棹滄浪彈冠嶠嶽頤神太素簡曠世局澄之不清混之不濁翱翔區外遺物度俗隱處巨室友真歸朴汪汪川原邁迹圖籙藝文類聚三十六為舊君服議古者失地之君託身造次感一時之惠猶齊衰以為報嘗為臣吏禮待優備故依禮託情而弘教訓矣通典九十泰始中尚書令史物等是故少府鮑融故吏假詣喪所行服何遵何楨駮以為不應服荀顗吳奮以為應服又衡陽內史曾環議云云陳時務昔江外初平中州荒亂故貢舉不試宜漸循舊搜揚隱逸試以經策又馬隆孟觀雖出貧賤勳濟甚大以所不習而統戎事鮮能以濟宜開舉武略任將帥者言問核試盡其所能然後隨才授任舉十得一猶勝不舉況或十得二三日磾降虜七世內侍由余戎狄入為秦相豈藉華宗之族見齒于奔競之流乎宜引幽滯之俊抑華校實則天清地寧人神感應晉書陳頵傳議禁僚屬故避事任諸僚屬乘昔西臺養望餘弊小心恭肅更以為俗偃蹇倨慢以為優雅至今朝士縱臨事游行漸弊不革以至傾國故百尋之屋突直而焚燎千里之隄蟻垤而穿敗古人防小以全大慎微以杜萌自今臨使稱疾須催乃行者皆免官晉書陳頵傳又略見北堂書鈔一百五十八引王隱晉書作百尋之屋突直而煙焚千里之隄螻蛾之穴敗駮己亥格聖王懸爵賞功制罰糾違斯道苟明人赴水火且名器之實不可妄假非才謂之致寇寵厚戒在斯亡昔孫秀口唱篡逆手弄天機惠皇失御九服無戴三王建議席卷四海合起義之衆結天下之心故設己亥義格以權濟難此自一切之法非常倫之格也其起義以來依格雜猥遭人為侯或加兵伍或出皂僕金紫佩士卒之身符策委庸隸之門使天官降辱王爵黷賤非所以正皇綱重名器之謂也請自今以後宜停之晉書陳頵傳初趙王倫篡位三王起義制己亥格其後論功雖小亦皆依用頵意謂不宜以為常式駮之云云薦焦保于州將保出自寒素稟質清沖若得參嘉命必能光贊大猷允清清朝望使黃憲之徒不乏于豫土令頵庶免臧文之責晉書陳頵傳與王導書中華所以傾斃四海所以土崩者正以取才失所先白望而後實事浮競驅馳互相貢薦言重者先顯言輕者後敘遂相波扇乃至淩遲加有莊老之俗傾惑朝廷養望者為弘雅政事者為俗人王職不恤法物墜喪夫欲制遠先由近始故出其言善千里應之今宜改張明賞信罰拔卓茂于密縣顯朱邑于桐鄉然後大業可舉中興可冀耳晉書陳頵傳安梓宮議尚書問今大行崩含章殿安梓宮宜在何殿博士卞摧楊雍議曰臣子尊其君父必居之以正所以盡孝敬之心今太極殿古之路寢梓宮宜在太極殿依周人殯于西階通典七十九下室饌議又問既殯之後別奠下室之饌朝夕轉易諸所應設祭朔望牲用宜所施行案禮具答摧雍議案禮天子日食少牢月朔太牢喪禮下室之饌如他日宜隨御膳朝夕所常用也朔望則奠用太牢備物通典七十九倚廬議又問案景帝故事施倚廬于九龍殿上東廂今御倚廬為當在太極殿下諸王廬復應何所榷雍議案尚書顧命成王崩康王居于翼室先儒云翼室于路寢今宜于太極殿上諸王宜各于其所為廬朝夕則就位哭臨通典七十九為天子斬縗服議尚書問天子崩于今臺書令史以上皆為服斬縗之服不博士卞摧應琳議禮命士以上皆服斬臺書令史列職天朝皆應服斬通典八十一又問天子崩今司州及河南郡吏出入導從應易服制不卞榷答禮庶人在官者服齊縗三月又近臣服斬導從出入皆應從服通典八十一又問服隨君輕重今司隸服斬下吏服齊為合禮意不卞榷答凡臣從君皆降一等今之牧守皆古諸侯以禮相況輕重宜矣通典八十又問禮義服不從今司隸為君斬縗義服也下吏為從不每降一等當為君喪其親者耳古今行事復云何榷答禮庶人為國君齊今則不服然吏若都官從士有職司于喪庭者故宜依庶人在官者義耳義服不從謂近臣服君斬縗之服依降一等者之差耳前稱道從指謂近臣通典八十一又問諸二千石長吏見在京城皆應制服不博士卞榷楊雍應琳等上云禮臣為君斬縗自士以上見在官者皆應制服通典八十一引魏晉故事宮中為天子服議問皇太后三夫人以下皆服斬諸長公主及諸君崇陽園修容服制之宜卞榷等議案禮與諸侯為兄弟者服斬依禮則公主宜服斬而不杖禮君夫人為長子三年妾為君之嫡子與夫人同則崇陽園修容宜三年通典八十一引魏晉故事宮中為天子杖議又問太后及公主應杖不卞榷應琳議禮為夫杖自天子達皇太后應杖明矣婦為舅姑禮無杖文皇后不應杖也君之喪夫人世婦在次則杖即位則使人執之如禮三夫人已下皆杖通典八十一諸王女孫女為天子服議案禮諸侯之大夫為天子其服齊縗本無服者也猶從夫而同今王始于大行皇帝本服周以輕明重依諸兄弟之義所服至尊疑當服重王諸女依諸侯兄弟禮則應服斬也孫女幼未及于禮若欲服宜依諸侯之制通典八十一魏晉故事卞榷應琳等議承詔罪狀東海王越表殿中校尉李初至奉被手詔肝心若裂東海王越得以宗臣遂執朝政委任邪佞寵樹奸黨至使前長史潘滔從事中郎畢邈主簿郭象等操弄大權刑賞由已尚書何綏中書令繆播太僕繆胤黃門侍郎應紹皆是聖詔親所抽拔而滔等妄構陷以重戮帶甲臨宮誅討后弟翦除宿衛私樹國人崇獎魏植招誘逋亡覆喪州郡王塗圯隔方貢乖絶宗廟闕蒸嘗之饗聖上有約食之匱鎮東將軍周馥豫州刺史馮嵩前北中郎將裴憲竝以天朝空曠權臣專制事難之興慮在旦夕各率士馬奉迎皇輿思隆王室以盡臣禮而滔邈等劫越出關矯立行臺逼徙公卿擅為詔令縱兵寇抄茹食居人交尸塞路暴骨盈野遂令方鎮失職城邑蕭條淮豫之氓陷離塗炭臣雖憤悶守局東嵎自奉明詔三軍奮厲卷甲長驅次于倉垣即日承司空博陵公浚書稱殿中中郎劉權齎詔敕浚與臣共剋大舉輒遣前鋒征虜將軍王讚徑至項城使越稽首歸政斬送滔等伏願阰下寬宥宗臣聽越還國其餘逼迫宜蒙曠蕩輒寫詔宣示征鎮顯明義舉遣揚烈將軍閻弘步騎五千鎮衛宗廟晉書苟晞傳又表奉被手詔委臣征討喻以桓文紙練兼備伏讀跪歎五情惶怛自頃宰臣專制委杖佞邪內擅朝威外殘兆庶矯詔專征遂圖不軌縱兵寇掠陵踐宮寺前司隸校尉劉暾御史中丞溫畿右將軍杜育竝見攻劫廣平武安公主先帝遺體咸被逼辱逆節虐亂莫此之甚輒祗奉前詔部分諸軍遺王讚率陳午等將兵詣項龔行天罰晉書苟晞傳移檄諸征鎮州郡天步艱險禍難殷流劉元海造逆于汾陰石世龍階亂于三魏荐食幾甸覆喪鄴都結壘近郊仍震兗豫害三刺史殺二都督郡守官長堙沒數十百姓流離肝腦塗地晞以虛薄負荷國重是以弭節海隅援枹曹衛猥被中詔委以關東督統諸軍欽承詔命剋今月二日當西經濟黎陽即日得榮陽太守丁嶷白事李惲陳午等救懷諸軍與羯大戰皆見破散懷城巳陷河內太守裴整為賊所執宿衛闕乏天子蒙難宗廟乏危甚于纍卵承問之目憂歎纍息晞以為先王選建明德庸以服章所以藩固王室無俾城壞是以舟楫不固齊桓責楚襄王逼狄晉文致討大翼獎皇家宣力本朝雖蹈湯火大義所甘加諸方牧俱受榮寵義同畢力以報國恩晞雖不武首啓戎行秣馬裹糧以俟方鎮凡我同盟宜同赴救顯立名節在此行矣晉書苟晞傳又見十六國春秋十一上表請改父修諡亡父修羈紲吳壤為所驅馳幸逢開通沐浴至化得從俘虜握戎馬之要未覲聖顏委南藩之重實由勳勞少聞天聽故也年衰疾篤屢乞骸骨未蒙垂哀奄至薨隕臣承遺意輿櫬還都瞻望雲闕實懷痛裂竊聞博士諡修曰聲直彰流播不稱行績不勝愚情冒昧聞訴晉書滕修傳荈賦靈山惟嶽奇産所鍾瞻彼卷阿實曰夕陽厥生荈草彌谷被岡承豐壤之滋潤受甘露之霄降月惟初秋農功少休結偶同旅是采是求水則岷方之注挹彼清流器澤陶𥳑出自東隅酌之以匏取式公劉惟茲初成沫沈華浮煥如積雪曄若春敷藝文類聚八十二書鈔一百四十四若乃淳染真辰色㱴青霜白黃若虛調神和內惓解慷除書鈔一百四十四御覽八百六十七菽賦脯則正膂通幹粗鹿肥麋書鈔一百四十五初學記二十六御覽八百六十二鮓則前鹽白糝鱣鯉之骸書鈔一百四十六箏賦溫顏既緩和志向悅賓主交歡鼓鐸品列鍾子授箏伯牙擊節唱葛天之高韻讚幽蘭與白雪其始奏也蹇澄疏雅若將畼而未越其漸成也抑案鏗鏘猶沈鬱之舒徹何以盡美請徵其喻剖狀同形兩象著也設弦十二太簇數也列柱參差招搖布也介位允諧六龍御也藝文類聚四十四初學記十六大鵬賦并序大鵬賦并序余覽張茂先鷦鷯賦以其質微處褻而偏于受害愚以為未若大鵬棲形遐遠自育之全也此固禍福之機聊賦之云歎大鈞之播物啓塊化于天壤嘉有鵬之巨鳥攝元氣之夸象揚宇內之逼隘遵四荒以汛蕩藝文類聚九十二御覽九百二十七引晉書書草三日賴卿翼頓首節過多懷得近書為慰意以何如深勞斃頓曳力還不具淳化閣帖三
