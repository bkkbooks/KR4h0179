body:
  text: 成公綏天地賦并序天地賦并序賦者貴能分理賦物敷演無方天地之盛可以致思矣天地至神難以一言定稱故體而言之則曰兩儀假而言之則曰乾坤氣而言之則曰陰陽性而言之則曰柔剛色而言之則曰玄黃名而言之則曰天地藝文類聚一初學記一歷觀古人未之有賦豈獨以至麗無文難以辭贊不然何其闕哉遂為天地賦曰惟自然之初載兮道虛無而玄清太素紛以溷淆兮始有物而混成何元一之芒昧兮廓開闢而著形爾乃清濁剖分玄黃判離太極既殊是生兩儀星辰煥列日月重規天動以尊地靜以卑昏明迭炤或盈或虧陰陽協氣而代謝寒暑隨時而推移三才殊性五行異位千變萬化繁育庶類授之以形稟之以氣色表文采聲有音律覆載無方流形品物鼓以雷霆潤以慶雲八風翱翔六氣氤氳蚑行蠕動方聚類分鱗殊族別羽毛異群各含精而鎔冶咸受範于陶鈞何滋育之罔極兮偉造化之至神若夫縣象成文列宿有章三辰燭燿五緯重光河漢委蛇而帶天虹蜺偃蹇于昊蒼望舒彌節于九道羲和正轡于中黃眾星回而環極招搖運而指方白獸時據于參伐青龍垂尾于心房玄龜匿首于女虛朱鳥奮翼于注張帝皇正坐于紫宮輔臣列位于文昌垣屏駱驛而珠連三台差池而鴈行軒轅華布而曲列攝提鼎跱而相望若乃徵瑞表祥災變呈異交會薄蝕抱暈帶珥流逆犯厤譴悟象事蓬容著而妖害生老人形而主受喜天矢黃而國吉祥彗孛發而世所忌爾乃旁觀四極俯察地理川瀆浩汗而分流山嶽磊落而羅峙滄海沆渀而四周懸圃隆崇而特起昆吾嘉于南極燭龍曜于北址扶桑高于萬仞尋木長于千里崑崙鎮于陰隅赤縣據于辰巳于是八十一域區分方別風乖俗異險斷阻絕萬國羅布九州竝列青冀白壤荊衡塗泥海岱赤埴華梁青黎袞帶河洛揚有江淮辯方正土經略建邦王圻九服列國一同連城比邑深池高墉康衢交路四達五通東至暘谷西極泰濛南暨丹炮北盡空同遐方外區絕域殊鄰人首蛇軀鳥翼龍身衣毛被羽或介或鱗棲林浮水若獸若人居于大荒之外處于巨海之濱于是六合混一而同宅宇宙結體而括囊渾元運流而無窮陰陽循度而率常回動糾紛而乾乾天道不息而自強統群生而載育人託命于所繫尊太一于上皇奉萬神于五帝故萬物之所宗必敬天而事地若乃共工赫怒天柱摧折東南俄其既傾西北豁而中裂斷鼇足而續毀鍊玉石而補缺豈斯事之有徵將言者之虛設何陰陽之難測偉二儀之奓闊坤厚德以載物乾資始而至大俯盡鑒于有形仰蔽視于所蓋游萬物而極思故一言于天外晉書成公綏傳雲賦于是玄氣仰散歸雲四旋冰消瓦離奕奕翩翩去則滅軌以無迹來則幽闇以杳冥舒則彌綸覆四海卷則消液入無形或狎獵鱗次參差交錯上捷業以梁倚下壘硊而相薄狀崴嵬其不安吁可畏而欲落或粲爛綺藻若畫若規繁縟成文一續一離龍伸蠖屈蜿蟬逶迤連翩鳳飛虎轉相隨或繡文錦章依微要妙緜邈淩虛輕翔浮漂藝文類聚一御覽八初學記一陰霖賦百川泛濫潢潦橫流沈竈生䵷中庭運舟藝文類聚二御覽一又九百四十九時雨賦兩儀協合二氣烟熅洪川起波名山興雲藝文類聚二大河賦覽百川之宏壯兮莫尚美于黃河潛崑崙之峻極兮出積石之嵯峨登龍門而南游兮拂華陰與曲阿淩砥柱而激湍兮踰洛汭而揚波體委蛇于后土兮配靈漢于穹蒼貫中夏之畿甸兮經朔狄之遐荒歷二周之北境兮流三晉之南鄉秦自西而啟壤兮齊據東而畫疆殷徒涉而求固衛遷濟而遂彊趙決流而卻魏嬴引溝而滅梁思先哲之攸歎何水德之難量水經河水注一藝文類聚八初學記六氣蓬勃以霧蒸文選江賦注引天河賦疑大河之誤乘高赴下絕沒長奔馳會五戶旁達三門初學記六鱣鯉王鮪春暮來游水經河水注五靈圖授籙于羲皇文選王融曲水詩序注善尼父之不濟尋方叔之遠迹懿吳起之讜言大泛舟之興役初學記六洛禊賦考吉日簡良辰祓除解禊同會洛濱妖童媛女嬉游河曲或盥纖手或濯素足臨清流坐沙場列罍樽飛羽觴藝文類聚四初學記四御覽三十趫才逸態習水善浮文選吳都賦注飛橋浮濟造舟為梁延賓賦延賓命客集我友生高談清宴講道研精誾誾侃侃娛心肆情初學記十四宣清賦哀薰草之見焚御覽九百八十三慰情賦惟潛龍之勿用戢鱗翼以匿影文選謝朓觀朝雨詩注又宣德皇后令注嘯賦逸群公子體奇好異傲世忘榮絕棄人事晞高慕古長想遠思將登箕山以抗節浮滄海以游志于是延友生集同好精性命之至機研道德之玄奧愍流俗之未悟獨超然而先覺狹世路之阨僻仰天衢而高蹈邈姱俗而遺身乃慷慨而長嘯于時曜靈俄景流光濛汜逍遙攜手踟跦步趾發妙聲于丹脣激哀音于皓齒響抑揚而潛轉氣衝鬱而熛起協黃宮于清角雜商羽于流徵飄遊雲于泰清集長風乎萬里曲既終而響絕遺餘玩而未已良自然之至音非絲竹之所擬是故聲不假器用不借物近取諸身役心御氣動脣有曲發口成音觸類感物因歌隨吟大而不洿細而不沈清激切于竽笙優潤和于瑟琴玄妙足以通神悟靈精微足以窮幽測深收激楚之哀荒節北里之奢淫濟洪災于炎旱反亢陽于重陰唱引萬變曲用無方和樂怡懌悲傷摧藏時幽散而將絕中矯厲而慨慷徐婉約而優遊紛繁騖而激揚情既思而能反心雖哀而不傷總八音之至和固極樂而無荒若乃登高臺以臨遠披文軒而騁望喟仰抃而抗首嘈長引而憀亮或舒肆而自反或徘徊而復放或冉弱而柔撓或澎濞而奔壯橫鬱鳴而滔涸冽飄眇而清昶逸氣奮湧繽紛交錯列列飆揚啾啾響作奏胡馬之長思向寒風乎北朔又似鴻鴈之將鶵群鳴號乎沙漠故能因形創聲隨事造曲應物無窮機發響速怫鬱衝流參譚雲屬若離若合將絕復續飛廉鼓于幽隧猛虎應于中谷南箕動于穹蒼清飆振乎喬木散滯積而播揚蕩埃藹之溷濁變陰陽之至和移淫風之穢俗若乃遊崇崗陵景山臨巖側望流川坐盤石漱清泉藉皋蘭之猗靡蔭修竹之蟬蜎乃吟詠而發散聲駱驛而響連舒蓄思之悱憤奮久結之纏緜心滌蕩而無累志離俗而飄然若夫假象金革擬則陶匏眾聲繁奏若笳若蕭磞硠震隱訇磕㗦嘈發徵則隆冬熙蒸騁羽則嚴霜夏凋動商則秋霖春降奏角則谷風鳴條音均不恆曲無定制行而不流止而不滯隨口吻而發揚假芳氣而遠逝音要妙而流響聲激嚁而清厲信自然之極麗羌殊尤而絕世越韶夏與咸池何徒取異乎鄭衛于時緜駒結舌而喪精王豹杜口而失色虞公輟聲而止歌甯子檢手而歎息鍾期棄琴而改聽孔父忘味而不食百獸率舞而抃足鳳皇來儀而拊翼乃知長嘯之奇妙蓋亦音聲之至極文選藝文類聚十八晉書成公綏傳琴賦清飆因其流聲兮游絃發其逸響心怡懌而踊躍兮神感宕而忽怳初學記十六四氣協而人神穆兮五教泰而道化通同上窮變化于無極兮盡人心之好善同上遂創新聲改舊用君山獻曲伯牙奏弄同上伯牙彈而駟馬仰子野揮而玄鶴鳴清角發而陽氣亢白雪奏而風雨零藝文類聚四十四文選別賦注初學記十六琵琶賦八音之用誦于典蓺簫韶九奏物有容制惟此琵琶興自末世爾乃託巧班輸如意橫施因形造美洪殺得宜柄如翠虬之仰首盤似靈龜之觜臨樂則齊州之丹桂柱則梁山之象犀批以玳瑁格以瑤枝若夫盤圖合靈太極形也三材片合兩儀生也分柱列位歲數成也回窗華表日月星也藝文類聚四十四初學記十六飛龍列舞趙女駢羅進如驚鶴轉如回波初學記十五好和者唱讚善聽者咨嗟眩睛駭耳失節蹉跎初學記十六改調高彈急節促撾飛龍引舞趙女駢羅初學記十六掇止金石屏斥笙簧彈琵琶于私宴授西施與毛嬙撰理參畼五齊五章初學記十六故筆賦并序故筆賦并序治世之功莫尚于筆能舉萬物之形序自然之情即聖人之心非筆不能宣實天地之偉器也有倉頡之奇生列四目而兼明慕羲氏之畫卦載萬物于五行乃發慮于書契採秋毫之類芒加膠漆之綢繆結三束而五重建犀角之玄管屬象齒于纖鋒染青松之微煙著不泯之永蹤則象神仙人皇九頭式範群生異體怪軀注玉度于七經訓河洛之讖緯書日月之所躔別列宿之舍次乃皆是筆之勳人日用而不寤仡盡力于萬機卒見棄于行路藝文類聚五十八芸香賦美芸香之脩潔稟陰陽之淑精去原野之蕪穢植廣廈之前庭莖類秋竹葉象春檉蓺文類聚八十一御覽九百八十二柳賦柳賦宅京宇之西偏濱犢鼻之清渠啟橫門于大路臨九達之通衢愍行旅之靡休樹雙柳于道隅彌年載而成陰紛憚援而扶疏藝文類聚八十九日及賦序日及者華甚鮮茂榮于仲夏訖于孟秋藝文類聚八十九木蘭賦許昌西園中木蘭樹余往觀之遂為賦曰覽眾樹之列植嘉木蘭之殊觀至于玄冥授節猛寒嚴烈峨峨堅冰霏霏白雪木應霜而枯零草隨風而摧折顧青翠之茂葉繁旖旎之弱條諒抗節而矯時獨滋茂而不雕藝文類聚八十九鴻鴈賦并序鴻鴈賦并序余嘗游乎河澤之閒是時鴻鴈應節而群至望川以奔集夫鴻漸著羽儀之歎小雅作于飛之歌斯乃古人所以假象興物有取其美也余又奇其應氣而知時故作斯賦辰火西流秋風厲起軒翥鼓翼抗志萬里起寒門之北垠兮集玄塞以安處賓弱水之陰岸兮有沙漠之絕渚奔巫山之陽隅兮趍彭澤之遐裔過雲夢以娛游兮投江湘而中憩晝顧眺以候遠夜警巡而相衛上揮翮于丹霞兮下濯足于清泉經天地之遐極兮樂和氣之純煖藝文類聚九十又初學記三十引三條鷹賦陵高霞而輕舉文選孔德璋北山移文注烏賦并序烏賦并序有孝烏集余之廬乃喟然而歎曰余無仁惠之德祥禽曷為而至哉夫烏之為瑞久矣以其反哺識養故為吉烏是以周書神其流變詩人尋其所集望富者瞻其爰止愛屋者及其增歎茲蓋古人所以為稱若乃三足德靈國有道則見國無道則隱斯乃鳳鳥之德何以加焉鵩惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎藝文類聚九十二御覽九百二十惟玄烏之令鳥兮性自然之有識應炎陽之純精兮體乾剛之至色望九里之迴翔兮翩群鳴以拊翼差自託于君子兮心雖邇而不逼潛幽隙而穴處兮將待期于中春起彼高林集此叢灌棲息重陰列巢布榦繽紛霧會廻皇塵亂來若雨集去若雲散哀鳴日夕鼓翼昧旦噫啞相和音聲可玩嗟斯烏之克孝兮心識養而知慕同蓼莪之報德兮懷凱風之至素雛既壯而能飛兮乃銜食而反哺遊朝霞而淩厲兮飄輕翥于玄冥有崑山之奇類兮體殊形于玉趾淩西極以翱翔兮為王母之所使時應德而來儀兮介帝王之繁祉入中州而武興兮集林木而軍起能休祥于有周兮矧貞明于吉士嘉茲鳥之淑良兮永和樂而靡紀初學記三十鸚武賦序鸚武賦序鸚武小鳥也以其能言解意故為人所愛玩育之以金籠升之以堂殿可謂珍之矣然未得鳥之性也御覽七百六十四又九百二十四射兔賦收輔車之雙轡舍良馬之長鞚擒迅羽之輕焱截逸足之狡弄盈得獲于後乘充庖廚之所貢御覽三百五十八蜘蛛賦獨高懸以浮處遂設網于四隅南連大廡北接華堂左馮廣廈右依高廊吐絲屬緒布網引綱纖羅絡漠綺錯交張雲舉霧綴以待其方于是蒼蚊夕起青蠅昏歸營營群眾薨薨亂飛挂翼繞足鞙絲置圍衝突必獲犯者無遺藝文類聚九十七御覽九百四十八螳蜋賦仰乃茂陰俯緣條枝冠角峨峨足翅岐岐尋喬木而上綴從蔓草而下垂戢翼鷹峙延頸鵠望推翳徐翹舉斧高抗鳥伏虵騰鷹擊隼放俯飛蟬而奮猛臨蟪蛄而逞壯距車輪而軒翥固齊侯之所尚乃有翩翩黃雀舉翮高揮連翔枝幹或鳴或飛覩茲螳蜋將以療飢厲嘴脅翼其往如歸藝文類聚九十七御覽九百四十六七唱其居也背山臨谷巖棲穴處枕石漱流鼓腹容與書鈔一百五十八秦無清醴先和宜醇香旗九醞淵澄十旬書鈔一百四十八瓊弁曜首玉纓照目御覽六百八十六金璫煌煌貂珥峨峨御覽六百八十八奮長袖以飆迴擢纖腰以烟起鎮抗首而委蛇颯頓足而立跱紛龍轉而鳳翔忽若倒而中止初學記十五賢明頌於鑠姜后光配周宣非義不動非禮不言晏起早朝永巷告愆王用勤政萬國以虔藝文類聚十五菊頌先民有作詠茲秋菊綠葉黃花菲菲彧彧芳踰蘭蕙茂過松柏其莖可玩其葩可服味之不已松喬等福藝文類聚八十一徵士胡昭贊投簪卷帶韜聲匿迹文選北山移文注錢神論路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能已執我之手說分終始不計優劣不論能否賓客輻湊門常如市諺言錢無耳何可誾使豈虛也哉御覽八百三十六市長箴貿遷有無市朝有處人以攸資貨以攸敘交易而退各得其所曹參相齊清淨以義姦不可擾顧託有寄市臣掌肆敢告執事初學記二十四蔽髻銘詩美首弁班有或造茲蔽南金翠翼明珠星列繁華致飾北堂書鈔一百三十五菊銘敷在三九時惟斯生藝文類聚八十一椒華銘嘉哉芳椒載繁其實厥味惟珍蠲除百疾肇惟歲首月正元日永介眉壽以祈初吉藝文類聚八十九御覽二十九又九百五十八魏相國舞陽宣文侯司馬公誄應期降命篤生我公九德聿修百行兼通文皇踐位龍飛天衢協贊大命啟迪靈符光我聖主齊德有虞受茲介祉封國建畿入總納言敷化衡機出登上將奮武明威皇輿省方作鎮于許旌旗既反撫戎荊楚巴蜀作寇侵我邊疆乃眷西顧董統雍京丹麾所指莫之敢抗仁濟宇內威攝外荒流惠陝西齊美甘棠加命九錫尊位相國比王齊魯以崇殿禮藝文類聚四十五戒火文余家遭火屋宇焚盡器用廓然乃造于四鄰以為戒火文曰經籍為灰篇章為炭初學記二十五隸書體皇頡作文因物構思觀彼鳥跡遂以成意閱之後嗣存載道義綱紀萬事俗所傳述實由書記時變巧易古今各異蟲篆既繁草稿近偽適之中庸莫尚于隸規矩有則用之簡易隨便適宜亦有弛張操筆假墨抵押毫芒彪煥磥落形體仰揚芬葩連屬溢分羅行爛若天文之布曜緯若錦繡之有章或輕拂徐振緩案急挑挽橫引從左牽右繞長波鬱拂微勢縹緲工巧難傳善之者少應心隱手必由意曉爾乃動纖指舉弱腕握素紈染玄翰彤管電流雨下雹散點𪐴折握掣挫安案繽紛駱驛華藻粲爛縕絪卓犖一何壯觀繁縟成文又何可翫章周道之郁郁表唐虞之輝煥若乃八分璽法殊好異制分白賦黑棋布星列翹首舉尾直刺邪掣繾綣結體剩彩奮節或若虬龍盤游蛇蟬軒翥鸞鳳翱翔矯翼欲去或若鷙鳥將擊并體抑怒良馬騰驤奔放向路仰而望之鬱若宵霧朝升遊烟連雲俯而察之凜若清風屬水漪瀾成文垂象表式有模有楷形功難詳聊舉大體初學記二十一上言太子官屬不宜稱陪臣皇太子體皇極之尊無私于天下宮臣皆受命天朝不得同之藩國晉書鄭默傳表鄧由等歸化吳賊鄧由李光等同謀十八屯欲來歸化遣將張吳鄧生并送質任克期欲令郡軍臨江迎拔魏志王基傳注引司馬彪戰略紿語親兵及疏與其子丘建密說消息會已作大坑白棓數千欲悉呼外兵入人賜白幍拜為散將以次棓殺坑中魏志鍾會傳上言景獻羊后服弘訓太后入廟合食于景皇帝齊王攸不得行其子禮晉書賈充傳
