body:
  text: 釋慧持與桓玄書本欲栖病峨嵋之岫觀化流沙之表不能負其發足之懷使束裝首路釋藏輦九與釋慧遠書吾人微闇短不能率眾和上雖隔在異域猶遠垂憂念吾罪深矣釋藏輦八高僧傳荅王恭書遠持兄弟也綽綽焉信有道風矣高僧傳奏涼主呂纂比日潛龍出遊豕妖表異龍者陰類出入有時而今屢見則為災眚必月下人謀上之變宜克已修德以荅天威釋藏輦五又百四荅秦主姚興蓋聞太上以道養民而物自足其復有德而治天下是以古之明主審違性之難御悟任物之多因故堯放許由於箕山陵讓放杖於魏國高祖縱四皓於終南叔度辭蒲輪於漢岳蓋以適賢之性為得賢也今恆標等德非圓達分在守節少習玄化伏膺佛道至於敷析妙典研究幽微足以啟悟童稚助化功德願乞陛下放既往之恩縱其微志也高僧傳六釋道恆荅姚興通三世論書雅論大通甚佳去來定無此作不通佛說色陰三世和合聰明為色五陰皆爾又云從心生心如從穀生穀以是故知必有過去無無因之咎又云六識之意識依已滅之意為本而生意識又正見名過去業未來中果報也又十方中第二力知三世諸業又云若無過去業則無三塗報又云學人若在有漏心中則不應名為聖人以此諸比固知不應無過去若無過去未來則非通理經法所不許又十二因緣是佛法之深者若定有過去未來則與此法相違所以者何如有穀子地水時節芽根得生若先已定有則無所待有若先有則不名從緣而生又若先有則是常倒是故不得定有不得定無有無之說惟時所宜耳以過去法起行業不得言無又云今不得昔對不得言有雅論之通甚有佳致又大品所明過去如不離未來現在如未來現在亦如不離過去如此亦不言無也此實是經中之大要俟得高對育復盡之廣弘明集二十一又見十六國春秋六十二荅慧遠書鳩摩羅什和南既未言面又文辭殊隔導心之路不通得意之緣圯絕傳驛來貺粗承風德比知何如備聞一途可以蔽百經言末後東方當有護法菩薩勖哉仁者善弘其事夫財有五備福戒博聞辯才深智兼之者道隆未具者疑滯仁者備之矣所以寄心通好因譯傳意豈其能盡粗酬來意耳損所致比量衣裁欲令登法座時著當如來意但人不稱物以為愧耳今往常所用鍮石雙口澡鑵可備法物之數也并遺偈一章曰既己捨染樂心得善攝不若得不馳散深人實相不畢竟空相中其心無所樂若悅禪智慧是法惟無照迣誑等無實亦非停心處仁者所得法幸願示其要高僧傳六釋慧遠為僧叡論西方辭體天竺國俗甚重文藻其宮商體韻以入絃為善凡覲國王必有讚德見佛之儀以歌歎為尊經中偈頌皆其式也但改梵為秦失其藻蔚雖得大意殊隔文體有似嚼飯與人非徒失味乃令嘔穢也釋藏輦五又百四贈沙門法和頌心山育明德流熏萬由延哀鸞孤桐上清音徹九天釋藏輦五又銘六又百四奏道恆道標事惟聖人能通天下之志恆標業已毀除鬢髮著不正之衣今使處縉紳之朝非其志也且大秦龍興異才輩出如恆標等未為卓異何足拘以文網也十六國春秋六十二䂮等奏章敘其事略云云又荅姚興書蓋聞太上以道養民而物自足其須有德而治天下是以古之明主審違性之難御悟任物之易因故堯放許由於箕山陵讓放杖於魏國高祖縱四皓於終南叔度辭蒲輪於漢世晉國戴逵被褐於剡縣謝敷散髮於若邪蓋以適賢之性為得賢也故上有明君下有葦帶逸民之風垂訓於今矣今恆標等德非圓達分在守節且少習玄化伏膺佛道一性之誠心志匪席至於敷演妙典研究幽微足以啟悟童稚功化功德使物識罪福則有濟苦之益苟佛不虛言恆等有弘毘邪之訓矣竊聞近日猥蒙優詔使釋法服將擢翠翅於寒條之上曜扶渠於重冰之下斯誠陛下仁愛愷悌不世之恩然䂮等眷眷竊有愚心以陛下振道德之綱以維六合恢九德之網以羅四海使玄風扇於千載之前仁義陶於萬世之後宇宙之外感純德以化寬九域之內肆玄津以逍遙匹夫無溝壑之怨嫠婦無停緯之歎此實所以重化海內所以仰賴愚謂恆標雖區區一分守所見為小異然在羅網之內即是陛下道化之一臣昔孛佐治十二年未聞釋奪法衣形服世儀苟於時有補袈裟之中亦有弘益何足復奪道與俗違其適性昔巢由抗節堯許俱高四皓匪降上下同美斯乃古今之一揆百代之同風且德非管仲不足華軒堂阜智非孔明豈足三顧草廬願陛下放既往之恩從其微志使上不失惠下不失分則皇唐之化於斯而在箕潁之賓復見今日矣䂮等庸近獻愚直言懼觸天威追用悚息十六國春秋六十二僧䂮等荅姚興書又略見高僧傳六釋道恆傳作鳩摩羅什僧䂮等荅抗表陳情奉六月二十八日詔敕尚書令奪恆標等法服承命悲懼五情失守俯仰惶慚無地自厝恆等誠才質闇短染法未久所存既重眷慕亦深猥蒙優詔襃飾過美開諭誨勵言理備至但情之所安實懷罔已法服之下誓畢身命兼少習佛法不閑世事徒法非常之舉終無殊異之功雖有拔能之名而無益時之用未見秋毫之補將有山岳之虧竊為陛下不取也昔光武尚能縱嚴陵之心魏文全管寍之操陛下天縱之聖議論每欲遠輩堯舜今乃冠巾兩道人反在光武魏文之下願折至尊之高懷遂匹夫之微志在宥群方靡不自盡況陛下以道御物兼弘三寶使四方義學人士萃於京師新異經典流乎遐邇大法之隆於茲為盛方將闡揚洪化助明振暉嗣祗洹之遺響扇靈鷲之餘風建千載之軌模為後生之津塗而恆等豈可獨出於明時不得伸其志願伏願鑒其元元之情特垂曠蕩通物之理更賜明詔聽遂微心則銜恩九泉感德累劫不勝戢慄謹奏以聞十六國春秋六十二道恆道標抗表陳情云云又略見高僧傳六釋道恆傳作恆標等荅曰云云其文刪節未知此何所本復荅姚興書恆等近自陳寫冀悟鑒重奉明詔不蒙矜恕伏讀悲惶若無神守陛下仁弘覆載使物悅其性恆等少習法化愚情所樂誓以微命與法服俱盡而過恩垂及眷忘其陋勸弘菩薩兼濟之道然志力有限實所不堪非徒餘年苟自求免直愚衷所存私懷必守伏願鑒恕往之誠不責偏執之𠧙特賜明旨聽遂微心屢延明詔隨用悚息不勝元元之至十六國春秋六十二恆標復荅書恆等愚意所執具如前表精誠微薄不能感悟聖心累蒙遣詔未蒙慈恕俯仰憂怖無復心情陛下道懷虛納養物無際願開天地之恩得遂一分之志愚守之誠畢命無辜分受違詔之愆甘引無恨之罪屢污聖聽追用悚息不任罔極之情謹奏以聞十六國春秋六十二恆標復荅書釋駮論并序釋駮論并序有東京束教君子詰於西鄙慠散野人曰僕曾預聞佛法沖邃非名教所議道風玄遠非器象所擬清虛簡勝非近識所關妙絕群有非常情所測故每為時君之所尊崇貴達之所欽仰於是眾庶明契雷同奔向咸共嗟詠稱述其美云若染漬風流則精義入微研究理味則妙契神用澡塵垢於胸心脫桎梏於形表超俗累於籠樊邈世務而高蹈論真素則夷齊無以踰其操遺榮寵則巢許無以過其志味玄旨則顏冉無以參其風去紛穢則松喬無以比其潔信如所談則義無間然矣但今觀諸沙門通非其才群居猥維未見秀異混若涇渭渾波泯若薰蕕同篋若源清則津流應鮮根深則條穎怭茂攷其言行而始終不倫究其本未幾有無校僕之所以致怪良由於此如皇帝之忘智據梁之失力皆在鑪錘之間陶鑄以成聖者苟道不虛行才必應器然沙門既出家離俗高尚其志違天屬之親捨榮華之重毀形好之飾守清節之禁研心唯理屬己唯法投足而安蔬食而已使德行卓然為時宗仰儀容邕肅為物軌則然觸事蔑然無一可採何其棲託高遠而業尚鄙近至於營求孜伋無暫寍息或墾殖田圃與農夫齊流或商旅博易與眾人競利或矜恃醫道輕作寒暑或機巧異端以濟生業或占相孤虛妄論吉凶或詭道假權要射時意或聚畜委積頤養有餘或指掌空談坐食百姓斯皆德不稱服行多違法雖暫有一善亦何足以標高勝之美哉自可廢之以一風俗此皆無益於時政有損於治道是執法者之所深疾有國者之所大患且世有五橫而沙門處其一焉何以明之乃大設方便鼓動愚俗一則誘諭一則迫愶云行惡必有累劫之殃修善便有無窮之慶論罪則有幽冥之伺語福則有神明之祐敦厲引導勸行人所不能行逼強切勤勉為人所不能為上減父母之養下損妻孥之分會同盡餚膳之甘寺廟極壯麗之美割生民之珍玩崇無用之虛費罄私家之年儲闕軍國之貲實張空聲於將來圖無象於未兆聽其言則洋洋而盈耳觀其容則落落而滿目攷現事以求徵竝未見其驗真所謂繫影捕風莫知端緒亮僕情之所未安有識者之所巨惑若有嘉信請承下風脫有暫悟永去其滯矣主人憮然有間慨爾長歎咄異哉子之所陳何其陋也夫鄙俗不可以語大道者滯於形也曲士不可以辯宗極者局於名也今將為子略舉一隅自可思反其宗矣蓋聖人設教應器投法受量有限故化之以漸錄善心於毫端亡鄙吝於丘壑片行之善永為身貲一念之福終為神用始覆一簣不可責以為山之功方趣絕境不中窮以括囊之實然海之所以稱大者由無皦潔之清道之所以稱晦迹者以無赫然之觀夫怨親婉孌有心之所滯而沙門遺之如脫屣名位財色世情之所重而沙門視之如秕穅可謂忍人所不能去斯乃標尚之雅趣弘道之勝事而云蔑然豈非妙賞之謂乎又且志業不同歸向塗乖岐逕分轍不相領悟未見秀異故其宜耳古人每歎才之為難信矣周號多士亂臣十人唐虞之盛元凱二八孔門三千竝海內翹秀簡充四科數不盈十於中伯牛廢疾回也六極商也慳吝賜也貨殖予也難雕由也凶愎求也聚斂任不稱職仲弓雖騂出於犁色而舉世推德為人倫之宗欽尚高軌為縉紳之表百代詠其遺風千載仰其景行至於沙門乃苦共剝節酷相瓦礫斯豈君子弘通之道雅正之論哉此由或人人斑輸之作坊不稱指南之巧妙但譏拙者傷手真可謂服膺下流志存鄙劣昔丞相問客俗言鴟梟食母寍有是乎客荅但聞慈鳥反哺耳相乃悵然自愧失言今子處心將無似相之問也君子遏惡揚善反是謂何又云投足而安且林野蕭條每有寇盜之患城傍入出動嬰交遊之譏處身非所則招風塵之累婆娑田里則犯人間之論二三無可進退唯谷宇宙雖曠莫知所厝又云蔬餐而已夫人間有不贍之匱山澤無委積之儲方宜取給復乘以法所向九折於何得立若堂堂聖世而有首陽之餓夫明明時雍而有赴海之死客於雅懷何如然體無毛羽不可袒而無衣腹亦匏瓜不可繫而不食自未造極要有所貲年豐則取足於百姓時儉則肆力以自供誠非所宜事不得已故蝮蛇螫手斬以求全推其輕重蓋所存者大雖營一已不求無獲求之不必一塗但合濟之有理亦何嫌多方以為煩穢其欲役使不得妄動何故執之甚乎昔伯成躬耕以墾殖溺耦作以修農陶朱商賈以營生於陵灌蔬以自供雀文賣藥以繼乏君平卜筮以補空張衡術數以馳名馬鈞奇巧以騁功此等直是違俗遁世之人耳未正見有邈然絕塵之物天隔而咸共嗟詠不輟於口然沙門之中迹超諸乏恥與流輩動有萬數至於體道神化超落人封非可算計而未曾致言何其黨乎宜共思校事實不可古今殊論眾寡異辭希簡為貴猥多致賤恐非求精覆理之譚也云自可廢之以一風俗是何言歟聖人不誣十室三人必有師貲芳蘭竝茂而欲蘊崇焚之不亦暴乎其中自有德宇淵邃器標時望或翹楚皦潔樓寄清遠或禪思入微澄神絕境或敷演微言散幽釋滯或精勤福業勸化宗善凡出家之本落髮抽簪之日皆心口獨誓情到懇至雖生死彌綸玄塗長遠要自驅策必階於道金輪之榮忽若塵垢帝釋之重蔑若秕穅始者精誠乃有所感自非一舉頓詣體備圓足其閒何能不有小失且當錄其真素略舉玄黃安渾舉一概無復甄別不可以管蔡之釁姬宗盡誅四凶之暴合朝流放此無異人苦頭蝨因欲并首兵焚患在足刺遂欲通股全解不亦濫乎云無益於時政有損於治道夫弘道者之益世物有日用而不知故老氏云無為之化百姓皆曰我自然斯言當矣是以干木高枕而魏國大治庚桑善誨而㙗壘歸仁沙門在世誠無目前考課之功名教之外實有冥益近取五戒訓物非六經之疇遠以八難幽嶮非刑法之匹請以三藏錐罪非律令之流畼以般若辯惑非老莊之謂道品無漏拔苦因緣則存而不論周孔之教理盡形器至法之極兼練神明精粗升降不可同日而語其優劣矣昔孛助化以道佐治國境晏然民知其義年豐委積物無疵厲非益謂何云世有五橫沙門取其一焉凡言棋者以其志無業尚散誕莫名或博奕放蕩而傾竭家財或名挂編戶而浮游卒歲或尸祿素餐而莫肯用心或執政居勢而魚食百姓或馳競進趣而公私竝損或肆暴姦虐而動造不軌斯皆傷亂正大敗風俗由是荀悅奮筆而遊俠之論興韓非彈毫而五蠹之文作以之為橫理故宜然施之沙門不亦誣乎國家方上與唐虞競巍巍之美下與殷周齊郁郁之化不箕潁專有慠世之賓商洛獨標嘉遁之客甫欲大扇逸民之風崇肅方外之士觀子處懷經略時政乃欲踵亡秦虎狼之嶮術襲商韓剋薄之弊法坑焚儒典治無綱紀制大半之稅家無游財設三五之禁備民如賊天下熬然人無聊生使嬴氏之族不訖於三世二子之禍即戮於當時臨刑之日方乃追恨始者立法之謬本欲寍國靜民不意堤防太峻反不容己事既往矣何嗟之及云一則誘喻一則迫愶且眾生緣有濃薄才有利鈍解有難易行有淺深是以啟誨之道不一悟發之由不同抑揚頓挫務使從善斯乃權謀之警策妙濟之津梁殊非誘迫之謂也云罪則冥伺福則神祐夫含德至淳則眾善歸焉易曰履信思順自天祐之吉無不利又曰為不善於幽昧之中鬼得而誅之豈非冥伺神明之祐哉善惡之報經有誠證不復具列云會盡餚膳寺極壯麗此修福之家傾竭以儲將來之貲殫盡自為身之大計耳殆非神明歆其壯麗眾僧貪其滋味由農夫之播殖匠者之構室將擇楨材以求堂宇之飾精簡種子以規嘉穀之實故稼穡必樹於沃壤之地卜居要選於爽塏之處是以知三尊為眾生福田供養自修已之功德耳云割生民之珍玩崇無用之虛費夫博施兼愛仁者之厚德崇飾宗廟孝敬之至心世教若此道亦如之物有損之而益為之必獲且浮財猶糞土施惠為神用譬朽木之為舟乃濟度之津要何虛費之有哉欲端坐而望自然拱嘿以希安樂猶無柯求伐不食而狗飽焉可得乎苟身之不修已為困矣何必乃蔽百姓之耳目擁天下之大善既自飲毒復欲鴆人何酷如之可謂亡我陷彼相與俱禍是以盲聾瘖啞對經幽處彌劫之殃調達之報歷地獄無閒之苦云罄私家之年儲闕軍國之貲實聖王御世淳風遐被震道以維六合布德網以籠群儁川無扣浪之夫谷無含歎之士四民咸安其業百官各盡其分海內融通九州同貫戎車於是寢駕甲士卻走以糞嘉穀委於中田食儲積而成朽童稚進德日新黃髮盡眉壽當共擊壤以頌太平鼓腹以觀盛化子何多慮之深橫憂時之不足不亦過乎云吝大官而腫口臨滄海而攝腹真子之謂也云繫影捕風莫知端緒夫偽辯亂真大聖之所悲嗟時不識寶卞和所以慟哭然妙旨希夷而體之者道沖虛簡詣而會之者得用遠能津梁頹溺拔幽拯滯美濟當時化流無外故神暉一震則感動大千睿澤蹔灑則九州蒙潤是以釋梵悟幽旨而歸誠帝王望玄宗而委質八部挹靈化洗心士庶觀真儀而奔至落落焉故非域中之名教肅肅焉名是方外之冥軌然垣牆峭峻故罕得其門器宇幽邃稀入其室是以道濟彌綸而理與之乖德包無際而事與之隔子執迷自畢沒齒不悟蓋有以也夫日月麗天而瞽者莫覩其明雷電震地而聾者不聞其響是誰之過與而方欲議宮商之音蔑文章之觀真過之甚者昔文鱗改視於初曜須跋開聽於後緣子何辜之不幸獨懷疑以終年比眾人之所悲最可悲之所先於是逡巡退席悵然自失良久曰聞大道之說彌貫古今大判因緣窮理盡性立理不為當年弘道不期一世可謂原始會終歸於命之實滯寢長夜未達其旨故海每造有封今幸聞大夫之餘論結解疑散豁然醒覺若披重霄以覩朗日發蒙蓋而悟真慧僕誠不敏敬奉嘉誨矣弘明集六舍利弗阿毗曇論阿毗曇秦言無比法出自八音亞聖所述作之雖𥳑成命曲備重徽曠濟神要莫比真祗洹之微風反眾流之宏趣然佛後闇昧競執異津或有我有法或無我有法乖忤淳風虧朦聖道有舍利弗玄哲高悟神貫翼從德備左面智參照來其人以為是非之越大猷將隱既曰像法任欸益滯是以敢於佛前所聞經法親承即集先巡隄防遮抑邪流助宣法化故其為經也先立章以崇本後廣演以明義明義之體四焉問分也非問分也攝相應分也序分也問分者寄言扣擊明夫應會非問分者假韻默通唯宣法相攝相應分者總括自他攝非相無序分者遠述因緣以彰性空性空彰則反迷至矣非相無則相與用矣法相宣則邪觀息矣應會明則極無遺矣四體圓足二諦義備故稱無比法也此經於先出阿毗曇雖文言融通而旨格異制又載自空以明宗極故能取貴於當時而垂千載明典振於遠維四眾率尒同仰是使徇有者袪妄見之惑自化者起即隆之動迢迢焉故冥宗之遺緒也亹亹焉故歸輪之所契也此經標明曩代靈液西畛純教彌於閬風玄問扇於東嶺惟秦天王沖姿叡聖冥根樹於既往實相結於極王德應符闡揚三寶聞茲典誥夢相思覽雖曰悠邈感之愈勤會天竺沙門曇摩崛多曇摩邪舍等義學來遊秦王既契宿心相與辨明經理起清言於名之城散眾微於自無境超超然誠韻外之致愔愔然覆美稱之實於是詔令傳譯然承華天哲道詞聖躬玄味遠流妙度淵極特體明旨遂讚其事經師本雖闇誦誠宜謹備以秦弘始九年命書梵文至十年尋應令出但以經趣微遠非徒關言所契苟彼此不相領悟直委之譯人者恐津梁之要未盡於善停至十六年經師漸閑秦語令自宣譯皇儲親管理味言音兼了復所向盡然後筆受即復內呈上討其煩重領其指歸故令文之者修飾義之者綴潤并校至十七年訖若乃文外之功勝契之妙誠非所所階未之能詳竝求之眾經攷之諸論新異之美自宣之於文唯法住之實如有表裏然原其大體有無兼用微文淵富義旨顯灼斯誠有部之永塗大乘之靡趣先達之所宗後進之可仰標以近質綜不及遠情未能已猥參斯典感之誠脫復微序庶望賢哲以如其鄙釋藏群一又跡十
