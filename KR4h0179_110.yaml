body:
  text: 郗超與桓溫箋起言遠近無他說荀異問者定虛耳云段龕歸順不知審不王江州為宗正似已定前所傳者虛妄耳異同自旨啓超言淳化閣帖二與親友書論支道林林法師神理所通玄拔獨悟數百年來紹明大法令真理不絶者一人而已高僧傳四又隋費長戾房歷代三寶紀與謝慶緒書論三幡義近論三幡諸人猶多欲既觀色空別更觀識同在一有而重假二觀于理為長文選天台山賦注奉法要三自歸者歸佛歸十二部經歸比丘僧過去現在當來三世十方佛三世十方經法三世十方僧每禮拜懺悔皆當至心歸命并慈念一切衆生願今悉得度脫外國音稱南無漢曰歸命佛者漢音曰覺僧者漢音曰衆五戒一者不殺不得教人殺常當堅持盡形壽二者不盜不得教人盜常當堅持盡形壽三者不淫不得教人淫常當堅持盡形壽四者不欺不得教人欺常當堅持盡形壽五者不飲酒不得以酒為惠施常當堅持盡形壽若以酒為藥當推其輕重要于不可致醉醉有三十六失經教以為深戒不殺則長壽不盜則長泰不淫則清淨不欺則人常敬信不醉則神理明治已行五戒便修歲三月六齊歲三齊者正月一日至十五日五月一日至十五日九月一日至十五日月六齊者月八日十四日十五日二十三日二十九日三十日凡齊日皆當魚肉不御迎中而食既中之後甘香美味一不得嘗洗心念道歸命三尊悔過自責行四等心遠離房室不著六欲不得鞭撾罵詈乘駕牛馬帶持兵仗婦人則兼去香花脂粉之飾端心正意務存柔順齊者普為先亡見在知識親屬并及一切衆生皆當因此至誠玄想感發心既感發則終免罪苦是以忠孝之士務加勉勵良以兼拯之功非徒在已故也齊日唯得專惟玄觀講誦去言若不能行空當習六思念六思念者念佛念經念僧念施念戒念天何謂念天十善四等為應天行又要當稱力所及勉濟衆生十善者身不犯殺盜淫意不嫉恚癡口不忘言綺語兩舌惡口何謂不殺常當矜愍一切蠕動之類雖在困急終不害彼利己凡衆生危難皆當盡心營救隨其水陸各令得所疑有為已殺者皆不當受何謂為盜凡取非已有不問小大及蒞官不清皆謂之盜何謂為淫一切諸著普謂之淫施之色欲非正匹偶皆不得犯弓私竊不公亦兼盜罪所謂嫉者謂妬忌也見人之善見人有德皆當代之歡喜不得有爭競憎嫉之心所謂恚者心懷忿恨藏結于內所謂癡者不信大法疑昧經道何謂妄言以無為有虛造無諯何謂綺語文飾巧言華而不實何謂兩舌背向異辭對此說彼何謂惡口謂罵詈也或云口說不善之事令人承以為罪亦為惡口凡此十事皆不得暫起心念是為十善亦為十戒五戒檢形十善防心事有疏密故報有輕重凡在有方之境總謂三戒三戒之內凡有五道一曰天二曰人三曰畜生四曰餓鬼五曰地獄全五戒則人相備具十善則生天堂全一戒者則亦得為人人有高卑或壽夭不同皆由戒有多少反十善者謂之十惡十惡畢犯則入地獄抵探強梁不受忠諫及毒心內盛徇私欺紿則或角墮生或生蛇虺慳貪專利常苦不足則墮餓鬼其罪差輕少而多陰私情不公亮皆墮鬼神雖受微福不免苦痛此謂三塗亦謂三惡道色痛癢思想生死識謂之五陰凡一切外物有形可見者為色失之則憂惱為痛得之則歡喜為癢未至逆念為思過去追憶為想心念始起為生想過意識滅為死曾關于心戢而不忘為識識者經歷纍劫猶萌之于懷雖昧其所由而滯于根潛結始自毫釐終成淵嶽是以學者務慎所習五蓋一曰貪淫二曰瞋恚三曰愚癡四曰邪見五曰調戲別而言之求欲為貪耽著為淫外發為瞋內結為恚繫于縛著觸理倒惑為愚癡生死因緣癡為本一切諸著皆始于癡地獄苦酷多由于恚經云卒鬭殺人其罪尚輕懷毒陰謀則纍劫彌結無解脫之期六情一名六衰亦曰六欲謂目受色耳受聲鼻受香舌受味身受細滑心受識識者即上所謂識陰者也五陰六欲蓋生死之原本罪苦之所由消禦之方皆具載衆經經云心作天心作人心作地獄心作畜生乃至得道者也亦心也凡慮發乎心皆念念受報雖事未及形而幽對冥構夫情念圓速倏忽無閒機動毫端遂充宇宙罪福形道靡不由之吉凶悔吝定于俄頃是以行道之人每慎獨于心防微慮始以至理為城池常領本以御末不以事形未著而輕起心念豈唯言出乎室千里應之莫見乎隱所慎在形哉異出十二門經云人有善恆當掩之有惡宜令彰露夫君子之心無適無莫過而無悔當不自得宜其任行藏于所遇豈有心于隱顯然則教之所施其在常近乎原夫天理之于罪福外泄則愈輕內結則彌重既迹著于人事必有損于冥應且伐善施勞有生之大情匿非文過品物之所同善著則迹彰迹彰則譽集苟情係沮勸而譽集于外藏吝之心必盈乎內且人之君子猶天之小人況乎仁德未至而名浮于實獲戾幽冥固必然矣夫苟非備德安有不周坦而公之則與事而散若負理之心銘之懷抱而外修情懇以免人尢收集俗譽大誣天理自然之舋得不愈重乎是以莊生亦云為不善于幽昧之中鬼神得而誅之且人之情也不愧于理而隗乎物愆著則毀至毀至而恥生情存近復則斃不至積恃其不彰則終莫悛革加以天舋內充而懼其外顯則幽慮萬端巧防彌密窮年所存唯此之務天殃物纍終必頓集蓋由不防萌謀始而匿非揚善故也正齊經云但得說人百善不得說人一惡說人之善善心便生說人之惡便起忿意意始雖微漸相資積是以一善生巨億萬善一惡生巨憶萬惡古人云兵家之興不過三世陳平亦云我多陰謀子孫不昌引以為教誠足以有弘然齊楚享遺嗣于纍葉顏冉靡顯報于後昆既已著之于事驗不俟推理而後明也且鯀殛禹興鱮鮒異形四罪不及百代通典哲王御世猶無淫濫況乎自然玄應不以情者而令罪福錯受善惡無彰其誣理也固亦深矣且秦制收帑之刑猶以犯者為主主嬰其罰然後責及其餘若亹不當身而殃延親屬以茲制法岩唯聖典之所不容固亦申韓之所必去矣是以泥洹經云父作不善子不代受子作不善父亦不受善是獲福惡自受殃至矣哉斯言允心應理然原夫世教之興豈不以情受所存不止乎已所及彌廣則誡懼愈深是以韜理實于韞櫝每申近以斂粗進無虧于懲勸而有適于物宜有懷之流宜略其事而喻深領幽旨若乃守文而不通其變徇教而不達教情以之處心循理不亦外乎夫罪福之于逆順固必應而無差者也苟昧斯道則邪正無位寄心無準矣至于考之當年信漫而少徵理無愆違而事不恆著豈得不歸諸宿緣推之來世邪是以有心于理者審影響之難誣廢事證而冥寄達天網之宏疏故期之于靡漏悟運往之無閒混萬劫于一朝括三世而玄同要終歸于必至豈以顯昧改心淹遠革慮哉此最始信之根主而業心所深期也十二門經云有時自計我端正好便當自念身中無所有但有肝腸脾肺骨血屎溺有何等好復觀他人身中惡靈皆如是若慳貪意起當念財物珍寶生不持來死不俱去而流遷變化朝夕難保身不久存物無常主宜及當年施恩行惠贍乏以財救疾以藥終日欣欣務存營濟若瞋恚意起當深生平等兼護十戒差摩竭云菩薩所行忍辱為大若罵詈者默而不報若撾捶者受而不校若瞋怒者慈心向之若謗毀者不念其惡法句又云受辱心如地行忍如門閫地及門閫蓋取其藏垢納汙終日受踐也成具紅曰彼以四過加已則覺知口之失也報以善言和語至誠不飾四過者上之所謂兩舌惡口妄言綺語夫彼以惡來我以善應苟心非木石理無不感但患處之不恆弘之不積耳苟能每事思忍則悔吝消于見世福報顯于將來賢者德經云心所不安未常加物即近而言則忠恕之道推而極之四等之義四等者何慈悲喜護也何謂為慈愍傷衆生等一切推已恕彼願令普安愛及昆蟲情無同異何謂為悲博愛兼拯雨淚惻心要令實功潛著不直有心而已何謂為喜歡悅柔軟施而無悔何謂為愛護隨其方便觸類善救津梁會通務存弘濟能行四等三界極尊但未能冥心無兆則有數必終是以本起經云諸天誰樂福盡亦喪貴極而無道與地獄對門成具又云福者有苦有盡有煩勞有往還泥洹經曰五道無安唯無為快經稱行道者先當捨世八事利衰毀譽稱譏苦樂聞善不喜聞惡不懼信心天固沮勸無以動其志理根于中外物不能干其慮且當年所遇必由宿緣宿緣玄運信同四時其來不可禦其去不能止固當順而安之悅而畢之精勤增道習期諸妄心形報既廢乃獲大安耳夫理本于心而報彰于事猶形正則影直聲和而響順此自然玄應孰有為之者哉然則契心神道固宜期之通理務存遠大虛中正已而無希外助不可接以箄瀆要以情求此乃厝懷之關鍵學者所宜思也或謂心念必報理同影響但當求己而已固無事于幽冥原經教之設蓋所以悟夫求已然求己之方非教莫悟悟因乎教則功由神道欣感發中必形于事亦由詠歌不足係以手舞然則奉而尊之蓋理所不必須而情所不能廢宜縱己身體教旨忘懷欣想將以己引物自周乎衆所以固新涉之志而令寄懷有擬經云生苦老苦病苦死苦怨憎會苦恩愛別離苦所求不得苦遇此諸苦則宜深惟緣對兼覺魔僞開以達觀弘以等心且區區一生有同過隙所遇雖殊終歸枯朽得失少多固不足計該以數塗則此心自息又苟未人道則休戚迭用聚散去來賢愚同致是以經云安則有危得則有喪合會有離生則有死蓋自然之常勢必至之定期推而安之則無往不夷維犘詰云一切諸法從意生形然則兆動于始事應乎末念起而有慮息則無意之所安則觸遇而夷情之所閡則無往不滯因此而言滯之所由在我而不在物也若乃懼生于心則舋乘于外外舋既乘內懼愈結苟患失之無所不至矣是以經稱丈夫畏時非人得其便誠能住心以理天關內固則人鬼罔閒緣對自息萬有無以纓衆邪不能襲四非常一曰無常二曰苦三曰空四曰非身少長殊形陵谷易處謂之無常盛衰相襲欣極必悲謂之為苦一切萬有終歸于無謂之為空神無常宅遷化靡停謂之非身經稱處惑樂之地覺必苦之對蓋推代謝于往復審樂往則哀來故居安慮危夕惕榮觀若夫深于苦者謂之見諦達有心則有滯有滯則苦存雖貴極人天地兼崇高所乘愈重矜著彌深情之所樂于理愈苦故經云三界皆苦無可樂者又云五道衆生共在一大獄中苟心係乎有則罪福同貫故總謂三界為一大獄佛問諸弟子何謂無常一人曰一日不可保是為無常佛言非佛弟子一人日食頃不可保是為無常佛言非弟子一人曰出息不報便就後世是為無常佛言真佛弟子夫無常顯證日陳于前而萬代同歸終莫之悟無瞬息之安保永世之計懼不在交則每事殆懈以之進德則功無覆簣以之治心則墯其所習是以有之土指寸陰而惜逝恆自強于鞭後業與時競惟日不足則亂念無因而生緣對靡由而起六度一曰施二曰戒三曰忍辱四曰精進五曰一心六曰智慧積而能散潤濟衆生施也謹守十善間邪以誠戒也犯而不校常善下人忍辱也勤行所習夙夜匪懈精進也專心守意以約斂衆一心也凡此五事行以有心謂之俗度領以兼忘謂之道慧本起經云九十六種道術各信所事皆樂生安孰知其惑夫欣得惡失樂存哀亡蓋弱喪之常滯有生所感同然冥力潛謝非矜戀所留對至而應豈智用所制是以學者必歸心化本領觀玄宗玩之珍之則衆念自廢廢則有忘有忘則緣絶緣報既絶然後入于無生既不受生故能不死是以普耀經云無所從生靡所不生于諸所生而無所生泥洹經云心識靜休則不死不生心為種本行為其地報為結實猶如種植各以其類時至而生弗可遏也種十善戒善則受生之報具于上章加種禪等四空則貴極天道四空及禪數經具載其義從第一天至二十八天隨其事行福轉倍增種非常禪諦背有著無則得羅漢泥洹不忌有為不係空觀遇理而冥無執無寄為無所種既無所種故不受報廓然玄廢則佛之泥洹泥洹者漢曰無為亦曰滅度維摩詰曰彼六師者說倚為道從是師者為住諸見為墯邊際為歸八難不得離生死道也雖玄心屢習而介然微動猶均被六師同滯一有況貪生倚想執我捍化雖復福踰山河貴極三界倚伏旋還終墜罪苦豈獲寧神大造泊然玄夷哉夫生必有情天勢率至不宅不善必在于惡是以始行道者要必有寄寄之所因必因乎有有之所資必資乎煩是以經云欲于空中造立宮室終不能成取佛國者非于空也然則五度四等未始可之廢但當即其事用而去其忮心歸佛則解佛無歸于戒則無功于戒則禪諦與五陰俱冥末用與本觀同盡雖復衆行兼陳固是空行空耳或以為空則無行行則非空既以有行無乃失空乎夫空者忘懷之稱非府宅之謂也無誠無矣存無則滯封有誠有矣兩忘則玄解然則有無由乎方寸而無係于外物器象雖陳于事用感絶則理冥豈滅有而後無偕損以至盡哉由此言之有固非滯滯有則背宗反流歸根任本則自畼是以開士深行統以一貫達萬象之常冥乘所寓而玄領知來理之先空恆得之于同致悟四色之無朕順本際而偕廢審衆觀之自然故雖行而靡迹方等深經每泯一三世而未嘗謂見在為有則空中行空旨斯見矣弘明集十三
