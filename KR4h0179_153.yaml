body:
  text: 姚弋仲上石勒疏諫寵祖約祖約殘賊晉朝逼殺戈后不忠于主而陛下寵之臣恐姦亂之萌此其始矣晉書載紀姚弋仲傳晉豫州刺史祖約奔于勒勒禮待之弋仲上疏云云勒誅約又十六國春秋五十三下書禁復私仇有復私仇者皆誅之將吏亡滅者各陏所親以泣後振綸長育之晉書載紀姚萇傳又十六國春秋五十五下書置學官留臺諸鎮各置學官勿有所廢考試優劣隨才握敘晉書載紀姚萇傳又十六國春秋五十五下書復從征兵吏兵吏從征伐戶在大營者世世復其家無所豫晉書載紀姚萇傳又十六國春秋五十五下書禁誣劾除妖謗之言及姦穢有相劾舉者皆以其罪罪之晉書載紀姚萇傳又十六國春秋五十五敕太子興荀曜好姦變將為國害聞吾還北必來見汝汝便執之晉書載紀姚長傳又十六國春秋五十五立苻堅神主請詞往年新平之禍非萇之罪臣兄襄從陝北渡假路求西狐死首丘欲暫見鄉里陛下與苻眉要路距擊不遂而沒襄敕臣行殺非臣之罪苻登陛下末族尚欲復讎臣為兄報恥于情理何負昔陛下假臣龍驤之號謂臣曰朕以龍驤建業卿其勉之明詔昭然言猶在耳陛下雖過世為神豈假手于苻登而圖臣忘前征時言邪今為陛下立神象可歸休于此勿計臣過聽臣至誠晉書載紀苻登傳又十六國春秋五十五敕關尉諸生咨訪道藝修己勵身往來出入勿拘常限晉書載紀姚興傳上又十六國春秋六十一班命郡國百姓因荒自賣為奴婢者悉免為良人晉書載紀姚興傳上又十六國春秋五十六下書恤戰亡士卒士卒戰亡者守宰所在埋藏之求其近親為之立後同上下書定遭喪制將帥遭大喪非在疆場嶮要之所皆聽奔赴及期乃從王役臨戎遭喪聽假百日若身為邊將家有大變交代未至敢輒去者以擅去官罪罪之同上下書贈戰沒軍士軍士戰沒者皆厚加褒贈同上下書僧䂮等大法東遷于今為盛僧尼己多應須網領宣授遠規以濟頽緒僧䂮法師學優早年德芳暮齒可為國內僧主僧遷法師禪慧兼修即為悅衆法欽慧斌共掌僧録給車與吏力䂮資侍中秩傳詔羊車各二人高僧傳六又十六國春秋六十二下書道恆道標卿御等樂道體間服膺法門皎然之操實在可嘉但朕君以君臨四海治急須才方欲招肥遁于山林搜陸沈于屠肆況卿等周旋篤舊朕所知盡各挹幹時之能而潛獨善之地此豈朕求賢之至情卿等兼弘之深趣邪昔人有言國有驥而不乘方惶惶而更索是之謂也今敕尚書令顯便奪卿等二乘之福心由卿清名之容室讚時益世豈不大哉苟心存道味寧係白黑望體此懷不以守節為辭也弘明集十一高僧傳又十六國春秋六十二省所奏具意今所以相屈者時所須也不復相推本心以及于此煩殷勤廣自料理吾之情趣想卿等體之在素不復煩言便可奉承時命勉菩薩之蹤耳弘明集十一又十六國春秋六十二得重奏一二具之情事具如前詔但當開意以從時命無復煩于鄭重也弘明集十一又十六國春秋六十二致書鳩摩羅什僧䂮別己數旬每有傾想漸暖比日何如小虜遠舉更無處分正有憒然耳頃萬事之殷須才以理之近詔道恆道標二人令釋羅漢之服尋大士之蹤想當盤桓耳然道無不在法師等勗以諭之苟廢其尋道之心亦何必須爾也致意遷上人別來何似不審䂮統復何如多事不能一一為書恆等亦可令諸上人勸其令造菩薩之行也弘明集十一高僧傳六又十六國春秋六十二又下書與僧䂮等省疏所引一二具之朕以獨善之美不如兼濟之功自守之節未若拯物之大雖子陵頡頏于光武君平慠岸于蜀肆周黨辭祿于漢朝杜微稱襲于諸葛此皆偏尚耿介之士耳何足以關默語之要領高勝之趣哉今九有未乂黔黎荼蓼朕以寡德獨當其斃思得群才共康至治法師等雖潛心法門亦毗世宣教縱不能導物化時勉人為治而遠美辭世之許由高散髮于謝敷若九河橫流人盡為魚法師等雖毗世宣教亦安施乎而道恆等伏膺法訓為日久矣然其才用足以成務故欲枉奪其志以輔時政耳甚福報有微佛不虛言拯世急病之功濟時寧治之勳功福在此而不在彼可相誨諭時副所望弘明集十一又十六國春秋六十二遺禿髮傉檀書今遣尚書左僕射齊難討勃勃懼其西逸故令弼等于河西邀之晉書載紀禿髮傉檀傳又十六國春秋八十九與弟安成侯嵩述佛義書吾曾以己所懷疏條摩訶衍諸義圖與休公評詳厥衷遂有哀故不復能斷理義未久休公尋復致變自爾喪戎相尋苂復意事遂忘棄之近以當遣使送像欲與卿作疏箱篋中忽得前所條本末今送示卿徐徐尋撫若于卿有所不足者便可致難也見卿來日並可以當言笑吾前試通聖人三達觀以咨休公公尋有答今并送往諸此事皆是昔日之意如今都無情懷不知如何矣廣弘明集二十一又十六國春秋六十答安成侯嵩難述佛義書卿所難問引喻兼富理極致深實非庸淺所能具答今當為卿各以相酬耳卿引般若經云若有衆生遇斯光者必得無上道即經所言未聞有凡流而得見光明者如釋迦放大光明普照十方當斯之時經不言有群品而得見其怪而共之者皆是普明之徒以斯言之定不為群小也卿若以衆生為疑者百億菩薩豈非衆生之謂邪然經復云普明之詣釋迦皆與善男子善女人持諸華香來供養釋迦及致供養之徒自應普蒙其潤也伹光明之作本不為善男子善女人所以得蒙餘波者其猶蠅附驥尾得至千里之舉耳卿又引神變令三惡衆生得生人天若在鹿為鹿在馬為馬而度脫之豈非神變之謂邪華手思益法華諸經所言若云放大光明自應與大品無異也若一一光明以應適前物此作非人天所通夫光明之與寂寞此直發意有參差其揆一也卿引經言施者授者財物不可得與不住法不住般若未有異二者直是始終之教也統而言之俱是破著之語耳何者罪不罪施者授者及財物都不可得若都不可得復何所著是勸無所著明矣卿又問明道之無為為當同諸法之自空為妙空無以成極邪又引論中二諦之間言意所不及道之無為所寄邪吾意以謂為道止無為未詳所以宗也何者夫衆生之所以流轉生死者皆著欲故也若欲止于心即不復生死既不生死潛神玄漠與空合其體是名涅槃耳既曰涅槃復何容有名于其間哉夫道以無寄為宗若求寄所在恐乃惑之大者也吾所明無為不有可為有者意事如隱尋求或當小難今更重伸前義卿所引論中即吾義宗諸法若不空則無二諦若不有亦無二諦此定明有無不相離何者若定言有則無以拔高士若定明無則無以濟常流是以聖人有無兼抱而不捨者此之謂也然諸家通第一義廓然空寂無有聖人吾常以為殊大徑廷不近人情若無聖人知無者誰也廣弘明集二十一又十六國春秋六十重答安成侯嵩得表具一二吾常近之才加以多事昏塞觸事面牆不知道理安在為復以卿好樂玄法是以聊復孟浪以言之耳而來諭過美益以不安廣弘明集二十一又十六國春秋六十遺僧朗書皇帝敬問泰山朗和尚勤神履道飛聲映世休聞遠振常無巳巳朕京西夏思濟大猷今關中未平事惟左右己命元戎克寧伊洛冀因斯會東封巡狩憑靈仗威須見指授今遣使者送金浮圖三級經一部寶臺一區庶望玄鑒照朕意焉廣弘明集三十五又十六國春秋四十二遺釋慧遠書大智度論新譯訖此既龍樹所作又是方等旨歸宜為一序以伸作者之意然此諸道士咸相推謝無敢動手法師可為作序以貽後之學者釋藏輦九又百五通三世論咨鳩摩羅什曾問諸法師明三世或有或無莫適所定上亦是大法中一段處所而有無不判情每慨之是以忽疏野懷耳聊復孟浪言之誠知孟浪之言不足以會理然胸襟之中欲有少許意了不能默己輒疏條相呈匠者可為折衷余以為三世一統循環為用過去雖滅其理常在所以在者非如阿毗曇注言五陰塊然喻若足之履地真足雖往厥迹猶存常來如火之在木木中欲言有火邪視之不可見欲言無火邪火緣木而出經又云聖人見三世若其無也聖無所見若言有邪則犯常嫌過去未來雖無眼對釐恆相因苟因理不絶聖見三世無所疑矣廣弘明集二十一又十六國春秋六十二通不住法住般若衆生之所以不階道者有著故也是以聖人之教恆以去著為事故言以不住般若雖復大聖元鑒應照無際亦不可著著亦成患欲使行人忘彼我遺所寄泛若不繫之舟無所倚薄則當于理矣廣弘明集二十一通聖人教放大光明普照十方聖人之教玄通無涯致感多方不可伯一途求不可以一理推故應粗以粗應細以細應理固然矣所以放大光明現諸神變者此應十方諸大菩薩將紹尊位者耳若處俗接粗復容此事邪阿含經云釋氏之處天竺四十餘載亡服飲食受諸患痛與人不別經又云聖人亦入鹿馬而度脫之當在鹿馬豈異木鹿馬哉若不異鹿馬應世常流不待此神變明矣每事須自同于前物然後得行其化耳廣弘明集二十一通三世衆生歷涉三世其猶循環過去未來雖無眼對其理常在是以聖人尋往以知往逆數以知來通一切諸法空大道者以無為為宗若其無為復何所有邪廣弘明集二十一下書復死事士卒士卒死王事者贈以爵位永復其家晉書載紀姚泓傳又十六國春秋五十九上疏諫去帝號伏惟陛下勳格皇天功濟四海威震振于殊域聲教暨于遐方雖成湯之隆殷基武王之崇周業未足比諭方當廓靖江吳告成中嶽豈宜過重沖損違皇天之眷命乎晉書載紀姚興傳上十六國春秋五十六太尉趙公旻等五十三人上疏諫謝賜皇后所遺珠佛像表臣言奉珠像承是皇后遺囑所建禮覲之日永慕罔極伏惟感往增懷臣言先承陛下親營像事每注心延望遲冀暫一禮敬不悟聖恩垂及乃復與臣供養此像既功寶並重且于制作之理擬若神造中來有所有珠像誠當奇妙然方之于此有信復有間瞻奉踊躍實在無量夫受乾施者無報蒙恩隆者無謝雖欲仰陳愚誠亦復莫知所盡臣言廣弘明集二十一又十六國春秋六十上述佛義表臣言奉陛下所通諸義理味淵玄詞致清勝間詣踰于二篇妙盡俟乎中觀詠之玩之紙已致勞而心猶無厭真可謂當時之高唱纍劫之宗範也但臣頑暗思不參玄然披尋之日真復詠歌弗暇不悟弘慈善誘乃欲令參致問難敢忘愚鈍輒位敘所懷豈曰存難直欲咨所未悟耳臣言上通三世甚有深致既已遠契聖心兼復抑正衆説宗塗亹亹超絶常境欣悟之至益令賞味增深加為什公研核該備實非愚臣所能稱盡正當銘之懷抱以為心要耳臣言上通不住般若義云衆生之所以不階道者有著故也是以聖人之教恆以去著為事故言以不住般若雖復大聖玄鑒應照無際亦不可著著亦成患欲使行人忘彼我遺所寄泛若不繫之舟無所倚薄則當于理矣故聖心玄詣誠無不盡然至乎標位六度而以無著為宗取之于心誠如明誨即之于事脫有未極夫無著雖妙似若有不即真兩冥有不即真兩冥恐是心忘之謂耳竊尋玄教如更有以謹牒成言以攄愚見故經云施者授者財物不可得以無所拾法具足檀波羅蜜以此三事不可得故三者既冥有無無當無當之理即同幻化以此而推恐不住之致非真忘彼我遺所寄而己詔云放大光明諸神變者此自應十方諸大菩薩將紹尊位者耳斯理之玄固非庸近所參然不己之情猶欲言所未達夫萬有不齊精粗亦異應彼雖殊而聖心恆一恆一故圓以應之不同故權以濟之雖鹿馬而未始乖其大雖現神而未始遺其細故淨名經云如來或以光明而作佛事或以寂寞而作佛事皓默雖異而終致不二然則于小大之間恐是時互説耳如藥手經初佛為德藏放大光明今諸衆生共普蒙其潤又思益經中罔明所問如來三十三種光明一切遇者皆得利益法華經云佛放眉間相光亦使四衆八部咸皆生疑又云處暗衆生各得相見苟有其緣雖小必益苟無其因雖大或乖故般若經云若有衆生遇斯光者必得無上道又以神變令三惡衆生皆生天上以此而言至于光明神變之事似存平等敢緣慈念輒竭愚思若復哀矜重開導者豈直微臣獨受其賜詔云大道者以無為為宗若其無為復何所為邪至理淵談誠不容言然處在涉求之地不得不尋本以致悟不審明道之無為為當以何為體若以妙為宗者雖在帝先而非極若以無有為妙者必當有不無之因因稱俱未冥詎是不二之道乎故論云無于無者必當有于有有無之相譬猶修短之相形耳無理雖玄將恐同彼斷常常猶不可況復斷邪然則有無之津乃是邊見之所存故中論云不破世諦故則不破真諦又論云諸法若實則無二諦諸法若空則無罪福若無罪福凡聖無判苟無判道何所益由臣暗昧未悟宗惟願仁慈重加誨諭同上重上表臣言春賜還詔誨諭周備伏尋之日欣踊無量陛下爰發德音光闡幽極拓道義之門演如來之奧冥宗隱而復彰玄扉掩而再敝文外之旨可謂朗然幽燭矣夫理玄者不可以言稱事妙者固非常詞之所囋雖欲心如仰詠亦罔知所盡由臣愚鈍而猥蒙陛下褒飾之美誠復欣戴殊眷實增愧赧比仰味微言研詠彌至其為蒙悟豈唯過半之益但臣仍充外役無由親承音旨望雲遐慨實在罔極不勝延係謹以申聞臣嵩言廣弘明集二十一又十六國春秋六十駮李嵩既葬素服臨朝議帝王喪制漢魏為準嵩矯常越禮愆于軌度請付有司以守擅論既葬即吉乞依前議晉書載紀姚興傳上又十六國春秋六十上疏言既葬應素服臨朝三王異制五帝殊禮孝治天下先王之高事也宜遵聖性以光道訓既葬之後應素服臨朝率先天下仁孝之舉也晉書載紀姚興傳又十六國春秋六十行事記有娶同堂姊子為婦妘母亡不妘母服猶制同堂姊服常謂三公之義不可得而無服多以內外姊妹為婦則絶其本服服絶而情重何嫌不減從妹之服月數作婦母之服也又以調沈所言舅為外舅事訪謂君思難云舅服緦麻與外舅之服自可得同然娶姑之女姑亡豈可纍降為三月邪太常劉彥祖云譬如父母服本斬齊至于改葬而制緦麻也近羊彭有叔父服而改葬其父更叔之服而著改葬之服此其以緦麻為重也蓋禮所謂以輕為重者有同者此亦無準據殆是率心而行也通典九十五渾天論夫言天體者蓋非一家也世之所傳有渾天有蓋天説渾天者言渾然而圓地在其中蓋天者言天形如車蓋地在其中下二曜推移五星迭覿見伏昏明皆由遠近運移麗天不入于地日之將沒去人彌遠明衰光減故暗其明及其將出去人彌近光明炎熾故極其照揚雄以為渾天得之難蓋天日今于高山之上設水平以望日則日出水平下若天體常高地體常卑日無出之理于是蓋天無以對也渾天之説天體包裹地在其中七曜離躔道有常率天體旁倚故日道南高而北下運轉之樞南下而北高二樞為轂日道為輪周回運移終則復始北樞謂之北極北極出地上三十六度故天北際七十二度常見而不伏南樞謂之南極南極入地下亦三十六度故天南際七十二度常伏而不見也周髀云日一度二千九百三十二里奇夏至之景南北千里差一寸周天百七萬一千里徑三千五萬七千里表在其外萬五千里故天日四遊于三萬里之中冬南夏北春西秋東皆薄四表而止地亦外降于天之中旁遊之數與天遊同日道星宿之外亦萬五千里圓周之徑正與四表等冬至之日出辰入申夏至之日出寅入戌進退于六十度之中焉非專四遊之差亦有地之升降冬至之後日轉北移非專是日移也亦由天地遊而南故物有生而不死夏至之後日轉南移非專日之移也亦由天地遊而北故物有伏而不生二分之日出卯入酉正與地土平故半表之徑得天地相去十九萬里然則地處天半而下也故日出地上百八十二度八分度之五謂之晝入地下百八十二度八分度之三謂之夜晝則出地上而西夜則入地下而東周匝百刻昏明五十刻分之日刻數既均天度又等與極應規謂之中繩居寒暑景之和處遲疾之春分之後日行中繩之北故晝長而夜短伏少而見多景短而溫氣甚秋分之後日行中繩之南故晝短而夜長伏多而見少景長而寒氣多易説冬至之景得一丈三尺夏至之景一尺四寸八分并二至之景得一丈四尺四寸八分春分之景七尺四寸四分秋分之景與春分等并二分之景亦得一丈四尺四寸八分然則東西南北經緯均也大平時和七曜順軌優遊兩儀之中不內不外漢之乾象魏之景初皆以二分之時行黃儀之內故南北闊而東西狹冬至去極一百十五度景長一尺五寸并度得百八十二度八分度之五并景得一丈四尺五寸春分去極八十九度景長五尺二寸五分秋分去極九十度景長五尺五寸并度得百七十九度并景得一丈七尺五寸五分東西少于南北三度為東西九千里弱東西之景短于南北之景三尺七寸五分為里三萬七千五百東西之徑定也而度與景里則有殊然則一度之里一寸之差及四遊之説殆難明矣鄭玄以二至之景一寸俱差千里夏至之日八尺之表景得一尺五寸日下之地南于嵩高一萬五千里冬至之日八尺之表景得一丈三尺日下之地南于嵩高十三萬里夫日高則景小埤景差多日無上下之説而天地有升降安得千里同差一寸也故東西之徑少于南北之徑以度言之則九千里以景言之則三萬七千五百里二分之日南北千里蓋當景差四寸矣鄭氏之言理豈可哉天遊薄四面而日道與四表等不升不降當與四表交轉二分之日道與二極應規而天地居四遊之中春分之後天地降而下遊而南至于夏至天遊至南表而止故視日北而高自此以後而北王秋分還與日道應規秋分之後天地升而上遊而北至于冬至則天遊至北表而止故視日埤而南計其進退南北不繫于三萬里之內春分之後至夏至差度二十四除其鉤弦之數乃常南遊六萬餘里此蓋升降之度里則小矣今置渾天于地以衡望日地升渾上則日去極遠地降渾下則日去極近遠近之驗不必在于南北亦由升降可知矣然則旁遊與升降各十二度與天地遊三萬里相近矣日月麗天有虧有盈有交有會月行日出以半周天為即月道交錯半入日道之內半出日道之外在外謂之行陽在內謂之行陰當交則會會則有食蔡氏月令章句曰天者純陽精剛轉運無窮其體渾而包地地上者一百八十二度八分之五地下亦如之其上中北偏出地三十六度謂之北極星是也史官以玉衡長八寸孔徑一寸從下端望之此星常見于孔端無有移動是以知其為天中也其下中南偏入地亦三十六度謂之南極從上端望之當孔下端是也此兩中者天之輻軸所在轉運所由也天左旋出地上而西入地下而東其繞北極徑七十二度常見不伏圖內赤小規是也繞南極徑七十二度常伏不見圖外赤大規是也據天地之中而察東西則天半見不見圖中赤規截婁角者是也岌案此與張衡所説不殊而云玉衡長八寸則似是古儀矣又云據天地之中所云規數據蓋圖綴星是也開云古經二渾天論答難渾天之説天體包裹地在其中七曜躔麗道有常率天體旁倚故日道南高而北下運轉之樞南下而北高二樞為轂日道為輪周回運移終則復始北樞謂之北極出地上三十六度故天北際七十二度常見而不伏南樞謂之南極入地下亦三十六度故天南際七十二度常伏而不見或云火陽也故外照金水陰也故內景日為陽精故外照月為陰之宗應內景而月復能外照何也對曰月光者日曜之所生是故外景如日照也是故瑩金澄水得日之照照物亦有景又曰月無盈虧盈虧由人也日月之形體如圓丸各徑千里月體向日常有光也月之初生日曜其西人處其東不見其光故名曰魄魄三日之後漸東而南故明生焉八日正在南方半之故見弦也望則人處日月之間故見其圓也假使月初生時移人在日月之間東向以視則月光圓若望也夏至之日日入戌月初生時則西北近日有光及出干寅未盡三日以視月則東北近日光不盡也研之于心驗之于日月體向日有光而言圓矣難者又云日曜星月明乃生焉然則月望之日夜半之時日在地下月在地上其間隔地日光何由得照月暗虛安得常在日衝對曰日之曜也不以幽而不至不以行而不及赫烈照于四極之中而光曜煥乎宇宙之內循天而曜星月猶火之循突而升乃其光曜無不周矣惟衝不照名曰暗虛舉日及天體猶滿面之賁鼓矣日之光炎在地之上因礙地不得照而散故薄天照則遠在地之上散而直照則近以斯言之則日光應曜星月有何礙哉易傳曰日夜食則星亡無日以曜之故也難云地上不得直照而散故薄天而照遠驗先望一日日未入地而月已出相去三十餘萬里日光地上散而直照不應及月而使月明光者何也對曰薄天而照則遠是言礙地廣難耳水流溼火就燥類相從也月者星類也日光直照雖不及月今然一燭在上一燭在下滅下燭使煙相當則上燭之炎循煙而下然下燭矣此類相從也難者又曰日夜食則衆星亡驗月體不大于地今日在地下月在地上地體太尚不能掩日使不照月月體小于地安能掩日使不照曜星也對曰上元之初日月如疊璧五星如連珠故曰重光重光者日在上月次之星居下地在宿內故不掩日日光循星月而曜之也月在星宿之外故掩日光不得照星也開元占經一余以為子陽言天陽下降日下熱束晳言天體存于目則日大頗近之矣渾天之體圓周之徑詳之于天度驗之于晷景而紛然之説由人目也參伐初出在旁則其間疏在上則其間數以渾驗之度則均也旁之與上理無有殊也夫日者純陽之精也光明外曜以眩人目故人視日如小及其初出地有遊氣以厭日光不眩人目即日赤而大也無遊氣則色白大不甚矣地氣不及天故一日之中晨夕日色赤而中時日色白地氣上升蒙蒙四合與天連者雖中時亦赤矣日與火相類火則體赤而炎黃日赤宜矣然日色赤者猶火無炎也光衰失常則為異矣隋書天文志上列子曰孔子東遊見兩小兒辨日出日中遠近關子陽束晳以為云云余以以為上疏言廣平公弼逆狀廣平公弼懷姦積年謀禍有歲傾陷群豎為之畫足釁成逆著取嗤戎裔昔文王之化刑于寡妻今聖朝之亂起自愛子雖欲含忍其瑕掩蔽其罪而逆黨猶繁煽惑不己弼之亂心何由可革宜斥散凶徒以絶禍端晉書載紀姚興傳下又十六國春秋五十八李趙曲銅像銘秦建元二十四年四月八日于長安寺中造十王慧詔感佛泥曰達遇遺像是以賴身之餘造鑄神模若誠感必應使十方同福法苑珠林二十二
