body:
  text: 桓彝上疏乞宣城郡內外之任竝非所堪但以墳柏在此郡欲暫結名義晉書桓彝傳請追録王濬後表臣聞崇德賞功為政之所先興滅繼絶百王之所務故德參時雍則奕世承祀功烈一代則永錫祚胤案故撫軍王濬歷職內外任兼文武料敵制勝明勇獨斷義存社稷之利不顧專輒之罪荷戈長鶩席卷萬里僭號之吳面縛象魏令皇澤被于九州玄風洽于區外襄陽之封廢之而莫續恩寵之號墜于近嗣遐邇酸懷臣竊悼之濬今有二孫年出六十室如懸罄糊口江濱四節蒸嘗菜羹不給昔漢高定業求樂毅之嗣世祖旌賢建葛亮之胤夫效忠異代立功異國尚通天下之善使不泯棄況濬建元勳于當年著嘉慶于身後靈基託根于南垂皇祚中興于江左舊物克彰神器重耀豈不由伊人之功力也哉誠宜加恩少垂矜憫追録舊勳纂錫茅土則聖朝之恩宣畼于上忠臣之志不墜于地矣晉書王濬傳濬有二孫過江不見齒録安西將軍桓溫鎮江陵表言薦譙元彥表臣聞太朴既虧則高尚之標顯道喪時昏則忠貞之義彰故有洗耳投淵以振邈之風亦有秉比矯迹以敦在三之節是故上代之君莫不崇重斯軌所以篤俗訓民靜一流競伏惟大晉應符御世運無常通時有屯蹇神州丘墟三方圮裂兔罝絶響于中林白駒無聞于空谷斯有識之所悼心大雅之所歎息者也陛下聖德嗣興方恢天緒臣昔奉役有事西土鯨鯢既懸思宣大化訪諸故老搜揚潛逸庶羅于羿浞之墟想王蠋于亡齊之境竊聞巴西譙秀植操貞固拘德肥遁揚清渭波于時皇極遘道消之會群黎蹈顛沛之艱中華有顧瞻之哀幽谷無遷喬之望凶命屢招姦威仍逼身寄虎吻危同朝露而能抗節玉立誓不降辱杜門絶迹不面僞庭進免龔勝亡身之禍退無辥方詭對之譏雖園綺之棲商洛管寧之默遼海方之于秀殆無以過于今西土以為美談夫旌德禮賢化道之所先崇表殊節聖哲之上務方今六合未康豺豕當路遺黎偷薄義聲弗聞益宜振起道義之徒以敦流遁之斃若秀蒙蒲帛之徵足以鎮靜頽風軌訓囂俗幽遐仰流九服知化矣蜀志譙周傳注引晉陽秋又見文選賀白兔表臣聞至德通玄則禎祥降靈和所感則異物生今白兔見于春穀縣皓質純素皎然殊觀藝文類聚九十五表高安戍是孫權每征還遣上方諸軍餉賜處也權又常大積米穀于此以備須濡者也平洛表薦謝尚今中州既平宜時綏定鎮西將軍豫州刺史尚神懷挺率少致人譽足以入贊百揆出蕃方司宜進據洛陽撫寧黎庶謂可本官都督司州諸軍事世說賞譽篇注引溫集表免武陵王晞晞體自皇極故寵靈光世不能率由王度修己慎行而聚納輕剽苞藏亡命又息綜矜忍虐加于人袁真叛逆事相連染頃日猜懼將成亂階請免晞官以王歸藩免其世子綜官解子㻱散騎常侍晉書武陵王晞傳上疏自陳臣近親率所統欲北掃趙魏軍次武昌猶撫軍大將軍會稽王昱書說風塵紛紜妄生疑惑辭旨危急憂及社稷省之惋愕不解所由形影相顧隕越無地臣以暗蔽忝荷重任雖才非其人職在靜亂寇讎不滅國恥未雪幸因開泰之期遇可乘之會匹夫有志猶懷憤慨臣亦何心坐觀其斃故荷戈驅馳不遑寧處前後表陳于今歷年矣丹誠坦然公私所察有何纖介容此嫌忌豈醜正之徒心懷怵惕操弄虛說以惑朝聽昔樂毅竭誠垂涕流奔霍光盡忠上言告變讒說殄行姦邪亂德乃歷代之常患存亡之所由也今主上富于陽秋陛下以聖淑臨朝恭已委任責成群下方寄會通于群才布德信于遐荒況臣世蒙殊恩服事三朝身非羈旅之賓跡無韓彭之釁而反閒起于胸心交亂過于四國此古賢所以歎息于既往而臣亦大懼于當年也今寇賊冰消大事垂定晉之遺黎鵠立南望赴義之衆慷慨即路元凶之合懸在漏刻而橫議妄生成此貝錦使垂滅之賊復獲蘇息所以痛心絶氣悲慨彌深臣雖所存者公所務者國然外難未弭而內斃交興則臣本心陳力之志也晉書桓溫傳上疏廢殷浩案中軍將軍浩過蒙朝恩叨竊非據寵靈超卓再司京輦不能恭慎所任恪居職次而侵官離局高下在心前司徒臣謨執義履素位居台輔師傳先帝朝之元老年登七十以禮請退雖臨軒固辭不順恩旨適足以明遜讓之風弘優賢之禮而浩虛生狡說疑誤朝聽獄之有司將致大辟自羯胡夭亡群凶殄滅而百姓塗炭企遲拯接浩受專征之重無雪恥之志坐自封植妄生風塵遂使寇讎嵇誅姦逆竝起華夏鼎沸黎元殄悴浩懼罪將及不容于朝外聲進討內求苟免出次壽陽頓甲彌年傾天府之資竭五州之力收合無賴以自彊衛爵命無章猜害罔顧故范豐之屬反叛于芍陂奇德龍會作變于肘腋羌帥姚襄率衆歸化遣其母弟入質京邑浩不能撫而用之陰圖殺害再遣刺客為襄所覺襄遂惶懼用致逆命生長亂階自浩始也復不能以時掃滅縱放小豎鼓行毒害身狼狽于山桑軍破碎于梁國舟車焚燒輜重覆沒三軍積實反以資寇精甲利器更為賊用神怒人怨衆之所棄傾危之憂將及社稷臣所以忘寢屏營啓處無地夫率正顯義所以致訓明罰敕法所以齊衆伏願陛下上追唐堯放命之刑下鑒春秋無君之典若聖上含弘未忍誅殛且宜遐棄擯之荒裔雖未足以塞山海之責粗可以宣誡于將來矣晉書殷浩傳請還都洛陽疏巴蜀既平逆胡消滅時來之會既至休泰之慶顯著而人事乖違屢喪王略復使二賊雙起海內崩裂河洛蕭條山陵危逼所以遐邇悲惶痛心于既往者也伏惟陛下稟乾自然之姿擬羲皇玄朗之德鳳棲外藩龍飛皇極時務陵替備徹天聽人之情僞盡知之矣是以九域宅心幽遐企踵思貯雲羅混網四裔誠宜遠圖廟算大存經略光復舊京疆理華夏使惠風陽澤洽被八表霜威寒飆陵振無外豈不允應靈休天人齊契今江河悠闊風馬殊邈故向義之徒覆亡相尋而建節之士猶繼踵無悔況辰極既回衆星斯仰本源既運支派自遷則晉之餘黎欣皇德之攸憑群凶妖逆知滅亡之無日騁思順之心鼓雷霆之勢則二豎之命不誅而自絶矣故員通貴于無滯明哲尚于應機砎如石焉所以成務若乃海運既徙而鵬翼不舉永結根于南垂廢神州于龍漠令五尺之童掩口而歎息夫先王經始玄聖宅心畫為九州制為九服貴中區而內諸夏誠以晷度自中霜露惟均冠冕萬國朝宗四海故也自彊胡陵暴中華蕩覆狼狽失據權幸楊越蠖屈以待龍申之會潛蟠以俟風雲之期蓋屯圯所鍾非理勝而然也而喪亂緬邈五十餘載先舊徂沒後來童幼班荊輟音積習成俗遂望絶于本邦宴安于所託眷言悼之不覺悲歎臣雖庸劣才不周務然攝官承乏屬當重任願竭筋骨宣力先鋒翦除荊棘驅諸豺狼自永嘉之亂播流江表者請一切北徙以實河南資其舊業反其土宇勤農桑之務盡三時之利道之以義齊之以禮使文武兼宣信順交畼井邑既修綱維粗舉然後陛下建三辰之章振旗旗之旌冕旒鍚鑾朝服濟江則宇宙之內誰不幸甚夫人情昧安難與圖始非常之事衆人所疑伏願下決玄照之明斷常均之外責臣以興復之效委臣以終濟之功此事既就此功既成則陛下盛勳比隆前代周宣之詠復興當年如其不效臣之罪也褰裳赴鑊其甘如薺晉書桓溫傳上疏陳便宜七事其一朋黨雷同私議沸騰宜抑杜浮競使莫能其二今天下分崩喪亂殄瘁雖道隆中興而戶口雕寡近方漢時不當一郡之民民戶既少則勢不多而當必同古制百官備職實非大義隨時之宜且設官以理務務寡則官省官省以國治則職顯而人清故光武初興多所併省諸葛亮相蜀𥳑才併官此皆達治之成規今日之所先也宜從權制併官省職今久于其事愚謂門下三省祕書著作通可減半古以九卿綜事不專尚書故重九棘也今事歸內臺則九卿為虛設之位唯太常廷尉職不可闕其諸員外散官及軍府參佐職無所掌者皆併于尚書若車駕郊廟藉田之屬凡諸大事于禮宜置者臨事權兼事訖則罷職既併則官少而才精職理則無害民而治道康矣其三機務不可停廢常行文案宜為限日其四宜明長幼之禮獎忠公之吏其五褒貶賞罰宜允其實其六宜述遒前典敦明學業其七宜選建史官以成晉書晉書桓溫傳又御覽二百三引桓溫集略表辭參朝政疏方攘除群凶掃平禍亂當竭天下智力與衆共濟之而朝議咸疑聖詔彌固事異本圖豈敢執遂至于入參朝政非所敢聞臣違離宮省二十餘載鞸琫戎務役勤思苦若得解帶逍遙鳴玉闕廷參贊無為之契豫聞曲成之化雖實不敏豈不是願但顧以江漢艱難不同曩日而益梁新平寧州始服懸兵漢川戍禦彌廣加彊蠻盤牙勢處上流江湖悠遠當制命侯伯自非望實重威無以鎮御遐外臣知捨此之艱危敢背之而無怨願奮臂投身造事中原者實恥帝道皇居久陋于東南痛神華桑梓遂埋于戎狄若憑宗廟之靈則雲徹席卷呼吸蕩清如當假息游魂則臣據河洛親臨二寇廣宣皇靈襟帶秦趙遠不五載大事必定今臣昱以親賢贊國光輔二世即無煩以臣疏鈍竝閒機務且不有行者誰扞牧圉表裏相濟實深實重伏願陛下察臣所陳兼訪內外乞時還屯撫寧方隅晉書桓溫傳帝不豫上疏聖體不和以經積日愚心惶恐無所寄情夫盛衰常理過備無害故漢高枕疾呂后問相孝武不豫霍光啓嗣嗚噎以問身後蓋所存者大也今皇子幼稚而朝賢時譽惟謝安王坦之才識智能皆𥳑在聖鑒內輔幼君外禦彊寇實群情之大懼然理盡于此陛下便宜崇授使群下知所寄而安等奉命陳力公私為宜至于臣溫位兼將相加陛下垂布衣之顧但朽邁疾病懼不支久無所復堪託以後事晉書桓溫傳檄胡文胡賊石勒暴肆華夏齊民塗炭前困讎孽至使六合殊風九鼎乖越每惟國難不遑啓處撫劍北顧慨歎盈懷寡人不德忝荷戎重師次安陸經營舊邑瞻望華夏暫成楚越登丘悽覽征夫憤慨昔叔孫絶粒義不同惡龔生守節恥存莽朝曆紀逋僭一朝蕩定拯撫黎民即安本土訓之以德禮潤之以玄澤信感荒外武揚八極先順者獲賞後伏者前誅德刑既明隨才攸序此之風範想所聞也藝文類聚五十八與撫軍箋此胡肆立四十餘載傾覆社稷毀辱陵廟遇其可亡之會實是君子竭誠小人盡力之日也江東雖為未豐方之古人復為未儉少康以一旅之衆興復祖宗光武奮發中興漢室況以大晉之祚樹德長久兼百越沃野之資據江漢山海之利鹽鐵寶帛之饒角竿羽毛之用收英賢之略盡兵民之力賊之強也猶復遵養時晦及其斃也不齊力掃滅則大賊何由而自平大恥焉得而自雪臨紙惆悵慨歎盈懷藝文類聚五十九與慕容皓書自滄流以北幽朔以東將軍皆以羈落而總率之矣首尾脣齒左右力用鳴鏑揚鑣動數十萬御覽三百五十八答慕容皓書承將軍奮厲戎武激揚士卒鼓角長鳴摧折姦宄十六國春秋二十四與弟沖書遣詔使吾依武侯王公故事耳王謝處大事之際日憤憤少懷晉書桓溫傳書大事之曰僕在都謂無所復見慰勞又計時事也逐節郎來已具言意餘所慰勞諸相具答邊將粗當爾耳僕無所使酒席意淳化閣帖二讓征西大將軍開府疏臣聞三台麗天辰極以之增耀論道作弼王猷以之時雍必將仰參神契對揚成務弘易簡以翼化畼玄風于宗極故宜明揚仄陋登庸賢雋使版築有沖天之舉渭濱無垂竿之逸用乃功濟蒼生道光千載是以德非時望成典所不虛授功微賞厚賢達不以擬心臣實凡人量無遠致階藉門寵遂叨非據進不能闡揚皇風贊明其政道退不能宣力所蒞混一華戎尸素積載庸績莫紀是以敢冒成命歸陳丹款伏願陛下回神玄覽追收謬眷則具瞻革望臣知所免晉書桓豁傳表救涼州氏賊自并東胡醜類實繁而蜀漢寡弱西涼無備斯誠暴與疾顛祗速其亡然而天未勦絶屢為國患臣聞勝于無形功立事表伐謀之道兵之上略況此賊陸梁終必越逸北狄陵縱常在秋冬今日月迅邁高風行起臣輒較量畿甸守衛重復又淮泗通流長江如海荊楚偏遠密邇寇讎方城漢水無天險之實而過備之重勢在西門臣雖凡庸識乏武略然猥荷重任思在投袂請率所統徑進南郡與征西將軍臣豁參同謀猷賊若果驅犬羊送死沔漢庶仰憑正順因致人利一舉乘風掃清氛穢不復重勞王師有事三秦則先帝盛業永隆隆于聖世宣武遺志無恨于在昔如其懾憚皇威窺𨵦計屈則觀兵伺釁更議進取振旅旋旆遲速唯宜伏願陛下覽臣所陳特垂聽許晉書桓沖傳表桓嗣屯夏口氐賊送死之日舊郢以北壁相望待以不戰江州刺史桓嗣宜進屯夏口據上下之中于事為便南齊志七表桓石民為襄城王薈為江州夏口江沔衝要密邇彊寇兄子石民堪居此任輒版督荊州十郡軍事振武將軍襄城太守尋陽北接彊蠻西連荊郢亦一任之要今州府既分請以王薈補江州刺史晉書桓沖傳移鎮上明疏自中興以來荊州所鎮隨宜回轉臣亡兄溫以石季龍死經略中原因江陵路便即而鎮之事與時遷勢無常定且兵者詭道示之以弱今宜全重江南輕戍江北南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽若狂狡送死則舊郢以北堅壁不戰接會濟江路不去遠乘其疲墮撲翦為易臣司存閫外輒隨宜處分晉書桓沖傳上言吉挹忠節故輕車將軍魏興太守吉挹祖朗西臺傾覆隕身守節挹世篤忠孝乃心本朝臣亡兄溫昔伐咸陽軍次灞水挹攜將二弟單馬來奔録其此誠仍加擢授自新野太守轉在魏興久處兵任委以邊戍疆埸歸懷著稱所蒞前年狡氐縱逸浮河而下挹孤城獨立衆無一旅外摧凶鋭內固津要虜賊舟船俘馘千計而賊并力攻圍經歷時月會襄陽失守邊情沮喪加衆寡勢殊以至陷沒挹辭氣慷慨志在不辱杖刃推戈期之以隕將吏持守用不即斃遂乃杜口無言絶粒而死挹參軍史穎近于賊中得還齎挹臨終手疏并具說意狀挹之忠志猶在可録若蒙天地垂曲宥之恩則榮加枯朽惠隆泉壤矣晉書忠義吉挹傳奏納孝武王皇后臣聞天地之道蓋相須而化成帝后之德必相協而政隆然後品物流形彝倫攸敘靈根長固本枝百世天人同致莫不由此是以塗山作儷而夏族以熙妊姒配周而姬祚以昌今長秋將建宜時𥳑擇伏聞試守晉陵太守王蘊女天性柔順四業允備且盛德之胄美善先積臣等參議可以配德乾元恭承宗廟徽音六宮母儀天下晉書孝武定王皇后傳
