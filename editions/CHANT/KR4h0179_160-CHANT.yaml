body:
  text: 釋僧叡大品經序摩訶般若波羅蜜者出八地之由路登十階之龍津也夫淵府不足以盡其深美故寄大以目之水鏡未可以喻其澄朗故假慧以稱之造盡不足以得其涯極故借度以明之然則功訖有無度名所以立照本靜末慧日以之生曠兼無外大稱由以起斯三名者雖義涉有流而詣得非心跡寄有用而功實非待非心故以不住為宗非待故以無照為本本以無照則凝知於化始宗以非心則忘功於行地故啟章玄門以不住為始妙歸三慧以無待為終假號照其真應行顯其明無生沖其用功德旌其深大明要終以驗始漚和即始以悟終蕩蕩焉真可謂大業者之通塗畢佛乘者之要軌也夫寶重故防深功高故校廣囑之以殷勤功德之所以屢增良有以也而經來茲土乃以秦言譯之典謨乖於殊制名實喪於不謹致使求之彌至而失之彌遠遠頓轡重關而窮路轉廣不遇淵匠殆將墜矣亡師安和尚鑿荒塗以開轍標玄指於性空落乖蹤而直達殆不以謬文為閡也亹亹之功思過其半邁之遠矣鳩摩羅休法師慧心夙悟超拔特詣天魔干而不能迴淵識難而不能屈扇龍樹之遺風震慧響於此世秦王感其來儀時運開其凝滯以弘始三年歲次星紀冬十二月二十日至長安秦王扣其虛關匠伯陶其淵致虛關既開乃正此文言淵致既宣而出其釋論謂濱流祇洹之化西明啟如來之心逍遙集德義之僧京城溢道詠之音末法中興將始於此乎予既知命遇此真化敢竭微誠屬當譯任執筆之際三惟亡師五失及三不易之誨則憂懼交懷惕焉若厲雖復履薄臨深未足喻也幸冀宗匠通鑒文雖左右而旨不違中遂謹受案譯敢當此任以弘始五年歲在癸卯四月二十三日於京城之北逍遙園中出此經法師手執梵本口宣秦言兩釋異音交辯文旨秦王躬覽舊經驗其得失諮其通途坦其宗致與諸宿舊義業沙門釋慧恭僧䂮僧遷寶度慧精法欽道流僧叡道恢道標道恆道悰等五百餘人詳其義旨審其文中然後書之以其年十二月十五日出盡校正檢括明年四月二十三日乃訖文雖粗定以釋論檢之猶多不盡是以隨出其論隨而正之釋論既訖爾乃文定定之未己已有寫而傳者又有以意增損私以般若波羅蜜為題者致使文言舛錯前後不同良由後生虛己懷薄信我情篤故也梵本唯序品阿鞞跋致品魔事品有名餘者直第其品數而已法師以名非佛制唯存序品略其二目其事數之名與舊不同者皆是法師以義正之者也如陰入持等名與義乖故隨義改之陰為眾入為處持為性解脫為皆捨除入為勝處意止為念處意斷為正勤覺意為菩提直行為聖道諸如此比改之甚眾梵音失者正之以天竺秦言謬者定之以字義不可變者即而書之是以異名斌然梵音殆半斯實匠者之公謹筆受之重慎也幸冀遵實崇本之賢推而體之不以文樸見咎煩異見情也釋藏跡八小品經序般若波羅蜜者窮理盡性之格言菩薩成佛之弘軌也軌不弘則不足以冥群異一指歸性不盡則物何似登道場成正覺正覺之所以成群異之所以一何莫由斯道也是以累教殷勤三撫以之頻發功德疊校九增以屢至如問相標玄而玄其玄幻品忘寄而忘其忘道行坦其津難問窮其源隨喜忘趣以要終照明不化以即玄章雖三十貫之背道言雖十萬倍之者行行凝然後無生道足然後補處乃此而變一切智也法華鏡本以凝照般若冥末以解懸解懸理趣菩薩道也凝照鏡本告其終也終而不泯則歸途扶疏有三實之迹權應不夷則亂緒紛綸有惑趣之異是以法華般若相待以期終方便實化冥一以俟盡論其窮理盡性夷明萬行則實不如照取其大明真化解本無三則照不如實是故歎深則般若之功重美實則法華之用徵此經之尊三撫三囑未足惑也有秦太子者寓跡儲宮擬韻區外翫味斯經夢相增至準悟大品深知譯者之失會聞鳩摩羅法師神授其文真本猶存以弘始十年二月六日請令出之至四月三十日校正都訖攷之舊譯真若荒田之稼芸過其半未詎多也斯經正文凡有四種是佛異時適化廣略之說也其多者云有十萬偈少者六百偈此之大品乃是天竺之中品也隨宜之言復何必計其多少議其煩簡邪梵文雅質案本譯之於麗巧不足樸正有餘矣幸冀文悟之賢略其華而幾其也釋藏鱗一又跡八法華經後序法華經者諸佛之祕藏眾經之實體也以華為名者照其本也稱分陀利者美其盛也所興既玄其旨甚婉自非達識傳之罕有得其門者夫百卉藥木之英萬物實之本也八萬四千法藏者道果之源也故以喻焉諸華之中蓮華最勝華而未敷名屈摩羅敷而將落名迦摩羅處中盛時名分陀利未敷喻二道將落譬泥洹榮曜獨足以喻斯典至如般若諸經深無不極故道者以之而歸大無不該故乘者以為而濟然其大略皆以適化為本應務之門不得不以善權為用權之為化悟物雖弘於實體不足皆屬法華固其宜矣尋其幽旨恢廓宏邃所該其遠豈徒說實歸本畢定殊途而己邪乃實大明覺理囊括古今云佛壽無量永劫未足以明其久也分身無數萬形不足以異其體也然則壽量定其非數分身明其無實普賢顯其無成多寶昭其不滅夫邁玄古以期今則萬世同一日即百化以悟玄則千途無異轍夫如是者則生生未足以言其在永寂亦未可言其滅矣尋幽宗以絕往則喪功於本無控心轡於三昧則忘期於二地經流茲土雖復垂及百年譯者昧其虛津靈關莫之或啟談者乖其準格幽跡罕得而履徒復搜研皓首竝未有窺其門者秦司隸校尉左將軍安城侯姚嵩擬韻玄門宅心世表注誠斯典信詣彌至每思尋其文深識譯之失既遇鳩摩羅法師為之傳寫指其大歸真若披重霄而高蹈登崑崙而俯眄矣於時聽受領悟之僧八百餘人皆是諸方英秀一時之傑也是歲弘始八年歲次鶉火釋藏跡八思益經序此經天竺正音名毗絁沙真諦是他方梵天殊特妙意菩薩之號也詳聽什公傳譯其名翻覆展轉意似未盡良由未備秦言名實之變故也察其語意會其名旨當是持意非思益也直以未喻持義遂用益耳其言益者超絕殊異妙拔之稱也思者進業高勝自強不息之名也舊名持心最得其實又其義旨舊名等御諸法梵天坦其津塗世尊照其所明普華獎其非心文殊泯以無生落落焉真可謂法輪再轉於閻浮法鼓重聲於宇內甘露流津於季末靈液沾潤於遐裔者矣而恭明前前譯頗麗其辭仍迷其旨是使宏標乖於謬文至味淡於華豔雖復研尋彌稔而幽旨莫啟幸遇鳩摩羅什法師於關右既得更譯梵音正文言於竹帛又蒙披釋玄旨曉大歸於句下於時諮悟之僧二千餘人大齊法集之眾欣豫難遭之慶近是講肄之來未有其比於時余與道恆謬當傳寫之任輒復疏其言記其事以詒後來之賢豈期必勝其辭必盡其意邪庶以所錄之言粗可髣髴其心耳不同時事之賢儻欲全見其高座所說之旨故具載於文不自加其意也釋藏跡八毗摩羅詰提經義疏序此經以毗摩羅詰所說為名者尊其人重其法也五百應真之所稱述一切菩薩之所歎伏文殊師利對揚之所明荅普現色身之要言皆其說也借座於燈王致飯於香積接大眾於右掌內妙樂於忍界阿難之所絕塵皆其不可思議也高格邁於十地故彌勒屈之而虛己崇墉超於學境故文殊已還竝未有闚其庭者法言恢廓指玄門以忘期觀品夷照總化本以冥想落落焉聲法鼓於維邪而十方世界無不悟其希音恢恢焉感諸佛於一室而恆沙正覺無不應其虛求予始發心啟蒙於此諷詠研求以為喉襟稟玄指於先匠亦復未識其絕往之通塞也既蒙鳩摩羅什法師正玄文摘幽指始悟前譯之傷本謬文之乖趣耳至如以不來相為辱來不見相為相見未緣法為始神緣合法為止心諸如此比無品不有無章不爾然後知邊情險詖難可以參契真言廁懷玄悟矣自慧風東扇法言流詠已來雖曰講肄格義迂而乖本六家偏而不即性空之宗以今驗之最得其實然鑪冶之功微恨不盡當是無法可尋非尋之不得也何以知之此土先出諸經於識神性空明言處少存神之文其處甚多中百二論文未及此又無通鑒誰與正之先匠所以輟章於遐慨思決言於彌勒者良在此也自提婆已前天竺義學之僧竝無來者於今始聞宏宗高唱敢預希味之流無不竭其聰而注其心然領受之用易存憶識之功難掌自非般若朗其聞慧總持銘其思府焉能使機過而不遺神會而不昧者哉故因紙墨以記其文外之言借眾聽以集其成事之說煩而不簡者貴其事也質而不麗者重其意也其指微而婉其辭博而晦自非筆受胡可勝哉是以即於講次疏以為記冀通方之賢不咎其煩而不要也釋藏跡八自在王經後序此經以菩薩名號為題者蓋是思益無盡意密迹諸經之流也以其圓用無方故名自在勢無與等故稱為王標準宏廓固非思之所及幽旨玄凝尋者莫之髣髴此土先出方等諸經皆是菩薩道行之式也般若指其虛標勇伏明其必制法華泯一眾流大哀旌其拯濟雖各有其美而未備此之所載秦大將軍尚書令常山公姚顯其懷簡到徹悟轉詣聞其名而悅之攷其旨而虛襟思弘斯化廣其流聿以為斯文既布便若菩薩常住不去此世奔誠發自大心欣躍不能自替遂請鳩摩羅法師譯而出之得此二卷於菩薩希蹤卓犖之事朗然昭列矣是歲弘始九年歲次鶉首釋藏跡八關中出禪經序禪法者向道之初門泥洹之津徑也此土先出修行大小十二門大小安般雖是其事不根悉又無受法學者之戒蓋闕如也鳩摩羅法師以辛丑之年十二月二十日自臧至長安予即以其月二十六日從受禪法既蒙啟授乃知學準法有成修首楞嚴經云人在山中學道無師道終不成是其事也尋蒙鈔撰眾家禪要得此三卷十三偈初四是鳩摩羅羅陀法師所造後二十偈是馬鳴菩薩之所造也其中五門是婆須蜜僧伽羅叉漚波崛僧伽斯那勒比丘馬鳴羅陀禪要之中鈔集之所出也六覺中偈是馬鳴菩薩修習之以釋六覺也初觀婬恚癡相及其三門皆僧伽羅叉之所撰也息門六事諸論師說也菩薩習禪法中後更依持世經益十二因緣一卷要解二卷別時撰出夫馳心縱想則情愈滯而惑愈深繫意念明則澄鑒朗照而造極彌密心如水火擁之聚之則其用彌全決之散之則其勢彌薄故論云質微則勢重質重則勢微如地質重故勢不如水水性重故力不如火火不如風風不如心心無形故力無上神通變化入不思議心之力也心力既全乃能轉昏入明明雖愈於不明而明未全也明全在於忘照照忘然後無明非明無明非明爾乃幾乎息矣幾乎息矣慧之功也故經云無禪不智無知不禪然則禪非智不照智非禪不成大哉禪智之業可不務乎出此經後至弘始九年閏月五日重求檢校懼初受之不審差之一豪將有千里之降詳而定之輒復多有所正既備無閒然之釋藏跡九大智度論序夫萬有本於生生而生生者無生變化兆於物始而始始者無始然則無生無始物之性也生始不動於性而萬有陳於外悔吝生於內者其唯邪思乎正覺有以見邪思之自起故阿含為之作知滯有之由惑故般若為之照然而照本希夷津涯浩汗理超文表趣絕思境以言求之則乖其深以智測之則失其旨二乘所以顛沛於三藏新學所以曝鱗於龍門者不其然乎是以馬鳴起於正法之餘龍樹生於像法之末正餘易弘故直振其遺風瑩拂而已像末多端故乃寄跡凡夫示悟物以漸又假照龍宮以朗搜玄之慧託聞幽祕以窮微言之妙爾乃憲章智典作茲釋論其開夷路也則令大乘之駕方軌而直入其辯實相也則使妄見之惑不遠而自復其為論也初辭擬之必標眾異以盡美卒成之終則舉無執以盡善釋所不盡則立論以明之論其未辯則寄折中以定之使靈篇無難喻之章千載悟作者之旨信若人之功矣有鳩摩羅耆婆法師者少播聰明之聞長集奇拔之譽才舉則亢標萬里言發則英辯榮枯常杖茲論焉淵鏡憑高致以明宗以秦弘始三年歲次星紀十二月二十日自姑臧至長安秦王虛襟既已蘊在昔見之心豈徒則悅而己晤言相對則淹留終日研微造盡則窮年忘倦又以晤言之功雖深而恨獨得之心不曠造盡之要雖玄而惜津梁之勢未普遂以莫逆之懷相與弘兼忘之惠乃集京師義業沙門命公卿賞契之士五百餘人集於渭濱逍遙園堂鸞輿停駕於洪涘禁禦息警於林間躬覽玄章攷正名於梵本諮通津要坦夷路於來踐經本既定乃出此釋論論之略本有十萬偈偈有三十二字并三百二十萬言梵夏既乖又有煩簡之異三分除二得此百卷於大智三十萬言玄章婉旨朗然可見歸途直達無復惑趣之疑以文求之無閒然矣故天竺傳云像正之末微馬鳴龍樹道學之門其淪胥溺喪矣之其故何邪實由二未契微邪法用盛虛言與實教竝興嶮徑與夷路爭轍始進者化之而流離向道者惑之而播越非二匠其孰與正之是以天竺諸國為之立廟宗之若佛又稱而詠之曰智慧日以穨斯人令再曜世昏寢已久斯人悟令覺若然者真可謂功格十地道侔補處者矣傳而稱之不亦宜乎幸哉此中鄙之外忽得全有此論梵文委曲皆如初品法師以秦人好𥳑故裁而略之若備譯其文將近千有餘卷法師於秦語大格唯譯一往方言殊好猶隔而未通苟不相喻則情無由比不比之情則不可以託悟懷於文表不喻之言亦何得委殊塗於一致理固然矣進欲停筆爭是則交競終日卒無所成退欲簡而便之則負傷於穿鑿之譏以二三唯案譯而書都不備飾幸冀明悟之賢略其文而挹其玄也釋藏友一又跡十中論序中論有五百偈龍樹菩薩之所造也以中為名者照其實也以論為稱者盡其言也實非名不悟故寄中以宣之言非釋不盡故假論以明之其實既宣其言既明於菩薩之行道場之照朗然懸解矣夫滯惑生於倒見三界以之而淪溺偏悟起於猒智耿介以之而致乖故知大覺在乎曠照小智纏乎隘心照之不曠則不足以夷有無一道俗知之不盡則未可以涉中途泯二際道俗之不夷二際之泯菩薩之憂也是以龍樹大士折之以中道使惑趣之徒望玄指而一變括之以即化令玄悟之賓喪諮詢於朝徹蕩蕩焉真可謂理夷路於沖階敞玄門於宇內扇慧風於陳枚流甘露於枯悴者矣夫百梁之構興則鄙茅茨之仄陋覩斯論之宏曠則知偏悟之鄙倍幸哉此區之赤縣忽得移靈鷲以作鎮險陂之邊情乃蒙流光之餘惠而今而後談道之賢始可與論實矣云天竺諸國豫學者之流無不翫味斯論以為喉衿其染翰申釋者甚亦不少所出者是天竺梵志名賓羅伽秦言青目之所釋也其人雖信解深法而辭不雅中其中乖闕煩重者法師皆裁而裨之於經通之理盡矣文或左右未盡善也百論治外以閑邪斯文祛內以流滯大智釋論之淵博十二門觀之精詣尋斯四者真若日月入懷無不朗然鑒徹矣予翫之味之不能釋手遂復忘其鄙拙託悟懷於一序并目品義題之於首豈期能釋邪蓋是欣自同之懷耳釋藏神七又百一十二門論序十二門論者蓋是實相之折中道場之要軌也十二者總眾枝之大數也門者開通無滯之稱也論之者欲以窮其源盡其理也若一理之不盡則眾異紛然有惑趣之乖一源之不窮則眾塗扶疏有殊致之迹殊致之不夷乖趣之不泯大士之憂也是以龍樹菩薩開出者之由路作十二門以正之正之以十二則有無兼畼事無不盡事盡於有無則忘功於造化理極於虛位則喪我於二際然則喪我在乎落筌筌忘存乎遺寄筌我兼忘始可以幾乎實矣幾乎實矣則虛實兩冥得失無際冥而無際則能忘造次於兩玄泯顛沛於一致整歸駕於道場畢趣心於佛地恢恢焉真可謂運虛刃於無間奏希聲於宇內濟濟喪於玄津出有無於域外者矣遇哉後之學者夷路既坦幽關既開真得振和鸞於北溟馳白牛以南迴悟大覺於夢境即百化以安歸夫如是者惡復知曜靈之方盛玄陸之未晞也哉叡以鄙倍之淺識猶敢明誠虛關悕懷宗極庶日用之有宜冀歲計之能植況才之美者乎不勝景仰之至敢以鈍辭短思序而申之并目品義題之於首豈期能益邪庶以此心開自進之路耳釋藏守六又百一出曜經序出曜經者婆須蜜舅法救菩薩之所撰也集此一千章立為三十三品名曰法句錄其本起繫而為釋名曰出曜出曜之言舊名譬喻即十二部經第六部也有罽賓沙門僧伽跋澄以前秦建元十九年陟蔥嶺涉流沙不遠萬里來至長安其所闇識富博絕倫先師器之既重其人吐誠亦深數四年中上聞異要奇雜盈耳俄而三秦覆墜避地東周後秦皇初四年還轅伊洛將返舊鄉佇駕京師望路致慨恨法句之不全出曜之未具緬邈長懷蘊情盈抱太尉姚旻篤誠深樂聞不俟駕五年秋請令出之六年春訖澄執梵本佛念宣譯道嶷筆受和䂮二師師法括而正之時有不怗從本而已舊有四卷所益已多得此具解覽之畫然矣予自武當軒衿華領諮詢觀化預參檢校聊復序之弘始元年八月十二日寫訖僧叡造首釋藏定一
