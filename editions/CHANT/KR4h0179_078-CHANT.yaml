body:
  text: 郄詵泰始七年舉賢良對策詔曰蓋太上以德撫時易𥳑無文至于三代禮樂大備制度彌繁文質之變其理何由虞夏之際聖明繼踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也聖王既沒遺制猶存霸者迭興而翼輔之王道之缺其無補乎何陵遲之不反也豈霸德之淺歟期運不可致歟且夷吾之智而功止于霸何哉夫昔人之為政革亂亡之弊建不刊之統移風易俗刑措不用豈非化之盛歟何脩而嚮茲朕獲承祖宗之休烈于茲七載而人未服訓政道罔述以古況今何不相逮之遠也雖明之弗及猶思與群賢慮之將何以辨所聞之疑昧獲至論于讜言者乎加自頃戎狄內侵災害屢作邊甿流離征夫苦役豈政刑之謬將有司非其任歟各悉乃心究而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之詵對曰伏惟陛下以聖德君臨猶垂意于博採故招賢正之士而臣等薄陋不足以降大問也是以竊有自疑之心雖致身于闕庭亦僶俛矣伏讀聖策乃知下問之旨篤焉臣聞上古推賢讓位教同德一故易𥳑而人化三代世及季末相承故文繁而後整虞夏之相因而損益不同非帝王之道異救弊之路殊也周當二代之流承彫偽之極盡禮樂之致窮制度之理其文詳備仲尼因時宜而曰從周非殊論也臣聞聖王之化先禮樂五霸之興勤政刑禮樂之化深政刑之用淺動之則可以小安墮之則遂陵遲所由之路本近故所補之功不侔也而齊桓失之葵丘夷吾淪于小器功止于霸不亦宜乎策曰建不刊之統移風易俗使天下洽和何脩而嚮茲臣以為莫大于擇人而官之也今之典刑匪無一統宰牧之才優劣異績或以之興或以之春此蓋人能弘政非政弘人也舍人務政雖勤何益臣竊觀乎古今而攷其美惡古人相與求賢今人相與求爵古之官人君責之于上臣舉之于下得其人有賞失其人有罰安得不求賢乎今之官者父兄營之親戚助之有人事則通無人事則塞安得不求爵乎賢苟求達達在脩道窮在失義故靜以待之也爵苟可求得在進取失在後時故動以要之也動則爭競爭競則朋黨朋黨則誣誷誣誷則臧否失實真偽相冒主聽用惑姦之所會也靜則貞固貞固則正直正直則信讓信讓則推賢推賢不伐相下無饜主聽用察德之所趣也故能使之靜雖曰高枕而人自正不能禁動雖復夙夜俗不一也且人無愚知咸慕名官莫不飾正于外藏邪于內故邪正之人難得而知也任得其正則眾正益至若得其邪則眾邪亦集物繁其類誰能止之故國失世者未嘗不為眾邪所積也方其初作必始于微微而不絕其終乃著天地不能頓為寒暑人主亦不能頓為隆替故寒暑漸于春秋隆替起于得失當今之世宦者無關梁邪門啟矣朝廷不責賢正路塞矣得失之源何以甚此所謂責賢使之相舉也所謂關梁使之相保也賢不舉則有咎保不信則有罰有罰則有司莫不悚也以求其才焉故古者諸侯必貢士不貢者削貢而不適亦削夫士者難知也不適者薄過也不得不責強其所不知也罰其所不適深其薄過非恕也且天子于諸侯有不純臣之義斯責之矣施刑之道寍縱不濫之矣今皆反是何也夫賢者天地之紀品物之宗其急之矣故寍濫以得之無縱以失之也今則不然世之悠悠者各自取辨耳故其材行竝不可必于公則政事紛亂于私則污穢狼籍自頃長吏特多此累有亡命而被購懸者矣有縛束而絞戮者矣貪鄙竊位不知誰升之者獸兕出檻不知誰可咎者網漏吞舟何以過此人之于利如蹈水火焉前人雖敗後人復起如彼此無已誰止之者風流日競誰憂之者雖今聖思勞于夙夜所使為政恆得此屬欲聖世化美俗平亦俟河之清耳若欲善之宜創舉賢之典峻關梁之防其制既立則人慎其舉而不苟則賢者可知知賢而試則官得其人矣官得其人則事得其序事得其序則物得其宜物得其宜則生生豐植人用資給和樂興焉是故寡過而遠刑知恥以近禮此所以建不刊之統移風易俗刑措而不用也策曰自頃夷狄內侵災眚屢降將所任非其人乎何由而至此臣聞蠻夷猾夏則皋陶作士此欲善其末則先其本也夫任賢則政惠使能則刑恕政惠則下仰其施刑恕則人懷其勇施以殖其財勇以結其心故人居則資贍而知方動則親上而志勇苟思其利而除其害以生道利之者雖死不貳以逸道勞之者雖勤不怨故其命可授其力可竭以戰則剋以攻則拔是以善者慕德而安服惡者畏懼而削迹止戈而武義實在文唯任賢然後無患耳若夫水旱之災自然理也故古者三十年耕必有十年之儲堯湯遭之而人不困有備故也自頃風雨雖頗不時攷之萬國或境士相接而豐約不同或頃畝相連而成敗異流固非天之必害于人人實不能均其勞苦失之于人而求之于天則有司惰職而不勸百姓殆業而咎時非所以定人志致豐年也宜勤人事而已臣誠愚鄙不足以奉對聖朝猶進之于廷者將使取諸其懷而獻之乎臣懼不足也若收不知言以致知言臣則可矣是以辭鄙不隱也晉書郄詵傳又略見群書治要三十自理表臣生三月而孤隨母依外祖舅為縣悉家以咸寍二年母亡家自祖以下十四墳在緱氏而墓數有水規悉遷改常多病疾遂便留此此方下溼唯城中高故遂葬于所居之宅祭于所養之堂不知其不可也通典一百三與魏舒書公久疾小差視事是也唯上所念何意起訖還臥曲身迴法甚失具瞻之望公少立巍巍一旦棄之可不惜哉晉書魏舒傳泰始七年舉賢良對策策曰在昔哲王承天之序光宅宇宙咸用規矩乾坤惠康品類休風流衍彌于千載朕應踐洪運統位七載于今矣惟德弗嗣不明于政宵興惕厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡喻朕志深陳王道之本勿有所隱朕虛心以覽焉种對曰夫天地設位聖人成能王道至深所以行化至遠故能開物成務而功業不匱近無不聽遠無不服德逮群生澤被區宇聲施無窮而典垂百代故經曰聖人久于其道而天下化成宜師縱往代襲迹三五矯世更俗以從人望令率士遷義下知所適播醇美之化杜邪枉之路斯誠群黎之所欣想盛德而幸望休風也又問政刑不宣禮樂不立對曰政刑之宣故由乎禮樂之用昔之明王唯此之務所以防遏暴慢感動心術制節生靈而陶化萬姓也禮以體德樂以詠功樂本于和而禮師于敬矣又問戎蠻猾夏對曰戎蠻猾夏侵敗王略雖古盛世猶有此虞故詩稱獫狁孔熾書歎蠻夷帥服自魏氏以來夷虜內附鮮有桀悍侵漁之患由是邊守遂怠鄣塞不設而令醜虜內居與百姓雜處邊吏擾習人又忘戰受方任者又非其林或以狙詐侵侮邊夷或十賞啗利妄加討戮夫以微羈而御悍馬又乃操以煩策其不制者固其理也是以群醜蕩駭緣閒而動雖三州覆敗牧守不反此非胡虜之甚勁蓋用之者過也臣聞王者之伐有征無戰懷遠以德不聞以兵夫兵凶器而戰危事也兵興則傷農眾集則費積農傷則人匱積費則國虛昔漢武之世承文帝之業資海內之富役其材臣以甘心匈奴競戰勝之功貪攻取之利良將勁卒屈于沙漠勝敗相若克不過當夭百生之命填餓狼之口及其以眾制寡令匈奴遠迹收功祁連飲馬瀚海天下之耗已過太半矣夫虛中國以事夷狄誠非計之得者也是以盜賊蜂起山東不振暨宣元之時趙充國征西零馮奉世征南羌皆兵不衂刃摧抑強暴擒其首惡此則折衝厭難勝敗相辨中世之明效也又問咎徵作見對曰陰陽否泰六沴之災則人主修政以禦之思患而防之建皇極之首詳庶徵之用詩曰敬之敬之天惟顯思天聰明自我人聰明是以人主祖承天命日慎一日也故能應受多福而永世克祚此先王之所以退災消眚也又問經化之務對曰夫王道之本經國之務必先之以禮義而致人于廉恥禮義立則君子軌道而而讓于善廉恥立則小人謹行而不淫于制度賞以勸其能威以懲其廢此先王所以保乂定功化洽黎元而勳業長世也故上有克讓之風則下有不爭之俗朝有矜節之士則野無貪冒之人夫廉恥之于政猶樹蓺之有豐壤良歲之有膏澤其生物必油然茂矣若廉恥不存而惟刑是御則風俗彫弊人失其性錐刀之末皆有爭心雖峻刑嚴辟猶不勝矣其于政也如農者之殖磽野旱年之望豐穡必不幾矣此三代所以享德長久風醇俗美皆數百年保天之祿而秦二世而弊者蓋其所由之塗殊也又問將使武成七德文濟九功何路而臻于茲凡厥庶事曷後曷先對曰夫文武經德所以成功丕業咸熙庶績者莫先于選建明哲授方任能令才當其官而功稱其職則萬機咸理庶寮不曠書曰天工人其代之然則繼天理物寍國安家非賢無以成也夫賢才之畜于國猶良工之須利器巧匠之待繩墨也器用利則斲削易而材不病繩墨設則曲直正而眾形得矣是以人主必勤求賢而佚以任之也賢臣之于主進則忠國愛人退則砥節潔志營職不干私義出心必由公塗明度量以呈其能審經制以效其功此昔之聖王之所以恭己南面而化于陶鈞之上者以其所任之賢與所賢之信也方今海內之士皆傾望休光希心紫極唯明主之所趣舍若開四聰之聽廣疇咨之求抽群英延俊乂考工授職呈能制官朝無素餐之士如此化流罔極樹功不朽矣晉書阮种傳廷試對策詔曰前者對策各指荅所問未盡子大夫所欲言故復延見其具陳所懷又比年連有水旱災眚雖戰戰兢兢未能究天人之理當何修以應其變人遇水旱饑饉者何以救之中閒多事未得寍靜思以省息煩務令百姓不失其所若人有所患苦者有宜損益使公私兩濟者委曲陳之又政在得人而知之至難唯有因人視聽耳若有文武隱逸之士胳舉所知雖幽賤負俗勿有所限故虛心思聞事實勿務華辭莫有所諱也种對曰伏惟陛下以聖哲玄覽降卹黎蒸將濟元元同之三代旁求俊乂以輔至化此誠堯舜之用心也臣猥以頑魯之質應清明之舉前者對策不足以疇塞聖詔所陳不究臣誠蒙昧所以為罪臣聞天生蒸庶樹君以司牧之人君道洽則彝倫攸敘五福來備若政有愆失刑理頗僻則庶徵不應而淫亢為災此則天人之理而興廢之由也昔之聖王政道備而制先具軌人以務致之于本是以雖有水旱之眚而無饑饉之患也自頃陰陽隔并水旱為災亦由期運之致不然則亦有司之不帥不能宣承聖德以贊揚大化故和氣未降而人事未敘也方今百姓彫弊公私無儲誠在于休役靜人勸嗇務分此其救也人之所患由于役煩網密而信道未孚也役煩則百姓失業網密則下背其誠信道未孚則人無固志此則損益之至務安危之大端也傳曰始與善善進則不善蔑由至孔子曰視其所以觀其所由人焉廋哉若夫文武隱逸之士幽賤負俗之才故非愚臣之所能識謹竭愚以對晉書阮种傳論蜀後主昔世祖內資神武之大才外拔四七之奇將猶勤而獲濟然乃登天衢車不輟駕坐不安席非淵明弘鑒則中興之業何容易哉後主庸常之君雖有一亮之經緯內無胥附之謀外無爪牙之將焉可包括天下也華陽國志二論姜維鄧艾以疲兵二萬溢出江油姜維舉十萬之師案道南歸艾為成禽禽艾已訖復還拒會則蜀之存亡未可量也乃迴道之巴遠至五城使艾輕進徑及成都兵分家滅己自招之然以鍾會之知略稱為子房姜維陷之莫至剋楗籌笇相應優劣惜哉華陽國志二辭司農表被疾錯忘不堪銓量人物華陽國志十一上疏策孫皓皓必不敢出宜因今戒嚴掩取甚易華陽國志十一駮盜罪上關執信之主下關儲備之物設有開上關何以加刑華陽國志十一攀為廷尉平有盜開城門下關者法據大辟攀駮之皇太子為太后服議孝文權制三十六日之服以日易月道有汙崇禮不得全皇太子亦宜割情除服通典八十二泰始十年武元楊皇后崩博士張靖議荅安平國移問宜依魯僖服閔三年例通典九十三咸寍二年安平穆王薨無嗣以母敦上繼獻王後移問太常應何服博士張靖荅皇太子為太后服議今制所依蓋漢帝權制興于有事非禮之正皇太子無有國事自宜終服晉書禮志中通典八十二又議三年之喪人子所以自盡故聖人制禮自上達下是以今制將吏諸遭父母喪皆假寍二十五月敦崇孝道所以風化天下皇太子至孝著于內而縗服除于外非禮所謂稱情者也宜其不除通典八十二周禮論序戴德刪古禮二百四篇為八十五篇謂之大戴禮戴聖刪大戴禮為四十九篇是為小戴禮經典釋文敘錄重申杜元凱奏議皇太子除服尚書母逸云高宗諒陰三年不言諸儒皆云亮陰默也唯鄭玄獨以諒闇為凶廬今據諸儒為正明高宗既卒哭即位之後除衰麻躬行信默聽于冢宰以終三年也言即位以明免喪之後素服心喪謂之諒闇故杜議曰天子居喪齊斬之情苴杖絰帶當其遂服葬而除服諒闇以終三年也國語楚語及論語禮記坊記喪服四制皆說高宗之義大體無異唯尚書大傳以諒闇為凶廬蓋東海伏生所說鄭玄之所依博而攷之義既不通據經所言是唯天子居凶廬豈合禮制代俗皆謂大祥後禫時為諒闇漢記稱和熹鄧皇居母喪縞素不食肉亦曰諒闇此乃古今之通言信默者為得之也通典八十復申杜元凱議案春秋僖公九年宋桓公卒未葬而襄公會諸侯故曰子凡在喪王曰小童公侯曰子傳發宋公而因釋王在喪未葬稱在喪葬訖卒哭已除衰麻故不復名在喪此諸侯除服之證也案禮記諸侯元子既葬見于天子曰類見將嗣父位除喪見王以受瑞命由嗣而見故曰類見于是天子禮之太廟賜以命服此諸侯不以麻終三年之證也雜記麻者不紳執玉不麻麻不加于綵諸侯既卒哭即位則有聘享朝會之禮既執玉服綵不宜復以服麻故云衰麻服縞素縞素之制可以雜于吉也此除衰麻諒闇之文也喪大記云君既葬王政入于國既卒哭而服王事大夫士既葬公政入于家既卒哭弁絰帶金革之事無避也然則大夫士皆以縗麻終三年故雖卒哭稱弁絰帶以服金革之事諸候以上卒哭除衰麻諒闇故特不言弁絰此諸侯衰麻除之證也又春秋魯隱公元年天王使宰咺來歸惠公仲子賵左傳曰贈死不及尸弔生不及哀既卒哭除服諒闇此為免喪之後來弔故曰弔生不及哀此諸侯卒哭除衰之證也文公元年天王使毛伯來賜公命公羊傳曰命者何加我服也賈逵以為諸侯踰年即位天子賜以命珪合瑞為信也然則皆得行吉禮文公元年公孫敖如齊左傳曰穆伯如齊始聘焉禮也凡君即位卿出竝聘踐修舊好要結外援好事鄰國以衛社稷也僖公之喪未三年嫌于不可以接吉事故傳發明大義以正諸侯之禮也春秋襄公十五年冬十一月晉侯周卒十六年正月葬晉悼公三月公會晉侯于湨梁左傳曰葬晉悼公平公即位改服修官烝于曲沃與諸侯宴于溫傳諸大夫舞曰歌詩必類諸侯五月而葬今晉悼三月便葬遂合諸侯燕會使大夫砍舞皆非喪禮也羊舌肸祁奚韓襄皆晉之賢大夫也平公尚幼宰傅相之命諸賢傅幼君而若此者蓋繼好講信謀事補闕之大者故傳其行事也晉子墨衰絰征秦遂墨衰以葬書春秋時卒哭之後御軍甚多無衰墨文明其服也弁絰金革禮所權許皆為救危亡者也哀公五年秋九月齊侯杵臼卒六年公羊傳曰除景公之喪諸大夫皆在朝又理會于陳乞之家明其皆免喪無復所制也通典八十王昌前母服議禮為常事制不為非常設也亡父母不知其死生者不著于禮平生不相見去其加隆以朞為斷晉書禮志中泰康元年段畼議劉儈詣杜預牋昔以謬選忝備官屬各得與前征南大將軍祜參同庶事祜執德沖虛操尚清遠德高而體卑位優而行恭前膺顯命來撫南夏既有三司之儀復加大將軍之號雖居其位不行其制至今海內渴佇群俊望風涉其門者貪夫反廉懦夫立志雖夷惠之操無以尚也自鎮此境政化被乎江漢潛謀遠計闢國開疆諸所規模皆有軌量志存公家以死勤事始辟四掾未至而隕夫舉賢報國台輔之遠任也搜揚側陋亦台輔之宿心也中道而廢亦台輔之私恨也履謙積稔晚節不遂此遠近所以為之感痛者也昔召伯所憩愛流甘棠宣子所游封殖其樹夫思其人尚及其樹況生存所辟之士便當隨例放棄者乎乞蒙列上得依已至掾屬晉書羊祜傳祜開府累年謙讓不辟土始有所命會卒劉儈趙寅劉彌孫勃等牋詣杜預云云羊伊出後議子之出養必由父命無命而出是為叛子隋書劉子翊傳子翊駮劉炫議云晉羊祜無子取弟子伊為子祜薨伊不服重祜妻表聞伊辭曰伯生存養已伊不敢違然無父命故還本生尚書彭禮議云云于是下詔從之又見北史八十五
