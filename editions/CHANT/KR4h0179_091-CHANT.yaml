body:
  text: 卷九十一潘岳懷舊賦并序懷舊賦并序余十二而獲見于父友東武戴侯楊君始見知名遂申之以婚姻而道元公嗣亦隆世親之愛不幸短命父子凋殞余既有私艱且尋役于外不歷嵩丘之山者九年于茲矣今而經焉慨然懷舊而賦之曰啟開陽而朝邁濟清洛以徑渡晨風淒以激冷夕雪暠以掩路轍含冰以滅軌水漸軔以凝沍塗艱危其難進日晼晚而將暮仰睎歸雲俛鏡泉流前瞻太室傍眺嵩丘東武託焉建塋啟疇巖巖雙表列列行楸望彼楸矣感于予思既興慕于戴侯亦感元而哀嗣墳壘壘而接壟柏森森以欑植何逝沒之相尋曾舊草之未異余總角而獲見承戴侯之清塵名余以國士眷余以嘉姻自祖考而隆好逮二子而世親歡攜手以偕老庶報德之有鄰今九載而一來空館闃其無人陳荄被于堂除舊圃化而為薪步庭廡以徘徊涕泫流而霑巾宵展轉而不寐驟長歎以達晨獨鬱結其誰語聊綴思于斯文文選藝文類聚三十四悼亡賦伊良嬪之初降幾二紀以迄茲遭兩門之不造備荼毒而嘗之嬰生艱之至極又薄命而早終含芬華之芳烈翩零落而從風神飃忽而不反形焉得而久安襲時服于遺質表鉛華于餘顏問筮賓之何期霄過分而參闌詎幾時而見之目眷戀以相屬聽輒人之唱籌來聲叫以連續聞冬夜之恆長何此夕之一促且伉儷之片合垂明哲乎嘉禮苟此義之不謬乃全身之半體吾聞喪禮之在妻謂制重而哀輕既履冰而知寒吾今信其緣情夕既昏兮朝既清延爾族兮臨後庭入空室兮望靈座帷飄飄兮燈熒熒燈熒熒兮如故帷飄飄兮若存物未改兮人已化饋生塵兮酒停樽春風兮泮水初陽兮戒溫逝遙遙兮浸遠嗟煢煢兮孤魂藝文類聚三十四寡婦賦并序寡婦賦并序樂安任子咸有韜世之量與余少而歡焉雖兄弟之愛無以加也不幸弱冠而終良友既沒何痛如之其妻又吾姨也少喪父母適人而所天又殞孤女藐焉始孩斯亦生民之至艱而荼毒之極哀也昔阮瑀既歿魏文悼之竝命知舊作寡婦之賦余遂擬之以敘其孤寡之心焉其辭曰嗟予生之不造兮哀天難之匪忱少伶俜而偏孤兮痛忉怛以摧心覽寒泉之遺歎兮詠蓼莪之餘音情長慼以永慕兮思彌遠而逾深伊女子之有行兮爰奉嬪于高族承慶雲之光覆兮荷君子之惠渥顧葛藟之蔓延兮託微莖于樛木懼身輕而施重兮若履冰而臨谷遵義方之明訓兮憲女史之典戒奉烝嘗以效順兮供灑埽以彌載彼詩人之攸歎兮徒願言而心痗何遭命之奇薄兮遘天禍之未悔榮華曄其始茂兮良人忽以捐背靜闔門以窮居兮塊煢獨而靡依易錦茵以苫席兮代羅幬以素帷命阿保而就列兮覽巾箑以舒悲口嗚咽以失聲兮淚橫迸而霑衣愁煩冤其誰告兮提孤孩于坐側時曖曖而向昏兮日杳杳而西匿雀群飛而赴楹兮雞登棲而斂翼歸空館而自憐兮撫衾裯以歎息思纏緜以瞀亂兮心摧傷以愴惻曜靈瞱而遄邁兮四節運而推移天凝露以降霜兮木落葉而隕枝仰神宇之寥寥兮瞻靈衣之披披退幽悲于堂隅兮進獨拜于床垂耳傾想于疇昔兮目彷彿乎平素雖冥冥而罔覿兮猶依依以憑附痛存亡之殊制兮將遷神而安厝龍轜儼其星駕兮飛旐翩以啟路輪案軌以徐進兮馬悲鳴而跼顧潛靈邈其不反兮殷憂結而靡訴睎形影于几筵兮馳精爽于丘墓自仲秋而在疚兮踰履霜以踐冰雪霏霏而驟落兮風瀏瀏而夙興霤泠泠以夜下兮水溓溓以微凝意忽怳以遷越兮神一夕而九升庶浸遠而哀降兮情惻惻而彌甚願假夢以通靈兮目炯炯而不寢夜漫漫以悠悠兮寒淒淒以凜凜氣憤薄而乘胸兮涕交橫而流枕亡魂逝而永遠兮時歲忽其遒盡容貌儡以頓顇兮左右悽其相慜感三良之殉秦兮甘捐生而自引鞠稚子于懷抱兮羌低徊而不忍獨指景而心誓兮雖形存而志隕重曰仰皇穹兮歎息私自憐兮何極省微身兮孤弱顧稚子兮未識如涉川兮無梁若陵虛兮失翼上瞻兮遺象下臨兮泉壤窈冥兮潛翳心存兮目想奉虛坐兮肅清愬空宇兮曠朗廓孤立兮顧影塊獨言兮聽響顧影兮傷摧聽響兮增哀遙逝兮逾遠緬邈兮長乖四節流兮忽代序歲云暮兮日西頹霜被庭兮風入室夜既分兮星漢迴夢良人兮來遊若閶闔兮洞開怛驚悟兮無聞超惝怳兮慟懷慟懷兮柰何言陟兮山阿墓門兮肅肅修壟兮峨峨孤鳥嚶兮悲鳴長松萋兮振柯哀鬱結兮交集淚橫流兮滂沱蹈恭姜兮明誓詠柏舟兮清歌終歸骨兮山足存憑託兮餘華要吾君兮同穴之死矢兮靡佗文選藝文類聚三十四藉田賦伊晉之四年正月丁未皇帝親率群后藉于千畝之甸禮也于是乃使甸帥清畿野廬埽路封人壝宮掌舍設枑青壇蔚其嶽立兮翠幕黕以雲布結崇基之靈趾兮啟四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢𦇎犗服于縹軛兮紺轅綴于黛耜儼儲駕于廛左兮俟萬乘之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋兮接游車之轔轔微風生于輕幰纖埃起于朱輪森奉璋以階列望皇軒而肅震若湛露之晞朝陽似眾星之拱北辰也于是前驅魚麗屬車鱗萃閶闔洞啟參塗方駟常伯陪乘太僕秉轡后妃獻穜稑之種司農撰播殖之器挈壺掌升降之節宮正設門閭之蹕天子乃御玉輦蔭華蓋衝牙錚鎗綃紈綷䌨金根照耀以炯晃兮龍驥騰驤而沛艾表朱玄于離坎飛青縞于震兌中黃曄以發揮方綵紛其繁會五輅鳴鑾九旗揚旆瓊鈒入蕊雲罕晻藹簫管嘲哳以啾嘈兮鼓鞞硡隱以砰礚筍虡嶷以軒翥兮洪鐘越乎區外震震填填塵騖連天以幸乎藉田蟬冕熲以灼灼兮碧色肅其千千似夜光之剖荊璞兮若茂松之依山巔也于是我皇乃降靈壇撫御耦坻場染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九于斯時也居靡都鄙民無華裔長幼雜遝以交集士女頒斌而咸戾被褐振裾垂髫總髮躡踵側肩掎裳連襼黃塵為之四合兮陽光為之潛翳動容發音而觀者莫不抃儛乎康衢謳吟乎聖世情欣樂于昏作兮慮盡力乎樹蓺靡誰督而常勤兮莫之課而自厲躬先勞以說使兮豈嚴刑而猛制之哉有邑老田父或進而稱曰蓋損益隨時理有常然高以下為基民以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四人之務不壹野有菜蔬之色朝靡代耕之秩無儲蓄以虞災徒望歲以自必三季之衰皆此物也今聖上昧旦丕顯夕惕若慄圖匱于豐防儉于逸欽哉欽哉惟穀之䘏展三時之弘務致倉廩于盈溢固堯湯之用心而存救之要術也若乃廟祧有事祝宗諏日簠簋普淖則此之自實縮鬯蕭茅又于是乎出黍稷馨香旨酒嘉栗宜其民和年登而神降之吉也古人有言曰聖人之德無以加于孝乎夫孝天地之性人之所由靈也昔者明王以孝治天下其或繼之者鮮哉希矣逮我皇晉實光斯道儀刑孚于萬國愛敬盡于祖考故躬稼以供粢盛所以致孝也勸穡以足百姓所以固本也能本而孝盛德大業至矣哉此一役也而二美具焉不亦遠乎不亦重乎敢作頌曰思樂甸幾薄采其茅大君戾止言藉其農其農三推萬方以祇耨我公田實及我私我簠斯盛我簋斯齊我倉如陵我庾如坻念茲在茲永言孝思人力普存祝史正辭神祇攸歆逸豫無期一人有慶兆民賴之文選藝文類聚三十九閑居賦岳嘗讀汲黯傳至司馬安四至九卿而良史書之題以巧宦之目未嘗不慨然廢書而歎曰嗟乎巧誠有之拙亦宜然顧常以為士之生也非至聖無軌微妙玄通者則必立功立事效當年之用是以資忠履信以進德修辭立誠以居業僕少竊鄉曲之譽忝司空太尉之命所奉之主即太宰魯武公其人也舉秀才為郎逮事世祖武皇帝為河陽懷令尚書郎廷尉平今天子諒闇之際領太傅主簿府主誅除名為民俄而復官除長安令遷博士未召拜親疾輒去官免自弱冠涉乎知命之年八徙官而一進階再免一除名一不拜職遷者三而已矣雖通塞有遇抑亦拙者之效也昔通人和長輿之論余也固謂拙于用多稱多則吾豈敢言拙信而有徵方今俊乂在官百工惟時拙者可以絕意乎寵榮之事矣太夫人在堂有羸老之疾尚何能違膝下色養而屑屑從斗筲之役乎于是覽止足之分庶浮雲之志築室種樹逍遙自得池沼足以漁釣舂稅足以代耕灌園粥蔬以供朝夕之膳牧羊酤酪以俟伏臘之費孝乎惟孝友于兄弟此亦拙者之為政也乃作閑居賦以歌事遂情焉其辭曰傲墳素之場圃步先哲之高衢雖吾顏之云厚猶內媿于甯蘧有道吾不仕無道吾不愚何巧智之不足而拙艱之有餘也于是退而閑居于洛之涘身齊逸民名綴下士陪京泝伊面郊後市浮梁黝以徑度露臺傑其高峙闚天文之祕奧究人事之終始其西則有元戎禁營玄幙綠徽谿子巨黍異絭同機礮石雷駭激矢䖟飛以先啟行耀我皇威其東則明堂辟廱清穆敞閑環林縈映圓海迴淵聿追孝以嚴父宗文考以配天祗聖敬以明順養更老以崇年若乃背冬涉春陰謝陽施天子有事于柴燎以郊祖而展義張鈞天之廣樂備千乘之萬騎服振振以齊玄管啾啾而竝吹煌煌乎隱隱乎茲禮容之壯觀而王制之巨麗也兩學齊列雙宇如一右延國冑左納良逸祁祁生徒濟濟儒術或升之堂或入之室教無常師道在則是故髦士投紱名王懷璽訓若風行應如草靡此里仁所以為美孟母所以三徙也爰定我居築室穿池長楊映沼芳枳樹籬游鱗瀺灂䓿萏敷披竹木蓊藹靈果參差張公大谷之梨梁侯烏椑之柿周文弱枝之棗房陵朱仲之李靡不畢殖三桃表櫻胡之別二柰曜丹白之色石榴蒲陶之珍磊落蔓衍乎其側梅杏郁棣之屬繁榮麗藻之飾華實照爛言所不能極也菜則蔥韭蒜芋青筍紫薑堇薺甘旨蓼荾芬芳蘘荷依陰時藿向陽綠葵含露白䪥負霜于是凜秋暑退熙春寒往微雨新晴六合清朗太夫人乃御版輿升輕軒遠覽王畿近周家園體以行和藥以勞宣常膳載加舊痾有痊席長筵列孫子柳垂陰車結軌陸擿紫房水挂赬鯉或宴于林或禊于汜昆弟班白兒童稚齒稱萬壽以獻觴或一懼而一喜壽觴舉慈顏和浮杯樂飲絲竹駢羅頓足起舞抗音高歌人生安樂孰知其佗退求己而自省信用薄而才劣奉周任之格言敢陳力而就列幾陋身之不保尚奚擬于明哲仰眾妙而絕思終優遊以養拙文選藝文類聚六十四狹室賦歷甲第以遊觀旋陋巷而言歸伊余館之褊狹良窮弊而極微閣了戾以互掩門崎嶇而外扇室側戶以攢楹檐接秬而交榱當祝融之御節熾朱明之隆暑日曄以耀庭赫風煁其灼宇沸體惄其如鑠珠汗揮其如雨若乃重陰晦冥天威震曜漢潦沸騰叢溜奔激臼竈為之沈溺器用為之浮漂彼處貧而不怨嗟民生之收難匪廣廈之足榮有切身之近患青陽萌而畏暑白藏兆而懼寒獨味道而不悶喟然向其時歎藝文類聚六十四笙賦河汾之寶有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉若乃緜蔓紛敷之麗浸潤靈液之滋隅隈夷險之勢禽鳥翔集之嬉固眾作者之所詳余可得而略之也徒觀其制器也則審洪纖面短長列生簳裁熟簧設宮分羽經徵列商泄之反謐厭焉乃揚管攢羅而表列音要妙而含清各守一以司應統大魁以為笙基黃鍾以舉韻望鳳儀以擢形寫皇翼以插羽摹鸞音以厲聲如鳥斯企翾翾歧歧明珠在咮若銜若垂修檛內辟餘簫外逶駢田獦攦魻鰈參差于是乃有始泰終約前榮後悴激憤于今賤永懷乎故貴眾滿堂而飲酒獨向隅以掩淚援鳴笙而將吹先嗢噦以理氣初雍容以安暇中佛鬱以怫㥜終嵬峨以蹇愕又颯遝而繁沸罔浪孟以惆悵若欲絕而復肆懰檄糴以奔邀似將放而中匱愀愴惻淢虺韡煜熠汎淫汜豔霅曄岌岌或桉衍夷靡或竦踴剽急或既往不反或已出復入徘徊布濩渙衍葺襲舞既蹈而中輟節將撫而弗及樂聲發而盡室歡悲音奏而列坐泣㩶纖翮以震幽簧越上筩而通下管應吹噏以往來隨抑揚以虛滿勃慷慨以憀亮顧躊躇以舒緩輟張女之哀彈流廣陵之名散詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂朱實離離宛其落矣化為枯枝人生不能行樂死何以虛諡為爾乃引飛龍鳴鵾雞雙鴻翔白鶴飛子喬輕舉明君懹歸荊王喟其長吟楚妃歎而增悲夫其悽戾辛酸嚶嚶關關若離鴻之鳴子也含㗅嘽諧雍雍喈喈若群雛之從母也郁捋劫悟泓宏融裔哇咬嘲𠽻一何察惠訣厲悄切又何磬折若夫時陽初暖臨川送離酒酣徒擾樂闋日移疏客始闌主人微疲弛絃韜籥徹塤屏篪爾乃促中筵攜友生解嚴顏擢幽情披黃包以授甘傾縹瓷以酌酃光歧儼其偕列雙鳳嘈以和鳴晉野悚而投琴況齊瑟與秦箏新聲變曲奇韻橫逸縈纏歌鼓網羅鍾律爛熠爚以放豔鬱蓬勃以氣出秋風詠于燕路天光重乎朝日大不踰宮細不過羽唱發章夏導揚韶武協和陳宋混一齊楚邇不逼而遠無攜聲成文而節有敘彼政有失得而化以醇薄樂所以移風于善亦所以易俗于惡故絲竹之器未改而桑濮之流已作惟簧也能研群聲之清惟笙也能總眾清之林衛無所措其邪鄭無所容其淫非天下之和樂不易之德音其孰能與于此乎文選相風賦采修竹于層城歷寒暑而靡凋踞神獸于下趾棲靈鳥于上標混元恍其初判二氣變而無窮動靡微而不兆象有始而必終思先天而不違立成器以相風棲靈烏于帝庭似月離乎紫宮飛輕羽于竿杪若翔鸞乎雲中廣漠興而習坎景風發而遡離閶闔揚而西指明庶起而東移藝文類聚六十八秋菊賦馨達幽遠光燭隰原招仙致靈儀鳳舞鸞飛莖散英倚靡相尋垂采煒于芙蓉流芳越乎蘭林游女望榮而巧笑鵷鶵遙集而弄音若乃真人采其實王母接其葩汎流英于清醴似浮萍之隨波或充虛而養氣或增妖而揚娥既延期以永壽又蠲疾而弭疴蓺文類聚八十一文選陶潛雜詩注竝作潘岳初學記二十七引兩條御覽九百九十六竝作潘尼張溥編入潘岳集今姑從之蓮花賦偉玄澤之普衍嘉植物之竝敷遊莫美于春臺華莫盛于芙蕖于是惠風動沖氣和眄清池翫蓮花舒綠葉挺纖柯結綠房列紅葩仰含清液俯濯素波修柯婀娜柔莖苒弱流風徐轉迴波微激其望之也曄若曒日燭崑山其即之也晃若盈尺映藍田藝文類聚八十二芙蓉賦蔭蘭池之豐沼育沃野之上腴課眾榮而比觀煥卓斝而獨殊押臘雲布窋咤星羅光擬燭龍色奪朝霞丹煇拂紅飛鬚垂的斐披赩赫散煥熠爚流芬賦采風靡雲旋布濩磊落蔓衍夭閑發清陽而增媚潤白玉而加鮮藝文類聚八十二朝菌賦并序朝菌賦并序朝菌者時人以為蕣華莊生以為朝菌其物向晨而結絕日而殞文選郭璞遊仙詩注柰何兮繁華朝榮兮夕斃文選鮑照升天行注
