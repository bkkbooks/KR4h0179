body:
  text: 束晳貧家賦余遭家之轗軻嬰六極之困屯恆勤身以勞思丁飢寒之苦辛無原憲之厚德有斯民之下貧愁鬱煩而難處且羅縷而自陳有漏狹之單屋不蔽覆而受塵唯曲壁之常在時弛落而壓鎮食草葉而不飽常嗛嗛于膳珍欲恚怒而無益徒拂鬱而獨嗔蒙乾坤之徧覆庶無財而有仁涉孟夏之季月迄仲冬之堅冰稍煎蹙而窮迫無衣褐以蔽身還趨床而無被手狂攘而妄牽何長夜之難曉心咨嗟以怨天債家至而相敦乃取東而償西行乞貸而無處退顧影以自憐衒賣業而難售遂前至于饑年舉短柄之口掘此句從御覽七百六十二補執偏隳之漏鋗此句從御覽七百五十七補煮黃當之草萊作汪洋之羹饘釜遲鈍而難沸薪鬱絀而不然至日中而不孰心苦苦而飢懸丈夫慨于堂上妻妾歎于竈閒悲風噭于左側小兒啼于右邊藝文類聚三十五初學記十八讀書賦耽道先生澹泊閒居藻練精神呼吸清虛抗志雲表戢形陋廬垂帷帳以隱几被紈素而讀書抑揚嘈囋或疾或徐優游蘊藉亦卷亦舒頌卷耳則忠臣喜詠蓼莪則孝子悲稱碩鼠則貪民去唱白駒而賢士歸是故重華詠詩以終己仲尼讀易于終身原憲潛吟而忘賤顏回精勤以輕貧倪寬口誦而芸耨買臣行吟而負薪聖賢其猶孳孳況中才與小人藝文類聚五十五近遊賦世有逸民在乎田疇宅彌五畝志狹九州安窮賤于下里寞玄澹而無求乘篳輅之偃蹇駕蘭單之疲牛連搥索以為鞅結斷梗而作鞦攀蓽門而高蹈朅徘徊而近遊井則兩家共一園則去舍百步貫雞㲉于歲首收繫于牣互其男女服飾衣裳之制名號詭異隨口迭設繫明襦以禦冬脅汗衫以當熱帽引四角之縫裙有三條之殺兒晝啼于客堂設杜門以避吏婦皆卿夫子呼父字及至三農閒隙遘結婚姻老公戴合歡之帽少年著蕞角之巾藝文類聚六十四御覽六百八十七引兩條又六百九十五六百九十六八百九十九著紫裙之裨簁御覽六百九十六多鹽少豉臠皆穢閃書鈔一百四十三格餅正于三播書鈔一百四十四棊炙不過兩機書鈔一百四十五引兩條著羅華之布衫載穿頂之疎巾若夫祭奠之醊親里往來服素裙之禆從曳藍縷之登塞勸農賦惟百里之置吏各區別而異曹攷治民之賤職美莫當乎勸農專一里之權擅百家之勢及至青幡禁乎游惰田賦度乎頃畝與奪在己良薄浹口受饒在于肥脯得力在于美酒若場功畢租輸至錄社長召閭師條牒所領注列名諱則雞豚爭下壺榼橫至遂乃定一以為十拘五以為二蓋由熱啖紆其腹而杜康咥其胃藝文類聚六十五乃有老閑舊猥欺狹難覺時雖被考不過校督歌對囹圄笑向桎梏御覽六百五十餅賦禮仲春之月天子食麥而朝事之籩煮麥為麷內則諸饌不說餅然則雖云食麥而未有餅餅之作也其來近矣若夫安乾粔籹之倫豚耳狗舌之屬劍帶案盛餢飳髓燭或名生于里巷或法出乎殊俗三春之初陰陽交際寒氣既消溫不至熱于時享宴則曼頭宜設吳回司方純陽布畼服絺飲水隨陰而涼此時為餅莫若薄壯商風既厲大火西移鳥獸氄毛樹木疏枝肴饌尚溫則起溲可施玄冬猛寒清晨之會涕凍鼻中霜成口外充虛解戰湯餅為最然皆用之有時所適者便苟錯其次則不能斯善其可以通冬達夏終歲常施四時從用無所不宜惟牢丸乎爾乃重羅之麮塵飛雪白膠黏筋䵑䐧溔柔澤肉則羊膀豕脅脂膚相半臠若繩首珠連礫散薑株蔥本莑縷切判辛桂剉末椒蘭是畔和鹽漉豉攬合樛亂于是火盛湯涌猛氣蒸作攘衣振掌握搦拊搏麵彌離于指端手縈回而交錯紛紛馺馺星分雹落籠無迸肉餅無流麪姝媮咧敕薄而不綻巂巂和和䑋色外見弱如春緜白如秋練氣勃鬱以揚布香飛散而遠遍行人失涎于下風童僕空嚼而斜眄擎器者呧脣立侍者乾咽爾乃濯以玄醢鈔以象箸伸要虎丈叩膝偏據槃案財投而輒盡庖人參潭而促遽手未及換增禮復至脣齒既調口習咽利三籠之後轉更有次北堂書鈔一百四十四藝文類聚七十二初學記二十六御覽八百六十奏薦王璞郡吏王璞初入朝唯冀聖鑒垂采知其絕常耳其可使當戶牖之對意三公氣萬乘也北堂書鈔廣田農議伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉穀此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霡霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽于原隰勤藨蔉于中田猶不足以致倉庾盈億之積也然地利可以計生人力可以課致詔書之旨亦將欲盡此理乎今天下千城人多游食廢業占空無田課之實較計九州數過萬計可申嚴此防令監司精察一人失課負及郡縣此人力之可致也又州司十郡土狹人繁三魏尤甚而豬羊馬牧布其境內宜悉破廢以供無業業少之人雖頗割徙在者猶多田諸菀牧不樂曠野貪在人閒故謂北土不宜畜牧此誠不然案古今之語以為馬之所生實在冀北大賈䍧羊取之清渤放豕之歌起于鉅鹿是其效也可悉徙諸牧以充其地使馬牛豬羊齕草于空虛之田游食之人受業于賦給之賜此地利之可致者也昔騅駓在坰史克所以頌魯僖卻馬務田老氏所以稱有道豈利之所以會哉又如汲郡之吳澤良田數千頃泞水停洿人不墾植聞其國人皆謂通泄之功不足為難舄鹵成原其利甚重而豪強大族惜其魚捕之饒構說官長終于不破此亦谷口之謠載在史篇謂宜復下郡縣以詳當今之計荊揚兗豫汙泥之土渠塢之宜必多此類最是不待天時而豐年可獲者也以其雲雨生于畚臿多稌生于決泄不必望朝隮而黃潦臻禜山川而霖雨息是故兩周爭東西之流史起惜漳渠之浸明地利之重也宜詔四州刺史使謹案以聞又昔魏氏徙三郡人在陽平頓丘界今者繁盛合五六千家二郡田地逼狹謂可徙遷西州以充邊土賜其十年之復以慰重遷之情一舉兩得外實內寬增廣窮人之業以闢西郊之田此又農事之大益也晉書束晳傳孫為庶祖持重議經云臣服君之祖周此君為祖三年也是祖有廢疾不襲統也然則無爵可傳身不主祭與庶子何異而孫猶服斬義例昭然大宗之弟皆稱祖立廟而自為其子孫所奉即所謂小宗之緒主其祖父之祀豈可自同眾孫不服三年哉通典八十八避諱議元康七年詔書稱咸寍元年詔下尊諱風伯雨師皆為詁訓又公官文書吏人上事稱引經書者復多迴避使大義不明諸經傳咸言天神星宿帝王稱號皆不得變易本文但省事言語臨時訓避而已通典一百四案風伯之名所由來遠其在漢魏固已有之非晉氏避諱始造此號也若以異于周禮宜當變改則今國家行事神物稱號多因近代不皆率古蓋亦𥳑易以從仍舊隨時之制不足悉變唯雨師之名實由避諱宜如舊稱通典一百四九品議員外侍郎及給事宂從皆是帝室茂親或貴遊子弟若悉從高品則非本意若精鄉議則必有損御覽二百二十一引束晳集高禖壇石議石在壇上蓋主道也夫未詳其置之故而欲必其可除之理理不可然案郊祀志秦漢不祀高禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異義云山陽民祭皆以石為主然則石之為主由來尚矣其此象矣而祭禮龜策祭器弊則埋之而改置新石今破則宜埋而更造不宜遂廢收集破石積之故處于禮無依于事不肅愚所未安也隋書禮儀志二通典五十五御覽五百二十九元康八年高禖壇上石破為二賊曹屬束晳議荅汲冢竹書釋難書其後子夏仲尼之徒傳業西河人疑其聖初學記二十一玄居釋束晳閒居門人竝侍方下帷深譚隱几而咍含毫散藻攷撰同異在側者進而問之曰蓋聞道尚變通達者無窮世亂則救其紛時泰則扶其隆振天維以贊百務熙帝載而鼓皇風生則率土樂其存死則宇內哀其終是以君子屈己伸道不恥干時上國有不索何獲之言周易著躍以求進之辭莘老負金鉉以陳烹割之說齊客當康衢而詠白水之詩今先生耽道脩蓺嶷然山峙潛朗通微洽覽深識夜兼忘寐之勤晝騁鑽玄之思曠年累稔不墮其志鱗翼成而愈伏術業優而不試乃欲闔匵辭價泥蟠深處永戢琳琅之耀匿首窮魚之渚當唐年而慕長沮邦有道而反甯武識彼迷此愚竊不取若乃士以援登進必待求附勢之黨橫擢則林藪之彥不抽丹墀步紈袴之童東野遺白顛之叟盍亦因子都而事博陸憑鷁首以涉洪流蹈翠雲以駭逸龍振光耀以驚沈鰌徒屈蟠于埳井眄天路而不游學既積而身困夫何為乎祕丘且歲不我與時若奔駟有來無反難得易失先生不知盱豫之讖悔遲而忘夫朋盍之義務疾亦豈能登海湄而抑東流之水臨虞泉而招西歸之日徒以曲畏為梏儒學自桎囚大道于環堵苦形骸于蓬室豈若託身權戚憑勢假力擇棲芳林飛不待翼夕宿七娥之房朝享五鼎之食匡三正則太階平贊五教而玉繩直孰若茹藿湌蔬終身自匿哉束子曰居吾將導爾以君子之道諭爾以出處之事爾其明受余訊謹聽余志昔元一既啟兩儀肇立離光夜隱望舒晝戢羽族翔林蟨蛁赴溼物從性之所安士樂志之所執或背豐榮以巖栖或排蘭闥而求入在野者龍逸在朝者鳳集雖其軌迹不同而道無貴賤必安其業交不相羨稷契奮庸以宣道巢由洗耳以避禪同垂不朽之稱俱入賢者之流參名比譽誰劣誰優何必貪與二八為群而恥為七人之疇乎且道睽而通士不同趣吾竊綴處者之末行未敢聞子之高喻將忽蒲輪而不眄夫何權戚之云附哉昔周漢中衰時難自託福兆既開患端亦作朝遊巍峨之宮夕墜崢嶸之壑晝笑夜歎晨華暮落忠不足以衛己禍不可以豫度是以士諱登朝而競赴林薄或毀名自汙或不食其祿比從政于匣笥之龜譬官者于郊廟之犢公孫泣涕而辭相楊雄抗論于赤族今大晉熙隆六合寍靜蜂蠆止毒熊羆輟猛五刑勿用八紘備整主無驕肆之怒臣無氂纓之請上下相安率禮從道朝養觸邪之獸庭有指佞之草禍戮可以忠逃寵祿可以順保且夫進無險懼而惟寂之務者率其性也兩可俱是百舍彼趣此者從其志也蓋無為可以解天下之紛澹泊可以救國家之急當位者事有所窮陳策者言有不入翟璜不能迴西鄰之寇平渤不能正如意之立干木臥而秦師退四皓起而戚姬泣夫如是何舍何執何去何就謂山岑之林為芳谷底之莽為臭守分任性唯天所授鳥不假甲于龜魚不假足于獸何必笑孤竹之貧而羨齊景之富恥布衣以肆志寍文裘而拖繡且能約其躬則儋石之蓄以豐苟肆其欲則海陵之積不足存道德者則匹夫之身可榮忘大倫者則萬乘之主猶辱將研六籍以訓世守寂泊以鎮俗偶鄭老于海隅匹嚴叟于僻蜀且世以太虛為輿玄罏為肆神游莫競之林心存無營之室榮利不擾其覺殷憂不干其寐捐夸者之所貪收躁務之所棄薙聖籍之荒蕪總群言之一至全素履于丘園背纓緌而長逸請子課吾業于千載無聽吾言于今日也晉書束晳傳失題零露垂林非綴冕之飾薄冰凝池非登廟之寶北堂書鈔一百五十二御覽十二引束晳集必將採素璧于層山探圓珠于重泉也員外侍郎及給事中冗從皆帝室茂親或貴游子弟北堂書鈔弔蕭孟恩文東海蕭惠字孟恩者父昔為御史與晳先君同僚孟恩及晳日夕同遊分義蚤著孟恩夫婦皆亡門無立副晳時有伯母從兄之憂未得自往致文一篇以弔其魂并脩薄奠其文曰舊友人陽平束晳謹請同業生李察奉脯脩一束麥糒一器以致祠于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有邪亡邪莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識御覽四百十弔衛巨山文元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黃門郎巨山與晳有交好時自本郡來赴其喪作弔文一篇以告其柩曰同志舊友陽平束晳頃聞飛虎肆暴竊矯皇制禍集于子宗祊幾滅越自冀方來赴來祭遙望子第銘旌藂立即闚子庭其殯盈十徘徊感慟載號載泣斂袂升階子不我揖引袂授袪子不我執哀哉魂兮于焉迺集御覽五百九十六春夏封諸侯月令所紀非一王之制凡稱古者無遠近之限未知夏封諸侯何代之典秋祭田邑夏乎殷乎而王據月令以非祭統鄭宗祭統而疑月令無乃俱未通哉莫若通以三代說兩氏而不俱一也通典七十一引束晳總論嫁娶時月春秋二百四十年魯女出嫁夫人來歸大夫迎女天王娶后自正月至十二月悉不以得時失時為襃貶何限于仲春季秋以相非哉夫春秋舉秋毫之善貶纖介之惡故春狩于郎書時禮也夏城中丘書不時也此人閒小事猶書得時失時況婚姻人倫端始禮之大者不譏得時失時不善者邪若婚姻季秋期盡仲春則隱二年冬十月夏之八月未及季秋伯姬歸于紀周之季春夏之正月也桓九年春季姜歸于京師莊二十五年六月夏之四月也已過仲春伯姬歸于杞或出盛時之前或在期盡之後而經無貶文三傳不譏何哉凡詩人之興取義繁廣或舉譬類或稱所見不必皆可以定候也又案桃夭篇敘美婚姻以時蓋謂盛壯之時而非日月之時故灼灼其華喻以盛壯非為嫁娶當用桃夭之月其次章云其葉蓁蓁有蕡其實之子于歸此豈在仲春之月乎又摽有梅三章注曰夏之向晚迨冰未泮正月以前草蟲喓喓未秋之時或言嫁娶或美男女及時然詠各異矣周禮以仲春會男女之無夫家者蓋一切相配合之時而非常人之節曲禮曰男女非有行媒不相知名故日月以告君齋戒以告鬼神若萬人必在仲春則其日月有常不得前卻何復日月以告君乎夫冠婚笄嫁男女之節冠以二十為限而無春秋之期笄以嫁而設不以日月為斷何獨嫁娶當繫于時月乎王肅云婚姻始于季秋止于仲春不言春不可以嫁也而馬昭多引春秋以為之證以為反詩於難錯矣兩家俱失義皆不通通年聽婚蓋古正禮也通典五十九
