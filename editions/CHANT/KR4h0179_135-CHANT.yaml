body:
  text: 謝歆金昌亭詩敘余尋師來入經吳行達昌門忽覩斯亭傍川帶河其榜題曰金昌訪之耆老曰昔朱買臣仕漢還為會稽內史逢其迎吏遊旅比舍與買臣爭席買臣出其印綬群吏慚服自裁因事建亭號曰金傷失其字義耳世說輕詆篇注皇后親為皇后服議案禮無明文依準鄭制齊縗諸婦誠非五屬然緣成親夫屬子道則妻亦婦道矣不得不制親屬之服通典八十一荅庾龢問庾龢問女子適人今改葬兒既服緦女子當有服不王翼荅云喪禮改葬服緦鄭氏以為臣子妻以例推之女子雖降父母即亦子也今男女皆緦于義自通通典一百二上疏訟殷浩伏見故中軍將軍揚州刺史殷浩體德沈粹識理淹長風流雅勝聲蓋當時再臨神州萬里肅清勳績茂著聖朝欽嘉遂授分陝推轂之任戎旗既建出鎮壽陽驅其豺狼翦其荊棘收羅向義廣開屯田沐雨櫛風等勤臺僕仰憑皇威群醜革面進軍河洛修復園陵不虞之變中路猖蹶遂令為山之功崩于垂成忠款之志于是而廢既受削黜自擯山海杜門終身與世兩絕可謂克己復禮窮而無怨者也尋浩所犯蓋負敗之常科非即情之永責論其名德深誠則如彼察其補過罪已則如此豈可棄而不䘏使法有餘冤方今宅兆已成埏隧已開懸棺而窆禮同庶人存亡有非命之分九泉無自訴之期仰感三良昊天罔極若使明詔爰發旌我善人崇復本官遠彰幽昧斯則國家威恩有兼濟之美死而可作無負心之恨晉書殷浩傳雷電賦太極紛綸元氣澄練陰陽相薄為雷為電擊武乙于河而誅戮之罰明震展氏之廟而隱慝之誅見是以宣尼敬威忽變夫其聲無定響光不恆照砰訇輸轉倏閃藏曜若乃太陰下淪少陽初升蟄蟲將啟動靈先應殷殷徐振不激不憑林鍾統節溽暑烟熅星月不朗衣裳若焚爾乃清風前颯蕩濁流塵豐隆破響列缺開雲當時倦容廓焉精新豈直驚安竦寐乃以畼精悟神天怒將淩赤電先發窺巖四照映流雙絕雷電赫以驚衡山海磕其奔裂若夫子午相乘水旱木零仲冬奮發伏雷先行礚礚隆隆閃閃敻敻豈隱隱之虛憑乃違和而傷生昭王度之失節見二儀之幽情至乃辰開日朗太清無靄靈眼揚精以麗煥壯鼓崩天而砰礚陵雉訇隱以待傾方地嶪崿其若敗蒼生非悟而喪魂龍鬼失據以顛沛光驚于泉底聲動于天外及其灑北斗以誕聖震昆陽以伐違降枝鹿以命桀島雙濆而橫尸倒驚檜于霄際摧騰龍于雲湄烈大地以繞映惟六合以動威在靈德而卷舒謝神豔之難追蓺文類聚二初學記一御覽十三觀濤賦臨浙江以北眷壯滄海之宏流水無涯而合岸山孤映而若浮既藏珍而納景且激波而揚濤其中則有珊瑚明月石帆瑤映彫鱗采介特種奇名崩巒填壑傾堆漸隅岑有積螺嶺有懸魚謨茲濤之為體亦崇廣而宏浚形無常而參神斯必來以知信勢剛淩以周威質柔弱以協順蓺文類聚九冰賦激厲風而貞質仰和景而融暉清流離之光徹邈雲英之巍巍爾乃連綿絡幕乍結乍無翕然靈化得漸已麤緗白隨川方圓隨渠義剛有折照壺則虛託形超象比朗玄珠一宗理而常全經百合而彌切轉若驚電照若澄月積如累空泮若墮節臨堅投輕應變縷裂瓊碎星流清練流越若乃上結薄映下鏡長泉靈葩隨流合馨揚鮮蓺文類聚九初學記七湘中賦陽鴛山雞御覽九百十八湘川賦其表則有滋澤晨潤彫霜夜凝北堂書鈔一百五十二箏賦其器也則端方修直天隆地平華文素質爛蔚波成君子喜其斌麗知音偉其含清罄虛中以揚德正律度而儀形良工加妙輕縟璘彬玄漆緘響慶雲被身蓺文類聚四十四初學記十六鳳賦望太清以抗思誕儀鳳之逸群稟鶉火之靈曜資和氣之煙熅允雞喙而燕頷頸蛇蜿而龍文勵歸昌于漢陽發明乎聖君荷義躡正雞峙鴻前比翼交揮五色備宣與八風而降時雨音中鍾律步則規矩朱冠赫以雙翹靈質翽其高舉歷黃冠于招搖陵帝居之懸圃蓺文類聚九十九初學記三十與殷仲堪牋不悟陛下聖恩所加登之常伯之列飾之貂璫之暉北堂書鈔五十八地名破冢真破冢而出行人安穩布帆無恙晉書顧愷之傳仲堪在荊州愷之嘗因假還仲堪特以布帆借之至破冢遭風大敗愷之與仲堪牋虎丘山序吳城西北有虎丘山者含真藏古體虛窮玄隱嶙陵堆之中望形不出常阜至乃喦崿絕于華峰蓺文類聚八嵇康贊序南海太守鮑靚通靈士也東海徐寍師之寍夜聞靜室有琴聲怪其妙而問焉靚曰嵇叔夜寍曰嵇臨命東市何得在茲靚曰叔夜迹示終而實尸解文選五君詠注王衍畫贊巖巖清峙壁立千仞晉書王衍傳水贊湛湛若凝開神以質乘風擅瀾妙齊得一蓺文類聚八父悅傳君以直道陵遲于世入見王王髮無二毛而君已斑白問君年乃曰卿何偏蚤白君曰松柏之姿經霜猶茂臣蒲柳之質望秋先零受命之異也王稱善久之世說言語篇注祭牙文維某年某月日錄尚書事豫章公裕敢告黃帝蚩尤五兵之靈兩儀有政四海有王晉命在天世德重光烈烈高牙闐闐伐鼓白氣經天𥳑揚神武蓺文類聚六十御覽三百三十九墨麈尾銘卑尊有宗貴賤無始器以通顯廢興非已偉質輭蔚岑條疏理體隨手運散飆清起通彼玄詠申我先子書鈔一百三十四白麈尾銘蔚蔚秀氣偉我奇姿荏蒻輭潤雲散雪飛君子運之探玄理微因通無遠廢興可師書鈔一百三十四御覽七百三枕賦制為素枕聊以偃仰爾乃六安其形展轉唯擬撫引應適永御君子北堂書鈔一百三十四鷿鵜賦并序鷿鵜賦并序余觀鷿鵜之為鳥也形貌叢蔑尾翮憔陋樂水以遊隨波淪躍汎然任性而無患也惟鷿鵜之小鳥託川湖以繁育翩舒翮以和鳴匪窘惕于籠畜瀺灂池沼容與河洲翔而不掩集而不留值汙則止遇澤則游淪潭裏以銜魚躍浪表而相求萃不擇渠娛不擇川隨風騰起與濤回旋沈竄則足撥圓波浮泳則臆排微漣率性命以閒放獨遨逸而獲全蓺文類聚九十二蜘蛛賦并序蜘蛛賦并序嘯詠蓬廬敖步丘園覽蜘蛛之為蟲焉乘虛運巧構不假務欲足性命蕭然靖逸良可翫也伊蜘蛛之為蟲縱微性乎天壤稟妙造于化靈忽有礙而無相吐自然之纖緒先皇羲而結網馮輕羅以隱顯應大明之幽朗御覽九百四十八上言宜擇經學最優者一人領博士案二漢舊事博士之職唯舉明經之士遷轉各以本資初無定班魏及中朝多以侍中常侍儒學最優者領之職雖不同漢氏盡于儒士取用其揆一也今博士八人愚謂宜依魏氏故事擇朝臣一人經學最優者不繫位之高下常以領之每舉太常共研厥中其餘七人自依常銓選通典五十三上言庶母服制謹案喪服禮經庶子為母緦麻三月傳曰何以緦麻以尊者為體不敢服其私親也此經傳之明文聖賢之格言而自頃開國公侯至于卿士庶子為後各肆私情服其庶母同之于嫡此末俗之獘溺情傷教縱而不革則流蕩忘反矣且夫尊尊親親雖禮之大本然厭親于尊由來尚矣禮記曰為父後為出母無服也者不祭故也又禮天子父母之喪未葬越紼而祭天地社稷斯皆崇嚴至敬不敢以私廢尊也今身承祖宗之重而以庶母之私廢烝嘗之事五廟闕祀由一妾之終求之情禮失莫大焉舉世皆然莫之裁貶就心不同而事不敢異故正禮遂穨而習非成俗此國風所以思古小雅所以悲歎當今九服漸寍王化惟新誠宜崇明禮典以一風俗請臺省攷修經典式明王度晉書禮志中太元十七年太常車胤上言又見通典八十二又上言去年上自頃開國公侯至于卿士庶子為後者服其庶母同之于嫡違禮犯制宜加裁抑事上經年未被告報未審朝議以何為疑若以所陳或謬則經有文若以古今不同則晉有成典升平四年故太宰武陵王所生母喪表求齊衰三年詔聽依昔樂安王故事制太功九月興寍三年故梁王㻱又所生母喪亦求三年庚子詔書依太宰故事同服大功若謹案周禮則緦麻三月若奉晉制則大功九月古禮今制竝無居廬三年之文而頃年已來各申私情更相擬襲漸已成俗縱而不禁則聖典滅矣夫尊尊親親立人之本王化所由二端而已故先王設教務弘其極尊郊社之敬制越紼之禮嚴宗廟之祀厭庶子之服所以經緯人文化成天下夫屈家事于王道厭私恩于祖宗豈非上行乎下父行乎子若尊尊之心有時而替宜厭之情觸事而申祖宗之敬微而君臣之禮虧矣嚴恪微于祖宗致敬虧于事上而欲俗安化隆不亦難乎區區所惜實在于斯職之所司不敢不言請臺參詳晉書禮志中十八年胤又上言有司奏詔可修明堂議明堂之制既甚難詳且樂主于和禮主于敬故質文不同音器亦殊既茅茨廣廈不一其制何必守其形範而不弘本順時乎九服咸寍四野無塵然後明堂辟雝可光而脩之晉書車胤傳又見禮志上宋書禮志三朝臣上禮太子議百辟卿士咸與盛禮展敬拜伏不須復上禮唯方伯牧守不覩大禮自非酒牢貢羞無以裁其乃誠故宜有上禮亦如元正大慶方伯莫不上禮朝臣奉璧而已通典七十孝武泰元十二年臺符問皇太子既拜朝臣奉賀應上禮否國子博士車胤議群臣見皇太子儀服議朝臣宜朱衣褠幘拜敬太子荅拜案經傳不見其文故太傅羊祜牋慶太子稱叩頭此則拜之證又太寍三年詔議其典尚書卞壺謂宜稽則漢魏闔朝同拜其朱衣冠冕唯施天朝宜褠幘而已通典七十尚書符又問王公以下見皇太子儀及所制衣服車胤議荅謝琰問謝琰問車胤曰人有妹喪降服已除本服未周可得嫁不荅曰禮小功不稅降在小功者則稅是推本情不計見服也時人有以此婚嫁者僕常疑之孫騰荅人有卜日除服便以婚況降服已除禮有大斷此都無疑通典六十荅徐廣問李太后服漢代皆服重且大體已定此當無服翻革邪通典八十一隆安四年議桓宣武公立廟禮父為士子為諸侯祭以諸侯則宜立親廟四封君之子則封君高祖親盡廟毀封君之孫則封君曾祖親盡廟毀封君之曾孫則封君之祖親盡廟毀封君之玄孫則封君之父親盡毀廟封君玄孫之子則封君親盡廟宜毀然以太祖不毀五廟之數于是始備至封君玄孫之孫則毀封君之子封君玄孫之孫復毀封君之孫如此隨代迭毀以至百代通典四十七從母父服適族議案禮記同姓從宗合宗屬異姓主名理際會從母嫁于絕屬族父則無服從母之名謂不宜有服戢以為理際會者患班序易位及嫂叔無名耳矣服以恩生班以義斷雖門外之事義掩恩至門內之事恩掩義矣同宗之道處恩義之閒故宜資之恩義今彼此獲中據易位無名便廢骨之服實是所疑既有屬從鄭玄說子為母黨之服案屬從者自非出母黨及庶子受重自于其所生之黨則所無厭降之文又記云六代親屬竭以鄭說六代之外親盡爾雅族昆弟之子為親同姓案從母嫁于無屬名者即與嫁他姓不異則宜服從母嫁于他姓之服矣又嘗見賀公書稱賀新渝夫人為從姨母尋所以不主名于際會者亦是有恩掩義謂宜服也通典九十五諸侯之大夫為天子服對𥳑文帝崩鎮軍府問參佐綱紀服邵戩荅曰禮臣為君服皆斬縗大夫居廬士居堊室又禮君之喪諸達官之長杖先儒以為非達官謂官長所自除人在官者也庶人在官服天子與畿內之人同齊縗三月案參佐無除者宜用此禮又禮諸侯之大夫會見天子者為天子服繐縗七月案今綱紀雖或被徐敕猶古諸侯之卿命于天子比耳會見北面時無二君之道宜依繐縗之制其無除敕又未嘗會見則宜無服通典八十一喪遇閏議喪紀之制歲數者沒閏而三年之喪閏在始末者用捨之論時有不同唯當本乎閏之所繫可以明折衷經傳具四時以編年一時無事經書首月及其有事隨月而載初不書閏者以閏附正月不應時見也唯魯文公六年書閏月不告朔指見告朔之餘無事也又文公元年閏三月後故傳曰于是閏三月欲審所附此明證設此閏遭喪者取其周忌應用來年三月既合喪期大數得周忌定日何休亦以為然朝論同之不嫌原其所由在乎閏附前月而不屬後故也始喪在閏月以附前祥除遇之豈得屬後立閏有定所而施用有彼此求久理例殊不經通且喪宜從重不貳之道祥用遠日禮之正典愚謂周忌故當七月二十八日大祥應用閏月晦既得周忌之正不失遠日之義禮之遠日誠非出月遇閏而然蓋隨時之變耳通典一百喪禮之制周年沒閏者議以閏非正月故略而不數是以丘明謂之閏三月公羊則日天無是月由此言之閏無定所隨節而立其名稱則在上月是以卒于閏者則以所附之月為周至于祥變理不得異豈有始喪則附之于前祥變則別之于後以例推之情所未安且夫禮雖制情亦復因情制禮若情因事伸則古人順而不奪是以每于祥葬咸用遠日斯所以即順物情因可伸之故數年則沒閏喪禮所不嫌附于前月春秋之明義愚謂國祥用閏月晦既合經傳附前之義又得遠日伸情之旨且喪宜從重古今所同詳尋理例謂此為允通典一百中宗肅祖皆以閏崩祥除之變皆用閏之後月先朝尚耳閏附七月用之何疑荀司徒亦以閏薨荀家祥亦用閏之後月諸荀名德相繼習于禮學故號為明宗議者引周官左氏而非公羊穀梁今案周官左氏傳兩書自書閏月中事閏月長三十日三十日中何得無事不明閏月非附月之理也議者稱三年之喪二十五月還遇閏之年便二十六月三年之喪不應以閏為月議者稱禮傳終身之哀忌日之謂不唯周年子卯之謂代不用子卯閏月及大月三十日亡至于無閏之年及與小盡都是無忌所以古人用子卯也𥳑文皇帝七月二十八日崩己未之日今年己未在閏月十日時不用子卯而用二十八日久矣若己未在他月今者不能變改閏附七月己未在閏今者用閏益遠日之情也通典一百難范甯論喪遇閏鄭襲難范甯曰以閏三月五日死者當以來年五月祥何月為怨日荅曰謂之閏月者以餘分之日閏益月耳非正月也非正月則吉凶大事皆不可用故天子不以告朔而喪者不數以閏月死既不數之禮十三月小祥二十五月大祥自然當以來年四月小祥明年四月大祥也所謂忌日者死者之日月耳今以閏月來年無閏月安得有忌日邪當以後歲閏月五日為忌是五年再有忌日也難曰忌日之感終身之戚罔極之恩不離一日今須後閏則三年之忌不亦遠乎傳稱子卯不樂謂之疾日先儒以為甲子乙卯誠如是自宜以日辰為忌遇之而感耳通典一百喪遇閏議案左氏春秋經魯襄公二十八年十二月甲寅天王崩乙未楚子卒其閒相去四十二日是則乙未閏月之日也經不書閏月而書十二月明閏非正宜附正之文其不曰二十九年正月是附前月之證又禮記曰喪事先遠日則祥除應在閏月通典一百孝武寍康二年𥳑文帝崩再周而遇閏博士謝攸孔粲議尋博士所上祥事是專用吳商議也商之所言依公羊何氏注及禮之遠日也禮稱三年之喪十三月而小祥二十五月而畢春秋傳曰三年之喪其實二十五月此喪服之大數周月之正文也又云喪以月者數閏以歲者不數閏是為有閏則十四月而祥二十六月而除不用喪月之常數所以重周忌之正也夫練除之節喪禮之大終身之哀忌日之謂喪中遇閏禮不可略周忌之月不可得而移故緣情以立制變文而示義也至閏在喪表三年之限已全周忌之正已得何故于此而復延月邪議者據左氏之閏三月公羊無是月穀梁附月餘日以明閏非月數皆應屬前之證案推攷分度隨以置閏閏月之所在年中無常要當有繫以名其所在三月後謂之閏三月非三月也天無是月非常月也非無此月所在無常也穀梁亦云積分以成月經傳之文先儒舊說竝不謂閏是餘日不別月數而以六十日為一月也三年之喪禮之所重其為節文不專一制亡在于閏喪者之變祥除之事無復本月應有所附以正所周閏在三月後附于三月喪紀無違順序有節合三傳三禮意也若閏非月數皆屬于前功服葬月何以數之于葬則數于祥則否用捨二義未安也凶事遠日言月中之遠耳若遷一月當是遠月豈遠日之義邪卜葬之遠不出于月卜祥之遠而乃包閏卜同遠異復非所宜也案何休云閏死者數閏以正周月非死月不得數大較粗同但其年無閏而以乙未為閏之日攷較經傳未之詳耳商採尋便為正義不亦謬乎閏在喪中略而不計祥除值閏外而不取重周忌也閏亡無正推以附前喪期不闕順序不悖合禮變也通典一百諱議朝臣所諱君之母妻施于小君非君之所生所生之諱不上諱榜非群下所宜諱也竊謂如此則不唯奏事太后不應諱而已恐門號縣名亦不宜改頒于天下而闔朝之臣陳事不避悠悠人吏犯者不問宮號獨易餘莫之諱將于大體有不通邪父之所諱子無不諱君之所諱臣其不諱乎施于小君誠有其文母以子貴亦有明義若以事輕至尊應諱但奏御太后不諱一朝之事諱不竝行復是所疑通典一百四喪遇閏議忌不可遷存終月也祥不必本月尚遠日也謂宜以七月二十八日為忌閏月晦而祥通典一百
