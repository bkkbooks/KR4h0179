body:
  text: 高齊沖太孫殤服議太孫自是無服之殤不應制服此禮之明義宜從以日易月之制通典八十二自湘中與監軍柳純書前諸人不能寬李特一年又不以徐士權為汶山太守而屯故如此謂失之豪釐差以萬里斯言有似然必不以杜漸為恨者流民初西當承詔書閉關不入其次易代趙廞選宜內遣平西緜竹之會聽王敦之計少可以寍豪釐之覺非彼之謂也華陽國志八又見十六國春秋七十六遺應詹書天步艱難始自吾州州黨流移在于荊士其所遇值蔑之如遺頓伏死亡者略復過半備嘗荼毒足下之所鑒也客主難久嫌隙易構不謂樂鄉起變出于不意時與足下思散疑結求擒其黨帥惟患算不經遠力不陷堅耳及在湘中懼死求生遂相結聚欲守善自衛天下小定然後輸誠盟府尋山公鎮夏口即具陳之此公鑒開塞之會察窮通之運納吾于眾疑之中非高識玄覩孰能若此西州人士得沐浴于清流豈惟滌蕩瑕穢乃骨肉之施此公薨逝斯事中廢賢愚痛毒竊心自悼欲遣滕永文張休豫詣府備列起事以來本末但恐貪功徇名之徒將讒閒于聖主之聽戮吾使于巿朝以彰叛逆之罪故未敢遣之而甘陶卒至水陸十萬旌旗曜于山澤舟檻盈于三江威則威矣然吾眾竊未以為懼晉文伐原以全信為本故能使諸侯歸之陶侃宣赦書而繼之以進討豈所以崇奉明詔示軌憲于四海逼向義之夫以為叛逆之虜踧思善之眾以極不赦之責非不戰而屈人之算也驅略烏合欲與必死者求一戰未見爭衡之機權也吾之赤心貫于神明西州人士卿粗悉之耳寍當令抱枉于時不證于大府邪昔虞卿不榮大國之相與魏齊同其安危司馬遷明言于李陵雖刑殘而無慨足下抗威千里聲播汶衡進宜為國思靖難久略退與舊交措枉直之正不亦綽然有餘裕乎望卿騰吾箋令時達盟府遣大司光臨使吾得披露肝瞻沒身何恨哉伏想盟府必結紐于紀綱為一匡于聖世使吾廁列義徒負戈前驅迎皇輿于閶闔埽長蛇于荒裔雖死之日猶生之年也若然先清方夏卻定中原吾得一年之糧使泝流西歸夷李雄之逋寇脩禹貢之舊獻展微勞以補往愆復州邦以謝鄰國亦其志也惟所裁處耳吾遠州寒士與足下出處殊倫誠不足感神交而濟其傾危但顯吾忠誠則汶嶽荷忠順之恕衡湘無伐叛之虞隆足下宏納之望拯吾徒陷溺之艱焉可金玉其音哉然顒顒十餘萬口亦榮瘁于警備思放逸于南畝矣衡嶽江湘列吾左右若往言有貳血誠不亮益梁受殃不惟鄙門而已晉書杜弢傳弢與王敦等數十戰將士多物故弢請降帝不許弢遺詹書與李毅牋生長遐荒不達禮教徒與李雄和光合勢雖不能營師五丈略地渭濱冀北斷襃斜東據永安退攷靈符晉德長久誠非狂夫所能干輒表革面歸辠有司華陽國志四詒毛詵李叡書昔魯侯不道季氏出之天之愛民君師昕治知足下追踵古人見賢思齊足下箕帚枉慚吾郡華陽國志四太安元年鐵官令毛詵逐建寍太守杜俊以叛猛詒之書上言應復寧州南中形勢七郡斗絕晉弱夷強加其土人屈塞應復寍州以相鎮慰華陽國志四勸進懷帝為皇太弟二相經營王室志寍社稷儲貳之重宜歸時望親賢之舉非大王而誰清河幼弱未允眾心是以既升東宮復贊藩國今乘輿播越二宮久曠常恐氐羌飲馬于涇川螘眾控弦于霸水宜及吉辰時登儲副上翼大駕早寍東京下允黔首喁喁之望晉書懷帝紀永興元年立為皇太弟以清河王章本太子也懼不敢當典書令廬陵脩肅云云表詔云行當別離以為悵罔分致氍一劍一琉璃盌一貴達心領錄之天恩罔極天地施鈞不異遠近蓺文類聚七十三詔賜恢白甌二枚御覽七百五十九引諸葛恢集天恩賜廣州白盌御覽七百六十引諸葛恢集天恩罔極特賜纖絺細竹御覽八百十九上表請立學校臣聞天道之所運莫大于陰陽帝王之至務莫重于禮學是以古之建國教學為先國有明堂辟雝之制鄉有庠序黌學校之儀皆所以抽導幽滯啟廣才思蓋以六四有困蒙之吝君子大養正之功也昔仲尼列國之大夫耳興禮脩學于洙泗之閒四方髦俊斐然向風受業身通者七十餘人自茲以來千載寂漠豈天下小于魯國賢哲乏于曩時厲與不厲故也自頃國遭無妄之禍社稷有綴旒之危寇羯飲馬于長江凶狡虎步于萬里遂使神州蕭條鞠為茂草四海之內人跡不交霸主有旴食之憂黎元懷荼毒之痛戎首交并于中原何遽籩豆之事哉然三年不為禮禮必壞三年不為樂樂必崩況曠載累紀如此之久邪今未進後生目不覩揖讓升降之禮耳不聞鐘鼓管絃之音文章散滅胡馬之足圖讖無復孑遺于世此蓋聖達之所深悼有識之所咨嗟也夫治世尚文遭亂尚武文武遞用長久之道譬之天地昏明之迭自古以來未有不由之者也今或以天下未壹非興禮學之時此言似是而非夫儒道深奧不可倉卒而成古之俊乂必三年而通一經比須寇賊清夷天下平泰然後脩之則功成事定誰與制禮作樂者哉又貴游之子未必有斬將搴旗之才亦未必有從軍征戍之役不及盛年講肄道義使明珠加瑩磨之功荊隨發采琢之美不亦良可惜乎臣愚以世喪道久民情玩于所習純風日去華競白彰猶火之消膏而莫之覺也今天地造始萬物權輿聖朝以神武之德值革命之運蕩近世之流獘繼千載之絕軌篤道崇儒創立大業明主唱之于上宰輔督之于下夫人之所好下必有過之者焉是故雙劍之節崇而飛白之俗成挾琴之容飾而赴曲之和作君子之德風小人之德草實在所以感之而已臣以闇淺不能遠識格言奉誦明令慷慨下風謂宜以三時之隙漸就經始宋書禮志一建武初散騎常侍戴邈上表又見晉書戴邈傳小有刪節丁潭為琅邪王行終喪禮議古者諒闇三年不言下及周世稅衰效命春秋之時天子諸侯既葬而除此所謂三代損益禮有不同故三年之喪由此而廢然則漢文之詔合于隨時凡有國者皆宜同也非唯施于帝皇而已按禮殤與無後降于成人有後既葬而除今不得以無後之故而獨不除也愚以丁郎中應除衰麻自宜主祭以終三年晉書丁潭傳東海王為新蔡王殤服議諸侯體國備物典事不異成人宜從成人之制通典八十二議王式事宰我欲短三年之喪孔子謂之不仁今王式不忍哀愴之情率意違禮服已絕之服可謂觀過知仁伯魚子路親聖人之門子路有當除不除之過伯魚有既除猶哭之失以式比之亦無所媿勵薄之義矯枉過正苟在于厚恕之可也通典九十四大興三年淮南小中正王式繼母先嫁有繼子後嫁式父式父臨終繼母求出式父許有遺命及式父亡母制服積年後還前繼子家及亡與前夫合葬式追服周國子祭酒杜夷議以為云云駮荀組所陳表議荀組雖慮宗胤永絕魂靈餒而莫祀亦何可不念父母之恩或餬口于四方或己死而不服視死猶生也或未死而服之視生猶死也恐視死猶生賢于視生猶死也且又死之與生非意所度春秋甲戍己丑陳侯鮑卒信則傳信疑則傳疑謂此宜疑之以避不敏通典九十八墓毀服議墓既脩復而後聞問宜依春秋新宮之災哭而不服通典一百二遺命吾少不出身頃雖見羈錄冠舄之飾未嘗加體其角巾素衣斂以時服殯葬之事務從𥳑儉亦不須苟取矯異也晉書杜夷傳葛洪遐觀賦蜈蚣大者長百步頭如車箱可畏惡越人獵之屠裂取肉白如瓠稱金爭買以多為美御覽九百四十六西京雜記序洪家世有鎦子駿漢書一百卷無首尾題目但以甲乙丙丁紀其卷數先人傳之于歆欲撰漢書編錄漢事未得締搆而亡故書無宗本止雜記而己矣前後之次無事類之辨後好事者以意次第之始甲終癸為十秩秩十卷合為百卷洪家具有其書試以此記攷校班固所作殆是全取劉書有小異同耳并固所不取不過二萬許言今鈔出為二卷名曰西京雜記以裨漢書之闕耳後洪家遭火書籍都盡此兩卷在洪巾箱中常以自隨故得猶在劉歆所記世人稀有縱復有者多不備足見其首尾參錯前後倒亂亦不知何書罕能全錄恐年代稍久歆所撰遂沒并洪家此書二卷不知所出故序之云爾洪家後有漢武帝禁中起居注一卷漢武故事四卷世人稀有之者今并五卷為一秩庶免淪沒焉西京雜記影宋本抱朴子序洪體乏進趣之才偶好無為之業假令奮翅則能陵厲玄霄騁足則能追風躡景猶欲戢勁翮于鷦鶡之群藏逸跡于跛驢之伍豈況大塊稟我以尋常短羽造化假我以至駑之蹇足自十者審不能者止又豈敢力蒼蠅而慕沖天之舉策跛鱉而追飛兔之軌飾嫫母之篤陋求媒陽之美談推沙礫之賤質索千金于和肆哉夫僬僥之步而企及夸父之蹤近才所以躓礙也要離之嬴而強赴扛鼎之勢秦人所以斷筋也是以望絕于榮華之塗而志安乎窮圮之域藜藿有八珍之甘蓬蓽有藻梲之槳也故權貴之家雖咫尺弗從也知道之士雖艱遠必造也攷覽奇書既不少矣率多隱語難可卒解自非至精不能尋究自非篤勤不能悉見也道士弘博洽聞者寡而意斷妄說者眾至于時有好事者欲有所脩為倉卒不知所從而意之所疑又無足諮今為此書粗舉長生之理其至妙者不得宣之于翰墨蓋粗言較略以示一隅冀悱憤之徒省之可以思過半矣豈謂闇塞必能窮微畼遠乎聊論其所先覺者耳世儒徒知服膺周孔莫信神仙之書不但大而笑之又將謗毀真正故矛所著子言黃白之事名曰內篇其餘駮難通釋名曰外篇大凡內外一百一十六篇雖不足藏諸名山且欲緘之金匱以示識者自號抱朴子因以名書其餘所著碑誄詩賦百卷移檄章表三十卷神仙良吏隱逸集異等傳各十卷又鈔五經史漢百家之言方技雜事三百一十卷金匱藥方一百卷肘後要急方四卷晉書葛洪傳又今本抱朴子有此序關尹子序洪體存蒿艾之質偶好喬松之壽知道之士雖微賤必親也雖夷狄必貴也後遇鄭君思遠鄭君多玉笈瓊笥之書服餌開我以至道之良藥呼吸洗我以紫清之上味後屬洪以尹真人文始經九篇洪愛之誦之藏之拜之宇者道也柱者建天地也極者尊聖人也符者精神魂魄也鑑者心也匕者食也釜者化也籌者物也藥者雜治也洪每味之泠泠然若躡飛葉而遊乎天地之混溟茫茫乎若履橫校而浮乎大海味之渺漠超若處金碧琳琅之居森若握鬼魅神姦之印倏若飄鸞鶴怒若鬭虎兕清若浴碧慘若夢紅擒縱大道渾淪至理方士不能到先儒未嘗言可仰而不可攀可玩而不可執可鑒而不可思可符而不可言其忘物遺世者者之所言乎其絕跡去智者之所言乎其同陰陽而冥彼此者之所言乎何如此之尊高何如此之廣大又何如此之𥳑易也洪親受之咸和二年五月朔丹陽葛洪稚川序關尹子道藏本肘後備急方序肘後備急方序抱朴子丹陽葛稚川曰余既窮覽墳索以著述餘暇兼綜術數省仲景元化劉戴祕要金匱綠秩黃素方近將千卷患其混雜煩重有求難得故周流華夏九州之中收拾奇異捃拾遺逸選而集之使種類殊分緩急易𥳑凡為百卷名曰玉函然非有力不能盡寫又見周甘唐阮諸家各作備急既不能窮諸病狀兼多珍貴之藥豈貧家野居所能立辦又使人用鍼自非究習醫方素識明堂流注者則身中榮衛尚不知其所在安能用鍼以治之哉是使鳧鴈鷙擊牛羊搏噬無以異也雖有其方猶不免殘害之疾余今採其要約以為肘後救卒三卷率多易得之藥其不獲已須買之者亦皆賤價草石所在皆有兼之以灸灸但言其分寸不名孔穴凡人覽之可了其所用或不出乎垣籬之內顧眄可具苟能信之庶免橫禍焉世俗苦于貴遠賤近是古非今恐見此方無黃帝倉公和鵲踰跗之目不能採用安可強乎備急方明刻本養生論抱朴子曰一人之身一國之象也胸腹之設猶宮室也支體之位猶郊境也骨節之分猶百官也腠理之閒猶四衢也神猶君也血猶臣也氣猶民也故至人能治其身亦如明主能治其國夫愛其民所以安其國愛其氣所以全其身民獘國亡氣衰身謝是以至人上士乃施藥于未病之前不追脩于既敗之後故知生難保而易散氣難清而易濁若能審機權可以制嗜慾保全性命且夫善養生者先除六害然後可以延駐于百年何者是邪百曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰除佞妄一曰去沮嫉六者不除脩養之道徒設爾蓋緣未見其益雖心希妙道口念真經咀嚼英華呼吸景象不能補其短促誠緣捨其本而忘其未深可誡哉所以保和全真者乃少思少念少笑少言少喜少怒少樂少愁少好少惡少事少機夫多思則神散多念則心勞多笑則藏腑上翻多言則氣海虛脫多喜則膀胱納客風多怒則腠理奔血多樂則心神邪蕩多愁則頭鬢憔枯多好則志氣傾溢多惡則精爽奔騰多事則筋脈乾急多機則智慮沈迷斯乃伐人之生甚于斤斧損人之命猛于豺狼無久坐無久行無久視無久聽不飢勿強食不渴勿強飲不飢強食則脾勞不飲強飲則胃脹體欲常勞食欲常少勞勿過極少勿至飢冬朝勿空心夏夜勿飽食早起不在雞鳴前晚起不在日出後心內澄則真神守其位氣內定則邪物去其身行欺詐則神悲行爭競則神沮輕侮于人當減算殺害于物必傷年行一善則魂神樂搆一惡則魄神歡常以寬泰自居恬淡自守則身形安靜災害不干生錄必書其名死籍竹削其咎養生之理盡于此矣至于鍊還丹以補腦化金液以留神斯乃上真之妙道蓋非食穀啗血者越分而脩之萬人之中得者殊少深可誡焉老君曰存吾此道上士全脩延壽命中士半修無災病下士時修免夭橫愚者失道擯其性其斯之謂與道藏臨五
