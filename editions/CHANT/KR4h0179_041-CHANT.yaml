body:
  text: 卷四十一劉頌上疏請復肉刑臣昔上行肉刑從來積年遂寢不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過于此今死刑重故非命者眾生刑輕故罪不禁奸所以然者肉刑不用之所致也今為徒者類性元惡不軌之族也去家懸遠作役山谷無衣食之資飢寒切身志不聊生又有廉士介節者苟慮不首死則皆為盜賊豈況本性奸頑無賴之徒乎又令徒富者輸財計日歸家乃無役之人也貧者起為奸盜又不制之虜也不刑則罪無所禁不制則群橫肆為法若此道不盡善也是以徒亡日屬賊盜日繁亡之數者至有十數得輒加刑日益一歲此為終身之徒也自顧反善無期而災困逼身其志亡思盜勢不得息事使之然也古者用刑以止刑及今反以刑生刑以徒生徒諸重犯亡者髮過三寸輒重髡之此以刑生刑也亡加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰囚不可不赦復從而赦之此謂刑不制罪法不勝奸民知法之不勝相聚而謀為不軌月異而歲不同故自頃年以來奸惡陵暴所在充斥漸以滋蔓日積不巳弊將所歸議者不深思此故而曰肉刑于名忤聽忤聽孰與盜賊不禁聖王之制肉刑遠有深理其事可得而言非徒心懲其畏剝割之痛而不為也乃去其為惡之具使夫奸民無用不復肆其志止奸絕本理之盡也亡者刖其足無所用復亡盜者截其手無所用復盜淫者割其勢理亦如之除惡塞源莫善于此又非徒然也此等已刑之後便各歸家父母妻子共相養恤不流離于道路有今之困創愈可役上準古制隨宜業作雖巳刑殘不為虛棄而所患都塞又生育繁阜之道自若也今宜取死刑之限重生刑之限輕及三犯逃亡淫盜悉以肉刑代之其三歲刑以下已自杖罰遣又宜制其罰數使有常限不得減此其有宜重者又任之官長應四五歲刑者皆髡笞笞至一百稍行使各有差悉不復居作然後刑不復生刑徒不復生徒而殘體為戮終身作誡民見其痛畏而不犯必數倍于今且為惡者隨發被刑去其為惡之具此為諸已刑者皆良士也豈與全其為奸之手足而蹴居必死之窮地同哉而猶曰肉刑不可用臣竊以為不識務之甚也臣昔常侍左右數聞明詔謂肉刑宜用事便于政願陛下信獨見之斷使夫能者得奉聖慮行之于令比填溝壑冀見太平周禮三赦三宥施于老幼悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之至乎如此猶自犯罪則必刑而無赦此政之理也暨至後世以時嶮多難因赦解結權以行之又不以寬罪人也至令恆以罪積獄繁赦以散之是以赦愈數而獄愈塞如此不巳將至不勝原其所由肉刑不用之故也今行肉刑之徒不積且為惡無具則奸息去此二端獄不得繁故無取于數赦于政體勝矣晉書刑法志通典一百六十八又蓺文類聚五十四御覽六百四十八引王隱晉書又群書治要二十九引晉書刑法志廷尉劉頌表案治要所引晉書皆王隱書也上疏言斷獄宜守律令自近世以來法漸多門令甚不一臣今備掌刑斷職思其憂謹具啟聞臣竊伏惟陛下為政每盡善故事求曲當曲當則例不得直盡善故法不得全何則夫法者固以盡理為當而上求盡善則諸下牽文就義以赴主之所許是以法不得全刑盡徵文徵文必有乖于情而上之聽斷安于曲當故執平者因文可引則生二端是法多門令不一則吏不知所守下不知所避姦偽者因法之多門以售其情所欲淺深苟斷不一則居上者難以檢下于是事同議異獄犴不平有傷于法古人有言人主詳其政荒人主明其事理詳匪他求盡善則法傷故其政荒也明者輕重之當雖不猒情苟入于文則議而行之故其事理也夫善用法者忍違情不厭聽之斷輕重雖不允人心經于凡覽若不可行法乃得直又君行之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫弘斷郭解之獄也人主權斷若漢祖戮丁公之為也天下萬事自非斯格重為故不近似此類不得出法以意妄議其餘皆以律令從事然後法信于下民聽不惑吏不容奸可以言政人主執斯格以責群下大臣小吏各守其局則法一矣古人有言善為政者因人設教因人設教制法之謂也又曰隨時之宜當務之謂也然則因人隨時在大量也而制其法法軌既定則行之行之信如四時執之堅如金石群吏豈得在成制之內復稱隨時之宜傍引因人設教以亂政典哉何則始制之初固巳因人而隨時矣今若設法未盡當則宜改之若謂已善不得盡以為制而使奉用之司公得出入以差輕重也夫人君所與天下共者法也已令四海不可以不信為教方求天下之不慢不可繩以不信之法且先識有言人至愚而不可欺也不謂平時背法意斷不勝百姓願也上古議事以制不為刑辟夏殷及周書法象魏三代之君齊聖然咸棄曲當之妙鑒而任徵文之直準非聖有殊所遇異也今論時敦朴不及中古而執平者欲適情之所安自託于議事以制臣竊以為聽言則美論理則違然天下至大事務眾雜時有不得悉循文如令故臣謂宜立格為限使主者守文死生以之不敢錯思于成制之外以差輕重則法恆全事無正據名例不及大臣論當以釋不滯則事無閡至如非常之斷出法賞罰若漢祖戮楚臣之私己封趙氏之無功唯人主專之非奉職之臣所得擬議然後情求傍請之迹絕似是而非之奏塞此蓋齊法之大準也主者小吏處事無常何則無情則法徒充有情則撓法積充似無私然乃所以得其私又恆所岨以衛其身斷當恆充世謂盡公時一曲法迺所不疑故人君不善倚深似公之斷而責守文如令之奏然後得為有檢此又平法之一端也夫出法權制措施一事厭情合聽可適耳目誠有臨時當意之快勝于徵文不允人心也然起為經制終年施用恆得一而失十故小有所得者必大有所失近有所漏者必遠有所苞故諳事識體者善權輕重不以小害大不以近妨遠忍曲當之近適以全𥳑直之大準不牽于凡聽之所安必守徵文以正例每臨其事恆御此心以決斷此又法之大概也又律法斷罪皆當以法律令正文若無正文依附名例斷之其正文名例所不及皆勿論法吏以上所執不同得為異議如律之文守法之官惟常奉用律令至于法律之內所見不同迺得為異議也今限法曹郎令史意有不同為駁唯得論釋法律以正所斷不得援求諸外論隨時之宜以明法官守局之分晉書刑法志劉頌為三公尚書又上疏云云蓺文類聚五十四劉頌刑獄奏云云又見通典一百六十六趙王倫加九錫議昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣竝無九錫之命違舊典而習權變非先王之制九錫之議請無所施晉書劉頌傳雁賦鳴相相和行則接武前不絕貫後不越序齊力不期而竝至同趣不要而自聚當其赴節則萬里不能足其路苟泛一壑則眾物不能易其所臨空不能頓其翼揚波不能瀸其羽排雲墟以頡頏汰弱波以容與進淩鸞于泰清退嬉魚乎玄渚浮若漂舟乎江之濤色若委雪于喦之阿邕邕兮悲鳴乎雲閒因飛臨虛厲清和眇眇兮瞥若入清塵扶日拂翼粲光羅蓺文類聚九十一初學記三十引兩條讓開府表臣祜言臣昨出伏聞恩詔拔臣使同台司臣自出身巳來適十數年受任外內每極顯重之地常以智力不可強進恩寵不可久謬夙夜戰慄以榮為憂臣聞古人之言德未為眾所服而受高爵則使才臣不進功未為眾所歸而荷厚祿則使勞臣不勸今臣身託外戚事遭運會誡在寵過不患見遺而猥超然降發中之詔加非次之榮臣有何功可以堪之何心可以安之以身誤陛下辱高位傾覆亦尋而至願復守先人弊廬豈可得哉違命誠忤天威曲從即復若此蓋聞古人申于見知大臣之節不可則止臣雖小人敢緣所蒙念存斯義今天下自服化已來方漸八年雖側席求賢不遺幽賤然臣等不能推有德進有功使聖聽知勝臣者多而未達者不少假令有遺德于版築之下有隱才於屠釣之閒而令朝議用臣不以為非臣處之不以為愧所失豈不大哉且臣忝竊雖久未若今日兼文武之極寵等宰輔之高位也臣所見雖狹據今光祿大夫李喜秉節高亮正身在朝光祿大夫魯芝絜身寡欲和而不同光祿大夫李胤莅政弘𥳑在公正色皆服事華髮以禮終始雖歷內外之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望少益日月是以誓心守節無苟進之志今道路未通方隅多事乞留前恩使臣得速還屯不爾留連必于外虞有闕臣不勝憂懼謹觸冒拜表惟陛下察匹夫之志不可以奪文選晉書羊祜傳御覽四百二十四引王隱晉書讓封南城侯表昔張良請受留萬戶漢祖不奪其志臣受鉅平于先帝敢辱重爵以速官謗晉書羊祜傳請伐吳疏先帝順天應時西平巴蜀南和吳會海內得以休息兆庶有樂安之心而吳復背信使邊事更興夫期運雖天所受而功業必由人而成不一大舉掃滅則眾役無時得安亦所以隆先帝之勳成無為之化也故堯有丹水之伐舜有三苗之征咸以寍靜宇宙戢兵和眾者也蜀平之時天下皆謂吳當竝亡自此來十三年是謂一周平定之期復在今日矣議者常言吳楚有道後服無禮先強此乃諸侯之時耳當今一統不得與古同諭夫適道之論皆未應權是故謀之雖多而決之欲獨凡以險阻得存者謂所敵者同力足自固苟其輕重不齊強弱異勢則智士不能謀而險阻不可保也蜀之為國非不險也高山尋雲霓深谷肆無景束馬懸車然後得濟皆言一夫荷戟十人莫當及進兵之日曾無藩籬之限斬將搴旗伏尸數萬乘勝席捲徑至成都漢中諸城皆鳥棲而不敢出非皆無戰心誠力不足相抗至劉禪降服諸營堡者索然俱散今江淮之難不過劍閣山川之險不過岷漢孫皓之暴侈于劉禪吳人之困甚于巴蜀而大晉兵眾多于前世資儲器械盛于往時今不于此平吳而更阻兵相守征夫苦役日尋干戈經歷盛衰不可長久宜當時定以一四海今若引梁益之兵水陸俱下荊楚之眾進臨江陵平南豫州直指夏口徐揚青兗竝向秣陵鼓旆以疑之多方以誤之以一隅之吳當天下之眾勢分形散所備皆急巴漢奇兵出其空虛一處傾壞則上下震蕩吳緣江為國無有內外東西數千里以藩籬自持所敵者大無有寍息孫皓恣情任意與下多忌名臣重將不復自信是以孫秀之徒皆畏逼而至將疑于朝士困于野無有保世之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死巳可知也其俗急速不能持久弓弩戟楯不如中國唯有水戰是其所便一入其境則長江非復所固還保城池則去長入短而官軍懸進人有致節之志吳人戰于其內有憑城之心如此軍不踰時剋可必矣晉書羊祜傳與從弟琇書吾以布衣忝荷重任每以尸素為愧大命既隆唯江南未夷此人臣之責是以不量所能畢力吳會當憑朝廷之威賴士大夫之謀以全克之舉除萬世之患年已朽老既定邊事當有角巾東路還歸鄉里于墳墓側為容棺之墟假日視息思與後生味道此吾之至願也以凡才而居重位何能不懼盈滿以受責邪疏廣是吾師也聖主明恕當不奪微志爾蓺文類聚二十六御覽六百八十七又略見晉書羊祜傳與吳都督陸抗此上藥也近始自作未及服以君疾急故相致吳志陸抗傳注引漢晉春秋誡子書吾少受先君之教能言之年便召以典文年九歲便誨以詩書然尚猶無鄉人之稱無清異之名今之職位謬恩之加耳非吾力所能致也吾不如先君遠矣汝等復不如吾諮度弘偉恐汝兄弟未之能也奇異獨達察汝等將無分也恭為德首慎為行基願汝等言則忠信行則篤敬無口許人以財無傳不經之談無聽毀譽之語聞人之過耳可得受口不得宣思而後動若言行無信身受大謗自入刑論豈復惜汝恥及祖考思乃父言纂乃父教各諷誦之蓺文類聚二十三止盜議昔楚江乙母失布以為盜繇令尹公若無欲盜宜自止何重法為晉書羊祜傳時京兆多盜竊楊駿欲更重其法盜百錢加大辟請官屬會議亮云云駿慚而止衛公碑仰睎遐風重暉冠世文選袁宏三國名臣贊注
