body:
  text: 陸喜自敘劉向省新語而作新序桓譚詠新序而作新論余不自量感子雲之法言而作言道覩賈子之美才而作訪論觀子政洪範而作古今厤覽蔣子通萬機而作審機讀幽通思玄四愁而作娛賓九思真所謂忍愧者也晉書陸喜傳西州清論較論格品篇或問予辥瑩最是國士之第一者乎荅曰以理推之在乎四五之閒問者愕然請問荅曰夫孫皓無道肆其暴虐若龍蛇其身沈默其體潛而勿用趣不可測此第一人也避尊居卑祿代耕養玄靜守約沖退澹然此第二人也侃然體國思治心不辭貴以方見憚執政不懼此第三人也斟酌時宜在亂猶顯意不忘忠時獻微益此第四人也溫恭脩慎不為諂首無所云補從容保寵此第五人也過此已往不足復數故第二已上多淪沒而遠悔吝第三已下有聲位而近咎累是以深識君子晦其明而履柔順也問者曰始聞高論終年啟寤矣晉書陸喜傳上表自陳臣實凡短風操不立階緣嘉會便蕃榮顯遂總括憲臺豫聞政道竟不能敷融玄風清一朝序咎責之來于臣已重誠以身許國義忘曲讓而慺慺所守終于陳訴者特以端右機要事務殷多臣已盈六十之年智力有限疾患深重體氣日弊朝夕自勵非復所堪若偃息苟免職事竝廢則莫大之悔天下將謂臣何乞陛下披豁聖懷霈然垂允晉書陸玩傳重表臣比披誠款不足上畼天聰聖恩徘徊厲以體國臣聞至公之道上下互同用才不負其長量力不受其短雖加官重祿無世不有皆庸勳親賢時所須賴兼統以濟世務非優崇以榮一人臣受遇三世恩隆寵厚豈敢辭職事之勞求沖讓之譽徒以端右要重興替所存久以無任妨賢曠職臣猶自知不可況天下之人乎今復外參論道內統百揆不堪之名有如皎日願陛下少垂哀矜使四海知官不可以私于人人不可以私取官則天工弘坦誰不謂允晉書陸玩傳疾甚上表臣嬰遘疾疢沈頓歷月不蒙痊損而日夕漸篤自省微緜無復生望荷恩不報孤負已及仰瞻天覆伏枕霣涕臣年向中壽窮極寵榮終身歸全將復何恨惟願陛下崇明聖德弘敷宏化會構祖宗之基道濟群生之命臣不勝臨命遺戀之情貪及視息上表以聞晉書陸玩傳與王導牋僕雖吳人幾為傖鬼晉書陸玩傳玩嘗詣導食酪因而得疾與導牋為吳主皓請降書為吳主皓請降書吳郡孫皓叩頭死罪昔漢室失統九州分裂先人因時略有江南遂分阻山川與魏乖隔今大晉龍興德覆四海闇劣偷安未喻天命至于今者猥煩六軍衡蓋路次遠臨江渚舉國震惶假息漏刻敢緣天朝含弘光大謹遣私署太常張夔等奉所佩印綬委質請命惟垂信納以濟元元吳志孫皓傳晉書王濬傳後漢紀光武贊王莽之際天下雲亂英雄并發其跨州據郡僭制者多矣人皆冀于非望然攷其聰明仁勇自無光武儔也宏寬博納計慮如神是以在任光竇融望風景附馬援一見睹顏識奇故能以十數年間埽除群凶清復海內豈非天之所輔贊哉古者師不內御而光武命將皆授以方略使奉圖而進其違失無不折傷意豈文史之過乎不然雖聖人其猶病諸御覽九十一明帝贊明帝自在儲宮而聰允之德著矣及臨萬幾約身率禮恭奉遺業一以貫之雖夏啟周成繼體持統無以加焉是以四海乂安四夷賓服斷獄希少有治平之風號曰顯宗不亦宜乎御覽九十一章帝贊章帝以繼世承平天下無事敬奉神明友于兄弟悉省徭賦綏靜兆民除苛法蠲禁錮抑有仁賢之風矣是以陰陽洽和而百姓安樂眾瑞并集不可勝載攷之圖籍有徵云爾御覽九十一安帝贊安帝之初委政太后十有餘年及親萬幾佞邪始進閹宦用事寵加私愛阿母王聖勢傾朝廷遂樹奸黨搖動儲副山陵未乾蕭牆作難兵交禁省社稷殆危御覽九十一桓帝贊漢德之衰有自來矣而桓帝繼之以淫暴封殖宦豎群妖滿側奸黨彌興賢良被辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉御覽九十二靈帝贊漢氏中興至于延平而世業損矣沖質短祚孝桓無嗣母后稱制奸臣執政孝靈以支庶而登至尊由蕃侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服橫流官以賄成自公侯卿士降于皁隸遷官襲級無不以貨刑戮無辜摧扑忠良佞諛在側直言不聞是以賢智退而窮處忠良擯于下位遂至奸雄蠭起法防隳壞夷狄并侵盜賊麋沸小者帶城邑大者連州郡編戶騷動人人思亂當此之時已無天子矣會靈帝即世盜賊相尋其後宮室焚滅郊社無主危自上起覃及華夏使京室為墟海內蕭條豈不痛哉御覽九十二脩列吳事胡沖意性調美心趣解畼有刀筆閑于時事為中書令雖不能匡矯亦自守不苟求容媚初學記十一擊壤賦論眾戲之為樂獨擊壤之可娛因風託勢罪一殺御覽七百五十五藏彄賦序藏彄賦序余以臘之後因祭祀餘胙要命中外以行藏彄為戲心悅其事故賦之云御覽三十二又七百五十四通桑梓敬議竊見今編戶之人本或僑寓則不為所居之國脩拜揖之敬先人舊壤追為盡禮愚懷淺短良有疑焉夫人道繁衍宗流遐大根生一冑枝播萬緒故繁曠之枝異統則聖人檢之以禮憲萬條之流難紀故王者制之以境域是以古人當其理也則君有常邑仕有定邦爰及六國至于末代全固之業傾瓜分之務起農夫不得安其耕爵士不得食其祿孔子稱危邦不入亂邦不居是為離舊適新之制背否向泰之文于斯尚矣蓋離舊以其無道適新以其宜宗背否以其多難向泰以其可安可安則播殖于其野宜宗則振纓于其朝在家則人理足在官則臣道備人臣之義同而彼此之敬異余竊惑之昔孔子宋人也上自孔父逮于弗父何竝服事宋仕有代祿至于仲尼道崇闕里乃為魯人矣而春秋之作內魯外宋諱我過彰彼非以此徵之斷可識矣而觀今日僑居之族其先人始祖不出是國枝葉播越居之數代公實編戶而私則寓客營家則號為借壤進官則名曰寄通高容雅步不為有降一身居之尚在難安或父兄相承尊長遵襲近經數代遠或累朝學道講義習人之禮鄉舉里選假人之評居人之境以繁我條乘人之貸以濟我生由人之位以光我屬恃人之寵以輝我葉朝廷則祖考之所階山陵則神靈之所憑昔人思邵伯之愛尚敬甘棠之木況父母之所始卒而不知加尊推之于心豈道訓之謂哉又今人所追尊舊壤雖遠而為之敬者何也猶以有先業墳柏之故塋曩代桑梓之舊業耳蓋宗廟迭毀禮有降殺尊親之至父祖而已自此以上情輕服𥳑故大夫及士祭極三代明恩由近始禮以遠降也今遠禰之隳館何若近祖之先廬迭毀之墳柏何若祭祀之封璲曩代之官府何若父母之朝廷先業之囿苑何若今日之丘園雖古人有維桑與梓必恭敬止之文所謂桑梓宜以父祖為斷舊壤不復相由人無二主官無兩統愚謂宜為所寓之主以崇公敬為先人本邦脩私敬而已散手而跪捧袖而揖以示存舊過厚之意也通典六十八與劉頌書沙餳垂口之產御覽八百五十七石蜜遠國之貢味有可甘至尊以養性書鈔一百四十七引盛公子與劉岑書又一條作盛公子與劉煩書公即翁之誤岑煩即頌之誤奏殺李忽覺父以偷生破家以邀福子圉告歸懷嬴結舌忽無人子之道證父攘羊傷化汙俗宜在投畀以彰凶逆畢刑巿朝不足塞責御覽六百四十七引王隱晉書處為中書省事時女子李忽覺父北叛時殺父處奏云云奏可與弟敏書占者兵交使在其閒軍國固當舉信義以相高而聞疆場之上往往有襲奪互巿甚不可行弟慎無為小利而忘大備也晉書周浚傳浚在弋陽南北為互市而諸將多相襲奪以為功吳將蔡敏守于沔中其兄珪為將在秣陵與敏書圍棋賦命班爾之妙手制朝陽之柔木取坤象于四方位將軍乎五岳然後畫路表界玄質朱文曲直有正方而不圓算塗授卒三百惟群任巧于無主譬採菽乎中原于是攄妙思奮玄籌玩服色尚騂駒旅進旅退二騎迭驅翻翻馬合落落星敷各嘯歌以發憤運變化以相符乍似戲鶴之干霓入類狡兔之繞丘散象乘虛之飛電聚類絕貫之積珠然後枕以大羅繕以城郭綴以懸險經以絕落眇望翼舒翱翔容弈彎掌南指情實西射揚塵奄迹雖動詳悉或臨局寂然惟棋是陳靜昧無聲潛來若神抑舒之役成子之賢也或聲手俱發諠譁操擾色類不定次措無已再衰三竭銳氣已朽登軾望轍其亂可取也爾乃心鬭犇競勢使揮謙攜手詆欺朱顏妬嫌然局不弘席子不盈捲秉二儀之極要握眾巧之至權若八卦之初兆遂消息乎天文屈則尺蠖舒則龍翻崔嵬雲起巃嵸浪傳崟岑山結沓如霧分靜若清夜之列宿動若彗之互奔殿未結而算了隸首不得窺其門扃覆亂而不惑斫桑不足識其源或設死而稱枉皋陶不能治其怨或巧逸以樂胥后夔不足以之讚我云勢貌多以孰能究傳遠來近取予一以貫蓺文類聚七十四鬭鳧賦嘉乾黃之散授何氣化之有靈產羽蟲之麗鳧惟鬭鴨之最精稟離午之淑氣體鸞鳳之妙形服文藻之華羽備豔采之翠英冠綠葩以曜首綴素色以點纓性浮捷以輕躁聲清響而好鳴感秋商之肅烈從金氣以出征招爽敵于戲門交武勢于川庭爾乃振勁羽竦六翮抗嚴趾望雄敵忽雷起而電發赴洪波以奮擊蓺文類聚九十一御覽九百十九與刺史周俊書一日侍坐言及吳士詢于芻蕘遂見下問造次承顏載辭不舉敕令條列名狀退輒思之今稱疏所知吳展字士季下邳人忠足矯非清足厲俗信可結神才堪榦世仕吳為廣州刺史吳郡太守吳平還下邳閉門自守不交賓客誠聖王之老成明時之儁乂也朱誕字永長吳郡人體履清和黃中通理吳朝舉賢良累遷議郎今歸在家誠理物之至德清選之高望也嚴隱字仲弼吳郡人稟氣清純思度淵偉吳朝舉賢良宛陵令吳平去職九皋之鳴鶴空谷之白駒也張畼字威伯吳郡人稟性堅明志行清朗居磨涅之中無淄磷之損歲寒之松柏幽夜之逸光也世說賞譽篇注引洪集孤奮論見晉書文苑王沈傳亡通語異宮同爵共位別職興仁隆化幽贊神明者謂之太尉和五教理人倫使風行俗平萬國咸寍者謂之司徒使國無枉理法錯刑清事均民聚者謂之司空若仁義之路開和平之氣通則五星順行庶績咸熙御覽二百六引古今通語鯨魚燈賦橫海之魚厥號為鯨普彼鱗族莫之與京大秦美焉乃觀乃詳寫載其形託于金燈隆脊矜尾鬐甲舒張垂首俛視蟠于華房狀欣欣以竦峙若將飛而未翔懷蘭膏于胸臆明制節之謹度伊工巧之奇密莫尚美于斯器因綺麗以致用設機變而罔匱匪雕文之足瑋差利事之為貴永作式于將來跨千載而弗墜蓺文類聚八十奇布賦維泰康二年安南將軍廣州牧滕侯作鎮南方余時承乏忝備下僚俄而大秦國奉獻琛來經于州眾寶既麗火布尤奇乃作賦曰伊荒服之外國建大秦以為名仰皇風而悅化超重譯而來庭貢方物之綺麗亦受氣于妙靈美斯布之出類稟太陽之純精越常品乎意外獨詭異而特生森森豐林在海之洲煌煌烈火禁焉靡休天性固然滋殖是由芽萌炭中穎發燼隅葉因爓潔翹與炎敷焱榮華實焚灼萼珠丹輝電近彤炯星流飛耀衝霄光赫天區惟造化之所陶理萬端而難察燎無爍而不燋在茲林而獨昵火焚木而弗枯木吐火而無竭同五行而竝在與大椿其相率乃採乃析是紡是績每以為布不盈數尺以為布帊服之無斁既垢既汙以焚為濯投之朱鑪載燃載赫停而冷之皎潔凝白蓺文類聚八十五上牋請優贈顧榮昔賊臣陳敏憑寵藉權滔天作亂兄弟姻婭盤固州郡咸逼士庶以為臣僕于時賢愚計無所出故散騎常侍安東軍司嘉興伯顧榮經德體道謀猷弘遠忠貞之節在困彌厲崎嶇艱險之中逼迫姦逆之下每惟社稷發憤忼愾密結心腹同謀致討信著群士名冠東夏德聲所振莫不響應荷戈駿奔其會如林榮躬當矢石為眾率先忠義奮發忘家為國歷年逋寇一朝土崩兵不血刃蕩平六州勳茂上代義彰天下伏聞論功依故大司馬齊王格不在帷幕密謀參議之例下附州征野戰之比不得進爵拓土賜拜子弟遐邇同歎江表失望齊王親則近屬位為方嶽杖節握兵都督近畿外有五國之援內有宗室之助稱兵彌時役連天下元功雖建所喪亦多榮眾無一旅任非藩翰孤絕江外王命不通臨危獨斷以身殉國官無一金之費人無終朝之勞元惡既殄高尚成功封閉倉廩以俟大軍故國安物阜以義成俗今日匡霸事舉未必不由此而隆也方之于齊強弱不同優劣亦異至于齊府參佐扶義助彊非創謀之主皆錫珪受瑞或公或侯榮首建密謀為方面盟主功高元帥賞卑下佐上虧經國紀功之班下孤忠義授命之士夫考績幽明王教所崇況若榮者濟難寍國應天先事歷觀古今未有立功若彼酬報如此者也晉書顧榮傳上言州兵不宜減交土荒裔斗絕一方或重譯而言連帶山海又南郡去州海行千有餘里外距林邑纔七百里夷帥范熊世為逋寇自稱為王數攻百姓且連接扶南種類猥多朋黨相倚負險不賓往隸吳時數作寇逆攻破郡縣殺害吏民臣以尩駑昔為故國所采偏戍在南十有餘年雖前後征討翦其魁桀深山僻穴尚有逋竄又臣所統之卒本七千餘人南土溫溼多有氣毒加累年征討死亡減秏其見在者二千四百二十人今四海混同無思不服當卷甲消刃禮樂是務而此州之人識義者寡猒其安樂好為禍亂又廣州南岸周旋六千餘里不賓屬者乃五萬餘戶乃桂林不羈之輩復當萬戶至于服從官伇纔五千餘家二州脣齒唯兵是鎮又寍州興古接據上流去交阯郡千六百里水陸竝通互相維衛州兵未宜約損以示單虛夫風塵之變出于非常臣亡國之餘議不足采聖恩廣厚猥垂飾擢蠲其罪釁改授方任去辱即寵拭目更視誓念投命以報所受臨履所見謹冒瞽陳晉書陶璜傳吳既平減州郡兵璜上言上言寬合浦珠禁合浦郡土地磽确無有田農百姓唯以采珠為業商賈去來以珠貿米而吳時珠禁甚嚴慮百姓私散好珠禁絕來去人以飢困又所調猥多限每不充今請上珠三分輸二次者輸一麤者蠲除自十月訖二月非采上珠之時聽商旅往來如舊晉書陶璜傳上疏請振荒當今天下不普荒儉唯獨東土穀價偏貴便相鬻賣聲必遠流北賊聞此將窺疆場如愚臣意不如開倉廩以賑之晉書陶回傳回遷吳興太守時人饑穀貴三吳尢甚詔欲聽相鬻賣以拯一時之急回上疏云云不待報輒便開倉
