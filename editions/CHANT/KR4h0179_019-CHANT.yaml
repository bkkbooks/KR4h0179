body:
  text: 王導轉陳耽謝鸞教丹陽從事陳耽器局弘正可轉主簿吳興從事謝鸞才幹正直可轉西曹御覽二百六十五引王丞相集祭衛玠教衛洗馬明當改葬此君風流名士海內民望可修三牲之祭敦舊好御覽五百五十五引衛玠別傳求別駕教顧和理識清敏劭令端古宜得其才以為別駕通典三十二引王丞相集表臣乞得除中書監持節專壹所司竭誠保傅惟力是視御覽二百二十引王導表上疏論諡法臣聞大行受大名小行受小名則實稱不誣而已近代以來惟爵得諡武官牙門有爵必諡卿校常伯無爵悉不賜諡甚失制諡之本今中興肇建勳德兼備宜深體前訓使行以諡彰豈可限以有爵書鈔九十四王遵上疏蓺文類聚四十引中興書作王導御覽五百六十二引晉中興書作王遵上疏案王導諡文獻御覽下條引宋書王儉卒禮官欲依王遵諡為文獻證知是王導之誤東晉初無王遵也上疏請自貶徐龕叛戾久稽天誅臣創議征討調舉羊鑒鑒闇懦覆師有司極法聖恩降天地之施全其首領然臣受重任總錄機衡使三軍挫衂臣之責也乞自貶黜以穆朝倫晉書王導傳請建立國史疏夫帝王之迹莫不必書著為令典垂之無窮宣皇帝廓定四海武皇帝受禪於魏至德大勳等蹤上聖而紀傳不存於王府德音未被乎管絃陛下聖明當中興之盛宜建立國史撰集帝紀上敷祖宗之烈下紀佐命之勳務以實錄為後代之準厭率土之望悅人神之心斯誠雍熙之至美王者之弘基也宜備史官敕佐著作郎干寶等漸就撰集晉書干寶傳上疏請修學校夫治化之本在於正人倫人倫之正存乎設庠序庠序設而洽五教明則德化洽通彝倫攸敘有恥且格也父子兄弟夫婦長幼之序順而君臣之義固矣易所謂正家而天下定者也故聖王蒙以養正少而教之使化沾肌骨習以成性有若自然日遷善遠罪而不自知行成德立然後裁之以位雖王之嫡子猶與國子齒使知道而後貴其取才用士咸先本之於學故周禮鄉大夫獻賢能之書於王王拜而受之所以尊道而貴士也人知士之所貴由乎道存則退而修其身修其身以及其家正家以及於鄉學於鄉以登於朝反本復始各求諸己敦素之業著浮偽之道息教使然也故以之事君則忠用之莅下則仁即孟軻所謂未有仁而遺其親義而後其君者也自頃皇綱失統禮教陵替頌聲不興於今二紀傳曰三年示為禮禮必壞三年不為樂樂必崩而況如此其久者乎先進漸忘揖讓之容後生唯聞金革之響干戈日尋俎豆不設先王之道彌遠華偽之風遂滋非所以習民靖俗端本抑末之謂也殿下以命世之資屬當傾危之運禮樂征伐翼成中興將滌穢蕩瑕撥亂反正誠宜經綸稽古建明學校闡揚六蓺以訓後生使文武之道墜而復興方今小雅盡廢戎虜扇熾節莪陵遲國恥未雪忠臣義士所以扼腕拊心禮樂政刑當竝陳以俱濟也苟禮義膠固純風載洽則化之所陶者廣而德之所被者大義之所屬者深而威之所振者遠矣由斯而進則可朝服濟河使帝典闕而復補王綱弛而更張饕餮改情獸心革面揖讓而蠻夷服緩帶而天下從得乎其道者豈難也哉故有虞舞干戚而三苗化魯僖作泮宮而淮夷平桓文之霸皆先教而後戰今若聿遵前典興復教道使朝之子弟竝入於學立德出身者咸習之而後通德路開而偽塗塞則其化不肅而成不嚴而治矣選明博脩禮之士以為之師隆教貴道化成俗定莫尚於斯也宋書禮志一建武初驃騎將軍王導上疏又晉書王導傳作上書有刪節議復肉刑肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改也豈是漢文常主所能易者乎時蕭曹已沒絳灌之徒不能正其義逮班固深論其事以為外有輕刑之名內實殺人又死刑太重生刑太輕生刑縱於上死刑怨於下輕重失當故刑政不中也且原先王之造刑也非以過怒也非以殘民也所以救奸所以當罪也今盜者竊人之財淫者好人之色亡者避叛之役皆無殺害也則刖之以刑刑之則止而加之斬戮戮過其罪死不可生縱虐於此歲以巨計此乃仁人君子所不忍聞而況行之於政乎若乃惑其名而不練其實惡其生而趣其死此畏水投舟避坎陷井愚夫之不若何取於政哉今大晉中興遵復古典率由舊章起千載之滯義拯百殘之遺黎使皇典廢而復存黔首死而更生至義暢於三代之際遺風播乎百世之後生肉枯骨惠侔造化豈不休哉惑者乃曰死猶不可懲而況於刑然民者冥也其至愚矣雖加斬戮忽為灰土死事日往生欲日存未以為改若刑諸市朝朝夕鑒戒刑者思為惡之永痛惡者覩殘刖之長廢故足懼也然後知先王之輕刑以御物顯誡以懲愚其理遠矣晉書刑法志又見群書治要二十九引晉書又通典一百六十八議追贈周札札在石頭忠存社稷義在亡身至於往年之事自臣等有識以上與札情豈有異此言實貫於聖鑒論者見姦逆既彰便欲徵往年已有不臣之漸即復使爾要當時眾所未悟既悟其姦萌札與臣等便以身許國死而後已札亦尋取梟夷朝廷檄命既下大事既定便正以為逆黨邪正失所進退無據誠國體所宜深惜臣謂宜與周顗戴若思等同例晉書列傳周札傳重議周札贈諡省令君議必札之開門與誰王周戴異今札開門直出風言竟實事邪使以風言定襃貶意莫若原情考徵也論者謂札知隗協亂政信敦匡救苟匡救信姦佞除即所謂流四凶族以隆人主巍巍之功耳如此札所以忠於社稷也後敦悖謬出所不圖札亦闔門不同以此滅族是其死於為義也夫信敦當時之匡救不圖將來之大逆惡隗協之亂政不失為臣之貞節者於時朝士豈惟周札邪若盡謂不忠懼有誣乎譙王周戴各以死衛國斯亦人臣之節也但所見有同異然期之於必忠故宜申明耳即如令君議宋華齊高其在隗協矣昔子糾之難召忽死之管仲不死若以死為賢則管仲當貶若以不死為賢則召忽死為失先典何以兩通之明為忠之情同也死雖是忠之一目亦不必為忠皆當死也漢祖遺約非劉氏不王非功臣不侯違命天下共誅之後呂后王諸呂周勃從之王陵廷爭可不謂忠乎周勃誅呂尊文安漢社稷忠莫尚焉則王陵又何足言而前史兩為美談固知死與不死爭與不爭苟原情盡意不可定於一概也且札闔棺定諡違逆黨順受戮凶邪不負忠義明矣晉書周札傳請原羊聃啟聃罪不容恕宜極重法山太妃憂戚成疾陛下罔極之恩宜蒙生存之宥晉書羊曼傳遷丹陽太守上牋昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過別部司馬以此格萬物得不局跡乎今者臨郡不問贀愚豪賤皆加重號輒有鼓蓋動見相準時有不得者或為恥辱天官混雜朝望穨毀導忝荷重任不能崇浚山海而開導亂源饕竊名位取紊彝典謹送鼓蓋加崇之物請從導始庶令雅俗區別群望無惑晉書王導傳通典三十三與賀循書論虞廟王所崇惜者體也未敢當正位入廟及毀廢之所不知便可得爾不通典四十七戴若思欲於七廟立后別室同上又與賀循書問即位告廟或謂宜祭壇拜受天命者或謂直當稱億兆群臣告四祖之廟而行者若爾當立行廟主今固辭尊號俯順群情還依魏晉故事然魏晉皆稟命而行不知今進璽當云何通典五十五得刁僕射書曰如此京兆是宣帝祖章郡是父也至惠帝為七廟至懷帝京兆府君應落想足下亦是識刁侯不欲告惠懷二帝不知於禮云何通典五十五荅荀松書意謂君位永固無復蹔還子位之理惠帝至先帝雖四君今亦不以一君為一代何嫌二代之中重四君邪今廟尚居上祀何得居下若蹔下則逆祀也通典四十八荅陶侃書默居上流之勢如有松艦成資故包含隱忍使其有地一月潛嚴足下軍到是以得風發相赴豈非遵養時晦以定大事者邪晉書陶侃傳遺王含書近承大將軍困篤緜緜或云已有不諱悲怛之情不能自勝尋知錢鳳大嚴欲肆奸逆朝士忿憤莫不扼腕去月二十三日得征北告劉遐陶瞻蘇峻等深懷憂慮不謀同辭都邑大小及二宮宿衛咸懼有往年之掠不復保其妻孥是以聖主發赫斯之命具如檄旨近有嘉詔崇兄八命望兄獎群賢忠義之心抑奸細不逞之計當還武昌盡力藩任卒奉來告乃承與犬羊俱下雖當逼迫猶以罔然兄立身率素見信明於門宗年踰耳順位極人臣仲玉安期亦不足作佳少年本來門戶良可惜也兄之此舉謂可得如大將軍昔年之事乎昔年佞臣亂朝人懷不寍如導之徒心思外濟今則不然大將軍來屯於湖漸失人心君子危怖百姓勞弊將終之日委重安期安期斷乳來幾日又於時望便可襲宰相之迹邪自開闢以來頗有宰相孺子者不諸有耳者皆是將禪代意非人臣之事也先帝中興遺愛在人聖主聰明德洽朝野思與賢哲弘濟艱難不北面而執臣節乃私相樹建肆行威福凡在人臣誰不憤歎此直錢鳳不良之心聞於遠近自知無地遂唱姦逆至如鄧伯山周道和恆有好情往來人士咸皆明之方欲委任與共勠力非徒無慮而已也導門戶小大受國厚恩兄弟顯寵可謂隆矣導雖不武情在寍國今日之事明目張膽為六軍之首寍忠臣而死不無賴而生矣但恨大將軍桓文之勳不遂而兄一旦為逆節之臣負先人平素之志既沒之日何顏見諸父於黃泉謁先帝於地下邪執省來告為兄羞之旦悲且慚願速建大計惟取錢鳳一人使天下獲安家國有福故是竹素之事非惟免禍而已夫福如反手用之即是導所統六軍石頭萬五千人宮內後苑二萬人護軍屯金城六千人劉遐已至征北昨已濟江萬五千人以天子之威文武畢力豈可當乎事猶可追兄早思之大兵一奮導以為灼炟也晉書王敦傳與從子允之書太保安豐侯以孝聞天下不得辭司隸和長輿海內名士不免作中書令吾群從死亡略盡子弟零落遇汝如親如其不爾吾復何言晉書王允之傳時允之以父憂去職既葬除義興太守不拜導與書書省示具卿辛酸之至吾甚憂勞卿此事亦不蹔忘然書足下所欲致身處尚在彀中王制正自欲不得許卿當如何導亦天明往淳化閣帖二導白改朔情增傷感溼蒸事何如頗小覺損不帖有應足下懸耿連哀勞滿悶不具王導同上麈尾銘道無常貴所適惟理誰謂質卑御于君子拂穢清暑虛心以俟北堂書鈔一百三十四蓺文類聚六十九御覽七百三書得示知足下問吾故不差殊劣劣力不具王恬白淳化閣帖三伐廣固祭牙文敬建崇牙顯茲威靈使鳴金輟釁無戰有寍皇風幽被凱旆歸旌蓺文類聚六十御覽三百三十九臨吳郡上表前民辭求相鬻賣一則救命二則供官方今之要當課功受業又蟲鼠為害瓜麥蕩盡編戶僵屍葬埋無主闔門餓餒烟火不舉北堂書鈔一百五十六又御覽三十五引王洽集辭中書令表竊以中書職掌機管有由來矣漢武之世始建此職歷代時宜置廢遂重武帝朝荀勖張華竝為其任中興以來宰相居也北堂書鈔五十七引王洽集書洽白辱告承問洽故爾劣劣冀以復敘還日不具王洽再拜洽頓首言不孝禍深備紛嬰茶毒蔭恃亡兄仁愛之訓冀終百年永有憑奉何圖慈兄一旦背棄悲號哀摧肝心如抽痛毒煩冤不自堪忍酷當柰何痛當柰何重告惻至感增斷絕執筆哽涕不知所言洽頓首言淳化閣帖二洽頓首言兄子號毀不可忍視撫之摧心發言哽慟當復柰何柰何洽頓首言淳化閣帖二洽白向感塞不成敘得告承問殊乏劣白不具王洽再拜淳化閣帖二與林法師書洽稽首和南夫教之所由必畼物之所未悟物之所以通亦得之於師資雖元宗沖緬妙旨幽深然所以會之者固亦簡而易矣是以致雖遠必假近言以明之理雖昧必借朗喻以徵之故夫殆墜之旨略可得之於千載將絕之趣可悟之於一朝今本無之談旨略例坦然每經明之可謂眾矣然造精之言誠難為允理詣其極通之未易豈可以通之不易因廣同異之說遂令空有之談紛然大殊後學遲疑莫知所擬今道行指歸通敘色空甚有清致然未詳經文為有明旨邪或得之於象外觸類而長之乎今眾經甚多或取譬不遠豈無一言昭然易喻古人有云聖人之言可能使人信之不可能是以徵之於文未知所釋今故諮其數事思聞嘉誨以啟其疑洽頓首和南廣宏明集三十五書劭白明便夏節哀慕崩摧肝心抽絕煩冤彌深不自忍任痛當柰何當復柰何得告為慰腫轉差勞悴勿勿力及不次王劭再拜淳化閣帖三
