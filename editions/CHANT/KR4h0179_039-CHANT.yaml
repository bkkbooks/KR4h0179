body:
  text: 劉寔崇讓論古者聖王之化天下所以貴讓者欲以出賢才息爭競也夫人情莫不欲己之賢也故勸令讓賢以自明賢豈假讓不賢哉故讓道興賢能之人不求而自出矣至公之舉自立矣百官具任為百官之副亦豫具矣一官缺擇眾官所讓最多者而用之審之道也在朝之士相讓于上草廬之人咸皆化之推賢讓能之風從此生矣為國所讓則一國士也天下所共推則天下士也推讓之風行則賢與不肖灼然殊矣此道之行在上者無所用其心因成清議隨之而已故曰蕩蕩乎堯之為君莫之能名言天下自安矣不見堯所以化之故不能名也又曰舜禹之有天下而不與焉無為而化者其舜也歟賢人相讓于朝大才之人恆在大官小人不爭于野天下無事矣以賢才化無事至道興矣已仰其成復何與焉故可以歌南風之詩彈五弦之琴也成此功者非有他崇讓之所致耳孔子曰能以禮讓為國乎則不難也在朝之人不務相讓久矣天下化之自魏代以來登進辟命之士及在職之吏臨見授敘雖自辭不能終莫肯讓有勝己者矣夫推讓之風息爭競之心生孔子曰上興讓則下不爭明讓不興下必爭也推讓之道興則賢能之人日見推舉爭競之心生則賢能之人日見謗毀夫爭者之欲自先甚惡能者之先不能無毀也故孔墨不能免世之謗己況不及孔墨者乎議者僉然言世少高名之才朝廷不有大才之人可以為大官者山澤人小官吏亦復云朝廷之士雖有大官名德皆不及往時人也余以為此二言者皆失之矣非時獨乏賢也時不貴讓一人有先眾之譽毀必隨之名不得成使之然也雖令稷契復存亦不復能全其名矣能否混雜優劣不分士無素定之價官職有缺主選之吏不知所用但案官次而舉之同才之人先用者非勢家之子則必為有勢者之所念也非能獨賢因其先用之資而復遷之無已遷之無已不勝其任之病發矣觀在官之人政績無聞自非勢家之子率多因資次而進也向令天下貴讓士必由于見讓而後名成名成而官乃得用之諸名行不立之人在官無政績之稱讓之者必矣官無因得而用之也所以見用不息者由讓道廢也因資用人之有失久矣故自漢魏以來時開大舉令眾官各舉所知唯才所任不限階次如此者甚數矣其所舉必有當者不聞時有擢用不知何誰最賢故也所舉必有不當者而罪不加不知何誰最不肖也所以不可得知由當時之人莫肯相推賢愚之名不別令其如此舉者知在上者察不能審故敢漫舉而進之或舉所賢因及所念一頓而至人數猥多各言所舉者賢加之高狀相似如一難得而分矣參錯相亂真偽同貫更復由此而甚雖舉者不能盡忠其罪亦無由上聞聽察之路濫令其爾也昔齊王好聽竽聲必令三百人合吹而後聽之廩以數人之俸南郭先生不知吹竽者也以三百人合吹可以容其不知因請為王吹竽虛食數人之俸嗣王覺而改之難彰先王之過乃下令曰吾之好聞竽聲有甚于先王欲一一列而聽之先生于此逃矣推賢之風不立濫舉之法不改則南郭先生之徒盈于朝矣才高守道之士日退馳走有勢之門日多矣雖國有典刑弗能禁矣夫讓道不興之弊非徒賢人在下位不得時進也國之良臣荷重任者亦將以漸受罪退矣何以知其然也孔子以為顏氏之子不貳過耳明非聖人皆有過矣寵貴之地欲之者多矣惡賢能者塞其路其過而毀之者亦多矣夫謗毀之生非徒空說必因人之微過而甚之者也毀謗之言數聞在上者雖欲弗納不能不仗所聞因事之來而微察之也無巳其驗至矣得其驗安得不理其罪若知而縱之主之威日衰令之不行自此始矣知之而皆理之受罪退者稍多大臣有不自固之心矣夫賢才不進貴臣日疏此有國者之深憂也詩曰受祿不讓至于巳斯亡不讓之人憂亡不暇而望其益國朝不亦難乎竊以為改此俗甚易耳何以知之夫一時在官之人雖雜有凡猥之才其中賢明者亦多矣豈可謂皆不知讓賢為貴邪直以其時皆不讓習以成俗故遂不為耳人臣初除皆通表上聞名之謝章所由來尚矣原謝章之本意欲進賢能以謝國恩也昔舜以禹為司空禹拜稽首讓于稷契及咎繇使益為虞官讓于朱虎熊羆使伯夷典三禮讓于夔龍唐虞之時眾官初除莫不皆讓也謝章之義蓋取于此書記之者欲以永世作則季世所用不賢不能讓賢虛謝見用之恩而已相承不變習俗之失也夫敘用之官得通章表者其讓賢推能乃通其章其不能有所讓徒費𥳑紙者皆絕不通人臣初除各思推賢能而讓之矣讓之文付主者掌之三司有缺擇三司所讓最多者而用之此為一公缺三公巳豫選之矣且主選之吏不必任公而選三公不如令三公自共選一公為詳也四征缺擇四征所讓最多者而用之此為一征缺四征巳豫選之矣必詳于停缺而令主者選四征也尚書缺擇尚書所讓最多者而用之此為八尚書共選一尚書詳于臨缺令主者選八尚書也郡守缺擇眾郡所讓最多者而用之此為令百郡守共選一郡守必詳于任主者令選百郡守也夫以眾官百郡之讓與主者共相比不可同歲而論也雖復令三府參舉官本不委以舉選之任各不能以根其心也其所用心者裁之不二三但令主者案官次而舉之不用精也賢愚皆讓百姓耳目盡為國耳目夫人情爭則欲毀已所不如讓則競推于勝已故世爭則毀譽交錯優劣不分難得而讓也時貴讓則賢智顯出能否之美歷歷相次不可得而亂也當此時也能退身修己者讓之者多矣雖欲守貧賤不可得也馳騖進趣而欲人見讓猶卻行而求前也夫如此愚智咸知進身求通非修之于已則無由進矣游外求者于此相隨而歸矣浮聲虛論不禁而自息矣人人無所用其心任眾人之議而天下自化矣不言之化行巍巍之美于此著矣讓可以致此豈可不務之哉春秋傳曰范宣子之讓其下皆讓欒黶雖汰弗敢違也晉國以平數世賴之上世之化也君子尚能而讓其下小人力農以事其上上下有禮讒匿遠黜由不爭也及其亂也國家之弊恆必由之篤論了了如此在朝君子典選大官能不以人廢言舉而行之各以讓賢舉能為先務則群才猥出能否殊別蓋世之功莫大于此晉書劉寔傳又群書治要二十九引晉書通典十六王昌前母服議禮為常事制不為非常設也亡父母不知其死生者不著于禮生平不相見去其加隆以朞為斷晉書禮志中案王昌事詳前竟陵王楙文論天凡含天地之氣而生者人其最貴而有靈智者也是以動作云為皆應天地之象古先聖王觀靈曜造算數準辰極制渾儀原性理攷徵祥贊其幽義而作厤術焉渾儀象天之圓體以含地方輪轉周帀有二端中其可見者極星是也謂之行極在南者在地下不見故古人不名陰陽對合為群生父母精象在下五星具于上共成天地之功也則日月為政五星為緯天以七紀七曜是也行極不過為眾星之君命政指授以斗建時斗有七星興曜同精而有節氣于下者也晦朔分于東西消息辨于南北取以定四方天地配合方氣有常天以七紀方修其政故方有七宿二十八星是也于是天有常度日月成象眾星有宮分方物有體類在朝象官在野象物在人象事理自然也眾星定位七曜錯行盈縮有期節故厤數立焉日太陽也施溫萬物生施光則陰以明眾所稟為倡先者也君尊之象也月太陰也稟照于陽虧盈隨時有所稟受臣卑之道也五星象五常託四時成五事舊說日譬猶火也月譬猶水也火則施光水則含景故月光生于日當日則明光盈近日則明滅然則月之清象在前矣又曰當其衝月食者陰性毀損不受光也君臣不等強日月不等明陰在于上不自抑損陽必侵之望在交度其應必食故詩云彼月而食則維其常道勢然也侵甚則既臣之象也日尊君象也月卑臣象也晦朔之會交則同道同道則形相蔽天道前為尊臣由臣道雖度相值月不掩日卑下尊也不由臣道月掩日體卑陵尊也是故太平之時交而不食尊卑道順或問云顓頊時造渾儀其說云黃帝為蓋天以蓋天象笠極在其中日月以遠近為晦明渾儀以天裹地地載于氣天以迴轉而日月出入以為晦明二說誰其得之劉智曰蓋天之論謬矣以春秋二分日出卯入酉若天象車蓋極在其中日月星辰迴遠藏明二分之時當晝短夜長今以漏刻數之則晝夜分等以日出入效之則出卯入酉此蓋天之說不通之驗也然此二器皆古之取制但傳說義者失其用耳昔者聖王治厤明時作圓蓋以圖列宿極在于中用之以見天象未可正昏明分晝夜故作渾儀焉象天體亦以極為中而朱規為赤遊周環去極九十一度有奇考日所行冬夏去極遠近不同故復晝為黃道夏至去極近冬至去極遠二分之際交于赤道二道有表裏以定宿度之進退為術乃密至漢順帝時南陽張衡攷定進退靈帝時太山劉洪步月遲疾自此之後天驗愈詳自司馬遷劉向劉歆楊雄賈逵張衡蔡氏劉洪鄭玄此九君者不但于算步皆博索沈綜才思宏遠而不合論渾蓋之用明定日行四時之道雖或精攷雅有取得亦或出入失其本旨人之不同處意各異道之難盡致于斯矣或問曰古厤論月食或云陰損則不受明或云闇虛闇虛所在值月則月食值星則星亡今子不從何也劉智曰言闇虛者以為當日之衝地體之蔭日光不至謂之闇虛凡光之所照光體小于所蔽則大于本質今日以千里之徑而地體蔽之則闇虛之蔭將過半夫星亡月毀豈但交會之閒而已哉由此言之陰不受明近得之矣又問曰若如所論必有大蔭日在月衝何由有明劉智曰夫陰含陽而明不待陽光明照之也陰陽相應清者受光寒者受溫無門而通雖遠相應是攷觸石而次出者水氣之通也相響而相及無違不至無隔能塞者至清之質承陽之光以天之圓面向相背測立不同光魄之理也陰陽相承彼隆此衰是故日月有爭明日微則晝月見若但以形光相照無相引受之氣則當陽隆乃陽明隆陽衰則陰明衰二者之異無由生矣開元占經一喪服釋疑論亡其親者不知其死生則不敢服然則終身不祭乎智曰唯疑其生故不敢服也必疑死焉可不祭乎古之死者必告于廟今亡其親必告其先廟使咸知之求之三年若不得也則又告之告之者欲令其生也則隨而疑之其後疑祭必告今知其疑不受也鬼死者終歸饗也祝辭以告疑則還廟不遷矣憑靈之心加崇于尊此孝子之情也通典五十一凡屈不得服者皆有心喪之禮小功以下不稅服乃無心喪耳通典八十一嬰兒無知然于其父母之喪則以縗抱之其餘親八歲則制服矣七歲曰悼過此有罪則入于刑必致之于禮故在下殤之年為之制服案小功章昆弟之殤服昆之下殤是以下殤之年則行服也通典八十一問者曰禮孫為祖後三年者以其當正統也庶子之長孫既不繼曾高祖此孫為庶祖承重三年不荅曰繼祖者不唯謂大宗也案喪服傳與小記皆云庶子不為長子三年不繼祖與禰也兩舉之者明父之重長子以其當為禰後也其所繼者于父則禰于子則祖也父為已當繼祖故重其服則孫為祖後者不得輕也然則孫為祖後皆三年矣且甲眾子也生乙乙生景而乙先卒景為長子孫而後甲甲亡景為甲三年則甲是庶子無嫡可傳若不三年則景為乙之嫡子而闕父卒為祖後之義也通典八十八或問曰若祖父先卒父自為之三年已為之服周矣而父卒祖母後卒當服三年不乎劉智荅云嫡孫服祖三年誠以父卒則已不敢不以子道盡孝于祖為是服三年也謂之受重于祖者父卒則祖當為已服周此則受重也已雖不得受重于祖然祖母今當服已周已不得不為祖母三年也小記曰祖父卒而後為祖母後者三年特為此發也通典八十九高曾祖母與祖母俱存其卑者先亡則當厭屈不昔魯穆姜在而成公夫人薨春秋書曰葬我小君齊姜舊說云妻隨夫而成尊姑不厭婦婦人不主祭已承先君之正體無疑于服重也通典八十九雖為父後猶為嫁母齊縗訖葬卒哭乃除踰月乃祭案譙周云父卒母嫁非父所絕為之服周可也通典九十四或問曰喪服傳云妾之無子妾子無母父命為母子是名慈母今一妾自有子一子以無母父命為母子當如慈母服齊縗三年不荅曰父有兩妾一妾無子一妾有二子分其一子令為無子妾作子不敢違父命也而不得終為子之道案譙周集圖云喪服齊縗三年條曰慈母如母父在為慈母則條不見今文載所說慈于貴妾父在齊縗周慈于賤妾父在大功九月古文鄭氏說此主大夫士之妾子父命為母子者也大夫之妾子以父在為母大功士之妾子為母周矣其大夫降爵一等士無爵降例也父卒皆伸案經大夫之妾子父在為其母大功不別貴賤自非祖嫡大夫以爵降一等故妾之子從父例降母一等為大夫妾雖有貴者不得體君何得不為爵降凡此之類今文說不如古也通典九十四親母出則服繼母之黨繼母既卒則不服也通典九十五案禮小記云生不及祖父母諸父昆弟而父稅喪子則否智以為生不相及二文相害必有誤字昆弟相連之語易用為衍至親竝代不得以不相見而無相服之恩也若令生不相及者稅服則父雖已除後生者不得追服也凡不服者不服則父雖稅其子孫無緣服也以此推之弟衍字可知也通典九十八問云案喪服小記慈母之父母無服孫宜無服慈祖母矣又曰慈母與妾母不代祭孫不祭慈祖母何服之有智曰禮為親母黨服為繼母之黨不服不妨孫服繼祖母也禮孫為祖後如子所言妾母不代祭者據奉之者身終則止耳豈有妾子先亡孫持喪事而終喪便不祭也通典九十八問云遇亂離析計父母之年已過百年可終卒矣而不得音問計同邑里同年于其死日便制喪服或以為終身或不許者如何智荅曰父母生死未定則凶服不宜在身繼祀為重然則言不宜制服必繼代祀者吾以為得之矣凡服喪而無哀容得以不孝議之處厭降不得服其親而哀情至者吾得以孝篤稱之通典九十八問曰今有狂癡之子不識菽麥不能行步起止了無人道年過二十而死者或以為禮無廢疾之降殺父當正服服之邪以為殤之不服為無所知邪此疾甚于殤非禮服所加也禮之所不及以其從例所知故也不宜服矣此二者將焉從智荅曰無服之殤至愛過于成人以其于生性自然未成因斯而不服以漸至于成人順乎其理者也至于廢疾多感外物而得之父母養之或不盡理而使之然仁人痛深不忍不服故禮不為作降殺不得同殤例也通典一百一問曰昆弟骨肉以眾惡徒流死者諸侯有服否智荅曰凡以罪惡徒者絕之國君于兄弟有罪者亦絕也舊說諸侯于兄弟有弔服服衰絰素服而已不弔臨其喪也諸侯之身體先君奉祭祀是以不得盡其情于所絕耳然則不為父後者則服之矣通典一百一問者曰久而不葬喪主不除若其父遠征軍敗死于戰場亡失骸骨無所葬其服如何智云此禮文所不及也以理推之凡禮使為主者不除不謂眾子獨可無哀誠以既變人情必殺喪雖在殯不為主者可以無服然則為主者之服何以獨哀多也以喪柩在不可無凶事之主故也今無所葬是無尸柩也凶服無施則為後者宜與眾子同除矣訖葬而變者喪之大事畢也若無屍柩則不宜有葬變寒暑一周正服之終也是以除首絰而練冠也亡失親之骸骨孝子之情所欲崇也可令因周練乃服變衰絰雖無故事而制之所安也通典一百三
