body:
  text: 謝衡王昌前母服議毖身不幸去父母遠妻子妻于其家執義守節奉宗祀養舅姑育稚子後得歸還則固為己妻父既為妻子豈不為母昌宜追服三年通典八十九雖有二妻蓋有故而然不為害于道義宜更相為服晉書禮志中蘇宙事議大夫去國其妻長子為舊君服傳曰妻言與人同長子言未去也言去則無服矣是違諸侯之天子不反服違天子之諸侯亦不反服以在外也今之官長皆自外來假借一時共相君臨去則在外體遠事絕恩輕義疏至于死亡隔限遠路或有難故不得時往奔赴之義無所施也通典九十九為皇太孫服齊衰朞議諸侯之太子誓與未誓尊卑體殊喪服亡為嫡子長殤謂未誓也三誓則不殤也宋書禮志二談賦斐斐亹亹若有若無理玄旨邈辭𥳑心虛書鈔九十八遭亂父母乖離議典禮之興皆因循情理開通弘勝如運有屯夷要當斷之以大義夫無後之罪三千所不過今婚姻將以繼百世崇宗緒此固不可塞也然至于天屬生離之哀父子乖絕之痛痛之深者莫深于茲夫以一體之小患猶或忘思慮損聽察況于抱傷心之巨痛懷忉怛之至戚方寸既亂豈能綜理時務哉有心之人決不冒榮苟進冒榮苟進之儔必非所求之旨徒開偷薄之門而長流獘之路或有執志丘園守心不革者猶當崇其操業以弘風尚而況含艱履戚之人勉之以榮貴邪晉書謝尚傳轉西曹屬時有遭亂與父母乖離議者或以仕進理王事婚姻繼百世于理非嫌尚議與張涼州書今致五尺金斲頭刀一口御覽三百四十六與楊征南書今餉五尺金頭刀碧綾車甲楯書鈔一百二十三初學記二十二御覽三百四十六上疏論王恭王恭超登清任當虛心乘理文選任昉王文憲集序注引晉中興書魏騭周喪拜時議拜時雖非正典代所共行久矣將以三族多虞歲有吉忌故逆成其禮通典五十九太和中平北將軍郄愔上言魏騭周喪內迎婦拜時謝安議簡文帝諡議謹案諡法一德不懈曰𥳑道德博聞曰文易簡而天下之理得觀乎人文化成天下儀之景行猶有彷彿宜尊號曰太宗諡曰簡文世說文學篇注引劉謙之晉紀遺王坦之書知君思相愛惜之至僕所求者聲謂稱情義無所不可為聊復以自娛耳若絜軌迹崇世教非所擬議亦非所屑常謂君粗得鄙趣者猶未悟之濠上邪故知莫逆未易為人晉書王坦之傳與某書安頓首頓首每念君一旦知窮煩冤號慕觸事崩踊尋繹荼毒豈可為心柰何柰何臨書淒悶安頓首頓首淳化閣帖二六月廿日具記道民安惶恐言此月向終惟祥變在近號慕崩痛煩冤深酷不可居處比奉十七十八日二告承故不和甚馳灼大熱尊體復何如謹白記不具謝安惶恐再拜同上與支遁書思君日積計辰傾遲知欲還剡自治甚以悵然人生如寄耳頃風流得意之事殆為都盡終日慼慼觸事惆悵唯遲君來以晤言消之一日當千載耳此多山縣閑靜差可養疾事不異剡而毉藥不同必思此緣副其積想也高僧傳四春遊賦青陽司候句芒御辰陳滌灌以摧枯初莖蔚其曜新冪豐葉而為幄靡翠草而成絪于是遠嘯良儔近命嘉寡奏羽觴而交獻羅絲竹以竝陳詠新服之璀璨想舞雩之遺塵撫鳴琴而懷古登脩臺而樂春爾乃碧巘增邃灌木結陰輕雲晻曖以幕岫和風清泠而啟衿初學記三引兩條與子朗等疏七月十日萬告朗等便流火感傷兼切不自勝柰何柰何轉涼汝等各可可知近聞邑邑吾涉道動下疹乏劣力及不具告父疏淳化閣帖二屈原八賢頌皎皎屈原玉瑩冰鮮舒采翡林摛光虯川初學記十七楚老楚老潛一寂翫無為含貞內外載葺羽儀初學記十七七賢嵇中散讚邈矣先生英標秀上希巢洗心擬莊託相乃放乃逸邁茲俗網鍾期不存奇音誰賞初學記十七八賢論闕八賢論闕世說文學篇注引萬集載其敘四隱四顯為八賢之論謂漁父屈原季主賈誼楚老龔勝孫登嵇康也其旨以處者為優出者為劣案此蓋八賢頌即繫于論後也其論今亡駙馬都尉劉真長誄弱冠振纓結婚帝室綢繆姻婭連光雲日初學記十上疏請興復國學立人之道曰仁與義翼善輔性惟禮與學雖理出自然必須誘導故洙泗闡弘道之風詩書垂軌教之典敦詩悅禮王化以斯而隆甄陶九流群生于是乎穆世不常治道亦時亡光武投戈而習誦魏武息馬以脩學懼墜斯文若此之至也大晉受命值世多阻雖聖化日融而王道未備庠序之業或廢或興遂令陶鑄闕日用之功民性靡素絲之益亹亹玄緒翳焉莫抽臣所以遠尋伏念寤寐永歎者也今皇威遐震戎車方靜將灑玄風于四區導斯民于至德豈可不弘敷禮樂使煥乎可觀請興復國學以訓冑子班下州郡普脩鄉校雕琢琳琅和寶必至大啟群蒙茂茲成德匪懈于事必由之以通則人競其業道隆學備矣宋書禮志一上疏尸素朝端忽焉五載文選褚淵碑注引晉中興書又齊安陸王碑注齊竟陵王行狀注讓尚書令疏尚書令國之冢司總括百揆憲範王猷式造群辟故必簡德而授量才而受北堂書鈔五十九引晉中興書陳郡謝石字石奴遷衛將軍尚書令加散騎常侍上疏遜位請旌表故梓潼太守周虓疏臣聞旌善表功崇義明節所以振揚聲教垂美來葉故西夷校尉梓潼太守周虓執心忠烈厲節寇庭遂嬰禍荒裔痛寘泉壤臣每悲其志以為蘇武之賢不復過也前宣告并州訪求虓喪并索其家負荷數千始得來至即以資送還其舊隴伏願聖朝追其至心表其殊節使負霜之志不墜于地則榮慰存亡惠被幽顯矣晉書周虓傳虓病卒于太原其子興迎致其喪冠軍將軍謝玄親臨哭之因上疏云云孝武帝詔贈龍驤將軍益州刺史上疏經略河北方平河北幽冀宜須總督司州懸遠應統豫州晉書謝玄傳疾篤上疏臣以常人才不佐世忽蒙殊遇不復自量遂從戎政驅馳十載不辭鳴鏑之險每有征事輒請為軍鋒由恩厚忘軀甘死若生也冀有毫釐上報榮寵天祚大晉王威屢舉實由陛下神武英斷無思不服亡叔臣安協贊雍熙以成天工而雰霧尚翳六合未朗遺黎塗炭巢窟宜除復命臣荷戈前驅董司戎首冀仰憑皇威宇宙寍一陛下致太平之化庸臣以塵露報恩然後從亡叔臣安退身東山以道養壽此誠已形于文旨達于聖聽矣臣所以區區家國實在于此不謂臣愆咎夙積罪鍾中年上延亡叔臣安亡兄臣靖數月之間相遂殂背下逮稚子尋復天昏哀毒兼纏痛百常情臣不勝禍酷暴集每一慟殆獘所以含哀忍悲期之必存者雖哲輔傾落聖明方融伊周嗣作人懷自厲猶欲伸臣本志隆國保家故能豁其情滯同之無心耳去冬奉司徒道子告括囊遠圖逮問臣進止之宜臣進不達事機以蹙境為恥退不自揆故欲順其宿心豈謂經略不振自貽斯戾是以奉送章節待罪有司執徇常儀實有媿心而聖恩赦過黷法垂宥使抱罪之臣復得更名于所司木石猶感而況臣乎顧將身不良動與釁會謙德不著害盈是荷先疾既動便至委篤陛下體臣疢重使還藩淮側甫欲休兵靜眾綏懷善撫兼苦自療冀日月漸瘳繕甲俟會思更奮迅而所患沈頓有增無損今者惙惙救命朝夕臣之平日率其常短加以匪懈猶不能令政理弘宣況今內外天隔永不復接寍可臥居重任以招患慮追尋前事可為寒心臣之微身復何足惜區區血誠憂國實深謹遣兼長史劉濟重奉送節蓋章傳伏願陛下垂天地之仁拯將絕之氣時遣軍司鎮慰荒雜聽臣所乞盡醫藥消息歸誠道門冀神祇之祐若此而不差脩短命也使臣得及視息瞻覩墳柏以此之盡公私真無恨矣伏枕悲慨不覺流涕晉書謝玄傳病久不差又上疏臣同生七人凋落相繼惟臣一己孑然獨存在生荼酷無如臣比所以含哀忍痛希延視息者欲報之德實懷罔極庶蒙一瘳申其此志且臣孤遺滿目顧之惻然為欲極其求生之心未能自分于灰土慺慺之情可哀可愍伏願陛下矜其所訴霈然垂恕不令微臣銜恨泉壤晉書謝玄傳為戴逵上疏請絕召命伏見譙國戴逵希心俗表不嬰世務棲遲衡門與琴書為友雖策命屢加幽操不回超然絕迹自求其志且年垂耳順常抱羸疾時或失適轉至委篤今王命未回將離風霜之患陛下既已愛而器之亦宜使其身名竝存請絕其召命晉書隱逸戴逵傳會稽內史謝玄慮逵遠遯不反乃上疏云云帝許之與姊書此二日東行遊步園中已極有任家湖形模也姊相矚此亦有所散御覽八百二十四與兄書居家大都無所為正以垂綸為事足以永日北固下大鱸一出釣得四十七枚御覽八百三十四又與兄書昨日疏成後出釣手所獲魚以為二坩鮓今奉送御覽八百三十四與婦書昨日疏成後出釣所獲魚以為鮓二坩今奉送思更無事也書鈔一百四十六又御覽八百六十二作一坩書奉糧穀十斛是釣池上之所種御覽八百三十七殷祭議殷無定日攷時致敬且禮意尚簡去年十月祠雖于日有差而情典允備宜仍以為正宋書禮志三謝混劉瑾議秋夜長秋夜長兮雖欣長而悼速送晨暉于西嶺迎夕景于東谷夜既分而氣高風入林而傷綠燕翩翩以辭宇雁邕邕而南屬蓺文類聚三王昌前母服議絕有三道有義絕者犯七出也有法絕者以王法絕有地絕者以殊域而絕其夫絕妻如紀叔姬其逼以王法隔以殊域而更聘嫡室者亦為絕矣是以禮有繼母服無前母制是以前母非沒則絕故也以昌前母雖在猶不應服若昌父在則唯命矣依禮記昌惟宜追服其兄耳晉書禮志中通典八十九又議夫少婦稚則不可許以改嫁更適矣今妻在許以更聘夫存而妻得改醮者非絕而何晉書禮志中荅或問或問許猛云為人後時有昆弟後昆弟亡無後當得還否若得還為主否猛荅曰喪服傳曰何如而可以人後支子可也嫡子不得後大宗言大宗雖重猶不奪已之正以後之也推此而論小宗無支子則大宗自絕矣子不絕父之後本家無嗣于義得還出後者還本追服通典九十六或問云君無道而臣見黜放君薨為服否許猛荅曰君無道則當三諫不從則適他國若既亡不越境君雖無道猶責以臣禮通典九十九荅步熊問步熊問許猛曰為人後而所後之母見出當何服猛曰為人後者若子繼母言如母夫言若如者明其制如親其情則異也繼母如母則異于親子矣通典九十六步熊問改葬但言臣子妻為君父夫三者而孫為祖後亦宜緦不審受重于祖父亡後祖墓崩不知云何許猛云案經文以謂諸有三年者皆當緦如注意舉此三者明唯斬者耳今父卒孫為祖後而葬祖雖不受重于祖據為主雖不為祖斬亦制緦以葬也通典一百二王昌前母服議昔舜不告而娶婚禮蓋闕故堯典以釐降二女為文不殊嫡媵傳記以妃夫人稱之明不立正后也夫以聖人之弘帝者嫡子猶權事而變以定典禮黃昌之告新妻使避正室時論許之推姬氏之讓執黃卿之決宜使各自服其母晉書禮志中上豫防匈奴疏戎狄彊獷歷古為患魏初人寡西北諸郡皆為戎居今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡為狄庭矣宜及平吳之威謀臣猛將之略出北地西河安定復上郡實馮翊于平陽已北諸縣募取死眾徙三河三魏見士四萬家以充之裔不亂華漸徙平陽弘農魏郡京兆上黨雜胡峻四夷出入之防明先王荒服之制萬世之長策也晉書匈奴傳又見文選干寶晉紀總論注引干寶晉紀又見群書治要二十九引干寶紀竝小異周喪察舉議孝舉古之名貢尋名責實模格宜高夫以宜高之資必以邁俗為稱動擬清流行顧禮典況齊衰之喪身有伯叔之痛腰麻貫絰對而不言不處大夫之位不統邑宰之官時無盟戰代無寇戎不受聘使之命不率師旅之役喪禮宜備哀情宜畢古者周喪過三月而從政謂若今之職司有公除也公除之制蓋由近者多事在官不復從禮權宜之事耳今當舉者咸出布衣或在吏次且貢選之道在不拘之地推讓之宜得順其心官無推讓之刑法無必行之制平日且猶遜讓況周年之憂乎若從公除則非正官之例也若從高貢之舉于情為慢喪于舉為昧榮攷之于禮義則未聞今戎車未息禮制與古不同今諸王官司徒吏未嘗在職者其高足成有一舉便登黃散其次中尚書郎被召有周喪正假一月耳何至孝廉獨不可耳為孝廉之舉美于黃散邪如所論以責孝廉之舉則至朝臣復何以恕之宜依據經禮分別州國之吏與散官不同通典一百一毗陵內史論江南貢舉事震議云云又議震以王官同徒吏皆先由州郡之貢而後升在王廷冊名委質列為帝臣選任唯命義不得辭故遭周喪得從公奪之制周則迫命俯從至于州郡之吏未嘗與王官同體其舉也以孝順為名以廉讓為務在不制之限于時可得固讓于宜可得不行況兼周喪焉可許乎據情責實于義不通苟居容退之地雖小必讓苟在不嫌之域雖大不辭是黃散可受而孝廉可拒也故在孝得申之位動則見恕是以州國之與王官不同之理在乎此矣若乃權時之宜越常從變則孝非特命之徵舉非應務之首慶代無縱橫之務校禮則不覩其事唯宜折之以禮從其優者也通典一百一
