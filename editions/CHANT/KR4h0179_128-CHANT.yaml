body:
  text: 王鑒竹簟賦楚簟陳于玉房巴箱列于椒臺書鈔一百三十三御覽七百八勸元帝親征杜弢疏天禍晉室四海顛覆喪亂之極開闢未有明公遭厤運之厄當陽九之會聖躬負伊周之重朝廷延匡合之望方將振長轡而御八荒埽河漢而清天塗所藉之資江南之地蓋九州之隅角垂盡之餘人耳而百越鴟祝于五嶺蠻蜀狼顧于湘漢江州蕭條白骨塗地豫章一郡十殘其八繼以荒年公私虛匱倉庫無旬月之儲三軍有絕乏之色賦斂搜奪周而復始卒散人流相望于道殘弱之源日深全勝之勢未舉鑒懼雲旗反旆元戎凱入未在旦夕也昔齊旅未朞而申侯懼其老況暴甲三年介冑生蟣蝨而可不深慮者哉江揚本六郡之地一州封域耳若兵不時戢人不堪命三江受敵彭蠡振搖是賊踰我垣牆之內闚我室家之好黷武之眾易動驚弓之鳥難安鑒之所甚懼也去年已來累喪偏將軍師屢失送死之寇兵猒奔命賊量我力矣雖繼遣偏裨懼未足成功也愚謂尊駕宜親幸江州然後方召之臣其力可得而宣熊羆之士其銳可得而奮進左軍于武昌為陶侃之重建名將于安成連甘卓之壘南望交廣西撫蠻夷要害之地勒勁卒以保之深溝堅壁案精甲而守之六軍既贍戰士思奮爾乃乘隙騁奇擾其窟穴顯示大信開以生塗杜弢之頸固以鎖于麾下矣議者將以大舉役重人不可擾鑒謂暫擾以制敵愈于放敵而常擾也夫四體者人之所甚愛苟宜伐病則削肌刮骨矣然守不可虛鑒謂王導可委以蕭何之任或以小賊方斃不足動千乘之重鑒見王彌之初亦小寇也官軍不重其威狡逆得肆其變卒令溫懷不守三河傾覆致有今日之獘此已然之明驗也蔓草猶不可長況虎兕之寇乎當五霸之世將非不良士非不勇征伐之役君必親之故齊桓免冑于邵陵晉文擐甲于城濮昔漢高光武二帝征無遠近敵無大小必手振金鼓身當矢石櫛風沐甫壺漿不贍馳騖四方匪遑寍處然後皇基克構元勳以融今大獘之極劇于曩代崇替之命繫我而已欲使鑾旗無野次之役聖躬遠風塵之勞而大功坐就鑒未見其易也魏武既定中國親征柳城揚旍盧龍之嶺頓轡重塞之表非有當時烽燧之虞蓋一日縱敵終已之患雖戎輅蒙嶮不以為勞況急于此者乎劉玄德躬登漢山而夏侯之鋒摧吳偽祖親泝長江而關羽之首懸袁紹猶豫後機挫衂三分之勢劉表臥守其眾卒亡全楚之地歷觀古今撥亂之主雖聖賢未有高拱閑居不勞而濟者也前鑒不遠可謂蓍龜議者或以當今暑夏非出軍之時鑒謂今宜嚴戒須秋而動高風啟塗龍舟電舉曾不十日可到豫章豫章去賊尚有千里之限但臨之以威靈則百勝之理濟矣既埽清湘野滌蕩楚郢然後班爵序功酬將士之勞卷甲韜旗廣農桑之務播愷悌之惠除煩苛之賦比及數年國富兵彊龍驤虎步以威天下何思而不服何往而不濟桓文之功不難懋也今惜一舉之勞而緩垂死之寇誠國家之大恥臣子之深憂也鑒以凡鎖謬蒙獎育思竭愚忠以補萬一芻蕘之言聖主不棄戍卒之謀先后採之乞留神鑒思其所陳晉書王鑒傳雉賦覽飛禽之可貴偉翔雉之嘉形應炎離之誕育包造化之淳精鮮光皎粲麗采繁盈首同暉于昊天垂玄景之綠青體等耀于方彩敷五色之華英蓺文類聚九十惠懷愍別廟議議者既欲據傳疑文又欲安之陰室據傳則所代為禰陰室非禰所處此矛盾之說夫陰室以安殤主北向面陰非人君正位更衣者帝王入廟便殿當歸盛位漢明以存所常居故崩以安神而議謂卑于陰室實所未喻惠懷愍宜更別主廟通典四十八居親喪遭外緦麻喪議禮先重後輕則輕服臨之輕服臨者新亡新哀以表新情亦明親親不可無服及其還家復著重者是輕情輕服已行故也今新死若在千里表應服者以官役為限奔臨無由乃以重包之夫重服自前亡非關新死則新死無服也豈應服之親卒為無服宜制新輕之縗以當往臨之服若新亡除既了則反服先重自然包之前後二喪人情與服得兩濟乎或難曰服以禮為主禮有往臨之縗而無便制之服如便制輕縗恐非禮也荅曰禮是經通之制而魯築王姬之館于外春秋以為得禮之變明變反合禮者亦經之所許也通典九十七難改葬復虞夫葬以藏形廟以安神改葬之神在廟久矣安得退之于寢而虞之乎若虞之于寢則當復還祔于廟不得但虞而已通典一百二尚書下問改葬應虞與不鵬鳥賦序余既遭王敦之難遂見忌錄居于武昌其秋有野鳥入室感賈誼鵬鳥依而作焉御覽九百二十七與曹識書論陶侃陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也晉書陶侃傳尚書與親人曹識書自敘余居中丞曾以法鞭皇太子傅親友莫不致諫余笑而應之曰堂高由于陛下皇太子所以得崇于上由吾奉王憲于下也吾敢枉道典媚後皇太子特見延延請賜以清讌之禮敬之如師書鈔三十七初學記十二御覽二百二十六六百四十九父母乖離議春秋之義納室養姑承繼宗祀聘納事在可許仕進須候清平通典九十八宜招魂葬論難孔衍禮祖祭是送神也既葬三日又祭于墓中有靈座几筵飲燕之物非唯藏形也周武尚祭于畢季子復命于墓成公夢康叔相奪余饗既葬迎神而返博求神之道孝子未忍離其親耳且宗廟是烝嘗之常宇非為仙靈常止此廟也猶圜丘是郊祀之常處非為天神常居此丘也詩曰祖考來格知是外至也又曰神保聿歸歸其幽冥也卜宅安厝亦安神也伯姬火死而叔弓如宋葬共姬皆其證也宋玉先賢光武明王伏恭范逡並通義理公主亦招魂葬豈皆委巷乎通典一百三宜招魂葬論神靈止則依形出則依主墓中之座廟中之主皆所綴意髣髴耳若俱歸形于地歸神于天則上古之法是而招魂之事非也若吉凶皆質宮不重仞墓不封樹則中古之制得而招魂之事失也若五服有章龍旗重旒事存送終班秩百品即生以推亡依情以處禮則近代之數密招魂之理通矣招魂者何必葬乎蓋孝子竭心盡哀耳通典一百三角賦夫角以類推之蓋黃帝會群臣于太山作清角之音似兩鳳之雙鳴若二龍之齊吟如丹虵之翹首似雄虵之帶矢御覽三百三十八夫沒歸宗未嫁而亡為服議婦人夫沒無子有歸宗更出之義今姑愍彼無嗣令還其黨欲令更出則衛莊姜遣陳媯之比也于兄弟之家者兄弟宜服周受姑命而歸宗夫之餘親不應有服通典九十九駮谷士風議士風所議婦人夫沒無子有歸宗更適之義昔姜氏以殺嫡立庶歸齊怨魯陳媯以子死君卒于禮宜歸此婦非姜氏義絕之倫無陳媯應出之事其姑愍其守寡欲令更適此代俗之常意非教訓之道也衛共伯之妻父母欲奪而嫁之誓而不去就有姑命未可要謂之必出也通典九十九諫為琅邪王煥營起陵園疏臣聞法度典制先王所重吉凶之禮事貴不過是以世豐不使奢放凶荒必務約殺朝聘嘉會足以展庠序之儀殯葬送終務以稱哀榮之情上無奢泰之謬下無匱竭之困故華元厚葬君子謂之不臣嬴博至儉仲尼稱其合禮明傷財害時古人之所譏節省𥳑約聖賢之所嘉也語曰上之化下如風靡草京邑翼翼四方所則明教化法制不可不慎也陛下龍飛踐阼興微濟獘聖懷勞謙務從𥳑儉憲章舊制猶欲節省禮典所無而反尚飾此臣愚情竊所不安也棺槨輿服旒翣之屬禮典舊制不可廢闕凶門柏歷禮典所無天晴可不用遇雨則無益此至宜節省者也若琅邪一國一時所用不為大費臣在機近義所不言今天臺所居王公百寮聚在都輦凡有喪事皆當供給材木百數竹薄千計凶門兩表衣以細竹及材價直既貴又非表凶哀之宜如此過飾宜從麤𥳑又案禮記國君之葬棺槨之閒容柷大夫容壺士容甒以壺甒為差則柷財大于壺明矣槨周于棺槨不甚大也語曰葬者藏也藏欲其深而固也槨大則難為堅固無益于送終而有損于財力凶荒殺禮經國常典既減殺而猶過舊此為國之所厚惜也又禮將葬遷柩于廟祖而行及墓即窆葬之日即反哭而虞如此則柩不宿于墓上也聖人非不哀親之在土而無情于丘墓蓋以墓非安神之所故修虞于殯宮始則營草宮于山陵遷神柩于墓側又非典也非禮之事不可以訓萬國臣至愚至賤忽求革前之非可謂狂瞽不知忌諱然今天下至獘自古所希宗廟社稷遠託江表半州之地凋殘以甚加之荒旱百姓困瘁非但不足死亡是懼此乃陛下至仁之所矜愍可憂之至重也正是匡矯未俗改張易調之時而猶當竭已罷之人營無益之事殫已困之財修無用之費此固臣之所所不敢安也今琅邪之于天下國之最大若割損非禮之事務遵古典上以彰聖朝𥳑易之至化下以表萬世無窮之規則此芻蕘之言有補萬一塵露之微有增山海晉書琅邪悼王煥傳鵝賦序先大夫俞潁川者殊精意于養鵝求得可鵝類于張猛虎亦多好者于時有綠眼黃喙折翼赤頭家家有焉然經潁川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豐麗鳴聲驚人三年而為暴犬所害惜其不終故為之賦云蓺文類聚九十一御覽九百十九拂舞序自到江南見白符舞或言白鳧鳩舞云有此來數十年察其詞旨乃是吳人患孫皓虐政思屬晉也宋書樂志一上司徒府辨同姓為婚同姓庶姓有正姓有復姓有單姓鍾云出于鍾離之後胡母與胡公同本復鍾單鍾復胡單胡今年共婚不以損一字為疏增一字為親不以共其本為悔取其同者為吝宜理在可通而得明始限之別故婚姻不疑耳今竝時比俗年齊代等至于庶姓禮記書其別于上始祖正姓明其斷于下以之通議則人倫無闕案大常總言博士議述敘姓變為始祖者始此姓為祖也此既非禮所謂始祖為正姓之義即便棄經從意謂義可通如今眾庶之家或避國諱遁仇逃罪變言易姓者便可皆言是始祖正姓為婚之斷如此禮稱附遠厚別百代不通之義復何所施乎此惑之甚者也論者又以為開通同姓婚則令小人致濫案禮自有限禁之外本自禮所不責不可以不禁禮所不應責者而云通禮所應責也王皆王沈魏晉名儒同周室之後共婚者二門譜地皆存昌黎張仲娶范陽張槤妹諮張公而後婚今日若攷經據事足以取正唯大府裁之通典六十濮陽太守劉嘏與同姓劉疇婚司徒下太常諸博士議非之嘏以為云云與卞壺疏堯妻舜女其代不遠又春秋云畢原酆郇文之昭邘晉應韓武之穆代俗之所惑上惑堯舜之代下惑應韓之昭穆欲追過堯舜邪則輕歷聖人議者或謂巍巍蕩蕩之德可以掩堯舜之疵或謂代近姓異可以通應韓之婚豈其然哉若代近姓異可以通應韓之婚則周公立百代之限禮記云娶于異姓附遠而厚別此二義復何所施如其不然則明始限之外堯舜可以婚禮終之後應韓可以通堯舜之婚以正姓分絕于上應韓之通庶姓異終于下也絕則無繫終則更始斷可識矣通典六十屏風頌序太寍三年皇帝詔遣殿上賚御屏風寶劍嘉茲屏風帝王之服謹為述頌書鈔一百三十二賜紫綬書鈔十九箜篌賦序羽儀采綠采先軾鼓裳起于造木箜篌祖琴琴考筑箏作茲哭于漢代猶擬易之玄經初學記十六為虞領軍薦張道順文蓋聞驪龍之珠必沈紫泉之裏垂天之翼必翔青冥之表竊見處士吳國張道順天挺珪璋明達清秀下筆掩彫龍之文發言吐談天之藻慕西道之陽生希北巷之顏回若得清水淬其鋒越砥斂其鍔必騰躍天路出觀聖世御覽六百三十二太宰武陵王為所生母服議禮云庶子為父後者為其母緦又云公之庶昆弟大夫之庶子為母九月鄭云君卒子為母大功大夫卒子為母三手經文則一而鄭有二疑太宰若從三年之制為重則應從九月無應從緦麻之理且太宰以天子之庶出繼諸侯本無應厭降之道太宰今承諸侯別祀又不同庶姓相後有承繼大宗之義應從降一等之制從九月亦降一等應服五月出後者之子亦皆還降其本親祖父母伯叔一等又禮無蕃王出後本親與庶姓有異之制通典八十二昇平中太宰武陵王所生母喪乞齊縗三年詔聽依昔樂安王故事制大功九月太常江夷上博士孔恢議云云庾家為孝庾后服議庾家男女宜齊縗庾家諸婦雖非五屬女今見在五屬之內亦服周通典八十一孝后崩庾家訪服祠部郎孔恢云議曹耽等事禮無解職厭降之文今有去官從本官之品典律竝愆軌訓有違案耽等竝以凡才荷蒙榮飾或濯纓清波不能仰遵王度自同隸人愆義違則虧黷王猷請以見事免耽等所覆除官通典九十國哀廢樂議素會宜都去懸設樂為作不作則不宜懸也孟獻子懸自是應作而不作耳故天子自加于人一等非為不應作而應懸也國諱尚近謂金石不可陳于庭也通典一百四十七晉有后喪下太常曰朝廷遏密則素會時云應懸而樂博士孔恢議祝祖文元首肇建吉酉辰良五政數惠四教初揚萬類資新英穎擢章谷風滌歲日和時光命于嘉賓宴茲社箱敬饗祖君休祚是將嘉肴綺錯白茅薦恭有肉如墀有酒如江祖君既眷祗肅威容蓺文類聚五白兔頌其毛春素纖毫秋黑點綴五采漸染粉墨蓋久隱時見應世德也徐疾備體達消息也資質皓朗民之則也被白含文好無極也秦失鹿于近郊晉得兔于遠境蓺文類聚九十五議加贈卞壺爵號死事之臣古今所重卞令忠貞之節當書于竹帛今之追贈實未副眾望謂宜加鼎司之號以旌忠烈之勳晉書卞壺傳重議卞壺贈諡夫事親莫大于孝事君莫尚于忠唯孝也故能盡敬竭誠唯忠也故能見危受命此在三之大節臣子之極行也案壺委質三朝盡規翼亮遭世險難存亡以之受顧託之重居端右之任擁衛至尊則有保傅之恩正色在朝則有匪躬之節賊峻造逆戮力致討身當矢旝再對賊鋒父子并命可謂破家為國守死勤事昔許男疾終猶蒙二等之贈況壺伏節國難者乎夫賞疑從重況在不疑可謂上準許穆下同嵇紹則允合典謨克厭眾望晉書下壺傳邵廣事議天下之人父無子者少一事遂行便成永制懼死罪之刑于此而弛晉書范堅傳通典一百六十六父卒繼母還前親子家繼子為服議以前問不立甲乙為名禰于義不便令以母為甲先夫為乙後夫為丙先子為丁繼子為戊丙言可爾必慮事宜順其至情非虛欺也臨終不命知死之後制不在己故也甲不中求信之前言也本有未還之計去誓不還葬之辭生則已不得養死則不與已父同穴就不成嫁當為去母附之于嫁不亦宜乎通典九十四
