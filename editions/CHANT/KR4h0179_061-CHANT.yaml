body:
  text: 卷六十一孫綽遊天台山賦并序遊天台山賦并序天台山者蓋山嶽之神秀者也涉海則有方丈蓬萊登陸則有四明天台皆玄聖之所遊化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡人神之壯麗矣所以不列于五嶽闕載于常典者豈不以所立冥奧其路幽迥或倒景于重冥或匿峰于千嶺始經魑魅之塗卒踐無人之境舉世罕能登陟王者莫由禋祀故事絕于常篇名標于奇紀然圖像之興豈虛也哉非夫遺世翫道絕粒茹芝者烏能輕舉而宅之非夫遠寄冥搜篤信通神者何肯遙想而存之余所以馳神運思晝詠宵興俛仰之間若已再升者也方解纓絡永託茲嶺不任吟想之至聊奮藻以散懷太虛遼廓而無閡運自然之妙有融而為川瀆結而為山阜嗟台嶽之所奇挺實神明之所扶持蔭牛宿以曜峰託靈越以正基結根彌于華岱直指高于九疑應配天于唐典齊峻極于周詩邈彼絕域幽邃窈窕近智以守見而不之之者以路絕而莫曉哂夏蟲之疑冰整輕翮而思矯理無隱而不彰啟二奇以示兆赤城霞起而建標瀑布飛流以界道覩靈驗而遂徂忽乎吾之將行仍羽人于丹丘尋不恐之福庭苟台嶺之可攀亦何羨于層城釋域中之常戀畼超然之高情被毛褐之森森振金策之鈴鈴披荒榛之蒙蘢陟峭崿之崢嶸濟楢溪而直進落五界而迅征跨穹隆之懸磴臨萬丈之絕冥踐莓苔之滑石摶壁立之翠屏攬樛木之長蘿援葛藟之飛莖雖一昌于垂堂乃永存乎長生必契誠于幽昧履重嶮而逾平既克濟于九折路威夷而脩通恣心目之寥朗任緩步之從容藉萋萋之纖草蔭落落之長松覿翔鸞之裔裔聽鳴鳳之嗈嗈過靈溪而一濯疏煩想于心胸蕩遺塵于旋流發五蓋之遊蒙追羲農之絕軌躡二老之玄蹤陟降信宿迄于仙都雙闕雲竦以夾路瓊臺中天而懸居朱闕玲瓏于林閒玉堂陰映于高隅彤雲斐亹以翼櫺曒日炯晃于綺疏八桂森挺以淩霜五芝含秀而晨敷惠風佇芳于陽林醴泉涌溜于陰渠建木滅景于千尋琪樹璀璨而垂珠王喬控鶴以沖天應真飛錫以躡虛騁神變之揮霍忽出有而入無于是遊覽既周體靜心閑害馬已去世事都捐投刃皆虛目牛無全凝思幽巖朗詠長川爾乃羲和亭午遊氣高褰法鼓琅以振響眾香馥以揚煙肆覲天宗爰集通仙挹以玄玉之膏嗽以華池之泉散以象外之說畼以無生之篇悟遣有之不盡覺涉無之有閒泯色空以合跡忽即有而得玄釋二名之同出消一無于三幡恣語樂以終日等寂默于不言渾萬象以冥觀兀同體于自然文選藝文類聚七望海賦因湛亮以靜鏡俯遊目于淵庭文選顏延之應詔讌曲水詩注五湖同浸九江叢溉抱河含濟吞淮納泗南控沅湘西引涇渭洲渚迢遞以疏屬島嶼緜邈以牢羅殖嵬崔之碣石搆穹隆之牂柯玄奧之府重刃之房鱗彙萬殊甲產無方包隨珠銜夜光瑇瑁熠爍以泳游蟕蠵煥爛以映漲虛貝含素而表紫蠳螺絡丹而帶緗青甲芬飆以微扇玄木杳眇以舒芳其卉木則綠苔石髮蔓以流緜紫莖菎綜解以被渚華組依波而錦披翠綸扇風而繡舉長鯨嶽立以截浪虭䱜揚鬐以排流巨鼇奰㞒以冠山烏鱯呼翕以吞舟鵬為羽桀鯤稱介豪翼遮半天背負重霄舉翰則宇宙生風抗鱗則四瀆起濤攷萬川以周覽亮天池之綜緯彌綸八荒亘帶九地昏明注之而不溢尾閭洩之而不匱藝文類聚八石雞清響以應潮慧軀輕近以遠潔御覽九百十八三餘孤戲比目雙游初學記三十文鯉黃鱣御覽九百三十九若乃惟馨陳祈祝不愧言或適于東或歸于西商客齊畼潮流往還各資順勢雙帆同懸偃如驌驦偕馳挐如交隼軒騫北堂書鈔一百三十八御覽七百七十一遂初賦序遂初賦序余少慕老莊之道仰其風流久矣卻感於陵賢妻之言悵然悟之乃經始東山建五畝之宅帶長阜倚茂林孰與坐華幕擊鐘鼓者同年而語其樂哉世說言語篇注諫移都洛陽疏伏見征西大將軍臣溫表便當躬率三軍討除二寇蕩滌河渭清灑舊京然後神旂電舒朝服濟江反皇居于中土正玉衡于天極斯超世之宏圖千載之盛事然臣之所懷竊有未安以為帝王之興莫不藉地利人和以建功業貴能以義平暴因而撫之懷愍不建淪胥秦京遂令胡戎交侵神州絕綱土崩之釁誠由道喪然中夏蕩蕩一時橫流百郡千城曾無完郛者何哉亦以地不可守投奔有所故也天祚未革中宗龍飛非惟信順協于天人而已實賴萬里長江畫而守之耳不然胡馬久已踐建康之地江東為豺狼之場矣易稱王公設險以守其國險之時義大矣哉斯已然之明效也今作勝談自當任道而遺險校實量分不得不保小以固存自喪亂以來六十餘年蒼生殄滅百不遺一河洛丘墟函夏蕭條井堙木刊阡陌夷滅生理茫茫永無依歸播流江表已經數世存者長子老孫亡者丘隴成行雖北風之思感其素心目前之哀實為交切若遷都旋軫之日中興五陵即復緬成遐域泰山之安既難以理保烝烝之思豈不纏于聖心哉溫今此舉誠欲大覽始終為國遠圖向無山陵之急亦未首決大謀獨任天下之至難也今發憤忘食忠慨亮到凡在有心孰不致感而百姓震駭同懷危懼者豈不以反舊之樂賖而趣死之憂促哉何者植根于江外數十年矣一朝拔之頓驅踧于空荒之地提挈萬里踰險浮深離墳墓棄生業富者無三年之糧貧者無一飧之飯田宅不可復售舟車無從而得捨安樂之國適習亂之鄉出必安之地就累卵之危將頓仆道塗飄溺江川僅有達者夫國以人為本疾寇所以為人眾喪而寇除亦安所取裁此仁者所宜哀矜國家所宜深慮也自古今帝王之都豈有常所時隆則宅中而圖大勢屈則遵養以待會使德不可勝家有三年之積然後始可謀太平之事耳今天時人事有未至者矣一朝欲一宇宙無乃頓而難舉乎臣之愚計以為且可更遣一將有威名資實者先鎮洛陽於陵所築二壘以奉衛山陵掃平梁許清一河南運漕之路既通然後盡力于開墾廣田積穀漸為徙者之資如此賊見亡徵勢必遠竄如其迷逆不化復欲送死者南北諸軍風馳電赴若身手之救痛痒率然之應首尾山陵既固中夏小康陛下且端委紫極增修德政躬行漢文簡樸之至去小惠節游費審官人練甲兵以養士滅寇為先十年行之無使隳廢則貧者殖其財怯者充其勇人知天德赴死如歸以此致政猶運諸掌握何故捨百勝之長理舉天下而一擲哉階下春秋方富溫克壯其猷君臣相與弘養德業括囊元吉豈不快乎今溫唱高議聖朝互同臣以輕微獨獻管見出言之難實在今日而臣區區必聞天德者切以無諱之朝狂瞽進說芻蕘之謀聖賢所察所以不勝至憂觸冒干陳若陛下垂神溫少留思豈非屈于一人而允億兆之願哉如以干忤罪大欲加顯戮使丹誠上達退受刑誅雖沒泉壤尸且不朽晉書孫綽傳父卒繼母還前親子家繼子為服議父荅雖有可爾之語夫妻枕席相順之意固非決絕之辭也繼母喪父如禮服竟之後不還私家踰歲歷年循養無二母恩不衰適見親子專自任意無所關報私隨其志絕亡夫背繼子違三從正義亦為大矣今母雖不母子何緣得計去留權輕重而降之哉夫五服有名不可謬施施之于出出義不全施之于嫁嫁義不成欲降服周于禮何居名在夫籍私歸親子喪柩南北禮律私法計其可知使決降服許令制周頗在可怪通典九十四父母乖離議三千之責莫大于不祀之痛必俟河清而婚或有絕嗣之門也通典九十八京兆府君遷主議太祖雖位始九五而道以從畼替人爵之尊篤天倫之道所以成教本而光百代也宋書禮志三為功曹參軍駮事牋綱紀居管轄之任以糾司外內駮議彈射誠無所拘然亦所以獻可替否舉直繩違而已御覽二百四十九三月三日蘭亭詩序古人以水喻性有旨哉斯談非以停之則清混之則濁邪情因所習而遷移物觸所遇而興感故振轡于朝市則充屈之心生閑步于林野則遼落之志興仰瞻羲唐邈已遠矣近詠臺閣顧深增懷為復于曖昧之中思縈拂之道屢借山水以化其鬱結永一日之足當百年之溢以暮春之始禊于南澗之濱高嶺千尋長湖萬頃隆屈澄汪之勢可為壯矣乃席芳草鏡清流覽卉木觀魚鳥具物同榮資生咸畼于是和以醇醪齊以達觀決然兀矣焉復覺鵬鷃之二物哉耀靈縱轡急景西邁樂與時去悲亦系之往復推移新故相換今日之迹明復陳矣原詩人之致興諒歌詠之有由藝文類聚四初學記四表哀詩序天地之德曰生生之所恃者親親存則歡泰情盡親亡則哀悴理極故老萊婆娑于膝下曾閔泣血于終年哀悼之思至矣自然之性篤矣余以薄祐夙遭閔凶越在九齡嚴考即世未及志學過庭無聞天覆既淪俯憑坤厚殖根外氏賴以成訓然以不才不能負荷仁妣弘母儀之德邁榮寒之操彫琢固頑勉以道義庶幾砥礪犬馬之報豈悟一朝復見孤棄上天極禍怨痛莫訢皆由惡積咎深不能通感自丁荼毒載離寒暑茵帷塵寂棟宇寥怳仰悲軌迹長自矜悼不勝哀號作詩一首敢冐諒闇之譏以申罔極之痛藝文類聚二十聘士徐君墓頌晉南昌相太原縣君白漢故聘士徐君之靈惟君風軌英邃德音徽遠播飧仰芳流宗播揖在昔古人有言聞伯夷之風者懦夫有立志仰先生之道豈無青雲之懷哉余以不才忝宰茲邑遐宗有道思揖遠風乃與友人殷浩等束帶靈墳奉瞻祠宇雖玉質幽潛而目想令儀雅音永寂而心存高範徘徊墟壟仰眄松林哀有形之短化悼令德之長泯憮然有感悽焉增傷夫諷謠生于情託雅頌興乎所欽匪于詠述孰寄斯懷頌曰巖巖先生邁此英風含真獨畼心夷體沖高蹈域表淑問顯融昂昂五賢赫赫八俊雖曰休明或嬰險𠫤豈若先生保茲玉潤超世作範流光遐振墳塋壘落松竹蕭森薈叢蔚蔚虛宇愔愔遊獸戲阿嚶鳥鳴林嗟乎徐君不聞其音徘徊丘側悽焉流襟何以舒蘊援翰託心藝文類聚三十六賀司空循像贊公應天縱之德系命世之期質與荊玉參貞鑒與南金等照若其好學之性不勸而成弱不珍玩雅好博古慨洙泗之邈遠悼禮樂之不舉于是覃思深講銳精幽贊雖齊孝之歸孟軻漢王之宗仲舒無以加焉贊曰思文公侯誕保休祥素質玉潔華藻金章總角韞德被褐韜光自昔喪亂征鼓日震禮樂藏器詩書蒙塵哲人遐慨垂幙澄神仰觀洙泗揚波絕津方曜金鉉協贊衡機昊天不弔曾不憖遺縉紳頹範皇德莫毗公之云徂華裔同悲藝文類聚四十七初學記十一孔松陽像贊君德器純固基宇高邃荊玉不及喻其溫南金未能方其勵夫其溫恭篤誠善誘勤勸外身崇物菲躬厚人指揮必謙動靜克讓允有古賢之風流乃祖之遺愛矣肇階方尺臨政弊邑絜齊冬冰澤侔春露於穆我后含和體純行範乃祖德冠縉紳降迹垂化澤牟三春超然遐舉遺愛在民藝文類聚五十太常碑贊海岱協靈育此多士峨峨君侯東國之紀金德發耀英風劭起文齊游夏行儔魯史有邈其升令問不已人亦有言德崇譽高束帛既賁旌節仍招儀刑朝堂流風丹霄將振華袞永煥皇朝上帝靡盬曾不遐齡衛霍頹鎮哲人其傾邦國殄瘁縉紳喪情仰拜高範永播休聲藝文類聚四十九原憲原憲玄默冰清玉粹志逸九霄身安陋術常景古賢初學記十七老子李老無為而無不為道一堯孔跡又靈奇塞關內境冥神絕涯永合元氣長契兩儀初學記二十三商丘子商丘卓犖執策吹竽渴飲寒泉飢食昌蒲所牧何物殆非真豬儻逢風雲為我龍攄世說輕詆篇注康僧會會公蕭瑟實惟令質心無近累情有餘逸厲此幽夜振彼尤黜超然遠詣卓矣高出高僧傳一支孝龍小方易擬大器難像盤桓孝龍剋邁高廣物競宗歸人思效仰雲泉彌漫蘭風肸響高僧傳四康法朗人亦有言瑜瑕弗藏朗金冏冏能韜其光敬終慎始研覈微章何以取證冰堅履霜高僧傳四劉元真索索虛衿翳翳閑沖誰其體之在我劉公談能雕飾照足開矇懷抱之內豁爾每融高僧傳四于法威易曰翰白詩美蘋藻斑如在場芬若停潦于威明發介然遐討有潔其名無愧懷抱高僧傳四釋道安物有廣贍人固多宰淵淵釋安專能兼倍飛聲汧隴馳名淮海形雖革化猶若常在高僧傳五法苑珠林二十四竺法汰竺法汰淒風拂林鳴絃映壑爽爽法汰校德無怍事外蕭灑神內恢廓實從前起名隨後躍高僧傳五名德沙門論目竺道壹馳騁游說言固不虛唯茲壹公綽然有餘譬若春圃載芬載敷條柯猗蔚枝幹扶疏世說言語篇注高僧傳五支愍度支度彬彬好是拔新俱稟昭見而能越人世重秀異咸競爾珍孤桐嶧陽浮磬泗濱世說假譎篇注
