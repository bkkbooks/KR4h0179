body:
  text: 曹述初難徐邈殷祭議三年之喪其實二十五月則五年何必六十月禮天子特礿三時皆祫禘祫雖有定年而文無定月通典四十九元興三年出後者卻還為本父服議或曰甲有子景後叔父乙甲死景以降服周涉數年乙之妻又亡景服父在為母之服今叔父自有子景既還本當追服甲三年服否若遂即吉則終身無斬縗之服博士曹述初議曰禮大宗無子族人以支子後之不為小宗立後明棄親即疏叔非大宗又年尚少自可有子甲以景後非禮也子從父此命不得為孝父亡則周叔妻死制母服于義謬也今歸本宜制重以全父子之道或難曹曰禮日月過而後聞喪則有稅服當聞喪之曰哀情與始遭喪同是以聞喪或在數十年後猶追服重甲死景即知喪哀情已敘為出後降周者服制耳三年之喪稱情而立聞父喪積年哀戚久除今更制重是服非稱情之義若依稅服失其類矣且子為父不過再周景嘗為甲已服周矣今復制重是子為父服三周也豈禮意乎荅曰景于禮無後乙之義景既不得成重制于乙又闕父子之道人子之情豈得無追遠之至戚乎就使情輕于日月已過而後聞喪服父之禮寍可便廢今以哀戚久除方制重服為難過矣父之于子兼尊親之至重禮制斬縗三年明其兼重也齊縗周服非所以崇尊親之至重景雖嘗為甲服周豈禮也哉而數以為父三周乎或難曰禮婦人有父喪未練而夫家遣之則為父服三年既練而見遣則已猶如為人後者亦為所後斬縗三年為父服周服制既同則義可相準若甲死未練而景歸則應為三年今喪己久于禮不應追服荅曰禮婦人適人則降父服周為夫三年既練見遣父服除矣重制已成于夫故雖及父母之家父亡不得復為父服三年不二斬之義也婦人于禮得成其重制于夫景于禮無後乙之義雖甲喪久除而景歸既己不得成重于乙今又不為甲追制重服是景為人子終無服父之道也張湛謂曹曰禮所稱為人後後大宗所以承正統若非大宗之主所繼非正統之重無相後之義今乙雖無子于禮不應取後于甲甲之命景景之從甲皆為違禮若如前議則兄弟以子相養者代代有之此輩甚眾時無譏議蓋同繫一祖兄弟所生猶如己子非犯禮違義故也雖非禮正義亦是一代成制由來故事豈可以甲命獨為非禮景從便為失道此之得失自當與代人共之耳今所疑于景既持服與不議者以為景歸宜制重引稅服為例恐非明證夫稅服者自謂日月已過而後聞喪聞喪之日即初死之時為制服之始今月數得全哀情得敘為人後者父終則盡心極哀但逼于所後抑情降服以尊父命及其還歸論喪則已積年即事則必有降殺而方復追所謂不稱情者矣過時而不知喪則是平吉之人既初聞之則同于始死與喪過而歸何得為例若謂景既不得全重制于乙又闕子道于甲故更服重即所謂全父子之道猶非稅服乎又設難云婦人父喪既練而見遣為父服周以準為人後者既還所生父喪已久于禮不追此議何疑荅曰正以婦人得成制于夫景不得成重制于乙今景于禮䛋無後乙之義然據受父命為人子與婦人出適者皆為本親降服一等為所後及夫制服三年其義正同也今以婦人練見遣重制已成于夫故不為父三年今謂景本不應為乙後然景既奉命為乙子則許其降本親之服及其喪過而歸則重制成于所後矣若不服重制其本親乃豈可終身無斬縗之服直是率懷而言無所依據耳通典九十六進解明宗義其士大夫之嫡者此為諸侯別子之後也或母弟之子孫或庶弟之子孫位為大夫者各祖別子為始祖各宗其嫡為大宗嫌庶子小宗之後猶不得為嫡故通稱嫡以明之後代皆應同正也通典七十三公子有宗道者禮諸侯不服庶子先君之所不服子亦不敢私相服也夫兄弟之恩既不可以無報親戚群居又不可以無主故君必命長弟以為之宗宗立而後相服相服之義由于其宗故曰公子有宗道公子之公為其士大人之庶宗者公子之公謂君之庶弟受命為宗者也其有功德王復命為諸侯尊群庶所不敢宗故此君復命其次庶代己為宗主士大夫群庶之在位者也通典七十三薦周續之于太尉劉裕臣聞恢耀和肆必在兼城之寶翼亮崇本宜紆高世之逸是以渭濱佐周聖德廣運商洛匡漢英業乃昌伏惟明公道邁振古應天繼期遊外畼于冥內體遠形于應近雖汾陽之舉輟駕于時艱明揚之旨潛感于窮谷矣竊見處士雁門周續之清真貞素思學鉤深弱冠獨往心無近事性之所遣榮華與飢寒俱落情之所慕巖澤與琴書共遠加以仁心內發義懷外亮留愛崑卉誠著李桃李若升之宰府必鼎味期和濯纓儒官亦王猷遐緝臧文不知失在降賢言偃得人功由升士願照其丹不以人廢言宋書周續之傳江州刺史劉柳薦之于高祖俄而辟為太尉掾不就乞還終喪表弘道為國者理盡于仁孝訴窮師天者莫甚于喪親但臣凡庸本無感概不能隕越故其宜耳往年國難滔天志竭愚忠靦然苟存去春鑾駕迴軫而狂狡未滅雖姦凶時梟餘燼竄伏威懷寡方文武勞獘微情未申顧景悲憤今皇威遐肅海內清蕩臣窮毒艱穢亦已具于聖聽兼羸患滋甚眾疾互動如今寢頓無復人理臣之情也本不甘生語其事也亦可以沒乞賜餘骸終其丘墳庶幾忠孝之道獲宥于聖世晉書劉毅傳初毅丁憂在家及義旗初興遂墨絰從事至是軍役漸寍上表乞還京口以終喪禮鎮姑孰上表忝任此州地不為曠西界荒餘密邇寇虜北垂蕭條士氣彊獷民不識義唯戰是習逋逃不逞不謀日會比年以來無月不戰實非空乏所能獨撫請輔國將軍張畼領淮南安豐梁國三郡南齊志六義熙二年請移江州軍府于豫章表臣聞天以盈虛為道治以損益為義時否而政不革民凋而事不損則無以救急病于己危拯塗炭于將絕自頃戎車屢駕干戈溢境所統江州以一隅之地當逆順之衝力弱民慢而器運所繼自桓玄以來驅蹙殘毀至乃男不被養女無對匹逃亡去就不避幽深自非財單力竭無以至此若不曲心矜理有所改移則靡遺之歎奄焉必及臣謬荷增統傷慨兼懷夫設官分職軍國殊用牧民以息務為大武略以濟事為先今兼而領之蓋出于權事因藉既久遂為常則江州在腹心之中憑接揚豫藩屏所倚實為重複日胡寇縱逸朔馬臨江抗禦之宜蓋出權計以溫嶠明達事由一己猶覺其獘論之備悉今江左區區戶不盈數十萬地不踰數千里而統司鱗次未獲減息大而言之足為國恥況乃地在無虞而猶置軍府文武將佐資費非一豈所謂經國大情揚湯去火者哉其州郡邊江民戶遼落加以郵亭嶮闊畏阻風波轉輸往還常有淹廢又非所謂因其所利以濟其獘者也愚謂宜解軍府移治豫章處十郡之中厲簡惠之政皆及數年可有生氣且屬縣凋散亦有所存而役調送迎不得休止亦謂應隨宜并減以簡眾費刺史庾悅自臨州部以來甚有恤民之誠但綱維不革自非綱目所理尋陽接蠻宜示有防遏可即州府千兵以助郡戍晉書劉毅傳宋書庾悅傳請兼督交廣表荊州媥戶不盈十萬器械索然廣州雖凋殘猶出丹漆之用請依先準晉書劉毅傳請以并州刺史劉道規鎮夏口夏口二州之中地居形要控接湘川邊帶溳沔請并州刺史劉道規鎮夏口南齊州郡志下以竟陵還荊州表竟陵去治遼遠去江陵正三百里荊治所立綏定郡民戶參入此境郡治常在夏口左右欲資此郡助江濱戍防以竟陵還荊州又司州弘農揚州松滋二郡寄尋陽人民雜居宜竝見督南齊州郡志上難釋惠遠沙門袒服論見荅問衵服指訓兼弘標末文于玄古貲形理于近用使敬慢殊流誠服俱盡殆無間然至于所以明順猶有未同何者儀形之設蓋在時而用是以事有內外乃可以淺深應之李釋之與周孔漸世之與遺俗在于因循不同必無逆順殊明矣故老明兵凶處右禮以喪制不左且四等窮奉親之至三驅顯王跡之仁在後而要其旨可見寍可寄至順于凶事表吉誠于喪容哉鄭伯所以肉袒亦猶許男輿襯皆自以所乘者逆必受不測之罰以斯而證順將何在故率所懷想更詳盡令內外有歸弘明集五請徙青州治京口表此蕃十載舋故相襲城池崩毀荒舊散伏邊疆諸戍不聞雞犬且犬羊侵暴鈔掠滋甚南齊書州郡志上義熙二年諸葛長民為青州徙山陽時鮮卑接境長民表劾郭澄之表妖賊伐船集木而南康相郭澄之隱蔽經年又深相保明屢欺無忌罪合斬刑晉書諸葛長民傳貽劉敬宣書盤龍狼戾專恣自取夷滅異端將盡世路方夷富貴之事相與共之宋書劉敬宣傳南史十七臨死上表臣裕北討眾竝不同惟臣贊裕行計致使彊賊乘間社稷危逼臣之辠也今謹引分以謝天下宋書武帝紀上書所欲足下家獘耳倉卒無祿故推遷不得不相用事已御出寍復吾所得迴復足下且當就之公還當思更律啟申師情事也劉穆之白淳化閣帖三與兄書登北邙遠眺眾美都盡光武墳邊杏美今奉送其核蓺文類聚七又八十七御覽九百六十八洛水道路本好青槐映蔭可愛御覽一百五十八又二百九十五洛水作洛下映蔭作蔭映橋去洛陽宮六七里悉用大石下圓以通水可受大舫過也水經穀水注一本末有奇制作三字千金堤舊堰坡水魏更修謂之千金塢陸雲臺上有奇井望之幽然投一石子擲之久方聞聲石經大都其碑高一丈許廣四尺駢羅相接木槿賦有木槿之初榮藻眾林而間色在青春而資氣逮中夏以呈飾挹宵露以舒采暉晨景而吸赩蓺文類聚八十九
