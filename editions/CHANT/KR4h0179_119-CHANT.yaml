body:
  text: 桓玄鳳賦伊口品之自口亦在類而有別惟羽族之殊誕獨鸞皇而稱桀邈區宇以超棲撫朝陽于丹穴備六德以成輝奮藻翰之郁烈集崑峰而斂翼翔青冥以遐越蓺文類聚九十初學記三十鶴賦惟茲禽之受命諒誕生于悠邈擢高距以自抗延脩頸以軒矚分赬玄以發藻通太素其如玉縱眇颺于雲裔豈四海之難局練妙氣以遒化孰百年之易促稅雲駕于三山升鸞皇于崑嶽蓺文類聚九十鸚鵡賦有遐方之令鳥超羽族之拔萃翔清曠之遼朗栖高松之幽蔚羅萬里以作貢嬰樊紲以勤瘁紅腹赬足玄頷翠頂革好音以遷善效言語以自騁翦羽翮以應用充戲玩于軒屏蓺文類聚九十一眷儔侶而情殷文選顏延之贈王太常詩注沙汰眾僧教夫神道茫昧聖人之所不言然惟其制作所弘如將可見佛所貴無為慇懃在于絕欲而比者陵遲遂夫斯道京師競其奢淫榮觀紛于朝市天府以之傾匱名器為之穢黷避役鍾于百里逋逃盈于寺廟乃至一縣數千猥成屯落邑聚游食之群境積不羈之眾其所以傷治害政塵滓佛教固已彼此俱獘實汙風軌矣便可嚴下在此諸沙門有能伸述經誥畼說義理者或禁行脩整奉戒無虧恆為阿練若者或山居養志不營流俗者皆足以宣寄大化亦所以示物以道弘訓作範幸兼內外其有違于此者皆悉罷道所在領其戶籍嚴為之制速申下之并列上也唯廬山道德所居不在搜𥳑之例宏明集十二上疏理謗臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極常欲以身報德投袂乘機西平巴蜀北清伊洛使竊號之寇繫頸北闕園陵脩復大恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷太和之末皇基有潛移之懼遂乃奉順天人翼登聖朝明離既朗四凶兼澄向使此功不建此事不成宗廟之事豈可孰念昔太甲雖迷商祚無憂昌邑雖昏獘無三孼因茲而言晉室之機危于殷漢先臣之功高于伊霍矣而負重既往蒙謗清時聖世明王黜陟之道不聞廢忽顯明之功探射冥冥之心啟嫌謗之塗開邪枉之路者也先臣勤王艱難之勞匡復剋平之勳朝廷若其遺之臣亦不復計也至于先帝龍飛九五陛下之所以繼明南面請問談者誰之由邪誰之德邪豈惟晉室永安祖宗血食于陛下一門實奇功也自頃權門日盛醜政實繁咸稱述時旨互相扇附以臣之兄弟皆晉之罪人臣等復何理可以苟存聖世何顏可以尸饗封祿若陛下忘先臣大造之功信貝錦萋菲之說臣等自當奉還三封受戮市朝然後下從先臣歸先帝于玄宮耳若陛下述遵先旨追錄舊勳竊望少垂愷悌覆蓋之恩晉書桓玄傳討元顯檄案揚州刺史元顯凶暴之性自幼加長犯禮毀教發蒙如備居喪無一日之哀衰絰為宵征之服絃觴于殷憂之時窮色于罔極之日劫略王國寶妓妾一朝空房此基惡之始駭愕視聽者矣相王有疾情無悚懼幸災擅命揚州篡授遂乃父子同錄比肩連案既專權重多行險暴恐相王知之杜絕視聽惡聲無聞佞舉日至萬機之重委之廝孼國典朝政紛紜淆亂又諷旨尚書使普敬錄公錄公之位非盡敬之所苟自尊貴遂悖朝禮又妖賊陵縱破軍殄民之後已為都督親則刺史于宜降之日輒加崇進弱冠之年古今莫比宰相懲惡以獨解錄推禍委罰歸之有在自古僭逆未有若斯之甚者取妾之僭殆同六禮乃使尚書僕射為媒人長史為迎客嬖媵饕餮賀同長秋所謂無君之心觸事而發八日觀佛略人子女至人家宿唐突婦妾慶封迄今甫見易室之飲晉靈以來忽有支解之刑喜怒輕戮人士割裂治城之暴一睡而斬又以四歲孼子興東海之封吳興殘暴之後橫復若斯之調妖賊之興實由此豎居喪極味孫泰供其膳在夜思遊亦孫泰延其駕泰承其勢得行威福雖加誅戮所染既多加之以苦發樂屬枉濫者眾驅逐徙撥死叛殆盡改號元興以為己瑞莽之符命于斯尤著否極必亨天盈其毒不義不昵勢必崩喪取亂侮亡實在斯會三軍文武憤踊即路魏書島夷桓玄傳荅會稽王道子牋王珣神情朗悟經史明徹風流之美公私所寄雖逼于同異嫌謗才用不盡然君子在朝弘益自多也時事艱難忽爾喪失歎懼之深豈但風流相悼而己其崎嶇九折風霜備經雖賴明公神鑒亦識會居之故也卒以壽終殆無所哀但情發去來寘之未易耳晉書王珣傳又御覽二百十一引晉中興書三百八十引謝安別傳致會稽王道子牋賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寶卒後王恭不乘此入統朝政足見其心非侮于明公也而謂之非忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳用理之人然後可以信義相期求利之徒豈有所惜而更委信邪爾來一朝一夕遂成今日之禍矣阿衡之重言何容易求福則立至干忤或致禍在朝君子豈不有懷但懼害及身耳玄忝任在遠是以披寫事實晉書會稽王道子傳與袁宜都書論嘯讀卿歌賦序詠音聲皆有清味然以嘯為髣髴有限不足以致幽旨將未至耶夫契神之音既不俟多贍而通其致苟一音足以究清和之極阮公之言不動蘇門之聽而微嘯一鼓玄默為之解顏若人之興逸響惟深也哉蓺文類聚十九御覽三百九十二與羊欣書賢從情所信寄暴疾而殞祝予之歎如何可言世說傷逝篇羊孚年三十一卒桓玄與羊欣書云云注引羊氏譜曰孚即欣從祖與殷仲堪書今當人沔討除佺期頓兵江口若相與無貳可殺楊廣若其不尒便當率軍入江魏書桓玄傳與劉牢之書與劉牢之書今君戰敗則傾宗戰勝則覆族以是安歸乎孰若翻然改圖唯理是宅保其富貴全其勳業則身與金石等固名與天壤俱窮孰與頭足異處身名俱滅為天下笑哉夫明者見一無形愚夫安于所耽二者成敗惟君圖之蓺文類聚二十五與釋慧遠書勸罷道夫至道緬邈佛理幽深豈是悠悠常徒所能習求沙門去棄六親之情毀其形骸口絕滋味被褐帶索山棲枕石永乖世務百代之中庶或有一髣髴之閒今世道士雖外毀儀容而心過俗人所謂道俗之際可謂學步邯鄲匍匐而歸先聖有言未知生焉知死而令一生之中困苦形神方求冥冥黃泉下福皆是管見未體大化迷而知反去道不遠可不三思運不居人忽然將老可復追哉聊贈至言幸能納之宏明集十一與桓謙等書論沙門應致敬王者玄再拜白頓首八日垂至舊諸沙門皆不敬王者何庾雖已論之而竝率所見未是以理相屈也庾意在尊主而理據未盡何出于偏信遂淪名體夫佛之為化雖誕以茫浩推乎視聽之外然以敬為本此處不異蓋所期者殊非敬恭宜廢也者子同王侯于三大原其所重皆在于資生通運豈獨以聖人在位而比稱二儀哉將以天地之大德曰生通生理物存于王者故尊其神器而禮實惟隆豈是虛相崇重義存君御而已哉沙門之所以生生資存亦曰用于理命豈有受其德而遺其禮霑其惠而廢其敬哉既理所不容亦情所不安一代大事宜共求其衷想復相與研盡之比八日令得詳定也桓玄再拜頓首敬議沙門不拜俗事一與王謐書論沙門應致敬王者沙門抗禮至尊正自是情所不安一代大事宜共論盡之今與八座書向已送都今付此信君是宜任此理者遲聞德音沙門不拜俗事一與釋慧遠書沙門不敬王者既是情所不了于理又是所未諭一代大事不可令其體不允近與八座書今以示君君可述所以不敬意也此便當行之事一二令詳遺想君必有以釋其所疑耳王領軍大有任此意近亦同遊謝中面共諮之所據理殊未釋所疑也令郭江州取君荅可旨付之高僧傳六沙門不拜俗事一重與慧遠書知以方外遺形故不貴為生之益求宗不由順化故不重運通之資又云內乖天屬之重而不違其孝外闕奉主之恭而不失其敬若如來言理本無重則無緣有致孝之情事非資通不應復有致恭之義君親之情許其未盡則情之所寄何為絕之夫累著在于心滯不由形敬形敬蓋是心之所用耳若乃在其本而縱以形敬此復所未之喻又云佛教兩弘亦有處俗之教或澤流天下道洽六親固以協讚皇極而不虛霑其德矣夫佛教存行各以事應因緣有本必至無差者也如此則為道者亦何能違之哉是故釋迦之道不能超白淨于津梁雖未獲須陁故是同國人所蒙耳就如來言此自有道深德之功固非今之所謂宜教者所可擬議也來示未能共求其理便大致慨然故是未之喻也想不惑留常之滯而謬情理之用耳沙門不拜俗事一與劉邁書與劉邁書北府人情云何卿近見劉裕何所道宋書武帝紀上四皓論四皓論四皓來儀漢廷孝惠以立而惠帝柔弱呂后凶忌此數公者觸彼埃塵欲以救獘二家之中各有其黨奪彼與此其讎必興不知匹夫之志四公何以逃其患素履終吉隱以保生者其若是乎晉書殷仲堪傳難王謐來示云沙門雖意深于敬而不以形屈為禮難曰沙門之敬豈皆略形存心懺悔禮拜亦篤于事爰暨之師逮于上座與世人揖跪但為小異其制耳既不能忘形于彼何為忽儀于此且師之為禮以資悟為德君立通生則理宜在本在三之義豈非抈理之極哉來示云外國之君莫不降禮良以道在則貴不以人為輕重也難曰外國之君非所宜喻而佛教之興亦其旨可知豈不以六夷驕強非常教所化故大設靈奇使其畏服既畏服之然後順軌此蓋是大懼鬼神福報之事豈是宗玄妙之道邪道在則貴將異于雅音豈得被其法服便道在其中若以道在然後為貴就如君言聖人之道道之極也君臣之敬愈敦于禮如此則沙門不敬豈得以道在為貴哉來示云歷年四百歷代有三而弘之不異豈不以獨絕之化有日用于陶漸清約之風無害于隆平者乎難曰歷代不革非所以為證也曩者晉人略無奉佛沙門徒眾皆是諸胡且王者與之不接故可任其方俗不為之檢耳今主上奉佛親接法事事異于昔何可不使其禮有準日用清約助于教皆如君言此蓋是佛法之功非沙門傲誕之所益也今篤以祗敬將無彌濃其助哉來示云功高者不賞惠深者忘謝雖復一拜一起豈足荅濟通之恩難曰夫理至無酬誠如來旨然情在罔極則故自從之此聖人之所以緣情制禮而各通其寄也若以功深惠重心略其謝則釋迦之德為是深邪為是淺邪若淺邪不宜以小道而亂大倫若深邪豈得彼肅其恭而此弛其敬哉沙門不拜俗事一重難王謐省示猶復未釋所疑因來告有復粗有其難夫情敬之理豈容有二皆是自內以及外耳既入于有情之境則不可得無也若如來言王者同之造化未有謝惠于所稟措感于理本是為功玄理深莫此之大也則佛之為化復何以過茲而來論云津塗既殊則義無降屈宗致既同則長幼成序資通有係則事與心應若理在已本德深居極豈得云津塗之異而云降屈邪宗致為是何邪若以學業為宗致者則學之所學故是發其自然之性耳苟自然有在所由而稟則自然之本居可知矣資通之悟更是發鎣其末耳事與心應何得在此而不在彼又云周孔之化救其甚獘故盡于一生而不開萬劫之塗夫以神奇為化則其教易行異于督以仁義盡于人事也是以黃巾妖惑之徒皆赴者如雲若此為實理行之又易聖人何緣捨所易之實道而為難行之末事哉其不然也亦以明矣將以化教殊俗理在權濟恢誕之談其趣可知又云君臣之敬理盡名教今沙門既不臣王侯故敬與之廢何為其然夫敬之為理上紙言之詳矣君臣之敬皆是自然之所生理篤于情本豈是名教之事邪前論已云天地之大德曰生通生理物存乎王者苟所通在斯何得非自然之所重哉又云造道之倫必資功行積行之所因來世之關鍵也擬心宗極不可替其敬雖俯仰累劫而非謝惠之謂請復就來旨而借以為難如來告以敬為行首是敦敬之重也功行者當計其為功之勞耳何得直以珍仰釋迦而云莫尚于此邪惠無所謝達者所不惑但理根深極情敬不可得無耳臣之敬君豈謝惠者邪沙門不拜俗事一三難王謐來難手筆甚佳殊為斐然可以為釋疑處殊是未至也遂相攻難未見其已今復料要明在三之理以辯對輕重則敬否之理可知想研微之功必在苦愈折耳八日己及今與右僕射書便令施行敬事尊王之道使天下莫不敬雖復佛道無以加其尊豈不盡言邪事雖已行無豫所論宜究也想諸人或更有精析耳可以示仲文比獲來示并諸人所論竝未有以釋其所疑就而為難殆以流遷今復重申前意而委曲之想足下有以頓白馬之轡知辯制之有耳夫佛教之所重全以神為貴是故師徒相宗莫二其倫凡神之明暗各有本分分之所資稟之有本師之為功在于發悟譬猶荊璞而瑩拂之耳若質非美玉琢磨何益是為美惡存乎自然深德在于資始拂瑩之功實以末焉既懷玉自中又匠以成器非君道則無以申遂此生而通其為道者也是為在三之重而師為之末何以言之君道兼師而師不兼君教以弘之法以齊之君之道也豈不然乎豈可以在理之輕而奪宜尊之敬三復其理愈所疑駭制作之旨將在彼而不在此錯而用之其獘彌甚想復領其趣而遺其事得之濠上耳沙門不拜俗事卷一南遊衡山詩序歲次降婁夾鍾之初理楫將遊于衡嶺涉湘千里林阜相屬清川窮澄映之流涯涘無纖埃之穢脩途逾邁未見其極窮日所經莫非奇趣姑洗之旬始暨于衡嶽于是假足輕輿宵言載馳軒塗三百山徑徹通或垂柯跨谷俠獻交蔭或曲溪如塞已絕復開或乘步長嶺邈眺遙曠或憩輿素石映濯水湄所以欣然奔悅求路忘疲者觸事而至也仰瞻翠標邈爾天際身淩太清獨交霞景周覽既畢頓策嵓阿管絃竝奏清徵再響思古永神遊氣未言初學記五龍山獵詩序故老相傳大旱獵龍山輒得雨因時之旱宵往畋之渚宮舊事五王孝伯誄隆安二年九月十七日前將軍青兗二州刺史太原王孝伯薨川岳降神哲人是育既爽其靈不貽其福天道茫昧孰測倚伏犬馬反噬豺狠翹陸嶺插高梧林殘故竹人之云亡邦國喪牧于以誄之爰旌芳郁世說文學篇注引晉安帝紀入京矯詔義旗雲集罪在元顯太傅已別有教其解嚴息甲以副義心晉書桓玄傳禎祥矯詔靈瑞之事非所敢聞也斯誠相國至德故事為之應太平之化于是乎始六合同悅情何言晉書桓玄傳論賞劉裕等將士詔論賞劉裕等將士詔劉裕以寡制眾屢摧妖鋒汎海窮追十殄其八諸將力戰多被重創自元帥以下至于將士竝宜論賞以敘勳烈宋書武帝紀上許沙門不致禮詔門下佛法宏誕所未能了推其篤至之情故寍與其敬耳今事既在已苟所不了宜盡謙光且當寍從其略諸道人勿復使致禮也便皆使知聞高僧傳六沙門不拜俗事二詔報卞嗣之袁恪之何緣爾便宜奉詔沙門不拜俗事二又報置之使自己亦是兼愛九流各遂其道也沙門不拜俗事二自有內外兼弘者何其于用前代理卿區區昔此更非讚其道也沙門不拜俗事二下書受禪夫三才相資天人所以成功理由一統貞夫所以司契帝王之興其源深矣自三五已降世代參差雖所由或殊其歸一也朕皇考宣武王聖德高邈誕啟洪基景命攸歸理貫自昔中閒屯險弗克負荷仰瞻宏業殆若綴旒藉否終之運遇時來之會用獲除姦救溺拯拔人倫晉氏以多難薦臻厤數唯既典章唐虞之準述遵漢魏之則用集天祿于朕躬惟德不敏辭不獲命稽若令典遂升壇燎于南郊受終于文祖思覃斯慶願與億兆聿茲更始晉書桓玄傳下書封晉帝為王夫三恪作賓有自來矣爰暨漢魏咸建疆宇晉氏欽若厤數禪位于朕躬宜則是古訓授茲茅土以南康之平固縣奉晉帝為平固王車旗正朔一如舊典晉書桓玄傳受禪告天文晉帝欽若景運敬順明命以命于玄夫天工人代帝王所以興匪君莫治惟德司其元故承天理物必由一統竝聖不可以君非賢不可以無主故世換五帝鼎遷三代爰暨漢魏咸歸勳烈晉自中葉仍世多故海西之亂皇祚殆移九代久廓寍之功升明黜陟之勳微禹之德左衽將及太元之末君子道消積釁基亂鍾于隆安禍延士庶理絕人倫玄雖身在草澤見棄時班義情理感胡能無慨投袂剋清之勞阿衡撥亂之績皆仰憑先德遺愛之利玄何功焉屬當理運之會猥集樂推之數以寡昧之身踵下之重膺革泰之始託王公之上誠仰藉洪基德漸有由夕惕祗懷罔知悠厝君位不可以久虛人神火可以乏饗是用敢不奉以欽大禮敬簡良辰升壇受禪告類上帝以永綏民望式孚萬邦惟明靈是饗晉書桓玄傳奏止百僚拜陵百僚拜陵起于中興非晉舊典積習生常遂為近法尋武皇帝詔乃不使人主諸王拜陵豈惟百僚謂宜遵奉宋書禮志二又通典五十二安帝元興元年左僕射桓謙奏荅桓玄書明沙門不應致敬王者中軍將軍尚書令宜陽開國侯桓謙等惶恐死罪奉誨使沙門致敬王者何庾雖論意未究盡此是大事宜使允中實如雅論然佛法與老孔殊趣禮教正乖人以髮膚為重而彼髡削不疑出家棄親不以色養為孝土木形骸絕欲止競不期一生要福萬劫世之所貴己皆落之禮教所重意悉絕之資父事君天屬之至猶離其親愛豈得致禮萬乘勢自應廢彌歷三代置其絕羈當以神明無方示不以涯檢視聽之外或別有理今便使其致恭恐應革者多非惟拜起又王者奉法出于敬信其理而變其儀復是情所未了即而容之乃是在宥之弘王令以別荅公難孔國張敞在彼想已面諮所懷道寶諸道人竝足酬對高旨下官等不諳佛理率情以言愧不足覽謙等惶恐罪沙門不拜俗事一
