body:
  text: 宣帝遺詔子弟群官皆不得謁陵宋書禮志二案云詔云陵皆武帝受禪後追稱今從大例以詔令編于書疏之前原公孫淵黨屬令古之伐國誅其鯨鯢而已諸為文懿詿誤者皆原之中國人欲還舊鄉恣聽之晉書宣帝紀教今日當將作四千人東為三軍作營塹壘又當將斧三百枚破樹木作鹿角塞諸郵漏處御覽三百三十七當教諸圍上守守皆作棒人一枚輕重長短者各各可守皆當頭施紉挂臂賊破死在旦夕邂逅衝突圍當以棓棓之御覽三日五十七上書固讓丞相臣親受顧命憂深責重憑賴天威摧弊奸凶贖罪為幸功不足論又三公之官聖王所制著之典禮至於丞相始至秦政漢氏因之無復變改今三公之官皆備橫復寵臣違越先典革聖明之經襲秦漢之路雖在異人臣所宜正況當臣身而不固爭四方議者將謂臣何魏志齊王紀注引孔衍漢魏春秋上言得玉印征西大將軍臣懿等言長安典農中郎將張烈書言所部人左先雨後於地得玉印臣今謹遣夏裕送通典五十五奏事秋雨澇傷五穀又無菜蔬萬民已有食桑榆皮者御覽三十五引魏名臣奏奏罷曹爽等典兵臣昔從遼東還先帝詔陛下秦王及臣升御床把臣臂深以後事為念臣言二祖亦屬臣以後事為念此自陛下所見無所憂苦萬一有不如意臣當以死奉明詔黃門令董箕等才人侍疾者皆所聞知今大將軍爽背棄顧命敗亂國典內則僭擬外專威權破壞諸營盡據禁兵群官要職皆置所親殿中宿衛歷世舊人皆復斥出欲置新人以樹私計根據槃牙縱恣日甚外既如此又以黃門張當為都監專共交關看察至尊候伺神器離間二宮傷害骨肉天下洶洶人懷危懼陛下但為寄坐豈得久安此非先帝詔陛下及臣升御床之本意也臣雖朽邁敢忘往言昔趙高極意秦氏以滅呂霍早斷漢祚永世此乃陛下之大鑒臣授命之時也太尉臣濟尚書令臣孚等皆以爽為有無君之心兄弟不宜典兵宿衛奏永寍宮皇太后令敕臣如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵以侯就第不得逗留以稽車駕敢有稽留便以軍法從事臣輒力疾將兵屯洛水浮橋伺察非常魏志曹爽傳又略見晉書宣帝紀太史丞許芝上符命事議督軍御史中丞司馬懿侍御史鄭渾羊祕鮑勛武周等言令如左伏讀太史丞許芝上符命事臣等聞有唐世衰天命在虞虞氏世衰天命在夏然則天地之靈厤數之運去就之符惟德所在故孔子曰鳳鳥不至河不出圖吾已矣夫今漢室衰自安和沖質以來國統屢絕桓靈荒淫祿去公室此乃天命去就非一朝一夕其所由來久矣殿下踐阼至德廣被格于上下天人感應符瑞竝臻考之舊史未有若今日之盛夫大人者先天而天弗違後天而奉天時天時已至而猶謙讓者舜禹所不為也故生民蒙救濟之惠群類受育長之施今八方顒顒大小注望皇天乃眷神人同謀十分而九以委質義過周文所謂過恭也臣妾上下伏所不安魏志文帝紀注引獻帝傳除九品州置大中正議安九品之狀諸中正既未能料究人才以為可除九品州置大中正御覽六百二十九與諸葛亮書黃公衡快士也每坐起歎述足下不去口實蜀志黃權傳以書喻孟達將軍昔棄劉備託身國家國家委將軍以疆場之任任將軍以圖蜀之事可謂心貫白日蜀人愚智莫不切齒於將軍諸葛亮欲相破惟苦無路耳模之所言非小事也亮豈輕之而令宣露此殆易知耳晉書宣帝紀達與太守申儀有隙亮欲促其事乃遣郭模詐降過儀因漏泄其謀達聞其謀漏泄將舉兵懿以書喻之又見華陽國志二復弟孚書亮志大而不見機多謀而少決好兵而無權雖提卒十萬已墮吾畫中破之必矣晉書宣帝紀報夏侯玄書審官擇人除重官改服制皆大善禮鄉閭本行朝廷考事大指如所示而中間一相承習卒不能改秦時無刺史但有郡守長吏漢家雖有刺史奉六條而已故刺史稱傳車其吏言從事居無常治吏不成臣其後轉更為官司耳昔賈誼亦患服制漢文雖身服弋綈猶不能使上下如意恐此三事當待賢能然後了耳魏志夏侯玄傳答曹爽書初不知乏糧甚懷踧踖令致米一百斛并肉脯鹽豉大豆魏志曹爽傳注引魏末傳書之白阿史病轉差末皆外曹尚書云得法淳化閣帖一案晉書宣帝紀有檄告公孫淵魏志鍾會傳注以為虞松作今編入三國文赦文欽二子鴦虎令欽之罪不容誅其子固應當戮然鴦虎以窮歸命且城未拔殺之是堅其心也魏志諸葛誕傳訓天子夫聖王重始正本敬初古人所慎也明當大會萬眾瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是效易日出其言善則千里之外應之雖禮儀周備猶宜加之以祗恪以副四海顒顒式仰晉書景帝紀又上書訓天子荊山之璞雖美不琢不成其寶顏冉之才雖茂不學不弘其量仲尼有云子非生而知之者好古敏以求之者也仰觀黃軒五代之主莫不有所稟則顓頊受學於綠圖高辛問道於柏招逮至周成旦望作輔故能離經辯志安道樂業夫然故君道明於上兆庶順於下刑措之隆實由於此宜遵先王下問之義使講誦之業屢聞於聽典謨之言日陳於側也晉書景帝紀與群臣奏永寍宮臣等聞人道親親故尊祖尊祖故敬宗禮大宗無嗣則擇支子之賢者為人後者為之子也東海定王子高貴鄉公文皇帝之孫宜承正統以嗣烈祖明皇帝後率土有賴萬邦幸甚臣請徵公詣洛陽宮魏志齊王芳紀注引魏書與許允書鎮北雖少事而都典一方念足下震華鼓建朱節歷本州此所謂著繡晝行也魏志夏侯侯玄傳注文選赭白馬賦注竝引魏略又見世說賢媛篇注讓諡兄司馬師為武公表臣亡父不敢受丞相相國九命之禮亡兄不敢受相國之位誠以太祖常所階歷也今諡與二祖同必所祗懼昔蕭何張良霍光咸有匡佐之功何諡文終良諡文成諡宣成必以文武為諡請依何等就加晉書景帝紀請魏帝親征諸葛誕表昔黥布叛逆漢祖親征隗囂違戾光武西伐烈祖明皇帝乘輿仍出皆所以奮揚赫斯震耀威武也陛下宜暫臨戎使將士得憑天威今諸軍可五十萬以眾擊寡蔑不剋矣晉書文帝紀奏收成濟故高貴鄉公率將從駕人兵拔刃鳴金鼓向臣所臣懼兵刃相接即敕將士不得有所傷害違令者以軍法從事騎督成倅弟太子舍人濟橫入兵陣傷公遂至隕命輒收濟行軍法臣聞人臣之節有死無二事上之義不敢逃難前者變故卒至禍同發機誠欲委身守死唯命所裁然惟本謀乃欲上危皇太后傾覆宗廟臣忝當大任義在安國懼雖身死罪責彌重欲遵伊周之權以安社稷之難即駱驛申敕不得迫近輦輿而濟遽入陣間以致大變哀怛痛恨五內摧裂不知何地可以隕墜科律大逆無道父母妻子同產皆斬濟凶戾悖逆十國亂紀罪不容誅輒敕侍御史收濟家屬付廷尉結正其罪魏志高貴鄉公紀晉書文帝紀與鄭袤書小兒得廁賢子之流愧有竊賢之累晉書鄭袤傳與王基書初議者云云求移者甚眾時未臨履亦謂宜然將軍深算利害獨秉固志上違詔命下拒眾議終至制敵擒賊雖古人所述不是過也魏志王基傳通典一百五十八報王基書凡處事者多曲相從順鮮能確然共盡理實誠感忠愛每見規示輒敬依來指魏志王基傳與山濤書足下在事清明潔操邁時念多所乏今致錢二十萬絲百觔穀二百斛蓺文類聚四十八引王隱晉書又見晉書山濤傳有刪節案吳志孫皓傳注引漢晉春秋有晉文王與孫皓書乃荀勖作編入勖集與鍾會書恐鄧艾或不就徵今遣中護軍賈充將步騎萬人徑入斜谷屯樂城吾自將十萬屯長安相見在近魏志鍾會傳
