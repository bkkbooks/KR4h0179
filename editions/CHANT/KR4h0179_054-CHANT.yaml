body:
  text: 袁準一招公子河內青稻新城白稉弱臭游梁濡螖通芳北堂書鈔一百四十二蓺文類聚八十五蒸豚炰鼇炙鶉炙雁鷺閔備文黃散北堂書鈔一百四十二遼東細粒鮫氏寒鵠𧓈雁同上索蘭枝而不得見巨房之大栗蓺文類聚八十七獻言于曹爽宜捐淮漢巳南吳楚之民脆弱寡能英才大賢不出其土比技量力不足與中國相抗然自上世以來常為中國患者蓋以江漢為池舟楫為用利則陸鈔不利則入水攻之道遠中國之長技無所用之也孫權自十數年以來大畋江北繕治甲兵精其守禦數出盜竊敢遠其水陸次平土此中國所願聞也夫用兵者貴以飽待飢以逸擊勞師不欲久行不欲遠守少則固力專則彊當今宜捐淮漢以南退卻避之若賊能入居中央來侵邊境則隨其所短中國之長技得用矣若不敢來則邊境得安無鈔盜之憂矣使我國富兵彊政修民一陵其國不足為遠矣今襄陽孤在漢南賊循漢而上則斷而不通一戰而勝則不攻而自服故置之無益于國亡之不足為辱自江夏已東淮南諸郡三后已來其所亡幾何以近賊疆界易鈔掠之故哉若徙之淮北遠絕其間則民人安樂何鳴吠之驚乎魏志齊王芳紀注才性論凡萬物生于天地之間有美有惡物何故美清氣之所生也物何故惡濁氣之所施也夫金石絲竹中天地之氣黼黻玄黃應五方之色有五君子以此得曲直者木之性也曲者中鉤直者中繩輪桷之材也賢不肖者人之性也賢者為師不尚者為資師資之材也然則性言其質才名其用明矣蓺文類聚二十一喪服傳案孔子家語曰男子十六而成童女子十四而化育此成人之大例也人成有早晚又案左氏傳曰國君十五而生子冠而生子禮也然則十五十六可以為成人矣女七歲男八歲而墮齒此墮齒之大例也以是而處殤之義則七歲至九歲宜為下殤十歲至十二宜為中殤十三至十五宜為長殤合古十六成人十五生子之義十九以下四歲之差傳所記者非經典也二十而冠三十而娶是無不冠不娶之限耳若必三十則舜為得禮矣奚為稱鰥哉通典九十袁子正論伏羲畫八卦觸類而長六十四卦文王作彖象書鈔九十九書稱欽哉惟刑之恤又曰宥過無大刑無小此前王明德慎罰之意也昔漢文感緹縈之孝遂去肉刑近則太宗視明堂之圖欲寬背罰于公以陰德救物袁安恥織鞫罪人此前代聖主賢臣欽恤之志也御覽六百三十六國之大祭有五禘祫郊祖宗報此五者禮之大節也初學記十三天地者帝王所受命設祀而敬之書鈔九十明堂宗廟太學禮之大物也事義不同固各有所為而代之儒者合以為一體取詩書放逸之文經典相似之語推而致之攷之人情失之遠矣宗廟之中人所致敬幽隱清淨鬼神所居而使眾學處焉饗射其中人鬼慢黷死生交錯囚俘截耳瘡痍流血以干鬼神非其理也茅茨采椽至質之物建日月乘玉輅以處其中非其類也夫宗廟鬼神之居祭天而于人鬼之室非其處也王者五門宗廟在一門之內若在廟而張三侯又辟雝在內人物眾多非宗廟之中所能容也通典四十四又略見御覽五百三十三禘祫先儒或為同或為異然祫及壇墠禘及郊宗石室此所及遠近之殺也大傳曰禮不王不禘諸侯不禘降殺于天子也若禘祫同貫此諸侯亦不得祫非徒不禘也然則禘大而祫小謂祫為殷祭者大于四時皆大祭也國語曰禘郊不過繭栗烝不過把握明禘最大與郊同也公羊傳曰大事者何祫也毀廟之主陳于太祖未毀廟之主皆升合食乎太廟何謂也曰夫禘及壇墠則毀廟也俱祭毀廟但所及異耳所及則異毀與未毀則同此論者所惑鄭謂不同是也謂禘不及毀廟則非也劉歆賈逵同毀與未毀是也不別禘祫遠近則非也通典四十九引兩條正朔自非繼亂不宜改正也通典五十五封禪之言惟周官有王大封之文齊桓公欲封禪聞管仲言而止焚燎而祭天皆王者之事非諸侯所為也是以學者疑焉後秦一主漢二君修封禪之事其制為封土方丈餘崇于太山之上皆不見于經秦漢之事未可專信管仲云禹禪會稽告天則同祭地不得異也會稽而可禪四岳皆可封也夫洛陽者天地之所合嵩山者六合之中也今處天地之中而告于嵩高可也奚必于太山白孔六帖三十六御覽五百三十六或曰同姓不相娶何也曰遠別也曰今之人外內相婚禮與曰中外之親過于同姓同姓且猶不可婚而況中外之親乎古人以為無疑故不制也今以古之不言固謂之可婚此不知禮者也或曰國語云同德則同姓同姓雖遠男女不相及異德則異姓異姓雖近男女相及也斯言何故也曰此司空季子明有為而言也文公將求秦以反國不敢逆秦故也季子曰子于子圉道路之人也咎犯曰將奪之國而況妻乎趙衰曰有求于人必先從之此不既了乎通典六十又九十五御覽五百四十一竝后匹嫡禮之大忌然此為情愛所偏無故而立之者耳綱夫妻之絕非犯宜出之罪來還則復初焉得而廢之在吳異域則事勢絕可以娶妻後妻不害焉得而遣之案竝后配嫡事不兩立前嫡承統後嫡不傳重可也二母之服則無疑于兩三年矣時俗之論曰庶子為公可以尊其母為夫人春秋之義母以子貴案隱公二年夫人子氏薨五年考仲子之宮上稱夫人下不應復言仲子明其與妾為妻也秦人來歸成風之襚不稱夫人明其私尊不通于鄰國也左氏傳曰竝后配嫡亂之本也公羊亦云母以子貴說曰穀梁云秦人來歸成風之襚秦不云夫人也就外不云夫人而見正焉夫身為國君而母為妾庶子孫所不忍臣下所不安故私稱于國中不加境外此人子之情國人之私而止于禮法之正也假有庶子數人竝為三公欲各尊其母將何以止之非聖人無法此大亂之道也通典七十二周禮大祝祔練祥掌國事若無衰服焉得祥孔子曰三年之喪天下之通喪也禮記曰父母之喪無貴賤一也又云公之喪大夫俟練士卒哭而歸此終喪衰麻之言也春秋左傳曰三年之喪雖貴遂服禮也言雖貴不得與賤者有異也言服而不言喪衰麻可知也凡春秋傳諸稱職除喪皆因時宜耳高宗信默何以是心喪通典八十為父後者為出母無服喪者不祭故也其以出不得不降安有母子至親而無服乎釋服而祭可也通典八十九禮記繼父服齊衰此則自制父也亂名之大者通典九十案禮喪服云為曾祖父母齊衰三月自天子至于士一也祖周則曾祖大功高祖小功而云三月者此通遠祖之言也今有彭祖之壽無名之祖存焉爾雅有來孫雲孫仍孫昆孫有相及者故也十代之祖在堂則不可以無服也郯子曰我高祖少皞摯之立也非五代之祖也蒯聵禱康叔自稱曾孫非四代之祖孫然則高遠也無名之祖希及之矣故不復分別而重言之也故三月以著遠祖之服故齊衰以見高祖以上之服遠祖尊故人重服服之恩殺故減其月數故舉三月則知其遠祖稱曾高其服同也儒者或以為高祖無服五屬之文而云無服乎族祖祖父緦麻而曾祖三月乎通典九十或人云嫂親者也長嫂少弟有生長之恩而云無服者近非古也殆秦燔詩書之所失也通典九十二保母者當為保姆春秋宋伯姬侍姆是也非母之名也母者因父得稱且保傅婦人輔相婢之貴者耳而為之服不亦重乎先儒欲使公之庶子為母無服而服乳母乎此時俗之名記者集以為禮非聖人之制通典九十二從母小功五月舅緦麻三月禮非也從母緦時俗所謂姨母者也舅之與姨俱母之姊妹兄弟焉得異服從母者從其母而為庶母者也親益重故小功也凡稱父母者皆同乎父母之例者也舅非父列姨非母列故舅不稱父姨不稱母也可稱姨不應稱母謂姨母為從母者此時俗之亂名書之所由誤也秦秋傳蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而享之爾雅曰妻之姊妹同出為姨此本名者也左傳臧宣叔娶于鑄生賈及為而卒繼室以其姪穆姜之姨子也以蔡侯爾雅言之穆姜焉得言姨此緣妻姊妹之姨因相謂為姨也姊妹相謂為姨故其子謂之姨子其母謂之姨母從其母而來故謂之從母從母姨母為親一也因復謂之從母此因假轉亂而遂為名者也又左傳宋景曹卒季康子使冉有弔且會葬曰以肥之得備彌甥先儒曰彌遠也姊妹之孫為彌甥此臨時說事而遂可為名乎亦猶從母轉相假也或曰案準以經云從母是其母姊妹從其母來為己庶母其親益重故服小功非通謂母之姊妹也宣舒曰二女相與行有同車之道坐有同席之禮其情親而比其恩曲而至由此觀之姊妹通斯同矣兄妹別斯異矣同者親之本異者疏之源也然則二女之服何其不重邪兄妹之服何其不輕邪曰同父而生父之所不降子亦不敢降故二女不敢相與重然則舅何故三月邪從母何故小功邪曰故母取其愛是以王父之尊禮無厭降之道為人子者順母之情親乎母之類斯盡孝之道也是以從母重而舅輕也曰姑與父異德異名叔父與父同德同名何無輕重之降邪曰姑與叔父斯王父愛之所同也父之所不降子亦不敢降此叔父與姑所以服同而無降也通典九十二引兩條為父後猶服嫁母據外祖異族猶廢祭行服知父後應服嫁母通典九十四喪無再服然哀甚不可無服若終月數是再服也道遠則過之可也道近旬月可也或問何親服緦大功以上可也通典一百二先儒以為再祭小祥大祥也而喪者已祥則除大祥不應服禫且虞在既葬不在日月禫在喪終不在早晚故宜禫不宜祥通典一百三公羊高道聽塗說之書欲以鄉曲之辯訥聖人之經非其任也書鈔九十五御覽六百八兵有三勇主愛其民者勇有威刑者勇賞信于民者勇故仁愛加于下則有必死之民御覽四百三十七良醫療病攻于腠理初學記二十太祖破呂布袁渙在軍中陳群父子見上拜唯袁渙獨高揖不為禮上嚴敬之御覽五百四十三案此當在自序中而御覽引作正論則正論有自序篇可知渙有四子侃寓奧準侃字公然論議清當柔而不犯善與人交在廢興之間人之所趣務者常謙退不為也時人以是稱之歷位黃門選部郎稍遷至尚書早卒寓字宣厚精辨有機理好道家之言少被病未官而卒奧字公榮行足以厲俗言約而理富終于光祿勳準字孝尼忠信公正不恥下問唯恐人之不勝己以世事多險故常治退而不敢求進著書十餘萬言論治世之務為易周官詩傳及論五經滯義聖人之微言以傳于世三國志袁渙傳注引袁氏世紀云此準之自序也
