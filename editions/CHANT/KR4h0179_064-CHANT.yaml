body:
  text: 卷六十四孫盛蜀先主託孤魏氏春秋評夫杖道挾義體存信順然後能匡主濟功終定大業語曰弈者舉棊不定猶不勝其偶況量君之才否而二三其節何以推服強鄰囊括四海者乎備之命亮亂孰甚焉世或有謂備欲以固委付之人且以一蜀人之志君子曰不然苟所寄忠賢則不須若斯之誨如非其人不宜啟篡逆之塗是以古之顧命必貽話言詭偽之辭非託孤之謂幸值劉禪闇弱無猜險之性諸葛威略足以檢衛異端故使異同之心無由自起耳不然殆生疑隙不逞之釁謂之為權不亦惑哉蜀志諸葛亮傳注諸葛亮不裁抑法正夫威福自下亡家害國之道刑縱于寵毀政亂理之源安可以功臣而極其陵肆嬖幸而藉其國柄者哉故顛頡雖勤不免違命之刑揚干雖親猶加亂行之戮夫豈不愛王憲故也諸葛氏之言于是乎失政刑矣蜀志法正傳注法正說先主宜厚許靖以眩遠近夫禮賢崇德為邦之要道封墓式閭先王之令軌故必以體行英邈高義冠世然後可以延視四海振服群黎苟非其人道不虛行靖處室則友于不穆出身則受位非所語信則夷險易心論識則殆為釁首安在其可寵先而有以感致者乎若乃浮虛是崇偷薄斯榮則秉直仗義之士將何以禮之正務眩惑之術違貴尚之風譬之郭隗非其倫矣蜀志法正傳注譙周說後主降魏春秋之義國君死社稷卿大夫死位況稱天子而可辱于人乎周謂萬乘之君偷生苟免亡禮希利要冀微榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城借一自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以強卒鎮夜郎蜀土險狹山水峻隔絕巘激湍非步卒所涉若悉收舟楫保據江州徵兵南中乞師東國如此則姜廖五將自然雲從吳之二師承命電赴何投寄之無所而慮于必亡邪魏師之來褰國大舉欲追則舟楫靡資欲留則師老多虞且屈伸有會情勢代起徐因思奮之民以攻驕惰之卒此越王所以敗闔廬田單所以摧騎劫也何為匆匆遽自囚虜下堅壁于敵人致斫石之至恨哉葛生有云事之不濟則已耳安能復為之下壯哉斯言可以立懦夫之志矣觀古燕齊荊越之敗或國覆主滅或魚縣鳥竄終能建功立事康復社稷豈曰天助抑人謀也向使懷苟存之計納譙周之言何邦基之能構令名之可獲哉禪既闇主周實駑臣方之申包田單范蠡大夫種不亦遠乎蜀志譙周傳注郤正著論以姜維為一時儀表異哉郤氏之論也夫士雖百行操業萬殊至于忠孝節義百行之冠冕也姜維策名魏室而外奔蜀朝違君徇利不可謂忠捐親苟免不可謂孝害加舊邦不可謂義敗不死難不可謂節且德政未敷而疲民以逞居禦侮之任而致于失守于夫智勇莫可云也凡斯六者維無一焉實有魏之逋臣亡國之亂相而云人之儀表斯亦惑矣縱雖好書而微自藻絜豈異夫盜者分財之義而程鄭降階之善也蜀志姜維傳注宗預聘吳夫帝王之保唯道與義道義既建雖小可大殷周是也苟任詐力雖彊必敗秦項是也況乎居偏鄙之域恃山水之固而欲連橫萬里永相資賴哉昔九國建合從之計而秦人卒併六合囂述營輔車之謀而光武終兼隴蜀夫以九國之彊隴漢之大莫能相救坐視屠覆何者道德之基不固而強弱之心難一故也而云吳不可無蜀蜀不可無吳豈不諂哉蜀志宗預傳注吳主權臣魏昔伯夷叔齊不屈有周魯仲連不為秦民夫以匹夫之志猶義不辱況列國之君三分天下而可二三其節或臣或否乎余觀吳蜀咸稱奉漢至于漢代莫能固秉臣節君子是以知其不能克昌厥後卒見吞于大國也向使權從群臣之議終身稱漢將豈不義悲六合仁感百世哉吳志大帝傳注陳武戰死吳主以其愛妾殉葬昔三良從秦穆師以之不征魏妾既出杜回以之僵仆禍福之報如此之效也權杖計任術以生從死世祚之促不亦宜乎吳志陳武傳注吳主不罪朱桓書云臣無作威作福作烕作福則凶于而家害于而國桓之賊忍殆虎狼也人君且猶不可況將相乎語曰得一夫而失一國縱罪虧刑失孰大焉吳志朱桓傳注吳主厚待諸將觀孫權之養士也傾心竭思以求其死力泣周泰之夷殉陳武之妾請呂蒙之命育淩統之孤卑曲苦志如此之勤也是故雖令德無聞仁澤內著而能屈彊荊吳僭擬年歲者抑有由也然霸王之道期于大者遠者是以先王建德義之基恢信順之宇制經略之綱明貴賤之序易𥳑而其親可久體全而其功可大豈踒璅近務邀利于當年哉語曰雖小道必有可觀者焉致遠恐泥其是之謂乎吳志淩統傳注吳主事神盛聞國將興聽于民國將亡聽于神權年老志衰讒臣在側廢適立庶以妾為妻可謂多涼德矣而偽設符命求福妖邪將亡之兆不亦顯乎吳志大帝傳注呂岱誅士徽夫柔遠能邇莫善于信保大定功莫善于義故齊桓創基德彰于柯會晉文始伯義顯于伐原故能九合一匡世主夏盟令問長世貽範百王呂岱師友士匡使通信誓徽兄弟肉袒推心委命岱因滅之以要功利君子是以知孫權之不能遠略而呂氏之祚不延者也吳志士燮傅注趙達知東南有王氣可以避難夫玄覽未然逆鑒來事雖裨竈梓慎其猶病諸況術之下此者乎吳史書達知東南當有王氣故輕舉濟江魏承漢緒受命中畿達不能豫覩兆萌而流竄吳越又不知吝術之鄙見薄于時安在其能逆覩天道而審帝王之符瑞哉昔聖王觀天地之文以畫八卦之象故亹亹著于蓍策變化形乎六爻是以三易雖殊卦繇理一安有回轉一籌可以鉤深測隱意對逆占而能遂知來物者乎流俗好異妄設神奇不幸之中仲尼所棄是以君子志其大者無所取諸吳志趙達傳注世語袁紹步卒五萬騎八千魏氏春秋異同評按魏武謂崔琰曰昨按貴州戶籍可得三十萬眾由此推之但冀州勝兵已如此況兼幽并及青州乎紹之大舉必悉師而起十萬近之矣魏志袁紹傳注陳壽記合肥與赤壁事次第與吳志不同案吳志劉備先破公軍然後權攻合肥而此記云權先攻合肥後有赤壁之事二者不同吳志為是魏志武帝紀注引異同評曹瞞傳及世語桓階勸曹公正位夏侯惇謂宜先定吳蜀夏侯惇恥為漢官求受魏印桓階方惇有義直之節攷其傳記世語為妄矣魏志武帝紀注世語景王疾甚以朝政授傅嘏嘏不敢受晉宣景文王之相魏也權重相承王業基矣豈蕞爾傅嘏所宜問廁世語所云斯不然矣魏志傅嘏傳注世語劉表請備宴會蒯越蔡瑁欲因會取備備潛遁乘的盧走渡檀溪此不然之言備時羈旅客主勢殊若有此變豈敢晏然終表之世而無釁故乎此皆世俗妄說非事實也蜀志先主傳注江表傳備心未許周瑜能必破北軍故差池在後為進退計劉備雄才處必亡之地告急于吳而獲奔助無緣復顧望江渚而懷後計江表傳之言當是吳人欲專美之辭蜀志先主傳注孫策謀襲許未發為許貢客所殺凡此數書各有所失孫策雖威行江外略有六郡然黃祖乘其上流陳登閒其心腹且深險彊宗未盡歸復曹袁虎爭勢傾山海策豈暇遠師汝潁而遷帝于吳越哉斯蓋庸人之所鑒見況策達于事勢者乎又按袁紹以建安五年至黎陽而策以四月遇害而志云策聞曹公與紹相拒于官渡謬矣伐登之言為有證也又江表傳說策悉識韓當軍士疑此為詐便射殺一人夫三軍將士或有新附策為大將何能悉識以所不識便射殺之非其論也又策見殺在五年柳城之役在十二年九州春秋乖錯尤甚矣吳志孫破虜傳注魏書及九州春秋魯肅激說權使迎曹公權欲斬肅吳書及江表傳魯肅一見孫權便說拒曹公而論帝王之略劉表之死也又請使觀變無緣方復激說勸迎曹公也又是時勸迎者眾而云獨欲斬肅非其論也吳志魯肅傳注陳壽記朱然事誤魏志及江表傳云然以景初元年正始二年再出為寇所破胡質蒲忠在景初元年魏志承魏書依違不說質等為然所破而直云然退耳吳志說赤烏五年于魏為正始三年魏將蒲忠與朱然戰忠不利質等皆退案魏少帝紀及孫權傳是歲竝無事當是陳壽誤以吳嘉禾六年為赤烏五年耳吳志朱然傳注引異同評諸葛恪被殺事陳壽記與吳厤不同恪與胤親厚約等疏非常大事勢應示胤共謀安危然恪性強梁加素侮峻自不信故入耳豈胤微勸便為之冒禍乎吳厤為長吳志諸葛恪傳注晉陽秋評姜維謀復蜀盛以永和初從安西將軍平蜀見諸故老及姜維既降之後密與劉禪表疏說欲偽服事鍾會因殺之以復蜀士會事不捷遂至泯滅蜀人于今傷之盛以為古人云非所困而困焉名必辱非所據而據焉身必危既辱且危死其將至其姜維之謂乎鄧艾之入江由士眾鮮少維進不能奮節緜竹之下退不能總帥五將擁衛蜀主思後圖之計而乃反覆于逆順之閒希違情于難冀之會以衰弱之國而屢觀兵于三秦已滅之邦冀理外之奇舉不亦闇哉蜀志姜維傳注晉用前代正朔服色孔子修春秋列三紀為後王法今仍舊非也且晉為金行而服色尚赤攷之天道乖違甚矣宋書禮志一通典五十五晉平吳封孫皓為歸命侯夫古之立君所以司牧群黎故必仰協乾坤覆燾萬物若乃淫虐是縱酷彼群生則天人殛之勦絕其祚奪其南面之尊加其獨夫之戮是故湯武抗鉞不犯不順之譏漢高奮劍而無失節之議何者誠四海之酷讎而人神之所擯故也況皓罪為逋寇虐過辛癸梟首素旗猶不足以謝冤魂洿室荐社未足以紀暴迹而乃優以顯命寵錫仍加豈恭行天罰伐罪弔民之義乎是以知僭逆之不懲而凶酷之莫戒詩云取彼譖人投畀豺虎聊譖猶然矧譖虐乎且神旂電埽兵臨偽窟理窮勢迫然後請命不赦之眾既彰三驅之義又塞極之權道亦無取焉吳志歸命侯傳注庾純父老未告歸養若乃冢宰大臣不以家事辭王事折小全大自非此族固宜盡陟岵之思如匹夫之志或不可奪縱未裁抑者孝子之心何得忍而不言純未嘗告誠非也通典六十八王衍夫芝蘭之不與茨棘俱值鸞皇之不與梟鴞同棲天理固然易在曉悟文選辨命論注懷帝紀總評懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政祿去王室無幽厲之釁而有驪戎之禍悲夫御覽九十八元帝詔親執觴懷愍于太廟陽秋傳云臣子一例也雖繼君位不以後尊降廢前敬昔魯僖上嗣莊公以友于長幼而外之為逆準之古義明詔是也宋書禮志三引晉春秋元帝紀總評昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣于是始皇改曰秣陵吳人以為孫權帝之表也盛案始皇遊歲至權僭號四百三十七年攷之年數既不合校之基宇又非倫豈應帝王之符而見兆于上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨平湖一夜草木自除于湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徵歃太康三年建業有寇餘姚人任振以周易筮之曰寇已滅矣後三十八年揚州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅邪西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲星鎮辰太白四星聚于斗牛之間五鐸又見于晉陵冥數玄感若合符契焉又初玄石圖有牛繼馬後故宣帝深忌牛氏遂為二榼其一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏侯氏通小吏牛欽而生元帝亦有符云御覽九十八東海國妃與嗣王異服廢三年之禮開偷薄之原漢魏失之大者也今若以丈夫宜奪以王事婦人可終本服是為吉凶之儀雜陳于宮寢綵素之制乖異于內外無乃情禮俱違哀樂失所乎蕃國寡務宜如聖典可無疑矣宋書禮志二晉穆帝時東海國言哀王薨踰年嗣王乃來繼不復追服國妃亦宜同除詔國妃終三年之制老子疑問反訊道經云故常無欲以觀其妙故常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄眾妙之門舊說及王弼解妙謂始徼謂終也夫觀始要終覩妙知著達人之鑒也既已欲澄神昭其妙始則自思已口宜悉鎮之何以復須有欲得其終乎宜有欲俱出妙門同謂之玄若然以往復何獨貴于無欲乎天下皆知美之為美斯惡已皆知善之為善斯不善已盛以為美惡之名生乎美惡之實道德淳美則有善名頑嚚聾昧則有惡聲故易曰惡不積不足以滅身又曰美在其中而畼于四支發于事業又曰韶盡美矣未盡善也然則大美大善天下皆知之何得云斯惡乎若虛美非美為善非善所美過美所善違中若此皆世教所疾聖王奮誡天下亦自知之于斯談不尚賢使民不爭不貴難得之貨使人不為盜常使民無知無欲使知者不敢為又曰絕學無憂唯之與阿相去幾何善之與惡相去何若下章云善人不善人之師不善人善人之資不貴甚師不愛其資雖智大迷盛以為民苟無欲亦何所師于師哉既相師資非學如何不善師善非尚賢如何貴愛既存則美惡不得不障非相去何若之謂又下章云人之所教我亦以教人吾言甚易知而天下莫能知又曰吾將以為教父原斯談也未為絕學所云絕者堯孔之學邪堯孔之學隨時設教老氏之言一其所尚隨時設教所以道通百代一其所尚不得不滯于適變此又闇弊所未能通者也道沖而用之或不盈和其光同其塵盛以為老聃可謂知道非體道者也昔陶唐之蒞天下也無日解哉則維照任眾師錫匹夫則馺然禪授豈非沖而用之光塵同波哉伯陽則不然既處濁位復遠遁西戎行止則猖狂其迹著書則矯誑其言和光同塵固若是乎余固以為知道體道則未也三者不可致詰混然為一繩繩兮不可名復歸于無物無物之象是謂惚怳下章云道之為物唯怳與惚惚兮怳兮其中有像怳兮惚兮其中有物此二章或言無物或言有物先有所不宜者也執古之道以御今之有下章執者失之為者敗之而復云執古之道以御今之有或執或否得無陷矛盾之論乎絕聖棄知民利百倍孫盛曰夫有仁聖必有仁聖之德迹此而不崇則陶訓焉融仁義不尚則孝慈道喪老氏既云絕聖而每章輒稱聖人既稱聖人則迹焉能得絕若所欲絕者絕堯舜周孔之迹則所稱聖者為是何聖之迹乎即如其言聖人有宜滅其迹者有宜稱其迹者稱滅不同吾誰適從絕仁棄義民復孝慈若如此談仁義不絕則不孝不慈矣復云居善地與善仁不審與善仁之仁是向所云欲絕者非邪如其是也則不宜復稱述矣如其非也則未詳二仁之義一仁宜絕一仁宜明此又所未達也若謂不聖之之聖不仁之仁則教所誅不假高唱矣逮至莊周云聖人不死大盜不止又曰田常竊仁義以取齊國夫天地陶鑄善惡兼育各稟自然理不相關梟鴆縱毒不假學于鸞鳳豺虎肆害不借術于麒麟此皆天質自然不須外物者也何至凶頑之人獨當假仁義以濟其姦乎若乃冒頓殺父鄭伯盜鄶豈復先假孝道獲其終害乎而莊李掊擊殺根毀駮正訓何異疾盜賊而銷鑄干戈覩食噎而絕棄嘉穀乎後之談者雖曲為其義辯而釋之莫不艱屯于殺聖困躓于忘親也知我者希則我貴矣上章云聖人之在天下也百姓皆注其耳目師資貴愛必彰萬物如斯則知之者安得希哉知希者何必貴哉即已之身見貴九服何得佩實抗言云貴由知希哉斯蓋欲抑動恆俗故發此過言耳聖教則不然中和其詞以理訓導故曰在家必聞在邦必聞也是聞必達也不見善而無悶潛龍之德人不知而不慍君子之道眾好之必察焉眾惡之必察焉既不以知多為顯亦不以知少為貴誨誘綽綽理中自然可與老聃之言同日而語其優劣哉禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不處其薄處其實不處其華也孫盛曰老聃足知聖人禮樂非玄勝之具不獲已而制作耳而故毀之何哉是故屏撥禮學以全其任自然之論豈不知叔末不復得返自然之道直欲伸己好之懷然則不免情于所悅非浪心救物者也非唯不救乃獎其弊矣王侯得一以為天下貞貞正也下章云孰知其極其無正正復為奇善復為妖尋此二章或云天下正或言無正既云善人不善人師而復云為妖天下之善一也而或師或妖天于之正道一也而云正復奇斯反鄙見所未能通也或問老莊所以故發此唱蓋與聖教相為表裏其于陶物明訓其歸一也盛以為不然夫聖人之道廣大悉備猶日月懸天有何不照者哉老氏之言皆駮于六經矣寍復有所愆之俟佐助于聃周乎即莊周所謂日月出矣而爝火不息者也至于虛誑譎怪矯詭之言尚拘滯于一方而橫稱不經之奇詞也廣宏明集五廬山賦尋陽郡南有廬山九江之鎮也臨彭蠡之澤接平敞之原水經廬江水注西寺銘序西寺銘序長沙西寺層構傾穨謀欲建立其日有童子持紙花插地故寺東西相去十餘丈于是建創正當花處初學記二十一御覽六百五
