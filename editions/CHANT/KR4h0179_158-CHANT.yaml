body:
  text: 釋道安荅郄超書損米千斛彌覺有待之為類世說雅量篇注作愈覺釋藏輦八又百五道行般若多羅蜜經序大哉智度萬聖資通咸宗以成也地合日照無法不周不恃不處累彼有名既外有名亦病無形兩忘玄莫隤然無主此智之紀也夫永壽莫美乎上乾而齊之殤子神偉莫美於淩虛而同之涓滯至德莫大乎真人而比之朽種高妙莫大乎世雄而喻之幻夢由此論之亮為眾聖宗矣何者執道御有卑高有差此有為之域耳非據真如遊法性冥然無名據真如遊法性冥然無名者智度之奧室也名教遠想者智度之蘧廬也然存乎證者莫不矉其生無而惶眩存乎迹者莫不忿其蕩冥而誕誹道動必反優劣致殊眩誹不其宜乎不其宜乎要斯法也與進度齊軫逍遙俱遊千行萬定莫不以成眾行得字而智進全名諸法參相成者求之此列也且其經也進咨第一義以為語端退述權便以為談首行無細而不歷數無微而不極言似煩而各有宗義似重而各有主璅見者慶其邇教而悅寤宏哲者望其遠標而絕目陟者彌高而不能階涉者彌深而不能測謀者慮不能規尋者度不能盡暨窈冥矣真可謂大業淵藪妙矣者哉然凡論之者攷文以徵其理者昏其趣者也察句以驗其義者迷其旨者也何則攷文則同異每為辭尋句則觸類每為旨為辭則喪其卒成之致為旨則忽其始擬之義矣若率初以要其終或忘文以全其質者則大智玄通居可知也從始發意逮一切智曲成決著八地無染謂之智也故曰遠離也三脫照空四非明有統鑑諸法因後成用藥病集亡謂之觀也明此二行於三十萬言其如視諸掌乎顛沛造次無起無此也佛泥洹後外國高士鈔九十章為道行品桓靈之世朔佛齎詣京師譯為漢文因本順旨轉音如已敬順聖言了不加飾也然經既鈔撮合成章投音殊俗異譯人口傳自非三達胡能一一得本緣故乎由是道行頗有首尾隱者古賢論之往往有滯仕行恥此尋求其本到于闐乃得送詣倉垣出為放光品厈重省刪務令婉便若其悉文將過三倍善出無生論空持巧傳譯如是難為繼矣二家所出足令大智煥爾闡幽支讖全本其亦應然何者鈔經刪肖所害必多委本從聖乃佛之至誡也安不量末學庶幾斯心載詠載玩未墜於地檢其所出事本終始猶令折傷玷缺戢然無際假無放光何由解斯經乎永謝先哲所蒙多矣今集所見為解句下始況現首終隱現尾出經見異銓其得否舉本證鈔敢增損也幸我同好飾其瑕讁也釋藏淡一又跡七增一阿含經序四阿含義同中阿含首已明其旨不復重序也增一阿含者比法條貫以數相次也數終十今加其一故曰增一也且數數皆增以增為義也其為法也多錄禁律繩墨切厲乃度世檢括也外國巖岫之士江海之人於四阿含多詠味茲焉有外國沙門曇摩難提者兜怯勒國人也齠齔出家孰與廣聞誦二阿含溫故日新周行諸國無土不涉以秦建元二十年來詣長安外國鄉人咸皆善之武威太守趙文業求令出焉佛念譯傳曇嵩筆受歲在甲申夏出至來年春乃訖為四十一卷分為上下部上部二十六卷全無遺亡下部十五卷失其錄偈也余與法和共攷正之僧䂮僧茂助校漏失四十日乃此年有阿城之役伐鼓近郊而正專在斯業之中全具二阿含一百卷鞞婆沙婆和須蜜僧加羅剎傳此五大經自法東流出經之優者也四阿含四十應真之所集也十人撰一部題其起盡為錄偈焉懼法留世久遺逸散落也斯土前出諸經班班有其中者今二阿含各為新錄一卷全其故目注其得失使見經尋之差易也合上下部四百七十二經凡諸學士撰此二阿含其中往往有律語外國不通與沙彌白衣共視也而今已後幸共護之使與律同此乃茲邦之急者也斯諄諄之誨幸勿藐藐聽也廣見而不知護禁乃是學士通中創也中本起康孟詳出出大愛道品乃不知是禁經比丘尼法堪慊切真割而去之此乃是大鄙可痛恨者也此二經有力道士乃能見當以著心焉如其輕忽不以為意者幸我同志鳴鼓攻之可也釋藏形一又跡九人本欲生經序人本欲生經者照乎十二因緣而成四諦也本者癡也欲者愛也生者生死也略舉十二之三以為目也人在生死莫不浪滯於三世飄縈於九止綢繆於八縛者也十二因緣於九止則第一人亦天也四諦所鑒鑒乎九止八解所正正乎八邪邪正則無往而不恬止鑒則無往而不愉無往而不愉故能洞照傍通無往而不恬故能神變應會神變應會則不疾而速洞照傍通則不言而化不言而化故無棄人不疾而速故無遺物物之不遺人之不棄斯禪智之由也故經曰道從禪智得近泥洹豈虛也哉誠近歸之要也斯經似安世高譯為晉言也言古文悉義妙理婉覩其幽堂之美闕庭之富者或寡矣安每覽其文欲疲不能所樂而現者三觀之妙也所思而存者想滅之辭也敢以餘暇為之撮注其義同而文別者無所加訓焉釋藏禍八又跡六僧伽羅集所集佛行經序僧伽羅剎者須賴國人也佛去世後七百年生此國出家學道遊教諸邦至楗陀越土甄陀罽貳王師焉高明絕世多所述作此土修行道地經其所集也又著此經憲章世尊自始道成迄於淪虛行無巨細必因事而演遊化夏坐莫不曲備雖普耀本行度世諸經載佛起居至謂為密今攬斯經所悟復多矣傳其將終言我若立根得力大士誠不虛者立斯樹下手援其葉而棄此身使那羅延力大象之勢無能移余如毛髮也正使就邪維者當不燋此葉言然之後便即立終罽貳王自臨而不能動遂以巨絙象挽未始能搖即就邪維炎葉不傷尋昇兜術與彌勒大士高談彼宮將補佛處賢劫第八以建元二十年罽賓沙門僧伽跋澄齎此經本來詣長安武威太守趙文業請令出焉佛念為譯慧嵩筆受正值慕容作難於近郊然譯出不襄余與法和對檢定之十一月三十日乃了也此年出中阿含六十卷增一阿含四十一卷伐鼓擊柝之中而出斯一百五卷窮通不改其恬詎非先師之故迹乎釋藏宜一又跡十阿毗曇八楗度論序阿毗曇者秦言大法也眾祐有以見道困之至賾擬性形谷執乎真像謂之大也有以道慧之至齊觀如司南察乎一相謂之法故曰大法也中阿含世尊責優陀邪曰汝致詣阿毗曇乎夫然佛以身子五法為大阿毗曇也佛般涅槃後迦旃延以十二部經浩博難究撰其大法為一部八楗度四十四品也其為經也富莫上焉邃莫加焉要道無行而不由可不謂之富乎至德無妙而不出可不謂之邃乎富邃洽備故能微顯闡幽也其說智也周其說根也密其說禪也悉其說道也具周則二八用各適時密則二十迭為賓主悉則味淨遍遊其門具則利鈍各別其所以故為高座者所咨嗟三藏者所鼓舞也其身毒來諸沙門莫不祖述此經憲章鞞婆沙詠有歌有餘味者也然乃在大荒之外蔥嶺之表雖欲從之末由見也以建元十九年罽寡沙門僧伽禘婆誦此經甚利詣長安比丘釋法和請令出之佛念譯傳慧力僧茂筆受和理其旨歸自四月三十日出至十月二十三日乃訖其日檢校譯人頗雜義辭龍虵同淵金鍮共肆者彬彬如也和撫然恨之余亦深謂不可遂令更出夙夜匪懈四十六日而得盡定損可損者四卷焉至於事須懸解起盡之處皆為細其下梵本十五千七十二首慮秦言十九萬五千二百五十言其人忘因緣一品云言數可與十門等也周覽斯經有碩人所尚者三焉以高座者尚其博以盡漏者尚其要以研幾者尚其密密者龍象翹鼻鳴不造耳非人中之至恬其孰能與於此也要者八忍九斷巨細畢載非人中之至練其孰能致於此也博者眾微眾妙六八曲備非人中之至懿其孰能綜於此也其將來諸學者遊槃於其中何求而不得乎釋藏夏一又跡十安般注序安般者出入也道之所寄無往不因德之所寓無往不託是故安般寄息以成守四禪寓骸以成定也寄息故有六階之差寓骸故有四級之別階差者損之又損之以至於無為級別者忘之又忘之以至於無欲也無為故無形而不因無欲故無事而不適無形而不因故能開物無事而不適故能成務成務者即萬有而自彼開物者使天下兼忘我也彼我雙廢者守于唯守也故修行經以斯二法而成寂得斯寂者舉足而大千震揮手而日月捫疾吹而鐵圍飛微噓而須彌舞斯皆乘四禪之妙止御六息之大辯者也夫執寂以御有崇本以動末有何難也安般居十念之一於五根則念根也故撰法句者屬唯念品也昔漢氏之末有安世高者博聞稽古特專阿毗曇學其所出經禪數最悉此經其所譯也茲乃趣道之要徑何莫由斯道也魏初康會為之注義義或隱而未顯者安竊不自量敢因前人為解其下庶欲蚊翮以助隨藍霧潤以增巨壑也釋藏跡六陰持入經序陰持入者世之深病也馳騁人心變德成狂耳聾口爽耽醉榮寵抱癡投冥酸號三趣其為病也猶癩疾焉入骨徹髓良醫拱手猶蹎蹶焉來則冥然莫有所識大聖悼茲痛心內發忘身安赴塗炭含厚德忍舞擊觀羅密於重雲止罝網於八極洪癡不得振其翼巨愛不得逞其足采善心於毫芒拔凶頑於虎口以大寂為至樂五音不能聾其耳矣以無為為滋味五味不能爽其口矣曜形濁世拯擢難計陟降教終潛淪無名諸無著等尋各騰逝大弟子眾深懼妙法混然廢沒於是令迦葉集結阿難所傳凡三藏焉該羅幽廓難度難測也世雄授藥必因本病病不能均是故眾經相待乃備非彥非聖罔能綜練自茲以後神通高士各為訓釋或攬撰諸經以為行式譬瓔璣璣歟擇彼珠珍以色相發佩之冠之為光為飾喻繪事歟調別眾彩以圖暉列諸明叡者所撰亦然此經則是其數也有拾家開士出自安息字世高大慈流洽播化斯土譯梵為晉微顯闡幽其所敷宣專務禪觀醇玄道數深矣遠矣是經其所出也陰入之弊人莫知苦是故先聖照以止觀陰結日損成泥洹品自非知機其孰能與於此乎從首至於九絕都是四十五藥也以慧斷知入三部者成四諦也十二因緣訖淨法部者成四信也其為行也唯神矣故不言而成唯妙矣故不行而至統斯行者則明白四達立根得眼成十力子紹冑法王奮澤大千若取證則拔三結住壽成道俓至應真此乃大乘之舟楫泥洹之關路於斯晉土禪觀弛廢學徒雖興蔑月盡漏合者禪思守玄練微入寂在取何道猶覘掌墮替斯要而希見證不亦難乎安未近積罪生逢百罹戎狄孔棘世乏聖導潛遁晉山孤居離眾幽處窮壑竊覽篇目淺識獨見滯而不達夙宵抱疑諮諏靡質會太陽比丘竺法濟并州道人支曇講陟阻冒寇重繭遠集此二學士高明博通誨而不倦者也遂與析槃畼礙造茲注解世不值佛又處邊國音殊俗異規矩不同又以愚量聖難以逮也冀未踐緒者少有微補非敢自必析究經旨釋藏跡六了本生死經序夫四信妙輿者眾祐之寶軒也以運連縛倒見眾生凡在三界罔弗冠癡佩嬰舞生死而超陰堂揖讓色味驂惑載疑驅馳九止者也既則狎賢侮聖從其姦慝貪劍恚鏚梟截玄路群誹上要殃禍備嘗矣世雄顧愍深圖變謀法旍曜於重霓道鼓震於雷吼寂干障乎八紘慧戈陷乎三有於是破癡冠決嬰佩升信車人諦軌則因緣息成四喜矣故曰了本生死也了猶解也本則癡也元也如來指舉一隅身子伸敷高旨引興幽讚美矣盛矣夫計身有命則隨緣縛謗佛毀信若彌綸於幽矣夫解空無命則成四諦照然立信若日殿之麗乾矣斯乃五十六藥之崇基淵乎蓋眾行之宗也開微成務孰先者乎佛始得道隆建大哀此經則十六之一也其在天竺三藏聖師莫不以為教首而研幾也漢之季世此經始降茲土雅邃奧邈少達旨歸者也魏代之初有高士河南支恭明為作注解探玄畼滯真可謂人室者矣俊哲先人足以折中也然童蒙之倫猶有未悟故仍前迹附釋未訓苟非穿鑿以紫亂朱也儻孤居始進者可以辨惑焉釋藏跡六十二門經序十二門者要定之目號六雙之關徑木定有三義焉禪也等也空也用療三毒綢繆重病嬰斯幽戹其日深矣貪囹恚圄癡城至固世人遊此猶春登臺甘處欣欣如居花殿嬉樂自娛莫知為苦嘗酸速禍困憊五道夫唯正覺乃識其謬耳哀倒縣之苦傷蓬流之痛為設方便防萌塞漸闢茲慧定令自浣滌挫銳解紛返神玄路苟非至德其道不凝也夫邪僻之心必有微著是故禪法以四為差焉貪淫囹者荒色悖蒸不別尊卑渾心耽緬習以成狂亡國傾身莫不由之虛迷空醉不知為幻故以死屍散落自悟漸斷微想以至於寂味乎無味故曰四禪也瞋恚圄者爭纖芥之虛聲結瀝血之重咎恩親絕於快心交友腐於縱忿含怒徹髓不悛滅族聖人見彊梁者不得其死故訓之以等丹心讎親至柔其志受垢含苦治之未亂淳德邃厚兕不措角況人害乎故曰四等也愚癡城者誹古聖謗慢二親輕師傅斯病尤重矣以慧探本知從癡愛分別未流了之為惑練心攘慝狂病瘳矣故曰四空也行者挹禪海之深醴溉昏迷之盛火激空淨之淵流蕩癡塵之穢垢則皎然成大素矣行斯三者則知所以宰身也所以宰身者則知所以安神也所以安神者則知所以度人也然則經無巨細出自佛口神心所制言為世寶慧日既沒三界喪目經藏雖存淵玄難測自非至精孰達其微於是諸開士應真各為訓解釋其幽賾辯其差貫則爛然易見矣窮神知化何復加乎從十二門已後則是訓傳也凡學者行十二門卻盡神足滅外止麤謂之成五道也三向諸根進消內結謂盡諸漏也始入盡漏名不退轉諸佛嘉歎記其成號深不可測獨見曉焉神不可量獨見精焉陵雲輕舉淨光燭幽移海飛嶽風出電入淺者如是況成佛乎是乃三乘之大路何莫由斯定也自始發跡逮於無漏靡不周而復始習茲定也行者吹崇德廣業而不進斯法者其猶無柯而求伐不飯而求飽難以獲矣醒悟之七得聞要定不亦妙乎安宿不敏生值佛後又處異國楷範多闕仰希古列滯而未究寤寐憂悸有若疾首每惜茲邦禪業替廢敢作注於句末雖未足光融聖典且發蒙者儻易覽焉安世高善開禪數斯經似其所出故錄之於末釋藏跡六大十二門經序夫婬息存乎解色不係防閑也有絕存乎解形不係念空也色解則冶容不能縛形解則無色不能滯不縛者雖天魔玉顏窈窕豔姿莫足傾之之謂固也不滯者雖遊空無識泊然永壽莫足礙之之謂真也何者執古以御有心妙以了色雖群居猶芻靈泥洹猶如幻豈多制形而重無色哉是故聖人以四禪防淫淫無遺焉以四空滅有有無現焉淫有之息要在明乎萬形之未始有百化猶逆旅也怨憾之興興於此彼此彼既興遂成仇敵仇敵適成勃然赫怒赫怒已發無所不至至不可至神幽想獄乃毒乃辛欣之甘之是以如來訓之以等等所難等何往不等等心既富怨本息矣豈非為之乎未有圖難於其易者乎夫然則三事凶耽廢然息矣十二重關廓然闢矣根立而道生覺立而道成莫不田十二門立乎定根以逆道休也大人揮變榮光四塞彈撇安明吹沬千萬默動異剎必先正受明乎匪禪無以統乎無方而不留匪定無以周乎萬形而不礙禪定不愆於神變乎何有也至矣盡矣蔑以加矣此經世高所出也辭旨雅密正而不豔比諸禪經最為精悉案經後記云嘉禾七年在建鄴周司隸舍寫緘在篋匱向二百年矣冥然不行無聞名者比丘竺道護於東垣界賢者經中得之送詣濩澤乃得流布得經之後俄而其家遇火護若不覩為灰炭矣自然將喪斯禪也後死者不得與聞此經也此經也八音所誨四道作訓約無乏文重無簡矣精義入神何以上乎前世又為懸解一家之傳故筌而次之然世高出經貴本不飾天竺古文文通尚質倉卒尋之時有不達今為略注繼前人之末非敢亂朱冀有以寤焉釋藏跡六合放光光讚略解序放光光讚同本異譯耳其本俱出于闐國持來其年相去無幾光讚于闐沙門祇多羅以泰康七年齎來護公以其年十一月二十五日山之放光分如檀以泰康三年于闐為師送至洛陽到元康元年五月乃得山耳先光讚來四年後光讚出九年也放光于闐沙門無乂羅執梵竺叔蘭為譯言少事約刪削復重事事顯炳煥然易觀也而從約必有所遺於天竺辭及騰每大簡焉光讚護公執梵本聶承遠筆受言準天竺事不加飾悉則悉矣而辭質勝文也每至事首輒多不便諸反覆相明又不顯灼也攷其所出事周密耳互相補益所悟實多恨其寢逸涼土九十一年幾至泯滅乃達此邦也斯經既歹不具竝放光尋出大行華京息心居士翕然傳焉中山支和上遣人於倉垣斷絹寫之持還中山中山王及眾僧城南四十里幢旛迎經其行世如是是故光讚人無知者昔在趙魏併得其第一品知有茲經而求之不得至此會慧常進行慧辯等將如天竺路經涼州寫而因焉展轉秦雍以晉泰元元年五月二十四日乃達襄陽尋之玩之欣有所益輒記其所長為略解如左般若波羅蜜者成無上正真道之根也正者等也不二入也等道有三義焉法身也如也真際心故其為經也以如為首以法身為宗也如者爾也本末等爾無能令不爾也佛之興滅緜緜常存悠然無寄故曰如也法身者一也常淨也有無均淨未始有名故於戒則無戒無犯在定則無定無亂處智則無智無愚泯爾都忘二三盡息皎然不緇故曰淨也常道也真際者無所著也泊然不動湛爾玄齊無為也無不為也萬法有為而此法淵默故曰無所有者是法之真也由是其經萬行兩廢觸章輒無也何者癡則無往而非徼終日言盡物也故為八萬四千塵垢門也慧則無往而非妙終日言盡道也故為八萬四千度無極也所謂執大淨而萬行正正而不害妙乎大也凡論般若推諸病之疆服者理轍者也尋眾藥之封域者斷迹者也高談其轍亦者失其所以指南也其所以指南若假號章之不主五通碞之不貢高是其涉百辟而不失午者也宜精理其轍迹又思存其所指則始可與言智已矣何者諸五陰至薩云若則是菩薩來往所現法慧可道之道也諸一相無相則是菩薩來往所現真慧明乎常道也可道故後章或曰世俗或曰說己也常道則或曰無為或曰復說也此兩者同謂之智而不可相無也斯乃轉法輪之目要般若波羅蜜之常例也釋藏跡七摩訶鉢羅若波羅蜜經鈔序昔在漢陰十有五載講放光經歲常再徧及至京師漸四年矣亦恆歲二未敢墯息然每至滯句首尾隱沒釋卷深思恨不見護公叉羅等會建元十八年正車師前部王名彌第來朝其國師字鳩摩羅跋提獻梵天品一部四百二牒言二十千首盧首盧三十二字梵數經法也即審數之凡十七千二百六十首盧殘二十七字都并五十五萬二千四百七十五字天竺沙門曇摩蜱執本佛護為譯對而檢之慧進筆受與放光光讚同者無所更山也其二經譯人所漏者隨其失處稱而正焉其義異不知孰是者輒併而兩存之往往為訓其下凡四卷其一紙二紙異者出別為一卷合五卷也譯梵為秦有五失本也一者梵語盡倒而使從秦一失本也二者梵經尚質秦人好文傳可眾心非文不合斯二失本也三者梵經委悉至於歎詠叮嚀反覆或三或四不嫌其煩而今裁斥三失本也四者梵有義說正侶亂辭尋說向語文無以異或千五百剗而不存四失本也五者事己全成將更旁及反騰前辭己乃後說而悉除此五失本也然般若經三達之心覆面所演聖必因時𧮫有易而刪雅古以適今時一不易也愚智天隔聖人叵階乃欲以千歲之上微言傳使合百王之下末俗二不易也阿難出經去佛未久尊者大迦葉令五百六通迭察迭書今離千年而以近意量裁彼阿羅漢乃兢兢若此此生死人而平平若此豈將不知法者勇乎斯三不易也涉茲五失經三不易譯梵為秦詎可不慎乎正當以不聞異言傳令知會通耳何復嫌大匠之得失乎是乃未所敢知也前人出經支讖世高審得梵本難繫者也叉羅支越斲鑿之巧者也巧則巧矣懼竅成而混沌終矣若夫以詩為煩重以尚書為質朴而刪令合今則馬鄭所深恨者也近出此撮欲使不雜推經言旨唯懼失實也其有方言古辭自為解其下也於常首尾相違句不通者則冥如合符厭如復析乃見前人之深謬欣通外域之嘉會也於九十章蕩然無措疑處毫芒之間泯然無微疹已矣乎釋藏跡八道地經序夫道地者應真之玄堂升仙之奧室也無本之城杳然茌陟矣無為之牆邈然難踰矣微門妙闥少闚其庭者也蓋為器也猶海與行者日酌之而不竭返精者無數而不滿其為像也含弘靜泊緜緜若存寂寥無言辯之者幾矣怳忽無行求矣漭乎其難測聖人有以見因華可以成實覩末可以達本乃為布不言之教陳無轍之軌闡止啟觀式成定諦髦彥六雙率由斯路歸精谷神於乎羨矣夫地也者包潤施毓稼穡以成鏐鐐瓊琛罔弗以載有喻止觀莫近於此故曰道地也昔在眾祐三達遐鑒八音四辯赫奕敷化識病而療聲典難算至如來善逝而大訓絕五百無著遷而靈教乖於是有三藏沙門厥名眾護仰雅諸行布在群籍俯愍發進不能悉洽粗述眾經撰要約行目其次序以為一部二十七章其於行也要猶人首與可終身戴不可須臾下猶氣息與可終身通不可須臾閉息閉則命殞首下則身殪若行者暫去斯法姦宄之慝入矣有開土世高者安息王元子也禪國高讓納萬乘位克明俊德改容修道越境流化爰適此邦其所傳訓淵微優邃析護所集者七章譯為漢文音近雅質敦兮若樸或變質從文或因質不飾皇矣世高審得厥旨夫絕愛原滅榮冀息馳騁莫先於止了癡惑達九道見身幻莫首於觀大聖以是達五根登無漏揚美化易頑俗莫先於止靡不由茲也真可謂盛德大業至矣哉行自五陰盡於成壞則是苦諦漏盡之迹也神足章者則是禪思五通之要也五十五觀者則是四非常度三結之本也人之處世矇昧未祛熙熙甘色如饗大牢由處穢海幽戹九月既生迍亶罹遘百凶尋旋老死嬰古萬遡漂溺五流莫能自返聖人深見以為苦證遊神八路長陟永安專精稽古則佚樂若此關情縱欲則酸毒如彼二道顯著宜䙡所從石以淬璧剝堅截剛素質精深五色炳燦由是論之可不勉哉予生不辰值皇綱紐絕玁狁猾夏山左蕩沒避難濩澤師殞友析周爰諮謀顧靡所詢時雁門沙門支曇講鄴都沙門竺僧輔此二仁者聰明有融信而好古冒陰遠至得與酬酢尋章察句造上訓傳希權與進者暫可微寤蚊蚋奮翼以助隨嵐蟻壟增封嵩岳之頂豈其能益於高猛哉探賾奧邈唯八輩難之況末學小子庶幾茲哉然天竺聖邦首岨遼遠幽見碩儒少來周化先哲既逝來聖未至進退狼跋咨嗟涕洟故作章句伸己丹赤冀諸神通照我顒顒必枉靈趾燭謬正闕也釋藏跡十十法句義經序夫有欲之激百轉千化搖蕩成教亦何得一端乎是故正覺因心所遷即名為經邪止名正目止名定方圓隨器合散從俗隨器故因質而立名從俗故緣對而授藥立名無常名則神道矣授藥無常藥則感而通故矣即己不器又通其故則諸行汎然因法而結也二三至十在乎其人病有眾寡以人為目耳譬藥分劑有單有複診脈視色投藥緣疾法參相成不其然乎自佛即幽阿難所傳分為三藏纂乎前緒部別諸經小乘則為阿含四行中阿含者數之藏府也阿毗曇者數之苑藪也其在赤澤碩儒通人不學阿毗曇者蓋闕如也夫造舟而濟者其體也安粹數而立者其業也美是故般若啟卷必數了諸法卒數以成經斯乃眾經之喉襟為道之樞極也可不務乎可不務乎於戲前徒不忘玄數者鶖鷺子也於茲繼武有自來矣篤斯業者或不成也爰晉土者世高其俊也偉哉數學淵源流清抱德惠和播馨此域安雖希高迹末由也己然旋焉周焉臧焉修焉未墜地也并一不惑以成積習移志蹈遠移質綠以高尚欲疲不能也人亦有言曰聖人也者人情之積也聖由積靡爐鎚之閒惡可己乎經之大例皆異說同行異說者明夫一行之歸致同行者其要不可相無則行必俱行全其歸致則同處而不新不新故頓至而不惑俱行故叢萃而不迷也所謂知異知同是乃大通既同既異是謂大備也以此察之義焉瘦哉義焉瘦哉夫玄覽莫美乎同異而得其門者或寡矣明白莫過乎辯數而入其室者鮮矣昔嚴調撰十慧章句康僧會集六度要目每尋其迹欣有寤焉然猶有闕文行未錄者今鈔而第之名曰十法句義若其常行之注解若昔未集之貽後同我之倫儻可察焉釋藏跡十鞞婆沙序阿難所出十二部經於九十日中佛意三昧之所傳也其後別其徑至小乘法為四阿含阿難之功於斯而已迦旃延子撮其要行引經訓釋為阿毗曇四十四品要約婉顯外國重之優波離裁之所由為毗尼與阿毗曇四阿含竝為三藏身毒甚珍未墜於地也其後曇摩多羅剎集修行亦大行於世也又有三羅漢一名尸陀槃尼二名悉達三名鞞羅尼撰鞞婆沙廣引聖證言輒據古釋阿毗曇焉其所引據皆是大士真人佛印印者也悉達迷而近煩鞞羅要而近略尸陀最折中焉其在身毒登無畏座僧中唱言何莫由斯道也其經猶大海與深廣浩汗千寶出焉猶崑岳與蒐莪幽藹百珍之藪資生之徒於焉斯在茲經如是何求而不有乎有祕書郎趙政文業者好古索隱之士也常聞外國尤重此經思存想見然乃在崑岳之右芃野之西眇爾絕域末由也已會建元十九年罽賓沙門僧伽跋證諷誦此經四十二處是尸陀槃尼所撰者也來至長安趙郎飢虛在往求令出焉其國沙門曇無難提筆受為梵文弗圖羅剎譯傳敏智筆受為此秦言趙郎正義起盡自四月出至八月二十九日乃訖梵本一萬一千七百五十二首盧長五字也凡三十七萬六千六十四言也秦語為十六萬五千九百七十五字經本甚多其人忘失唯四十事是釋阿毗曇十門之本而分十五事為小品迴著前以二十五事為大品而著後此大小二品全無所損其後二處是忘失之遺者令第而次之趙郎謂譯人曰爾雅有釋故釋言者明古今不同也昔來出經者多嫌梵言方質而改適今俗此政所不取也何者傳梵為秦以不閑方言求知辭趣耳何嫌文質文質是時幸勿易之經之巧質有自來矣唯傳事不盡乃譯之咎耳眾咸稱善斯真實言也遂案本而傳不令有損言遊字時改倒句餘盡實錄也余欣秦土忽有此經挈海移岳奄在茲域載玩載詠欲疲不能遂佐對校一月四日然後乃知大方之家富昔見之至夾也恨八九之年方闚其牖耳願欲求如意珠者必牢裝強伴勿令不周滄海之實者也釋藏跡十比丘大戒序世尊立教法有三焉一者戒律也二者禪定也三者智慧也斯三者至道之由戶泥洹之關要也戒者斷三惡之干將也禪者絕分散之利器也慧者齊藥病之妙醫也具此三者於取道乎何有也夫然用之有次在家出家莫不始戒以為基址也何者戒雖檢形形乃百行舟輿也須臾不矜不莊則傷戒之心入矣傷戒之心久而後欲求不入三惡道未所前聞也故如來舉為三藏之首也外國重律每寺立持律日月相率說戒說戒之日終夜達曉諷乎切教以相維攝犯律必彈如鷹隼之逐鳥雀也大法東流其日未遠我之諸師始秦受戒又乏譯人攷校者鮮先人所傳相承謂是至澄和上多所正焉余昔在鄴少習其事未及檢戒遂遇世亂每以怏怏不盡於此至歲在鶉火自襄陽至關右見外國道人曇摩侍諷阿毗曇於律特善遂令涼州沙門竺佛念寫其梵文道賢為譯慧常筆受徑夏漸冬其文乃訖攷前常行世戒其謬多矣或殊失旨或粗舉意昔從武遂法潛得一部戒其言煩直意常恨之而今侍戒規矩與同猶如合符出門應轍也然後乃知淡乎無味乃真道味也而嫌其丁寍文多及複稱即命慧常令斥重去複常乃避席謂大不宜爾戒猶禮也禮執而不誦重先制也慎舉止也戒乃徑廣長舌相三達心制入輩聖士珍之寶之師師相付一言乖本有逐無赦外國持律其事實爾此土尚書及與河洛其文樸質無敢措手明祗先王之法言而慎神合也何至佛戒聖賢所貴而可改之以從方言乎恐失四依不嚴之教也與其巧便寍守雅正譯梵為秦東教之士猶惑非之願不刊削以從飾也眾咸稱善於是案梵文書唯有言倒時從順耳前出戒十三事中起室與檀越議三十事中至大姓家及綺經錦繡衣及七因緣法如斯之比失旨多矣將來學者審欲求先聖雅言者宜詳攬焉諸出為秦言便約不煩者皆蒲萄酒之被水者也外國云戒有七篇而前出戒皆八篇今戒七悔過後曰尸叉罽賴尼尸叉罽賴尼有百七事明也如斯則七篇矢又侍尸叉罽賴尼有百一十事余嫌其多侍曰我持律許口受十事一記無長也尋僧純在丘慈國佛陀舌彌許得比丘尼大戒來出之正與侍同百有一十爾乃知其審不多也然則比丘戒不止二百五十阿夷戒不止五百也釋藏百一疑經錄序外國僧法學皆跪而口受同師所受若二十轉以授後學若有一字異者共相推校得便擯之僧法無縱也經至晉土其年未遠而喜事者以沙標金斌斌如也而無括正何以別真偽乎農者禾草俱存后稷為之歎息金匱玉石同緘卞和為之懷恥安敢預學次見涇渭雜流龍蛇竝進豈不恥之今列意謂非佛經者如左以示將來學士共知鄙倍焉釋藏跡五注經及雜經志錄序夫日月麗天眾星助耀雨從雲降滮池佐潤由是豊澤洪沾大明煥赫也而猶有燋火於雲夜抱甕於漢陰者時有所不足也佛之著教真人發起大行於外國有自來矣延及此土當漢之末世晉之盛德也然方言殊音文質從異譯梵為晉出非一人或善梵而質晉或善晉而未備梵眾經浩然難以折中竊不自量敢預僧數既荷佐化之名何得素餐終日乎輒以灑埽之餘暇注眾經如左非敢自必必值聖心庶望攷文時有合義願將來善知識不咎其默守冀抱甕燋火讜有微益光讚折中解一卷光讚鈔解一卷般若放光品者分別盡漏而不證八地也源流浩汗厥義幽邃非彼草次可見宗廟之義也安為折疑準一卷折疑略一卷起盡解一卷道行品者般若鈔也佛去世後外國明者撰也辭句質複首尾互隱為集異注一卷大小十二門者禪思之奧府也為各作注大作注十二門二卷小十二門一卷了本生死者四諦四信之玄藪也為注一卷密迹金剛經持心梵天經此二經者護公所出也多有隱義為作甄解一卷賢劫八萬四千度無極者大乘之妙目也為解一卷人本欲生經者九止八脫之妙要也為注撮解一卷安般守意多念之要藥也為解一卷陰持入者世高所出殘經也淵流美妙至道直徑也為注二卷大道地者修行鈔也外國所鈔為注一卷眾經眾行或有未曾共知者安集之為十法句義一卷連雜解共卷義指者外國沙門於此土所傳義也云諸部訓異欲廣來學視聽也增之為注一卷九十八結者阿毗曇之要義為解一卷連約通解共卷又為三十二相解一卷三界諸天混然淆雜安為錄一卷此土眾經出不一時自孝靈光和己來迄今晉寍康二年近二百載值殘出殘遇全出全非是一人難率綜理為之錄一卷荅沙汰難二卷荅法將難一卷西域志一卷釋藏跡五襄陽金像銘晉太元十九年歲次甲午月朔日次比丘道安於襄陽西郭造丈八金像一軀此像更三周甲午百八十年當滅法苑珠林二十一續高僧傳三十九
