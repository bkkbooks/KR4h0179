body:
  text: 卷九十四潘尼苦雨賦氣觸石而結蒸兮雲膚合而仰浮雨紛射而下注兮潦波湧而橫流豈信宿之云多乃踰月而成霖瞻中塘之浩汗聽長霤之涔涔始濛瀎而徐墜終滂霈而難禁悲列宿之匿景悼太陽之幽沈雲暫披而驟合雨乍息而亟零旦漎漎以達暮夜淋淋以極明黿鼉游于門闥蛙蝦嬉乎中庭懼二源之并合畏黔首之為魚處者含悴于窮巷行者歎息于長衢藝文類聚二初學記二收絳蜺于漢陰初學記霽晴門御覽十四惡道賦異山河之岨阨倦關谷之盤紆車低徊于潛軌馬侘傺于險塗狗肘還句羊角互戾菟窟連投十數億計石子之澗坎埳之穴支體為之危竦形骸為之疲曳此亦行者之艱難羈旅之困斃若其名坂則羊羹八特成皋黃馬迴波激浪飛沙飄瓦馬則頓躓狼傍虺頹玄黃牛則體疲力竭損食喪膚尳蹄穿嶺摩髖脫軀藝文類聚七又略見書鈔一百五十七道深地狹坂峭軌長輪輿顛覆人馬仆僵初學記二十四反倒駕閑戴從莊觸壁屆軸詰坑低昂北堂書鈔一百四十一懷退賦伊疇昔之懷憤思天飛以遠迹望循塗而投軌遡翔風以理翮翼雲霧之可憑希天路之開闢何時願之多違奄就羈以服役困吳坂之峻岨畏鹽車之嚴筴嗟遊處之弗遇奚鬱悒之難任背宇宙之寥廓羅網罟之重深常屏氣以斂迹焉遊豫以娛心傅釋板以亮殷望投竿而相姬窮獨善以全質達兼利以濟時聃安志于柱史由抗迹于嵩箕理殊塗而同歸雖百慮其何思敢因虛以託談遂逡巡而造辭藝文類聚二十六豈遁世之獨立兮庶北門之在茲歸幽巖之潛穴兮託峻岳之崇基北堂書鈔一百五十八東武館賦并序東武館賦并序東武館者蓋東武陽侯之館也俄而遷居謂余曰吾將老焉故有終焉之志而無移易之意子且為我賦之藝文類聚六十三御覽一百九十四嘉大雅之洪操美明哲之保身懲都邑之迫險饜里巷之囂塵慕古公之胥宇羨孟氏之審鄰將遷居于爽塏乃投迹于里仁前則行旅四湊通衢交會水泛輕舟陸方羽蓋後則崇山崔嵬茂林幽藹彌望遠覽滉瀁夷泰表裏山河出入襟帶若乃潛流旁注飛渠脈散芙蓉映渚靈芝蔽岸于是逍遙靈沼遊豫華林彎弓撫彈娛志蕩心括不空縱綸不苟沈遊鱗雙躍落羽相尋膳夫進俎虞人獻鮮春醴九醞嘉豆百籩隨波沂流乍往乍旋藝文類聚六十三飛甘瓜于浚水投素柰于青渠藝文類聚八十六御覽九百七十釣賦抗余志于浮雲樂余身于蓬廬尋渭濱之遠迹且游釣以自娛左援修竹右縱飛綸金鉤厲距甘餌垂芬眾鯤奔涌游鱗橫集觸餌見擒值鉤被執長繳繽紛輕竿翕熠雲往飆馳光飛電入曜靈未及驚策蓋已獲其數十且夫燔炙之鮮煎熬之味百品千變殊芳異氣隨心適好不可勝記乃命宰夫膾此潛鯉名工習巧飛刀逞技電剖星流芒散縷解隨風離鍔連翩雪累西戎之蒜南夷之薑酸鹹調適齊和有方紅䵂之飯糅以菰梁五味道洽餘氣芬芳和神安體易思難忘藝文類聚六十六書鈔一百四十二引三條一百四十四又一百四十五引三條初學記二十二御覽八百五十又九百七十七火賦覽天人之至周嘉火德之為貴含太陽之靈輝體淳剛之正氣先聖仰觀通神悟靈窮物盡數研幾至精形生于未兆聲發于無象尋之不得其根聽之不聞其響來則莫見其迹去則不知其往似大道之未離而元氣之灝瀁故能博贍群生資育萬類盛而不暴施而不費其變無方其用不匱鑽燧造火陶冶群形協和五味革變羶腥酒醴烹飪于斯獲成爾乃狄牙典膳百品既陳和羹酋醳旨酒濃醇烹黿煮鼉灼龜臛鱗若乃流金化石鑠鐵融銅造製戎器以戒不恭砥鍊兵械整飭軍容四海寍乂邊境無寇韜弓戢劍解甲釋冑銷鏑為耒鑄戈為耨戰士反于耕農戎馬放于外廄及至焚野燎原埏光赫戲林木摧拉砂礫煎糜騰光絕覽雲散霓披遂乃衝風激揚炎光奔逸玄煙四合雲蒸霧萃山林為之崩阤川澤為之涌沸去若風驅疾如電逝紛綸紆轉倏忽橫厲蕭條長空野無孑遺無隰不灰無坰不斃震響達乎八冥流光燭乎四裔榛蕪既除九野謐清蕩枝瘁于凜秋候來春而改生其揚聲發怒則雷霆之威也明照遠鑒則日月之暉也甄陶品物則造化之制也濟育群生則天地之惠也是以上聖擬火以制禮鄭僑據猛以立政功用關乎古今勳績著乎百姓藝文類聚八十初學記二十五若夫名刀寶劍曠世絕殊鍊質于昆吾之竈定形于薛燭之罏北堂書鈔一百二十二引兩條皆作火賦張溥本作武庫賦非琉璃盌賦琉璃盌賦覽方貢之彼珍瑋茲盌之獨奇濟流沙之絕險越蔥嶺之峻危其由來也阻遠其所託也幽深據重巒之億仞臨洪溪之萬尋接玉樹與瓊瑤鄰沙棠與碧林瞻閬風之崔嵬顧玄圃之蕭參于是遊西極望大蒙歷鍾山闚燭龍覲王母訪仙童取琉璃之攸華詔曠世之良工纂玄儀以取象準三光以定容光映日耀圓成月盈纖瑕罔麗飛塵靡停灼爍旁燭表裏相形凝霜不足方其潔澄水不能喻其清剛堅金石勁勵瓊玉磨之不磷涅之不濁舉茲盌以酬賓榮密坐之曲宴流景炯晃以內澈清醴瑤琰而外見藝文類聚七十三又八十四瑇瑁盌賦瑇瑁盌賦有瑇瑁之奇寶亦同旅于介蟲下法川以矩夷上擬乾而規隆或步趾于清源或掉尾于泥中隨陰陽以潛躍與龜龍乎齊風包神藏智備體兼才高下斯處水陸皆能文若綺波背負蓬萊爾乃遐夷效珍越裳貢職橫海萬里踰嶺千億挺璞荒巒摛藻辰極光曜炫晃昭爛熻赩嘉斯寶之兼美料眾珍而靡對文不煩于錯縷采不假乎藻繢豈翡翠之足儷胡犀象之能逮藝文類聚八十四扇賦夫器有輕麤用有疏密安眾以方為體五明以圓為質或託形于竹素或取固于膠漆至若羽扇靡彫靡刻方圓不應于規矩裁制不由于繩墨始顯用于荒蠻終表奇于上國北堂書鈔一百三十四引三條安石榴賦并序安石榴賦并序安石榴者天下之奇樹九州之名菓是以屬文之士或敘而賦之蓋感時而騁思覩物而興辭余遷舊宇爰造新居前臨曠澤卻背清渠實有斯樹植于堂隅華實竝麗滋味亦殊可以樂志可以充虛朱芳赫奕紅萼參差含英吐秀乍含乍披遙而望之煥若隨珠耀重川詳而察之灼若列宿出雲閒湘涯二后漢川遊女攜類命疇逍遙避暑託斯樹以棲遲遡祥風而容與爾乃擢纖手兮舒皓腕羅袖靡兮流芳散披綠葉于脩條綴朱華兮弱幹豈金翠之足珍實茲葩之可翫商秋授氣收華斂實千房同蔕十子如一繽紛磊落垂老曜質滋味浸液馨香流溢藝文類聚八十六桑樹賦從明儲以省膳憩便房以偃息觀茲樹之特偉感先皇之攸植蔚蕭森以四射邈洪傭而端直爾乃徘徊周覽俯仰逍遙俛睨靈根上眺修條洞芳泉于九壤含溢露于清霄倚增城之飛觀拂綺窗之疏寮下迢遞以極望上扶疏而參差匪眾鳥之攸萃相皇鸞之羽儀理有微而至顯道有隱而應期豈皇晉之貞瑞兆先見而啟茲起尋抱于纖毫崇萬匱于始基藝文類聚八十八芙蓉賦或擢莖以高立似彫輦之翠蓋或委波而布體疑連璧之攢會御覽九百九十九朝菌賦序朝菌者蓋朝華而暮落世謂之木槿或謂之日及詩人以為舜華宣尼以為朝菌其物向晨而結建明而布見陽而盛終日而殞不以其異乎何名之多也藝文類聚八十九文選陸機歎逝賦注鼈賦并序鼈賦并序皇太子遊于玄圃遂命釣魚有得鼈而戲之者令侍臣賦之翩銜鉤以振掉吁駭人而可惡既顛墜于巖岸方盤跚而雅步或延首以鶴顧或頓足而鷹距或曳尾于泥中或縮頭于殼裏若乃秋水暴駭百川沸流有東海之巨鼈乃負山而吞舟藝文類聚九十六荅傅咸詩序司徒左長史傅長虞會定九品左長史宜得其才屈為此職此職執天下清議宰割百國而長虞性直而行或有不堪余與之親作詩以規焉藝文類聚三十一贈二李郎詩序元康六年尚書吏部郎汝南李光彥遷汲郡太守都亭侯江夏李茂曾遷平陽太守此二子皆弱冠知名歷職顯要旬月之閒繼踵名郡離儉劇之勤就放曠之逸枕鳴琴以俟遠致離別之際各斐然賦詩御覽二百五十九七月七日玄圃園詩序七月七日皇太子會于玄圃園有令賦詩初學記十釋奠頌元康元年冬十二月上以皇太子富于春秋而人道之始莫先于孝悌初命講孝經于崇政殿實應天縱生知之量微言奧義發自聖問業終而體達至三年春閏月將有事于上庠釋奠于先師禮也越二十四日景申侍祠者既齊輿駕次于太學太傅在前少傅在後恂恂乎弘保訓之道宮臣畢從三率備衛濟濟乎肅翼贊之敬乃埽壇為殿懸幕為宮夫子位于西序顏回侍于北墉宗伯掌禮司儀辨位二學儒官搢紳先生之徒垂纓佩玉規行矩步者皆端委而陪于堂下以待執事之命設樽篚于兩楹之閒陳罍洗于阼階之左几筵既布鍾懸既列我后乃躬拜俯之勤資在三之義謙光之美彌劭闕里之教克崇穆穆焉邕邕焉真先王之徽典不刊之美業允不可替已于是牲饋之事既終享獻之禮已畢釋玄衣御春服弛齋禁反故式天子乃命內外群司百辟卿士蕃王三事至于學徒國子咸來觀禮我后皆延而與之燕金石簫管之音八佾六代之舞鏗鏘闛𨶀般辟俛仰可以徵神滌欲移風易俗者罔不畢奏抑淫哇屏鄭衛遠佞邪釋巧辯是日也人無愚智路無遠邇離鄉越國扶老攜幼不期而俱萃皆延頸以視傾耳以聽希道慕業洗心革志想洙泗之風歌來蘇之惠然後知居室之善著應乎千里之外不言之化洋溢于九有之內於熙乎若典固皇代之壯觀萬載之一會也尼昔忝禮官嘗聞俎豆今廁未列親覩盛美瀸漬徽猷沐浴芳潤不知手舞口詠竊作頌一篇義近辭陋不足測盛德之形容光聖明之遐度其辭曰三元迭運五德代微黃精既亢素靈乃暉有皇承天造我晉畿祚以大寶登以龍飛宣基誕命景熙遐緒三分自文受終惟武席卷要蠻蕩定荒阻道濟群生化流率土後帝承哉丕隆曾構奄有萬方光宅宇宙篤生上嗣繼期挺秀聖敬日躋濬哲閎茂留精儒術敦閱古訓尊道讓齒降心下問鋪以金聲光以玉潤如日之升如乾之運乃延台保乃命學臣聖容穆穆侍講誾誾抽演微言啟發道真探幽窮賾溫故知新講業既終精義既研崇聖重師卜日告奠陳其三牢引其四縣既戒既式乃盥乃薦恂恂孔聖百王攸希亹亹顏生好學無違曰皇儲后體神合機兆吉先見知來洞微濟濟二宮藹藹庶寮俊乂鱗萃髦士盈朝如彼和肆莫匪瓊瑤如彼儀鳳樂我雲韶瓊瑤誰剖四門洞開雲韶奚樂神人允諧蟬冕耀庭細珮振階德以謙光仁以恩懷我酒惟清我肴惟馨舞以六代歌以九成莘莘冑子祁祁學生洗心自百觀國之榮學猶蒔苗化若偃草博我以文弘我以道萬邦蟬蛻矧乃俊造鑽蚌瑩珠剖石摛藻絲匪玄黃水罔方圓引之斯流染之斯鮮若金受範若埴在甄上好如雲下效如川昔在周興王化之始曰文曰武時維世子今我皇儲濟聖通理緝熙重光於穆不已於穆伊何思文哲后媚茲一人實副元首孝洽家邦光照九有純嘏自晉永世昌阜微微下臣過充近侍猥躡風雲鸞龍是廁身澡芳流目玩盛事竭誠作頌祗詠聖志晉書潘尼傳又略見藝文類聚三十八又初學記十四引兩條後園頌芒芒在昔悠悠結繩太樸未散玄化霑凝羲皇繼踵三代相承五德更王文質迭興天命匪諶祐謙輔信乃眷我皇光有大晉應期納祚天人是順和氣四充惠澤旁潤神祗告祥四靈效質遊龍升雲儀鳳翳日甘露晨流醴泉湧溢華夏既寍八荒靜謐人亦有言吾何以休乃延卿士從皇以遊長筵遠布廣幕四周嘉肴惟芳旨酒思柔巖巖峻岳湯湯玄流翔鳥鼓翼游魚載浮明明天子肅肅庶官文士濟濟武夫桓桓講藝華林肆射後園威儀既具弓矢斯閑恂恂謙德穆穆聖顏賜以宴飲詔以話言黍稷既登貨財既豐仁風潛運皇化彌隆征夫釋甲戰士罷戎遐夷慕義絕域望風無或慢易在始慮終無或安逸在盈思沖藝文類聚初學記二十四鼓腹巖穴擊壤路隅藉頌洪德擬迹群儒北堂書鈔一百五十八
