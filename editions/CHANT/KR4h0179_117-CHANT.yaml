body:
  text: 卷一百一十七葛洪抱朴子內篇佚文葛仙翁為丹書符投江中順流而下次投一符逆流而上次又投一符不上不下停住而水中向二符皆還就之舊寫本北堂書鈔一百三魏武帝以左慈為妖妄欲殺之使軍人收之慈故欲見而不去欲拷之而獄中有七慈形狀如一不知何者為真以白武帝帝使人盡殺之須臾六慈盡化為札而一慈徑出走赴羊群舊寫本北堂書鈔一百四札篇又御覽六百六魏武收左慈慈走入巿吏傳言慈一目眇葛巾單衣于是一市皆然也御覽七百四十城陽郄儉少時行獵墮空冢中飢餓見冢中先有大龜數數迴轉所向無常張口吞氣或俛或仰儉亦素聞龜能導引乃試隨龜所為遂不復飢百餘日頗苦極後人有偶窺冢中見儉而出之後竟能咽氣斷穀魏王召置土室中閉試之一年不食顏色悅澤氣力自若蓺文類聚七十七御覽七百二十又九百三十一吳世有姚光者有火術吳主躬臨試之積荻數千束光坐其上弓以數千束荻累之因猛風燔之火盡謂光當已化為烟燼而光恬然端坐灰中振衣而起把一卷書吳主取而視之不能解也蓺文類聚八十又八十二御覽八百七十一又一千薺麥大蒜仲夏而枯蓺文類聚八十二御覽九百八十李南乘赤馬行道逢他人乘白馬者白馬先鳴赤馬應之南謂從者曰彼白馬言汝今當見一黃馬左目盲者是吾子可令使駛行相及也從者不信須臾行二里果逢所乘黃馬而左目盲南之赤馬先鳴而盲馬應之問其子果向白馬子也蓺文類聚九十三御覽八百九十七案使者甘崇所奏西域事云外國方士熊神祝者臨淵禹步吹氣龍即浮出其初出乃長十數丈于是方士更一吹之一吹則龍輒一縮至長數寸方士乃掇取著壺中壺中或有四五龍以少水養之以疏物寒壺口國常患旱災于是方士聞餘國有少雨屢旱處輒齎龍往賣之一龍直金數十斤舉國會斂以顧之直畢及發壺出一龍著淵之中因復禹步吹之一吹一長輒長數十丈須臾而雲雨四集矣蓺文類聚九十六御覽十一七百三十六九百二十九若士所食必此草也又海中有蛤蜊螺蚌之類未加煮炙凡人所不能噉況君子與若士乎蓺文類聚九十七御覽九百四十二青雲芝生于名山之大陰大青石閒青蓋三重上有雲氣覆之味辛甘以陰乾食之令人壽千歲不老能乘雲通天見鬼神蓺文類聚九十八黃龍芝生于神山之中狀如黃龍味辛甘以四時採陰乾治日食一合壽萬年令人光澤同上金蘭芝生于名山之陰金石之閒上有水蓋莖出入秋旬求之飲其中水壽千歲耳目聰明同上蒼山岑石之中赤雲芝狀如人豎豎如連鼓其色如澤以夏採之陰乾食之令人乘雲能上天觀見八極通見神明延壽萬年同上丹芝生于名山之陰崑崙之山太谷源泉金石之中同上火芝常以夏採之葉上赤下莖青赤松子服之常在西王母前隨風上下往來東西同上人芝生名山之陰青蓋白莖治乾食日半合則使人壽入水可久也同上月精芝秋生山陽石上莖青上赤味辛苦盛以銅物十月食之壽萬歲同上黑芝生于山之陰太谷中白蓋赤莖味甘秋採之陰乾日食令人身輕齒堅與天地無極同上火芝生于名山陽其色黃澤大如車蓋同上金芝生于金石之中青蓋莖味有辛以秋取陰乾治食令人身有光壽萬歲同上萬年芝令人不老延壽九千同上夜光芝出于名山之陰大谷源泉中金石閒上有浮雲翔其上有五色有目如兩日同上白雲芝生于名山之陰白石上有白雲覆之白蓋二重味辛甘小苦以秋採之陰乾治食日一合不中風雷令人色光澤也同上雲母芝生于名山之陰青蓋赤莖味甘以季秋竹刀採之陰乾治食使人身光壽千萬歲醮以牛脯同上葉芝生于名山之陽及出央山大谷源泉水中赤蓋白莖上有兩葉三實同上鬼芝青蓋長莖陰乾屑之日食五合所見神明令人長生同上有自然之龍有蛇蠋化成之龍初學記三十白孔六帖九十五御覽九百二十九田地既有自然之鱓而有荇甚芩根土龍之屬化為鱓御覽九百三十七又一千引䔷根化為蘚當即此龜蛇潛蟄則食氣夏咨口而甚瘦冬穴蟄而大肥初學記三十黃帝醫經有蝦蟆圖言月生始二日蝦蟆始生人亦不可針灸其處御覽四厤陽有彭祖仙室請雨必得御覽十一左元放言金華山可以合神丹免五兵洪水之害御覽四十七崑崙及蓬萊其上鳥獸飲玉井皆長生不死也御覽七十上古無諡始于周家耳黃帝諡蓋後人追為之諡取其法世時行迹而已非黃帝群臣之作也俗人通自不信仙寍肯追以仙諡黃帝乎御覽五百六十二吳景帝時戍將江陵掘冢取板治城後發一大冢內有重閤石扉皆樞轉開閉四周徼道通事且廣高可秉馬又鑄銅為人數十枚長五尺皆大冠衣執劍列侍靈坐皆刻銅人背後石壁言殿中將或言侍郎似王公冢也破其棺棺中有人鬢毛班白鮮明面體如生人棺中有雲母厚尺許白玉璧三十雙以藉身兵人舉出死人以倚冢壁一玉長一尺形似冬瓜從死人懷中出墮地兩耳及鼻孔中皆有黃金大如棗許此等有假物而不朽之效也御覽五百五十八八百五八百六八百八八百十又八百十三專心憑師依法行道濟身度世利在永亨事師盡敬得道為期承閒候色也不盡力明師道有罪不可除也學道得明師事之害亂不得發也御覽六百五十九道林子有五種尸解符今太陰生符及是一病解者御覽六百六十四辥振字季和燕代人周武王時學道于鍾山北河經七試而不過者由淫泆鄙滯敗其試耳御覽六百六十六郭文舉河內軹縣人入陸渾山學道獨能無情意不生也同上范零子少好仙道如此積年後遇司馬季主季主同入常山積七年入石室𤫩季主出行懇戒之曰慎勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道同上馮良者南陽人少作縣吏年三十為尉佐史迎督邸自恥無志乃毀車殺牛裂敗衣尋去從師受詩傳禮易復學道術占候遊十五年乃還州郡禮辟不就詔特舉賢良高第平道委還家年六十七棄世東度入山在鹿迹洞中同上安丘望之字仲都京長陵人也修尚黃老漢成帝從其道德常宗師之愈自損退成帝詣之若值望之章醮則待事畢然後往老子章句有安丘之學望之忽病篤弟子公沙都與于庭樹下望之曉然病有痊時冬月鼻聞李香開目則見雙赤李著枯枝望之仰手承李自墜掌中因食李所苦盡除身輕目明遂去莫知何在也同上家有三皇圖必先齋戒百日乃君至天地五嶽社稷之神后聖君命清虛小有真人撰集上仙真籙總名為上清正法以慴萬邪百年再授于人須齋戒方得御覽六百六十七李阿者行道逢奔車阿兩腳中車腳即折弟子古強見之驚怖阿須臾取繼腳相續如故也御覽七百三十六葛仙公每飲酒醉常入門前陂中竟日乃出會從吳主到荊州還大風仙公船沒吳主謂其已死須臾從水上來衣履不溼而有酒色云昨為伍子胥召設酒不能便歸以淹留也御覽八百四十五軫星逐鬼張星拘魂東井還魂也御覽八百八十六伍被記八公造淮南王安初為老公不見通須臾皆成少年御覽八百八十八韓子治以地黃甘草哺五十歲老馬以生三駒又百三十歲乃死御覽八百九十七南方水牛無冬夏常臥水中御覽八百九十九以鸛血塗金丹一丸內衣中以指物隨口變化御覽九百二十五胡麻好者一夕蒸之如炊須曝乾復蒸細篩白蜜和丸如雞子大日二枚一年顏色美身體滑二年白髮黑三年齒落更生四年入水不濡五年人火不燋六年走及奔馬或蜜水和作餅如糖狀炙良一餅御覽九百八十九中經曰鉤吻狼毒太陰之精氣主殺故入口令人死御覽九百九十備闕抱朴子外篇佚文識珍者必拾濁水之明珠賞氣者必採穢藪之芳蕙意林初學記二十七御覽八百三又白孔六帖七引上一句篇名闕狐白不以當暑龍艘不可以乘陸意林又御覽六百九十四引上一句軍術大將民之司命社稷存亡不是乎在蓺文類聚五十九御覽二百七十三大將者凜凜乎若負重而履薄冰戰戰若登朽木以臨萬仞也北堂書鈔一百十五夫良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可追住如丘山可瞻而不可動意林御覽二又十三二百七十三二百七十五兵家以計為主以力為末書鈔一百十五昔魯連射書以下聊城是分毫之力過百萬之眾也書鈔一百三韓信傳檄而定千里是以尺素之功勝于雲梯之械也書鈔一百十五雞有專棲之雄雉有擅澤之鷮蟻有兼弱之智蜂有敢寡之計人相役御亦猶是耳蓺文類聚九十七御覽九百十七九百四十七羊群犬聚轉攻略地而所向無堅敵所摧無堅壘皆望景如狼駭承響而鹿走柯折葉落本根亦什嬰城者雲徹帶邑者席卷猛乎黃帝五行之陣嚴乎孫孫吳率然之眾也書鈔一百十七又十三引嬰城者二句武王將興天給之旗書鈔一百二十春以長矛在前夏以大戟在前秋以弓弩在前冬以刀盾在前此行軍四時應天法也意林又御覽三百四十八引秋以弓弩一句軍之所以欲乘山依谷視生處高也書鈔一百十三淮南王所著兵書皆魁岡之陣風氣之占及軍中之變象徵祥觸物之候知敵盛衰俟時而動之術知行止之不測天心之去就使進則百勝退則安全也書鈔一百十三引兩條承陰陽以并勢協五行之自然從計約以奮擊常背孤而攻虛則黃帝呂尚范蠡伍員魏武帝所據同也書鈔一百十八太公云從孤擊虛萬人無餘一女子當百丈夫意林大將軍當明案九宮視年在宮當就三居五五為死三為生能知三五橫行天下文選江文通詣建平王上書注昔太安二年京邑始亂三國舉兵攻長沙王乂小民張昌反于荊州奉劉尼為漢主乃遣石冰擊定揚州屯于建業宋道衡說冰求為丹陽太守到郡發兵以攻冰召余為將兵都尉余年二十一見軍旅不得已而就之宋侯不用吾計數敗吾令宋侯從月建住華蓋下遂收合餘燼從吾計破石冰焉御覽三百二十八凡始立軍豎牙春出城西門立牙門西向出時令登明大吉加東方吉夏出城北門立牙門北向出時令右登明大吉加南方吉秋出城東門立牙門東向出時令神后登明大吉加西方吉冬出城南門立牙門南向出時令神后登明大吉加北方吉也書鈔一百二十雷天之鼓也初學記一御覽十三又白孔六帖二引作雷者天地之鼓用兵之要雄風為急扶搖獨鹿之風大起軍中軍中必有反者風高者道遠風下者道近風鳴葉者賊在十里鳴條者百里搖枝者四百里大枝五百里仆大木千里折大木五千里三日三夕天下盡風二曰二夕天下半風一日一夕萬里風御覽九又意林引風鳴葉至四百里三句又書鈔一百五十一引作拔木必千里也金器自鳴及焦器鳴者軍疲也意林凡戰觀雲氣如走驚鹿者敗軍之氣也意林又御覽三百二十八軍始出舉牙立旗風氣和調旛動飄飄終日不息者其軍有功也書鈔一百二十蓺文類聚六十御覽三百三十九軍始發大風甚雨起于後旌旗前指金鼓清鳴則大勝之徵也若旌旗亂而相繞逆風雨敗之象也軍始出而旌旗繞竿者急住更待善時而出軍書鈔一百二十引四條又一百二十一御覽十又三百三十八三百三十九三百四十軍始出雨霑衣裳者是謂潤兵其軍有功雨不足霑衣裳者是謂泣軍必敗意林初學記二御覽十無雲而雨是謂雨泣將軍當揚兵講武以應之大雨軍中尤其者將軍戰必無功也御覽十又八百七十七開元占經九十二未句作將軍敗死白霧四面圍城不出百日大兵必至城下書鈔一百五十一初學記二御覽十五開元占經一百一大霧繞軍霧之所住非常而數臣下擅行威也書鈔一百五十一又初學記二作霧之所在其下有塞將軍之令軍上氣黑如樓將軍移軍必敗其將勇則氣如火炎勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也御覽十五太一在玉帳之中不可攻也意林又御覽九百四十二兵地生蟹者宜速移軍意林又御覽九百四十二軍中地裂急徙居否則軍敗地震必大戰或有謀反御覽八百八十開元占經四麞兔入軍中當遷徙之御覽九百七蚯蚓見軍中尤多者軍罷天宜備反叛御覽九百四十七軍行卒逢飛蜂及蜚蟲若蜂尤多者必大戰驚于藏伏之賊御覽九百五十有黑氣如牛馬入其軍者名天狗下食血其軍必敗開元占經八十六屈虹見城上其下必大戰流血屈虹從城外入城中者三日內城可屠開元占經九十八赤虹見城上其下必大戰流血同上白虹見城上其下必大戰流血同上有赤光如火從天來下入軍亂將死開元占經九十九若濛起圍城或入于于城則外兵得入若濛氣從內出主人出戰開元占經一百一有狼狐繞軍而鳴者軍敗開元占經一百十六軍無道則狼食人同上螻蛄見軍中尤多有軍罷又宜備叛開元占經一百二十地生瓦礫不去有大禍御覽七十四眾鳥群飛徘徊軍上不過三日有暴兵至鳥聚軍中將軍當賞功增秩鳥集將軍之旗將軍增官鳥集軍中莫知其名軍敗蓺文類聚九十御覽九百十四己下篇名竝闕余嘗問嵇君道曰左太沖張茂先可謂通人乎君道荅曰通人者聖人之次也其閒無所復容意林歐陽生曰張茂先潘正叔潘安仁文遠過二陸或曰張潘與二陸為比不徒步驟之閒也歐陽曰二陸文詞源流不出俗檢御覽五百九十九友人騰永叔問曰嵇君道何如人余荅曰一代偉器也摛毫英觀難與竝驅也書鈔一百余問班班云呂氏望雲而知高祖所在天豈獨氏開呂氏之目而掩眾人之目邪意林閹官無情不得謂貞倡獨不飲不可謂廉意林文王食子羹佯不知非甘也意林董仲舒學見深而天才鈍以蜉蜂是神龍者非但不識神龍亦不識蜉蜂意林又御覽九百四十六作謂蜥蝪為神龍者非但不識神龍亦不識蜥蝪王仲任撫班固背曰此兒必為天下知名意林王充所作論衡此方都未有得之者蔡伯喈嘗到江東見之嘆為高文度越諸子恆愛玩而獨祕之及還中國諸儒覺其談論更遠嫌得異書搜求其帳中至隱處果得論衡捉取數卷將去作喈曰唯與爾共之勿廣也書鈔九十八蓺文類聚五十五御覽六百二六百十七六百九十九謝堯卿東南書士說王充以為一代英偉漢興以來未有充比若所著文時有小疵猶鄧林之枯枝又若滄海之流芥未易貶者也書鈔一百御覽五百九十九五嶺無冬殞之木南海晉安有九熟之稻意林初學記二十七案老君玉策記云松脂入地千年變為茯苓茯苓千年變為琥珀琥珀千年變為石膽石膽千年變為威喜千歲之狐豫知將來千歲之狸變為好女千歲之猿變為老人意林引止威喜御覽八百八十八炙鼓使鳴絞絃令急實鼓使速穿絃早絕磨刀殺馬立可驗也意林燒泥為瓦燔木為炭蜂窠為蠟水沫為浮石凡此皆去其柔脃變為堅剛意林初學記五御覽五十一落星岡謂吳時星落意林汲邵冢中竹書言黃帝既仙去其臣有左徹者削木為黃帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黃帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而葬之或立廟而四時祀之意林御覽七十九三百九十六食鵠胎令之能夜書意林英蔥實天雄鶴腦服之令人能夜書御覽七百四十七河伯華陰人以八月上庚日渡河溺死天帝署作河伯意林案九鼎記及青靈經言人物之死皆有鬼也馬鬼常時以晦夜出行狀如炎火御覽八百八十三鵝鬼吳景帝有疾召巫覡帝試之乃殺鵝埋于苑中架小屋施床帳以婦人著其前巫云但見一白鵝不見婦人也帝乃重之意林獮猴鬼余友人騰永叔嘗養一大獼猴以鐵鎖鎖之著床閒而犬忽齧殺之永叔使合銷埋之後百許日有若鬼者見獼猴走上承塵上不悟是獼猴鬼也驚指之曰獼猴何以被傷流血斷走乎永叔曰始乃知獼猴死復有鬼也意林御覽七百一九百十獼猴之鬼令人病瘧御覽七百四十三龜鱉鼉之鬼令人病欬御覽七百四十三余從祖得道能分形座上有一葛公與人談話又一葛公迎來送去意林嵇君道曰吾在洛與二陸雕施如意兄弟竝能觀況身于泥蚌之中識清意于未口之口諸談客與二陸言者辭少理畼言約事舉莫不豁然若春日之泮薄冰秋風埽枯葉也書鈔九十八嵇君道問二陸優劣抱朴子曰吾見二陸之文百許卷似未盡也朱淮南嘗言二陸重規沓矩無多少也一手之中不無利鈍方之他人若江漢之與潢汙及其精處妙絕漢魏之人也意林書鈔一百御覽六百二嵇君道曰每讀二陸之文未嘗不廢書而歎恐其卷盡也陸子十篇誠為快書其辭之富者雖覃思不可損也其理之約者雖鴻筆不可益也觀此二人豈徒儒雅之士文章之人也意林書鈔一百御覽六百二陸平原作子書未成吾門生有在陸君軍中常在左右說陸君臨亡曰窮通時也遭遇命也古人貴立言以為不朽吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後繆襲撰次之桓譚新論未備而終班固為其成瑟道今才士何不贊成陸公子書御覽六百二抱朴子曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不為虛誕之言非不能也陸君之文猶玄圃之積王無非夜光吾生之不別陸文猶侏儒測海非所長也卻後數百年若有幹跡如二陸猶比肩也不謂疏矣意林書鈔一百御覽五百五十九盧生問曰蔡伯喈張平子才足以著書正恐言遠旨深世人不解故不著也余難曰如來言子雲亦不應作太玄經也瓦觝木杯比門所饒金觴玉爵萬家無也御覽六百二孔鄭之門耳聽口受者皆已滅絕唯託竹素者可為世寶也意林御覽六百二羈鞍仁義纓鎖禮樂意林仲尼經成紫微降光書鈔九十九汝南郡邵陵王申為郡五官掾太守盜割官錢密寄申太守暴亡申盡買黃金還太守汝南欲以列于先畫像抱朴子曰不宜者也書鈔七十七屈原沒汨羅之日人竝命舟楫以迎之至今以為口渡或謂之飛鳧亦日州將士庶悉臨觀之書鈔一百三十七太極初構清濁始分故天先成而地後定初學記御覽三十六太精之氣乘雲也書鈔一百五十一翫榮河者若浮南濱而涉天漢書鈔一百五十宣夜之書亡而郄萌記先師相傳宣夜說云天穹無質仰而瞻之高遠無極蒼蒼然也譬旁望遠道黃山而皆青俯察千仞之谷而黝黑天青冥色黑非有體也日月星辰浮空中行止皆須氣焉故七曜或住或游逆順伏見無常進退不同由無所根繫故各異也辰極常居其所北斗不與眾星西沒焉七曜皆東行日日行一度月日行十三度遲疾任性若綴附天體不得爾也書鈔一百四十九御覽二周髀家云天圓如張蓋地方如棋局天旁轉如推磨而左行日月右行隨天左轉天牽之西沒譬如蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故蟻不得不隨磨以左迴焉白孔六帖八十四御覽七百六十二九百四十七虞洪造穹天論云天形穹隆如笠冒地若謂天北方遠者是北方星宜細于三方矣御覽五百九十五渾天儀注云天如雞子地如中黃孤居于天內天大而地小天表裏有水天地各乘氣而立載水而行周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隱天轉如車轂之運也諸論天者雖多然精于陰陽者少張平子陸公紀之徒咸以為推步七曜之道以度厤象昏明之證候校以四八之氣攷以晷刻之分占晷影之往來求形驗于事情莫密于渾象也張平子既作銅渾天儀于密室中以漏水轉之與天皆合如符契也崔子玉為其碑銘曰數術窮天地制作侔造化高才偉蓺與神合契蓋由于平子渾儀及地動儀之有驗故也若天果如渾者則天之出入行于水中為必然矣故黃帝書曰天在地外水有天外水浮天而載地者也又易曰時乘六龍夫陽爻稱龍龍者居水之物以喻天天陽物也又出入水中與龍相似比以龍也聖人仰觀俯察審其如此故晉卦坤下離上以證日出于地也又明夷之卦離下坤上以證日入于地也又需卦乾下坎上此亦天入水中之象也天為金金水相生之物也天出入水中當有何損而謂為不可乎然則天之出入水中無復疑又今視諸星出于東者初但去地少許耳漸而西行先徑人上後遂轉西而下焉不旁施也其先在西之星亦稍下而沒無北轉者日之出入亦然若謂天如磨右轉者眾星日月宜隨天而迴初在于東次經于南次到于西次及于北而復還不東于應橫過去也今日出于東冉冉轉上及其入西亦復漸漸稍下都不繞北邊去了了如此王生必固謂為不然者疏矣今日徑千里其中足以當小星之數十也若日以轉遠之故但當光曜不能復來照及人耳宜猶望見其體不應都失其所在也日光既盛其體又大于星今見極北之小星而不見日之在北者明其不北行也若日以轉遠之故不復可見其北入之閒應當稍小而日方入之時反乃更大此非轉遠之徵也王生以火炬喻曰吾亦將借子之矛以刺子之瞂焉把火之人去人轉遠其光轉微而日月自出至入不漸小也王生以火喻之謬矣又日之入西方視之稍稍去初尚有半如橫破鏡之狀須臾淪沒矣若如王生之言日轉北去者其北都沒之頃宜先如豎破鏡之狀不應如橫破鏡也如此言之日入北方不亦孤孑乎又月之光微不及日遠矣月盛之時雖有重雲蔽之不見月體而夕猶朗然是月光猶從雲中而照外也日若繞西及北者其光故應如月在雲中之狀不得夜便大暗也又日入則星月出焉明知天以日月分主晝夜相代而照也若日常出者不應日始入而星月出也又案河洛之文皆云水火者陰陽之餘氣也夫言餘氣則不能生日月可知也顧當言日精生火者可耳若水火是日月所生則亦何得盡如日月之圓乎今火出于陽燧陽燧圓而火不圓也水出于方諸方諸方而水不方也又陽燧可以取火于日而無取日于火之理此則日精之生火明矣方諸可以取水于月而無取月于水之道此則月精之生水了矣王生又云月不圓望之圓者遠故望之圓若審然者月初生之時及既虧之後視之宜如三寸鏡稍稍轉大不當如初破鏡漸漸滿也而日食或上或下從側而起或如鉤至盡若遠望見圓不宜見其殘缺左右所起也此則渾天之體信而有徵矣隋書天文志上初學記一御覽四又五十八引兩條又八百六十九引兩條麋氏云潮者據朝來也汐者言夕至也見潮來去或有早晚輒言有參差非也水從天邊來一月之中天再東再西故潮來再大再小也又夏時日居南宿陰消陽盛而天高一萬五千里故夏潮大也冬時日居北宿陰盛陽消而天卑一萬五千里故冬潮小也春日居東宿天高一萬五千里故春潮再起也秋日居西宿天卑一萬五千里故秋潮漸減也御覽二十三又六十八天河從西北極分為兩頭至于南極其一經南斗中過其一經東井中過河者天之水也兩河隨天而轉入地下過而與下水相得又與口水合三水相蕩而天轉排之故激涌而成潮水御覽八又六十八月之精生水是以月盛滿而潮濤大御覽四濤水者潮取物多者其力盛來遠者其勢大今浙水從東地廣道遠乍入狹彪陵山觸岸從直赴曲其勢不泄故隆崇涌起而為濤俗人云濤是伍子胥所作妄也子胥始死耳天地開闢已有濤水矣御覽六十八何以知天上不有甘露之淵須太平而灑之地中不有醴泉之源待有道而涌之邪蓺文類聚九十八夏時龍生于太廟之中御覽九百二十九夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳頸白故曰纓義也火行為禮為赤鳳背赤故曰負禮也水行為智為黑鳳胸黑故曰向智也土行為信為黃鳳足下黃故曰蹈信也夫麟鳳以形狀為別聖人以心神為異古者太平之世鳳皇常居其國而生乳焉至夏后始食卵而鳳去之此則鳳有種明矣蓺文類聚九十御覽九百十五引兩條又九百二十八事類賦注十八崑崙圖曰鸞鳥似鳳而白纓聞樂則蹈節而舞至則國安寍蓺文類聚九十九初學記十五白孔六帖九十四御覽九百十六白雉自有種南越尤多案地鏡圖今之九德則古之越裳也蓋白雉之所出周成王所以為瑞者貴其所自來之遠明其德化所被之廣非謂此為奇也蓺文類聚九十御覽九百十七青泠傳云辰星水精生玄武歲星木精生青龍熒惑火精生朱鳥古今注所謂赤烏者朱鳥也其所居高遠日中三足烏之精三足烏何以三足陽數奇也以是有虞至孝三足烏集其庭曾參鋤瓜三足烏集其冠孝故也蓺文類聚九十二御覽六又九百二十又九百七十八麟獸之聖心壽二千歲開元占經一百十九通天犀角有一白理如綖者以盛米置群雞中雞輒驚故名曰駭雞犀得其通天以刻為魚銜以入水當為開方三尺所得氣息予祖彬為汲令以夏至日請主簿杜宣飲酒北壁上有懸赤弩照于杯中形如蛇宣惡之及飲得疾後彬知之使于宣舊處設酒于杯中猶見有蛇因謂宣曰此弩影耳宣遂意解御覽二十三人知藥理病不知學理身平焉故曰物生而蒙事屯而養造昧利有攸適猶金之銷鑪水之從器也是以聖人實之于文鑄之于學夫文學也者人倫之首大教之本也御覽六百七今頭蝨著身皆稍變而白身蝨著頭皆漸化而黑則玄素果無定質移易在乎所漸也御覽九百五十一
