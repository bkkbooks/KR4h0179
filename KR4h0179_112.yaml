body:
  text: 卷一百一十二陶潛讀史述九章余讀史記有所感而述之夷齊讀史述九章二子讓國相將海隅天人革命絶景窮居采薇高歌慨想黃虞貞風凌俗爰感懦夫箕子去鄉之感猶有遲遲矧伊代謝觸物皆非哀哀箕子云胡能夷狡童之歌悽矣其悲管鮑知人未易相知實難淡美初交利乖歲寒管生稱心鮑叔必安奇情雙亮令名俱完程杵遺生良難士為知己望義如歸允伊二子程生揮劍懼茲餘恥令德永聞百代見紀七十二弟子恂恂舞雩莫曰匪賢俱映日月共餐至言慟由才難感為情牽回也早夭賜獨長年屈賈進德修業將以及時如彼稷契孰不願之嗟乎二賢逢世多疑候瞻寫志感鵩獻辭韓非豐狐隱穴以文自殘君子失時白首抱關巧行居災忮辨召患哀矣韓生竟死説難魯二儒易代隨時迷變則愚介介若人特為貞夫德不百年汙我詩書逝然不顧被褐幽居張長公遠哉長公蕭然何事世路多端皆為我異斂轡朅來獨養其志寢迹窮年誰知斯意尚長禽慶贊尚子昔薄宦妻孥共早晚貧賤與富貴讀易悟益損禽生善周遊周遊日已遠去矣尋名山上山豈知反扇上畫贊荷蓧丈人長沮桀溺於陵仲子張長公丙曼容鄭次都薛孟嘗周陽圭三五道邈淳風日盡九流參差牙相推隕形逐物遷心無常準是以達人有時而隱四體不勤五穀不分超超丈人日夕在耘遼遼沮溺耦耕自欣入鳥不駭雜獸斯群至矣於陵養氣浩然蔑彼結駟甘此灌園張生一仕曾以事還顧我不能高謝人間岧岧丙公望崖輒歸匪驕匪吝前路威夷鄭叟不合垂釣川湄交酌林下清言究微孟嘗遊學天網時踈眷言哲友振褐偕徂美哉周子稱疾間居寄心清尚悠然自娛翳翳衡門洋洋泌流曰琴曰書顧盻有儔飲河既足自外皆休緬懷千載託契孤遊天子孝傳贊虞舜夏禹殷高宗周文王虞舜父頑母嚚事之於畎畝之間以孝蒸蒸是以堯聞而授之富有天下貴為天子以為不順於父母若窮而無歸惟順親可以得意苟違朝夕若嬰兒之思戀故稱舜五十而慕書曰戛擊鳴球搏拊琴瑟以詠祖考來格言思其來而訓之愛敬盡於事親是以德教加於百姓刑于四海夏禹有天下以奉宗廟然躬自菲薄以厚其孝孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕禹之德於是稱聞聖人之德無以加於孝敬孝敬之道美莫大焉殷高宗諒陰三年不言百官揔己而聽於冡宰三年而後言天下咸歡德教大行殷道以興詩曰一人有慶兆民賴之其此之謂乎周文王之為世子也朝於王季日三雞鳴至於寢門問於內豎內豎曰安文王乃喜不安則色憂行不能正履日中暮亦如之食上必視寒溫之節食下必問所膳而後退文王孝道光大其化自近至遠刑于寡妻以御于家邦故得萬國之歡心以事其先王矣贊曰至哉后德聖敬自天陶漁致養菲薄饗先親瘠色憂諒陰寢言一人有慶千載賴旃諸侯孝傳贊周公旦魯孝公河間惠王周公旦武王之弟成王幼少周公攝政制禮作樂郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭詩曰於穆清廟肅雍顯相言諸侯樂其位而敬其事也仲尼曰孝莫大於嚴父嚴父莫大於配天則周公其人也貴而不驕位高彌謙自承文武之休烈孝道通于神明光被四海武王封之於魯備其禮樂以奉宗廟焉魯孝公之為公子周宣王問公子能道訓諸侯者立之樊穆仲稱其孝曰肅恭明神而敬事耆老賦事行刑必問於遺訓咨於故實不干所問不犯所咨王曰然則能訓理其民矣乃命之於夷宮是為孝公夫宗廟致敬不忘親也有國不亦宜乎漢河間惠王獻王之曾孫也西京藩臣多驕放之失其名德者唯獻王而惠王繼之漢書稱其能修獻王之行母薨服喪盡禮哀帝下詔書褒揚以為宗室儀表增封萬戶禮古之人皆然至於末俗衰薄固已賢矣貴而率禮又難其見褒賞不亦宜乎贊曰貴驕殊途不期而會周公勞謙乃成光大二侯承魯遵儉去泰河間率禮漢宗是賴卿大夫孝傳贊孔子孟莊子潁考叔孔子魯人也入則事父兄出則事公卿喪事不敢不勉故稱曰孝乎惟孝友于兄弟是亦為政也君賜腥必熟而薦之雖蔬食而齊祭如在鄉人儺朝服立於阼階孝之至也至德要道莫大於孝是以曾參受而書之遊夏之徒常咨稟焉許止不嘗藥書以殺父宰我暫言減喪責以不仁言合訓典行合世範德義可尊作事可法遺文不朽揚名千載孟莊子魯人也孔子稱其孝其他可能也其不改父之政與父之臣是難能也夫孝子之事親也事亡如事存故當不義則爭之存所不爭則亡亦不敢改三年無改父之道猶謂之孝況終身乎潁考叔鄭人也莊公以叔段之故與母誓曰不及黃泉無相見也既而悔之考叔為封人聞之有獻於公公賜之食而舍肉公問之對曰小人有母未嘗君之羹請以遺之公曰汝有母遺繄我獨無考叔曰何謂也公語之故且告之悔考叔曰若掘地及泉隧而相見其誰曰不然公從之遂為母子如初君子曰潁考叔純孝也愛其母而施及莊公詩云孝子不匱永錫爾類其是之謂乎贊曰仁惟本悌聖亦基孝恂恂尼父固天攸造二子承親式禮遵誥永錫純懿無改遺操士孝傳贊高柴樂正子春孔奮黃香高柴衛人也喪親泣血三年未嘗見齒所謂哭不偯言不文也為武城宰而化行民有不服其親者改之行喪如禮君子之德風也以身先之而民不遺其親樂正子春魯人也下堂傷足既瘳數月不出猶有憂色曰吾聞之曾子父母全而生之已全而歸之可謂孝矣故君子一舉足一出言不敢忘父母不敢毀傷孝之始也夫能敬慎若斯而災患及者未之有也孔奮扶風人也少以孝行著名州里供養至謹在官唯母極甘美妻息菜食歷位以清夫人情莫不欲厚其親然亦有分焉奢則難繼能致儉以全養者鮮矣黃香江夏人也九歲失母思慕骨立事父竭力以致養冬無被袴而盡滋味暑則扇床枕寒則以身溫席漢和帝嘉之特加異賜歷位恭勤寵祿榮親可謂夙興夜寐無忝爾所生者也贊曰顯允群士行殊名鈞咸能夙夜以義榮親率彼城邑用化厥民忠以悟主其孝乃純庶人孝傳贊江革廉範汝郁殷陶江革齊人也漢章帝時避賊負母而逃賊賢之不害而告其生路竭力傭債以致甘暖和顏悅色以盡歡心欲親之安自挽車以行鄉人歸之號曰江巨孝位至五官中郎將天子嘉焉寵遇甚厚告歸詔書褒美就家禮其終身以顯異行廉範京兆人也少孤十五入蜀迎父喪遇石船覆範執骸而沒船人救之僅免於死遂以喪歸及仕郡拯太守於危難送故盡節章帝時為郡守百姓歌詠之夫孝者人之本教之所由生也是以範之臨危也勇宰民也惠能以義顯也汝郁陳郡人也五歲母病不食郁亦不食母憐之強食郁能察色知病輒復不食族人號曰異童年十五著於鄉里父母終思慕致毀推財與兄弟隱於草澤君子以為難況童齔孝於自然可謂天性也殷陶汝南人也年十二以孝稱遭父憂率情合禮有長蛇帶其門舉家奔走陶以喪柩在焉獨居廬不動親戚扶持曉喻莫能移之啼號益盛由是顯名屢辭辟命夫智者不惑勇者不懼陶孝於其親而智勇並彰乎弱齡斯又難矣贊曰事親盡歡其難在色彼養以祿我養以力義在愛敬榮不假飾嗟爾衆庶鑒茲前式晉故征西大將軍長史孟府君傳晉故西征征西大將軍長史孟府君傳君諱嘉字萬年江夏鄂人也曾祖父宗以孝行稱仕吳司馬祖父揖元康中為廬陵太守宗葬武昌新陽縣子孫家焉遂為縣人也君少失父奉母二弟居娶大司馬長沙桓公陶侃第十女閨門孝友人無能間鄉閭稱之沖默有遠量弱冠儔類咸敬之同郡郭遜以清操知名時在君右常歎君溫雅平曠自以為不及遜從弟立亦有才志與君同時齊譽每推服焉由是名冠州里聲流京邑太尉潁川庾亮以帝舅民望受分陝之重鎮武昌并領江州辟君部廬陵從事下郡還亮引見問風俗得失對曰嘉不知還傳當問從吏亮以麈尾掩口而笑諸從事既去喚弟翼語之曰孟嘉故是盛德人也君既辭出外自除吏名便步歸家母在堂兄弟共相歡樂怡怡如也旬有餘日更版為勸學從事時亮崇修學校高選儒官以君望實故應尚德之舉太傅河南褚褒簡穆有器識時為豫章太守出朝宗亮正旦大會州府人士率多時彥君坐次甚遠褒問亮江州有孟嘉其人何在亮云在坐卿但自覓褒歷觀遂指君謂亮曰將無是耶亮欣然而笑喜褒之得君奇君為褒之所得乃益器焉舉秀才又為安西將軍庾翼府功曹再為江州別駕巴丘令征西大將軍譙國桓溫參軍君色和而正溫甚重之九月九日溫遊龍山參佐畢集四弟二甥咸在坐時佐吏並著戎服有風吹君帽墮落溫目左右及賓客勿言以觀其舉止君初不自覺良久如廁溫命取以還之廷尉太原孫盛為咨議參軍時在坐溫命紙筆令嘲之文成示溫溫以著坐處君歸見嘲笑而請筆作答了不容思文辭超卓四座歎之奉使京師除尚書刪定郎不拜孝宗穆皇帝聞其名賜見東堂君辭以腳疾不任拜起詔使人扶入君嘗為刺史謝永別駕永會稽人喪亡君求赴義路由永興高陽許詢有雋才辭榮不仕每縱心獨往客居縣界嘗乘船近行適逢君過歎曰都邑美士吾盡識之獨不識此人唯聞中州有孟嘉者將非是乎然亦何由來此使問君之從者君謂其使曰本心相過今先赴義尋還就君及歸遂止信宿雅相知得有若舊交還至轉從事中郎俄遷長史在朝隤然仗正順而已門無雜賓嘗會神情獨得便超然命駕徑之龍山顧景酣宴造夕乃歸溫從容謂君曰人不可無勢我乃能駕御卿後以疾終於家年五十一始自總髮至于知命行不苟合言無夸矜未嘗有喜慍之容好酣飲逾多不亂至於任懷得意融然遠寄傍若無人溫嘗問君酒有何好而卿嗜之君笑而答曰明公但不得酒中趣爾又問聽妓絲不如竹竹不如肉答曰漸近自然中散大夫桂陽羅含賦之曰孟生善酣不愆其意光祿大夫南陽劉耽昔與君同在溫府淵明從父太常夔嘗問耽君若在當已作公否答云此本是三司人為時所重如此淵明先親君之第四女也凱風寒泉之思實鍾厥心謹按採行事撰為此傳懼或乖謬有虧大雅君子之德所以戰戰兢兢若履深薄云爾贊曰孔子稱進德修業以及時也君清蹈衡門則令問孔昭振纓公朝則德音允集道悠運促不終遠業惜哉仁者必壽豈斯言之謬乎五柳先生傳先生不知何許人也亦不詳其姓字宅邊有五柳樹因以為號焉間靖少言不慕榮利好讀書不求甚解每有會意便欣然忘食性嗜酒家貧不能常得親舊知其如此或置酒而招之造飲輒盡期在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示己志忘懷得失以此自終贊曰黔婁之妻有言不戚戚於貧賤不汲汲於富貴極其言茲若人之儔乎酬觴賦詩以樂其志無懷氏之民歟葛天氏之民歟祭程氏妹文維晉義熙三年五月甲辰程氏妹服制再周淵明以少牢之奠俯而酹之嗚呼哀哉寒往暑來日月寖踈梁塵委積庭草荒蕪寥寥空室哀哀遺孤肴觴虛奠人逝焉如誰無兄弟人亦同生嗟我與爾特百常情慈妣早世時尚孺嬰我年二六爾才九齡爰從靡識撫髫相成咨爾令妹有德有操靖恭鮮言聞善則樂能正能和惟友惟孝行止中閨可象可效我聞為善慶自己蹈彼蒼何偏而不斯報昔在江陵重罹天罰兄弟索居乖隔楚越伊我與爾百哀是切黯黯高雲蕭蕭冬月白雪掩晨長風悲節感惟崩號興言泣血尋念平昔觸事未遠書疏猶存遺孤滿眼如何一往終天不返寂寂高堂何時復踐藐藐孤女曷依曷恃煢煢遊魂誰主誰祀奈何程妹於此永已死如有知相見蒿里嗚呼哀哉祭從弟敬遠文歲在辛亥月惟仲秋旬有九日從弟敬遠卜辰云窆永寧后土感平生之遊處悲一往之不返情惻惻以摧心淚愍愍而盈眼乃以園果時醪祖其將行嗚呼哀哉於鑠吾弟有操有概孝發幼齡友自天愛少思寡欲靡執靡介後己先人臨財思惠心遺得失情不依世其色能溫其言則厲樂勝朋高好是文藝遙遙帝鄉爰感奇心絶粒委務考槃山陰淙淙懸溜曖曖荒林晨採上藥夕間素琴曰仁者壽竊獨信之如何斯言徒能見欺年甫過立奄與世辭長歸蒿里邈無還期惟我與爾匪但親友父則同生母則從母相及齠齒並罹偏咎斯情實深斯愛實厚念疇昔日同房之歡冬無縕褐夏渴瓢簞相將以道相開以顏豈不多乏忽忘飢寒余嘗學仕纏綿人事流浪無成懼負素志斂策歸來爾知我意常願攜手置彼衆意每憶有秋我將其刈與汝偕行舫舟同濟三宿水濱樂飲川界靜月澄高溫風始逝撫杯而言物久人脆奈何吾弟先我離世事不可尋思亦何極日徂月流寒暑代息死生異方存亡有域候晨永歸指塗載陟呱呱遺稚未能正言哀哀嫠人禮儀孔間庭樹如故齋宇廓然孰云敬遠何時復還余惟人斯昧茲近情蓍龜有吉制我祖行望旐翩翩執筆涕盈神其有知昭余中誠嗚呼哀哉自祭文歲惟丁卯律中無射天寒夜長風氣蕭索鴻雁于征草本黃落陶子將辭逆旅之館永歸於本宅故人悽其相悲同祖行於今夕羞以嘉蔬薦以清酌候顏已冥聆音愈漠嗚呼哀哉茫茫大塊悠悠高旻是生萬物余得為人自余為人逢運之貧簞瓢屢罄絺綌冬陳含歡谷汲行歌負薪翳翳柴門事我宵晨春秋代謝有務中園載耘載耔乃育乃繁欣以素牘和以七弦冬曝其日夏濯其泉勤靡餘勞心有常間樂天委分以至百年惟此百年夫人愛之懼彼無成愒日惜時存為世珍沒亦見思嗟我獨邁曾是異茲寵非己榮涅豈吾緇捽兀窮廬酣飲賦詩識運知命疇能罔眷余今斯化可以無恨壽涉百齡身慕肥遁從老得終奚所復戀寒暑逾邁亡既異存外姻晨來良友宵奔葬之中野以安其魂窅窅我行蕭蕭墓門奢侈宋臣儉笑王孫廓兮已滅慨焉已遐不封不樹日月遂過匪貴前譽孰重後歌人生實難死如之何嗚呼哀哉八儒夫子沒後散於天下設於中國成百氏之源為綱紀之儒居環堵之室蓽門圭竇甕牖繩樞併日而食以道自居者有道之儒子思氏之所行也衣冠中動作順大讓如慢小讓如偽者子張氏之所行也顏氏傳詩為道為諷諫之儒孟氏傳書為道為疏通致遠之儒漆雕氏傳禮為道為恭儉莊敬之儒仲梁氏傳樂為道以和陰陽為移風易俗之儒樂正氏傳春秋為道為屬辭比事之儒公孫氏傳易為道為潔淨精微之儒三墨不纍於俗不飾於物不尊於名不忮於衆此宋鉶尹文之墨裘褐為衣跂蹻為服日夜不休以自苦為極者相里勤五侯子之墨俱稱經而背譎不同相謂別墨以堅白此苦獲巳齒鄧陵子之墨
