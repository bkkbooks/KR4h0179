body:
  text: 嚴憲與從子秦州刺史杜預書諺云忍辱至三公卿今可謂辱矣能忍之公是卿坐晉書列女杜有道妻嚴氏傳荅阮咸書魯靈光殿賦曰胡人遙集于上楹可字曰遙集也世說任誕篇注引阮孚別傳遐思賦惟仲秋之慘悽百草萎悴而變衰燕翔逝而歸海蟋蟀鳴而相追坐虛堂而無寥嗟我心之多懷悵遐思而內結嗟爾姜任邈不我留謀民生之未幾吾何為其多愁淳風蕭條露霑我衣憂來多方慨然我懷感飛鳥之反鄉詠衛女之思歸于是周遊容與逍遙彷徨悲民生之局促願輕舉之遐翔蓺文類聚三十四鶯賦嘉京都之鶯鳥冠群類之殊形握末軀于紫闥超顥御乎天庭惟節運之不停懼龍角久西頹慕同時之逸豫怨商風我催蓺文類聚九十二與國臣書先公名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意晉書衛瓘傳封鮓反書責陶侃汝為吏以官物見餉非唯不能益吾乃以增吾憂也御覽八百六十二引世說又晉書列女本傳小異芍藥花頌曄曄芍藥植此前庭晨潤甘露晝晞陽靈曾不踰時荏苒繁茂綠葉青蔥應期吐秀緗蕊攢挺素華菲敷光譬朝日色豔芙蕖媛人是採以廁金翠發彼妖容增此婉媚惟昔風人抗茲榮華聊用興思染翰作歌蓺文類聚八十一菊花頌英英麗草稟氣靈和春茂翠葉秋曜金華布濩高原蔓衍陵阿陽芳吐馥載芬載葩爰採爰拾投之醇酒御于王公以介眉壽服之延年佩之黃耇文園賓客乃用不朽蓺文類聚八十一燕頌翩翩玄鳥載飛載揚頡頏庭宇遂集我堂衛泥涿草造作室房避彼湫隘處此高涼孕育五子靡夭靡傷羽翼既就縱心翱翔顧影逸豫其樂難忘蓺文類聚九十二上表言養兄子率為後妾昔初舉醮歸于賀氏胤嗣不殖母兄群從以妾犯七出數告賀氏求妾還妾姑薄氏過見矜愍無子歸之天命婚姻之好義無絕離故使夫僑多立側媵僑仲兄群哀妾之身恕妾之志數謂親屬曰于新婦不幸無子若群陶新婦生前男以後當以一子與之陶氏既產澄二男其後子輝孕群即白薄若所育是男以乞新婦妾敬諾拜賜先為衣服以待其生輝生之日洗浴斷臍妾即取還服藥下乳以乳之所陶氏時取孩抱群恆辭止婢使有言其本末者群輒責之誠欲使子一情以親妾而絕本恩于所生輝百餘日無命不育妾誠自悲傷為之憔悴姑長上下益見矜憐群續復以子率重見鎮撫妾所以訖心盡力皆如養輝故率至于有識不自知非妾之子也率生過周而僑妾張始生子纂于時群尚平存不以為疑原薄及群以率賜妾之意非惟以續僑之嗣乃以存妾之身妾所以得終奉烝嘗于賀氏緣守群信言也率年六歲纂年五歲群始喪亡其後言語漏洩而率漸自嫌為非妾所生率既長與妾九族內外儕姑姨之親而白談者或以僑既有纂其率不得久安而妾子若不去則是與為人後去年率即歸還陶氏僑時寢疾曰吾母兄平生之所共議也陌上遊談之士遽能深明禮情當與公私共論正之尋遂喪亡率既年小未究大義動于游言無以自處妾亦婦人不達典儀唯以聞于先姑謂妾養率以為已子非所為人後也妾受命不天嬰此煢獨少訖心力老而見棄曾無蜾蠃式穀之報婦人之情能無怨結備論其所不解六條其所疑十事如左夫禮所謂為人後者非養子之謂而世之不深案禮文恆令此二事以相疑亂處斷所以大謬也凡言後者非竝存之稱明死乃至哀死不先養今乃以生為人子亂于死為人後此妾一不解也今談者以僑自有纂不嫌率還本也原此失禮為後之意傳曰為人後者孰後後大宗也今僑上非大宗率不為人後何係于有纂與無纂乎此妾二不解也夫以支子後大宗者為親屬既訖無以序昭穆列親疏故係支于宗使百代不遷故有立後之制今以兄弟之子而比之族人之子後大宗此妾三不解也凡為後者降其本親一等以成人之性奉父母之命而出身于後豈不異嬰孩之質受成長于人不識所生惟識所養者乎鄙諺有之曰黃鷄生卵鳥鷄伏之但知為烏鷄之子不知為黃鷄之兒此言雖小可以喻大今以義合之後比成育之子此妾四不解也禮傳曰為人後者為所後祖父母妻妻之父母昆弟之子若子若子者義比于子而恩非子也故曰為後者異于為子也今乃以為後之公義奪育養之至恩此妾五不解也與為人後者自謂大宗無後族人又既己選支子為之嗣以今人之中或復重為之後後人者不二之也自非徇爵則是貪財其舉不主于仁義故尤之也非謂如率為嫡長先定庶少後生而當以為譏此妾六不解也妾又聞父母之于子生與養其恩相半豈包胎之氣重而長養之功輕孔子曰子生三年然後免于父母之懷母故服三年詩曰父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極凡此所歎皆養功也螟蛤之體化于蜾蠃班氏之族孫虎紀焉由此觀之乳哺之義參于造化木今率雖受四體于陶氏而成髮膚于妾身推燥居溼分冗損氣二十餘年已至成人豈言在名稱之閒而忘成育之功此妾一疑也夫人道之親父子兄弟夫婦皆一體也其義父子手足也兄弟四體也故曰兄弟之子猶已子故以相字也今更以一體之親擬族人之疏長養之實比出後之名此妾二疑也夫子之于父母其情一也而有以父之尊厭母之親以父之故斷母之恩以父之命替母之禮其義安取蓋取尊父命也凡嫡庶不分惟群所立是君命制于臣也慈母如母生死勿怠是父命之行于子也妾之母率尊命則由群之成言本義則僑之猶子計恩則妾之懷抱三者若此而今棄之此妾之三疑也諸葛亮無子取兄瑾子喬為子喬本字仲慎及亮有子瞻以喬為嫡故改字伯松不以有瞻而遺喬也蓋以兄弟之子猶己子也陳壽云喬率之後諸葛恪被誅絕嗣自既自有後遣喬子攀還嗣瑾祀明恪若不絕嗣則攀不得還亮近代之純賢瑾正逵之達士其兄弟行事如此必不陷子弟于不義而犯非禮于百代此妾四疑春秋傳曰陳女戴媯生桓公莊姜以為己子言為己子取而字之傳又曰為人後者為之子往而承之也取而字之者母也往而承之者子也在母母之仁也則蜾蠃之育螟蛉在子子之義也則成人之後大宗也苟能別以為己子與為人後之子不同文也則可與求禮情矣以義相況則宗猶父也父猶母也莊姜可得子戴媯之子繫之于夫也兄弟之子可以為子繫之于祖也名例如此而論者弗尋此妾五疑也董仲舒一代純儒漢朝每有疑議未嘗不遣使者訪問以片言而折中焉時有疑獄曰甲無子拾道旁棄兒乙養之以為子及乙長有罪殺人以狀語甲甲藏匿乙甲當何論仲舒斷曰甲無子振活養乙雖非所生誰與易之詩云螟蛉有子蜾嬴負之春秋之義父為子隱甲宜匿乙詔不當坐夫異姓不相為後禮之明禁仲舒之博學豈闇其義哉蓋知為後者不鞠養鞠養者非後而世人不別此妾六疑也又一事曰甲有子乙以乞丙乙後長大而丙所成育甲因酒色謂乙曰汝是吾子乙怒杖甲二十甲以乙本是其子不勝其忿自告縣官仲舒斷之曰甲能生乙不能長育以乞兩于義已絕矣雖杖甲不應坐夫拾兒路旁斷以父子之律加杖所牛附于不坐之條其為予奪不亦明乎今說者不達養子之義唯亂稱為人後此妾七疑也漢代秦嘉早亡其妻徐淑乞子而養之淑亡後子還所生朝廷通儒移其鄉邑錄淑所養子還繼秦氏之祀異姓尚不為嫌況兄弟之子此妾八疑也吳朝周逸博達古今逸本左氏之子為周氏所養周氏又自有子時人不達者亦譏逸逸敷陳古今故卒不復本姓識學者咸謂為當矣此妾九疑也為人後者止服所後而為本父服周一也女子適人降所生二也為父後者為出母無服三也諸侯之庶子不得服其母四也庶子為王不敢服其母五也凡此五者皆制人情禮稱以義斷恩節文立焉率情立行者夷狄之道也患世人不能錯婃禮文表裏仁義亂于大倫故漢衰以諸侯嗣天子各還尊其私親以為得周公嚴父之義而不知其大悖國典夫未名之子死而不哭既名之後哭而不服三殤之差及至齊斬所稟所受其體一也而長幼異制等級若此又今世人生子往往有殺而不舉者君子不受不慈之責有司不行殺子之刑六親不制五服之哀賓客不修弔問之禮豈不以其蠢爾初載未夷于人乎生而殺之如此生而棄之受成長于他人則追名曰本吾子也乃全責以父子之恩自同長養之功此妾十疑也通典六十九與釋某書衛稽首和南近奉敕寫急就章遂不得與師書耳但衛隨世所學規摹鍾繇遂歷多載年廿著詩論草隸通解不敢上呈衛有一弟子王逸少甚能學衛真書咄咄逼人筆勢洞精字體道媚師可詣晉尚書館書耳仰憑至鑒大不可言弟子李氏衛和南淳化閣帖五筆陣圖夫二端之玅莫先乎用筆六蓺之奧莫匪乎銀鉤昔秦丞相斯見周穆王書七日興歎患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出群故知達其源者少闇于其理者多近代以來殊不師古而緣情棄道纔記姓名或學不該贍聞見又寡致使成功不就虛費精神自非通靈感物不可與談斯道今刪李斯筆玅更加潤色總七條并作其容列事如左貽諸子孫永為模範庶將來君子時復覽焉筆要取崇山絕仞中兔毛八九月收之其筆頭長一寸管長五寸鋒齊腰強者取硯取煎涸新石潤澀相兼浮津耀墨者其墨取廬山之松煙代郡之鹿膠十年已上強如石者為之紙取東陽魚卵虛柔滑淨者凡學塹書字先學執筆若真書去筆頭二寸一分若行草書去筆頭三寸一分執之下筆點墨畫芟波屈曲皆須盡一身之力而送之若初學書先須大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力者多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者聖無力無筋者病一一從其消息而用之一如千里陣雲隱隱然有其實有形丶如高峰墜石磕磕然實如崩也丿陸斷犀象乚百鈞弩發丨萬歲枯藤乀崩浪雷奔𠃌勁弩筋節右七條牛陣出入斬斫圖執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能緊者心手不齊意後筆前者敗若執筆遠而急意前筆後者勝又有六種用筆結構圓備如篆法飄颺灑落如章草凶險可畏口八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱橫如古隸然心存委曲每為一字各象其形斯超玅矣書道畢矣永和四年上虞製記唐張彥遠法書要錄一御覽七百四十八論語贊衛靈公問陳於孔子孔子對曰俎豆之事則嘗聞之軍旅之事未之學也庶則大矣比德中庸斯言之善莫不歸宗麤者乖本妙極令終嗟我懷矣興言攸同孔子曰民之於仁也甚于水火水火吾見蹈而死者未見蹈仁而死者矣蓺文類聚五十五箏賦伊夫箏之為體惟高亮而殊特應六律之修和與七始乎消息括八音之精要超眾器之表式后夔創制子野考成列柱成律既和且平度中楷模不縮不盈總八風而熙泰羌貫微而洞靈牙氏攘袂而奮手鍾期傾耳以靜聽奏清角之要妙詠騶虞與鹿鳴獸連軒而率舞鳳踉蹌而集庭汎濫浮沈逸響發揮翕然若絕皎如復迴爾乃祕豔曲卓礫殊異周旋去留千變萬態蓺文類聚四十四又初學記十六引三條弔嵇中散文宣尼有言曰惟仁者能好人能惡人自非賢智之流不可以褎貶明德擬議英哲矣故彼嵇中散之為人可謂命世之傑矣觀其德行奇偉風韻劭邈有似明月之映幽夜清風之過松林也若夫呂安者嵇子之良友也鍾會者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯夜光非與魚目比映三秀難與朝華爭榮故布鼓自嫌于雷門礫石有于琳琅矣嗟乎道之喪也雖智周萬物不能違顛沛之難故存其心者不以一眚累懷檢乎迹者必以纖芥為事慨達人之獲譏悼高範之莫全淩清風以三歎撫茲子而悵焉聞先覺之高唱理極滯其必宣候千載之大聖期五百之明賢聊寄憤于斯章思慷慨而炫然御覽于百九十六石榴賦惟木之珍莫美石榴框鮮葩于青春結芳實于素秋御覽九百七十與妹劉氏書伏見偉方所作先君誄其述詠勳德則仁風靡墜其言情訴哀則孝心以敘自非挺生之才孰能克隆聿脩若斯者乎執詠反覆觸言流淚感賴交集悲慰竝至元方偉方竝年少而有盛才文辭富豔冠于此世竊不自量有疑一言略陳所懷庶備起予先君既體弘仁義又動則聖檢奉親極孝事君盡忠行己也恭養民也惠可謂立德立功示民軌儀者也但道長祚短時乏識真榮位未登高志不遂本不標方外迹也老莊者絕聖棄智渾齊萬物等貴賤忘哀樂非經典所貴非名教所取何必輒引以為喻耶可共詳之蓺文類聚二十二荅舅母書元方春秋始富德業亦隆弘道博文才質兼備冀志與時畼榮耀當年豈意一朝冥然長往元方沖幼過庭莫聞聖善明訓業成三徙亦既冠婚雙譽允集庶幾偕老色養膝下而殃厲橫流養禍仍遘媛姊傾逝宗模永絕姊方玄華竝夭戚年豈慮豈圖禍降彌酷良才夭于始立崇基殞于一圚仰痛殄滅俯悼二弟斯人斯命當可柰何母年踰耳順備經百罹一紀之中四遘至痛目前廓然三從靡託窮悼中發情馳難處蓺文類聚三十四正旦獻椒花頌旋穹周迴三朝肇建青陽散暉澄景載煥美哉靈葩爰采爰獻聖容映之永萬於萬蓺文類聚四又八十九晉書列女傳北堂書鈔一百五十五初學記四御覽二十九又九百五十八獻春頌玄陸降坎青逵升震陰祗送冬陽靈迎春初學記三五時畫扇頌炎后飛軌引曜丹逵蕤賓應律融精協曦五象列位品物以垂兌降素獸震升青螭日月澄暉仙章來儀仰憩翠巖俯映蘭池靈柯幽藹神卉參差如山之壽如松之猗永錫難老與時推移蓺文類聚六十九初學記二十五進見儀正月七日上人勝于人御覽三十懷思賦超離親獨寄與憂憤而長俱雖亮分以自勉曾無閒乎須臾思遙遙而沖惙疾結滯乎肌膚憶昔日之懽侍奉膝下而怡裕集同生而從容常欣泰以逸豫何運遇之徧否獨遼隔于修路何恆鳥之將分猶哀鳴以告離況遊子之眷慕孰殷思之可靡于是仲秋蕭索蓐收西御寒露宵零落葉晨布羨歸鴻之提提振輕翼而高舉志眇眇而遠馳悲離思而嗚咽彼邁物而推移何子思之難泄聊攬翰以寄懷悵辭鄙而增結蓺文類聚二十初學記十七春花賦千葩粲其昭晰兮百卉蒨而同榮蘭圃翹以含芳兮芝薄振而沈馨翠穎競臻眾條頻英或異色同形或齊芳殊制自然神杳不可勝計爛若羅宿之垂光灼若隋珠之宵列爽若翡翠之群翔練若珊瑚之映月詩人詠以託諷良喻美而光德準工女于妙規飾王后之首則蓺文類聚八十八姜嫄頌英英姜嫄實德之純肇承靈瑞武敏是遵誕育岐嶷毗贊皇綸播殖之訓萬葉攸循啟母塗山頌塗山靜居玄郎悟幾大禹至公過門不歸明此道訓孩胤是綏仁哲以成永繫天暉蓺文類聚十五靈壽杖銘籊籊鮮榦秀彼崇㟽下澤蘭液上瑩芳霄貞勁內內固鮮粲外昭耀質靈薈作珍華朝杖之身安越齡松喬蓺文類聚六十九夫誄猗猗嘉穎朝陽方翹烈風嚴霜殞此秀條璇璣倏忽四序競征清商激宇蟋蟀吟櫺蓺文類聚三十七悼艱賦伊稟命之不辰遭天難之靡忱夙無父之何怙哀壅瘁以抽心覽蓼莪之遺詠詠肥泉之餘音經四位之代謝雖積祀而思深伊三從而有歸爰奉嬪于他族仰慈姑之惠和荷丘澤之陶渥釋褧服以斬衣代羅幃以縞布仰慈尊以飲泣撫孤景以協慕遇飛廉之暴骸觸驚風之所會扶搖奮而上躋頹雲下而無際頓余邑之當春望峻陵而鬱青瞻空宇之寥廓愍宿草之發生顧南枝以永哀向北風以飲泣情無觸而不悲思無感而不集蓺文類聚三十四箜篌賦攷茲器之所起實侯氏之所營遠不假于琴瑟顧無取乎竽笙爾乃陟九峻之增巖晞承溫之朝日剖嶧陽之孤桐代楚宮之椅漆徵班輸之造器命伶倫而調律浮音穆以遐畼沈響幽而若絕樂操則寒條早榮哀曼則晨華朝滅邈漸離之青角超子野之白雪然田超梁甫願登華岳路嶮悲秦道難怨蜀遺逸悼行邁之離秋風哀年時之速陵危柱以頡頏憑哀弦以躑躅于是數轉難測聲變無方或冉弱以飄沈或頓挫以抑揚或散角以放羽或攄微以騁商蓺文類聚四十四初學記十六未有于是而已矣后夔正樂唱引參列宋女揮絲秦娥撫節初學記十六與虞定夫人薦環夫人書瓊聞興賢崇德聖主令典旌善表操有邦盛務伏見族祖吳國亡民富春孫彥妻環少厲令節服膺道教逮適孫氏恪居婦職宗姻有聲奉禮未周彥母喪殞喪殞半年奄亡沒環率禮奉終抗義明節傾竭私產以供葬送禮服既終前無立子家欲改醮誓而不許蓺文類聚十八荅虞吳國書咸和中避蘇峻亂于臨安山吳國遣使餉饋乃荅書曰此果有胡桃飛穰飛穰出自南州胡桃本生西羌外國外剛內柔質似古賢欲以奉貢蓺文類聚八十七御覽九百七十一與從弟孝徵書省爾譏我以養鵠乃戒以衛懿滅斃之禍斯言惑矣吾未之取彼衛懿之好民無役車之載鶴有乘軒之飾禍敗之由由乎失所若乃開圃即于靈囿沃地矩乎神沼文魚躍于白水素鳥翔乎神州豈非周文之德大雅脩哉夫嘉肴旨酒非不美也夏禹盛以陶豆殷紂著以玉杯而此聖以興彼愚以滅蓋置之失所如其無失來難可施乎蓺文類聚九十與從祖虞光祿書賜琉璃盌御覽七百六十公孫夫人序贊夫人姓公孫氏會稽剡人也夫人資三靈之淳懿誕華宗之澄粹奇朗照于齠齔四教成于弱笄慈恩溫恭行有秋霜潔祗心制節性同青春之和敦悅憲章動遵禮規居室則道齊師氏有行則德配女儀服有盈籩豆無闕猗歟夫人天姿特挺行高冰潔操與霜整性揚蘭芳德振玉穎猗彼瓊林奇翰有集展彼碩媛含德來綺動與禮遊靜以義立蓺文類聚十八安石榴賦振綠葉于柔柯垂彤子于累房御覽九百七十與妹憲書念諸里舍皆富財賄袿襡襲蔽蔽紛華照曜于是久際想汝懷愧御覽六百九十一引婦人集
