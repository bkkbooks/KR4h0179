body:
  text: 卷一百二十三郭璞中山經赤銅山海經圖贊下昆吾之山名銅所在切玉如泥火炎其采尸子所歎驗之汲宰藝文類聚八十四鬼草焉得鬼草是樹是藝服之不憂樂天傲世如彼浪舟任波流滯御覽四百六十九鶡鶡之為鳥同群相為疇類被侵雖死不避毛飾武士兼厲以義藝文類聚九十鳴蛇化蛇鳴化二蛇同類異狀拂翼俱遊騰波漂浪見則並災或淫或亢藏本馬腹獸飛魚馬腹之物人面似虎飛魚如豚赤文無羽食之辟兵不畏雷鼓藏本藝文類聚二宋本初學記一引下四句御覽九百三十九引末二句神熏池泰逢虎尾武羅人面熏池之神厥狀不見爰有美玉河林如蒨藏本神武羅有神武羅細腰白齒聲如鳴佩以鐻貫耳司帝密都是宜女子藏本鴢鳥鴢鳥似鳧翠羽朱目既麗其形亦奇其肉婦女是食子孫繁育藏本荀草荀草赤實厥狀如菅婦人服之練色易顏夏姬是豔厥媚三還藏本神泰逢神號泰逢好遊山陽濯足九州出入流光天氣是動孔甲迷惶藏本旋龜人魚修辟聲如破木號曰旋龜修辟似黽厥鳴如鴟人魚類䱱出于洛伊藏本鳴石金石同類潛響是韞擊之雷駭厥聲遠聞苟以數通氣無藏本桃林桃林之谷實惟塞野武王克商休牛風馬厄越三塗作險西夏藏本若華烏酸草療瘧之草厥實如瓜烏酸之葉三成黃華可以為毒不畏蚖蛇藏本帝臺棋茫茫帝臺維靈之貴爰有石棋五彩煥蔚觴禱百神以和天氣藏本䔄草䔄草黃華實如菟絲君子是佩人服媚之帝女所化其理難思藏本山膏獸黃棘山膏如豚厥性好罵黃棘是食匪子匪化雖無貞操理同不嫁藏本天楄牛傷文獸鰧魚牛傷鎮氣天楄弭噎文獸如蜂枝尾反舌鰧魚青斑處于逵穴藏本三足龜造物維均靡偏靡頗少不為短長不為多賁能三足何異黿鼉藏本嘉榮霆維天精動心駭目曷以禦之嘉榮是服所正者神用口腸腹藏本帝休帝休之樹厥枝交對竦本少室曾陰靈䨴君子服之匪怒伊愛藏本泰室嵩維嶽宗華岱恆衡氣通天漢神洞幽明嵬然中立衆山之英藏本栯木爰有嘉樹厥名曰栯薄言采之窈窕是服君子惟歡家無反目藏本𦱌草𦱌草赤莖實如櫻薁食之益智忽不自覺殆齊生知功奇于學藏本薊柏薊柏白華厥子如丹實肥變氣食之忘寒物隨所染墨子所歎藏本𦵧大騩之山爰有蘋草青華白實食之無夭雖不增齡可以窮老藏本橘柚厥苞橘柚奇者維甘朱實金鮮葉蒨翠藍靈均是詠以為美談藏本鮫魚魚之別屬厥號曰鮫珠皮毒尾匪鱗匪毛可以錯角兼飾劍刀藏本神𧕛圍計蒙涉𧕛涉𧕛三腳𧕛圍虎爪計蒙龍首獨稟異表升降風雨茫茫渺渺藏本鴆鳥蝮維毒魁鴆鳥是噉拂翼鳴林草瘁木慘羽行隱戮厥罰難犯藏本椒椒之灌植實繁有倫薰林列薄馞其芬辛服之不已洞見通神藝文類聚八十九岷山岷山之精上絡東井始出一勺終致渺溟作紀南夏天清地靜藝文類聚八夔牛西南巨牛出自江岷體若垂雲肉盈千鈞雖有逸力難以揮輪藏本崍山邛崍峻嶮其坂九折王陽逡巡王尊逞節殷有三仁漢稱二哲藏本蛇狼雍和𤟑獸蛇狼之出兵不外擊雍和作恐𤟑乃流疫同惡殊災氣各有適藏本蜼寓屬之才莫過于蜼雨則自懸塞鼻以尾厥形雖隨列象宗彝藏本熊穴熊山有穴神人是出與彼石鼓象殊應一祥雖先見厥事非吉藏本跂踵跂踵為鳥一足似夔不為樂興反以來悲中山經注銘曰云云青耕禦疫跂踵降災物之相反各以氣來見則民咨實為病媒藏本蛟匪蛇匪龍鱗采暉煥騰躍濤波蜿蜒江漢漢武飲羽佽飛疊斷藝文類聚九十六神耕父清泠之水在于山頂耕父是遊流光灑景黔首祀禜以弭災眚藏本九鍾嶢崩涇竭麟鬭日薄九鍾將鳴淩霜乃落氣之相應觸感而作藏本嬰勺支離之山有鳥似鵲白身赤眼厥毛如勺維彼有斗不可以酌藏本獜有獸虎爪厥號曰獜好自跳撲鼓甲振奮若食其肉不覺風迅藏本帝臺漿帝臺之水飲蠲心病靈府是滌和神養性食可逍遙濯髮浴泳藏本狙如狙如微蟲厥體無害見則師興兩陳交會物之所感焉有小大藏本帝女桑爰有洪桑生濱淪潭厥圍五丈枝相交參園客是采帝女所蠶藝文類聚八十八𤝻即梁渠聞𧲂獸䳅餘鳥梁渠致兵𤝻即起災䳅餘辟火物各有能聞𧲂之見大風乃來藏本神于兒于兒如人蛇頭有兩常遊江淵見于洞廣乍潛乍出神光惚恍藏本神二女神之二女爰宅洞庭遊化五江惚恍窈冥號曰夫人是維湘靈藏本海外南經自此山來蟲為蛇蛇號為魚賤無定貢貴無常珍物不自物自物由人萬事皆然豈伊蛇鱗藏本羽民國鳥喙長頰羽生則卵矯翼而翔龍飛不遠人維倮屬何狀之反藏本神人二八羽民之東有神司夜二八連臂自相羈駕晝隱宵出詭時淪化藏本歡頭國歡國鳥喙行則杖羽潛于海濱維食芑秬實維嘉穀所謂濡黍藏本厭火國有人獸體厥狀怪譎吐納炎精火隨氣烈推之無奇理有不熱藏本三珠樹三珠所生赤水之際翹葉柏竦美壯若彗濯彩丹波自相霞映藏本臷國不蠶不絲不稼不穡百獸率儛群鳥拊翼是號臷民自然衣食藏本貫胸交脛支舌國鑠金洪爐灑成萬品造物無私各任所稟歸于曲成是見兆朕藏本不死國有人爰處員丘之上赤泉駐年神木養命稟此遐齡悠悠無竟藏本鑿齒鑿齒人類實有傑牙猛越九嬰害過長蛇堯乃命羿斃之壽華藏本三首國雖云一氣呼吸異道觀則俱見食則皆飽物形自周造化非巧藏本焦僥國群籟舛吹氣有萬殊大人三丈焦僥尺餘混之一歸此亦僑如藏本長臂國雙肱三尺體如中人彼曷為者長臂之民修腳自負捕魚海濱藏本狄山帝堯葬于陽帝嚳葬于陰聖德廣被物無不懷爰乃殂落封墓表哀異類猶然矧乃華黎藏本視肉聚肉有眼而無腸胃與彼馬勃頗相髣佛奇在不盡食人薄味藏本南方祝融祝融火神雲駕龍驂氣御朱明正陽是含作配炎帝列位于南藏本海外西經滅蒙鳥大運山雄常樹青質赤尾號曰滅蒙大運之山百仞三重雄常之樹應德而通藏本夏后啓筮御飛龍果儛九代雲融是揮玉璜是佩對揚帝德稟天靈誨藏本三身國一臂國品物流形以散混沌增不為多減不為損厥變難原請尋其本藏本奇肱國妙哉工巧奇肱之人因風構思制為飛輪淩頽遂軌帝湯是賓藏本形天爭神不勝為帝所戮遂厥形天臍口乳目仍揮干戚雖化不服藏本女祭女戚彼姝者子誰氏二女曷為水間操魚持俎厥儷安在離群逸處藏本䳐鳥𪆻鳥有鳥青黃號曰𪆻䳐與妖會合所集禍至類則梟鶹厥狀難媚藏本丈夫國陰有偏化陽無産理丈夫之國王孟是始感靈所通桑石無子藏本女丑尸十日並熯女丑以斃暴于山阿揮袖自翳彼美誰子逢天之厲藏本巫咸群有十巫巫咸所統經技是搜術藝是綜採藥靈山隨時登降藏本并封龍過無頭并封連載物狀相乖如驥分背數得自通尋之愈閡藏本女子國簡狄有吞薑嫄有履女子之國浴于黃水乃娠乃字生男則死藏本軒轅國軒轅之人承天之祜冬不襲衣夏不扇暑猶氣之和家為彭祖藏本龍魚龍魚一角似鯉居陵俟時而出神聖攸乘飛鶩九域乘雲上升藝文類聚九十六又御覽九百三十九作似狸乘黃飛黃奇駿乘之難老揣角輕騰忽若龍矯實鑒有德乃集厥皂藏本西方蓐收蓐收金神白毛虎爪珥蛇執鉞專司無道立號西阿恭行天討藏本海外北經無䏿國萬物相傳非子則根無䏿因心構肉生魂所以能然尊形者存藏本燭龍天缺西土龍銜火精氣為寒暑眼作昏明身長千里可謂至靈藝文類聚九十六一目國蒼四不多此一不少子野冥瞽洞見無表形遊逆旅所貴維眇藏本柔利國柔利之人曲腳反肘子求之容方此無醜所貴者神形于何有藏本共工臣相柳共工之臣號曰相柳稟此奇表蛇身九首恃力桀暴終禽夏后藏本深目國深目類胡但絶縮軒轅道降款塞歸服穿胸長腳同會異族藏本無腸國無腸之人厥體維洞心實靈府餘則外用得一自全理無不共藏本聶耳國聶耳之國海渚是縣雕虎斯使奇物畢見形有相須手不離面藏本夸父神哉夸父難以理尋傾河逐日遁形鄧林觸類而化應無常心藏本尋木渺渺尋木生于河邊竦枝千里上干雲天垂陰四極下蓋虞淵藏本跂踵國厥形惟大斯腳則企跳步雀踴踵不閡地應德而臻款塞歸義藏本歐絲野女子鮫人體近蠶蚌出珠非甲吐絲匪蛹化出無方物豈有種藏本平丘兩山之間丘號曰平爰有遺玉駿馬維青視肉甘華奇果所生藏本騊駼騊駼野駿産自北域交頸相摩分背翹陸雖有孫陽終不在服藝文類聚九十三北方禺強禺強水神面色黧黑乘龍踐蛇淩雲拊翼靈一玄冥立于北極藏本海外東經君子國東方氣仁國有君子薰華是食雕虎是使雅好禮讓禮委論理藏本天吳耽耽水伯號曰谷神八頭十尾人面虎身龍據兩川威無不震藏本豎亥禹命豎亥青丘之北東盡太遠西窮邠國步履宇宙以明靈德藏本九尾狐青丘奇獸九尾之狐有道祥見出則銜書作瑞于周以摽靈符藝文類聚九十五又初學記二十九祥見作翔見于周作周文御覽九百九十黑齒國雨師妾玄股國勞民國陽谷之山國號黑齒雨師之妾以蛇挂耳玄股食鷗勞民黑趾藏本十日十日並出草木焦枯羿乃控弦仰落陽烏可為洞感天人縣符藝文類聚一毛民國牢悲海鳥西子駭麋或貴穴倮或尊裳衣物我相傾孰了是非藏本東方句芒有神人面身鳥素服銜帝之命錫齡秦穆皇天無親行善有福藏本海內南經狒狒狒狒怪獸被髮操竹獲人則笑脣蓋其目終亦呼號反為我戮御覽九百八十狌狌狌狌之狀形乍如犬厥性識往為物警辨以酒招災自貽纓罥藏本夏后啓臣孟塗孟塗司巴聽訟是非厥理有曲血乃見衣所請靈斷嗚呼神微藏本建木爰有建木黃實紫柯皮如蛇纓葉有素羅絶蔭弱水義人則過藏本氐人炎帝之苗實生氐人死則復蘇厥身為鱗雲南是託浮遊天津藏本巴蛇象實巨獸有蛇吞之越出其骨三年為期厥大何如屈生是疑藝文類聚九十六海內西經二負臣危漢擊磐石其中則危劉生是識群臣莫知可謂博物山海乃奇藏本窫窳窫窳無罪見害二負帝命群巫操藥夾守遂淪溺淵變為龍首藏本大澤方百里地號積羽厥方百里群鳥雲集鼓翅雷起穆王旋軫爰榮騄耳藏本流黃酆氏國城圍三百連河比棟動是塵昏蒸氣霧重焉得遊之以傲以縱藏本流沙天限內外分以流沙經帶西極頽唐委蛇注于黑水永溺餘波藏本木禾昆侖之陽鴻鷺之阿爰有嘉穀號曰木禾匪植匪藝自然靈播藏本開明開明天獸稟茲金精虎身人面表此桀形瞪視崑山威懾百靈藏本文玉玗琪樹文玉玗琪方以類叢翠葉猗萎丹柯玲瓏玉光爭煥彩豔火龍藏本不死樹萬物暫見人生如寄不死之樹壽蔽天地請藥西姥焉得如羿藝文類聚八十八甘水聖木醴泉睿木養齡盡性增氣之和去神之冥何必生知然後為聖藝文類聚八十八服常琅玕樹服常琅玕崑山奇樹丹實珠離緑葉碧布三頭是伺遞望遞顧藏本海內北經蛇巫山鬼神蜪犬群帝臺大蜂朱蛾蛇巫之山有人操杯鬼神蜪犬主為妖災大蜂朱蛾群帝之臺藏本吉良金精朱鬣龍行駿跱拾節鴻鶩塵下及起是謂吉黃釋聖牖里藏本闒非據比尸祙戎人面獸身是謂闒非被髮折頸據比之尸戎其三角祙豎其眉藏本騶虞怪獸五采尾參于身矯足千里鯈忽若神是謂騶虞詩歎其仁藝文類聚九十九馮夷稟華之精食惟八石乘龍隱淪往來海若是實水仙號曰河伯藝文類聚七十八王豫夜尸豫夜之尸體分成七離不為疏合不為密苟以神御形歸于一藏本宵明燭光水有佳人宵明燭光流耀河媚稟此奇祥維舜二女別處一方藏本列姑射山大蟹陵魚姑射之山實西神人大蟹千里亦有陵鱗曠哉溟海含怪藏珍藏本蓬萊山蓬萊之山玉碧構林金臺雲館皓哉獸禽實維靈府玉主甘心藏本海內東經豎沙居繇埻端璽㬇國豎沙居繇埻端璽㬇沙漠之鄉絶地之館或羈于秦或賓于漢藏本郁州南極之山越處東海不行而至不動而改維神所運物無常在藏本韓雁始鳩雷澤神琅邪臺韓雁始鳩在海之州雷澤之神鼓腹優遊琅邪嶕嶢邈若雲樓藏本大江北江南江浙江盧淮湘漢濛溫潁汝涇渭白沅贛泗鬱肄潢洛汾沁濟潦呼池漳水川瀆交錯渙瀾流帶通潛潤下經營華外殊出同歸混之東會藏本大荒東經東海外大壑雁益洞穴映昏龍燭爰有大壑號曰底谷書鈔一百五十八竫人僬僥極麼竫人又小四體取足眉目才了初學記十九御覽三百七十八大荒西經弱水弱出崑山鴻毛是沈北淪流沙南映火林惟水之奇莫測其深藝文類聚八炎火山木含陽氣精構則燃焚之無盡是生火山理見乎微其妙在傳藝文類聚七大荒北經若木若木之生崑山之濱朱華電照碧葉玉津食之靈智為力為仁藝文類聚八十九海內經都廣之野都廣之野珍怪所聚爰有羔穀鸞歌鳳舞后稷託終樂哉斯土藝文類聚六封豕有物貪婪號曰封豕薦食無饜肆其殘毀羿乃飲羽獻帝效技藝文類聚九十五元皇帝哀策文永惟殿宇之廓寂悲彝奠之莫歆感鸞輅之晏駕哀袞裘之委襟痛聖躬之遐往長淪景于太陰乃作策曰王之不極百六作艱梟集瓊林鯨躍神淵懷愍失據海覆嶽巔蠢蠢六合罔不倒懸靈慶有底見龍在田誰其極哉我后先天大人承運重明繼作撫征淮海駿命再廓仁風旁靡神化潛鑠處沖思挹居簡行約聖敬日邁玄心逾漠用物與能總攬群略林無滯才山無遺錯恩靡不懷化靡不被茫茫海域款塞慕義萬里同塵罔匪王隸熙熙遺黎莫知其寄括終宇宙混同天地曰功永年曰德慶隆奈何氛厲奄集聖躬大業未恢皇齡未中天憯其景崑頽其崇煢煢小子藐藐孤沖靡天何戴靡地何憑恍惚極慕若存若終蔑焉無聞廓焉長寂聆音靡晞瞻顏失覿窮號曷訴叩心誰告何悲之哀何痛之酷嗚呼我皇逢天之戚嗚呼哀哉眇然升遐即安玄室煌煌火龍赫赫朱韠終焉永潛曷其有出明訓長絶小子何述望阜增欷臨崩慟栗哀兼陟方痛過遏密靈爽安之反真復質永合元漠終始得一藝文類聚十三
