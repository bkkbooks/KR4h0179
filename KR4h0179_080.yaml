body:
  text: 張敏奇士劉披賦蓋土龍不可以升天石人不任為亭長容貌雖似蹄足難獎初學記五神女賦并序神女賦并序世之言神女者多矣然未之或驗也至如弦氏之婦則近信而有證者夫鬼魅之下人也無不羸病損瘦今義起平安無恙而與神女飲宴寢處縱情極意豈不異哉余覽其歌詩辭旨清偉故為之作賦皇覽余之純德步朱闕之崢嶸靡飛除而入祕殿侍太極之穆清帝愍余之勤肅將休余于中州託玄靜以自處是夫子之好仇于是主人憮然而問之曰爾豈是周之褒姒齊之文薑孽婦淫鬼來自藏乎儻亦漢之遊女江之娥皇厭真樂愆倦仙侍乎于是神女乃斂袂正襟而對曰我實貞淑子何猜焉且辨言知禮恭為令則美姿天挺盛飾表德以此承歡君有何惑爾乃敷茵席垂組帳嘉旨既設同牢而饗微聞芳澤心蕩意放于是尋房中之至燕極長夜之歡情心眇眇以忽忽想北里之遺聲既淡泊于幽默揚覺寐而中驚賦斯時之要妙進偉服之紛敷俯撫衽而告辭仰長歎以欷吁乘雲霧而變化遙棄我其焉如藝文類聚七十九神女傳弦義起感神女智瓊智瓊後去賜義起織成裙衫北堂書鈔一百二十九頭責子羽文余友有秦生者雖有姊夫之尊少而狎焉同時好昵有太原溫長仁顒潁川荀景伯寓范陽張茂先華上郡劉文生許南陽鄒潤甫湛河南鄭思淵詡數年之中繼踵登朝而此賢身處陋巷屢沽而無善價亢志自若終不衰墮為之慨然又怪諸賢既已在位曾無伐木嚶鳴之聲甚違王貢彈冠之義故因秦生容貌之盛為頭責之文以戲之并以嘲六子焉雖似諧謔實有興也其文曰維泰始元年頭責子羽曰吾託子為頭萬有餘日矣大塊稟我以精造我以形我為子植髮膚置鼻耳安眉須插牙齒眸子摛光雙顴隆起每至出人人間遨遊市里行者辟易坐者竦跽或稱君侯或言將軍奉手傾側佇立崎嶇如此者故我形之足偉也子冠冕不戴金銀不佩叉以當笄帢以代幗旨味弗嘗食粟茹菜隈摧園間糞壤汙黑歲莫年過曾不自悔子厭我于形容我賤子乎意態若此者乎必子行己之纍也子遇我如讎我視子如仇居常不樂兩者俱憂何其鄙哉子欲為仁賢也則當如皋陶后稷巫咸伊陟保乂王家永見封殖子欲為名高也則當如許由子臧卞隨務光洗耳遂祿千歲流芳子欲為遊説也則當如陳軫蒯通陸生鄧公轉禍為福令辭從容子欲為進趣也則當如賈生之求試終軍之請使砥礪鋒穎以幹王事子欲為恬淡也則當如老聃之守一莊周之自逸廓然離俗志淩雲日子欲為隱遁也則當如榮期之帶索漁父之瀺灂棲遲神丘垂餌巨壑此一介之所以顯身成名者也今子上不希道德中不效儒墨塊然窮賤守此愚惑察子之情觀子之志退不能為處士進無望于三事而徒玩日勞形習為常人之所喜不亦過乎于是子羽愀然深念而對曰凡所教敕謹聞命矣以受性拘係不間禮義設以天幸為子所寄今欲使吾為忠也即當如伍胥屈平欲使吾為信也則當殺身以成名欲使吾為介節邪則當赴水火以全貞此四者子之所忌故吾不敢造意頭曰子所謂天刑地網剛德之尢不登山抱木則褰裳赴流吾欲告爾以養性誨爾以優遊而與蟣蝨同情不聽我謀悲哉俱寓人體而獨為子頭且擬人其倫喻子儕偶子不如太原溫顒潁川荀寓范陽張華上郡劉許南陽鄒湛河南鄭詡此數子者或謇吃無宮商或尩陋希言語或淹伊多姿態或驒騱少智諝或口如含膠飴或頭如巾齏杵而猶文采可觀意思詳序攀龍附鳳並登天府夫舐痔得車沈淵得珠豈若夫子徒令脣舌腐爛手足沾濡哉居有事之世而恥為權謀譬猶鑿池抱甕難以求富嗟乎子羽何異牢檻之熊深穽之虎石間飢蟹竇中之鼠事力雖勤見功甚苦宜其拳局煎蹙至老無所希也支離其形猶能不困非命也夫豈與夫子同處也世説排調篇注引敏集又見藝文類聚十七病篤上疏陳謝臣不能式遏寇虐疾與事遇使虜遊魂兵穀既單器械窮盡而求救無望坐待殄斃若必不垂矜憂乞請大使及臣尚存加臣重罪若臣已死陳尸為戮華陽國志二王毖子昌前母服議毖在南為邦族于北為羈旅以此名分言之前妻為元妃後妻為繼室何至王路既通更當逐其今妻廢甚嫡子不書薑氏絶不為親以其犯至惡也趙姬雖貴必推叔隗原同雖寵必嫡宣孟若違禮苟讓何則春秋所當善也論者謂地絶其情終已不得往來今地既通何為故當追而絶之邪黃昌見美斯又近世之明比晉書禮志中駮論張華自天子已下爭臣各有差不得歸罪于一人也故晏子曰為已死亡非其親昵誰能任之里克之殺二庶陳乞之立陽生漢朝之誅諸呂皆積年之後乃得立事未有事主見存而得行其志于數月之內者也式乾之會張華獨諫上宰不和不能承風贊善望其指麾從命不亦難乎況今皇后譖害其子內難不預禮非所任且后體齊于帝尊同皇極罪在枉子事不為逆義非所討今以華不能廢枉子之后與趙盾不討殺君之賊同而追責之于議不經通也晉書溫羡傳先是張華被誅齊王囧輔政建議欲復其官爵論者或以為非羡駮之蟬賦飢吸晨風渴飲朝露藝文類聚九十七初學記三十理劉司空表理劉司空表琨忠誠雖勳業不遂然家破身亡宜在褒崇以慰海內之望晉書溫嶠傳請召劉群等表請召劉群等表姨弟劉群內弟崔悅盧諶等皆在末波中翹首南望愚謂此等並有文思于人之中少可愍惜如蒙録召繼絶與亡則陛下更生之恩望古無二晉書劉群傳舉荀嵩為祕書監表夫國史之興將以明得失之迹謂之實録使一代之典煥然可觀今之祕書著作是也散騎常侍嵩文質彬彬思義通博歷位先朝蒞事以穆宜掌祕奧宣明史籍通典二十六御覽二百三十三上太子疏諫起西池樓觀朝廷草創巨寇未滅宜應儉以率下務農重兵晉書溫嶠傳上疏辭中書令臣才短學淺文疏不通中書之職酬對無方斟酌輕重豈惟文疏而已自非望士良才何可妄居斯任初學記十一御覽二百二十並引檀道鸞晉陽秋請原王敦佐吏疏王敦剛愎不仁忍行殺戮親任小人疏遠君子朝廷所不能抑骨肉所不能間處其朝者恆懼危亡故人士結舌道路以目誠賢人君子道窮數盡遵養時晦之辰也且敦為大逆之日拘録人士自免無路原其私心豈遑晏處如陸玩羊曼劉胤蔡謨郭璞常與臣言備知之矣必其凶悖自可罪人斯得如其枉入姦黨宜施之以寬加以玩等之誠聞于聖聽當受同賊之責實負其心陛下仁聖含弘思求允中臣階緣博納干非其事誠在愛才不忘忠益晉書溫嶠傳陳便宜疏豫章十郡之要宜以刺史居之尋陽濱江都督應鎮其地今以州帖府進退火便且古鎮將多不領州皆以文武形勢不同故也宜選單車刺史別撫豫章專理黎庶晉書溫嶠傳上言桓彝可宣城內史宣城阻滯山川頻經變亂宜得望實居之竊謂桓彝可充其選晉書桓彝傳奏軍國要務七事其一曰祖約退舍壽陽有將來之難今二方守禦為功尚易淮泗都督宜竭力以資之選名重之士配征兵五千人又擇一偏將將二千兵以益壽陽可以保固徐豫援助司土其二曰一夫不耕必有受其飢者今不耕之夫動有萬計春廢勸課之制冬峻出租之令下未見施惟賦是聞賦不可以已當思令百姓有以殷實司徒置田曹掾州一人勸課農桑察吏能否今宜依舊置之必得清恪奉公足以宣示惠化者則所益實弘矣其三曰諸外州郡將兵者及都督府非臨敵之軍且田且守又先朝使五校出田今四軍五校有兵者及護軍所統外軍可分遣二軍出并屯要處緣江上下皆有良田開荒須一年之後即易且軍人纍重者在外有樵採蔬食之人于事為便其四曰建官以理世不以私人也如此則官寡而材精周制六卿蒞事春秋之時入為卿輔出將三軍後代建官漸多誠由事有煩簡耳然今江南六州之土尚又荒殘方之平日數十分之一耳三省軍校無兵者九府寺署可有并相領者可有省半者粗計間劇隨事減之荒殘之縣或同在一城可并合之如此選既可精祿俸可優令足代耕然後可責以清公耳其五曰古者親耕藉田以供粢盛舊置藉田廩犧之官今臨時市求既上黷至敬下費生靈非所以虔奉宗廟蒸嘗之旨宜如舊制立此二官其六曰使命愈遠益宜得才宣揚王化延譽四方人情不樂遂取卑品之人虧辱國命生長患害故宜重其選不可減二千石見居二品者其七曰罪不相及古之制也近者大逆誠由凶戾凶戾之甚一時權用今遂施行非聖朝之令典宜如先朝除三族之制晉書溫嶠傳兄弟相繼藏主室議凡言兄弟于相入廟既非禮文且光武奮劍振起不策名于孝平務神其事以應九世之讖又古不共廟故別立焉今上以策名而言殊于光武之事躬奉蒸嘗于繼既正于情又安矣太常恆欲還二府君以全七世嶠謂是宜晉書禮志上宋書禮志三十興三年驃騎長史溫嶠議惠懷愍于聖上以春秋而言因定先後之禮夫臣子一例君父敬同故可以準于祖禰然非繼體之數也案太常恆所上欲還章郡潁川以全七代愚謂是恆又求京兆以上三代在廟之西廂臣竊不安通典四十八驃騎長史溫嶠議其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庶人宋書禮志三毀廟議今兄弟同代已有七帝若以一帝為一代則當不得祭于禰乃不及庶人之祭也夫兄弟同代于恩既順于義無否至于廟室已滿大行皇帝神主當登正室又不宜下正室之主遷之祧位自宜增廟權于廟上設幄坐以安大行之主若以今增廟違簡約之旨或可就見廟直增坎室乎此當問廟室之寬窄其廟室寬窄亦所未詳通典四十八明帝崩祠部以廟過七室欲毀一廟又正室窄狹欲權下一帝溫嶠議禁給溼米教稟者無米受得艑下溼米豈是吾遇兵衆無異之懷乎雖是數合米欲令齊均若有不如教鞭五十御覽七百七十諫太子馬射臣聞千金之子猶不垂堂以萬乘之二若有駭駟之艱豈可不熟念殿下縱一日之娛忘萬代之基凡人猶知其不可況在聖明文苑英華六百二十七嶭元超諫皇太子箋曰晉明帝之在東宮中庶子溫嶠中舍人劉放諫馬射云云劉放疑阮放之誤與陶侃箋霧氣過差則君道幽晦御覽十五為王導答華太常書省示并博士議今明尊尊不復得繫本親矣先帝平康北面而臣愍帝及終而升上懼所以取議于春秋今所論太廟坎室足容神主不耳而下愍帝于東序若案尊尊之旨愍帝猶子之列不可為父與兄弟之不可一耳案閔公僖公之弟也而傳云子雖齊聖不先父食如此無疑愍帝不宜先帝上也今唯慮廟窄更思安處宜令得並列正室通典四十八答王導書近詔以先帝前議所定唯下太常安坎室數今坎室窄其意不過欲定先神主存正室故下愍帝也廟窄之與本體各是一事何以廟窄而廢本體也通典四十八元帝崩溫嶠答王導書云云與陶侃書奉惠赤角一具及鞉鼓馬鞭鼓角既周軍用馬鞭服以周旋抗之于手與之偕老也偃武之日乃當藏之篋笥耳御覽三百五十九重與陶侃書僕謂軍有進而無退宜增而不可減近己移檄遠近言于盟府剋後月半大舉南康建安晉安三郡軍並在路次同赴此會惟須仁公所統至使齊進耳仁公今召軍還疑惑遠近成敗之由將在于此僕才輕任重實憑仁公篤愛遠稟成規至于首啓戎行不敢有辭僕與仁公當如常山之蛇首尾相衛又脣齒之喻也恐惑者不達高旨將謂仁公緩于討賊此聲難追僕與仁公並受方嶽之任安危休戚理既同之且自頃之顧綢繆往來情深義重著于人士之口一旦有急亦望仁公悉衆見救況社稷之難惟僕偏當一州州之文武莫不翹企假令此州不守約峻樹置官長于此荊楚西逼強胡東接逆賊因之以飢饉將來之危乃當甚于此州之今日也以大義言之則社稷顛覆主辱臣死公進當為大晉之忠臣參桓文之義開國成家銘之天府退當以慈父雪愛子之痛約峻凶逆無道囚制人士裸其五形近日來者不可忍見骨肉生離痛感天地人心齊一咸皆切齒今之進討若以石投卵耳今出軍既緩復召兵還人心乖離是為敗于幾成也願深察所陳以副三軍之望晉書溫嶠傳蘇峻遂得志四海雖廣公寧有容足地乎賢子越騎酷沒天下為公痛心況慈父之情哉後魏書晉司馬衍傳移告四方征鎮賊臣祖約蘇峻同惡相濟用生邪心天奪其魄死期將至譴負天地自絶人倫寇不可縱宜增軍討撲輒屯次湓口即日護軍庾亮至宣太后詔寇逼宮城王旅撓敗出告藩臣謀寧社稷後將軍郭默冠軍將軍趙胤奮武將軍龔保與嶠督護王愆期西陽太守鄧嶽鄱陽內史紀瞻率其所領相尋而至逆賊肆凶陵蹈宗廟火延宮掖矢流太極二御幽逼宰相困迫殘虐朝士劫辱子女承問悲惶精魂飛散嶠暗弱不武不能殉難哀恨自咎五情摧隕慚負先帝託寄之重義在畢力死而後已今躬率所統為士卒先催進諸軍一時電擊西陽太守鄧嶽尋陽太守褚誕等連旗相繼宣城內史桓彝已勒所屬屯濱江之要江夏相周撫乃心求征軍已向路昔包胥楚國之微臣重趼致誠義感諸侯藺相如趙邦之陪隸恥君之辱案劍秦庭皇漢之季董卓作亂劫遷獻帝虐害忠良關東州郡相率同盟廣陵功曹臧洪郡之小吏耳登壇歃血涕淚橫流慷慨之節實厲群后況今居台鼎據方州列名邦受國恩者哉不期而會不謀而同不亦宜乎二賊合衆不盈五千且外畏胡寇城內飢乏後將軍郭默即于戰陳俘殺賊千人賊今雖殘破都邑其宿衛兵人即時出散不為賊用且祖約情性褊厄忌剋不仁蘇峻小子惟利是視殘酷驕猜權相假合江表興義以抗其前強胡外寇以躡其後運漕隔絶資食空懸內乏外孤勢何得久群公征鎮職在禦侮征西陶公國之耆德忠肅義正勳庸弘著諸方鎮州郡咸齊斷金同稟規略以雪國恥苟利社稷死生以之嶠雖怯劣忝據一方賴忠賢之規文武之助君子竭誠小人盡力高操之士被褐而從戎負薪之徒匍匐而赴命率其私僕致其私杖人士之誠竹帛不能載也豈嶠無德而致之哉士稟義風人感皇澤且護軍庾公帝之元舅德望隆重率郭後軍趙龔三將與嶠戮力得有資憑且悲且慶若朝廷之不泯也其各明率所統無後事機賞募之信明如日月有能斬約峻者封五等侯賞布萬匹夫忠為令德為仁由已萬里一契義不在言也晉書溫嶠傳釋奠頌敷論義奧綜析毫芒賦納以言麗辭孔彰管簫備舉和樂載揚初學記十四侍臣針勿謂其微覆簣成高勿謂其細巨由纖毫故曰善不積不足以成名話言如絲而萬里來享無以處極而利在永貞是以太子之在東宮均士抗禮以卑厥情入學齋齒言稱先生不以賢自臧不以貴為榮思有虞之蒸蒸尊周文之翼翼晨昏靡違夙興晏息師傅是瞻正人在側屏彼佞諛納此亮直故傅敬德義臣思盡忠或稽古訓導惟道之不融或造膝詭辭懼咎之蘊崇惴惴兢兢思二雅之遺風鑒乎九三天祿永終近臣司規敢造常從藝文類聚十六
