body:
  text: 卷九十三潘嶽太宰魯武公誄昂昂公侯實天誕育八元斯九五臣茲六惟帝以公通揚祖宗延登東序服衮珥彤使夫廟疑定于神算掩討逆節折衝江湖走欽擒儉梟誕斃吳公于出征爰整其旅壘未越郊麾不及舉秦涼獲乂西戎即敘年踰知命位極人臣家無餘祿貴而食貧他人之賢譬彼丘陵邈矣公侯如日之升泰山其穨寢疾不興遐邇曷仰社稷焉憑生則榮易終哀實難靡不春華鮮克歲寒於呼公隕率土含酸趙喪望諸列國同傷秦亡蹇叔舂者不相桃李不言下自成行德之休明沒能彌彰書鈔三十八藝文類聚四十五文選王融曲水詩序注又褚淵碑文注引兩條又齊安陸王碑文注庾尚書誄寬而能懷威而不猛化行如形民應如影曀曀虛坐翩翩玄幕几筵生塵空館寥廓藝文類聚四十八夏侯常侍誄并序夏侯常侍誄并序夏侯湛字孝若譙人也少知名弱冠辟太尉府賢良方正徵為太子舍人尚書郎野王令中書郎南陽相家艱乞還頃之選為太子僕未就命而世祖崩天子以為散騎常侍從班列也春秋四十有九元康元年夏五月壬辰寢疾卒于延喜里第嗚呼哀哉乃作誄曰禹錫玄圭實曰文命克明克聖光啓夏政其在于漢邁勳惟嬰思弘儒業小大雙名顯祖曜德牧兗及荊父守淮岱治亦有聲英英夫子灼灼其雋飛辨摛藻華繁玉振如彼隨和發彩流潤如彼錦繢列素點絢人見其表莫測其裏徒謂吾生文勝則史心照神交唯我與子且歷少長逮觀終始子之承親孝齊閔參子之友悌和如瑟琴事君直道與朋信心雖實唱高猶賞爾音弱冠厲翼羽儀初升公弓既招皇輿乃徵內贊兩宮外宰黎蒸忠節允著清風載興泱彼樂都寵子惟王設官建輔妙簡邦良用取喉舌相爾南陽惠訓不倦視民如傷乃眷北顧辭祿延喜余亦偃息無事明時疇昔之遊二紀于茲班白攜手何歡如之居吾語汝衆實勝寡人惡雋異俗疵文雅執戟疲楊長沙投賈無謂爾高恥居物下子乃洗然變色易容慨焉歎曰道固不同為仁由己匪我求蒙誰毀誰譽何去何從莫涅匪緇莫磨匪磷豫獨正色居屈志申雖不爾以猶致其身獻替盡規媚茲一人讜言忠謀世祖是嘉將僕儲皇奉轡承華先朝末命聖列顯加入侍帝闈出光厥家我聞積善神降之吉宜享遐紀長保天秩如何斯人而有斯疾曾未知命中年隕卒嗚呼哀哉唯爾之存匪爵而貴甘食美服重珍兼味臨終遺誓永錫爾類斂以時襲殯不簡器誰能拔俗生盡其養孰是養生而薄其葬淵哉若人縱心條畼傑操明達困而彌亮柩輅既祖容體長歸存亡永訣逝者不追望子舊車覽爾遺衣愊抑失聲迸涕交揮非子為慟吾慟為誰嗚呼哀哉日往月來暑退寒襲零露沾凝徑風淒急慘爾其傷念我良執適子素館撫孤相泣前思未弭後感仍集積悲滿懷逝矣安及嗚呼哀哉文選藝文類聚四十八南陽長公主誄昔唐女嬪媯書敘釐降之美周姬適齊詩詠肅雍之歌漢之新野以節義垂號千載伊晉之獻主以聰明睿智考終定諡茲可謂母儀純備邁蹤古烈者也惜乎不永背世湮沈爰託素旗式章徽音主之誕育既慕洪胄德之休明亦固天授思心婉孌淑質純茂母儀不忒內則靡疚肇自弱笄有馥其芬言告言歸作合于荀在貴思降處逸能勤上虔諸姑下接支嬪內諧閨閾外和族姻終溫且惠淑慎其身積善餘慶啓茲名胤厲以惠肅誨以柔順主實體化不言而信二子遵式匪嚴而峻於穆獻后奕代熙盛重作大司黎牧火正國之仁姑家之慈母天道輔賢宜享遐壽如何短命曾不華首寢疾弗興繁榮摧朽嗚呼哀哉容車戒路祖奠在庭騑驂躊躇服馬悲鳴皇輿親臨望旗失聲列辟咸起灑淚霑纓嗚呼哀哉既次墓門降柩升輴靈衣從風素幕生塵明燎守夜竦紼俟晨噭噭遺嗣煢煢孤臣號無廢音涕不輟巾皇女誄厥初在鞠王質華繁玄髮倏曜蛾眉連娟清顱橫流明眸朗鮮迎時夙智望歲能言亦既免懷提攜紫庭聰惠機警授色應聲亹亹其進好曰之經辭合容止間于幼齡猗猗春蘭柔條含芳落英凋矣從風飄揚妙妙弱媛窈窕淑良孰是人斯而罹斯殃靈殯既祖次此暴廬披覽遺物徘徊舊居手澤未改領膩如初孤魂遐逝存亡永殊嗚呼哀哉藝文類聚十六邢夫人誄臨命相訣交腕握手文選恨賦注從姊誄義心清尚莫之與鄰文選顏延之秋胡詩注秦氏從姊誄家失慈覆世喪母儀文選謝莊宣貴妃誄注賈充婦宜城宣君誄昔在武公葬禮殊倫伉儷一體朝儀則均行成于己名生于人考終定諡實曰宣君祝宗蒞事卿相奉引輕車整駕介士列陳鸞輅依容轀車升櫬晉書謝琰傳御覽二百二虞茂春誄姨撫墳兮告辭皆莫能兮仰視文選謝靈運廬陵王墓下詩注司空密陵侯鄭袤碑公雖違華衮猶朱其紱文選齊竟陵文宣王行狀注陳謨台階翼和鼎實顯績成于臺省清風畼于所蒞故能老安少懷遠至邇親凡厥搢紳之士所以挹酌洪流含咀英芳者猶旱苖之仰膏雨湛露之晞朝陽也銘曰於鑠元侯則天垂象弘操嶽峻宇量深廣允恭克讓宣哲清朗有始有卒可大可久言由忠信行履孝友光光金貂再冠其首赫赫皇符仍折其部義格皇穹德冠群后清風顯烈沒而不朽藝文類聚四十七荊州刺史東武戴侯楊使君碑肇字秀初榮陽人文選懷舊賦注驍騎府君之嫡孫領軍肅侯之嗣子文選楊荊州誄注君誕保靈和繼期載德宣哲清朗直道高尚若乃嘉號推賢博愛濟衆邦黨服其義而搢紳慕其風藝文類聚五十嘉平初除軹令文選楊荊州誄注遷治書侍御史同上兼統大理之任同上除野王典農中郎將同上于時文后曆數在躬相國幕府實允華夏九德咸事俊乂在官成君名器納字參軍藝文類聚五十又文選楊荊州誄注作為參軍五等初建封東武子文選注同上皇祖之始典戎武衛同上以清宮勳勞進封東武伯同上領東莞相荊州刺史同上加折衝將軍同上宏略被于南國美化行乎江漢西陵之役懸軍深入親薄寇壘躬行天誅既而救兵不進糧盡道窮因乃憮然回慮殿其衆而返雖為法受黜勳庸未崇而天下服其勇世主思其忠藝文類聚五十肇薨天子愍焉遣謁者祠以太牢諡曰戴侯文選誄注又略見懷舊賦注都鄉碑自中牟故縣以西西至于清溝水經二十二渠水注景獻皇后哀策文於穆先后儷黃協運世宗之胤德博化先用儉禮峻任姒隆周后亦母晉終溫且惠其儀淑慎既慎其儀克明禮教撫翼齊蕃訓成弘操其慈有威不舒不暴乃家乃邦是則是效嗟余艱屯仍遭不造靡恃惟妣景命弗保心之云痛痛貫穹昊襲龜筮之良辰啓幽房之潛隧整武駕之隆牡結龍輈之縞駟望旗常而崩摧披轀輬以增欷口嗚咽以失聲目橫迸以灑淚邈雨絶于宮闈長無覿于髣佛藝文類聚十五羊夫人諡策文光啓洪祚慶流萬國文選齊安陸王碑文注傷弱子辭惟元康二年春三月壬寅弱子生夏五月余之長安壬寅次于新安之千秋亭甲辰而弱子夭越翼日乙巳瘞于亭東感贏博之哀乃傷之曰奈何兮弱子邈棄爾兮丘林還眺兮墳瘞草莽莽兮木森森伊遂古之遐胄逮祖考之永延咨吾家之不嗣羌一適之未甄仰崇堂之遺構若無津而涉川葉落永離覆水不收赤子何辜罪我之由藝文類聚三十四文選潘嶽西征賦注御覽一百九十四金鹿哀辭嗟我金鹿天資特挺鬒髮凝膚蛾眉蠐領柔情和泰朗心聰警嗚呼上天胡忍我門良嬪短世令子夭昏既披我幹又翦我根槐如瘣木枯荄獨存捐子中野遵我歸路將反如疑回首長顧陽城劉氏妹哀辭鳥鳴于柏烏號于荊徘徊躑躅立聞其聲相彼羽族矧伊人情叩心長叫痛我同生誕育聖王發奇稚齒如彼名駒昂昂千里劉氏懷寶未曜隨和伊豫輕弱弗克負荷祿微于朝貯匱于家俾我令妹勤儉備加珍羞罕御器服靡華撫膺恨毒逝矣奈何哀哀母氏蒸蒸聖慈震慟劈摽何痛如之魂而有靈豈不慕思嗟哉往矣當復何時妹哀辭庭祖兩柩路引雙轜爾身爾子永與世辭文選宣貴妃誄注悲邢生周文公之苖裔子元舅之洪胄厲操確其不拔鄉譽著而日就妙邦畿而高察雄州閭以擢秀茂實畼矣而休名未衍其財至貧其位至賤而死之日奔者盈庭停余車而在郊撫靈櫬以增悲瞻轜容而想像曾無覿乎餘輝送子兮境垂永訣兮路岐一別兮長絶盡哀兮告離京陵女公子王氏哀辭猗歟公子季女惟王生自洪胄廩茲義方盼倩粲麗窈窕淑良如彼春蘭吐葩含芳葩以霜隕芳以歇盡彼蒼者天胡寧斯忍曾未弱笄無疾而隕官朝震驚靡人不愍嗟爾母氏劬勞撫鞠恩斯勤斯是長是育帷屏媚子奄離顧復哀無廢心涕不輟目于以祖之于掖閨庭于以送之陵岡崔嵬僕馬回眷旗旐旋飛夕陽失映晴鳥忘歸皎皎宵月載盈載微冥冥公子一往不追長夜無旦孤魂曷依為任子咸妻作孤女澤蘭哀辭澤蘭者任子咸之女也涉三齡未沒衰而殞余聞而悲之遂為其母辭茫茫造化爰啓英淑猗猗澤蘭應靈誕育鬒髮蛾眉巧笑美目顏耀榮苕華茂時菊如金之精如蘭之馥淑質彌畼聰惠日新朝夕顧復夙夜盡勤彼蒼者天哀此矜人胡寧不惠忍豫眇身俾爾嬰孺微命弗振俯覽衾襚仰訴穹旻弱子在懷既生不遂存靡託躬沒無遺類耳存遺響目想餘顏寢席伏枕摧心剖肝相彼鳥矣和鳴嚶嚶矧伊蘭子音影冥冥倣徨丘壟徙倚墳塋藝文類聚三十四哀永逝文啓夕兮宵興悲絶緒兮莫承俄龍輀兮門側嗟俟時兮將升嫂姪兮慞惶慈姑兮垂矜聞鳴雞兮戒朝咸驚號兮撫膺逝日長兮生年淺憂患衆兮歡樂鮮彼遙思兮離居歎河廣兮宋遠今奈何兮一舉邈終天兮不反盡余哀兮祖之晨揚明燎兮援靈輴徹房帷兮席庭筵舉酹觴兮告永遷悽切兮增欷俯仰兮揮淚想孤魂兮眷舊宇視倏忽兮若髣佛徒髣佛兮在慮靡耳目兮一遇停駕兮淹留徘徊兮故處周求兮何獲引身兮當去去華輦兮初邁馬回首兮旋旆風泠泠兮入帷雲霏霏兮承蓋鳥俯翼兮忘林魚仰沫兮失瀨悵悵兮遲遲遵吉路兮凶歸思其人兮已滅覽餘迹兮未夷昔同塗兮今異世憶舊歡兮增新悲謂原隰兮無畔謂川流兮無岸望山兮寥廓臨水兮浩汗視天日兮蒼茫面邑里兮蕭散匪外物兮或改固歡哀兮情換嗟潛隧兮既敞將送形兮長往委蘭房兮繁華襲窮泉兮朽壤中慕叫兮劈摽之子降兮宅兆撫靈櫬兮訣幽房棺冥冥兮埏窈窕戶闔兮燈滅夜何時兮復曉歸反哭兮殯宮聲有止兮哀無終是乎非乎何皇趣一遇兮目中既遇目兮無兆曾寤寐兮弗夢既顧瞻兮家道長寄心兮爾躬重曰已矣此蓋新哀之情然耳渠懷之其幾何庶無愧兮莊子文選藝文類聚三十四哭弟文視不見兮聽不聞逝日遠兮憂彌殷終皓首兮何時忘情楚惻兮常苦辛藝文類聚二十一為楊長文作弟仲武哀祝文悠悠上天我獨何辜祖考早世兄弟幼孤備嘗艱毒同集蓼荼父兮生我過庭靡聞母兮鞠我寧一苦辛日顧日復我弟我身並自垂髮越于成人濬哲聰朗純粹溫良烈烈清風邦族之望母氏劬勞庶爾之報彼蒼者天子何不弔殲我令弟窮泉是造無父何怙無弟何友煢煢此身哀哀慈母煩冤痛毒撫心思咎哀爾薄祜逢家多阻弱冠未室盛年絶緒喪庭寥廓廬位無主冥冥長夜窈窈玄宇當復何時見我仲武于以祔之于其王父魂而有靈神其寧處藝文類聚三十四弔孟嘗君文人罔貴賤士無真偽延人如歸望賓若企出掘秦機入專齊政右眄而嬴強左顧而田競且以造化為水天地為舟樂則齊喜哀則同憂豈區區之國而大邦是謀瑣瑣之身而名利是求畏首畏尾東奔西囚志撓于木偶命懸于狐裘藝文類聚四十為諸婦祭庾新婦文潛形幽櫬寧神舊宇室虛風生床塵帷舉自我不見載離寒暑雖則乖隔哀亦時敘啓殯今夕祖行明朝雨絶華庭埃滅大宵儷執箕帚偕奉夕朝髣佛未行顧瞻弗獲伏膺飲淚感今懷昔懷昔伊何祁祁娣姒感今伊何冥冥吾子形未廢目音猶在耳藝文類聚三十八又文選顏延之元皇后哀册文注懷昔作惟昔草愍懷太子禱神文陛下宜自了不自了吾當入了之中宮又宜速自了不了吾當手了之并謝妃共要剋期而兩發勿疑猶豫致後患茹毛飲血于三辰之下皇天許當掃除患害立道文為王蔣為內主願成當三牲祠北君大赦天下要疏如律令晉書愍懷太子傳
