body:
  text: 卷四十九傅玄補遺上庖犧神農順民之性育之者也黃帝除民之害救之者也舜治天下垂拱無為者以咎繇既舉而不仁遠也禹治洪水冠挂不顧者不以下憂纍其上也湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁所惠者小所感者大人心先之也御覽七十七不使不仁加乎天下用武勝殘而百姓以濟此仁刑于撥亂黃帝是也時育萬物必世而後仁此仁著于治平堯舜是也御覽七十七堯如臘舜如腒北堂書鈔一百四十五拔萬國之地九州之結北堂書鈔十四天為有形之主君為有國之主天以春生猶君之有仁令也天以秋殺猶君之有威令也故仁令之發天下樂之威令之發天下畏之樂之故樂從其令畏之故不敢違其令若寬令發而人不樂無以稱仁矣威令發而下不畏無以言威矣無仁可樂無威可畏能保國致治者未之有也御覽六百三十八辨上下者莫正乎位興國家者莫貴乎人統內外者莫齊乎分宣德教者莫明乎學意林秉綱而目自張執本而末自從意林善賞者賞一善而天下之善皆勸善罰者罰一惡而天下之惡皆除矣意林案此治體篇文世質則官少時文則吏多有虞氏官五十夏后氏官一百殷有二百周有三百意林案此官人篇文國典之墜猶位喪也位之不建名理廢也意林三公者佐天子理陰陽初學記十一御覽二百六尚書者出入王命喉舌之任也北堂書鈔五十九荀仲預稱禹十二為司空御覽二百八魏司空陳群始立九品之制郡置中正評人才之高下各為輩目州置州都而總其議北堂書鈔七十三文選沈約宋書恩幸傳論注御覽二百六十五凡品才有九一曰德行以立道本二曰理才以研事機三曰政才以經治體四曰學才以綜典文五曰武才以御軍旅六曰農才以教耕稼七曰工才以作器用八曰商才以興國利九曰辨才以長諷議此量才者也長短經量才又定名知人之難莫難于別真偽設所修出于為道者則言自然而貴玄虛所修出于為儒者則言分制而貴公正所修出于為縱橫者則言權宜而貴變常九家殊務各有其長非所為難也以默者觀其行以語者觀其辭以出者觀其治以處者觀其學四德或異所觀有微又非所謂難也所謂難者典説詭合轉應無窮辱而言高貪而言廉賊而言仁怯而言勇詐而言信淫而言貞能設似而亂真多端以疑暗此凡人之所常惑明主之所甚疾也長短經知人以譽取人則權勢移于下而朋黨之交用以功取士則有德者未必授而凡下之材或見任也意林君子內洗其心以虛受人外設法度立不易方意林長短經知人貞觀之道也九流有主貞一之道也內貞觀而外貞一則執偽者無地而逃矣夫空言易設但責其實事之效則是非之驗立可見也長短經知人今人稱古多賢患世無人退不三思坐語一世豈不惑邪意林案此舉賢篇文人之性如水焉置之圓則圓置之方則方澄之則渟而清動之則流而濁意林御覽三百六十先王知中流之易擾亂故隨而教之謂其偏好者故立一定之法意林傅子曰士大夫分職而聽諸侯之君分土而守三公總方而議則天子拱己而正矣何以明其然邪當堯之時舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗咎繇為理官益掌驅禽堯不能為一焉奚以為君而九子者為臣其故何也堯知九職之事使九子各授其事皆勝其任以成九功堯遂乘成功以王天下長短經大體龍舟整楫王良不能執也驥騄齊行越人不敢御也各有所能意林構大廈者先擇匠而後揀材治國家者先擇佐而後定民意林案此授職篇文人之學者如渴而飲河海也大飲則大盈小飲則小盈大觀則大見小觀則小見意林北堂書鈔八十三御覽六百七金以利用錢以輕流此二物飢不可食意林入粟補吏是賣官也罪人以贖是縱惡也意林世富錢流則禁盜鑄錢世貧錢滯則禁盜壞錢意林天下之害莫害于女飾盈一頭之飾盈千金之價婢妾之服亦重四海之珍意林案此校工篇文披珍玉之衣北堂書鈔二十案校工篇必被珠繡之衣疑即此公卿大夫刻石作碑鐫石作虎碑虎崇偽陳于三衢妨功喪德異端並起意林案此校工篇文漢武世王侯觀殿重階金樞紫墀御覽一百八十四夫華然被裘褐塊然居深鼠出澤生無禮容死衣以薪棄之中野喪期無數如仰觀象于天俯觀法于地者為亦已明矣北堂書鈔未刪本一百五十八撞亡秦之鐘作鄭衛之樂欲以興治豈不難哉意林案此疑禮樂篇文賞不避疏賤罰不避親貴意林律是咎繇遺訓漢命蕭何廣之御覽六百三十八若親貴犯罪大者必議小者必赦是縱封豕于境內放長蛇于左右也御覽六百五十二天地成歲也先春而後秋人君之治也先禮而後刑意林救嬰孩之疾而不忍針艾更加他物以至死也今除肉刑者更衆何異服他藥也肉刑雖斬其足猶能生育也張倉除肉刑每歲所殺萬計鍾繇復肉刑歲生二千人也意林肉刑名者猶鳥獸登俎而作肉意林今有弱子當陷大辟問其慈父必乞以肉刑代之苟可以生易死也有道之君能不以此加百姓乎蛇螫在手壯夫斷其腕謂其雖斷不死也意林曹羲曰縶馴駒以縿絆御悍馬以腐索今制民以輕刑亦如死也意林但知管子借耳于天下不知堯借人心而後用其耳目意林昔燕趙之間有三男子共娶一女生四子後爭訟廷尉延壽奏云禽獸生子逐母宜以四子還母尸三男子于市意林御覽三百六十又三百六十一塞一蟻孔而河決息施一車轄而覆乘止立法令者亦宜舉要意林北堂書鈔四十三貴有常名而賤不得冒尊有定位而卑不敢逾意林先王之制九州異賦天不生地不養君子不以為禮若河內諸縣去北山絶遠而各調出御上黨真人參上者十斤下者五十斤所調非所生民以為患御覽九百九十一經之以道德緯之以仁義織之以禮法既成而後用之意林謂有孝廉秀才之貢或千里望風承聲而舉故任實者漸消積虛者日長意林聞一善言見一善事行之唯恐不及聞一惡言見一惡事遠之唯恐不遠意林懸千金于市市人不敢取者分定也委一錢于路童兒爭之者分未定也意林御覽八百十夏令披裘冬令披葛雖有嚴令終不肯從者逆時也御覽二十一又二十七永樂大典三皇貴道而尚德五帝先仁而後義三王先義而後辭意林道藏本作亂今依官本鴻毛一羽在水而沒者無勢也黃金萬鈞在舟而浮者託舟之勢也意林擬金人銘作口銘曰神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言勿謂何有積怨致咎勿謂不然變出無間勿謂不傳伏流成川蟻孔潰河溜穴傾山病從口入患自口出存亡之機開闔之術心與口謀安危之源樞機之發榮辱隨焉意林文選歐陽堅石臨終詩注鮑照代君子有所思行注御覽三百六十七夫有公心必有公道意林愛己者不能不愛憎己者不能不憎意林主執非道以虜其民民杜私心以事其主公門寒于上顯議寢于下忠臣深而泣貞士伏巖穴而自歎數進忠君之門也已萬里矣北堂書鈔一百五十八民富則安鄉重家敬上而從教貧則危鄉輕家相聚而犯上飢寒切身而不行非者寡矣意林禮云繼父服齊衰傅子曰母捨己父更嫁他人與己父甚于兩絶天也又制服恐非周孔所制亡秦焚書以後俗儒造之意林又見通典九十先王之制禮也使疏戚有倫貴賤有等上下九代別為五族骨肉者天屬也正服之所經也義立者人紀也名服之所緯也正服者本于親親名服者成于尊尊名尊者服重親殺者轉輕此遠近之理也尊崇者服厚尊降者轉薄此高下之敘也記曰其夫屬乎父道者妻皆母道也夫屬乎子道者妻皆婦道也人紀準之兄不可以比父弟不可以為子嫂之與叔異族之人本之天屬嫂非姊叔非弟也則不可以親親理矣校之人紀嫂非母也叔非子也稽之五服體無正統定其名分不知所附通典九十二妄進者若卵投石逃誅者若走赴深意林間歲察舉孝廉而上之皆是九州百郡之士風異俗殊所尚不同曄若春華之并發馥若秋蘭之俱茂進如衆川之朝海散如雲霧之歸山意林北堂書鈔七十九説身隱胥餘築于巖穴天下莫之知而不問不可謂之靜而安乎北堂書鈔一百五十八我欲戰而彼不欲戰者我鼓而進之若山崩河溢當其衝者摧值其鋒者破所謂疾雷不暇掩耳則又誰禦之意林吳起吮瘡者之膿積恩以感下也史記云吳起吮臃意林晝戰目相見夜戰耳相聞得利同勢失利相救意林兵法云內精八陳之變外盡九成之宜然後可以用奇也御覽三百一堯遭洪水而貴陸湯大旱而重水御覽五十六永樂大典陸田者命懸于天也人力雖修苟水旱不時則一年之功棄矣水田制之由人人力苟修則地利可盡天時不如地利地利不如人和意林御覽五十六又八百二十一樹上懸瓠非本實也背上披裘非脊毛也此似而非意林九日養親一日餓之豈得言飽多飢少同為孝乎穀馬十日一日餓之馬肥不損于義無傷非可同之一日餓母也意林御覽八百九十七漢末有管秋陽者與弟及伴一人避亂俱行天雨雪糧絶謂其弟曰今不食伴則三人俱死乃與弟共殺之得糧達舍後遇赦無罪此人可謂善士乎孔文舉曰管秋陽愛先人遺體食伴無嫌也荀侍中難曰秋陽貪生殺生豈不罪邪文舉曰此伴非會友也若管仲啖鮑叔貢禹食王陽此則不可向所殺者猶鳥獸而能言耳今有犬齧一狸狸齧一鸚武何足怪也昔重耳戀齊女而欲食狐偃叔敖怒楚師而欲食伍參賢哲之忿猶欲啖人而況遭窮者乎意林傅子曰聖人之道如天地諸子之異如四時四時相反天地合而通焉意林御覽四百一昔仲尼既歿仲尼之徒追論夫子之言謂之論語其後鄒之君子孟子輿擬其體著七篇謂之孟子文選辨命論注論語聖人之至教王者之大化鄉黨則有朝廷之儀聘享之禮堯曰篇則有禪代之事意林夫文彩之在人猶榮華之在草意林道教者昭昭然猶日月麗乎天文選齊安陸王碑文注見虎一毛不如其斑道家笑儒者之拘儒者嗤道家之放皆不見本也意林止響以聲逐影以形姦爭流蕩不知所止也意林傅子曰云孟軻荀卿若在孔門非唯遊夏而已乃冉閔之徒也意林管子書過半是後之好事者所加輕重篇尤鄙俗王應麟漢藝文志考證六或問劉歆劉向孰賢傅子曰向才學俗而志忠歆才學通而行邪詩之雅頌書之典謨文質足以相副玩之若近尋之若遠陳之若肆研之若隱浩浩乎其文章之淵府也北堂書鈔九十五御覽五百九十九又六百八桓談書煩而無要辭雜而旨詭吾不知博也北堂書鈔一百積薪若山縱火其下火未及然一杯之水尚可滅也及至火猛風起雖傾竭河海不能救也秦昭王是積薪而縱火其下至始皇然而方熾二世起風而怒也秦人視山東之民猶猛虎之睨群羊何隔憚哉意林永樂大典大孝養志其次養形養志者盡其和養形者不失其敬意林割地利己天下讎之推心及物天下歸之以信接人天下信之不以信接人妻子疑之見疑妻子難以事君君子修身居位非利名也在乎仁義而已意林人皆知滌其器而莫知洗其心意林御覽三百七十六君子審其宗而後學明其道而後行意林御覽四百三傅子曰學以道達榮不以位顯或云玄衡以善詩至宰相張禹以善論作帝師豈非儒學之榮乎意林吾觀班固漢書論國體則飾主闕而抑忠臣敘世教則貴取容而賤直節述時務則謹辭章而略事實非良史也意林史通內篇書事墨子兼愛是廢親也短喪是忘憂也意林漢太宗除肉刑匹夫之仁也非天下之仁也不忍殘人之體而忍殺人故曰匹夫意林伊尹耕于有莘孰知非夏之野人呂尚釣于渭濱孰知非殷之漁者遇湯武文王然後知其非也意林面岐路者有行迷之慮仰高山者有飛天之志意林或乘馬或乘車而俱至秦者所謂形異而實同也意林若謂黃帝後方有舟楫庖羲之時長江大河何所用之意林經巨海者終年不見其涯測虞淵者終世不知其底故小者不可以語大近者不可以度遠也意林漢世賤軺車而今貴之意林夏曰余車殷曰胡奴周曰輜車輜車即輦也續漢輿服志上注宋書禮志五天子出多乘輿車北堂書鈔未刪改本一百四十以雲母飾車謂之雲母車以下不得乘時賜王公御覽七百七十五有追鋒車施通幰車御覽七百七十五金根車天子親耕乘之踏楮車畋獵乘之御覽八百二十二青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五綵謂之繡意林長老説漢桓帝時大將軍梁冀以火浣布為單衣嘗大會賓客行酒公卿朝臣前冀陽爭酒爭杯而汙之冀偽怒解衣而燒之布得火煒華赫然而熾如燒凡布垢盡火滅粲然潔白若用灰水浣之焉後漢南蠻西南夷傳注三國魏齊王芳紀注北堂書鈔一百二十八御覽六百九十一又八百二十太祖武皇帝愍嫁娶之僭上公主適人皆以皂帳從婢不過十人而已三國魏武紀注北堂書鈔一百三十二白孔六帖十四御覽六百九十九漢末王公名士多委王服以幅巾為雅是以袁紹崔鈞之徒雖為將帥皆著縑巾魏太祖以天下凶荒資財乏匱擬古皮辨裁縑帛以為帢合于簡易隨時之義以色別其貴賤于今施行可謂軍容非國容也三國魏紀注宋書禮志五又五行志一北堂書鈔一百二十七白孔六帖十二御覽六百八十七又六百八十八又八百十八帢本末有岐荀文若巾行觸樹枝成岐時人慕之謂之為善因而弗改今通為慶弔之服白紗為之或單或夾初婚冠送餞亦服之宋書禮志五御覽六百八十八魏明帝以高山制似通天遠遊乃毀變先形令行人使者服之御覽六百八十五魏明帝疑三公袞冕之服似天子減其采章御覽六百九十此服妖也宋書五行志一侍中冠武辨文選始皇冢令匠人作機弩有人穿者即射之以人魚膏作燭意林逐兔之犬終朝尋兔不失其迹雖見麋鹿不暇顧也意林漢高祖度闊而網疏故後世推誠而簡直光武教一而網密故後世守常而禮義魏武糾亂以尚猛天下修法而貴理意林形之正不求影之直而影自直聲之平不求響之和而響自和德之崇不求名之遠而名自遠意林西國胡人言蘇合香者是獸便所作也中國皆以為怪獸便而臭忽聞西極獸便而香則不信矣意林法苑殊林四十九御覽九百八十二必得崑山之玉而後寶則荊璞無夜光之美必須南國之珠而後珍則隋侯無明月之稱意林始皇遠遊並海而不免平臺之變及葬驪山尋見發掘意林今有鉛錫之鋌雖歐冶百鍊猶不如瓦刀有駑駘之馬雖造父駕之終不及飛兔絶景質純故也意林土不可以作鐵而可以作瓦意林相者曰三亭九侯定于一尺之面智愚勇怯形于一寸之目天倉金匱以別貧富貴賤意林御覽三百六十五光武鳳翔于南陽燕雀化為鵷雛二漢之臣煥爛如三辰之附長天長平之卒磊落如秋草之中繁露勢使然也意林文選齊安陸王碑文注長人數丈身橫九畝兩頭異頸四臂共骨老人生角男女變化何益于賢愚邪意林豈有太一之君坐于庶人之座魁罡之神存于匹婦之室意林樂廣為河南尹郡中前廳多怪疾後人皆于廊下督郵傳中治事無敢在廳事者唯廣處之白日戶自閉二子凱橫等懾怖廣使掘牆孔得狸乃絶藝文類聚六白孔六帖七十六律呂本于天地豈關崑山之鳳雌雄聲能定之哉此好遠之談也北堂書鈔一百十二昔者伯牙子遊于泰山之陰逢暴雨止于巖下抱琴而鼓之為淋雨之音更造崩山之曲每奏鍾期輒窮其趣曰善哉子之聽也御覽十箏者上圓象天下平象地中空準六合絃柱十二擬十二月乃仁智之器也藝文類聚四十四琵琶體圓柄直柱有十二其他皆充上鋭下曲項形制稍大本出胡中俗傳是漢制兼似兩制者謂之秦漢蓋謂通用秦漢之法通典一百四十四魏晉之世有孫氏善歌舊曲宋識善擊節唱和陳左善清歌列和善吹笛郝素善彈箏朱生善琵琶雖伯牙之妙手吳姬之奇聲何以加之人若欽所聞而忽所見不亦惑乎設此六人生于上世越古今而無儷何但夔牙同契哉宋書樂志一北堂書鈔一百十藝文類聚四十四通典一百四十五御覽五百七十六又五百八十又五百八十三永樂大典心有管籥須言而發御覽三百七十六王黎為黃門侍郎軒軒然乃得志煦煦然乃自樂傅子難之曰子以聖人無樂子何樂之甚黎曰非我乃聖人也北堂書鈔五十八御覽二百二十一漢武令郡國舉孝廉宋世合素帛乃有釋親而位周歲云周登之歲記于素帛追之後徹取諸此意也北堂書鈔七十九漢武元光初郡國舉孝廉元封五年舉秀才歷世相承皆向郡國稱故吏文選盧子諒贈劉崑詩注周文王子公旦有聖德諡曰文文選辨命論注夢攀日月覺而不上天庭夢入九泉寤而不及地下高宗得説偶中耳御覽三百九十七上德之人其齊萬物也猶天之有春秋時至自生非德之力御覽四百三夷吾為政士三妻者逐于境外女三家者入于舂隸也御覽八百二十九鴻不學飛飛則沖天驥不學行行則千里二世修驪山陵採玉者傾山採珠者蔽海御覽九百十六丈夫重義如泰山輕利如鴻毛可謂仁義也諺曰己是而彼非不當與非爭彼是而己非不當與非平是也御覽九百十六鴨足可以眅雞足何以眅吾不知也何況問天地乎御覽九百十九或問近世大賢君子答曰荀令君之仁荀軍師之智斯可謂近世大賢君子矣荀令君仁以立德明以舉賢行無諂黷謀能應機孟軻稱五百年必有王者興其間必有名世者其荀令君乎太祖稱荀令君之進善不進不休荀軍師之去惡不去不止也三國魏荀攸傳注御覽四百二永樂大典敢問今之君子曰袁中郎積德行儉華太尉積德居順其智可及也其清不可及也事上以忠濟下以仁晏嬰行父何以加諸三國華歆傳注曹大司馬之勇賁育弗如也御覽二百九傅子曰諸葛亮誠一時之異人也治國有分御軍有法積功興業事得其機入無餘刃出有餘糧知蜀本弱而危故持重以鎮之若薑維欲速立其功勇而無決也意林
