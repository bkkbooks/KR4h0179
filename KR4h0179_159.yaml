body:
  text: 竺僧朗荅秦主苻堅書僧朗頓首頓首如來永世道風潛淪忝在出家棲心山嶺精誠微薄未能弘匠不悟陛下遠問山川詔命殷勤實感恩旨氣力虛微未堪跋涉願廣開法輪顥保天祚蒙重它賜即為施設福力之功無不蒙賴貧道才劣不勝所重僧朗頓首頓首廣弘明集三十五又見十六國春秋四十二荅晉孝武帝書僧朗頓首頓首夫至人無隱德生為聖非德非聖何敢有喻忝曰出家栖息塵表慕靜山林心希元寂靈迹難逮形累而已奉被詔命慰及應否大晉重基先承孝治惠同天地覆養無邊願開大乘申揚道味僧朗頓首頓首廣弘明集三十五荅燕主慕容垂書僧朗頓首頓首能仁御世英規遐邈光敷道化融濟四海貧道忝服道味習教山林豈惟詔旨諮及國難王者膺期統有六合大能并小自是常倫若葵藿之傾太陽飛步之宗麟鳳皇澤載融群生繫仰陛下高明何思不服貧道窮林蒙賜過分僧朗頓首廣弘明集三十五又見十六國春秋四十五荅南燕主慕容德書僧朗頓首陛下龍飛統御百國天地融溢皇澤載賴善逢高鑒惠濟黔首蕩平之期何憂不一陛下信向三寶恩旨殊隆貧道味靜深山豈臨此位且領民戶與造靈剎所崇像福冥報有所歸僧朗頓首頓首廣弘明集三十五又見十六國春秋六十三又報南燕主慕容德山野絕俗之士不應預聞朝議但有待之累非有託無以立陛下今即聞之檀越敬覽三策潘尚書之議可謂興邦之策矣且今歲之初彗星起於奎婁遂歸虛危彗者除舊更新之象奎婁為魯之分野虛危為齊之分野宜先定兗州巡撫琅邪待秋風屆節然後北轉臨齊此天道也十六國春秋荅簡文帝詔書昔宋景修福妖星移次陛下光輔已來政刑允輯天下任重萬機事殷失之毫釐差以千里唯當勤修德政以賽天譴貧道必當盡誠上荅正恐有心無力耳高僧傳五與釋道安書追論竺僧敷每憶敷上人周旋如昨逝波奄復多年與其清談之日未嘗不相憶思得與君共覆疏其美豈圖一旦永為異世痛恨之深何能忘情其義理所得披尋之功信難可圖矣高僧傳比丘尼戒本所出本末序拘夷國寺甚多修飾至麗王宮彫鏤立佛形像與寺無異有寺名達慕藍北山寺致隸藍劍慕王新藍溫宿王藍右四寺佛圖舌彌所統寺僧皆三月一易屋床坐或易藍者未滿五臘一宿不得無依止王新僧伽藍阿麗藍輪若干藍阿麗跋藍右三寺比丘尼統依舌彌受法戒比丘尼外國法不得獨立也此三寺尼多是蔥嶺以東王侯婦女為道遠集斯寺用法自整大有檢制亦三月一易房或易寺出行非大尼三人不行多持五百戒亦無師一宿者輒彈之今所出比丘尼大戒本此寺常所用者也舌彌乃不肯令此戒來東僧純等求之至勤每嗟此後出法整唯乏斯戒未乃得之其解色以息婬不在止冶容也不欲以止竊不在謹封藏也解色則無情於外形何計飾容與不飾乎不欲則無心於珠玉何須慢藏與緘縢乎所謂無關而不可開無約而不可解也內健既爾外又毀容麤服進退中規非法不視非時不飧形如朽柱心若溼灰斯戒之謂也豈非聖人善救人故無棄人也哉然女人之心弱而多放佛達其徵防之宜密是故立戒每倍於男也大法流此五百餘年比丘尼大戒了於其文以此推之外國道士亦難斯人也法汰頃年鄙當世為人師處一大域而坐視令無一部僧法推求出之竟不能具吾昔得大露精比丘尼戒而錯得其藥方一匣持之自隨二十餘年無人傳譯近欲參出殊非尼戒方知不相闕通至於此也賴僧純於拘夷國來得此戒本令佛念曇摩侍慧常傳始得具斯一部法矣然弘之由人不知斯人等能遵行之不耳釋藏百一荅丹陽尹蓋聞大道之行嘉遁得肆其志唐虞之盛逸民不奪其性弘方由於有外致遠待而不踐大晉光熙德被無外崇禮佛法弘長彌大是以殊域之人不遠萬里被褐振錫洋溢天邑皆割愛棄欲洗心清玄遐期曠世故道深常隱志存慈救故遊不滯方自東徂西唯道是務雖萬物惑其日計而識者悟其歲功今若責其屬籍同役編戶恐遊方之士望崖於聖世輕舉之徒卓長往而不反虧盛明之風有謬主相之旨且荒服之賓無關天臺幽藪之人不書王府幸以時審讞詳而後集也高僧傳五三十七品經序三十七品者三世諸佛之舟輿聲聞支佛亦皆乘之而得度三界眾生靡不載之故經曰大乘道之輿一切度天人然則三十七品或離或合在一增四法而有四意止四神足無四意斷五法則有五根五力七法無七覺意八法而有八等則為五經也依如此比當應為七經如此則離也而諸經多合唯一增尒耳中阿含身意止有安般出入息事將是行四意止時有亂音起者執對行藥也又諸經三十七品文辭不同余因閑戲尋省諸經撮采事備辭巧便者差次條貫伏其位使經體不毀而事有異同者得顯於義又以三三昧連之乎末以具泥洹四十品五根中云四禪四諦謞有目無文故復屬之於後令始涉者覽之易悟不亦佳乎又以諸經之異者注于句末也小安般三十七品後則次止觀律法義決三十七品後次四諦小十二門後次三向尒為泥洹四十品止觀四諦成道之行不可以相無也是故集止觀三三昧四禪四諦繫之於三十七品後欲令行者覽之易見而具行也序二百六十五字本二千六百八十五字子二千九百七十字凡五千九百二十字除後六行八十字不在計中晉泰元二十一年歲在丙中六月沙門竺曇無蘭在揚州謝鎮西寺撰釋藏跡十大比丘二百六十戒三部合異序夫戒者人天所由生三乘所出成泥洹之關要也是以世尊授藥以戒為先焉戒者乃三藏之一也若不以戒自禁馳心於六境而欲望免於三惡道者其猶如無舟而求度巨海乎亦如魚出於深淵鴻毛入於盛火悕不死燋者未之有也行者以戒自嚴猛意五十八法者取道也何難哉蘭自染化務以戒律為意昔在於廬山中竺僧舒許得戒一部持之自隨近二十年每一尋省恨文質重會曇摩侍所出戒規矩與同然侍戒眾多施有百一十事尒為戒有二百六十也釋法師問侍侍言我從持律許口受一一記之莫知其故也尼戒眾多施亦尒百有一十三十事中第二十一二百五十者云長鉢過十日舍墮續言是比丘當持此鉢與比丘僧二十二二百六十者云鉢破綴齊五更未得新鉢故者當歸眾僧推其理旨宜如二百五十者在長鉢後事與破鉢并者為重長也余以長鉢後事注於破鉢下以子從母故也九十事中多參錯事不相對復徙就二百六十者令事類相對亦時有不相似者重飯食無餘因緣墮應對重飯不屬人言不足此除因緣事與別請并故以對別請此一戒在重飯一戒在別請亦為有餘緣則得重飯亦得越次受請也不舒手受食自恐教人恐怖此二戒無對將傳寫脫邪梵本闕乎眾多施亦有不相對不相似者莫知所以也余因閑暇為之三部合異粗斷起盡以二百六十戒為本二百五十者為子以前出常行戒全句繫之於事末而亦有永乖不相似者有以一為二者有以三為一者余復分合令事相從然此三戒或能分句失旨賢才聰叡若有攬者加思為定恕余不逮釋藏百一千佛名號序賢劫經說二千一百諸度無極竟喜王菩薩仍問今此會中寍有大士得此定竟入斯八千四百諸度無極及八萬四千度無極法入八萬四千諸三昧門乎佛荅言有不但此諸開士也當來賢劫一千如來亦得入也除四正覺喜王白佛唯願世尊說諸佛名字姓號佛為喜王說諸佛號字號字一千數之有長而興立發意二品重說皆齊慧業而止以此品檢之有以二字為名者三字名者有以他字足成音句非其名號亦時有字支異者想梵本一耳將是出經人轉其音辭今有左右也長而月者或當以四五六字為名號也興立發意不盡名自慧業以下難可詳也余今別有可了各為佛名意所不了則全舉之又以字異者注之於下然或能分合失所深見達士其有覺省可為改定恕余不逮釋藏百一與竺道壹書始得優遊山林之下縱心孔釋之書觸興為詩陵峰採藥服餌蠲疴樂有餘也但不與足下同日以此為恨耳因有詩曰連峰數千里修森帶平陰雲過遠山翳風至梗荒榛茅茨隱不見雞鳴知有人閒步踐其徑處處見遺薪始知百代下故有上皇民高僧傳五出家更名頌佛生何以晚泥洹一何早歸命釋伽文今來大道高僧傳一阿育王子法益壞目因緣經序原夫善惡之運契猶形影之相顧受對朗驗凡三差焉現也中也後也播九色之深恩以悅天妃之耳目狐禽投王而全命形受五机之切酷斯現報也群徒潛淪於幽壑神陟輪飄而不改身酸歷世之殃釁不曉王子之喪目斯中報也阿蘭縱禍於無想嬰佩永惑於始終終為著翅之暴貍飛沈受困而難計斯後報也故聖人降靈必有所由非務不務清白明矣玄鑒三世弱喪之流深記來變坏形之累趣使引入百練之室自如來逝後阿育登位綱維閻浮光被六合圖形神寺八萬四千羅漢御世汎濟億數國主師宗玄化滂沛萬民仰戴而不己神祇欽賴而愈深然王子法益宿植洪業生在王宮容貌殊特後復受對靡知緣起會秦尚書令輔將軍宗正卿領城門校尉使者司隸校尉姚旻者南安郡人也親姚韶之次兄字景嶷文為儒表則烈勳千載武為邈群則皎然而獨標亢音通實則辨機而曠遠執素縱情則翱翔而無倫德也純懿範也難模赫逸翰於群才振龍威於昆鋒然愍永感之叵救傷愚黨之不寤欲紹先勝之遺迹豎玄宗於末俗故請天竺沙門曇摩難提出斯緣本秦建初六年歲在辛卯於安定城二月十八日出至二十五日乃訖梵本三百四十三首廬傳為漢文一萬八百八十言佛念譯音情義實難或離文而就義或正滯而傍通或取解於誦人或事略而曲備冀將來之學士令監罪福之不朽設有毫釐潤色者盡銘之於萌兆故敘之焉釋藏所又跡七中阿含經序中阿含經記云昔釋法師於長安出中阿含增一阿毗曇廣說僧伽羅叉阿毗曇心婆須密三法度二眾從解脫緣此諸經律凡百餘萬言竝違本失旨名不當實依悕屬辭句味亦差良由譯人造次未善晉言故使爾耳會燕秦交戰關中大亂於是良匠背世故以弗獲改正乃經數年至關東小清冀州道人釋法和罽賓沙門僧伽提和招集門徒俱遊洛邑四五年中研講遂精其人漸曉漢語然後乃知先之失也於是和乃追恨先失即從提和更出阿毗曇及廣說也自是之後此諸經律漸皆譯正唯中阿含僧伽羅叉婆須蜜從解脫緣未更出耳會僧伽提和進遊京師應運流化法施江左於是晉國大長者尚書令衛將軍東亭侯優婆塞王元琳當護持正法以為己任即檀越也為出經故造立精舍延請有道釋慧持等義學沙門四十許人於諸所安四事無乏又預請經師僧伽羅叉長供數年然後乃以晉隆安元年丁酉之歲十一月十日於揚州丹陽郡建康縣界在其精舍更出此中阿含請罽賓沙門僧伽羅叉令講梵本請僧伽提和轉梵為晉豫州沙門道慈筆受吳國李寶唐化共書至來二年戊戊之歲六月二十五日草本始訖此中阿含凡有五誦都十八品有二百二十二經合五十一萬四千八百二十五字分為六十卷時遇國大難未即正書乃至五年立丑之歲方得正寫校定流傳其人傳譯準之先出大有不同於此二百二十二經中若委靡順從則懼失聖旨若從本制名類多異舊則逆忤先習不協眾情是以其人不得自專時有改本從舊名耳然五部異同孰知其正而道茲愚意快快於違本故諸改名者皆鈔出注下新舊兩存別為一卷與目錄相連以示於後將來諸賢令知同異得更采訪脫遇高明外國善晉梵方言者訪其得失刊之從正釋藏跡九
