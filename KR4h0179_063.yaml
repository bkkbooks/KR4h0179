body:
  text: 卷六十三孫盛鏡賦序余昔于吳市得見青明鏡即異之及晞日映水光采流曜有殊衆鑒乃始知曠世金精實不資之異物也北堂書鈔一百三十六奏事諸違令私作鎧一領角弩力七石以上一張戟十枚以上皆棄市御覽三百五十三作南蒼令教且欲先婚配境內然後督其農桑御覽八百二十二與羅君章書省更生論括囊變化窮尋聚散思理既佳又指味辭致亦快是好論也然吾意猶有同異以今萬物化為異形者不可勝數應理不失但隱顯有年載然今萬化猶應多少有還得形者無緣盡當須冥遠耳目不復開遂然後乃復其本也吾謂形既粉散知亦如之紛錯混淆化為異物他物各失其舊非復昔日此有情者所以悲歎若然則足下未可孤以自慰也弘明集五太伯三讓論孔子曰太伯其可謂至德也已矣三以天下讓民無得而稱焉鄭玄以為託採藥而行一讓也不奔喪二讓也斷髮文身三讓也三者之美皆隱蔽而不著王蕭曰其讓隱故民無得而稱焉盛謂玄既失之而肅亦未為畼也玄之所云三迹顯然天下所共見也何得云隱而未著乎三迹苟著則高讓可知亦復不得云其讓隱也蓋泰伯之出讓迹已露不奔喪故一事耳斷髮之言與左傳明文相背又不經也然則稱三讓者其在古公至文王乎周之王業顯于亶父受命于昌泰伯玄覽棄周太子之位一讓也假託遜遁受不赴喪之譏譖推大美二讓也無胤嗣而不養仲雍之子以為己後是其深思遠妨令周嫡在昌天人叶從四海悠悠無復纖芥疑惑三讓也凡此三者帝王之業故孔子曰三以天下讓言非其常讓若臧札之倫者也藝文類聚二十一御覽四百二十四老聃非大賢論頃獲間居復伸所詠仰先哲之玄微考大賢之靈術詳觀風流究覽行止高下之辨殆可髣佛夫大聖乘時故迹浪于所因大賢次微故與大聖而舒卷所因不同故月揖讓與干戈迹乖次微道亞故行藏之軌莫異亦有龍虎之從風雲形聲之會影響理固自然非召之也是故箕文同兆云吉于虎兕之吻顏孔俱否逍遙于匡陳之間唐堯則天稷偰翼其化湯武革命伊呂贊其功由斯以言用舍影響之論惟我與爾之談豈不信哉何者大賢庶幾觀象知器預襲吉凶是以運形斯同御治因應對接群方終保元吉窮通滯礙其揆一也但欽聖樂易有待而享欽冥而不能冥悅寂而不能寂以此為優劣耳至于中賢第三之人去聖有間故冥體之道未盡自然運用自不得玄同然希古存勝高想頓足仰慕淳風專詠至虛故有棲峙林壑若巢許之倫者言行抗轡如老彭之徒者亦非故然理自然也夫形躁好靜質柔愛剛讀所常習愒所希聞世俗之常也是以見偏抗之辭不復尋因應之適覩矯誑之論不復悟過直之失耳按老子之作與聖教同者是代大匠斫駢拇咬指之喻其詭乎聖教者是遠救世之宜違明道若昧之義也六經何常闕虛靜之訓謙沖之誨哉孔子曰述而不作信而好口竊比于我老彭尋斯旨也則老彭之道以籠罩乎聖教之內矣且指説二事而已非實言也何以明之聖人淵寂何不好哉又三皇五帝已下靡不制作是故易象經墳爛然炳著棟宇衣裳與時而興安在述而不作乎故易曰聖人作而萬物覩斯言之證蓋指説老彭之德有以髣佛類已形迹之處所耳亦猶匿怨而友其人左丘明恥之丘亦恥之豈若于吾言無所不説相體之至也且顏孔不以導養為事而老彭養之孔顏同乎斯人而老彭異之凡斯數者非不亞聖之迹而又其書往往矛盾粗列如左大雅縉紳幸袪其弊盛又不達老聃輕舉之旨為欲著訓戎狄宣導殊俗乎若欲明宣導殊類則左衽非玄化之所孤遊非嘉遁之舉諸夏陵遲敷訓所先聖人之教自近及遠未有譸張避險如此之遊也若懼禍避地則聖門可隱商朝魯邦有無如者矣苟得其道則遊刃有餘觸地元吉何違天心于戎貊如不能然者得無庶于朝隱而神仙之徒乎昔共裴逸民作崇有貴無二論時談者或以為不達虛勝之道者或以為矯時流遁者余以為尚無既失之矣崇有亦未為得也道之為物唯恍與惚因應無方唯變所適值澄渟之時則司契垂拱遇萬動之化則形體勃興是以洞鑒雖同有無之教異陳聖致雖一而稱謂之名殊自唐虞不希結繩湯武不擬揖讓夫豈異哉時運故也而伯陽以執古之道以御今之有逸民欲執今之有以絶古之風吾故以為彼二子者不達圓化之道各矜其一方者耳廣宏明集五曹公征陶謙所過多所殘戮魏氏春秋評夫伐罪弔民古之令軌罪謙之由而殘其屬部過矣魏志武帝紀注曹公哭袁紹墓昔者先王之為誅賞也將以懲惡勸善永彰鑒戒紹因世艱危遂懷逆謀上議神器下干國紀荐社污宅古之制也而乃盡哀于逆臣之冢加恩于叨殄之室為政之道于斯躓矣夫匿怨友人前哲所恥稅駕舊館義無虛涕苟道乖好絶何哭之有昔漢高祖失之于項氏魏武遵謬于此舉豈非百慮之一失也魏志武帝紀注田豐觀田豐沮授之謀雖良平何以過之故君貴審才臣尚量主君用忠良則伯王之業隆臣奉暗君則覆亡之禍至存亡榮辱常必由茲豐知紹將敗敗則己必死甘冒虎口以盡忠規烈士之于所事慮不存已夫諸侯之臣義有去就況豐與紹非純臣乎詩云逝將去汝適彼樂土言去亂邦就有道可也魏志袁紹傳注韓浩斬劫質者案光武紀建武九年盜劫陰貴人母弟吏以不得拘質迫盜盜遂殺之也然則合擊者乃古制也自安順已降政教陵遲劫質不避王公而有司莫能遵奉國憲者浩始復斬之故魏武嘉焉魏志夏侯惇傳注華歆迎降孫策為策上賓夫大雅之處世也必先審隱顯之期以定出處之分否則括囊以保其身泰則行義以達其道歆既無夷皓韜邈之風又失王臣匪躬之操故撓心于邪儒之説交臂于陵肆之徒位奪于一豎節墮于當時昔許蔡失位不得列于諸侯州公實來魯人以為賤恥方之于歆咎孰大焉魏志華歆傳注華歆嫁賜生口盛聞慶賞威刑必宗于主權宜宥恕出自人君子路私饋仲尼毀其食器田氏盜施春秋著以為譏斯褒貶之成言已然之顯義也孥戮之家國刑所肅受賜之室乾施所加若在哀矜理無偏宥歆居股肱之任同元首之重則當公言皇朝以彰天澤而默受嘉賜獨為君子既犯作福之嫌又違必去之義可謂匹夫之仁蹈道則未也魏志華歆傳注曹公哀子沖謂諸子此我之不幸而汝曹之幸春秋之義立嫡以長不以賢沖雖存也猶不宜立況其既沒而發斯言乎詩云無易由言魏武其易之也魏志鄧哀王沖傳注文聘資父事君忠孝道一臧霸少有孝烈之稱文聘著垂泣之誠是以魏武一面委之以二方之任豈直壯武見知于倉卒之間哉魏志文聘傳注曹公掾屬往往加杖何夔畜毒藥誓死無辱夫君使臣以禮臣事君以忠是以上下休嘉道光化洽公府掾屬古之造士也必擢時雋搜揚英逸得其人則論道之任隆非其才則覆餗之患至苟有疵釁刑黜可也加其捶撲之罰肅以小懲之戒豈導之以德齊之以禮之謂與然士之出處宜度德投趾可不乏節必審于所蹈故高尚之徒抗心于青雲之表豈王侯之所能臣名器之所羈紲哉自非此族委身世塗否泰榮辱制之由時故箕子安于孥戮柳下夷于三黜蕭何周勃亦在縲紲夫豈不辱君命故也夔知時制而甘其寵挾藥要君以避微恥詩云唯此褊心何夔其有焉放之可也宥之非也魏志何夔傳注和洽論選用不宜專尚儉節昔先王御世觀民設教雖質文因時損益代用至于車服禮秩貴賤等差其歸一揆魏承漢亂風俗侈泰誠宜仰思古制訓以約簡使奢不陵肆儉足中禮進無蜉蝣之制退免采莫之譏如此則治道隆而頌聲作矣夫矯枉過正則巧偽滋生以克訓下則民志險隘非聖王所以陶化民物間邪存誠之道和洽之言于是允矣魏志和洽傳注張遼守合肥夫兵固詭道奇正相資若乃命將出征推轂委權或賴率然之形或憑掎角之勢群帥不和則棄師之道也至于合肥之守縣弱無援專任勇者則好戰生患專任怯者則懼心難保且彼衆我寡必懷貪墮以致命之兵擊貪墮之卒其勢必勝勝而後守守則必固是以魏武推選方員參以同異為之密教節宣其用事至而應若合符契妙矣夫魏志張遼傳注趙儼任詐盛聞為國以禮民非信不立周成不棄桐葉之言晉文不違伐原之誓故能隆刑措之道建一匡之功儼既詐留千人使效心力始雖權也宜以信終兵威既集而又逼徙信義喪矣何以臨民魏志趙儼傳注曹公黜毛玠魏武于是失政刑矣易稱明庶折獄傳有舉直措枉庶獄明則國無怨民枉直當則民無不服未有徵青蠅之浮聲信浸潤之譖訴可以允釐四海惟清緝熙者也昔者漢高獄蕭何出復相之玠之一責永見擯放二主度量豈不殊哉魏志毛玠傳注文帝幸鄴東城門為夏侯惇發哀在禮天子器同姓于宗廟門之外哭于城門失其所也魏志文帝紀注文帝居喪大饗昔者先王之以孝治天下也內節天性外施四海存盡其敬亡極其哀思慕諒暗寄政冢宰故曰三年之喪自天子達于庶人夫然故在三之義惇臣子之恩篤雍熙之化隆經國之道固聖人之所以通天地厚人倫顯至教敦風俗斯萬世不易之典百王服膺之制也是故喪禮素冠鄶人著庶見之譏宰豫降期仲尼發不仁之歎子穨忘戚君子以為樂禍魯侯易服春秋知其不終豈不以墜至痛之誠心喪哀樂之大節者哉故雖三季之末七雄之斃猶未有廢縗斬于旬朔之間釋麻杖于反哭之日者也逮于漢文變易古制人道之紀一旦而廢縗素奪于至尊四海散其遏密義感闕于群后大化墜于君親雖心存貶約慮在經綸至于樹德垂聲崇化變俗固己道薄于當年風穨于百代矣且武王載主而牧野不陳晉襄墨縗而三帥為俘應務濟功服其焉害魏王既追漢制替其大禮處莫重之哀而設饗宴之樂居詒厥之始而墜王化之基及至受禪顯納二女忘其至恤以誣先聖之典天心喪矣將何以終是以知王齡之不遐十世之期促也魏志文帝紀注蘇則事魏聞魏代漢以為漢帝崩因在郡發喪夫士不事其所非不非其所事趣舍出處而豈徒哉則既策名新朝委質異代而方懷二心生忿欲奮爽言豈大雅君子去就之分哉詩云士也罔極二三其德士之二三猶喪匹耦況人臣乎魏志蘇則傳注禁婦人與政夫經國營治必憑俊哲之輔賢達令德必居參亂之任故雖周室之盛有婦人與焉然則坤道承天南面罔二三從之禮謂之至順至于號令自天子出奏事專行非古義也昔在申呂實匡有周苟以天下為心惟德是杖則親疏之授至公一也何至后族而必斥遠之哉二漢之季世王道陵遲故令外戚憑寵職為亂階于此自時昏道喪運祚將移縱無王呂之難豈乏田趙之禍乎而後世觀其若此深懷鴆毒之戒也至于魏文遂發一概之詔可謂有識之爽言非帝者之宏議魏書文帝紀注陳群等止明帝送葬夫窀穸之事孝子之極痛也人倫之道于斯莫重故天子七月而葬同軌畢至夫以義感之情猶盡臨隧之哀況乎天性發中敦禮者重之哉魏氏之德仍世不基矣昔華元厚葬君子以為棄君于惡群等之諫棄孰甚焉魏志文帝紀注魏諸后皆起自幽賤古之王者必求令淑以對揚至德恢王化于關雎致淳風于麟趾及臻三季並亂茲緒義以情溺位由寵昏貴賤無章上陵下替興衰隆廢皆是物也魏自武王暨于烈祖三后之升起自幽賤本既卑矣何以長世詩云絺兮綌兮淒其以風其此之謂乎魏志明悼毛后傳注鍾繇王肅著論以司馬朗為伊顏之徒繇既失之朗亦未為得也昔湯舉伊尹而不仁者遠矣易稱顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行由此而言聖人之與大賢行藏道一舒卷斯同御世垂風理無降異升泰之美豈俟積世哉善人為邦百年亦可以勝殘去殺又曰不踐迹亦不入于室數世之論其在斯乎方之大賢固有間矣魏志司馬朗傳注明帝封諡殤女為之立後于禮婦人既無封爵之典況于孩末而可建以大邑乎德自異族援繼非類匪功匪親而襲母爵違情背典于此為甚陳群雖抗言楊阜引事比並然皆不能極陳先王之禮明封建繼嗣之義忠至之辭猶有闕乎詩云赫赫師尹民具爾瞻宰輔之職其可略哉魏志文昭甄后傳注魏諸王同匹夫異哉魏氏之封建也不度先王之典不思藩屏之術違敦睦之風背維城之義漢初之封或權侔人主雖云不度時勢然也魏氏諸侯陋同匹夫雖懲七國矯枉過也且魏之代漢非積德之由風澤既微六合未一而雕翦枝幹委權異族勢同瘣木危若巢幕不嗣忽諸非天喪也五等之制萬世不易之典六代興亡曹論之詳矣魏志陳思王植傳注王肅請稱漢帝為皇以配其諡化合神者曰皇德合天者曰帝是故三皇創號五帝次之然則皇之為稱妙于帝矣肅謂為輕不亦謬乎魏志王肅傳注陳群諫營宮室周禮天子之宮有斫礲之制然質文之飾與時推移漢承周秦之弊宜敦簡約之化而何崇飾宮室示侈後嗣此乃武帝千門萬戶所以大興豈無所復增之謂邪況乃魏氏方有吳蜀之難四海罹塗炭之艱而述蕭何之過議以為令軌豈不惑于大道而昧得失之辦哉使百代之君眩于奢侈之中何之由矣詩云斯言之玷不可為也其斯之謂乎魏志陳群傳注有司豫定明帝廟號夫諡以表行廟以存容皆于既沒然後著焉所以原始要終以示百世者也未有當年而逆制祖宗未終而豫自尊顯昔華樂以厚斂致譏周人以豫凶違禮魏之群司于是乎失正矣魏志明帝紀注又宋書禮志三引魏氏春秋公孫淵兄晃為質于魏先陳其變及淵反高柔請赦晃明帝就獄殺之聞五帝無誥誓之文三王無盟祝之事然則盟誓之言始自三季質任之作起于周微夫貞夫之一則天地可動機心內萌則鷗鳥不下況信不足焉而祈物之必附猜生于我而望彼之必懷何異挾冰求溫抱炭希涼者哉且夫要功之倫陵肆之類莫不背情任計昧利忘親縱懷慈孝之愛或慮傾身之禍是以周鄭交惡漢高請羹隗囂捐子馬超背父其為酷忍如此之極也安在其因質委誠取任永固哉世主若能遠覽先王間邪之至道近鑒狡肆徇利之凶心勝之以解綱之仁致之以來蘇之惠耀之以雷霆之威潤之以時雨之施則不恭可斂衽于一朝炮哮可屈膝于象魏矣何必拘厥親以求其情逼所愛以制其命乎苟不能然而仗夫計術籠之以權數檢之以一切雖覽一室而庶徵于四海法生鄙局冀或半之暫益自不得不有不忍之刑以遂孥戮之罰亦猶瀆盟由乎一人而云俾墜其師無克遺育之言耳豈得復引四罪不及之典司馬牛獲宥之義乎假令任者皆不保其父兄輒有二三之言曲哀其意而悉活之則長人子危親自存之悖子弟雖質必無刑戮之憂父兄雖逆終無勦絶之慮柔不究明此術非盛王之道宜開張遠義蠲此近制而陳法內之刑以申一人之命可謂心存小善非王者之體古者殺人之中又有仁焉刑之于獄未為失也魏志高柔傳注明帝紀總評聞之長老魏明帝天姿秀出立髮委地口吃少言而沈毅好斷初諸公受遺輔導帝皆以方任處之政自已出而優禮大臣開容善直雖犯顏極諫無所摧戮其君人之量如此之偉也然不思建德垂風不固維城之基至使大權偏據社稷無衛悲夫魏志明帝紀注御覽九十四王弼注易易之為書窮神知化非天下之至精其孰能與于此世之注解殆皆妄也況弼以附會之辨而欲籠統玄旨者乎故其敘浮義則麗辭溢目造陰陽則妙賾無聞至于六爻變化群象所效日時歲月五氣相推弼皆擯落多所不關雖有可觀者焉恐將泥夫大道魏志鍾會傳注蔣濟以失信曹爽辭不受封蔣濟之辭邑可謂不負心矣語曰不為利回不為義疚蔣濟其有焉魏志蔣濟傳注成都縣獲璧玉印各一印文似成信字昔公孫述自以起成都號曰成二玉之文殆述所作也魏志陳留正紀注
