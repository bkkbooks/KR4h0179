body:
  text: 釋僧肇二涅槃無名論僧肇言肇聞天得一以清地得一以寧君王得一以治天下伏惟陛下濬哲欽明道與神會妙契環中理無不統遊刃萬機弘道終日威被蒼生垂文作則所以域中有四太而王后一焉涅槃之道蓋是二乘之所歸方等之淵府渺漭希夷絶視聽之域幽玫虛玄殆非群情之所測肇以人微猥蒙國恩得間居學肆在什公門下十有餘載雖衆經殊致勝趣非一然涅槃一義常以聽習為先肇才識暗短雖屢蒙誨喻猶懷疑漠漠為竭愚不已亦如似有解然未經高勝先唱不敢自決不幸什公去世詒參無所以為永慨而陛下聖德孤獨與什公神契目擊道存快盡其中方寸故能振彼玄風以啓末俗一日遇蒙答安城侯姚嵩書問無為宗極何者夫衆生所以久流轉生死者皆由著欲故也若欲止於心即無復生死既無生死潛神玄默與虛空合其德是名涅槃矣既曰涅槃復何容有名於其間哉斯乃窮微言之美極外之談者也自非道參文殊德侔慈氏孰能宣揚玄道為法城塹使夫大教卷而復舒幽旨淪而更顯尋玩殷勤不能暫捨欣悟交懷手舞弗暇豈道當時之勝軌方乃纍劫之津梁矣之然聖旨淵玄理微言約可以匠彼先進拯拔高士懼言題之流或未盡上意庶擬孔易十翼之作豈貪豐文圖以弘顯幽旨輒作涅槃無名論論有九折十演博採衆經託證成喻以仰述陛下無名之致豈曰關詣神心窮究遠當聊以擬議玄門班喻學徒耳論未章云諸家通第一義諦皆云廓然空寂無有聖人吾常以為太甚徑庭不近人情若無聖人知無者誰實如明詔實如明詔夫道恍惚窅冥其中有精若無聖人誰與道遊頃諸學徒莫不躊道門怏怏此旨懷疑終日莫之能正幸遭高判宗徒㦎然扣關之儔蔚登玄室真可謂法輪再轉於閻浮道光重映於千載者矣今演論之作旨曲辨涅槃無名之體寂彼廓然排方外之談條牒如左謹以仰呈若少參聖旨願敕存記如其有差伏承指授僧肇言九折十演者開宗第一無名曰經稱有餘涅槃無餘涅槃者秦言無為亦名滅度無為者取乎虛無寂寞妙絶於有為滅度者言其大患永滅超度四流斯蓋是鏡像之所歸絶稱之幽宅也而曰有餘無餘者良是出處之異號應物之假名耳余嘗試言之夫涅槃之為道也寂寥虛曠不可以形名得微妙無相不可以有心知超群有以幽升量太虛而永久隨之弗得其蹤迎之罔眺其首六趣不能攝其生力負無以化其體潢漭惚恍若存若往五目不覩其容二聽不聞其響冥冥窅窅誰見誰曉彌綸靡所不在而獨曳於有無之表然則言之者失其真知之者反其愚有之者乖其性無之者傷其軀所以釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無説以顯道釋梵絶聽而雨華斯皆理為神御故口以之而默豈曰無辨辨所不能言也經云真解脫者於言數寂滅永安無始無終不晦不明不寒不暑湛若虛空無名無説論曰涅槃非有亦復非無言語道斷心行處滅尋夫經論之作豈虛構哉果有其所以不有故不可得而有有其所以不無故不可得而無耳何者本之有境則五陰永滅推之無卿則幽靈不竭幽靈不竭釗抱一湛然五陰永滅則萬纍都捐萬纍多捐故與道通抱一湛然故神而無功神而無功故至功常存與道通洞故沖而不改沖而不改故不可為有至功常存故不可為無然則有無絶於內稱謂淪於外視聽之所不暨四空之所昏昧恬焉而夷怕焉而泰九流於是乎交歸衆理聖於是乎冥會斯乃希夷之境太玄之鄉而欲以有無題榜標其方域而語其神道者不亦邈哉核體第二有名曰夫名號不虛生稱謂不自起經稱有餘涅槃無餘涅槃者蓋是返本之真名神道之妙稱者也請試陳之有餘者謂如來大覺始興法身初建澡八解之清流憩七覺之茂林積萬善於曠劫蕩無始之遺塵三明鏡於內神光照於外結僧那於始心終大悲以赴難仰攀玄根俯提弱喪超邁三域獨蹈大方啓八正之平路坦衆遮之夷途騁六通之神驥乘五衍之安車至能出生入死與物推夷道無不合德無不施窮化母之始物極玄樞之妙用廓虛宇於無疆耀薩雲於幽燭將絶朕於九止永淪太虛而有餘緣不盡餘迹不泯業報猶魂聖智尚存此有餘涅槃也經云陶冶塵滓如練真金萬纍都盡而靈覺獨存無餘者謂至人教緣都訖靈照永滅廓爾無朕故曰無餘何則夫大患莫若於有身故滅身以歸無勞勤莫先於有智故絶智以淪虛然則智以形倦形以智勞輪轉修途疲而弗已經曰智為雜毒形為桎梏淵默以之而遼患難以之而起所以至人灰身滅智損形絶慮內無機照之勤外息大患之本超然與群有永分渾爾與太虛同體寂焉無聞怕爾無兆冥冥長往莫知所之其猶燈盡不滅膏明俱竭此無餘涅槃也經云五陰永盡譬如燈滅然則有餘可以有稱無餘可以無名名立則宗虛者欣尚於沖默有稱生則懷德者彌仰於聖功斯乃典誥之所垂文先聖之所軌轍而曰有無絶於內稱謂淪於外視聽之所不暨四空之所昏昧使夫懷德者自絶宗虛者靡託無異杜耳目於胎瞉掩玄象於霄外而責宮商之異辨玄素之殊者也子徒知遠推至人於有無之表高韻絶唱於形名之外而論旨竟莫知所歸幽途故自蘊而未顯靜田幽尋寄懷無所豈所謂朗文明於冥室奏玄響於無聞者哉位體第三無名曰有餘無餘者蓋是涅槃之外稱應物之假名耳而存稱謂者封名志器象者耽形名也極於題目形也盡於方圓方圓有所不寫題目有所不傳焉可以名於無名而形於無形者哉難序云有餘無餘者信是權寂致教之本意亦是如來隱顯之陳迹也但未是玄寂絶言之幽致又非至人環中之妙術耳子獨不聞正觀之説歟維摩語言我觀如來無始無終六入已過三界已出不在方不離方非有為非有為非無為不可以識識不可以智知無言無説心行處滅以此觀者乃名正觀以他觀者非見佛也放光云佛如虛空無去無來應緣而現無有方所然則聖人之在天下也寂寞虛無無執無競導而弗先感而後應譬猶幽谷之響明鏡之像對之弗知其所以來隨之罔識其所以往恍焉而有惚焉而亡動而逾寂隱而彌彰出幽入冥變化無常其為稱也因應而作顯迹為生息迹為滅生名有餘滅明無餘然則無之稱本乎無名無名之道於何不名是以至人居方而方止圓而圓在天而天處人而人原夫能天能人者豈天人之所能哉果以非天非人故能天能人耳其為治也故應而不為因而不施因而不施故施莫之廣應而不為故為莫之大為莫之大故乃返於小成施莫之廣故乃歸無名經曰菩提之道不可圓度高而無上廣而不及淵而無下深不可測大包天地細入無間故謂之道然則涅槃之道不可以有無得之明矣而惑者覩神變因謂之有見滅度便謂之無有無之境妄想之域豈足標榜玄道而語聖心者哉意謂至人寂怕無兆隱顯同源存不為有亡不為無何則佛言吾無生不生雖生不生無形不形雖形不形以知存不為有經云菩薩入無盡三昧盡見故去滅度諸佛又云入於涅槃而不般涅槃以知亡不為無亡不為無雖無而有存不為有雖有而無雖有而無故所謂非有雖無而有故所謂非無然則涅槃之道果出有無之域絶言象之徑斷矣子乃云聖人患於有身故滅身以歸無勞勤莫先於有智故絶智以淪虛無乃乖乎神極傷於玄旨者也經曰法身無象應物而形般若無知對緣而照萬機頓起而不撓其神千難殊對而不干其慮動若行雲止猶谷神豈有心於彼此情繫於動靜者乎既無心於動靜亦無象於去來去來不以象故無器而不形動靜不以心故無感而不應然則心生於有心象出於有象象非我出故金石流而不燋心非我生故日用而不動紜紜自彼於我何為所以智周萬物而不勞形充八極而無患益不可盈損不可虧寧復痾癘中逵壽極雙樹靈竭天棺體盡焚燎者哉而惑者居見聞之境尋殊應之亦秉執矩而擬大方欲以智勞至人形患大聖謂捨有入無因以名之豈謂採微言於聽表拔玄根於虛壤者哉徵出第四有名曰夫渾元剖判萬有參分有既有矣不得不無無不自無必因於有所以高下相傾有無相生此乃自然之數數極於是以此而觀化母所育理無幽顯恢恑譎怪無非有也有化而無無非無也然則有無之境理無不統經云有無二法攝一切聖又稱三無為者虛空數緣盡非數緣盡數緣盡者即涅槃也而論云有無之表別有妙道妙於有無謂之涅槃請核妙道之本果若有也雖妙非無雖妙非無即入有境果若無也無即無差無而無差即入無境總而括之即而究之無有異有而非無無有異無而非有者明矣而曰有無之外別有妙道非有非無謂之涅槃吾聞其語未即於心也超境第五無名曰有無之數誠以法無不該理無不統然其所統俗諦而已經曰真諦何邪涅槃道是俗諦何邪有無法是何則有者有於無無者無於有有無所以稱有無有所以稱無然則有生於無無生於有離有無無離無無有有無相生其猶高下相傾有高必有下有下必有高矣然則有無雖殊俱未免於有也此乃言象之所以形是非之所以生豈足以統於幽極而擬乎神道者乎是以論稱出有無者良以有無之數止乎六境之內六境之內非涅槃之宅故借出以袪之庶悕道流髣佛幽途託情絶域得意忘言體其非有非無豈曰有無之外別有一有而可稱哉經曰三無為者蓋是群生紛繞生乎篤患篤患之尤莫先於有絶有之稱莫先於無故借無以明其非有明其非有非謂無也搜玄第六有名曰論旨云涅槃既不出有無又不在有無不在有無則不可於有無得之矣不出有無則不可離有無求之矣求之無所便應都無然復不無其道其道不無則幽途可尋所以千聖同轍未嘗虛返者也其道既存而曰不出不在必有異旨可得聞乎妙存第七無名曰言由名起名以相生相因可相無相無名無名無説非心所知吾何敢言之而子欲聞之邪雖然善志有言衆人若能以無心而受無聽而聽者吾當以無言言之庶述其言亦可以言淨名曰不離煩惱而得涅槃天女曰不出魔界而入佛界然則玄道在於妙悟妙悟在於即真即真則有無邪觀齊觀則彼己莫二所以天地與我同根萬物與我一體同我則非復有無異我則乖於會通所以不出不在而道存乎其間矣何則夫至人虛心冥照理無不統懷六合於胸中而靈鑒有餘鏡萬有於方士而其神常虛至能拔玄根於未始即群動以靜心恬淡淵默妙契自然所以處有不有居無不無居無不無故不無於無處有不有故不有於有故能不出有無而不在有無者也然則法無有無之相聖無有無之知聖無有無之知則無心於內法無有無之相則無數於外於外無數於內無心此彼寂滅物我冥一怕爾無朕乃曰涅槃涅槃若此圖度絶矣豈容可責之於有無之內又可徵之於有無之外邪難差第八有名曰涅槃既絶圖度之域則超六境之外不出不在而玄道獨存斯則窮理盡性究竟之道妙一無差理其然矣而放光云三乘之道皆因無為而有差別佛言我昔為菩薩時名曰儒童於然燈佛所已入涅槃儒童菩薩時於七住初獲無生忍進修三位若涅槃一也則不應有三如其有三則非究竟究竟之道而有升降之殊衆經異説何以取中邪辨差第九無名曰然究竟之道理無差也法華經云第一大道無有兩正吾以方便為怠慢者於一乘道分別説三三車出火宅即其事也以俱出生死故同稱無為所乘不一故有三名統其會歸一而已矣而難云三乘之道皆因無為而有差別此以人三三於無為非無為有三也故放光云涅槃有差別邪答曰無差別但如來結習都盡聲聞結習不盡耳請以近喻以況遠旨如人斬木去尺無尺去寸無寸修短在外尺寸不在無也夫以群生萬端識根不一智鑒有淺深德行有厚薄所以俱之彼岸而升降不同彼岸豈異異自我耳然則衆經殊辨其致不乖責異第十有名出曰俱出火宅則無患一也同出生死則無為一也而云彼岸無異異自我耳彼岸則無為岸也我則體無為者也請問我與無為為一為異若我即無為無為亦即我不得言無為無異異自我也若我異無為我則非無為無為自無為我自常有為冥會之致又滯而不通然則我與無為一亦無三異亦無三三乘之名何由而生也會異第十一無名曰夫止此而此適彼而彼所以同於得者得亦得之同於失者失亦失之我適無為我即無為無為雖一何乖不一邪譬猶三鳥出網同適無患之域無患雖同而鳥鳥各異不可以鳥鳥各異謂無患亦異又不可以無患既一而一於衆鳥也然則鳥即無患無患即鳥無患豈異異自鳥耳如是三乘衆生俱越妄想之樊同適無為之境無為雖同而乘乘各異不可以乘乘各異謂無為亦異又不可以無為既一而一於三乘也然則我即無為無為即我無為豈異異自我耳所以無患雖同而升虛有遠近無為雖一而幽鑒有淺深無為即乘也乘即無為也此非我異無為以未盡無為故有三耳詰漸第十二有名曰萬纍滋彰本於妄想妄想既袪則萬纍都息二乘得盡智菩薩得無生智是時妄想都盡結縛永除結縛既除則心無為心既無為理無餘翳經曰是諸聖智不想違背不出不在其實俱空又曰無為大道平等不二即曰無二則不容異三不體則已體應窮微而曰體而未盡是所未悟也明漸第十三無名曰無為無二則已然矣結是重惑而可謂頓盡亦所未喻經曰三箭中的三獸渡河中渡無異而有淺深之殊者為不同故也三乘衆生俱濟緣起之津同鑒四諦之的絶偽即真同升無為然則所乘不一者亦以智力不同故也夫群有雖衆然其量有涯正使智猶身子辨若滿願窮才極慮莫窺其畔況乎虛無之數重玄之域其道無涯欲之頓盡也書不云乎為學者日益為道者日損為道者為於無為者也為於無為而日日損此豈頓得之謂要損之又損之以至於無耳經喻螢日智用可知矣譏動第十四有名曰經稱法身已上入無為境心不可以智知形不可以象測體絶陰入心智寂滅而復云進修三位積德彌廣夫仕修本於好尚積德生於涉求好尚則取捨情現步求則損益交陳既以取捨為心損益為體而曰體絶陰入心智寂滅此文乖致殊而會之一人無異指南為北以曉迷夫動寂第十五無名曰經稱聖人無為而無所不為無為故雖動而常寂無所不為故雖寂而常動雖寂而常動故物莫能一雖動常寂故物莫能二物莫能二故逾動逾寂物莫能一故逾寂逾動所以為即無為無為即為動寂雖殊而莫之可異也道行云心亦不有亦不無不有者不若有心之有不無者不若無比之無何者有心則衆庶是也無心則太虛是也衆庶止於妄想太虛絶於靈照豈可止於妄想絶於靈照標其神道道而語聖心者乎是以聖心不有不可謂之無聖心不無不可謂之有不有故心想都滅不無故理無不契理無不契故萬德斯弘心想都滅故功成非我所以應化無方未嘗有為寂然不動未嘗不為經云心無所行無所不行信矣儒童曰昔我於無數劫以國財身命施人無數以妄想心施非為施也今以無生心五華施佛始名施耳又空行菩薩入空解脫門方言今是行時非為證時然則心彌虛行彌廣終日行不乖於無行者也是以賢劫稱無拾之檀成具美不為之為禪典唱無緣之慈思益演不知之知聖旨虛玄殊文同辨豈可以為便有為無為便無為哉菩薩住盡不盡平等法門不盡有為不住無為即其事也而以南北為喻殊非領會之唱窮源第十六有名曰非衆生無以御三乘非三乘無以成涅槃然必先有衆生後有涅槃是則涅槃有始有始必有終而經云涅槃無始無終湛若虛空則涅槃先有非復學而後成者也通古第十七無名曰夫至人空洞無象而萬物無非我造會萬物以己者其唯聖人乎何則非理不聖非聖不理理而為聖者聖不異理也故天帝曰般若當於何求善吉曰般若不可於色中求亦不離色中求又曰見緣起為見法見法為見佛斯則物我不異之效也所以至人戢玄機於未兆藏冥運於即化總六合以鏡心一去來以成體古今通終始同窮本極末莫之與二浩然太均乃曰涅槃經曰不離諸法而得涅槃又云諸法無邊故菩提無邊以知涅槃之道存乎妙契妙契之致本乎冥一然則物不異我我不異物物我玄會歸乎無極進之弗先退之弗後豈容終始於其間哉天女曰耆年解脫亦何如久考得第十八有名曰經云衆生之性極於五陰之內又云得涅槃者五陰都盡譬猶燈滅然則衆生之性頓盡於五陰之內涅槃之道獨建於三有之外邈然殊域非復衆生得涅槃也果若有得則衆生之性不止於五陰若必止於五陰則五陰不都盡五陰若都盡誰復得涅槃者邪玄得第十九無名曰夫真由離起偽因著生著故有得離故無名是以則真者同真法偽者同偽子以有得為得故求於有得耳吾以無得為得故得在於無得也且談論之作必先定其本既論涅槃不可離涅槃而語涅槃也若即涅槃以興言誰獨非涅槃而欲得之邪何者夫涅槃之道妙盡常數融冶二儀滌蕩萬均天人同一異內視不己見返聽不我聞未嘗有得未嘗無得經曰涅槃非衆生亦不異衆生維摩詰言若彌勒得滅度者一切衆生亦當滅度所以者何一切衆生本性常滅不復更滅此名滅度在於無滅者也然則衆生非衆生誰為得之者涅槃非涅槃誰為可得者放光云菩提從有無得邪答曰不也從無得邪答曰不也從有無得邪答曰不也離有無得邪答曰不也然則都無得邪答曰不也是義云何荷曰無所得故為得也是故得無所得也無所得謂之得者誰獨不然邪然則玄道在於絶域故不得以得之妙智存乎物外故不知以知之大象隱於無形故不見以見之大音匿於希聲故不聞以聞之故囊括終古導達群方亭毒蒼生疏而示漏汪哉洋哉何莫由之哉故梵志曰吾聞弘道厥義弘深汪洋無涯靡不成就靡不度生然則三乘之路開真偽之途辨賢聖之道存無名之致顯矣長阿含經序夫宗極絶於稱謂賢聖以之沖默玄旨非言不傳釋迦所以致教是以如來出世大教有三約身口則防之以禁律明善惡則導之以契經演幽微則辨之以法相然則三藏之作也本於殊應會之有宗則異途同趣矣禁律律藏也四分十誦法相阿毗曇藏也四分五誦契經四阿含藏也增一阿含四分八誦中阿含四分五誦雜阿含四分十誦此長阿含四分四誦會三十經以為一部阿含秦言法歸法歸者蓋是萬善之淵府總持之林苑其為典也淵博弘富溫而彌曠明宣禍福賢愚之迹剖判真偽異濟之原歷記古今成敗之數墟域二儀品物之倫道無不由法無不在譬彼巨海百川所歸故以法歸為名開析修途所記長遠故以長為目玩茲典者長迷頓曉邪正難辨皓如晝夜報應冥昧照若影響劫數雖遼近猶朝夕六合雖曠現若目前斯可謂朗大明於幽室惠五目於衆瞽不窺戶牖而智無不周矣大秦天王滌除玄覽高韻獨邁恬智交養道世既濟每懼微言翳於殊俗以右將軍使者司隸校尉晉公姚爽質直清柔玄心超詣尊尚大法妙悟自然上特留懷每任以法事以弘始十二年歲次上章掩茂請罽賓三藏沙門佛陀邪舍出律藏四十五卷十四年訖十五年歲次昭陽奮若出此長阿含訖涼州沙門佛念為譯秦國道士道含筆受時集京夏名勝沙門於第校定恭承法言敬受無差蠲華崇朴務存聖旨余以嘉遇猥參聽次雖無翼善之功而豫親承之末故略記時事以示來賢焉釋藏剋一又迹九梵網經序夫梵網經者蓋是萬法之玄宗衆經之要旨大聖開物之真模行者階道之正路是以如來權教雖復無量所言要趣莫不以此為指南之説是以秦王識達寰中神凝紛表雖威綸四海而沾想虛玄雖風偃八荒而靜慮塵外故弘始三年淳風東扇於是詔天竺法師鳩摩羅什在長安草堂寺及義學沙門三千餘僧手執梵文口翻解釋五十餘部唯梵網經一百二十卷六十一品其中菩薩心地品第十專明菩薩行地是時道融道影三百人等即受菩薩戒人各誦此品以為心首師徒義合敬寫一品八十一部流通於世欲使仰希菩提者追蹤以悟理故冀於後代同聞焉釋藏攝二百論序百論者蓋是通聖心之津塗開真諦之要論也佛泥洹後八百餘年有出家大士厥名提婆玄心獨悟俊氣高朗道映當時神超世表故能闢三藏之重關坦十二之幽路擅步迦夷為法城塹於時外道紛然異端競起邪辨逼真殆亂正道乃仰慨聖教之淩遲俯悼群迷之縱惑將遠拯沈淪故作斯論所以防正間邪大明於宗極者矣是以正化以人而隆邪道以之而替非夫領括衆妙孰能若斯論有百偈故以百為名理致淵玄統群籍之要文旨婉約窮制作之美然至趣幽簡鮮得其門有婆藪開士者明慧內融妙思奇拔遠契玄蹤為之訓釋使沈隱之義彰於徽翰風味宣流被於來葉文藻煥然宗塗易曉其為論也言而無黨破而無執儻然靡據而事不失真蕭焉無寄而理自玄會返本之道著乎茲矣有天竺沙門鳩摩羅什器量淵弘俊神超邈鑽仰纍年轉不可測常味詠斯論以為心要先雖親譯而方言未融至令思尋者躊躇於謬文標位者乖忤於歸致大秦司隸校尉安成侯姚嵩風韻清舒沖心簡勝博涉內外理思兼通少好大道長而彌篤雖復形羈時務而法言不輟每撫茲文所慨良多以弘始六年歲次壽星集理味沙門與什考校正本陶練覆疏務存論旨使質而不野簡而必詣宗致劃爾無間然矣論凡二十品品各有五偈後十品其人以無益此土故闕而不傳冀明識君子詳而覽焉釋藏守八又百一注維摩詰經序維摩詰不思議經者蓋是窮微盡化妙絶之稱也其旨淵玄非言像所測道越三室非二乘所議超群數之表絶有心之境渺漭無為而無不為罔知所以然而能然者不思議也何則夫聖智無知而萬品俱照法身無像而殊形並應至韻無言而玄籍彌布冥權無謀而動與事會故能統濟群方開物成務利見天下於我無為而惑者覩感照因謂之智觀應形則謂之身覿玄籍便謂之言見變動乃謂之權夫道之極者豈可以形言權智而語其神域哉然群生長寢非言莫曉道不孤運弘之由人是以如來命文殊於異方召維摩於他土爰集毗邪共弘斯道此經所明統萬行則以權智為主樹德本則以六度為根濟蒙惑則以慈悲為首語宗極則以不二為言凡此衆説皆不思議之本也至若借座燈王請飯香土手接大千室包乾像不思議之迹也然幽關難啓聖應不同非本無以垂迹非迹無以顯本本迹雖殊而不思議一也故命侍者標以為名焉大秦天王俊神超世玄心獨悟弘至治於萬機之上揚道化於千載之下每尋玩茲典以為栖神之宅而恨支竺所出理滯於文常懼玄宗墜於譯人北天之運運通有在也以弘始八年歲次鶉火命大將軍常山公左將軍安城侯與義學沙門千二百人於常安大寺請羅什法師重譯正本什以高世之量冥心真境既盡還中又善方言時手執梵文口自宣譯道俗虔虔一言三復陶冶精求務存聖意其文約而詣其旨婉而彰微遠之言於茲顯然余以暗短時豫聽次雖思乏參玄然庶得文意輒順所聞而為注解略記成言述而無作庶將來君子異世同聞焉釋藏迹八又石一又務鳩摩羅什法師誄并序鳩摩羅什法師誄并序夫道不自弘弘必由人俗不自覺覺必待匠待匠故世有高悟之期由人故道有小成之運運在小成則靈津輟流期在高悟則玄鋒可詣然能仁曠世期將千載時師邪心是非競起故使靈規潛逝徽緒殆亂爰有什法師者蓋先覺之遺嗣也凝思大方馳懷高觀審釋道之陵遲悼蒼生之窮藹故乃奮迅神儀寓形季俗繼承洪緒為時城塹世之安寤則覺以大音時將晝昏乃朗以慧日思結頽綱於道消緝落緒於窮運故乘時以會錯枉以正一扣則時無互節鄉再擊則嵔礧歸仁於斯時也羊鹿之駕摧輪六師之車覆轍二想之玄既明一乘之奧亦顯是以端坐嶺東響馳八極恬愈弘訓而九流思順故大秦符二大王師旅以延之斯仁王也心遊大覺之門形鎮萬化之上外揚羲和之風內盛弘法之術道契神交屈為形授公以宗匠不重則其道不尊故蘊懷神寶感而後動自公形應秦川若燭龍之曜神光恢廓大宗若曦和之出榑桑融冶常道盡重玄之妙間邪悟俗窮名教之美言既適時理有圓會故辨不徒興道不虛唱斯乃法鼓重震於閻浮梵輪再轉於天北矣自非位超修成體精百練行藏應時其孰契於茲乎以要言之其為弘也隆於春陽其除患也厲於秋霜故巍巍乎蕩蕩乎無邊之高韻然隘運幽興若人云暮癸丑之年年七十四月十三日薨乎大寺嗚呼哀哉道匠西傾神軸東摧朝曦落曜寶嶽崩頽六合晝昏迷駕九回神關重閉三途競開夜光可惜盲子可哀罔極之感人百其懷乃為誄曰先覺登霞靈風緬邈通仙潛凝應真沖漠叢叢九流是非競作悠悠盲子神根沈溺時無指南誰識冥度大人遠覺幽懷獨悟恬沖靜默抱此玄素應斯乘運翔翼天路既曰應運宜當時望受生乘利形標奇相襁褓逡遠髫齓逸量思不再經悟不待匠投足八道遊神三向玄根挺秀宏音遠唱又以抗節忽棄榮俗從容道門尊尚素朴有典斯尋有妙斯録弘無自替宗無擬族霜結如冰神安如嶽外迹彌高內朗彌足恢恢高韻可模可因愔愔沖懷惟妙惟真靜以通元動以應人言為世寶默為時珍華風既立二教亦賓誰為道消玄化方新自公之覺道無不弘靈風遐扇逸響高騰廓茲大方然斯慧燈道音始唱俗網以崩癡根彌拔卜善彌增人之寓俗其途無方統斯群有紐茲頽綱順以四恩降以慧霜如彼維摩亦參城坊形雖圓應神沖帝鄉來教雖妙何足以臧偉哉大人振隆圓德標此名相顯彼沖默通以衆妙約以玄則方隆般若以應天北如何運邅幽里冥剋天路唯通三途永塞嗚呼哀哉至人無為而無不為擁綱遐籠長羅遠羈純恩下釣客旅上摛恂恂善誘肅肅風馳道能易俗化能移時奈何昊天摧此靈規至真既往一道莫施天人哀泣悲慟靈祇嗚呼哀哉公之云亡時唯百六道匠韜斤梵軜摧軸朝陽頽景瓊嶽顛覆豫宙晝昏時喪道目哀哀蒼生誰撫誰育普天悲感我增摧衄嗚呼哀哉昔吾一時曾遊仁川遵其餘波纂成虛玄用之無窮鑽之彌堅躍日絶塵思加數年微情未敘已隨化遷如可贖兮貿之以千時無可待命無可延惟身惟人靡憑靡緣馳懷罔極情悲昊天嗚呼哀哉廣弘明集二十六又見十六國春秋六十二廬山賦唶哉壯麗峻極氤氳包靈奇以藏器蘊絶峰乎青雲景澄則巖岫開鏡風生則芳林流芬嶺奇故神明鱗萃路絶故人迹自分嚴清升山於玄崖世高垂化於䢼亭應真陵雲以踞峰眇忽翳景而入冥咸豫聞其清塵妙無得而稱名也若其南面巍崛北背迢蒂懸霤分流以飛湍七嶺重㟽而疊勢映以竹柏蔚以柳松縈以三湖帶以九江嗟四物之蕭森爽獨秀於玄冬美二流之潺湲津百川之所衝峭門百尋峻闕千仞香罏吐雲以像煙甘泉湧霤而先潤藝文類聚七赴火蛾賦并序赴火蛾賦并序翔無常宅集無定栖類聚群分塵合電移因溫風以舒散乘遊氣以徘徊於是朱明御節時在盛陽天地鬱蒸日月昏茫燭耀庭宇燈朗幽房紛紛群飛翩翩來翔赴飛而焰而體燋投煎膏而身亡藝文類聚九十七燈贊既明遠理亦弘近教千燈同輝百枝並曜飛煙清夜流光洞照見形悅景悟旨測妙藝文類聚八十靈鳥山銘序昔如來遊王舍城憩靈鳥山舊云其山峰似鳥而威靈故以為名焉衆美威歸壯麗畢備御覽答楊苕華書夫事君以治一國未若弘道以濟萬邦事親以成一家未若弘道以濟三界髮膚不毀俗中之近言耳但吾德不及遠未能兼被以此為愧然積簣成山亦冀從微至著也且披袈裟振錫杖飲清流詠波若雖王公之服八珍之膳鏗鏘之聲煒曄之色不與易也若能懸契則同期於泥洹矣且人心各異有若其面卿之不樂道猶我之不慕俗矣楊氏長別離矣萬世因緣於今絶矣歲聿云暮時不我與學道者當以日損為志處世者當以及時為務卿年德并茂宜速有所慕莫以道士經心而坐失盛年也高僧傳四十住經合注序夫冥壑以沖虛靜用百川以之本至極以無相標玄品物以之宗故法性住湛一以居妙寂紛纍以運通靈根朗圓燭以遂能乘涉動以開用然能要有資用必有本用必有本故御本則悟步無方能要有資故悟虛則遂運其通通則苞鏡六合而有無圓照塞則用隨緣感而應必慮偏圓照則神功造極慮偏則顛覆興焉故四瀆開溢則洪川灌壑玄象差轍則三光晦曜因此而推固知運通有宗化積有本夫運通之宗因緣開其會無相極其終化積之本十道啓其謀心術兆其始故心術憑無則靈照通而大乘廓滯有則神慮塞而九宅開矣然推而極之則唯心與法別而張之則綿彰八極請辨而目焉夫萬法浩然宗一無相靈魄彌綸統極圓照斯蓋日體用為萬法言性虛為無相稱動主為心識謂靜御為智照故滯有慮塞則曰心曰識憑靈照通則曰智日見見者正見也始曉之偏目也智者正遍智也體極之圓號也正見創入轍之始正遍標體極之終四者蓋精魄彌綸水鏡萬法雖數隨緣感然靈照常一而不變者也夫體用無方則用實異照故亂識為塵穢心欲聞見謂寶廓智謂種穢心故五欲為鴆醴之室開見故三寶為荊石之門亂識故六塵為幻惑之肆廓智故一切種為驪龍之淵四者實萬法浩然同實異照雖感應交映而宗一無相者也故識御六塵以矇性心起五欲以昏慮見憑四諦以洗鑒智撫無相以通照然則境雖下缺數語理故心緣精魄彌綸體故靈照靈照故統名一心所緣故總號一法若夫名隨數變則浩然無際統以心法則未始非二故十住為經將窮賾心術之原本遂真悟之始辨神功啓於化彰八萬歸於圓照使靈機無隱伏之數大造無虛竊之名爾乃落滯識以反鑒貞真慧以居宗開十道運其用恬無相遠其通合三義以廓能則表宏稱謂菩提菩提者包極十道之尊號括囊通物之妙稱乃十住啓靈照之圓極遠弘大通之逸軌故十住者靜照息機反鑒之容目者也夫所以冠大業之始唱統十地之通目表稱十住諒義存於茲焉義存於茲焉然則十住之興蓋廓明神覺之向牖發瑩真慧之砥礪如來反流盡源之舟輿世雄撫會誕化之天府乃衆經之宗本法藏之淵源實鑒始領終之水鏡光宣佛慧之日月者也夫致弘不可以言象窮道弘不可以名數極故文約而義豐辭婉而旨弘兆百行開於心轍啓八萬舉其一隅非夫探鉤玄亹研機孰能亢貞鑒敬於希微開拔英悟返乎三隅者哉悲夫守習之迷雖服膺舊聞不玩斯要譬負日月而彌昏面玄津而莫濟矣當請引而榷焉夫舉高必詣遠致深則興玄故廓六天以妙處引法雲以勝衆蓋非勝無以扣其玄處非妙不足以光其道光道要有方玄扣必得人故位妙處以殊方則境絶衆穢開玄肆以引衆則英彥蓋時處極六天則寶映七珍衆舉法雲則體鏡九宅廓六變以開運朗耀世之宏觀叩三説以開興撫玄中之統韻發五情以宣到慮衆誠以彌淳遞二七以運感互交用於玄端開神轍於三轉之際兆靈覺於九識之淵匹夫衆經以比興不得同日而語開八萬以辨用焉可共劫而言非夫體包三義道總兩端孰有若斯之弘哉孰有若斯之弘哉以此而斷其道淵矣其致玄矣夫以金剛之幽植總神辨以居用猶曰不可究其深況自降茲者乎然道不獨運弘必由人故令千載之下靈液有寄焉夫外國法師鳩摩羅耆婆者挺天悟於命世邁英風於季俗乘冥寄而孤遊因秦運以弘道撫玄節於希聲暢微言於像外可以袪故納新非擬三益悟宗入轍幾於過半運啓其願彌遭其會以鉛礫之質廁南金之肆誠悟無返三之機思無稽玄之謀然存聞賞事庶無惑焉故撫經靜慮感尋疇昔每苦其文約而致弘言綩而旨玄使靈燭映於隱數大宗昧於褊文神標繇是以權範玄風自茲用澆淳至於間詣靖唯扣膺津門則何常不遙然長慨撫穨薄以興懷哉故遂撰記上聞略為注釋豈曰淵壑之待晨露蓋以伸其用己之心耳庶後來明哲有以引而補焉釋藏迹九中論序夫萬化非無宗而宗之者無相虛宗非無契而契之者無心故至人以無心之妙慧而契彼無相之虛宗內外俱冥緣智俱寂豈容名數於其間哉但以悕玄之質趣必有由非名無以領數非數無以擬宗故遂設名而召之立數而辨之然則名數之生生於纍者可以造極而非其極苟曰非極復何常之有邪是故如來始逮真覺應物接粗啓之以有後為大乘乃説空法化適當時所悟不二流至未葉像教之中人根膚淺道識不明遂廢魚守筌在指忘月覩空教便謂罪福俱泯聞説相則謂之為真是使有無交興生滅迭爭斷常諸邊紛然競起時有大士厥號龍樹爰託海宮逮無生忍意在傍宗載隆遺教故作論以折中其立意也則無言不窮無法不盡然統其要歸則會通二諦以真諦故無有俗諦故無無真故無有則雖無而有俗故無無則雖有而無雖有而無則不纍於有雖無而有則不滯於無不滯於無則斷滅見息不存於有則常等冰消寂此諸邊故名曰中問答析微所以為論是作者之大意也亦云中觀直以觀辨於心論宣於口耳釋藏百一題頌同張奴悠悠世事惑滋損益使欲塵神橫生悅懌惟此哲人淵覺先見思形浮沫矚影遄電纍躓聲華蔑醜章辨視色悟空玩物傷變捨紛絶有斷習除戀青條曲蔭白茅以薦依畦啜麻鄰崖飲洊慧定計昭妙真日眷慈悲有增深想無倦高僧傳十杯度
