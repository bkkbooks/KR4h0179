body:
  text: 卷九十二潘岳橘賦并序橘賦并序余齋前橘樹冬夏再孰聊為賦云爾嗟嘉卉之芳華信氛氳而芬馥既蓊茸而萎蕤且參差而橚矗已鬱鬱而冬茂亦離離而夏孰至如廣命賓客歷覽游觀三清既設百味星爛炫熀乎玉案照燿于金盤故成都美其家園江陵重其千樹既見稱于陸言亦標名乎馬賦藝文類聚八十六河陽庭前安石榴賦并序河陽庭前安石榴賦并序安石榴者天下之奇樹九州之名果也是以屬文之士或敘而賦之御覽九百七十仰天路而高睇顧鄰國以相望位莫微于宰邑館莫陋于河陽雖則陋館可以遨遊實有嘉木曰安石榴修條外畼榮幹內樛扶疏偃蹇冉弱紛柔于是暮春告謝孟夏戒初新莖擢潤膏葉垂腴曾華曄以先越含榮𪄚其方敷丹暉綴于朱房緗的點乎紅鬚煌煌煒煒熠爚委累似長離之栖鄧林若珊瑚之映綠水光明燐爛含丹耀紫味滋芳袖色麗瓊蕊遙而望之煥若隨珠耀重淵詳而察之灼若列宿出雲閒千房同模十子如一禦飢療渴解酲止醉既乃攢乎狹庭載阨載褊土階無等肩牆惟淺壁衣蒼苔瓦被駮蘚處悴而榮在幽彌顯其華可玩其實可珍羞于王公薦于鬼神豈伊仄陋用渝厥真菓由如之而況于人藝文類聚八十六初學記二十八御覽八百七又九百七十果賦三十六園之朱李御覽九百六十八仙李縹而神李紅同上射雉賦并序射雉賦并序余徙家于琅邪其俗實善射聊以講肄之餘暇而習媒翳之事遂樂而賦之也文選射雉賦注涉青林以游覽兮樂羽族之群飛聿采毛之英麗兮有五色之名翬厲耿介之專心兮奓雄豔之姱姿巡丘陵以經略兮畫墳衍而分畿于時青陽告謝朱明肇授靡木不滋無草不茂初莖蔚其曜新陳柯槭以改舊天泱泱以垂雲泉涓涓而吐溜麥漸漸以擢芒雉鷕鷕而朝鴝眄箱籠以揭驕睨驍媒之變態奮勁骹以角槎瞵悍目以旁睞鶯綺翼而䞓撾灼繡頸而衮背鬱軒翥以餘怒思長鳴以效能爾乃搫場拄翳停僮蔥翠綠柏參差文翮鱗次簫森繁茂婉轉輕利衷料戾以徹鑒表厭躡以密緻恐吾遊之晏起慮原禽之罕至甘疲心于企想分倦目以寓視何調翰之喬桀邈疇類而殊才候扇舉而清叫野聞聲而應媒褰微罟以長眺已踉蹡而徐來摛朱冠之赩赫敷藻翰之陪鰓首藥綠素身拖黼繪青鞦莎靡丹臆蘭綷或蹶或啄時行時止班尾揚翹雙角特起良遊呃喔引之規裏應叱愕立擢身竦峙捧黃閒以密彀屬剛罫以潛擬倒禽紛以迸落機聲振而未已山鷩悍害猋迅已甚越壑淩岑飛鳴薄廩鯨牙低鏃心平望審毛體摧落霍若碎錦逸群之儁擅場挾兩櫟雌妬異倏來忽往忌上風之餮切畏映日之儻朗屏發布而累息徒心煩而技懩伊義鳥之應敵啾擭地以厲響彼聆音而逕進忽交距以接壤彤盈窗以美發紛首頹而臆仰或乃崇墳夷靡農不易壟稊菽藂糅蘙薈菶茸鳴雄振羽依于其冢㨛降丘以馳敵雖形隱而草動瞻挺穟之傾掉意淰躍以振踊暾出苖以入場愈情駭而神悚望黶合而翳皛雉脥肩而旋踵欣余志之精銳擬青顱而點項亦有目不步體邪眺旁剔靡聞而驚無見自䳮周環回復繚繞磐辟戾翳旋把縈隨所歷彳亍中輟馥焉中鏑前列重膺傍截疊翮若夫多疑少決膽劣心狷內無固守出不交戰來若處子去如激電闚覘䅌葉幎歷乍見于是算分銖商遠邇揆懸刀騁絕技如輊如軒不高不埤當咮值胸裂膆破觜夷險殊地馴麤異變昃不暇食夕不告勌昔賈氏之如皋始解顏于一箭醜夫為之改貌憾妻為之釋怨彼遊田之致獲咸乘危以馳騖何斯藝之安逸羌禽從其己豫清道而行擇地而住尾飾鑣而在服肉登俎而永御豈唯皁隸此焉君舉若乃耽槃流遁放心不移忘其身恤司其雄雌樂而無節端操或虧此則老氏所誡君子不為文選螢火賦嘉熠燿之精將與眾類乎超殊東山感而增歎行士慨而懷憂翔太陰之元昧抱夜光以清遊熲若飛焱之霄逝彗似移星之雲流動集陽暉灼如隋珠熠熠熒熒若丹英之照葩飄飄熲熲若流金之在沙載飛載止光色孔嘉無聲無臭明影畼遐飲湛露于曠野庇一葉之垂柯無干欲于萬物豈顧恤于網羅至夫重陰之夕風雨晦暝萬物眩惑翩翩獨征奇姿燎朗在陰益榮猶賢哲之處時時昏昧而道明若蘭香之在幽越群臭而弭馨隨陰陽之飄繇非飲食之是營問螽斯之無忌希夷惠之清貞羨微蟲之琦瑋援彩筆以為銘藝文類聚九十七初學記三十御覽九百四十五上關中詩表詔臣作關中詩輒奉詔竭愚作詩一篇案漢紀孝明時護羌校尉竇林上降羌顛岸以為羌豪岸兄顛吾復降問事狀林對前後兩屈坐誣誷下獄死齊萬年編戶隸屬為日久矣而死生異辭必有詭謬故引證喻以懲不恪文選關中詩注九品議天生蒸民而樹之君使司牧之勿失其性君不獨治于是乎建牧立監陳其輔佐故曰天工人其代之然則高官厚祿非明崇賢所以興治卑位下役非為鄙愚所以供職雖或開榮辱之門有爭競之弊而百王莫之能易者此道不可以二故也方今天下隆平四海攸同薦賢達善各以類進夫觀民宣化為治之本雖實小邑猶須其人又中正之身優劣懸殊苟知人者智則不知者謬矣莫如達官各舉其屬萬嶽九列朝所取信郡守雖輕有剌史存舉之當否實司其事攷績累名施黜陟焉進賢受賞不進賢甘戮沮勸既明為人自為謀庶公道大行而私謁息矣藝文類聚五十二上客舍議被下尚書敕客舍廢農奸淫亡命敗亂法度皆當除外十里安一官舍使老小貧民守之又差吏掌主依官舍收錢數春農事興求須冬閑謹案客舍逆旅之設其所由來遠矣行者賴以頓止居者薄收其直交易貿遷各得其所官無役賦而因民成利惠加百姓而公無所費語曰許由辭帝堯之命而舍于逆旅春秋外傳曰晉陽處父遇甯戚于逆旅魏武皇帝亦以為宜其詩曰逆旅整設以通商賈然則自堯到于今未有不得客舍之法唯商鞅尤之此固非聖世之所言也方今四海會同九服納貢八方翼翼公私滿路近畿輻輳客舍亦稠冬有溫廬夏有涼蔭芻秣成行器用取給疲牛必投乘涼近進發楅寫鞍皆有所䀨又諸劫盜皆起于迥絕而止乎人眾十里蕭條則奸軌生心連陌接館則寇情震懾且聞聲有救已發有追不救有罪不追有戮禁暴捕亡恆有司存凡此皆客舍之益而官㰚之所乏也又行者貪路告糴炊爨皆以昏晨盛夏晝熱又兼星夜既限早閉不及攡門或避晚關迸逐路隅祗是慢藏誨盜之原苟以客舍多敗法教官守棘㰚獨復何人彼河橋孟津解劵輸錢高第賢察數人校出品郎兩岸相檢猶懼或失之故懸以祿利許以功報今賤吏疲人獨專㰚稅管開閉之權藉不校之勢此道路之蠹奸利所殖也率歷代之舊俗獲行留之懽心使客舍灑埽以待征旅擇家而息豈非眾庶顒顒之望藝文類聚六十四御覽一百九十五兩階銅人訓言之有臧託乎多士言之不臧絕之由己無曰莫傳宣于四海無曰莫聞響振萬里樞機之發榮辱之徵怨豈在大纖芥是興藝文類聚二十三許由頌邈哉許公執真履貞辭堯天下抱朴隱形川停岳峙澹泊無營棲遲高山與世靡爭虛薄忝任來宰斯城愧無惠化豹產之政峨峨治所樂慕景名登基消遙來過墓庭通于時憲頃匡不盈恨無旨酒奠公之靈死而不朽公有其榮聊述雅美揚公馨聲藝文類聚三十六故太常任府君畫贊堂堂我君鑒象開慶逸德宣猷含真履素味道無悶守終純固弓輿爰集撫翼清舉韓飛公庭龍升天路初掌萬國流化千里遂管祕籍辯章舊史入登常伯出作卿士外內惟允庶績咸理中節日新令問不已濟濟儒林翼翼國子藝文類聚四十九學綜群籍智周萬物文選齊竟陵文宣王行狀注荅摰虞新婚箴先王制禮隨時為正俯從企及豈乖物性女無二歸男有再聘女實存色男實存德德在居正色在不惑故新舊兼弘義申理得然性情之際誠難處心君子過慮爰獻明箴防微測顯文麗旨深敬納嘉誨敢酬德音藝文類聚四十初學記十四世祖武皇帝誄粵若稽古帝皇誕受休命作我晉室赫赫文皇配天竝日大行龍飛創制改物沈恩汪濊流澤洋溢上齊七政下綏萬邦四門穆穆五典克從惟清緝熙於變時雍愛盡事親教加百姓于喪過哀在祭餘敬后蠶冕服躬藉粢盛六伐畢奏九功咸詠行敦醇樸思貫玄妙莅政端位臨朝光曜冑子入學辟雍宗禮國老恂恂貴遊濟濟莫孝匪子莫悌匪弟化自外明訓法以禮獷彼吳楚稱亂三代世歷五偽年幾百載邊垂虔劉王化阻閡羽檄星馳鉦鼓日戒帝御群師奉辭奪旅腹心庭爭爪牙疑沮天監獨照聖策乃舉朝服濟江止戈曜武野無交兵役不淹月僭號歸命稽顙晉闕邪界蠻流傍納百越表閭旌善德音爰發虞人獻箴周書垂誥酒懼其彝獸戒其冒于我大行縱心所好動不踰矩性與道奧厭厭酣飲樂不辨顏桓桓振旅田無遊盤我德如風民應如蘭靡不夙夜無敢宴安務農望歲時或不稔小心翼翼恤民以甚御坐不怡撤膳賑廩西流垂精南金仰施永言孝思天經地義問誰贊事英彥髦士問誰翼侍博物君子潛明神鑒從眾屈己道濟群生為而不恃先天弗違後天降時萬物熙熙懷而慕思顒顒縉紳不謀同辭巖巖岱宗想望翠旗恭惟大行功成不居議寢封禪心栖沖虛策告不足太平有餘七十二君方之蔑如思樂天德等壽嵩華如何寢疾背世登遐遷幸梓宮孤我邦家龜筮既襲吉日惟良永指太極寍神峻陽群后擗踊長訣轀輬聖靈斯顧豈伊不傷家無遠邇邦靡小大四海供職同軌畢會茫茫原野亭亭素蓋縞輅解駕白虎弭旆龍輴即定玄闥載扃如天斯崩如地斯傾哀哀庶僚煢煢自愍彼蒼者天胡寍斯忍聖君不返我獨旋軫藝文類聚十三楊荊州誄并序楊荊州誄并序維咸寍元年夏四月乙丑晉故折衝將軍荊州刺史東武戴侯滎陽楊使君薨嗚呼哀哉夫天子建國諸侯立家選賢與能政是以和周賴尚父殷憑太阿矯矯楊侯晉之爪牙忠節克明茂績惟嘉將宏王略肅清荒遐降年不永玄首未華銜恨沒世命也柰何嗚呼哀哉自古在昔有生必死身沒名垂先哲所韙行以號彰德以述美敢託旒旗爰作斯誄其辭曰邈矣遠祖系自有周昭穆繁昌枝庶分流族始伯喬氏出楊侯弈世丕顯允迪太猷天厭漢德龍戰未分伊君祖考方事之殷鳥則擇木臣亦簡君投心魏朝策名委身奮躍淵塗跨騰風雲或統驍騎或據領軍篤生戴侯茂德繼期纂戎洪緒克構堂基弱冠味道無競惟時孝實蒸蒸友亦怡怡多才豐藝強記洽聞目睇毫末心算無垠草隸兼善尺牘必珍足不輟行手不釋文翰動若飛紙落如雲學優則仕乃從王政散璞發輝臨軹作令化行邑里惠洽百姓越登司官肅我朝命惟此大理國之憲章君莅其任視民如傷庶獄明慎刑辟端詳聽參皋呂稱侔于張改授農政于彼野王倉盈庾億國富兵彊煌煌文后鴻漸晉室君以兼資參戎作弼用錫土宇膺茲顯秩青社白茅亦朱其紱魏氏順天聖皇受終烈烈楊侯實統禁戎司管閶闔清我帝宮苛慝不作穆如和風謂督勳勞班命彌崇茫茫海岱玄化未周滔滔江漢疆埸分流秉文兼武時惟楊侯既守東莞乃牧荊州折衝萬里對揚王休聞善若驚疾惡如讎示威示德以伐以柔吳夷凶侈偽師畏逼將乘讎釁席卷南極繼褰糧盡神謀不忒君子之過引曲推直如彼日月有時則食負執其咎功讓其力亦既旋旆為法受黜退守丘塋杜門不出游目典墳縱心儒術祁祁搢紳升堂入室靡事不咨無疑不質位貶道行身窮志逸弗慮弗圖乃寢乃疾昊天不弔景命其卒嗚呼哀哉子囊佐楚遺言城郢史魚諫衛以尸顯政伊君臨終不忘忠敬寢伏床蓐念在朝廷朝達厥辭夕殞其命聖王嗟悼寵贈衾禭誄德策勳考終定諡群辟慟懷邦族揮淚孤嗣在疚寮屬含悴赴者同哀路人增欷嗚呼哀哉余以頑蔽覆露重陰仰追先考執友之心俯感知己識達之深承諱忉怛涕淚霑襟豈忘載奔憂病是沈在疾不省于亡不臨舉聲增慟哀有餘音嗚呼哀哉文選楊仲武誄并序楊仲武誄并序楊經字仲武滎陽宛陵人也中領軍肅侯之曾孫荊州刺史戴侯之孫東武康侯之子也八歲喪父其母鄭氏光祿勳密陵成侯之元女操行甚高恤養幼孤以保乂夫家而免諸艱難戴侯康侯多所論著又善草隸之藝子以妙年之秀固能綜覽義旨而軌式模範矣雖舅氏隆盛而孤貧守約心安陋巷體服菲薄余甚奇之若乃清才儁茂盛德日新吾見其進未見其巳也既藉三葉世親之恩而子之姑余之伉儷焉往歲卒于德宮里喪服同次綢繆累月苟人必有心此亦款誠之至也不幸短命春秋二十九元康九年夏五月己亥卒嗚呼哀哉乃作誄曰伊子之先弈葉熙隆惟祖惟曾載揚休風顯考康侯無祿早終名器雖光勳業未融篤生吾子誕茂淑姿克岐克嶷知章知微鉤深探賾味道研機匪直也人邦家之輝子之遘閔曾未齓髫如彼危根當此衝焱德之休明靡幽不喬弱冠流芳儁聲清劭爾舅惟榮爾宗惟瘁幼秉殊操違豐安匱撰錄先訓俾無隕墜舊文新藝罔不必肄潘楊之穆有自來矣矧乃今日慎終如始爾休爾戚如實在己視予猶父不得猶子敬亦既篤愛亦既深雖殊其年實同厥心日昃景西望子朝陰如何短折背世湮沈嗚呼哀哉寢疾彌留守茲孝友臨命忘身顧戀慈母哀哀慈母痛心疾首噭噭同生悽悽諸舅春蘭擢莖方茂其華荊寶挺璞將剖于和含芳委耀毀璧摧柯嗚呼仲武痛哉柰何德宮之艱同次外寢惟我與爾對筵接枕自時迄今曾未盈稔姑姪繼隕何痛斯甚嗚呼哀哉披帙散書屢覩遺文有造有寫或草或真執玩周復想見其人紙勞于手涕沾于巾龜筮既襲埏隧既開痛矣楊子與世長乖朝濟洛川夕次山隈歸鳥頡頑行雲徘徊臨穴永訣撫櫬盡哀遺形莫紹增慟余懷魂兮往矣梁木實摧嗚呼哀哉文選馬汧督誄并序馬汧督誄并序惟元康七年秋九月十五日晉故督守關中侯扶風馬君卒嗚呼哀哉初雍部之內屬羌反未弭而編戶之氐又肆逆焉雖王旅致討終于殄滅而蜂蠆有毒驟失小利俾百姓流亡頻于塗炭建威喪元于好畤州伯宵遁乎大谿若夫偏師裨將之殞首覆軍者蓋以十數剖符專城紆青拖墨之司奔走失其守者相望于境秦隴之僭鞏更為魁既已襲汧而館其縣子以眇爾之身介乎重圍之裏率寡弱之眾據十雉之城群氐如蝟毛而起四面雨射城中城中鑿穴而處負戶而汲木石將盡樵蘇乏竭芻蕘罄絕于是乎發梁棟而用之𦉹以鐵鎖機關既縱礧而又升焉爨陳焦之麥柿梠桷之松用能薪芻不匱人畜取給青煙傍起歷馬長鳴凶醜駭而疑懼乃闕地而攻子命穴浚壍寘壺鐳瓶甒以偵之將穿響作內焚穬火薰之潛氐殲焉久之安西之救至竟免虎口之厄全數百萬石之積文契書于幕府聖朝疇咨進以顯秩殊以幢蓋之制而州之有司乃以私隸數口穀十斛攷訊吏兵以檟楚之辭連之大將軍屢抗其疏曰敦固守孤城獨當群寇以少禦眾載離寒暑臨危奮節保穀全城而雍州從事忌敦勳效極推小疵非所以襃獎元功宜解敦禁劾假授詔書遽許而子固已下獄發憤而卒也朝廷聞而傷之策書曰皇帝咨故督守關中侯馬敦忠勇果毅率厲有方固守孤城危逼獲濟寵秩未加不幸喪亡朕用悼焉今追贈牙門將軍印綬祠以少牢魂而有靈嘉茲寵榮然絜士之聞穢其庸致思乎若乃下吏之肆其噤害則皆妬之徒也嗟乎妬之欺善抑亦貿首之讎也語曰或戒其子慎無為善言固可以若是悲夫昔乘丘之戰縣賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也乃誄之漢明帝時有司馬叔持者白日于都市手劍父讎視死如歸亦命史臣班固而為之誄然則忠孝義烈之流慷慨非命而死者綴辭之士未之或遺也天子既已策而贈之微臣託乎舊史之末敢闕其文哉乃作誄曰知人未易人未易知嗟茲馬生位末名卑西戎猾夏乃奮其奇保此汧城救我邊危彼邊奚危城小粟富子以眇身而裁其守兵無加衛墉不增築婪婪群狄豺虎競逐鞏更恣睢潛跱官寺齊萬虓闞震驚台司聲勢沸騰種落煽熾旌旗電舒戈矛林植彤珠星流飛矢雨集惴惴士女號天以泣爨麥而炊負戶以汲累卵之危倒懸之急馬生爰發在險彌亮精冠白日猛烈秋霜稜威可厲懦夫克壯霑恩撫循寒士挾纊蠢蠢犬羊阻眾陵寡潛隧密攻九地之下愜愜窮城氣若無假昔命懸天今也惟馬惟此馬生才博智贍偵以瓶壺列以長壍鍤未見鋒火以起焰薰尸滿窟棓穴以斂木石匱竭萁稈空虛瞷然馬生傲若有餘𦉹梁為礧柿松為芻守不乏械歷有鳴駒哀哀建威身伏斧質悠悠烈將覆車喪器戎釋我徒顯誅我帥以生易死疇克不二聖朝西顧關右震惶分我汧庾化為寇糧實賴夫子思謨彌長咸使有勇致命知方我雖末學聞之前典十世宥能表墓旌善思人愛樹甘棠不翦矧乃吾子功深疑淺兩造未具儲隸蓋鮮孰是勳庸而不獲免猾哉部司其心反側斲善害能醜正惡直牧人逶迤自公退食聞穢鷹揚曾不戢翼忘爾大勞猜爾小利苟莫開懷于何不至慨慨馬生琅琅高致發憤囹圄沒而猶眡嗚呼哀哉安平出奇破齊克完張孟運籌危趙獲安汧人賴子猶彼談單如何吝嫉搖之筆端傾倉可賞矧云私粟狄隸可頒況曰家僕剔子雙龜貫以三木功存汧城身死汧獄凡爾同圍心焉摧剝扶老攜幼街號巷哭嗚呼哀哉明明天子旌以殊恩光光寵贈乃牙其門司勳頒爵亦兆後昆死而有靈庶慰冤魂嗚呼哀哉文選
