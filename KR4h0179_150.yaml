body:
  text: 卷一百五十慕容泓與苻堅書秦為無道滅我社稷今天誘其衷使秦師傾敗將欲興復大燕吳王已定關東何速資備大駕奉送家兄皇帝并宗室功臣之家泓當率闕中燕人翼衛乘輿返還鄴都與秦以虎牢為界分王天下永為鄰好不復為秦之患也巨鹿公輕戇鋭進為亂兵所害非泓之意晉書載紀苻堅傳下泓遣使謂堅云云堅召慕容暐責之日泓書如此又見魏書慕容暐傳又十六國春秋三十八慕容沖命詹事答苻堅皇太弟有令孤今心在天下豈顧一袍小惠苟能知命便可君臣東手早送皇帝自當寬待苻氏以酬曩好終不使既往之施獨美于前晉書載紀苻堅傳下堅遣使送錦袍一領遺沖稱詔云云沖命詹事答之亦稱云云慕容垂上苻堅表臣才非古人致禍起蕭牆身嬰時難歸命聖朝陛下恩深周漢猥叨微顧之遇位為列將爵忝通侯誓在戮力輸誠常恐不及去夏桓沖送死一擬雲消回討鄖城俘馘萬計斯誠陛下神算之奇頗亦愚臣忘死之效方將飲馬桂洲懸旌閩會不圖天助亂德大駕班師陛下單馬奔臣臣奉衛匪二豈惟陛下聖明鑒臣單心皇天后土實亦知之臣奉詔北巡受制長樂然丕外失衆心內多猜忌令臣野次外庭不聽謁廟丁零逆豎寇逼豫州丕迫臣單赴限以師程惟給斃卒二千盡無兵杖復令飛龍潛為刺客及至洛陽平原公暉復不信納臣竊惟進無淮陰功高之慮退無李廣失利之愆懼有青蠅交亂黑白丁零夷夏以臣忠而見疑乃推臣為盟主臣受託善始不遂令終泣望西京揮涕即邁軍次石門所在雲赴雖復周武之會于孟津漢祖之集于垓下不期之會實有甚焉欲令長樂公盡衆赴難以禮發遣而丕固守匹夫之志不達變通之理臣息農收集故營以備不虞而石越傾鄴城之衆輕相掩襲兵陳未交越已隕首臣既單車懸軫歸者如雲斯實天符非臣之力且鄴者臣國舊都應即惠及然後西面受制永守東藩上成陛下遇臣之意下全愚臣感報之誠今進師圍鄴并喻丕以天人事而丕不察機運杜門自守時出挑戰鋒戈屢交恆恐飛矢誤中以傷陛下天性之念臣之此誠未𥳑神聽輒遏兵止鋭不敢窮攻夫運有推移去來常事惟陛下察之晉書載紀慕容垂傳又十六國春秋四十四上書請伐石虎窮極凶暴天之所棄餘燼尚存自相魚肉今中國倒懸企望仁恤若大軍一舉勢必倒戈十六國春秋二十六濟河下令吾本外假秦聲內規興復亂法者軍有常刑奉命者賞不踰日天下既定封爵有差不相負也晉書載紀慕容垂傳又十六國春秋四十三報丁零及西人令翟王之功宜居上輔但臺既未建此官不可便置待六合廓清當更議之晉書載紀慕容垂傳翟斌潛諷丁零及西人請斌為尚書令垂令云云遺令方今禍難尚殷喪禮一從𥳑易朝終夕殯事訖成服三日之後釋服從政強寇伺隙祕勿發喪至京然後舉哀行服晉書載紀慕容垂傳又十六國春秋四十五與僧朗書皇帝敬問太山朗和尚澄神靈緒慈陰百國凡在含生孰不蒙潤朕承藉纂統方夏是膺昔吳蜀不恭魏武含慨今二賊不平朕豈獲安又元戎剋興征掃暴亂至人通靈隨權指化願兵不血刃四海混伏委心歸誠久敬何已今遣使者送官絹百匹袈裟三領綿五十斤幸為呪願廣弘明集三十五又十六國春秋四十五慕容盛告成太廟令賴五祖之休文武之力社稷幽而復顯不獨孤以眇眇之身免不同天之責凡在臣民皆當明目當世十六國春秋四十七下令公侯贖罪不得以金帛法例律公侯有罪得以金帛贖此不足以懲惡而利于王府甚無謂也自今皆令立功以自贖勿復輸金帛十六國春秋四十七慕容農在龍城上表臣頃因征即鎮所統將士安逸積年青徐荊雍遺寇尚繁願時代還展竭微效生無餘力沒無餘恨臣之志也十六國春秋五十婁會上疏請聽吏終喪三年之喪天下之達制兵荒殺禮遂以一切取士人心奔競苟求榮進至乃身冒縗絰以赴時役豈必徇忠于國家亦昧利于其閒也聖王設教不以顛沛而虧其道不以喪亂而變其化故能杜豪競之門塞奔波之路陛下鍾百王之季廓興之業天下漸平兵革方偃誠宜蠲蕩瑕穢率由舊章史曹大喪聽終三年之禮則四方知化人斯服禮晉書載紀慕容垂傳又十六國春秋四十五慕容德上慕容暐疏請圖關右先帝應天順時受命革代方以文德懷遠以一六合神功未就奄忽升遐昔周文既沒武王嗣興伏惟陛下則天比德揆聖齊功方闡崇乾基纂成志逆氐僭據關隴號同王者惡積禍盈自相疑戮釁起蕭牆勢分四國投誠請援旬日相尋豈非凶運將終數歸有道兼弱攻昧取亂侮亡機之上也今秦土四分可謂弱矣時來運集天贊我也天與不取反受其殃吳越之鑒我之師也宜應天人之會建牧野之旗命皇甫并真引并冀之衆徑趣蒲阪臣垂引許洛之兵馳解謏圍太傅總京都武旅為二軍後繼飛檄三輔仁聲先路獲城即侯微功必賞此則鬱概待時之雄抱志未申之傑必嶽峙灞上雪屯隴下天羅既張內外勢合區區僭豎不走則降大同之舉今其時也願陛下獨斷聖慮無訪仁人晉書載紀慕容暐傳符堅將苻謏據陝降于暐群下議欲遣兵救謏因圖關右魏尹慕容德上疏又見十六國春秋二十八下詔增名為備德漢宣憫吏民犯諱故改名朕今增一備字以為二名庶開臣子避諱之路十六國春秋六十三與僧朗書皇帝敬問太山朗和尚遭家多難災禍屢臻昔在建熙王室西越賴武王中興神武御世大啓東夏拯拔區域避邇蒙蘇天下幸甚天未忘災武王即宴永康之始西傾東蕩京華主上播越每思靈闕屏營飲泣朕以無德生在亂兵遺民未幾繼承天祿幸大和尚恩神祇蓋護使者送絹百匹并假東齊王奉高山荏二縣封給書不盡意稱朕心焉廣弘明集三十五又十六國春秋六十三慕容超下書議復肉刑陽九數纏永康多難自北都傾陷典章淪滅律令法憲靡有存者綱理天下此焉為本既不能導之以德必須齊之以刑且虞舜大聖猶命咎繇作士刑之不可以已也如是先帝季興大業草創兵革尚繁未遑修制朕猥以不德嗣承大統撫御寡方致蕭牆釁發遂戎馬生郊典儀寢廢今四境無虞所宜修定尚書可召集公卿至如不忠不孝若封嵩之輩梟斬不足以痛之宜致烹轘之法亦可附之律條納以大辟之科肉刑者乃先聖之經不刊之典漢文易之輕重乖度今犯罪彌多死者稍衆肉刑之于化也濟育既廣懲慘尤深光壽建熙中二祖已議復之未及而晏駕其令博士已上參考舊事依呂刑及漢魏晉律令消息增損議成燕律五刑之屬三千而罪莫大于不孝孔子曰非聖人者無法非孝者無親此大亂之道也轘裂之刑烹煮之戮雖不在五品之例然亦行之自古渠彌之轘著之春秋哀公之烹爰自中代世宗都齊亦愍刑罰失中咨嗟寢食王者之有刑糾猶人之有左右手焉故孔子曰刑罰不中則民無所措手足是以蕭何定法令而受封叔孫通以制儀受奉常立功立事古之所重其明議損益以成一代準式周漢有貢士之條魏立九品之選二者孰愈亦可詳聞晉書載紀慕容超傳又十六國春秋六十四慕容鍾傳檄青州諸郡討辟閭渾隆替有時義列昔經因難啓聖事彰中籙是以宣王龍飛于危周光武鳳起于絶漢斯蓋曆數大期帝王之興廢也自我永康多難長鯨逸網華夏四分黎元五裂逆賊辟閭渾父蔚昔同段龕阻亂淄川太宰東征勦絶凶命渾于覆巢之下得蒙全卵之施曾微犬馬識養之心復襲凶父樂禍之志盜據東秦遠附吳越割剝黎元委輸南海皇上應期大命再集矜矜彼營丘暫阻王略故以七州之衆二十餘萬巡省岱宗問罪齊魯昔韓信以裨將伐齊有征無戰耿弇以偏師討步克不移朔況以萬乘之師掃一隅之寇傾山碎卵方之非異孤以不才忝荷先驅都督元戎一十二萬皆烏桓突騎三河猛士奮劍與夕火爭光揮戈與秋月競色以此攻城何城不克以此衆戰何敵不平昔竇融以河西歸漢榮被于後裔彭寵盜逆漁陽身死于奴隸近則曹嶷跋扈見禽于後趙段龕于紀取滅于前朝此非古今之吉凶已然之成敗乎渾若先迷後悟榮寵有加如其敢抗王師敗滅必無遺燼稷下之雄岱北之士有能斬渾首者賞同佐命脫履機不發必玉石俱摧晉書載紀慕容德傳又十六國春秋六十三韓範上疏言伐桓玄夫帝王之道必崇經略有其時無其人則弘濟之功或闕有其人無其時則英武之志不伸至于能成王業者惟人時合也自晉國內難七載于茲桓玄篡逆虐喻董卓神怒人怨其殃積矣可乘之機莫過此也以陛下之神武經而緯之驅樂奮之卒接厭亂之機譬猶聲發響應形動影隨未足比其易也且江淮南北戶口無幾公私戎馬不過日百守備之事蓋亦微矣若以步騎一萬建雷霆之舉卷甲長驅指臨江會必望旗草偃壺漿屬路跨地數千衆踚十萬可以西并強秦北抗大魏拓境開疆保寧社稷正在今日如使後機失會豪傑復起梟除桓玄布惟新之化遐爾既寧物無異望豈惟建業難屠江北亦不可冀機過患生憂必至矣天與不取悔將及焉惟陛下覽之晉書載紀慕容德傳又十六國春秋六十三作韓𧨳誤韓𧨳上疏正戶籍二寇逋誅國恥未雪關西為豺狼之藪揚越為鴟梟之林二京社稷鞠為丘墟四祖園陵蕪而不守豈非義夫憤歎之日烈士忘身之秋而皇室多難威略未振是使長蛇弗翦封豕假息人懷憤慨常謂一日之安不可以永久終朝之逸無卒歲之憂陛下中興大業務在遵養矜遷氓之失土假長復而不役愍黎庶之息肩貴因循而不擾斯可以保寧于榮丘難以經措于春越今群凶僭逆實繁有徒據我三方伺國瑕釁深宜審量虛實大校成敗養兵厲甲廣農積糧進為雪恥討寇之資退為山河萬全之固而百姓因秦晉之斃迭相蔭冒或百室合戶或千丁共籍依託城社不懼燻燒公避課役擅為姦宄損風毀憲法所不容但檢令未宣弗可加戮今宜隱實黎氓正其編貫庶上增皇朝理物之明下益軍國兵資之用若蒙採納冀裨山海雖遇商鞅之刑悅綰之害所不辭也晉書載紀慕容德傳又十六國春秋六十三段暉稱藩姚興議太上囚楚高祖不回今陛下嗣守社稷不宜以私親之故而降統天之尊又太樂諸伎皆是前世令人不可與彼使移易俗宜掠京口與之晉書載紀慕容超傳又十六國春秋六十四張華若使侵掠吳邊必成鄰怨此既能往彼亦能來兵連禍結非國之福也昔孫權重黎庶之命屈已以臣魏惠施惜愛子之頭捨志以尊齊況陛下慈德在秦方寸崩亂宜暫降大號以申至孝之情權變之道典謨所許韓範智能回物辨足傾人昔與姚興俱為秦太子中舍人可遣將命降號修和所謂屈于一人之下伸于萬人之上也晉書載紀慕容超傳又十六國春秋六十四馮跋即位下書義貴適時不必改作故陳氏代姜不徙齊號宜即國號曰燕建元太平十六國春秋九十八下書葬高雲昔高祖為義帝舉哀天下歸其仁吾與高雲義則君臣恩踰兄弟其以禮葬雲及其妻子立雲廟于韭町置園邑二十家四時供薦晉書載紀馮跋傳又十六國春秋九十八下書除前朝苛政自頃多故事難相尋賦役繁苦百姓困窮宜加寬宥務從簡易前朝苛政皆悉除之守宰當垂仁惠無得侵害百星蘭臺都官明加澄察晉書載紀馮跋傳又十六國春秋九十八下書令民植桑柘今疆宇無虞百姓寧業而田畝荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓人植桑一百根柘二十根晉書載紀馮跋傳又十六國春秋九十八下書令境內不改葬聖人制禮送終有度重其衣衾厚其棺槨將何用乎人之亡也精魂上歸于天骨肉下歸于地朝終夕壞無寒暖之期衣以錦繡服以羅紈寧有知哉厚于送終貴而改葬皆無益于亡者有損于生是以祖考因舊立廟皆不改營陵寢申下境內自今皆令奉之晉書載紀馮跋傳又十六國春秋九十八下書建大學武以平亂文以經務寧國濟俗實所憑焉自頃喪難禮壞樂崩閭閻絶諷誦之音後生無庠之教子襟之歎復興于今豈所以穆章風化崇闡斯文可營建大學以長樂劉軒營丘張熾成周翟崇為博士郎中𥳑二千石巳下子弟年十三已上教之晉書載紀馮跋傳又十六國春秋九十八馮素弗樂浪公主下嫁蝚蠕議前代舊事皆以宗女妻六夷宜許以妃嬪之女樂浪公主不宜下降非類晉書載紀馮跋傳又十六國春秋九十八
