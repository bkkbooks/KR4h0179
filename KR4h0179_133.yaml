body:
  text: 曹耽上表自理臣聞居喪之禮貴賤不同禮臣為君斬衰仕焉而已為舊君齊衰爵祿既絶朝見既替蓋以疏賤于親貴故降其制也又國喪儀注居職者朝夕臨去職者朔望臨禮器泣之節各稱其服哭輕則服不得重據令去職之臣朔望器宜為舊君服齊衰是以臣前率而行之不敢有加臣服齊衰器臨殿庭踰月歷旬外內監司莫之或譏及至梓宮將幸山陵諸官來赴服斬者多此皆意存于重而不原于制遂使親疏貴賤無有等差曾參欲勿除父母之喪仲尼患其過制今去官者服在官者之服固為過制非聖哲所許而不推古今正禮難臣若難者有證臣對無據甘受違制通典九十穆帝崩前尚書郎曹耽等奔赴皆服齊縗治書侍御史喻希表彈其失禮博士孔恢等議請免耽等所覆除官耽上表自理云云開陵皇太后服議為人後者為之子元帝繼武帝于景帝為曾祖禮為曾祖後斬衰三年小記與諸侯為兄弟者斬衰則無齊皇太后宜正服斬衰改葬當緦鄭注止于臣子妻王氏通謂三年者王氏近情則宜緦通典一百二永和十二年修復峻平四陵大使開陵表至尊及百官皆服緦尚書符問皇太后應何服博士曹耽胡訥議司空蔡謨諡議謨可謂善始令終者矣案諡法布德執義曰穆通典一百四陳留王勵廢疾求立後議春秋之義後立子以貴不以長蓋以為宗廟主故也晉公族穆子有廢疾以讓其弟衛襄公嗣子縶足不能行立其弟晉衛皆廢嫡立庶者明臣之義終無執祭朝見之期以之居位違犯情禮故也禮有故使人攝祭非終身疾者勵為君王故事未有諸侯以疾去國成比通典七十四婚不舉樂議臨軒儀注無施安鼓吹處所又無舉麾鳴鐘之條通典五十九升平元年八月符問迎皇后大駕應作樂不博士胡訥議陳留王廢疾求立後議孟縶立弟異于陳留二王之後禮不宜廢通典七十四升平元年答臺符問小功服成婚案公主于二王屬為姑二王出為人後主又出適今應降服小功然本是周親雖降而為疏本親情重公主方當始薨而疑可婚與不通典六十臺符廬陵公主薨琅邪東海二王于禮為應得婚與不太學博士袁矯之云云太宰武陵王為所生母服議母以子貴王命追崇夫人視公爵秩比諸侯凡諸侯之禮服斷旁親以國內臣妾竝卑故也姑姊妹女子子嫁于諸侯則各以其服服之尊同故也卑則服闕尊則禮行太宰封王繼于蕃國出離其本仰無所厭夫人諸侯班爵不殊緣天然之恩伸王子之厭薄出禮之降服周可也通典八十二考之禮文太宰應服齊衰周今以春秋條例以廣其喻母以子貴庶子為君母為夫人薨卒赴告皆以成禮不行妾母之制夫人成風是也此則身為父後服應緦麻猶以子貴得遂私情經有明文三傳不貶況于太宰貴同古例不為父後者邪且禮有節文因革不一自漢以來皇子皆為始封君始封君則私得伸設令太宰不出後必受始封服無厭降出後降一等復何嫌而不周乎通典八十二禮庶子為父後為其母緦與尊為體不敢伸恩于私親為人後以所後為父亦是尊者為體其所生母俱是私親為父後及為人後義不異通典八十二案禮為人後者三年必以尊服服之庶子為人後為其母服緦傳曰何以緦與尊者為體不敢服其私親禮唯大宗無繼支屬之制太宰出後武陵受命元皇則纂承宗廟策名有在禮制既明豈容二哉夫禮有仰引而違情者故有君服而廢私喪屈伸明義非唯一條所謂以義斷恩況貴賤之禮既正豈得不率禮而矯心當依庶子為後之例服緦而已通典八十二升平中太宰武陵王所生母喪表乞齊縗三年詔聽依昔樂安王故事制大功九月尚書謝奉議立琅邪王議太常位次自以君道相承至是昭穆之統禮兄弟不相為後明義也今應上繼康帝意謂不疑此國之大事將垂之來代通典八十又議五帝之道以天下為公唯德與賢不私其親逮殷周則繼代承業雖百王迭逮而典謨不易所以鎮係人心間邪息亂今大晉宗祀配天成帝疾痛皇嗣幼沖深惟社稷遷于康皇軌同唐虞高義大行天祚不永還嗣本位考之先典求之人情咸謂主上應繼成帝通典八十居重喪遭輕喪議夫孝子之處喪服勤三年不懈不怠情思所主無不在曾子問三年之喪可以弔乎孔子曰三年之喪練不群立不旅行君子禮以飾情三年之喪而弔哭不亦虛乎蓋以為彼興哀則不專于所重也而禮云卒哭既練遭周大功之喪皆隨所服而變代行喪者咸從此制竊有所恨夫人子之道天屬之恩可謂重矣終身之憂非一朝可消故有祥練而為其極夫以資于事父之頃在公尚有奪私服之制況兼愛敬之重而更絶于茲屬乎奔喪之禮赴哭輒備其絰帶歸于本宮即反正服于權宜兼通庶可知無大過矣通典九十七與郤愔箋魏騭後來之良足以日新其美近聞邑有異議從弟異亦當拜時婦家遭喪即是其例夫拜時之禮誠非舊典蓋由季代多難男女宜各及時故為此制以固婚姻之義也雖未入壻門今年吉辰拜後歲俗無忌便得以成婦迎之正以策名委質有定故也通典五十九太和中平北將軍郤愔上言功曹魏騭周喪內迎婦拜時奉與郤箋立琅邪王議夫大道之行天下為公成皇帝捨胤嫡之愛而義重天倫道崇先代康皇帝祗承明命正統既移至尊應繼康皇帝嗣通典八十升平五年五月穆帝崩皇太后令立琅邪王丕太常臣夷等五人議右光祿大夫西平靖侯顏府君碑君諱含字弘都琅邪臨沂人春秋以降戰國以前賢智比肩備于載策昭穆次序上至顏燭漢末喪亂舊譜淪亡自青州使君以上不復詳具祖欽給事貞侯父默汝陰太守學素相承有聲邦黨君幼稟貞粹長而好右睦親之譽發于羈貫每讀書見孝友通靈之事輒悽然改容以為人神相與何遠之有但患人心澆僞自絶于神耳苟能無以僞雜貞神其舍諸修己立誠盡歡就養訓行閨門義達州里久要心許之信夷險不爽正冠納履之嫌終始不蹈兄畿患亡更生君棄絶人事蓬首屏氣以就唅養者十有三年次繁欽孫老而失明合藥須髯蛇膽有青衣童子持裹授君出戶化成青鳥飛去本州辟不就鎮東琅邪王參軍事過江纍遷東閣祭酒朝議謂君正性端素學行通深有命太子中庶子轉黃門侍郎本州大中正封回車縣侯轉侍中吳郡太守事停還除侍中國子祭酒加散騎常侍光祿勳以年遜位就加右光祿大夫門施行馬特賜床帳被褥四時致膳固辭不受馮懷欲為王導降禮君不從曰王公雖重故是吾家阿龍君是王親丈人故呼王小字王處明君之外弟為子允之求君女婚桓溫君夫人從甥也求君小女婚君竝不許曰吾與茂倫于江上相得言及知舊抆淚敘情茂倫曰唯當結一婚姻耳吾豈忘此言溫負氣好名若其大成傾危之道若其敗也罪及烟黨爾家書生為門世無富貴終不為汝樹禍自今仕宦不可過二千石闕婚嫁不須貪世位家時議者以君審裁將以應軍司之選君遽告蔡謨曰非此輕弱所宜尸忝羯逆方熾當保國養民以俟事會想愛人以禮宜寢此言主相聞之卒不授督統之任謨秉君此言終不唱討賊之計在朝正立不昵權豪及致仕退居長子髦解職視膳中子謙躬率田桑中外莫不取給闔門靜軌草餘年九十三薨遺命素棺薄斂吉凶官飾一無施列天子嗟悼詔賜墓田諡曰靖侯禮也停柩在殯鄰家失火三子抱柩號惶分同灰燼焱爓垂及欻然頓滅論曰君平生素行既感達幽靈終殯在堂又獲福異豈神祇保祐以顯淳德乎闡託姻顏氏頗識舊聞與君二子髦約採集言行而著此傳景定建康志與韓豫章箋馬伏波昔開道篙跡鑿石猶存北堂書鈔一百三十八御覽七百七十一馬文淵昔立兩銅柱于林邑岸此有遣兵十餘家不反居寧壽靈岸南對銅柱悉姓為馬自為婚姻有三百戶交州以流寓號曰馬流言語飲食尚與華夏同山川移易銅柱今沒在海中正賴此民以識故處御覽一百八十七林邑有鳥名歸飛御覽九百二十八惟檳榔樹最南游之可觀子既非常木亦特異溫交州時庶之大者三圍高者九丈葉聚樹端房構葉下華秀房中子結房外其擢穗似禾其綴實似穀其皮似桐而厚其節似竹而概其中空其外徑其屈如覆虹其申如縋繩本不大未不小上不傾下不邪調直亭亭千百若一步其林則寥朗庇其陰則蕭條信可以長吟可以遠想矣但性不耐霜不得北殖必當遐樹海南遼然萬里弗遇長者之目自令人恨深嘗對飛鳥戀土增思寄意謂此鳥其背青其腹赤丹心外露鳴情未達終日歸飛飛不十千路餘萬里何由歸哉水經溫水注藝文類聚八十七御覽九百七十一有清漿數斗懸于長木之端終不乾故為小異御覽九百七十二外國老胡說衆香共是一木木花為雞舌香木膠為熏陸木節為青木香木根為旃檀木葉為霍香木心為沈香御覽九百八十一又九百八十二引五條單道開傳贊肅哉善人飄然出群外軌小乘內畼空身玄象暉曜高步是臻餐茹芝英流浪巖津高僧傳九法苑珠五十九十六國春秋二十一望濤賦若夫金祗理轡素月告望宏濤于是鬱起重流于是電驤起沙渟而迅邁觸橫門而剋壯灌江津而砰磕鼓赤岸而激揚鬱律煙騰隗兀連罡重疊巘而天竦洄湍澼而起漲藝文類聚九長笛賦并序長笛賦并序余同僚桓子野有故長笛傳之耆老云蔡雍之所作也初雍避難江南宿于柯亭柯亭之觀以竹為掾雍仰而眄之曰良竹也取以為笛奇聲獨絶歷代傳之以至于今後漢蔡雍傳注北堂書鈔一百十一藝文類聚九十初學記十六靈禽為之婉翼泉禽為之躍鱗遠可以通靈達微近可以寫清畼神達足以協德宣猷窮足以怡志保身兼四德而稱雋故名流而器珍初學記十六引兩條登故臺詩序夫差姑蘇臺東有丹湖萬頃內有金銀塘御覽六十六正淮論上淮南者三代揚州之分也當春秋時吳楚陳蔡之輿地戰國之末楚全有之而考烈王都焉秦并天下建立郡縣是為九江劉項之際號曰東楚爰自戰國至于晉之中興六百有餘年保淮南者九姓稱兵者十一人皆亡不旋踵禍溢于世而終莫戒焉其天時歟地勢歃人事歟何喪亂之若是也試商較而論之夫懸象著明而休徵表于列宿山河襟帶而地險彰于丘陵治亂推移而興亡見于人事由此而觀則兼也必矣昔妖星出于東南而弱楚以亡飛孛橫于天漢而劉安誅絶近則火精晨見而王淩首謀長彗霄映而母丘襲亂斯則表乎天時也彼壽陽者南引荊汝之利東連三吳之富北接梁宋平塗不過七日西援陳許水陸不出千里外有江湖之阻內保淮肥之固龍泉之陂良疇萬頃舒六之貢利盡蠻越金石皮革之具萃焉苞木箭竹之族生焉山湖藪澤之隈水旱之所不害土産草滋之實荒年之所取給此則係乎地利者也其俗尚氣力而多勇悍其人習戰而貴詐僞豪右并兼之門十室而七藏甲挾劍之家比屋而發然而仁義之化不漸刑法之令不及所以屢多亡國也昔考烈以衰弱之楚屢遷其都外迫彊秦之威內遘陽申之禍逃死劫殺二世而滅黥布以三雄之選功成垓下淮陰既囚梁越受戮嫌結震主之威屢生同體之禍遂謀圖全之計庶幾後亡之福衆潰于一戰身脂于漢斧劉長支庶奄王大國承喪亂之餘御新化之俗無德而寵欲極禍發王安內懷先父之憾外眩姦臣之說招引賓客沈溺數術藉二世之資恃戈甲之盛屈彊江淮之上西向而圖宗國言未絶口身嗣俱滅李憲因亡新之餘袁術當衰漢之末負力幸亂遂生僭逆之計建號九江稱制下邑狼狽奔亡傾城受戮及至彥雲仲恭公休之徒或憑宿名或怙前功握兵淮楚力制東夏屬當多難之世仍值廢興之會謀非所議相係禍敗祖約助逆身亡家族彼十亂者成乎人事者也然則侵弱昏迷以至絶滅亡楚當之恃彊畏逼遂謀叛亂黥布有焉二王遘逆寵之之過也公路僭僞乘釁之盜也二將以圖功首難士少以驕矜樂禍本其所因考其成跡皆寵盛禍淫福過災生而制之不漸積之有由也晉書伏滔傳正淮論下昔高祖之誅黥布也撮三策之要馳赦過之書乘人主之威以除逆節之虜然猶決戰陳都暴尸橫野僅乃剋之害亦深矣長安之謀雖兵未交于山東禍未遍于天下而馳說之士與闔境之人幽囚誅放者亦已衆矣光武連兵于肥舒魏祖馳馬于蘄苦而廬九之閒流溺兵凶者十而七八焉夫王淩面縛得之于砎石仲恭接刃成之于後覺也而高祖以之宵征世宗以之發疾豈不勤哉文皇挾萬乘之威杖伊周之權內舉京畿之衆外徵四海之鋭雲合雨集推鋒以臨准浦而誕欽晏然方嬰城自固憑軾以觀王師于是築長圍起棼櫓高壁連塹負戈擊柝以守之自夏及春而後始知亡焉然則屠城之禍其可極言乎約之出奔淮左為墟悲夫信哉魯哀之言夫生乎深宮長于膏粱憂懼不切于身榮辱不交于前則其仁義之本淺矣奉以南面之尊籍以列城之富宅以制險之居養以衆彊之盛而無德以臨之無制以節之則厭溢樂禍之心生夫以昏主御姦臣利甲資堅城僞令行于封內邪惠結于人心乘閒幸濟之說日交于側猾詐錮咎之群各馳于前見利如歸安在其不為亂乎況乘舊寵狹前功畏逼懼亡以謀圖身之舉者望其俯首就羈不亦迂哉易稱履霜堅冰馴致之道蓋言漸也嗚呼斯所以亂臣賊子亡國覆家纍世而不絶者歟昔先王之宰天下也選于有德訪之三吏正其分位明其等級畫之封彊宣之政令上下有序無僭差之嫌四人安業無并兼之國三載考陟功罪不得逃其跡九伐時修刑賞無所謬其實令之有漸軌之有度寵之有節權不外授威不下黷所以杜其萌際重其名器深根固本傳之百世雖時有盛衰弱者無所懼其亡道有廢興彊者不得資其斃夫如是將使天下從風穆然軌道慶自一人惠流萬國安有向時之患哉晉書伏滔傳論青楚人物滔以春秋時鮑叔管仲隰朋召忽輪扁寧戚麥丘人逢丑父晏嬰涓子戰國時公羊高孟軻鄒衍田單荀卿鄒奭莒大夫田子方檀子魯連淳于髡盻子田光顏歜黔子於陵仲子王叔即墨大夫前漢時伏徵君終軍東郭先生叔孫通萬石君東方朔安期先生後漢時大司徒伏三老江革逢萌禽慶承幼子徐防嶭方鄭康成周孟玉劉祖榮臨孝存侍其元矩孫賓碩劉仲謀劉公山王儀伯郎崇禰正平劉成國魏時管幼安邴根矩華子魚徐偉長任昭先伏高陽此皆青士有才德者也鑿齒以神農生于黔中邵南詠其美化春秋稱其多才漢廣之風不同雞鳴之篇子文叔敖羞與管晏比德接輿之歌鳳兮漁父之詠滄浪漢陰丈人之折子頁市南宜僚屠羊說之不為利回魯仲連不及老萊夫妻田光之于屈原鄧禹卓茂無敵于天下管幼安不勝龐公龐士元不推華子魚何鄧二尚書獨步于魏朝樂令無對于晉世昔伏羲葬南郡少昊葬長沙舜葬零陵比其人則準的如此論其土則群聖之所葬考其風則詩人之所歌尋其事則未有赤眉黃巾之賊此何如青州邪滔與相往反鑿齒無以對也世說言語篇注引滔集帝堯功德銘胡書龜歷之文御覽九百三十一引任昉述異記注雪賦結陰凝雪皎如帔素御覽十二秋懷賦于是景宇肅澄風高木斂淒風夕衰零露晨湛澤收潤而草枯葉驟墜而庭掩鴈偕來以希陽燕遊逝而投險豈微物之足懷傷穨齡之告漸藝文類聚三立秋讀令議立秋御讀令不應緗幘求改用素宋書禮志五答王徽之問廢疾兄女服王徽之問劉玢廢疾兄女服記云其夫有廢疾又無子傳重者舅為之服小功又云長子有廢疾降傳重也此二條皆以其廢疾降嫡從庶謂如此雖非嫡長而有廢疾既無求婚許嫁理且慶弔蒸嘗皆不得同之于人不知當制服不劉玢答若嫡子有廢疾不得受祖之重則服與衆子同在齊衰蓋以不堪傳重故不加服非以廢疾而降也子婦之服例皆小功以夫當受重則加大功若夫有廢疾則居然小功亦非降也喪服經齊衰章為君之祖父傳曰從服也鄭注曰為君有祖之喪者祖有廢疾不立也從服例降本親一等君服斬故從服周唯孫不敢降祖此亦是廢疾不降之一隅也通典一百一駮尚書奏章太妃服父子不繼祖禰故妻得伸皇姑夫人致齊而會于太廟后服不踰至尊亦當緦麻也通典九十五哀帝興寧中哀靖皇后有章太妃之喪尚書奏至尊緦麻三月皇后齊縗庾家為孝庾后服議五服之內一同臣妾宜準小君服周通典八十一孝后崩庾家訪服博士王崑議諸婦宜從夫若其夫自同人臣婦亦宜同于人之妻與王后無準雖欲寧戚于大典有闕通典八十一
