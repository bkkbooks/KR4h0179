body:
  text: 熊遠廣昌鄉君喪宜廢冬至小會表案禮君于卿大夫比葬不食肉比卒哭不舉樂惻隱之心未忍行吉事故也被尚書符冬至後二日小會臣以為廣昌鄉君喪殯日淺聖恩垂悼禮大夫死廢一時之祭祭猶可廢而況餘事乎冬至唯可群下奉賀而已末宜便小會晉書禮志中元帝姨廣昌鄉君喪未葬中丞熊遠表又見通典八十一一百四十七聞北陵被發上疏園陵既不親行承傳言之者未可為定且園陵非一而直言侵犯遠近弔問答之宜當有主謂應更遣使攝河南尹案行得審問然後可發哀即宜命將至洛修復園陵討除逆類昔宋殺無畏莊王奮袂而起衣冠相追于道軍成宋城之下況此酷辱久大恥臣子奔馳之日夫修園陵至孝也討逆叛至順也救社稷至義也恤遺黎至仁也若修此四道則天下響應無思不服矣昔項羽殺義帝以為罪漢祖哭之以為義劉項存亡在此一舉群賊豺狠弱于往日惡逆之甚重于丘山大晉受命未改于上兆庶謳吟思德于下今順天下之心命貔貅之士鳴檄前驅大軍後至威風赫然聲振朔野則上副西土義土之情下允海內延頸之望矣晉書熊遠傳元帝作相列為主簿時傳北陵被發將舉哀遠上疏上疏諫親征杜韜皇綱失統中夏多故聖主肇祚遠奉西都梓宮外次未反園陵逆冠遊魂國賊未夷明公憂勞乃心王室伏讀聖教人懷慷慨杜韜小豎寇抄湘川比年征討經載不夷昔高伐鬼方三年乃剋用兵之難非獨在今伏以古今之霸王遭時艱難亦有親征以隆大勳亦有遣將以平小寇今公親征文武將吏度支籌量舟輿器械所出若足用者然後可征愚謂宜如前遣五千人徑與水軍進征既可得速必不後時昔齊用穰苴燕晉退軍秦用王翦剋平南荊必使督護得才即賊不足慮也晉書熊遠傳遠轉丞相參軍時琅邪國侍郎王鑒勸帝親征杜韜遠上疏因災異上疏被庚午詔書以雷電震暴雨非時深自剋責雖禹湯罪已未足以喻臣暗于天道竊以人事論之陛下節儉敦朴愷悌流惠而王化未興者皆群公卿士不能夙夜在公以益大化素餐負乘粃穢明時之責也今逆賊猾夏暴虐滋甚二帝幽殯梓宮未反四海延頸莫不東望而未能遣軍北討讎賊未報此一失也昔齊侯既敗七年不飲酒食肉況此恥尢大臣子之責宜在枕戈為王前驅若此志未果者當上下克儉恤人養士徹樂減膳惟修戎事陛下憂勞于上而群官未同戚容于下每有會同務在調戲酒色而已此二失也選官用人不料實德惟在白望不求才幹鄉舉道廢請託交行有德而無力者退修望而有助者進稱職以違俗見譏虛資以從容見貴是故公正道虧私塗日開強弱相陵冤枉不理今當官者以理事為俗吏奉法為苛刻盡禮為諂諛從容為高妙放蕩為達士驕蹇為簡雅此三失也世所所謂三失者公法加其身私議貶其非轉見排退陸沈泥滓時所謂三善者王法所不加清論美其賢漸相登進仕不輟官攀龍附鳳翱翔雲霄遂使世人削方為圓撓直為曲豈待顧道德之清塗踐仁義之區域乎是以萬機未整風俗偽薄皆此之由不明其黜陟以審能否此則俗未可得而變也今朝廷群司以從順為善相違見貶不復論才之曲直言之得失也時有言者或不見用是以朝少辨爭之臣士有祿仕之志焉郭翼上書武帝擢為屯留令又置諫官所以容受宜言誘進將來故人得自盡言無隱諱任官然後爵之位定然後祿之敷奏以言明試以功車服以庸舜猶歷試諸難而今先祿不試甚違古義亂之所由也求才急于疏賤用刑先于親貴然後令行禁止野無遺滯堯取舜于仄陋舜拔賢于巖穴姬公不曲繩于天倫叔向不虧法于孔懷今朝廷法吏多出于寒賤是以章書日奏而不足以懲物官人選才而不足以濟事宜招賢良于屠釣聘耿介于丘園若此道不改雖并官省職無救斃亂也能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔任此官得其人之益也晉書熊遠傳遠為御史中丞時冬雷電且大雨帝下書責躬引過遠復上疏奏請議獄皆準律令禮以崇善法以間非故禮有常典法有常防人知惡而無邪心是以周建象魏之制漢創畫一之法故能闡弘大道以至刑厝律令之作由來尚矣經賢智歷夷險隨時斟酌最為周備自軍興以來法度陵替至于處事不用律令競作厲命人立異議曲適物情虧傷大例俯立節度復不奉用臨事改制朝作夕改至于主者不敢任法每輒關咨委之大官非為政之體若本曹處事不合法令監司當以法彈違不得動用開塞以壞成事案法蓋粗術非妙道也矯割物情以成法耳若每隨物情輒改物制此為以情壞法法之不一是謂多門開人事之路廣私請之端非先王立法之本意也凡為駁議者若違律令節度當合經傳及前比故事不得任情以破成法愚謂宜令録事更立條制諸立議者皆當引律令經傳不得直以情言無所依準以虧舊典也若開塞隨宜權道制物此是人君之所得行非臣子所宜專用主者唯當徵文據法以事為斷耳晉書刑法志通典一百六十四元帝為丞相時主簿熊遠奏云云建議勸農桑立春之日天子祈穀于上帝乃擇良辰載耒耜帥三公九卿諸侯大夫躬耕帝藉以勸農功詩云弗躬弗親庶人不信自喪亂以來農桑不修遊食者多皆由去本逐末故也晉書熊遠傳江東草創農桑弛廢遠建議懷帝梓宮未返正會不宜作樂議謹案尚書堯崩四海遏密八音禮云凶年天子徹樂減膳孝懷皇帝梓宮未返豺狼當塗人神同忿兆庶怨嗟公明德茂親社稷是賴今杜韜蟻聚湘川比歲征行百姓疲斃故使義衆奉迎未舉履端元日正始之初貢士鱗萃南北雲集有識之士于是觀禮公與國同體憂容未歇昔齊桓貫澤之會有憂中國之心不召而至者數國及葵丘自矜叛者九國人心所歸惟道與義將紹皇綱于既往恢霸業于來今表道德之軌闡忠孝之儀明仁義之統弘禮樂之本使四方之士退懷嘉則今榮耳目之觀崇戲弄之好懼違雲韶雅頌之美非納軌物有塵大教如矜黎庶塗炭之困以廢歡悅伎樂之事謂宜設膳以賜群下而已晉書熊遠傳通典一百四十七建興元年十二月主簿熊遠議諫以尚書令荀組領豫州牧啓伏見吏部以太尉荀組為尚書令復令豫州牧自三代以來未聞以納言之臣而出領牧伯者組朝之素望識了舊典不應處外初學記十一通典二十二論親死賊中啓父母死河北賊中如襄國平陽可依此制若王化所被人迹所及可住而不往非以篤孝道也詩人喪馬揂求之林下不得漫依東關通典九十八遺冉閔書昔許由辭堯以天下讓之全其清高之節伯夷去國子推逃賞皆顯史牒傳之無窮此往而不返者也然賢人君子雖居廟堂之上無異于山林之中斯窮理盡性之妙豈有識之者邪是故不嬰于禍難者非為避之但冥心至趣而與吉會爾謐聞物極則變冬夏是也致高則危纍棊是也君王功已成矣而久處之非所以顧萬全遠危亡之禍也宜因茲大捷歸身本朝必有許由伯夷之廉享喬松之壽永為世輔豐不美哉晉書隱逸辛謐傳又見十六國春秋十九顏含周喪嫁女議鄭玄以未嫁成人降其旁親以明當及時者同降若嫁有時而遭喪因喪而降之非言齊縗之中可嫁女學者多昧此旨非獨在今含應見原通典六十劉隗上言王籍周喪娶主簿江啓又言顏含周喪遣女從事中郎議主簿孔夷議重表讓稟賜臣以朽暗忝廁朝右而以惰劣無益毗佐方今強寇未殄疆埸日駭政煩役重百姓困苦姦吏擅威暴人肆虐大斃之後倉庫空虛功勞之士賞報不足困悴之餘未見拯恤呼嗟之怨人鬼感動宜并官省職貶食師用勤撫其人以濟其艱臣等不能贊揚大化糾明刑政而偷安高位橫受寵給無德而祿殃必及之不敢橫受殊施以重罪戾晉書孔愈傳咸和八年詔給左僕射愈以二十人稟賜愈上疏固讓優詔不許重表奏日蝕伐鼓非舊典春秋日有蝕之天子伐鼓于社攻諸陰也諸侯伐鼓于朝臣自攻也案尚書符若日之有變便擊鼓于諸門有違舊典晉書禮志上宋書禮志一又通典七十八作有司奏為舊君服議應從弟服師之制昔夫子既喪門人若喪父而無服弔服加麻今縱不能爾自宜三月加以縗絰未聞深衣之制白夾布衣是今之吉服君弔其臣猶錫縗況臨故君而可奪情服乎通典九十四府君郊配議太始開元所以上祭四府君誠以世數尚近可得饗祠非若殷周先世王迹所因也向使京兆爾時在七世之外自當不祭此四王推此知既毀之後則殷禘所絶矣宋書禮志三太元十二年詔議明堂郊祀太常孔汪議答范寧問范寧問孔德澤云甲無子取其族子乙為後所生父沒降服周甲晚自生子乙歸本家後甲終乙當有服否若服當制何服孔答曰代人行之似當無服繼母嘗為母子既出服周推此粗可相況通典九十六范又難必當有服未辨服之定準云繼母既出服周此理所出為分明釋耳孔又答云繼母出為服周是父沒而嫁賀循要記亦謂之出當以捨此適彼不獨在嫁可以意領故不必繼于本也同上殷祠啓元興三年夏應殷祠昔年三月皇輿旋軫其年四月夏應殷而太常博士徐乾等議云應用孟秋臺尋校自泰和四年相承皆用冬夏乾等既伏應孟冬回復追明孟秋非失御史中丞范泰議今雖既祔之後得以蒸嘗而無殷薦之比太元二十一年十月應殷烈宗以其年九月崩至隆安三年國家大吉乃修殷事又禮有喪則廢吉祭祭新主于寢今不設別寢既祔祭于廟故四時蒸嘗以寄追遠之思三年一禘以習昭穆之序義本各異三年喪畢則合食太祖遇時則殷無取于限三十月也當是內臺常以限月成舊就如所言有喪可殷隆安之初果以喪而廢矣月數少多復遲速失中至于應寢而修意所未譬宋書禮志三義熙二年六月白衣領尚書左僕射孔安國啓云云又啓范泰云今既祔遂祭于廟故四時蒸嘗如泰此言殷與蒸嘗其本不同既祔之後可親蒸嘗而不得親殷也太常劉瑾云章后喪未一周不應不祭臣尋升平五年五月穆皇帝崩其年七月山陵十月殷興寧三年二月哀皇帝崩泰和元年五月海西夫人庾氏薨時為皇后七月葬十月殷此在哀皇再周之內庾夫人既葬之後二殷策文見在廟又文皇后以隆安四年七月崩陛下追述先旨躬服重制五年十月殷再周之內不以廢事今以小君之哀而泰更謂不得行大禮臣尋永和十年至今五十餘載用三十月輒殷皆見于注記是依禮五年再殷而泰所言非真難臣乃以聖朝所用遲速失中泰為憲司自應明審是非群臣所啓不允即當責失奏彈而愆慢惰稽停遂非忘舊謂免泰瑾官宋書禮志三初到尚書郎對策問曰吳興徐馥為賊殺郡將郡今應舉孝廉不坦對曰四罪不相氶殛鯀而興禹徐馥為亂何妨一郡之賢又問姦臣賊子弒君汗宮瀦宅莫大之惡也鄉舊廢四科之選今何所依坦曰季平子逐魯昭公豈可廢仲尼也晉書孔坦傳謝賜酒柑表天恩例賜靈酒黃柑不勝受遇謹表以聞御覽九百六十六奏議策除秀孝臣聞經邦建國教學為先移風崇化莫尚斯矣古者且耕且學三年而通一經以平康之世猶假漸漬積以日月自喪亂以來十有餘年干戈載揚俎豆禮戢家廢講誦國闕庠序率爾責試竊以為疑然宣下以來涉歷三載纍遇慶會遂未一試揚州諸郡接近京都懼纍及君父多不敢行其遠州邊郡掩誣朝廷冀于不試冒昧來赴既到審試遂不敢會臣愚以不會與不行其為闕也同若當偏加除署是為肅法奉憲者失分僥幸投射者得官頽風傷教懼于是始夫王言如絲其出如綸臨事改制示短天下人聽有惑臣竊惜之愚以王命無二憲制宜信去年察舉一皆策試如不能試可不拘到遣歸不署又秀才雖以事策亦泛問經義苟所未學實難暗通不足復曲碎乖例違舊造異謂宜因其不會徐更革制可申明前下崇修學校普延五年以展講習鈞法齊訓示人軌則夫信之與法為政之綱施之家室猶弗可二況經國之典而可玩黷乎晉書孔坦傳先是以兵亂之後務存慰悅遠方秀孝到不策試普皆除署至是帝申明舊制皆令試經有不中科刺史太守免官太興三年秀孝多不敢行其有到者並託疾帝欲除署孝廉而秀才如前制坦奏議與石聰書華狄道乖南北迥邈瞻河企宋每懷飢渴數會陽九天禍晉國姦凶猾夏乘釁肆虐我德雖衰天命未改乾符啓再集之慶中興應靈期之會百六之艱既過惟新之美日隡而神州振蕩遺氓波散誓命戎狄之手局蹐豺狼之穴朝廷每監寐永歎痛心疾首天罰既集罪人斯隕王旅未加自相魚肉豈非人怨神怒天降其災蘭艾同焚賢愚所歎矜哀勿喜我后之仁大赦曠廓惟虎是討彭譙使至粗具動靜知將軍忿疾醜類翻然同舉承問欣豫慶若在己何知幾之先覺介石之易悟哉引領來儀怪無聲息將軍出自名族誕育洪胄遭世多故國傾家覆生離親屬假養異類雖逼偽寵將亦何賴聞之者猶或有悼況身嬰之能不憤慨哉非我族類其心必異誠反族歸正之秋圖義建功之日也若將軍喻納往言宣之同盟率關右之衆輔河南之卒申威趙魏為國前驅雖竇融之保河西黥布之去項羽比諸古人未足為喻聖上寬明宰輔弘納雖射鉤之隙賞之故行雍齒之限侯之列國況二三子無曩人之嫌而遇天啓之會當如影響有何遲疑今六軍戒嚴水陸齊舉熊羆踴躍齕噬爭先鋒鏑一交玉石同碎雖復後悔嗟何及矣僕以不才世荷國寵雖實不敏誠為行李之主區區之情還信所具夫機事不先鮮不後悔自求多福惟將軍圖之晉書孔坦傳又見十六國春秋二十臨終與庾亮書不謂疾苦遂至頓斃自省綿綿奄忽無日修短命也將何所悲但以身往名沒朝恩不報所懷未敘即命多恨耳足下以伯舅之尊居方伯之重抗威顧盼名震天下榱椽之佐常願下風使九服式序四海一統封京觀于中原反紫極于華壤是宿昔之所味詠慷慨之本誠矣今中道而斃豈不惜哉若死而有靈潛聽風烈晉書孔坦傳與親友書今年田得七百石秫米不足了麴糱事晉書孔群傳諫鴻祀鴻祀雖出尚書大傳先儒所不究歷代莫之興承天接神豈可以疑殆行事乎天道無親唯德是輔陛下祇順恭敬留心兆庶可以消災復異皆已蹈而行之德合神明丘禱久矣豈須屈萬乘之尊修雜祀之事君舉必書可不慎歟晉書孔嚴傳隆和元年與王彪之論蔡謨諡書博士引禮之義以通高尚之事穆誠實美諡然蔡公德業既重又是先帝師傅居總録之任則是參二宰相考行定名議存實録不可不詳通典一百四墓毀論案禮聖人制殯葬之意蓋以死者不可服存而孝子不忍棄其親故為棺槨葬埋推其本心固在不忍棄之中為禮節以順孝子情耳原聖人之意蓋以無知處形骸故以幽閉長久為安以有知為神靈故以博廟尊嚴而顯尊嚴故可修潛隱故不犯比之丘陵同之自然而不敢修若遇寇發靈可以補復其外而不可改內哭泣之日以事訖為節故廟災存三日哭之之文墓毀無制哭之日竊推夫理恐不加異于廟災也苟以無知處之則雖加開發不能益死者之苦但人情不忍見聞見聞之日有哭泣一日五日或十日過者不足褒不及不足貶故聖人不為之禮通典一百二
