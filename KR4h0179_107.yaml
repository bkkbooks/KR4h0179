body:
  text: 江淵王式事議繼父嘗同居而後別者繼子猶制齊縗三月案王式母之事式父存則崇敬妻道無愆歿則制服畢葬乃歸伉儷之義大較為舉但不能遂居哀次以此為失方之繼父恩義為崇式為人子慎終志篤豈忍以母節小闕而不行服哉是以俯仰寧從其重今報以周推心乃安觀過知仁式近有也昔季路服姊周而不降仲尼抑而不貶焉君子以情恕物謂式之所行免于戾矣通典九十四作江泉即江淵唐避諱改遭亂父母乖離議流迸離隔便令行喪案舊事未覩其例昔宰咺致賵春秋譏其豫凶事子路赴衛仲尼雖知必死須使者至而哭之然則吉凶事大存亡應審方今正道始通各令尋求之理盡乃後行喪于禮未失通典九十八作江泉墓毀服議凡所以改葬者必由丘墓崩壞露殯其痛一也愚以為發墓依改葬服緦三月漢時有盜高廟寶器者達禮之士以為其罪輕于盜長陵之土雖同主于敬事實有異愚以為墓毀更復不應比廟災而不行服也通典一百二招魂葬議凡葬之言藏所以閉藏尸柩非為魂也今招魂而葬無尸而殯或無殯而窆各任近情以長虛事非禮所許宜如司徒所上以明永制通典一百三風賦惟渾成之既載兮統天地以資始網宇宙以結羅兮洞萬形而通紀莫適柔健靡測陰陽于音罔徵在體無方假姿衆象借韻宮商若颸厲狂震觸物怒號卷揚江海回拔陵崤巨鶂迸攝以退翼爰居喪宿而遐逃藝文類聚一述歸賦時運逝其何速素秋奄以告季虛柳中于昏日羲和宿于房位微寒淒其薄人凝霜粲其朝墜林飄飄以灑葉隰芒芒而摧穟菊發華于高丘雁辭北以南蒞藝文類聚三井賦惟大村之既判兮聖應務以表靈演八卦以極用兮運五材以贊生鑽丹暉于金石兮引黃泉乎杳冥巽下火而鼎立兮木上水而井成于是大制既契物遵其徼阡逵瓜分廬宅星列修家給之永用鑿階庭而制穴穿重壤之十仞兮搆玉甃之百節營之不日既汲既泄潛流照照寒泉洌洌含七德以幾道兮盡衆善而莫伐挹之不損滀之不充納而不處其有興而不匱其豐先王借象以辨義君子擬淡以自綏神龍來蟠以育鱗列仙一漱而雲飛藝文類聚九初學記七羽扇賦惟羽類之攸出生東南之遐嵎育庶族于雲夢散宗儔于具區色非一采或素或玄冗肌理揚瓊澤冰鮮戢之則藏奮之則舉舍之以寒用之以暑制舒疾于一掌引長風乎胸襟蕩煩垢于體外流妙氣不中心藝文類聚六十九在于鳥為淩虛之翰在于人為揮風之羽高下多少隨人所舉書鈔一百三十四竹賦有嘉生之美竹挺純姿于自然含虛中以象道體圓質以儀天託宗爽塏列放圃田緣崇嶺帶回川薄循隰行平原故能淩驚風茂寒鄉藉堅冰負雪霜振葳蕤扇芬芳翕幽液以潤本承清靈以擢莖拂景雲以容與拊惠風而回縈藝文類聚八十九御覽九百六十二諫鑿北池表伏承當鑿北池及立閣道雖湫厄陋小用功甚微又役不擾民賦不及外至簡至約誠不可加然于愚懷實有眷眷臣聞王者處萬乘之極享富有之大必顯明制度以表崇高盛其文物以殊貴賤建靈臺浚辟雍立宮館設苑囿所以弘於皇之尊彰臨下之義前聖創其禮後代遵其矩當代之君咸營斯事周宣興百堵之作鴻雁歌安宅之歡魯僖修泮水之宮採芹有思樂之頌蓋上之有為非豫欲是盈下之奉上不以劬勞為勤此自古之令典軌儀之火式也夫理無常然三正相詭司牧之體與世而移致飾則素故賁返于剝有大必盈則受之以謙損上益下順兆庶之悅享以二簋用至約之義是以唐虞流化于茅茨夏禹垂美于卑室過儉之陋非中庸之制然三聖行之以致至道漢高祖當營建之始怒宮庫之壯孝文處既富之世愛十家之産亦以播惠當時著稱來葉今者二虜未殄神州荒蕪舉江左之衆經略艱難漕揚越之粟北餽河洛兵不獲戢運戍悠遠倉庫內罄百姓力竭加春夏以來水旱為害遠近之收普減常年財傷人困大役未已軍國之用無所取給方之往代豐斃相懸損之又損實在今日伏惟陛下聖質天縱凝曠清虛闡日新之盛茂欽明之量無欲體于自然沖素刑乎萬國韶既盡美則必盡善宜養以玄虛守以無為登覽不以臺觀遊豫不以苑沼偃息畢于仁義馳騁極于六藝觀巍巍之隆鑒二代之文仰味羲農俯尋周孔其為逍遙足以尊道德之輔親搢紳之秀疇咨以時顧問不倦獻替諷諫日月而聞則庶績惟凝六合咸熙中興之盛邁于殷宗休嘉之慶流乎無窮昔漢起德陽鍾離抗言魏營宮殿陳群正辭臣雖才非若人然職忝近侍言不足採而義在以聞藝文類聚九晉書江逌傳上疏諫修洪祀臣尋史漢舊制藝文志劉向五行傳洪祀出于其中然自前代以來莫有用者又其文惟説為祀而不載儀注此蓋久遠不行之事非常人所參校案漢儀天子所親之祠惟宗廟而已祭天于雲陽祭地于汾陰在于別宮遙拜不詣壇所其餘群祀之所必在幽靜是以圓丘方澤列于郊野今若于承明之庭正殿之前設群神之坐行躬親之禮準之舊典有乖常式臣聞妖眚之發所以鑒悟時主故寅畏上通則宋災退度德禮增修則殷道以隆此往代之成驗不易之定理頃者星辰頗有變異陛下祗戒之誠達于天人在豫之懼忘寢與食仰虔玄象俯凝庶政嘉祥之應實在今日而猶乾乾夕惕思廣茲道誠實聖懷殷勤之至然洪祀有書無儀不行于世詢訪時學莫識其禮且其文曰洪祀大祀也陽曰神陰曰靈舉國相率而行祀順四時之序無令過差今案文而言皆漫而無適不可得詳若不詳而修其失不小晉書江逌傳哀帝以天文失度欲依尚書洪祀之制于大極前殿親執虔肅冀以免咎使太常集博士草其制逌上疏諫云云又上疏臣謹更思尋參之時事今強戎據于關雍桀狄縱于河朔封豕四逸虔劉神州長旌不卷鉦鼓日戒兵疲人困歲無休已人事斃于下則七曜錯于上災沴之作固其宜然又頃者以來無乃大異彼月之蝕義見詩人星辰莫同載于五行故洪範不以為沴陛下今以晷度之失同之六沴引其輕變方之重眚求已篤于禹湯憂勤踰乎日昃將修大祀以禮神祇傳曰外順天地時氣而祭其鬼神然則神必有號祀必有義案洪祀之文惟神靈大略而無所祭之名稱舉國行祀而無貴賤之阻有赤黍之盛而無牲醴之奠儀法所用闕略非一若率文而行則舉義皆閡有所施補則不統其源漢侍中盧植時之達學受法不究則不敢厝心誠以五行深遠神道幽昧採賾之求難以常思錯綜之理不可一數臣非至精孰能與此晉書江逌傳帝不納逌又上疏云云奏諫山陵用寶器以宣皇帝顧命終制山陵不設明器以貽後則景帝奉遵遺制逮文明皇后崩武皇帝亦承前制無所施設惟餔糒之奠瓦器而已昔康皇帝玄宮始用寶劍金舄此蓋太妃罔已之情實違先志纍世之法今外欲以為故事臣請述先旨停此二物晉書江逌傳御覽五百五十二又七百五十七逸民針至人應務是統是營乃制上下以牧群生君位孰在匪聖伊明賢愚相奉臣主以成如彼百節各役天形率分委質仰應一情心膂有位股肱有經豈以處下為戚為榮各安其所舉體用平夫設爵列土懸弓垂旌卑尊之級貴賤之名匪以恣物之役實大猷而是經處遁之士奚眷于時行矣先覺捐俗長辭明乎憂患故超爾不疑解髮靈崖被褐絃絲飄飄臺上輕舉高之穆穆二仲攜策相期盤幽隱寂與物無治凡厥後來順乃所往鑒茲俗纍戒于顛蕩無殉外物心煩技養無棄恬曠憂勤是掌林人司針敢進善黨藝文類聚三十六述志賦慕浮雲以抗操耽簟食之自娛羡首陽之皎節歎南山之高疏哀夫差之溷惑詠楚懷之失圖悲伍員之沈悴痛屈平之無辜嘉沮溺之隱約羡接輿之狂歌顧大雅之先智緯明哲之所經微見機而遂逝比舍生而親名道殊塗而同歸要踰世而並榮舜拘忤于焚廩孔怵惕于陳匡紛迍蹇之若斯何遭運之可常情恍惚以回迷夢乘雲而飛揚駕麟鳳之靡靡截龍旗之洋洋周九州而騁目登四嶽而永望承聖哲而砥礪奮羽儀而翱翔被蘭戺之芳華帶鍾山之玉英飾吾冠之岌岌美吾珮之玲玲悲盛衰之遞處情悠悠以紆結攬萱草以掩淚曾一歡而九咽藝文類聚二十六感舊賦胡馬仰朔雲越鳥巢南樹文選赭白馬賦注圍棊賦并序圍棊賦并序昔班固造奕旨之論馬融有圍棊之賦擬軍政以為本引兵家以為喻蓋宣尼之所以稱美而君子之所以遊慮也既好其事而壯其辭聊因翰墨述而賦焉其辭曰局則鄧林之木魯班所造雉方砥平素質玄道犀角象牙是錯是礪內含光潤形亦應制于是二敵交行星羅宿列雲會中區網布四裔合圍促陳交相侵伐用兵之象六軍之際也張甄設伏挑敵誘寇縱敗先鋒要勝後復尋道為場頻戰纍鬭夫保角依邊處山營也隔道相望夾水兵也二鬭共生皆目并也持棊合連理形也覽斯戲以廣思儀群方之妙理訝奇變之可嘉思孫吳與白起世既平而功絶局告成而巧止當無為之餘日差見玩于君子藝文類聚七十四良馬蹀足輕車結輪秋興賦素秋始啓清風激暑葉零玉階柯委徑楚離禽嚶嚶而晨鳴輕帷翩翩以微舉夕露穨潤于蘭庭秋蟲屬響乎廊宇初學記三涉江賦迄趙屯歷彭川修岸靡靡莞葦芊芊紫蓮被翠波而抗英碧椹乘天岸而星懸百籟夕奏山精夜然狂飆蕭瑟以洞駭洪濤突兀而橫峙爾乃江狶彭濞夜火輝煥淩錯吐飆駭鯨噴瀾采蜂于是泛波文魚于是登岸藝文類聚八觀濤賦伊山水之遼回何秋月之淒清瞻滄津之騰起觀雲濤之來征爾其勢伍也發源溟池回衝天井灑拂滄漢遙櫟星景子結誓于陰府洪湍應期而來騁汨如八風俱臻隗若崑崙抗嶺藝文類聚九于是神鯨來往乘波曜鱗御覽九百三十八水賦魚喪成島嶼之墟目落為明月之珠御覽九百三十八不著名疑承上曹毗今附此俟考湘中賦其竹則篔簹白烏實中紺族演榮幽渚繁宗隈曲萋蒨陵丘薆逮重谷齊民要術十初學記二十八魏都賦百藏之庫戎儲攸歸御覽一百九十一桱柏振露緑椿停霜御覽九百六十一果則谷棪山楟御覽九百七十四柴梨朱市侯桃丹棗御覽九百六十七英梅楊李若榴薁棣御覽九百七十三九百七十四楊都賦海狶鯨鱘御覽九百四十臨園賦青霞曳于前阿素籟流于森管文選恨賦注又沈約鍾山詩注詠冶賦冶石為器千爐齊設御覽八百三十三冶成賦含彩以寶珍文選鮑照行藥至城東橋詩注箜篌賦嶧陽之桐植穎巖摽清泉潤根女蘿被條爾乃楚班制器窮妙極巧龍身鳳頸連翩窈窕纓以金采絡以翠藻其絃則烏號之絲用應所任體徑質朗虛置自吟于是召倡人命妙姿御新肴酌金罍發愁吟引吳妃湖上颯沓以平雅前溪摧藏而懷歸東郭念干遠人參潭愁于永違藝文類聚四十四又初學記十六引兩條鸚武賦并序鸚武賦并序余在直見交州獻鸚武鳥嘉其有智歎其籠樊乃賦之曰其形則雉顧鵠眄鷹跱雁息丹喙含映緗緗煥翼森森修尾蔚蔚紅臆金采員嬰于雙眸朱藻爛暉于首側藝文類聚九十一初學記三十馬射賦修埒坦其平舒文選赭白馬賦注奔電無以追其蹤逸羽不能企其足狀若騰虬而登紫霄目似晨景之駭扶木體與機會動躡驚風于是抗孫陽之轡彎繁弱之弓輕足鬱其雲合妙手于焉爭雄藝文類聚九十三對儒或問曹子曰夫寶以含珍為貴士以藏器為峻麟以絶迹標奇松以負霜稱雋是以蘭生幽澗玉輝千仞故子州浮滄瀾而龍蟠吳季忽萬乘以解印虞公潛崇巖以頤神梁生適南越以保慎固能全真養和夷迹洞潤陵冬揚芳披雪獨振也今子少睎冥風弱挺秀容奇發幼齡翰披孺童吐辭則藻落楊班抗心則志擬高鴻味道則理貫莊肆研妙則穎奪豪鋒固以騰廣莫而萋蒨排素薄而青蔥者矣何必以刑禮為已任申韓為宏通既登東觀染史筆又據太學理儒功曾無玄韻淡泊逸氣虛洞養采幽翳晦明蒙籠不追林棲之迹不希抱鱗之龍不營練真之術不慕內聽之聰而處汛位以核物扇塵教以自濛負鹽車以顯能飾一已以求恭退不居漆園之場出不躡曾城之衝遊不踐綽約之室趠不希騄駬之蹤徒以區區之懷而整名目之典覆蕢之量而塞北川之洪檢名實于俄頃之間定得失乎一管之鋒子若謂我果是邪則是不必以合俗子若云俗果非邪則俗非不可以苟從俗我紛以交爭利害渾而彌重何異執朽轡以御逸駟承徑風以握秋蓬役恬性以充勞府對群物以耦怨雙者乎子不聞乎終軍之穎賈生之才拔奇山東玉映漢臺可謂響播六合聲駭嬰孩而見毀絳灌之口身離狼狽之災由此言之名為實賓福萌禍胎朝敷榮華夕歸塵埃未若澄虛心于玄圃蔭瑤林于蓬萊絶世事雋黃綺鼓滄川而浪龍鰓者矣蒙竊惑焉主人煥耳而笑欣然而言曰夫兩儀既闢陰陽汗浩五才迭用化生紛擾萬類云云孰測其兆故不登閬風安以瞻殊目之形不步景宿何以觀恢廓之表是以迷粗者循一往之智狷介者守一方之矯豈知火林之蔚炎柯冰津之擢陽草故大人達觀任化昏曉出不極勞處不巢皓在儒亦儒在道亦道運屈則紆其清暉時申則散其龍藻此蓋員動之用舍非尋常之所寶也今三明互照二氣載宣玄教夕凝朗風晨鮮道以才畼化隨理全故五典剋明于百揆虞音齊響于五絃安期解褐于秀林漁父擺鉤于長川如斯則化無不融道無不延風澄于俗波清于川方將舞黃虬于慶雲招儀鳳于靈山流玉醴乎華闥秀朱草于庭前何有違理之患纍真之嫌子徒知辨其説而未測其源明朝菌不可踰晦朔蟪蛄無以觀大年固非管翰之所述聊敬對以終篇晉書文苑曹毗傳雙鴻詩序近東野見有養雙鴻者其儀甚美又善鳴舞雖志希青翠之遊身非已有物之可感良謂此也藝文類聚九十屏風詩序豫為黃門在直多懷遂作詩書屏風御覽七百一王鼎頌闕闕黃帝讚軒轅應玄期幼能總百神體鍊五靈妙氣含雲霧津摻石曾城岫鑄鼎荊湖濱豁焉天扉闢飄然跨騰鱗儀轡灑長風褰衣躡紫宸藝文類聚十一初學記九神女杜蘭香傳神女姓杜字蘭香自云家昔在青草湖風溺大小盡沒香時年三歲西王母接養之于崑崙之山于今千歲矣蘭香降張碩家輒齎瓦榼酒氣芳馨書鈔一百四十八香戒張碩曰不宜露頭宿書鈔一百四十二請雨文下邳內史曹毗敬告山川諸靈頃節運錯戾旱亢陰消川竭谷虛石流山燋天無纖雲野有橫飆盛夏應暑而或涼草木無霜而自凋遑遑農夫輟耕田畔悠悠舟人頓棹川岸雲根山積而中披雨足垂零而復散聖主當膳而減味牧伯忘餐而過晏民庶拊心而嚬戚搢紳不期而同歎斯亦憂勤之極情而明靈之達觀矣藝文類聚一百太尉石鑒碑君為治書侍御史朝廷以公雅節不群直方其道仍授準繩之官頻居爪牙之任鷹跱虎視而庶僚風靡書鈔六十二引三條首丘賦闕闕杖賦惟萬物之品分何利人之獨書中神性之極妙豈給口之至味雖至味之御內乃靡失乎身外舍少壯之自然假扶我之攸賴良工登乎曾巒妙匠鑒乎林阿顧眄乎晞陽之條投刃乎直理之柯方圓適意洪細可手𨃕踽旦夕欲與永久儀制裁于一尋假飾存乎尾首瑩牙為其眉額朗金為其觜距藝文類聚六十九又略見書鈔一百三十三豆羹賦乃有孟秋嘉菽垂枝挺莢是刈是穫充簟盈篋香鑠和調周疾赴急時御一杯下咽三歎時在下邑頗多艱難空匱之厄固不綴歡追念昔曰啜菽永安藝文類聚八十五初學記二十六二十七御覽八百六十一太羹居正衆味歸宗書鈔一百四十四詩序永康之末疾苦痿瘵故人頗候之常以間靜為著詩一首分句改紙各有別讀初學記二十一不用舌論論者以為心氣相駐因舌而言卷舌翕氣安得畼理余以留意于言不如留意于不言徒知無舌之通心未盡有舌之必通心也仲尼云天何言哉四時行焉夫子之文章可得而聞也夫子之言性與天道不可得而聞是謂至精愈不可聞樞機之發主乎榮辱禍言相尋召福甚希喪元滅族沒有餘哀三緘告慎銘在金人留侯不得已而掉三寸亦反初服而效神仙靈龜啓兆于有識前卻可通于千年鸚武猩猩鼓弄于籠羅財無一介之存普天地之與人物亦何屑于有言哉藝文類聚十七
