body:
  text: 卷二武帝下制王昌不應為前母服凡事有非常當依準舊典為之立斷今議此事稱引趙姬叔隗者粗是也然後狄與晉和故姬氏得迎叔隗而下之吳寇隔塞毖與前妻終始永絶必義無兩嫡則趙衰可以專制隗氏昌為人子豈得擅替其母且毖二妻並以絶亡其子猶後母之子耳昌故不應制服也晉書禮志中即位改元大赦詔制詔御史中丞等昔朕皇祖宣王聖哲欽明誕應期運熙帝之載肇啓洪基伯考景王履道宣猷緝熙諸夏至于皇考文王濬哲光遠允協靈祇應天順人受茲明命仁濟于宇宙功格于天地肆魏氏弘鑒於古訓儀刑于唐虞疇咨群后爰輯大命於朕身豫一人畏天之命用弗敢違遂登壇于南郊受終于文祖燔柴班瑞告類上帝惟朕寡德負荷洪烈允執其中託於王公之上以君臨四海惴惴惟懼罔知所濟惟爾股肱爪牙之佐文武不二心之臣乃祖乃父實左右我先王以弼寧帝室光隆大業思與萬國共饗體祚其大赦天下與之更始自謀反大逆不道已下在元年十二月七日昧爽以前皆赦除之改咸熙二年為泰始元年賜人爵五級露布天下及諸王公國別使稱朕意焉文館詞林六百六十八又見晉書武帝紀有刪節封魏帝奐為陳留王詔明德昭融遠鑒天命欽象曆數用禪厥位敢咨詣故訓以敬授青土于東國永為晉賓載天子旌旗乘五時副車行魏正朔郊祀天地禮樂制度皆如魏舊以承王顯祖之禋祀通典七十四又詔王上書不稱臣答報不為詔一如賓禮同上封功臣詔昔唐虞三代之盛暨於漢魏創制褒崇元勳班爵行賞行國同禮施祿逮下萬邦咸仰朕以寡德登於天位記于王公之上腹心股肱文武之臣光濟帝業余嘉乃勳慶賞之行其用宜速御覽二百引王隱晉書進太傅司馬孚封爵詔太傅勳德弘茂朕卯瞻仰以光導弘訓鎮靜宇內願奉以不臣之禮其封為安平王邑四萬戶進拜太宰持節都督中外諸軍事晉書安平王孚傳為樂安王鑒燕王機選師友詔樂安王鑒燕王機並以長大宜得輔導師友取明經儒學有行義節儉使足嚴憚昔韓起與田蘇遊而好善宜必得其人晉書樂安王鑒傳以曹志為樂平太守詔昔在前世雖曆運迭興至於先代苗裔傳祚不替或列藩九服式序王官選衆命賢惟德是與蓋至公之道也魏氏諸王公養德藏器壅滯曠久前雖有詔當須簡授而自頃衆職少缺未得式敘前濟北王曹志履德清純才高行潔好古博物為魏宗英朕甚嘉之其以志為樂平太守晉書曹志傳以王珣何遵為散騎常侍詔給事黃門侍郎王珣元理通原篤志好學不殞先業在朝有幹事之才給事何遵公亮篤誠有才幹器任久歷朝位職用有效今宜各敘進拾遺左右其以珣遵並為散騎常侍皆徒分與內常侍更讀文書書鈔五十八引晉起居注賜王經孫郎中詔故尚書王經雖身陷法辟然守志可嘉門戶湮沒意常愍之其賜經孫郎中魏志夏侯玄傳注引漢晉春秋賜王基家奴婢詔故司空王基既著德立勳又治身清素不營産業久在重任家無私積可謂身沒行顯足用勵俗者也其以奴婢二人賜其家魏志王基傳詔報傅玄舉清遠有禮之臣者此尤今之要也晉書傅玄傳恤傅僉詔蜀將軍傅僉前在關城身拒官軍致死不顧僉父彤復為劉備戰亡天下之善一也豈由彼此以為異僉息著募蜀志楊戲傳注引蜀記聽鄧艾立後詔昔太尉王淩謀廢齊王而王竟不足以守位征西將軍鄧艾矜功失節實應大辟然被書之日罷遣人衆束手受罪比於求生遂為惡者誠復不同今大赦得還若無子孫者聽使立後令祭祀不絶三國魏志鄧艾傳聽群下終喪詔諸將吏二千石以下遭三年喪者聽歸終寧庶人復除徭役宋書禮志二通典八十赦罪飭治詔昔王淩謀廢齊王而王竟不足以守位鄧艾雖矜功失節然束手受罪今大赦其家還使立後興滅繼絶約法省刑除魏氏宗室禁錮諸將吏遭三年喪者遣寧終喪百姓復其徭役罷部曲將長吏以下質任省郡國御調禁樂府靡麗百戲之伎及雕文遊畋之具開直言之路置諫官以掌之晉書武帝紀案此與前二詔同唯罷部曲將以下為異蓋史家省併數詔為之禁淫祀詔昔聖帝明王修五嶽四瀆名山川澤各有定制所以報陰陽之功而當幽冥之道故也然以道蒞天下者其鬼不神其神不傷人也故祝史薦而無愧辭是以其人敬慎幽冥而淫祀不作末世信道不篤僭禮瀆神縱欲祈請曾不敬而遠之徒偷以求幸祅妄相煽舍正為邪故魏朝疾之其按舊禮具為之制使功著於人者必有其報而祅淫之鬼不亂其間晉書禮志上宋書禮志四通典五十五罷供奉詔乘黃廄離車昔田獵嬉遊之事凡若此類皆悉罷之北堂書鈔一百三十七引晉起居注掾屬作令詔百里長吏親民之要也若縣令有掾屬才堪治民者當以參選書鈔七十八引晉起居注正旦徹樂詔朕遭憫凶奉承洪業追慕罔極正旦雖當受朝其伎樂一切勿有所設又殿前及文武織成帷幕之屬皆不須施御覽二十九引晉起居注詔遷卻正正昔在城都顛沛守義不違忠節及見受用盡心幹事有治理之績其以正為巴西太守蜀志卻正傳詔有司不能使人之不加諸我此古人所難交關人事詡之罪耳豈尚書令能防乎其勿有所問晉書裴秀傳時安遠護軍郝詡與故人書云與尚書令裴秀相知望其為益有司奏免秀官詔云云詔答李喜秀幹翼朝政有勳績於王室不可以小庛掩大德晉書裴秀傳司隸校尉李喜復上言騎都尉劉尚為尚書令裴秀占官稻田求禁止秀詔云云又詔答李喜法者天下取正不避親貴然後行耳吾豈將枉縱其間哉然案此事皆是友所作侵剝百姓以繆惑朝士姦利乃敢作此其考竟友以懲佞濤等不二其過者皆勿有所問易稱王臣蹇蹇匪躬之故今喜元志在公當官而行可謂邦之司直者矣光武有云貴戚且斂手以避二鮑豈其然乎其申敕郡寮各慎所司寬宥之恩不可數遇也晉書李喜傳喜上言劉友山濤中山王睦武陔各占官三更稻田詔云云以華嶠為散騎常侍詔散騎以從容侍從承答顧問掌讚詔命平處文籍故前世多參用文學之士議郎華嶠有論議著述之才其以嶠為散騎常侍兼與中書共參著作事書鈔五十八御覽二百二十四並引華嶠集轉華嶠為祕書監典領著作詔尚書郎嶠體素宏簡文雅該通經覽古今博聞多識屬書實録有良史之志故轉為祕書監其加散騎常侍班同中書寺為內臺使中書散騎著作及治禮音律天文數術南省文章門下撰集皆典領之御覽二百三十四引華嶠集下羅憲詔憲忠烈果毅有才識器幹可給鼓吹晉書羅憲傳憲領武陵太守泰始初入朝詔云云郊祀詔有司前奏郊祀權用魏禮朕不慮改作之難令便為永制衆議紛互遂不時定不得以時供饗神祇配以祖考日夕難企貶食忘安其便郊祀晉書禮志上宋書禮志三皇后諱勿下詔禮內諱不出宮而近代諱之非也勿下南齊書禮志上泰始二年正月有司奏故事皇后諱與帝諱俱下詔云云除祠厲殃詔不在祀典除之通典五十五泰始二年有司奏春分祠厲殃及禳祠詔云云傳封詔五等之封皆録舊勳本為縣侯者傳封次子為亭侯為鄉侯為關內侯亭侯為關中侯皆食本戶十分之一晉書武帝紀擇立諫官詔古者百官官針王闕然保民特以諫諍為職今之侍中常侍實處此位擇其能正色弼違匡救不逮者以兼此選晉書武帝紀詔有司以書答孫皓昔漢文光武懷撫尉他公孫述皆未正君臣之儀所以羇縻未賓也皓遣使之始未知國慶但以書答之晉書武帝紀帝既受禪吳人來祭弔有司奏為答詔帝曰云云優崇陳留王詔陳留王操尚謙沖每事輒表非所以優崇之也主者諭意非大事皆使王官表上之晉書武帝紀通典七十四賜王沈葬錢并地詔故驃騎將軍王沈忠允篤誠執德弘毅夕清方夏內熙袞職歷位著稱厥功茂焉不幸薨殞志業未究今當葬其賜錢三十萬葬田一頃御覽五百五十六營造宗廟詔主者前奏就魏舊廟誠亦有準然於祗奉明主情猶未安宜更營造崇正永制晉書禮志上宋書禮志三答群臣請易服復膳詔每感念幽冥而不得終苴絰於草土以存此痛況當食稻衣錦誠佹然淚切其心非所以相解也吾本諸生家傳禮來久何必一旦便易此情於所天相從已多可試省孔子答宰我之言無事紛紜也言及悲剝奈何奈何晉書禮志宋書禮志二通典八十又答詔重覽奏議益以悲剝不能自勝奈何奈何三年之喪自古達禮誠聖人稱情立哀明恕而行也神靈日遠無所訊告雖薄於情食旨衣美朕更所不堪也不宜反覆重傷其心言用斷絶奈何奈何晉書禮志中宋書禮志二通典八十謁陵詞此上旬先帝棄天下日也便以周年吾煢煢當復何時一得敘人子之情邪思慕煩毒欲詣陵瞻侍以盡哀憤主者具行備晉書禮志中宋書禮志二答群臣奏停謁陵詔孫煢忽爾日月已周痛慕摧感永無逮及欲瞻奉山陵以敘哀情體氣自佳耳又已涼便當行不得如所奏也主者便具行備晉書禮志中宋書禮志二衰絰謁陵詔昔者哀適三十日便為梓宮所棄遂離衰絰痛感豈可勝言顧漢文不使天下盡哀亦帝王至謙之志是以自割不以副諸君子有三年之愛而身禮廓然當見山陵何心而無服其以衰絰行晉書禮志中宋書禮志二答群臣諫止衰絰謁陵詔亦知不任此麻布耳然人子情思為欲令哀喪之物在身蓋近情也群臣自當按舊制期服之義非先帝意也晉書禮志中宋書禮志二允群臣不以衰絰謁陵詔患情不能跂及耳衣服何在諸君勤勤之至豈苟相違晉書禮志中宋書禮志二下傅玄皇甫陶詔二常侍懇懇於所論可謂乃心欲佐益時事者也而主者率以常制裁之豈得不使發憤邪二常侍所論或舉其大教而未備其條目亦可便令作之然後主者入坐廣共研精凡關言於人主人臣之所至難而人主苦不能虛心聽納自古忠臣直士之所慷慨也其甚者至使杜口結舌每念於此未嘗不歎息也故前詔敢有直言弗有所距庶幾得以發懞補過獲保高位喉舌納言諸賢當深解此心務使下情必盡苟言月偏善情在忠益不可責備於一人雖文辭有謬誤言語有失得皆當曠然恕之古人猶不拒誹謗況皆善意在可採録乎近孔鼂綦母和皆按以輕慢之罪所以皆原欲使四海知區區之朝無諱言之忌也又每有陳事輒出付主者主者衆事之本故身而所處當多從深刻至乃云恩貨當由上出出付外者寧縱刻峻是信邪故復因此喻意晉書傅玄傳又群書治要三十引晉書詔徙陵勿煩擾居人昔舜葬蒼梧農不易畝禹葬成紀市不改肆上惟祖考清簡之旨所徙陵十里內居之動為煩擾一切停之晉書武帝紀以高陽王圭督鄴城守詔鄴城守事宜速有人又當得親親有文武器任者高陽王圭今未之國雖當出為蕃輔以才幹事亦古之制也其以圭為督鄴城守事北中郎將御覽二百四十一引晉起居注詔議通糴法夫百姓年豐則用奢凶荒則窮匱是相報之理也故古人權量國用取贏散滯有輕重平糴之法理財鈞施惠而不費政之善者也然此事廢久天下希習其宜加以官蓄未廣言者異同財貨未能達通其制更令國寶散於穰歲而上不收貧弱困於荒年而國無備豪人富商挾輕資蘊重積以管其利故農夫苦其業而未作不可禁也今者省徭務本并力墾殖欲令農功益登耕者益勸而猶或騰踴至於農人並傷今宜過糴以充儉法主者平議具為條制晉書食貨志通典十二諸王國領兵詔大國三軍領兵五千人次國二軍領兵三千人小國一軍領兵二千人上中下三等將軍書鈔七十一引晉起居注敘用魏宗曹翕詔翕秉德履道魏宗之良今琨遠至其假世子印綬加騎都尉賜服一具錢十萬隨才敘用魏志東平靈王徽傳封夏侯惇近屬詔惇魏之元功勳書竹帛昔庭堅不祀猶或悼之況朕受禪於魏而可以忘其功臣哉宜擇惇近屬劭封之魏志夏后惇傳注引晉陽秋以侯史光為御史史丞詔光忠亮篤素有居正執義之心歷職內外恪勤在公其以光為御史中丞雖屈其列校之位亦所以伸其司直之才晉書侯史光傳追贈王沈司空詔夫表揚往行所以崇賢垂訓慎終紀遠厚德興教也故散騎常侍驃騎將軍博陵元公沈蹈德居正執心清粹經綸墳典才識通洽入歷常伯納言之位出幹監牧方嶽之任內著謀猷外宣威略建國設官首登公輔兼統中朝出納大命實有翼亮佐世之勳其贈沈司空公以寵靈既往使沒而不朽又前以翼贊之勳當受郡公之封而固辭懇至嘉其讓德不奪其志可以郡公官屬送葬晉書王沈傳立皇太子詔諭群臣朕以不德託於四海之上兢兢祗畏懼無以康濟寓內思與天下式明王度正本清源於置胤樹嫡非所先務又近世每建太子寬宥施惠之事間不獲已順從王公卿士之議耳方今世運垂平將陳之以德義示之以好惡使百姓蠲多幸之慮篤終始之行曲惠小仁故無取焉咸使知聞晉書武帝紀統承大業懼未能光祖宗之遺德至於建嗣樹嫡非所務也初學記十引晉起居注泰始三年有司奏正統立嫡詔云云案此即前詔而文互異故並録之立皇太子不大會詔情懷哀慘每歲正會以四方集故不從心耳此日可不會通典一百四十七報文立辭太子中庶子詔古人稱與田蘇遊非舊德乎華陽國志十一原孔朝上書犯諱詔朝自理頃所稱引雖不與今相值然情有所由其特原之然則自今以後三帝諱情亦矍然長吏以上足間禮法可如舊科其餘散官以下但有謬語者不可具責又古者內諱不出宮但勿聽以為名字至於吾名但在見避過禮其或過謬皆勿卻問以煩簡書也通典一百四議增吏俸詔古者以德詔爵以庸制祿雖下士猶食上農外足以奉公忘私內足以養親施惠今在位者祿不代耕非所以崇化之本也其議增吏俸晉書武帝紀以義陽王望為太尉詔夫尚賢庸勳尊宗茂親所以體國經化式是百辟也且台司之重存乎天官故周建六職政典為首司徒中領軍以明德近屬世濟其美祖考創業翼佐大命出典方任入贊朝政文德既著武功宣暢逮朕嗣位弼道惟明宜登上司兼統軍戎內輔帝室外隆威重其進位太尉中領軍如故置太尉軍司一人參軍事六人騎司馬五人又增置宮騎十人并前三十假葆羽鼓吹晉書安平王孚附傳望孚第二子以荀顗為司徒詔昔禹命九官契敷五教所以弘崇王化示人軌儀也朕承洪業昧于大道思訓五品以康四海侍中司空顗明允篤誠思心通遠翼亮先皇遂輔朕躬實有佐命弼導之勳宜掌教典以隆時雍其以顗為司徒晉書荀顗傳案書鈔五十二引晉起居注兩條並作六年誤詔答侯史光太保耆艾元老高行清粹朕所毗倚以隆道宏治者也前後遜讓不從所執此非有司所得議也其寢光奏御覽二百六引晉書御史中丞侯史光上言祥久以疾病闕廢朝會應免官詔云云案書鈔五十二引王隱晉書前四句同今晉書王祥傳有刪節王祥致仕詔古之致仕不事王侯今雖以國公留居京邑不宜復苦以朝請其錫几杖不朝大事皆咨訪之賜安車駟馬第一區錢百萬絹五百匹床帳簟褥以舍人六人為睢陵公舍人置官騎二十人以公子騎都尉肇為給事中使常優遊定省又以太保高潔清素家無宅宇其權留本府須所賜第成乃出晉書王祥傳以何曾為太保詔蓋謨明弼諧王躬是保所以宣崇大訓克咸四海也侍中太尉何曾立德高峻執心忠亮博物洽聞明識弘達翼佐先皇勳庸顯著朕纂洪業首相王室迪惟前人施於朕躬實佐命興化光贊政道夫三司之任雖左右王事若乃豫違汝弼匡獎不逮則存乎保傅故將明袞職未如用乂厥辟之重其以曾為太保侍中如故晉書何曾傳博議中山王睦立禰廟詔禮文不明上制度大事宜令詳審可下禮官博議乃處當之晉書高陽王睦傳許中山王睦立禰廟詔禮諸侯二昭二穆與太祖之廟而五太祖即始封君也其廟不毀前詔以譙王中山王父非諸侯尊同禮不相厭故欲令各得祭以申私恩也然考之典制事不經通若安平王諸子並封皆得立廟祭禰親盡數終其廟當毀無故下食友庶之國猥更隨昭穆而廢非尊祖敬宗之義也其如前奏施行通典五十一追封文明王太后母羊氏詔昔漢文追崇靈文之號武宣有平原博平之封咸所以奉尊尊之敬廣親親之恩也故衛將軍蘭陵景侯夫人羊氏含章體順仁德醇備內承世胄出嬪大國三從之行率禮無違仍遭不造頻喪統嗣撫育衆胤克成家道母儀之教光於邦族誕啓聖明祚流萬國而早世殂隕不遇休寵皇太后孝思蒸蒸永慕罔極朕感存遺訓追遠傷懷其封夫人為縣君依德紀諡主者詳如舊典晉書文明王皇后傳御覽又見二百二詔稱張華張華為黃門侍郎博覽圖籍四海之內若指諸掌書鈔五十八引王隱晉書泰始三年詔
