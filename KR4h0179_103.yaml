body:
  text: 卷一百零三陸雲與戴季甫書七首與戴季甫書雲頓首頓首惟夏始暑願府館萬福疾病處遠人信希少情問闕替中間曠年瞻慕敬想興言反側隆敦比辱慰誨銜抱豐眷以增愚迹不勝勤企謹及君之書不以備陸雲頓首頓首曠遠以來忽踰年載宗想輝蔭引領惟慕東歸之後疾患增瘵且道路悠遠不值信便久念自修而經年不果雖在伏枕至於結心注望實係光塵纍蒙誨命舊眷惟新執對之日如或面展長塗自替聽誨未由瞻企勤戀守以委重表不具今更繼情季鸞公世相係徂落俊德茂業邦家之彥一朝並逝永爾淪沒哀痛切裂不能自勝奈何奈何江南初平人物失敘當賴俊彥彌縫其闕加在二賢楚國之良沉寶積實未童大朝重惟痛恨言增哀咽誠念仁風篤烈如在疇昔意愛所隆嗟悼之心誠不可言備蒙其分情兼切傷加承仁誨益以惻愴武陵於荊州云多人士聞周孟子伍令明潘世長諸人並為美德心常依依今日遭遇良驥展士之秋也不審達者凡有幾人無因聽承誨語咨稟未聞每懷勤企表不盡言長游前下停此十餘日想德欣喜無以為喻分別恨恨于今戀之當暑遠涉益追心懸清粹沈茂思敏通微居德履道秉心真實貴一時良彥君之別久見之歡察風姿美令心神烈暢已成美器欽愛之情款然至實近聞若思未有通塗每用於邑周安東昔奄薨徂追慕切剝不能自勝勳業弗究早爾背世遺惠鄙州民物同哀備記名義情兼切裂在此會同每言高重武陵至心款列誠念篤終必垂悽愴王季楊孝友行素既簡清塵在此接近備其所顧居心秉尚用志不苟公私操實足為美器今為土斷品還此郡前群小虛妄遂下其編牒為之憤歎人物遠主彝倫多失願垂末光益有以潤區區至心謹復言意戴彥遠永昌猶為遠小想其必有惠政耳郭敬言蒸陽良才遠負為之邑歎以其姿望足以致高想不久爾耳石行文在無錫大有清積一州之高功長吏此家行素道實州閭所稱疇昔接事既盡其才願重榮益以成其實凡在羽埃思附鳳翼風塵所集無不拭目與楊彥明書七首與楊彥明書七首雲白欽明去書不悉彥先來得書以為慰時去苒荏歲行復半悲此推移終然何及漸已欲熱想自如常悠悠守限良談未日眇然東望思以敘至及反憒罔不多行矣愛德往來相聞陸雲白省示纍紙重存往會益以增歎年時可喜何速之甚昔年少時見五十公去此甚遠今日冉冉已近之已耳順之年行復為憂歎也柯生而多悅樂春未厭秋風行戒已悲落葉矣人道多故歡樂恆乏敖遊此世當復幾時各爾永鬲良會每闌懷想親愛寤寐無忘書無所悉彥先來相欣喜便復分別恨恨不可言階塗尚否通路今塞令人罔然名論允進遠而有光者度此顯期不淹民望耳廟堂之士比迹山栖者悲歎豈唯一人少明湘公亦不成遷名公之舉且可以為資然今恨恨當行行復有宜耳彥先相說疾患漸欲增廢深為怛然行向衰篤疾來應百年之望雖未必此為疑然親親所以相恤之一感耳想勤服藥行復向佳耳吾既常嬴間來體中亦恆少賴日爾勿勿則堪自力未速待罪會期難剋情之戀想何勞之多好自愛屢相聞行言竟行令人恨之已當至未耶能少留不世明篤行至性如前後所論語其偶爾旋已能悟耳而聞其遂於訴其使愕然寧以所不可虧一國之清格乎輒便絶意彥先所一二戴會稽如是便發分別恨然一時名士唯當有此君耳失分重勞令人歎息善得日夕真家人若思望之清才俊類一時之彥善並得接九月中可得達東禮衡陽長沙甚快東人近未復有見敘者公進屈久恆為邑罔黨方有清塗薄國讓在內中大有好稱此家一時美德也在事又佳甚快其快永耀已葬冥冥遠矣存想其人痛切肝懷奈何奈何聞伯華善佳深慰存亡人生有終誰得免此且使繼嗣克勝堂構有紹亦存亡之願也朋類喪索同好日盡如此生輩那可復多耶臨書酸心與陸典書書十首與陸典書書七十首雲再拜自曠但爾已復經時限制長路惟親未期吟近晨風傾匡結言來誨綢繆篤眷彌隆誦玩千周以當侍會靜言莫瞻翹翹仰慕大人泛愛在我尤弘每銜思戀何時去心限此省省願言用替遙瞻靈丘感時情傷往來信理自更繼情如有信唯不玉音雲再拜侍郎比侍數會同邪常憶戀此君不慚有殞此君公私並懀年長而志新齒邁而曾勤家宗美者也常感其篤分封之始年相見重達其至心雲再拜日月運邁何一流速銜哀經變繫思愈深亡靈處彼黃塘幽曠在遠之億心常愴裂含痛靡及悠悠奈何想時時復一省視思至心破無所厲情叔父一兄故尚未達想不久至耳深憂徙際公私哀罔曠離山墓永適異國四時靈寂桑梓靡循且念親各爾分析情感復結悲嘆而已知大人每垂恤逮也臨表悲猥絶筆餘哀不知所次雲再拜每念彥先情兼剝裂年盛志美令姿可借舉言及此不知心傷也雲再拜國士之邦實鍾俊哲太伯清風遁世立德龍蜿東嶽三讓天下垂化邁迹百代所晞高蹤越於先民盛德稱乎在昔續及延陵繼嚮馳聲沉淪漂流優遊上國所音察微智越衆俊通幽暢遐明同聖荷言偃昭烈於孔堂員武邁功於諸侯自秀偉相承明德繼踵亦為不少吳國初祚雄俊尤盛今日雖衰未皆下華夏也來誨所及遐邇同懷重及二聖下逮衆子或生羌狄或在邊域勳美之隆實如嘉誨愚以東國之士進無所立退無所守明裂眥苦皆未如意雲之鄙姿志歸丘壟篳門閨窬之人敢晞天望之冀至於詔季禮之遐蹤結鬲肝於中夏光東州之幽昧流榮勳於朝野所謂窺管以瞻天緣木而求魚也重申不烈雲再拜雲再拜每惟大人挺自然之妙質稟淵姿之弘毅克壯其烈兼詠之道希文尚武潛居以娛其志靜處以育其神遊步八素之林逍遙德化之囿豈如未者牽曳𤍒𤍒世道通明俊乂在官焉使晞世之寶久隱岑崟之山逸景之迹永縶幽冥之坂方將車乘回輪束帛箋箋排金風於太微跨天路以妙觀恢皇綱之大烈垂榮祚乎祖宗此乃大人之所宜循非凡夫之可企望也無因親展書以言心心之所積萬不敘一雲再拜雲再拜巨卿前行陵有小事唯以具聞事已大了猶以為願行欲取歸念別方至豫以愍然每相見未嘗不以大人為言想令仁士光令遠公然兄弟屢數常存思想想令遠分好已為綢固彥恩復蒙誘掖耳無因觀對言不盡心屢垂誨以慰遠思雲再拜雲再拜巨卿在臺高譽洋溢洛邑之內無不欽敬東南之貴寶真不但會稽之篠蕩也每會常共歌詠信無一面不歎吟也想方周旋攜手散今日之思耳雲再拜雲再拜輒宣來意仲應此家大自欽重大人黨已見其意耳雲再拜不知從事今在州得假歸耳想今來得行有緣侍面耳每得令遠書感賴豐化言歸于款來誨恤及亦為無已情深欣如云在身年歲及人名聞難集非賴師友何以自濟願敦惠助為之光輔巨仁在此華亭之望以大人為宗主宜令小大得分亦崇洪業也雲再拜答車茂安書雲白前書未報重得來況知賢甥石季甫當屈鄮令尊堂憂灼賢姊涕泣上下愁勞舉家慘戚何可爾耶輒為足下具說鄮縣土地之快非徒浮言華艷而已皆有實徵也縣去郡治不出三日直東而出水陸並通西有大湖廣縱千頃北有名山南有林澤東臨巨海往往無涯泛船長驅一舉千里北接青徐東洞交廣海物惟錯不可稱名遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意高下在心舉鈒成雲下鈒成雨既浸既潤隨時代序也官無逋滯之穀民無飢乏之慮衣食常充倉庫恆實榮辱既明禮節甚備為君甚簡為民亦易季冬之月牧既畢嚴霜隕而兼葭萎林鳥祭而罻羅設因民所欲順時遊獵結罝繞堽密罔彌山放鷹走犬弓弩亂發鳥不得飛狩不得逸真光赫之觀盤戲之至樂也若乃斷遏海浦隔截曲隈隨潮進退采蚌捕魚鱣鮪赤尾䱟齒比目不可紀名繪鰡緮炙䱥鯸蒸石首臛䳐鴽真東海之俊味肴膳之至妙也及其蚌蛤之屬目所希見耳所不聞品類數百難可盡言也昔秦始皇至尊至貴前臨終南退燕阿房離宮別館隨意所居沉淪涇渭飲馬昆明四方奇麗天下珍玩無所不有猶以不如吳會也鄉東觀滄海遂御六軍南巡狩登稽嶽刻文石身在鄮縣三十餘日夫以帝王之尊不憚爾行季甫年少受命牧民武城之歌足以興化桑弧蓬矢丈夫之志經營四方古人所嘆何足憂乎且彼吏民恭謹篤慎敬愛官長鞭朴不施聲教風靡漢吳以來臨此縣者無不遷變尊大夫賢姊上下當為喜慶歌舞相送勿為慮也足下急啓喻寬慰具說此意吾不虛言也停及不一一陸雲白弔陳永長書五首弔陳永長書五首雲頓首頓首哀懷切怛賢弟永曜早喪俊德酷痛甚痛奈何陸士龍頓首頓首雲頓首頓首天災橫流禍害無常何圖永曜奄忽遇此凶問卒至痛心摧剝奈何奈何想念篤性哀悼切裂當可堪言無因展告望企鯾咽財遣表唁悲猥不次雲頓首永曜茂德遠量一時秀生奇蹤瑋寶灼爾凌群光國隆家人士之望冀其永年遂播盛業攜手退遊假樂此世奈何一朝獨先雕落奄聞凶諱禍出不意拊心痛楚肝懷如割奈何奈何豈況至性何可為心臨書鯾塞投筆傷情與永曜相得便結願好契闊分愛恩同至親憑烈三益終始所願中間離別但爾纍年結想之懷夢寐仿佛何圖忽爾便成永隔哀心慟楚不能自勝痛當奈何奈何義在奔馳牽役萬里至心不敘東望貴舍雨淚沾襟今遣吏并進薄祭不得臨哀追增切裂幸損至念書重不知所言永曜素自強健了不知有此患險戲之災遂不可救豈惟貴門獨喪重寶此賢之殞邦家以瘁情分異他痛心殊深已矣遠矣可復奈何追想遺規不去心目悠悠無期哀至悲裂不知何言可以言知酷楚而已弔陳伯華書二首弔陳伯華書二首大君遠資高數世之瑰瑋當光裕大業茂垂勳名奈何日朝早爾喪墜自聞凶諱痛心割裂追惟哀摧肝心破剝痛當奈何奈何相念夙年奄嬰哀艱扳慕不及當可為心牽役遠路無因奔馳東望靈宇五情哽咽割切哀慕書重感猥不次昔與大君分義款篤彌隆之愛恩加兄弟憑此烈好要以始卒何圖大君獨先早世遠聞訃問若喪四體拊心慟楚肝心如割奈何奈何豈況至性當何可言今遣吏恭集薄祭不得臨喪以敘悲苦計往人到貴舍之日揮涕而已投筆歔欷書三月十六日雲白春節餘不適得示知足下平安為思面未知何由如何信數之及鄉既清邃可與經高言人欽之當令征南取之也淳化閣帖二嘲褚常侍六年正月前臨川府丞褚為常侍君子謂吳如是乎能官人官人國之所廢興也古之興王唯賢是與呂望漁釣而周王枉駕寧戚叩角而齊王忘寐委斯徒而靡好爵釋短褐而服龍章姬姜之族非無人也親昵之愛非無懷也取彼庸賤之徒登之佐臣之列故九賢翼世而有命既集五子佐時匡霸以濟夫唯能官人之所由也褚氏大夫之常佐遠邦之賤司才則邵矣官實陋矣而拔出群萃超升階闥雖文王登師桓公取佐亦何以加之詩曰濟濟多士文王以寧言官人得才也褚常侍聞之喜曰君子之言豈虛也哉吾得此足矣君子謂褚常侍於是乎不謙謙也者致敬以存其位者也謙之不存德無柄矣世之治也君子自以為不足故撙節以求役于禮敬讓以求安于仁世之亂也在位者自以為有餘故爵豐而求更厚位隆而欲復廣世之治教恆由此作今褚侯蟬蛻利木鵠鳴玉堂不庶幾夙夜允集衆譽而意充於一善心盈於自足足則無求盈則無戒不求則善遠之無戒則惡來之亦何以為君子哉詩云戰戰兢兢如臨深淵慎之至也褚常侍聞是言也懼謂之昌言也而拜之君子曰褚侯其幾矣聞善而喜過又應之懼嘉服義之賢而拜讜言之辱規同禹迹義均罪己君子哉吳無君子斯焉取斯牛責季友天造草昧萬物化淳類族殊品莫向乎人令子履方象以矩地戴圓規以儀天該芳靈之疑素挺協氣於皓玄故神窮來哲思洞無閒踊翰則憤凌洪波吐辭則辨解連環子何不絶淵而躍照日之光使穎秀暘谷景溢扶桑俯經見龍之輝仰集天人之堂雖子之服既玄而素今子之滯年時云暮而冕不易物車不改度子何不使玄貂左弭華蟬右顧令牛朝服青軒夕駕軺輅望紫微而風行踐蘭塗而安步而崎嶇隴坂息駕郊牧玉容含楚孤牛在疾何子崇道與德而遺貴與富之甚哉日月逝矣歲聿其暮嗟呼季友盛時可惜逮良期於風柔競悲飆於葉落陳讜言於洪範圖遺形於霄閣使景絶而音流芬身薦而榮赫奕子如不能建功以及時豫請迹於桃林之薄有皇詩序有皇美祈陽也祈陽秉文之士駿發其聲故能明照有吳入顯乎晉國人美之故作是詩焉思文詩序思文美祁陽也祁陽能明其德刑于寡妻以至于家邦無思不服亦賴賢妃貞女以成其內教故作是詩焉谷風詩序谷風懷思也君子在野愛而不見故作是詩言其懷思之也鳴鶴詩序鳴鶴美君子也太平之世君子猶有退而窮居者樂天知命無憂無欲收碩人之考槃傷有德之遺世故作是詩也南衡詩序南衡美君子也言君子遁世不悶以德存身作者思其以德來仕又願言就之宿感白駒之義而作是詩焉從事中郎張彥明為中護軍詩序奚世都為汲郡太守各將之官大將軍崇賢之德既遠而厚下之恩又隆悲此離析有感聖皇顯崇既蒙引見又宴于後園感鹿鳴之宴樂詠魚藻之凱歌而作是詩登遐頌夫死生存亡二理之已然者也而世有神仙登遐之言千歲不死之壽其詳固難得而精矣列仙之道作者既集而登遐未有焉莊周有言我試妄言之子試妄聽之彼之有無蓋難以理求我之妄聽顧可以言寄之遂為頌云爾郊間人淵哉郊間懷寶採薪媚茲伯陽常道是夤俯翼遂周攜手入秦遺物執一妙世頤神思我玄流浩若無津王子喬王喬淵默遂志潛輝遺形靈嶽顧景亡歸孌彼有傳與爾翻飛承雲倏忽飄颻紫微玄洛玄洛妙識飢餌神穎在陰倏逝即陽無景逍遙北嶽凌霄引領揮霧昊天合神自靖孔仲尼孔丘大聖配天弘道風扇玄流思探神寶明發懷周興言謨老靈魄有行言觀蒼昊清歌先試丹書有造九疑仙人茫茫九疑登暉太素有漢登聞神具爾顧發彼靈丘聿來載步貽我則歌永揚遐祚大勝山上女大勝之娥厥猶翼翼降宮有和納符帝側揮杖指辰絶音頽息苕苕玄右在彼峻極李少君少君善祠怡爾豐顏俯覲劉漢仰接姜桓式宴安期巨棗為餐神光攸往後來其嘆梅福在漢之衰頽火炎精梅公指景有皇遺形逝彼文辭胥此洞庭神輝絶景豈外北冥張招張招澄精妙思玄芒則是神物錯綜徽章乃幽乃顯若存若亡因形則變倏忽無方左元放生在清純放情玄昧在物淵沉沂虛攸遂清酒一壺百朋具醉有命集止乘龍來萃載見君子言觀其蔚劉根劉根登嵩遺世盤桓形委服容口厭瓊蘭挹彼呼翕為爾朝餐景絶巖穴光茂雲端黃伯嚴伯嚴志道翻飛自南北食中嶽練形嵩岑奔星凌顏朱光垂陰雲精九陔握耀盈襟費長房長房有懷承師問道蒙險洪海晞心玄浩將登蓬萊祚爾難老嘉命既錫如何勿考何女子逝矣何女芳靈既雕安寢曾丘逝魂清宵喪魄載營大墓崇朝玉趾再步於焉逍遙焦生焦生卜居在河之東皓襟解帶嘉卉結容頤神大素淑思玄沖在彼黃堂明道固窮鮮卑務塵北狄務塵在彼沙漠含神自頤靜居有恪自彼王庭聿來伊洛天子命之載見紫閣韓衆夷門子衛矣終化靈毛揚葩慎爾貞心神祉來荷靡靡夷門體道含真餐茹靈卉凌雲頤神林陽子任作子林陽餌車明視聰耳壯子既餐步晞千里任化凱入輕雲揮止移形善變載坐載起鬼谷子悠悠鬼谷永言潛止要終有集資生無始綢繆方平在彼二子芬響蘭揮有來盈耳盛德頌余行經泗水高帝昔為亭長於此瞻望山川意有慨然遂奏章以通情焉并為之頌云爾晉太子舍人糞土臣雲稽首再拜上書皇帝陛下臣雲頓首死罪伏惟陛下紹軒轅之睿哲越三代之高蹤膺有聖之玄景詠生民之上略秦政肆虐漸舋生民在昔上帝乃眷多方肅雍寶命鑒民顧天思文睿聖以宅神器六合炎駕八荒星錯企皇后於阿房掎逸鹿於九野謀猷回遹天人匪祚乃薾斯國授漢于西京是以先紹五緯章太素神母哀號底命丹野九垓闢授命之符鈞天清建皇之鑒陛下螭蟠泗水龍躍下亭慶雲徘徊紫塵熠爍皇威肇於斷蛇神武基於豐沛掩四緱以蓋天廓玄謨以闢宇華宮山藏玉堂海紬雲蓋景陰金門林蔚拔足崇長揖之賓吐餐納獻規之容玄猷上通德輝下濟仰翰雲禽俯躍魚魴是以四海之內莫不企景嶽以接群望廣川而鱗集乘山涉水視險若夷奔波闕廷思效死節乃鳴鸞在衡奔驥服輅良平鳳栖信布虎據豪雄凌暴於外奇謨補闕乎內威謀兼陳智勇畢效乃凌河海河海無梁乃仆高山嶽華不重三秦席卷項籍灰分逋虜霧散遺寇雲徹泛時雨以清天灑狂塵以肅地轡於舟輿竦峻蓋於蒼昊功濟宇宙德被群生天人允嘉民神協愛歷數在身有命將集而陛下猶復允執高讓成功靡有普天歸德群后固請然後謁天皇於圓丘巡萬乘於帝室率土離暴秦之亂臣妾蒙有道之惠戎羌蠻夷之墟雕趾肅慎之國莫非帝臣巍巍蕩蕩蓋天臨地自啓闢以來有皇之美未有若聖功之著盛者也臣雲頓首頓首死罪死罪臣以鄙倍文武無施忝寵本朝承乏下位而臣遘愍自西徂東行邁攸止路經泗水伏見史臣班固撰録聖功竊承陛下扶桑始照天暉未融之日嘗臨御此川於是即命舟人弭楫水沚瞻仰山川舊物不替永惟聖輝罔識所憑遠眺邇全感物興哀終懷靡及俯心遐慕臣命違千載之運身生四百之外恨不得役力聖明之鑒寓目風塵之會揮戈前隊待罪下軍抽鋒咸陽之關提鉞項籍之領痛心自悼不知所裁行役之臣牽制朝憲雖懷倣徨王事靡盬肅將言邁實銜罔極臣聞遊魂變化神道無方雖聖靈登遐降陟在天連光五精流輝太一或冀神輿降觀薄狩五服時邁玉輅言巡茲邑是以下臣仰瞻紫宮俯要恍惚愚情振蕩靡審所如不勝延頸紫微結心閶闔之情謹住水濱拜章陳愚臣雲誠惶誠恐頓首頓首死罪死罪臣稽首以聞臣雲言臣聞歌詠所以宣成功之烈詩頌所以美盛德之容是以聞其聲則重華之道彌新存其操則文王之容可覩永惟陛下聖德豐化比隆前代元勳茂功超蹤在昔故詩歌之所依詠金石之所揄揚者也臣謹上盛德頌一篇雖不足以仰度天高伏測地厚貴獻狂夫區區之情臣雲云云晉太子舍人臣陸雲上於皇漢祖纂胄有唐平章在昔文思百王丹輝栖烈火精幽光爰茲聖緒頽維弛綱靈曜熠爍隮景扶桑則天未墜重規旻蒼其規伊何橫乾作峻厥德不回矩地能順憑河拓景襄嶽殷韻龍章景偉虎質碩變有秦不競罔極黔首震驚豫師思虔神主上帝曰咨天鑒有赫乃眷伊漢此惟豫宅明明聖皇既受帝祉雲騰下邑風駭泗水仰鏡天文五緯同晷俯察雲符神母爰止思文聖王克廣克遐威凌群桀德潤諸華爰祀天人天人攸嘉爰輯蒸徒蒸徒既和既和既順乃矢德音豐沛之旅其會如林朱旗虹超彤旆電尋推師蕭曹撫劍高吟元戎薄伐時罔不龕凌波川潰肆野陸沉威陽克殄既係秦后峨峨阿房乃清帝宇穆穆聖皇天保攸定有項畔換不式王命王命既愆黜我西土於鑠王師遵時匪怒爰赫乘舋席卷三夏嘽嘽戎軒矯矯乘馬燮伐強楚至于垓下天誅薄曜暴籍授首區夏既混宇宙蒙乂肅肅帝居巍巍神器有皇于登是臨天位繡文于裳組華于黻明明天子有穆其容至止鏘鏘相惟辟公宣聲路寢發號紫宮頒此愷悌以畜萬邦思樂皇慶協于時雍琴瑟在御大豫舞功越裳委贄肅慎來王明明聖皇闓國乘制分圭昨勞河山命誓禮律克彰典文垂藝有漢恢恢疏罔不替聖功克明九方孔安良宰內幹武臣外間漸澤冀域沾被戎蠻連光太素萬載不刊
