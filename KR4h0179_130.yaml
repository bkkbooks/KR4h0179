body:
  text: 范宣答殷浩問殷浩問范宣曰其士大夫之嫡者公子之宗道也請解其義答曰其士大夫之嫡者言上二宗唯施公子之身至諸公子有子孫各祖公子以為別子各宗其嫡子以為大宗代代相承然後乃成別子之後百代遷之宗者也所以舉其士大夫之嫡者明公子之子孫不復宗公子之宗又嫌庶宗昆弟之子孫復為小宗故特舉嫡以號之也凡母弟及庶昆弟所謂庶宗大宗正論其一代之嫡庶耳至于各有子之後長子皆成嫡也公子之宗道言公子之宗道成故重釋也通典七十三殷浩問范宣曰有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也公子有宗道公子之公為其士大夫之庶宗請解之答曰有小宗而無大宗者謂君之諸弟同庶者君命庶長為衆庶之宗則名小宗則服大功九月者是也有大宗而無小宗者謂君有同母弟命以為宗則群庶昆弟宗之則名大宗服齊衰九月者是也昆弟既親又是庶中之正者也有無宗亦莫之宗者謂公子唯已而已則上不敢宗君下無昆弟宗已者是也公子有宗道者禮諸侯于其非正嫡一無所服則群昆弟亦不敢相服則無相統領無相統領則不可不立宗立宗然後有服耳故云公子有宗道也公子之公公者君也此立宗君命所制嫡自相推故又舉公以明之也為其士大夫之庶宗者此獨說庶宗者兼上總謂有小宗而無大宗者為混故復指解小宗之義則大宗自然了也所以統大夫庶宗者諸侯庶昆弟有為大夫也所以正舉大夫者所宗庶長或可為士兼大夫位尊不相宗故云為大夫之庶宗以斷疑也通典七十三咸康末殷泉源問天子諸侯臣致仕服有同異范宣答云夫禮制殘缺天子之典多不全具唯國君之禮往往有之臣之致仕則為舊君齊衰三月天子之臣則亦然矣天子之與國君雖名號差異至于臣子奉之與主者無殊矣何以明之公羊傳曰以諸侯踰年稱即位亦知天子之踰年稱即位以天子三年然後稱王亦知諸侯于其封內三年稱子比例如此則臣服之制同矣通典九十答兄子問四祖遷主禮舜廟所祭皆是庶人其後世遠而毀不居舜上不序昭穆今四君號猶依本非以功德致禮也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變別築一室親未盡則禘祫處宣帝之上親盡則無緣下就子孫之列宋書禮志三答萬蔣問次孫傳重萬蔣問范宣嫡孫亡無後次子之後可得傳祖重不宣答禮為祖後者三年不言嫡庶則通之矣無後猶取繼況見有孫而不承之邪庶孫之異于嫡者但父不為之三年祖不為之周而孫服父祖不得殊也通典八十八答雷孝清問雷孝清問曰為祖母持重既葬而母亡服制云可別開門更立廬不言稱孤孫為稱孤子范宣曰案禮應服後喪之服承嫡居諸父之上一身為兩喪之主無緣更別開門立廬以失居正之意至祖母練日則變除居堊室事畢反後喪之服禮無書疏稱孤子孤孫之文今代行之合于人情稱孤孫存傳重之目宜至祖母訖服然後稱孤子通典九十七答或問或問曰曾祖墓從祖墓毀廢哭制云何范宣曰禮不見在遠直聞墓發制唯經見改葬緦此施臣子妻是承嫡者當依此禮非嫡有降祖三日哭從祖一日哭可也通典一百二難段畼諒暗議范宣曰所以知諒暗為凶廬者案禮葬後柱楣楣則梁也明葬後居廬所以為義畼曰昔武王崩成王立周公攝政明年既葬周公冠成王而朝于祖以見諸侯此天子卒哭除喪之證也春秋在喪王曰小童公侯曰子既葬則無此稱此除服證也范宣難曰禮葬後飲食衣服皆有降殺設君臣之稱安得不異畼曰春秋文八年秋八月襄王崩九年春毛伯來求金傳曰不書王命未葬也范宣曰禮既葬王政入于國即君名有漸以一朝頓除除服之義多引益惑耳畼引僖王崩未再周惠王享晉虢失禮以名位不同不議喪享而譏公侯同禮又享有籩豆之薦聘則陳幣太廟授玉兩楹此聞樂不樂食旨不甘除服證也范宣曰朝聘之禮國有喪皆有撤損不與平同也周禮掌客職賓客有喪唯芻稍之受是明主人設饗是儀有等級之品客受芻稍循情之事是以往往有享文耳且或有急尊王室或有安衛社稷事出無方歸于時宜事訖反服于禮何傷于啐嚌示義而信以為食旨亦其昏矣畼引春秋僖七年閏月惠王崩九年夏王使宰孔賜齊侯胙曰天子有事于文武以為王喪再周少五月而猶事文武明王為卒哭除喪即位而祭廟矣所謂蒸嘗禘于廟也宣曰夫祭祀之禮有正有變所以然者或將有所施不必一也禱類祈禡豈一道乎武王出祔以燎豈是常郊邪天地猶然況宗廟乎禮不墓祭而尚祭乎畢又不于宗廟而祀在坶室且禮去祧為壇去壇為墠而周公請命告太王以下而三壇同墠此豈非變禮乎當襄王之時逼于王子帶不敢發喪潛使告于齊常有憂懼之色故或為權禮于文武告請之祀非其常典故云有事于文武而不稱禘祫于宗廟也能究變正之義始可與談春秋耳通典八十禮二墓論史記及孔安國說皆為實録未生之前不可以逆貴夫子也既長謁墓固以識其外矣但母不告其內義無強請然祔葬宜詳是以問焉記但言不知其墓非都不知也所以不應者欲言非禮則弟子有忘敬之情欲言是禮則墓不須防而而固然言及宅兆是以流涕耳防亦防虞此豈地名猶傳言文公之入也無衛非無康叔之國也通典一百三賀僑妻于氏養兄子率為後議夫所謂為人後者有先之名也言其既沒于以承之耳非竝存之稱也率為嶠嗣則猶吾子群之平素言又惻至其為子道可謂備矣而猥欲同之與為人後傷情棄義良可悼也昔趙武之生濟由程嬰嬰死之日武為服喪三年夫異姓名義其猶若此況骨肉之親有顧復之恩而無終始之報凡于氏所據皆有明證議不可奪通典六十九令文無子而養人子以續亡者後于事役復除無回避者聽之不得過一人令文養人子男後自有子男及閹人非親者皆別為戶案嶠自有纂率應別為戶通典六十九于氏養兄子率為後議案于所陳雖煩辭博稱竝非禮典正義可謂欲之而必為之辭者也臣案尚書闓議言辭清允析理精練難于之說要而合典上足以垂一代之式愚以為宜如闓議通典六十九陳詵後妻之子為前妻服議詵既不能庇其伉儷又未審李之吉凶無感離之慘便歡會納妻悖禮傷教皆此之由又詵協嚴迎李籍注二妻李亡之日乃復疑服若小人無知不應有疑及其有疑明知妻不可二生亂其名沒疑其服喪亂以來有多此比宜齊之以法通典八十九庶人兩妻不合典制裁之法則應以先婦為主服無所疑漢時黃司農為蜀郡太守得所失婦便為正室使後婦下之載在風俗通今雖貴賤不同猶可依準行通典八十九李氏投身于賊則名義絶矣辱身污行喪禮違義雖有救母之功宜以路人之恩相報不可以泰承宗廟嚴子不宜以母服之李子宜以出母居之通典八十九通咨征西府主及僚寀請詳斷從父姊服姑姊妹無主後者反歸服經雖不及從設教必自親始以經言則宜不降以記論例在加服又與此姊同在他邦無餘親情所不忍準經不降不亦可乎通典九十八駮王群為從父姊反服若從姊夫沒無豫無主後反服可也今已立後殯葬有主祭足下制小功之服方以為後者沒更與本親之情尋其始則喪非無主論其終則五月之末繼以大功之受于制則情禮已降于服則非輕重之序通典九十九忌月議案禮唯云忌日不樂無忌月之文所謂忌日當是子卯今代所忌更以周年日數此事與古不同通典一百禮祇有忌日無忌月語有若有忌月即有忌時忌歲竝無理據通典一百四十七升平元年穆帝納后太常禮官荀訥議又見舊唐書王方慶傳注開陵太后服議如鄭玄注則皇太后不應有服緦謂今皇太后上奉宗廟下臨朝臣宜有變禮不得準之常制通典一百二永和十二年領國子祭酒荀訥議改葬復虞議虞安神之祭神已在廟改葬不應復虞虞則有主訥謂純言為當通典一百二尚書下問改葬應虞與不傅純難改葬安得虞國子祭酒荀訥以為答蔡謨書別示并曹主簿書其中兄在南娶喪亡已三年其兄子該等未曾相見應為服否記云生不及祖父母諸父昆弟而父稅喪已則否先儒以為父異邦而生已不及祖在時歸見之故過時則不服也記云不及而諸儒以為不見文義各異然則不及當謂生不及此親在時也意謂音問既通情義已著雖未相見禮疑從重猶稅服通典九十八答劉系之問為殤後者服劉系之問荀訥禮喪服小記為殤後者服以其服案鄭玄云言為後據承之也殤無為人父之道以本親之服服之案禮取後或可緦麻之親或五服之內若如鄭旨各從本親則為殤後者可有無服之理殤雖無為人父之道今既承之不得不稱之為父稱之為父而無服之處喪即情尋義無服之理有疑訥答曰今相承繼在殤者既沒之後主人新親皆以殤服服之疏族為後更當斬縗三年輕重殊駮非稱情立文也且後大宗當為祭主于先人輕降之服不可久廢祭祀若應重服者記當曰服斬文約而旨明今之所服似非服重也當以為後之故本施成人而不從殤耳通典八十二答劉系之問妻已沒為妻父母服劉系之問荀訥曰禮云母黨不二服親無二統故也以例準則妻黨不二服明矣然母有親繼之別又有出有卒故服外氏有降殺之禮今妻配義一也無繼出之殊今服其黨孰先孰後邪訥答曰妻黨不二服禮所不載母黨有出有繼情事不同謂前妻雖卒終當同穴今妻已理無異前不以存亡為異也且禮無其文當俱有服也或以為同于徒從妻沒則不從服若夫所不服妾何得于徒從君母之黨邪通典九十五答韓康伯問居所後父喪有本親喪服韓康伯問荀訥云有人奉其伯後服制未除復有本父喪當復應還所生兩處作喪位不若作堊室今當服斬先斬以居堊邪答曰今身有所後重服未練雖有所生之喪無所改易既練則當服周布冠幘首絰齊縗先喪既練已有堊室唯當服周以居之耳不復還本家作喪位韓重問既為人後先服重制豈當有改然今要當有時還本哭臨其本親赴弔不設喪位情為不安可于本親兄弟次作堊至歸來處之不荀重答意謂身有所後重服當不得復于本兄弟廬室作堊室歸可設哭位而已通典九十七答段凝問改葬服段凝問嫡孫居父喪未練而改葬祖當何服又出養子居所生父喪齊衰改葬合當何服荀訥云禮父母喪偕葬先輕後重謂便當以重服而葬也若服重可以臨葬則為人後者亦當著齊衰耳禮無的文此意決耳通典一百二請議京兆府君遷主表續太廟奉還于西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世遠祖長在太祖之上昔周室太祖世遠故遷有所歸今晉廟宣皇為主而四祖居之是屈祖就孫也殷祫在上是代太祖也宋書禮志三咸康中太常馮懷表元會敬司徒議天子修禮莫盛于辟雍當爾之日猶拜三老況今先帝師傅謂宜盡敬晉書荀奕傳京兆府君遷主議禮無廟者為壇以祭可別立室藏之至殷禘則祭于壇也宋書禮志三永和二年答或問內外兄弟或謂馮懷曰甲之母乙之姑乙之母甲之姑也世稱姑之子為外兄弟舅之子為內兄弟此亦鄭君所言然甲乙之母俱姑也父俱舅也內外相同親疏無異若甲以姑子稱乙乙以舅子稱甲則事同名異于理不通若相稱之辭同則名例為乖懷對曰禮公子之外兄弟者外祖父母也左氏傳曰聲伯以其外弟為大夫所謂外弟蓋管子奚之子聲伯同母異父之弟也聲伯謂之異弟彼謂聲伯為外兄然則異姓之親通謂之外不必謂吾外者吾謂之內也今稱舅子為內兄弟末俗所云非典言也鄭意還舉俗言以喻俗人故稱焉亦非正名矣依禮據傳甲乙相稱宜通曰外通典六十八答或問從舅是族外弟相稱或謂馮懷曰丙之母丁之從祖姊也丁之母丙之族姑也丙年長于丁若從父族為親則丙以丁為族外弟而丁以丙為從甥若從母族則丙以丁為從舅而丁以丙為從內兄名體乖謬尊卑無序若丙以父族稱丁丁以母族稱丙則例不通將若之何懷答曰聞諸前訓名者人之綱故夫屬于父道其妻為母夫屬于子道其妻為婦今則姑是母班而兄弟是已列故不敢以已之列廢母之班矣謂丙宜執從舅之禮通典六十八甘露啓甘露降學堂柳樹與幹吏共嘗味極甜宜表賀藝文類聚九十八劉曇父與府主同名求解職議案禮諸侯諱祖與父大夫士并諱伯父母及姑又父子之所天尊無以比宜聽解職通典一百四右將軍王遐司馬劉曇父名遐求解職事博士謝詮議答東海國臣刺問為皇后服恭皇后崩時東海國臣弘據刺問禮官大學博士謝詮案儀禮諸侯之大夫為周王繐縗至葬除有正文傳曰諸侯之大夫時接見于天子也至于周王后崩無喪服之制周王天下父周后天下母諸侯大夫宜服繐縗稱情為得通典八十一又刺問云昔元明二帝崩時朝臣皆服斬縗諸國臣繐縗七月今朝臣既為皇后齊周則國臣宜有差降不得亦繐縗也謝詮答曰繐縗止于七月故無降錯綜記例亦謂應有服正疑于無降耳案伯叔母與伯叔父恩義有深淺而服亦同齊曾祖與宗子母妻服無差降推此則何必皆降乎將以取節于既葬故無等邪通典同上劉曇父與府主同名求解職議案禮君子不奪人親故孝經云資父以事君而敬同是以為尊者諱為親者諱曇自別父與將軍同名聖朝垂恩不許曇解可使換官通典一百四
