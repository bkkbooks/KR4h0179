body:
  text: 歐陽建登櫓賦登茲櫓以遐眺闢曾軒以高眄仰天塗之綿邈府平原之曠衍嘉蒼春之令節悅和風之微扇傍觀八隅周覽四垂面孤立之峻峙岨曲岸之修崖植榆楸以成列插垂柳之差差寓目忽以終日情亹亹而忘疲藝文類聚六十三言盡意論有雷同君子問于違衆先生曰世之論者以為言不盡意由來尚矣至乎通才達識咸以為然若夫蔣公之論眸子鍾傅之言才性莫不引此為談證而先生以為不然何哉先生曰夫天不言而四時行焉聖人不言而鑒識存焉形不待名而方圓已著色不俟稱而黑白以彰然則名之于物無施者也言之于理無為者也而古今務于正名聖賢不能去言其故何也誠以理得于心非言不畼物定于彼非言不辨言不畼志則無以相接名不辨物則鑒識不顯鑒識顯而名品殊言稱接而情志畼原其所以本其所由非物有自然之名理有必定之稱也欲辨其實則殊其名欲宣其志則立其稱名逐物而遷言因理而變此猶聲發響應形存影附不得相與為二矣苟其不二則言無不盡矣吾故以為盡矣藝文類聚十九又世說文學篇注告太常父昔為丹陽郡有二臣主簿劉亶留頌等理罪除名今觀父亡居在郡下亶等不來臨喪又不奔葬凡人有喪匍匐救之況于君臣之義乎而亶等敢懷讎君之心公肆夷狄之行通典九十九劉亶留頌告太常自理近為陳事犯忤加鞭付獄亶頌默然待放戮辱放退君臣道絶抱罪之人不敢見靈柩也通典九十九議劉亶留頌等事議劉亶留頌等事案禮君臣之道有合離之義亶等昔為君所棄是為義絶義絶之臣責其自親于君已見放逐求還親臨喪事于事則近僞于禮無此制也通典九十九瀍谷賦嘉高岡之崇峻兮臨玄谷以遠覽仰高丘之崔嵬兮望清川之淡淡爾乃涉重險陟榛薄倚春木臨幽壑深谷豁以窈藹高峰鬱而岝崿藝文類聚九黃甘賦惟江南之奇果資天地之正陽生殊方之妙域植朱鳥之遐鄉處漢之南背江之陰左協蘭皋右接桂林帶激水之清流向崇山之高岑三秋迭運初寒履霜照耀原隰蔭映林荒若菱華之繡綺井燭龍之銜金璫藝文類聚八十六初學記二十八奏薦伍朝臣以為當今資喪亂之餘運承百王之遺斃進趨者乘國故以僥幸守道者懷蘊櫝以終身故令敦褒之化虧退讓之風薄案朝游心物外不屑時務守靜衡門志道日新年過耳順而所尚無虧誠江南之奇才丘園之逸老也不加飾進何以勸善且白衣為郡前漢有舊宜聽光顯以獎風尚晉書隱逸伍朝傳改葬前母服議今禮無其章不復特為之法故取繼母服準事目下得申孝養之情推此所奉前繼一也以為前母改葬宜從衆子之制通典一百二答陸士龍詩序鴛鴦美賢也有賢者二人雙飛東嶽揚輝上京其兄已顯得登朝而弟中漸婆娑衡門然其勞謙接士吐握待賢雖姬公之下白屋洙泗之養三千無以過也乃肯垂顧惠我好音思樂結永好之歡云爾陸雲集又答蘭林歡至好也有君子世濟其美英名光茂遭時暫否福德衡門顧我殷勤屢辱德音思與結好以永不刊陸雲集南山酬至德也有退仕衡門修道以養和棄物以存神民思其治土懷其德或思置之列位或思從之信宿詩人嘉與此賢當年相遇又屢獲德音情歡心至故作是詩焉陸雲集與陸士龍書永白閒因王弘季有書怪足下無答外甥石季甫忽見使為鄮令除書近下因令便道之職得此罔然老人及姊自聞此問三四日中了不能復食姊晝夜號泣示可忍視外甥之中老人真自愛恤季甫恆在目下卒有此役舉家慘戚不可深言昨全伯始有一將來是句章人具說此縣既有短狐之疾又有沙蝨害人聞此消息倍益憂慮如其不行恐有節目良為愁憤足可具示土地之宜企望來報車永白陸雲集困學紀聞二十答陸士龍書永白即日得報披省未竟歡喜踊躍輒于母前伏誦三周舉家大小豁然忘愁也足下此書足為典誥雖山海經異物志二京南都殆不復過也恐有其言能無其事耳雖爾猶足息號泣歡忭笑也府君入後月當西出足下可豫至界上吾欲先一日與卿相見也答不復多車永白同上薦范喬喬稟德真粹立操高潔儒學精深含章內奧安貧樂道棲志窮巷簞瓢詠業長而彌堅誠當今之寒素著厲俗之清彥晉書隱逸范粲傳粲子喬元康中詔求廉讓沖退履道寒素者以參選敘尚書郎王琨乃薦喬奏為顯義亭侯煥選官屬昔魏臨淄侯以邢顒為家丞劉楨為庶子今侯幼弱宜選明德晉書琅邪王煥傳奏請緩征徐龕臣等伏思淮北征軍已失不速今方盛暑且涉山險山人便弓弩習土俗一人守厄百夫不當且運漕至難一朝糧竹乏非復智力所能防禦也書云寧致人不致于人宜頓兵所在深壁固壘至秋不了乃進大軍晉書蔡豹傳尚書令刁協奏駮孫文上事諸侯奪宗聖庶奪嫡而況天子乎自皇祚已來五十餘年宗廟已序而文攻乎異端宜加議衆通典五十二建武初孫文上事宣帝支子不應祭豫章京兆二府君僕射刁協復肉刑議聖上悼殘荒之遺黎傷犯死之繁衆欲行刖以代死刑使犯死之徒得存性命則率士蒙更生之澤兆庶必懷恩以反化也今中興祚隆大命惟新誠宜設寬法以育人然懼群小愚蔽習玩所見而忽異聞或未能咸服愚謂行刑之時先明申法令樂刑者刖甘死者殺則心必服矣古典刑不上大夫今士人有犯者謂宜如舊不在刑例則進退為允晉書刑法志通典一百六十八尚書令刁協等議敕郭誦汝識存亡之談不迎接郭默皆由于卿臨難逃走其必留之晉書李矩傳禱子産祠君昔相鄭惡鳥不鳴凶胡臭羯何得過庭晉書李矩傳又十六國春秋四與趙太子荂箋論孫秀秀專權動違衆心而功臣皆小人擾亂朝廷可一時誅之晉書趙王倫傳陳夫人碑夫人姓徐吳郡嘉興人也夫人少膺靈粹誕茲淑貞聰哲明敏溫恭柔順體仁足以長人嘉德足以合禮恭順不惰其心明烈實備其體若夫柔惠清順中和聖善婦德既備母道亦踐志厲冰玉厥德靡顯靡靡其操翼翼其仁明景內映朗節外新芳徽風邁淑慎其身藝文類聚十八獻齊王冏書方聞聖明輔世夙夜祗懼泰而不驕所以長守貴也今大王安不慮危耽于酒色燕樂過度其失一也大王檄命當使天下穆如清風宗室骨肉永無纖介今則不然其失二也四夷交侵邊境不靜大王自以功業興隆不以為念其失三也大王興義群庶競赴天下雖寧人勞窮苦不聞大王振救之令其失四也又與義兵歃血而盟事定之後賞不踰時自清泰已來論功未分此則食言其失五也大王建非常之功居宰相之任謗聲盈塗人懷忿怨方以狂愚冒死陳誠晉書齊王囧傳囧輔政專恣方發憤步詣洛陽自稱荊楚逸民獻書于冏致齊王冏箋豹聞王臣謇謇匪躬之故將以安主定時保存社稷者也是以為人臣而欺其君者刑罰不足以為誅為人主而逆其諫者靈厲不足以為諡伏惟明公虛心下士開懷納善款誠以著而逆耳之言未入于聽豹伏思晉政漸缺始自元康以來宰相在位未有一人獲終乃事勢使然未為輒有不善也今公剋平禍亂安國定家故復因前傾敗之法尋中閒覆車之軌欲冀長存非所敢聞今河閒樹根于關右成都盤桓于舊魏新野大封于江漢三面貴王各以方剛強盛竝興戎馬處險害之地且明公興義討逆功蓋天下聖德光茂名震當世今以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔退則蒺藜生庭冀此求安未知其福敢以淺見陳寫愚情昔武王伐紂封建諸侯為二伯自陝以東周公主之自陝以西召公主之及至其末霸國之世不過數州之地四海強兵不敢入窺九鼎所以然者天下習于所奉故也今誠能尊用周法以成都為北州伯統河北之王侯明公為南州伯以攝南土之官長各因本職出居其方樹德于外盡忠于內歲終率所領而貢于朝𥳑良才命賢俊以為天子百官則四海長寧萬國幸甚明公之德當與周召同其至美危敗路塞社稷可保願明公思高祖納婁敬之策悟張良履足之謀遠臨深之危保泰山之安若合聖思宛許可都也晉書忠義王豹傳重致齊王箋豹書御已來十有二日而聖旨高遠未垂採察不賜一字之令不敕可否之宜蓋霸王之神寶安危之祕術不可須臾而忽者也伏思明公挾大功抱大名懷大德執大權此四大者域中所不能容賢聖所以戰戰兢兢日昃不暇食雖休勿休者也昔周公以武王為兄成王為君伐紂有功以親輔政執德弘深聖思博遠至忠至仁至孝至敬而攝事之日四國流言離主出奔居東三年賴風雨之變成王感悟若不遭皇天之應神人之察恐公旦之禍未知所限也至于執政猶與召公分陝為伯今明公自視功德孰如周公且元康以來宰相之患危機竊發不及容思密禍潛起輒在呼吸豈復晏然得全生計前鑒不遠公所親見也君子不有遠慮必有近憂憂至乃悟悔無所及也今若從豹此策皆遣王侯之國北與成都分河為伯成都在鄴明公都宛寬方千里以與圻內侯伯子男小大相率結好要盟同獎皇家貢御之法一如周典若今聖規可先旨與成都共論雖以小才願備行人昔廝養燕趙之微者耳百里奚秦楚之商人也一開其說兩國以寧況豹雖陋大州之綱紀加明公起事險難之主簿也故身雖輕其言未必否也晉書忠義王豹傳奏改太廟祝文陛下繼承世數于京兆府君為玄孫而今祝文稱曾孫恐此因循之失宜見改正又禮祖之昆弟從祖父也景皇帝自以功德為世宗不以伯祖而登廟亦宜除伯祖之文晉書鍾雅傳奏劾尚書梅陶臣聞放勳之殂八音遏密雖在凡庶猶能三載自茲以來歷代所同肅祖明皇帝崩背萬國當朞來月聖主縞素泣血臨朝百僚慘愴動無歡容陶無大臣忠慕之節家庭侈靡聲妓紛葩絲竹之音流聞衢路宜加放黜以整王憲請下司徒論正清議晉書鍾雅傳駮陸曄假歸制日曄內蘊至德清一其心受託之重居台司之位既蒙詔許歸省墳塋大臣之義本在忘己豈容有期而反無期必違愚謂宜還自還不須制日晉書陸曄傳咸和中求歸拜墳墓有司奏舊制假六十日侍中顏含侍郎游懷駮上疏遜位臣疾彌留遂至沈篤自忖氣力差理難有冀有生有死自然之分但忝位過才曾無以報上慚先帝下愧日月伏枕哀歎抱恨黃泉臣今虛乏救命朝夕輒以府事付長史劉遐乞骸骨歸丘園惟願陛下崇山海之量弘濟大猷任賢使能事從𥳑易使康哉之歌復興于今則臣雖死猶生之日耳臣所統錯雜率多北人或逼遷徙或是新附百姓懷土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啓寇心大常臣謨平𥳑貞正素望所歸謂可以為都督徐州刺史臣亡兄息晉陵內史邁謙愛養士甚為流亡所宗又是臣門戶子弟堪任兗州刺史公家之事知無不為是以敢希祁奚之舉晉書郗鑒傳周札加贈議夫褒貶臧否宜令體明例通今周戴以死節復位周札以開門同例事異賞均意所疑惑如司徒議謂往年之事自有識以上皆與札不異此為邪正坦然有在昔宋文失禮華樂荷不臣之罰齊靈嬖孽高厚有從昏之戮以古況今譙王周戴宜受若此之責何加贈復位之有乎今據已顯復則札宜貶責明矣晉書周札傳又駮敦之逆謀履霜日久緣札開門令王師不振若敦前者之舉義同桓文則先帝可為幽厲邪晉書郗鑒傳書鑒頓首頓首災禍無常奄承遘難念孝性攀慕兼剝不可堪勝奈何奈何望遠未緣敘苦以增酸楚鋻頓首頓首淳化閣帖二上言魏騭事功曹魏騭周喪內迎婦拜時鄉曲以違禮譏之通典五十九太和中平北將軍郗愔上言論喪遇閏書則時省別書并諸儀具三禮證據誠所未詳然恐祥忌異月于理既為不安又十三月而祥二十五月而畢明文煥然而閏在周內合而不數者則閏正月遭艱便應以十二月祥于時則未忘周年于忌則時尚平吉若由天無是月故略而不許則凡在五服皆應包閏具如足下所論若云情重則宜包情輕故宜數是為制之由情而未本乎曆數必天無是月則雖情有輕重而含閏宜一且齊衰之制遇閏而包降為大功則數而除天性攸同而包數異制以月為斷者數閏以年為斷者除閏推此而言則除數所由蓋以所遇為分斷非本情之所以以後月為周者故是上之所論以吉為忌于理不通故耳云閏在周後將非其喻至于凶事尚遠蓋施于卜日祥葬制無定期故不得即伸物情務從其遠耳若理例坦然義無疑昧豈得不循成制而以過限為重或謂閏者蓋年中餘分故宜計其正限以補不足今再周無閏則不補小月之限閏在周後便欲以六十日為一月者當以既已遇閏便宜在盡其月節故也月節之難足下釋之且節必在閏月之中則合月從節即復進退致闕通典一百孝武寧康二年會稽內史郗愔書雜帖九月七日愔報比得章知弟漸佳至慶想今漸勝食進不新差難將適猶懸憂遣不具愔報淳化閣帖二二十四日愔報比書想悉達日諒弟佳不及數字愔報同上遠近何也王右軍竟去不付石首干一節同上想親親悉如常敬豫何當來耶道祖故未善差恆在尚書不見來多日同上
