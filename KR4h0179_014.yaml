body:
  text: 安平王孚請造沁口石門表野王典農中郎將臣孚言臣被明詔興河內水利臣既到檢行沁水源出銅鞮山屈曲周回水道九百里自太行以西王屋以東層巖高峻天時霖雨衆谷走水小石漂迸水門朽敗稻田汛濫歲功不成臣輒案行去堰五里以外方石可得數萬餘枚臣以為纍方石為門若天暘旱增堰進水若天霖雨陂澤充溢則塞防斷水空渠衍潦足以成河雲雨由人經國之謀暫勞永逸聖王所許願陛下特出臣表敕大司農府給人工勿使稽延以贊時要臣孚言水經沁水篇注奏弔陳群母尋故事自魏興無三公喪母弔祭輒訪韋誕王肅高堂隆秦靜等云漢太傅胡廣喪母天子使謁者以中牢弔祭送葬通典八十三奏永寧宮守尚書令太尉長社侯臣孚大將軍武陽侯臣師司徒萬歲亭侯臣柔司空文陽亭侯臣沖行征西安東將軍新城侯臣昭光祿大夫關內侯臣雍太常臣晏衛尉昌邑侯臣偉太僕臣嶷廷尉定陵侯臣繁大鴻臚臣芝大司農臣祥少府臣褒永寧衛尉臣禎永寧太僕臣閎大長秋臣模司隸校尉潁昌侯臣曾河南尹蘭陵侯臣肅城門校尉臣慮中護軍永安亭侯臣望武衛將軍安壽亭侯臣演中堅將軍平原侯臣德中壘將軍昌武亭侯臣廙屯騎校尉關內侯陔步兵校尉臨晉侯臣建射聲校尉安陽鄉侯臣溫越騎校尉雎陽侯臣初長水校尉關內侯臣超侍中臣小同臣顗臣酆博平侯臣表侍中中書監安陽亭侯臣誕散騎常侍臣瓌臣儀關內侯臣芝尚書僕射光祿大夫高樂亭侯臣育尚書關內侯臣觀臣嘏長合鄉侯臣亮臣贊臣騫中書令臣康御史中丞臣鈐博士臣範臣峻等稽首言臣等聞天子者所以濟育群生永安萬國三祖勳烈光被六合皇帝即位纂繼洪業春秋已長未親萬機耽淫內寵沈漫女色廢捐講學棄辱儒士日延小優郭懷袁信等于建始芙蓉殿前裸袒遊戲使與保林女尚等為亂親將後宮瞻觀又於廣望觀上使懷信等於觀下作遼東妖婦嬉褻過度道路行人掩目帝於觀上以為宴笑於陵雲臺曲中施帷見九親婦女帝臨宣曲觀呼懷信使入帷共飲酒懷信等更行酒婦女皆醉戲侮無別使保林李華劉勳等與懷信等戲清商令令狐景呵華勳曰諸女上左右人各有官職何以得爾華勳數讒毀景帝嘗喜以彈彈人以此恚景彈景不避首目景語帝曰先帝持門戶急今陛下日將妃后遊戲無度至乃共觀倡優裸袒為亂不可令皇太后聞景不愛死為陛下計耳帝言我作天子不得自在邪太后何與我事使人燒鐵灼景身體皆爛甄后崩後帝欲立王貴人為皇后太后更欲外求帝恚語景等魏家前後立皇后皆從所愛耳太后必違我意知我當往不也後卒待張皇后疏薄太后遭合陽君喪帝日在後園倡優音樂自若不數往定省清商丞龐熙諫帝皇太后至孝今遭重憂水漿不入口陛下當數往寬慰不可但在此作樂帝言我自爾誰能奈我何皇太后還北宮殺張美人及禺婉帝恚望語景等太后橫殺我所寵愛此無復母子恩數往至故處啼哭私使暴室厚殯棺不令太后知也每見九親婦女有美色或留以付清商帝至後園竹間戲或與從官攜手共行熙白從官不宜與至尊相提挈帝怒復以彈彈熙日遊後園每有外文書入帝不省左右曰出帝亦不索視太后令帝常在式乾殿上講學不欲使行來帝徑去太后來問輒詐令黃門答言在耳景熙等畏恐不敢復止更共諂媚帝肆行昏淫敗人倫之敘亂男女之節恭孝彌穨凶德浸盛臣等憂懼傾覆天下危墜社稷雖殺身斃命不足以塞責今帝不可以承天緒臣請依漢霍光故事收帝璽綬帝本以齊王踐祚宜歸藩于齊使司徒臣柔持節與有司以太牢告祀宗廟臣謹昧死以聞魏志齊王芳紀奏請葬高貴鄉公以王禮太傅孚大將軍文王太尉柔司徒沖稽首言伏見中令故高貴鄉公悖逆不道自陷大禍依漢昌邑王罪廢故事以民禮葬臣等備位不能匡救禍亂式遏姦逆奉令震悚肝心悼栗春秋之義王者無外而書襄王出居於鄭不能事母以絶之於位也今高貴鄉公肆行不軌幾危社稷自取傾覆人神所絶葬以民禮誠當舊典然臣等伏惟殿下仁慈過隆雖存大義猶存哀矜臣等之心實有不忍以為可加恩以王禮葬之魏志高貴鄉公紀奏請易服復膳太宰司馬孚太傅鄭沖太保王祥太尉何曾司徒領中領軍司馬望司空荀顗車騎將軍賈充尚書令裴秀尚書僕射武該都護大將軍郭建侍中郭綏中軍將軍羊祜等奏曰臣聞禮典軌度豐殺隨時虞夏商周咸不相襲蓋有由也大晉紹承漢魏有革有因期於足以興化而已故未得皆返太素同規上古也陛下既已俯遵漢魏降喪之典以濟時務而躬蹈大孝情過乎哀素冠深衣降席撤膳雖武丁行之於殷世曾閔履之於布衣未足以踰方今荊蠻未夷庶政未艾萬機事殷動勞神慮豈遑全遂聖旨以從至情加歲時變易期運忽過山陵彌遠攀慕永絶臣等以為陛下宜回慮割情以康時濟俗輒敕御府易服內省改坐太官復膳諸所施行皆如舊制晉書禮志中宋書禮志二通典八十文帝崩國內行服三日武帝亦遵漢魏之典既葬除喪然猶深衣素冠降席徹膳太宰司馬孚等奏重奏伏讀聖詔感以悲懷輒思仲尼所以抑宰我之問聖思所以不能以已甚深甚篤然今者干戈未戢武事未偃萬機至重天下至衆陛下以萬乘之尊履布衣之禮服粗席稿水飲蔬食殷憂內盈毀悴外表然而躬勤萬機坐而待旦降心接下仄不遑食所以勞力者如斯之甚是以臣等悚息不寧誠懼神氣用損以疚大事輒敕有司改坐復常率由舊典惟陛下察納愚款以慰皇太后之心晉書禮志中宋書禮志二通典八十孚等重奏奏止詣陵太宰司馬孚尚書令裴秀尚書僕射武陔等奏陛下至孝蒸蒸哀思罔極衰麻雖除哀毀蔬食有損神和秋節尚有餘暑謁見山陵悲感摧傷群下竊用竦息平議以為宜惟遠體降抑聖情以慰萬國晉書禮志中宋書禮志二重奏臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之於後陛下以社稷宗廟之重萬方億兆之故既從權制釋除衰麻群臣庶僚吉服今者謁陵以敘哀慕若加衰絰近臣期服當復受制進退無當不敢奉詔晉書禮志中秀等重奏宋書禮志二作孚等重奏案晉志全用宋志而改作秀者豈此奏見秀集中耶今仍從宋志又奏臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克己俯就權制既除衰麻而行心喪之禮今復制服義無所依若君服而臣不服雖先帝厚恩亦未之敢安也參量平議宜如前奏晉書禮志中秀等又奏宋書禮志二作孚等又奏皇后銘旌議魏明悼后崩議書銘旌或欲去姓而書魏或欲兩書孚以為經典正義皆不應書凡帝王皆因本國之名以為天下之號而與往代相別耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所以同天地之大號流無二之尊名不待稱國號以自表不俟稱氏族以自彰是以春秋隱公三年經曰三月庚戌天王崩尊而稱天不曰周王者所以殊乎列國之君也八月庚辰宋公和卒書國稱名所以異乎天王也襄公十五年經曰劉夏逆王后于齊不云逆周王后薑氏者所以異乎列國之夫人也至乎列國則曰夫人薑氏至自齊又曰紀伯姬卒書國稱姓所以異乎天王后也由此考之尊稱皇帝赫赫無二何待於魏乎尊稱皇后彰以諡號何待於姓乎議者欲書魏者此以為天皇之尊同於往古列國之君也或欲書姓者此以為天皇之后同於往古之夫人也乖經典之大義異乎聖人之明制非所以垂訓將來為萬世不易之式者也晉書安平王孚傳臨終遺令有魏貞士河南溫縣司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單槨斂以時服晉書安平王孚傳奏廢楊太后皇太后與駿潛謀欲危社稷不可復奉承宗廟配合先帝宜貶尊號廢詣金墉城晉書武悼楊后傳矯詔討劉輿得豫州刺史劉喬檄稱潁川太守劉輿迫脅驃騎將軍范陽王虓距逆詔命多樹私黨造構凶逆擅劫郡縣合聚兵衆輿兄弟昔因趙王婚親擅弄權勢凶狡無道久應誅夷以遇赦令得全道領小人不忌為惡日滋輒用苟晞為兗州斷截王命鎮南大將軍荊州刺史劉弘平南將軍彭城王繹征東大將軍準其各勒所領徑會許昌與喬并力今遣右將軍張方為大都督統精卒十萬督建武將軍呂朗廣武將軍騫貙建威將軍陽平太守刁默率步騎十萬為軍前鋒同會許昌以除輿兄弟敢有舉兵距違王命誅及五族能殺輿兄弟送首者封三千戶縣侯賜絹五千匹晉書惠帝紀永興二年十月詔云云又見劉輿傳以為河間王顒矯詔表廢齊王囧王室多故禍難罔已大司馬囧雖唱義有興復皇位之功而定都邑克寧社稷實成都王之勳力也而囧不能固守臣節實協異望在許昌營有東西掖門官置治書侍御史長史司馬直立左右如侍臣之儀京城大清篡逆誅夷而率百萬之衆來繞洛城阻兵徑年不一朝覲百官拜伏晏然南面壞樂官市署用自增廣輒取武庫祕杖嚴列不解故東萊王蕤知其逆節表陳事狀而見誣陷加罪黜徒以樹私黨僭立官屬幸妻嬖妾名號比之中宮沈湎酒色不恤群黎董艾放縱嫵所畏忌中丞按奏而取退免張偉憁恫擁停詔可葛旟小豎維持國命操弄王爵貨賂公行群姦聚黨擅斷殺生密署腹心實為貨謀斥罪忠良伺窺神器臣受重任蕃衛方嶽見囧所行實懷激憤即日翊軍校尉李含乘驛密室宣騰詔旨臣伏讀感切五情若灼春秋之義君親無將囧擁強兵樹置私黨權官要職莫非腹心雖復重責之誅恐不義服乞輒勒兵精卒十萬與州征並協忠義共會洛陽驃騎將軍長沙王乂同奮忠誠廢囧還第有不順命軍法從事成都王穎明德茂親功高勳重往歲去就允合衆望宜為宰輔代囧阿衡之任晉書齊王囧傳翊軍校尉李含奔於長安詐云受密詔使河間王顒誅囧因導以利謀顒從之上表云云上言王昌求為前母服王昌父毖本居長沙有妻息漢末使入中國值吳叛仕魏為黃門郎與前妻息死生隔絶更娶昌母今江表一統聞前母久喪言疾求平議晉書禮志中太康元年東平王止楙上言云云案言疾二字有脫誤通典八十九載此事云後漢末長沙人王毖上計至京師值吳魏分隔毖妻子在吳身留中國為魏黃門郎更娶妻生昌及式毖卒後昌為東平相至晉太康元年吳平時毖前妻已卒昌聞喪求去官行服東平王楙上臺評議
