body:
  text: 哀帝以東海王奕為琅王詔朕獲承明命入纂大統顧惟先王宗廟蒸嘗無主太妃喪庭廓然靡寄悲痛感摧五內抽割宗國之重情禮兼隆胤嗣之重義無與二東海王奕戚屬親近宜奉本統其以奕為琅邪王晉書哀帝紀上嗣顯宗以修本統詔顯宗成皇帝顧命以時事多艱弘高世之風樹德博重以隆社稷而國故不已康穆早世胤祚不融朕以寡德復承先緒感惟永慕悲痛兼摧夫昭穆之義固宜本之天屬繼體承基古今常道宜上嗣顯宗以修本統晉書哀帝紀以謝萬為散騎常侍詔前西中郎謝萬才義簡亮宜居獻替其以萬為散騎常侍書鈔五十八初學記十二御覽二百二十四竝引晉起居注鴻祀詔天文失度太史雖有祈禳之事猶釁眚屢彰今欲依鴻祀之制于太極殿前庭親執虔肅晉書孔嚴傳答桓溫請還都洛陽詔在昔喪亂忽涉五紀戎狄肆暴繼襲凶迹眷言西顧慨歎盈懷知欲躬率三軍蕩滌氛穢廓清中畿光復舊京非夫外身殉國孰能若此者哉諸所處分委之高算但河洛丘墟所營者廣經始之勤致勞懷也晉書桓溫傳日食詔戎旅路次末得輕簡賦役玄象失度亢旱為患豈政事未洽將有板築渭濱之士邪其搜揚隱滯蠲除苛碎詳議法令咸從損要晉書哀帝紀書丕死罪死罪承中書郎君疾患比委瘵情以灼怛伏念垂心憂勞想得治力漸佳丕死罪死罪淳化閣帖一以會稽王昱為丞相録尚書事詔會稽王體道沖虛理識明久阿衡孝宗有保義之規輔弼哀皇盡翼亮之道朕承洪緒仍聞善誘慎徽五教儀形具瞻登賢顯親國之典也其以為丞相録尚書事入朝不趍贊拜不名劍履上殿給羽葆鼓吹班劍六十人御覽二百二十引晉中興書案廢帝紀興寧三年七月改封昱為琅邪王今此仍稱會稽者簡文紀帝固讓故雖封琅邪而不去會稽之號以韓伯為領軍將軍詔尚書韓伯陳疾解職領軍間無上直之勞可得從容養病更以伯為領軍將軍書鈔六十四引晉起居注武帝泰始四年蓋轉寫之誤當是廢帝太和四年祓禊詔三日臨流杯池依東堂小會初學記四引晉起居注詔譙王恬悲惋惶怛非所忍聞況言之哉其更詳議通鑑一百三御史中丞譙王恬承桓溫旨請依律誅武陵王晞詔答手詔報桓溫若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路晉書簡文紀有司承溫旨奏誅晞帝不許溫固執至于再三帝手詔報通鑑一百三溫重表固誅晞詞甚酷切帝乃賜溫手詔大赦詔制詔昔王室多故穆哀早崩皇胤夙零神器無寄東海王以母弟近屬入纂大統嗣位纍年昏暗亂常人倫虧喪大禍必及則我祖宗之靈靡知所託皇太后深懼皇基時定大計大司馬因順天人協同神略親率群后恭承明命雲霧既除皇極載清乃顧朕躬仰承洪緒雖伊尹之寧殷朝博陸之安漢室弘道委任契齊古賢朕躬以寡德猥居元首司牧群黎奉主社稷永惟先帝受命中興光隆盛業實懼眇然弗克負荷戰戰兢兢罔知攸濟思與兆庶革心更始其大赦天下大酺五日增文武位二等孝順忠貞鰥寡孤獨米人五斛文館詞林六百六十八末三句從晉書簡文紀補不聽桓溫還姑熟詔夫乾坤體合而化成萬物二人同心則不言所利古之哲王咸賴元輔姬旦光于四夷而周道以隆伊尹格于皇天而殷化以洽大司馬明德應期光大深遠上合天心含章時發用集大命在豫一人功美博陸道固萬世今進公丞相其大司馬本官皆如故留公京都以鎮社稷晉書桓溫傳詔百官朕居阿衡三世不能濟彼時雍及至海西失德殆傾皇祚賴祖宗靈祇之德皇太后淑體應期藩輔忠賢百官戮力用能蕩氛霧於昊蒼耀晨輝於宇宙遂以眇身託于王公之上思賴群賢以弼其關夫敦本息末抑絶華競開忠信公坦之門塞浮僞阿私之路詢名檢實致之以道使清濁異流能否殊貫官無粃政士無謗讟不有懲勸則德禮焉施且彊寇未殄勞役未息每念民疲力單則中夜忘寢若不弘政以求民瘼簡除游煩以存儉約將何以紓之邪今自非軍國戎祀之要其華飾煩費之用可除者皆除之宜省者皆省之其鰥寡窮獨癃殘六疾不能自存皆生民之至艱先王之所愍宜加隱恤各賑賜之若或孝子貞婦殊行異操之人皆以狀條列當有以甄明其節夫肥遁窮谷之賢汨泥揚波之士雖抗志於玄霄之表潛默於幽岫之裏貪屈高尚之道以隆協贊之美使惠風流於天下膏澤被於萬物孰與獨足山水棲遲丘壑徇匹夫之潔而忘兼濟之大邪古人不借賢于曩代朕所以虛想於今日內外百官剖符親民各勤所司使善無不達惡無不聞退食自公平情以道使詩人無素飧之刺而吾獲虛心之求豈不善哉其各宣攝知朕意焉晉書簡文紀又群書治要二十九引晉書優恤軍士詔吾承祖宗洪基而昧於政道懼不能允釐天工克隆先業夕惕惟憂若涉泉水賴宰輔忠德道濟伊望群后竭誠協契斷金內外盡匡翼之規文武致匪躬之節冀因斯道終克弘濟每念干戈未戢公私疲悴藩鎮有疆理之務征戍懷東山之勤或白首戎陳忠勞未敘或行役彌久擔石靡儲何嘗不昧旦晨興夜分忘寢雖未能撫而巡之且欲達其此心可遣大使詣大司馬并問方伯逮於邊戍宣詔大饗求其所安又籌量賜給悉令周普晉書簡文紀詔增百官俸往事故之後百度未充群僚常俸並皆寡約蓋隨時之義也然退食在朝而祿不代耕非經通之制今資儲漸豐可籌量增俸晉書簡文紀出繼為母服表亡母生臨臣國沒留臣第臣雖出後而上無所厭則私情得伸昔敬后崩時孝王先出後亦還服重此則明比臣之所憲章也通典八十二又見晉書𥳑文宣鄭太后傳咸和元年建平國夫人薨𥳑文時為琅邪王制服重有司以王出繼宜降所生國臣不能匡正奏免國相諸葛頤奏四祖祧主四祖同居西祧藏主石室禘祫乃祭如先朝舊儀宋書禮志三永和二年撫軍將軍會稽王司馬昱尚書劉劭等奏答殷浩箋屬當厄運危弊理盡誠賴時有其才不復遠求版築足下沈識淹長思綜通練起而明之足以經濟若復深存挹退苟遂本懷吾恐天下之事於此去矣今紘領不振晉網不綱項蹈東海復何得邪由此言之足下去就即是時之廢興時之廢興則家國不異足下弘思之靜算之亦將有以深鑒可否望不廢本懷率群情也晉書殷浩傳與桓溫書吾遂委篤足下便入冀得相見不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼沖眇然非阿衡輔導之訓當何以寧濟也國事家計一託于公魏書司馬昱傳昱疾與溫書晉書桓溫傳作帝不豫詔溫曰吾遂委篤足下便入冀得相見便來便來已下十四句皆無書昱白所示慶賜事具具此莫大之禮天下大慶得率由舊章慰答民望甚為盡善但奢則不適於時儉則陋而不典正當斟酌其宜令得會中耳淳化閣帖一即位詔朕以不造奄丁閔凶號天扣地靡知所訴藐然幼沖眇若綴旒深惟社稷之重大懼不克負荷仰憑祖宗之靈積德之祀先帝淳風玄化遺詠在民宰輔英賢勳隆德盛顧命之託實賴匡訓群后率職百寮勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播于四海思弘餘潤以康黎庶其大赦天下與民更始晉書孝武帝紀詔桓溫先帝遺敕云事大司馬如事吾令答表便可盡敬晉書桓溫傳又詔大司馬社稷所寄先帝託以家國內外衆事便就關公施行晉書桓溫傳公勳德尊重師保朕躬兼有風患其無敬晉書桓溫傳報王凝之劾范寧詔漢宣云可與共治天下者良二千石也若范寧果如凝之所表者豈可復宰郡乎晉書范寧傳詔賻竺道潛潛法師理悟虛遠風鑒清貞棄宰相之榮襲染衣之素山居人外篤勤匪懈方賴宣道以濟蒼生奄然遷化用痛于懷可賻錢十萬星馳驛送高僧傳四地震詔頃者上天垂監譴告屢彰朕有懼焉震惕於心思所以議獄緩死赦過宥罪庶回大變與之更始晉書孝武帝紀報桓沖請討符堅詔醜類違天比年縱肆梁益不守河西傾喪每惟宇內未一憤歎盈懷將軍經略深長思算重復忠國之誠形于義旨覽省未周以感以慨寇雖乘閒竊利而以無道臨之黷武窮凶虐用其衆滅亡之期勢何得久然備豫不虞軍之善政輒詢于群后敬從高算想與征西協參令圖嘉謀遠猷動靜以聞晉書桓沖傳詔定病假限大臣疾病假滿三月解職御覽六百三十四引晉起居注太元元年詔許桓祕辭散騎常侍詔祕受遇先朝是以延之而頻有讓表以栖尚告誠兼有疾疢省用增歎可順其所執晉書桓祕傳俸給釋道安詔安法師器識倫通風韻摽朗居道訓俗徽績兼著豈直規濟當今方乃陶津來世俸給一同王公物出所在高僧傳五禁毀比輪錢詔錢國之重寶小人貪利銷壞無已監司當以為意廣州夷人寶貴銅鼓而州境素不出銅聞官以私賈人皆於此下貪比輪錢斤兩差重以入廣州貨與夷人鑄敗作鼓其重為禁制得者科罪晉書食貨志又通典八詔桓石虔石虔文武器幹御戎有方古人絶哭金革弗避況在餘哀豈得辭事可授奮威將軍南平太守晉書桓石虔傳案阮逸注元經六以此詔屬太元六年作御戎有方古今絶倫進冠軍將軍與晉書乖異未知所據不敢入録除三吳租布詔三吳奧壤股肱望郡而水旱併臻百姓生業夙夜惟憂不能忘懷宜時賑恤救其凋困三吳義興晉陵及會稽遭水之尤甚者全除一年租布其次聽除半年賑貸者即以賜之咸淳臨安志四十符堅攻陷襄陽下詔申警狡寇縱逸藩守傾沒疆場之虞事兼平日其內外衆官各悉心戮力以康庶事又年穀不登百姓多匱其詔御所供事從儉約九親供給衆官廩俸權可減半凡諸役費自非軍國事要皆宜停省以周時務晉書孝武帝紀皇后王氏崩下詔終事唯從儉速宋書禮志二又詔遠近不得遣山陵使同上議祭皇子廟詔亡大兄以司馬珣之為國後祭祀何儀通典四十七詔迎武陵王晞柩于新安感惟摧慟便奉迎靈柩并改移妃應氏及故世子梁王諸喪家屬悉還晉書元四王武陵王晞傳詔封故前武陵王晞并爵其三子故前武陵王體自皇極剋己思愆仰惟先朝仁宥之旨豈可情禮靡寄其追封新寧郡王邑千戶晞三子綜㻱遵以遵嗣追贈綜給事中㻱散騎郎晉書元四王武陸王晞傳張天錫歸國詔昔孟明不替終顯厥功豈以一眚而廢才用其以天錫為散騎常侍左員外晉書張天錫傳苻堅大敗于淮肥天錫于陳歸國詔云又見十六國春秋七十四復張天錫西平公爵詔故太尉西平公張軌著德遐域世襲前勞彊兵縱害遂至失守散騎常侍天錫拔迹登朝先祀淪替用增矜慨可復天錫西平郡公爵晉書張天錫傳又見十六國春秋七十四以苻朗為員外散騎侍郎詔朗深識逆順望風歸化既嘉此誠亦簡其才可員外散騎侍郎併賜給之御覽二百二十四引晉中興書以琅邪王道子為都督中外諸軍事詔新喪哲輔華戎未一自非明賢懋德莫能綏御內外司徒琅邪王道子體道自然神識穎遠實當旦奭之重宜總二南之任可領揚州刺史録尚書假節都督中外諸軍事衛府文武一以配驃騎府晉書會稽王道子傳謝安薨詔云云詔議明堂郊祀昔建太廟每事從儉約思與率土致力備禮又太祖虛位明堂未建郊祀國之大事而稽古之制闕然便可詳議晉書禮志上宋書禮志三徵譙武戴龔詔哲王御世必搜揚幽隱故空谷流縶維之詠邱園賁束帛之觀譙武戴龔並高其操欲宏儒業並以散騎常侍備禮發遣元經六以侍中王珉兼中書令詔新除侍中王珉才學廣贍理識清通宜處機近以參時務其以珉為長兼中書令藝文類聚四十八引王珉別傳初學記十一御覽二百二十答孫潛詔得上故祕書監所著書省以慨然遠模前典憲章在昔一代之事輒敕納之祕閣以貽于後釋藏給三集古今佛道論衡實録一孫盛子潛以晉太元十五年上之詔與殷仲堪詔卿去有日使人酸然常謂永為廊廟之寶而忽為荊楚之珍良以慨恨晉書殷仲堪傳帝授仲堪振威將軍荊州刺史假節鎮江陵將之任又詔上會稽太妃尊號詔會稽太妃文母之德徽音有融誕載聖明光延于晉先帝追尊聖善朝議不一道以疑屈朕述遵先志常惕于心今仰奉遺旨依陽秋二漢孝懷皇帝故事上太妃尊號曰簡文太后晉書𥳑文宣鄭太后傳遣兼司空謝琰納太子妃王氏詔太子諱婚禮即就仰祖宗遺烈憑道德之姿保傅將翼賢士竭誠慎行修德積善慶隆豈惟在乎天賚賜所以宣其悅情其便依舊御覽一百四十九引晉孝武帝起居注訪嵇紹宗族襲爵詔褎德顯仁哲王令典故太尉忠穆公執德高邈在否彌宣貞潔之風義著千載每念其事愴然傷懷忠貞之胤蒸嘗宜遠所以大明至節崇獎名教可訪其宗族襲爵主祀晉書嵇紹傳贈賻周虓詔虓厲志貞亮無愧古烈未及拔身奄隕厥命甄表義節國之典也贈龍驤將軍益州刺史賻錢二十萬布百匹又贍賜其家晉書周虓傳賻丁穆詔故順陽太守真定侯丁穆力屈身陷而誠節彌固宜亮壯徑義貫古烈其喪柩始反言尋傷悼可贈龍驤將軍雍州刺史賻賜一依周虓故事為立屋宅并給其妻衣食以終厥身晉書丁穆傳苻堅寇順陽穆戰敗被執堅又傾國南寇穆與關中人士唱義謀襲長安事泄遇害臨死作表以付其妻周其後周得至京師詣闕上之帝下詔詔賻竺法汰汰法師道播八方澤流後裔奄爾喪逝痛貫于懷可賻錢十萬喪事所須遂由備辦高僧傳五詔躬儉以弘下濟之惠文選顏延之侍遊蒜山詩注與朗法師書皇帝敬問太山朗和尚承睿德光時飛聲東嶽靈海廣淹有生蒙潤大人起世善翼匡時輒伸經略懸稟妙算昔劉曜創荒戎狄繼業元皇龍飛遂息江表舊京淪沒神州傾蕩蒼生荼蓼寄在左衽每一念至嗟悼朕心長驅魏趙掃平燕代今龍旗方興剋復伊洛思與和尚同養群生至人通微想明朕意今遣使者送五色珠像一軀明光錦五十匹象牙簟五領金鉢五枚到願納受廣弘明集三十五帖比得譙王書有欲仙語吾答之如別卿前云宜卿譙王參之於衆云公書卿私書君輒從衆以吾觀之寧當許也想所謂爾淳化閣帖一
