body:
  text: 卷九十八陸機策問秀才紀瞻等六首策問秀才紀瞻等六首昔三代明王啟建洪業文質殊制而令名一致然夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄救薄則又反之于忠然則王道之反覆其無一定邪亦所祖之不同而功業各異也自無聖王人散久矣三代之損益百姓之變遷其故可得而聞邪今將反古以救其弊明風以蕩其穢三代之制將何所從太古之化有何異道在昔哲王象事備物明堂所以崇上帝清廟所以寧祖考辟雍所以班禮教太學所以講藝文此蓋有國之盛典為邦之大司亡秦廢學制度荒闕諸儒之論損益異物漢氏遺作居為異事而蔡邕月令謂之一物將何所從庶明亮采故時雍穆唐有命既集而多士隆周故書稱明良之歌易貴金蘭之美此長世所以廢興有邦所以崇替夫成功之君勤于求才立名之士急于招世理無世不對而事千載恒背古之興王何道而如彼後之衰世何闕而如此昔唐虞垂五刑之教周公明四罪之制故世歎清問而時歌緝熙姦宄既殷法物滋有叔世崇三辟之文暴秦加族誅之律淫刑淪胥虐濫已甚漢魏遵承因而弗革亦由險泰不同而救世異術不得已而用之故也寬克之中將何立而可族誅之法足為永制與不夫五行迭代陰陽相須二儀所以陶育四時所以化生易稱在天成象在地成形形象之作相須之道也若陰陽不調則大數不得不否一氣偏廢則萬物不得獨成此應同之至驗不偏之明證也今有溫泉而無寒火其故何也思聞辯之以釋不同之理夫窮神知化才之盡稱備物致用功之極目以之為政則黃羲之規可踵以之革亂則玄古之風可紹然而唐虞密皇人之闊網夏殷繁帝者之約法機心起而日進淳德往而莫返豈太樸一離理不可振將聖人之道稍有降殺邪晉書卷六十八紀瞻傳七徵玄虛子耽性沖素雍容玄泊棄時俗而弗徇甘漁釣於一壑乃有通微大夫怨皇居之失寶傷鴻誓之後聞策玄黃於榛險憑穴巖而放言通微大夫曰奇膳玉食窮滋致豐簡犧羽族考牲毛宗俯出沉鮪仰落歸鴻剖柔胎於孕豹宰潛肝乎豢龍拾朝陽之遺卵納丹穴之飛凰神宰奇稔嘉禾之穗含滋發馨素穎玉銳勺藥調以充飢芳馨發而協氣灼若皓雪之頹玄雲皎若明珠之積緇匱素蟣踊而瀺灂滋芬溢而相徽雲沸淵涌秋醪春酒兼溫增奇浮藻吐秀味雖濃而弗爽氣既惠而復奇介景福於眉壽裕溫克乎齊聖子能饗之乎通微大夫曰豐居華殿奇搆磊落萬宇雲覆千楹林錯仰綏瑰木俯積碝石敷延袤之廣廡矯凌霄之高閣秀清暉乎雲表騰藻蔭之奕奕珍觀清榭岳立連行雲階飛陛仰陟穹蒼聳浮柱而虬立施飛檐以龍翔回房旋室綴珠襲玉圖畫神仙延祐承福懸闥高達長廊廻屬於是登漸臺理俊音鏡玄沚望長林逐狡獸弋輕禽覽壯藝以悅觀聆和樂而怡心子能居之乎通微大夫曰金石諧而齊響塤箎協而和鳴於是才人進羽籥玄弁被藻襲俯縈領以鴻歸仰矯首而鶴立激長歌而丹唇發鏗鏘乎柔木合清商以絕節揮流徵而赴曲奏商荊之高歎詠易水之清角爾乃覩蛾眉之群麗容既都而又閑矯纖腰以逐節頓皓足於鼓盤舒妍暉以妖韶若陵危之未安通微大夫曰蓋聞洙北有采唐之思淇上有送予之歎關睢以寤寐為戚溱洧以謔浪為歡若夫妖嬪豔女蒐群擢俊穆藻儀於令表茂當年之柔嫚罄妍規之約綽體每變而增閑秀紅蕤其愉愉若餘穎之可飡若夫靈晷潛祖顏退羽觴升清琴厲因清明以宣誠流微睇而授愛纖手揮而鳴佩鏗華衿被則芳塵萃子其納之乎通微大夫曰塗有殊而一致業有殊而名約各因姿以效績期寄響於天人也孰與顯奇蹤於萬邦撫六轡而高遊瞰八宇以攄眄齊清風乎諸侯言成否泰氣作溫涼弭侵略於強暴綜墜紀乎危邦子豈不願斯之雍容乎通微大夫曰明主應期撫民以德配仁風於黃唐齊威靈乎宸極彝倫幸序庶績咸乂盪流風於雍俗給天民乎齊泰是以玄靈感而表應嘉神繁而畢覿舞唐庭之來儀鳴岐陽之鸑鷟應天監之休命荷神聽之介福然聖主達持盈之寶術寤經國之在賢各畢榮於分局期贊化於大鈞吾子豈不欲縻好爵於天宇顯列業乎帝臣歟玄虛子作而言曰甚哉鄙人之惑也猶窮繩自逸於井幹憑河盜本於黃川欽至論敷敝衽謹聞命於王孫秋醪春酒兼醞增奇浮藻吐秀雲沸淵涌郁烈之分景福於眉壽七羨湘陰酎蒐其澄清秋醪增醞明酒九成甘芬潛結北堂書鈔卷一百四十八演八代之洪旨統先聖之遺訓聳一心以紹軻敦四教以承丘初學記卷二十一鞠歌行雜言鞠歌行雜言按漢宮閤有含章鞠室靈芝鞠室後漢馬防第宅卜臨道連閤通池鞠城彌於街路鞠歌將謂此也又東阿王詩連騎擊壤或謂蹙鞠乎三言七言雖奇寶名器不遇知己終不見重願逢知己以託意焉朝雲升應龍攀乘風遠遊騰雲端鼓鐘歇豈自歡急絃高張思和彈時希值年夙愆循己雖易人知難王陽登貢公歡罕生既沒國子歎嗟千載豈虛言邈矣遠念情愾然皇太子請宴詩序感聖恩之罔極退而賦此詩也答賈謐詩序余昔為太子洗馬魯公賈長淵以散騎常侍侍東宮積年余出補吳王郎中令元康六年入為尚書郎魯公贈詩一篇作此詩答之云爾贈弟士龍詩序余弱年夙孤與弟士龍銜卹喪庭續忝末緒會逼王命墨絰即戎時並縈髮悼心告別漸歷八載家邦顛覆凡厥同生彫落殆半收迹之日感物興哀而士龍又先在西時迫當祖載二昆不容逍遙銜痛東徂遺情西暮故作是詩以寄其哀苦焉要覽序直省之暇乃集要術三篇上曰連璧集其嘉名取其連類中曰述聞實述余之所聞下曰析名乃搜同辨異漢高祖功臣頌相國酇文終侯沛蕭何相國平陽懿侯沛曹參太子少傅留文成侯韓張良丞相曲逆獻侯陽武陳平楚王淮陰韓信梁王昌邑彭越淮南王六黥布趙景王大梁張耳韓王韓信燕王豐盧綰長沙文王吳芮荊王沛劉賈太傅安國懿侯王陵左丞相絳武侯沛周勃相國舞陽侯沛樊噲右丞相曲周景侯高陽酈商太僕汝陰文侯沛夏侯嬰丞相潁陰懿侯睢陽灌嬰代丞相陽陵景侯魏傅寬車騎將軍信武肅侯靳歙大行廣野君高陽酈食其中郎建信侯齊劉敬大中大夫楚陸賈太子太傅稷嗣君薛叔孫通魏無知護軍中尉隨何新城三老董公轅生將軍紀信御史大夫沛周苛平國君侯公右三十一人與定天下安社稷者也頌曰茫茫宇宙上墋下黷波振四海塵飛五岳九服徘徊三靈改卜赫矣高祖肇載天祿沉跡中鄉飛名帝錄慶雲應輝皇階授木龍興泗濱虎嘯豐谷彤雲晝聚素靈夜哭金精仍頹朱光以渥萬邦宅心駿民效足堂堂蕭公玉跡是因綢繆叡后無競惟人外濟六師內撫三秦拔奇夷難邁德振民體國垂制上穆下親名蓋群后是謂宗臣平陽樂道在變則通爰淵爰嘿有此武功長驅河朔電擊壤東協策淮陰亞跡蕭公文成作師通幽洞冥永言配命因心則靈窮神觀化望影揣情鬼無隱謀物無遁形武關是闢鴻門是寧隨難滎陽即謀下邑銷印惎廢推齊勸立運籌固陵定策東襲三王從風五侯允集霸楚實喪皇漢凱入怡顏高覽弭翼鳳戢託跡黃老辭世卻粒曲逆宏達好謀能深游精杳漠神跡是尋重玄匪奧九地匪沉伐謀先兆擠響于音奇謀六奮嘉慮四廻規主于足離項于懷格人乃謝楚翼寔摧韓王窘執胡馬洞開迎文以謀哭高以哀灼灼淮陰靈武冠世策出無方思入神契奮臂雲興騰跡虎噬凌險必夷摧堅則脆肇謀漢濱還定渭表京索既扼引師北討濟河夷魏登山滅趙威亮火烈勢踰風掃拾代如遺偃齊猶草二州肅清四邦咸舉乃眷北燕遂表東海克滅龍且爰取其旅劉項懸命人謀是與念功惟德辭通絕楚彭越觀時弢跡匿光民具爾瞻翼爾鷹揚威凌楚域質委漢王靖難河濟即宮舊梁烈烈黥布耽耽其名冠強楚鋒猶駭電覩幾蟬蛻悟主革面肇彼梟風翻為我扇天命方輯王在東夏矯矯三雄至于垓下元凶既夷寵祿來假保大全祚非德孰可謀之不臧舍福取禍張耳之賢有聲梁魏士也罔極自貽伊媿俯思舊恩仰察五緯脫跡違難披榛來洎改策西秦報辱北冀悴葉更耀枯條以肄王信韓孽宅土開疆我圖爾才越遷晉陽盧綰自微婉孌我皇跨功踰德祚爾輝章人之貪禍寧為亂亡吳芮之王祚由梅鋗功微勢弱世載忠賢肅肅荊王董我三軍我圖四方殷薦其勛庸親作勞舊楚是分往踐厥宇大啟淮濆安國違親悠悠我思依依哲母既明且慈引身伏劍永言固之淑人君子寔邦之基義形於色憤發於辭主亡與亡末命是期絳侯質木多略寡言曾是忠勇惟帝攸歎雲騖靈丘景逸上蘭平代禽豨奄有燕韓寧亂以武斃呂以權滌穢紫宮徵帝太原實惟太尉劉宗以安挾功震主自古所難勳耀上代身終下藩舞陽道迎延帝幽藪宣力王室匪惟厥武揔干鴻門披闥帝宇聳顏誚項掩淚寤主曲周之進于其哲兄俾率爾徒從王于征振威龍蛻攄武庸城六師寔因克荼禽黥猗歟汝陰綽綽有裕戎軒肇跡荷策來附馬煩轡殆不釋擁樹皇儲時乂平城有謀潁陰銳敏屢為軍鋒奮戈東城禽項定功乘風藉響高步長江收吳引淮光啟于東陽陵之勛元帥是承信武薄伐揚節江陵夷王殄國俾亂作懲恢恢廣野誕節令圖進謁嘉謀退守名都東規白馬北距飛狐即倉敖庾據險三塗輶軒東踐漢風載徂身死于齊非說之辜我皇寔念言祚爾孤建信委輅被褐獻寶指明周漢銓時論道移帝伊洛定都酆鎬柔遠鎮邇寔敬攸考抑抑陸生知言之貫往制勁越來訪皇漢附會平勃夷凶翦亂所謂伊人邦家之彥百王之極舊章靡存漢德雖朗朝儀則昏稷嗣制禮下肅上尊穆穆帝典煥其盈門風晞三代憲流後昆無知叡敏獨昭奇跡察侔蕭相貺同師錫隨何辯達因資於敵紆漢披楚維生之績皤皤董叟謀我平陰三軍縞素天下歸心袁生秀朗沉心善照漢旆南振楚威自撓大略淵回元功響效邈哉維人何識之妙紀信誑項軺軒是乘攝齊赴節用死孰懲身與烟消名與風興周苛慷愾心若懷冰形可以暴志不可凌貞軌偕沒亮跡雙升帝疇爾庸後嗣是膺天地雖順王心有違懷親望楚永言長悲侯公伏軾皇媼來歸是謂平國寵命有輝震風過物清濁效響大人于興利在攸往弘海者川崇山惟壤韶濩錯音袞龍比象明明眾哲同濟天網劍宣其利鑒獻其朗文武四充漢祚克廣悠悠遐風千載是仰孔子贊孔子叡聖配天弘道風扇玄流思探神寶明發懷周興言謨老靈魄有行言觀蒼昊清歌先誡丹書有造王子喬贊遺形靈岳顧景忘歸乘雲倏忽飄颻紫微夏育贊夏育之猛千載所希申博角勇臨額奮椎文選卷十七王褒洞簫賦注引顧譚傳宣太子正位東宮天子方隆訓導之義妙簡俊彥講學左右時四方之傑畢集太傅諸葛恪等雄奇蓋眾而譚以清識絕倫獨見推重自太尉范慎謝景羊徽之徒皆以秀稱其名而悉在譚下三國志吳書顧譚傳注引辨亡論上辨亡論上昔漢氏失御姦臣竊命禍基京畿毒徧宇內皇綱弛紊王室遂卑於是群雄蜂駭義兵四合吳武烈皇帝慷慨下國電發荊南權略紛紜忠勇伯世威稜則夷羿震盪兵交則醜虜授馘遂掃清宗祊蒸禋皇祖于時雲興之將帶州飆起之師跨邑哮㘚之群風驅熊羆之眾霧集雖兵以義合同盟戮力然皆苞藏禍心阻兵怙亂或師無謀律喪威稔寇忠規武節未有如此其著者也武烈既沒長沙桓王逸才命世弱冠秀發招攬遺老與之述業神兵東驅奮寡犯眾攻無堅城之將戰無交鋒之虜誅叛柔服而江外厎定飭法修師則威德翕赫賓禮名賢而張昭為之雄交御豪俊而周瑜為之傑彼二君子皆弘敏而多奇雅達而聰哲故同方者以類附等契者以氣集而江東蓋多士矣將北伐諸華誅鉏干紀旋皇輿於夷庚反帝座乎紫闥挾天子以令諸侯清天步而歸舊物戎車既次群凶側目大業未就中世而殞用集我大皇帝以奇蹤襲於逸軌睿心因於令圖從政咨於故實播憲稽乎遺風而加之以篤固申之以節儉疇咨俊茂好謀善斷束帛旅於丘園旌命交於塗巷故豪彥尋聲而響臻志士希光而景騖異人輻輳猛士如林於是張昭為師傅周瑜陸公魯肅呂蒙之疇入為腹心出作股肱甘寧凌統程普賀齊朱桓朱然之徒奮其威韓當潘璋黃蓋蔣欽周泰之屬宣其力風雅則諸葛瑾張承步騭以名聲光國政事則顧雍潘濬呂範呂岱以器任幹職奇偉則虞翻陸績張溫張惇以諷議舉正奉使則趙咨沈珩以敏達延譽術數則吳範趙達以機祥協德董襲陳武殺身以衛主駱統劉基強諫以補過謀無遺諝舉不失策故遂割據山川跨制荊吳而與天下爭衡矣魏氏常籍戰勝之威率百萬之師浮鄧塞之舟下漢陰之眾羽楫萬計龍躍順流銳騎千旅虎步原隰謨臣盈室武將連衡喟然有吞江滸之志一宇宙之氣而周瑜驅我偏師黜之赤壁喪旗亂轍僅而獲免收跡遠遁漢王亦憑帝王之號帥巴漢之民乘危騁變結壘千里志報關羽之敗圖收湘西之地而陸公亦挫之西陵覆師敗績困而後濟絕命永安續以濡須之寇臨川摧銳蓬籠之戰孑輪不反由是二邦之將喪氣挫鋒勢衂財匱而吳莞然坐乘其弊故魏人請好漢氏乞盟遂躋天號鼎峙而立西屠庸益之郊北裂淮漢之涘東包百越之地南括群蠻之表於是講八代之禮蒐三王之樂告類上帝拱揖群后虎臣毅卒循江而守長棘勁鎩望飆而奮庶尹盡規於上四民展業于下化協殊裔風衍遐圻乃俾一介行人撫巡外域巨象逸駿擾於外閑明珠瑋寶耀於內府珍瑰重跡而至奇玩應響而赴輶軒騁於南荒衝輣息於朔野齊民免干戈之患戎馬無晨服之虞而帝業固矣大皇既沒幼主莅朝姦回肆虐景皇聿興虔修遺憲政無大闕守文之良主也降及歸命之初典刑未滅故老猶存大司馬陸公以文武熙朝左丞相陸凱以謇諤盡規而施績范慎以威重顯丁奉離斐以武毅稱孟宗丁固之徒為公卿樓玄賀邵之屬掌機事元首雖病股肱猶存爰及末葉群公既喪然後黔首有瓦解之志皇家有土崩之釁曆命應化而微王師躡運而發卒散于陣民奔于邑城池無藩籬之固山川無溝阜之勢非有工輸雲梯之械智伯灌激之害楚子築室之圍燕人濟西之隊軍未浹辰而社稷夷矣雖忠臣孤憤烈士死節將奚救哉夫曹劉之將非一世所選向時之師無曩日之眾戰守之道抑有前符險阻之利俄然未改而成敗貿理古今詭趣何哉彼此之化殊授任之才異也辨亡論下辨亡論下昔三方之王也魏人據中夏漢氏有岷益吳制荊揚而奄交廣曹氏雖功濟諸華虐亦深矣其民怨矣劉公因險以飾智功已薄矣其俗陋矣夫吳桓王基之以武太祖成之以德聰明叡達懿度弘遠矣其求賢如不及恤民如稚子接士盡盛德之容親仁罄丹府之愛拔呂蒙於戎行識潘濬於係虜推誠信士不恤人之我欺量能授器不患權之我偪執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑宮菲食以豐功臣之賞披懷虛己以納謨士之算故魯肅一面而自託士燮蒙險而致命高張公之德而省游田之娛賢諸葛之言而割情欲之歡感陸公之規而除刑法之煩奇劉基之議而作三爵之誓屏氣跼蹐以伺子明之疾分滋損甘以育凌統之孤登壇慷慨歸魯子之功削投惡言信子瑜之節是以忠臣競盡其謨志士咸得肆力洪規遠略固不厭夫區區者也故百官苟合庶務未遑初都建業群臣請備禮秩天子辭而不許曰天下其謂朕何宮室輿服蓋慊如也爰及中葉天人之分既定百度之闕粗修雖醲化懿綱未齒乎上代抑其體國經民之具亦足以為政矣地方幾萬里帶甲將百萬其野沃其兵練其器利其財豐東負滄海西阻險塞長江制其區宇峻山帶其封域國家之利未見有弘於茲者矣借使中才守之以道善人御之有術敦率遺典勤民謹政循定策守常險則可以長世永年未有危亡之患也或曰吳蜀唇齒之國蜀滅則吳亡理則然矣夫蜀蓋藩援之與國而非吳人之存亡也何則其郊境之接重山積險陸無長轂之徑川阨流迅水有驚波之艱雖有銳師百萬啟行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公喻之長蛇其勢然也昔蜀之初亡朝臣異謀或欲積石以險其流或欲機械以御其變天子總群誼而諮之大司馬陸公公以四瀆天地之所以節宣其氣固無可遏之理而機械則彼我之所共彼若棄長技以就所屈即荊揚而爭舟楫之用是天贊我也將謹守峽口以待禽耳逮步闡之亂憑寶城以延強寇重資幣以誘群蠻于時大邦之眾雲翔電發懸旍江介築壘遵渚襟帶要害以止吳人之西而巴漢舟師沿江東下陸公以偏師三萬北據東坑深溝高壘案甲養威反虜踠跡待戮而不敢北窺生路強寇敗績宵遁喪師太半分命銳師五千西禦水軍東西同捷獻俘萬計信哉賢人之謀豈欺我哉自是烽燧罕警封域寡虞陸公沒而潛謀兆吳釁深而六師駭夫太康之役眾未盛乎曩日之師廣州之亂禍有愈乎向時之難而邦家顛覆宗廟為墟嗚呼人之云亡邦國殄瘁不其然歟易曰湯武革命順乎天玄曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之由人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂捨其參者也夫四州之萌非無眾也大江之南非乏俊也山川之險易守也勁利之器易用也先政之策易循也功不興而禍遘者何哉所以用之者失也是故先王達經國之長規審存亡之至數謙己以安百姓敦惠以致人和寬沖以誘俊乂之謀慈和以結士民之愛是以其安也則黎元與之同慶及其危也則兆庶與之共患安與眾同慶則其危不可得也危與下共患則其難不足恤也夫然故能保其社稷而固其土宇麥秀無悲殷之思黍離無愍周之感矣
