body:
  text: 楊偉上景初厤表臣覽載籍斷考厤數時以紀農月以紀事其所由來遐而尚矣乃自少昊則玄鳥司分顓頊帝嚳則重黎司天唐帝虞舜則羲和掌日三代因之則世有日日官司厤則頒之諸侯諸侯受之則頒于境內夏后之世羲和湎淫廢時亂日則書載胤征由此觀之審農時而重人事歷代然之也逮至周室既衰戰國橫騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流怪蟄蟲之不藏也是時也天子不協時司厤不協日諸侯不受職日御不分朔人事不恤廢棄農時仲尼之撥亂于春秋說襃貶糾黜司厤失閏則譏而書之登臺頒朔則謂之有禮自此以降暨于秦漢乃復以孟冬為歲首閏為後九月中節乖錯時月紕繆加時後天蝕不在朔累載相襲久而不革也至武帝元封七年始乃悟其繆焉于是改正朔更厤數使大才通人更造太初厤校中朔所差以正閏分諜中星得度以攷疏密以建寅之月為正朔以黃鍾之月為律厤初其厤斗分太多後遂疏闊至元和二年復用四分厤施而行之至于今日攷察日蝕率常在晦是則斗分太多故先密後疏而不可用也是以臣前以制典餘日推攷天路稽之前典驗之以蝕朔詳而精之更建密厤則不先不後古今中天以昔在唐帝協日正時允釐百工咸熙庶績也欲使當今國之典禮凡百制度皆韜合往古郁然備足乃改正朔更厤數以大呂之月為歲首以建子之月為厤初臣以為昔在往代則法日顓頊曩自軒轅則厤日黃帝暨至漢之孝武革正朔更厤數改元曰太初因名太初厤今改元為景初宜曰景初厤臣之所建景初厤法數則約要施用則近密治之則省功學之則易知雖復使研桑心算隸首運籌重黎司晷羲和察景以攷天路步驗日月究極精微盡術數之極者皆未能竝臣如此之妙也是以累代厤數皆疏而不密自黃帝以來常改革不己壬辰元以來至景初元年丁巳歲積四千四十六算止此元以天正建子黃鍾之月為厤初元首之歲夜半甲子朔旦冬至元法萬一千五十八晉書律厤志下宋書厤志一厤議六十日中疏密可知不待十年若不從法是校方圓棄規矩考輕重背權衡課長短廢尺寸論是非違分理若不先定校厤之本法而懸聽棄法之末爭則孟軻所謂方寸之木可使高于岑樓者也今韓翊據劉洪術者知貴其術珍其法而棄其論背其術廢其言違其事是非必使洪奇妙之式不傳來世若知而違之于挾故而背師也若不知據之是為挾不知而罔知也晉書律厤志中黃初中楊偉議云云諫明帝治宮室今作宮室斬伐生民墓上松柏毀壞碑獸石柱辜及亡人傷孝子心不可以為後世之法則魏志曹爽傳注引世語時務論轡策靽摯之設雖剛怒麤戾蹄齧之馬若足拘靽縶口啣轡勒箠策必至則躡䠱循軌御覽三百五十九表裴頠秀有佐命之勳不幸嫡長喪亡遺孤稚弱頠才德英茂足以興隆國嗣晉書裴頠傳辭大都督表西有昆夷之患北有幽并之戌天下勞擾年穀不登興軍致討懼非其時又臣老邁非所克堪晉書賈充傳伐吳之役詔充為大都督請召還諸軍表吳未可悉定方夏江淮下溼疾疫必起宜召諸軍以為後圖雖腰斬張華不足以謝天下晉書賈充傳齊王攸為弘訓太后服議河南尹王恂上言弘訓太后入廟合食于景皇帝齊王攸不得行其子禮充議以為禮諸侯不得祖天子公子得禰先君皆謂奉統承祀非謂不得服其父祖也攸身服三年喪事自如臣制晉書頁充傳請議郄詵假葬除服表前太子洗馬濟郄詵寄止衛國文學講堂十餘年母亡不致喪歸便于堂北壁外下棺謂之假葬三年即吉詔用為征東參軍或以為城寺之內屋壁之閒無葬虔不成葬則不應除服主者今欲明用權不過其舉下司徒部博士評議通典一百三太康中請除九品用土斷疏昔聖王崇賢舉善而教用使朝廷德讓野無邪行誠以閭伍之政足以相檢詢事考言必得其善人知名不可虛求故還脩其身是以崇賢而俗益穆黜惡而行彌篤斯則鄉舉里選者先王之令典自茲以降此法陵遲魏氏承顛覆之運起喪亂之後人士流移攷詳無地故立九品之制粗具一時選用之本耳其始造也鄉邑清議不拘爵位襃貶所加是為勸勵猶有鄉論餘風中間漸染遂計資定品使天下觀望唯以居位為貴人棄德而忽道業爭多少于錐刀之末傷損風俗其弊不細今九域同規大化方始臣等以為宜皆蕩除末法一擬古制以土斷定自公卿以下皆以所居為正無復懸客遠屬異土者如此則同鄉鄰伍皆為邑里郡縣之宰即以居長盡除中正九品之制使舉善進才各由鄉論然則下敬其上人安其教俗與政俱清化與法竝濟人知善否之教不在交游即華競自息各求于已矣今除九品則宜準古制使朝臣共相舉任于出才之路既博且可以厲進賢之公心覈在位之明闇誠令典也晉書衛瓘傳太康中瓘與太尉汝南王亮上疏奏免山濤濤以微苦久不視職手詔頻煩猶未順旨參議以為無專節之尚違至公之義若實沈篤亦不宜居位可免濤官晉書山濤傳奏請贈鄭默三司默才行名望宜居論道五升九卿位未稱德宜贈三司晉書鄭袤附傳與某書頓州民衛瓘惶恐死罪中闕音敬望想盡懷在外累年始爾得還情甚踴躍旦望州里上領節度明日乃入奉說欣承福昨自白不具瓘惶恐死罪淳化閣帖二與魏舒書每與足下共論此事日日未果可謂瞻之在前忽然在後矣晉書魏舒傳舒以司徒劇陽子遜位還第司空衛瓘與舒書又見御覽四百二十四引王隱晉書王昌前母服議或云嫡不可二前妻宜絕此為奪舊與新違母從子禮律所不許人情所未安也或云絕與死同無嫌二嫡據其相及欲令服此為論嫡則死議服則生若還自相伐理又不通愚以為地絕死絕誠無異也宜一如前母不復追復晉書禮志中泰康元年倉曹掾衛恆議云云案王昌事詳前竟陵王楙文書一日有恨知問未面為歎欲七日去邪恆白淳化閣帖二古文四體書勢昔在黃帝創制告物有沮誦倉頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則謂之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也夫指事者在上為上在下為下象形者日滿月虧效其形也形聲者以類為形配以聲也會意者止戈為武人言為信也轉注者以老壽考也假借者數言同字其聲雖異文義一也自黃帝至三代其文不改及秦用篆書焚燒先典而古文絕矣漢武帝時魯共王壞孔子宅得尚書春秋論語孝經時人已不復知有古文謂之科斗書漢世祕藏希得見之魏初傳古文者出于邯鄲淳恆祖敬侯寫淳尚書後以示淳而淳不別至正始中立三字石經轉失淳法因科斗之名遂效其形太康元年汲縣人盜發魏襄王冢得策書十餘萬言案敬侯所書猶有髣髴古書亦有數種其一卷論楚事者最為工妙恆竊悅之故竭愚思以贊其美愧不足廁前賢之作冀以存古人之象焉古無別名謂之字勢云黃帝之史沮誦倉頡眺彼鳥跡始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既泯古文亦滅魏文好古世傳丘墳歷代莫發真偽靡分大晉開二弘道敷訓天垂其象地耀其文其文乃耀粲矣其章因聲會意類物有方日處君而盈其度月執臣而虧其旁雲委𧉮而上布星離離以舒光木卉苯䔿以垂穎山嶽峨嵯而連岡蟲跂跂以若動鳥似飛而未揚觀其錯筆綴墨用心精專勢和體均發止無閒或守正循檢矩折規旋或方圓靡則因事制權其曲如弓其直如弦矯然特出若龍騰于川森爾下頹若雨墜于天或引筆奪力若鴻雁高飛邈邈翩翩或縱肆阿那若流酥懸羽靡靡綿綿是故遠而望之若翔風厲水清波漪漣就而察之有若自然信黃唐之遺跡為六蓺之範先籀篆蓋其子孫隸草乃其曾玄覩物象以致思非言辭之所宣晉書衛瓘附傳魏志劉劭傳注引文章敘錄篆書昔周宣王時史籀始著大篆十五篇或與古同或與古異世謂之籀書者也及平王東遷諸侯力政家殊國異而文字乖形秦始皇帝初兼天下丞相李斯乃奏益之罷不合秦文者斯作倉頡篇中車府令趙高作爰厤篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者或曰下土人程邈為衙獄吏得罪始皇幽繫雲陽十年從獄中作小篆少者增益多者損減方者使員員者使方奏之始皇始皇善之出以為御史使定書或曰邈所定乃隸字也自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使司空甄豐校文字部改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者也三曰篆書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也又許慎撰說文用篆書為正以為體例最可得而論也秦時李斯號為工篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異于斯而亦稱善邯鄲淳師焉略究其妙韋誕師淳而不及也太和中誕為武都太守以能書留補侍中魏氏寶器銘題皆誕書也漢末又有蔡邕采斯喜之法為古今雜形然精密簡理不如淳也邕作篆勢曰鳥遺跡皇頡循聖作則制斯文體有六篆為真形要妙巧入神或龜文鍼列櫛比龍鱗紓體放尾長翅短身頹若黍稷之垂穎蘊若虫蛇之棼縕揚波振𢶡鷹跱鳥震延頸脅翼勢似陵雲或輕筆內投微本濃末若絕若連似露緣絲凝垂下端從者如懸衡者如編杳杪邪趣不方不圓若行若飛跂跂翩翩遠而望之象鴻鵠群遊駱驛遷延迫而視之端際不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其郤閒般倕揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲斌斌其可觀摛華豔于紈素為學蓺之範閑喜文德之弘懿蘊作者之莫刊思字體之頫仰舉大略而論旃晉書衛瓘附傳魏志劉劭傳注引文章敘錄又蔡中郎集又水經注河水四又蓺文類聚七十四初學記二十一御覽七百四十九引蔡邕篆勢隸書秦既用篆奏事繁多篆字難成即令隸人佐書曰隸字漢因行之獨符印璽幡信題署用篆隸書者篆之捷也上谷王次仲始作楷法至靈帝好書世多能者而師宜官為最大則一字徑丈小則方寸千言甚矜其能或時不持錢詣酒家飲因書其壁雇觀者以酬酒討錢足而滅之每書輒削而焚其札梁鵠乃益為版而飲之酒候其醉而竊其札鵠卒以攻書至選部尚書宜官後為袁術將今鉅鹿宋子有耿球碑是術所立其書甚工云是宜官也梁鵠奔劉表魏武帝破荊州募求鵠鵠之為選部也魏武欲為洛陽令而以為北部尉故懼而自縛詣門署軍假司馬使在祕書以勤書自效是以今者多有鵠手跡魏武帝懸著帳中及以釘壁玩之以為勝宜官鵠字孟黃安定人魏宮殿題署多是鵠篆鵠宜為大字邯鄲淳宜為小字鵠謂淳得次仲法然鵠之用筆盡其勢矣鵠弟子毛弘教于祕書今八分皆弘法也漢末有左子邑小與淳鵠不同然亦有名魏初有鍾胡二家為行書法俱學之于劉德升而鍾氏小異然亦各有巧今大行于世云作隸勢曰鳥跡之變乃惟佐隸蠲彼繁文崇此簡易厥用既弘體象有度煥若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或窮隆恢廓或櫛比鍼列或砥平繩直或蜿蜓膠戾或長邪角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絕纖波濃點錯落其間若鍾𧇽設張庭燎飛煙嶄巖嵾嵯高下屬連似崇臺重宇增雲冠山遠而望之若飛龍在天近而察之心亂目眩奇姿譎詭不可勝原研桑所不能計辛賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奧之不傳聊俯仰而詳觀舉大較而論旃晉書衛瓘附傳魏志武帝紀注又劉劭傳注草書漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇後有崔瑗崔寔亦皆稱工杜氏殺字甚安而書體微瘦崔氏甚得筆勢而結字小疏弘農張伯英者因而轉精其巧凡家之衣帛必書而後練之臣池學書池水盡黑下筆必為楷則號怱怱不暇草書寸紙不見遺至今世尢寶其書韋仲將謂之草聖伯英弟文舒者次伯英又有姜孟潁梁孔達田彥和及韋仲將之徒皆伯英弟子有名于世然殊不及文舒也羅叔景趙元嗣者與伯英竝時見稱于西州而矜巧自與眾頗惑之故英自稱上比崔杜不足下方羅趙有餘河閒張超亦有名然雖與崔氏同州不如伯英之得其法也崔瑗作草書勢曰書契之興始自頡皇寫彼鳥跡以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪勦其墨翰惟作佐隸舊字是刪草書之法蓋又𥳑略應時諭指周于卒迫兼功竝用愛日省力純儉之變豈必古式觀其法象俯仰有儀方不中矩員不副規抑左揚右望之若欹竦企鳥跱志在飛移狡獸暴駭將奔未馳或𪑜𪐴點𪑮狀似連珠絕而不離畜怒怫鬱放逸生奇或凌遽而惴慄若據高而臨危旁點邪附似蜩螗挶枝絕筆收勢餘綖糾結若山蜂施毒看隙緣巇螣蛇赴穴頭沒尾垂是故遠而望之𨻵焉若隤岸崩崖就而察之一畫不可移纖微要妙臨時從宜略舉大較髣髴若斯晉書衛瓘附傳魏志劉劭傳注蓺文類聚七十四又初學記二十一引崔瑗草書勢兩條陳諺言表諺言廷尉獄平如砥有錢生無錢死此諺之起死生之出于此法獄也初學記二十上書言祖父不合從坐今施行詔書有考子正父死刑或鞭父母問子所在近主者所稱庚寅詔書舉家逃亡家長斬若家長是逃亡之主斬之雖重猶可設子孫犯事將考父祖逃亡逃亡是子孫而父祖嬰其酷傷順破教如此者眾相隱之道離則君臣之義廢君臣之義廢則犯上之奸生矣秦網密文峻漢興埽除煩苛風移俗易幾于刑厝大人革命不得不蕩其穢慝通其圯滯今詔書宜除者多有便于當今著為正條則法差𥳑易晉書刑法志展為晉王大理考擿故事有不合情者上書云云又見群書治要二十九引晉書又通典一百六十四上言宜復肉刑古者肉刑事經前聖漢文除之增加大辟今人戶彫荒百不遺一而刑法峻重非句踐養胎之義也愚謂宜復古施行以隆太平之化晉書刑法志又通典一百六十八上表自陳臣乃祖故太保瓘于魏咸熙之中太祖文皇帝為元輔之日封蕭陽侯大晉受禪進爵為公歷位太保總錄朝政于時賈庶人及諸王用事忌瓘忠節故楚王瑋矯詔致禍前朝以瓘秉心忠正加以伐蜀之勳故追封蘭陵郡公永嘉之中東海王越食蘭陵換封江夏戶邑如舊臣高祖散騎侍郎璪之嫡孫纂承封爵中宗元皇帝以曾祖故右衛將軍崇承襲逮于臣身伏聞祠部郎荀伯子表欲貶降復封蕭陽夫趙氏之忠寵延累葉漢祖開封誓以山河伏願陛下錄既往之勳垂罔極之施乞出臣表付外參詳案書荀伯子傳義熙九年
