body:
  text: 苻洪諫殺朱軌臣聞聖王之御天下也土階三尺茅茨不翦食不纍味刑措而不用亡君之馭海內也傾宮瓊榭象著玉柸截脛剖心脯賢刳孕故其亡也惚焉今襄國鄴宮足康帝宇長安洛陽何為者哉盤于游田耽于女德三代之亡恆必由此而忽為獵車千乘養獸萬里奪人妻女十萬盈宮尚書朱軌納言大臣以道路不修將加酷法此自陛下政之失和陰陽災沴暴降霖雨七旬霽方二日雖有鬼兵百萬尚未及修之而況人乎刑政如此其如史筆何其如四海何特願止作徒休宮女赦朱軌允衆望晉書載紀石虎傳上尚書朱軌與中黃門嚴生不協會大雨霖道路陷滯囚譖軌不修道虎殺之軌之囚也冠軍苻洪諫云云又見十六國春秋十七下書求賢其自公卿已下歲舉賢良方正孝廉清才多略博學秀才異行各一人或獻書規諫或面陳朕過其悉以聞勿拘貴賤十六國春秋三十四指河誓弟雄及兄子菁若事不捷汝死有如河無相見也御覽四百八十引晉中興書下書用峻刑極罰朕受皇天之命承祖考之業君臨萬邦子育百姓嗣統以來有何不善而謗讟之音扇滿天下殺不過千而謂刑虐行者比肩未足為稀方當峻刑極罰復如朕何晉書載紀苻生傳又十六國春秋三十五燕平下詔大赦朕以寡德猥承休命不能懷遠以德柔服四維至使戎軍屢駕有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始十六國春秋三十六以鄧羌為鎮軍將軍詔司隸校尉董牧王畿吏責甚重非所以優禮名將光武不以吏事處功臣實責之也羌有廉李之才朕方委以征伐之事北平胸奴南蕩揚越羌之任也司隸何足以嬰之其進號鎮軍將軍位特進十六國春秋四十二沙汰衆僧別詔朗法師戒德冰霜學徒清秀崑崙一山不在搜例高僧傳五又十六國春秋四十二下詔簡學生受經新喪賢輔百司或未稱朕心可置聽訟觀于未央南朕五日一臨以求民隱今天下雖未大定權可偃武修文以稱武侯雅旨其尊崇儒教禁老莊圖讖之學犯者棄市妙𥳑學生太子及公侯百僚之子皆就學受業中外四禁二衛四軍長上將士皆令受學二十人給一緪生教讀音句後宮置典學立內司以教掖庭選閹人及女隸敏慧者詣博土授經十六國春秋三十七下詔分遣侍臣問民疾苦朕聞王者勞于求賢逸于得士斯言何其驗也往得丞相掌謂帝王易為自丞相違世鬢髮中白每一念之不覺酸動今天下既無丞相或政教淪替可分遣侍臣周巡郡縣問民疾苦十六國春秋三十七下詔徵張天錫入朝涼州刺史張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍苟萇左將軍毛盛中書令梁熙步兵校尉姚萇等將兵臨河西遣尚書郎閻負梁殊銜命軍前下書徵天錫入朝若有違王命即進師撲討十六國春秋三十七又七十四下詔論平涼州及索頭功張天錫藉祖父之資承百年之業擅命河右叛據偏隅索頭世跨朔北中分區域東賓穢貊鈿引烏孫控弦百萬虎視雲中爰命兩師分討黠虜役不淹歲窮殄二凶俘降百萬闢土九千五帝之所未賓周漢之所未至莫不重譯來王懷風率職有司可速班功受爵戎士悉復之五歲賜爵三級十六國春秋三十七詔慕容沖古人兵交使在其閒卿遠來草創得無勞乎今送一袍以明本懷朕于卿恩分如何而于一朝忽為此變晉書載紀苻堅傳下堅遣使送錦袍一領遺沖稱詔云云又十六國春秋三十八下書徵王猛輔政咸陽內史王猛言彰出納所在著績有臥龍之才宜入贊百揆絲綸王言可徵拜侍中中書令領京兆尹特進光祿大夫十六國春秋三十六下書召徐統子孫士死知已由來格謨故喬公一言魏祖追慟趙司隸高平徐統往在鄴都識朕于童稚每思其殷勤之言弗敢忘也可召其子孫詣行在所十六國春秋三十六下書遣鄧羌討蜀巴夷險逆寇亂益州招引吳軍為脣齒勢特進鎮軍將軍護羌校尉鄧羌可帥土五萬星迄赴討十六國春秋三十六下書伐晉吳人敢恃江山僭稱大號輕率犬羊屢窺王境朕將巡狩省方登會稽而朝諸侯復禹績而定九州今王師所擬必有征無戰伐國存君義同一體宜時進討以清宇內便可戒嚴速修戎備悉發諸州公私馬人十丁遣一丁門在灼然者為崇文義從其良家子年二十已下武藝驍勇富室材雄者皆拜羽林郎御覽三百二十三引蕭方等三十國春秋又見十六國春秋三十八下令國中東南平定指日當以司馬昌明為尚書僕射可速為起第魏書九十六晉司馬晶明傳期克捷之日其以司馬昌明為尚書左僕射謝安為吏部尚書桓沖為侍中勢還不遠可先為起第以待之十六國春秋三十八又下書兼道赴壽春下令敢言吾至壽春者拔舌晉書載紀苻堅傳下又十六國春秋三十八與諸鎮書昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳晉書習鑿齒傳襄陽陷苻堅素聞其名與道安俱輿而致焉以其蹇疾與諸鎮書云云又十六國春秋三十七與僧朗書皇帝敬問泰山朗和尚大聖應期靈權超逸蔭蓋十方化融無外若山海之養群生等天地之育萬物養生存死澄神寂妙朕以虛薄生與聖會而隔以萬機不獲輦駕今遣使者安車相請應冀靈光回蓋京邑并奉紫金數斤供鍍形像絹綾三十匹奴子三人可備灑掃至人無違幸望納受想必玄鑒見朕意焉廣弘明集三十五十六國春秋四十二報王猛將軍役不逾時而元惡克舉勳高前古朕今親帥六師星馳電赴將軍其休養將士以待朕至然後取之十六國春秋三十六朕之于卿義則君臣親踰骨肉雖復桓昭之有管樂玄德之有孔明自謂踰之夫人主勞于求才逸于得士既以六州相委則朕無東顧之憂非所以為優崇乃朕自求安逸也夫取之不易守之亦難苟任非其人患生慮表岩獨朕之憂亦卿之責也故虛位台鼎而以分陝為先卿未照朕心殊乖素望新政俟才宜速銓補俟東方化洽當袞衣西歸十六國春秋三十六卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜厲士之際顛覆厥德朕奇卿于暫見擬為臥龍卿亦異朕于一言回考槃之雅志豈不精契神交千載之會雖傅巖入夢姜公悟兆今古一時亦不殊也自卿輔政幾將二紀內釐百揆外蕩群凶天下向定彝倫始敘朕且欲從容于上望鄉勞心于下弘濟之務非卿而誰晉書載紀王猛傳又十六國春秋四十二報苻融汝為德未充而懷是非立善未稱而名過其實詩云德輶如毛人鮮克舉君子處高戒懼傾敗可不務乎今四海事曠兆庶未寧黎元應撫夷狄應和方將混六合以一家同有形于赤子汝宜息之勿懷耿介夫天道助順修德則禳災苟求諸己何懼外患焉晉書載紀符堅傳上苻融上疏諫用慕容暐等堅報之云云又十六國春秋三十七報慕容垂朕以不德忝承靈命君臨萬邦三十年矣遐方幽裔莫不來庭惟東南一隅敢違王命朕爰奮六師恭行天罰而玄機不弔王師敗績賴卿忠誠之至輔翼朕躬社稷之不隕者卿之力也詩云中心藏之何日忘之方任卿以元相爵卿以郡侯庶弘濟艱難敬酬勳烈何圖伯夷忽毀冰操柳惠倏為淫夫覽表惋然有慚朝士卿既不容于本朝匹馬而歸命朕則寵卿以將位禮卿以上賓任同舊臣爵齊勳輔歃血斷金披心相付謂卿食椹懷音保之偕老豈意畜水覆舟養獸反害悔之噬臍將何所及誕言駭衆誇擬非常周武之事豈卿庸人所可論哉失籠之鳥非羅所羈脫綱之魚豈罟所制翹陸任懷何煩聞也念節垂老老而為賊生為叛臣死為逆鬼侏張幽顯布毒存亡中原士女何痛如之朕之曆運興喪豈復由卿但長樂平原以未立之年遇卿于兩都慮其經略未稱朕心所恨者此焉而已晉書載紀慕容垂傳又十六國春秋四十四招魂有忠有靈來就此庭歸汝先父勿為妖形晉書載紀苻堅傳下三輔人為慕容沖所略者放火為內應得免者十有一二堅設祭而招之云云又十六國春秋三十八下書攻慕容永鮮卑慕容永乃我之騎將首亂京師禍傾社稷豕凶繼逆方請逃歸是而可忍孰不可忍其遣左丞相王永及東海王纂帥禁衛虎旅夾而攻之十六國春秋三十九答謝玄書今往大文綾羅各五十匹藝文類聚八十五又御覽八百十六作今往大文羅大綾各五匹又十六國春秋三十八末多以酬厚意四字告苻堅神主維曾孫皇帝臣登以大皇帝之靈恭踐寶位昔五將之難賊羌肆害于聖躬實登之罪也今合義旅衆餘五萬精甲徑兵足以立功年穀豐穰足以資贍即日星馳電邁直造賊庭奮不顧命隕越為期庶上報皇帝酷冤下雪臣子大恥惟帝之靈降鑒厥誠晉書載紀苻登傳又十六國春秋四十又告神主曾孫登自受任執戈幾將一紀未嘗不上天錫祐皇鑒垂矜所在必克賊旅冰摧今太皇帝之靈降災疢于逆羌以形類推之醜虜必將不振登當因其隕斃順行天誅拯復梓宮謝罪清廟晉書載紀苻登傳又十六國春秋四十上疏諫用慕容暐等臣聞東胡在燕曆數彌久逮于石亂遂據華夏跨有六州南面稱帝陛下爰命六師大舉征討勞卒頻年勤而後獲本非慕義懷德歸化而今父子兄弟列官滿朝執權履職勢傾勞舊陛下親而幸之臣愚以為猛獸終不可養狼子野心往年星異災起于燕願少留意以思天戒臣據可言之地不容默己詩曰兄弟急難朋友好合昔劉向以肺腑之親尚能極言況于臣乎晉書載紀苻堅傳上又十六國春秋三十七與慕容垂皇甫真書苻堅王猛皆人傑也謀為燕患為日久矣今若乘機不赴恐燕之君臣將有涌東之悔晉書載紀慕容暐傳又十六國春秋二十八
