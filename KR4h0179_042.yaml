body:
  text: 卷四十二杜預舉賢良方正表案蘇贊布行于草野著德于閭閻放心直意若得珥筆丹墀推訪格言必有諤諤匪躬之節初學記二十案初學記此下有陸雲薦張瞻文張溥誤采入杜預集中今削不收表長史劉繪修治洛陽以東運渠通赤馬舟書鈔一百三十七所領郡曲皆居南鄉界所近鉗盧大陂下有良田文選南都賦注列上故太傅羊祜所辟士表祜雖開府而不備僚屬引謙之至宜見顯明及扶疾辟士未到而沒家無胤嗣官無命士此方之望隱憂載懷夫篤終追遠人德歸厚漢祖不惜四千戶之封以慰趙子弟心請議之晉書羊祜傳陳伐吳至計表自閏月以來賊但敕嚴下無兵上以理勢推之賊之窮計力不兩完必先護上流勤保夏口以東以延視息無緣多兵西上空其國都而陛下過聽便用委棄大計縱敵患生此誠國之遠圖使舉而有敗勿舉可也事為之制務從完牢若或有成則開太平之基不成不過費損日月之閒何惜而不一試之若當須後年天時人事不得如常臣恐其更難也陛下宿議分命臣等隨界分進其所禁持東西同符萬安之舉未有傾敗之慮臣心實了不敢以曖昧之見自取後纍惟陛下察之晉書杜預傳又表羊祜與朝臣多不同不先博畫而密與陛下共施此計故益令多異凡事當以利害相較今此舉十有八九利其一二止于無功耳其言破敗之形亦不可得直是計不出己功不在身各恥其前言故守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後難故輕相同異也昔漢宣帝議趙充國所上事效之後詰責諸議者皆叩頭而謝以塞異端也自秋已來討賊之形頗露若今中止孫皓怖而生計或徙都武昌更完修江南諸城遠其居人城不可攻野無所掠積大船于夏口則明年之計或無所及晉書杜預傳奏上律令注解被敕以臣造新律事律吏杜景李復等造律皆未清本末之意者也法者蓋是繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁𥳑難犯易見則人知所避難犯則幾于刑厝刑之本在於簡直故必審名分審名分者必忍小理古之刑書銘之鐘鼎鑄之金石斯所以遠塞異端絶異理也法出一門然後人知恆禁吏無淫巧政明于上民安于下今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也書鈔四十五藝文類聚五十四引杜預奏事又見晉書杜預傳奏上黜陟課略臣聞上古之政因循自然虛己委誠而信順之道應神感心通而天下之理得其後淳朴漸散彰美顯惡設官分職以頒爵祿弘宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博詢敷納以言及至末世不能紀遠而求于密微疑諸心而信耳目疑耳目而信𥳑書簡書愈繁官方愈僞法令滋章巧飾彌多昔漢之刺史亦歲終奏事不制笇課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由于纍細以違其體故歷代不能通也豈若申唐堯之舊典去密就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任達官各考所統在官一年以後每歲言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採案其六歲處優舉者超用之六歲處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之今考課之品所對不鈞誠有難易若以難取優以易而否主者固當準量輕重微加降殺不足復曲以法盡也己丑詔書以考課難成聽通薦例薦例之理即亦取于風聲六年頓薦黜陟無漸又非古者三考之意也今每歲一考則積優以成陟纍劣以取黜以士君子之心相處未有官故六年六黜清能六進否劣者也監司將亦隨而彈之若令上下公相容過此為清議大頽亦無取于黜陟也晉書杜預傳通典十五奏秦州軍事臣嘗聞邊人說虜專以騎為寇穿塹不如作馬坎馬坎法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作塢施槍著坎中訖薄覆其上如此則虜當築地而行不敢輒往來也御覽三百三十七奏履藉田竊惟藉田令本以藉田千畝十頃之田計其案行周旋不過數里凡宗廟粢盛御用膳羞及群神之調于是取所藉戶口足以當一縣一邑所供至重事貴臨履也奏事臣前在南聞魏興西北山有野牛野羊牛之大者二千斤羊之大者千數百斤試令求之今者各得一枚并頭角蹄案其形不與中土牛羊相似然是野獸中所希有藝文類聚九十四御覽八百九十九又九百二竝引杜預奏事藥杵臼澡槃尉斗釜瓮銚槃鎢錥皆亦民間之急用物也御覽七百五十七奏議皇太子除服侍中尚書令司空魯公臣賈充侍中尚書僕射奉車都尉大梁侯臣盧欽尚書新沓伯臣山濤尚書奉車都尉平春侯臣胡威尚書劇陽子臣魏舒司尚書堂陽子臣石鑒尚書豐樂亭侯臣杜預稽首言禮官參議博士張靖等議以為孝文權制三十六日之服以日易月道有污隆禮不得全皇太子亦宜割情除服博士陳逵等議以為三年之喪人子所以自盡故聖人制禮自上達下是以今制將吏諸遭父母喪皆假寧二十五月敦崇孝道所以風化天下皇太子至孝著于內而衰服除于外非禮所謂稱情者也宜其不除臣欽臣舒臣預謹案靖逵等議各見所學之一端未曉帝者居喪古今之通禮也自上及下尊卑貴賤物有其宜故禮有以多為貴者有以少為貴者有以高為貴者有以下為貴者唯其稱也不然則本末不經行之不遠天子之與群臣雖哀樂之情若一而所居之宜實異故禮不得同易曰上古之世喪期無數虞書稱三載四海遏密八音其後無文至周公旦乃稱殷之高宗諒暗三年不言其傳曰諒信也暗默也下逮五百餘歲而子張疑之以問仲尼仲尼答云何必高宗古之人皆然君薨百官總己以聽于冢宰三年周景王有后世子之喪既葬除喪而樂晉叔向譏之曰三年之喪雖貴遂服禮也王雖弗遂宴樂已早亦非禮也此皆天子喪事見于古文者也稱高宗不云服喪三年而云諒暗三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂已早明既葬應除而違諒暗之節也堯崩舜諒暗三年故稱遏密八音由此言之天子居喪齊斬之制菲杖絰帶當遂其服既葬而除諒暗以終之三年無改父之道故百官總己聽于冢宰喪服已除故稱不言之美明不復寢苫枕土以荒大政也禮記三年之喪自天子達又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之節同于凡人心喪之禮終于三年亦無服喪三年之文然繼體之君猶多荒寧自從廢諒暗之制至令高宗擅名于往代子張致疑于當時此乃賢聖所以為譏非譏天子不以服終喪也秦燔書籍率意而行亢上抑下漢祖草創因而不革乃至率天下皆終重服旦夕哀臨經罹寒暑禁塞嫁娶飲酒食肉制不稱情是以孝文遺詔斂畢便葬葬畢制紅禫之除雖不合高宗諒暗之遺近于古典故傳之後嗣于時預修陵廟故斂葬得在浹辰之內因以定制近至明帝存無陵寢五旬乃葬安在三十六日此當時經學疏略不師前聖之病也魏氏革命以既葬為節合于古典然不垂心諒暗同譏前代自泰始開元陛下追尊諒暗之禮慎終居篤允臻古制超絶于殷宗天下歌德誠非靖等所能原本也天子諸侯之禮當以具矣諸侯惡其害己而削其籍今其存者唯士喪一篇戴聖之記雜錯其閒亦難以取正天子之位至尊萬機之政至大群臣之衆至廣不同之于凡人故大行既葬祔祭于廟則因疏而除之己不除則群臣莫敢除故屈己以除之而諒暗以終制天下之人皆曰我王之仁也屈己以從宜皆曰我王之孝也既除而心喪我王猶若此之篤也凡等臣子亦焉得不自勉以崇禮此乃聖制移風易俗之本高宗所以致雍熙豈惟衰裳而已哉若如難者更以權制自居疑于屈伸厭降欲以職事為斷則父在為母朞父卒三年此以至親屈于至尊之義也出母之喪以至親為屬而長子不得有制體尊之義升降皆從不敢獨也禮諸子之職掌國子之倅國有事則帥國子而致之太子惟所用之傳曰君行則守有守則從從曰撫軍守曰監國不無事矣喪服母為長子妻為夫妾為主皆三年內宮之主可謂無事揆度漢制孝文之喪紅禫既畢孝景即吉于未央薄后竇后必不得齊斬于別宮此可知也況皇太子配二之至尊與國為體固宜遠遵古禮近同時制屈除以寬諸下協一代之成典君子之于禮有直而行曲而報有經而等有順而去之存諸內而已禮云非玉帛之謂喪云唯衰麻之謂乎此既臣等所謂經制大義且即實近言亦有不安今皇太子至孝蒸蒸發于自然號咷之慕匍匐殯宮大行既奠往而不反必想像平故倣徨寢殿若不變從諒暗則東宮臣僕義不釋服此為永福官屬當獨衰麻從事出入殿省亦難以繼今將吏雖蒙同二十五月之事寧至于大臣亦奪其制昔翟方進自以身為漢相居喪三十六日不敢踰國典而況于皇太子臣等以為皇太子宜如前奏除服諒暗終制晉書禮志中又略見通典八十又八十二諒暗之制乃自上古是以高宗無服喪之文而唯文稱不言漢文限三十六日魏氏以降既虞為節皇太子與國為體理宜釋服卒哭便除晉書摰虞傳又見宋書禮志二有小異案此檃栝預奏而文不同故竝録之陳農要疏臣輒思惟今者水災東南特劇非但五稼不收居業竝損下田所在停污高地皆多磽塉此即百姓困窮方在來年雖詔書切告長吏二千石為之設計而不廓開大制定其趣舍之宜恐徒文具所益蓋薄當今秋夏蔬食之時而百姓已有不贍前至冬春野無青草則必指仰官穀以為生命此乃一方之大事不可不豫為思慮者也臣愚謂既以水為困當恃魚菜螺蚌而洪波泛濫貧弱者終不能得今者宜大壞兗豫州東界諸陂隨其所歸而宣導之交令饑者盡得水産之饒百姓不出境界之內旦暮野食此目下日給之益也水去之後填淤之田畝收數鍾至春大種五穀五穀必豐此又明年之益也臣前啓典牧種牛不供耕駕至于老不穿鼻者無益于用而徒有吏士穀草之費歲送任駕者甚少尚復不調習宜大出賣以易穀及為賞直詔曰孳育之物不宜減散事遂停寢問主者今典虞右典牧種産牛大小相通有四萬五千餘頭苟不益世用頭數雖多其費日廣古者匹馬丘牛居則以耕出則以戰非如豬羊類也今徒養宜用之牛終為無用之費甚失事宜東南以水田為業人無牛犢今既壞陂可分種牛三萬五千頭以付二州將吏士庶使及春耕穀登之後頭責三百斛是為化無用之費得運水次成穀七百萬斛此又數年後之益也加以百姓降丘宅土將來公私之饒乃不可計其所留好種萬頭可即令右典牧都尉官屬養之人多畜少可竝佃牧地明其考課此又三魏近甸歲當復入數十萬斛穀牛又皆當調習動可駕用皆今日之可全者也晉書食貨志通典二又疏諸欲修水田者皆以火耕水耨為便非不爾也然此事施于新田草萊與百姓居相絶離者耳往者東南草創人稀故得火田之利自頃戶口日增而陂堨歲決良田變生蒲葦人居沮澤之際水陸失宜放牧絶種樹木立枯皆陂之害也陂多則土薄水淺潦不下潤故每有水雨輒復橫流延及陸田言者不思其故因云此土不可陸種臣計漢之戶口以驗今之陂處皆陸業也其或有舊陂舊堨則堅完修固非今所謂當為人患者也臣前見尚書胡威啓宜壞陂其言懇至臣中者又見宋侯相應遵上便宜求壞泗陂徙運道時下都督度支共處當各據所見不從遵言臣案遵上事運道東詣壽春有舊渠可不由泗陂泗陂在遵地界壞地凡萬三千餘頃傷敗成業遵縣領應佃二千六百口可謂至少而猶患地狹不足盡力此皆水之為害也當所共恤而都督度支方復執異非所見之難直以不同害理也人心所見既不同利害之情又有異軍家之與郡縣士大夫之與百姓其意莫有同者此皆偏其利以忘其害者也此理之所以未盡而事之所以多患也臣又案豫州界二度支所領佃者州郡大軍雜士凡用水田七千五百餘頃耳計三年之儲不過二萬餘頃以常理言之無為多積無用之水況于今者水潦瓫溢大為災害臣以為與其失當寧瀉之不滀宜發明詔敕刺史二千石其漢氏舊陂舊堨及山谷私家小陂皆當修繕以積水其諸魏氏以來所造立及諸因雨決溢蒲葦馬腸陂之類皆決瀝之長吏二千石躬親勸功諸食力之人竝一時附功令比及水凍得粗枯涸其所修功實之人皆以俾之其舊陂堨溝渠當有所補塞者皆尋求微迹一如漢時故事豫為部分列上須冬閒東南休兵交代各留一月以佐之夫川瀆有常流地形有定體漢氏居人衆多猶以為患今因其所患而宣寫之迹古事以明近大理顯然可坐論而得臣不勝愚意嘗竊謂最是今日之實益也晉書食貨志通典二皇太子除服議古者天子諸侯三年之喪始同齊斬既葬除服諒暗以居心喪終制不與士庶同禮漢氏承秦率天下為天子終服三年文帝見其不可久行而不知古典更以意制祥禫除喪即吉魏氏直以訖葬為節嗣君皆不復諒暗終制學者非之久矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月嗣君苟若此則天下群臣皆不得除雖志在居篤更逼而不行至今嗣主皆從漢文輕典由處制者非制也今皇太子與尊同體宜復古典卒哭除衰麻以諒暗終制于義既不應不除又無取于漢文乃所以篤喪禮也晉書禮志中通典八十又八十二答盧欽魏舒問傳稱三年之喪自天子達此謂天子絶朞唯有三年喪也非謂居喪衰服三年與士庶同也故后世子之喪而叔嚮稱有三年之喪二也周公不言高宗服喪三年而云諒暗三年此釋服心喪之文也叔嚮不譏景王除喪而譏其燕樂已早明既葬應除而違諒暗之節也春秋晉侯享諸侯子産相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺來歸惠公仲子之賵傳曰弔生不及哀此皆既葬除服諒暗之證先儒舊說往往亦見學者未之思耳喪服諸侯為天子亦斬衰豈可謂終服三年邪上考七代未知王者君臣上下衰麻三年者諸下推將來恐百世之王其理一也非必不能乃事勢不得故知聖人不虛設不行之制仲尼曰禮所損益雖百世可知此之謂也晉書禮志中吉祭議易曰上古之代喪期無數自殷高宗諒暗三年不稱服喪三年而稱諒暗三年此釋服心喪之謂大戴篇曰昔武王崩成王十三而嗣立周公居冢宰攝政明年六月既葬周公冠成王而朝于祖以見諸侯命祝雍作頌是三年之內時明矣故今礿祠蒸嘗于是行焉昔仲尼之制春秋也因魯史以明王法喪中之祥祫譏貶之文著焉通典四十九與王濬書足下既摧其西藩便當徑取秣陵討纍世之逋寇釋吳人于塗炭自江入淮逾于泗汴泝河而上振旅還都亦曠世一事也晉書王濬傳與子耽書知汝頗欲念學令同還車到副書可案録受之當別置一宅中勿復以借人梅鼎祚文紀引玉府新書張采晉文亦有之未知玉府新書是何代書也書十一月十四日預頓首歲忽已終別久益兼其勞道遠書問又簡閒得來說知消息申省次若言面淳化閣帖三親故數移轉想祖父白具云也祖父如足下來言小大云具絶汝親親也有信數附書信以慰吾心也淳化閣帖三七規張參天之黼帳書鈔一百三十二重醞醴醇沃土名清甜甘無常五味相并書鈔一百四十八酌以雕觚盛以彝器騰波傳觴託水班類書鈔一百五十五庶羞既異味代臻糅以丹橘雜以芳鱗書鈔一百四十二太羹生華蘭椒馥芬菰糧雪纍班臠錦文馨香播越氣干青雲書鈔一百四十二一百四十四農父進菰粱之精稗虞官貢飛禽之群伊尹爨以五熟之鼎易牙投以犀象之器書鈔一百四十二膳夫騁伎飄忽若仙披素麵之揮霍若將絶而復連書鈔一百四十四飛刀覆切解髮雜疊各要穀輕鹹酸得適和味應宜書鈔一百四十二火瞻失度齊以制和宰夫奉制而恭心解也
