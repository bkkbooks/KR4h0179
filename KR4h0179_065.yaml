body:
  text: 嵇喜嵇康傳家世儒學少有俊才曠邁不群高亮任性不修名譽寬𥳑有大量學不師授博洽多聞長而好老莊之業恬靜無欲性好服食常採御上藥善屬文論彈琴詠詩自足于懷抱之中以為神仙者稟之自然非積學所致至于導養得理以盡性命若安期生彭祖之倫可以善求而得也箸養生篇知自厚者所以喪其所生其求益者失其性超然獨達遂放世事縱意于塵埃之表撰録上古以來聖賢隱逸遁心遺名者集為傳贊自混沌至于舌管凡百一十有九人蓋求之于宇宙之內而發之乎千載之外者矣故世人莫得而名焉魏志王粲傳注答趙景真書登山遠望覩𡷸𡻳以成憤策杖廣澤瞻長波以增悲遊眄春圃情有秋林之悴濯足夏流心懷冬冰之慘對榮宴而不樂臨清觴而無歡今足下琬琰之朴未剖而求光時之價騏驥之足未攄而希絶景之功心鋭而動淺望速而應遲故有企佇之懷爾夫處靜不悶古人所貴窮而不濫君子之美故顏生居陋不改其樂孔父困陳絃歌不廢幸吾子思弘遠理舍道自榮將與足下交伯成于窮野結箕山乎蓬屋侶范生于海濱儔黃綺于商嶽憑輕雲以絶馳遊曠蕩以自足雖不齊足下之所樂亦吾心之所願也藝文類聚三十上惠帝疏臣聞改前轍者則車不傾革往斃者則政不爽大一統于元首百司役于多士故周文興于上成康穆于下也存不忘亡易之善義願陛下無忘金墉大司馬無忘潁上大將軍無忘黃橋則禍亂之萌無由而兆矣晉書嵇詔傳陳準諡議諡號所以垂之不朽大行受大名細行受細名文武顯于功德靈厲表于暗蔽自頃禮官協情諡不依本準諡為過宜諡曰繆晉書嵇詔傳張華不宜復爵議臣之事君當除煩去惑華歷位內外雖粗有善事然闔棺之責著于遠近兆禍始亂華實為之故鄭討幽公之亂斫子家之棺魯戮隱罪終篇貶翬未忍重戮事已弘矣謂不宜復其爵位理其無罪晉書嵇詔傳諫齊王冏書夏禹以卑室稱美唐虞以茅茨顯德豐屋蔀家無益危亡竊承毀敗太樂以廣第舍興造功力為三王立宅此豈今日之先急哉今大事始定萬姓顒顒咸待覆潤宜省起造之煩深思謙損之理復主之勳不可棄矣矢石之殆不可忘也晉書嵇詔傳敘趙至趙景真與從兄茂齊書時人誤謂呂仲悌與先君書故具列本末趙至字景真代郡人漢末其祖流宕客緱氏令新之官至年十二與母共道旁看母曰汝先世非微賤家也汝後能如此不至曰可爾耳歸便就師誦書蚤聞父耕叱牛聲釋書而泣師問之答曰自傷不能致榮華而使老父不免勤苦年十四入太學觀時先君在學寫石經古文事訖去遂隨車問先君姓名先君曰年少何以問我至曰觀君風器非常故問耳先君具告之至年十五陽病數數狂走五里三里為家追得又炙身體十數處年十六遂亡命徑至洛陽求索先君不得至鄴沛國史仲和是魏領軍史渙孫也至便依之遂名翼之字陽和先君到鄴至具道太學中事便逐先君歸山陽經年至長七尺三寸潔白黑髮赤脣明目鬢鬚不多閒詳安諦體若不勝衣先君嘗謂之曰卿頭小而鋭瞳子白黑分明視瞻停諦有白起風至論議清辨有縱橫才然亦不以自長也孟元基辟為遼東從事在郡斷九獄見稱清當常自痛棄親遠遊母亡不見吐血發病服未竟而亡從兄太子舍人蕃字茂齊與至同年相親至始詣遼東時作此書與茂齊世說言語篇注又文選趙景真與嵇茂齊書注引嵇紹集困熱賦序夫閏于夏則崇暑在冬則增寒永熙元年閏在仲夏三伏之節始奏商秋之辰未期余以下里貧生居室卑陋湫巷不來清風短廡不足增蔭外因流汗內懷煩暵歎彼夏屋之士口饜珍味體逸高廊竝天而寒暑殊同世憂樂異矣北堂書鈔一百五十五御覽三十一又三十四祖賦序祖之在于俗尚矣自天子至于庶人莫不咸用有漢卜日丙午魏氏擇用丁未至于大晉則祖孟月之酉日各因其行運三代固有不同雖共奉祖而莫識祖之所由興也說者云祈請道神謂之祖有事于道者吉凶皆名君子于役則列之于中路喪者將遷則稱名于階庭或云百葉遠祖名諡凋滅墳塋不復存其銘表遊魂不得託于廟祧故以初歲良辰肇建華蓋揮揚采旌將欲招靈爽于今夕庶衆祖之來憑蓋有兩端俯歎壯觀乃述而賦之宋書志二藝文類聚五初學記十三藝文類聚誤作社賦序娛蠟賦並序娛蠟賦並序玄象運而寒暑交節會至而萬物遷天地之化固以不停況于人道之不變乎是以百年憂喜相參能達要終之數悟生生之宜者百世不周其人大蠟之夕雖天下同有至攜金蘭以齊聲利貴得意以遣榮勢孰我尚哉藝文類聚五御覽三十三季冬大蠟之暮延嘯周契遠近舊故北堂書鈔一百五十五白首賦序余年二十七始有白髮生于左鬢斯乃衰悴之標證棄捐之大漸也蒲衣幼齒作弼夏后漢之賈鄧弱冠從政獨以垂立之年白首無聞壯志衄于蕪塗忠貞抗于棘路覩將衰而有川上之感觀趣舍而抱慷慨之歎藝文類聚十七酒賦浮蟣萍連醪華鱗設書鈔一百四十八寒食散賦并序寒食散賦并序余晚有男兒既生十朔得吐下積日羸困危殆決意與寒食散未至三句幾于平復何下闕矜孺子之坎軻在孩抱而嬰疾既正方之備陳亦旁求于衆術窮萬道以弗損漸丁寧而積日爾乃酌醴操散商量部分進不訪舊旁無顧問偉斯藥之入神建殊功于今世起孩孺于重困還精爽于既繼藝文類聚七十五羽扇賦序吳楚之士多執鶴翼以為扇雖曰出自南鄙而可以遏陽隔暑昔秦之兼趙寫其冕服以侍臣大晉附吳亦遷其羽扇御于上國書鈔一百三十四八磨賦并序八磨賦并序外兄劉景宣作為磨奇巧特異策一牛之任轉八磨之重因賦之曰方木矩跱圓質規旋下靜以坤上轉以乾巨輪內達八部外連御覽七百六十二宜男花賦序宜男花者世有之久矣多殖幽皋曲隰之例或華林玄圃非衡門蓬宇所宜序也荊楚之士號曰鹿蔥根苗可以薦于俎世人多女欲求男者取此草服之尤良也藝文類聚八十一御覽九百九十四孤黍賦序余慎終屋之南榮有孤黍生焉因泥之溼遭雨之潤宿昔牙蘖滋茂甚速塗燥根淺忽然萎殞深感此黍不韜種以待時貪榮棄本寄身非所自取凋枯不亦宜乎藝文類聚八十五瓜賦世云三芝瓜處一焉故植根玉巖潤葉飛泉攬之者壽食之者仙是謂雲芝芙蕖振采濯莖玄瀨流葩映川莫此為最是謂水芝昔瓜普植用薦神祇其名龍膽其味亦奇是謂土芝乃剖甘瓜既淳且馨荒者饗之忘困解酲流味通其五臟冷氣反其迷精藝文類聚八十七初學記二十七御覽九百七十八朝生暮落樹賦序草木春榮秋悴此木朝生暮落藝文類聚八十九長生樹賦并序長生樹賦并序余嬰丁閔凶靡所定居老母垂聖善之訓以為生事愛敬沒則無改宜居墓次瞻奉威靈兼覽藝文可以不殞先軌祗奉慈令遂家于墳左掃除壇封種植松柏松柏之下不滋非類之草猥有長生育于域內豈老母至行表徵于嘉木哉美我親之仁孝固徵瑞之必招降祖宗之遺德振奇木之青條結根擢幹載生無漸弱莖猗猗緑葉染染處陰冬而愈茂豈莖葉之有點感自然以旌賢諒有道之不掩藝文類聚八十九槐香賦并序槐香賦并序余以太簇之月登于歷山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之問曾見斯香葅于廣夏之庭或披帝王之圖怪其遐棄遂遷樹于中堂華麗則殊彩阿那芳實則可以藏書又感其棄本高崖委身陛庭似傅說顯殷四叟歸漢故因實制名蒙蒙緑葉搖搖弱莖御覽九百八十三雞賦序令庭有栖雞而一雄最武常憑梯升栖守時告晨未嘗有殆御覽七百六十五遇蠆賦序元康二年七月七日余中夜遇蠆客有戲余者曰俗語云過滿百為蠆所螫斯言信哉雖內省不疚而逢此害喟然而歎遂作賦御覽七百四十二又九百四十七誥風伯太康六年狂風暴怒騰逸相觸百川倒流大山乃沱剝北堂書鈔一百五十一上言長沙王乂宜增置掾屬昔魏武每有軍事增置掾屬青龍二年尚書令陳矯以有軍務亦奏增郎今奸逆四逼王路擁塞倒懸之急不復過此但居曹理事尚須增郎況今都官中騎三曹晝出督戰夜還理事一人兩役內外廢乏含謂今有十萬人都督各有主帥推轂授綏委付大將不宜復令臺僚雜與其間晉書嵇含傳詩序李方治為撫軍長史余為從事中郎當隨撫軍俱發詔兄前太僕將與別進一飲之盡歡天熱露坐有頃雨降遂不張油幔以絳分令夕也北堂書鈔一百三十二南方草木狀序南越交趾植物有四裔最為奇周秦以前無稱焉自漢武帝開拓封疆搜求珍異取尤者充貢中州之人或昧其狀乃以所聞詮敘有裨子弟云爾木弓銘鳥號之朴豐條足理弦鳴走括截飛駭止射隼高牆出必有擬既用禦武亦以招士藝文類聚六十初學記二十二御覽三百四十七弦鳴作弦弧菊花銘煌煌丹菊暮秋彌榮旋蕤圓秀翠葉紫莖詵詵仙徒食其落英尊親是御永祚億齡藝文類聚八十一初學記二十七御覽九百九十六司馬誄命危朝露身輕游塵文選廣絶交論注弔莊周圖文并序弔莊周圖文并序帝壻王弘遠華池豐屋廣延賢彥圖莊生垂綸之象記先達辭聘之事畫真人于刻桷之室載退士于進趣之堂可謂託非其所可弔不可讚也其辭曰邁矣莊周天縱特放大塊授其生自然資其量器虛神清窮玄極曠人僞俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長幼失貫于是借玄虛以助溺引道德以自獎戶詠恬曠之辭家畫老莊之象今王生沈淪名利身尚帝女連耀三光有出無處池非巖石之溜宅非茅茨之宇馳屈産于皇衢畫茲象其焉取嗟乎先生高跡何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱悼大道之湮晦遂含悲而吐曲晉書嵇含傳失題晝則負筆而耨夜則帶經而息書鈔九十七自然好學論夫喜怒哀樂愛惡欲懼人之有也得意則喜見犯則怒乖離則哀聽和則樂生育則愛違好則惡飢則欲食逼則欲懼凡此八者不教而能若論所云即自然也腥臊未化飲血茹毛以充其虛食之始也茹之火齊糝以蘭橘雖所未嘗嘗必美之適于口也蕢桴土鼓撫腹而吟足之蹈之以娛其喜樂之質也加之管絃雜以羽毛雖所未聽察之必樂當其心也民生也直聚而勿教肆心觸意八情必發喜必欲與怒必欲罰無爪牙以奮其威無爵賞以稱其惠愛無以奉惡不能去有言之曰苴竹菅蒯所以表哀溝池嶮岨所以寬懼弦木剡金所以解憤豐財殖貨所以施與苟有肺腸誰不欣然貌悅心釋哉尚何假于食膽蜚而嗜菖蒲葅也且晝坐夜寢明作暗息天道之常人所服習在于幽室之中覩蒸燭之光雖不教告亦皎然喜于所見也不以向有白日與比朱門旦則復曉不揭此明而減其歡也況以長夜之冥得照太陽情變鬱陶而發其蒙也故以為難事以末來而情以本應即使六藝紛華名利雜詭計而復學亦無損于有自然之好也嵇中散集宅無吉凶攝生論夫善求壽強者必先知災疾之所自來然後其至可防也禍起于此為防于彼則禍無自瘳矣世有安宅葬埋陰陽度數刑德之忌是何所生乎不見性命不知禍福也不見故妄求不知故干幸是以善執生者見性命之所宜知禍福之所來故求之實而防之信夫多飲而走則為淡支數行而風則為癢毒久居于溼則要疾偏枯好內不怠則昏喪文房若此之類災之所以來壽之所以去也而掘基築宅費日苦身以求之疾生于形而治加于土木是疾無瘳矣詩曰愷悌君子求福不回者匪避誹謗而為義然也蓋知回匪所求福也故壽強專氣致柔少私寡欲直行情性之所宜而合于養生之正度求之于懷抱之內而得之矣嘗有不知蠶者出口動手皆為忌祟不得蠶絲滋甚為忌祟滋多猶自以犯之也有教之知蠶者其顓于桑火寒暑燥溼也于是百忌自息而利十倍何者先不知所以然故忌祟之情繁後知所以然故求之之術正故忌祟生于不知使知性猶如蠶則忌祟無所立矣多食不消含黃丸而筮祝譴祟或從乞胡求福者凡人皆所笑之何者以智能達其無禍也故忌祟舉生于不知由知者言之皆乞胡也設為三公之宅而令愚民居之必不為三公可知也夫壽夭之不可求甚于貴賤然則擇百年之宮而望殤子之壽孤逆魁岡以速彭祖之夭必不幾矣或曰愚民必不得久居公侯宅然則果無宅也是性命自然不可求矣有賊方至不疾逃獨安須臾遂為所虜然則避禍趣福無過緣理避賊之理莫如速逃則斯善矣養生之道莫如先知則為盡矣夫避賊宜速章章然故中人不難覩避禍之理冥冥然故明者不易見其于理動不可要求一也孔子有疾醫曰子居處適也飲食藥也有疾天也醫焉能事是以知命不憂原始反終遂知死生之說夫時日譴祟古之盛王無之而季王之所好聽也制壽宮而得夭短求百男而無立嗣必占不啓之陵而陵不宿草何者高臺深宮以隔寒暑靡色厚味以毒其精亡之于實而求之于虛故性命不遂也或曰所問之師不工則天下無工師矣夫一棲之雞一欄之羊賓至而有死者豈居異哉故命有制也知命者則不滯于俗矣若許負之相條侯英布之黥而後王彭祖七百殤子之天是皆性命也若相宅質居自東徂西而得反此是滅性命之宜孔子登東山而小魯登泰山而小天下立高丘而觀居民則知曰東西非禍福矣若乃忘地道之爽塏而立制于帷牆則所見滋褊從達者觀之則夫乾確然示人易矣夫坤隤然示人𥳑矣天地易𥳑而懼以細苛是更所以為逆也是以君子奉天明而事地察世之工帥占成居則驗使造新則無徵世人多其占舊因求其造新是見舟之行于水而欲推之于陸是不明數也夫舊斷之理猶卜筮也夫鑿龜數策可以知吉凶然不能為吉凶何者吉凶可知而不可為也夫先筮吉卦而後名之無福猶先築利宅而後居之無報也占舊居以譴祟則可安新居以求福則不可則猶卜筮之說耳俗有裁衣種穀皆擇日衣者傷寒種者失澤凡火流寒至則授衣時雨既降則當下種賊方至則當疾走今舍實趣虛故三患隨至凡以忌祟治家者求福而其極皆貧故有知星宿衣不覆之諺古言無虛不可不察也嵇中散集釋嵇叔夜難宅無吉凶攝生論易曰河出圖洛出書聖人則之孝經曰為之宗廟以鬼享之其立本有如此者子貢稱性與天道不可得而聞仲由問神而夫子不答其抑末有如彼者是何也茲所謂明有禮樂幽有鬼神人謀鬼謀以成天下之亹亹也是以墨翟著無鬼之篇董無心設難墨之說二賢之言俱不免于殊途而兩惑是何也夫甚有之則愚甚無之則誕故三子者皆偏辭也子之言神將為彼邪唯吾亦不敢明也夫私神立則公神廢邪忌設則正忌喪宅墓占則家道苦背向繁則妖心興子之言神其為此乎則唯吾之所疾爭也苟大獲其類不患微細是以見瓶冰而知天下之寒察旋機而得日月之動足下細蠶種之說因忽而不察是噎溺未知所在亦莫辨有舟稼也夫命者所稟之分也信順者成命之理也故曰君子修身以俟命知命者不立于巖牆之下何者是天遂之寶也猶食非命而命必胥食故然矣若吾論曰居怠行逆不能令彭祖夭則足下舉信順之難是也論之所說信順既修則宅葬無貴故辟之壽宮無益殤子耳足下不云殤子以宅延彭祖亦以宅壽壽夭之說使之灼然若信順之遂期怠逆之夭性而徒曰天下或有能說之者子而不言誰與能之夫多食傷性良藥已病相之所一也誣彼實此非所以相證也夫壽夭不可求之宅而得之和故論有不知之足下忘于意而責于文抑不本矣雖曰唐虞之世命何同延長平之卒命何同短今論命者當辨有無無疑衆寡也苟一人有命千萬皆一也若使此不得係命將係宅邪則唐虞之世宅何同吉長平之卒居何同凶亦復吾之所疑也難曰事之在外而能為害者不以數盡單豹恃內而有虎案足下之言是豹忘所宜懼與懼所宜忘故張毅修表亦有內熱之禍雖內外不同鈞其非和一曙失之終身弗復是亦虎隨其後矣夫謹于邪者慢于正詳于宅者略于和走以為先亦非齊于所稱也今足下廣之望之久矣元享利貞十之吉繇隆準龍顏公侯之相者以其數所遇而形自然不可為也使準顏可假則無相繇吉可為則無卜矣今設為吉宅而幸福報譬之無以異假顏準而望公侯也是以子陽鏤掌巨君運魁咸無益于敗亡故吾以無故而居者可占何惑象數之理也設吉而後居者不可則何假為之說也然則非宅制人人實徵宅邪其無宅也似未思其本耳獵夫從林其所遇者或禽或虎遇禽所吉遇虎所凶而虎也善卜可以知之耳是故知吉凶非為吉凶也故其稱曰無遠近幽深遂知來物不曰遂為來物矣然亦卜之盡蓋理所以成相命者也至乎卜世與年則無益于周録矣若地之吉凶有虎禽之類然此地苟惡則當所往皆凶不得以西東有異背向不同宮姓無害商則為災福德則吉至刑禍則凶來也故詩云築室百堵西南其戶古之營居宗廟為先廄庫次之居室為後緣人理以從事以此議之即知無太歲刑德也若修古無違亦宜吾論如無所不知誰從難曰不謂吉宅能獨成福猶夫良農既懷善藝又擇沃土復加耘耔乃有盈倉之報此言當哉誠三者能修則農事畢矣若或盡以邪用求之于虛則宋人所謂豫助苖長敗農之道也今以冢宅喻此宜何比邪為樹藝乎為耘耔也若三者有比則請事後說若其無徵則愈見其誣矣今卜相有徵如彼冢宅無驗如此非所以相半也案書周公有請命之事仲尼非子路之禱今鈞聖而鈞疾何是非不同也故知臣子之心盡斯心而已所謂禮為情貌者故于臣弟則周公請命親其身則尼父不禱足下圖宅將為禮也其為實也為禮則事異于古為實則未聞顯理如是未得吾所以為遺而足下失所願矣至于時日先王所以誡不怠而勸從事耳俗之時日順妖忌而逆事理時名雖同其用適反以三賢校君愈見其合未知所異也難曰智之所知未若所不知者衆此較通世之常滯也然智所不知不可以妄求智所能知惡其以學哉故古之君子修身擇術成性存存自盡焉而已矣今據足下所言在所知邪則可辨也所不知邪則妄求也二者宜有一于此矣夫小知不及大知故乃反于有無為有者亦蟪蛄矣子尤吾之驗于所齊吾亦懼子遊非其域儻有忘歸之纍也嵇中散集
