body:
  text: 卷一百陸雲歲暮賦并序歲暮賦并序余祗役京邑載離永久永寧二年春忝寵北郡其夏又轉大將軍右司馬於鄴都自去故鄉荏苒六年惟姑與姊仍見背棄銜痛萬里哀思傷毒而日月逝速歲聿云暮感萬物之既改瞻天地而傷懷乃作賦以言情焉夫何乾行之變通兮昏明迭而載路羡飛轡之遠御兮騰六龍於天步時赴節而漸流兮氣移數而改度揮促節於短日兮振修策於長夜運攸忽其既周兮歲冉冉而告暮變棘心之柔風兮滋豐草之湛露玄暉邈以峻服兮黃裳皓而振素於是顓頊御時玄冥統官天廟既底日月貞觀淪重陽於潛戶兮嚴積陰於司寒日回天以滅景兮飆衝淵而無瀾堅冰涸於川底兮白雪隕於雲端普區宇之瘁景兮頻萬物之衰顏時凜戾其可悲兮氣蕭索而傷心凄風愴其鳴條兮落葉翻而灑林獸藏丘而絶迹兮鳥攀木而栖音山振枯於曾嶺兮民懷慘於重襟寒與暑其代謝兮年冉冉其將老豐顏曄而朝榮兮玄髮粲其夕皓感芳華之志學兮悲時暮而難考遠圖逝而辭懷兮密思集而盈抱羡厚德之溥載兮嘉豐化之大造恨盛來之苦晏兮悲衰至之常蚤指晞露而怵心兮衍死生於靡草蒙時來之嘉運兮遊上京而凱入委乘輅於紫宮兮剖金虎而底邑憑台光之發暉兮荷寵靈而來集望故疇之迥遼兮泝南風而頽泣長歎息而永懷兮感逝物而傷悲哀年歲之攸往兮伊行人之思歸結隆思於朝日兮綴永念於紀暉表寸陰而貞吝兮盻盈尺其若遺嗟我行之久永兮何歸途之芒芒憩遵渚於川盻攸逝兮江湘處孝敬於神丘兮結祗纂於帷桑瞻山川而物存兮思六親而人亡問仁姑而背世兮及伯姊而淪喪尋餘蹤於空宇兮想絶景於遺堂悲山林之杳藹兮痛華構之丘荒靖深情以遐慕兮思纏綿而懷楚涕垂頤以交頽兮哀凌心而洞駭神尋路而窘逝兮形頻蹙乎其所心悠悠其若懸兮音既絶而復舉悲人生之有終兮何天造而罔極仰悲谷之方中兮顧懸車而日昃百年迅於分噓兮千歲疾於一息詠大椿之萬祀兮同蟪蛄於未識歲難停而易逝兮情艱多而泰寡年有來而棄子兮時無算而非我祗生心於日順兮雖呼翕其難假攝二生於逆旅兮欲淹留其焉可彼鑒寐之有時兮亦始卒之固然舒遠懷於千載兮悵同感乎中山鑒通人之炯戒兮懼晏平之達言啓貞心以自責兮覽遺籍而問道亮爽鳩之既徂兮故營丘之有紹在吾儕之陋心兮豈取樂於東表苟長生而自得兮將奚待而有夭考大德於天地兮知斯言之益矯愁霖賦永寧二年夏六月鄴都大霖旬有奇日稼穡沉湮生民愁瘁時文雅之士煥然並作同僚見命乃作賦曰在朱明之季月兮反極陽於重陰興介丘之膚寸兮墜崩雲而洪沉谷風扇而攸遂兮苦雨播而成淫天泱漭以懷慘兮民嚬蹙而愁霖於是天地發揮陰陽交烈萬物混而同波兮玄黃浩其無質雷憑虛以振庭兮電凌牖而輝室霤鼎沸以駿奔兮潦風驅而兢疾豈南山之暴濟兮將冥海之暫溢隱隱填填若降自天高岸渙其無崖兮平原蕩而為淵遵渚回於淩河兮黍稷仆於中田匱多稼於億廩兮虛夙敬於祈年外薄郊甸內荒都城陰無晞景霤無輟聲纖波靡於前途兮微津隔於峻庭紛雲擾而霧塞兮漫天頽而地盈於是愁音比屋歎發屢省陽堂乏暉朗室無景望曾雲之萬仞兮想白日之寸脛感虛無而思深兮對寂漠而言靖毒甚雨之未晞兮悲夏日之方永瞻大辰以頽息兮仰天衢而引領愁情沉疾明發哀吟永言有懷感物傷心結南枝之舊思兮詠莊舄之遺音羡辨彼之歸飛兮寄豫思乎江陰渺天末以流目兮涕潺湲而沾襟何人生之倏忽痛存亡之無期方千歲於天壤兮吾固已陋夫靈龜矧百年之促節兮又莫登乎期頤哀戚容之易感兮悲歡顏之難怡考傷懷於衆苦兮愁豈霖之足悲雲曇曇而疊結之兮雨淫淫而未散晞朱陽於崇朝兮悲此日之屢晏劾豐隆於嶽陽兮執赤松於神館命雲師以藏用兮紲乘龍於河漢照濛泛之清暉兮炳扶桑之始旦考幽明於人神兮妙萬物以達觀喜霽賦余既作愁霖賦雨亦霽昔魏之文士又作喜霽賦聊廁作者之末而作是賦焉毒霖雨之掩時兮情懷憤而無懌肅有禱於人謀兮反極陰于天律靖屏翳之洪隧兮戢太山之觸石凌風絶謐寧兮歸雲反而揮霍改望舒之離畢兮曜六龍於紫閣楊天步之剡剡兮播靈輝之赫奕於是朱明自皓凱風來南復火正之舊司兮黜后土於重陰夷中原之多潦兮反高岸於嵩岑萎禾竦而振穎兮偃木豎而成林嘉大田之未墜兮幸神祗之有歆爾乃俯順習坎仰熾重離兼明暢而天地曄兮群生悅而萬物齊魚凌淵以增躍兮鳥望林而朝隮戢流波於枉水兮起芳塵於沉泥朱光播於甕牖兮素景衍乎中閨天監作照幽明畢覿普厥有歡覃及四國翕萬情而咸喜兮雖無獲而自得災未及周和斯有祥翼翼黍稷油油稻糧望有年於自古兮晞隆周之萬箱原思悅於蓬戶兮孤竹欣於首陽陰陽交泰萬物方遒炎神送暑素靈迎秋四時逝而代謝兮大火忽其西流年冉冉其易頽兮時靡靡而難留嗟沉哀之愁思兮瞻日月而增憂感年華之行暮兮思乘煙而遠遊命海若以量津兮吾欲往乎瀛洲臨儀天之大川兮凌懷山之洪波瞻增城之峻極兮仰蓬萊之峨峨望王母於弱水兮詠白雲之清歌雖嘉命之未錫兮將輕舉於流沙振仙車之鳴鸞兮吐玉衡之八和託芝蓋之後乘兮餐瓊林之朝華修無窮以容與兮豈萬載之足多登臺賦永寧中參大府之佐於鄴都以時事巡行鄴宮三臺登高有感因以言崇替乃作賦云承后皇之嘉惠兮翼聖宰之威靈肅言而述業兮乃啓行乎北京巡華室以周流兮登崇臺而上征攀凌坻而遂隮兮迄雲閣而少寧爾乃佇眄瑤軒滿目綺寮中原方華緑葉振翹嘉生民之亹亹兮望天晷之苕苕歷玉階而容與兮憩蘭堂以逍遙蒙紫庭之芳塵兮駭洞房之回飆頽嚮逝而忤物兮傾冠舉而凌霄曲房榮而窈眇兮長廊邈而蕭條於是迥路逶夷邃宇玄芒深堂百室曾臺千房闢南窗而蒙暑兮啓朔牖而履霜遊陽堂而冬溫兮步陰房而夏涼萬禽委蛇於潛室兮驚鳳矯翼而來翔紛譎譎於有象兮邈攸忽而無方于時南征司火朱明鬱遂縣車式徐曜靈西墜暑乘陰而增炎兮景望淵而曖昧玩瓊宇而情廞兮覽八方而思鋭陋雨館之常規兮鄙鳴鵠之蔽第仰凌眄於天庭兮俯旁觀乎萬類北溟浩以揚波兮青林煥其興蔚扶桑細於毫末兮崑崙卑乎覆簣於是忽焉俯仰天地既翕宇宙同區萬物為一原千變之常鈞兮齊億載於今日彼區中之側陋兮非吾黨之一室本達觀於無形兮今何求而有質於是聊樂近遊薄言儴佯朝登金虎夕步文昌綺疏列於東序朱戶立乎西廂經蕤曄以披藻兮淑塗馥而遺芳感舊物之咸存兮悲昔人之云亡憑虛檻而遠想兮審歷命於斯堂於是精疲遊倦白日藏輝鄙春登之有情兮惡荊臺之忘歸聊弭節而駕言兮悵將逝而徘徊感崇替之靡常兮悟廢興而永懷隆期啓而雲升逝運靡其如頽長發惟祥天鑒在晉肅有命而龍飛兮跚重斯而肇建嘉有魏之欽若兮鑒靈符而告禪清文昌之離宮兮虛紫微而為獻委普天之光宅兮質率土之黎彥欽哉皇之承天兮集北顧於乃眷誕洪祚之遠期兮則斯年於有萬逸民賦并序逸民賦并序富與貴人之所欲也而古之逸民或輕天下細萬物而欲專一丘之歡擅一壑之美豈不以身聖於宇宙而恬貴於紛華者哉故天地不易其樂萬物不干其心然後可以妙有生之極享無疆之休也乃為賦云世有逸民兮栖遲乎於一丘委天刑之外心兮淡浩然其何求陋此世之險隘兮又安足以盤遊杖短策而遂往兮乃枕石而漱流載營抱魄懷元執一傲物思寧妙世自逸靜芬響於永言滅絶景於無質相荒土而卜居度山河而考室曾丘翳莽穹谷重深叢木振穎葛藟垂陰潛魚泳沚嚶鳥來吟仍疏圃於芝薄兮即蘭堂於芳林靡炎飆以赴節兮揮天籟而興音假樂器於神造兮詠幽人於鳴琴挹回源於別沼兮食秋菊於高岑蒙玉泉以濯髮兮臨濬谷而投簪寂然尸居儼焉山立遵渚龍見在林鳳戢遁綿野以宅心望空巖而凱入明發悟歌有懷在昔賓濮水之清淵兮儀磻溪之一壑毒萬物之喧譁兮聊漁釣於此澤爾乃薄言容與式宴盤桓朝挹芳露夕玩幽蘭眇區外而放志兮眷天路而怡顏望靈嶽之清景兮想佳人於雲端悲滄浪之濁波兮詠芳池之清瀾鄙終南之辱節兮韙伯陽之考槃眄清霄以寄傲兮泝凌風而頽歎玄微載晏何思何欲漂若行雲之浮泊若窮林之木咨有得之必喪兮蓋居龐之召辱彼貪夫之死權兮固遺生以要祿竦戰兢而履冰兮祗肅懷以臨谷亮據鼎之無栗兮在顛沛其必渥是故夫形瑰者徵咎體壯者為犧雖明文而龍藻兮終俯首而受羈立修名於禍始兮登全生於戾階資朝華之促節兮抱千載之長懷擠考終於遠期兮顛靈根而自摧殉有喪之假樂兮方無身其孰哀美達人之玄覽兮邈藏器於無為物有自遺道無不可萬殊有同齊物無寡並家於國等朝于野榮在此而貴身兮神居形而忘我欽妙古之達言兮信懷莊而悅賈憎既明於天爵兮何惙悲於人禍陋國風之皇恤同明哲於大雅亂曰乘白駒兮皎皎遊穹谷兮藹藹尋峻路兮崢嶸臨芳水兮悠裔槃丘園兮暇豫翳翠葉兮重蓋瞻洪崖兮清輝紛容與兮雲際欲凌霄兮從之恨穹天兮未泰詠歡友兮清唱和爾音兮此世南征賦并序南征賦并序太安二年秋八月姦臣羊玄之皇甫商敢行稱亂凌逼乘輿天子蒙塵于外自秋徂冬大將軍敷命群后同恤社稷乃身統三軍以謀國難自義聲所及四海之內朔漠之表蒸徒嬴糧而請奮胡馬擬塞而思征四方之會衆以百萬軍旅之盛威靈之著自古已來未之有也粵十月軍次于朝歌講武治戎以觀兵于殷墟於是美義征之舉壯師徒之盛乃作南征賦以揚匡霸之勳云爾有皇晉之霸后資濬哲之睿聖崇文德於緝熙濟武功而保定應天鑒之昭華荷帝祐之休命步玉衡以觀八方在旋璣而齊七政芒芒神道化洽崇深卬戾天飛俯洞淵沉振南箕以鼓物冒慶雲而崇蔭恢天維以籠世廓宇宙而宅心濟博施之厚德鏗希聲之大音淵澤回而泣注豪彥萃而為林九服惟清諸夏謐靜肅慎回首沙漠引領天和時降地靈夙挺結芳林之奇幹發珍禾之神穎勵修德於億兆端澄形於萬景在中葉之不兢遭皇家之毒亂悲國步之未夷仰夙興而昧旦括無方而大誥集率土而貞觀致天屬於王畿肅宵征而省難爾乃建黃鉞之靈威樹戎輅之高蓋伐隱天之雷鼓振凌霄之電旆介夫揮戈而夙興輕武總干而啓萬振靈韶之嘈嘈飛旟旐之藹藹虹旃泝風以委蛇霓旄蒙光而容裔公徒十萬其會雲興悠悠華戎時罔丕承爾乃命屏翳以夕降式飛廉以朝升塗蒙雨而復清景帶天而光澄陪武臣於雕軒列名僚於後乘猛將起而虎嘯商飆肅其來應士憑威而嚮駭馬歔天而景凌臨川屯於廣陸武騎被乎中陵類禡比京師徒經始桓桓先征在河之涘順彼長道懸旌千里羡王師之遵時茂七德而發止爾乃稅駕殷墟我徒既間順時講武簿狩于原紛同方而類聚煥副翼而明分祗明刑以誓衆習軍政於舊聞儼山立以崇薈粲煙駭而興紛若冥海之引回流岱靈之吐行雲于時玄冬首時陰風戒煞山澤含哀天地肅乂間夜冽以澄清中原曠而曖昧戎士肅而咸戒三軍紛而雜遝長角哀叫以命旅金鼓隱訇而啓伐景凌冥而四播音乘雲而上逝火烈具舉伐鼓淵淵朱光俯而丹野炎暉仰而絳天曜靈翕赫以增熾憤氣昲悅而凌煙狂颷起而妄駭行雲藹而千眠旌旆翻其猗靡驚熛因而嬗娟爾乃洪音雷動清問剋廣凌雲發揮萬里振響聲馮虛而天回烈駭空而地蕩映皓月而望舒暗照重昏而大夜朗服縣炎揚而晃倏飛烽戢煜而泱漭乃有熊羆之旅虓闞之將雄聲泉涌逸氣風亮超三軍以奔厲賈餘勇而成壯兆洪音於寂漠先無形而高唱紛若屯雲渙若積波遁陰匿景靜言勿譁絶倡寂其既收萬夫翕而咸和嚴鼓隱而重戒景燧曄而星羅烈蒙陰而仰假曜憑陽而登遐若扶桑之振華葉皓天之散朝霞超燭龍之絶景豈比象於百華寒蟬賦并序寒蟬賦并序昔人稱雞有五德而作者賦焉至於寒蟬才齊其美獨未之思而莫斯述夫頭上有緌則其文也含氣飲露則其清也黍稷不食則其廉也處不巢居則其儉也應候守節即其信也加冠冕取其容也君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貧才所歎余昔僑處切有感焉興賦云爾伊寒蟬之感運近嘉時以遊征含二儀之和氣稟乾元之清靈體貞精之淑質吐𠲜之哀聲希慶雲以優遊遁太陰以自寧於是靈嶽幽峻長林參差爰蟬集止輕羽涉池清徹微激德音孔嘉承南風以軒景附高松之二華黍稷惟馨而匪享竦身希陽乎靈和唳乎其音翩乎其翔容麗蜩螳聲美宮商飆如飛焱之遺驚風眇如輕雲之麗太陽華靈鳳之羽儀睹皇都乎上京跨天路於萬里豈蒼蠅之尋常爾乃振修緌以表首舒輕翅以迅翰挹朝華之墜露含煙熅以夕餐望北林以鸞飛集樛木以龍蟠彰淵信於嚴時稟清誠乎自然翩眇微妙綿其形翔林附木一枝不盈豈黃鳥之敢希唯鴻毛其猶輕憑緑葉之餘光哀秋華之方零思鳳居以翹竦仰佇立而哀鳴若夫歲聿云暮上天其涼感運悲聲貧士含傷或歌我行永久或詠之子無裳原思嘆於蓬室孤竹吟於首陽不銜子以穢身不勤身以營巢志高於鳲鳩節妙乎鴟梟附枯枝以永處何瓊林之迥翛惟雨雪之霏霏哀北風之飄𩗚既乃雕以金采圖我嘉容珍景曜爛暐曄華豐奇侔黼黻艷比袞龍清和明潔群動希蹤爾乃綴以玄冕增成首飾纓蕤翩紛九流容翼映華蟲於朱袞表馨香乎明德於是公侯常伯乃紆紫黻執龍淵俯鳴珮玉仰撫貂蟬黃廬之多士光帝皇之待人既騰儀像於雲闥望景曜乎通天邁休聲之五德豈鳴雞之獨珍聊振思於翰藻闡令問以長存於是貧居之士喟爾相與而俱嘆曰寒蟬哀鳴其聲也悲四時云暮臨河徘徊感北門之憂殷嘆卒歲之無衣望泰清之巍峨思希光而無階簡嘉蹤於皇心冠神景乎紫微詠清風以慷慨發哀歌以慰懷
