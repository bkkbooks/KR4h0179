body:
  text: 譙周諫後主疏昔王莽之敗豪傑竝起跨州據郡欲弄神器于是賢才智士思望所歸未必以其勢之廣狹惟其德之薄厚也是故于時更始公孫述及諸有大眾者多已廣大然莫不快情恣欲怠于為善游獵飲食不恤民物世祖初入河北馮異等勸之曰當行人所不能為遂務理冤獄節儉飲食動遵法度故北州歌歎聲布四遠于是鄧禹自南陽追之吳漢寇恂未識世祖遙聞德行遂以權計舉漁陽上谷突騎迎于廣阿其餘望風慕德者邳彤耿純劉植之徒至于輿病齎棺繈負而至者不可勝數故能以弱為彊屠王郎吞銅馬折赤眉而成帝業也及在洛陽嘗欲小出車駕已御銚期諫曰天下未寍臣誠不願陛下細行數出即時還車及征隗囂潁川盜起世祖還洛陽但遣寇恂往恂曰潁川以陛下遠征故姦猾起叛未知陛下還恐不時降陛下自臨潁川賊以即降遂至潁川竟如恂言故非急務欲小出不敢至于急務欲自安不為故帝者之欲善也如此故傳曰百姓不徒附誠以德先之也今漢遭戹運天下三分雄哲之士思望之時也陛下天姿至孝喪踰三年言及隕涕雖曾閔不過也敬賢任才使之盡力有踰成康故國內和一大小戮力臣所不能陳然臣不勝大願願復廣人所不能者夫輓大重者其用力苦不眾拔大艱者其善術苦不廣且承事宗廟者非徒求福祐所以率民尊上也至于四時之祀或有不臨池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宮所增造但奉修先帝所施下為子孫節儉之教蜀志譙周傳諫後主南行疏或說陛下以北兵深入有欲適南之計臣愚以為不安何者南方遠夷之地平常無所供為猶數反叛自丞相亮南征兵勢偪之窮乃幸從是後供出官賦取以給兵以為愁怨此患國之人也今以窮迫欲往依恃恐必復反叛一也北兵之來非但取蜀而已若奔南方必因人勢衰及時赴追二也若至南方外當拒敵內供服御費用張廣他無所取耗損諸夷必甚甚必速叛三也昔王郎以邯鄲僭號時世祖在信都畏偪于郎欲棄還關中邳彤諫曰明公西還則邯鄲城民不肯捐父母背城主而千里送公其亡叛可必也世祖從之遂破邯鄲今北兵至陛下南行誠恐邳肜之言復信于今四也願陛下早為之圖可獲爵土若遂適南勢窮乃服其禍必深易曰亢之為言知得而不知喪知存而不知亡知得失存亡而不失其正者其惟聖人乎言聖人知命而不苟必也故堯舜以子不善知天有授而求授人子雖不肖禍尚未萌而迎授與人況禍以至乎故微子以殷王之昆面縛銜璧而歸武王豈所樂哉不得已也蜀志譙周傳仇國論因餘之國小而肇建之國大竝爭于世而為仇敵因餘之國有高賢卿問于伏愚子曰今國事未定上下勞心往古之事能以弱勝彊者其術何如伏愚子曰吾聞之處大無患者恆多慢處小有憂者恆思善多慢則生亂思善則生治理之常也故周人養民以少取多句踐卹眾以弱斃彊此其術也賢卿曰曩者項彊漢弱相與戰爭無日寍息然項羽與漢約分鴻溝為界各欲歸息民張良以為民志既定則難動也尋帥追羽終斃項氏豈必由文王之事乎肇建之國方有疾疢我因其隙陷其邊陲覬增其疾而斃之也伏愚子曰當殷周之際王侯世尊君臣久固民習所專深根者難拔據固者難遷當此之時雖漢祖安能杖劍鞭馬而取天下乎當秦罷侯置守之後民疲秦役天下土崩或歲改主或月易公鳥驚獸駭莫知所從于是豪彊竝爭虎裂狼分疾搏者獲多遲後者見吞今我與肇建皆傳國易世矣既非秦末鼎沸之時實有六國竝據之勢故可為文王難為漢祖夫民疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發是故智者不為小利移目不為意似改步時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征土崩勢生不幸遇難雖有智者將不能謀之矣若乃奇變縱橫出入無間衝波截轍超谷越山不由舟楫而濟盟津者我愚子也實所不及蜀志譙周傳招魂葬論或曰有人死而亡其屍者而招魂葬何如曰夫葬所以藏屍柩也若魂氣則無不之焉得藏諸通典一百三書柱眾而大期之會具而授若何復蜀志杜瓊傳書板示文立典午忽兮月酉沒兮蜀志譙周傳廣漢城讖廣漢城北有大賊曰流特攻難得歲在玄宮自相剋後魏書賨李勢傳禮祭集志四時祭各于其廟中神位奧西牆下東嚮諸侯廟木主在尸之南為在尸上也東嚮以南為上通典四十八天子之廟始祖及高曾祖考皆月朔加薦以象平生朔食也謂之月祭祧之廟無月祭也凡五穀成熟珍物新成天子以薦宗廟禮未薦不敢食新孝敬之道也其月朔薦及臘薦薦新皆奠無尸故群廟皆一朝之閒事畢通典四十九齊交譬之于物猶之白也染之以藍則青遊居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹參師蓋公致清淨之治竇長君兄弟出于賤隸謹恭師友皆為退讓君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固于膠漆堅于金石窮達不阻其分毀譽不疑其實御覽四百六以下篇名俱闕朝發而夕異宿勤則菜盈傾筐且苟有羽毛不織不衣不能茹草飲水不耕不食安可以不自力哉齊民要術自序法訓今有輓歌者高皇帝召田橫至于尸鄉自斃從者冕至宮不敢哭而不勝其哀故作為此歌以寄哀音焉北堂書鈔九十一文選挽歌詩標題注初學記十四御覽五百五十二好學以崇智故得廣業力行而卑體故能崇德是以君子居謙而弘道然後德能象天地初學記十七善耕者是以謹地待時而動善射者調弓定準見可而發君子善養其人足用初學記二十二御覽三百四十七羊有跪乳之禮雞有識時之候雁有翔序之儀而人取法焉初學記二十九人之所以貴者以其禮節也人而無禮者其獮猴乎雖人象而蟲質也初學記二十九御覽九百一十夫孝百行之本替本而求末者未見有得之者也如或得之君子不貴矣烏鳥猶有反哺之心況人而無孝心者乎初學記三十御覽九百二十利物誘人猶飃風之加草也唯有直慎者然後不回御覽九唐虞之衣裳文法禹稷之溝洫耕稼人至今被之御覽八十桀紂雖有天子之位而無一人之譽也猶朽木枯樹逢風則仆也御覽八十二劉項方爭父戰于前子鬭于後御覽八十七王者居中國何也順天之和而同四方之統也御覽一百五十六一產二子者當以後生者為兄言其先胎也荅曰此野人之鑿語耳君子不測暗安知胎之先後也御覽三百六十又三百六十一或曰昔有人母有疾使其妻為母作粥者妻不肯乃以刀擊之傷夷其面此可以孝乎曰以刀擊妻其親必駭而有憂及之何有于孝御覽三百六十五又八百五十九或曰君子處陋巷之中奚樂也曰樂得其親樂得其友樂聖人之道也御覽四百六十八貪者難為惠苛煩者難為恭君子以禮而已矣御覽四百九十二為國者不患學者之不農患治民者之不學御覽六百八以道為天下者猶乘安船而游廣路安船難成可久處也廣路難至可常行也御覽七百六十九乘船曲折不失其瀆是善乘船者御覽七百六十九鸞車璜佩求中道心御覽七百七十三上言譙周遺屬周臨終屬熙曰久抱病未曾朝見若國恩賜朝服衣物者勿以加身當還舊墓道險行難豫作輕棺殯斂已畢上還所賜蜀志譙周傳注引晉陽秋為後主作降書限分江漢遇值深遠階緣蜀土斗絕一隅干運犯冒漸苒歷載遂與京畿攸隔萬里每惟黃初中文皇帝命虎牙將軍鮮于輔宣溫密之詔申三好之恩開示門戶大義炳然而否德暗弱竊貪遺緒俛仰累紀未率大教天威既震人鬼歸能之數怖駭王師神武所次敢不革面順以從命輒敕群帥投戈釋甲官府帑藏一無所毀百姓布野餘糧棲畝以俟后來之惠全元元之命伏惟大魏布德施化宰輔伊周含覆藏疾謹遣私署侍中張紹光祿大夫譙周駙馬都尉鄧良奉齎印綬請命告誠敬輸忠款存亡敕賜惟所裁之輿櫬在近不復縷陳蜀志後主傳又郤正傳云景耀六年後主從譙周之計遣使請降于鄧艾其書正所作也姜維論姜伯約據上將之重處群臣之右宅舍獘薄資財無餘側室無妾媵之褻後庭無聲樂之娛衣服取供輿馬取備飲食節制不奢不約官給費用隨手消盡察其所以然者非以激貪厲濁抑情自割也直謂如是為足不在多求凡人之談常譽成毀敗扶高抑下咸以姜維投厝無所身死宗滅以是貶削不復料擿異乎春秋襃貶之義矣如姜維之樂學不倦清素節約自一時之儀表也蜀志姜維傳釋譏或有譏余者曰聞之前記夫事與時竝名與功偕然則名之與事前哲之急務也是故創制作範匪時不立流稱垂名匪功不記名必須功而乃顯事亦俟時以行止身沒名滅君子所恥是以達人研道探賾索微觀天運之符表攷人事之盛衰辯者馳說智者應機謀夫演略武士奮威雲合霧集風激電飛量時揆宜用取世資小屈大申存公忽私雖尺枉而尋直終揚光以發輝也今三方鼎跱九有未乂悠悠四海嬰丁禍敗嗟道義之沈塞愍生民之顛沛此誠聖賢拯救之秋烈士樹功之會也吾子以高朗之才珪璋之質兼覽博闚留心道術無遠不致無幽不悉挺身取合幹茲奧祕躊躇紫闥喉舌是執九攷不移有入無出究古今之真偽計時務之得失雖時獻一策偶進一言釋彼官責慰此素餐固未能輸竭忠款盡瀝胸肝排方入直惠彼黎元俾吾徒草鄙竝有聞焉也盍亦綏衡緩轡回軌易塗輿安駕肆思馬斯徂審厲揭以投濟要夷庚之赫憮播秋蘭以芳世副吾徒之彼圖不亦盛與余聞而歎曰嗚呼有若云乎邪夫人心不同實若其面子雖光麗既美且豔管闚筐舉守厥所見未可以言八紘之形埒信萬事之精練也或人率爾仰而揚衡曰是何言與是何言與余應之曰虞帝以面從為戒孔聖以悅己為尤若子之言良我所思將為吾子論而釋之昔在鴻荒矇昧肇初三皇應籙五帝承符爰暨夏商前典攸書姬衰道缺霸者翼扶嬴氏慘虐吞嚼八區于是縱橫雲起狙詐如星奇邪蠭動智故萌生或飾真以讎偽或挾邪以干榮或詭道以要上或鬻技以自矜背正崇邪棄直就佞忠無定分義無常經故鞅法窮而慝作斯義敗而姦成呂門大而宗滅韓辯立而身刑夫何故哉利回其心寵耀其目赫赫龍章鑠鑠車服媮幸苟得如反如仄淫邪荒迷恣雎自極和鸞未調而身在轅側庭宁未踐而棟折榱覆天收其精地縮澤其人弔其躬鬼芟其頟初升高岡終隕幽壑朝含榮潤夕為枯魄是以賢人君子深圖遠慮畏彼咎戾超然高舉寍曳尾于塗中穢濁世之休譽彼豈輕主慢民而忽于時務哉蓋易箸行止之戒詩有靖恭之歎乃神之聽之而道使之然也自我大漢應天順民政治之隆皓若陽春俯憲坤典仰式乾文播皇澤以熙世茂化之醲醇君臣履度各守厥貞上垂詢納之弘下有匡救之責士無虛華之寵民有一行之迹粲乎亹亹尚此忠益然而道有隆窳物有興廢有聲有寂有光有翳朱陽否于素秋玄陰抑于孟春羲和逝而望舒係運氣匿而耀靈陳沖質不永桓靈墜敗英雄雲布豪傑蓋世家挾殊議人懷異計故從橫者欻披其胸狙詐者暫吐其舌也今天綱已綴德樹西鄰丕顯祖之宏規縻好爵于士人興五教以訓俗豐九德以濟民肅明祀以礿祭幾皇道以輔真雖跱者未一偽者未分聖人垂戒蓋均無貧故君臣協美于朝黎庶欣戴于野動若重規靜若疊規濟濟偉彥元凱之倫也有過必知顏子之仁也侃侃庶政冉季之治也鷹揚鷙騰伊望之事也總群俊之上略含辥氏之三計敷張陳之祕策故力征以勤世援華英而不遑豈暇修枯籜于榛穢哉然吾不才在朝累紀託身所天心焉是恃樂滄海之廣深歎嵩嶽之高跱聞仲尼之贊商感鄉校之益己彼平仲之和羹亦進可而替否故矇冒瞽說時有攸獻譬遒人之有采木市閭游童之吟詠乎疆畔庶以增廣福祥輸力規諫若其合也則以闇協明進應靈符如其違也自我常分退守已愚進退任數不矯不誣循性樂天夫何恨諸此其所以既入不出有而若無者也狹屈氏之常醒濁漁父之必醉溷柳季之卑辱褊夷叔之高懟合不以得違不以失得不充詘失不慘悸不樂前以顧軒不就後以慮輊不粥譽以干澤不辭愆以忌絀何責之釋何餐之卹何方之排何直之入九攷不移固其所執也方今朝士山積髦俊成群猶鱗介之潛乎巨海毛羽之集乎鄧林游禽逝不為之鮮浮魴臻不為之殷且陽靈幽于唐葉陰精應為商時陽盱請而洪災息桑林禱而甘澤滋行止有道啟塞有期我師遺訓不怨不尤委命恭己我又何辭辭窮路單將反初節綜墳典之流芳尋孔氏之遺葑綴微辭以存道憲先軌而投制韙叔肸之優游美疏氏之遐逝收止足以言歸汛皓然以容裔欣環堵以恬娛免咎悔于斯世顧茲心之未泰懼末塗之泥滯仍求激而增憤肆中懷以告誓昔九方攷精于至貴秦牙沈思于殊形辥燭察寶以飛譽瓠梁託絃以流聲齊隸拊髀以濟文楚客潛寇以保荊雍門援琴而挾說韓哀秉轡而馳名盧敖翱翔乎玄闕若士竦身于雲清余實不能濟技于數子故能靜然守己而自寍蜀志郤正傳拒吳議今本朝傾覆吳為同盟不恤我難而邀其利可主降于北臣求福于東乎今守孤城百姓未定宜一決戰以定眾心御覽四百一十七引襄陽耆舊傳吳聞蜀敗遂起兵襲巴東遣盛旻等水陸到獻乃議策趙廞表廞非雄才又蜀人不願為亂必無同者事終無成敗亡可計日而俟華陽國志八又略見晉書羅尚傳貽督護衙博書昔年得李流牋降心款款由時威帖得還為寇聞特委誠于下吏而流驤七八千人來寇日至凶奸之態詭譎不測不可不重以待之也華陽國志八陳情事表臣密言臣以險釁夙遭閔凶生孩六月慈父見背行年四歲舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九歲不行零丁孤苦至于成立既無伯叔終鮮兄弟門衰祚薄晚有兒息外無期功強近之親內無應門五尺之僮煢煢獨立形影相弔而劉夙嬰疾病常在床蓐臣侍湯藥未曾廢離逮奉聖朝沐浴清化前太守臣逵察臣孝廉後刺史臣榮舉臣秀才臣以供養無主辭不赴命詔書特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤當侍東宮非臣隕首所能上報臣具以表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急于星火臣欲奉詔奔馳則劉病日篤欲苟順私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜育況臣孤苦特為尤甚且臣少仕偽朝歷職郎署本圖宦達不矜名節今臣亡國賤俘至微至陋過蒙拔擢寵命優渥豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以私情區區不能廢遠臣密今年四十有四祖母劉今年九十有六是臣盡節于陛下之日長而報養劉之日短也烏鳥私情願乞終養臣之辛苦非獨蜀之人士及二州牧伯所見明知皇天后土實所共鑒伏願陛下矜愍愚誠聽臣微志庶劉僥倖卒保餘年臣生當隕首死當結草臣不勝犬馬怖懼之情謹拜表以聞文選蜀志楊戲傳注引華陽國志今志闕又晉書孝友李密傳薦壽良表二州人士零頹才彥陵遲無復廁豫綱紀後進慰寍遐外者良公朝英特二州之望宜見超予紹繼立後華陽國志十一與中山王牋高祖過沛賓禮老幼桑梓之供一無煩擾伏惟明王孝思惟則動識先戒本國望風式歌且舞誅求之碎所未聞命華陽國志十一又蜀志楊戲傳注引華陽國志諸葛丞相故宅碣表天子命我于沔之陽聽鼓鞸而永思庶先哲之遺光登隆山以遠望軾諸葛之故鄉蓋神物應機大器無方通人靡滯大德不常故谷風發而騶虞嘯雲雷升而潛鱗驤摯解褐于三聘尼得招而褰裳管豹變于受命貢感激以回莊異徐生之摘寶釋臥龍于深藏偉劉氏之傾蓋嘉吾子之周行夫有知己之主則有竭命之良固所以三分我漢鼎跨帶我邊荒抗衡我北面馳騁我魏疆者也英哉吾子獨含天靈豈神之祇豈人之精何思之深何德之清異世通夢恨不同生推子八陣不在孫吳木牛之奇則亦般模神弩之巧一何微妙千井齊甃又何祕要昔在顛夭有名無迹孰若吾儕良籌妙畫臧文既沒以言見稱又未若子言行竝徵夷吾反坫樂毅不終奚比于爾明哲守沖臨終受寄讓過許由負扆莅事民言不流刑中于鄭教美于魯蜀民知恥河渭安堵匪皋則伊寍比管晏豈徒聖宣慷慨屢歎昔爾之隱卜惟此宅仁智所處能無規廓日居月諸時殞其夕誰能不歿貴有遺格惟子之勳移風來世詠歌餘典懦夫將勵遐哉邈矣厥規卓矣凡若吾子難可究巳疇昔之乖萬里殊塗今我來思覿爾故墟漢高歸魂于豐沛太公五世而反周想魍魎以髣髴冀影響之有餘魂而有靈豈其識諸蜀志諸葛亮傳注引蜀記曰晉永興中鎮南將軍劉弘至隆中觀亮故宅立碣表閭命太傅掾楗為李興為文曰云云水經沔水注作李安晉故使持節侍中太傅鉅平成侯羊公碑公諱祜字叔子泰山南城人也其先晉羊舌大夫之冑當漢中興始自南陽家于岱野纓冕相繼九世于茲矣顯祖南陽太守考上黨太守咸有能名公承俊烈之高風應明哲之盛代德擅規模仁成茲惠其器量宏深容度廣大浩浩乎固不可測已其志節言行卓爾不群遊神玄默散志青雲弘之以道籍博之以蓺文于是仁聲遠耀芳風遐流年十有七上計吏察孝廉州辟不肯就群公休之四府竝命盤桓累載及公車徵拜中書侍郎祕書監于時當晉之盛明揚英俊乃引公為相國從事中郎遷中領軍遇革命之期任受禪之會秉文經武以集大晉之祚皇采增輝帝威遠邁偉絕代之風弘唐虞之緒帝嘉厥庸醻以大國公乃逡巡固讓裁居小邦天子俞咨仍復公中軍將軍散騎常侍內釐王度外綏區域嚴恭寅畏帝命允飭運國威于句陳握皇樞于紫極于時之盛未有上公者也拜衛將軍尚書僕射以揆天機崇成大業帝道緝熙泰階永肅以江寇未夷乃命公都督荊州諸軍侍中車騎將軍開府辟命乃養民募財開斥國界創築五城以防寇衛境然後闡敷皇風懷遠以德知大同之業思王化之則齊其土人均其利澤軍無虞警民不疲勞農功盈野百姓布疇群黎被德殊俗望風吳人感服繈負而至者四萬餘口進位征南大將軍公雖享有茅士歷登台階吐飧下士貳于姬公方將殪彼戎吳經國弔民然後偃甲戢兵辭功退身以優遊乎初好此公之素志也會遘篤疾春秋五十有八咸寍四年十有一月庚寅薨于京邑天子痛悼遣使持節追贈侍中太傅南城侯印綬賻弔加于常也及其葬上親臨過車騎諡曰成侯天子以公德高勛大而屢辭封爵故復建南城之國特以封公公哲讓終始上未之許及其薨也夫人夏侯氏追公克讓之志遂不以斂公自出身以至于終忠言不輟于口嘉謀不廢于心成其業不處其功勤其勳不榮其祿儀型言行動為世範暨六年春平吳策詔曰故太傅鉅平侯羊祜造建平吳之規潛謀遠略與眾殊慮勳業不遂然蕩滅之計悉如祜策固能夷曠世之寇拯黎民之患勛烈宏著而寵不逮身其遣使以克定之功策告祜廟昔漢氏封蕭何夫人為侯以崇顯元功亦古之令典封祜夫人為萬歲鄉君食邑五千戶賜絹萬疋于是故吏高文奚廉等僉以公德高而志卑位優而行恭徽猷被于江漢懿德及于群生涉其風者貪夫廉懦夫立雖夷惠之操奮乎百世曷以尚之奇謀潛略清功遺緒靡所寘心乃共揭石刊勒盛軌永表風烈焉其辭曰天臨有晉乃降皇輔猗歟惟公應期協矩聰哲神睿乃文乃武曰唐曰虞淵淵其度翼翼其明孝思以形乃耀高風辭爵讓榮為而不有志淩太清如何不弔中年殞末刊是表是旌明宏治四年重立碑拓本又見湖北通志蜀都賦虎豹之人文選蜀都賦劉潚林注上疏辭太子中庶子伏惟皇太子春秋美茂盛德日新始建幼志誕陟大繇猶朝日初暉良寶耀璞侍從之臣宜𥳑俊乂妙選賢彥吏視觀則覩禮容棣棣之則聽納當受嘉話駭耳之言靜應道軌動有所采佐清初陽緝熙天光其任至重聖王詳擇誠非糞朽能可堪任臣聞之人臣之道量力受命其所不諧得以誠聞華陽國志十一上疏辭散騎常侍臣子之心願從疏以求昵凡在人情貪從幽以致明斯實物性賢愚所同臣者何人能無此懷誠自審量邊荒遺燼犬馬老甚非左右機納之器臣雖至愚處之何顏華陽國志十一上言請敘故蜀大官及死事者子孫故蜀大宮及盡忠死事者子孫雖仕郡國或有不才同之齊民為劇又諸葛亮蔣琬費褘等子孫流徙中畿各宜量才敘用以慰巴蜀之心傾吳人之望蜀志譙周傳注引華陽國志今國志十一作一則以慰巴蜀民之心其次傾東吳士人之望
