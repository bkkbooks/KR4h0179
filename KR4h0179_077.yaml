body:
  text: 卷七十七摯虞諸侯覲建旗議魏氏無巡狩故事新禮則巡狩方嶽柴望告至設壝宮如禮諸侯之覲者擯及執贄皆如朝儀而不建其旗臣虞案覲禮諸侯覲天子各建其旗旗章所以殊爵命示等威詩稱君子至止言觀其旗宜定新禮建旗如舊禮宋書禮志二又見晉書禮志下通典五十四皇太子稱臣議孝經資于事父以事君義兼臣子則不嫌稱臣宜定新禮皇太子稱臣如舊晉書禮志下通典七十夫人不答妾拜議漢魏故事王公群妾見于夫人夫人不答拜新禮以為禮無不答臣虞謹案禮妾事女君如婦之事姑而妾服女君期女君不報則敬與婦同而又加賤也名位不同本無酬報禮無不答義不謂此先聖殊嫡庶之別以絶陵替之漸峻明其防猶有僭違宜定新禮自如其舊晉書禮志下通典六十八遣將議漢魏故事遣將出征符節郎授鉞于朝堂新禮遣將御臨軒尚書授節鉞古兵書跪而推轂之義也藝文類聚五十九會朝堂五輅制度議諸車之合于法度可以示訓者則輅為名亦猶殿堂之正者則曰路寢也北堂書鈔一百四十駮潘嶽古今尺議昔聖人有以見天下之賾而擬其形容象物制器以存時用故參天兩地以正算數之紀依律計分以定長短之度其作之也有則故用之也有徵考步兩儀則天地無所隱其情準正三辰則懸象無所容其謬施之金石則音韻和諧措之規矩則器用合宜一本不差而萬物皆正及其差也事皆反是今尺長于古尺幾于半寸樂府用之律呂不合史官用之曆象失占醫署用之孔穴乖錯此三者度量之所由生得失之所取徵皆絓閡而不得通故宜改今而從古也唐虞之制同律度量衡仲尼之訓謹權審度今兩尺並用不可謂之同知失而行不可謂之謹不同不謹是謂謬法非所以軌物垂則示人之極凡物有多而易改亦有少而難變亦有改而致煩有變而之簡度量是人所常用而長短非人所戀惜是多而易改者也正失于得反邪于正一時之變永世無二是變而之簡者也憲章成式不失舊物季末苟合之制異端雜亂之用當以時釐改貞夫一者也臣以為宜如所奏晉書摯虞傳將作大匠陳協掘地得古尺尚書奏今尺長于古尺宜以古為正潘嶽以為習用已久不宜復改虞駮駮裴頠答問天子冠禮天子即位之日即為成君冕服以備不宜有加諸侯即位為成君位豈不定諸侯成君不拘盛典而可以冠天子成君獨有火龍黼衣便不可乎意為宜冠有加通典五十六駮司隸奏魯夔違法事河內太守魯夔使民二百家共立一學未成而司隸奏以違法尚書郎中騎都尉臣摯虞駮夔為近畿大都朝所委任親臨民物足識事宜纍表仍上求二百家立一學是其留心學校必欲有成也三日曲水對漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相攜之水濱盥洗因水以泛觴曲水之義起于此也御覽三十引續齊諧記致齊王冏箋間于張華沒後入中書省得華先帝時答詔本草先帝問華可以輔政持重付以後事者華答明德至親莫如先王宜留以為社稷之鎮其忠良之謀嶷誠之言信于幽冥沒而後彰與苟且隨時者不可同世而論也議者有責華以愍懷太子之事不抗節廷爭當此之時諫者必得違命之死先聖之教死而無益者不以責人故晏嬰齊之正卿不死崔杼之難季札吳之宗臣不爭逆順之理理盡而無所施者固聖教之所不責也晉書張華傳答杜預書僕以為除服誠合事宜附古則意有未安五服之制成于周室周室以前仰迄上古雖有在喪之哀未有行喪之制故堯稱遏密殷曰諒暗各舉其事而言非未葬降除之名既葬有殊降也周室以來謂之喪服喪服者以服表喪禮有定制孝景之即吉方進之從時皆未足為準蓋聖人之于禮譏其失道而通其變今帝者一日萬機皇太子監撫之重未就東宮猶在殿省之內故不得伸其哀情以宜奪禮葬訖除服變制通理垂典將來何必附之于古欽以舊義使老儒致爭哉晉書摯虞傳通典八十二太康頌於休上古人之資始四隩咸宅萬國同軌有漢不競喪亂靡紀畿服外叛侯衛內圮天難既降時惟鞠凶龍戰獸爭分裂遐邦備僭岷蜀度逆海東權乃緣間割據三江明明上帝臨下有赫乃宣皇威致天之辟奮武遼隧罪人斯獲撫定朝鮮奄征韓貊文既應期席卷梁益元憝委命九夷重譯卭冉哀牢是焉底績我皇之登二國既平靡適不懷以育群生吳乃負固放命南冥聲教未暨弗及王靈皇震其威赫如雷霆截彼江沔荊舒以清邈矣聖皇參乾兩離陶化以正取亂以奇耀武六旬輿徒不疲飲至數實干旄無虧洋洋四海率禮和樂穆穆宮廟歌雍詠鑠光天之下莫匪帝略窮髮反景承正受朔龍馬騤騤風于華陽弓矢櫜服干戈戢藏嚴嚴南金業業餘皇雄劍班朝造舟為梁聖明有造實代天工天地不違黎元時雍三務斯協用砥厥庸既遠其迹將明其蹤喬山惟嶽望帝之封猗歟聖帝胡不封哉晉書摯虞傳釋奠頌如彼泉流不盈不運講業既終禮師釋奠升觴折俎上下惟宴雍雍其來肅肅其見初學記十四御覽五百三十五連理頌東宮正德之內承華之外槐樹二枝連理而生二幹一心以蕃本根藝文類聚八十八初學記二十八庖犧讚昔在上古惟德居位庖犧作王世尚醇懿設卦分象開物紀類施罟設網人用不匱初學記九神農讚神農居世通變該極民衆獸鮮乃教稼穡聚貨交市草木播植務濟其本不道其飾初學記九黃帝讚黃帝在位實號軒轅車以行陸舟以濟川弧矢之利弭難消患垂衣而治萬國乂安初學記九帝堯讚唐帝放勛欽明文思惟天為大惟堯則之巍巍蕩蕩萬邦雍熙初學記九夏禹讚決隄疏河刊山敷土四隩既宅彝倫攸敘卑宮菲食以寧區宇初學記九殷湯讚濬也惟商實惟成湯三五迭興舍帝稱王初學記九周文王讚周文翼翼儀形體教上帝是臨神明是勞東鄰之昏西鄰之曜九有既集以聖易暴初學記九周武王讚於皇武王天命是鍾七德既耀莫不率從奄清宇宙蕩商之蹤初學記九周宣王讚宣王承衰邦家多阻懲難思理官人以敘山甫補闕方叔禦侮是用中興恢復周宇初學記九漢高祖讚漢祖明達兼咨權武總御群雄翦翕強楚奄正華夏經略區宇遂登天位纘堯之緒初學記九漢文帝讚漢之光大實惟孝文體仁尚儉克己為君按轡細柳抑尊成軍營兆南原陵不崇墳初學記九孔子讚仲尼大聖遭時昏荒河圖沈翳鳳鳥幽藏爰整禮樂以綜三綱因史立法是謂素王初學記十七顏子讚顏子亹亹仁心不違行無二過知章知微初學記十七左丘明讚丘明作史時惟衰周錯綜墳籍思弘徽猷闡明王典光演春秋誕宣聖旨曠代彌休初學記十七新婚針今在哲文遭家不造結髮之麗不同偕老既納新配內芬外藻厚味臘毒大命將夭色不可耽命不可輕君子是憚敢告後生藝文類聚四十尚書令針舜納大麓七政以齊內成外平風雨不迷補我袞闕闡我王猷王猷允塞四海咸休雖聖雖明必賴良才無曰我智官不能任發言如絲其出成綸千里之應樞機在身藝文類聚四十八文選顏延之北使洛詩注武庫銘有財無義惟家之殃無愛糞土以毀五常初學記二十四御覽一百九十一門銘祿無常家福無定門人謀鬼謀道在則尊藝文類聚六十三御覽一百八十三竈屋銘大孝養志厥次養形事親以敬美過三牲藝文類聚八十決疑凡救日蝕者皆著赤幘以助陽也日將蝕天子素服避正殿內外嚴警太史登靈臺伺候日變便伐鼓于門聞鼓音侍臣皆著赤幘帶劍入侍三臺令史以上皆各持劍立其戶前衛尉卿驅馳繞宮伺察守備周而復始亦伐鼓于社用周禮也又以赤絲為繩以繫社祝史陳辭以責之句龍之神天子之上公故陳辭以責之日復常乃罷晉書禮志上引摯虞決疑又見宋書禮志一決疑理決疑父亡服竟繼母還前親子家當為何服此有問有夫婦生男女三人遭荒亂離散不知死生母後嫁有繼子後夫未亡得親子信請就親子家後夫言可爾後數年夫亡喪之如禮服竟隨親子去別繼子云我則為絶死不就汝家葬也而名戶籍如故母今亡繼子當何服服之三年則不來葬服之周則無所嫁博士淳于睿等以為當依繼母嫁從為服周博士孫綽議曰父答雖有可爾之語夫妻枕席相順之意固非決絶之辭也繼母喪父如禮服竟之後不還私家踰歲歷年循養無二母恩不衰適見親子專自任意無所關報私隨其志絶亡夫背繼子違三從正義亦為大矣今母雖不母子何緣得計去留輕重而降之哉夫五服有名不可謬施施之為出出義不全施之于嫁嫁義不成欲降服周于禮何居名在夫籍私歸親子喪柩南北禮律私法計其可知便決降服許令制周頗在可怪博士弟子北海徐叔中難孫云以前問不立甲乙為名稱于議不便今以母為甲先夫為乙後夫為丙先子為丁繼子為戊丙言可爾必慮事宜順其至情非虛欺也臨終不命知死之後制不在己故也甲不重求信之前言也本有未還之計去誓不還葬之辭生則己不得養死則不與己父同穴就不成嫁當為去母附之于嫁不亦宜乎通典九十四引摯虞理疑文章流別論文章者所以宣上下之象明人倫之敘窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興德勳立而銘著嘉美終而誄集祝史陳辭官針王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛德之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也後世之為詩者多矣其功德者謂之頌其餘則總謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興于是史録其篇工歌其章以奏于宗廟告于鬼神故頌之所美者聖王之德也則以為律呂或以頌形或以頌聲其細已甚非古頌之意昔班固為安豐戴侯頌史岑為出師頌和熹鄧后頌與魯頌體意相類而文辭之異古今之變也揚雄趙充國頌頌而似雅傅毅顯宗頌文與周頌相似而雜以風雅之意若馬融廣成上林之屬純為今賦之體而謂之頌失之遠矣藝文類聚五十六御覽五百八十八賦者敷陳之稱古詩之流也古之作詩者發乎情止乎禮義情之發因辭以形之禮義之旨須事以明之故有賦焉所以假象盡辭敷陳其志前世為賦者有孫卿屈原尚頗有古詩之義至宋玉則多淫浮之病矣楚辭之賦賦之善者也故揚子稱賦莫深于離騷賈誼之作則屈原儔也古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情義為主則言省而文有例矣事形為本則言當而辭無常矣文之煩省辭之險易蓋由于此夫假象過大則與類相遠逸辭過壯則與事相違辨言過理則與義相失麗靡過美則與情相悖此四過者所以背大體而害政教是以司馬遷割相如之浮説揚雄疾辭人之賦麗以淫藝文類聚五十六御覽五百八十七書云詩言志歌永言言其志謂之詩古有採詩之官王者以知得失古之詩有三言四言五言六言七言九言古詩率以四言為體而時有一句二句雜在四言之間後世演之遂以為篇古詩之三言者振振鷺鷺于飛之屬是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋之屬是也于俳諧倡樂多用之六言者我姑酌彼金罍之屬是也樂府亦用之七言者交交黃鳥止于桑之屬是也于俳諧倡樂世用之古詩之九言者泂酌彼行潦挹彼注茲之屬是也不入歌謠之章故世希為之夫詩雖以情志為本而以成聲為節然則雅音之韻四言為正其餘雖備曲折之體而非音之正也藝文類聚五十六七發造于枚乘借吳楚以為客主先言出輿入輦蹙痿之損深宮洞房寒暑之疾靡曼美色宴安之毒厚味暖服淫曜之害宜聽世之君子要言妙道以疏神導引蠲淹滯之纍既設此辭以顯明去就之路而後説以色聲逸遊之樂其説不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏粱之常疾以為匡勸雖有甚泰之辭而不沒其諷諭之義也其流遂廣其義遂變率有辭人淫麗之尢矣崔駰既作七依而假非有先生之言曰嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之簇豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免于勸也藝文類聚五十七御覽五百九十揚雄依虞針作十二州十二官針而傳于世不具九官崔氏纍世彌縫其闕胡公又以次其首目而為之解署曰百官針書鈔原本一百二夫古之銘至約今之銘至繁亦有由也質文時異則既論之矣且上古之銘銘于宗廟之碑蔡雍為楊公作碑其文典正末世之美者也後世以來之器銘之嘉者有王莽鼎銘崔瑗杌銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令德一也李尢為銘自山河都邑至于刀筆平契無不有銘而文多穢病討論潤色言可采録御覽五百九十詩頌針銘之篇皆有往古成文可放依而作惟誄無定制故作者多異焉見于典籍者左傳有魯哀公為孔子誄御覽五百九十六哀辭者誄之流也崔瑗蘇順馬融等為之率以施于童殤夭折不以壽終者建安中文帝與臨淄侯各失稚子命徐幹劉楨等為之哀辭哀辭之體以哀痛為主緣以歎息之辭御覽五百九十六今所哀策者古誄之義御覽五百九十六若解嘲之弘緩優大應賓之淵懿溫雅達旨之壯厲慷慷應間之綢繆契闊郁郁彬彬靡有不長焉矣書鈔一百古有宗廟之碑後世立碑于墓顯之衢路其所載者銘辭也圖讖之屬雖非正文之制然以取其縱橫有義反覆成章
