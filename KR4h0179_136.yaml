body:
  text: 徐藻崇德太后服議資父事君而敬同又禮云其夫屬乎父道者妻皆母道也則夫屬君道妻亦后道矣服后宜以齊母之義也魯譏逆祀以明尊卑今上躬奉康穆哀皇及靖后之祀致敬同于所天豈可敬之以君道而服廢于本親謂應服齊衰期晉書康獻褚后傳太元九年崩太后于孝武帝為從嫂朝議疑其服太學博士徐藻議又宋書禮志二九年作元年徐藻作徐恭通典八十作寧康中皆誤公除祭議古無公除吉凶之服不可相干故緦不祭耳今既公除吉服而行則可吉祭今既吉服無事不可而大事反可闕邪若以心喪為疑者則出母子為父後得以含悲而祭矣又禮有死宮中三月不舉祭齊縗之禮三月不從政意者雖速公除猶宜待滿三月又問同宮之喪而未葬雖公除可以祭不答曰公除不祭本與于外喪耳若同宮之喪雖未葬此不可也通典五十二奏議東宮班劍東宮班劍議者不處數案公卿故事給虎賁二十人持劍安平獻王加青蓋九旒前後鼓吹虎賁亦二十人依準此數東宮班劍當不過二十御覽六百八十一君臣同諡議案郭奕諡景詔實不以犯帝諡而改也又武帝永平元年詔書貴賤不嫌同號周公諡文君父同稱名行不殊諡何得異自今以後其各如禮通典一百四太元四年王公妾子服其所生母議喪服傳稱與尊者為體則不服其私親又君父所不服子亦不敢服故王公妾子服其所生母練冠麻衣既葬而除非五服之常則謂之無服宋書禮志二太元十五年淑媛陳氏卒皇太子所生也太子前衛率徐邈議褚爽上表稱太子名議左傳周人以諱事神名終將諱之記云卒哭而諱皆周禮也名之與諡並是人倫所以相稱殷尚質無諱議其遇名字如姓位耳箕子答武王而邦其昌知于時未有諱也周公于成王六年始制周禮曲備節文而諱名稱諡然猶臨文不諱廟中不諱故周頌有克昌厥後先儒以為宗廟詠歌上不諱下即是父前子名也通典一百四太元十九年明堂郊祀配享議圜丘郊祀經典無二宣皇帝嘗辨斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安武皇帝建廟六世三昭三穆宣皇帝創基之主實惟太祖親則王考四廟在上未及遷世故權虛東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事七之義矣又禮曰庶子王亦禘祖立廟蓋謂支胤授位則親近必復京兆府君于今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定爾京兆遷毀宜藏主于石室雖禘祫猶弗及何者傳稱毀主升合乎太祖升者自下之名不可謂降尊就卑也太子太孫陰室四主儲嗣之重升祔皇祖所配之廟世遠應遷然後從食之孫與之俱毀明堂圓方之制綱領已不宜闕配帝之祀且王者以天下為家未必一邦故周平光武無廢于二京也周公宗祀文王漢明配以世祖自非惟新之考孰配上帝明堂所配之神積疑莫辨案易殷薦上帝以配祖考祖考同配則上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常禮同用四圭故並言之若上帝是五帝經文何不言祀天旅五帝祀地旅四望乎人帝之與天帝雖天人之通謂然五方不可言上帝諸侯不可言大君也書無全證而義容彼此故太始太康二紀之間興廢迭用矣並見晉書禮志上宋書禮志三殷祭議禮五年再殷凡六十月分中每三十月殷也通典四十九與范寧書知足下遣十五議曹各之一縣又吏假歸白所聞見誠是足下留意百姓故廣其視聽吾謂勸導以實不以文十五議曹欲何所敷宣邪庶事辭訟足下聽斷允塞則物理足矣上有理務之心則下之求理者至矣日昃省覽庶事無滯則吏慎其負而人聽不惑豈須邑至里詣飾其遊聲哉非徒不足致益乃是蠶漁之所資又不可縱小吏為耳目也豈有善人君子而干非其事多所告白者乎君子之心誰毀誰譽如有所譽必由歷試如有所毀必以著明託社之鼠政之甚害自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使君子道消善人輿尸前史所書可為深鑒足下選綱紀必得國士足以攝諸曹諸曹皆是良吏則足以掌文案又擇公方之人以為監司則清濁能否與事而明足下但平心居宗何取于耳目哉昔明德馬后未嘗顧與左右言可謂遠識況大丈夫而不能免此乎晉書徐邈傳豫章太守范寧欲遣十五議曹下屬城采求風政并吏假還訊問官長得失邈與寧書云云與范寧書問告定用牲否禮郊牲在滌三月此謂常祀耳宗廟告牲亦不展芻豢日既逼不容得備又禮郊特牲在滌宮而稷牛唯具傳曰帝牛不吉則卜稷牛而用之如無復九旬之別也謂今牲至則當用無疑否通典五十五重與范寧書禮天子之妃曰后關雎稱后妃之德妃后之名可謂大同所以憲章皇極禮崇物備者在于此也故太后之號定于前朝而當今所率由也若必欲章服同于后而名號異于妃則可因夫人之稱而加皇太以明尊尊雖二理然于文物之章猶未盡崇高之極此又今之所疑不可得行也足下嫌太子妻稱妃然古無此稱出于後代今有皇太之別可例論邪通典七十二答徐乾書母以子貴穀梁亦有其義故曰賵人之母則可又會成風葬著言禮也但名雖夫人而實殊同體故不敢配厭群臣無服所服以為異也鄭云近臣從服唯君所服若嫡夫人歿則有制重者故曰唯君所服之耳與君同重自施近臣驂僕而下三卿五大夫內有宗廟之祭夕有侯伯之命何得以私服廢正故庶母為夫人上之不得以干宗廟外之不得以接侯伯唯國內申其私而崇其儀亦如侯伯子男之臣于內稱君曰公耳雖人君肆情行服而卿大夫不從所以知上有天王也邈往來答釋范武子以詩序云后妃義一是以太妃車旗服章備如太后唯不敢從于宗廟禮又曰百官不稱臣所以合無服之制也范于時都謂不應同皇后服章以尊議難之自塞矣書傳無天子庶母之文且妾上無女君則夫人可為通稱如五等爵皆稱公耳天王之與皇后未聞二其號者所以關之情禮而定太妃之稱良有由矣體同皇極故上比稱皇屈于郊廟故遠避伉儷不曰后而曰妃因名求實可謂至矣禮太后與太妃義無異者假令國君在時妾母自當稱夫人但王典無二名不得以國公夫人為喻耳通典七十二答曹述初難五年再殷象再閏無取三年喪也祫三時皆可者蓋喪終則吉而祫服終無常故祫隨所遇唯春不祫故曰特礿非殷祀常也禮大事有時日故蒸嘗以時況祫之重無定月乎通典四十九答曹述初問曹述初問有仁人義士矜幼攜養積年為之制服當無疑邪徐邈答曰禮緣情耳同爨緦又朋友麻通典一百一答傅瑗難太元十六年告移廟奠幣祠部郎傳瑗問徐邈應設奠否邈答曰禮君出境以遷廟主行每舍奠焉凡事關宗廟非幣則薦未有不告而行將遷主之晨宜依告以設奠瑗難曰言依告設奠但三薦相去近恐犯春秋再蒸之議禮諸侯薨及禘祫則迎群主歸太祖廟又云主出廟入廟必蹕無將行設奠之文奠重于蹕而文不及無奠明矣禮又云天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出每舍奠焉而後就舍此謂雖侯王之貴必有尊也若徵此文事非其喻邈曰禮諸侯出朝既告祖禰臨行又遍告告不嫌再所引每舍奠者取其疏數隨宜若然則奠不為數今之告廟戒出期也至日又告告將出也又曰新故兩廟各有其事左宗人儐曰有司具請升君升祝奉幣從祝聲三曰孝嗣侯某敢以嘉幣告于皇考成廟將徙敢告君及祝再拜興祝導君降于阼階下云至于新廟筵于戶牖間祝奠幣于几東薦脯醢君盥酌奠于薦西祝聲三曰敢用嘉薦告于皇考又曰孝嗣侯某潔為明薦尚饗又大戴遷廟禮文云凡以幣告皆執幣而告告畢乃奠幣于几東小宰升取幣埋兩階間禮天子諸侯將出以幣告廟遂奉幣以出及告設奠乃斂幣而藏之兩階此則初告之幣待後告而藏之必須事訖未訖則未藏今何不陳于新廟邪去舊之新當即新以藏幣故先奠几東乃取而藏之非謂舊廟虛告而新廟兼設也且初告告將移祝曰敢以嘉幣後告告明享祝曰敢用嘉薦尋此二祝之稱則知幣也薦也各施于一廟矣通典五十五答伏系之問伏系之問宣后徙廟或但告惠廟亦告太廟徐邈答此無禮文意謂初崇號以告太廟今自一別廟之遷耳于太廟無事無事而告則近黷矣古大事必告初崇進而告是也今徙廟事之末恐不得復告也通典五十五答孔安國問孔安國問徐邈云皇太子為新安公主當何服邈答云禮父母之所不服子亦不敢服諸侯之嗣子及大夫之嫡皆降絶旁親唯父母之所服子乃敢服王侯絶周不為姊妹服太子體君之尊亦同無服皇子厭其君又不敢服通典八十二答王奧問琅邪王為前太宰武陵王服郎中令王奧問徐邈曰昆弟俱仕一人為大夫一人為士便降太宰是為庶人諸侯而全持庶人之服乎元皇帝入承大宗孝王出嗣宗國殿下出後孝王于元帝故得為子不邈答曰議者多謂琅邪孝王應從出為人後例降一等今琅邪當為武陵王服大功案禮受重必以尊服服之而降本親此誠然矣今所疑者元皇帝本琅邪嗣王既光啓中興命孝王委重傳祀實受之于元皇非別有承繼者不旁繼而內自奪是無所天也今孝王猶以子道嗣位本國豈與出為人後者同哉案漢宣帝雖上繼昭帝而史皇孫猶稱皇考父子之道全即一代成事通典八十始疑武陵出嗣既以廢放不成為人後則當還服本親若以武陵先王祀不宜絶自應更命承繼同上又答王奧問琅邪中尉王奧問國王為太宰武陵服事云太宰降為庶人諸侯貴與庶人不敵為不降邪昆弟俱仕一人為大夫一人為士便降況諸侯而全持庶人服乎徐邈答云案禮以貴降賤王侯絶周以尊降卑餘尊所厭則公子服其母妻昆弟不過大功以嫡別庶則父之所降子亦不敢不降也此三者舊典也喪服傳又曰始封之君不臣諸父昆先儒以為不臣弟則服之漢魏以來王侯皆不臣其父兄則事異于周故厭降之節與周不同緦猶不降況其親乎既不以貴降則餘尊之厭故五服內外通如周之士禮而三降之典不行同矣昔魏武在漢朝為諸侯制而竟不立荀公定新禮亦欲令王公五等皆旁親絶周而摯仲理駮以為今諸侯與古異遂不施行此則是近代成軌也記又云古者不降故孟武孟皮得全齊縗然則殷周立制已自不同所謂質文異宜不相襲禮大晉世所行遠同斯義孔彭祖昔咨簡文帝諸王所服聖旨以為近代以來無服相降虞喜釋滯曰漢魏以來先儒論禮及喪服變除者皆言大夫降其旁親為士者一等時人或班駮行之自謂合禮案喪服經傳始封之君不臣諸父兄弟封君之子不臣諸父封君之孫盡臣之矣夫始封之君尚服諸父昆弟而始為大夫便降旁親尊者就重而卑者即輕輕重顛倒豈禮意哉然當有意此為據諸侯成例包于大夫以相兼通也如此則一代為大夫不降諸父二代為大夫不降兄弟三代為大夫皆降之古者貴大夫有采邑繼位不止一身魯之三桓鄭之七穆皆自此也或問曰今大夫雖不繼位亦有三代皆為大夫者名例相準必當隨古乎答曰古重今輕位無常居使吾處之志不存降通典九十三答孔汪問侍中孔汪問徐邈曰漢宣帝謂史皇孫為皇考此是稱謂耳未足以明服之輕重也假令宣帝登阼後有本父母喪自當不得行重服又君服父祖廢疾不立者故斬而不降賀循云雖不立位在嫡正父之所繼己之所承故為三年恐此與出後相踰邈答曰祖考之名非可謬立且于時立非一帝德皇恭皇皆不得稱考明史皇孫稱考當實有義君超繼上代猶為父祖之重無別所承故本親不降也元皇孝王所承既異則大制宜降故論者據此為斷子之離父父之拾子其所承繼不同何得復全其本故吾無易衆議通典八十二答或問或人問徐邈嫡孫承重在喪中亡其從弟已孤又未有子姪相繼疑于祭祀邈答今見有諸孫而祖無後甚非禮意禮宗子在外則庶子攝祭可依此使一孫攝主攝主則本服如故禮大功者主人之喪猶為之練祥再祭況諸孫邪若周既除當以素服臨祭依心喪以終三年通典八十八答虞道恭問虞道恭問曰舊君齊縗三月今見為人吏舊君喪今同在此未知禮猶得服不徐邈答曰若更仕一君便絶前君足下疑于今為人吏是也吾謂仕者豈以後絶前邪正使仕于此君之朝而追前君亦何不可況為前君服舊君之服也通典九十答范寧問報服在娣姒下則知姑姊之服亦是出自恩紀非從夫之服報也所發在于姑姊耳通典九十二范寧問曰奔喪禮師哭于廟門外孔子曰師吾哭之寢何邪徐邈答曰蓋殷周禮也通典一百一答劉氏問劉氏問曰弟子遭所生母艱弟子有兒出後伯父承嫡當心喪三月否徐邈答曰庶祖母服禮無正條往年臨川王服太妃已為成制今出後承嫡者當依為人後降本親一等宜制大功九月通典九十六答王珣問徐邈答王珣曰鄭玄云五月之內追服王肅云服其殘月小功不追以恩輕故也若方全服與追何異宜服餘月通典九十八答杜挹問杜挹問徐邈曰亡婦遂未得葬挹服便周既無別喪主多云未應得除今定云何答曰無子為主案禮本不應除即于下流多不能備禮今日宜變至葬反服亦無不可之理也通典一百三問王珉漢法制洗馬冠高山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬御覽二百四十六秋賦于時招搖西建天高氣清飛霜凝灑悴葉飄零初學記三高風蕭條以遐振兮遊雲掩翳而罥林昆蟲隨陽而壞穴鷹隼順陰而威稜北堂書鈔一百五十八悼亡賦歎林松之萋蕭慨丘陵之落臨穴洞而興哀外物而乖錯同上釣賦投芳餌于纖絲灑長綸于平流初學記二十二上表乞歸臣年時衰耄朝敬永闕端居都邑徒增替怠臣墳墓在晉陵臣又生長京戀舊懷遠每增感暮心息道玄謬荷朝恩忝宰此邑乞相隨之官歸終桑梓微志獲申殞沒無恨宋書徐廣傳永初元年詔為中散大夫廣上表許之孝武文李太后服議太皇太后名位允正體同皇極理制備盡情禮彌申春秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號僖公服三年之喪子于父之所生體尊義重且禮祖不厭孫固宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同于為祖母後齊衰期永安皇后無服但一舉哀百官亦一期晉書禮志中又孝武文李皇后傳宋書徐廣傳又禮志二通典八十一隆安四年太皇太后李氏崩疑所服尚書左僕射何澄右僕射王雅尚書車胤孔安國祠部郎徐廣議詔可今據宋書編入廣集若以魯侯所行失禮者左傳不見譏責而漢代持服與正嫡無異殷太常所上服事于禮中尋求俱無明文然僕之所言專據春秋也通典八十一殷祭議尋先事海西公泰和六年十月殷祠孝武皇帝寧康二年十月殷祠若依常去前三十月今則應用四月也于時蓋當有故而遷在冬但未詳其事太元元年十月殷祠依常三十月今則應用二年四月也是追計辛未歲十月未合六十月而再殷何邵甫注公羊傳云祫從先君來積數為限自僖八年至文二年知為祫祭如此履端居始承源成流領會之節遠因宗本也昔年有故推遷非其常度寧康太元前事可依雖年有曠近之異然追計之理同矣愚謂從復常次者以推歸正之道也宋書禮志三通典四十九義熙二年四府君遷主議四府君嘗處廟室之首歆率土之祭若霾之幽壤于情理未必咸盡謂可遷藏西儲以為遠祧而禘饗永絶也晉書禮志上宋書禮志三義熙九年獻書宋公風雹變未必為災古之聖賢輒懼而修己所以興政化而隆德教也嘗忝服事宿眷未忘思竭塵露率誠于習明公初建義旗匡復宗社神武應運信宿平夷且恭謙儉約虛心匪懈來蘇之化功用若神頃事故既多刑德並用戰功殷積報敘難盡萬機繁湊固應難速且小細煩密群下多懼又穀帛豐賤而民情不勸禁司互設而劫有盜多有誠由俗斃未易整而望深未易炳追思義熙之始如有不同何者好安願逸萬物之大趣習舊駭新凡識所不免要當俯順群情抑揚隨俗則朝野歡泰具瞻允康矣言無可採願矜其愚款之志宋書徐廣傳答劉嗣問劉嗣問徐野人曰嗣去年十二月有周慘欲用六月婚而服早已除大人本無服便是一家主想無復異徐答曰此議本據祖為兒孫婚自平吉可得娶妻不計兒之有慘也通典六十答劉損問嗣弟損又重問野人曰諸賢唯云祖尊一家得為婚主若便婚損疑速也徐答曰今歸重于王父理無取于遲速損重問曰禮云嫁女之家三夜不息燭娶婦之家三日不舉樂得不有輕不又大功之未可以嫁女則男不得婚向家是嫁女今是以子婚男女詎無異邪徐答曰秉燭寢樂居然輕重故嫁娶殊品至于今事理本分塗唯取歸重極尊而不別異男女一也同上答樂亮問樂亮問徐廣曰君弔之儀雖在于禮未審皇子之弔受弔為當迎送及拜以不當于廬室主當別施位邪若別施位者應在何處即位為應立應坐君弔雖已葬主人必絻此禮已廢並未詳既小祥重服已除正當即以練冠功縗受弔邪徐廣答曰皇子之儀揖而不拜然猶應以練冠功縗迎立于側皇子向戶揖訖伏廬室而哭及皇子前執手時及可長跪受之去出室還至戶更哭通典八十二答蔡眇之問蔡眇之問徐野人云從弟心喪當除此月不知猶應設祭者為應施床為地席邪其大兄昔在西知喪晚心制乃應除臘月其妹先除不知便可著綵衣不徐答曰禫者喪事之極也故于此日設祭而告終自爾之後沈哀在心故謂之心喪外無節文故服祭並缺也晦日唯哭以寫哀而已既各盡其服從禮而除矣著綵衣無所疑通典一百一答劉鎮之問劉鎮之問父尚在母出嫁亡今改葬應有服不徐廣答云改葬服緦唯施極重此既出嫁未聞兒有服之文然緣情立禮今制服奉臨就從重之義合即心之理亦當無疑于不允也通典一百二上言神馬見晉寧須池縣此月辛亥有馬二匹出于河上一白一烏盤戲相逐河水上從卯至巳乃沒開元占經一百十八引晉中興徵祥説孝武帝太元十四年六月寧朔州刺史賈統上言
