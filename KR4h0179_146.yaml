body:
  text: 卷一百四十六闕名論江南貢舉事江表初附未與華夏同貢士之宜與中國法異前舉孝廉不避喪孝廉亦受行不辭以為宜訪問餘郡多有此比案天水太守王孔碩舉楊少仲為孝廉有周之喪而行甚致清議今欲從舊則中夏所禁欲不舉則方土所闕暗塞義淺甚以為疑通典一百一毗陵內史論江南貢事云云道學論許邁字叔齊清虛接真棲遐世表志在往而不返故自改遠遊與王右軍父子為世外之交王亦辭好養生之事每造遠遊未嘗不彌日忘返御覽四百一十千金渠石人東脅下記太始七年六月二十三日大水迸瀑出常流上三丈蕩壞二堨五龍泄水南注瀉下加歲久漱齧每潦即壞歷載消棄大功今故無令遏更于西開泄名曰代龍渠地形正平誠得為泄至理千金不與水勢激爭無緑當壞由其卑下水得踰上漱齧故也今增高千金于舊一丈四尺五龍自然必歷世無患若五龍歲久復壞可轉于西更開二堨二渠合用二十三萬五千六百九十八功以其年十月二十三日起作功重人少到八年四月二十日畢水經穀水注石人西脅下記若溝渠久疏深引水者當于河南城北石磧西更開渠北出使首狐丘故溝東下因故易就磧堅便時事業已訖然後見之加邊方多事人力苦少又渠堨新成未患于水是以不敢預修通之若于後當復興功者宜就西磧故書之于石以遺後賢矣水經穀水注千金渠東石梁西門之南頰記晉元康二年十一月二十日改治石巷水門除豎枋更為函枋立作覆枋屋前後辟級續石障使南北入岸築治漱處破石以為殺矣到三年三月十五日畢訖水經穀水注造戾陵遏記魏使持節都督河北道諸軍事征北將軍建城鄉侯卿侯沛國劉靖字文恭登梁山以觀源流相隰水以度形勢嘉武安之通渠美秦民之殷富乃使帳下督丁鴻軍士千人以嘉平二年立遏于水導高梁河造戾陵遏開車箱渠其遏表云高梁河水者出自并州潞河之別源也長岸峻固直截中流積石籠以為主遏高一丈東西長三十丈南北廣七十餘步依北岸立水門門廣四丈立水十丈山水暴發則乘遏東下平流守常則自門北入灌田歲二千頃凡所封地百萬餘畝至景元三年辛酉詔書以民食轉廣陸發不贍遣謁者樊晨更制水門限田千頃刻地四千三百一十六頃出給郡縣改定田五千九百三十頃水流乘車箱渠自薊西北徑昌平東盡漁陽潞縣凡所潤含四五百里所灌田萬有餘頃高下孔濟原隰底平疏之斯溉決之斯散導渠以為濤門灑淲池以為甘澤施加于當時敷被于後世晉元康四年君少子驍騎將軍平卿侯弘受命使持節監幽州諸軍事領護烏丸校尉寧朔將軍遏立積三十六載至五年夏六月洪水暴出毀損四分之三乘北岸七十餘丈上渠車箱所在漫溢追惟前立遏之勳親臨山川指授規略命司馬關內侯逢惲內外將士二千人起長岸立石渠修主遏治水門門廣四丈立水五丈興復載利通塞之宜準遵舊制凡用功四萬有餘焉諸部王侯不召而自至繈負而趨事者蓋數千人詩載經始勿亟易稱民忘其勞斯之謂乎于是二府文武之士感秦國思鄭渠之績魏人置豹祀之義乃遐慕仁政追述成功元康五年十月十一日刊石立表以紀勳烈并記遏制度永為後式焉水經鮑王水注銅尺銘晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小呂玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗微強西京望臬微弱其餘與此尺同隋書律曆志上原注銘八十二字今但八十字未詳伊闕右壁銘元康五年河南府君循大禹之軌部督郵辛曜新城令王琨部監作掾董猗褒斬岸開石平通伊闕水經伊水注七年粟銘劉殷嘗夜夢人謂之曰西籬下有粟寤而掘之得十五鍾銘曰七年粟百石以賜孝子劉殷晉書孝友劉殷傳又見十六國春秋九建鄴城銘二百年後當有癡人修破吾城者南史十陳宣帝修飾都城為扞禦之備獲銘云云左思別傳思字太沖齊國臨淄人父雍起于筆札多所掌練為殿中侍御史思蚤喪母雍憐之不甚教其書學及長博覽名文遍閲百家司空張華辟為祭酒賈謐舉為祕書郎謐誅歸鄉里專思著述齊王囧請為記室參軍不起時為三都賦未成也後數年疾終其三都賦改定至終乃上初作蜀都賦云金馬電發于高口碧雞羽而云披鬼彈飛丸以礌礉火井騰光以赫曦今無鬼彈故其賦往往不同思為人無吏幹而有文才又頗以椒房自矜齊人不重也思造張載問崏蜀事交接亦疏皇甫謐西州高士摯仲治宿儒知名非思倫匹劉淵林衛伯輿並蚤終皆火為思賦序注也凡諸注解皆思自為欲重其文故假時人名姓也世説文學篇注文明王太后哀策文明明先后興我晉道暉章淑問以翼皇考邁德宣猷大業有逮貽慶孤矇堂構是保庶資復顧永享難老奄然登遐棄我何早沈哀罔訴如何穹昊嗚呼哀哉厥初生民樹之惠康帝遷明德顧豫先皇天立厥配我皇是光作邦作對德音無疆愍豫不弔天篤降殃日沒明夷中年隕喪煢煢在疚永懷摧傷尋惟景行於穆不已海岱降靈世荷繁祉永錫祚胤篤生文母誕膺純和淑慎容止質直不渝體茲孝友詩書是悅禮籍是紀三從無違中饋允理追惟先后勞謙是尚爰初在室竭力致養嬪于大邦皇基是相謐靜隆化帝業以創內敘嬪御外叶時望履信居順德行洽畼密勿無荒劬勞克讓崇儉抑華沖素是放雖享崇高歡嘉未饗胡寧棄之我將曷仰咨余不迼大罰薦臻皇考背世始踰三年仰奉慈親冀無後艱凶災仍集何辜于天鳴呼哀哉靈輀夙駕設祖中闈轀輬動軫既往不追哀哀皇妣永潛靈暉進攀梓宮顧援素旗屏營窮痛誰造誰依訴情贈策以舒傷悲尚或有聞顧豫孤遺嗚呼哀哉晉書列傳一后傳泰始四年崩武帝手疏后德命史官為哀策武元楊皇后哀策文天地配序成化兩儀王假有家道在伉儷薑嫄佐嚳二妃興媯仰希古昔冀亦同規今胡不然景命夙虧鳴呼哀哉我應圖籙統臨萬方正位于內實在嬪嬙天作之合駿發之祥河嶽降靈啓祚豐陽奕世豐衍朱紼斯煌纘女惟行受命溥將來翼家邦憲度是常緝熙陰教德聲顯揚昔我先妣暉曜休光后承前訓奉述遺芳宜嗣徽音繼序無荒如何不弔背世隕喪望齊無主長去蒸嘗追懷永悼率士摧傷嗚呼哀哉陵兆既窆將遷幽都宵陳夙駕元妃其徂宮闈遏密階庭空虛設祖肴紼告駕啓塗服翬褕狄寄象容車金路暗藹裳帳示舒千乘動軫六驥躊躇銘旌樹表翣柳雲敷祁祁同軌岌岌蒸徒孰不云懷哀感萬夫寧神虞卜安體玄廬土房陶簋齊制遂初依行紀諡聲被八區雖背明光亦歸皇姑沒而不朽世德作謨嗚呼哀哉晉書武元楊后傳后崩乃命史臣作哀策敘懷成帝哀策文宸極寥廓聖靈遐之哀備物之虛在痛永往之無期乃命史官述德寄辭其辭曰五德代興素靈啓曜離光疊曜三辰重照明明我皇含貞挺妙玄秀夙達履德罔違鳳棲遐邈神宇凝夷文明外潤仁簡內綏舉無遺中鑒無幽微韻隆汾陽道作垂拱靜恭清穆冥功日用亹亹神軌固天攸縱爰在陽九皇綱中替姦豎肆逆牢羅失衛升降艱難協應神契靈祚既保顯揚天命氛霧朝晞兩儀開鏡訓咨阿衡虛己納正九功潛流七德將表方振宏羅稜威電掃芟蕩神衢一我王道昊天不弔降茲大悔天傾其儀地覆其載大業未究神爽遷背哀貫三靈痛流萬代爰初不豫大漸在躬啓手歸全神氣夷沖凝逮達識體正履終袞龍既襲玉容斯幽登醪虛設觴爵靡酬墳牘莫啓聖迹誰修冥冥我皇神焉何遊撫膺遐叫迸涕交流三筮告期將歸陵墟陛殞羽翼庭納龍輿玉輪動運鍚鸞鳴衢錫旆徘徊六驥踟蹰輕雲蔭軌流風翼車哀哀同軌唯唯挽夫長號永慕泣涕漣洳大塊獨運終歸其始我后永往寧神千祀悠悠上天煢煢惟己眇然靡憑廓焉無持目範令儀徽音在耳藝文類聚十三康帝哀策文感廣廈之空寂悲俎奠之虛陳痛皇神之邈遠哀靈景之長泯仰瞻宸極俯憑鸞軒五情摧裂號慟煩冤遂命國史述德銘勳事以言顯功以名存其辭曰招拒降靈篤生我皇岐嶷妙哲幼有圭璋含貞發曜蘭載芳厥初肇建宗國是胤祗承師友執心淑慎徽猷愷悌金質玉潤固天所啓應茲靈運入繼皇祚龍騰鳳迅因假任物仕精委順穆穆我皇風流凝廣聰鑒遐照思心內朗應變無方從善如響矩儀可慮法物可象覆燾群生靡物不養如何一旦神遊露爽仰攀劈踴觸物咸想卜吉有期將即玄冥太常既建千乘列庭皓皓輿服翩翩素旌笳簫瘳咧挽夫齊聲六驥躊躇蕭蕭悲鳴是用增哀雨泣霑纓痛貫五內哀切三情道隆名貴德享彌光灼灼皇猷終焉允臧垂美兆祀芳風休揚藝文類聚十三穆帝哀策文欲明文思允恭克讓忽若布衣忘其矜尚體有示無德克神王冕旒兩楹委政元輔內倚公旦外仗尚父郁哉惟文赫斯惟武西廓岷河北清伊渚園陵聿修舊京式敘方振長慧風掃天宇休牛歸馬卷旗臥鼓俾我蒸民擊壤容與昊天不弔奄背率土哀同遏密痛方割巨日月不居神道之幽辰吉良五謀同休祖載華庭晏駕崇丘俯執饋奠仰攀龍輈岌岌黼翣飄飄素斿感想平昔人懷崩抽號聲如震灑涕成流藝文類聚十三簡文帝哀策文同軌畢至內外成列素旗宿懸轀輬首轍執祖行于前殿奉靈輿而遷逝悲神宇之長違痛聖儀之幽翳攀龍輴以號慕撫素膺以泣血爰命史臣敘述聖德揚徽音于飛旌寫哀心于翰墨乃作策曰淳曜發暉皇曆攸膺聖祖啓運哲王遐承蒸哉元后光我中興天基徙搆朝陽再升皇矣聖考合一履中道心玄玄文明內融湛湛神儀穆穆靈風望之凝秀即之深沖爰在初齡至性自然水鏡一世堂室重玄愔愔素庭翳若丘園遂阿王室婉迹經綸時有汙隆道無屈伸如彼平流泯矣其津大過之時皇德不競天人革心謳歌徙詠時惟伊霍輔運以政欽若昊天祗此明命龍飛九五饗茲萬國居宗舉契允恭玄默綢繆哲虛已使德天明方曜離暉翳朗玄化誰陶蒼生曷仰四運忽其遙邁日月飄以飛沈將寧神于玄宇遷玉輅于中林背華殿之昭晰即幽隧之重深奉神櫬以永訣邈終天而莫尋神恍惚其若寄泣橫墜以流襟藝文類聚十三征東軍司劉韜墓志晉故使持節都督表徐諸軍事征東將軍軍司關中侯劉府君之墓君諱韜字泰伯叔孝處士君之元子也夫人沛國蔡氏拓本王戎墓銘晉司徒尚書令安豐侯王君封氏聞見記六東都殖業坊十字街有王戎墓隋代釀家穿傍作穴得銘有數百字古冢銘青州世子東海女郎封氏聞見記六齊時有發古冢得銘云云河東賈昊以為司馬越女嫁為苟晞子婦檢之果然慕志惟晉元康二年太歲在子承開造斯窀宨丙戶口出西左參師啚令宮商是位龜筮易口咸口同吾爵除殞邪惡奔走干祥百福永施後焉古刻叢鈔榆次令荀藐碑仰之如日月敬之如神明愛之如父母樂之如時雨御覽二百六十八引荀氏家傳任城太守夫人孫氏碑夫人濟南孫氏之中女也實曰口姬其口與口同姓別閭族遂以為氏父列卿光祿大夫建德亭侯以儒雅稱世濟其休夫人少有淑質純靜不口寬仁足以容衆明敏足以辨物九歲喪母少為父所見慈撫終喪哀毀坐不易位雖有隱括傅母之訓岡以加父時未口繼室長沙人桓伯序有寡妻伏氏魏文帝以用妻之伏氏柔少有國色口非所好而顧違尊命莫之能定夫人謂父曰何不以嘗同寮辭之父意乃寤文帝詔報之曰生敬其人死辭其室追遠敬終違而得道者也父悅入謂之曰昔臧武仲先犯齊壯不令與己邑今我不犯尊而蒙優詔同歸殊塗爾代伯序為侍中父為侍郎此為同寮故夫人父為勃海太守十餘年政化大行孤宣意時夫人見口在家止父令留而謂之感而退雖天之遺然事君不懟能聞為吏部尚書多用老成先帝舊臣舉之必不忘君而舉君為侍中夫人而過窮理盡情為父所異皆此類也夫人在羊氏有度承上接下衆皆悅之任城北生夫人由此相帥孝加之謙勤戰戰臨深惟恐不逮是以舅姑嘉其淑娣姒宗其德音夫人為婦卌餘載言無過無怨惡故也且感慈下惟詩人刑于之言瞻前後率由弗違以御于家邦終始以孝聞夫人之二小子明弘哲不幸早亡子孫皆仁厚振振有麟止化皆是義形八年月庚寅十二月甲申嗣子迅哀懷永絶岡極追惟力不肅之訓歎曰古者鐘鼎所以章君父之令德也又有號諡我先妣立德同之不朽可沒而無稱哉于是乃追而為之辭曰奐乎文母于我夫人潛神內識岡不彌綸和樂色養是勤昧旦問日新喪難弘多仍羅翼翼心惟用老惟忉忉遺孤辟踊靡及曰古何以告哀碑拓本西河繆王司馬子政廟碑西河舊處山林漢末擾攘百姓失所魏興更開疆宇分割太原四縣以為邦邑其郡帶山側塞矣王以咸寧三年改命爵土明年十二月喪國臣太農閻崇離石今宗群等二百三十四人刊石立碑以述勳德水經原公水注晉徙封陳王斌于西河故縣有西河繆王司馬子政廟碑文云云碑北廟基尚存也晉右軍將軍鄭烈碑君諱烈字休林滎陽開封人也其先出自宗周建國于鄭因胙命氏君其後也遠祖以亢節著德揚光漢氏之初近葉以儒術博古顯名中興之後遝至曾祖先生皇祖徵君蹈明哲之高尚嘉肥𨔵而丕悶顯考將作大匠實有茂德載在國策君應中和之醇靈總文武之弘略清識妙于研機聰睿贍于燭物踐逸軌之遠迹秉礭然之大節故雖夙罹丕造而能全老成之德居無簷石而能厲冰霜之潔是以英材邈于群萃至行侔于在昔初上計掾辟司隸車騎將軍府轉參寧朔將軍軍事除魏今其為政也仁以施化則靈恩衍于春陽壯以發令則神威肅于秋霜末俗變而歸本偽萌反于忠良玄澤洽于朔都芳風勃而南翔文皇帝為相國親覽萬機酬咨俾乂君以盛德宜登王佐遂典喉舌賦政于外百揆時序庶事無廢皇尊顯融光皮遐裔五等初建封平莞男聖上踐祚拜騎都尉賜子一人爵關中侯遷馮翊太守于時獫狁孔熾西土丕靜鄗方有戎馬之塵邊邑覩燋烽之警君震以神武柔以仁惠威懷允著寬猛相濟遷北軍中候典司禁戎董導群師明鑒審于官材清風激于在位義正形于聲色衆望儼而祗畏故六軍之正咸當而請謁之言莫至遷兗州刺史加輕車將軍流化河濟馳風區外翰音振于天末遺嚮畼于吳會遐邇肅齊萬里是賴寢疾彌留氣還京輦徵拜議郎亨年六十太康二年秋八月丁巳薨悠悠縉紳莫丕傷心慍天道之無誠哀邦家之喪鎮天子乃命使者奉策追贈右軍將軍印綬諡曰僖侯于是故吏殿中監申揚等相與永思盛德言時計功昔父鏤蒸夷之鼎魯人著泮宮之頌乃伐石建碑刊表茂庸俾清風舊于百世遺光流乎無窮其辭曰峨峨嵩嶽中夏之鎮於鑠僖侯含德之純英齊宣朗窮理入神龍蟠道淵振曜景雲北臨魏邦百族時雍登讚聖皇五典克從西守舊京威風折衝還司六軍肅清天出牧萬里玄化潛通委辭名位帝嘉厥庸追贈寵服以顯高縱勒銘金石日月是同太康四年七月十日辛未造隸續四晉梁王妃王氏陵碑妃諱粲字女儀東萊曲城人也齊北海府君之孫司空東武景侯之季女咸熙元年嬪于司馬氏泰始二年妃于國太康五年薨營陵于新蒙之下有脫太康九年立碑水經睢水注晉護羌校尉彭祈碑君諱祈字子玄隴西襄武人也其先出自顓頊有陸絳之裔子大彭實主夏盟君則其後也歷郡右職州別駕從事于時庸蜀未殄侵擾王路洮西之戰因敗運奇元帥獲安剋厭強虜列上功狀除舍人還參本軍事除涼州護軍河右未清戎寇鼎沸諶諶神略簡在帝心遷西郡太守至官未久復臨酒泉遠夷望風繈負歸命白山丁令率服賓貢敦煌令孤豐距違王度淵泉之陳兵不血刃母老弟亡辭職去官聖上仁慈聽君所求轉略陽太守近家祿養遂罹大艱侍喪還家服紀終始有詔以軍州始分河右未清豺狼肆虐授君節蓋除護羌校尉統攝涼上前後軍功應封七侯勞謙退讓陰德不伐年未知命以太康十年三月癸酉薨天子愍悼遣使者監護喪事策曰君秉心公亮所蒞有方不幸殞歿朕甚痛惜故孝廉參護羌軍事酒泉馬朔改吏部郎中綦毋番主簿郭曉良吏夏侯俊等追思洪烈感想口嗟乃刊石勒銘焉晉平西將軍周處碑君諱處字子隱義興陽羡人也氏胄曩興煥乎墳典華宗往茂鬱其簡書啓三十之洪基源流定鼎運八百之遠祚枝葉封桐軒蓋列于漢庭蟬冕播于陽羡二南之價傳不朽而紛敷大頀之音聲無微而必顯山高海闊其在斯焉祖賓少折節早亡吳初召咨議參軍舉郡上計轉為州辟從事別駕步兵校尉光祿大夫廣乎太守父魴少好學舉孝廉吳寧國長奮威長史懷安錢塘縣侯丹陽西部屬國都尉立節校尉拜裨將軍三部都督太中大夫臨川豫章鄱陽太守君晉故散騎常侍新乎廣漢二郡太守封關內侯簪紱揚名臺閣摽著風化之美奏諫為能應往路謳亭亭孤美灼灼橫劭徇高位于生前思垂名于身後遂以卒意不違應期出輔洋洋之風俯冠來葉巍巍之盛仰繼前賢君乃早孤不弘禮制膂力絶于天下妙氣挺于人間騎獵無疇時英式慕縱情寡偶俗斃不欣鄉曲誣其害名改節播其聲譽方勵志而淫詩書便好學而尋子史文章綺合藻思羅開吳朝州縣交辟太子洗馬東觀左丞中書右丞五官郎中左右國史靖恭夙夜恪居官次遷尚書僕射東觀令太常卿無難督匡熙庶績朝廷謐寧使持節大塗中京下諸軍事封浦亭侯國猶多士君實得賢汪洋庭闕之傍昂藏寮寀之上射獸功猶見顯刺名乃遠揚忠烈道自克修義節還永布琳琅梓杞圭璧棟梁仕晉稍遷總統初入拜咨議郎除討虜護軍新平太守正繩宜筆庶僚振肅英情天逸遠性霞騫陝北留棠遂有二天之詠荊南渡虎猶標十部之書尋轉散騎常侍輕車將軍回輪出于新平士女揮淚褰帷望于廣漢雞犬靡喧振茲威略宣其惠和晉京遙仰部從迎欽是時氐賊作逆朝廷推賢以君才兼文武詔授建威將軍以五千兵奉辭西討忠概盡節不顧身命韓信背水之軍未遑得喻工輸縈帶之勢早擬連蹤莫不梯山架壑繈負來歸戎士杆其封疆農人展其耕織秋風才起追戰勇于雷霆春水方生揮鍤同于雲雨立功立事名將名臣者乎以太興二年歲在己卯正月十日葬于義興舊原南瞻荊嶽崇峻極之巍峨北睇蛟川濬清流之澄徹娶同郡盛氏有四子靖玘札碩並皆志性純孝過禮喪親墳前之樹染淚先枯庭際之禽聞悲乃下遂作銘曰周南著美岐山表靈葉繁漢室枝茂晉庭皎皎夫子奇特播名幼有異行世存風烈早馳問望晚懷耿節頗尚豪雄升名禁闥捨爵策勳允歸明哲輝赫大晉封豕多故式揚廟略克清天步海濱既折江淮亦泝漢水作藩條章斯布俗哥揆日人謠何暮忠貞作相追蹤終侯將亭嘉茂據掩芳猷潛光陽甸返斾吳丘舊闕雖入鄉路冥浮從榮制墓終非晝遊春墟以緑清淮自流深沈素幰繚繞朱旒玄堂寂寂黃泉悠悠書方易折家揭難留鐫茲幽石萬代千秋碑拓本九山廟碑九顯靈府君者太華之元子陽九列名號曰九山府君也南據嵩嶽北帶洛澨晉元康二年九月太歲戍帝遣殿中中郎將關內侯樊廣緱氏令王與主簿傳演奉宣詔命興立廟焉水經洛水注百蠱將軍顯靈碑將軍姓伊氏諱益字隤敳帝高陽之第二子伯益者也晉元康五年七月七日順人吳義等建立堂廟永康元年二月二十日刻石立頌贊示後賢水經洛水注張蒼梧碑君諱鎮字義遠吳國吳人忠恕寬明簡正貞粹泰安中除蒼梧太守討王含有功封興道縣侯世説排調篇注張蒼梧是張憑之陸邁碑邁字功高吳郡人器識清敏風檢澄峻纍遷振威太守尚書吏部郎周闡墓磚文晉升平四年三月四日太學博士陳留邦雍丘縣周墟里周闡字道舒妻活晉潯陽太守譙國龍缸縣柏逸字茂長小女父晉安成太守鷹揚男諱蟠字永時澗泉日記下法華人發古冢得磚皆有刻字又巖下放言法華山發古冢得一碑刻太社祝文地德普施惠存無疆乃建太社保佑萬邦悠悠四海咸賴嘉祥宋書禮志四元帝建武元年又依洛京作二社其太社之祝云云帝社祝文坤德厚載王畿是保乃建帝社以神地道明祝惟辰景福來造同上其帝社之祝云云帝冠祝文令月吉日始加元服皇帝穆穆思弘袞職欽若昊天六合是式率遵祖考永永無極眉壽惟祺介茲景福晉書禮志下宋書禮志一通典五十六兩足虎文武形有虧金獸失儀聖主應天斯異何為晉書五行志中太康六年南陽獻兩足虎此毛蟲之孽識者為其文言兆亂也題鄴城門大事解散暫欲遽請且歸赴時務昔以義來今以義去若復有急更相語晉書成都王穎傳留義募將士既咸怨曠思歸或有輒去者乃題鄴城門云云穎知不可留乃遣之
