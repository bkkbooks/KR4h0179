body:
  text: 卷九十潘嶽秋興賦并序秋興賦并序晉十有四年余春秋三十有二始見二毛以太尉掾兼虎賁中郎將寓直于散騎之省高閣連雲陽景罕曜珥蟬冕而襲紈綺之士此焉游處僕野人也偃息不過茅屋茂林之下談話不過農夫田父之客攝官承乏猥廁朝列夙興晏寢匪遑底寧譬猶池魚籠鳥有江湖山藪之思于是染翰操紙慨然而賦于時秋也故以秋興命篇其辭曰四時忽其代序兮萬物紛以回薄覽花蒔之時育兮察盛衰之所託感冬索而春敷兮嗟夏茂而秋落雖末士之榮悴兮伊人情之美惡善乎宋玉之言曰悲哉秋之為氣也𩙚瑟兮草木搖落而變衰憀栗兮若在遠行登山臨水送將歸夫送歸懷慕徒之戀兮遠行有羈旅之憤臨川感流以歎逝兮登山懷遠而悼近彼四戚之疚心兮遭一塗而難忍嗟秋日之可哀兮諒無愁而不盡野有歸燕隰有翔隼游氛朝興槁葉夕殞于是乃屏輕箑釋纖絺藉莞蒻御夾衣庭樹槭以灑落兮徑風戾而吹帷蟬嘒嘒而寒吟兮雁飄飄而南飛天晃朗以彌高兮日悠陽而浸微何微陽之短晷覺涼夜之方永月朣朧以含光兮露淒清以凝冷熠耀粲于階闥兮蟋蟀鳴乎軒屏聽離鴻之晨吟兮望流火之餘景宵耿介而不寐兮獨展轉于華省悟時歲之遒盡兮慨俯首而自省斑鬢髟以承辨兮素髮颯以垂領仰群俊之逸軌兮攀雲漢以游騁登春臺之熙熙兮珥金貂之炯炯苟趣舍之殊塗兮庸詎識其躁靜聞至人之休風兮齊天地于一指彼知安而忘危兮故出生而入死行投趾于容迹兮殆不踐而獲底闕側足以及泉兮雖猴猿而不履龜祀骨于宗祧兮思反身于緑水且斂衽以歸來兮忽投紱以高厲耕東皋之沃壤兮輸黍稷之餘稅泉涌湍于石閒兮菊揚芳于崖澨澡秋水之涓涓兮玩游鯈之潎潎逍遙乎山川之阿放曠乎人閒之世優哉游哉聊以卒歲文選藝文類聚三寒賦夜漫漫以攸攸兮寒淒淒以凜凜御覽三十四登虎牢山賦辭京輦兮遙邁將遠遊兮東夏朝發軔兮帝墉夕結軌兮中野憑修坂兮停車臨寒泉兮飲馬眷故鄉之遼隔思紆軫以鬱陶步玉趾以升降淩汜水而登虎牢覽河洛之二川眺成平之雙皋崇嶺驫以崔崒幽谷豁以窙寥路逶迤以迫隘林廓落以蕭條爾乃仰蔭嘉木俯藉芳卉青煙鬱其相望棟宇懍以鱗萃彼登山而臨水固先哲之所哀矧去鄉而離家邈長辭而遠乖望歸雲以歎息腸一日而九回良勞者之詠事爰寄言以表懷藝文類聚七滄海賦徒觀其狀也則湯湯蕩蕩瀾漫形沈流沫千里懸水萬丈測之莫量其深望之不見其廣無遠不集靡幽不通群溪俱息萬流來同含三河而納四瀆朝五湖而夕九江陰霖則興雲降雨陽霽則吐霞曜日煮水而鹽成剖蚌而珠出其中有蓬萊名嶽青丘奇山阜陵別島嵔環其閒其山則𡻭崔嵬崒嵯峨降屈披滄流以特起擢崇基而秀出其魚則有吞舟鯨鯢鰞鰂龍鬚蜂目豺口貍斑雉軀怪體異名不可勝圖其蟲獸則素蛟丹虬元龜靈鼉修黿巨鱉紫貝螣蛇玄螭蚴虬赤龍焚蘊遷體改角推舊納新舉扶搖以抗翼泛陽侯以濯鱗其禽鳥則鶠鴻鷫鸘鴐鵝鵁鶄朱背煒燁縹翠蔥青詳察浪波之來往遍聽奔激之音響力勢之所回薄潤澤之所彌廣普天之極大橫率土而莫兩藝文類聚八西征賦歲次玄枵月旅蕤賓丙丁統日乙未御辰潘子憑軾西征自京徂秦乃喟然歎曰古往今來邈矣悠哉寥廓恍惚化一氣而甄三才此三才者天地人道唯生與位謂之大寶生有修短之命位有通塞之遇鬼神莫能要聖智弗能豫當休明之盛世託菲薄之陋質納旌弓于鉉台讚庶績于帝室嗟鄙夫之常纍固既得而患失無柳季之直道佐士師而一黜武皇忽其升遐八音遏于四海天子寢于諒暗百官聽于冢宰彼負荷之殊重雖伊周其猶殆窺七貴于漢庭譸一姓之或在無危明以安位秪居逼以示專陷亂逆以受戮匪禍降之自天孔隨時以行藏蘧與國而舒卷苟蔽微以繆章患過辟之未遠悟山潛之逸士卓長往而不反陋吾人之拘攣飄萍浮而蓬轉寮位儡其隆替名節漼以隳落危素卵之纍殼甚玄燕之巢幕心戰懼以兢悚如臨深而履薄夕獲歸于都外宵未中而難作匪擇木以棲集鮮林焚而鳥存遭千載之嘉會皇合德于乾坤弛秋霜之嚴威流春澤之渥恩甄大義以明責反初服于私門皇鑒揆余之忠誠俄命余以末班牧疲人于西夏攜老幼而入關丘去魯而顧歎季過沛而涕零伊故鄉之可懷疚聖達之幽情矧匹夫之安土邈投身于鎬京猶犬馬之戀主竊託慕于闕庭眷鞏洛而掩涕恩纏綿于墳塋爾乃越平樂過街郵秣馬皋門稅駕西周遠矣姬德興自高辛思文后稷厥初生民率西水滸化流岐豳祚隆昌發舊邦惟新旋牧野而歷茲愈守柔以執競夜申旦而不寐憂天保之未定惟泰山其猶危祀八百而餘慶鑒亡王之驕淫竄南巢以投命坐積薪以待然方指日而比盛人度量之乖舛何相越之遼迥考土中于斯邑成建都而營築既定鼎于郟鄏遂鑽龜而啓繇平失道而來遷繄二國而是祐豈時王之無僻賴先哲以長懋望圉北之兩門感虢鄭之納惠討子頽之樂禍尤闕西之效戾重戮帶以定襄弘大順以霸世靈壅川以止鬭晉演義以獻說咨景悼以迄丐政淩遲而彌季俾庶朝之構逆歷兩王而干位踰十葉以逮赧邦分崩而為二竟橫噬于虎口輸文武之神器澡孝水而濯纓嘉美名之在茲夭赤子于新安坎路側而瘞之亭有千秋之號子無七旬之期雖勉勵于延吳實潛慟乎余慈眄山川以懷古悵攬轡于中塗虐項氏之肆暴坑降卒之無辜激秦人以歸德成劉后之來蘇事回泬而好還卒宗滅而身屠經澠池而長想停余車而不進秦虎狼之彊國趙侵弱之餘燼超入險而高會杖命世之英藺恥東瑟之偏鼓提西缶而接刃辱十城之虛壽奄咸陽以取俊出申威于河外何猛氣之咆勃入屈節于廉公若四體之無骨處智勇之淵偉方鄙𠫤之忿悁雖改日而易歲無等級以寄言當光武之蒙塵致王誅于赤眉異奉辭以伐罪初垂翅于回溪不尤眚以掩德終奮翼而高揮建佐命之元勳振皇綱而更維登崤坂之威夷仰崇嶺之嵯峨皋記墳于南陵文違風于北阿蹇哭孟以審敗襄墨縗以授戈曾隻輪之不反緤三帥以濟河值庸主之矜愎殆肆叔于朝市任好綽其餘裕獨引過以歸己明三敗而不黜卒陵晉以雪恥豈虛名之可立良致霸其有以降曲崤而憐虢託與國于亡虞貪誘賂以賣鄰不及臘而就拘垂棘反于故府屈産服于晉輿德不建而民無援仲雍之祀忽諸我徂安陽言陟陜郛行乎漫瀆之口憩乎曹陽之墟美哉邈乎茲土之舊也固乃周邵之所分二南之所交麟趾信于關雎騶虞應乎鵲巢愍漢氏之剝亂朝流亡以離析卓滔天以大滌劫宮廟而遷迹俾萬乘之盛尊降遙思于征役顧請旋于傕泛既獲許而中惕追皇駕而驟戰望玉輅而縱鏑痛百寮之勤王咸畢力以致死分身首于鋒刃洞胸腋以流矢有褰裳以投岸或攘袂以赴水傷桴楫之褊小撮舟中而掬指升曲沃而惆悵惜兆亂而兄替枝末大而本披都偶國而禍結臧札飄其高厲委曹吳而成節何莊武之無恥徒利開而義閉躡函谷之重阻看天險之襟帶迹諸侯之勇怯算嬴氏之利害或開關以延敵競遁逃以奔竄有噤門而莫啓不窺兵于山外連雞互而不棲小國合而成大豈地勢之安危信人事之否泰漢六葉而拓畿縣弘農而遠關厭紫極之間敞甘微行以遊盤長傲賓于柏谷妻覩貌而獻餐疇匹婦其已泰胡厥夫之繆官昔明王之巡幸固清道而後往懼銜橛之或變峻徒御以誅賞彼白龍之魚服挂豫且之密網輕帝重于天下奚斯漸之可長弔戾園于湖邑諒遭世之巫蠱探隱伏于難明委讒賊之趙虜加顯戮于儲二絶肌膚而不顧作歸來之悲臺徒望思其何補紛吾既邁此全節又繼之以盤桓問休牛之故林感徵名于桃園發閿鄉而警策訴黃巷以濟潼眺華嶽之陰崖覿高掌之遺蹤憶江使之反璧告亡期于祖龍不語怪以徵異我聞之于孔公慍韓馬之大憝阻關谷以稱亂魏武赫以霆震奉義辭以伐叛彼雖衆其焉用故制勝于廟算砰揚桴以振塵繣瓦解而冰泮超遂遁而奔狄甲卒化為京觀倦狹路之迫隘軌踦𨄅以低仰蹈秦郊而始闢豁爽嵦以宏壯黃壤千里沃野彌望華實紛敷桑麻條畼邪界褒斜右濱汧隴寶雞前鳴甘泉後涌面終南而背雲陽跨平原而連嶓冢九嵕𡽱嶭太一巃嵸吐清風之飂戾納歸雲之鬱蓊南有玄灞素滻湯井溫谷北有清渭濁涇蘭池周曲浸決鄭白之渠漕引淮海之粟林茂有鄠之竹山挺藍田之玉班述陸海珍藏張敘神皋隩區此西賓所以言于東主安處所以聽于憑虛也可不謂然乎徑松彰于歲寒貞臣見于國危入鄭都而抵掌義桓友之忠規竭股肱于昏主赴塗炭而不移世善職于司徒緇衣斃而改為履犬戎之侵地疾幽后之詭惑舉僞烽以沮衆淫嬖褒以縱慝軍敗戲水之上身死驪山之北赫赫宗周滅為亡國又有繼于此者異哉秦始皇之為君也傾天下以厚葬自開闢而未聞匠人勞而弗圖俾生埋以報勤外罹西楚之禍內受牧豎之焚語曰行無禮必自及此非其效與乾坤以有親可久君子以厚德載物觀夫漢高之興也非徒聰明神武豁達大度而已也乃實慎終追舊篤誠款愛澤靡不漸恩無不逮率土且弗遺而況于鄰里乎況于卿士乎于斯時也乃摹寫舊豐制造新邑故社易置枌榆遷立街衢如一庭宇相襲渾雞犬而亂放各識家而競入籍含怒于鴻門沛局蹐而來王范謀害而弗許陰授劍以約莊撛白刃以萬舞危冬葉之待霜履虎尾而不噬實要伯于子房樊抗憤以卮酒咀彘肩以激揚忽蛇變而龍攄雄霸上而高驤曾遷怒而橫撞碎玉斗其何傷嬰罥組于軹塗投素車而肉袒疏飲餞于東都畏極位之盛滿金墉鬱其萬雉峻嵃峭以繩直戾飲馬之陽橋踐宣平之清閾都中雜遝戶千人億華夷士女駢田逼側展名京之初儀即新館而蒞職勵疲鈍以臨朝勖自強而不息于是孟秋爰謝聽覽餘日巡省農功周行廬室街里蕭條邑居散逸營宇寺署肆廛管庫蕞芮于城隅者百不處一所謂尚冠修成黃棘宣明建陽昌陰北煥南平皆夷漫滌蕩亡其處而有其名爾乃階長樂登未央泛太液淩建章縈馺娑而款駘蕩轥枍詣而轢承光徘徊桂宮惆悵柏梁鷩雉雊于臺陂狐兔窟于殿傍何黍苗之離離而余思之芒芒洪鍾頓于毀廟乘風廢而弗縣禁省鞠為茂草金狄遷于灞川懷夫蕭曹魏邴之相辛李衛霍之將銜使則蘇屬國震遠則張博望教敷而彝倫敘兵舉而皇威畼臨危而智勇奮投命而高節亮暨乎秺侯之忠孝淳深陸賈之優游宴喜長卿淵雲之文子長政駿之史趙張三王之尹京定國釋之之聽理汲長孺之正直鄭當時之推士終童山東之英妙賈生洛陽之才子飛翠緌拖鳴玉以出入禁門者衆矣或被髮左衽奮迅泥滓或從容傅會望表知裏或著顯績而嬰時戮或有大才而無貴仕皆揚清風于上烈垂令聞而不已想珮聲之遺響若鏗鏘之在耳當音鳳恭顯之任勢也乃熏灼四方震耀都鄙而死之日曾不得與夫十餘公之徒隸齒才難不其然乎望漸臺而扼腕梟巨猾而餘怒揖不疑于北闕軾樗里于武庫酒池鑒于商辛追覆車而不寤曲陽僭于白虎化奢淫而無度命有始而必終孰長生而久視武雄略其焉在近惑文成而溺五利侔造化以制作窮山海之奧祕靈若翔于神島奔鯨浪而失水爆鱗骼于漫沙隕明月以雙墜擢仙掌以承露干雲漢而上至致卭蒟其奚難惟余欲而是恣縱逸遊于角抵絡甲乙以珠翠忍生民之減半勒東嶽以虛美超長懷以遐念若循環之無賜較面朝之煥炳次後庭之猗靡壯當熊之忠勇深辭輦之明智衛鬒髮以光鑒趙輕體之纖麗咸善立而聲流亦寵極而禍侈津便門以右轉究吾境之所暨掩細柳而撫劍快孝文之命帥周受命以忘身明戎政之果毅距華蓋于壘和案乘輿之尊轡肅天威之臨顏率軍禮以長撎輕棘霸之兒戲重條侯之倨貴索杜郵其焉在云孝里之前號惘輟駕而容與哀武安以興悼爭伐趙以徇國定廟算之勝負扞矢言而不納反推怨以歸咎未十里于遷路尋賜劍以刎首嗟主暗而臣嫉禍于何而不有窺秦墟于渭城冀闕緬其堙盡覓陛殿之餘基裁岥岮以隱嶙想趙使之抱璧瀏睨楹以抗憤燕圖窮而荊發紛絶袖而自引筑聲厲而高奮狙潛鉛以脫臏據天位其若茲亦狼狽而可愍𥳑良人以自輔謂斯忠而鞅賢寄苛制于捐灰矯扶蘇于朔邊儒林填于坑穽詩書煬而為煙國滅亡以斷後身刑轘以啓前商法焉得以宿黃犬何可復牽野蒲變而成脯苑鹿化以為馬假讒逆以天權鉗衆口而寄坐兵在頸而顧問何不早而告我願黔黎其誰聽惟請死而獲可健子嬰之果決敢討賊以紓禍勢土崩而莫振作降王于路左蕭收圖以相劉料險易與衆寡羽天與而弗取冠沐猴而縱火貫三光而洞九泉曾未足以喻其高下也感市閭之菆井歎尸韓之舊處承屬號而守闕人百身以納贖豈生命之易投誠惠愛之洽著訐望之以求直亦余心之所惡思夫人之政術實幹時之良具苟明法以釋憾不愛才以成務弘大體以高貴非所望于蕭傅造長山而慷慨偉龍顏之英主胸中豁其洞開群善湊而必舉存威格乎天區亡墳掘而莫禦臨掩坎而纍抃步毀垣以延佇越安陵而無譏諒惠聲之寂寞弔爰絲之正義伏梁劍于東郭訊景皇于陽丘奚信譖而矜謔隕吳嗣于局下蓋發怒于一博成七國之稱亂翻助逆以誅錯恨過聽而無討茲沮善而勸惡呰孝元于渭塋執奄尹以明貶褒夫君之善行廢園邑以崇儉過延門而責成忠何辜而為戮陷社稷之王章俾幽死而莫鞠忲淫嬖之胸忍勦皇統之孕育張舅氏之姦漸貽漢宗以傾覆刺哀主于義域僭天爵于高安欲法堯而承禪羞永終古而不刊瞰康園之孤墳悲平后之專潔殃厥父之篡逆蒙漢恥而不雪激義誠而引決赴丹爓以明節投宮火而焦糜從灰熛而俱滅騖橫橋而旋軫歷敝邑之南垂門磁石而梁木蘭兮構阿房之屈奇疏南山以表闕倬樊川以激池役鬼傭其猶否矧人力之所為工徒斫而未息義兵紛以交馳宗祧汙而為沼豈斯宇之獨隳由僞新之九廟夸宗虞而祖黃驅吁嗟而妖臨搜佞哀以拜郎誦六藝以飾姦焚詩書而面牆心不則于德義雖異術而同亡宗孝宣于樂游紹衰緒以中興不獲事于敬養盡加隆于園陵兆惟奉明邑號千人訊諸故老造自帝詢隱王母之非命縱聲樂以娛神雖靡率于舊典亦觀過而知仁憑高望之陽隈體川陸之汙隆開襟乎清暑之館游目乎五柞之宮交渠引漕激湍生風乃有昆明池乎其中其池則湯湯汗汗滉漾彌漫浩如河漢日月麗天出乎東西旦似湯谷夕類虞淵昔豫章之名宇披玄流而特起儀景星于天漢列牛女以雙峙啚萬載而不傾奄摧落于十紀擢百尋之層觀今數仞之餘趾振鷺于飛鳧躍鴻漸乘雲頡頏隨波淡淡瀺灂驚波唼喋菱芡華蓮爛于淥沼青蕃蔚乎翠瀲伊茲池之肇穿肄水戰于荒服志勤遠以極武良無要于後福而菜蔬芼實水物惟錯乃有贍乎原陸在皇代而物土故毀之而又復凡厥寮司既富而教咸帥貧惰同整楫櫂收罟課獲引繳舉效鰥夫有室愁民以樂徒觀其鼓枻回輪灑釣投網垂餌出入挺叉來往纖經連白鳴桹厲響貫鰓𦉹尾掣三牽兩于是弛青鯤于網巨解赬鯉于黏徽華魴躍鱗素鱮揚鬐雍人縷切鸞刀若飛應刃落俎靃靃霏霏紅鮮紛其初載賓旅竦而遲御既餐服以屬厭泊恬靜以無欲回小人之腹為君子之慮爾乃端策拂茵彈冠振衣徘徊酆鎬如渴如飢心翹勤以仰止不加敬而自祗豈三聖之敢夢竊十亂之或希經始靈臺成之不日惟酆及鄗仍京其室庶人子來神降之吉積德延祚莫二其一永惟此邦云誰之識越可略聞而難臻其極子贏鋤以借父訓秦法而著色耕讓畔以間田沾姬化而生棘蘇張喜而詐騁虞芮愧而訟息由此觀之土無常俗而教有定式上之遷下均之埏埴五方雜會風流溷淆惰農好利不昏作勞密邇獫狁戎馬生郊而制者必割實存操刀人之升降與政隆替杖信則莫不用情無欲則賞之不竊雖智弗能理明弗能察信此心也庶免夫戾如其禮樂以俟來哲文選藝文類聚二十七
