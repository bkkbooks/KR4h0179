body:
  text: 蔡謨上表引疾臣先有瘤生在腰上十數年初無患苦忽自潰御覽七百四十引蔡謨表讓五兵尚書疏八座之任非賢莫居前後所用資名有常孔愈諸葛恢並以清節令才少著名望昔愈為御史中丞臣尚為司徒長史恢為會稽太守臣為尚尚書郎恢尹丹陽臣守小郡名輩不同階級殊懸今猥以輕鄙超倫踰等上亂聖朝貫魚之序下違群士準平之論豈唯微臣其亡之誡實招聖政惟塵之纍且左長史一超而侍帷幄再登而廁納言中興以來上德之舉所未嘗有臣何人斯而猥當之是以叩心自忖三省愚身與其苟進以穢清塗寧受違命狷固之罪晉書蔡謨傳又御覽二百十二引晉中興書諫攻壽陽疏今壽陽城小而固自壽陽至琅邪城壁相望其間遠者裁百餘里一城見攻衆城必救且王師在路五十餘日劉仕一軍早已入淮又遣數部北取堅壁大軍未至聲息久聞而賊之郵驛一日千里河北之騎足以來赴非唯鄰城相救而已夫以白起韓信項籍之勇猶發梁焚舟背水而陳今欲停船水渚引兵造城前對堅敵顧臨歸路此兵法之所誡也若進攻未拔胡騎卒至懼桓子不知所為而舟中之指可掬今征軍五千皆王都精鋭之衆又光為左衛遠近聞之名為殿中之軍宜令所向有征無戰而頓之堅城之下勝之不武不勝為笑今以國之上駟擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非策之長者臣愚以為聞寇而致討賊退而振旅于事無失不勝管見謹冒陳聞晉書蔡謨傳時左衛將軍陳光上疏請伐胡詔令攻壽陽謨上疏諫斷酬功疏先已許鑒今不宜斷且鑒所上者皆積年勳效百戰之餘亦不可不報晉書蔡謨傳先是郤鑒上部下有勳勞者凡一百八十人帝皆酬其功未卒而鑒薨斷不復與謨上疏讓侍中司徒疏伏自惟省昔階謬恩蒙忝非據尸素纍積而光寵更崇謗讟彌興而榮進復加上虧聖朝棟隆之舉下增微臣覆餗之釁惶懼戰灼寄顏無所乞賜天鑒回恩改謬以允群望晉書蔡謨傳謝拜光祿大夫疏臣以頑薄昔忝殊寵尸素纍紀加違慢詔命當肆市朝幸蒙寬宥不悟天施復加光飾非臣隕越所能上報臣寢疾未損不任詣闕不勝仰感聖恩謹遣拜章晉書蔡謨傳上言臨軒拜三公宜作樂拜三公宜有樂宿設懸于殿廷今門下云非祭饗則無樂案冠禮有樂凡敬其事則備其禮禮備則制有樂樂者所以敬事而明義為耳目之娛故冠亦用之不惟宴饗宴饗之有樂亦所以敬賓也故郤至使楚楚子饗之郤至辭曰不忘先君之好貺之以大禮重之以備樂尋斯辭也則宴樂之意可知矣公侯大臣人君所重故御坐為起在輿為下言稱伯舅傳曰國卿君之二也是以命使之日御親臨軒百僚陪位此即敬事之意也古者天王饗下國之使及命將帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也又曰采薇以遣之出車以勞還杕杜以勤歸皆作樂而歌之今命大使拜輔相比于下國之臣輕重殊矣輕誠有有之重亦宜然博士考古以事義相準故謂臨軒遣使宜有金石之樂至于隨時之宜或樂制未備非守禮之宜所裁晉書禮志下通典七十一又一百四十七奏請褚太后臨朝嗣皇誕哲岐嶷繼承天統率士宅心兆庶蒙賴陛下體茲坤道訓隆文母昔塗山光夏簡狄熙殷實由宣哲以隆休祚伏惟陛下德侔二媯淑美關睢臨朝攝政以寧天下今社稷危急兆庶懸命臣等章惶一曰萬機事運之期天祿所鍾非復沖虛高讓之日漢和熹順烈並亦臨朝近明穆故事以為先制臣等不勝悲怖謹伏地上請乞陛下上順祖宗下念臣吏推公弘道以協天人則萬邦承慶群黎更生晉書康獻褚皇后傳祈穀歌雲漢之詩議聖人迭興禮樂之制或因或革雲漢之詩興于宣王今歌之者取其修德禳災以和陰陽之義故因用云父母乖離議甲父為散騎侍郎在洛軍覆奔成皋病亡一子相隨殯葬如禮甲先與母弟避地江南聞喪行服三年而除道險未得奔墓而其弟成婚或謂服可除不宜以婚者謨謂凶哀之制除則吉樂之事行矣且男女之會禮之所急故小功卒哭可以娶妻三年之喪吉祭而復寢魯文于祥月而納幣晉文未葬喪而納室春秋左氏傳曰婦養姑者也又曰娶元妃以奉粢盛由此言娶妻者所為義大矣所奉事重矣又夫冠者加己之服耳非若婚娶有事親奉宗廟繼嗣之事而冠有金石之樂婚則三日不舉金石之樂孰若不舉之戚加己之事孰若奉親之重今譏其婚而許其冠斯何義也不亦乖乎通典九十八或疑甲省墓稽留者謨以為奔墓者雖孝子罔極之情然實無益之事非亡身之所也故禮奔喪不可夜行避危害也今中州喪亂道路險絶墳墓毀廢名家人士皆有之而無一人致身者蓋以路險體弱有危亡之憂非孝子之道故也而曾無譏責何至甲獨云不可乎且甲尋已致身非如不赴之人塋兆平安非如毀廢之難也又是時甲母病篤營醫藥而豈可違闕侍養投身危險必貽老母憂勤哉昔鄭有尉止之亂子西子産父死于朝子西不警而先赴見譏于典籍子産成列出而後出見善于春秋此經典之明義也通典九十八父母乖離不知存亡議父子流離存亡未分吉凶無問人道不可終凶宜制權立禮其過盛年之女可聽許嫁其男宜尋求理極道窮乃得聘娶魯文公以大祥之月納幣于齊春秋善之傳曰孝也今乖離之子不廢婚禮而未俗多有歡晏之會致貽譏議以成疑惑今慎行之士莫知所從求下禮官考詳永為典式通典九十八敕作佛象頌議佛者夷狄之俗非經典之制先帝量同天地多材多藝聊因臨時而畫此象至于雅好佛道未所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一象之頌于義有疑焉晉書蔡謨傳彭城王紘上言樂賢堂有先帝手畫佛象經歷寇難而此堂猶存宜敕作頌帝下其議謨議征西將軍庾亮移鎮石城議時月否泰道有屈伸暴逆之寇雖終滅亡然當其強盛皆屈而避之是以高祖受黜于巴漢忍辱于平城也若爭強于鴻門則亡不終日故蕭何曰百戰百敗不死何待也原始要終歸于大濟而已豈與當亡之寇爭遲速之間哉夫惟鴻門之不爭故垓下莫能與之爭文王身圯于羑里故道泰于牧野句踐見屈于會稽故威申于強吳今日之事亦由此矣賊假息之命垂盡而豺狼之力尚強宜抗威以待時或曰抗威待時時已可矣愚以為時之可否在賊之強弱賊之強弱在季龍之能否季龍之能否可得而言矣自勒初起則季龍為爪牙百戰百勝遂定中國境土所據同于魏世及勒死之日將相內外欲誅季龍季龍獨起于衆異之中殺嗣主誅寵臣內難既定千里遠出一攻而拔金墉再戰而斬石生禽彭彪殺石聰滅郭權還據根本內外並定四方鎮守不失尺土詳察此事豈能乎將示能也假令不能者為之其將濟乎將不濟也賊前攻襄陽而不能拔誠有之矣不信百戰之效而執一攻之驗棄多從少于理安乎譬若射者百發而一不中可謂之拙乎且不拔襄陽者非季龍身也桓平北守邊之將耳賊前攻之爭疆埸耳得之為善不得則止非其所急也今征西之往則異于是何者重鎮也名賢也中國之人所聞而歸心也今而西度實有卷席河南之勢賊所大懼豈與桓宣同哉季龍必率其精兵身來距爭若欲與戰戰何如石生若欲城守守何如金墉若欲阻沔沔何如大江蘇峻何如季龍凡此數者宜詳校之愚謂石生猛將關中精兵今征西之戰不能勝也金墉險固劉曜十萬所不能拔今征西之守不能勝也又是時兗州洛陽關中皆舉兵擊季龍比今三處反為其用方之于前倍半之舉也昔石生不能敵其半而征西欲當其倍愚所疑也蘇峻之強不及季龍沔水之險不及大江大江不能禦蘇峻而以沔水禦季龍又他所疑也昔祖士稚在譙佃于城北慮賊來攻因以為資故豫安軍屯以禦其外穀將熟賊果至丁夫戰于外老弱穫于內多持炬火急則燒穀而走如此數年竟不得其利是時賊唯據沔北方之于今四分之一耳士稚不能捍其一而征西欲禦其四又所疑也或云賊若多來則必無糧然致糧之難莫過崤函而季龍昔涉此險深入敵國平關中而後還今至襄陽路既無險又行其國內自相供給方之于前難易百倍前己經至難而謂今不能濟其易又所疑也然此所論但説征西既至之後耳尚未論道路之虜也自沔以西水急岸高魚貫泝流首尾百里若賊無宋襄之義及我未陳而擊之將如之何今王士與賊水陸異勢便習不同寇若送死雖開江延敵以一當千猶吞之有餘宜誘而致之以保萬全棄江遠遊以我所短擊彼所長懼非廟勝之算晉書蔡謨傳庾亮以石勒新死欲移鎮石城為滅賊之漸事下公卿謨議皇后每年拜陵議古者皇后廟見而已不拜陵也晉書蔡謨傳劍履議大臣優禮皆劍履上殿非侍臣解之蓋防刃也隋書禮儀志七答蘭臺議被符宣令賀甘露至不朝者天雨不朝禮也今不朝則不應賀藝文類聚九十八非劉劭日蝕不廢朝議非劉劭日蝕不廢朝議劭論災消異伏又以梓慎裨竈猶有錯失太史上言亦不必審其理誠然也而云聖人垂制不為變異豫廢朝禮此則謬矣災祥之發所以譴告人君王者之所重誡故素服廢樂退避正寢百官降服用幣伐鼓躬親而救之夫警戒之事與其疑而廢之寧順而行之故孔子老聃助葬于巷黨以喪不見星而行故日蝕而止柩曰安知其不見星也今史官言當蝕亦安知其不蝕乎夫子老聃先行見星之防而劭逆廢曰日蝕之戒是棄聖賢之成規也魯桓公壬申有災而以乙亥嘗祭春秋譏之災事既過猶追懼未已故廢宗廟之祭聞況天眚將至而行慶樂之會于禮乖矣禮記所云諸侯入門不得終禮者謂日官豫言諸侯既入見蝕乃知耳非先聞當蝕而朝會不廢也劭引此文可謂失其義旨劭所執者禮記也夫子老聃巷黨之事亦禮記所言復違而反之進退無據然苟彧所善漢朝所從遂令此言至今見稱莫知其謬矣後來君子將據以為準繩故正之云爾晉書禮志上宋書禮志一通典七十八建太元元年太史上元日合朔朝士復疑應卻會與否庾冰輔政寫劉劭議以示八座蔡謨著議非之云云四府君遷主議四府君宜改築別室若未展者當入太廟之室人莫敢卑其祖文武不先不窋殷祭之日征西東面處宣皇之上其後遷廟之主藏于征西之祧祭薦不絶宋書禮志三褚太后敬父議父子天倫之極尊也君臣人爵之至敬也先王之制不以人爵之貴加于天倫之尊經曰雖天子必有尊也言有父也是以虞舜漢祖雖身為帝父為匹夫敬事之禮不異畎畝之中此先聖之遺範也鄭玄注禮言子事父無貴賤又云子不爵父嫌卑之也加其爵位猶所不敢況乃南面而受拜乎今皇太后雖臨朝王者之父本無拜禮通典六十七生不及祖父母諸父昆弟不稅服議禮大功猶稅況此三親情次于所生服亞于斬縗雖不相見或者音問時通而絶其稅服豈稱情乎夫言生不及者謂彼已沒己乃生耳豈是同時並存之名哉若鄭説不以生年為主但不相見便為不及則此祖父即復可言生不及孫而父亦生不及子兄復生不及弟也此辭不順亦已甚矣自古及今未有此言也鄭君見禮文有弟弟不得先兄生不知所以通其義故因而立此説非禮義也吾謂此直長一弟字耳書歷千載又更暴秦錯謬非一王氏説云己生之時祖父母已卒也諸父謂伯叔也昆弟者伯叔之子也此于情為允又生不及之名亦得通然既謂諸父伯叔而復稱伯叔之兄弟于文煩重又不説已聞兄喪當稅與否于制亦闕未盡善也然猶賢乎鄭氏以同時並存為生不及通典九十八易子檄太康初博議王昌前母服云何卞粹以為母之非親而服三年者非一也前母名同尊正義存配父蓋己生不及故無其制非于義不可也元康中有改葬前母而疑其服司徒左長史胡濟以為前母父之元妃所生則家之嫡長應制如改葬之服于時二代無曰不允自茲以來行之不殊禮母卒自為母之黨服母出則不為母之黨服而為繼母之黨服故尊其所從則不敢不服服有所逼則不得自伸外服無二而必宜有一如向所論必所繼不及伯叔之黨居然可見矣明以名禮為制者不計恩逮與否也通典九十五與驃騎何充書公失櫓上人吾亦具之矣在深草中立櫓無故以櫓自標令賊聞之而自不得見賊賊不病癡何故不來取邪今令數百步內皆露見布竹箛如蝟毛賊不能飛何得卒至邪御覽三百三十七與庾冰書論贈刁協夫爵人者宜顯其功罰人者宜彰其罪此古今之所慎也凡小之人猶尚如此刁令中興上佐有死難之名天下不聞其罪而見其貶致令刁氏稱冤此乃為王敦復讎也內沮患臣之節論者惑之若實有大罪宜顯其事今天下知之明聖朝不貶死難之臣春秋之義以功補過過輕功重者得以加封功輕過重者不免誅絶功足贖罪者無黜雖先有邪侮之罪而臨難之日黨于其君者不絶之也孔寧儀行父親與靈公淫亂于朝君殺國滅由此二臣而楚尚納之傳稱有禮不絶其位者君之黨也若刁令有罪重于孔儀絶之可也若無此罪宜見追論或謂明帝之世己見寢廢今不宜復改吾又以為不然夫大道宰世殊塗一致萬機之事或異或同司不相善異不相譏故堯抑元凱而舜舉之堯不為失舜不為非何必前世所廢便不宜改乎漢蕭何之後坐法失侯文帝不封而景帝封之後復失侯武昭二帝不封而宣帝封之近去元年車駕釋奠拜孔子之坐此亦元明二帝所不行也又刁令但是明帝所不贈耳非誅之也王平子第五猗皆元帝所誅而今日所贈豈以改前為嫌乎凡處事者當上合古義下準今例然後談者不惑受罪者無怨耳案周僕射戴征西本非王敦唱檄所讎也事定後乃見害耳周莚郭璞等並亦非為主禦難也自平居見殺耳皆見褒贈刁令事義豈輕于此乎自頃員外散騎尚得追贈況刁令亞三司若先自壽終不失員外散騎之例也就不蒙贈不失以本官殯葬也此為一人之身壽終則蒙贈死難則見絶豈所以明事君之道厲為臣之節乎宜顯評其事以解天下疑惑之論又聞談者亦多謂宜贈凡事不允當而得衆助者若以善柔得衆而刁令粗剛多怨若以貴也刁氏今賤若以富也刁氏今貧人士何故反助寒門而此言之足下宜察此意晉書刁協傳與弟書軍中耳目當用烽鼓烽可遙見鼓可遙聞形聲相傳須臾百里非人所及想得先知耳近別菽麥者皆當解之而王苟諸人癡頑之甚乃至于是當令人怪之然烽鼓之法當豫敕諸軍見烽聞鼓便嚴而此間恆舉烽之後須文書上言乃符遊軍須被符乃當嚴昔年石頭夜半舉烽至明日食時臺中乃知弟在石頭時禺中舉烽至下晡遊軍故未嚴此即是苟晞等覆車之軌也藝文類聚八十御覽三百三十五書祖士言昔在雍丘城內祖約在壽春時賊據雍丘約遣路永將數百人夜緣人雍丘城戰并開墓擔裘踰城出還壽春永之勇如此御覽四百三十七答劉氏問答劉氏問劉氏問蔡謨云時人祠有板板為用當主為是神坐之榜題謨答今代有祠板木乃始禮之奉廟主也主亦有題今板書名號亦是題主之意安昌公荀氏祠制神板皆正長尺一寸博四寸五分厚五守八分大書某祖考某封之神座夫人某氏之神座以下皆然書訖蠟油炙令入理刮拭之通典四十八劉氏問蔡謨曰非小宗及一家之嫡分張不在一處得立廟不答曰宗子在他國而庶子在家則祭先儒説曰有子孫在不可以乏先祖之記也苟在他國雖是宗子猶不得立廟況非嫡長乎通典五十一答范朗難范朗問蔡謨曰甲有庶兄乙為人後甲妹景已許嫁而未出今乙亡如鄭玄意已許嫁便降旁親者景今應為乙服小功本是周親甲今如禮可得嫁景不蔡答曰案經大功之末可嫁子不言降服後有異也兄在大功嫁降服小功之妹猶父在大功嫁小功之女也謂甲今嫁景于禮無違犯難曰禮小功不稅降而小功則稅之又小功不易喪之練冠而長殤中殤之小功則變三年之葛又小功之末可以娶妻而下殤之小功則不可據此數事則明降服所施各異今子同之其禮何居蔡答曰夫服有降有正此禮之常也若其所施必皆不同則當舉其一例無為復説稅與娶也今而然者明其所施有同有異不可以一例舉故隨事而言之也鄭君以為下殤小功不可娶者本齊縗之親案長殤大功亦齊縗親而禮但言下殤不可以娶而不言長殤不可以嫁明殤之服雖不可娶而可嫁也所以然者陽唱陰和男行女從和從者輕唱行者重二者不同故其制亦異也范又難曰禮舉輕以明重下殤猶不可言娶長殤大功何可以嫁之禮所謂大功末者唯正服大功未耳蔡答曰殤不可娶妻者謂已身也吾言殤可以嫁子者謂女父也身自行之于事為重但施于子其理差輕然則下殤之不娶未足以明長殤之不嫁也通典六十答王濛問前母之黨應為親不疑喪服但問尊卑長幼拜敬之禮也代多此事但所不同惠帝時尚書令滿武秋是曹彥真前母之兄而不為內外之親相見如他人吾昔以問江思悛悛以為人不疑繼母之黨而疑前母者以不相及也繼祖母亦有不相及者而皆與其黨為親何至前母而獨疑之吾謂此言是魏時長沙人王毖身在中國遇吳魏隔絶更娶妻生昌昌父母亡後吳平聞毖前妻久亡昌為前母追服時人疑之武皇帝詔使朝臣通議安平獻王孚以為禮與祖父母離隔未嘗相見者不追如獻王此議則前母之黨不應為親也獻王所據是鄭氏之説吾謂鄭義為失時卞仁劉叔龍議謂昌應服三年吾以卞劉議為允何琦前母黨議曰夫子曰必也正名乎正名者理道之本禮之大者也文條或闕而附例可明禮云生不及祖父母昆弟而父稅喪已則不若與祖乖違父既歿而聞喪豈可拘以本制不稅而廢其正服乎若未生而伯叔母終今為伯叔父後繼嗣之道雖同原情之實則異今必從于所養而反疑于為本乎諸侯國人生不及先代之君于其陵廟亦必曰君也此公義之正名也前母之尊固家人正稱也通典九十五答族父是姨弟為服問問者曰乙是甲族兄子也二人之母則姊妹也以外親言之則是從母之子應服緦麻以同宗言之則六代之親知禮無服今甲亡乙應制服否謨案禮記云同姓從宗合族屬異姓主名理際會先儒説曰異姓謂來嫁者也正其母與婦之名也記又云其夫屬乎父道者妻皆母道也今甲之父與乙于班為祖族則其妻亦有祖母之名不復得為從母也凡親屬之名妻從其夫子從其母不得為從母則子亦不得為從母之子也親名正服亦隨之謂乙應從同宗六代之制不應服也難者曰禮所云異姓主名理際會本是他人唯以來嫁為親故尊卑親疏從其所適至于從母者骨肉之親小功服也今以所適無服之親便從無服之制是以疏奪親也適他人者猶為之服來適同宗而便絶之豈其理乎答曰禮大夫之娶皆有姪姊而大夫之子于庶母無服若論本親則此庶母亦是從母也今皆來為父妾則廢從母之名而從庶母之稱絶小功之服而從無服之制此禮之成典也推此而論知適他人者從其本親來適同宗則從所適不得係本此所謂異姓主名理際會者也通典九十五答或問或問改葬服緦今甲當遷葬而先有兄喪在殯為當何服謨答亦應服緦禮三年之喪既練而遭緦麻之喪則服其服往哭之凡喪相易皆以重易輕至于此事則以輕易重所以然者臨其喪故也卑者猶然況至尊乎謂甲臨葬應改服緦麻通典一百二已拜時成婦論古人君爵合其臣在遠則遣使太公既封齊五侯九伯實得征之即王使召康公所命也至今詔使拜授亦當如此豈有疑乎易曰家有嚴君父母之謂今壻父命使拜其婦女父遣女拜受此命即是太公受命于召康公今人拜爵于詔使也而云未拜舅姑未為成婦然則太公未拜周王亦非方伯乎不修婦禮是其失耳至于是婦與非自當以典禮為正安得從彼所行假令太公不行臣禮王者便當不臣之乎謂拜之壻之宗親與拜舅姑于禮無異通典五十九防墓論學者疑此久矣王氏又以為不然謨以為聖人雖鋻照至于訓世言行皆不聖之事也故咨四嶽訪箕子考蓍龜每事問皆其類也不知墓者謂兆域之間耳防墓崩者謂墳土耳言古不修墓者謂本不崩無所修非崩而不修也今崩而後修故譏焉此自譏崩非譏修也夫子言此者稱古以責躬也通典一百三
