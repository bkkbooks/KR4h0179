body:
  text: 江統徂淮賦戾酇城而倚軒實蕭公之故國通典一百七十七函谷關賦登彼函谷爰覽丘陵地險逶迤山岡相承深壑纍降修嶺重升下杳冥而幽曖上穹崇而高興帶以河洛重以崤阻經略封畿因固設險異服則呵奇言必撿遏姦宄于未芽殿邪僞于萌漸及文仲之斯廢乃違仁而受貶聖王制典蓋以防淫萬里順軌埸場不侵撫四夷而守境豈恃阻于高岑彼桀紂以顛墜非山河而不深顧晉平之愛險獲汝叔之忠針鄙魏武之墜志嘉吳起之弘心末代陵遲惡嬴氏之叛渙乃因茲而自增下淩上替山冢崒崩覽孟嘗之獲免賴博愛而多寵惟七國之西征仰斯阻而震恐豈隩險之難犯將群帥之無勇咨漢祖之絶關又見敗于勍項尹喜爰處觀妙研精李老西徂五千遺聲張祿既入穰侯乃傾營陵之出稟築田生衛鞅及商喪宗摧名終軍棄繻擁節飛榮覩浮僞于末俗思玄真乎大庭初學記七酒誥酒之所興乃自上皇或云儀狄一曰杜康有飯不盡委餘空桑本出于此不由奇方歷代悠遠經口彌長稽古五帝上邁三王雖曰賢聖亦咸斯嘗書鈔一百四十八引兩條上疏言授官與本名同宜改選臺選臣叔父春為安成郡宜春縣令與縣同名故事父祖與官職同名皆得改選而未有身與官職同名不在改選之例臣以為父祖改選者蓋為臣子開地不為祖父之身也今身名所加亦施于臣子佐吏係屬朝夕從事官位之號發言所稱若指實而語則違經典諱尊之義若詭辭回避則為廢官擅犯憲制今以四海之廣職位之衆名號繁多士人殷富至使有受寵皇朝出身宰牧而令佐吏不得表其官稱子孫不得言其位號所以上名嚴父下為臣子體例不通若改易私名以避官稱則違春秋不奪人親之義臣以為身名與官職同者宜與觸父祖名為比體例既合于義為弘晉書江統傳通典一百四理陸雲上成都王穎疏統等聞人主聖臣下明盡規苟有所懷不敢不獻昨聞教以陸機後失軍期師徒敗績以法加刑莫不謂當誠足以肅齊三軍威示遠近所謂一人受戮天下知誡者也且聞重教以機圖為反逆應加族誅未知本末者莫不疑惑夫爵人于朝與衆共之刑人于市與衆棄之惟刑之恤古人所慎今明公興舉義兵以除國難四海同心雲合響應罪人之命縣于漏刻泰平之期不旦則夕矣機兄弟竝蒙拔擢俱受重任不當背罔極之恩而向垂亡之寇去泰山之安而赴纍卵之危也直以機計慮淺近不能董攝群帥致果殺敵進退之閒事有疑似故令聖鑒未察其實耳刑誅事大機有反逆之徵宜令王粹牽秀檢校其事令事驗顯然暴之萬姓然後加雲等之誅未足為晚今此舉措實為太重得則足令天下情服失則必使四方心離不可不令審諦不可不令詳慎統等區區非為陸雲請一身之命實慮此舉有得失之機敢竭愚戇以備誹謗晉書陸雲傳機之敗也并收雲穎官屬江統蔡克棗嵩等上疏云云謁拜議以為諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賓主皆拜今日非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰議臣見諸王直恭敬而已無鞭板拜揖雖于皇帝為諸祖諸父其義皆同又河南河內諸郡吏前後亦為太守伯叔兄謁拜者其比甚衆矣御覽五百四十二太子母喪廢樂議春秋傳曰母以子貴而儒者謂傳重非嫡服同衆子經無明據于義為短今愍懷太子正立東宮繼體承業監國嘗膳既處其重無緣復議其輕制也二年正會不宜舉樂通典一百四十七奔赴山陵議往者湯陰之役群寮奔散義兵既起而不附從主上旋宮又不歸罪至于晏駕之日山陵即安而猶不到自臺郎御史以上應受義責加貶絶注𠛱黃紙不得敘用至于先有他故去職或以喪疾免散仍遇兵隱遁山澤者宜與上牒異制春秋傳曰君子避內難不避外孫寧之變蘧瑗出關陳力就𠛱不能者止未足多責也及至奔赴不及在哀致身後于山陵故當從時宜以立褒貶依王政而正準繩不可偏抗古義以傷今實也承詔書而制奔赴之期以為分別遠近則典而不畼撿挍險易則密而不弘故擬七月之典以議今事達官名問特通者過期不到宜依準退免法注𠛱黃紙三年乃得敘用又自非盟主所授而諸侯州伯所用故不得奔赴宜與下牒同罰春秋傳曰不以家事辭王事此上之行乎下也諸侯州伯輒留應赴之人而令失節于王庭坐于周官九伐之法應在犯令陵政之條諸臺平處正其削黜通典八十惠帝崩司徒左長史江統議奔赴山陵云云大喪未終正會廢樂議自古帝王相承雖世及有異而受重同禮禮王侯尊殊得臣諸父兄弟故以僖嗣閔左氏謂之逆祀雖代變時殊質文不同至于受重尊祖敬宗其義一也書稱遏密諒暗之事或以縗麻卒禮或以心喪終制故周景王有后嫡子之喪既葬除服而宴樂叔向曰王宴樂已早二年正會不宜作樂通典一百四十七陽秋之義去樂卒事宋書禮志三拜時有周喪議已拜舅姑者宜準女在塗之禮齊縗大功三月既葬可迎婦案禮記在塗而壻之父母死則改服赴喪女之父母死則反而服周今已拜舅姑其義全于在塗也降其親而服夫黨非婦而何禮父母既沒而娶三月廟見成婦之義舅姑存則盥饋特豚以成婦道皆明重其成婦不繫其成妻也然則未廟見女死還葬于女氏若已見舅姑雖則衽席之接固當歸葬于夫家此非可否之斷乎禮壻親迎女未至而有齊縗大功之喪男不入改服于外次女入改服于內次即位哭又齊縗大功之喪三月既葬雖不可以納徵而可正御矣通典五十九永嘉中太常潘尼為子娶黃門郎李循女已拜時後各有周喪潘迎婦李遣女國子博士江統侍中許遐同議諫愍懷太子書臣聞古之為臣者進思盡忠退思補過獻可替否拾遺補闕是以人主得以舉無失行言無口過德音發聞揚名後世臣等不逮無能云補思竭愚誠謹陳五事如左惟蒙一省再省少垂察納其一曰六行之義以孝為首虞舜之德以孝為稱太子以朝夕視君膳為職左右就養無方文王之為世子可謂篤于事親者也故能擅三代之美為百王之宗自頃聖體屢有疾患數闕朝侍遠近觀聽者不能深知其故以致疑惑伏願殿下雖有微苦可堪扶輿則宜自力易曰君子終日乾乾蓋自勉強不息之謂也其二曰古之人君雖有聰明之姿睿哲之質必須輔弼之助相導之功故虞舜以五臣興周文以四友隆及成王之為太子也則周召為保傅史佚昭文章故能聞道早備登崇大業刑措不用流聲洋溢伏惟殿下天授逸才聰鑒特達臣謂猶宜時發聖令宣揚德音咨詢保傅訪逮侍臣覲見賓客得令接盡壅否之情沛然交泰殿下之美煥然光明如此則高朗之風扇于前人弘範令軌永為後式其三曰古之聖王莫不以儉為德故堯稱采椽茅茨禹稱卑宮惡服漢文身衣弋綈足履革舄以身先物政致太平存為明主沒見宗祀及諸侯修之者魯僖以躬儉節用聲列雅頌蚡冒以篳路藍縷用張楚國大夫修之者文子相魯妾不衣帛晏嬰相齊鹿裘不補亦能匡君濟俗興國隆家庶人修之者顏回以簞食瓢飲揚其仁聲原憲以蓬戶繩樞邁其清德此皆聖主明君賢臣智士之所履行也故能懸名日月永世不朽蓋儉之福也及到末世以奢牛之者帝主則有瑤臺瓊室玉杯象箸肴膳之珍則熊蹯豹胎酒池肉林諸侯為之者至于丹楹刻角餼徵百牢大夫有瓊辨玉纓庶人有擊鍾鼎食亦罔不亡國喪宗破家失身醜名彰聞以為後戒竊聞後園鏤飾金銀刻磨犀象畫室之巧課試日精臣等以為今四海之廣萬物之富以今方古不足為侈也然上之所好下必從之是故居上者必慎其所好也昔漢光武皇帝時有獻千里馬及寶劍者馬以駕鼓車劍以賜騎士世祖武皇帝有上雉頭裘者即詔有司焚之都街高世之主不尚尢物故能正天下之俗刑四方之風臣等以為畫室之功可且減省後園雜作一皆罷遣肅然清靜優游道德則日新之美光于四海矣其四曰以天下而供一人以百里而供諸侯故王侯食籍而衣稅公卿大夫受爵而資祿莫有不贍者也是以士農工商四業不離交易而退以通有無者庶人之業也周禮三市旦則百族晝則商賈夕則販夫販婦買賤賣貴販鬻菜果收十百之盈以救旦夕之命故為庶人之貧賤者也樊遲匹夫請學為圃仲尼不答魯大夫臧文仲使妾織蒲又譏其不仁公儀子相魯則拔其園葵言食祿者不與貧賤之人爭利也秦漢以來風俗轉薄公侯之尊莫不殖園圃之田而收市井之利漸冉相放莫以為恥乘以古道誠可愧也今西園賣葵菜藍子雞麵之屬虧敗國體貶損令問其五曰竊見禁土令不得繕修牆壁動正屋瓦臣以為此既違典彝舊義且以拘攣小忌而廢弘廓大道宜可蠲除于事為宜晉書江統傳徙戎論夫夷蠻戎狄謂之四海九服之制地在要荒春秋之義內諸夏而外夷狄以其言語不通贄幣不同法俗詭異種類乖殊或居絶域之外山河之表崎嶇川谷阻險之地與中國壤斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷禹平九土而西戎即敘其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服彊則侵叛雖有賢聖之世大德之君咸未能以道化率導而以恩德柔懷也當其彊也以殷之高宗武丁而憊于鬼方有周文王而患昆夷獫狁漢祖困于白登孝文軍于霸上及其弱也周公來九譯之貢中宗納單于之朝以元成之微而猶四夷賓服此其已然之效也故胸奴求守邊塞而侯應陳其不可單于屈膝未央蕭望之議以不臣是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄而邊城不弛固守為寇賊彊暴而兵甲不加遠征期令境內獲安疆場不侵而已及至周室失統諸侯專征以大兼小轉相殘滅封疆不固而利害異心戎狄乘閒得入中國或招誘安撫以為己用故申繒之禍顛覆宗周襄公要秦遽興羌戎當春秋時義渠大荔居秦晉之域陸渾陰戎處伊洛之閒鄋瞞之屬害及濟東侵入齊宋陵虐邢衛南夷與北狄交侵中國不絶若線齊桓攘之存亡繼絶北伐山戎以開燕路故仲尼稱管仲之力嘉左衽之功逮至春秋之末戰國方盛楚吞蠻氐晉翦陸渾趙武胡服開榆中之地秦雄咸陽滅義渠之種始皇之并天下也南兼百越北走胸奴五嶺長城戎卒億計雖師役煩殷寇賊橫暴然一世之功戎虜奔卻當時中國無復四夷也漢興而都長安關中之郡號曰三輔禹貢雍州宗周豐鎬之舊也及至王莽之敗赤眉因之西都荒毀百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種于關中居馮翊河東空地而與華人雜處數代之後族類蕃息既恃其肥彊且苦漢人侵之永初之元騎都尉王弘使西域發調羌氐以為行衛于是群羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑鄧騭之征棄甲委兵輿尸喪師前後相繼諸戎遂熾至于南入蜀漢東掠趙魏唐突軹關侵及河內乃遣北軍中候朱寵將五營士于孟津距羌十年之中夷夏俱斃任尚馬賢僅乃克之此所以為害深重纍年不定者雖由禦者之無方將非其才亦豈不以寇發心腹害起肘腋疢篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際會輒復侵叛馬賢狃忲終于覆敗段熲臨衝自西徂東雍川之戎常為國患中世之寇惟此為大漢末之亂關中殘滅魏輿之初與蜀分隔疆埸之戎一彼一此魏武皇帝令將軍夏侯妙才討叛氐阿貴千萬等後因拔棄漢中遂徙武都之種于秦川欲以弱寇彊國扞禦蜀虜此蓋權宜之計一時之勢非所以為萬世之利也今者當之已受其斃矣夫關中土沃物豐厥田上上加以涇渭之流溉其舄鹵鄭國自渠灌浸相通黍稷之饒畝號一鍾百姓謠詠其殷實帝王之都每以為居未聞戎狄宜在此土也非我族類其心必異戎狄志態不與華同而因其衰斃遷之畿服士庶玩習侮其輕弱使其怨恨之氣毒于骨髓至于蕃育衆盛則坐生其奸心以貪悍之性挾憤怒之情候隙乘便輒為橫逆而居封域之內無障塞之隔掩不備之人收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界內諸羌著先零罕幵析支之地徙扶風始平京兆之氐出還隴右著陰平武都之界廩其道路之糧令足自致各附本種反其舊士使屬國撫夷就安集之戎晉不雜竝得其所上合往古即敘之義下為盛世永久之規縱有猾夏之心風塵之警則絶遠中國隔閡山河雖為寇暴所害不廣是以充國子明能以數萬之衆制群羌之命有征無戰全軍獨克雖有謀謨深計廟勝遠圖豈不以華夷異處戎夏區別要塞易守之故得成其功也哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害薦饑纍荒疫癘之災札瘥夭昏凶逆既戮悔惡初附且款且畏咸懷危懼百姓愁苦異人同慮冀寧息之有期若枯旱之思雨露誠宜鎮之以安豫而子方欲作役起徒興功造事使疲瘁之衆徙自猜之寇以無穀之人遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復橫出矣答曰羌戎狡猾擅相署號攻城野戰傷害牧守連兵聚衆載離寒暑矣而今異類瓦解同種土崩老幼繫虜丁壯降散禽離獸迸不能相一子以此等為尚挾餘資悔惡反善懷我德惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以致于此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也逮其死亡流散離蕩未鳩與關中之人戶皆為讎故可遐遷遠處令其心不懷土也夫聖賢之謀事也為之于未有理之于未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭斃事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏糝粒不繼者故當傾關中之穀以全其生生之計必無擠于溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半穀此為濟行者以廩糧遺居者以積倉寬關中之逼去盜賊之原除旦夕之損建終年之益若憚暫舉之小勞而忘永逸之弘策惜日月之煩苦而遺纍世之寇敵非所謂能開物成務創業垂統崇基拓迹謀及子孫者也并州之胡本實胸奴桀惡之寇也漢宣之世凍餒殘破國內五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復來降附遂令入塞居于漠南數世之後亦輒叛戾故何熙梁覲戎車屢征中平中以黃巾賊起發調其兵部衆不從而殺羌渠由是于彌扶羅求助于漢以討其賊仍值世喪亂遂乘釁而作鹵掠趙魏寇至河南建安中又使右賢王去卑誘質呼廚泉聽其部落散居六郡咸熙之際以一部太彊分為三率泰始之初又增為四于是劉猛內叛連結外虜近者郝散之變發于穀遠今五部之衆戶至數萬人口之盛過于西戎然其天性驍勇弓馬便利倍于氐羌若有不虞風塵之慮則并州之域可為寒心矣滎陽句驪本居遼東塞外正始中幽州刺史母丘儉伐其叛者徙其餘種始徙之時戶落百數子孫孳息今已千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況于夷狄能不為變但顧其微弱勢力不陳耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士庶之富豈須夷虜在內然後取足哉此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我華夏纖介之憂惠此中國以綏四方德施永世于計為長晉書江統傳又群書治要三十引晉書又通典一百八十九御覽七百九十四正刑論闕正刑論闕闕弧矢銘幽都筋角會稽竹矢率土名珍東南之美易以獲隼詩以殪兕伐叛柔服用威不韙初學記二十一御覽三百五十珍珠銘嗣茲陰景係晷太陽嘉彼令生廉聲以章藝文類聚八十四初學記二十七令生作金生立琅邪王議兄弟不相為後雖是舊說而經無明據此語不得施于王者王者雖兄弟既為君臣則同父子故魯躋僖公春秋所譏左傳曰子雖齊聖不先父食閔公弟也而同于父僖公兄也而齊于子既明尊之道不得復敘親之本也公羊傳曰逆祀者何先禰而後祖穀梁傳曰先親後祖逆祀也君子不以親親害尊尊兄弟也由君臣而相後三傳之明義如此則承繼有敘而上下洽通于義為允應繼大行皇帝通典八十尊周貴人為皇太妃議虞舜體仁孝之性盡事親之禮貴為天王富有四海而瞽叟無立錐之地一級之爵蒸蒸之心昊天罔極寧常忍父卑賤不以徽號顯之豈不以子無爵父之道理窮義屈靡所厝情者哉春秋經曰紀季姜歸于京師傳曰父母之于子雖為天王后猶曰吾季姜言子尊不加父母也或以為子尊不加父母則武王何以追王太王王季文王乎周之三王德配天地王迹之興自此始也是以武王仰尋前緒遂奉天命追崇祖考明不以子尊加父母也案禮幼不誄長賤不誄貴幼賤猶不得表彰長貴況敢錫之以榮命邪漢祖感家令之言而尊太公荀悅以為孝莫大于嚴父而以子貴加之父母家令之言過矣爰逮孝章不上賈貴人以尊號而厚其金寶幣帛非子道之不至也蓋聖典不可踰也當春秋時庶子承國其母得為夫人不審直子命母邪故當告于宗祧以先君之命命之邪竊見詔書當臨軒拜授貴人為皇太妃今稱皇帝策命命貴人斯則子爵母也貴人北面拜授斯則母臣子也天尊地卑名位定矣母貴子賤人倫序矣雖欲加崇貴人而實卑之雖顯明國典而實廢之且人主舉動史必書之如當載之方策以示後世無乃不順乎竊謂應告顯宗之廟稱貴人仁淑之至宜加殊禮以酬鞠育之惠奉先靈之命事不在已妃后雖是配君之名自后以下有夫人九殯無稱妃焉桓公謂宜進號太夫人非不允也如以夫人為少可言皇太夫人皇加也君太夫人于名禮順矣晉書禮志下庾家為孝庾后服議案賀公記天子諸侯五屬之內雖不服職為臣皆斬縗為夫人則齊縗周天子諸侯既同后夫人亦不可得異但文有詳略耳子姪服周諸婦非復五屬之例謂當從降夫人一等通典八十一孝后崩庾家訪服護軍江霦云答高嵩訪案大功之末可以嫁子小功之末可以娶婦又以小功卒哭可以娶妻此悉是明文正例當不如范語為此議者皆于為婚之主也娶婦則父為主娶妻則己為主故父大功之末不得行此嘉禮至于已小功之末則可行之又禮稱娶妻則是無父之子又未大功之末娶婦于禮例猶尚不安今所為者重所虧者輕又準時人由來之比自不致嫌通典六十高嵩訪江彪答案即江霦晉書目録作彪
