body:
  text: 明帝蟬賦尋長枝以淩高靜無為以自寧邈焉獨處弗纍于情任運任時不慮不營藝文類聚九十七尊師傅詔朕以不德夙遭閔凶猥以眇身託於王公之上哀煢在疚靡所咨仰憂懷惴惴如臨于谷孔子有云故雖天子必有尊也朕將祇奉先師之禮以咨有德太宰西陽王秩尊望重在貴思降丞相武昌公司空即邱子體道高邈勳德兼備先帝執友朕之師傅太常安陽鄉侯訓保朕躬忠肅篤誠夫崇親尊賢先帝所重朕見四君及書疏儀體一如東宮故事晉書辥兼傳手詔以溫嶠為中書令中書之職酬對多方斟酌禮宜非唯文疏而已非望士良才何可妄居卿既以令望忠允之懷著於周旋且文清而旨遠宜居機密今欲以卿為中書令朝論亦咸以為宜藝文類聚四十八初學記十一竝引檀道鸞晉陽秋又藝文類聚四十八御覽二百二十竝引晉中興書手詔徵王敦孤子紹頓首天下太事紹以眇身弗克負荷哀憂孔疚如臨于谷實賴冢宰以濟艱難公邁德樹勳遐邇歸懷仕社稷之託居總已之統然道里長遠江川阻深動有介石之機而回旋之閒固以有所喪矣謂公宜入輔朝政得旦夕酬咨朝士亦僉以為然以公高亮忠肅至心憂國苟其宜然便當以至公處之期於靜國寧民要之括囊無咎伏想暗同此志願便速剋近期以副翹企之懷魏書晉司馬紹傳王敦將為篡諷紹徵已乃為書云云案晉書明紀不載此文但云帝乃手詔徵之北討詔制詔昔魏絳撫和諸戎郅都魏尚威懾胸奴故封疆之任在於得才漢文所以思廉頗李牧也單于慕容瘣不遠萬里請吏率職禮讓忠義著之遐朔欲戮力國難翦滅長蛇宜得名胄英才以董統之使一時齊舉致討寇庭此聲實竝振雖越在海外其狀若身手矣尚書廣陵公眕弘量淹濟識謀經通文武著於勳績忠誠每思立事可委以重任使朕無北顧之憂者也其以眕持節督幽平并州諸軍事領護東夷校尉鎮東將軍平州刺史公如故主者假授諸所應供給信風引道文館詞林六百六十二存輕典詔王者所用唯在賞罰賞貴適理罰貴得情然理容進退事涉疑似盟府司勳或有開塞之路三尺律令未窮畫一之道想文王之官人今宣尼之止訟刑賞之宜思獲其所自今諸應賞罰皆賞疑從重罰疑從輕隋書刑法志贈薛兼詔太常安陽鄉侯兼履德沖素盡忠恪己方賴德訓弘濟政道不幸殂殞痛於厥心今遣持節侍御史贈左光祿大夫開府儀同三司魂而有靈嘉茲榮寵晉書嶭兼傳報杜夷詔先王之道將墜於地君下帷研思今之劉楊縉紳之徒景仰軌訓豈得高退而朕靡所取則焉晉書杜夷傳明帝即位夷自表請退詔云云討錢鳳詔先帝以聖德應運創業江東司徒導首居心膂以道翼讚故大將軍敦參處股肱或內或外夾輔之勳與有力焉階緣際會遂據上宰杖節專征委以五州刁協劉隗立朝不允敦抗義致討情布鬻拳兵雖犯順猶嘉乃誠禮秩優崇人臣無二事解之後劫掠城邑放恣兵人侵及宮省背違赦信誅戮之臣縱凶極逆不朝而退六合阻心人情同憤先帝含垢忍恥容而不責委任如舊禮秩有加朕以不天尋丁酷罰煢煢在疚哀悼靡寄而敦曾無臣子追遠之誠又無輔孤同獎之操繕甲聚兵盛夏來至輒以天官假授私屬將以威脅朝廷傾危宗社朕愍其狂戾冀其覺悟故且含隱以觀其終而敦矜其不義之強有侮弱朝廷之志棄親用羈背賢任惡錢鳳豎子專為謀主逞其凶慝誣罔忠良周嵩亮直讜言致禍周札周筵纍世忠義聽受讒搆殘夷其宗秦人之酷刑不過王敦之誅戮傍濫無辜滅人之族莫知其罪天下駭心道路以目神怒人怨篤疾所嬰昏荒悖逆日以滋甚輒立兄息以自承代多樹私黨莫能同惡未有宰相繼體而不由王命者也頑凶相獎無所顧忌擅録冶工輒割運漕志騁凶醜以窺神器社稷之危匪夕則旦天不長奸敦以隕斃鳳承凶宄彌復煸逆是可忍也孰不可忍也今遣司徒導鎮南將軍丹楊尹嶠建威將軍趙胤武旅三萬十道並進平西將軍邃率兗州刺史遐奮武將軍峻奮威將軍瞻精鋭三萬水陸齊勢朕親御六軍左衛將軍亮右衛將軍胤護軍將軍詹領軍將軍瞻中軍將軍壼驍騎將軍艾驃騎將軍南頓王宗鎮軍將軍汝南王祐太宰西陽王羕被練三千組甲三萬總統諸軍討鳳之罪罪止一人朕不濫刑有能殺鳳送首封五千戶侯賞布五千匹冠軍將軍鄧嶽志氣平厚識經邪正前將軍周撫質性詳簡義誠素著功臣之胄情義兼常往年從敦情節不展畏逼首領不得相違論其乃心無二王室朕嘉其誠方任之以事其餘文武諸為敦所授用者一無所問刺史二千石不得輒離所職書到奉承自求多福無或猜嫌以取誅滅敦之將士從敦彌年怨曠日久或父母隕沒或妻子喪亡不得奔赴銜哀從役朕甚愍之希不悽愴其單丁在軍無有兼重者皆遣歸家終身不調其餘皆與假三年休訖還臺當與宿衛同例三番明承詔書朕不負信晉書王敦傳又詔敢有拾王敦姓名而稱大將軍者軍法從事晉書王敦傳原王彬等詔司徒導以大義滅親其後昆雖或有違猶將百世宥之況彬等公之近親晉書王廙附傳復徵任旭虞喜為博士詔夫興化致政莫尚乎崇道教明退素也喪亂以來儒雅陵夷每覽子襟之詩未嘗不慨然臨海任旭會稽虞喜竝潔靜其操歲寒不移研精墳典居今行古志操足以勵俗博學足以明道前雖不至其更以博士徵之晉書虞喜傳詔止紀瞻告老豈朕德薄不足以為治乎御覽二百十一引晉中興書罷領軍將軍紀瞻為驃騎詔瞻忠亮雅正識局經濟屢以年耆病久逡巡告誠朕深明此操重違高志今聽所執其以為驃騎將軍常侍如故服物制度一按舊典遣使就拜止家為府晉書紀瞻傳報溫嶠手詔適得太真表如此今大事新定朝廷須才不有君子其能國乎方今外務差輕欲停此事晉書桓彝傳詔議廷臣見太子禮禮無生而貴者故帝元子方之於士而漢魏以來尊崇儲二使官屬稱臣朝臣咸拜此甚無謂吾昔在東宮未及啓革今衍幼沖之年便臣先達將令日習所見謂之自然此豈可以教之邪主者其下公卿內外通議使必允禮中晉禮志下又見通典六十七祀孔子詔給奉聖亭侯四時祀孔子祭宜如太始故事通典五十三令宰臣等詣都議政詔大事初定其命惟新其令太宰司徒已下詣都坐參議政道諸所因革務盡事中晉書明帝紀求直言詔餐直言引亮正想群賢達吾此懷矣子違汝弼堯舜之相君臣也吾雖虛暗庶不距逆耳之談稷契之任君居之矣望共勖之晉書明帝紀議立功臣後詔三恪二王世代之所重興滅繼絶政道之所先又宗室哲王有功勳於大晉受命之際者佐命功臣碩德名賢三祖所與共維大業咸開國祚土誓同山河者而竝廢絶禋祀不傳甚用懷傷主者其詳議諸應立後者以聞晉書明帝紀又見通典七十四議北郊及望秩詔郊祀天地帝王之重事自中興以來惟南郊未曾北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉王者其依舊詳處晉書明帝紀又見御覽五百二十七引晉起居注録吳名臣後詔昔周武克殷封比干之墓漢高過趙録樂毅之後追顯既往以勸將來也吳時將相名賢之胄有能纂修家訓又忠孝仁義靜已守真不聞於時者州郡中正亟以名聞勿有所遺晉書明帝紀聽劉超買外廄牛詔此不足賣與宜便賜之然義興前後辭讓不妄受一賜今亦必復不受可聽如所啓御覽八百二十八案此詔當在超為中書侍郎後晉書本傳載此事在出為義興之前非其實也遺詔自古有死賢聖所同壽夭窮達歸於一概亦何足特痛哉朕枕疾已久常慮忽然仰惟祖宗洪基不能克終堂構大恥未雪百姓塗炭所以有慨耳不幸之日斂以時服一遵先度務從𥳑約勞衆崇飾皆勿為也衍以幼弱猥當大重當賴忠賢訓而成之昔周公匡輔成王霍氏擁育孝昭義存前典功冠二代豈非宗臣之道乎凡此公卿時之望也敬聽顧命任託付之重同心斷金以謀王室諸方嶽征鎮刺史將守皆朕扞城推轂於外雖事有內外其致一也故不有行者誰扞牧圉譬若脣齒表裏相資宜戮力一心若合符契思美焉之美以緝事為期百辟卿士其總已以聽於冢宰保祐沖幼弘濟艱難永令祖宗之靈寧於九天之上則朕沒於地下無恨黃泉晉書明帝紀遺詔陵曄録尚書事曄清操忠貞歷職顯允且其兄弟事君如父憂國如家歲寒不凋體自門風既委以六軍可録尚書事加散騎常侍晉書陸曄傳立穆庾皇后冊妃庾氏昔承明命作嬪東宮虔恭中饋思媚軌則履信思順以成肅雍之道正位閨房以著協德之美朕夙罹不造煢煢在疚群公卿士稽之往代僉以崇嫡明統載在典謨宜建長秋以奉宗廟是以追述先志不替舊命使使持節兼太尉授皇后璽綬夫坤德尚柔婦道承姑崇粢盛之禮敦螽斯之義是以利在永貞克隆堂基母儀天下潛畼陰教鑒於六列考之篇籍禍福無門盛衰由人雖休勿休其敬之哉可不慎歟晉書明穆庾后傳與溫嶠書痛謝鯤未絶於口世將復至於此竝盛年雋才不遂其志痛切於心廙明古多通鯤達有識致其言雖未足令人改聽然味之不倦近未易有也坐相視盡如何晉書王廙傳書伏想墓次安隱守視文武平安淳化閣帖一答溫嶠等省所陳明卿等動靜數示文苑英華六百二十七嶭元超諫皇太子箋曰晉明帝之在東宮中庶子溫嶠中舍人劉放諫馬射云云太子答
