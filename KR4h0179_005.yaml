body:
  text: 卷五武帝改元大赦詔制詔蓋至化之本寬以居之仁以行之然後道濟天下品物得所朕以不德託於王公之上在位十年不能光宣大訓嘉靜萬國吳會僭虐戎夷作害伐卒勤瘁於外百姓劬勞於內加以水旱為災歲比不登雖昧旦兢兢不遑荒殆未能道德齊禮使群生獲乂斷獄歲增免無恥上古易簡而化成刑輕而姦改仰觀在昔何今者不逮之遠哉書不云乎邦之不臧惟豫一人有逸罰意者豈文教未篤政煩網密故醇朴離散以至於此歟思存化本務與四海共興時雍使元元之人咸得自新其大赦天下改元為咸寧文館詞林六百六十八以王覽為宗正卿詔覽少篤至行服仁履義貞素之操長而彌固其以覽為宗正卿晉書王覽傳以奚官奴代田兵種稻詔出戰入耕雖自古之常然事力未息未嘗不以戰士為念也今以鄴奚官奴婢著新城代田兵種稻奴婢各五十人為一屯屯置司馬使皆如屯田法晉書食貨志以山濤為太子少傅詔濤秉德沖素思心潛通清虛履道有古人之風雖使輔導東宮宜兼督朝事北堂書鈔六十五引王隱晉書以山濤為右僕射詔山濤自典官人之任志在澄清風俗朕將倚之以弘訓範庶人倫有日新之美其以為右僕射書鈔五十九引晉起居注答白裒詔濤以病自間但不聽之耳使濤坐執銓衡則可何必上下邪不得有所問晉書山濤傳濤除尚書僕射加侍中領吏部固辭以老疾上表陳情章表數十上久不攝職為左丞白裒所奏詔云云手詔山濤白裒奏君甚妄所以不即推直不喜凶赫耳君之明度豈當介意邪便當攝職今斷章表也晉書山濤傳又詔山濤山僕射近日暫出遂以微苦未還豈吾側席之意其遣丞掾奉詔喻旨若體力故未平康者便以輿車輿還寺舍晉書山濤傳濤志必欲退因發從弟婦喪輒還外舍又詔原何劭等詔太保與毅有纍世之交遵等所取差薄一皆置之晉書何劭傳咸寧初有司奏劭及見尊等受故鬲令表毅貨事下廷尉詔原之止群臣上禮詔每念頃遇疫氣死亡為之愴然豈以一身之休息忘百姓之艱邪諸上禮者皆絶之晉書武帝紀先是帝不豫及瘳群臣上壽喪不舉樂詔諸王公大臣薨應三朝發哀者踰月不舉樂其一朝發哀者三日不舉樂也晉書禮志中徵皇甫謐為太子中庶子詔男子皇甫謐沈靜履素守學好古與流俗異趣其以謐為太子中庶子晉書皇甫謐傳又見北堂書鈔六十六引晉起居注以曹志為博士詔甄城公曹志篤行履素達學通識宜在儒林闡弘胄子之教其以志為散騎常侍國子博士晉書曹志傳書鈔六十七引晉起居注責有司失議華廙詔諸侯薨子踰年即位此古制也應即位而廢之爵命皆去矣何為罪罰再加且吾之責廙以肅貪穢本不論常法也諸賢不能將明此意乃更詭易禮律不顧憲度君命廢之而群下復之此為上下正相反也晉書華表附傳以扶風王亮為宗師詔宗室戚屬國之枝葉欲令奉率德義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦棠棣之詩此姬氏所以本枝百世也今以衛將軍扶風王亮為宗師所當施行皆咨之於宗師也晉書武帝紀貶中山王睦為丹水侯詔中山王所行何乃至此覽奏甚用憮然廣樹親戚將以上輔王室下惠百姓也豈徒榮崇其身而使民喻典憲乎此事當大論得失正臧否所在耳苟不宜君國何論於赦令之間邪其貶睦為縣侯晉書高陽王睦傳咸寧三年冀州刺史杜友奏睦招誘逋亡不宜君國有司奏事在赦前應原詔云云詔主者今年霖雨過差又有蟲災潁州襄城自春以來略不下種深以為慮主者何以為百姓計促處當之晉書食貨志通典二以王恂為河南尹詔河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼內外明於治化其以恂為河南尹御覽二百五十二引晉起居注聽陳騫留京城詔騫元勳舊德統乂東夏方弘遠績以一吳會而所苦未除每表懇切重勞以方事今聽留京城以前太尉府為大司馬府增置祭酒二人帳下司馬官騎大軍鼓吹皆如前親兵百人廚田十頃廚園五十畝廚士十人器物經用皆留給焉又給乘輿輦出入殿中加鼓吹如漢蕭何故事晉書陳騫傳詔諭意陳騫騫履德論道朕所咨詢方賴謀猷以弘庶績宜時治事可遣散騎常侍諭意晉書陳騫傳以庾純為國子祭酒詔議郎庾純篤志好古敦説詩書有儒行宜訓導國子書鈔六十七引臧榮緒晉書咸寧三年詔案本傳純于泰始中歷河南尹免尋為國子祭酒加散騎常寺非由議郎為祭酒也書鈔所引疑轉寫有誤奉朝請宜補大縣詔前相國掾主簿雖奉朝請並從容間豫若大縣闕宜以治民也書鈔五十八引晉起居注贈諡盧欽詔欽履道正直執德貞素文武之稱著於方夏入躋機衡惟允庶事肆勤內外有匪躬之節不幸薨沒朕甚悼之其贈衛將軍開府儀同三司賜祕器朝服一具衣一襲布五十匹錢三十萬諡曰元晉書盧欽傳以何曾為太宰詔太傅明朗高亮執心弘毅可謂舊德老成國之宗臣者也而高尚其事屢辭祿位朕以寡德憑賴保佑省覽章表實用憮然雖欲成人之美豈得遂其雅志而忘翼佐之益哉又司徒所掌務煩不可久勞耆艾其進太宰侍中如故朝會劍履乘輿上殿如漢相國蕭何田千秋魏太傅鍾繇故事賜錢百萬絹五百匹及八尺床帳簟褥百副置長史掾屬祭酒及員吏一依舊制所給親兵官騎如前主者依次按禮典務使優備晉書曾傳詔問荀勗司徒處當得人副遠近之望井治事見才誰可也御覽二百八引荀勗答語咸寧四年司徒何曾遷太宰詔問勗詔燒雉頭裘據此裘非常衣服消費功用其於殿前燒之敕內外有造異服依禮治罪書鈔一百二十九御覽六百九十四引晉咸寧起居注太醫司馬程據上雉頭裘一領詔云云末句一本作詔罪之聽羊祜不以侯斂詔故南城侯羊祜固辭歷年志不可奪身沒讓存遺操益厲此夷叔所以稱賢季子所以全節也今聽復本封以彰厥美藝文類聚五十一書鈔四十八並引晉起居注又見晉書羊祜傳文選齊竟陵王行狀注引王隱晉書追贈羊祜詔征南大將軍南城侯祜蹈德沖素思心清遠始在內職值登大命乃心篤誠左右王事入綜機密出統方嶽當終顯烈永輔朕躬而奄忽殂隕悼之傷懷其追贈侍中太傅持節如故晉書羊祜傳徵朱沖為博士詔處士朱沖履行高潔經學修明其徵為博士從祖父不應服周詔王奉魏氏所承者重不得服其私親通典九十三咸寧四年陳留國上燕公是王之父王出奉命於帝為祖今於王為從祖父有司奏應服周不以親疏尊卑為降詔云云禁斷立碑詔此石獸碑表既私褒美興長虛偽傷財害人莫大於此一禁斷之其犯者雖會赦令皆當毀壞宋書禮志二徵朱沖為太子右庶子詔東宮官屬亦宜得履蹈至行敦悅典籍者其以沖為太子右庶子晉書朱沖傳以陳壽為侍御史詔昨適用蜀人壽良具員耳可以為侍御史華陽國志十一鎮南將軍杜預表為散騎侍郎詔云云手詔戒山濤夫用人惟才不遺疏遠卑賤天下便化矣晉書山濤傳詔賜王基等家穀故司空王基衛將軍盧欽領典軍將軍揚囂並素清貧身沒之後居無私積頃者飢饉聞其家大匱其各賜穀三百斛晉書盧欽傳以張華為度支尚書詔一年不收使公私俱匱不唯天時乃人事有不盡也故總要者正在度支尚書也其以散騎常侍中書令張華為度支尚書御覽一百十七引晉起居注代吳詔制詔兵興以來八十餘年戎車出征罔有寧歲死亡流離傷害和氣朕每側然悼心思戢兵靜役與人休息故罷習業廣分休假大遣扶老養孤及女朝夕相對而吳賊失信比犯王略胡虜校動寇害邊垂人兵缺少不足禽制輒當前休中土以相應赴將士疲悴而猶不及事欲以為靜而更為勞昔淮夷不賓成王東伐獫狁作難戎車夏征自古及今咸皆勤戎遠戍先勞後逸未有得修無為於有事之時也自宣皇帝以來以吳蜀為憂邊事為念今孫皓犯境夷虜擾邊此乃祖考之遺慮朕身之大恥也故繕甲修兵大興戎政內外勞心上下戮力以南夷句吳北威戎狄然后得休牛放馬與天下共饗無為之福耳今調諸士家有二丁三丁取一人四丁取二人六丁以上三人限年十七以上至五十以還先取有妻息者其武勇散將家亦取如此比隨才署武勇掾史樂市馬比為騎者署都尉司馬中間以來內外解弛吏寡盡忠之心將無致命之節朕方靜人用未加罪戮今當修戎政以混一六合賞功罰惰明罰整法其宣敕中外群官使各悉心畢力明為身計主者以時施行條品文館詞林六百六十二答杜預征吳節度詔制詔夫悅以犯難人忘其死此用兵之本若乃臨戎致果則必蒞之以牲斷之以戚故商令主告誓其衆用命賞于祖不用命戮于社昔魏絳穰苴列國陪臣苟有犯其政令者雖親如楊干莊賈皆戮之不疑用能尊主立勳垂聲載籍今廣命群帥淩江致討將以靜齊南裔綏寧四海蓋鷹揚哮闞之士成功之一會也可不勗哉懸旌萬里當令首尾協同此既然矣且元帥所統或本不相督威令教禁素不服習若各任所見不相順從必顛越不振以疚大事兵凶戰危呼吸成變可不慎邪斯乃三軍之命國之安危苟有乖遺以致負敗雖首領之罰必加鈇鉞之誅必用固無及矣是故投之死地而後生蓋知亡必存也以殺教人而萬夫齊勇蓋自古之政也方嶽元帥推轂所委若需懦縱法忘在公之義上愆國命下墜徒衆雖悔身何及凡所督敢距違節度便以軍令從事書稱宣力汝為又曰尚桓桓如武如貙如熊如羆軍司將軍其各勉之申勒群帥以下使知此命文館詞林六百六十二詔止山濤告退天下事廣加吳土初平凡百草創當共盡意化之君不深識往心而以小疾求退豈所望於君邪朕猶側席未得垂拱君亦何得高尚其事乎當崇至公勿復為虛飾之煩晉書山濤傳中詔答衛瓘濤以德素為朝之望而常深退讓至于懇切故比有詔欲必奪其志以匡輔不逮主者既不思明詔旨而反深加詆案虧崇賢之風以重吾不德何以示遠近邪晉書山濤傳濤苦表請退詔又不許尚書令衛瓘奏可免濤官中詔瓘進馬隆為宣威將軍詔隆以偏師寡衆奮不顧難冒險能濟其假節宣威將軍加赤幢曲蓋鼓吹晉書馬隆傳以劉頌為議郎守廷尉詔黃門郎劉頌貞平居正兼明法理可議郎守廷尉書鈔五十三以劉智為國子祭酒詔南陽王師劉智學行憂著其以智為國子祭酒書鈔六十七引臧榮緒晉書詔張華卿才綜萬代博識無倫遠冠羲皇近次夫子然記事采言亦多浮妄宜更刪翦無以𤕠長成文昔仲尼刪詩書不及鬼神幽昧之事以言怪力亂神今卿博物志驚所未聞異所未見將恐惑亂於後生繁蕪於耳目可更芟截浮疑分為十卷王子年拾遺記報劉毅詔羊車雖無制猶非素者所服宋書禮志五晉武帝時護軍羊琇乘羊車司隸校尉劉毅奏彈之詔云云賜魏舒葬三妻地并錢詔魏舒清貧不營財産頓舉衆喪必無以自供其賜葬地一頃錢五十萬御覽五百五十四引王隱晉書今本御覽脫詔曰二字
