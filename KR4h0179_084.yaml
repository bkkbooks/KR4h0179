body:
  text: 卞粹王昌前母服議昌父當莫審之時而娶後妻則前妻同之于死而義不絕若生相及而後妻不去則妾列于前志矣死而會乎則同祔于葬無竝嫡之實必欲使子孫于沒世之後追計二母隔絕之時以為竝嫡則背違死父追出母亡議者以為禮無前母之服者可謂以文害意愚以為母之不親而服三年非一無異于前母也晉書禮志中泰康元年賊曹屬卞粹議為皇太孫服議太子始生故已尊重不待命誓若行議已誓不殤則元服之子當斬衰三年未誓而殤則雖十九當大功九月誓與未誓其為升降也微斬與大功其為輕重也遠而今注云諸侯不降嫡殤重嫌于無以大功為重嫡之服大功為重嫡之服則雖誓無復有三年之理明矣男能奉衛社稷女能奉婦道各以可成之年而有已成之事故可無殤非孩齓之謂也謂殤後者尊之如父猶無所加而止殤服況以天子之尊為無服之殤行成人之制邪凡諸宜重之殤皆士大夫不加服而令至尊獨居其重未之前聞也宋書禮志二惠帝太安元年三月皇太孫尚薨中書令卞粹云云賀老人星表陛下聖德應乾嘉瑞屢臻玄象垂耀老人啟徵萬壽無疆蓺文類聚一奏彈尚書丞郎事舊丞郎取急及屬出皆尚有對使職局不廢而昨左右二丞及諸皆出雖次直二郎在役使有兵火警急便為無復行事者二丞頓行無印可以封符疏此之逋慢莫斯之甚御覽二百十三奏議王式事王式繼母前嫁夫終後嫁式父式父終持服葬訖還前夫家前家亦有繼子養至終遂合葬于前夫式為制出母周服式辭以父臨終母求去父許諾就如其辭必也正名依禮為無所據若父在與亡臧否有命須顯七出之責則當存時受遣告宗廟而棄之無緣以絕義之妻留家制服若式父不及禮義或以情相許或疾在臨困謬亂聽使去留自由者此必為相要以非禮相要以非禮則存亡無所得從式宜正之以禮魏顆父命從其治不從其亂陳乾昔屬其子尊已殉殯二婢子尊己以非禮不從春秋禮記善之竝以妾媵猶正以禮況其母乎禮婦人三從式母于夫事生奉終居喪以禮非為既絕之妻及亡制服不為無義之婦不絕之驗彰于制服自云守節非為更嫁攷行無絕于夫離絕之斷在夫沒之後夫之既沒是其從子之日而式以為出母比此母以子出也即何以子出其母而致使存無所從以容居沒無所歸以託終也寄命于他人之門埋尸于無名之冢若是式父亡後母尋沒于式家必不以為出母明矣許諾之命一耳以為母于同居之時至沒于前子之門而許以為母所處不同而以為出母此為制離絕于二居裁出否于義斷離絕之斷非式而誰假使二門之子皆此母之生母戀前子求去求絕非禮于後家還反又非禮于前門去不可去還不可還則為無寄之人也式必內盡匡諫外極防閑不絕明矣何至守不移于至親略情禮于假繼乎繼母如母聖人之教式為國士閨門之內犯禮違義開闢未有于父則無追亡之善于母則無孝敬之道存則去留自由亡則合葬路人可謂生事不以禮死葬不以禮者也母依前子非為更嫁日月遠近理有異禮長子不為出母服出繼母尢不應服式長子也又母非所生不應服坦然而式乃制服明前絕無徵違禮莫據內愧于心欲以詐眩視聽託過厚以制飾尋其事情攷之正禮義不容恕式母再嫁前後俱繼何慈如此事受之日應有過禮之貶出之者宜受莫大之責式禮義之闕發于事親傷孝敬之道虧損時教不可以居人倫銓正之任式宜請議即下禁止案侍中司徒臨潁公荀組敷宣五教實在任人而含容違禮曾不貶黜揚州大中正侍中平望亭侯陸曄淮南大中正散騎侍郎胡弘等顯執邦論朝野取信曾不能率禮正違崇孝敬之教竝為不勝其任請以見事免組曄弘官大鴻臚削爵土廷尉結罪晉書卞壺傳通典九十四太興三年淮南小中正王式繼母先嫁有繼子後嫁式父式父臨終繼母求去式父許有遺命及式父亡母制服積年後還前繼子家及亡與前夫合葬式追服周杜夷江泉荀崧蕭輪議皆恕式御史中丞卞壺奏奏論樂謨庾怡時召南陽樂謨為郡中正潁川庾怡為廷尉評謨怡各稱父命不就壺奏曰人無非父而生職無非事而立有父必有命居職必有悔有家各私其子此為王者無人職不軌物官不立政如此則先聖之言廢五教之訓塞君臣之道散上下之化替矣樂廣以平夷稱庾珉以忠篤顯受寵聖世身非已有況及後嗣而可專哉所居之職若順夫群心則戰戍者之父母皆當以命子不以處也若順謨父之意則人皆不為郡中正人倫廢矣順怡父之意人皆不為獄官則刑辟息矣凡如是者其可聽歟若不可聽何以許謨怡之得稱父命乎此為謨以名父子可以虧法怡是親戚可以自專以此二塗服人示世臣所未悟也宜一切班下不得以私廢公絕其表疏以為永制晉書卞壺傳群臣拜皇太子議群臣拜皇太子議周禮王后太子不會明禮同于君皆所以重儲貳異正嫡苟奉之如君不得不拜矣太子若存謙沖故宜荅拜臣以為皇太子之立郊告天地正立儲宮豈得同之皇子揖讓而已謂宜稽則漢魏闔朝同拜晉書禮志下通典六十七周札贈諡議札石頭之役開門延寇遂使賊敦恣亂札之責也追贈意所未安懋筵兄弟宜復本位晉書周札傳拜敬保傅議臣歷觀紀籍禮經無拜臣之制雖漢成帝拜張禹庸主凡臣不足為範或說師臣友臣師模其道又未見其拜也至于先帝之拜司徒導特以元皇帝興自藩國布衣之交拜在人臣之日故率而不改陛下尊訓先典服膺禮中未宜降南面之尊拜北面之臣大教有違名體不順事應改正通典六十七又奏臣攷先典之極無過于周公而周史無拜敬之禮記稱王者入學躬拜三老此一朝之敬猶子冠而母拜豈可終身行焉通典六十七上牋自陳壺天性狷狹不能和俗退以情事欲畢志家門亡父往為中書令時壺蒙大例望門見辟信其所執得不祗就門戶遇禍迸竄易名得存視息私志有素加嬰極難流寄蘭陵為苟晞所召恐見逼迫依下邳裴盾又見假授思暫之郡規得託身尋蒙見召為從事中郎豈曰貪榮直欲自致規暫恭命行當乞退屬華軼之難不敢自陳軼既梟懸壺亦嬰病具自歸聞未蒙恕遣世子北征選寵顯望復以無施忝充元佐榮則榮矣實非素懷顧以命重人輕不敢辭憚聞西臺召壺為尚書郎實欲因此以避賢路未及陳誠奄丁窮罰壺年九歲為先母弟表所見孤背十二蒙亡母張所見覆育壺以陋賤不能榮親家產屢空養道多闕存無歡娛終不備禮拊心永恨五內抽割于公無效如彼私情艱苦如此實無情顏昧冒榮進若廢壺一人江北便有傾危之慮壺居事之日功績以隆者誠不得私其身今東中郎岐嶷自然神明日茂軍司馬諸參佐竝以明德宣力王事壺之去留曾無損益賀循謝端顧景丁琛傅晞等皆荷恩命高枕家門壺委質二府漸冉五載攷效則不能已彰論心則頻累恭順柰何哀孤之日不見愍恕哉晉書卞壺傳與溫嶠書元規召峻意定懷此於邑溫生足下柰此事何吾今所慮是國之大事且峻已出狂意而召之更速必縱其群惡以向朝廷朝廷威力誠桓桓交須接鋒履刃尚不知便可即擒不王公亦同此情吾與之爭甚懇切不能如之何本出足下為外藩任而今恨出足下在外若卿在內俱諫必當相從今內外戒嚴四方有備峻凶狂必無所至耳恐不能使無傷如何晉書卞壺傳書足下佳不朝郎上獲諸城文墨至便在舍事許改變子紙下物知此草勿令一人見也吾今敕書事令不發亟付卿發發便密令人傳之壺白淳化閣帖三崤山路石銘晉太康三年弘農太守梁柳脩復舊道水經注河水四今出側附路有石銘議推處劉毅議推處劉毅龍體既蒼雜以素文意者大晉之行戢武興文之應也而毅乃引衰世妖異以疑今之吉祥又以龍在井為潛皆失其意潛之為言隱而不見今龍彩質明煥示人以物非潛之謂也毅應推處晉書劉毅傳時龍見武庫井中百官將賀毅獨表無賀龍之禮尚書郎劉漢等議詔不聽為劉毅請諡疏中詔以毅忠允匪躬贈班台司斯誠聖朝考績以毅著勳之美事也臣謹案諡者行之迹而號者功之表今毅功德竝立而有號無諡于義不體臣竊以春秋之事求之諡法主于行而不繼爵然漢魏相承爵非列侯則皆沒而高行不加之諡至使三事之賢臣不如野戰之將銘迹所殊臣願聖世舉春秋之遠制改列爵之舊限使夫功行之實不相掩替則莫不率賴若以革舊毀制非所倉卒則毅之忠益雖不攻城略地論德進爵亦應在例臣敢惟行甫請周之義謹牒毅功行如右晉書劉毅傳相風賦幽林絕響巨海息波文選月賦注黃帝頌邈矣黃軒應天載靈通幽遠覽觀象設形誕敷厥訓彝倫攸經德從風流化與雲征皇猷允塞地平天成爰登方岳封禪勒成紛然鳳舉龍騰太清違茲九土陟彼高冥民斯攸慕涕泗沾纓遐而不墜式頌德聲蓺文類聚十二御覽七十九老子頌深哉伯陽誕此靈姿研精玄奧幽贊神微抱質懷素蘊寶藏輝述而好古儀聖作師周衰道廢厥猷匪宣龍潛初九亢志皓然於邈高風徽音永傳彭祖頌於休彭公應運特生窮神知化妙物通靈挹之不沖滿之不盈韜光隱曜混沌玄清確乎其操邈乎其度含真蕩穢離俗遺務託神玄妙遊心泰素享年七百寶降其祚惠我無疆倫道作故王喬赤松頌妙哉松喬稟此殊姿含精握氣靈德是綏藏器華圃俛首騰飛齊迹風雲超遠姿微乃翔靈墳鳥像人聲低徊舊土眷此平生惠而不諒凋我素形神儀既隕翻飛而征遨遊八維跨騰九冥應慶罔極與道虛盈蓺文類聚七十八皇甫陶碑帝命既允戎政以閑文選褚淵碑文注書七月二十六日具書靖白雖數相聞不解勞倦信至得書悉知棄云宅及計東來言展有期索靖白淳化閣帖三月儀帖正月具書君白大蔟布氣景風微發順變綏寍無恙幸甚隔限遐塗莫因良話引領託懷情過採葛企佇難將故及表問信李麃麃俱蒙告音君白君白四表清通俊乂濯景山無由皓之隱朝有二八之盛斯誠明珠燿光之高會鸞皇翻翥之良秋也吾子懷英偉之才而遇清升之祚想已天飛奮翼紫闥使親者有邇賴也君曰二月具書君白俠鍾應氣融風扇物遙願高宇使時讚宜山川攸遠限以成隔自我不見俛仰數年看塗馳思言存所親裁及告懷悵焉不具君白君白王路熙和皇化洋溢博採英儒以恢時佐輦無叩角之怨門有搢紳之盛斯乃潛龍逢九五之運室王值卞氏之明已委蓬室之陋以妥金紫之榮使親契有拂冠之慶也君白三月具書君白姑洗育物罄無不宜延想吾子隨運是康機度推疏不面踰紀分逼哀塗烏咽良展馳心投情庶能感應具書脩問罔然不具君白君白洪化遐布率土咸寍秉卞莊之勇者武而精道抱管鮑之才者彈冠而待顯怪以高邁之姿而懷迷時之志逮明明之來緬不識之響機運稍移人生若寄願速龍躍耀于雲漢也君白七月具書君白夷則布氣暑運西流遙想足下動靜順宜川塗悠遠乖我談宴心存明瑰精爽馳想登高長佇洟以隕之不勝勞歎裁及書問君白君白與子少舊契闊在昔情款好合如彼琴瑟何圖離別歷載十餘年往天地之悠長口人生之險絕悼言多感悵然傷懷唯足下寶德育素以熙萬福敘此故舊君白八月具書君白南呂應化中秋告涼敬想令問福履多宜山川緬邈信理希寡談面既闊音問又疏傾首延懷無日不勞想篤分好不孤其懃亦見信憶舊裁因數字行人彭彭俱數相聞君白君白世清道治聖化光洽明于博採唯賢是務足下以神龍之賈應景風之求足陟天閣而德聞四海允彼具瞻副此群望竊從草澤慷慨增願君白九月具書君白無射改卦廣莫布氣氣度涼和宜時順節路乖人隔邈若天踰翹首延思遠莫致之君子篤好想齊往分不勝佇企飢渴之懷故書表問不能畼情君白君白昔忝同門濫攀君子子以逸群群之才當貫三千之首登堂入室研道之奧雖明闇殊品每亦希顏至以乖隔孤陋遐外曠道離友益以牆面無因之積以書所敬君白十月具書君白應鍾導運嚴霜稍隆時變物移感候增懷馳心繫想言存所親山川路限不能翻飛登彼崇丘逍遙長望延佇莫及思積情疲不勝鬱陶眷然之感裁復白書不悉君白君白往春執手刻會來秋迎期待面慊然遲想正以逸驥之迹騁于雲漢之路龍驤天府忘此友信飛沈壹殊何緣言嬿厚為時節寶愛光儀君白十一月具書君白黃鍾吐氣凝寒雰降溫室重裘和氣養神休宜幸甚歲月飛馳逝不我待闊自別後始忽然踰載望塗延思精誠所感無物不應果來況德音彌滿耽翫良翰悟𢗿愛慰增慨不勝抱感裁因荅言不具盡君白君白昔誓秋歸而奄經半載匪我愆期時違書信之隆況旨沓密蚩以逸踰約以馳騖親愛分隔齊寍足下復遠攱望邪倉卒不具君白十二月具書君白大呂度末寒慄烈明德宜時夢想無恙分隔踰年良會乖違感詠蕭艾言存宿好翹翹延領不勝思積裁及白書不能具悉君白君白不圖一別便成永隔瞻彼脩路從此乖限情經運候思興感物發言存信洟以流墜足下嚴度同此懷信使知問君白董逌廣川書跋云晉人評書以索靖比王逸少而歐陽詢至臥碑下近世惟淳化官帖中有靖書其後購書四方得月儀十一章今入續帖中然于前書亦異李嗣真曰靖有月儀三章觀其趣尚大為遒竦今月儀不止三章或謂昔人離析然書無斷裂殆唐人臨寫者草書狀聖王御世隨時之宜倉頡既生書契是為科斗鳥篆類物象形叡哲變通意巧茲生損之隸草以崇簡易百官畢脩事業竝麗蓋草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虯蟉或往或還類阿那以羸形欻奮舋桓桓及其逸遊肸嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華玄熊對踞于山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈廉苫隨體散布紛擾擾以猗靡中持疑而猶豫玄螭狡獸嬉其閒騰猨飛鼺相奔趣淩魚奮尾蛟龍反據投空自竄張設牙距或若登高望其類或若既往而中顧或若俶儻而不群或若自檢于常度于是多才之英篤蓺之彥役心精微耽此文憲守道兼權觸類生變離析八體靡形不判去繁存微大象未亂上理開元下周謹案騁辭放手雨行冰散高音翰厲溢越流漫忽班班而成章信奇妙之煥爛體磥落而壯麗姿光潤以粲粲命杜度運其指使伯英迴其腕著絕勢于紈素垂百世之殊觀晉書索靖傳蓺文類聚七十四
