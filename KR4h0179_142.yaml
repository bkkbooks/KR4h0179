body:
  text: 周祗月賦二氣理化精者能鏡陽得一以朗旦月代終而夕映其狀也氣融潔而昭遠質明潤而貞虛弱不廢照清不激汙藝文類聚一枇杷賦並序枇杷賦並序昔魯季孫有嘉樹韓宣子賦譽之屈原離騷亦著橘賦至于枇杷樹寒暑無變負雪揚華余植之庭圃遂賦之云名同音器質貞松竹四序一采素華冬馥霏雪潤其緑蕤商風理其徑條望之冥濛即之疏寥藝文類聚八十七御覽九百七十一與劉裕書諫伐蜀自義旗之建所征無不必克此可謂天人交助信順之徵也今大難已夷君臣俱泰頃五穀轉豐民無飢苦劫盜之患亦為弭息此誠漸足無事宜大寧治本蜀賊宜平六合宜一非為不爾也故人有言天時不如地利地利不如人和今往伐蜀萬有餘里泝流天險動經時歲若此軍直指成都徑禽譙氏者復是將帥奮威一快之舉耳然益土荒殘野無青草成都之內殆無孑遺計得彼利與今行軍之費不足相補也而今往艱險雨雪方降驅三州三吳之人投之三巴三蜀之土其中疾病死亡豈可稱計此一疑也賊必不守窮城將決力戰今我往勞困彼來甚逸若忽使師行不利人情波駭大勢挫衄此二疑也且千里饋糧士有飢色況今泝險萬里所在無儲若兵不解運漕不繼雖韓白之將何以成功此三疑也今云可征者云彼親離衆叛愚謂不然彼以一匹夫而能致今日之事若衆力離散亦何以致此官所遣兵皆烏合受募之人亦必無千人一心有前無退矣為治者固先定其內而理其外先安其近而懷其遠自頃狂狡不息誅戮相繼未可謂人和也天險如彼未可謂地利也毛修之家讎不雪不應以得死為限劉敬宣蒙生存之恩亦宜性命仰報今將軍欲驅二死之甘心而忘國家之重計愚情竊所未安闕門之外非所宜豫苟有其心不覺披盡宋書劉敬宣傳義熙三年高祖表遣敬宣率衆五千伐伐蜀國子博士周祗書諫不從執友針四輔揚輝俴木幽林撫喬鸞飛爰逮姬衰俗遂凋成交緣利昵用因偽情谷風興哀繁霜夏零道之末盡弘焉由人自室有回過門則親微言綿邈清談輟響金雖能照塵積翳朗西河感離口悟投杖慊慊文侯友賢好學英英燕昭禮郭致樂推誠歲寒功標松竹落落喬札遼遼莊惠解帶一遇道映萬世人亦有言貴則易交利重太山道輕鴻毛久而益敬見之晏平霜雪既至徑柏冬青藝文類聚二十一又初學記十八引兩條祭梁鴻文晉隆安四年十一月月陳郡周穎文以薀藻行潦祠于梁先生之墓夫豫邁志箕潁塵垢雕俗骨秀風霜性淳寡欲娶待偕隱之儷文絶陪臣之録遂策周魯之郊逆旅吳會之阿可謂高奇絶倫孤生莫和者也後學撫牘人在文忽以知命而展其墳芒芒積草有馥餘芬昔先生過延陵而想季經海隅而感連苟踐迹而趣合亦斷金于當年藝文類聚三十八御覽五百二十六祭王東亭文以少牢之奠敬奠東亭王侯之靈蓋聞朗鑑不塵精金能照君以圭璋資以明要少長風流舉契理調事擾皇家道在君子亮誠外內寄心萬里契同風雲義貫終始自昔索居荏苒于茲五載不覿何日不思嗚呼若人奄隨化遷古之遺愛猶或興言承凶愴痛慨然留連藝文類聚三十八御覽五百二十六上言柿瑞西鄉有柿樹殊本合條依舊集賀御覽九百七十一引義熙起居注二年正月上言詔停之奏彈劉毅上言傳詔羅道盛輒開箋遂盜發密事依法棄市奏報行刑而毅以道盛身有侯爵輒復停宥案毅勳德光重任居次相既殺之非己無緣生之自由又奏之于先而弗請後閫外出疆非此飲謂中丞鮮之于毅舅甥制不相糾臣請免毅官宋書鄭鮮之傳鮮之盡心高祖獨不屈意于毅義熙六年鮮之使治書侍御史丘洹奏彈毅詔無所問上表自陳祠部郎荀伯子表臣七世祖太尉準禍加淮南不應濫賞尋先臣以翦除賈謐封海陵公事在淮南遇禍之前後廣陵雖在擾攘之際臣祖乃始蒙殊遇歷位元凱後被遠外乃作平州而猶不至除國良以先勳深重百世不泯故也聖明御世英輔係興曾無疑議以為濫賞臣以微弱未齒人倫加始勉視息封爵兼嗣伏願陛下遠録舊勳特垂矜察宋書荀伯子傳義熙九年伯子上表故太尉廣陵公陳準黨翼孫秀禍加淮南謂廣陵之國宜在削除潁川陳茂先上表報劉裕書聞親率戎馬遠履西畿闔境士庶莫不惶駭何者莫知師出之名故也今辱來疏始知以譙王前事良增歎息司馬平西體國忠貞款愛待物當于古人中求耳以君公有匡復之勳家國蒙賴推德委誠每事詢仰譙王往以微事見劾猶自表遜位況以大過而當默然邪但康之前言有所不盡故重使胡道咨白所懷道未及反己奏表廢之所不盡者命耳推寄相與之懷正當如此有何不可便興兵戈自義旗乘權以來四方方伯誰敢不先相咨疇而徑表天子邪譙王為宰相所責文表廢之經正何歸表使何因可謂欲加之罪其無辭乎劉裕足下海內之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣來示言虛懷期物自有由來今伐人之君啖人以利真可謂虛懷期物自有由來者矣劉藩死于閶闔之門諸葛斃于左右之手甘言詫語方伯襲之以輕兵遂使席上靡款之士閫外無自信諸侯以是為得算良可恥也貴府將佐及朝廷賢德寄性命以過日心企太平久矣吾誠鄙劣嘗聞道于君子以平西之至德寧可無授命之臣乎自未能自投虎口比迹郗仕之徒明矣假令天長喪亂九流渾濁當與臧洪遊于地下不復多言晉書司馬休之傳宋書武帝紀中魏書韓延之傳南史宋本紀廬山精舍誓文維歲在攝提格七月藏辰朔二十八日乙未法師釋慧遠貞感幽奧霜懷特發乃延命同志息心貞信之士百有二十三人集于廬山之陰般若雲臺精舍阿彌陀像前率以香華敬薦而誓焉推斯一會之衆夫緣化之理既明則三世之傳皓矣遷感之數既符則善惡之報必矣推交臂之潛淪悟無常之期切審三報之相催知險趣之難拔此其同志諸賢所以夕惕宵勤仰思攸濟者也蓋神者可以感涉而不可以迹求必感之有物則幽路咫尺苟求之無主則渺茫何津今幸以不謀而僉心西境叩篇開信亮情夫天發乃機象通于寢夢欣歡百于子來于是靈圖表暉景俟神造功由理諧事非人運茲實天啓其誠冥運來萃者矣可不剋重精疊思以凝其慮哉然其景績參差功德不一雖晨祈云同夕歸攸隔即我師友之眷良可悲矣是以慨焉胥命整襟法堂等施一心亭懷幽極誓茲同人俱遊絶域其有驚出絶倫首登神界則無獨善于雲嶠望兼全于幽谷先進之與後升勉思彙征之道然復妙觀大儀啓心貞照識以悟新形由化革籍扶容于中流蔭瓊柯以永言標雲衣于八極泛香風以窮年體忘安而彌穆心超樂以自怡臨三塗而緬謝傲天宮而長辭紹衆靈以繼軌指太息以為期究茲道也豈不弘哉釋藏輦九又百五致書釋僧肇請為般若無知論釋遺民和南頃餐徽聞有懷遙佇歲未寒嚴體中如何音寄雍隔增用抱蘊弟子沈痾草澤常有斃瘵邇因慧明道人北遊裁通其情古人不以形疏致淡悟涉則親是以雖復江山悠邈不面當年至于企懷風味鏡心象迹佇悅之勤良以深矣緬然無因瞻霞永歎順時愛敬冀因行李數有承問伏願彼大衆康和外國法師口休納上人以悟發之器而遘茲淵對想開究之功盡過半之思故以每惟乖闊憤愧何深此山僧常道戒彌厲禪隱之餘則惟研惟講恂恂穆穆故可樂矣弟子既已遂宿心而覩茲上軌感寄之誠日月銘至遠法師頃恆屐宜思業精詣乾乾宵夕自非道用潛流理為神御孰以過順之年湛氣若茲之勤所以憑慰深仰謝逾絶去年夏末始見生上人示般若無知論才運清俊旨中沈允推涉聖文婉而有歸披味殷勤不能釋手真可謂浴心方等之淵而悟懷絶冥之肆者矣若令此辨遂通則般若衆流殆不言而會可不欣乎可不欣乎然夫理微者辭險唱獨者應希苟非絶言象之表者將以存象而致乖乎意謂答以緣求智之章婉轉窮盡極為精巧無所間然矣但暗者難以頓曉猶有餘疑一兩今輒題之如別想從容之暇復能粗為釋之論序云般若之體非有非無虛不失照照不失虛故曰不動等覺而建立諸法下章云異乎人者神明故不可以事相求之耳又云用即寂寂即用神彌靜應逾動夫聖心冥寂理極同無不疾而疾不徐而徐是以知不廢寂寂不廢知未始不寂未始不知故其運物成功化世之道有處有名之中而遠與無名同斯理之玄固常所彌昧者矣但今談者所疑于高論之旨欲求聖心之異為謂窮靈極數妙盡冥符邪為將心體自然靈怕獨感邪若窮靈極數妙盡冥符則寂照之名故是定慧之體耳若心體自然靈怕獨感則群數之應固以幾乎息矣夫心數既玄而孤運其照神淳化表而慧明獨存當有深證可試為辨之疑者當以撫會應機覩變之知不可謂之不有矣而論旨云本無惑取之知而未釋所以不取之理謂宜先定聖心所以應會之道為當唯照無相邪為當咸覩其變邪若覩其變則異乎無相若唯照無相則無會可撫既無會可撫而有撫會之功意有未悟幸復復誨之論云無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當夫無當而物無不當乃所以為至當無是而物無不是乃所以為真是豈有真是而是至當而非當而云當而無當是而無是邪若謂至當非常當真是非常是此蓋悟感之言本異耳固論旨所以不明也願復重喻以袪其惑矣論至日即與遠法師詳省之法師亦好相領得意但標位似各有本或當不必理盡同矣頃兼以班諸有懷屢有擊其節者而恨不得與斯人同時也高僧傳六答孟氏問有祖喪而父亡服孟氏問曰嗣子今為孟使君持重光祿喪庭便無復主位于禮云何周續之答禮無曉然之文然意謂嗣子宜兼持重正位之喪豈可闕三年正主邪又問曰若嗣子兼持重者光祿喪次親有廬邪又答曰禮之倚廬在東牆下蓋是寢苫枕凷之處非接賓位也謂寢息之所宜在親之殯宮于光祿喪庭若賓客饋奠凡是有事然後之喪所已則還廬次然今代皆以廬為接賓之位位則二處從禮之變亦宜兩設也又問葬奠之禮何先何後又答禮云父母之喪偕其葬也先輕而後重其虞也先重而後輕其葬服斬縗以例而推光祿葬及奠虞皆宜先于情則祖輕于尊則祖重並通典九十七答戴處士書見重申釋疑論辭理切驗善乎校實也但僕意猶有不同乃即欲更言所懷一日侍法師坐粗共求君意云氣力小佳當自有酬因君論旨兼有所見也僕是以不復稍厝其爝火須成旨因上君云審分命者乃是體極之人既非所同又僕所立不期存于應報而慶罰已彰亦不如君所位也書不盡言于是信矣其中小小亦多未喻付之未遇廣弘明集二十難釋疑論近見君釋疑論蓋即情之作料檢理要殆乎有中但審分命之守似未照其本耳福善莫驗亦僕所常惑雖周覽六籍逾深其滯及覩經教始昭然有歸故以先覺語當今之學者也君子為審分命所鍾可無祈驗于冥中餘慶之言存于勸教請審分命之旨為當宅情于理任而弗營邪為忘懷暗昧直置而已邪若宅情于理則理未可喻善惡紛互逆順莫檢苟非冥廢豈得弗營若直置而已則自非坐忘事至必感感因于事則情亦升降履信獲祐何能不慶為惡勿罰焉得無怨雖欲忘懷其可得乎靖求諸已其效明矣又勸教之設必傷實而動直為訓之方不可一塗而盡故或若反而後會或曉昧于為言是以塗車芻靈堂室異詔或顯其遠或徵其近今循教之徒不苟求于分表飲和之士自守足于仁義故深淺並訓而民聽不濫而神明之賾蘊于妙物豈得顯稱積善正位履霜而事與教反理與言違夷齊自得于安忍頻冉長悲于履和恐有為之言或異于此若商臣之徒教所不氶汲引之端蓋中智己還而安于懷仁不沒其身臧會以僭有後于魯國則分命所鍾于何而審元明之唱更為疑府矣是以古之君子知通否之來其過非新賢愚壽天兆明自昔楚穆以福濃獲沒蔡靈以善薄受禍郤宛以釁深莫救宋桓以愆微易唱故洗心以懷宗鍊形以聞道拔無明之沈根翳貪之滯網不祈驗于冥中而影響自徵不期存于應報而慶罰已彰故能反步極水鏡萬有但微明之道理隔常域堯孔拯其粗宜有未盡史遷造其門而未踐乎室惜其在無聞之世故永悲以窮年君既涉其津亦應不遠而得此乃幽明之所寄豈唯言論而已乖敘多年聊以代勤來論又以天地曠遠人事細近一善一惡無關冥應然則天網恢恢疏而遂失邪莫見乎隱莫顯乎微但盈換藏于日用交賖昧乎理緣故或乖于視聽耳山崩鍾應不以路遠喪感火澤革性不以同象成親詳檢數端可以少悟矣廣弘明集二十因災異上表臣聞堯生神禾而晉有蟲粟陛下自以聖德何如也御覽八百四十晉末荊州久雨粟化為蟲中郎王義興表
