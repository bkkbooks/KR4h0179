body:
  text: 張華永懷賦美淑人之妖豔因盼睞而傾城揚綽約之麗姿懷婉娩之柔情超六列于往古邁來今之清英既惠余以至歡又結我以同心交恩好之款固接情愛之分深誓中誠于曒日要執契以斷金嗟夫天道幽昧差錯繆于參差怨祿運之不遭雖義結而絶離執纏綿之篤趣守德音以終始邀幸會于有期冀容華之我俟儻皇靈之垂仁長收歡于永已藝文類聚十八北風興兮增涼北堂書鈔一百五十六歸田賦隨陰陽之開闔從時宜以卷舒冬奧處于城邑春遊放于外廬歸郟鄏之舊里託言靜以間居育草木之藹蔚因地勢之丘墟豐蔬果之林錯茂桑麻之紛敷用天道以取資行藥物以為娛時逍遙于洛濱聊相佯以縱意目白沙與積礫玩衆卉之同異揚素波以濯足泝清瀾以蕩思低徊住留棲遲菴藹存神忽微遊精域外藉纖草以為茵援垂陰以為蓋瞻高鳥之陵風臨鯈魚于清瀨眇萬物而遠觀修自然之通會以退足于一壑故處否而忘泰藝文類聚三十六朽社賦高柏橋南大道傍有古社槐樹蓋數百年木也余少居近之後去行路遇之則已朽意有緬然輒為之賦因以言衰盛之理云爾伊茲槐之挺植于京路之東隅得託尊于田主據爽塏以高居垂重陰于道周臨大路之通衢饗春秋之所報應豐胙于無射歷漢京之康樂踰喪亂之橫逆朱夏當陽蓊藹蕭森征夫雲會行旅歸心輶軒停蓋輕輿託陰吉人向風而袪袂王孫清嘯而啓襟晞甘棠之廣覆褊喬木之無陰藝文類聚三十九御覽五百三十二感婚賦并序感婚賦并序方今歲在己巳將次四仲婚姻者競赴良時粲麗之觀相繼于路雖葩英肯顧嫁娶之會不乏平日乃作感婚賦曰彼婚姻之俗忌惡當梁之在斯逼來年之且至逮星紀之未移窈窕初茂玉質始盛容華外豐心神內正接軫連騎隱隱習習充街塞里暉曜城邑相麗姿之綽約兮遙髣佛以感心怨佳人之幽翳兮恨檢防之高深藝文類聚四十初學記十相風賦并序相風賦并序太史候部有相風在西城上而作者弗為豈以其託處幽間違衆特立無羽毛之飾而丹漆不為之容乎御覽九蓋在先聖道濟生人擬議天地錯綜明神在璿璣以齊七政象渾儀于陶鈞考古旁于六氣仰貞觀于三辰爰在保章世序其職辨風候方必立唯極循物致用器不假飾眇修幹之迢迢淩高墉而莖植玄鳥偏其增翥睎雲霄而矯翼嘉創制之窮理諒器淺而事深步元氣于尋木寄先識于茲禽既在高而想危又戒險而自針雖回易之無常終守正而不淫永恪立以彌世志淹滯而愈新超無返而特存差偶景而為鄰藝文類聚六十八鷦鷯賦并序鷦鷯賦并序鷦鷯小鳥也生于蒿萊之間長于藩籬之下翔集尋常之內而生生之理足矣色淺體陋不為人用形微處卑物莫之害繁滋族類乘居匹遊翩翩然有以自樂也彼鷲鶚鵾鴻孔雀翡翠或淩赤霄之際或託絶垠之外翰舉足以沖天觜距足以自衛然皆負矰嬰繳羽毛入貢何者有用于人也夫言有淺而可以託深類有微而可以喻大故賦之云爾何造化之多端兮播群形于萬類惟鷦鷯之微禽兮亦攝生而受氣育翩翾之陋體無玄黃以自貴毛弗施于器用肉弗登于俎味鷹鸇過猶俄翼尚何懼于罿罻翳薈蒙籠是焉遊集飛不飄揚翔不翕習其居易容其求易給巢林不過一枝每食不過數粒棲無所滯遊無所盤匪陋荊棘匪榮茝蘭動翼而逸投足而安委命順理與物無患伊茲禽之無知何處身之似智不懷寶以賈害不飾表以招纍靜守約而不矜動因循以簡易任自然以為資無誘慕于世偽雕鶡介其觜距鵠鷺軼于雲際鵾雞竄于幽險孔翠生乎遐裔彼晨鳧與歸鴈又矯翼而增逝咸美羽而豐肌故無罪而皆斃徒銜蘆以避繳終為戮于此世蒼鷹鷙而受緤鸚鵡惠而入籠屈猛志以服養塊幽縶于九重變音聲以順旨思摧翮而為庸戀鍾岱之林野慕隴坻之高松雖蒙幸于今日未若疇昔之從容海鳥鶢鶋避風而至條枝巨雀踰嶺自致提挈萬里飄颻逼畏夫唯體大妨物而形瓌足瑋也陰陽陶蒸萬品一區巨細舛錯種繁類殊鷦螟巢于蚊睫大鵬彌乎天隅將以上方不足而下比有餘普天壤以遐觀吾又安知大小之所如文選藝文類聚九十二王公上壽酒食舉樂歌詩表案魏上壽食舉詩及漢氏所施用其文句長短不齊未皆合古蓋以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近所能改二代三京襲而不變雖詩章詞異興廢隨時至其韻逗曲折皆繫于舊有由然也是以一皆因就不敢有所改易宋書樂志一通典一百四十一又略見隋書音樂志下晉文王諡議殊位盛禮實隆明德班爵崇寵亦光茂勳至于表名贈號世考洪烈冠聲無窮者莫尚于號諡也論功高于禹稷比德邁于伊周藝文類聚四十封禪議太康元年九月庚寅尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉實司空張華等奏曰聖德隆茂光被四表諸夏乂清幽荒率從神策廟算席卷吳越孫皓稽顙六合為家巍巍之功格于天地宜同古典敕封東嶽告三府太常為儀制宋書禮志三瓘等又奏臣聞肇自生民則有后辟載祀之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沈淪寂寞曾無遺聲者不可勝記自黃帝以前古傳昧略唐虞以來典謨炳著三王代興體業繼襲周道既沒秦氏承之至于漢魏而質文未復大晉之德始自重黎實佐顓頊至于夏商世序天地其在于周不失其緒金德將升世濟明聖外平蜀漢海內歸心武功之盛實由文德至于陛下受命踐阼弘建大業群生仰育唯獨江湖沅湘之表凶桀負固歷代不賓神謀獨斷命將出討兵威暫加數旬蕩定羈其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達于四極雖黃軒之征大禹遠略周之奕世何以尚今若夫玄石素文底號前載象以姓表言以事告雖河圖洛書之徵不是過也加以騶虞麟趾衆瑞並臻昔夏殷以丕崇為祥周武以烏魚為美咸曰休哉然符瑞之應備物之盛未有若今之富者也宜宣大典禮中嶽封泰山禪梁父發德號明至尊享天休篤黎庶勒千載之表播流後之聲俾百代之下莫不興起斯帝王之盛業天人之至望也晉書禮志下宋書禮志三又略見藝文類聚三十九引張華議御覽五百三十六引張華封禪議又初學記十三引張華封禪儀凡兩條儀或議之誤又陸雲集與兄機書云頃得張公封禪事明此六奏皆張華所撰張溥本僅載藝文類聚御覽數十字瓘等又奏曰今東漸于海西被于流沙大漠之陰日南北戶莫不通屬芒芒禹迹今實過之則天人之道已周巍巍之功已著宜有事梁父修禮地祇登封泰山致誠上帝以答人神之願也乞如前奏晉書禮志下宋書禮志三瓘等又奏曰臣聞處帝王之位者必有歷運之期天命之應濟生民之大功者必有盛德之容告成之典無不可誣有不敢讓自古道也而明詔謙沖屢辭其禮雖盛德攸在推而未居夫三公職典天地實掌民物國之大事取議于此故漢氏封禪非是官也不在其事臣等前奏蓋陳祖考之功天命之應陛下之德合同四海述古考今宜修此禮至于克定盛月須五府上議然後奏聞請寫詔及奏如前下議晉書禮志下宋書禮志三瓘等又奏臣聞唐虞三代濟世弘功之君莫不仰答天心俯協民志登介丘履梁父未有辭焉者蓋不可讓也今陛下勳高百王德無與二茂績弘規巍巍之業固非臣等所能究論而聖旨勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞神祇之款望使大晉之典謨不同風于三五臣等誠不敢奉詔請如前奏施行晉書禮志下宋書禮志三冬王公有司又奏自古聖明光宅四海封禪名山著于史籍作者七十四君矣舜禹之有天下也巡狩四嶽躬行其道易著觀民省方禮有升中于天詩頌陟其高山皆載在方策文王為西伯以服事殷周公以魯藩列于諸侯或享于岐山或有事泰山徒以聖德猶得為其事自是以來功薄而僭其義者不可勝數號諡不泯以至于今況高祖宣皇帝肇開王業海外有截世宗景皇帝濟以大功輯寧區夏太祖文皇帝受命造晉蕩定蜀漢陛下應期龍興混一六合澤被群生威震無外昔漢氏失統吳蜀鼎峙兵興以來近將百年地險俗殊民望絶塞以為分外其日久矣大業之隆重光四葉不羈之寇二世而平非聰明神武先天弗違孰能巍巍其有成功若茲者歟臣等幸以千載得遭運會親服大化目覩太平至公至美誰與為讓宜祖述先朝憲章古昔勒功岱嶽登封告成弘禮樂之制正三雍之典揚名萬世以顯祖宗是以不勝大願敢昧死以聞請告太常具禮儀復上晉書禮志下宋書禮志三廢楊太后議夫婦之道父不能得之于子子不能得之于父皇太后非得罪于先帝者也今黨其所寵為不母于聖世宜依漢廢趙太后為孝成后故事貶太后之號還稱武皇后居異宮以全貴終之意晉書張華傳又見武悼楊后傳黨其所寵作黨惡所親居異宮作處之離宮移書太常薦成公綏竊見處士東郡成公綏年二十五字子安體圭璋之質資不器之量知深慮明足以妙見研思篤好則仲舒之精引之下缺世貞幹足以敦風篤俗淵才達學足以弘道世教固逸倫之殊俊搢紳之檢式也御覽六百三十二引文士傳報雷煥書詳觀劍文乃干將也莫邪何復不至雖然天生神物終當合耳晉書張華傳雷煥為豐城令于縣獄屋基堀得石函中有雙劍並刻題一曰龍泉一曰太阿煥送一劍與華留一劍自佩華報書與褚陶書二陸龍躍于江漢彥先鳳鳴于朝陽自此以來常恐南金已盡而復得之于吾子故知延州之德不孤淵岱之寶不匱世説賞譽篇注引褚氏家傳答某書得書為慰僕諸惛疾已甚暫西臥歸還乃悉比將念反不具張華呈淳化閣帖二甲乙問甲娶乙為妻後又娶景匿不説有乙居家如二嫡無有貴賤之差乙亡景之子當何服本實並立嫡庶不殊雖二嫡非正此失在先人人子何得專制析其親也若為庶母服又不成為庶進退不知所從晉書禮志中博物志序余視山海經及禹貢爾雅説文地志雖曰悉備各有所不載者作略説出所不見粗言遠方陳山川位象吉凶有徵諸國境界犬牙相入春秋之後並相侵伐其土地不可具詳其山川地澤略而言之正國十二博物之士覽不卸焉博物志宋連江葉氏本以此為序地理讚地理廣大四海八方遐遠別域略以難詳侯王設險守固保疆遠遮川塞近備城隍司察姦非禁禦不良勿恃危厄恣其淫荒無德則敗有德則昌安屋猶懼乃不可亡進用忠良社稷永康教民以孝舜化以彰博物志一大司農針家有廬井王有廩籍阜茂豐物和鈞關石在周之季不虔政首棄稷弗務不籍千畝匱神乏祀敗于戎醜穡臣司農敢告左右藝文類聚四十九初學記十二尚書令針明明先王開國承家作制垂憲仰觀列曜俯令百官政用罔愆昔舜納大麓七政以齊內成外平而風雨不迷山甫翼周靡剛靡柔補我衮職闡我王猷王猷允塞而四海咸休雖曰聖明必賴良材無曰我智官不任能發言如絲其出成綸千里之應樞機在身王季道缺天網縱替既無老成改舊法制法制不修不長厥裔尚臣司臺敢言侍衛初學記十一女史針茫茫造化二儀始分散氣流形既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正而王猷有倫婦德尚柔含章貞吉嫟婉淑慎正位居室施襟結褵處宮中饋肅慎爾儀式瞻親懿樊姬感莊不食鮮禽衛女矯桓耳忘和音志厲義高而二主易心玄熊攀檻馮媛趨進夫豈無畏知死不吝班妾有辟割歡同輦夫豈不懷防微慮遠道罔隆而不殺物無盛而不衰日中則昃月滿則虧崇猶塵積替若駭機人咸知飭其容而莫知飭其性性之不飭或愆禮正斧之藻之克念作聖出其言善千里應之苟違斯義則同襟以疑夫出言如徵榮辱由茲勿謂幽昧靈鑒無象莫謂玄漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒于小星戒彼攸遂此心螽斯則繁爾類歡不可以黷寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翩以取尢冶容求好君子所讎結息而絶職此之由故曰翼翼矜矜所福以興靖恭自思所期榮顯女史司針敢告庶姬御覽一百三十五文選又見藝文類聚十五初學記十皆刪節杖針杖道不正陷墜傾危書鈔一百三十三倚几銘倚几之設設而不倚作器于此成禮于彼北堂書鈔一百三十三御覽七百十席前左端銘安樂必敬上珍大道坦坦在人北堂書鈔一百三十三席前右端銘行莫若居莫若正行處止恆修理俟命同上章懷皇后誄自天陶靈必有徵祥誕在初載亦曜神光顯應天祿聿嬪聖皇受氣自然實聽清和內含茂質外發英華身處宸極敬恭惟夙窈窕淑媚柔順婉穆宣慈內政流化太微六宮變雅清我壼闈經綸庶屬積思萬機既臻緝熙玄澤流衍將翼我后登封降禪氛祲告妖沈結彌留奄忽升遐棄世高遊聖上哀懷感切悼心率土縞素遏密八音眇眇遊靈將焉所之容光幽邁豈有反期杳杳新宮下絶三泉茫茫陵域合體中原委棄暉章即安太清藝文類聚十五烈文先生鮑玄泰誄於鑠烈文續蕤皇祚夏后基命靈根已固杞鄫既微枝離葉布爰暨叔牙世贊齊風翼桓濟管遂登霸功越在漢隆三司並縱烈考中丞妙世顯名峨峨先生誕資英俊淑質清淳蘭芳玉潤抗行崇邈遊心大順允文允明聰昭秀哲啓冥演幽守文命世抱道沖虛執義貞厲棲遲無悶不營不忮擬志雲霄致命窮達行為範軌言成隱括宜登遐年弘此徽猷濟濟搢紳永挹清流取識遺音目想表儀孰云玄泰曾不我知感傷慷慨揮涕滲澌已矣鮑子寧爾玄陰振聲竹帛永播徽音藝文類聚三十七魏劉驃騎誄昔在殷周惟伊惟呂穆穆公侯紹茲勳緒如何上天殲我鼎輔金剛玉潤水潔冰清郁郁文彩煥若朝榮功遂身退致仕懸輿志邈留侯心邁二疏風凜凜以翼衡雲霏霏以承蓋旐聯翩以飄颻旌繽紛以奄薄藝文類聚四十八武帝哀策文感大饗之無虧哀樽俎之虛設叩龍輴以長叫痛靈暉之潛逝其辭曰欽惟皇考體道之真德侔乾坤齊曜三辰應期登禪協于天人上虔郊祀下惠兆民憲章唐虞允得其津搜揚仄陋故老是賓百揆時序盛業日新恩從雲翔威猶霆震江海靜波岷嶽無塵四夷率服莫不來臣肅慎奉貢越裳效珍化此弊俗歸之至淳昔在上聖咸享百年哀哀皇考用不是臻遘厲彌侵景命殞顛舍此昭晰即彼幽玄仰瞻靡怙廓若無天終制尚儉率由典度華幕弗陳器必陶素不封不樹所在惟固貽法來世是則是慕大隧既啓吉日將征鍾鼓雷震白虎抗旌龍螭驤首良駟悲鳴倡者振鐸挽夫齊聲背此崇殿將適下庭玄宮窈窕修夜冥冥光燈永戢幽闥長扃仰訴皇穹零淚屏營云誰能忍寄之我情結心墳隴永憑聖靈藝文類聚十三元皇后哀策文天地配序化成兩儀王假有道義在伉儷薑嫄佐嚳二妃興媯仰觀古藉覬亦同規今胡不然景命夙虧嗚呼哀哉我膺曆運臨統萬方正位于內實在嬪嬙天作之合駿發其祥河嶽降靈啓祚華陽奕世豐衍朱紱斯皇纘女惟行受命溥將來翼家邦憲度是常緝熙陰教德聲顯揚昔我先妣暉暉休光后承前訓奉述遺芳宜嗣徽音繼序無荒如何不弔背世隕喪瑤齊無住長去蒸嘗追懷永悼率土摧傷嗚呼哀哉陵兆既宅將遷幽都霄陳夙駕元妃其徂宮門遏密階庭永虛設祖屬紼告駕啓途法服翬褕寄象容車金輅暗藹帷裳不舒千乘動軫六驥踟蹰銘旌樹表翣柳雲敷祁祁同軌岌岌蒸徒孰云不懷哀感萬夫寧神虞旃安體玄廬土房陶簋齊制遂初依行紀諡聲被八區雖背明光亦歸皇姑沒而不朽世德作謨嗚呼哀哉藝文類聚十五晉書武元楊后傳縱橫篇蘇秦始與儀同學鬼谷先生辨説剖毫釐變詐入無形巧言惑正理人主莫不傾聽御覽四百六十四
