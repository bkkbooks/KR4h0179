body:
  text: 卷一百六十六闕名修行道地經翻譯記罽賓文士竺侯御若性純厚樂道歸尊好學不倦真為上儒也齎此經本來至燉煌是時月支菩薩沙門法護德素智博所覽若淵志化末進誨人以真究天竺語又暢晉言於此相值共演之其筆受者菩薩弟子沙門法乘月氏法寶賢者李應榮承索烏子剡遲時通武支晉支晉寶等三十餘人咸共勸助以太康五年二月二十三日始訖正書寫者榮攜業侯無英也其經上下二十七品分為六卷向六萬言於是衆賢各各布置釋藏終八放光經記惟昔大魏潁川朱士行以甘露五年出家學道為沙門山塞西至于闐國寫得正品梵書梵本九十章六十萬餘言以太康三年遣弟子弗如檀晉字法饒送經梵本至洛陽住三年復至許昌二年後至陳留界倉垣水南寺以元康元年五月十五日衆賢者共集議晉書正寫時執楓本者于闐沙門無叉羅優婆塞竺叔蘭口傳祝太玄周玄明共筆受正書九十章凡二十萬七千六百二十一言時倉垣諸賢者等大小相勸助供養至其年十二月二十四日寫都訖經義深奧又前後寫者參校不能善悉至太安二年十一月十五日沙門竺法寂來至倉垣水北寺求經本寫時檢取現品五部并梵本與竺叔蘭更共考校書寫永安元年四月二月訖於前後所寫校最為差定其前所寫可更取校晉梵音訓暢義難通諸開士大學文生書寫供養諷誦讀者願留三思恕其不逮也釋藏跡七須真天子經記須真天子經太始二年十一月八日於長安青門內白馬寺中天笠菩薩曇摩羅察口授出之時傳言者安文惠帛元信手受者聶承遠張玄伯孫休達十二月三十日未時訖同上普曜經記普曜經永嘉二年太歲在戊辰五月本齊菩薩沙門法護在天水寺手執梵本口宣晉言時筆受者康殊帛法炬同上賢劫經記賢劫經永康元年七月二十一日月支菩薩竺法護從罽賓沙門得是賢劫三昧手執口宣時竺法友從洛寄來筆受者趙文龍使其功德福流十方普遂蒙恩離於罪蓋其是經者次見千佛稽受道化受菩薩決致無生忍至一切法十方亦爾同上首楞嚴後記咸和三年歲在癸酉涼州刺史張天錫在州出此首楞嚴經於時有月支優婆塞支施崙手執梵本支博綜衆經於方等三昧特善其志業大乘學也出首楞嚴須賴上金光首如幻三昧時在涼州州內正聽堂湛露軒下集時譯者龜茲王子世帛延善晉梵音延博解群籍內外兼綜受者常侍西海趙潚會水令馬亦內侍來恭政此三人皆是俊德有心道德時在坐沙門釋慧常釋進行涼州自屬辭辭旨如本不加文飾飾近俗質近道文質兼唯聖有之耳同上阿維越致遮經記大康五年十月十四日菩薩沙門法護於燉煌從龜茲副使羌子侯得此梵書不退轉法輪經口敷晉言授沙門法乘使流布一切咸悉聞知同上魔逆經記太康十年十二月二日月支菩薩法護手執梵書口宣晉言聶道真筆受於洛陽城西白馬寺中始出析顯元寫使功德流布一切蒙福度脫同上聖法印經記元康四年十二月二十五日月支菩薩沙門法護於酒泉演出此經弟子竺法首筆受令此深法普流十方大乘常住同上文殊師利淨律經記經後記云沙門竺法護於京師遇西國寂志誦出此經經後尚有數品其人忘失輒宣現者轉之為晉更得其本補令具足太康十年四月八日白馬寺中聶道真對筆受勸助劉元謀傅公信侯彥長等同上正法華經記太康七年八月十日燉煌月支菩薩沙門法護手執梵經口宣傳出正法華經二十七品授優婆塞聶承遠張仕明張仲政共筆受竺德成竺文盛嚴威伯續文承趙叔初張文龍陳長玄等共勸助觀喜九月二日訖天竺沙門竺力龜茲居士帛元信共參校元年二月六日重覆又元康元年長安孫伯虎以四月十五日寫素解釋藏跡八正法華經後記永熙元年八月二十八日比丘康那律於洛陽寫正法華品竟時與清戒戒節優婆塞張季博董景玄劉長武長文等手執經本詣白馬寺對與法護口校古訓講深義以九月大齊十四日於東牛寺中施檀大會講誦此經竟日盡夜無不咸歡重已校定同上持心經記持心經太康七年三月十日燉煌開士竺法護在長安說出梵文授承遠同上六卷泥洹記摩竭提國巴連弗邑阿育王塔天王精舍優婆塞伽羅先見晉土道人釋法顯遠遊此土為求法故深感其人即為寫此大般泥洹經如來祕藏願令此經流布晉土一切衆生悉成平等如來法身義熙十三年十月一日於謝司空石所立道場寺出此方等大般泥洹經至十四年正月一日校定盡訖禪師佛大跋陀手執梵本寶雲傳譯於時座有二百五十人同上二十卷泥洹記智猛傳云毗邪離國有大小乘學不利同帝利城次華氏邑有婆羅門氏族甚多其稟性敏悟歸心大乘博覽衆典無不通達家有銀塔縱廣八尺高三丈四龕銀像高二尺餘多有大乘經種種供養婆羅門問猛言從何來答言秦地來又問秦地有大乘學不即答皆大如來大哀經記元康元年七月七日燉煌菩薩支法護手執梵經經名如來大哀口授聶承遠道真正書晉言以其年八月二十三日訖護親自覆校當令大法光顯流布其有覽者疾得總持暢澤沙法釋藏跡九文殊師利發願經記晉元熙二年歲在庚申於揚州鬭場寺禪師新出云外國四部衆禮佛時多誦此經以發願求佛道同上僧伽羅剎集經後記大秦建元二十年十一月三十日罽賓比丘僧伽跋澄於長安石羊寺口誦此經及毗婆沙佛圖羅剎翻譯秦言未精沙門釋道安朝賢趙文業研核理趣每存妙盡遂至留連至二十一年二月九日方訖且婆須蜜經及曇摩難提口誦增一阿含并幻網經使佛念為譯人念乃學通內外才辨多奇常疑西域言繁質謂此士好華每存瑩飾文句減其繁長安公趙郎之所深疾窮校考定務存典骨既方俗不同計其五失梵本出此以外豪不可差五失如安公大品序所載余既預衆末聊記卷後使知釋趙為法之至釋藏跡十大智論記究摩羅耆婆法師以秦弘始三年歲在辛丑十二月二十日至常安四年夏於逍遙園中西門閣上為姚天王出釋論七年十二月二十七日乃訖其中兼出經本禪經戒律百論禪法要解向五十萬言并此釋論一百五十萬言論初品三十四卷解釋一品是全論其本二品已下法師略之取其要足以開釋文意而已不復備其廣釋得此百卷若盡出之將十倍於此同上三法度經記比丘釋僧伽先志願大乘學二藏摩訶鞞邪伽蘭兼通一切書記此三法度三品九真度撰記出此經持此福祐一切衆生令從苦得安見諦解脫同上八楗度阿毗曇根楗度後別記斯經序曰其人忘因緣一品故闕文焉近自罽賓沙門曇摩卑暗之來經蜜川僧伽禘婆譯出此品八楗度文具也而卑云八楗度是體耳別有六足可自百萬言卑誦二足今無譯可出慨恨良深秦建元十五年正月十九日於揚州瓦官佛圖記同上成實論記大秦弘始十三年歲次豕韋九月八日尚書令姚顯請出此論至來年九月十五日訖外國法師抱摩羅耆婆手執梵本口自傳譯曇晷筆受釋藏百一菩薩波羅提木叉後記夫窮像於玄原之無始萬行始於戒信之玄兆是故天竺鳩摩羅什法師心首持誦什言此戒出梵網經中而什法師少玩大方齊異學於迦夷淳風東扇故弘始三年秦王道契百王之業奉心大法於逍遙觀中三千學士與什參定大小乘經五十餘部唯菩薩十戒四十八輕最後誦此時融影三百人等一時受行修菩薩道豈唯當時之益乃有纍劫之津也故慧融書三千部流通於後代持誦相授屬諸後學好道之君子願末劫不絶共見千佛龍華同坐同上關中近出尼二種壇文夏坐雜十二事并雜事共卷前中後三記卷初記云太歲己卯鶉火之歲十一月十一日在長安出此比丘尼大戒其月二十六日記僧純於龜茲佛陀舌彌許戒本曇摩侍傳佛今執梵慧常筆受卷中閒尼受大戒法後記云此土無大比丘尼戒乏斯一部僧法久矣吳土雖有五百戒比丘尼戒是覛歷所出尋之殊不似聖人所制法汰道林聲鼓而攻之可謂匡法之棟梁也法汰去年亦令外國人出少許復不足慧常涼州得五百戒一卷直戒戒復之似人之所作其義淺近末及僧純曇充拘夷國來從雲慕藍寺於高德沙門佛圖舌彌許得此比丘尼大戒及授戒法受坐己下至劍慕法遂令佛圖卑為譯曇摩侍傳之乃知真是如來所制也而不止于百數比丘戒有二百六十問侍所以言莫知其故也然以理推之二百五十及五百是舉全數耳又授比丘尼大戒文少將即用授大比丘法而出其異也八簸賴夷無二亦當依此足之耳亦當略授十七僧迦衛尸沙一章心又授比丘尼大戒尼三師教授師更與七尼壇外問內法壇外問內法於事為重故外國師云壇外問當言正爾上場僧中當問汝汝當爾答壇上問則言今衆僧中問汝也正爾令曇充還拘夷訪授比丘尼大戒定法須報以為式也授六法文無乏也二師而已無教授師也卷後又記云秦建元十五年十一月五日歲在鶉尾比丘僧純曇充從丘慈高德沙門佛圖舌彌許得此授大比丘尼戒儀及二歲戒儀從受坐至屬授諸雜事令曇摩侍出佛圖卑為譯慧常筆受凡此諸事是所施行之急者若為人師而不練此此無異於土牛後人也涼州道人竺道曼於丘茲恩此異事來與燉煌道人此沙門各各所住祠或二百或三百人為一部僧比丘尼向三百人凡有五祠各各從所使僧祠依準為界內無共說戒法也常暮說戒說戒之日比丘尼差二人往白所依僧云今日當說戒僧即差二人往詣比丘尼僧知人數還白大僧云比丘尼凡有若干於某祠清淨說戒普共聞知如是三白比丘便便自共行籌說戒如法僧事七月十五日各於所止處受歲如法遣三人詣所依僧承受界分齊耳其餘如僧法比丘尼當三受戒五百戒比丘尼滿十二歲乃中為師初受十戒時索二女師當使持律沙門授戒乃付女師令教道之次受二百五十戒滿二十直使女三師授之耳威儀俯仰如男子受戒法無異也受戒後周手無誤失乃得受戒五百戒後受戒時三師七僧如中受時直使前持律師更授二百五十事合前為五百耳直授之不如中受時問威儀委曲也戒文如男子戒耳事事如之無他異也同上正誣論有異人者誣佛曰尹文子有神通者愍彼胡狄古狄父子聚麀貪婪忍害昧利無恥侵害不厭屠裂群生不可遜讓厲不可談議喻故具諸事云云又令得道弟子變化云云又禁其殺生斷其婚姻使無子孫伐胡之術孰良於此云云正曰誣者既云無佛復云文子有神通有復云有得道弟子能變化恢廓盡神妙之理此真有胸無心之語也夫尹文子即老子弟子老子即佛弟子也故其經云聞道竺乾有古先生善入泥洹不始不終永存綿綿竺乾者天竺也泥洹者梵語晉言無為也若佛不先老子何得稱先生老子不先尹文何故請道德之經邪以此推之佛故文子之祖宗衆聖之元始也安有弟子神化而師不能乎且夫聖之宰世必以道蒞之遠人不服則綏以文德不得已而用兵耳將以除暴止戈拯濟群生行小殺以息大殺者也故春秋之世諸侯征伐動仗正順敵國有釁必鳴鼓以彰其周總義兵以臨罪人不以暗昧而行誅也故服則禾柔而撫之不苟淫刑極武勝則以喪禮居之殺則以悲哀泣之是以深貶誘執大杜絶滅之原若懷惡而討不義假道以成其暴皆經傳變文譏貶纍見故會宋之盟抑楚而先晉者疾衷甲之詐以崇咀信之美也夫敵之怨惠不及後嗣惡止其身四重罪不濫此百王之明制經國之令典也至於季末之將佳兵之徒患道薄德衰始任詐力競以譎詭之計濟殘賊之心野戰則肆鋒極殺屠城則盡坑無遺故白起刎首於杜邸董卓屠身於宮門君子知其必亡舉世哀其灰戮兵之弊也遂至於此此為可痛心而長歎者矣何有聖人而欲大縱陰毒翦絶黎元者哉且十室容賢而況萬里之廣重華生於東夷文命出乎西羌聖哲匠興豈有常地或發音於此默化於彼形教萬方而理運不差原夫佛之所以夷迹於中嶽而曜奇於西域者蓋有至趣不可得而縷陳矣豈有聖人疾敵之強而其欲覆滅使無孑遺哉此何異氣厲殷流不蠲良淑縱火中原蘭蕕俱焚桀紂之虐猶將不然乎縱令胡國信多惡逆以暴易暴又非權通之旨也引此為辭適足肆謗言眩愚豎豈允情合義有心之難乎又誣云尹文子欺之天有三十二重云云又妄牽樓炭經云諸天之宮廣長二十四萬里面開百門門廣萬里云云正曰佛經說天地境界高下階級悉條貫部分敘而有章而誣者或附著生長枉造僞說台顛倒淆亂不得要實何有二十四萬里之地而容四百萬里之門乎以一事覆之足明其錯謬者多矣臧獲牧豎猶將知其不然況有識乎欲以見博祗露其愚焉又誣云佛亦周遍五道備犯衆過行凶惡猶得佛此非怖為惡者之法也又計生民善者少而惡者多惡人死輒充六畜爾則開闢至今足為久矣今畜宜居十分之九而人種已應希矣正曰誠如所言佛亦曾為惡耳今所以得佛者改惡從善故也若長惡不悛迷而後遂往則長夜受苦輪轉五道而無解脫之由矣今以其能掘衆惡之栽滅三毒之燼修五戒之善盡十德之美行之纍劫倦而不已曉了本際三世空故能解生死之虛外無為之場耳計天下昆蟲之數不可稱計人本之在九州之內若毫未之在馬體十分之九豈可言哉故天地之性以人為貴榮期所以自得於三樂達貴賤之分明也今更不復自賴於人類不醜惡於畜生以芻水為甘膳以羈絡為非謫安則為之無所多難也又誣云有無靈下經無靈下經妖怪之書耳非三墳五典訓誥之言也通才達儒所未究覽也三曾五祖之言又似解奏之文此殆不詰而虛妄自露矣今且聊復志之凡俗人常謂人死則滅無靈無鬼然則無靈則無天曹無鬼則無所收也若子孫奉佛而乃追譴祖先祖先或是賢人君子平生之時未必與子孫同事而天曹便收伐之令頻冉之尸羅枉戮之痛仁慈祖考加虐毒於貴體此豈聰明正直之神乎若其非也則狐貉魍魎淫厲之鬼何能反制仁賢之靈而困禁戒之人乎以此為誣鄙鄙醜書矣又誣云道人聚斂百姓大搆塔寺華飾奢侈糜費而無益云云正曰夫教有深淺適時應物悉已備於首論矣請復伸之夫恭儉之心莫過堯舜而山龍華蟲黼黻絺繡故傳曰鍚鸞和鈴昭其聲也三辰旗旗昭其明也五色比象昭其物也故王者之居必金門玉陛靈臺鳳闕將使異乎凡庶令貴賤有章也夫人情從所覩而興感故聞鼓鼙之音覩羽麾之象則思將帥之臣聽琴瑟之聲觀庠序之儀則思朝廷之臣遷地易觀則情貌俱變令悠悠之徒見形而不及道者莫不貴崇高而忽仄陋是以諸奉佛者仰慕遺迹思存髣佛故銘列圖像玫其虔肅割捐珍玩以增崇靈廟故上士遊之則忘其蹄筌取諸遠味下士遊之則美其華藻玩其炳蔚先悅其耳目漸率以義方三塗汲引莫有遺蹟猶器之取水隨量多少唯穿底無當乃不受耳又專誣以禍福為佛所作可謂元不解矣聊復釋之夫吉凶之與善惡猶善惡之乘形聲自然而然不得相免也行之由已而理玄應耳佛與周孔但共明忠孝信順從之者吉背之者凶示其渡水之方則使資舟楫不能令步涉而得濟也其謂誨人之法救厄死之術亦猶神農唱粒食以充饑虛黃帝垂衣裳以禦寒暑若閉口而望飽裸袒以求溫不強與之也夫扁鵲之匠以稱良醫者以其應疾投藥不失其宜耳不責其令有不死之民也且扁鵲有云吾能令當生者不死不能令當死者必生也若夫為子則不孝為臣則不忠乎守高肓而不悟進良藥而不御而受禍臨死之日更多咎聖人深恨良醫非徒東走其勢投穽矣又誣云沙沙門之在京洛者多矣而未曾聞能令主上延年益壽上不能調和陰陽使年豐民富消菑卻疫克靜禍亂云云下不能休糧絶粒呼吸清醇扶命度厄長生視云云正曰不然莊周有云達命之情者不務命之無奈何審期分之不可遷也若令性命可以智德求之者則發旦二子足令文父致千齡矣顏子死則稱天喪豫惜之至也無以延之耳且陰陽數度期運所當百六之極有時而臻故堯有滔天之洪湯有赤地之菑涿鹿有漂櫓之血坂泉有棋野之尸何不坐而消之救其未然邪且夫熊經鳥曳導引吐納輟黍稷而御英蕊吸風靈以代餱糧俟此而壽有待之倫也斯則有時可夭不能無窮者也沙門之視松喬若未孩之兒耳方將抗志於二儀之表延祚於不死之鄉豈能屑心營近與涓彭爭長古難者苟欲騁飾非之辨立距諫之強言無節奏義無宮商嗟夫北里之亂雅惡緣之奪黃也其餘噪之音曾無紀綱一遵先師不答之章又誣云漢末有笮融者合兵依徐州刺史陶謙謙使之督運而融先事佛遂斷盜官運以自利入大起佛寺云云行人悉酒食云云後為劉繇所攻見殺云云正曰此難不待繩約而自縛也夫佛教率以慈仁不殺忠信不愆廉貞不盜為首老子云兵者不祥之器邇者凶而融阻兵安忍結附寇逆犯殺一也受人使命取不報主犯欺二也斷割官物以自利入犯盜三也佛經云不以酒為惠施而融縱之犯酒四也諸戒盡犯則動之死地矣譬猶吏人解印脫冠而橫道肆暴五尺之童皆能制之矣笮氏不得其死適足助明為惡者之獲殃耳又誣云石崇奉佛亦至而不免族誅云云正曰石崇之為人余所悉也憍盈耽酒放僭無度多藏厚斂不恤惸獨論才則有一割之利計德則盡無取焉雖託名事佛而了無禁戒即如世人貌清心穢色厲內荏口詠禹湯而行偶桀跖自貽伊禍又誰之咎乎又誣曰周仲智奉佛亦精進而竟復不蒙其福云云正曰尋斯言似乎幸人之菑非通言也仲智雖有好道之意然意未受戒為弟子也論其率情亮直具涉攜上自是可才而有強梁之纍未合道家嬰兒久旨矣以此而遇忌勝之雄喪敗理耳縱如難者之言精進而遭害者有矣此何異顏項夙夭夷叔餒死比干盡忠而陷割心之禍申生篤孝而致雉經之痛若此之比不可勝言孔子曰仁者壽義者昌而復有不免固知宿命之證至矣信矣又誣云事佛之家樂死惡生屬纊待絶之日皆以為福祿之來而無哀戚之容云云正曰難者得無隱心而居物不然何言之逆乎夫佛經自謂得道者能玄同彼我渾齊短修涉生死之變然泯然無概步禍福之地而夷心不怛樂天知合安時處順耳其未體之者哀死慎終之心乃所以增其篤也故有大悲宏誓之義讎人之喪猶如哀矜以德報怨不念舊惡況乎骨肉之痛情隆自然者而可以無哀戚之心者哉夫愛親者不敢惡於人恐疇已之深也逆情違道於斯見矣弘明集一載此文於牟子理惑論後無撰人名
