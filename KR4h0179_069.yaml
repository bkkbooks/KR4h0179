body:
  text: 卷六十九夏侯湛抵疑當路子有疑夏侯湛者而謂之曰吾聞有其才而不遇者時也有其時而不遇者命也吾子童幼而岐嶷弱冠而箸德少而流聲長而垂名拔萃始立而登宰相之朝揮翼初儀而受卿尹之舉蕩典籍之華談先王之言入閶闔躡丹墀染彤管吐洪輝干當世之務觸人主之威有效矣而官不過散郎舉不過賢良鳳棲五朞龍蟠六年英耀禿落羽儀摧殘而獨雍容藝文蕩駘儒林志不輟箸述之業口不釋雅頌之音徒費情而耗力勞神而苦心此術亦以薄矣而終莫之辨宜吾子之陸沈也且以言乎才則吾子優矣以言乎時則子之所與二三公者義則骨肉之固交則明道之觀也富于德貴于官其所發明雖叩牛操築之客傭賃抱關之隸負俗懷譏之士猶將登為大夫顯為卿尹于何有寶咳唾之音愛錙銖之力向若垂一鱗回一翼令吾子攀其飛騰之勢挂其羽翼之末猶奮迅于雲霄之際騰驤于四極之外今乃金口玉音漠然沈默使吾子棲遲窮巷守此困極心有窮志貌有飢色吝江河之流不以濯舟船之畔惜東壁之光不以寓貧婦之目抑非二三公之蔽賢也實吾子之拙惑也夏侯子曰噫湛也幸有過人必知之矣吾子所以褎飾之太矣斟酌之喻非小醜之所堪也然過承古人之誨抑因子大夫之忝在弊室也敢布其腹心豈能隱几以覽其概乎客曰敢祗以聽夏侯子曰吾聞先大夫孔聖之言德之不修學之不講聞義不能徙不善不能改是吾憂也四德具而名位不至者非吾任也是以君子求諸己小人求諸人僕也承門戶之業受過庭之訓是以得接冠帶之末充乎士大夫之列頗窺六經之文覽百家之學弱年而入公朝蒙蔽而當顯舉進不能拔群出萃卻不能抗排當世志則乍顯乍昧文則乍幽乍蔚知之者則謂之欲逍遙以養生不知之者則謂之欲遑遑以求達此皆未是僕之所匱也僕又聞世有道則士無所執其節黜陟明則下不在量其力是以當舉而不辭入朝而酬問僕東野之鄙人頑直之陋生也不識當世之便不達朝廷之情不能倚靡容悅出入崎傾逐巧點妍嘔喁辨佞隨群班之次伏簡墨之後當此之時若失水之魚喪家之狗行不勝衣言不出口安能干當世之務觸人主之威適足以露狂簡而增塵垢縱使心有至言言有偏直此委巷之誠非朝廷之欲也今天子以茂德臨天下以八方六合為四境海內無虞萬國玄靜九夷之從王化猶洪聲之收清響黎苗之樂函夏若遊形之招惠景鄉曲之徒一介之士曾諷急就習甲子者皆奮筆揚文議制論道出草苗起林藪御青瑣入金墉者無日不有充三臺之寺盈中書之閣有司不能竟其文當年不能編其籍此執政之所厭聞也若乃群公百辟卿士常伯被朱佩紫耀金帶白坐而論道者又充路盈寢黃幄玉階之內飽其尺牘矣若僕之言皆糞土之說消磨灰爛垢辱招穢適可充衛士之爨盈掃除之器譬猶投盈寸之膠而欲使江海易色燒一羽之毛而欲令大爐增勢若燎原之煙彌天之雲噓之不益其熱吸之不減其氣今子見僕入朝暫對便欲坐望高位吐言數百謂陵嶒一世何吾子之失評也僕固脂車以須放秣馬以待卻反耕于枳落歸志乎渦瀨從容乎農夫優游乎卒歲矣古者天子畫土以封群后群后受國以臨其邦懸大賞以樂其成列九伐以討其違興衰相形安危相傾故在位者以求賢為務受任者以進才為急今也則九州為一家萬國為百郡政有常道法有恆訓因循而禮樂自定揖讓而天下大順夫道學之貴游閭邑之搢紳皆高門之子世臣之胤弘風長譽推成而進悠悠者皆天下之彥也諷詁訓傳詩書講儒墨說玄虛僕皆不如也二三公之簡僕于凡庸之肆顯僕于細猥之中則為功也重矣時而清談則為親也周矣且古之君子不知士則不明不安是以居逸而思危對食而肴乾今也則否居位者以善身為靜以寡交為慎以弱斷為重以怯言為信不知士者無公誹不得士者不私愧彼在位者皆稷契咎益伊呂周召之倫叔豹仲熊之儔稽古則踰黃唐經緯則越虞夏蔑昆吾之功嗤桓文之勳抵㧙管仲蹉雹晏嬰其遠則欲升鼎湖近則欲超太平方將保重嗇神獨善其身玄白沖虛仡爾養真雖力挾泰山將不舉一羽揚波萬里將不濯一鱗咳唾成珠玉揮袂出風雲豈肯蹩𨇨鄙事取才進人此又吾子之失言也子獨不聞夫神人乎吸風飲露不食五穀登太清遊山嶽靡芝草弄白玉不因而獨備無假而自足不與人路同嗜欲不與世務齊榮辱故能入無窮之門享不死之年以此言之何待進賢客曰聖人有言曰邦有道貧且賤焉恥也今子值有道之世當太平之會不攘袂奮氣發謀出奇使鳴鶴受和好爵見縻抑乃沈身郎署約志勤卑不亦羸哉且伊尹之干成湯寧戚之忤桓公或投己鼎俎或庸身飯牛明廢興之機歌白水之流德入殷王義感齊侯故伊尹起庖廚而登阿衡寧戚出車下而階大夫外無微介內無請謁矯身擢手徑躡名位吾子亦何不慕賢以自厲希古以慷慨乎夏侯子曰嗚呼是何言歟富與貴是人之所欲非僕之所惡也夫干將之劍陸斷狗馬水截蛟龍而鉛刀不能入泥騏驥驊騮之乘一日而致千里而駑蹇不能邁畝百鍊之鑑別鬚眉之數而壁土不見泰山鴻鵠一舉橫四海之區出青雲之外而尺鷃不陵桑榆此利鈍之覺優劣之決也夫欲進其身者不過千萬乘而僕以上朝堂答世問不過顯所知僕以竭心思盡才學意無雅正可準論無片言可採是以頓于鄙劣而莫之能起也以此言之僕何為其不自衒哉子不嫌僕德之不劭而疑其位之不到是猶反鏡而索照登木而下釣僕未以此為不肖也若乃伊尹負鼎以干湯呂尚隱遊以徼文傅說操築以寤主寧戚擊角以要君此非僕所能也莊周駘蕩以放言君平賣卜以自賢接輿陽狂以蔽身梅福棄家以求仙此又非僕之所安也若乃季札抗節于延陵揚雄覃思于太玄伯玉和柔于人懷柳惠三黜于士官僕雖不敏竊頗倣佛其清塵晉書夏侯湛傳周詩敘周詩者南陔白華華黍由庚崇丘由儀六篇有其義而亡其辭湛續其亡故云周詩也世說文學篇注引夏侯湛集虞舜贊有虞愔愔揖讓鼓琴垂拱臨民詠彼南音世澄道玄天下混心思我王度如玉如金藝文類聚十一左丘明讚世亂讒勝君子道憂丘明達聖致意春秋微言逃難旁行不流庶幾斯文希志訓猷初學記十七顏子贊知彰知微體深研機明象介石量同聖師探賾罔滯在言靡遺仰諸惟高瞻之攸希藝文類聚二十閔子騫贊聖既擬天賢亦希聖蒸蒸子騫立體忠正干祿辭親事親盡敬勉心景迹擢辭流詠藝文類聚二十初學記十七管仲像贊堂堂管生忘存興仁仁道在己唯患無身包辱遠害思濟彝倫心寄鮑子動成生民鮑叔像贊鮑子愔愔式昭德音綢繆敬叔二人同心厥芳猶蘭其堅如金遙遙景迹君子攸欽藝文類聚二十一范蠡贊悠悠范子求仁在己進報危國退弘妙理身與勳偕名與身否逸群遠遊永齊終始魯仲連贊峨峨先生有邈其節流仁憂亂抗道自潔隨事抑揚與時開闔在幽能泰處悶惟悅莊周贊邁邁莊周騰世獨遊遁時放言齊物絶尤垂釣一壑取戒犧牛望風寄心託志清流藝文類聚三十六東方朔畫贊并序東方朔畫贊并序大夫諱朔字曼倩平原厭次人也魏建安中分厭次以為樂陵郡故又為郡人焉事漢武帝漢書具載其事先生瓌瑋博達思周變通以為濁世不可以富貴也故薄遊以取位苟出不可以直道也故頡頏以慠世慠世不可以垂訓也故正諫以明節明節不可以久安也故詼諧以取容潔其道而穢其迹清其質而濁其文弛張而不為邪進退而不離群若乃遠心曠度贍智宏材倜儻博物觸類多能合變以明笇幽贊以知來自三墳五典八索九丘陰陽圖緯之學百家衆流之論周給敏捷之辨支離覆逆之數經脈藥石之藝射御書計之術乃研精而究其理不習而盡其功經目而諷于口過耳而暗于心夫其明濟開豁包含弘大陵轢卿相嘲哂豪桀籠罩靡前跆籍貴勢出不休顯賤不憂戚戲萬乘若寮友視儔列如草芥雄節邁倫高氣蓋世可謂拔乎其萃遊方之外者已談者又以先生噓吸沖和吐故納新蟬蛻龍變棄俗登仙神交造化靈為星辰此又奇怪惚恍不可備論者也大人來守此國僕自京都言歸定省覩先生之縣邑想先生之高風徘徊路寢見先生之遺像逍遙城郭觀先生之祠宇慨然有懷乃作頌焉其辭曰矯矯先生肥遁居貞退不終否進亦避榮臨世濯足希古振纓涅而無滓既濁能清無滓伊何高明克柔能清伊何視汙若浮樂在必行處淪罔憂跨世淩時遠蹈獨游瞻望往代爰想遐蹤邈邈先生其道猶龍染迹朝隱和而不同棲遲下位聊以從容我來自東言適茲邑敬問墟墳企佇原隰墟墓徒存精靈永戢民思其軌祠宇斯立徘徊寺寢遺像在圖周旋祠宇庭序荒蕪榱棟傾落草萊勿除肅肅先生豈焉是居是居弗形悠悠我情昔在有德罔不遺靈天秩有禮神監孔明倣佛風塵用垂頌聲文選又顏魯公重刊碑拓本夏侯稱夏侯榮敘夏侯稱夏侯榮敘稱字叔權自孺子而好合聚童兒為之渠帥戲必為軍旅戰陳之事有違者輒嚴以鞭捶衆莫敢逆淵陰奇之使讀項羽傳及兵書不肯曰能則自為耳安能學人年十六淵與之田見奔虎稱驅馬逐之禁之不可一箭而倒名聞太祖太祖把其手喜曰我得汝矣與文帝為布衣之交每宴會氣陵一坐辨士不能屈世之高名者多從之游年十八卒弟榮字幼權幼聰惠七歲能屬文誦書日千言經目輒識之文帝聞而請焉賓客百餘人人一奏刺悉書其鄉邑名氏世所謂爵里刺也客示之一寓目使之遍談不謬一人帝深奇之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劍而戰遂沒陳魏志夏侯淵傳注引世語羊秉敘秉字長達泰山平陽人漢南陽太守續曾孫大父魏郡府君即車騎掾元子也府君夫人鄭氏無子乃養秉齠齕而佳小心敬慎十歲而鄭夫人薨秉思容盡哀俄而公府掾及夫人竝卒秉群從父率禮相承人不閒其親雍雍如也仕參撫軍將軍事將奮千里之足揮沖天之翼惜乎春秋三十有二而卒昔罕虎死子産以為無與為善自夫子沒有子産之歎矣亡後有子男又不育是何行善而禍繁也豈非司馬生之所惑歟世說言語篇注羊太常辛夫人傳夫人字憲英衛尉肅侯毗之女聰明有才鑒初文帝與陳思王爭為太子既而文帝得立抱毗頸而喜曰辛君知我喜不毗以告憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為大將軍曹爽參軍司馬宣王將誅爽因爽出閉城門大將軍司馬魯芝將爽府兵犯門斬關出城門赴爽來呼敞俱去敞懼問憲英曰天子在外太傅閉城門人云將不利國家于事可得爾乎憲英曰天下事不可知然以吾度之大傅殆不得不爾明皇帝臨崩把太傅臂以後事付之此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢行以驕奢于王室不忠于人道不直此舉不過以誅曹爽耳敞曰然則事就乎憲英曰得無殆就爽之才非太傅之偶也敞曰然則敞可以無出乎憲英曰安可以不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥不可也且為人死為人任親昵之職也從衆而已敞遂出宣王果誅爽事定之後敞歎曰吾不謀于姊幾不獲于義逮鍾會為鎮西將軍憲英謂從子羊祜曰鍾士季何故西出祜曰將為滅蜀也憲英曰會在事縱恣非持久處下之道吾畏其有他志也祜曰季母勿多言其後會請子琇為參軍憲英憂曰他日見鍾會之出吾為國憂之矣今日難至吾家此國之大事必不得止也琇固請司馬文王文王不聽憲英語琇曰行矣戒之古之君子入則致孝于親出則致節于國在職思其所司在義思其所立不遺父母憂患而已軍旅之閒可以濟者其唯仁恕乎汝其慎之琇竟以全身憲英不好華麗祜上夫人鼲子帔緣以錦不肯服從外孫胡母揚上夫人錦被夫人反臥之年至七十有九泰始五年卒魏志辛毗傳注引世語張平子碑河閒諱衡字平子南陽此縣人也體德純和秉行孝友加以俊才命世英識秀建崔子玉為之造化高才瑋藝與神合契君子以為褎然聞之風聲至于仕乎史官算二儀之數研陰陽之理日月致巧渾儀有極深探賾之思數往知來之驗此崔生所以發德音也若夫好學博古貫綜謨籍墳典兵索之流經禮訓詁之載百家九流之辨詩賦雅頌之辭金匱玉板之奧讖契圖緯之文音樂書畫之藝方技博奕之巧自洪範彝倫以逮于若郯子之所習介盧之所識者网不該羅其情原始要終故能學為人英文為辭宗紹羲和之顯跡系相如之遐風向若生于春秋之間游乎闕里之堂將同貫宰貢齊衡游夏豈值取足于身中垂名于一涂哉是以先生恆屈于不知己仕居下位再為史官而發應間之論時不容道遂興思玄之賦爰登侍中則黨言允諧出相河間則黎民時雍庸渠限其所至哉若夫巡狩誥頌所以敷陳主德二京南都所以贊美畿輦者與雅頌爭流英英乎其有味與若又造事屬辭因物興下筆流藻潛思發義文無擇辭言必華麗自屬文之士未有如先生之善選言者也南陽相夏侯湛自涉境以經于諸邑每縣咨其故老訪其先賢有兆者表其墓經墳者揖其魂涂出魯陽行次西鄂眄狐山而頌英歷茲邑而懷夫子暨路過塋域止駕衢首覩封樹之蕭條觀高碑之稱美于是慨然永思愴爾長懷若死者可起吾其與歸乃延邑宰而問之曰昔武王入殷封比干之隴高祖經巍酬信陵之墓此聖賢之所以禮忠旌能甄表明德也有可以優其胤嗣者禮其在是而世胄絶紹支庶無聞于是乃翦其墟落寵其宗人使奉其四時獻其粢盛遂糾集舊跡攝載新懷而書之碑側以闡美抒思焉其頌曰奕奕張生秉德淑清研深綜理思俊才英實掌天地幽贊神明冠曩興美傾漢流聲匪唯天象亦垂人文有炳其猶有鑠其新仰鑒遺籍馳心哲人殊世投好百載交神奉命南邦行出爾涂及隧首輟駕前衢徘徊崇碑逍遙故墟企仰网瞻長懷焉如昔在先賢唯德作友古而無死願言攜手世則茲泯道乃在珠詠隋于璧稱和戢寶無雕人壽幾何望兼京臺思踰俟河隸釋十九魯芝銘爽既誅宣王即擢芝為并州刺史以綜為安東將軍魏志曹爽傳注新論爪生于肉去爪而肉不知御覽三百七十懷思賦何天地之悠長悼人生之短淺思縱欲以求歡苟抑沈以避免嗟聖王之制作所以貴夫善善信循道以從法何世路之迍蹇始潔操以迄今每適道而靡違思典言以攝事弗履過而循非恆戰戰以矜栗杜穢釁而防微斂規節以踐跡冀天鑒之佑誠勤恭肅以端厲常苦心而勞形桑榆掩其薄沒既白首而無成世務多故吾固甘夫無為名不足以為尚空勞穢以自卑永無事以安神故幸歿之無知藝文類聚二十六笙賦嗟萬物之殊觀莫比美乎音聲總衆異以合體匪求一以取成雖琴瑟之既麗猶靡尚乎清笙爾乃採桐竹翦朱密摘長松之流肥咸崑崙之所出抑揚噓吸或𠱿或吹擪拈挹按同覆互移初進飛龍重繼鵾雞振引合和如會如離若夫纏綿約殺足使放達者循察通豫平曠足使廉規者棄節沖虛冷淡足使貪榮者退讓開明爽亮足使慢惰者進竭豈衆樂之能倫邈奇特而殊絶藝文類聚四十四初學記十六彈棊賦嫌深宇以舒情遘衆藝以廣娛觀奇巧之壞麗律彈棊之妙殊局則崑山之寶華陽之石或煩蜿龍藻或分帶班駮或發色玄黃或皎的鱗白悉魯匠之精能傾工心于雕錯形方隆而應矩焜煜霞以倏鑠爾乃延良人洽坐際隆局施輕棊列徐正控往來必有中而告憩相形投巧左撫右拔揮纖捐以長邪因偃掌而發八陵超踰落歸趣援勢紛交務而踖合乘流密以遙曳若乃釋正彈循亂湯滑石周散勢縱橫捭撥捶撇肆應無方侈若天星之列閃若流電之光或劈拍散爛揮霍便娟或奮振唐唐頽水參連棊單局匱等分紀殘勝者含和負者喪顏惜情娛之未遂恨白日之微遄實機藝之端首固君子之所歡也藝文類聚七十四馳射賦參武藝以遊遨文選赭白馬賦注賀德音表伏聞明詔悉除養熊虎之費舉朝增慶咸稱聖主伏惟陛下未觀古今成敗之戒而卓爾玄覽明發自然遣除無益務在嗇民誠可謂性與天道生而知之孔子十五志學四十不惑陛下年在志學之後而思洞不惑之前三代之興無不抑損情欲三季之衰無不肆其侈靡陛下不學其興而與興者同功不覽其衰已去衰者之弊道侔上哲德邁中古吐絲髮之言著如綸之美臣聞將順其美匡救其惡故人主之言則右史書之陛下此詔既當等之史籍又宜宣布天下自喪亂已來四十餘載塗炭之餘思治久矣陛下智成當年而運值百六德音之詔發自聖德願復觸類而長之廣求其比無使朝有游食費祿之臣野有逋竄不徭之民使居官者必有供時之賦則何患倉廩之不實下土之不均凡修此術易于反掌耳臣誠總猥官自朝末不足對揚盛化裨益大猷然目覩聖美心悅至教自忘叢細謹拜表以賀群書治要二十九引晉書成帝咸和七年詔除諸養禽之屬無益者集書令史夏侯盛表婦喪久不葬服議婦喪既周而未葬服當除否答云凡婦喪夫為主子不以杖即位避父之尊也主喪不變禮有明文然子亦不除通典一百三答魏孟叔難魏孟叔難盛曰嫡子婦死其舅亦為喪主家貧經年不葬舅及子孫竝不得除邪豈可為一嫡婦使三代纍載不釋服乎盛答仲由傷貧之言啜菽飲水盡其歡還葬而無椁豈有非之者哉若知禮者自當不淹久同上魏又難曰舊時夫為妻杖居倚廬服竝如三年之制今人通所不行即自宜隨時而除何應以喪主為斷盛答曰棄先王之教而令隨俗意所未可今人不禫不杖蓋失禮耳通典一百三
