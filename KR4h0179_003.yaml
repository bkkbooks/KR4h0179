body:
  text: 卷三武帝以裴秀為司空詔夫三司之任以翼宣皇極弼成王事者也故經國論道賴之明哲苟非其人官不虛備尚書令左光祿大夫裴秀雅量弘博思心通遠先帝登庸贊事前朝朕受明命光佐大業勳德茂著配蹤元凱宜正位居體以康庶績其以秀為司空晉書裴秀傳以賈充守尚書令詔尚書令百揆之首總齊機衡出納朝政治績之所繇也車騎將軍賈充忠允清正通理經遠兼迪文武謨勳弘著其以充守尚書令書鈔五十九引晉起居注賞定新律諸臣詔漢氏以來法令嚴峻故自元成之世及建安嘉平之間咸欲辯章舊典刪革刑書述作體大歷年無成先帝愍元元之命陷於密網親發德音釐正名實車騎將軍賈充獎明聖意諮詣善道太傅鄭沖又與司空荀顗中書監荀勖中軍將軍羊祜中護軍王業及廷尉杜犮守河南尹杜預散騎侍郎裴楷潁川太守周雄齊相郭頎騎都尉成公綏荀煇尚書郎柳軌等典正其事朕每鑒其用心常慨然嘉之今法律既成始班天下刑寬禁簡足以克當先旨昔蕭何以定律受封叔孫通以制儀為奉常賜金五百觔弟子皆為郎夫立功立事古之所重自太傅車騎以下皆加祿賞其詳依故典晉書賈充傳昔蕭何以定律令受封叔孫通制儀為奉常賜金五百觔弟子百人皆為郎中夫立功立事古今之所重宜加祿賞其詳考差敘輒如詔簡異弟子百人隨才品用賞帛萬餘匹晉書刑法志耕籍詔夫國之大事在祀與農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近世以來耕籍止於數步之中空有慕古之名曾無供祀訓農之實而有百官車徒之費今修千畝之制當與群公卿士躬稼穡之艱難以率先天下主者詳具其制下河南處田地於東郊之南洛水之北平良田水中者若無官田隨宜便換而不得侵民人也晉書禮志上宋書禮志一大赦詔古設象刑而眾不犯今雖參夷而姦不絕何德刑相去之遠哉去帝深愍黎元哀矜庶獄乃命群后考正典刑朕守遺業永惟保乂皇基思與萬國以無為為政方今陽春養物東作始興朕親率王公卿士耕籍田千畝又律令既就班之天下將以簡法務本惠育海內宜寬宥罪使得自新其大赦天下長吏郡丞長史各賜馬一匹晉書武帝紀賜邵縣長吏詔使四海之內棄末反本競農務功能奉宣朕志令百姓勸事樂業者其唯郡縣長吏乎先之勞之在於不倦每念其經營職事亦為勤矣其以中左典牧種草馬賜縣令長相及郡國丞各一匹晉書食貨志以羊祜為尚書左僕射詔夫總齊機衡允釐六職朝政之本也祜執德清劭忠亮純茂經緯文武謇謇正直雖處腹心之任而不總樞機之重非重拱無為委任責成之意也其以祜為尚書左僕射衛將軍給本營兵晉書羊祜傳又見御覽二百十一引干寶晉紀文明太后崩荅群臣請既葬即吉詔夫三年之喪天下之達禮也受終身之愛而無數年之報柰何葬而便即吉情所不忍也晉書禮志中宋書禮志二又詔荅攬省奏事益增感剝夫三年之喪所以盡情致禮葬已便除所不堪也當敘吾哀懷言用斷絕柰何柰何晉書禮志中宋書禮志二不能篤孝勿以毀傷為憂也誠知衣服末事耳然今思存草土率當以吉物奪之迺所以重傷至心非見念也每代禮典質文皆不同耳何為限以近制使達喪闕然乎晉書禮志中宋書禮志二責成二千石詔郡國守相三載一巡行屬縣必以春此古者所以述職宣風展義也見長吏觀風俗協禮律考度量存問耆老親見百年錄囚徒理冤枉詳察政刑得失知百姓所患苦無有遠近便若朕親臨之敦喻五教勸務農功勉勵學者思勤正典無為百家庸末致遠必泥士庶有好學篤道孝悌忠信清白異行者舉而進之有不孝敬於父母不長悌於族黨悖禮棄常不率法令者糾而罪之田疇闢生業修禮教設禁令行則長吏之能也人窮匱農事荒姦盜起刑獄煩下陵上替禮義不興斯長吏之否也若長吏在官公廉慮不及私正色直節不飾名譽者及身行貪穢諂黷求容公節不立而私門日富者並謹察之揚清激濁舉善彈違此朕所以垂拱總綱責成於良二千石也於戲戒哉晉書武帝紀遣使者侯史光等周行郡國詔古之王者以歲時巡狩方岳其次則二伯述職不然則行人巡省撢人誦志故雖幽遐側微心無雍隔下情上通上指遠諭至千鰥寡罔不得所用垂風遺烈休聲猶存朕在位累載如臨深川夙興夕惕明發不寢坐而待旦思四方水旱災眚為之怛然勤躬約已欲令事事當宜常恐眾吏用情誠心未著萬機兼猥慮有不周政刑失謬而弗獲備覽百姓有過在予一人惟歲之不易未遑卜征巡省之事下之未乂其何以恤之今使使持節侍中副給事黃門侍郎銜命四出周行天下親見刺史二千石長吏申諭朕心懇誠至意訪求得失損益諸宜觀省政教問人間患苦周典有之以其萬姓之利害為一書其禮俗政事刑禁之逆順為一書其悖逆暴亂作慝犯令為一書其札喪凶荒戹貧為一書其康樂和親安平為一書每國辨異之以返命於王以周知天下之故斯舊章前訓今率由之還具條奏俾朕昭然鑒於幽遠若親行焉大夫君子其各悉乃心敬乃事嘉言令圖苦言至戒與使者盡之無所隱諱方將虛心以俟其勉哉勖之稱朕意焉晉書禮志下宋書禮志二通典五十四詔有司奏事勿隱情雖詔有所欲及奏得可而於事不便者皆不可隱情晉書武帝紀詔諸賢良方正直言會東堂省諸賢良對策雖所言殊塗皆明於有王義有益政道欲詳覽其對究觀賢士大夫用心晉書摯虞傳封外曾祖母及從母詔外曾祖母故司徒王朗夫人楊氏舅氏尊屬鄭劉二從母先后至愛每惟聖善敦睦遺旨渭陽之感永懷靡及其封楊夫人及從母為鄉君邑各五百戶晉書文明王皇后傳報傅玄上便宜詔得所陳便宜言農事得失及水官興廢又安邊御胡政事寬猛之宜申省周備一二具之此誠為國大本當今急務也如所論皆善深知乃心廣思諸宜動靜以聞也晉書傅玄傳以衛瓘為青州刺史詔征東將軍衛瓘忠允清識有文武之才宜令宣風萬里為青州刺史以統戎政書鈔七十二引晉起居注歲計吏功詔古者歲書群吏之能否三年而誅賞之諸令史前後但簡遣疏劣而無有勸進非黜陟之謂也其條勤能有稱尤異者歲以為常吾將議其功勞晉書武帝紀詔諸葛京署吏諸葛亮在蜀盡其心力其子瞻臨難而死義天下之善一也其孫京隨才署吏蜀志諸葛亮傳注引晉起居注賜王宏穀傳朕惟人食之急而懼天時水旱之運夙夜警戒念在於農雖詔書屢下敕厲殷勤猶恐百姓廢惰以捐生植之功而刺史二千石百里長吏未能盡勤至使地有遺利而人有餘力每思聞監司糾舉能不將行其賞罰以明沮勸今司隸校尉石鑒上汲邵太守王宏勤恤百姓導化有方督勸開荒五千餘頃而熟田常課頃畝不減比年普飢人不足食而宏郡界獨無匱乏可謂能以勸教時同功異者矣其賜宏穀千斛布告天下咸使聞知晉書良吏王宏傳又見食貨志為城陽王兆立後詔亡弟千秋少聰慧有夙成之質不幸早亡先帝先后特所哀愍先后欲詔立其後而竟未遂每追遺意情懷感傷其以皇子景度為千秋後雖非典禮亦近世之所行且以述先后本旨也晉書城陽王兆傳普告州郡舉壯勇秀異詔吳會未平宜得猛士以濟武功雖舊有薦舉之法未足以盡殊才其普告州郡有壯勇秀異才力傑出者皆以名聞將簡其尤異擢而用之苟有其人勿限所取晉書馬隆傳以荀顗行太子太傅詔侍中太尉顗溫恭忠允至行純備博古洽聞耆艾不殆其以公行太子太傅侍中太尉如故晉書荀顗傳太子敬禮師傅詔太子拜傅如弟子事師之禮北堂書鈔六十五引晉起居注詔定二傅不臣拜秦漢以來舊章廢滅隨時改作其故事不可依用宜遠準古議定二傅不臣拜御覽二百四十四引晉書何曾議太子少傅當稱臣拜荀顗曰太之與少自二傅之名次耳非于太子有輕重也下詔詔為睢陵公王祥發哀為睢陵公發哀事乃至今雖每為之感傷要未得便敘哀情今便哭之晉書王祥傳詔勿罪麴路狂狷怨誹亦朕之罪勿罪也群書治要二十九引晉書泰始五年廷尉上西平民麴路伐登聞鼓言多妖妄毀謗帝詔按治要所載晉書乃王隱書也詔責汝南王亮高平困急計城中及旂足以相拔就不能徑至尚當深進令奔突有投而坐視覆敗故加旂大戮今若罪不在旂當有所在晉書汝南王亮傳秦州刺史胡烈為羌虜所害亮遣將軍劉旂騎督敬琰赴救不進旂當斬亮與軍師曹囧上言節度之咎由亮而出乞丐旂死詔云云撰錄祕書詔自泰始以來大事皆撰錄祕書寫副後有其事輒宜綴集以為常晉書武帝紀以譙周為散騎常侍詔騎都尉譙周閒居中道不仕危國蜀亡之際勱劉禪歸命有忠君濟民之謀又耽習典藝博物洽聞朕甚嘉之以為散騎常侍書鈔五十八引干寶晉紀幸辟雍行鄉飲酒禮下詔禮儀之廢久矣乃今復講肄舊典賜大常緝百匹丞博士及學士牛酒晉書禮志下優禮功臣詔昔漢祖以知人善任克平宇宙推述勳勞歸美三俊遂與功臣剖符作誓藏之宗廟副在有司所以明德庸勳藩翼王室者也昔我祖考遭世多難攬授英雋與之斷金遂濟時務克定大業太傅壽光公鄭沖太保朗陵公何曾太尉臨淮公荀顗各尚德依仁明允篤誠翼亮先皇光濟帝業故司空博陵元公王沈衛將軍鉅平侯羊祜兼文武忠肅居正朕甚嘉之書不云乎天秩有禮五服五章哉其為壽光朗陵臨淮博陵鉅平國置郎中令假夫人世子印綬食本秩三分之一皆如郡公侯比晉書鄭沖傳以陳邵為給事中詔燕王師陳邵清貞絜靜行著邦族篤志好古博通六籍耽悅典誥老而不倦宜在左右以篤儒教可為給事中晉書陳邵傳又見書鈔五十八初學記十二竝引王隱晉書又略見御覽二百二十一以庾純為河南尹詔河南京畿大郡為四方之表則中書令庾純清粹忠正才紹治化其以純為河南尹書鈔七十六御覽二百五十二竝引王隱晉書書鈔又引中興書才紹治化作才經治亂追賜譙周詔騎都尉譙周篤志好古服膺儒義擢授近侍命位未加不幸殞喪朕甚悼之賜朝服一具衣一襲錢十五萬喪葬所給比從散騎常侍之制也書鈔六十二又見蜀志譙周傳注引晉陽秋又詔還衣服給棺直蜀志譙周傳注引晉陽秋省錄裴秀表草詔司空薨痛悼不能去心又得表草雖在危困不忘王室盡忠憂國省益傷切輒當與諸賢共論也晉書裴秀傳贈諡裴秀詔司空經德履哲體蹈儒雅佐命翼世勳業弘茂方將宣獻敷制為世宗範不幸薨殂朕甚痛之其賜祕器朝服一具衣一襲錢三十萬布百匹諡曰元晉書裴秀傳以高陽王珪為尚書右僕射詔尚書僕射總括萬機以貳紀綱綜詳朝政書鈔五十九引晉起居注尚書高陽王珪忠允善政思量弘濟莅官盡心所居著稱其以珪為右僕射御覽二百二十一引晉起居注詔賈充都督秦涼秦涼二境比年屢敗胡虜縱暴百姓荼毒遂使異類扇動害及中州雖復吳蜀之寇未嘗至此誠由所任不足以內撫夷夏外鎮醜逆輕用其眾而不能盡其力非得心腹之重推轂委成大匡其弊恐為患而未已每慮斯難忘寢與食侍中守尚書令車騎將軍賈充雅量宏尚達見明遠武有折衷之威文懷經國之慮信結人心名震域外使權統方任靜綏西夏則吾無西顧之念而遠近獲安矣其以充為使持節都督秦涼二州諸軍事侍中車騎將軍如故假羽葆鼓吹給第一晉書賈充傳廷問賢良詔前者對策各指荅所問未盡子大夫所欲言故復延見其具陳所懷又比年連有水旱災眚雖戰戰兢兢未能究天人之理當何修以應其變人遇水旱饑饉者何以救之中間多事未得寍靜思以省息煩務令百姓不失其所若人有所患苦者有宜損益使公私兩濟者委曲陳之又政在得人而知之至難唯有因人視聽耳若有文武隱逸之士各舉所知雖幽賤負俗勿有所限故虛心思聞事實勿務華辭莫有所諱也晉書阮种傳以石苞為司徒詔前大司馬苞忠允清亮才經世務幹用之績所歷可紀宜掌教典以贊時政其以苞為司徒晉書石苞傳詔荅有司吳人輕脃終無能為故疆埸之事但欲完固守備使不得越逸而已以苞計畫不同慮敵過甚故徵還更授昔鄧禹撓於關中而終輔漢室豈以一眚而掩大德哉晉書石苞傳有司奏苞前有所撓不堪其任以公還第已為弘厚不宜擢用詔云云以山濤為侍中詔濤清風淳履思心通遠宜侍帷幄盡規左右蓺文類聚四十八御覽二百十九引竹林七賢傳山濤泰始七年為侍中詔書云云以羊琇為中護軍詔中護軍與中領軍皆掌禁兵職典武選宜得堪幹其事者左衛將軍羊琇有明贍才具乃心在公其以琇為中護軍北堂書鈔六十四御覽二百四十引晉起居注報石苞詔農殖者為政之本有國之大務也雖欲安時興化不先富而教之其道無由而至今四海多事軍國用廣加承征伐之後屢有水旱之事倉庫不充百姓無積古者稼穡樹蓺司徒掌之今雖登論道然經國立政惟時所急故陶唐之世稷官為重今司徒位當其任乃心王事有毀家舒國乾乾匪躬之志其使司徒督察州郡播殖將委事任成垂拱仰辦若宜有所循行者其增置掾屬十人聽取王官更練事業者晉書石苞傳苞為司徒奏課農桑詔云云胡奮勉入直詔射聲校尉胡奮外掌方任內參九列不宜同之常例勿使入直御覽二百四十二引王隱晉書以胡奮為冠軍將軍詔議郎胡奮開爽忠亮有文武才幹歷位外內涉練戎事威略之聲著于方外其以奮為冠軍將軍書鈔六十四御覽二百三十九竝引晉起居注泰始七年詔以鄭袤為司空詔光祿大夫密陵侯袤履行純正守道沖粹退有清和之風進有素絲之節宜登三階之曜補袞職之闕令以袤為司空晉書鄭袤傳又見書鈔五十二初學記十一引晉起居注
