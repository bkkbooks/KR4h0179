body:
  text: 呂會上言任僑妻産女案瑞應圖云異根同體謂之連理異苗同穎謂之嘉禾草木之屬猶以為瑞今二人同心天垂靈象故易云二人同心其利斷金嘉徵顯見生于陝東之國斯蓋四海同心之瑞不勝喜踊謹畫圖以上宋書五行志五又法苑珠林八十七引搜神記愍帝建興四年新蔡縣吏任僑妻胡産二女相向腹心合同自胸以上齊以下各分此蓋天下未一之妖也時內史呂會上言云云時有識者哂之辭大司農表昔明皇帝親執臣手使臣北討胡寇今中原未靖無用家為乞補青州界一荒郡以展鷹犬之用晉書蘇峻傳乞買外廄牛表臣家裏應用一純牛連市素不如意外廄猥牛中有任用者臣請以正陌三萬錢五匹布乞以買此牛御覽八百二十八表劉超病給四順湯書鈔十九書超死罪白如命皆令有本末保任然後受隨宜分處謹白淳化閣帖三論墓毀服表案據鄭玄云親見尸柩不可無服如鄭義以見而服不見不服也司徒臨穎公前表改葬之緦不以吉臨凶今聽其墳墓毀發依改葬服緦麻不得奔赴及已修復者唯心喪縞素深衣白幘哭臨三月通典一百二太興二年侍中黃門侍郎江啓表王籍等周喪嫁娶議夫風節不振無以蕩斃俗禮義不備無以正人流籍以名門擢登賓友不能率身正道公違典憲誠是愷悌垂恕體例宜全又東閣祭酒顏含居叔父喪而遣女推尋舊事永康二年虞濬陳湛各有弟喪嫁子拜時司徒王渾奏免竊謂弟喪不重于叔父成婚之禮不輕于拜時含犯違禮典夫崇禮謂之有方之士不崇禮謂之方外之人況虧淳創薄崇俗棄禮請免官禁止通典六十劉隗上言文學王籍周喪娶妻主簿江啓鄭玄以為女子成人逆降旁親及將出者昔陳湛以女年過二十依鄭義不責遷任徐州不為坐免久為成比若含女未過二十宜如隗奏若謂鄭玄説與禮違當先除而後禁不宜制未下而責人也通典六十司直劉隗上言文學王籍周喪娶妻從事中郎謝潛議云云上書陳時事損益為國者恃人須才蓋二千石長吏是也安可不明簡其才使必允當既得其人使久于其職在官無苟且居下者有恆心此為政之較也今之長吏遷轉既數有送迎之費古人三載考績三考黜陟中才處局故難以速成矣夫兵所以防禦未然鎮壓姦凶周雖三聖功成由武今戎戰之世益宜留心簡選精鋭以備不虞無事則優其身有難則責其力竊聞今之兵士或私有役使而營陳不充為國者猶為家也計才力之所任審趨舍之舉動不營難成之功損棄分外之役今兵人未強當審其宜經塗遠舉未獻大捷便使力單財盡而威望挫弱也晉書丁潭傳上書求為琅邪王裒行終喪禮在三之義禮有達制近代以來或隨時降殺宜一匡革以敦于後輒案令文王侯之喪官僚服斬既葬而除今國無繼統喪庭無主臣實陋賤不足當重謬荷首任禮宜終喪晉書丁潭傳東海王為新蔡王殤服議聖人因親以教愛親不同而殤有降殺蓋由知識未同成人故也七歲以下謂之無服之殤記曰臣不殤君子不殤父東海與新蔡別國旁親尊卑敵均則宜同殤制而無服也通典八十二新蔡王四歲而亡東海王移訪太常博士張亮議蠟臘議案周禮禮記干注周禮云國祭蠟則吹下關北堂書鈔一百五十五案禮蠟者謂合聚萬物而索饗之歲終休老息民也臘者祭宗廟五祀則服玄蠟則服黃蠟臘不同總之非也傳曰臘接也祭則在新故交接也俗謂臘之明日為初歲秦漢以來有祝歲者古之遺語世説德行篇注藝文類聚五御覽三十三臘日不宜舉哀戒嚴議元帝大興二年天子祭宗廟社稷鼎俎既陳不得終事者四若五服之喪以常降者不以廢從母無服之喪不宜廢事舉哀又禮祭之明日改祭午祊以燕皇尸殷謂之肜周謂之繹今雖未施肜繹之祭先王之典聖人重不忘但大臘之日休息黎衆百日之勤一日之澤未可戒嚴通典四十四太興二年未臘前一日詔明日當為范氏從母舉哀百官戒嚴尚書郎張亮議云云表臣前聊欲撰記古今怪異非常之事會聚散逸使同一貫博訪知之者片紙殘行事事各異初學記二十一駮招魂葬議時有招魂考之經傳則無聞焉近太傅公既屬寇亂尸柩不反時奕議招魂葬東海國學官今魯國周生以為宜爾盛陳其議皆多無證寶以為人死神浮歸天形沈歸地故為宗廟以賓其神衣衾以表其形棺周于衣槨周于棺今失形于彼穿冢于此知亡者不可以假存而無者獨可以偽有哉未若以遭禍之地備迎神之禮宗廟以安之哀敬以盡之周生議云魂堂几筵設于窆寢豈唯斂尸亦以寧神也答者曰古人有言夫禮者其事可陳也其義難知也是以君子重于禮義夫別嫌明疑原情得旨者不亦微乎故其為制有以順鬼神之性有以達生者之情然則冡曠之間有饋席本施骸骨未為有魂神也若乃缸魂于棺閉神于槨居浮精于沈魄之域匿遊氣于雍塞之室豈順鬼神之性而合聖人之意乎則葬魂之名亦幾于迂矣周生又云昔黃帝體仙登遐其臣扶微等斂其衣冠殯而葬焉則其證也答曰孔子論黃帝曰生而人利其化百年死而人畏其神百年亡而人用其教百年此黃帝亦死言仙謬也就使必仙何議于葬通典一百三王昌前母服論禮有經有變有權王毖之事有為為之也有不可責以始終之義不可求以循常之文何群議之紛錯同産者無嫡側之別而先生為兄諸侯同爵無等級之差而先封為長今二妻之入無貴賤之禮則宜以先後為秩順序義也今生而同室者寡死而同廟者衆及其神位固有上下也故春秋賢趙姬遭禮之變而得禮情也且夫吉凶哀樂動乎情者也五禮之制所以敘情而即事也今二母者本他人也以名來親而恩否于時敬不及生愛不及喪夫何追服之道哉張惲劉卞得其先後之節齊王衛恆通于服絶之制可以斷矣朝廷于此宜導之以趙姬齊之以詔命使先妻恢含容之德後妻崇卑讓之道室人達長少之序百姓見變禮之中若此可以居生又況于死乎古之王者有師友之禮待其臣而不敢自尊今令先妻以一體接後而後妻不敢抗及其子孫交相為服禮之善物也然則王昌兄弟相得之日蓋宜祫祭二母等其禮饋序其先後配以左右兄弟肅雍交酬奏獻上以恕先父之志中以高二母之德下以齊兄弟之好使義風弘于王教慈讓洽乎急難不亦得禮之本乎晉書禮志中晉紀總論史記曰昔高祖宣皇帝以雄才碩量應運而仕值魏太祖創基之初籌畫軍國嘉謀屢中遂服輿軫驅馳三世性深阻有如城府而能寬綽以容納行任數以御物而知人善采拔故賢愚咸懷小大畢力爾乃取鄧艾于農隙引州泰于行役委以文武各善其事故能西擒孟達東舉公孫淵內人夷曹爽外襲王陵神略獨斷征伐四克維御群后大權在己屢拒諸葛亮節制之兵而東支吳人輔車之勢世宗承基太祖繼業軍旅屢動邊鄙無虧于是百姓與能大象始構矣玄豐亂內欽誕寇外潛謀雖密而在幾必兆淮浦再擾而許洛不震咸黜異圖用融前烈然後推轂鍾鄧長驅庸蜀三關電掃劉禪入臣天符人事于是信矣始當非常之禮終受備物之錫名器崇于周公權制嚴于伊尹至于世祖遂享皇極正位居體重言慎法仁以厚下儉以足用和而不弛寬而能斷故民詠惟新四海悅勸矣聿修祖宗之志思輯戰國之苦腹心不同公卿異議而獨納羊祜之策以從善為衆故至于咸寧之末遂排群議而杖王村之決泛舟三峽介馬桂陽役不二時江湘來同夷吳蜀之壘垣通二方之險塞掩唐虞之舊域班正朔于八荒太康之中天下書同文車同軌牛馬被野餘糧棲畝行旅草舍外閭不閉民相遇者如親其匱乏者取資于道路故于時有天下無窮人之諺雖太平未洽亦足以明吏奉其法民樂其生百代之一時也武皇既崩山陵未乾楊駿被誅母后廢黜朝士舊臣夷滅者數十族尋以二公楚王之變宗子無維城之助而閼伯實沈之卻歲構師尹無具瞻之貴而顛墜戮辱之禍日有至乃易天子以太上之號而有免宮之謠民不見德唯亂是聞朝為伊周夕為桀跖善惡陷于成敗毀譽脅于勢利于是輕薄干紀之士役姦智以投之如夜蟲之赴火內外混淆庶官失才名實反錯天網解紐國政迭移于亂人禁兵外散于四方方嶽無鈞石之鎮關門無結草之固李辰石冰傾之于荊揚劉淵王彌撓之于青冀二十餘年而河洛為墟戎羯稱制二帝失尊山陵無所何哉樹立失權託付非才四維不張而苟且之政多也夫作法于治其斃猶亂作法于亂誰能救之故于時天子非暫弱也軍旅非無素也彼劉淵者離石之將兵都尉王彌者青州之散吏也蓋皆弓馬之士驅走之人凡庸之才非有蜀先主諸葛孔明之能也新起之寇烏合之衆非吳蜀之敵也脫耒為兵裂裳為旗非戰國之器也自下逆上非鄰國之勢也然而成敗異效擾天下如驅群羊舉二都如拾遺芥將相王侯連頭戮乞為奴僕而猶不獲后嬪妃主虜辱于戎卒豈不哀哉夫天下大器也群生重畜也愛惡相攻利害相奪其勢常也若積水于防燎火于原未嘗暫靜也器大者不可以小道治勢動者不可以爭競擾古先哲王知其然也是以扞其大患而不有其功禦其大災而不尸其利百姓皆知上德之生已而不謂浚已以生也是以感而應之悅而歸之如晨風之鬱北林龍魚之趣淵澤也順乎天而享其運應乎人而和其義然後設禮文以治之斷刑罰以威之謹好惡以示之審禍福以喻之求明察以官之篤慈愛以固之故衆知向方皆樂其生而哀其死悅其教而安其俗君子勤禮小人盡力廉恥篤于家閭邪僻銷于胸懷故其民有見危以授命而不求生以害義又況可奮臂大呼聚之以干紀作亂之事乎基廣則難傾根深則難拔理節則不亂膠結則不遷是以昔之有天下者所以長久也夫豈無僻主賴道德典刑以維持之也故延陵季子聽樂以知諸侯存亡之數短長之期者蓋民情風教國家安危之本也昔周之興也后稷生于薑嫄而天命昭顯文武之功起于后稷故其詩曰思文后稷克配彼天又曰立我蒸民莫匪爾極又曰實穎實栗即有邰家室至于公劉遭狄人之亂去邰之豳身服厥勞故其詩曰乃裹餱糧于橐于囊陟則在巘復降在原以處其民以至于太王為戎翟所逼而不忍百姓之命杖策而去故其詩曰來朝走馬帥西水滸至于岐下周民從而思之曰仁人不可失也故從之如歸市居之一年成邑二年成都三年五倍其初每勞來而安集之故其詩曰乃慰乃止乃左乃右乃疆乃理乃宣乃畝以至于王季能貊其德音故其詩曰克明克類克長克君載錫之光至于文王備修舊德而惟新其命故其詩曰惟此文王小心翼翼昭事上帝聿懷多福由此觀之周家世積忠厚仁及草木內睦九族外尊事黃耇養老乞言以成其福祿者也而其后妃躬行四教尊敬師傅服浣濯之衣修煩辱之事化天下以婦道故其詩曰刑于寡妻至于兄弟以御于家邦是以漢濱之女守潔白之志中林之士有純一之德故曰文武自天保以上治內采薇以下治外始于憂勤終于逸樂于是天下三分有二猶以服事殷諸侯不期而會者八百猶曰天命未至以三聖之智伐獨夫之紂猶正其名教曰逆取順守保大定功安民和衆猶著大武之容曰未盡善也及周公遭變陳后稷先公風化之所由致王業之艱難者則皆農夫女工衣食之事也故自后稷之始基靜民十五王而文始平之十六王而武始居之十八王而康克安之故其積基樹本經緯禮俗節理人情恤隱民事如此之纏綿也爰及上代雖文質異時功業不同及其安民立政者其揆一也今晉之興也功烈于百王事捷于三代蓋有為以為之矣宣景遭多難之時務伐英雄誅庶桀以便事不及修公劉太王之仁也受遺輔政屢遇廢置故齊王不明不獲思庸于亳高貴沖人不得復子明辟二祖逼禪代之期不暇待三分八百之會也是其創基立本異于先代者也又加之以朝寡純德之士鄉乏不二之老風俗淫僻恥尚失所學者以莊老為宗而黜六經談者以虛薄為辨而賤名檢行身者以放濁為通而狹節信進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪是以目三公以蕭杌之稱標上議以虛談之名劉頌屢言治道傳咸每糾邪正皆謂之俗吏其倚杖虛曠依阿無心者皆名重海內若夫文王日昊不暇食仲山甫夙夜匪懈蓋共嗤點以為灰塵而相詬病矣由是毀譽亂于善惡之實情慝奔于貨欲之塗選者為人擇官官者為身擇利而秉鈞當軸之士身兼官以十數大極其尊小録其要機事之失十恆八九而世族貴戚之子弟陵邁超越不拘資次悠悠風塵皆奔競之士列官千百無讓賢之舉子真著崇讓而莫之省子雅制九班而不得用長虞數直筆而不能糾其婦女莊櫛織紝皆取成于婢僕未嘗知女工絲枲之業中饋酒食之事也先時而婚任情而動故皆不恥淫逸之過不拘妬忌之惡有逆于舅姑有反易剛柔有殺戮妾媵有黷亂上下父兄弗之罪也天下莫之非也又況責之聞四教于古修貞順于今輔佐君子者哉禮法刑政于此大壞如室斯構而去其鑿契如水斯積而決其隄防如火斯畜而離其薪燎也國之將亡本必先顛其此之謂乎故觀阮籍之行而覺禮教崩弛之所由察庾純賈充之事而見師尹之多僻考平吳之功知將帥之不讓思郭欽之謀而悟戎狄之有釁覽傅玄劉毅之言而得百官之邪核傅咸之奏錢神之論而覩寵賂之彰民風國勢如此雖以中庸之才守文之主治之辛有必見之于祭祀季札必得之于聲樂范燮必為之請死賈誼必為之痛哭又況我惠帝以蕩蕩之德臨之哉故賈后肆虐于六宮韓午助亂于外內其所由來者漸矣豈特繫一婦人之惡乎懷帝承亂之後得位羈于強臣愍帝奔播之後徒廁其虛名天下之政既已去矣非命世之雄不能取之矣然懷帝初載嘉禾生于南昌望氣者又云豫章有天子氣及國家多難宗室迭興以愍帝之正淮南之壯成都之功長沙之權皆卒于傾覆而懷帝以豫章王登天位劉向之讖云滅亡之後有少如水名者得之起事者據秦川西南乃得其朋案愍帝蓋秦王之子也得位于長安長安固秦地也而西以南陽王為右丞相東以琅邪王為左丞相上諱業故改鄴為臨漳漳水名也由此推之亦有徵祥而皇極不建禍辱及身豈上帝臨我而二其心將由人能弘道非道弘人者乎淳耀之烈未渝故大命重集于中宗元皇帝文選藝文類聚十一又見群書治要二十九晉紀論晉武帝革命史臣曰帝王之興必俟天命苟有代謝非人事也文質異時興建不同故古之有天下者柏皇栗陸以前為而不有應而不求執大象也鴻黃世及以一民也堯舜內禪體文德也漢魏外禪順大名也湯武革命應天人也高光爭伐定功業也各因其運而天下隨時隨時之義大矣哉古者敬其事則命以始今帝王受命而用其終豈人事乎其天意乎文選藝文類聚十三晉紀論薑維薑維為蜀相國亡主辱弗之死而死于鍾會之亂惜哉非死之難處死之難也是以古之烈士見危授命投節如歸非不愛死也固知命之不長而懼不得其所也蜀志薑維傳評注山亡論夏桀之時厲山亡秦始皇之時三山亡周顯王三十二年宋大丘社亡漢昭帝之末陳留昌邑社亡京房易傳曰山默然自移天下兵亂社稷亡也故會稽山陰琅邪中有怪山世傳本琅邪東武海中山也時天夜風雨晦冥旦而見武山在焉百姓怪之因名曰怪山時東武縣山亦一夕自亡去識其形者乃知其移來今怪山下見有東武里蓋記山所自來以為名也又交州脆山移至青州凡山徙皆不極之異也此二事未詳其世尚書金縢曰山徙者人君不用道士賢者不興或祿去公室賞罰不由君私門成群不救當為易草變號説曰善言天者必質于人善言人者必本于天故天有四時日月相推寒暑迭代其轉運也和而為雨怒而為風散而為露亂而為霧凝而為霜雪立而為蚳此天之常數也人有四肢五臟一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為聲音此亦人之常數也若四時失運寒暑乖違則五緯盈縮星辰錯行日月薄蝕彗孛流飛此天地危診也寒暑不時此天地之蒸否也石立土動此天地之瘤贅也山崩地陷此天地之癰疽也衝風暴雨此天地之奔氣也雨澤不降川澤涸竭此天地之焦枯也搜神記序雖考先志于載籍收遺逸于當時蓋非一耳一目之所親聞覩也亦安敢謂無失實者哉衛朔失國二傳互其所聞呂望事周子長存其兩説若此比類往往有焉從此觀之聞見之難一由來尚矣夫書赴告之定辭據國史之方策猶尚若茲況仰述千載之前記殊俗之表綴片言于殘闕訪行事于故老將使事不二迹言無異塗然後為信者固亦前史之所病然而國家不廢注記之官學士不絶誦覽之業豈不以其所失者小所存者大乎今之所集設有承于前載者則非余之罪也若使采訪近世之事苟有虛錯願與先賢前儒分其譏謗及其著述亦足以明神道之不誣也群言百家不可勝覽耳目所受不可勝載今粗取足以演八略之旨成其微説而巳幸將來好事之士録其根體有以遊心寓目而無尢焉晉書干寶傳司徒議從事中郎之職各掌其所治之曹而紀綱其事體參輔謀議左長史掌職檢其法憲明其分憲掾屬之職敦明教義肅勵清風非禮不言非法不行以訓群吏以貴朝望各掌其所治之曹御覽二百九
