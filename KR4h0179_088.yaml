body:
  text: 賀循上表言車騎大將軍未葬不應作鼓吹鼓吹之興雖本為軍之凱樂有金革之音于宮庭發明大節以此為盛與樂實同案禮于貴臣比卒哭不舉樂今車騎未葬不宜作也通典一百四十七上言諸經宜分置博士尚書被符經置博士一人又多故曆紀儒道荒廢學者能兼明經義者少且春秋三傳俱出聖人而義歸不同自前代通儒未有能通得失兼而學之者也況今學義甚穨不可令一人總之今宜周禮儀禮二經置博士二人春秋三傳置博士三人其餘別經置一人合八人通典五十三上尚書定父子生離服制二親生離吉凶未分服喪則凶事未據從吉則疑于不存心憂居素蓋出人情非官制所裁也右丞蔡謨則奔喪禮有除喪而後歸則未有奔除服之文也宜申明告下若直據東關之事非聖人所行恐不足以釋疑也通典九十八禮奔喪除而後歸者自謂喪葬如禮限于君命者耳若尸靈不收葬禮不成則在家與在遠俱不得除也況或必須求覓以其喪禮待已而成者邪若別以為義未足以服人心也直以禍難未銷不可終身居服故隨時立制為之義斷使依東關故事大將軍上事謂可從也通典九十八循重議答尚書下太常祭祀所用樂名魏氏增損漢樂以為一代之禮未審大晉樂名所以為異遭離喪亂舊典不存然此諸樂皆和之以鐘律文之以五聲詠之于歌詞陳之于舞列宮縣在下琴瑟在堂八音迭奏雅樂竝作登歌下管各有常詠周人之舊也自漢氏以來依放此禮自造新詩而已舊京荒廢今既散亡音韻曲折又無識者則于今難以意言宋書樂志江左初立宗廟尚書下太常祭祀所用樂名太常賀循答答尚書符問藉田應躬祠先農不漢儀無正有至尊應自祭之文然則周禮王者祭四望則毳冕祭社稷五祀則絺冕以此不為無親祭之義也宜立兩儀注晉書禮志上潁川豫章廟主不毀議禮兄弟不相為後不得以承代為世殷之盤庚不序陽甲漢之光武不繼成帝別立廟寢使臣下祭之此前代之明典而承繼之著義也惠帝無後懷帝承統弟不後兄則懷帝自上繼世祖不繼惠帝當同殷之陽甲漢之成帝議者以聖德沖遠未便改舊茲如此禮通所未論是以惠帝尚在太廟而懷帝復入數則盈八盈八之禮由惠帝不出非上祖宜遷也下世既升上世乃遷遷毀對代不得相通未有下升一世而上毀二世者也惠懷二帝俱繼世祖兄弟旁親同為一世而上毀二為二世今以惠帝之崩已毀豫章懷帝之入復毀潁川如此則一世再遷祖位橫折求之古義未見此例惠帝宜出尚未輕論況可輕毀一祖而無義例乎潁川既無可毀之理則見神之數居然自八此盡有由而然非謂數之常也既有八神則不得不于七室之外權安一位也至尊于懷惠俱是兄弟自上後世祖不繼二帝則二帝之神行應別出不為廟中恆有八室也又武帝初成太廟時正神止七而楊元后之神亦權立一室永熙元年告世祖諡于太廟八室此是苟有八神不拘于七之舊例也又議者以景帝俱巳在廟則惠懷一例景帝盛德元功王基之本義著祖宗百世不毀故所以特在本廟且亦世代尚近數得相容安神而已無逼上祖如王氏昭穆既滿終應別廟也以今方之既輕重義異又七廟七世之親昭穆父子位也若當兄弟旁滿輒毀上祖則祖位空懸世數不足何足于三昭三穆與太祖之廟然後成七哉今七廟之義出于王氏從禰以上至于高祖親廟四世高祖以上復有五世六世無服之祖故為三昭三穆并太祖而七也故世祖郊定廟禮京兆潁川曾高之親豫章五世征西六世以應此義今至尊繼統亦宜有五六世之祖豫章六世潁川五也俱不應毀今既云豫章先毀又當重毀潁川此為廟中之親惟從高祖以下無復高祖以上二世之祖于王氏之義三昭三穆廢缺其二甚非宗廟之本所據承又違世祖祭征西豫章之意于一王定禮所闕不少晉書賀循傳追尊琅邪恭王為皇考議案禮子不敢以己爵加父晉書賀循傳禮典之義子不敢以己爵加其父號宋書禮志四追諡周處議處履德清方才量高出歷守四郡安人立政人司百寮貞節不撓在戎致身見危授命此皆忠賢之茂實列士之遠節案諡法執德不回曰孝晉書周處傳廣昌卿君喪停冬至小會議案古者臣義重雖以至尊之義降而無服三月之內猶錫縗以居不接吉事故春秋晉大夫智悼子末葬平公作樂杜蕢譏之咸寧詔書宜為定制丁潭為琅邪王裒終喪議禮天子諸侯俱以至尊臨人上下之義君臣之禮自古以來其例一也故禮盛則竝全其重禮殺則從其降春秋之事天子諸侯不行三年至于臣為君服亦宜以君為節未有君除而臣服君服而臣除者今法令諸侯卿相官屬為君斬衰既葬而除以令文言之明諸侯不以三年之喪與天子同可知也君若遂服則臣子輕重無應除者也若當皆除無一人獨重之文禮有攝主而無攝重故大功之親主人喪者必為之再祭練祥以大功之服主人三年喪者也苟謂諸侯與天子同制國有嗣王自不全服而人主居喪素服主祭三年不攝吉事以尊令制若當遠亦三代令復舊典不依法令者則侯之服貴賤一例亦不得唯一人論晉書丁潭傳潭為琅邪王裒郎中令會裒死潭上書請終喪賀循議嗣新蔡王滔不得還嗣章武議章武新蔡俱承一國不絶之統義不得替其本宗而先後傍親案滔既巳被命為人後矣必須無復兄弟本國已絶然後得還所生今兄弟在遠不得言無道理雖阻復非絶域且鮮卑恭命信使不絶自宜詔下遼東依劉群盧諶等例發遣今還繼嗣本封謂滔今未得便委離所後也晉書安平王孚孫河間王洪傳洛陽陷章武王混諸子皆沒于胡而小子滔初嗣新蔡王確亦與其兄俱沒後得南還與新蔡太妃不協太興二年上疏以兄弟竝沒在遼東章武國絶宜還所生太妃訟之事下太常太常賀循議弟兄不合繼位昭穆議建武中尚書符云武皇帝崩遷征西府君惠皇帝崩遷章郡府君懷帝入廟當遷潁川府君賀循議古者帝各異廟廟室之有室以象常居未有二帝共處之義也如惠懷二主兄弟同位于禘祫之禮會于太祖自應同列異坐而正昭穆至于常居之室不可以尊卑之分義不可黷故也昔魯夏父弗忌躋僖公于閔上春秋謂之逆祀僖公閔之庶兄閔公先立嘗為君臣故也左氏傳曰子雖齊聖不先父食懷帝之在惠帝代居藩積年君臣之分也正位東宮父子之義也雖同歸昭穆尊卑之分與閔僖不異共室褻黷非殊尊卑之禮以古義論之愚謂未必如有司所列惠帝之崩當以遷章郡府君又以懷帝入廟當遷潁川府君此是兩帝兄弟各遷一祖也又主之迭毀以代為正下代既升則上代稍遷代序之義也若兄弟相代則共是一代昭穆位同不得兼毀二廟禮之常例也又殷之盤庚不序陽甲之廟而上繼先君以弟不繼兄故也既非所繼則廟應別立由此言之是惠帝應別立上祖宜兼遷也故漢之光武不入成帝之廟而上繼元帝義取于此今惠懷二帝不得不上居太廟潁川未遷見位餘八非祀之常不得于七室之外假立一神位通典五十一又議殷人六廟比有兄弟四人襲為君者便當上毀四廟乎如此四代之親盡無復祖禰之神矣又案殷紀成以湯下至于帝乙父子兄弟相繼為君合十二代而正代唯六易乾共度曰殷帝乙六代王鑿也以此言之明不數兄弟為正代通典五十一遭難未葬入廟議懷帝梓宮未反遭時之難故事非常不得以常禮自拘宜以時入太廟修祭祀之禮通典五十一懷帝蒙塵崩于平陽梓宮未反京師元帝立廟之時欲遷入廟喪山已過三年太常賀循議在喪者不祭議禮在喪者不祭祭吉事故也其義不但施于生人亦祖禰之情同其哀戚故云于死者無服則祭也今人若有服祭祀如故吉凶相于非禮意也通典五十二出後子為本親服議案喪服制曰為人後者為兄弟降一等報于所為後之子兄弟若子時人論者多以為後者子孫皆計本親而降意所不安或曰嫡子不為人後者直謂己嫡不以出後當以支子耳無明于後者之子見捨本親何以言不得為人後邪答曰五服之制其屬有六一去本繫以名為正名正則男女有別上下不悖若假之以號者則輕其權定之以名者則尊其統故曰有嫡子者無嫡孫何為言無正以不得名之不得名之則卑其服若得名之則重其制此之有無尊卑之宜則是彼之後者嫡庶之例也至于庶子為後稱名不言孝為墠而祭以其尚有一志不專故也其子則定名而處廟以為援情可制此義宜悖故也豈非顧本有己復統有節哉或曰所後在五服之外父制周年而己無服疏親戚之恩非先賢之意也答曰何為其然禮有節權恩義相厚為所生無絶道其餘皆宜權制也夫初出後者離至親之側為別宗之胄闕晨昏之勸廢終養之道顧復之恩靡報罔極之情莫伸義雖從于為後恩實降于本親故有一降之差若能專心所繼後者之子上有所承于今為同室之密顧本有異門之疏若以父服輒當後者至于生不及祖父母諸昆弟父有重制而已無服又出母齊衰而杖其子又不從服今出後者于父母乃為不杖之周恐其子不得反重也禮失于煩故約以取通是以後者之子出母之孫其禮闕而不載生在他邦父已不稅其義幽而不彰既以不疑父之出母何獨遲疑別宗之祖邪服之所降其品有四君大夫以尊降公子大夫之子以厭降公之昆弟以旁尊降為人後者女子嫁者以出降四降之名同止一身出之者子豈當獨以為傳代稱乎生長于外不得言出猶繼父未嘗同居不為異也又報父出乎誠是居已稠役子以父為旁尊則之所天在此初出情親故不奪其親而與其降承出之後義漸輕疏而絶其恩絶其恩者以一其心其心一則所後親所後親則祭祀敬祭祀敬則宗廟嚴宗廟嚴則社稷重重社稷以尊百姓齊一身以肅家道此殆聖人之意也通典九十六師弟子相為服議如朋友之禮異者雖出行猶絰所以尊師也案禮記夫子之喪門人疑所服子貢曰昔夫子喪顏回若喪子而無服請喪人子若喪父而無服于是門人廬于墓所心喪三年蓋師徒之恩重也無服者謂無正喪之服也孔子之喪二三子皆絰而出注曰為師也然則凡弔服加麻者出則變服矣通典一百一琅邪世子諡議諡者所以表功行之目也故古者未居成人之年及名位未備者皆不作諡也是以周靈王太子聰哲明智年過成童亡猶無諡春秋諸侯即位之年稱子踰年稱君稱子而卒皆無諡名未成也未成為君既無君諡時見稱子復無子諡明俱未得也唯晉之申生以仁孝遭命年過成人晉人悼之故特為諡諸國無例也及至漢代雖遵茲義過于古禮然亦未有未踰年之君而立諡也殤沖二帝皆已踰年方立諡案哀沖太孫各以幼齡立諡不必依古然皆即位臨官正名承重與諸下定君臣之義尊成體具事無所屈且天下之名至重體其尊者亦宜殊禮故隨時定制有立諡之事也琅邪世子雖正體乎上生而全貴適可明嫡統之義未足定為諡之證也通典一百四琅邪世子未周而卒大司農表琅邪世子降君一等宜諡哀愍太常賀循云云箋日夜憂懷慷慨發憤文選齊安陸王碑注引臧榮緒晉書報虞預書論楊方此子開拔有志意只言異于凡猥耳不圖偉才如此其文甚有奇分若出其胸臆乃是一國所推豈但牧豎中逸群邪聞處舊黨之中好有謙沖之行此亦立身之一隅然世衰道喪人物凋弊每聞一介之徒有向道之志冀之願之如方者乃荒菜之特苗鹵田之善秀姿質巳良但沾染未足耳移植豐壤必成嘉穀足下才為世英位為朝右道隆化立然後為貴昔許子將拔樊仲昭于賈豎郭林宗成龐德公于畎畝足下志隆此業二賢之功不為難及也晉書楊方傳虞預以方所為文示循循報書答王導書論虞廟漢光武于屬以元帝為父故于昭穆之敘便居成帝之位而遷成帝之主于長安高廟今聖上于惠帝為兄弟亦當居惠帝之位而上繼武帝惠帝亦宜別廟則虞妃廟位當以此定通典四十七愚以尊王既當天之正統而未盡震居之極稱既名稱未極更于事宜為難或謂可立別廟使進退無犯意謂以尊意所重施于今宜如有可爾理若全尊尋備昭穆既正則俯府從定位亦無拘小別然非常禮無所取準于名則未滿于禮則變常竊以戴所斟酌于人情為未安通典四十七與王導書世祖武皇帝初成太廟時正神既七而有楊元后之神時亦權立一室永熙元年告世祖諡于太廟八室刁協案元皇后于太廟東陰室中安神主不增立一室通典四十八答王導書愚謂告四祖之廟而行蜀書劉先主初封漢王時群臣共奏上勳德承以即位今雖事不正同然議可方論通典五十五又答王導書古禮及漢氏之初皆帝帝異廟即位大事謁于太祖故晉文朝于武宮漢文謁于高廟也至光武之後唯有高宗兩廟而已祖宗兩廟昭穆皆共堂別室魏晉依之亦唯立一廟則一廟之中苟在未毀恐有事之日不得偏有不告然人不詳太廟定議不敢必據欲依古禮唯告宣帝一廟今意以祖宗非一但太廟合共事與古異不得以古禮為斷通典五十五答尚書符問尚書符問太常賀循太廟制度南向七室北向陰室復有七帝后應共處七室坎中當別處陰室循上曰謹案后配尊于帝神主所居同太室通典四十八循又案漢儀藏主于室中西牆壁坎中去地六尺一寸當祠則設座于坎下禮天子達嚮者牖也謂夾戶之窗古者帝后異廟今者共堂別室制度不同疑室戶亦異又案古禮神主皆盛以石函余薦籍文不備見通典四十八答訪琅邪敬后改神主琅邪王妃敬后前薨而王後纂統追加諡號改神主訪賀循云琅邪典祠令孫文立議使者奉主及冊命詣中閣中人受取人內易著石函中故主留于廟閣新主出廟國官拜送如文議則非于行廟受冊循答曰崇諡敬后宜立行廟以主后之號有加常尊輕重不同則宜禮有變故既立行廟則常主宜出居座位臨加冊諡而竝易以新主則主宜還埋故廟兩階之閒通典四十八答傅純難傅純難曰案雜記本文己在小功則得冠在大功不得冠也鄭氏云己大功卒哭以冠與本文不同何邪又要記不見己冠不知己冠當在何條賀循答曰禮云大功小功末可以冠娶道父子為嫌但施于子不施于己故下言己雖小功著己與子亦同也俱同則大功之末己可以冠以理推之正自應爾非為與本文不同要記不見己冠直是文句脫耳通典五十六答傅純問改葬服鄭玄云三月者以親覩尸柩故三月以序其餘懷但遲速不可限故不在三月章也王氏虞畢而除且無正文鄭得從重故要記從之答傅純問傅純問賀循曰要記云庶兄弟既死之後各自為一宗之祖其嫡繼之各為大宗此是大傳所謂別子為祖者也然則別子有十便為十祖宗也而母弟之後獨無大宗母弟本重而後輕庶弟本輕而後重其義可乎又王氏以別子為祖諸侯母弟則不盡為祖也杜氏以為始封之君別子一人為祖二家不同願聞其說答曰君之母弟與群庶兄弟為別子之後俱為大宗而難云母弟之後獨無大宗不審此義何所承乎以僕所言母弟為宗不應有疑則本輕後重之難無所施也又案禮別子為祖不限前後此為每公之子皆別子也則魯之三桓鄭之七族盡其人矣王杜二義不同者二儒通適不應有誤倘所言者自有所施不見其文淺學所見謂如上義傅又問曰大傳云其士大夫之嫡公子之宗道也請解之答曰士大夫者謂庶昆弟之在位也其士大夫之嫡者謂公子之子孫各祖其別子大宗之道又由此而成故重言公子之宗道也通典七十三答庾亮問庾亮問賀循曰案禮宗子之服傳代不遷所以重其統也是以祖宗之正不易則本枝昭穆歷代而不亂此立宗之大旨也然則士大夫及諸侯事于典禮者服宗之義便應相放矣而禮祖宗之文唯著諸侯別子不列卿大夫之制不審此由諸侯君其族人族人不得宗其君故祖宗之制指為此歟自卿大夫以下與其宗黨無君臣之懸則宗黨統有常嫡服宗有成例故不得別著其制也將由卿大夫位卑則宗服之制厭宗嫡無不遷服紀止五族故不復別見其義也今既無士大夫依諸侯別子之明文又不見無得立宗之定制而頃者以來諸私服于嫡者無服者則制緦有服者無加又不詳此為各以非開國代封之家故避嫌謙而不敢私重其宗邪將此之由自有所承願告旨要答曰禮宗子之義所以明本祖之正統紀百代而不紊者也而宗之義委曲著見者多在別子非卿大夫之文偏不詳悉服之致疑有如來旨然舊義雖非別子起于是邦而為大夫者便為大宗其嫡繼之亦百代不遷禮記王制云大夫三廟一昭一穆與太祖之廟而三鄭君解曰太祖別子始爵者也雖非別子始爵者亦然此其義也此謂起于是國盛德特興為一宗之始者也如此則百代不遷統族序親及族人服之皆宜如別子之宗也又宗子之服雖在絶族皆齊縗三月代衰禮替敦之者少吳中略無此服中土緦而不𧞓其所由來以致政教淩遲人情漸慢非謂大夫位卑或以非代封為嫌也通典七十三答羊祖延問羊祖延問曰外生車騎婦先遭車騎喪斬縗服也後遭母喪齊縗服也禮為兩制服有所變易邪案曾子問曰君喪己殯臣有父母喪歸家殷事即往應依此不往服何服家服何服賀彥先答曰禮女子適人服夫三年而降其父母傳曰不二斬既不二斬則不得捨其所重服其所降有分明矣國妃有車騎斬縗之服宜以包母齊縗無兩服之義唯初奔當有母初喪之服以明本親之恩成服之日故宜反斬縗之服此輕重之義也又禮君不厭臣君既殯又有父母之喪與君俱三年故有歸家之義而猶云有君喪者不敢私服何除之有以此言之雖君父兩服當其兼喪以君縗為主而不以已私服為重也通典九十七答韓虯問韓虯問賀循曰案傅純曰鄭氏謂改葬三月而除王氏以既虞為節改葬之神在廟久矣不應復虞見府君所答唯云宜三月謂王氏為短鄭為長而不答應虞之義此為應虞否也循答曰凡移葬者必先設祭告墓而開冢從墓至墓皆設奠如將葬朝廟之禮意亦有疑既設奠于墓所以終其事必爾者雖非正虞亦似虞之一隅也但不得如常虞還祭殯宮耳故不甚非王氏但不許其便除然禮無正文是以不明言也通典一百二防墓論防是舊墓也夫子葬又新其墳故謂之修非墓崩後之言也墳新兩甚故穨毀穨毀故悵怛不應耳所以言不修墓者言由已修之故倒毀也通典一百三祭儀祭以首時及臘歲凡五祭將祭前期十日散齊不御不樂不弔前三日沐浴改服居于齊室不交外事不食葷辛靜志虛心思親之存及祭施位牲大夫少牢士以特豕祭前之夕及臘鼎陳于門外主人即位西面宗人袒告充主人視殺于門外主婦視饎于西堂下設洗于阼階東南酒醴甒于房戶牲皆體解平明設几筵東面為神位進食乃祝祝乃酌奠拜祝訖拜退西面立少頃酌酳醴一獻畢拜受酢飲畢拜婦亞獻薦棗栗受酢如主人其次長賓三獻亦以燔從如主人次及兄弟獻始進俎庶羞衆賓兄弟行酬一遍而止徹神俎羹飯為賓食食物如祭如餕畢酌酳一周止佐徹神饋饌于室中西北隅以為厭祭既設閉牖戶宗人告畢賓乃退凡明日將祭今夕宿賓祭日主人群子孫宗人祝史皆詣廳事西面立以北為上有薦新在四時仲月大夫士有田者既祭而又薦無田者薦而不祭禮貴勝財不尚苟豐貧而不逮無疑于降大夫降視士士從庶人可也又不及飯菽飲水皆足致敬無害于孝通典四十八宗義古者諸侯之別子及起于是邦為大夫者皆有百代祀之謂之太祖太祖之代則為大宗宗之本統故也其支子旁親非太祖之統謂之小宗小宗之道五代則遷當其為宗宗中奉之加于常禮平居則每事咨告死亡則服之齊縗以義加也又喪服要記曰公子之二宗皆一代而已庶兄弟既亡之後各為一宗之祖也嫡繼其正統者各自為大宗乃成百代不遷之宗也通典七十三宗議奉宗加于常禮平居即每事咨告凡告宗之例宗內祭祀嫁女娶妻死亡子生行求改易名字皆告若宗子時祭則宗內男女畢會喪故亦如之若宗內吉凶之事宗子亦普率宗黨以赴役之若宗子時祭則告于同宗祭畢合族于宗子之家男子女子以班宗子為男主宗婦為女主故云宗子雖七十無主婦以當合族紀宗故也凡所告子生宗子皆書于宗籍大宗無後則支子以昭穆後之後宗立則宗道存而諸義有主也立主義存而有一人不惇者則會宗而議其罰族不可以無統故立宗宗位既定則常尊歸之理其親親者也是故義定于本自然不移名存于政而不繼其人宗子之道也故為宗子者雖在凡才猶當佐之佑之而奉以為主雖有高明之屬盛德之親父兄之尊而不得干其任者所以全正統而一人之情也若姦回淫亂行出軌道有殄宗廢祀之罪者然後乃告諸宗廟而改立其次亦義之權也通典七十三葬禮至墓之位男子西向婦人東向先施幔屋于埏道北南向柩車既至當坐而住遂下衣几及奠祭哭畢柩進即壙中神位既窆乃下器壙中薦棺以席緣以紺繒植翣于牆左右挾棺如在道儀通典八十六喪服要記凡諸侯之嗣子繼代為君君之群弟不敢宗君君命其母弟為宗諸弟宗久當為之字亦謂之大宗死則為齊縗九月若無母弟則命庶弟之大者為宗諸弟宗之亦如母弟則為之大功九月此二宗者一代而已庶兄弟既死之後各為一宗之祖婦人為君服案鄭注喪服云凡妻從夫降一等各合三月則妻宜無服而猶三月者古者大夫不外娶其妻則本國之女也雖從夫而出婦人歸宗往來猶人故從人服也長子有服謂未去者也循以為以道去君非衆之重其子尚可以留值君薨則服也貴不降服諸侯于其旁親一無所服唯父母妻長子長子之妻及為父之後者姑姊妹嫁于諸侯及始封之君所未臣諸父昆弟皆以其服服之大夫為其外親為士者尊雖不同亦不降大夫女為國夫人唯父母及昆弟為父後者不降士女為大夫妻者不降高祖曾祖祖父母兄弟為父後者及大宗子而已父在為出母服父在為母厭尊故出而從周出母服不減者以本既降義無再厭故也父在為母既己杖矣若父在母出宜重降者則宜在不杖條今在杖條明不再降杖者必居廬居廬者必禫
