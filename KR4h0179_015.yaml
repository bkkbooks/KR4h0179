body:
  text: 東海王越敕世子毗夫學之所益者淺體之所安者深間習禮度不如式瞻儀型諷味遺言不若親承音旨王參軍人倫之表汝其師之世説賞譽篇東海王鎮許昌以王安期為記室參軍雅相知重敕世子毗云云或曰王趙鄧三參軍人倫之表汝其師之謂安期鄧伯道趙穆也袁宏作名士傳直云王參軍或云趙家先猶有此本又見文選齊竟陵王行狀注引晉中興書與趙穆王承阮瞻鄧攸謝鯤等書禮年八歲出就外傅明始可以加師訓之則十年曰幼學明可以漸先王之教也然學之所受者淺體之所安者深是以間習禮度不如式瞻軌儀諷味遺言不如親承辭旨小兒毗既無令淑之質不聞道德之風欲屈諸君時以間豫周旋燕誨也世説賞譽篇注引趙吳郡行狀又見晉書阮瞻傳承制起陳敏書將軍建謀當國則有大漕之勳及遭冰昌之亂則首率義徒以寡敵衆外無強兵之援內無運籌之侶隻身挺立雄略從橫擢奇謀於馬首奮靈計於臨危金聲振於江外精光赫於揚楚攻堅陷險三十餘戰師徒無虧勍敵自滅五州復全苞茅入貢豈非將軍之功力哉今羯賊屯結遊魂河濟鼠伏雉竄藏匿陳留始欲姦盜終圖不軌將軍孫吳之術既明已試之功先著孤與將軍情分特隆想割草土之哀抑難居之思捨絰執戈來恤國難天子遠巡鑾輿未反引領東眷有懷山陵當憑將軍勠力王輅有旋將軍率將所領承書風發米布軍資惟將軍所運晉書陳敏傳與江統書昔王子師作豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此求者不知君舉高平郤道微為賢良陳留阮宣子為直言濟北程弘叔為方正皆於時選為允御覽二百六十三引江家傳又晉書江統傳有前五句檄方鎮兵討石勒皇綱失御社稷多難孤以弱才備當大任自頃胡寇內逼偏裨失利帝鄉便為戎州冠帶奄成殊域朝廷上下以為憂懼皆由諸侯蹉跎遂及此難投袂忘履討之已晚人情奉本莫不義奮當須合會之衆以俟戰守之備宗廟主上相賴匡救檄至之日便望風奮發忠臣戰士效誠之秋也晉書東海王越傳上表言河間王顒等宜委任如舊自愍懷被害皇儲不建委重前相輒失臣節是以前年太宰與臣永惟社稷之二不可久空所以共啓成都王穎以為國副受重之後而弗克負荷小人勿用而以為腹心骨肉宜敦而猜佻荐至險詖宜遠而讒説殄行此皆臣等不聰不明失所宗賴遂令陛下謬於降授雖戮臣等不足以謝天下今大駕還宮文武空曠制度荒破靡有孑遺臣等雖劣足匡王室而道路之言謂張方與臣等不同既惜所在興異又以太宰惇德允元著於具瞻每當義節輒為社稷宗盟之先張方受其指教為國效節昔年之舉有死無二此即太宰之良將陛下之忠臣但以受性強毅不達變通遂守前志已致紛紜然退思惟既是其不易之節且慮事翻之後為天下所罪故不即西還耳原其本事實無深責臣聞先代明主未嘗不全護功名今福流子孫自中間以來陛下功臣初無全者非獨人才皆劣其於取禍實由朝廷策之失宜不相容恕以一旦之咎喪其積年之勳既違周禮議功之典且使天下之人莫敢復為陛下致節者臣等此言豈獨為一張方實為社稷遠計欲令功臣長守富貴臣愚以為宜委太宰以關右之任一事方重及自州郡以下選舉授任一皆仰成若朝之大事廢興損益每輒疇咨此則二伯述職周召分陝之義陛下復行於今時遣方還郡令群后申志時定王室如加方官請悉如舊此則忠臣義士有勸功臣必全矣司徒戎異姓之賢司空越公族之望並忠國愛主小心翼翼宜幹機事委以朝政安北將軍王浚佐命之胤率身履道忠亮清正遠近所推如今日之大舉實有定社稷之勳此是臣等所以嘆息歸高也浚宜特崇重之以副群望遂撫幽朔長為北藩臣等竭力扞城藩屏皇家陛下垂拱而四海自正則四祖之業必隆於今日月之暉昧而復曜乞垂三思察臣所言又可以臣表西示太宰晉書范陽王虓傳與東平王楙鎮東將軍周馥等上言案篇末云可以臣表西示太宰則此篇是表也又上表理成都王穎成都王失道為姦邪所誤論王之身不宜深責且先帝遺體陛下群弟自元康以來罪戮相尋實海內所為胸胸而臣等所以痛心今廢成都更封一邑宜其必許若廢黜尋有禍害既傷陛下矜慈之恩又令遠近恆謂公族無復骨肉之情此實臣等內省悲慚無顏於四海也乞陛下察臣忠款晉書范陽王虓傳上言宜敕作樂賢堂佛像頌樂賢堂有先帝手畫佛像經歷寇難而此堂猶存宜敕作頌御覽六百五十七引晉書帝下其議以蔡謨言遂寢又見晉書蔡謨傳答安南將軍甘卓書季思足下勞於王事天綱暫圮中原丘墟四海義士方謀剋復中興江左草創始爾豈圖惡逆萌自寵臣吾以暗短託宗皇屬仰豫密命作鎮南夏親奉中詔成規在心伯仁諸賢扼腕岐路至止尚淺凡百茫然豺狼易驚遂肆醜毒聞知駭踊神氣衝越子來之儀人思自百不命而至衆過數千誠足以決一旦之機攄山海之憤矣然迫於倉卒舟楫未備魏乂李恆尋見圍逼是故事與意違志力未展猥辱來使深同大趣嘉謀英算發自深衷執讀周復欣無以量足下若能卷甲電赴猶或有濟若有狐疑求我枯魚肆矣兵聞拙速未覩工遲季思足下勉之勉之書不盡意絶筆而已晉書譙王承傳圓竹扇賦止若垂棘曜匣遊若羲和朝征靜無為而虛寂動感通而風生書鈔一百三十四京兆府君遷主議諸儒謂太王王季遷主藏於文武之祧如此府君遷主宜在宣皇帝廟中然今無寢室宜變通而改築又殷祫太廟征西東面宋書禮志三王允之表郡與祖名同乞改授議春秋之義不以家事辭王事是上之行乎下也夫君命之重固不得崇其私又國之典憲亦無以祖名辭命之制也通典百四咸康八年詔以王允之為衛將軍會稽內史允之表郡與祖會名同乞改授詔曰祖諱孰若君命之重邪下八座詳之給黃門侍郎譙王無忌議以為喪遇閏議夫閏非正數故附前月為稱至於月也豈得為一臣請以宿度論之閏所附月盡之夕寧猶見乎又閏之初豈不始魄以茲言之可不為兩月邪天無是月正數耳非無此月也若用閏祥則虧二十五月之大斷失周忌之正典出於祥月非卜遠日之謂二三無據義實致疑愚謂正周而除於禮為允通典一百御史中丞譙王恬議與張新安論孔釋書佛教以罪福因果有若影響聖言明審令人寒心然自上古帝皇文武孔周典謨訓誥靡不周備未有述三世顯敘報應者也彼衆聖皆窮理盡性照曉物緣何得忍視陷溺莫肯援接曾無一言示其津徑且釣而不綱戈不射宿博碩肥腯上帝是享以此觀之蓋所難了想二三子揚榷而陳使劃然有證祛其惑焉弘明集十二上表謝罪文思不能聿修自詒罪戾憂懼震惶惋愧交集臣御家無方威訓不振致使子姪愆法仰負聖朝悚赧兼懷胡顏自處請解所任歸罪闕庭晉書司馬休之傳以兄子文思為亂上疏謝案宋書武帝紀中休之上表自陳云裕遠送文思臣順其此旨表送章節則以此疏為表今從之上表自陳臣聞運不常一治亂代有陽九既謝圯終則泰昔篡臣肆逆皇綱絶紐十世未改鼎祚再隆太尉臣裕威武明斷首建義旗除蕩元凶皇后反正布衣匹夫匡復社稷南剿盧循北定廣固千載以來功無與等由是四海歸美朝野推崇既位窮台牧權傾人主不能以道處功恃寵驕溢自以酬賞既極便情在無上刑戮逆濫政用暴苛問鼎之迹日彰人臣之禮頓缺陛下四時膳御觸事縣空宮省供奉十不一在皇后寢疾之際湯藥不周手與家書多所求告皆是朝士共所聞見莫不傷懷憤歎口不敢言前揚州刺史元顯第五息法興桓玄之釁逃遠於外王路既開始得歸本太傅之胤絶而復興凡在有懷誰不感慶裕吞噬之心不避輕重以法興聰敏明慧必為民望所歸芳蘭既茂內懷憎惡乃妄扇異言無罪即戮大司馬臣德文及王妃公主情許切逼並狼狽請命逆肆禍毒誓不矜許冤酷之痛感動行路自以地卑位重荷恩崇大乃以庶孽興德文嫡婚致茲非偶實由威逼故衛將軍劉毅右將軍劉藩前將軍諸葛長民尚書僕射謝混南蠻校尉郗僧施或盛勳德胤令望在身皆社稷輔弼協贊所寄無罪無辜一旦夷滅猜忍之性終古所希臣自惟門戶衰破賴之獲存皇家所重終古難匹是以公私歸馮事盡祗順再授荊州輒苦陳告自以才弱位隆不宜久荷分陝屢求解任必不見聽前經攜侍老母半家俱西凡諸子姪悉留京輦臣兄子譙王文思雖年少常人粗免咎悔性好交遊未知防遠群醜交構為其風聲裕遂翦戮人士遠送文思臣順其此旨表送章節請廢文思改襲大宗遣息文寶送女東歸自謂推誠奉順理不過此豈意裕苞藏禍心遂見討伐加惡文思構生罪釁群小之言遠近噂誻而臣純愚暗信必謂不然尋臣府司馬張茂度狼狽東歸南平太守檀範之復以此月三日委郡叛逆尋有審問東軍已上裕今此舉非有怨憎正以臣王室之幹位居藩嶽時賢既盡唯臣獨存規以翦滅成其篡殺鎮北將軍臣宗之青州刺史臣敬宣並是裕所忌憚欲以次除蕩然後傾移天日於事可易今荊雍義徒不召而集子來之衆其會如林豈臣無德所能綏致蓋七廟之靈理貫幽顯輒授文思振武將軍南郡太守宗之子竟陵太守魯軌進號輔國將軍臣今與宗之親御大衆出據江津案甲抗威隨宜應赴今絳旗所指唯裕兄弟父子而已須剋蕩寇逆尋續馳聞由臣輕弱致裕淩橫上慚俯愧無以厝顏宋書武帝紀中義熙十一年收休之子文寶兄子文祖並於獄賜死率衆軍西討休之上表自陳
