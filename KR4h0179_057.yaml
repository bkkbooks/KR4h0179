body:
  text: 袁宏東征賦惟吾生于末運託一葉于鄧林顧微軀之眇眇若絶響之遺音壯公瑾之明達吐不世之奇策挫百勝于崇朝靡雲旗于赤壁三光一舉而參分四海指麾而中隔過武昌以消搖登樊山以流眄訪遺老以證往乃西鄂之舊縣曩有吳之初基升員丘而豹變爾乃出桑洛會通川背彭澤面長泉洲渚迢遰𡼠岫虛懸即雲似嶺望水若天日月出乎波中雲霓生于浪間嗟我行之彌留跨晦朔之倏忽風褰林而蕭瑟雲出山而逢勃驚瀾嶾嶙而嶽轉穨波嵔𡾋以嶺沒若魚舟之小狹衝奔湍以檮杌擢弱楫之弗施投洪流以纖骨向孫氏之南面鑽靈龜以相土橫酆鎬之制度窮河洛之規矩經始郛郭築室葺宇金城萬雉崇墉百堵君臣有章上下獲敘所以能三分天下而有其文武到吳都以停舟覽闔閭之餘塵建修城以營郭引通流而發津遠矣吳德舊邦維新泰伯被髮仲雍文身言偃以文學遺風季札以讓國稱仁高節顯于華夏端委行乎海濱藝文類聚二十七沿西塞之峻崿御覽四十八精金百鍊在割能斷功則治人職思靖亂長沙之勳為史所讚世説文學篇又晉書袁宏傳作功以濟時風鑒散朗或搜或引身雖可亡道不可隕則宣城之節信義為允世説文學篇注引續晉陽秋北征賦于時天高地涸木落水凝繁霜夜灑徑風晨興日曖曖其已穨月亭亭而虛升御覽二十七魚託水而成鯤木在山而有松御覽九百四十聞所聞于相傳云獲麟于此野誕靈物以瑞德奚授體于虞者悲尼父之慟泣似實慟而非假豈一物之足傷實致傷實致傷于天下感不絶于余心遡流風而獨寫世説文學篇注引袁宏集又見晉書袁宏傳于是背梁山截汶波泛清濟傍祝阿初學記六引兩條酎宴賦朱帷赫以霞布文選赭白馬賦注夜酣賦開金扉坐瓊筵衛姬進鄭女前形窈窕以纖弱豔妖冶而清妍似春蘭之齊秀象明月之隻懸文選謝朓始出尚書省詩注御覽三百八十一表田畝由是丘墟都市化為珠玉御覽八百四十與謝僕射書聞見擬為吏部郎不知審爾果當至此誠相遇之過御覽二百十六與范曾書四海鼎沸天轡將移杖短策以晨征登重幕以吐奇指六合以倒戈望崑崙而舉麾御覽三百五十九後漢紀序後漢紀序豫嘗讀後漢書煩穢雜亂睡而不能竟也聊以暇日撰集為後漢紀其所綴會漢紀謝承書司馬彪書華嶠書謝忱書漢山陽公紀漢靈獻起居注漢名臣奏旁及諸郡耆舊先賢傳凡數百卷前史闕略多不次敘錯繆同異誰使正之經營八年疲而不能定頗有傳者始見張璠所撰書其言漢末之事差詳故復搜而益之夫史傳之興所以通古今而篤名教也丘明之作廣大悉備史遷剖判六家建立十書非徒記事而已信足扶明義教網羅治體然未盡之班固源流周贍近乎通人之作然因藉史遷無所甄明荀悅才智經綸足為嘉史所述當世大得治功已矣然名教之本帝王高義韞而未敘今因前代遺事略舉義教所歸庶以弘敷王道前史之闕古者方今不同其流亦異言行趣舍各以類書故觀其名迹想見其人丘明所以斟酌抑揚寄其高懷末吏區區注疏而已其所稱美止宇事義疏外之意歿而不傳其遺風餘趣蔑如也今之史書或非古之人心恐千載之外所誣者多所以悵怏躊躇操筆悢然者也後漢紀黃姬水本又蔣國祥本七賢序阮公瓌傑之量不移于俗然獲免者豈不以虛中犖節動無過則乎中散遣外之情最為高絶不免世禍將舉體秀異直致自高故傷之者也山公中懷體默易可因任平施不撓在衆樂同遊刃一世不亦可乎御覽四百四十七案此當即竹林名士傳敘也世説文學篇注宏以夏侯泰初何平叔王輔嗣為正始名士阮嗣宗嵇叔夜山巨源向子期劉伯倫阮仲容王濬仲為竹林名士裴叔則樂彥輔王夷甫庾子嵩王安期阮千里衛叔寶謝幼輿為中朝名士三國名臣序贊夫百姓不能自治故立君以治之明君不能獨治則為臣以佐之然則三五迭隆歷代承基揖讓之與干戈文德之與武功莫不宗匠陶鈞而群才緝熙元首經略而股肱肆力雖遭離不同迹有優劣至于體分冥固道契不墜風美所扇訓革千載其揆一也故二八升而唐朝盛伊呂用而湯武寧三賢進而小白興五臣顯而重耳霸中古陵遲斯道替矣居上者不以至公理物為下者必以私路期榮御員者不以信誠率衆執方者必以權謀自顯于是君臣離而名教薄世多亂而時不治故蘧寧以之卷舒柳下以之三黜接輿以之行歌魯連以之赴海衰世之中保侍名節君臣相體若合符契則燕昭樂毅古之流也夫未遇伯樂則千載無一驥時值龍顏則當年控三傑漢之得材于斯為貴高祖雖不以道勝御物群下得盡其忠蕭曹雖不以三代事主百姓不失其業靜亂庇人抑亦其次夫時方顛沛則顯不如隱萬物思治則默不如語是以古之子不患弘道難患遭時難遭時匪難遇君難故有道無時孟子所以咨嗟有時無君賈生所以垂泣夫萬歲一期有生之通塗千載一遇賢智之嘉會遇之不能無欣喪之何能無慨古人之言信有情哉余以暇日常覽國志考其君臣比其行事雖道謝先代亦異世一時也文若懷獨見之明而有救世之心論時則民方塗炭計能則莫出魏武故委面霸朝豫謀世事舉才不以標鑒故人亡而後顯籌畫不以要功故事至而後定雖亡身明順識亦高矣董卓之亂神器遷逼公達慨然志在致命由斯而談故以大存名節至如身為漢隸而迹入魏幕源流趣舍其亦文若之謂所以存亡殊致始終不同將以文若既明名教有寄乎夫仁義不可不明則時宗舉其致生理不可不全故達識攝其契相與弘道豈不遠哉崔生高朗折而不撓所以策名魏武執笏霸朝者蓋以漢主當陽魏后北面者哉若乃一旦進璽君臣易位則崔生所以不與魏氏所以不容夫江湖所以濟舟亦所以覆舟仁義所以全身亦所以亡身然而先賢玉摧于前來哲攘袂于後豈非天懷發中而名教束物者乎孔明盤桓俟時而動遐想管樂遠明風流治國以禮人無怨聲刑罰不濫沒有餘泣雖古之遺愛何以加茲及其臨終顧託受遺作相劉后授之無疑心武侯受之無懼色繼體納之無二情百姓信之無異辭君臣之際良可詠矣公瑾卓爾逸志不群總角料主則素契于伯符晚節曜奇則參分于赤壁惜其齡促志未可量子布佐策致延譽之美輟哭止哀有翼戴之功神情所涉豈徒謇諤而已哉然杜門不用登壇受譏夫一人之身所照未異而用舍之間俄有不同況沈迹溝壑遇與不遇者乎夫詩頌之作有自來矣或以吟詠情性或以紀德顯功雖大指同歸所託或乖若夫出處有道名體不滯風軌德音為世作範不可廢也故復撰序所懷以為之讚云魏志九人蜀志四人吳志七人荀彧字文若諸葛亮字孔明周瑜字公瑾荀攸字公達龐統字士元張昭字子布袁煥字曜卿蔣琬字公琰魯肅字子敬崔琰字季圭黃權字公衡諸葛瑾字子瑜徐邈字景山陸遜字伯言陳群字長文顧雍字元歎夏侯玄字泰初虞翻字仲翔王經字承宗陳泰字玄伯火德既微運纏大過洪飆扇海二溟揚波虯虎雖驚風雲未和潛魚擇淵高鳥候柯赫赫三雄並回乾軸競收杞梓爭采松竹鳳不及棲龍不暇伏谷無幽蘭嶺無亭菊英英文若靈鑒洞照應變知微探賾賞要日月在躬隱之彌曜文明映心鑽之愈妙滄海橫流玉石同碎達人兼善廢已存愛謀解時紛功濟宇內始救生人終明風概公達潛朗思同蓍蔡運用無方動攝群會爰初發迹遘此顛沛神情玄定處之彌泰愔愔幕裏算無不經亹亹通韻迹不暫停雖懷尺璧顧哂連城知能拯物愚足全生郎中溫雅器識純素貞而不諒通而能固恂恂德心汪汪軌度志成弱冠道敷歲暮仁者必勇德亦有言雖遇履虎神氣恬然行不修飾名迹無愆操不激切素風愈鮮邈哉崔生體正心直天骨疏朗牆宇高嶷忠存軌迹義形風色思樹芳蘭翦除荊棘人惡其上時不容哲琅琅先生雅杖名節雖遇塵霧猶振霜雪運極道消碎此明月景山恢誕韻與道合形器不存方寸海納和而不同通而不雜遇醉忘辭在醒貽答長文通雅義格終始思戴元首擬伊同恥民未知德懼若在已嘉謀肆庭讜言盈耳玉生雖麗光不踰把德積雖微道映天下淵哉泰初宇量高雅器範自然標準無假全身由直迹汙必偽處死匪難理存則易萬物波蕩孰任其纍六合徒廣容身靡寄君親自然匪由名教敬授既同情禮兼到烈烈王生知死不撓求仁不遠期在忠孝玄伯剛簡大存名體志在高構增堂及陛端委虎門正言彌啓臨危致命盡其心禮堂堂孔明基宇宏邈器同生民獨稟先覺標榜風流遠明管樂初九龍盤雅志彌確百六道喪干戈迭用苟非命世孰掃氛雺宗子思寧薄言解控釋褐中林鬱為時棟士元弘長雅性內融崇善愛物觀始知終喪亂備矣勝塗未隆先生標之振起清風綢繆哲后無妄惟時夙夜匪懈義在緝熙三略既陳霸業已基公琰殖根不忘中正豈曰摸擬實在雅性亦既羈勒負荷時命推賢恭己久而可敬公衡仲達秉心淵塞媚茲一人臨難不惑疇昔不造假翮鄰國進能徽音退不失德六合紛紜民心將變鳥擇高梧臣須顧眄公瑾英達朗心獨見披草求君定交一面桓桓魏武外託霸迹志掩衡霍恃戰忘敵卓卓若人曜奇赤壁三光參分宇宙暫隔子布擅名遭世方擾撫翼桑梓息肩江表王略威夷吳魏同寶遂獻宏謨匡此霸道桓王之薨大業未純把臂託孤惟賢與親輟哭止哀臨難忘身成此南面實由老臣才為世出世亦須才得而能任貴在無猜昂昂子敬拔迹草萊荷擔吐奇乃構雲臺子瑜都長體性純懿諫而不犯正而不毅將命公庭退忘私位豈無鶺鴒固慎名器伯言蹇蹇以道佐世出能勤功入能獻替謀寧社稷解紛挫鋭正以招疑忠而獲戾元歎穆遠神和形檢如彼白圭質無塵玷立上以恆匡上以漸清不增潔濁不加染仲翔高亮性不和物好是不群折而不屈屢摧逆鱗直道受黜歎過孫陽放同賈屈詵詵衆賢千載一遇整轡高衢驤首天路仰挹玄流俯弘時務名節殊塗雅致同趣日月麗天瞻之不墜仁義在躬用之不匱尚想重暉載挹載味後生擊節懦夫增氣文選晉書袁宏傳藝文類聚四十五單道開讚物俊招奇德不孤立遼遼幽人望巖凱入飄飄靈仙茲焉遊集遺屣在林千載一襲法苑珠林五十九引梁高僧傅又見十六國春秋二十一去伐論夫君者必量才任以授官參善惡以毀譽課功過以賞罰者也苟伐其善必忘其惡于是怨責之情必存乎心希望之氣必形乎色此矜伐之士自賢之人所以為薄而先王甚惡之者也君子則不然勞而不伐施而不德致恭以存其位下人不隱其功不避汙官不辭卑唯懼不任唯患弗能故力有餘而智不屈遠咎悔而行成名立也藝文類聚二十三明謙賢人君子推誠以存禮非袶己以應世率心以誠謙非匿情以同物故侯王以孤寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而下行老子曰高以下為基貴以賤為本此之謂乎御覽四百二十三祖逖碑逖為豫州刺史薨時君柩未旋郡寇圍城衝櫓既附城將降矣勇士五百撫戈同泣非祖侯之為吾誰為死并力齊赴卷甲霄起遂陷堅乘負戈而反御覽三百三十六丞相桓溫碑銘文武開業尚父定王佐之契宗周不競桓公弘九伐之勳脫履于必濟之功忘懷于屈伸之會高氏出乎生民公亮坦于萬物遂復改謀回慮策馬武關總轡丹扸之塗揚鞭終南之嶺兵交則戰無全敵勸義則繈負雲集從以懸軍輕進因蓄靡儲而豺狼懼殪保固窟穴乃方軌回轅反師凱入雖奇功大勳未捷于一朝而宏謨神略義高于天下公惟秀傑英特奇姿表于弱冠俊神朗鑒明統備于成德巾褐衡門風流推其高致忘已應務天下謝其勳業輔相兩儀而通運之功必周虛中容長而方圓之才咸得道濟而不有處泰而逾約可謂固天時縱生民之傑者也銘曰美盡黃裳道畼伊呂哲人應運命世作輔卓卓英風略略宏宇亮心高列俊神間舉忘已濟物撫化翼世河洛澄流華梁卷翳俾我仁公弘道作鏡如何不弔雲巒落映藝文類聚四十五孟處士銘處士名陋字少孤武昌陽新人吳司空孟宗後也少而希古布衣蔬食棲遲蓬蓽之下絶人間之事親族慕其孝大將軍命會稽王辟之稱疾不至相府歷年虛位而淡然無悶卒不降志時人奇之世説棲逸篇注祭牙文天生五才治道所司廢一不可靜亂輔時赫赫晉德乃武乃文中世不競王度暫屯戎狄滑夏虔劉生民蠢爾東胡被髮左衽思我皇澤稽首海裔受爵納貢服膺纍世後嗣不恭實叛實戾侵我神畿隔我嘉惠哀彼黎民嬰此雕殘況荷大寵任其艱難慨然發憤撫劍忘餐敢建高牙烈烈桓桓御覽三百三十九又藝文類聚六十引首四句羅山疏善道開尸在石室北壁下形體朽壞有白骨在昔在都識此道士聞之使人惻然其業行殊異當蟬蛻解骨耳石室中先有甌盛香得便使掃除燒香御覽七百五十九
