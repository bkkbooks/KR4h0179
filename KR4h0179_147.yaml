body:
  text: 劉淵即漢王位下令昔我太祖高皇帝以神武應期廓開大業太宗孝文皇帝重以明德升平漢道世宗孝武皇帝拓土攘夷地過唐日中宗孝宣皇帝探揚雋乂多士盈朝是我祖宗道邁三王功高五帝故卜年倍于夏商卜世過于姬氏而元成多僻哀平短祚賊臣王莽滔天篡逆我世祖光武皇帝誕資聖武恢復鴻基祀漢配天不失舊物俾三光晦而復明神器幽而復顯顯宗孝明皇帝肅宗孝章皇帝纍葉重暉炎光再闡自和安己後皇綱漸頽天步艱難國統頻絶黃巾海沸于九州群閹毒流于四海董卓因之肆其狂勃曹操父子凶逆相尋故孝愍委棄萬國昭烈播越岷蜀冀否炵有泰旋軫舊京何圖天未悔禍後帝窘辱自社稷淪喪宗廟之不血食四十年于茲矣今天誘其衷悔禍皇漢使司馬氏父子兄弟迭相殘滅黎庶塗炭靡所控告孤今猥為群公所推紹修三祖之業顧茲尪暗戰惶靡厝但以大恥未雪社稷無主銜膽棲冰勉從衆議晉書載紀劉元海傳十六國春秋一致王彌書以將軍有不世之功超時之德故有此迎耳遲望將軍之至孤今親行將軍之館輒拂席洗爵敬待將軍晉書王彌傳十六國春秋九請殺愍帝表子業若死民無所望則不為李矩趙固之用不攻而自破矣十六國春秋四下令議除漢宗廟改國號蓋聞王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下歲久恩德結于庶民故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖亟議以聞十六國春秋五下書追贈崔嶽等蓋褒德惟舊聖后之所先念惠録孤明王之盛典是以世祖草創河北而致封于嚴尢之孫魏武勒兵梁宋追慟于橋公之墓前新贈大司徒烈愍公崔嶽中書令曹恂晉陽太守王忠太子洗馬劉綏等或識朕于童齓之中或濟朕于艱窘之極言念君子實傷我心詩不云乎中心藏之何日忘之嶽漢昌之初雖有褒贈屬否運之際禮章莫備今可贈嶽使持節侍中大司徒遼東公恂太司空南郡公綏左光祿大夫平昌公忠鎮軍將軍安平侯並加散騎常侍但皆丘墓夷滅申哀莫由有司其速班訪嶽等子孫授以茅土稱朕意焉晉書載記劉曜傳十六國春秋五下書封喬豫和苞二侍中懇懇有古人之風烈矣可謂社稷之臣也非二君朕安聞此言乎夫以孝明于承平之世四海無虞之日尚納鍾離一言而罷北宮之役況朕之暗眇當今極斃而可不敬從明誨乎今敕悉停壽陵制度一遵霸陵之法詩不云乎無言不酬無德不報今封豫安昌子苞平輿子並領諫議大夫可敷告天下使知區區之朝思聞過也自今法政有不便于時不利社稷者其詣闕極言勿有所諱晉書載記劉曜傳十六國春秋五手疏啓救陳元達伏聞將為妾營殿今昭德足居凰儀非急四海未一禍難猶繁動須人力資財尢宜慎之廷尉之言國家大政夫忠臣之諫豈為身哉市王拒之亦非顧身也妾仰謂陛下上尋明君納諫之昌下忿暗主距諫之禍宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招人怨國疲咎歸于妾距諫害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦猶妾之視前人也復面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過晉書列女劉聰妻劉氏傳聰將起凰佉殿其廷尉陳元達切諫聰大怒將斬之娥在後堂私敕左右停刑手疏啓云云又見十六國春秋八與此多異諫用宦官王沈等表臣聞善人者乾坤之紀政教之本也邪佞者宇宙之螟螣王化之蟊賊也故文王以多士基周桓靈以群閹亡漢國之興亡未有不由于此也自古明王之世未嘗有宦者與政武元安順豈足為故事乎今王沈等乃處常伯之位握生死豫奪于中勢傾海內愛憎任之矯弄詔旨欺誣日月內諂陛下外佞相國威權之重侔于人主矣王公見之駭目卿宰望塵下車銓衡迫之選舉不復以實士以屬舉政以賄成多樹姦徒殘毒忠善知王琰等忠臣必盡節于陛下懼其姦萌發露陷之極刑陛下不垂三察猥加誅戮怨感穹蒼痛入九泉四海悲惋賢愚傷懼沈等皆刀鋸之餘巾恩忘義之類豈能如土人君子感恩展效以答乾澤也陛下何故親近之何故貴任之昔齊桓公任易牙而亂孝懷委黃皓而滅此皆覆車于前殷鑒不遠比年地震日蝕雨血火災皆沈等之由願陛下割翦凶醜與政之流引尚書御史朝省萬機相國與公卿五日一入會議政事使大臣得極其言忠臣得逞其意則衆自災自弭和氣呈祥今遺晉未殄巴蜀未賓石勒潛有跨趙魏之志曹嶷密有王全齊之心而復以沈等助亂大政陛下心腹四支何處無患復誅巫咸戮肩鵲臣恐遂成桓侯膏肓之疾後雖欲療之其如病何請免沈等官付有司定罪晉書載記劉聰傳太宰劉易及大將軍劉敷御史太夫陳元達金紫光祿太夫王延等詣詣闕諫云云聰以表示沈等寢之又見十六國春秋二書賀石勒公獲苟晞而用之何其神妙使晞為公左彌為公右天下不足定也晉書王彌傳勒擒苟晞以為左司馬彌謂勒云云又載紀石勒傳作偽卑辭使謂勒十六國春秋九作乃以書賀勒又十一作使賀勒諫起凰儀樓臣聞古之聖王愛國如家故皇天亦祐之如子夫天生蒸民而樹之君者使為之父母以刑賞之不欲使殿屎黎元而逸蕩一人晉氏暗虐視百姓如草芥故上天剿絶其祚乃眷皇漢蒼生引領息肩懷更蘇之望有日矣我高祖光文皇帝靖言惟茲痛心疾首故身衣大布居不重茵先皇后嬪服無綺綵重逆群臣之請故建南北宮焉今光極之前足以朝群臣饗萬國矣昭德溫明已後足可以容六宮列十二等矣陛下龍興已來外殄二京不世之寇內興殿四十餘所重之以飢饉疾疫死亡相屬兵疲于外民怨于內為之父母固若是乎伏聞詔旨將營凰儀中宮新立誠臣等樂為子來者也竊以大難未夷宮宇粗給今之新營尢實非宜臣聞大宗承高祖之業惠呂息役之後以四海之富天下之殷尚惜百金之費而輟露臺歷代垂美為不朽之迹故能斷獄四百擬于成康陛下之所有不過太宗二郡地耳戰守之備者豈僅胸奴南越而已哉孝文之廣思費如彼陛下之狹欲損如此愚臣所以敢昧死犯顏色冒不測之禍者也晉書載記劉聰傳又十六國春秋二多出七十餘字諫立左皇后臣聞王者之立后也將以上配乾坤之性象二儀敷育之義生承宗廟母臨天下亡配后土執饋皇姑必澤世德名宗幽間淑令乃副四海之望稱神祗之心是故周文造周姒氏以興關雎之化饗則百世之祚永孝成任心縱欲以婢為后使皇統亡絶社稷淪傾有周之隆既如彼矣大漢之禍又如此矣從麟嘉以來亂淫于色縱沈之女弟刑餘小醜猶不可塵瓊寢污清廟況其家婢邪六宮妃嬪皆公子金孫奈何一旦以婢主之何異象榱玉簣而對腐木朽楹哉臣恐無福于國家也晉書載記劉聰傳中常侍王沈養女年十四有妙色聰立為左皇后尚書令王鑒中書監崔懿之中書令曹恂等諫云云聰覽之大怒皆斬之又見十六國春秋四言天蛇虹見彌天一岐南徹三日並照客星入紫宮此皆大異其徵不遠也今虹達東西者許洛以南不可圖也一岐南徹者李氏當仍跨巴蜀司馬睿終據全吳之象天下其三分乎月為胡王皇漢雖苞括二京龍騰九五然世雄燕代肇基北朔太陰之變其在漢域乎漢既據中原曆命所屬紫宮之異亦王在他此之深重何可盡言石勒鴟視趙魏曹嶷狼顧東齊鮮卑之衆星布燕代齊代燕趙皆有將大之氣願陛下以東夏為慮勿顧西南吳蜀之不能北侵猶大漢之不能南向也今京師寡弱勒衆精盛若盡趙魏之鋭燕之突騎自上黨而來曹嶷率三齊之衆以繼之陛下將何以抗之紫宮之變何必不在此乎願陛下早為之所無使兆人生心陛下誠能發詔外以遠追秦皇漢武循海之事內為高祖圖楚之計無不克矣晉書載記劉聰傳又十六國春秋四上疏諫營作臣聞人主之興作也必仰準乾象俯順人時是以衛文承亂亡之後宗廟社稷漂流無所而猶上候營室以構楚宮彼其急也猶尚若茲故能成康叔武公之迹以延九百之慶也奉詔書將營酆明觀巿道芻蕘咸以非之曰一觀之功可以平涼州矣又奉敕旨復欲擬阿房而建西宮模瓊臺而起淩霄此則費萬酆明功億前役也以此功費亦可以吞吳蜀翦齊魏矣陛下何為于中興之日而蹤亡國之事自古聖王人誰無過陛下此役實為過舉過貴在能改終之實難又伏聞敕旨將營壽陵周回四里下深二十五丈以銅為棺槨黃金飾之恐此功費非國內所能辦也且臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之所終也如是秦皇下錮三泉周輪七里身亡之後毀不旋踵暗主之所終也如此向魋石椁孔子以為不如速朽王孫倮葬識者知其矯世自古無不亡之國不掘之墓聖王知厚葬之招害也故不為之臣子之于君父陵墓豈不欲高峻如山嶽哉但以保仕始終安固萬世為優耳自喪亂以來漢帝諸陵咸見踐辱惟霸陵獨全此雖太宗之至達抑亦釋之之功興亡奢儉囧然于前惟陛下覽之晉書載記劉曜傳又見十六國春秋五中丘城寺碑大和上佛圖澄願者天竺大國罽賓小王之元子本姓溼所以言溼者思潤理國澤被無外是以號之為溼封氏聞見記八刑州內丘縣西古中丘城寺有碑後趙石勒光初五年所立也碑云云白玉文皇亡皇亡敗趙昌井水竭構五梁咢酉小衰困囂喪嗚呼嗚呼赤牛奮靷其盡乎晉書載記劉曜傳終南崩長安人劉終于崩所得白玉方一尺有文字云云又見水經渭水注中又十六國春秋六
