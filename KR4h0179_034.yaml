body:
  text: 山濤為子淳尢辭召見表臣二子虺病宜絶人事不敢受詔晉書山濤傳表謝久不攝職古之王道正直而已陛下不可以一老臣為加曲私臣亦何心屢塵日月乞如所表以章典刑晉書山濤傳濤以老疾上表陳情章表數十上久不攝職為左丞白裒所奏濤不自安表謝表乞骸骨臣事天朝三十餘年卒無毫釐以崇大化陛下私臣無已猥授三司臣聞德薄位高力少任重上有折足之凶下有廟門之咎願陛下垂纍世之恩乞臣骸骨晉書山濤傳上疏告退臣年垂八十救命旦外若有毫末之益豈遺力于聖時迫以老耄不復任事今四海休息天下思化從而靜之百姓自正但當崇風尚教以敦之耳陛下亦復何事臣耳目聾瞑不能自勵君臣父子其閒無文是以直陳愚情乞聽所請晉書山濤傳啓事郿令諸葛京祖父亮遇漢亂分隔父子在蜀雖不達天命要為盡心所事京治郿自復有稱臣以為宜以補東宮舍人以明事人之理副梁益之論蜀志諸葛亮傳注引尚書僕射山濤啓事人才既自難知中人已下情僞又難測吏部郎以碎事日夜相接非但當正已而已乃當能正人不容穢雜也議郎杜默德履亦佳太子庶子崔諒中郎陳淮皆有意正人其次不審有可用者不藝文類聚四十八通典二十三御覽二百十六侍中尚書僕射奉車都尉新沓伯臣濤言臣近啓崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆論所稱諒尢質正少華可以敦教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹隨事以聞淳化閣帖三吏部郎主選舉宜得能整風俗理人倫者史曜出處缺散騎侍郎阮咸真素寡欲深識清濁萬物不能移也若在官人之職必妙絶于時世說賞譽篇注通典二十三帝以咸耽酒浮虛遂用陸亮舊選尚書郎極清望號稱大臣之副州取尢者以應雍州久無郎前尚書郎傅祗坐事免官在職日淺其州人才無先之者請以補職不審可復用否御覽一百十五荊州宜都有郎王恆之以病出義陽郡鄧遐有才義論者以為宰士之俊而未滿之年臣以為宜先用之侍中彭權遷當選代案雍州刺史郭奕高𥳑有雅量在兵閒少不盡下情處朝廷足以肅正左右右衛將軍王濟才高茂美後來之冠此二人誠顧問之秀聖意儻惜濟貴之驍騎將軍荀愷智器明敏其典宿衛終不減濟祭酒庾純強正有學亦堪取選國學初建王荀已亡純能其事宜當小留粗立其制不審宜爾有當聖旨者不侍中太常河南尹竝缺皆顯職宜必得其人右軍裴楷通理有才義僉論宜以為侍中才御覽二百十九詔侍人缺當復得人誰可者雍州刺史郭奕右衛將軍王濟皆誠直忠亮有美才侍中之最高者也御覽二百十九康誥有言父子罪不相及稽紹賢侔郤缺宜加旌命請為祕書郎晉書稽紹傳紹平𥳑溫敏有文思又曉音當成濟也猶宜先作祕書郎世說政事篇注詔選祕書丞濤薦云云詔曰紹如此便可為丞不足復為郎也魏志王粲傳注作當成濟者羊祜忠篤寬厚然不長理劇宗正卿缺不審可轉作否御覽二百三十太子保傅不可不高盡天下之選羊祜秉重德尚義可出入周旋令太子每覩儀刑方任雖重比此為輕又可朝會與聞國議通典三十又略見文選齊竟陵王行狀注保傅不可不高天下之選羊祜德尚義克己復禮東宮少事養德而已文選竟陵王行狀注太子始傳之東宮四海屬目保傅之官不可不高盡天下之選羊祜秉德尚義可出入周旋令太子每覩儀刑方任雖重比此為輕又可朝會與聞國議北堂書鈔六十五尚書令李胤遷處缺宜得其人征南大將軍羊祜體儀正直可以整肅朝廷裁制時政藝文類聚四十八鴻臚職主胡事前後為之者率多不善了今缺當選御史中丞刁攸舊人不審可爾不藝文類聚四十九御覽二百三十二臣近舉泛源為太子舍人源見稱有德素久沈滯舉為大臣欲以慰後聞之士藝文類聚四十九臣昨啓少傅選事羊祜秉德尚義克己復禮又年尚少可久于其事也北堂書鈔六十五中庶子賈模遷缺周蔚純粹篤誠宜補御覽二百四十五中庶子賈模遷缺東宮官屬宜得高茂求備一人則難猶宜先德素今選太尉長史劉粹光祿長史周蔚惟加所裁御覽二百四十五中庶子缺宜得俊茂者以濟陰太守劉儼城陽太守石崇參選不審可有合聖意者不御覽二百四十五琅琊王子繇隴西王世子越誠宜早令奉侍皇太子校德東宮若兼庶子中庶子東宮顯選今有二缺衆議咸以領兵太守荀寓為之太子左衛率缺侍衛威重宜得其才無疾患者城陽太守石崇忠篤有文武才河東太守焦勝清貞著信義皆其選也通典三十御覽二百四十七中郎衛昱為少府丞甚有頓益後坐賣偷石事免官今太子門夫缺不審可參選不皇太子東宮多用雜材為官屬宜令純取清德太子舍人夏侯湛字孝若有盛德而不長治民有益臺閣在東宮已久今殿中郎缺宜得才學不審其可遷此選不御覽二百十五近啓修武令劉訥補南陽王友詔曰友誠宜得有益者然必以長吏治民不易屢易為疑今散人無依仰又啓今者散職中誠自有人然劉訥才志內外非稱臣以為宜蒙此者是以啓及不審固不用不御覽二百四十八溫令許奇等竝見稱名雖在職各日淺宜顯報大郡以勸天下御覽二百六十八蘇愈忠篤有智意魏志蘇則傳注楊肇有才能魏志田豫傳注武韶清白有聲魏志胡質傳注引虞豫晉書御史中丞刁攸舊人年衰近損百寮未甚為憚坐治政事改尚書可也晉制春夏農月不遷改長吏郡守縣令之屬以其妨農事故也散騎常侍缺當取有素行者補之臣欲以郤生為溫令通典二十三訪聞詵喪母不時葬遂於所居屋後假葬有異同之議請更選之通典二十三郤詵才志器局堪為黃散黃門侍郎和嶠最有才可為吏部郎通典二十一黃門侍郎苟彧清和理正勳可觀採真侍衛之美者通典二十一孔皓有才能果徑不撓姒為御史中丞治書侍御史王啓識朗明正後來之俊也舊侍御史頗用郡守今散二千石有才能尚少者可用不御史中丞周浚果烈有才用中書屬通事令史孫綝限滿久習內事才宜殿中侍御史須空補之不審可否今尚書郎御史東宮洗馬舍人多缺宰士中後進美者太尉椽樂廣字彥輔司徒椽劉琚字伯瑜王瓚字正長司空椽王正字士則劉淡字初平征西將軍椽諸葛皆其選也太尉椽滿奮樂廣司徒椽何勗劉琚司徒椽官粹土正劉淡太尉椽劉遐有才義宰士之俊也河南尹京輦重職前代皆用名人聖代已來有李胤杜預王恂雋不疑復今減此者也遊擊將軍諸葛沖精果有文武才擬補兗州御覽二百三十九大將軍雖不整正須筋力戎馬閒猶宜德健者征北大將軍瓘貞正靜一中書監勗達練事物二人皆人彥不審有可參軍者不平南司馬缺案琅琊李鎮綱紀郡事練習兵馬良才也晉制諸坐公事者皆三年方得敘用其中多有好人令逍遙無事臣以為略依左遷法隨資財減之亦足懲戒而官不失其中通典十九答詔問郤詵事詵前喪母得疾不得葬遂於壁後假葬服終為平輿長史論者以為不合正禮是以臣前疑之詵文義可稱又甚貧儉訪其邑黨亦無有他通典一百三自為不與常同便令人非恐負其孝慕之心宜詳極盡同異之論通典一百三詔問應清議與否濤答上懷帝疏臣以為自古興替實在官人苟得其才則無物不理書言知人則哲惟帝難之唐虞之盛元愷登庸周室之隆濟濟多士秦漢以來風雅漸喪至於後漢女君臨朝尊官大位出於阿保斯亂之始也是以郭泰許劭之倫明清議於草野陳蕃李固之徒守忠節於朝廷然後君臣名節古今遺典可得而言自初平之元訖於建安之末三十年中萬姓流散死亡略盡斯亂之極也世祖武皇帝應天順人受禪于魏泰始初躬親萬機佐命之臣咸皆率職時黃門侍郎王恂庾純始於太極東堂聽政評尚書奏事多論刑獄不論選舉臣以為不先所難而辨其所易陛下初臨萬國人思盡誠每於聽政之日命公卿大臣先議選舉各言所見後進雋才鄉邑尤異才堪任用者皆以名奏主者隨缺先敘是爵人于朝與衆共之之義也晉書山𥳑傳與王衍書蔡子尼今之正人案蔡克字子尼論徐邈徐公志高行潔才博氣猛其施之也高而不狷潔而不介博而守約猛而能寬聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通自正涼州及還京師人以為介何也欽答曰往者毛孝先崔季圭等用事貴清素之士于時皆變易車服以求名高而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也魏志徐邈傳又御覽二百四十五相風賦楚石雜結緑沙礫廁隋珠御覽七十四感運賦朱明送夏白藏迎秋微涼漸屆溽屠日收氣瀲瀲而浸冷霜微微而日寒翠葉紛以朝落朱花慘以夕捐藝文類聚三朝霞賦相神之于瀛洲琅玕之于層城御覽八百九登鄴臺賦顯陽隗其顛隧文昌鞠而為墟銅爵隕于臺側洪鐘寢于兩除奚帝王之靈宇為狐兔之攸居藝文類聚六十二觀獵賦赤羆巖處玄熊穴蟄食卉飲泉升原降隰北堂書鈔百五十八征艱賦步汜口之芳草弔周襄之鄙館水經河水注五歷受陽而總轡水經洞過水注徑武館之故郛問厥塗之遠近水經洞過水注後背洪枋巨堰深渠高堤水經淇水注訪梁榆之虛郭弔閼與之舊都水經清水注菊花賦何斯草之特瑋涉節變而不傷越松柏之寒茂超芝英之冬芳浸三泉而結根晞九陽而擢莖若乃翠葉雲布黃蕊星羅熒明蒨粲菴藹猗那藝文類聚八十一又初學記二十七引兩條朝華賦覽庭隅之嘉木莫朝華之可玩俯浸潤之泉壤仰晞影于雲漢藝文類聚八十九當其重陰始袪微雨新晴抑以泥液𣈶以陽精初學記二鸚武賦有遐方之奇鳥産瓜州之舊壤揮緑翰以運影啓丹觜以振響藝文類聚九十一燕賦爰集崇宇依于其榮布窠巢之列列孕子鷇之嚶嚶銓先後而均哺邁尸鳩之能爭于是族類偕長雄雌俱逝頡頏水湄下上雲際嘲哳閒關倏忽漂潎來如隼擊去若鳧跇斗建午而子指日在戊而後憩藝文類聚九十二蟋蟀賦何茲蟲之資生亦靈和之攸授享神氣之么卉體含容之微陋于時微涼既成大火告去玄乙辭宇翔運南顧風淚淚而動柯露零零而隕樹月轉素而西頽漢回波而東注厲清響以干霄激悲聲以迄曙喓喓咧咧翾翾俟日月之代謝知時運之斡遷藝文類聚九十七御覽九百四十九理劉司空表臣聞經國之體在于崇明典刑立政之務在于固慎開塞典刑不明則人情靡措開塞乏慎則逆節滋萌況方嶽之臣殺生之柄而可不正其枉直以杜其姦邪哉竊見故司空廣武侯琨在惠帝擾攘之際值群后鼎沸之難戮力皇家義誠彌厲躬統華夷親受矢石石超授首于河南呂朗面縛于滎陽社稷克寧鑾輿反斾奉迎之勳琨實為隆此琨效忠之一驗也其後并州刺史東嬴公騰以晉川荒匱移鎮臨漳太原西河盡徙三魏琨受任并州屬承其弊到官之日遺戶無幾荊棘茂于街里豺狼居于府舍既無句踐甲楯之卒又無衛文共滕之民當易危之勢處難濟之中鳩集傷痍撫和戎狄數年之閒公私漸振會遭京都失守孝懷板蕩群逆縱逸充斥王畿邊萌頓仆苟懷宴安咸以為并州之地四塞為固東阻井陘西限藍谷前有太行之嶺後有句注之關且可閉關守險畜資養徒琨抗辭厲聲忠亮奮發以為天子沈辱而不隕身死節言情則非所能安言罪則不容于誅遂乃鞠誓百姓修繕甲兵紱履山川東西征討以喪氣之衆當天下嚴敵蟣蝨生于甲胄燕雀巢于帷幕雖不能摧殄聰勒且得據其心腹琨破家為國之二驗也琨乃稽民神之旨通天下之意唱上尊號歸重聖躬令南北萬里若合符契此又琨乃心本朝之三驗也比屠各乘虛晉陽沮潰琨父母罹屠戮之殃門族受殲夷之禍向使琨從州人之心為自守之計則聖朝未必加誅而賊黨可以不喪乃猗盧敗亂晉人歸奔琨于平城納其初附將軍箕淡又以為此雖晉人久在荒裔難以法整不可便用琨又讓之義形于色假從淡議偷于苟存則晏然并土必不亡身于燕薊也琨自以備位方嶽綱維不舉無緣虛荷大任坐居三司是以陛下登祚便引愆告遜前後章表具陳誠款尋令從事中郎臣續淡以章綬節傳奉還本朝與匹磾使榮邵期一時俱發又匹磾以琨王室大臣懼奪己威重忌琨之形漸彰于外琨知其如此慮不可久欲遣妻息大小盡詣京城以其門室一委陛下有征舉之會則身充一卒若匹磾縱凶慝則妻息可免具令臣淡密宣此旨求詔敕路次令相迎衛會王成從平陽逃來說南陽王保稱號隴右士衆甚盛當移關中匹磾聞此私懷顧望留停榮邵欲遣前兼鴻臚邊邈奉使詣保懼淡獨南言其此事遂不許引路丹誠赤心卒不上達匹磾兄眷喪亡嗣子幼弱欲因奔喪奪取其國又自以欺國陵家懷邪樂禍恐父母宗黨不容其罪是以卷甲櫜弓陰圖作亂欲害其從叔驎從弟末波等以取其國匹磾親信密告驎波驎波乃遣人距之匹磾僅以身免百姓謂匹磾已沒皆憑向琨若琨于時有害匹磾之情則居然可擒不復勞于人力自此之後上下竝離匹磾遂欲盡勒胡晉徙居上谷琨深不然之勸移厭次南憑朝廷匹磾不能納反禍害父息四人從兄二息同時并命琨未遇害知匹磾必有禍心語臣等云受國厚恩不能克報雖才略不及亦由遇此厄運人誰不死死生命也唯恨下不能效節于一方上不得歸誠于陛下辭旨慷慨動于左右聽其言者莫能仰視昔子囊垂終遺言城郢古人稱以為忠貞琨匪躬之操義實茂之此琨沒不忘國之四驗也匹磾既害琨橫加誣謗言琨欲窺神器謀圖不軌琨免述囂頑凶之思又無信布懼誅之情踦𨄅亂亡之際夾肩異類之閒而有如此之心哉雖臧獲之愚廝養之智猶不為之況在國士之列忠節先著者乎匹磾之害琨稱陛下密詔琨信有罪陛下加誅自當肆諸市朝與衆棄之不令殊俗之豎戮台輔之臣亦已明矣然則擅詔有罪雖小必誅矯制有功雖大不論正以興替之根咸在于此開塞之由不可不閉故也而匹磾無所顧忌怙亂專殺虛假王命虐害鼎臣辱諸夏之望敗王室之法是可忍也孰不可忍若聖朝猶加隱忍未明大體則不逞之人襲匹磾之跡殺生自由好惡任意陛下將何以誅之哉折衝厭難唯存戰勝之將除暴討亂必須知略之臣故古語云山有猛獸藜藿為不採非虛言矣自河以北幽并以南醜類有所顧憚者唯琨而已琨受害之後群凶欣欣莫不得意鼓行中州曾無纖介此又華夷小大所以長歎者也取亂侮亡仲虺之遺言也兼弱攻昧隨季之善經也匹磾之狹謀踊躍一隅無以自展精卒徑騎不得致力以一人之身妨一國之用當今二賊未殄方難尚殷而使殊俗彊國懷怨自相疑懼非國家靜難之遠術也伏惟陛下以睿聖之姿隆中興之緒方將平章典刑以經序萬國而琨受害悲哀冤痛已甚未聞朝廷有以甄論昔壼關三老訟衛太子之罪谷永劉向辨陳湯之功下足以明功罪之分上足以寤聖主之懷臣等祖考以來世受殊遇入侍翠帷出簪彤管弗克負荷播越遐荒與琨周旋接事終始是以仰慕三臣在昔之義謹陳本末冒以上聞仰希聖朝典賜哀察晉書劉琨傳藝文類聚五十四與司空劉琨書故吏從事中郎盧諶死罪死罪諶稟性短弱當世罕任因其自然用安靜退在木闕不材之資處雁乏善鳴之分卷異蘧子愚殊寧生匠者時眄不免饌賓嘗自思惟因緣運會得蒙接事自奉清塵于今五稔謨明之效不著候人譏以彰大雅含弘量苞山藪加以待接彌優款眷逾昵與運籌之謀廁宴私之歡綢繆之旨有同骨肉其為知己古人罔喻昔聶政殉嚴遂之顧荊軻慕燕丹之義意氣之閒靡軀不悔雖微達節謂之可庶然苟曰有情孰能不懷故委身之日夷險己之事與願違當忝外役遂去左右收迹府朝蓋本同末異楊朱興哀始素終玄墨翟垂涕分乖之際咸可歎慨致感之途或迫乎茲亦奚必臨路而後長號覩而絲後歔欷哉是以仰惟先情俯覽今遇感存念亡觸物眷戀易曰書不盡言言不盡意然則書非盡言之器言非盡意之具矣況言有不得至于盡意書有不得至于盡言邪不勝猥悶謹貢詩一篇抑不足以揄揚弘美亦以攄其所抱而已若公肆大惠遂其厚恩錫以咳唾之音慰其違離之意則所謂咸池酬于北里夜光報于魚目諶之願也非所敢望也諶死罪死罪文選尚書武強侯盧府君誄諶罪重五嶽釁深四海身不灰滅延于家門方今斬焉在疚死亡無日大懼先意遺烈墜乎地罔極之哀終不宣寫是以忍在草土之中撰朮平素之迹篤生我君天挺賢俊弘闡大風光隆洪胤蔚矣其姿綽乎其韻天不子晉厄運時臻陽九之會雖聖莫振君實振惶國難是圖跋履山川東征西徂方協遐任言復皇輿不見楚申致命郢都往古來今自遠及近凡在喪親猶思俱殞況我荼毒靡經不盡日月逾邁寒暑代遷恩慈彌遠窮思日纏撰述遺跡臨文煩冤藝文類聚四十八案諶父志字子道欽弟挺之子封武強侯永嘉末轉尚書太尉劉公誄公侯之生固天攸擢高智蕭條英風卓犖勵操宏壯抗意崇邈雅用深奧明鑒朗出摛藻雲浮飛辨盆溢驅其豺狼斬其藜藿建立市朝營置亭徼劉恥南比猗盧北接或以恩燮微我公侯方事焉捷委重于外弛禦于中制比鄧禹禮優竇融藝文類聚四十六祭法香爐四時祠坐側皆置也御覽七百三冬祀用雉臘兔臘書鈔一百四十五春祠用大䐑夏手疈脯書鈔一百四十五又見御覽八百六十二作春祠用脯夏用煏春夏秋祠皆用䘓血書鈔一百四十五四時之祠皆用苦酒書鈔一百四十六以蒲平薦布緣朱韋夏日加以笙緣書鈔一百三十三
