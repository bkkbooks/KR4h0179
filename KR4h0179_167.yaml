body:
  text: 卷一百六十七闕名四阿含暮鈔序阿含暮者秦言趣無也阿難既出十二部經又采掫其要徑至道法為四阿含暮與阿毗曇及律並為三藏焉身毒學士以為至德未墜於地也有阿羅漢名婆素跋陀鈔其膏腴以為一部九品四十六葉斥重去復文約義豐真可謂經之瓔鬘也百行美妙辨是與非莫不悉載也幽奧深富行之能事畢矣有外國沙門字因提麗先齎詣前部國祕之佩身不以示人其王彌第求得諷之遂得布此余以壬午之歲八月東省先師寺廟於鄴寺令鳩摩羅佛提執梵文僧念僧護為譯僧導曇究僧睿筆受至冬十一月乃訖此歲夏出阿毗曇冬出此經一年之中具三藏也深以自幸但恨八九之年始遇此經恐韋編未絶不終其業耳若加數年將無大過也近敕譯人直令轉梵為秦解方言而已經之文質所不易也又有懸數懸事皆訪其人為注其下時復以意消息者為其章注修妒路者其人注解引經本也其有直言修妒路者引經證非注解也釋藏藉五又迹九沙彌十戒法并威儀序夫乾坤覆載以人為貴立身處世以禮儀為本君臣父子非禮不立防邪止姦非禮不禁和崇婚非禮不定遜悌鄉邑非禮不通師徒朋友非禮不敬弔喪問疾非禮不行昔先賢垂範永以軌則喪祭之儀世務之急是以信行之機旦夕之要今世浮遊或輕或重或深或淺不諧法則以致譏論釋藏叔四尊婆須蜜菩薩所集論序尊婆須蜜菩薩大士次繼彌勒作佛名師子如來也從釋迦文降生鞞提國為大婆羅門梵摩渝子厥名鬱多羅父命觀佛尋侍四月具覩相表威變容止還白所見父得不還已出家學改字婆須蜜佛般涅槃後遊教周妒國槃奈園高才蓋世奔逸絶塵撰集斯經焉別七品為一楗度盡十三楗度其所集也後四品一楗度訓釋佛偈也凡十一品十四楗度也該羅深廣與阿毗曇並興外國傍通大乘特明盡漏博十涉十法百行之能事畢矣尋之漭然猶滄海之無涯可不謂之廣乎陟之瞪爾猶崑嶽之無頂不謂之高乎寶渚極目猒夜光之珍巖岫舉睫猒天智之玉懿乎富也何過此經外國升高者未墜於地也集斯經己入三昧定如彈指頃神升兜術彌妒路彌妒路刀利及僧伽羅剎適彼天宮斯二三君子皆次補處人也彌妒路刀利者光炎如來也僧伽羅剎者柔仁佛也茲四大士集乎一堂對揚權智賢聖默然洋洋盈耳不亦樂乎罽賓沙門僧伽跋澄以奏建元二十年傳此經一部來詣長安武威太守趙政文業者學不猒士也求令出之佛念譯傳跋澄難陀禘婆三人執梵本慧嵩筆受以三月五日出至七月十三日乃訖梵本十二千首廬也余與法和對校修飾武威少多潤色此經説三乘為九品持善修行以止觀經十六最悉每尋上人之高韻未常不忘意味也恨窺數仞之門晚懼不悉其宗廟之美百官之富也釋藏集一又迹十首楞嚴三昧經注序首楞嚴三昧者晉曰勇猛伏定意也謂十住之人志當而功顯不為而務成蓋勇猛伏之名生於希尚者耳雖功高天下豈係其名哉直以忘業宗而稱立遺稱故名遺訓三千敷典誥群生瞻之而弗及鑽之而莫喻自非奇致超玄梵可以應乎聖録所謂勇猛者誠哉難階也定意者謂迹絶仁智有無兼忘雖復寂以應感惠澤者倉生何嘗不通惠以仁智照以玄宗所以寂者未可得而分也故其篇云悉遍諸國亦無所分於法身不壞也謂雖從感若流身充宇宙豈有為之者哉謂化者以不化為宗作者以不作為主其自忘焉像可分哉若至理之可分斯非至極也可分則有虧斯成則有散所謂為法身者絶成虧遺合散靈鑒與玄風齊蹤員神與太陽俱畼其明不分萬類殊觀法身全濟非亦宜乎故曰不分無所壞也首楞嚴者沖風冠乎知喪洪緒在於忘言微旨盡於七住外迹顯乎三權洞重玄之極奧耀八特之化筌插高木之玄標建十準以伺能玩妙旨以調習既習釋而知玄遺慈故慈洽棄照而照弘也故有陶化育物紹以經綸自非領略玄宗深達奇趣豈云究之哉沙門支道林者道心冥乎上世神悟發於天然俊朗明徹玄映色空啓於往數位敘三乘余時復疇咨豫聞其一敢以不敏後於句末想望來賢勵刪定焉釋藏迹七漸備經十住梵名并書序波牟提陀晉曰一住維摩羅晉二住波披迦羅晉曰曰三住阿至摸晉曰四住頭闍邪晉曰五住阿比目佉晉曰六住頭羅迦摩晉曰七住阿庶羅晉曰八住抄頭摩提晉曰九住曇摩彌迦晉曰十住漸備經晉曰十住名第一住名悅豫第二住名離垢第三住名興光第四住名輝耀第五住名難勝第六住名目前第七住名玄妙第八住名不動第九住名善哉意第十住名法雨漸備經十住行第一住今亡第二住説戒行第三住説十二門五通事第四住説三十七品事第五住説四諦事第六住説十二因緣事第七住説權智事第八住説神足變化事第九住説神足教化事第十住亦説神足教化事漸備經護公以元康七年出之其經有五卷五萬餘言第一卷説一住事今無此一卷今現有二住以下至十住為十品漸備經十住與本業大品異説事委悉於本業大品不知何以曀於涼州昔涼州諸道士釋教道竺法彥義斯二道士並皆博學以經法為意不知何以不集此經又亦不聞其有所説始知博聞之難為人興顯經且亦是大經説事廣大義理幽深乃是衆經之美望辭敘茂贍真有奇聞而帛法巨亦是博學道士昔鄴中亦與周旋不知何以復不集此經又不聞其言博聞強記信難有護公出須賴經雖不見恆聞彥説之張天錫更出楞嚴故當應委於先者云康七年十一月二十一日沙門法護在長安市西寺中出漸備經手執梵本譯為晉言護公菩薩人也尋其餘音遺迹使人仰之彌遠夫諸方等無生諸三昧經類多此公所出真衆生之冥梯大品出來雖數十年先出諸公略不綜習不解諸公何以爾諸公才明過人當能留心思研心以為至業者故當極有所得先出諸公故恨太簡於文句殊多可恨大品頃來東西諸講習無不以為業於文句猶不同覺其轉深但才分有限思尋有極幽旨作非短思所盡然文句故可力為方欲研之窮此一生冀有微補漸備經恨不得上一卷冀因緣冥中之助忽復得之漸備所説位分衆行各有階級目下殊異於衆經方欲根悉研尋之如今茫茫猶涉大海不知第一住中何説彼或有恩緣信使君不可不持作意盡尋求之理大品上兩卷若有可尋之階亦勤以為意護公出光讚計在放光前九年不九年當八年不知何以遂逸在涼州不行於世尋出經時乃在長安出之而都不流行乃不知其故吾往在河北唯見一卷經後記云十七章年號日月亦與此記同但不記處所所以為異然出經時人云聶承遠筆受帛元信沙門法度此人皆長安人也以此推之略當必在長安出此經梵本亦言于闐沙門祇多羅所齎來也此同如慧常等涼州來疏正似涼州出未詳其故或乃護公在長安時經未流宣唯持至涼州未能乃詳審泰元元年歲在丙子五月二十四日此經達襄陽釋慧常以酉年因此經寄牙市人康兒展轉至長安長安安法華遣人送至牙市牙市人送達襄陽付沙門釋道安襄陽時齊僧有三百人使釋僧顯寫送與揚州道人竺法汰漸備經以泰元元年十月三日達襄陽亦是慧常等所送與光讚俱來頃南鄉間人留寫故不與光讚俱至耳首楞嚴須賴並皆與漸備俱至涼州道人釋慧常歲在壬申於內苑寺中寫此經以酉年因寄至子年四月二十三日達襄陽首楞嚴經事事多於先者非佰第一第二第九此章最多近三四百言許於文句極有所益賴經亦復小多能有仕處云有五百戒不知何以不至此乃最急四部不具於大化有所闕般若經乃以善莮子善女人為教首而戒立行之本百行之始猶樹之有根常以為深恨若月緣便盡訪求之理先梵本有至信因之勿零落釋藏迹九阿毗曇心序釋和尚昔在關中令鳩摩羅跋提出此經人不間晉語以偈本難譯遂隱不傳至於斷章直云修妒路及見提婆乃知有此偈以偈檢前所出又多首尾隱沒互相涉入譯人所不能傳者彬彬然是以勸令更出以晉泰元十六年歲在單閼貞於重光其年冬於潯陽南山精舍提婆自執梵經先誦本文然後乃譯為晉語比丘道慈筆受至來年秋復重與提婆校正以為定本時衆僧上座竺僧根支僧純等八十人地主江州刺史王凝之優婆塞西陽太守任固之為檀越並共勸佐而興焉釋藏迹十法顯傳自記遊天竺事後序是歲甲寅晉義熙十二年歲在壽星夏安居末迎法顯道人既至留共冬齋因講集之際重問遊歷其人恭順言輒依實由是先所略者勸令詳載顯復具敘始末自云顧尋所經不覺心動汗流所以乘危履險不惜此形者蓋是志有所存專其愚直故投命於不必全之地以達萬一之冀於是感歎斯人以古今罕有自大教東流未有忘身求法如顯之比然後知誠之所感無窮否而不通志之所獎無功業而不成成夫功業者豈不由忘夫所重重夫所忘也哉釋藏兵八戒因緣經鼻奈耶序阿難出經面承聖旨五百應真更互定察分為十二部於四十九年之誨無片言遺失又鈔十二部為四阿含阿毗曇鼻奈耶三藏備也天竺學士罔弗尊焉諷之詠之未墜於地也其大高座沙門則兼該三藏中下高座則通一通二而已耳經流奏土有自來矣隨天竺沙門所持來之經遇而便出於十二部毗曰羅部最多以斯邦人莊老教行與方等經兼忘相似故因風易行也道安常恨三藏不具以為闕然歲在壬午鳩摩羅佛提齎阿毗曇鈔四阿含鈔來至長安渴仰情久即於其夏出阿毗曇鈔四卷其冬出四阿含鈔四卷又其伴罽賓鼻奈厥名耶舍諷鼻奈經甚利即令出之佛提梵書佛念為譯曇景筆受自正月十二日出至三月二十五日乃了凡為四卷與往年曇摩侍出戒典相似如合符焉於二百六十事疑礙之滯都謏然焉上聞異要煥乎可觀焉二年之中於此秦邦三藏具焉然世尊制戒必有所因六群比丘生於貴族攀龍附鳳雖貪出家而豪心不盡鄙悖之行以成斯戒二人得道二人生天二人墮龍一入無擇明恃貴不節自遺伊戚向使中開家子遇佛出學雖不能一坐成道可由如此之困乎然此經是佛未制戒時其人所犯穢漏行多既制之後改之可貴天竺持律不都通視惟諸十二法人堅明之士乃開緘騰而共相授耶舍見囑見誨諄諄人可使由之不可使知其言切至乃自是也而今以後秦士有此一部律矣唯願同我之人尤慎所授焉未滿五歲非持律人幸勿與之也釋藏兄一僧伽羅殺所集佛行經序僧伽羅剎者須賴國人也佛去世後七百年生此國出家學道遊教諸邦至揵阤越土甄阤罽二王師焉高明絶世多所述作此土修行道也經其所集也又著此經憲章世尊自始成道迄於淪虛行無巨細必因事而演遊化夏土莫不曲備雖普耀本行度世諸經佛起居至謂為密今攬斯經所悟復多矣傳其將終我若立根得力大士誠不虛者立斯樹下手援其葉而棄此身使那羅延力大象之勢無能移余如毛髮也正使就耶維者當不燋此葉言然之後便即立終罽二王自臨而不能動遂以巨緪象挽未始能搖即就耶維炎葉不傷尋升兜術與彌勒大士高談彼宮將補佛處賢劫第八以建元二十年罽賓沙門僧伽跋證齎此經本來詣長安武威太守趙文業請令出焉佛念為譯慧嵩筆受正值慕容作難於近郊然譯出不衰余與法和對檢定之十一月三十日乃了也此年出中阿含六十卷增一阿含四十六卷伐鼓擊柝之中而出斯一百五卷窮通不改其恬詎非先師之故迹乎釋藏宜一達摩多羅禪經序夫三業之興以禪智為宗雖精粗異而階藉有方是故發軫分逵途無亂轍革俗成務功不待積靜復所由則幽詣告微淵博難窺然理不云昧庶旨統可尋試略而言禪非智無以窮其寂智非禪無以深其照然則禪智之要照寂之謂其相濟也照不離寂寂不離照感則俱遊應必同趣功玄於在用交養於萬法其妙物也運群動以至一而不有廓大象於未形而不無無思無為而無不為是故洗心靜亂者以之研慮悟徹窮神者以之入微也若乃將入其門機在攝會理玄數廣道隱於文則是阿難曲承音詔遇非其人必藏之靈府何者必無常規其變多方數無定象待感而應是故化行天竺緘之有匠幽關莫闢罕窺其庭從此而觀理有行藏道不虛授良有以矣如來泥曰未久阿難傳其共行弟子末田地末田地傳舍那婆斯此二應真咸乘至願冥契於昔功在言外經所不辨必暗軌元匠孱焉無差其後有優波崛弱而超悟智絶世表才高應寡觸理從簡八萬法藏所存惟要五部之分始自於此因斯而推固知形運以系廢興自兆神用則幽步無迹妙動難尋涉粗生異可不慎乎可不察乎自此以來感於事變懷其舊典者五部之學並有其人咸懼大法將穨理深其慨遂各述讚禪經以隆盛業其為教也無數方便以求寂然寂乎惟寂其揆一耳而尋條求根者衆統本運末者寡或將暨而不至或守方而未變是故經稱滿願之德高普事之風原夫聖旨非徒令其長亦所以救其短若然五部殊業存乎其人人不經世道或隆替廢興有時則互相升降小大之目其可定乎又達節善變出處無際晦名寄迹無聞無示若斯人者復不可以名部分即非名部之所分亦不出於其外別有宗明矣每慨大教東流禪數尤寡三業無統斯道殆廢頃鳩摩耆婆宣馬鳴所述乃有此業雖其道未融蓋是為山於一簣欣時來之有遇感趣於若人捨夫制勝之論而順不言之辨遂誓被僧那至寂為己任未懷德未忘故遺訓在茲其為要也圖大成於未象開微言而崇體悟惑色之悖德杜六門以寢患達奮競之傷性齊彼我以宅心於是異族同氣幻形告疏入深緣起見生死際爾乃闢九關於龍津超三忍以登位垢習凝於無生形纍畢於神化故日無所從生靡所不生於諸所生而無所生今之所譯出自達摩多羅與佛大先其人西域之俊禪訓之宗搜集經要勸發大乘宏教不同故有詳略之異達摩多羅閣衆篇於同道開一色為亙沙其為觀也明起不以滅不以盡雖往復無際而未始出於如故曰色不離如如不離色色不離如色則是如如不離色如則是色佛大先以為澄源引流固宜有漸是以始自二道開甘露門釋四義以反迷啓歸途以領會分別陰界導以止觀暢散緣起使優劣自辨然後令原始反終妙尋其極其極非盡亦非所盡乃曰無盡入於如來無盡法門非夫道冠三乘智通十地孰能洞元根於法身歸宗一於無相靜無遺照動不離寂者哉廬山諸道人遊石門詩序石門在精舍南十餘里一名障山基連大嶺體絶衆阜闢三泉之會並立而開流傾巖玄映其上蒙形表於自然故因以為名此雖廬山之一隅實斯地之奇觀皆傳之於舊俗而未覩者衆將由懸瀨險峻人獸迹絶徑回曲阜路阻行難故罕經焉釋法師以隆安四年仲春之月因詠山水遂杖錫而遊於時交徒同趣三十餘人咸拂衣晨征悵然增興雖林壑幽邃而開塗競進雖乘危履石並以所悅為安既至則援木尋葛歷嶮窮崖猿臂相引僅乃造極於是擁勝倚巖詳觀其下始知七嶺之美蘊奇於此雙闕對峙其前重巖映帶其後巒阜周回以為障崇巖四營而開宇其中則有石臺石池宮館之象觸類之形致可樂也清泉分流而合注淥淵鏡淨於天地文石發綵煥若披面柳松芳草蔚然光目其為神麗亦已備矣斯日也衆情奔悅矚覽無厭遊觀未久而天氣屢變霄霧塵墜則萬象隱形流光回照則衆山倒影開之闔之際狀有靈焉而不可測也乃其將登則翔禽拂翮鳴猿厲響歸雲回駕想羽人之來儀哀聲相和若玄音之有寄雖髣佛猶聞而神以之暢雖樂不期歡而欣以永日當其沖豫自得信有味焉而未易言也退而尋之夫崖谷之間會物無主應不以而開興引人致深若此豈不以虛明朗其照間邃篤其情邪並三復斯談猶昧然未盡俄而太陽告夕所存己往乃悟幽人之玄覽達恆物之大情其為神趣豈山水而已哉於是徘徊崇嶺流目四矚九江如帶丘阜成垤因此而推形有巨細智亦宜然乃喟然歎宇宙雖遐古今一契靈鷲邈矣荒途日隔不有哲人風迹誰存應深悟遠慨焉長懷各欣一遇之同歡感良辰之難再情發於中遂共詠之云爾華氏中藏經序華先生諱他字元化性好恬淡喜味方書多遊名山幽洞往往有所遇一日因酒息於公宜山古洞前忽聞人論療病之法先生訝其異潛逼洞竊聽須臾有人云華生在邇術可付焉復有一人曰道生性貪不憫生靈安得付也先生不覺愈駭躍入洞見二老人衣木皮頂草冠先生躬趨左右而拜曰適聞賢者論方術遂乃忘歸況濟人之道素所好為所恨者未遇一法可以施驗徒自不足耳願賢者少察愚誠乞與開悟終身不負思首坐先生云術亦不惜恐異日與子為纍若無高下無貧富無貴賤不務財賄不憚勞若矜老恤幼為急然後可脫此禍先生再拜謝曰賢聖之語一一不敢忘俱能從之二老笑指東洞云石床上有一書函子自取之速出吾居勿示俗流宜祕密之先生時得書回首已不見老人先生懾怯離洞忽然不見雲奔雨瀉石洞摧塌既覽其方論多奇怪從茲施試效無不存神先生未六旬果為魏所戮老人之言預有斯驗余乃先生外孫也因弔先生寢室夢先生引余坐語中藏經真活人法也子可取之勿傳非人余覺驚怖不定遂討先生舊物獲石函一具開之得書一帙乃中藏經也豫性拙於用復授次子思因以志其實甲寅秋九月序華氏中藏經吳勉學刊本遺王羲之書自山陰南至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者皆在焉晉書許邁傳初學記八授第九子節書古昔魏武侯浮於西河而下中流顧謂吳起曰美哉山河之固此魏國之寶也吾性愛好京洛每往來出入瞻視邙山上樂哉乎此萬世之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懷未果前去十月可速改葬在軍司墓次買數畝地便自足矣御覽五百五十五八百八十三太平廣記三百十九並引王隱晉書詔仕至中牟令卒韶伯父承為南中郎軍司而亡第九子節晝日見韶自外入曰吾欲改葬乃授節為書御覽三百七十三又引王隱晉書蘇韶事白玉題文猗尼塗餘國天王敬信遮須夷國天王歲在攝提當相見也晉書劉聰載記聰子約死道遇一國曰猗尼塗餘引約入宮與皮囊一枚及蘇開之有一方白玉題文曰劍銘神劍服御除衆毒水經汾水注云劉曜隱於管之山夜中忽有二童子入跪曰管涔王奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長三尺光澤非常背有銘云下都陽桓闡教於巫下都陽桓闡教於巫桓闡以生內貽我當謫令自食也御覽八百九十二引異苑
