body:
  text: 王述慶老人星表老人星見光色明朗玄象暉煥表爾休祥率士民庶慶賴罔極蓺文類聚一上白麞表所領阮藻之于江寍縣界得白麞一頭毛色鮮潔異于比類信斯誠嘉祥也蓺文類聚九十五御覽九百七上疏乞骸骨臣曾祖父魏司空昶白牋于文皇帝曰昔與南陽宗世林共為東宮官屬世林少得好名州里瞻敬及其年老汲汲自勵恐見廢棄時人咸共笑之若天假其壽致仕之年不為此公婆娑之事情旨慷慨深所鄙薄雖是牋書乃實訓誡臣忝端右而以疾患禮敬廢替猶謂可有差理日復一日而年衰疾痼永無復瞻華幄之期乞奉先誡歸老丘園晉書王述傳婚禮應賀議春秋傳曰娶者大吉非常吉又傳曰鄭子罕如晉賀夫人鄰國猶相賀況臣下邪如此便應賀但不在三日內耳今因廟見成禮而賀亦是一節也通典五十九永和三年納后王述議立琅邪王議推宗立君以為人極上古風淳必託有道洎乎後代爭亂漸興故繼體相傳居正守位以塞奔統非私其親或時有艱難而嗣胤幼劣故有立長成皇帝深達帝道不私親愛越授天倫廟無毀遷統業桓固康皇帝既受命于成帝宗廟社稷之重已移于所授主上宜為康王嗣通典八十與會稽王牋放之溫嶠之子宜見優異而投之嶺外竊用愕然願遠存周禮近參人情則望實惟允晉書溫嶠傳與庾冰牋竊聞安西欲移鎮樂鄉不審此為筭邪將為情邪若謂為筭則彼去武昌千有餘里數萬之眾創造移徙方當興立城壁公私勞擾若信要害之地所宜進據猶當計移徙之煩權二者輕重況此非今日之要邪方今彊胡陸梁當蓄力養銳而無故遷動自取非筭又江州當泝流數千供繼軍府力役增倍疲曳道路且武昌實是江東鎮戍之中非但扞禦上流而已急緩赴告駿奔不難若移樂鄉遠在西陲一朝江渚有虞不相接救方嶽取重將故當居要害之地為內外形勢使闚𨵦之心不知所向若是情邪則天道玄遠鬼情難言妖祥吉凶誰知其故是以達人君子直道而行不以情失昔秦忌亡胡之讖卒為劉項之資周惡檿弧之謠而成襃姒之亂此既然矣歷觀古今鑒其遺事妖異速禍敗者蓋不少矣禳避之道苟非所審且當擇人事之勝理思社稷之長計斯則天下幸甚令名可保矣若安西盛已耳不能安于武昌但得近移夏口則其次也樂鄉之舉咸謂不可願將軍體國為家固審此舉晉書王述傳下主簿教亡祖先君名播海內遠近所知內諱不出于外餘無所違世說賞譽篇王藍田主簿請諱教云云荅諱惟祖惟孝四海所知過無復諱御覽五百六十二引語林王藍田作會稽外請諱荅曰云云太后為親屬舉哀議于至尊是族舅雖不及舉哀可從太后舉哀于朝堂通典八十一褚太后為從弟舉哀博士王臻等議太后前為褚衛軍劉夫人舉哀于式乾殿至尊于朝堂今宜依故事同上將之廣陵鎮上孝武帝表臣聞人君之道以孝敬為本臨御四海以委任為貴恭順無為則盛德日新親杖賢能則政道邕睦昔周成漢昭竝以幼年纂承大統當時天下未為無難終能顯揚祖考保安社稷蓋尊尊親親信納大臣之所致也伏惟陛下誕奇秀之姿稟生知之量春秋尚富涉道未曠方須訓導以成天德皇太后仁淑之體過于三母先帝奉事積年每稱聖明臣願奉事之心便當自同孝宗太后慈愛之隆亦不必異所生琅邪王餘姚王及諸皇女宜朝夕定省承受教誨導習儀刑以成景仰恭敬之美不可以屬非至親自為疏疑昔肅祖崩殂成康幼沖事無大小必諮丞相導所以克就聖德實此之由今僕射臣安中軍臣沖人望具瞻社稷之臣且受遇先帝綢繆繾綣竝志竭忠貞盡心盡力歸誠陛下以報先帝愚謂周旋舉動皆應諮此二臣二臣之于陛下則周之旦奭漢之霍光顯宗之于王導沖雖在外路不云遠事容信宿必宜參詳然後情聽獲盡庶事可畢又天聽雖聰不啟不廣群情雖忠不引不盡宜數引侍臣詢求讜言平易之世有道之主猶尚誡懼日昃不倦況今艱難理盡慮經安危祖宗之基繫之陛下不可不精心務道以申先帝堯舜之風可不敬脩至德以保宣元天地之祚晉書王坦之傳荅謝安書具君雅旨此是誠心而行獨往之美然恐非大雅中庸之謂意者以為人之體韻猶器之方圓方圓不可錯用體韻豈可易處各順其方以弘其業則歲寒之功必有成矣吾子少立德行體議淹允加以令地優游自居僉曰之談咸以清遠相許至于此事實有疑焉公私二三莫見其可以此為濠上悟之者得無鮮乎且天下之寶故為天下所惜天下之所非何為不可以天下為心乎想君幸復三思晉書王坦之傳與殷康子書論公謙之義夫天道以無私成名二儀以至公立德立德存乎至公故無親而非理成名在乎無私故在當而忘我此天地所以成功聖人所以濟化由斯論之公道體于自然故理泰而愈降謙義生于不足故時弊而義著故大禹咎繇稱功言惠而成功于彼孟反范燮殿軍後入而全身于此從此觀之則謙公之義固以殊矣夫物之所美己不可收人之所貴我不可取誠患人惡其上眾不可蓋故君子居之而每加損焉隆名在于矯伐而不在于期當匿迹在于違顯而不在于求是于是謙光之義與矜競而俱生卑挹之義與夸伐而竝進由親譽生于不足未若不知之有餘良藥效于廖疾未若無病之為貴也夫乾道確然示人易矣坤道隤然示人𥳑矣二象顯于萬物兩德彰于群生豈矯枉過直而失其所哉由此觀之則大通之道公坦于天地謙伐之義險巇于人事今存公而廢謙則自伐者託至公以生嫌自美者因存黨以致惑此王生所謂同貌而實異不可不察者也然理必有源教亦有主苟探其根則玄指自顯若尋其末獘無不至豈可以嫌似而疑至公獘貪而忘于諒哉晉書王坦之傳與某書坦之惶恐言不知已與謝郎論坦之事未其意良不了者今當詣公自陳願告坦之惶恐言淳化閣帖三廢莊論荀卿稱莊子蔽于天而不知人揚雄亦曰莊周放蕩而不法何宴云鬻莊軀放玄虛而不周乎時變三賢之言遠有當乎夫獨搆之唱唱虛而莫和無感之作義偏而用寡動人由于兼忘應物在乎無心孔父非不體遠以體遠故用近顏子豈不具德以德備故膺教胡為其然哉不獲已而然也夫自足者寡故理懸于羲農徇教者眾故義申于三代道心惟微人心惟危吹萬不同孰知正是雖首陽之情三黜之智磨頂之甘落毛之愛枯槁之生負石之死格諸中庸未入乎道而況下斯者乎先王知人情之難肆懼違行以致訟悼司徹之貽悔審褫帶之所緣故陶鑄群生謀之未兆每攝其契而為節焉使夫敦禮以崇化日用以成俗誠存而邪忘利損而競息成功遂事百姓皆曰我自然蓋善闇者無怪故所遇而無滯執道以離俗孰踰于不達語道而失其為者非其道也辯德而有其位者非其德也言默所未究況揚之以為風乎且即濠以尋魚想彼之我同推顯以求隱理得情昧若夫莊生者望大庭而撫契仰彌高于不足寄積想于三篇恨我之懷未盡其言詭譎其義恢誕君子內應從我游方之外眾人因藉之以為弊薄之資然則天下之善人少不善人多莊子之利天下也少害天下也多故曰魯酒薄邯鄲圍莊生作而風俗頹禮與浮雲俱征偽與利蕩竝肆人以克已為恥士以無措為通時無履德之譽俗有蹈義之愆驟語賞罰不可以造次屢稱無為不可與適變雖可用于天下不足以用天下人昔漢陰丈人脩渾沌之術孔子以為識其一不識其二莊生之道無乃類乎與夫如愚之契何殊閒哉若夫利而不害天之道也為而不爭聖之德也群方所資而莫知誰氏在儒而非儒非道而有道彌貫九流玄同彼我萬物用之而不既亹亹日新而不朽昔吾孔老固已言之矣晉書王坦之傳沙門不得為高士論高士必在于縱心調畼沙門雖云俗外返更束于教非情性自得之謂也世說篇注北中郎不為林公所知乃著此論其大略云郊祀明堂議明堂則天象地儀觀之大宜俟皇居反舊然後脩之宋書禮志三太元十二年吏部郎王忱議君臣同諡表伏尋太康中郭奕諡曰景有司執孝宗同號臣聞姬朝盛明父子齊稱諸侯與周同諡經諸哲王不易之道也宜遵古典訓範來裔通典一百四議立奔赴之制三代垂文觀時損益今服教之地遠于古之九服若守七月之斷遠近一概者懼非通制請王畿以外南極五嶺非守見職周年不至者宜勒注黃紙有爵土者削降永嘉中江統議不奔山陵但三年不敘于義為輕今更立如牒若方伯授用雖未有王命猶不與停散同今見在官即吉之後去職不及凶事無所貶責萬里外以再周為限自此以內明依亡前牒雖在父母喪其責不異通典八十咸康中司徒西曹屬王濛議申述前議喪紀有數吉凶有斷豈可當于縞素既終而制無限之責哉若除喪使奔當以何服素服敘哀則在廷已吉陵無哭禮若玄冠致敬宜曰朝謁非奔喪之謂若服外更立限斷則不知所準若不計遠近同服內則立制漫而無斷通典八十致王導牋開國承家小人勿用杖德義以尹天下方將澄清彝倫崇重名器夫軍國殊用文武異容豈可令涇渭混流虧清穆之風以允荅具瞻儀刑海內晉書外戚王濛傳牋濛死罪諸葛僕射之弟以情料之當非至困者欲斂其時吏無一在者便以下官牋荅之濛死罪古刻叢鈔賢人論或問易稱賢人黃裳元吉苟未能闇與理會何得不求通求通則有損有損則元吉之稱將虛設乎荅曰賢人誠未能闇與理會當居然人從比之理盡猶一豪之領一梁一豪之領一梁雖于理有損不足以撓梁賢有情之至寡豪有形之至小豪不至撓梁于賢人何有損之者哉世說文學篇注引王脩集讓太子詹事表今皇儲始建四方是式揔司之任崇替所由宜妙簡才賢盡一時之勝豈臣最庸所可叨忝北堂書鈔六十五晉起居注兩條又見御覽二百四十五抗表罪狀王國寶後將軍國寶得以姻戚頻登顯列不能感恩效力以報時施而專寵肆威將危社稷身負莫大之之罪謹陳其狀前荊州刺史王悅國寶同產弟也受任西藩不幸致喪國寶求假奔彼遂不即路慮臺糾察懼于黜免乃毀冠改服變為婦人與婢同載入請相王又先帝暴崩莫不驚號而國寶靦然了無戚容夜乃犯閤叩扉求行姦計欲詐為遺詔矯弄神器彰見于外莫不聞知賴皇太后聰明相王神武故逆謀不果又割東宮見兵以為已府讒疾二昆過于讎敵樹立私黨遍于府朝兵食資儲斂為私積販官鬻爵威恣百城收聚不逞招集亡命與其從弟輔國將軍王緒同黨頑凶狂狡共相扇連人理不齒同惡相成共竊名器自知禍惡已盈怨集人鬼規為大逆蕩覆天下不忠不義之明白也以臣忠誠必亡身殉國是以譖臣非一賴先帝明鑒浸潤不行昔趙鞅興晉陽之甲夷君側之惡臣雖駑劣敢忘斯義晉書王恭傳魏書晉司馬德宗傳與沈警書足下既執不拔之志高臥東南故屈賢子共事非以吏職嬰之也宋書沈約自序與沙門僧檢書遠持兄弟至德何如高僧傳
