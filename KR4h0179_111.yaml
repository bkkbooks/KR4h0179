body:
  text: 陶侃相風賦乃有相風之為形也終日九征桀然特立不邪不傾擬雲閣以秀出晞峻嶺于層城直南端以基址雙崇魏之嶢崢象建木于都廣邈不群而獨榮朴雖小而不巨何物鮮而功大眇翩翩以高翔象離鵾于雲際擢孤莖而特挺若芙蓉于水裔若乃華蓋警乘奉引先驅豹飾在後葳蕤清路百僚允則彰我皇度藝文類聚六十八表伏承大官廚器損失謹奉獻狠炙刀槃二具御覽三百四十六伏惟武庫傾蕩宿衛有牛闕輒選其差可者奉獻金鈴大戟五十張御覽三百五十三上溫嶠遺書請停移葬表故大將軍嶠忠誠著于聖世勳義感于人神非臣筆墨所能稱陳臨卒之際與臣書別臣藏之篋笥時時省視每一思述未嘗不中夜撫膺臨飯酸噎人之云亡嶠實當之謹寫嶠書上呈伏惟陛下既垂御省傷其情旨死不忘忠身沒黃泉追恨國恥獎臣戮力救濟艱難使亡而有知抱恨結草豈樂今日勞費之事願陛下慈恩停其移葬使嶠棺柩無風波之危靈魂安于后土晉書溫嶠傳讓拜大將軍表臣非貪榮于疇昔而虛讓于今日事有合時宜臣豈敢與陛下有違理有益于聖世臣豈與朝與朝廷作異臣常欲除諸浮長之事遣虛假之用非獨臣身而已若臣仗國威靈梟雄斬勒則又何以加晉書陶侃傳上表遜位臣少長孤寒始願有限過蒙聖朝歷世殊恩陛下睿鑒寵靈彌泰有始必終自古而然臣年垂八十位極人臣啓手啓足當復何恨但以陛下春秋尚富餘寇不誅山陵未反所以憤慨兼懷不能已已臣雖不知命年時已邁國恩殊特賜封長沙隕越之日當歸骨國土臣父母舊葬今在尋陽緣存處亡無心分違已勒國臣修遷改之事刻以來秋奉迎窀穸葬事訖乃告老下藩不圖所患遂爾綿篤伏枕感結情不自勝臣閒者猶謂犬馬之齒尚可小延欲為陛下西平李雄北吞石季龍是以遣母丘奧于巴東授桓宣于襄陽良圖未敘于此長乖此方之任內外之要願陛下速選臣代使必得良才奉宣王猷遵成臣志則臣日死之日猶生之年陛下雖聖姿天縱英奇日新方事之殷當賴群俊司徒導鑒識經遠光輔三世司空鑒𥳑素貞正內外惟允平西將軍亮雅量詳明器用周時即陛下之周召也獻替疇咨敷融政道地平天成四海幸賴謹遣左長史殷羡奉送所假節麾幢曲蓋侍中貂蟬太尉章荊江州刺史印傳棨戟仰戀天恩悲酸感結以後事付右司馬王愆期加督護統領文武晉書陶侃傳上成帝雜物疏螺杯一枚御覽七百五十九引陶侃故事水晶盤一枚御覽七百六十引陶侃故事遺荀嵩書杜曾凶狡所將之卒皆豺狼也可謂鴟梟食母之物此人不死州土未寧足下當識吾言晉書杜曾傳答溫嶠書春所送帳下得蘇峻兜鍪作之功劼用功殊多戰器不事須此也意謂不如三甲者逆賊身所服此是凶器古人惡其名得此兜鍪者猶以有功今賞其細葛一端御覽三百五十六答慕容廆書當今揚淮鋭勇飛廉超驥收屈盧必陷之矛集鮫犀不入之盾御覽三百五十七報封抽韓矯等書車輢將軍憂國忘身貢篚載路羯賊求和執使送之西討段國北伐塞外遠綏索頭荒服獻款惟北部未賓屢遣征伐又知東方官號高下齊班進無統攝之權退無等差之降欲進車騎為燕王一二具之夫功成進爵古之成制也車騎雖未能為國摧勒然忠義竭誠見于辭表今騰箋上聽可否遲速當在天臺也晉書載紀慕容廆傳又十六國春秋二十三與王導書郭默殺方州即用為方州害宰相便為宰相乎晉書陶侃傳時郭默矯詔襲殺平南將軍劉胤輒領江州侃討默與道書陶潛感士不遇賦并序感士不遇賦并序昔董仲舒作士不遇賦司馬子長又為之余嘗以三餘之日講習之暇讀其文慨然惆悵夫履信思順生人之善行抱朴守靜君子之篤素自真風告逝大僞斯興閭閻懈廉退之節市朝驅易進之心懷正志道之士或潛玉於當年潔己清操之人或沒世以徒勤故夷皓有安歸之嘆三閭發已矣之哀悲夫寓形百年而瞬息已盡立行之難而一城莫賞此古人所以染翰慷慨屢伸而不能已者也夫導達意氣其惟文乎撫卷躊躇遂感而賦之咨大塊之受氣何斯人之獨靈稟神智以藏照秉三五而垂名或擊壤以自歡或大濟於蒼生靡潛躍之非分常傲然以稱情世流浪而遂徂物群分以相形密網裁而魚駭宏羅制而鳥驚彼達人之善覺乃逃祿而歸耕山嶷嶷而懷影川汪汪而藏聲望軒唐而永嘆甘貧賤以辭榮淳源汨以長分美惡作以異途原百行之攸貴莫為善之可娛奉上天之成命師聖人之遺書發忠孝於君親生信義於鄉閭推誠心而獲顯不矯然而祈譽嗟乎雷同毀異物惡其上妙算者謂迷直道者云妄坦至公而無猜卒蒙恥以受謗雖懷瓊而握蘭徒芳潔而誰亮哀哉士之不遇已不在炎帝帝魁之世獨祗修以自勤豈三省之或廢庶進德以及時時既至而不惠無爰生之晤言念張季之終蔽愍馮叟於郎署賴魏守以納計雖僅然於必知亦苦心而曠歲審夫市之無虎眩三夫之獻說悼賈傅之秀朗紆遠轡於促界悲董相之淵致屢乘危而幸濟感哲人之無偶淚淋浪以灑袂承前王之清誨曰天道之無親澄得一以作鑒恆輔善而佑仁夷投老以長飢回早夭而又貧傷請車以備槨悲茹薇而殞身雖好學與行義何死生之苦辛疑報德之若茲懼斯言之虛陳何曠世之無才罕無路之不澀伊古人之慷慨病奇名之不立廣結髮以從政不愧賞於萬邑屈雄志於戚豎竟尺土之莫及留誠信於身後慟衆人之悲泣商盡規以拯弊言始順而患入奚良辰之易傾胡害勝其乃急蒼旻遐緬人事無已有感有昧疇測其理寧固窮以濟意不委曲而纍己既軒冕之非榮豈縕袍之為恥誠謬會以取拙且欣然而歸止擁孤襟以畢歲謝良價於朝市間情賦并序間情賦并序初張衡作定情賦蔡雍作靜情賦檢逸辭而宗淡泊始則蕩以思慮而終歸間正將以抑流宕之邪心諒有助於諷諫綴文之士奕代繼作並因觸類廣其辭義余園閭多暇復染翰為之雖文妙不足庶不謬作者之意乎夫何懷逸之令姿獨曠世以秀群表傾城之艷色期有德於傳聞佩鳴玉以比潔齊幽蘭以爭芬淡柔情於俗內負雅志於高雲悲晨曦之易夕感人生之長勤同一盡於百年何歡寡而愁殷褰朱幃而正坐泛清瑟以自欣送纖指之餘好攘皓袖之繽紛瞬美目以流眄含言笑而不分曲調將半景落西軒悲商叩林白雲依山仰睇天路俯促鳴絃神儀嫵媚舉止詳妍激清音以感余願接膝以交言欲自往以結誓懼冒禮之為愆待鳳鳥以致辭恐他人之我先意惶惑而靡寧魂須臾而九遷願在衣而為領承華首之餘芳悲羅襟之宵離怨秋夜之未央願在裳而為帶束窈窕之纖身嗟溫涼之異氣或脫故而服新願在髮而為澤刷玄鬢於頽肩悲佳人之屢沐從白水以枯煎願在眉而為黛隨瞻視以間揚悲脂粉之尚鮮或取毀於華粧願在莞而為席安弱體於三秋悲文茵之代御方經年而見求願在絲而為履附素足以周旋悲行止之有節空委棄於床前願在晝而為影常依形而西東悲高樹之多蔭慨有時而不同願在夜而為燭照玉容於兩楹悲扶桑之舒光奄滅景而藏明願在竹而為扇含淒飆於柔握悲白露之晨零顧襟袖以緬邈願在木而為桐作膝上之鳴琴悲樂極以哀來終推我而輟音考所願而必違徒契契以苦心擁勞情而罔訴步容與於南林栖木蘭之遺露翳青松之餘陰儻行行之有覿交欣懼於中㦗竟寂寞而無見獨悁想以空尋斂輕裾以復路瞻夕陽而流歎步徙倚以忘趣色慘悽而矜顏葉燮燮以去條氣淒凄而就寒日負影以偕沒月媚景於雲端鳥悽聲以孤歸獸索偶而不還悼當年之晚暮恨茲歲之欲殫思宵夢以從之神飄颻而不安若憑舟之失棹譬緣崖而無攀于時畢昴盈軒北風淒淒㤯㤯不寐衆念徘徊起攝帶以伺晨繁霜粲於素階雞斂翅而未鳴笛流遠以清哀始妙密以間和終寥亮而藏摧意夫人之在茲託行雲以送懷行雲逝而無語時奄冉而就過徒勤思以自悲終阻山而帶河迎清風以祛纍寄弱志於歸波尤蔓草之為會誦邵南之餘歌坦萬慮以存誠憩遙情於八遐歸去來兮辭并序歸去來兮辭并序余家貧耕植不足以自給幼稚盈室瓶無儲粟生生所資未見其術親故多勸余為長吏脫然有懷求之靡途會有四方之事諸侯以惠愛為德家叔以余貧苦遂見用于小邑于時風波未靜心憚遠役彭澤去家百里公田之利足以為酒故便求之及少日眷然有歸歟之情何則質性自然非矯勵所得飢凍雖切違己交病嘗從人事皆口腹自役於是悵然慷慨深愧平生之志猶望一稔當斂裳宵逝尋程氏妹喪于武昌情在駿奔自免去職仲秋至冬在官八十餘日因事順心命篇曰歸去來兮乙巳歲十一月也歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未遠覺今是而昨非舟遙遙以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽引壺觴以自酌眄庭柯以怡顏倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關策扶老以流憩時矯首而遐觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶游世與我而相違復駕言兮焉求悅親戚之情話樂琴書以消憂農人告余以春及將有事於西疇或命巾車或棹孤舟既窈窕以尋壑亦崎嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為乎遑遑兮欲何之富貴非吾願帝鄉不可期懷良辰以孤往或植杖而耘耔登東皋以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑與子儼等疏告儼俟份佚佟天地賦命生必有死自古賢聖誰能獨免子夏有言死生有命富貴在天四友之人親受音旨發斯談者將非窮達不可妄求壽夭永無外請故耶吾年過五十少而窮苦每以家弊東西游走性剛才拙與物多忤自量為己必貽俗患僶俯辭世使汝等幼而飢寒余嘗感孺仲賢妻之言敗絮自擁何慚兒子此既一事矣但恨鄰靡二仲室無萊婦抱茲苦心良獨內愧少學琴書偶愛間靜開卷有得便欣然忘食見樹木交蔭時鳥變聲亦復歡然有喜常言五六月中北窗下臥遇涼風暫至自謂是羲皇上人意淺識罕謂斯言可保日月遂往機巧好踈緬求在昔眇然如何疾患以來漸就衰損親舊不遺每以藥石見救自恐大分將有限也汝輩稚小家貧每役柴水之勞何時可免念之在心若何可言然汝等雖曰同生當思四海皆兄弟之義鮑叔管仲分財無猜歸生伍舉班荊道舊遂能以敗為成因喪立功他人尚爾況同父之人哉潁川韓元長漢末名士身處卿佐七十而終兄弟同居至于沒齒濟北泛稚春晉時操行人也七世同財家人無怨色詩曰高山仰止景行行止雖不能爾至心尚之汝其慎哉吾復何言停雲詩序停雲思親友也樽湛新醪園列初榮願言不從歎息彌襟時運詩序時運游暮春也春服既成景物斯和偶影獨游欣慨交心榮木詩序榮木念將老也日月推遷已復有夏總角聞道白首無成贈長沙公族祖詩序長沙公於余為族祖同出大司馬昭穆既遠已為路人經過潯陽臨別贈此答龐參軍詩序龐為衛軍參軍從江陵使上都過潯陽見贈形影神詩序貴賤賢愚莫不營營以惜生斯甚惑焉故極陳形影之苦言神辨自然以釋之好事君子共取其心焉九日間居詩序余間居愛重九之名秋菊盈園而持醪靡由空服九華寄懷於言遊斜川詩序辛酉正月五日天氣澄和風物間美與二三鄰曲同遊斜川臨長流望曾城魴鯉躍鱗於將夕水鷗乘和以翻飛彼南阜者名實舊矣不復乃為嗟歎若夫曾城傍無依接獨秀中皋遙想靈山有愛嘉名欣對不足率爾賦詩悲日月之遂往悼吾年之不留各疏年紀鄉里以記其時日答龐參軍詩序三復來貺欲罷不能自爾鄰曲冬春再交款然良對忽成舊游俗諺云數面成親舊況情過此者乎人事好乖便當語離楊公所歎豈惟常悲吾抱疾多年不復為文本既不豐復老病繼之輒依周禮往復之義且為別後相思之資與殷晉安別詩序殷先作晉安南府長史掾因居潯陽後作太尉參軍移家東下作此以贈贈羊長史詩序左軍羊長史銜使秦川作此與之飲酒詩序余間居寡歡兼比夜已長偶有名酒無夕不飲顧影獨盡忽焉復醉既醉之後輒題數句自娛紙墨遂多辭無詮次聊命故人書之以為歡笑爾有會而作詩序舊穀既沒新穀未登頗為老農而值年災日月尚悠為患未已登歲之功既不可希朝夕所資煙火裁通旬日已來始念飢乏歲云夕矣慨然永懷今我不述後生何聞哉桃花源記晉太元中武陵人捕魚為業緣溪行忘路之遠近忽逢桃花林夾岸數百步中無雜樹芳草鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口髣佛若有光便捨船從口入初極狹才通人復行數十步豁然開朗土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黃髮垂髫並怡然自樂見漁人乃大驚問所從來具答之便要還家設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來此絶境不復出焉遂與外人間隔問今是何世乃不知有漢無論魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守說如此太守即遣人隨其往尋向所志遂迷不復得路南陽劉子驥高尚士也聞之欣然親往未果尋病終後遂無問津者
