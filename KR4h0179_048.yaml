body:
  text: 卷四十八傅玄平賦役昔先王之興役賦所以安上濟下盡利用之宜是故隨時質文不過其節計民豐約而平均之使力足以供事財足以周用乃立一定之制以為常典甸都有常分諸侯有常職焉萬國致其貢器用殊其物上不興非常之賦下不進非常之貢上下同心以奉常教民雖輸力致財而莫怨其上者所務公而制有常也戰國之際棄德任威競相吞代而天下之民困矣秦并海內遂滅先王之制行其暴政內造阿房之宮繼以驪山之役外築長城之限重以百越之戍賦過大半傾天下之財不足以盈其欲役及閭左竭天下之力不足以周其事于是蓄怨積憤同聲而起陳涉項梁之疇奮劍大呼而天下之民響應以從之驪山之基未閉而敵國已收其圖籍矣昔者東野畢御盡其馬之力而顏回知其必敗況御天下而可盡人之力也哉夫用人之力歲不過三日者謂治平無事之世故周之典制載焉若黃帝之時外有赤帝蚩尤之難內設舟車門衛甲兵之備六興大役再行天誅居無安處即天下之民亦不得不勞也勞而不怨用之至平也禹鑿龍門闢伊闕築九山滌百川過門不入薄飲食卑宮室以率先天下天下樂盡其力而不敢辭勞者儉而有節所趣公也故世有事即役煩而賦重世無事即役𥳑而賦輕役簡賦輕則奉上之禮宜崇國家之制宜備此周公所以定六典也役煩賦重即上宜損制以恤其下事宜從省以致其用此黃帝夏禹之所以成其功也後之為政思黃帝之至平夏禹之積儉周制之有常隨時益損而息耗之庶幾雖勞而不怨矣群書治要永樂大典貴教虎至猛也可畏而服鹿至麤也可教而使木至勁也可柔而屈石至堅也可消而用況人含五常之性有善可因有惡可改者乎人之所重莫重乎身貴教之道行士有仗節成義死而不顧者矣此先王因善教義因義而立禮者也因善教義故義成而教行因義立禮故禮設而義通若夫商韓孫吳知人性之貪得樂進而不知兼濟其善于是束之以法要之以功使下唯力是恃唯爭是務恃力務爭至有探湯赴火而忘其身者好利之心獨用也人懷好利之心則善端沒矣中國所以常制四夷者禮義之教行也失其所以教則同乎夷狄矣其所以同則同乎禽獸矣不唯同乎禽獸亂將甚焉何者禽獸保其性然者也人以智役力者也智役力而無教節是智巧日用而相殘無極也相殘無極亂孰大焉不濟其善而唯力是恃其不大亂幾稀耳人之性避害從利故利出于禮讓即修禮讓利出于力爭則任力爭修禮讓則上安下順而無侵奪任力爭則父子幾乎相危而況于悠悠者乎群書治要永樂大典戒言上好德則下修行上好言則下飾辯修行則仁義興焉飾辯則大偽起焉此必然之徵也德者難成而難見者也言者易撰而易悅者也先王知言之易而悅之者眾故不尚焉不尊賢尚德舉善以教而以一言之悅取人則天下之棄德飾辯以要其上者不鮮矣何者德難為而言易飾也夫貪榮重利常人之性也上之所好榮利存焉故上好之下必趣之趣之不已雖死不避也先王知人有好善尚德之性而又貪榮而重利故貴其所尚而抑其所貪貴其所尚故禮讓興抑其所貪故廉恥存夫榮利者可抑而不可絕也故明為顯名高位豐祿厚賞使天下希而慕之不修行崇德則不得此名不居此位不食此祿不獲此賞此先王立教之大體也夫德修之難不積其實不成其名夫言撰之易合所悅而大用修之不久所悅無常故君子不貴也群書治要永樂大典正心立德之本莫尚乎正心心正而後身正身正而後左右正左右正而後朝廷正朝廷正而後國家正國家正而後天下正故天下不正修之國家國家不正修之朝廷朝廷不正修之左右左右不正修之身身不正修之心所修彌近而所濟彌遠禹湯罪己其興也勃焉正心之謂也心者神明之主萬物之統也動而不失正天地可感而況于人乎況于萬物乎夫有正心必有正德以正德臨民猶樹表望影不令而行大雅云儀刑文王萬邦作孚此之謂也有邪心必有枉行以枉行臨民猶樹曲表而望其影之直也若乃身坐廊廟之內意馳雲夢之野臨朝宰事情繫曲房之娛心與體離情與志乖形神且不相保孰左右之能正乎哉忠正仁理存乎心則萬品不失其倫矣禮度儀法存乎體則遠邇內外咸知所象矣古之大君子修身治人先正其心自得而已矣能自得則無不得矣苟自失則無不失矣無不得者治天下有餘故否則保身居正終年不失其和達則兼善天下物無不得其所無不失者營妻子不足故否則是己非人而禍逮乎其身達則縱情用物而殃及乎天下昔者有虞氏彈五弦之琴而天下樂其和者自得也秦始皇築長城之塞以為固禍幾發于左右者自失也夫推心以及人而四海蒙其佑則文王其人也不推心以虐用天下則左右不可保亡秦是也秦之虣君目玩傾城之色天下男女怨曠而不肯恤也耳淫亡國之聲天下小大哀怨而不知撫也意盈四海之外口窮天下之味宮室造天而起萬國為之癄瘁猶未足以逞其欲唯不推心以況人故視用人如用草芥使用人如用已惡有不得其性者乎古之達治者知心為萬事主動而無節則亂故先正其心其心正于內而後動靜不妄以率先天下而後天下履正而咸保其性也斯遠乎哉求之心而已矣群書治要永樂大典通志夫能通天下之志者莫大乎至公能行至公者莫要乎無忌心唯至公故近者安焉遠者歸焉枉直取正而天下信之唯無忌心故進者自盡而退不懷疑其道泰然浸潤之譖不敢干也虞書曰闢四門則天下之人輻湊其庭矣明四目則天下之人樂為之視矣達四聰則天下之人樂為之聽矣江海所以能為百谷王者以其不逆之也苟所有逆眾流之不至者多矣眾流不至者多則無以成其深矣夫有公心必有公道有公道必有公制丹朱商均子也不肖堯舜黜之管叔蔡叔弟也為惡周公誅之苟不善雖子弟不赦則于天下無所私矣鯀亂政舜殛之禹聖明舉用之戮其父而授其子則于天下無所忌矣石厚子也石碏誅之冀缺讎也晉侯舉之是之謂公道夫在人上天下皆樂為之用無遠無近苟所懷得達死命可致也唯患眾流異源清濁不同愛惡相攻而親疏黨別上之人或有所好所好之流獨進而所不好之流退矣通者一而塞者萬則公道廢而私道行矣于是天下之志塞而不通欲自納者因左右而達則權移左右而上勢分矣昧于利者知趣左右之必通必變業以求進矣昧于利者變業而黨成正士守志而日否則雖見者盈庭而上之所聞實寡外倦于人而內寡聞此自閉之道也故先王之教進賢者為上賞蔽賢者為上戮順理者進逆法者誅設誹謗之木容狂狷之人任公而去私內恕而無忌是之謂公制也公道行則天下之志通公制立則私曲之情塞矣凡有血氣苟不相順皆有爭心隱而難分微而害深者莫甚于言矣君人者將和眾定民而殊其善惡以通天下之志者也聞言不可不審也聞言未審而以定善惡則是非有錯而飾辯巧言之流起矣故聽言不如觀事觀事不如觀行聽言必審其本觀事必校其實觀行必攷其迹參三者而詳之近少失矣問曰漢之官制皆用秦法秦不二世而滅漢二十餘世而後亡者何也荅曰其制則同用之則異秦任私而有忌心法峻而惡聞其失任私則遠者怨有忌心則天下疑法峻則民不順之惡聞其失則過不上聞此秦之所以不二世而滅也漢初入秦約法三章論功定賞先封所憎約法三章公而𥳑也先封所憎無忌也雖網漏吞舟而百姓安之者能通天下之志得其略也世尚寬𥳑尊儒貴學政雖有失能容直臣𥳑則不苟寬則眾歸之尊儒貴學則民篤于義能容直臣則上之失不害于下而民之患上聞矣自非聖人焉能無失失而能改則所失少矣心以為是故言行由之其或不是不自知也先王患人之不自知其失而處尊者天下之命在焉順之則生逆之則死順而無節則諂諛進逆而畏死則直道屈明主患諛己者眾而無由聞失也故開敢諫之路納逆己之言苟所言出于忠誠雖事不盡是猶歡然受之所以通直言之塗引而致之非為名也以為直言不聞則己之耳目塞耳目塞于內諛者順之于外此三季所以至亡而不自知也周昌比高祖于桀紂而高祖託以愛子周亞夫申軍令而太宗為之不驅朱雲折檻辛慶忌叩頭流血斯乃寬𥳑之風漢所以歷年四百也群書治要永樂大典曲制天下之福莫大于無欲天下之禍莫大于不知足無欲則無求無求者所以成其儉也不知足則物莫能盈其欲矣莫能盈其欲則雖有天下所求無已所欲無極矣海內之物不益萬民之力有盡縱無已之求以滅不益之物逞無極之欲而役有盡之力此殷士所以倒戈于牧野秦民所以不期而周叛曲論之好奢而不足者豈非天下之大禍邪群書治要永樂大典安民民富則安貧則危明主之治也分其業而一其事業分則不相亂事一則各盡其力而不相亂則民必安矣重親民之吏而不數遷重則樂其職不數遷則志不流于他官樂其職而志不流于他官則盡心恤其下盡心以恤其下則民必安矣附法以寬民者賞剋法以要名者誅寬民者賞則法不虧于下剋民者誅而名不亂于上則民必安矣量時而置官則吏省而民供吏省則精精則當才而不遺力民則供順供順則思義而不背上上愛其下下樂其上則民必安矣篤鄉閭之教則民存知相恤而亡知相救存相恤而亡相救則鄰居相恃懷土而無遷志鄰居相恃懷土無遷志則民必安矣度時宜而立制量民力以役賦役賦有常上無橫求則事事有儲而并兼之隙塞事有儲并兼之隙塞則民必安矣圖遠必驗之近興事必度之民知稼穡之艱難重用其民如保赤子則民必安矣職業無分事務不壹職荒事廢相督不已若是者民危親民之吏不重有資者無勞而數遷競營私以害公飾虛以求進仕宦如寄視用其民如用路人若是者民危以法寬民者不賞剋民為能者必進下力盡矣而用之不已若是者民危吏多而民不能供上下不相樂若是者民危鄉閭無教存不相恤而亡不相救若是者民危不度時而立制不量民而役賦無常橫求相仍弱窮迫不堪其命若是者民危視遠而忘近興事不度于民不知稼穡艱難而轉用之如是者民危安民而上危民危而上安者未之有也虞書曰安民則惠黎民懷之其為治之要乎今之刺史古之牧伯也今之郡縣古之諸侯也州總其統郡舉其綱縣理其目各職守不得相干治之經也夫彈枉正邪糾其不法擊一以警百者刺史之職也比物校成攷定能否均其勞逸同其得失有大不可而後舉之者太守之職也親民授業平理百事猛以威吏寬以容民者令長之職也然則令長者最親民之吏百姓之命也國以民為本親民之吏不可以不留意也群書治要永樂大典傅子曰利天下者天下亦利之害天下者天下亦害之利則利害則害無有幽深隱微無不報也仁人在位常為天下所歸者無他也善為天下興利而已矣群書治要問政劉子問政傅子曰政在去私私不去則公道亡公道亡則禮教無所立禮教無所立則刑賞不用情刑賞不用情而下從之者未之有也夫去私者所以立公道也唯公然後可正天下傅子曰善為政者天地不能害也而況于人乎堯水湯旱而人無菜色猶太平也不亦美乎晉饑矣懈而為秦越禽人且害之而況于天地乎群書治要永樂大典問刑傅子曰秦始皇之無道豈不甚哉視殺人如殺狗彘狗彘仁人用之猶有節始皇之殺人觸情而已其不以道如是而李斯又深刑峻法隨其指而妄殺人秦不二世而滅李斯無遺類以不道遇人人亦以不道報之人讎之天絕之行無道未有不亡者也或曰漢太宗除肉刑可謂仁乎傅子曰匹夫之仁也非王天下之仁也夫王天下者大有濟者也非小不忍之謂也先王之制殺人者死故生者懼傷人者殘其體故終身懲所刑者寡而所濟者眾故天下稱仁焉今不忍殘人之體而忍殺之既不類傷人刑輕是失其所以懲也失其所以懲則易傷人人易相傷亂之漸也猶有不忍之心故曰匹夫之仁也群書治要永樂大典釋法釋法任情姦佞在下多疑少決譬執腐索以御奔馬專任刑名民不聊生通儒達道政乃升平浩浩大海百川歸之洋洋聖化九服仰之春風畼物秋霜肅殺同則相濟異若胡越藝文類聚五十四信直傳子曰古之賢君樂聞其過故直言得至以補其闕古之忠臣不敢隱君之過故有過者知所以改其或不改以死繼之不亦至直乎傅子曰至哉季文子之事君也使惡人不得行其境內況在其君之側乎推公心而行直道有臣若此其君稀陷乎不義矣群書治要永樂大典矯違傅子曰正道之不行常佞人亂之也故桀信其佞臣推侈以殺其正臣關龍逢而夏以亡紂信其佞臣惡來以割其正臣王子比干之心而殷以亡曰惑佞之不可用如此何惑者之不息也傅子曰佞人善養人私欲也故多私欲者悅之唯聖人無私欲賢者能去私欲也有見人之私欲必以正道矯之者正人之徒也違正而從之者佞人之徒也自察其心斯知佞正之分矣或問佞孰為大傅子曰行足以服俗辨足以惑眾言必稱乎仁義隱其惡心而不可卒見伺主之欲微合之得其志敢以非道陷善人稱之有術飾之有利非聖人不能別此大佞也其次心不欲為仁義言亦必稱之行無大可非動不違乎俗合主所欲而不敢正也有害之者然後陷之最下佞者行不顧乎天下唯求主心使文巧辭自利而已顯然害善行之不怍若四凶可謂大佞者也若安昌侯張禹可謂次佞也若趙高石顯可謂最下佞者也大佞形隱為害深下佞形露為害淺形露猶不別之可謂至闇也已群書治要永樂大典治人之謂治正己之謂正人不能自治故設法以一之身不正雖有明法即民或不從故必正己以先之也然則明法者所以齊眾也正己者所以率人也夫法設而民從之者得所欲也法獨設而無主即不行有主而不一則勢分一則順分則爭此自然之理也群書治要假言天地至神不能同道而生萬物聖人至明不能一檢而治百姓故以異致同者天地之道也因物制宜者聖人之治也既得其道雖有詭常之變相害之物不傷乎治體矣水火之性相滅也善用之者陳釜鼎乎其閒爨之煮之而能兩盡其用不相害也五味以調百品以成天下之物為水火者多矣若施釜鼎乎其閒則何憂乎相害何患乎不盡其用也群書治要永樂大典鏡總敘古之人目短于自見故以鏡觀面智短于自知故以道正己鏡無見疵之罪道無明過之惡面失鏡則無以正鬚眉身失道則無以知迷惑永樂大典大本象天地以立制北堂書鈔十七引傅玄大本
