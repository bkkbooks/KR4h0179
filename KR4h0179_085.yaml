body:
  text: 張載濛汜池賦麗華池之湛淡開重壤以停源激通渠于千金承瀍洛之長川挹洪流之汪濊包素瀨之寒泉既乃北通醴泉東入紫宮左面九市右帶閬風周墉建乎其表洋波迴乎其中幽瀆傍集潛流獨注淡淡灃沛更來迭去仰承河漢吐納雲霧緣以采石殖以嘉樹水禽育而萬品珍魚產而無數蒼苔汎濫脩條垂榦綠葉覆水玄蔭珍岸紅蓮煒而秀出繁葩赩以煥爛游龍躍翼而上征翔鳳因儀而下觀想白日之納光覩洪暉之皓旰于是天子乘玉輦時遨遊排金門出千秋造綠池鏡清流翳華蓋以逍遙攬魚釣之所收纖緒挂而鱣鮪來芳餌沈而鰋鯉浮豐夥踰于巨壑信可樂以忘憂藝文類聚九敘行賦歲大荒之孟夏余將往乎蜀都脂輕車而秣馬循路軌以西徂朝發軔于京宇兮夕予宿于穀洛踐有周之舊墟塊丘荒以寥廓讚王孫于北門問九鼎于東郭實公目之所卜曷斯土之濆薄入函谷而長驅歷新安之鹵阜行逶迤以登降涉二崤之重阻經嶔岑之險巇想姬文之避雨出潼關以迴逝仰華岳之崔嵬勤大禹之疏導豁龍門之洞開舍予車以步趾玩卉木之璀錯翳青青之長松蔭肅肅之高柞緣阻岑之絕崖蹈偏梁之懸閣石壁立以切天岌𡾋隗其欲落超陽平而越白水稍幽薆以迴深秉重巒之百層轉木末于九岑浮雲起于轂下零雨集于麓林上昭晰以清陽下杳冥而晝陰聞山鳥之晨鳴聽玄猨之夜吟雖處者之所樂嗟寂寞而愁予心造劍閣之崇關路盤曲以晻藹山崢嶸以峻狹仰青天其如帶兼習坎之重固形東隘以要害豈乾坤之分域將隔絕乎內外藝文類聚二十七鞞舞賦并序鞞舞賦并序蓋以歌以詠所以象德足之蹈之所以盡情也初學記十五鞞舞煥而特奏兮冠眾妓而超絕采干戚之遺式兮同數度于二八初學記十五手運無方足不及帶輕裾鸞飛漂微逾曳初學記十五羽扇賦有翔雲之素鳥體自然之至絜飄縞羽于清霄擬妙姿于白雪俯濯素于河漢仰晞光于日月雙趾蹶而騰虛六翮揮而風厲于是傲世公子俶儻踔躒遺物獨出樂此天爵飛蒲氏之脩蟠榮子余之纖繳弋翔冥之鵾雞連王子之白鶴裁輕翼以為扇發清風于勁翮濯以雲精拂以芝露若乃搜奇選妙絕色寡雙鵠質曒鮮玄的點鋒脩短雖異而光彩齊同故易稱可以為儀詩美肅肅之容是以停之如棲鵠揮之如驚鴻飄纓蕤于軒幌發暉曜于群龍夫裂素製圓剖竹為方五明起于名都九華興于上京藝文類聚六十九又見書鈔一百三十四御覽七百六十六酃酒賦惟聖賢之興作貴垂功而不泯嘉康狄之先識亦應天而順人擬酒旗于玄象造甘醴以頤神雖賢愚之同好似大化之齊均物無往而不變獨居舊而彌新經盛衰而無廢歷百代而作珍若乃中山冬啟醇酎秋發長安春御樂浪夏設漂蟻萍布分香酷烈垂嘉稱于百代信人神之所悅未聞珍酒出于湘東丕顯于皇都乃潛淪于吳邦往逢天地之否運今遭六合之開通播殊美于聖代宣至味而大同匪徒法用之窮理信泉壤之所鍾故其為酒也殊功絕倫三事既節五齊必均造釀以秋告成以春備味滋和體淳色清宣御神志導氣養形遣憂消患適性順情言之者嘉其美志味之者棄事忘榮于是糾合同好以遨以遊嘉賓雲會矩坐四周設金樽于南楹酌浮觴以旋流備鮮肴以綺錯進時膳之珍羞禮儀攸序是獻是酬赬顏微發溢思凱休德音晏晏弘此徽猷咸得志以自足願棲遲于一丘于是歡樂既洽日薄西隅主稱湛露賓歌驪駒僕夫整駕言旋其居乃憑軾以迴軌騁輕駟于通衢反衡門以隱迹覽前聖之典謨感夏禹之防微悟儀氏之見疏鑒往事而作戒罔非酒而惟愆哀秦穆之既醉殲良人而棄賢嘉衛武之能悔著屢舞于初筵察成敗于往古垂將來于茲篇藝文類聚七十二初學記二十六安石榴賦安石榴賦有石榴之奇樹肇結根于西海仰青春以啟萌晞朱夏以發采揮光垂綠擢榦曜鮮熻若群翡俱栖爛若百枝竝然煥乎郁郁焜乎煌煌仰映青霄俯燭蘭堂似西極之若木譬東谷之扶桑于是天迴節移龍火西夕流風晨激行露朝白紫房既熟赬膚自拆剖之則珠散含之則冰釋充嘉味于庖籠極醉酸之滋液上薦清廟之靈下羞玉堂之客藝文類聚八十六御覽九百七十瓜賦羊骹虎掌桂枝蜜筩或玄表丹裏呈素含紅豐膚外偉綠𤬞內醲甘柤夏熟丹柰含芳朱李零于桂圃蒲萄潰于椒床雖茲肴之孤起莫斯瓜之允臧超椰子于南海越橘柚于衡陽若乃檳榔椰實龍眼荔枝徒以希珍難致為奇論實比德孰大于斯藝文類聚八十七御覽九百六十八又九百七十八平吳頌聞之前志堯有丹水之陣舜有三苗之誅此聖帝明王平暴靜亂未有不用兵而制之也夫大上成功非頌不顯情動于中非言不彰獫狁既攘出車以興淮夷既平江漢用作斯故先典之明志不刊之美事烏可闕歟遂作頌曰上哉仁聖曰惟皇晉光澤四表繼天垂胤帝道煥于唐堯義聲邈乎虞舜蠢爾鯨吳憑山阻水肆虐播毒而作豺虺菁茅闕而不貢越裳替其白雉正九伐之明典申號令之舊章布亙地之長羅振天網之脩綱制征期于一朝竝箕驅而慕張爾乃拔丹陽之峻壁屠西陵之高墉日不移晷群醜率從望會稽而振鐸臨吳地而奮旅眾軍競趣烽飆具舉挫其輕銳走其守禦藝文類聚五十九元康頌開元建號班德布化文選顏延之宋郊祀歌注榷論夫賢人君子將立天下之功成天下之名非遇其時曷由致之哉故嘗試論之殷湯無鳴條之事則伊尹有莘之匹夫也周武無牧野之陣則呂牙渭濱之釣翁也若茲之類不可勝紀蓋聲發響應形動影從時平則才伏世亂則奇用豈不信歟設使秦莽脩三王之法時致隆平則漢祖泗上之健吏光武舂陵之俠客耳況乎附麗者哉故當其有事也則足非千里不入于輿刃非斬鴻不韜于鞘是以駑蹇望風而退頑鈍未試而廢及其無事也則牛驥共牢利鈍齊列而無長塗犀革以決之此離朱與瞽者同眼之說也處守平之世而欲建殊常之勳居太平之際而吐違俗之謀此猶卻步而登山鬻章甫于越也漢文帝見李廣而歎曰惜子不遇當高祖時萬戶侯豈足道哉故智無所運其籌勇無所奮其氣則勇怯一也才無所騁其能辯無所展其說則頑慧均也是以吳榜越船不能無水而浮青虯赤螭不能無雲而飛故和璧之在荊山隋珠之潛重川非遇其人焉有連城之價照車之名乎青骹繁霜縶于籠中何以效其撮東郭于韝下也白猨玄豹藏于櫺檻何以知其接垂條于千仞也孱夫與烏獲訟力非龍文赤鼎無以明之蓋聶與荊卿爭勇非彊秦之威孰能辨之故餓夫庸隸抱關屠釣之倫一旦而都卿相之位建金石之號者或有懷顏孟之術抱伊管之略沒世而不齒者此言有事之世易為功無為之時難為名也若斯湮滅而不稱曾不足以多說況夫庸庸之徒少有不得意者則自以為枉伏莫不飾小辯立小善以偶時結朋黨聚虛譽以驅俗進之無補于時退之無損于化而世主相與雷同齊口吹而喣之豈不哀哉今士循常習故規行矩步積階級累閥閱碌碌然以取世資若夫魁梧雋傑卓躒俶儻之徒直將伏死嶔岑之下安能與步驟共爭道里乎至于軒冕黻班之士苟不能匡化輔政佐時益世而徒俯仰取容要榮求利厚自封之資豐私家之積此沐猴而冠耳尚焉足道哉晉書張載傳又略見藝文類聚九十五御覽九百十劍閣銘劍閣銘巖巖梁山積石峨峨遠屬荊衡近綴岷嶓南通卭僰北達褎斜狹過彭碣高踰嵩華惟蜀之門作固作鎮是曰劍閣壁立千仞窮地之險極路之峻世濁則逆道清斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧茲狹隘土之外區一人荷戟萬夫趑趄形勝之地匪親勿居昔在武侯中流而喜山河之固見屈吳起興實在德險亦難恃洞庭孟門二國不祀自古迄今天命匪易憑阻作昏鮮不敗績公孫既滅劉氏銜璧覆車之軌無或重迹勒銘山阿敢告梁益文選晉書張載傳藝文類聚七洪池陂銘開源東注出自城池魚鼈熾殖水鳥盈涯菱藕狎獦秔稻連畦漸臺中起列館參差惟水泱泱厥大難訾藝文類聚九匕首銘先民造制戒豫惟謹匕首之設應速用近既不忽備亦無輕忿利以形彰功以道隱藝文類聚六十御覽三百四十六洛禊賦夫何三春之令月嘉天氣之氤氳和風穆以布畼兮百卉曄而敷芬川流清泠以汪濊原隰蔥翠以龍鱗游魚瀺灂于淥波玄鳥鼓翼于高雲美節慶之動物悅群生之樂欣顧新服之初成兮將禊除于水濱于是縉紳先生嘯儔命友攜朋接黨冠童八九主希孔墨賓慕顏柳臨崖詠吟濯足盥手乃至都人士女奕奕祁祁車駕岬嵑充溢中逵粉葩翕習緣阿被湄振袖生風接衽成幃若夫權戚之家豪侈之族采騎齊鑣華輪方轂青蓋雲浮參差相屬集乎長洲之浦曜乎洛川之曲遂乃停輿蕙渚稅駕蘭田朱幔虹舒翠幙蜺連羅樽列爵周以長筵于是布椒醑薦柔嘉祈休吉蠲百痾漱清源以滌穢兮攬綠藻之纖柯浮素卵以蔽水灑玄醪于中河清哇發于素齒水禽為之駭踊陽侯為之動波藝文類聚四北堂書鈔一百三十二又一百五十五引五條初學記四御覽三十又三百六十八又七百又七百七十五又九百二十八登北芒賦陟巒丘之陁升逶迤之脩阪迴余車于峻嶺聊送目于四遠靈嶽鬱以造天連岡巖以蹇產伊洛混而東流帝居赫以崇顯山川汨其常弓萬物化而代轉何天地之難窮悼人生之危淺歎白日之西頹兮哀世路之多蹇于是徘徊絕嶺踟躇步趾前瞻南山卻闚大岯東眺虎牢西睨熊耳邪亙天際旁極萬里莽眩眼以芒昧諒群形之難紀臨千仞而俯看似遊身于雲霓撫長風以延佇想淩天而舉翮瞻冠蓋之悠悠覩商旅之接枙爾乃地勢窊隆丘墟陂陁墳隴嵔疊棊布星羅松林槮映以攢列玄木搜寥而振柯壯漢氏之所營望五陵之嵬峨喪亂起而啟壤僮豎登而作歌藝文類聚七歸舊賦苦辭既接歡言乃周文選陶潛讀山海經詩注玄武館賦爾乃地勢夷敞既膏且腴環以翠林帶以赤渠尋厥先之攸基實張氏之舊墟何魏后之周覽遂築館而起廬既號玄武是曰石樓于是崇墉四匝豐廈詭譎爛若丹霞皎如素雪璀璨皓旰華璫四垂接棟連阿崥嶱參差朱戶青鋪幽闥祕閨于是高樓特起竦峙岧嶢飛甍四注上概浮霄直亭亭以孤立迎千里之清飆陽扉南啟陰軒北達春牖左開秋牕右豁仰視雲根俯臨天末木則楸梓夾路蓊蔚如林洪榦十圍脩枝百尋藝文類聚六十三水經注河水五天子翱翔郊甸順時巡省龍駟騰鑣羽騎游騁顧流光以按轡迴鸞旗而時幸御覽三百五十八安石榴賦攷草木于方志覽華實于園疇窮陸產于苞貢差英奇于若榴耀靈葩于三春綴霜滋于九秋爾乃飛龍啟節揚飆扇埃含和澤以滋生鬱敷萌以挺栽傾柯遠擢沈根下盤繁莖篠密豐榦林攢揮長枝以揚綠披翠葉以吐丹流暉俯散迴葩仰照爛若百枝竝燃赫如烽燧俱燎皦如朝日晃若龍燭晞絳采于扶桑接朱光于若木爾乃赬萼挺蔕金牙承蕤蔭佳人之玄髻發窈窕之素姿遊女一顧傾城無鹽化為南威于是天漢西流辰角南傾芳實壘落月滿虧盈爰采爰收乃剖乃拆素粒紅液金房緗隔內憐幽以含紫外滴瀝以霞赤柔膚冰潔凝光玉瑩漼如冰碎泫若珠迸含清冷之溫潤信和神以理性藝文類聚八十六初學記二十八引兩條都蔗賦若乃九秋良朝玄酎初出觴浮華黃酒飲累白挫斯蔗而療渴若嗽醴而含蜜清津滋于紫梨流液豐于朱橘擇蘇妙而不逮何況沙棠與椰實藝文類聚八十七御覽九百七十四大觀本草二十三七命沖漠公子含華隱曜嘉遯龍盤翫世高蹈游心于浩然翫志乎眾妙絕景乎大荒之遐阻吞響乎幽山之窮奧于是徇華大夫聞而造焉乃整雲輅驂飛黃越奔沙輾流霜陵扶搖之風躡堅冰之津旌拂霄堮軌出蒼垠天清泠而無霞野曠朗而無塵臨重岫而攬轡顧石室而迴輪遂適沖漠之所居其居也崢嶸幽藹蕭瑟虛玄溟海渾濩涌其後嶰谷㟹嶆張其前尋竹竦莖蔭其壑百籟群鳴籠其山衡飆發而迴日飛礫起而麗天于是登絕巘遡長風陳辯惑之辭命公子于巖中曰蓋聞聖人不卷道而背時智士不遺身而匿迹生必耀華名于玉牒沒則勒洪伐于金冊今公子違世陸沈避地獨竄有生之歡滅資父之義廢愁洽百年苦溢千歲何異促鱗之游汀濘短羽之棲翳薈今將榮子以天人之大寶悅子以縱性之至娛窮地而遊中天而居傾四海之歡殫九州之腴鑽屈轂之瓠解疏屬之拘子欲之乎公子曰大夫不遺來萃荒外雖在不敏敬聽嘉話大夫曰寒山之桐出自太冥含黃鐘以吐榦據蒼岑而孤生既乃瓊巘嶒崚金岸崥崹右當風谷左臨雲谿上無陵虛之巢下無跖實之蹊搖刖峻挺茗邈苕嶢晞三春之溢露遡九秋之鳴飆雰雪寫其根霏霜封其條木既繁而後綠草未素而先凋于是構雲梯陟崢嶸翦蕤賓之陽柯剖大呂之陰莖營匠斲其樸伶倫均其聲器舉樂奏促調高張音朗號鐘韻清繞梁追逸響于八風采奇律于歸昌啟中黃之少宮發蓐收之變商若乃龍火西穨暄氣初收飛霜迎節高風送秋羈旅懷土之徒流宕百罹之疇撫促柱則酸鼻揮危弦則涕流若乃追清哇赴嚴節奏綠水吐白雪激楚迴流風結悲蓂莢之朝落悼望舒之夕缺煢嫠為之擗摽孀老為之嗚咽王子拂纓而傾耳六馬噓天而仰秣此蓋音曲之至妙子豈能從我而聽之乎公子曰余病未能也大夫曰蘭宮祕宇雕堂綺櫳雲屏爛汗瓊壁青蔥應門八襲旋臺九重表以百常之闕圜以萬雉之墉爾乃嶢榭迎風秀出中天翠觀岑青彫閣霞連長翼臨雲飛陛陵山望玉繩而結極承倒景而開軒赬素炳煥枌栱嵯峨陰虬負檐陽馬承阿錯以瑤英鏤以金華方疏含秀圓井吐葩重殿疊起交綺對榥幽堂晝密明室夜朗焦螟飛而生風尺蠖動而成響若乃目厭常玩體倦帷幄攜公子而雙游時娛觀于林麓登翠阜臨丹谷華草錦繁飛采星燭陽葉春青陰條秋綠華實代新承意恣觀仰折神虈俯采朝蘭遡惠風于蘅薄眷椒塗于瑤壇爾乃浮三翼戲中沚潛鰓駭驚翰起沈絲結飛矰理挂歸翮于赤霄之表出華鱗于紫淵之裏然後縱棹隨風弭楫乘波吹孤竹拊雲和川客唱淮南之曲榜人奏采菱之歌歌曰乘鳧舟兮為水嬉臨芳洲兮拔靈芝樂以忘戚游以卒時窮夜為日畢歲為期此蓋宴居之浩麗子豈能從我而處之乎公子曰余病未能也大夫曰若乃白商素節月既授衣天凝地閉風厲霜飛柔條夕勁密葉晨稀將因氣以效殺臨金郊而講師爾乃列輕武整戎剛建雲髦啟雄芒駕紅陽之飛鷰驂唐公之驌驦屯羽隊于外林縱輕翼于中荒爾乃張脩罠布飛羅陵黃岑挂青巒畫長壑以為限帶流谿以為關既乃內無疏蹊外無漏迹叩鉦數挍舉麾贊獲彀金機馳鳴鏑翦剛豪落勁翮連騎競騖駢武齊轍翕忽揮霍雲迴風列聲動響飛形移景發舉戈林聳揮鋒電滅仰傾雲巢俯殫地穴乃有圓文之𤜵斑題之𤡆鼓鬣風生怒目電瞛口齩霜刃足撥飛鋒齀林蹶石扣跋幽叢于是飛黃奮銳賁石逞伎蹙封豨㩌馮豕拉甝虪挫獬句爪摧鋸牙擺瀾漫狼藉傾榛倒壑殞胔挂山僵踣掩澤藪為毛林隰為丹薄于是徹圍頓罔卷旆收鳶虞人數獸林衡計鮮論最犒勤息馬韜弦肴駟連鑣酒駕方軒千鍾電釂萬隧星繁陵阜霑流膏谿谷厭芳煙歡極樂殫迴節而旋此亦田遊之壯觀子豈能從我而為之乎公子曰余病未能也大夫曰楚之陽劍歐冶所營邪谿之鋋赤山之精銷踰羊頭鏷越鍛成乃鍊乃鑠萬辟千灌豐隆奮椎飛廉扇炭神器化成陽文陰縵既乃流綺星連浮彩豔發光如散電質如耀雪霜鍔水凝冰刃露潔形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟斷浮翮以為工絕重甲而稱利云爾而已哉若其靈寶則舒辟無方奇鋒異模形震薛燭光駭風胡價兼三鄉聲貴二都或馳名傾秦或夜飛去吳是以功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國橫制八戎爪牙景附函夏承風此蓋希世之神兵子豈能從我而服之乎公子曰余病未能也大夫曰天驥之駿逸態超越稟氣靈淵受精皎月眸瞷黑照玄采紺發沬如揮紅汗如振血秦青不能識其眾尺方堙不能覩其若滅爾乃巾雲軒踐朝霧越春衢整秋御虯踊螭騰麟超龍翥望山載奔視林載赴氣盛怒發星飛電駭志陵九州勢越四海影不及形塵不暇起浮箭未移再踐千里爾乃踰天垠越地隔過汗漫之所不遊躡章亥之所未迹陽烏為之頓羽夸父為之投策斯蓋天下之儁乘子豈能從我而御之乎公子曰余病未能也大夫曰大梁之黍瓊山之禾唐稷播其根農帝嘗其華爾乃六禽殊珍四膳異肴窮海之錯極陸之毛伊公爨鼎庖子揮刀味重九沸和兼勺藥晨鳧露鵠霜鵽黃雀圜案星亂方丈華錯封熊之蹯翰音之跖燕髀猩脣髦殘象白靈淵之龜萊黃之鮐丹穴之鷚玄豹之胎燀以秋橙酟以春梅接以商王之箸承以帝辛之杯范公之鱗出自九溪赬尾丹鰓紫翼青鬐爾乃命支離飛霜鍔紅肌綺散素膚雪落婁子之豪不能廁其細秋蟬之翼不足擬其薄繁肴既闋亦有寒羞商山之果漢皋之楱析龍眼之房剖椰子之殼芳旨萬選承意代奏乃有荊南烏程豫北竹葉浮蟻星沸飛華蓱椄玄石嘗其味儀氏進其法傾罍一朝可以流湎千日單醪投川可使三軍告捷斯人神之所歆羨觀聽之所煒曄也子豈能彊起而御之乎公子曰耽爽口之饌甘腊毒之味服腐腸之藥御亡國之器雖子大夫之所榮故亦吾人之所畏余病未能也大夫曰蓋有晉之融皇風也金華啟徵大人有作繼明代照配天光宅其基德也隆于姬公之處岐其垂仁也富乎有殷之在亳南箕之風不能畼其化離畢之雲無以豐其澤皇道昭煥帝載緝熙道氣以樂宣德以詩教清乎雲官之世治穆乎鳥紀之時王猷四塞函夏謐靜丹冥投鋒青徼釋警卻馬于糞車之轅銘德于昆吾之鼎群氓反素時文載郁耕父推畔魚豎讓陸樵夫恥危冠之飾輿臺笑短後之服六合時邕巍巍蕩蕩玄齠巷歌黃髮擊壤解羲皇之繩錯陶唐之象若乃華裔之夷流荒之貊語不傳于輶軒地不被于正朔莫不駿奔稽顙委質重譯于時昆蚑感惠無思不擾苑戲九尾之禽囿棲三足之鳥鳴鳳在林夥于黃帝之園有龍遊淵盈于孔甲之沼萬物烟熅天地交泰義懷靡內化感無外林無被褐山無韋帶皆象刻于百工兆發乎靈蔡搢紳濟濟軒冕藹藹功與造化爭流德與二儀比大言未終公子蹶然而興曰鄙夫固陋守此狂狷蓋理有毀之而爭寶之訟解言有怒之而齊王之疾痊向子誘我以聾耳之樂棲我以蔀家之屋田遊馳蕩利刃駿足既老氏之攸戒非吾人之所欲故靡得而應子至聞皇風載韙時聖道淳舉實為秋摛藻為春下有可封之人上有大哉之君余雖不敏請尋後塵文選晉書張協傳白鳩頌經仁緯義文選褚淵碑文注泰阿劍銘泰阿劍銘泰阿之劍世載其美淬以清波礪以越砥如玉斯曜若影在水不運自肅率土從軌藝文類聚六十初學記二十二御覽三百四十四文身刀銘寶刀既成窮理盡妙斂文波迴流光電照藝文類聚六十初學記二十二把刀銘奕奕名金昆吾遺璞裁為把刀利亞切玉時文斯偃含精內燭威助雖化武不可黷藝文類聚六十御覽三百四十六露拍刀銘露拍在服威靈遠振遵養時晦曜德崇信御覽三百四十六長鋏銘五才竝建金作明威長鋏陸離弭凶防違素刃霜厲溢景橫飛藝文類聚六十御覽三百四十六短鋏銘器用多品詭制殊觀亦有短鋏清暉載爛昔在先朝戢兵靜亂惟皇寶之優而弗玩藝文類聚六十御覽三百四十六手戟銘錟錟雄戟清金練綱名配越棘用過干將嚴鋒勁校摛鍔摧芒御覽三百五十三
