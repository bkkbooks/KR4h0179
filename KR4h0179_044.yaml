body:
  text: 唐彬臨雍州下教聘處士此州名都士人林藪處士皇甫申叔嚴舒龍姜茂時梁子遠等竝志節清妙履行高潔踐境望風虛心飢渴思加延致待以不臣之典幅巾相見論道而已豈以吏職屈染高規郡國備禮發遣以副於邑之望晉書唐彬傳上言宜定六宮娉使今選六宮娉以玉帛而舊使御府丞奉娉宣成嘉禮贄重使輕以為拜三夫人宜使卿九嬪使五官中郎將美人良人使謁者于典制為弘晉書魏舒傳與山濤書郤詵至孝中閒去郎正為母耳居喪毀瘁殆不自全其父喪在緱氏欲改葬不能自致故過時不葬後于家堂北假葬埏道通堂中不時閉服欲闋乃閉葬後經年乃見用作平輿監軍長史任意傷俗以葬不時閒常為舒口語其事灼然無所為疑通典一百三與衛瓘書凡以意相是非者不可輕以相貶也通典一百三奏議郊配博士祭酒劉喜等議帝王各尊其主所自出大晉禮郊天當以宣皇帝配地郊宣皇后配明堂以景皇帝文皇帝配博士宣兆議禮王者郊天以其祖配周公以后稷配天于南郊以文王配五精上帝于明堂經典無配地文魏以先始配不合禮制周配祭不及武王禮制有斷今晉郊天宜以宣皇帝配明堂宜以文皇帝配王昌前母服議禮重統所以正家猶國不可二君雖禮文殘缺大事可知昌父遇難與妻隔絶夫得更娶妻當更嫁此通理也今之不去此自執節之婦不為理所絶矣適可嘉異其意不得以私善羈縻已絶之夫議者以趙姬為比愚以為不同也重耳適齊志在必還五月之閒未為離絶衰納新寵于禮為廢嫡于義為棄舊姬氏固讓得禮之正是以春秋善之明不得竝也古無二嫡宜如溥駮通典八十九司馬李苞議閣道摩崖題名景元四年十二月十日蕩寇將軍浮亭侯譙國李苞字孝章將中軍兵石木工二千人始通此閣道碑本為魏帝禪晉策咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖德自茲厥後天又輯大命于漢火德既衰乃眷命我高祖方軌虞夏四代之明顯我不敢知惟王乃祖乃父服膺明哲輔亮我皇家勳德光于四海格爾上下神祇罔不克順地平天成萬邦以乂應受上帝之命協皇極之中肆豫一人祗承天序以敬授爾位曆數實在爾躬允執其中天祿永終於戲王其欽順天命率循訓典底綏四國用保天休無替我二皇之弘烈晉書武帝紀案御覽二百二十引晉陽秋曰朱整少有名行官至中書監魏禪晉使整與中書令劉良共為詔若然禪策亦必此二人所撰今編入朱整文議王娶妃公主嫁禮案魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以穀璧諸侯加以大璋漢高后制聘后黃金二百斤馬十二匹夫人金五十斤馬四匹魏聘后王娶妃公主嫁之禮用絹百九十匹晉興故事用絹三百匹宋書禮志一已出女不從坐議夫司寇作典建三等之制甫侯修刑通輕重之法叔世多變秦立重辟漢因循之大魏承秦漢之弊未及革制所以大逆之誅追戮已出之女不差者誠欲殄絶醜類之族也然而法貴得中刑慎過制臣以為女人有三從之義無自專之道出適他族還喪父母降其服紀所以明外成之節異在室之恩而父母有罪則追刑已出之女夫黨見誅又有隨異姓之戮一人之身內外受辟今女既嫁則為異姓之妻如或産育則為他族之母此為元惡之所輕忽戮無辜之所重于防則不足懲奸亂之源于情則傷孝子之心且男不得罪于他族而女獨嬰戮于二門非所以哀矜女弱蠲明法制之本分也臣以為在室之女可從父母之誅既醮之婦使從夫家之罰宜改舊科以為永制魏志何夔傳注引干寶晉紀又晉書刑法志藝文類聚五十四又通典一百六十三案晉志云魏法犯大逆者誅及已出之女毋丘儉之誅其子甸妻荀氏應坐死其族兄顗與景帝姻通表魏帝以丐其命詔聽離婚荀氏所生女芝為潁川太守劉子元妻亦坐死以懷妊繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖芝命曾哀之使主簿程咸上議王昌前母服議諸侯無更娶致夫人之制大夫妻死改室不拘立嫡昌父前妻守德約身幸值聞通而固絶之此禮不勝情而漸入干薄也昌母後聘本非庶賤橫加抑黜復不然矣若令二母之子交相為報則竝尊兩嫡禮之大禁昔舜不告而娶婚禮蓋闕傳記以二妃夫人稱之明不足立正后也聖人之弘猶權事而變而諸儒欲聽立兩嫡竝未前聞且趙姬讓叔隗以為內子黃昌之告新妻使避正堂皆欲以正家統而分嫡妾也昌父已亡無正之者若追服前母則自黜其親交相為報則固非嫡就使未達追為之服猶宜刑貶以匡失謬況可報楙施行正為通例則兩嫡之禮始于今矣開爭長亂不可以訓臣以為昌等當各服其母者通典八十九案王昌事詳前竟陵王楙文華林園詩序平原后三月三日從華林園作壇宣宮張朱幕有詔乃延群臣北堂書鈔一百三十二舊寫本如此訛脫無從校正平原邑三月三日從華林園作壇建仙宮張朱幕詔延群臣作詩以頌之書鈔陳禹謨本如此蓋臆改功臣配享議案魏功臣配食之禮敘六功之勳祭陳五祀之品或祀之于一代或傳之于百代蓋社稷五祀所謂傳之于百代者古之王臣有明德大功若句龍之能平水土柱之能植百穀則祀社稷異代不廢也昔湯既勝夏欲遷其社不可乃遷稷而周棄德可代柱而句龍莫廢也若四敘之屬分主五方則祀為貴神傳之異代載之春秋非此之類則雖明如咎繇勳如伊尹功如呂尚各于當代祀之不祭于異代也然則伊尹于殷雖有王功之茂不配食于周之清廟矣今之功臣論其勳績比咎繇伊尹呂尚猶或未及凡云配食各配食于主也今主遷廟臣宜從饗通典五十答問禮俗云正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人北齊書魏收傳魏帝宴百僚問何故名人日皆莫能知收對曰晉議郎董勛答問禮云云議渤海王服范太妃事喪服云君為女子子嫁于國君者傳曰尊同則得服其親服然則君之庶子有封為君者其公亦不降之明矣士之妾子不降母者以其與父貴賤不足殊也然則尊與父同不見厭者亦宜伸其情盡禮于其母渤海王既不承安平之祀而母已受王命之寵成太妃之號愚謂太妃之尊但當自降于渤海不得配食于安平之廟耳至于浡海三王自宜盡為母之制不復厭于安平以從公子降等之禮通典八十二安平王嗣孫服議諸侯體國嗣孫至重欲其胤嗣早繼者文王之為世子在于王季之時亦猶凡諸侯之世子耳而十五便生武王推此而言則禮許世子以早冠禮男子冠而不為殤既冠婚姻不復得以殤服服之謂以為嗣孫年已十八備禮冠娶當從成人之例通典九十一安平王嗣孫薨諸侯應降服議禮父在斯為子君在斯為臣安平嗣孫雖已誓于天子據在臣子之位五服之差君臣殊制其閒豈復容他禮哉君薨未踰年而世子卒者猶稱子而名不成君春秋之正義也苟不成君則群臣親戚必不得服其重服明矣況安平王見在而使諸王服嗣孫以諸侯之禮未之敢安也然諸侯以尊絶周今嗣孫見在臣子之例諸王公宜從尊降之禮不應為制服也昔秦滅五等更封列侯以存舊制稱列侯者若云列國之侯也故策命稱國終沒稱薨漢魏相承未之或改大晉又建五等憲章舊物雖國有大小輕重不侔通同大體其義一也故詔書亭侯以上與王公同又以為列侯以上策命建國者皆宜依古諸侯使絶周服通典九十三三公降服議三公爵命雖尊班重諸侯據在王朝上厭天子有由而屈義不得伸耳以例言之宜依卿大夫降之服通典九十三駮薛靖朝日論禮記云祭日于東祭月于西以端其位周禮秋分夕月竝行于上世西向拜月雖如背實亦猶月在天而祭之于坎不復言背月也猶如天子東西游幸其堂之官及拜官猶北向朝拜寧得背實為疑南齊書禮志上何佟之議引又見通典四十四答崇氏問舊君服崇氏問曰齊縗三月大夫在外其妻長子為舊君大夫去適他國便為其所適國君服于本國絶矣妻從夫當為後君服舊寧以為人乎以為宜與長子未去者同耳淳于睿答若妻未去自若人也不為舊君也通典九十崇氏問淳于睿曰凡大夫待放于郊三月君賜環則還賜玦則去不知此服已賜環玦未答曰其待郊已三月未得環玦未適異國而君掃其宗廟故服齊衰三月通典九十答崇氏問殤制哭崇氏問云舊以日易月謂生一月哭之一日又學者云以日易月者易服之月殤之周親者則以十三日為之制二義不同何以正之淳于睿答云案傳之發正于周年之親而見服之殤者以周親之重雖未成殤應有哭日之差大功以下及于緦麻未成殤者無復哭日也何以明之案長殤中殤俱在大功下殤小功無服之殤無容有在緦麻以其幼稚不在服章隨月多少而制哭日也大功之長殤俱在小功下殤緦麻無服之殤則已遏絶無復服名不應制哭故傳據周親以明之且緦麻之長殤服名已絶不應制哭豈有生三月而更制哭乎通典九十一答滿瑋問衛尉昌邑侯滿瑋問淳于睿曰庶妹亡有服不睿曰喪服諸侯以尊降不服通典九十三答石包問嫁母服石包問淳于睿曰聞嫁繼親凶諱便制服議者所難以為父後者不為出母服嫁母猶出母也或者以為嫁與見出者異不達禮意雖執從重之義而以廢祭見譏君為詳正也睿答曰案禮檀弓子思之母死于衛柳若謂子思曰子聖人之後也四方于子乎觀禮子盍慎諸子思曰吾何慎哉喪之之禮如子云子聖人之後即父後也如此經文父卒為繼母嫁者服而已聖人之後為父後者服嫁母也二者分明無可嫌通典九十四答淳于纂問生不及祖父母不稅服淳于纂問淳于睿云案小記生不及祖父母諸父昆弟而父稅喪已則否注云不及此親存時歸見之于喪服年月已過乃聞之父服已則否者不責非時之恩于人所不能也纂省此注良謂賢聖失之甚矣據降而緦小功者稅之蓋正親而重骨肉也今父在則祖周父亡則三年此非重與若但以不見則割其正親之本愛而忍惻怛之痛使與諸父昆弟同制此其可乎尊祖之尊于是疏矣又禮為慈母之父母無服亦云恩不能及恩不及者慈母之父母則可也今以他故生不見祖而以為非時之恩意實不厭睿答曰賢聖及先儒初無疑怪此者以其緣人情而怒之降在小功不稅自正也非不相識者也聽當依就莫不厭也禮記明文先師之議可信者也不信聖賢而欲意斷直而勿有正防此輩周三年者傳重焉故也而不識見何所傳乎何所重乎通典九十八同母異父昆弟服游夏文學之俊也游習于禮曰大功夏廣學者曰齊縗二者推之明非無服緦可知也繼父無親立廟祭祀尚為之周以比夫同胞豈有絶道而欲絶之謂其無親據繼父同居異居有輕重同母昆弟蓋亦宜矣異居大功同居有相長養之恩服齊縗似近人情矣通典九十一晉淳于睿云昌邑侯滿瑋庶妹服議天子諸侯誠不應服又大夫降緦尊與已敵則不敢降旁親降一等緦麻絶也凡以尊所而降不服著弔服加緦之絰帶而往哭之通典九十三孫為祖持重論使嫡孫傳重不服斬也夫服以三年為至重故以至尊至親者處之自此以往上下降殺一等經之例也服父三年服祖宜周而傳云父卒為祖後者服斬為嫡孫者依此為制若其必然越于常例後祖服異禮之重事宜見斬縗之經不應闕而不記也且子為父三年父為長子亦三年若嫡孫為祖如子則祖為嫡孫亦當如父為長子不得為之周也通典八十八難武申奏為出母服喪服傳曰出妻之子為父後者為出母無服與尊者為體不敢服其私親也經為繼父服者亦父後者也為父後服繼父服則自服其母可知也出母之與嫁母俱絶族今為嫁母服不為出母服其不然乎經證若斯其謬耳通典九十四虞濬等周喪嫁娶議今之拜時事畢便歸婚禮未成不得與娶婦者同也俊琛稜竝以齊縗娶婦娶妻所犯者重恆雖無服當不議而不諍亦禮所譏然其所犯者猶輕于稜也湛身既平吉子雖齊縗義服之末又不親迎則所犯者輕濬暨為子拜時禮輕當降也通典六十答或問異姓為後之子服本親或問以異姓為後然當還服本親及其子當又從其父而服邪將以異姓而不服也答曰神不歆非族明非異姓所應祭也雖世人無後竝取異姓以自繼然本親之服骨血之恩無絶道也異姓之義可同于女子出適還服本親皆降一等至于其子應從服者亦當同于女子之子從于母而服其外親今出為異姓作後其子亦當從于父母服之也父為所生父母周子宜如外祖父母之加也其昆弟之子父雖服之大功于子尤無尊可加及其姊妹父為小功則子皆宜降于異姓之服不得過緦麻也通典六十九答劉寶議案禮貴嫡重正統所尊祖禰繼之代正也夫受重者不得以輕服服是以孫及曾玄其為後者皆服三年受重故也且絶屬之宗來為人後者服之如今嫡孫為後而欲使為祖服周與衆孫無異既非受重之義豈合聖人稱情之制邪且孫為祖正服周祖為孫正服九月嫡孫為後則祖為加服周孫亦當加祖三年此經之明據也今欲使祖以嫡加孫孫以庶服報祖豈經意邪又欲使絶屬之孫同于嫡孫豈合人情通典八十八難成洽孫為祖持重論凡為人後者尚如父今孫為祖後而欲使為祖周與衆孫無異是豈為後之謂乎且祖為孫正服九月今嫡孫為後祖加之周孫亦加祖三年經之明義也今使祖加孫服而孫不加祖服豈經義哉且經云臣為君祖父母服周從服例降一等則君為祖服斬矣此非經義邪何竟闕而不記也論又云孫為祖如子為父則祖為孫亦當如父為長子者且孫為後加一等服三年祖亦加孫一等服周如論之意欲使祖加孫二等而孫加祖一等此豈經例而云傳不通乎通典八十八答成洽難武申奏為出母服出母無服此由尊父之命嫁母父不命出何得同出母乎為繼父服者為其父沒年幼隨母再適已無大功之親與繼父同財共居為築宮廟四時祭祀其先此恩由繼父所以為服耳且妾之無子妾子之無母父命為母子則生事之如母喪則服之三年貴父命也而今欲以出母同于嫁母違廢父命豈人子所行又引繼父云經繆也又出母之黨無服嫁母之黨自應服之豈可復同乎通典九十四駮劉表成粲論父母亡在祖後不為祖母三年嘗見表所作喪服後定變除為婦人之服不踰男子孫為祖父服周父亡之後為祖母服而云不得踰祖也又見成侍中云以為已自受重于祖祖母服不應三年商案假使子為人後為本父服周而所後者更自有子已則還家而母後亡當可以不得踰父不三年乎又從祖祖父先亡已為小功五月而已後為從父後從父又先亡祖母後卒可復以已先為祖父小功今為祖母不踰祖父復服五月乎諸如此比婦服重于夫甚衆不可具記不得踰夫之說經傳無據嫡行庶服義又不通粲又云已自受重于父不受重于祖今服祖母亦當周又齊縗章臣為君之父母祖父母周凡臣從君所服而降一等臣從服周則君為三年也據為國君而有父若祖之喪者謂始封君也其繼體則父與祖竝有廢疾不立者也有廢疾不立則君受國于曾祖不受國于祖也不受國于祖猶服三年此則經之明例非從傳記之說也其義如此則凡為後者皆應三年何必受重然後服斬通典九十七禋祀六宗說禋之言煙也二祭皆積柴而實牲體焉以升煙而報陽非祭宗廟之名也鄭所以不從諸儒之說者將欲據周禮禋祀皆天神也日月星辰司中司命風師雨師凡八而日月并從郊故其餘為六宗也以書禋于六宗與周禮事相符故據以為說也且文昌雖有大體而星名異其日不同故隨事祭之而言文昌七星不得偏祭其弟四弟五此為周禮復不知文昌之體而又妄引為司中司命箕畢二星既不係于辰且同是隨事而祭之例又無嫌于所係者續漢祭祀志中注
