body:
  text: 陸善長鳴雞賦美南雞之殊偉察五色色之異形何伺晨之早發抗長音之逸聲藝文類聚九十一嘉遁賦有嘉遁之玄人含貞光之凱邁靡薜荔于苑柳蔭翠葉之雲蓋揮修綸于泂瀾臨崢嶸而式墜淅清風以長嘯詠九韶而忘味若乃御有撫生應物宅心曜華春圃凋葉秋林振藻揚波清景玄陰形猶與以徒靡神曠寂而難尋渾無名于域外和丘中以草音于是混心齊物遨翔容與薄言采薇收蘿中野朝觀夷陸夕步蘭渚仰弋鳴雁俯釣魴鱮無方之內居無形之域詠休遁之貞亨察天心而觀復委性命于玄芒任吉凶而靡録藝文類聚三十六釣魚賦然後抽纖繳振修竿垂銀鉤運金丸懸鮪鯢挂鴻鸞連翩雲際瀺灂漪瀾藝文類聚九十六李秀並序四維賦並序四維戲者衛尉摯侯所造也畫紙為局截木為棊取象元一分而為二準陰陽之位擬剛柔之策而變動云為成乎其中世有哲人黃中通理探賾索隱開物建始造四維之妙戲邈衆藝之特奇盡盈尺之局乃擬象乎兩儀立太極之正統班五常之列位剛柔異而作配趨舍同而從類或盤紆詰屈連延駱驛驛或間不容息舍棊則獲圍成未合驕棊先出九道並列專都獨畢藝文類聚七十四御覽七百五十五寵郎賦坐上諸君子各各明君耳聽我作文章説此河南事初學記十九引劉謐之龐郎賦其頭也則中骼而上下鋭額平而承枕四起初學記十九引龐郎賦又御覽三百八十二引寵郎賦迷賦寵郎居山中稀行出朝市暫來到豫章因便造人士東西二城門赫赫奕正相似向風徑東征直去不轉耳御覽四百九十下也賦頭戴鹿心帽足著狗皮靴面傅黃灰澤髻插蕪菁花男女四五人皆如燒蝦蟆御覽六百八十七與天公箋昔申酉之際湯旱流煙今子亥之歲值堯水滔天火延燒其廬水突壞其園何小人兮頓偷雙船由是行無擔石室如懸磬御覽七百七十又八百二十四體戰身噤脫衣凍坐賴詹公借袍南城送火藝文類聚六十七御覽六百九十三在于建寧之邑始得數年相助方欲教奴學耕使奷執杼初學記十九拜時婦奔喪議夫拜時出本末代或恐歲有忌而吉日不辰有此變禮既無文于古及其損益故當使今之情制不失古之義旨亦宜以前事之得中者為後事之元龜輒尋今人拜時壻身發蒙交拜者往往長迎而盡婦人之禮案記婦至壻揖婦以人共牢而食夙興沐浴質明贊見婦于舅姑則與拜而長迎然後婦禮乃備者不相依準至于三月廟見鄭玄云以舅姑沒者耳若以三日擬三月施之二親沒則可若其親尚存豈容借言乃以衆人所行失禮之事反議許長迎而為非則是賤于準禮而貴于衆失可得然乎又記云娶女有吉日而死壻以縗而弔葬而除夫死亦然又在塗之女而夫父母沒布深衣以赴喪又記云女未廟見而死雖不祔于王姑而壻不杖歸葬于女氏示未成婦鄭玄云雖不備喪禮猶為服齊衰依準古義無不赴哀之文若苟以今失為是而以古禮先儒為非人則末如之何夫拜時雖非古既女交拜亦敬慎重正但未見婦于姑然夫妻之分定矣若謂猶非定則女子可冒絳紗使他丈夫發而相見拜以為壻輒可委去女子之分固若是乎夫稱妻者係夫之言稱婦者有姑舅之辭凡娶妻誠盡婦禮所以事其所生而代中有三日日行敬或上堂見姑又設有甲乙二親不存娶妻雖已三日無可致敬又未蒸嘗則與拜寺未敬舅姑事殊而理同豈聞今人以為非妻乎由斯而言迎婦人家發蒙交拜夫妻之禮定致敬舅姑為婦之禮畢以明婦順耳情禮不相背故可推情以言禮凡人有喪猶或悽愴已入夫門而不恤其哀乎若謂與古禮相準而合情者夫家尚中祥祥日可赴哀赴哀而情敬伸矣通典九十九又書庾揚州以拜舅姑擬之廟見同先配而後祖尋陳針子之譏鄭忽是不為夫婦誣其祖矣鄭云配謂同牢食而後祭無其敬神心故曰誣其祖未三月而祭非禮也又記曰婦共牢食沐浴俟明乃見舅姑以明婦順今當思禮傳所以同異而謬以拜時為先配後祖未是尋書之意也且代人三日先配及同牢行禮不以為嫌又今人拜時皆未施敬舅姑誠準婚已交禮未及三日故也設有婚未三日而夫有大喪必盡哀而婦義已成矣既以拜時準婚未三月則是俱已入門交禮同未致敬舅姑情義赴哭之例不得云異通典九十九寡叔母歸宗未嫁暴亡服議晉有問曰甲叔母乙寡守節十餘年其母在兄壬迎乙還家景求婚于壬壬意許定已剋吉日而乙暴亡甲應有服否裴主簿議凡秉節遂志義不二醮者固必杜漸慮始專于夫家何得假迹晨昏以之媒幣余以為景壬交幣之辰則甲乙義絶之日通典九十九駁裴主簿議乙喪夫無子勵操十載心期同穴志固金石雖潛交媒幣而乙不與知苟聘至之非我則無愧于幽明矣昔宋姬守志梁寡高行焚身毀形焉知景至之時乙無若人之潔疑必從重重則宜服豫固以為不應絶也通典九十九答顧氏問顧氏問王虞云從外弟婦亡未葬今服訖又無子其夫便是喪主當時除服否答曰禮云主喪者不除其文不別喪之輕重須俟葬訖不知世人有妻喪用此禮否通典一百三日燭原夫至道之典畼生死之源標善惡之報啓陵化之津訓戒明白縷羅備矣然信言不美交繁辭宕纍冥絶昧重淵隔浪是以學者未得其門或未之留意聊抒咸池之遠音適為里巷之近曲假小通大儻可接俗助天揚光號曰日燭陶先覺之宏誥啓玄管于靈門周大虛以遊眺究漭蕩而無垠履地勢于方局冠圓天于覆盆緬三界之寥廓遘二氣之氤氳尋大造之冥本測化育之幽根形假四大而泡散神妙萬物而常存彼良民之達分故哀生而怡魂夫含氣之倫其神無方蠢爾之類其質無常寄若水勢託若火光隨行繾綣迭枯迭芳往來出沒冥冥茫茫洪海環流大變輪回乘彼遠漂濟來曷階宛轉三塗之中沈滯八難之圍愍企竅之無期悼客作之有歸瞻崇德之可速鑒聚凶之宜遲斯成務之易覩匪先見之動微五福起于履是六極構于蹈非理感自然冥對玄凝福兮誰造禍兮孰興水運鍾卑人道惡矜舋因豐積祉緑謙升童孺正而鬼退丈夫邪而魅陵覽形聲之兩偶考休咎之雙徵理投思而合契迹望目而相應若圓輪之抱規猶直桷之附繩蒼犬出于帝父黃能資于聖子聿徵化而不救奚天屬之云恃諒求福之在躬信為仁之在已咨吹吸其靡常知忽往其何止彼非人之什岌豈無氣之所始悲婉孌之夭徂還託生于家豕昔鞠育而懷抱今屠刳以為禮神居妙而恆我形受變而易體未一旬而相忘可長歎而流涕夫闡愚其皆然匪伊人之獨爾察寡孕于嘉類悟繁産于蟲豸喻零霖其猶希若幡囊之倒米為囂囂以日日誰識伏而達倚匪休情之能測謬聞之以如是若夫倒置之族曚曚徒生兵風既至忽然潛征神道雖昧鬼法尤明徘徊中陰徂彼鐵城宵絶望舒晝無曜靈身造笮萼之檻足蹈炎炭之庭刀嶽霜鋩以積刃創林翹鋒而肅精陶銅汪洋以海涌巨鑊波沸而雷鳴閻王領閲卒傍執叉三扐一奮八千纍羅鴆鴆利嘴煌煌火車鋭釘欃槍狡狗擬牙淫徒燋于幻柱飢囚枯于塵沙資輕妙之靈質益痛戮之易加永煩冤以彌劫安斯酷之可過三六峻網弗可裂縷千條殊劇萬端異苦靡喘息而不經俄聿來而忘宇豫略一朝以言之將終年而震楚爰有五德無玷十淑道全夕惕苦逝慶升九天寶殿晃昱高構虛懸瓊房兼百瑤戶摩千金門煥水精之朗玉巷耀琉璃之鮮珠樹列于路側鷥鳳鳴于條間芳華神秀而粲藻香風靈飄而飛煙想衣斐舋以被軀念食芬芳以盈前彼曦和之長邁永一日而萬年無事為以干性常從容于自然映光蕊之爍爍眇輕騰之翩翩究妙音之至樂窮有生之遐延捨陋世而上躋伴超倫之高遷然夫饗茲舊德日用玉食厥土不毛罔施稼穡積畜雖多焉有不竭齡祚雖修終焉歸滅三災起而宮宇散七證至而天祿絶會大秋以考落混椿菌之無別是以如來大聖三達洞照哀我困蒙曉了道要善權灑落或粗或妙如溟海之運流若天日之垂曜上士虛懷忘其言中才負志執其教教無定方適物所由宜陸以車應水以舟敷設云云廣衍悠悠駉未乎三百要指在乎一幽握纍玄之綱領遣毛圠于網裘宏籠大訓展我智分治無不均質有利鈍虛往實歸各足方寸愚黠並誘龍鬼俱化萬塗叢歸一由般若譬彼濟海非船莫過驅萬動于道場畢無為而息駕本夫三乘之始同歸一無才照各異致用參殊應真忘有而求空遂耽而恬愈緑覺亮纍于知徵爰遷玄而弗居雖妙迹其再喪猶有遣而未虛開士解拘于都盡戶無存其焉除悟之豁于鑒先體之冥乎意初理重深而絶韻疇剋諒而業諸自古在昔先民有遇堂堂蔭映躬受聖喻喁喁群黎耳目仰注或發蒙于一咳或革面于一哺並因言而陵化未有人而不度善逝迄今道運轉衰大教雖存味之者希栴檀與蓼蘇同芬夜光與熠耀齊暉于氏超世綜體玄指嘉遁山澤仁感虎兕護公澄寂道德淵美微吟穹谷枯泉漱水闕叟登霄衛度係軌咸淡泊于無生俱脫骸而不死今則支子特秀領握玄標大業沖粹神風清蕭一言發則蘊滯披三幡著則重冥昭見之足以洗鄙吝聞之可以落矜驕孫濯流以逸契詠遂初于東皋何深味以棲素輕大寶于秋毫道風之所扇蕩深達之所逍遙才不難則賢不貴愚不笑則聖不高遠聲見陋于近耳孰能忘味于聞韶哉奚適非道何之無神理有精粗物有産真大居細君小為碩臣羽隸隸乎金翅甲屬屬乎須倫兩儀宗于太極衆星繫于北辰是以九十六種枝條繁張輕道重根躁廢靜王具曰豫聖各鎮一方或移山而住流或倏忽于存亡命天衣之彩粲嘯靈廚之芬芳曜叔振旅之凶化恭化礫石之琳琅竭變幻之崛奇惜有待之無長斯乃數內之甘醇弗如至道之糟粳者也逮乎列仙之流練形之匹熊經鳥伸呼吸太一夕餐榆陰與素月朝挹陽霞與朱日赤斧長生于服丹涓子翻飛于餌朮安期久視于松豪豐人輕舉于柏實彼和液之所染足支年而住質中不夷而外猗徙登雲而殞卒俱括囊以堅卵固同門而共出理未升于顏堂永封望乎札室貴乎能飛則蛾蝶高翬奇乎難老則龜蛇修考伊逆旅之遊氛唯心玄之可寶存形者不足與論神狎俗者末可與這道道乎奚言無問無對咨者叩窮應者負內默之斯通語焉則匱當于素珠與講道吾成罔象與無謂杌然寂泊玄酬有針宗鑽浮響莫悟冥音希之彌錯搜之愈沈郢人其逝為誰匠椹設筌蹄乎淵薈俟魚免乎川林倘得意于談表昔目擊而廢心無運睒倏往矣斯復忍立賢達忽如涉宿千師誕化肇過一六慈氏方隆仰期仁育孰云數遼瞥若瞬目靈轡雖迅緣樞靡窮彼無本標我有始終假步炯電之末託息石飆之中知畏塗而驚寇迷塵欲之致戎替遠勝而婪近謂奢儉而驕豐不防枯于未飄既零落于徑風思反蒂而更秀結萬悔其胡充是以大誓之徒燒指穿石冥期無待志與心歡峻智塹崇慧壁拔津劍揮戒戟想將萌而夷斬情向兆而翦刺掃六賊于胸中休五道之長役拱己內治總持法忍三世都寂一心豁盡寄耳無明寓目莫準塵墮空落穢與虛隕廓焉靈悟因權作尹普濟安度大悲誰愍託蘧廬以和光常遊君乎冥泯任天行與物化如蹈水之無軫若乃妙變神奇理不思議大千舞于指掌芥子含于須彌四海宅于毛孔七寶永于劫移可信而不可尋可由而不可知非詠之所宣惡毫素能披善乎優陀之言也使夫智者滿于天下人有百頭頭有百舌舌解百義辨才鋒逸合茲人以讚道猶萬分而未一雖覺覺之相歎乃敷畼而彰悉矧愚昧之固陋託狂簡而仰述抗螢燭之炯炯欲增暉以毗日者歟嗟乎方外靈藏奢遐誕宕衆妙淵玄群奧無量小成弗藉大言橫喪川德之厚于何不有驚聽洪壑駭耳崇阜夏典載其掌握荒經列其戶牖周既達而未盡信齊諧之小醜見鵬鯤而標大不覩鳥王與魚母吁乎噫嘻奇桀之事積籍眇漫焉可稱記伊皇覽之普綜足採幽而體異何近願于割玉又碩誣乎火熾況下斯而束教趣堯孔之權餌常專專而守檢懼越蹈于所伺並廢理以證言莫觸類以取意徒宏博而繁構更益猜而致忌悟飾智之愕物故收翰而輟思寄一隅于梗指俟體信于明識者乎弘明集十三薩陀波崙讚密哉達人功立曩葉龍潛九澤文明未接運通其會神疏其轍感夢魂交啓茲聖哲薩陀波崙入山求法讚激響窮山憤發幽誠流音在耳欣躍晨征奉命宵遊百慮同冥叩心在誓化乃降靈薩陀波崙始悟欲供養大師讚歸塗將啓靈關再闢神功難圖待損而益信道忘形歡不期適非伊哲人孰採元策曇無竭菩薩讚亹亹淵匠道元數盡譬彼大壑百川俱引涯不俟津塗無旋軫三流開源不焉同泯諸佛讚妙哉正覺體神以無動不際有靜不鄰虛化而非變象而非摹映彼真性鏡此群粗廣弘明集三十九書十二月十三日嘉頓首頓首歲有感懷深寒切想各平安僕榮斃遣不具沈嘉頓首頓首淳化閣帖三七月草四日循遮頓首秋月感思深得近示為慰餘熱比復可不僕疾患故爾不平復頓勿力書不盡王循遮頓首淳化閣帖三褚遂良羲之書目有阿遮帖當是人名此計江東精兵不可卒得唯當善養見者而事慮日多如比來憂懷實已萬端淳化閣帖三瓌之頓首頓首末陽遠感閏知有患耿耿知以自屈恨不相見力及示比望瓌之淳化闊帖三晉安素自強壯且年時尚可當延遐期豈謂奄至于此自畢遠近二三惋愕不能已已未欲旨問悲酸悒悒想不久可得還耳執筆惻感淳化閣帖三
