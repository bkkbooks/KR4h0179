body:
  text: 西陽王羕上書朱旗南指自相夷戮文選丘遲與陳伯之書注引虞預晉書議溫矯不應辭職太宰西陽王羕司徒臨潁公組驃騎將軍即丘子導侍中紀瞻尚書周顗散騎常侍荀邃等議以昔伍員挾弓去楚為吳行人以謀楚誠志在報讎不苟滅身也溫嶠遭難昔在河朔日尋干戈志刷讎惡萬里投身歸赴朝廷將欲因時竭力憑賴王威以展其情此乃僑之志也無緣道路未通師旅未進而更中辭王事留志家巷也以為誠宜如明詔晉書禮志中案溫嶠傳有三公八坐議與此意同而文全異今以彼篇入闕名類矯詔免太宰汝南王亮太保衛瓘二公潛謀欲危社稷今免還第官屬以下一無所問若不奉詔便軍法從事能率所領先出降者封侯受賞朕不食言晉書楚王瑋傳手令告諸軍天禍晉室凶亂相仍間者楊駿之難實賴諸君剋平禍亂而二公潛圖不軌欲廢陛下以絕武帝之祀今輒奉詔免二公官吾今受詔都督中外諸軍諸在直衛者皆嚴加警備其在外營便相率領徑詣行府助順討逆天所福也懸賞開封以待忠效皇天后土實聞此言晉書楚王瑋傳出令斬汝南王亮能斬亮者賞布千匹晉書汝南王亮傳被收時上表陛下篤睦委臣朝事臣小心忠孝神祇所鑒諸王承謬率眾見責朝臣無正各慮私圖收臣別省送臣幽宮臣不惜軀命但念大晉衰微枝黨欲盡陛下孤危若臣死國寍亦家之利但恐快凶人之志無益於陛下耳晉書長沙王乂傳致成都王穎書先帝應乾撫運統攝四海勤身若己克成帝業六合清泰慶流子孫孫秀作逆反易天常卿興義眾還復帝位齊王恃功肆行非法上無宰相之心下無忠臣之行遂其讒惡離逖骨肉主上怨傷尋己蕩除吾之與卿友于十人同產皇室受封外都各不能闡敷王教經濟遠略今卿復與太尉共起大眾阻兵百萬重圍宮城群臣同忿聊即命將示宣國威未擬摧殄自投溝澗蕩平山谷死者日萬酷痛無罪豈國恩之不慈則用刑之有常卿所遣陸機不樂受卿節鉞將其所領私通國家想來逆者當前行一尺卻行一丈卿宜還鎮以寍四海今宗族無羞子孫之福也如其不然念骨肉分裂之痛故復遣書晉書長沙王乂傳復長沙王乂書文景受圖武王乘運庶幾堯舜共康政道恩隆洪業本枝百世豈期骨肉豫禍后族專權楊賈縱毒齊趙內篡幸以誅夷而未靜息每憂王室心悸肝爛羊玄之皇甫商等恃寵作禍能不興慨於是征西羽檄四海雲應本謂仁兄同其所懷便當內擒商等收級遠送如何迷惑自為戎首上矯君詔下離愛弟推移輦轂妄動兵威還任豺狼棄戮親善行惡求福如何自勉前遣陸機董督節鉞雖黃橋之退而溫南收勝一彼一此未足增慶也今武士百萬良將銳猛要當與兄整頓海內若能從太尉之命斬商等首投戈退讓自求多福穎亦自歸鄴都與兄同之奉覽來告緬然慷慨慎哉大兄深思進退也晉書長沙王乂傳荅郎中令陸雲令五首令吾以頑弱過蒙殊寵夙夜祗懼忝思先恩承風誡以自錯厲得爾委曲省以憮然意既在儉約又欲奉遵法憲豈忘於心國自宜有宅城內求不可得官徒右軍來蹀覆此屋恐或不可久得側近宮掖故於國作宅不作觀望使如凡家法足止而已耳平量畫圖當往相示動靜以聞陸雲集國起西園第表啟宜遵節儉之制王令令中間表作舍先畫圖呈啟間數又五木林榑無他鏤飾示無乃越法奢靡古今無匹也間外啟作小樓北望河東公主園宅自不為觀故便聽之耳今行者歎息致朝野之譏邪省奏具意敕毀之陸雲集西園第既成有司啟觀疏諫不可王令令多喪故乃初未與群官會同比當請師友文學內外官屬也陸雲集王即位未見賓客群臣又未講啟宜饗宴通客及引師友文學觀書問道王令令多病疾難以辭公事為自力風疾連動故未能用小差當如所陳乞每識忠至之誠輒以存心同上令多不快不數朝覲幸恩詔見恕耳五日當入朝也陸雲集輿駕比出啟宜當入朝王令遺王妃書鄙雖頑愚心念為善欲盡忠孝之節無有惡逆之心雖非中宮所生奉事有如親母自為太子以來敕見禁檢不得見母自宜城君亡不見存恤恆在空室中坐去年十二月道文疾病困篤父子之情實相憐愍於時表國家乞加徽號不見聽許疾病既篤為之求請恩福無有惡心自道文病中宮三遣左右來視云天教呼汝到二十八日暮有短函來題言東宮發疏云言天教欲見汝即便作表求入二十九日早入見國家須臾遣至中宮中宮左右陳舞見語中宮旦來吐不快使住空屋中坐須臾中宮遣陳舞見語聞汝表陛下為道文乞王不得王是成國耳中宮遙呼陳舞昨天教與太子酒棗便持三升酒大盤棘來見與使飲酒噉棗盡鄙素不飲酒既便遣舞啟說不堪三升之意中宮遙呼曰汝常陛下前持酒可喜何以不飲天與汝酒當使道文差也便荅中宮陛下會同一日見賜故不敢辭通日不飲三升酒也且實未食恐不堪又未見殿下飲此或至顛倒陳舞復傳語曰不孝那天與汝酒飲不肯飲中有惡物耶遂可飲二升餘有一升求持還東宮飲盡逼迫不得已更飲一升飲已體中荒迷不復自覺須臾有一小婢持封箱來云詔使寫此文書鄙便驚起視之有一白紙一青紙催促云陛下停待又小婢承福持筆硯墨黃紙來使寫急疾不容復視實不覺紙上語輕重父母至親實不相疑事理如此實為見誣想眾人見明也晉書愍懷太子傳以司馬休之為荊州刺史令前龍驤將軍休之才榦貞審功業既成歷陽之戰事在機捷及至勢乖力屈奉身出奔猶鳩集義徒崎嶇險阻既應親賢之舉宜委分陝之重可監荊益梁寍秦雍六州軍事領護南蠻校尉荊州刺史假節晉書宗室譙王傳追贈會稽王道子為丞相元顯為太尉令故太傅公阿衡二世契闊皇家親賢之重地無與二驃騎大將軍內總朝維外宣威略志蕩世難以寍國祚天未靜亂禍酷備鍾悲動區宇痛貫人鬼感惟永往心情崩隕今皇祚反正幽顯式敘宜崇明國體以述舊典便可追崇太傅為丞相加殊禮一依安平獻王故事追贈驃騎為太尉加羽葆鼓吹丞相墳塋翳然飄薄非所須南道清通便奉迎神柩太尉宜便遷改可下太史詳吉日定宅兆晉書簡文三王會稽王道子傳以梁王珍之為通直散騎郎令梁王珍之理悟貞立蒙險違難撫義懷順載奔闕庭值壽陽擾亂在危克固且可通直散騎郎晉書元四王梁王㻱傳下毛璩令益州刺史毛璩忠誠愨亮自桓玄萌禍常思躡其後今若平殄兇逆肅清荊郢者便當即授上流之任晉書毛寶傳命謁陵今雖權制釋服至於朔望諸節自應展情陵所以一周為斷宋書禮志二孝武崩驃騎將軍司馬道子命請徵戴逵疏逵執操貞厲含味獨游年在耆老清風彌劭東宮虛德式延事外宜加旌命以參僚侍逵既重幽居之操必以難進為美宜下所在備禮發遣晉書隱逸戴逵傳太元二十年皇太子始出東宮太子太傅會稽王道子少傅王雅詹事王珣上疏請崇正文李太妃名號啟母以子貴慶厚禮崇伏惟皇太妃純德光大休祐攸鍾啟嘉祚於聖明嗣徽音於上列雖幽顯同謀而稱謂未盡非所以仰述聖心允荅天人宜崇正名號詳案舊典晉書孝武文李太后傳皇太子納妃啟皇太子係體宸極年德竝茂宜簡國媛緝宣內教故中書令太常王獻之新安公主息女六行聿修四德允備加之世載簡正慶深積善僉曰宜作配儲宮正位中饋御覽一百四十九引東宮舊事與王彪之書東海王來月欲迎妃而女身有大功服此於常禮當是有疑但先拜時大禮已交且拜時本意亦欲通如此之閡耳不得同之初婚固當在於可通通典五十九荅范尚書既有所準情理可通故人主權而行之自君作故古之制也古人墨絰從事豈情所安逼於君命之所制奪於人臣之所屈乃至於斯以今方之事情輕重豈得同日而欲執違耶又今自拜時未為備禮暫一致身交拜而已即之於情有何不可且今王氏情事與國家正同王命既定事在必行通典六十王濛息叔仁兄十月亡至十二月詔其子與琅邪王昏拜時叔仁以喪辭范尚書與會稽王牋為申其意會稽王荅與人書異者復何如向見廞云卿小苦瘧不乃以為患治之不遣不悉司馬道子白淳化閣帖一
