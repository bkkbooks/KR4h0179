body:
  text: 裴秀平吳表草孫皓酷虐不及聖名御世兼弱攻昧使遺子孫將遂不能臣時有否泰非萬安之勢也臣昔雖已屢言未有成旨今既疾篤不起謹重尸啓願陛下時共施用晉書裴秀傳秀薨友人料其書記得表草言平吳之事乃封以上聞奏事謹案臺閣𥳑統萬機動為法制是以特宜精𥳑良能以親其職臺郎皆朝之俊選當之處事宜辨正疑滯也書鈔六十與山濤書彪處方伯之任殊亦為高祖論道之士不宜處外耳書鈔七十二引王隱晉書山濤傳云為冀州刺史秀與濤書案彪字疑有誤禹貢九州地域圖序圖書之設由來尚矣自古垂象立制而賴其用三代置其官國史掌其職暨漢祖屠咸陽丞相蕭何盡收秦之圖籍今祕書既無古之地圖又無蕭何所得秦圖書惟有漢氏所畫輿地及括地諸雜圖各不設分率又不考正準望亦不備載名山大川其所載列雖有粗形皆不精審不可依據或稱外荒迂誕之言不合事實于義無取大晉龍興混一六合以清宇宙始于庸蜀深入其岨文皇帝乃命有司撰訪吳蜀地圖蜀土既定六軍所經地域遠近山川險易征路迂直校檢圖記罔或有差今上考禹貢山海川流原隰陂澤古之九州及今之十六州郡國縣邑疆界鄉陬及古國盟會舊名水陸徑路為地圖十八篇制圖之體有六焉一曰分率所以辨廣輪之度也二曰準望所以正彼此之體也三曰道里所以定所由之數也四曰高下五曰方邪六曰迂直此三者各因地而制宜所以校夷險之異也有圖象而無分率則無以審遠近之差有分率而無準望雖得之于一隅必失之于他方有準望而無道理則施于山海絶隔之地不能以相通有道里而無高下方邪迂直之校則徑路之數必與遠近之實相違失準望之正矣故必以此六者參而考之然後遠近之實定于分率彼此之實定于準望徑路之實定于道里度數之實定于高下方邪迂直之算故雖有峻山巨海之隔絶域殊方之迥登降詭曲之因皆可得舉而定者準望之法既正則曲直遠近無所隱其形也晉書裴秀傳又藝文類聚六初學記五乞絶從弟儀曹郎耽喪服表耽受性凶頑往因品署未了怨恨親親言語悖逆讎絶骨肉其兄司空秀二息從纂昶以下薨亡耽皆不制服發哀昔二叔放流鄭段不弟皆經典所絶耽應見流徙未及表聞之頃耽憂恚荒越成狂病前即檻閉今以喪亡罪匿彰聞穢辱宗胄耽見周親以下皆宜絶服葬不列墓次請取斷通典一百一與石崇書吾弟酒狂海內足知足下飲以狂藥而反責之禮邪宋王回蔡謨贊序讓吏部尚書表臣少無鑒察之譽長無題輿之才初學記十一陳刑法過當表夫天下之事多塗非一司之所營中才之情易撓賴恆制而後定先王知其所以然也是以辨方分職為之準局準局既立各掌其務刑賞相稱輕重無二故下聽有常群吏安業也舊宮掖陵廟有水火毀傷之變然後尚書乃躬自奔赴其非此也皆止于郎令史而已刑罰所加各有常型去元康四年大風之後廟闕屋瓦有數枚傾落免太常荀寓于時以嚴詔所譴莫敢據正然內外之意僉謂事輕責重有違于常會五年二月天有大風主者懲懼前事臣新拜尚書始三日本曹尚書有疾權令兼出案行蘭臺主者乃瞻望阿棟之閒求索瓦之不正者得棟上瓦小斜十五處或是始瓦時斜蓋不足言風起倉卒臺官更往太常案行不及得周文書未至之頃便競相禁止臣以權兼暫出出還便罷不復得窮其事而本曹據執卻問無己臣時具加解遣而主者畏咎不從臣言禁止太常復興刑獄昔漢時有盜高廟玉環者文帝欲族誅張釋之但處以死刑曰若侵長陵一抔上何以復加文帝從之大晉垂制深惟經遠山陵不封園邑不飾墓而不墳同乎山壤是以丘阪存其陳草使齊乎中原矣雖陵兆尊嚴唯毀發然後族之此古典也若登踐犯損失盡敬之道事止刑罪可也去八年奴聽教加誣周龍燒草廷尉遂奏族龍一門八口并命會龍獄翻然後得免考之情理準之前訓所處實重今年八月陵上荊一枝圍七寸二分者被斫司徒太常奔走道路雖知事小而案劾難測搔擾驅馳各競免負于今太常禁止未解近日太祝署失火燒屋三閒半署在廟北隔道在重墉之內火即已滅頻為詔旨所問主者以詔旨使問頻繁便責尚書不即案行輒禁止尚書免皆在法外刑書之文有限而舛違之故無方故有臨時議處之制誠不能皆得循常也至于此輩皆為過當每相逼迫不復以理上替聖朝畫一之德下損尊禮大臣之體臣愚以為犯陵上草木不應乃用同産異刑之制案行奏劾應有定準相承務重體例遂虧或因餘事得容淺深晉書刑法志又通典一百六十六辭專任門下事表咎繇謨虞伊尹相商呂望翊周蕭張佐漢咸播功化光格四極暨于繼體咎單傳說祖己樊仲亦隆中興或明揚側陋或起自庶族豈非尚德之舉以臻斯美歷觀近世不能慕遠溺于近情多任后親以致不靜昔疏廣戒太子以舅氏為官屬前世以為知禮況朝廷何取于外戚正復才均尚當先其疏者以明至公漢世不用馮野王即其事也晉書裴頠傳上疏言庶政宜委宰輔詔命下應數改臣聞古之聖哲深原治道以為經理群務非一才之任照練萬機非一智所達故設官建職制其分局分局既制則軌體有斷事務不積則其任易處選賢舉善以守其位委任責成立相干之禁侵官為曹離局陷奸猶懼此法未足制情以義明防曰君子思不出其位夫然故人知厥務各守其所下無越分之臣然後治道可隆頌聲能舉故稱堯舜勞于求賢逸于使能分業既辨居任得人無為而治豈不宜哉及其失也官非其才人不守分越位干曹競達所懷衆言紛錯蒞職者不得自治其事非任者橫干他分主聽眩莫知所信遂親細事躬自聽斷所綜遂密所告彌衆功無所歸非無所責群下棄職得辭宜罰以此望治固其難也昔杜蕢既數師曠退而自酌以罰干職之非記稱其善陳平不知簿書之目漢史美其守職政不可多門多門則民擾于今之宜選士既其人但當委責若有不稱便加顯戮誰敢不盡心竭力不當便有干職之臣適不守局則所豫必廣所豫適廣則人心赴之人心通赴則得作威福臣作威福朝之蠹也帷幄張子房之謀者不宜使多外委群司卑力所職尊崇宰輔動靜咨度保任其負如此詔書必不復數改聽聞風言頗以詔命數移易為不安靜臣不勝狂瞽敢陳愚懷乞陛下少垂省察群書治要二十九引晉書百官志裴頠以萬機庶政宜委宰輔詔命不應數改乃上疏上疏諫赦臣聞感神以政應變以誠故桑穀之異以勉己而消漢末屢赦猶陵遲不反由此言之上協宿度下寧萬國惟在賢能慎厥庶政殆非孤赦所能增損也藝文類聚五十二引裴頠集上言改度量宜改諸度量若未能悉革可先改太醫權衡此若差違遂失神農岐伯之正藥物輕重分兩乖互所可傷夭為害尢深古壽考而今短折者未必不由此也晉書裴頠傳荀勖修律度撿得古尺短世所用四分頠上言上言刑法夫殺生賞罰治亂所由興也人主所宜生或不可生則人臣當陳所以宜殺人主所謂宜賞或不應賞則人臣當陳所以宜罰然後治道耳古之聖賢欲上盡理務下收損益莫不深閉慎密以延良謨兆庶內外咸知主如此然後乃展布腹心竭其忠誠耳群書治要二十九引晉書刑法志侍中臣頠言案顧字乃頠字之誤上言外戚不宜專任賈模適亡復以臣代崇外戚之望彰偏私之舉后族何常有能自保皆知重親無脫者也然漢二十四帝惟孝文光武明帝不重外戚皆保其宗豈將獨賢實以安理故也昔穆叔不拜越禮之饗臣亦不敢聞殊常之詔晉書裴頠傳頠遷尚書左僕射俄復使專任門下事固讓不聽頠上言云云又表云云諫東宮侍從失人東宮之建以儲皇極其所與游接必𥳑英俊宜用成德賢劭之才匡嵩幼弱未識人理立身之節東宮實體夙成之表而今有童子侍從之聲未是光闡遐風之弘理也晉書裴頠傳時以陳準子匡韓蔚子嵩竝侍東宮頠諫又群書治要三十引晉書虞濬等周喪嫁娶議吉凶之別禮之大端子服在凶而行嘉禮非所以為訓雖父兄為主事由已興此悉人倫大綱典章所慎也通典六十答治禮問天子冠禮玄冠者形之成也為君未必成人故君位雖定不可孩抱而服冕辨通典五十六崇有論夫總混群本宗極之道也方以族異庶類之品也形象著分有生之體也化感錯綜理迹之原也夫品而為族則所稟者偏偏無自足故憑乎外資是以生而可尋所謂理也理之所體所謂有也有之所須所謂資也資有攸合所謂宜也擇乎厥宜所謂情也識智既授雖出處異業默語殊塗所以寶生存宜其情一也衆理竝而無害故貴賤形焉失得由乎所接故吉凶兆焉是以賢人君子知欲不可絶而交物有會觀乎往復稽中定務惟夫用天之道分地之利躬其力任勞而後饗居以仁順守以恭儉率以忠信行以敬讓志無盈求事無過用乃可濟乎故大建厥極綏理群生訓物垂範于是乎在斯則聖人為政之由也若乃淫抗陵肆則危害萌矣故欲愆則速患情佚則怨博擅恣則興攻專利則延寇可謂以厚生而失生者也悠悠之徒駭乎若茲之釁而尋艱爭所緣察夫偏質有弊而覩𥳑損之善遂闡貴無之議而建賤有之論賤有則必外形外形則必遺制遺制則必忽防忽防則必忘禮禮制弗存則無以為政矣衆之從上猶水之居器也故兆庶之情信于所習習則心服其業業服則謂之理然是以君人必慎所教班其政刑一切之務分宅百姓各授四職能令稟命之者不肅而安忽然忘異莫有遷志況于據在三之尊懷所隆之情敦以為訓者哉斯乃昏明所階不可不審夫盈欲可損而未可絶有也過用可節而未可謂無貴也蓋有講言之具者深列有形之故盛稱空無之美形器之故有徵空無之義難檢辨巧之文可悅似象之言足惑衆聽眩焉溺其成說雖頗有異此心者辭不獲濟屈于所狎因謂虛無之理誠不可蓋唱而有和多往弗反遂薄綜世之務賤功烈之用高浮游之業埤經實之賢人情所殉篤夫名利于是文者衍其辭訥者讚其旨染其衆也是以立言籍其虛無謂之玄妙處官不親所司謂之雅遠奉身散其廉操謂之曠達故砥礪之風彌以陵遲放者因斯或悖吉凶之禮而忽容止之表瀆棄長幼之序混漫貴賤之級其甚者至于裸裎言笑忘宜以不惜為弘士行又虧矣老子既著五千之文表托穢雜之弊甄舉靜一之義有以令人釋然自夷合于易之損謙艮節之旨而靜一守本無虛無之謂也損艮之屬蓋君子之一道非易之所以為體守本無也觀老子之書雖博有所經而云有生于無以虛為主偏立一家之辭豈有以而然哉人之既生以保生為全全之所階以順感為務若味道以虧業則沈溺之釁興懷末以忘本則天理之真減故動之所交存亡之會也夫有非有于無非無于無非無于有非有是以申縱播之纍而著貴無之文將以絶所非之盈謬存大善之中節收流遁于既過反澄正于胸懷宜其以無為辭而旨在全有故其辭曰以為文不足若斯則是所寄之塗一方之言也若謂至理信以無為冠則偏而害當矣先賢達識以非所滯不之深論惟班固著難永足折其情孫卿揚雄大體抑之猶偏有所許而虛無之言日以廣衍衆家扇起各到其說上及造化下被萬事莫不貴無所存僉同情以衆固乃號凡有之理皆義之埤者薄而鄙焉辨論人倫及經明之業遂易門肆頠用矍然申其所懷而攻者盈集或以為一時口言有客幸過咸見命著文擲列虛無不允之徵若未能每事釋正則無家之義弗可奪也頠退而思之雖君子宅情無求于顯及其立言在乎達旨而已然去聖久遠異同紛糾苟少有倣佛可以崇濟先典扶明大業有益于時則惟患言之不能焉得靜默及未舉一隅略示所存而已哉夫至無者無以能生故始生者自生也自生而必體有則有遺而生虧矣生以有為己分則虛無是有之所謂遺者也故養既化之有非無用之所能全也理既有之衆非無為之所能循也心非事也而制事必由于心然不可制事以非事謂心為無也匠非器也而制器必須于匠然不可以制器以非器謂匠非有也是以欲收重泉之鱗非偃息之所能獲也隕高墉之禽非靜拱之所能捷也審投弦餌之用非無知之所能覽也由此而觀濟有者皆有也虛無奚益于已有之群生哉晉書裴頠傳鳥無胃肺蛤無五臟蛭以空中而生蠶以無胃有而育也藝文類聚九十七御覽八百二十五貴無論闕辨才論闕女史針膏不厭鮮水不厭清玉不厭潔蘭不厭馨爾形信直影亦不曲爾聲信清響亦不濁緑衣雖多無貴于色邪徑雖利無尚于直春華雖美期于秋實冰璧雖澤期于見日浴者振衣沐者彈冠人知正服莫知行端服美動目行美動神天道祐順常與吉人藝文類聚十五文身劍銘器以利顯實以名舉長劍耿介體文經武陸斷玄犀水截輕羽九功斯象七德是輔藝文類聚六十初學記二十二御覽三百四十四文身刀銘良金百煉名工展巧寶刀既成窮理盡妙文繁波回流光靈照在我皇世戢而不耀藝文類聚六十御覽三百四十六侍中嵇侯碑夫君親之重非名教之謂也愛敬出于自然而忠孝之道畢矣朴散真離背生徇利禮法之興于斯為薄悲夫晉弋陽子嵇紹字延祖資乾剛之純粹體中和之淑虛少有清劭之風長懷弘仁之度加以通朗掩濟靡才不經學為儒宗庶績光被弱冠登朝則敷文祕閣晚節強仕則納言樞極太安之初權臣擅命皇輿親征次于蕩陰六軍奔攻兵交御輦紹儼然端冕正色以扞鋒刃遂殞命于御側忠誠感人神義聲振四海銘曰二儀肇建君臣攸序峨峨侍中應期作輔外播仁風內舉心膂執慈弗勇靡仁不武見危授命背生殉主確乎其操邈乎其崇矯矯王臣憲慈遺風在親成孝于敬成忠藝文類聚四十八奏課農桑州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉晉書石苞傳功臣配享議魏代功臣宜歸之陳留國使修常祀允合事理通典五十議貶庾純純榮官忘親惡聞格言不忠不孝宜除名削爵土晉書庾純傳終制延陵薄葬孔子以為達禮華元厚葬春秋以為不臣古之明義也自今死亡者皆斂以時服不得兼重又不得飯唅為愚俗所為又不得設床帳明器也定窆之後復土滿坎一不得起墳種樹昔王孫裸葬矯時其子奉命君子不譏況于合禮典者邪晉書石苞傳思歸歎余少有大志夸邁流俗弱冠登朝歷位二十五年年五十以事去官晚節更樂放逸篤好林藪遂肥遁于河陽別業其制宅也卻阻長隄前臨清渠百木幾于萬株流水周于舍下有觀閣池沼多養魚鳥家素習技頗有秦趙之聲出則以游目弋釣為事入則有琴書之娛又好服食咽氣志在不朽慠然有淩雲之操欻復見牽羈婆娑于九列困于人閒煩黷常思歸而永歎尋覽樂篇有思歸引儻古人之情有同于今故制此曲此曲有弦無歌今為作歌辭以述余懷恨時無知音者令造新聲而播于絲竹也文選登城隅兮臨長江極望無涯兮思填胸魚瀺灂兮魚繽翻澤雉游裊兮戲中園秋風厲兮鴻燕征蟋蟀嘈嘈兮晨夜鳴落葉飄兮枯枝竦百草零兮覆畦壟時光逝兮年易盡感彼歲暮兮悵自愍廓羈旅兮滯野都願御光風兮忽歸徂惟金石兮幽且清林鬱茂兮芳草盈玄泉流兮縈丘阜閣館蕭寥兮蔭叢柳吹長笛兮彈五絃高歌淩雲兮樂餘年舒篇卷兮與聖談釋冕投紱兮希彭聃超逍遙兮絶塵埃福亦不至兮禍不來藝文類聚二十八自理表臣兄統以先父之恩早被優遇出入清顯歷位盡勤伏度聖心有以垂察近為扶風王駿橫所誣謗司隸中丞等飛筆重秦劾案深文纍塵天聽臣兄弟局蹐憂心如悸駿戚屬尊重權要赫奕內外有司望風承旨苟有所惡易于投卵自統枉劾以來臣兄弟不敢一言稍自申理戢舌鉗口惟須刑書古人稱榮華于順旨枯槁于逆違誠哉斯言于今信矣是以雖董司直繩不能不深其文抱枉含謗不得不輸其理幸賴陛下天聽四達震鑒昭遠存先父勳德之重察臣等勉勵之志中詔申料罪譴澄雪臣等刻肌碎首未足上報臣即以今月十四日與兄統浚等詣公車門拜表謝恩伏度奏御之日暫經天聽此月二十日忽被蘭臺禁止符以統蒙宥恩出非常臣晏然私門曾不陳謝復見彈奏訕辱理盡臣始聞此惶懼狼狽靜而思之固無怪也苟尊勢所驅何所不至望奉法之直繩不可得也臣以凡才纍荷顯重不能負載析薪以答萬分一月之中奏劾頻加曲之與直非臣所計所愧不能承奉戚屬自陷于此不媚于竈實愧王孫隨巢子稱明君之德察情為上察事次之所懷具經聖聽伏待罪黜無所多言晉書石崇傳請徵揚州刺史何攀表東南有兵氣不宜用遠人華陽國志十一議奏封賞當依準舊事陛下聖德光被皇靈啓祚正位東宮二十餘年道化宣流萬國歸心今承洪基此乃天授至于班賞行爵優于泰始革命之初不安一也吳會僭逆幾于百年邊境被其荼毒朝廷為之旰食先帝決獨斷之聰奮神武之略蕩滅逋寇易于摧枯然謀臣猛將猶有致忠竭力之效而今恩澤之封優于滅吳之功不安二也上天眷祐實在大晉卜世之數未知其紀今之開制當垂于後若尊卑無差大爵必進數世之後莫非公侯不安三也臣等敢冒陳聞竊謂泰始之初及平吳論功制度名牒皆悉具存縱不能遠遵古典尚當依準舊事晉書石崇傳元康初楊駿輔政大開封賞多樹黨援崇與散騎郎蜀郡何攀共立議奏于惠帝云云弗納楚妃歎序楚妃歎莫知其由楚之賢妃能立德垂名于後唯楚妃焉故歎詠之初學記十六琵琶引序王明君者本為王昭君以觸文帝諱改之胸奴盛請婚于漢元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也故序之云耳藝文類聚四十二御覽五百八十三金谷詩序余以元康六年從太僕卿出為使持節監青徐諸軍事征虜將軍有別廬在河南縣界金谷㵎中去城十里或高或下有清泉茂林衆果竹柏藥草之屬金田十頃羊二百口雞豬鵝鴨之類莫不畢備又有水碓魚池土窟其為吳目歡心之物備矣時征西大將軍祭酒王詡當還長安余與衆賢共送往㵎中晝夜遊晏屢遷其坐或登高臨下或列坐水濱時琴瑟笙䂦合載車中道路竝作及住令與鼓吹遞奏遂各賦詩以敘中懷或不能者罰酒三斗感性命之不永懼凋落之無期故具列時人官號姓名年紀又寫詩箸後後之好事者其覽之哉凡三十人吳王師議郎關中侯始平武功蘇紹字世嗣年五十為首世說品藻篇注水經穀水注文選別賦注又潘嶽金谷集詩注藝文類聚九御覽九百十九又弇州四部正稿一百五十八引修文殿御覽許巢論客有問于余曰昔許由巢父距堯之讓逍遙頤神寶已貴世司馬遷以假託之言必無此實竊以為然余答之曰是何言歟蓋聞聖人在位則群材必舉官才任能輕重允宜大任己備則不抑大材使居小位小材己極其分則不以積久而合處過材之位然則稷播嘉穀契敷五教皋陶夔龍各己授職其聯屬之官必得其材則必不重載兼置斯可知也巢許則元凱之儔大位已充則宜敦廉讓以勵俗崇無為以化世然後動靜之教備隱顯之功著故能成巍巍之化民莫能名將何疑焉藝文類聚三十七奴券余元康之際出在滎陽東住聞主人公言聲太粗須臾出趣吾車曰公府當怪吾家嘵嘵邪中買得一惡羝奴名宜勤身長九尺餘力舉五千斤挽五石力弓百步射錢孔言讀書欲使便病日食三斗米不能奈何吾問公賣不公喜便下絹百匹聞謂吾曰吾胡王子性好讀書公府事一不上劵則不為公府作劵文曰取東海巨鹽東齊羝羊朝歌蒲薦八板桃床負之安邑梨栗之鄉常山細縑趙國之編許昌之總沙房之綿作車當取高平莢榆之轂無尾髑髏之狀大良白槐之幅河東茱萸之輞亂櫛桑轅大山桑光長安雙人白屋釘鎖巧手出于上方見好弓材可斫千張山陰青槻鳥嗥拓桑張金好墨過市數蠡并市豪筆備即寫書嗥角幘道金案玉碗宜勤供筆更作多辭乃斂吾絹而歸御覽五百九十八又七百七十三奴當種蘿蔔胡荽不親不疏御覽九百八十諫石虎作役非時疏今者天文錯亂百姓凋敝而又大興苦役非明主惜民之所宜也十六國春秋二十奏舉劉毅為青州大中正謹案陳留相孫尹表及與臣等書如左臣州履境海岱而參風齊魯故人俗務本而世敦德讓今雖不克于舊而遺訓猶存是以人倫歸行士識所守也前被司徒符當參舉州大中正僉以光祿大夫毅純孝至素著在鄉閭忠允亮直竭于事上仕不為榮惟期盡節正身率道崇公忘私行高義明出處同揆故能令義士宗其風景州閭歸其清流雖年耆偏疾而神明克壯實臣州人士所思準繫者矣誠以毅之明格能不言而信風之所動清濁必偃以稱一州咸同之望故也竊以為禮賢尚德教之大典王制奪與動為開塞而士之所歸人倫為大臣等虛劣雖言廢于前今承尹書敢不列啓案尹所執非為惜名議于毅之身亦通陳朝宜奪與大準以為尹言當否應蒙評議晉書劉毅傳
