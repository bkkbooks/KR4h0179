body:
  text: 袁瓌上表請禁斷招魂葬故尚書僕射曹馥沒于寇亂嫡孫胤不得葬尸招魂殯葬伏惟聖人制禮因情作教故椁周于棺棺周于身然則非身無棺非棺無椁也胤無喪而葬招幽魂氣于德為愆義于禮為不物監軍王崇太傅司馬劉洽皆招魂葬請臺下禁斷通典一百三元帝建武二年上疏請建國學臣聞先王之教也崇典訓以弘遠代明禮學以示後生所以導萬物之性畼為善之道也宗周既興文史載煥端委治于南蠻頌聲溢于四海故延州入聘聞雅音而嗟咨韓起適魯觀易象而歎息何者立人之道于斯為首也孔子恂恂道化洙泗孟軻皇皇誨誘無倦是以仁義之聲于今猶存禮讓之節千載未泯疇昔皇運陵替喪亂屢臻儒林之教暫頽庠序之禮有闕國學索然墳籍莫啓有心之徒抱志無由昔魏武帝身親介胄務在武功猶尚息鞍披覽投戈吟詠以為世之所須者治之本宜崇況今陛下以聖明臨朝百官以虔恭蒞事朝野無虞江外謐靜如之何泱泱之風漠然無聞洋洋之美墜于聖世乎古人有言詩書義之府禮樂德之則實宜留心經籍闡明學義使諷誦之音盈于京室味道之賢是則是詠豈不盛哉若得給其宅地備其學徒博士僚屬粗有其官則臣之願也晉書袁瓌傳宋書禮志一咸康三年國子祭酒袁瓌太常馮懷上疏江賦序江賦序吳時有錢約釣于牛渚獲一金鎖引之則金牛泛然而出約懼而釋因以為名御覽八百九十九與左軍褚裒解交書皇太后踐登正祚臨御皇朝將軍之于國外姓之太上皇也至于皇子近屬咸有揖讓之禮而況策名人臣而交媟人父天性攸尊亦宜體國而重矣故友之好請于此辭染絲之變墨翟致懷岐路之感楊朱興歎況與將軍遊處少長雖世譽先後而臭味同歸也平昔之交與禮數而降箕踞之歡隨時事而替雖欲虛詠濠肆脫落儀制其能得乎來物無停變化遷代豈惟寸晷事亦有之夫御器者神制衆以約願將軍怡情無事以理勝為任親仗賢達以納善為大執筆惆悵不能自盡晉書袁喬傳御覽四百十勸桓溫伐蜀夫經略大事故非常情所具智者了于胸心然後舉無遺算耳今天下之難二寇而已蜀雖險固方胡為弱將欲除之先從易者今泝流萬里經歷天險彼或有備不必可剋然蜀人自以斗絶一方恃其完固不修攻戰之具若以精卒一萬輕軍速進比彼聞之我已入其險要李勢君臣不過自力一戰擒之必矣論者恐大軍既西胡必窺覦此又似是而非何者胡聞萬里征伐以為內有重備必不敢動縱復越逸江渚諸軍足以守境此無憂矣蜀土富實號稱天府昔諸葛武侯欲以抗衡中國今誠不能為害然勢據上流易為寇盜若襲而取之者有其人衆此國之大利也晉書袁喬傳四府君遷主議仍舊無革殷祠猶及四府君情理為允宋書禮志三大田議國因民以為本民資食以為天修其業則教興崇其本則末理實為治之要道致化之所階也不敦其本則末業滋章飢寒交湊則廉恥不立當今接篡偽之末值凶荒之餘爭源既開凋薄彌啓榮利蕩其正性賦斂罄其所資良疇無側趾之耦比屋有困餧之患中間多故日不暇給自卷甲卻馬甫一二年積敝之黎難用克振實仁懷之所矜恤明教之所爰發也然斯業不修有自來矣司牧之官莫或為務俗吏庸近猶秉常科依勸督之故典迷民情之屢變譬猶修隄以防川忘淵丘之改易膠柱于昔弦忽宮商之乖調徒有考課之條而無豪分之益不悟清流在于澄源止輪由乎高閾患生于本治之于末故也夫設位以崇賢疏爵以命士上量能以審官不取人于浮譽則比周道息遊者言歸遊子既歸則南畝闢矣分職以任務置吏以周役職不以無任立吏必以非用省𤕠散者廢則萊荒墾矣器以應用商以通財勦靡麗之巧棄難得之貨則雕偽者賤穀稼重矣耕耨勤悴力殷收寡工商逸豫用淺利深增賈販之稅薄疇畝之賦則未技抑田畯喜矣居位無義從之徒在野靡并兼之黨給賜非可恩致力役不入私門則遊食者反本肆勤自勸遊食省而肆勤衆則東作繁矣密勿者甄異怠慢者顯罰明勸課之令峻糾違之官則懶惰無所容力田有所望力者欣而惰者懼則穡人勸矣凡此數事亦務田之端趣也蒞之以清心鎮之以無欲勗之以弗倦翼之以廉謹舍日計之小成期遠致于莫歲則澆薄自淳心化有漸矣宋書袁湛傳為宋公檄蜀文夫順德者昌逆德者亡失仁與義難以求安馮阻負釁鮮克有成詳觀自古隆替有數故成都不世祀華陽無興國日者王室多故夷羿遘紛波振塵駭覃及遐裔蕞爾譙縱編戶黔首同惡相求是崇是長肆反噬于州相播毒害于民黎俾我西服隔閡皇澤自義風電靡天光反輝昭晳舊物煙熅區宇以庶務草創未遑九伐自爾以來奄延十載而野心不革伺隙乘間招聚逋叛共相封殖侵擾我蠻獠搖蕩我疆垂我是以有治洲之役醜類盡殪匹馬無遺桓謙折首譙福鳥逝奔伏窠穴引頸待戮當今北狄露晞南寇埃掃朝風載韙庶績其凝康哉之歌日熙比屋之隆可詠孤職是經略思一九有眷彼禹迹願言載懷奉命西行途戾荊郢瞻望巴漢憤慨交深清江源于濫觴澄氛祲于井絡誅叛柔遠今也其時即命河間太守蒯恩下邳太守劉鍾精勇二萬直指成都龍驤將軍臧熹戎卒二萬進自墊江益州刺史朱齡石舟師三萬電曜外水分遣輔國將軍索懇率漢中之衆濟自劍道振威將軍朱客子提寧州之鋭渡瀘而入神兵四臨天綱宏掩衡翼千里金鼓萬張組甲貝胄景煥波屬華夷百濮雲會霧臻以此攻戰誰與為敵況又奉義而行以順而動者哉今三陝之隘在我境內非有岑彭荊門之險彌入其阻平衢四達實無鄧艾綿竹之艱山川之形抑非曩日攻守難易居然百倍當全蜀之強士民之富子陽不能自安于庸僰劉禪不敢竄命于南中荊邯折謀伯約挫鋭故知成敗有數非可智延此皆益土前事當今元龜也盛如盧循強如容超陵威南海跨制北岱樓船萬艘掩江蓋汜鐵馬千群充原塞隰然廣固之攻陸無完雉左里之戰水靡全舟或顯戮京畿或傳首萬里故知逆順有勢難以力抗斯又目前殷鑑深切著明者也梁益人士咸明王化雖驅迫一時本非奧主從之淫虐日月增播刑殺非罪死以澤量而待命寇讎之戮佹嶇豺狼之吻豈不遡誠南凱延首東雲普天有來蘇之幸而一方懷後豫之怨王者之師以仁為本舍逆取順爰自三驅齊斧所加縱身而已其有襟甲反接自投軍門者一無所問士子百姓列肆安堵審擇吉凶自求多祐大信之明皎若朝日如其迷復姦邪守愚不改火燎孟諸芝艾同爛河決金隄淵丘同體雖欲悔之亦將何及宋書袁湛傳歌賦朱脣不啓皓齒不離清氣獨轉妍弄潛移或似停而不留或如疾而不馳藝文類聚四十三酒賦素醪玉潤清酤淵澄纖羅輕布浮蟻競升馨桂發西蘭興書鈔一百四十八圓扇賦飄擬融放同類逸雲輕風喟喟羅袂紛紛書鈔一百三十四答桓南郡書嘯有清浮之美而無控引之深歌窮測根之致用之彌覺其遠至乎吐辭送意曲究其奧豈脣吻之切發一往之清泠而已哉若夫阮公之嘯蘇門之和蓋感其一奇何為徵此一至大疑嘯歌所拘邪藝文類聚十九御覽三百九十二白鹿詩序荊門山臨江皆絶壁峭峙壁立百餘丈互帶激流禽獸所不能履北岸有一白鹿鹿泅過江行人見之乘刀競逐謂至山下必得鹿忽然若飛超岡而去于今此壁謂之白鹿山詩曰白鹿乃在上林西苑中射工尚復得脯臘之黃鵠犘天極高飛後宮尚得烹煮之藝文類聚九十五御覽九百六後漢書光武紀論前漢自成哀以下而天地縱橫巨滑竊命劉氏舊澤雖在而瞻仰之望殆絶世祖以渺渺之胤起于白水之濱身屈更始之助位與群豎并列于時懷璽者十餘建旗者數百高才者居之南面疾足者為之王公茫茫九州瓜分臠切泯泯蒼生塵消鼎沸我扇之以仁風驅之以大威霜雪被而洪棘枯網維振而逆驎掃群才畢奏人思與能數年之間廓清四海雖曰中興與夫始創業者庸有異乎誠馬生之言固以寥廓大度同符高祖又資太宗之仁兼孝宣之明三人之體其殆乎同故能享有神器據乎萬物之上矣御覽九十章帝紀論孝章皇帝宏裕有餘明斷不足閨房讒惑外戚擅寵惜乎若明章二主損有餘而補不足則古之賢君矣御覽九十一獻帝紀論獻帝崎嶇危亂之間飄泊萬里之衢萍流蓬轉險阻備經自古帝王未之有也觀其天性慈愛弱而神惠輔之以德真守文令主也曹氏始于勤王終至滔天遂力制群雄負鼎而趨然因其利器假而不反回山倒海遂移天日昔田常假湯武而殺君操因堯舜而竊國所乘不同其盜賊之身一也善乎莊生之言竊鉤者誅竊國者侯侯之門仁義在焉信矣御覽九十二
