body:
  text: 習鑿齒臨終上疏臣每謂皇晉宜越魏繼漢不應以魏後為三恪而身微官卑無由上達懷抱愚情三十餘年今沈淪重疾性命難保遂嘗懷此當與朽爛區區之情切所悼惜謹力疾著論一篇寫上如左願陛下考尋古義求經常之表超然遠覽不以臣微賤廢其所言晉書習鑿齒傳與謝安書每省家舅縱目檀溪念崔徐之交未嘗不撫膺躊躇惆悵終日矣水經沔水注又與謝安書稱釋道安來此見釋道安故是遠勝非常道士師徒數百齋講不倦無變化技術可以惑常人之耳目無重威大勢可以整群小之參差而師徒肅肅自相尊敬洋洋濟濟乃是吾由來所未見其人理懷簡衷多所博涉內外群書略皆遍睹陰陽算數亦皆能通佛經妙義故所遊刃作義乃似法蘭法祖輩統以大無不肯稍齊物等智在方中馳騁也恨不使足下見之其亦每言思得一見足下釋藏輦八又百五與謝侍中書此有紅藍北人采取其花作煙支婦人粧時作頰色用如豆許案令偏偏頰殊覺鮮明胸奴名妻閼氏言可愛如煙支也爾雅翼三與燕王書山下有紅藍花足下先知之不北方采紅藍取其花染緋黃挼取其英鮮者作煙肢婦人將用為顏色吾少時再三遇見煙肢今日始視紅藍後當為足下致其種胸奴名妻作閼支言其可愛如煙肢也想足下先亦不作此讀漢書也史記胸奴傳索隱北堂書鈔一百三十五御覽七百二十引崔豹古今注與桓祕書吾以去五月三日來達襄陽觸目悲感略無歡情痛惻之事故非書言之所能具也每定省家舅從北門入西望隆中想臥龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之高南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之遠未嘗不徘徊移日惆悵極多撫乘躊蹰慨然而泣曰若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目璅璅常流碌碌凡士焉足以感其方寸哉夫芬芳起亍椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風高尚而邁德者必有明勝之遺事若向八君子者千載猶使義想其為人況相去之不遠乎彼一時也此一時也焉知今日之才不如疇辰百年之後吾與足下不並為景升乎晉書習鑿齒傳與釋道安傳興寧三年四月五日鑿齒稽首和南承應真履正明白內融慈訓兼照道俗齊蔭宗虛者悟無常之旨存有者達外身之權清風藻于中夏鸞響厲乎八冥玄味遠猷何榮如之弟子聞天不終朝而雨六合者彌天之雲也弘淵源以潤八極者四大之流也彼直無為降而萬物賴其澤此本無心行而高下蒙其潤況哀世降步愍時而生資始繫于度物明道存乎練俗乘不疾之輿以涉無遠之道命外身之駕以應十方之求而可得玉潤于一山冰結于一谷望閬風而不回儀措此世而不誨度者哉且夫自大教東流四百餘年矣雖蕃王居士時有奉者而真丹宿訓先行上世道運時遷俗未僉悟藻悅濤波下士而已唯肅祖明皇帝實天降德始欽斯道手畫如來之容口味三昧之旨戒行峻于巖隱玄祖畼乎無生大塊既唱萬竅怒呼賢哲君子靡不歸宗日月雖遠光景彌暉道業之隆莫盛于今豈所謂月光道寂將生真土靈鉢東遷忽驗于茲乎又聞三千得道俱見南陽明學開士陶演真言上考聖達之誨下測道行之驗深經普往非斯而誰懷道邁訓舍茲孰降是以此方諸僧咸有傾想目欣金色之瑞耳遲無上之針老幼等願道俗同懷繫詠之情非常言也若慶雲東徂摩尼回曜一躡七寶之座暫現明哲之燈雨甘露于豐草植栴檀于江湄則如來之教復崇于今日玄波溢漾重蕩于一代矣不勝延豫裁書致心意之蘊積曷云能畼弟子襄陽習鑿齒稽首和南弘明集十二高僧傳五晉承漢統論或問魏武帝功蓋中夏文帝受禪于漢而吾子謂漢終有晉豈實理乎且魏之見廢晉道亦病晉之臣子寧可以同此言哉答曰此乃所以尊晉也但絶節赴曲非常耳所悲見殊心異雖奇莫察請為子言焉昔漢氏失御九州殘隔三國乘間鼎跱數世干戈日尋流血百載雖各有偏平而其實亂也宣皇帝勢逼當年力制魏氏蠖屈從時遂羈戎役晦明掩耀龍潛下位俯眉重足鞠躬屏息道有不容之難躬蹈履霜之險可謂危矣魏武既亡大難獲免始南擒孟達東蕩海隅西抑徑蜀旋撫諸夏摧吳人入侵之鋒掃曹爽見忌之黨植靈根以跨中嶽樹群才以翼子弟命世之志既恢非常之業亦固景文繼之靈武冠世剋伐二違以定厥庸席卷梁益奄征西極功格皇天勳侔古烈豐規顯祚故以灼如也至于武皇遂并強吳混一宇宙乂清四海同軌二漢除三國之大害靜漢末之交爭開九域之蒙晦定千載之盛功者皆司馬氏也而推魏繼漢以晉承魏比義唐虞自託純臣豈不惜哉今若以魏有代王之德則其道不足有靜亂之功則孫劉鼎立道不足則不可謂制當年當年不制于魏則魏未曾為天下之主王道不足于曹則曹未始為一日之王矣昔共工伯有九州秦政奄平區夏鞭撻華戎專總六合猶不見序于帝王淪沒于戰國何況暫制數州之人威行境內而已便可推為一代者乎若以晉嘗事魏懼傷皇德拘惜禪名謂不可割則惑之甚者也何者隗囂據隴公孫帝蜀蜀隴之人雖服其役取之大義于彼何有且吳楚僭號周室未亡子文延陵不見貶絶宣皇帝官魏逼于性命舉非擇木何虧德美禪代之義不同堯舜校實定名必彰于後人各有心事胡可掩定空虛之魏以屈于已孰若杖義而以貶魏哉夫命世之人正情遇物假之際會必兼義勇宣皇祖考立功于漢世篤爾勞思報亦深魏武超越志在傾主德不素積義險冰薄宣帝與之情將何重雖形屈當年意申百世降心全己憤慨于下非道服北面有純臣之節畢命曹氏忘濟世之功者也夫成業者係于所為不係所藉立功者言其所濟不言所起是故漢高稟命于懷王劉氏乘斃于亡秦超二偽以遠嗣不論近而計功考五德于帝典不疑道于力政季無承楚之號漢有繼周之業取之既美而已德亦重故也凡天下事有可借喻于古以曉于今定之往昔而足為來證者當春秋之時吳楚二國皆僭號之王也若使楚莊推鄢郢以尊有德闔閭舉三江以奉命世命世之君有德之主或藉之以應天或撫之以光宅彼必自係于周室不推吳楚以為代明矣況積勳纍功靜亂寧衆數之所録衆之所與不資于燕噲之授不賴于因藉之力長轡廟堂吳蜀兩斃運奇二紀而平定天下服魏武之所不能臣蕩纍葉之所不能除者哉自漢末鼎沸五六十年吳魏犯順而強蜀人杖正而弱三家不能相一萬姓曠而無主夫有定天下之大功為天下之所推孰如見推于暗人受尊于微弱配天而為帝方駕于三代豈比俯首于曹氏側足于不正即情而恆實取之而無慚何與詭事而託為開亂于將來者乎是故故舊之恩可封魏後三恪之數不宜見列以晉承漢功實顯然正名當事情體亦厭又何為虛尊不正之魏而虧我道于大通哉昔周人詠祖宗之德追述翦商之功仲尼明大孝之道高稱配天之義然后稷勤于所職聿來未以翦商異于司馬氏仕乎曹族三宗之寓于魏世矣且夫魏自君之道不正則三祖臣魏之義未盡義未盡故假塗以運高略道不正故君臣之節有殊然則弘道不以輔魏而無逆取之嫌高拱不勞汗馬而有靜亂之功者蓋勳足以王四海義可以登天位雖我德慚于有周而彼道異于殷商故也今子不疑共工之不得列于帝王不嫌漢之係周而不係秦何至于一魏猶疑滯而不化哉夫欲尊其君而不知推之于堯舜之道欲重其國而反厝之于不勝之地豈君子之高義若由未悟請于是止矣晉書習鑿齒傳漢晉春秋論先主到當陽先主雖顛沛險難而信義愈明勢逼事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗觀其所以結物情者豈徒投醪撫寒含蓼問疾而己哉其終濟大業不亦宜乎蜀志先主傳注孔明殺馬謖諸葛亮之不能兼上國也豈不宜哉夫晉人規林父之後濟故廢法而收功楚成暗得臣之益己故殺之以重敗令蜀僻陋一方才少上國而殺其俊傑退收駑下之用明法勝才不師三敗之道將以成業不亦難乎且先主誡謖之不可大用豈不謂其非才也亮受誡而不獲奉承明謖之難廢也為天下宰匠欲大收物之力而不量才節任隨器付業知之大過則違明主之誡裁之失中即殺有益之人難乎其可與言智者也蜀志馬良傳注孔明卒使廖立垂泣李平發病死昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難諸葛亮之使廖立垂泣李平致死豈徒無怨言而已哉夫水至平而邪者取法鏡至明而醜者忘怒水鏡之所以能窮物而無怨者以其無私也水鏡無私猶以免謗況大人君子懷樂生之心流矜恕之德法行于不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎諸葛亮于是可謂能用刑矣自秦漢以來未之有也蜀志李嚴傳注龐統諫先主夫霸王者必體仁義以為本仗信順以為宗一物不具則其道乖矣今劉備襲奪璋土權以濟業負信違情德義俱愆雖功由是隆宜大傷其敗譬斷手全軀何樂之有龐統懼斯言之泄宣知其君之必悟故衆中匡其失而不修常謙之道矯然太當盡其謇諤之風夫上失而能正是有臣也納勝而無執是從理也有臣則陛隆堂高從理則群策畢舉一言而三善兼明暫諫而義彰百代可謂達乎大體矣若惜其小失而廢大益務此過言自絶遠讜能成業濟務者未之有也蜀志龐統傳注法正勸先主納劉焉子瑁妻吳氏夫婚姻人倫之始王化之本匹手猶不可以無禮而況人君乎晉文廢禮行權以濟其業故子犯曰有求于人必先從之將奪其國何有于妻非無故而違禮教者也今先主無權事之逼而引前失以為譬非導其君以堯舜之道者先主從之過矣蜀志先主穆皇后傳注費詩諫先主稱尊號夫創本之君須大定而後正己纂統之主俟速建以係衆心是故惠公朝虜而子圉夕立更始尚存而光武舉號夫豈忘主徼利社稷之故也今先主糾合義兵將以討賊賊強禍大主沒國喪二祖之廟絶而不祀苟非親賢孰非紹此嗣祖配天非咸陽之譬杖正討逆何推讓之有于此時也不如速尊有德以奉大統使民欣反正世覩舊物杖順者齊心附逆者同懼可謂暗惑矣其黜降也宜哉蜀志費詩傳注曹操不存録張松昔齊桓一矜其功而叛者九國曹操暫自驕伐而天下三分皆勤之于數十年之內而棄之于俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功高而居之以讓勢尊而守之以卑情近于物故雖貴而人不厭其重德洽群生故業廣而天下愈欣其慶夫然故能有其富貴保其功業隆顯當時傳福百世何驕矜之有哉君子是以知曹操之不能遂兼天下者也蜀志劉璋傳注曹操封閻圃魯欲稱王而閻圃諫止之今封圃為列侯夫賞罰者所以懲惡勸善也苟其可以明軌訓于物無遠近幽深矣今閻圃諫魯勿王而太祖追封之將來之人孰不思順塞其本源而末流自止其此之謂與若乃不明于此而重燋爛之功豐爵厚賞止于死戰之士則民利于有亂俗競于殺伐阻兵仗力干戈不戢矣太祖之此封可謂知賞罰之本雖湯武居之無以加也魏志張魯傳注高堂隆高堂隆可謂忠臣矣君侈每思諫其惡將死不忘憂社稷正辭動于昏主明戒驗于身後謇諤足以勵物德音沒而彌彰可不謂忠且智乎詩云聽用我謀庶無大悔又曰曾是莫聽大命以傾其高堂隆之謂也魏志高堂隆傳注鍾會功曹向雄向伯茂可謂勇于蹈義也哭王經而哀感巿人葬鍾會而義動明主彼皆忠烈奮徑知死而往非存生也況使經會處世或身在急難而有不赴者乎故尋其奉死之心可以見事生之情覽其忠貞之節足愧背義之士矣王加禮而遣可謂明達也魏志鍾會傳注賈逵援曹休夫賢人者外身虛己內以下物嫌忌之名何由而生乎有嫌忌之名者必與物為對存勝負于己身者也若以其私憾敗國殄民彼雖傾覆于我何利我苟無利乘之曷為以是稱説臧獲之心耳今忍其私忿而急彼之憂冒難犯危而免之于害使功皓于明君惠施於百姓身登于君子之堂義愧于敵人之心雖豺虎猶將不覺所復而況于曹休乎然則濟彼之危所以成我之勝不計宿憾所以服彼之心公義既成私利亦弘可謂善爭矣在于未能忘勝之流不由于此而能濟勝者未之有也魏志賈逵傳注毋丘儉舉義毋丘儉感明帝之顧命故為此役君子謂母丘儉事雖不成可謂忠臣矣夫竭節而赴義者我也成之與敗者時也我苟無時成何可必乎亡我而不自必乃所以為忠也古人有言死者復生生者不愧若母丘儉可謂不愧也魏志母丘儉傳注司馬景王引過司馬大將軍引二敗以為已過過消而業隆可謂智矣夫民忘其敗而下思其報雖欲不康其可得邪若乃諱敗推過歸咎萬物常執其功而隱其喪上下離心賢愚解體是楚再敗而晉再克也謬之甚矣君人者苟統斯理而以御國則朝無秕政身靡留愆行失而名揚兵挫而戰勝雖百敗可也況于再乎魏志齊王芳紀注司馬文王赦三叛黨屬自是天下畏威懷德矣君子謂司馬大將軍于是役也可謂能以德攻矣夫建業者異矣各有所尚而不能兼并也故窮武之雄斃于不仁存義之國喪于懦退今一征而禽三叛大虜吳衆席卷淮浦俘馘十萬可謂壯矣而未及安坐喪王基之功種惠吳人結異類之情寵鴦葬欽忘疇昔之隙不咎誕衆使揚土懷愧功高而人樂其成業廣而敵懷其德武昭既敷文算又洽推此道也天下其孰能當之哉魏志諸葛誕傳注周瑜魯肅客問曰周瑜魯肅何人也主人曰小人也客曰周瑜奇孫策于總角定人好惡于一面摧魏氏百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建東吳之略子謂之小人何也主人曰此乃真所以為小人也夫君子之道故將竭其直忠佐扶帝室尊主寧時遠崇名教若乃力不能合事與志違躬耕南畝遁迹當年何由盡臣禮于孫氏于漢室未亡之日邪客曰諸葛武侯翼戴玄德與瑜肅何異而子重諸葛毀瑜肅何其偏也主人曰夫論古今者故宜先定其所為之本迹其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有崇本之心也今玄德漢高之正胄也信義著于當年將使漢室亡而更立宗廟絶而復繼誰云不可哉御覽四百四十七張昭閉戶拒命張昭于是乎不臣矣夫臣人者三諫不從則奉身而退身苟不絶何忿懟之有且秦穆違諫卒霸西戎晉文暫怒終成大業遺誓以悔過見録狐偃無怨絶之辭君臣道泰上下俱榮今權悔往之非而求昭後益回慮降心不遠而復是其善也昭為人臣不度權得道匡其後失夙夜匪懈以延來譽乃追忿不用歸罪于君閉戶拒命坐待焚滅豈不悖哉吳志張昭傳注羊祜陸抗兩境交和夫理勝者天下之所保信順者萬人之所宗雖大猷既喪義聲久淪狙詐馳于當塗權略周乎急務負力縱橫之人臧獲牧豎之智未有不憑此以創功捨茲而獨立者也是故晉文退舍而原城請命穆子圍鼓訓之以力冶夫獻策而費人斯歸樂毅緩攻而風烈長流觀其所以服物制勝者豈徒威力相詐而已哉自今三家鼎足四十有餘年矣吳人不能越淮沔而進取中國中國不能陵長江以爭利者力均而智侔道不足以相傾也夫殘彼而利我未若利我而無殘振武以懼物未若德廣而民懷匹夫猶不可以力服而況一國乎力服猶不如以德來而況不制乎是以羊祜恢大同之略思五兵之則齊其民人均其施澤振義網以羅強吳明兼愛以革暴俗易生民之視聽馳不戰乎江表故能德音悅畼而繈負雲集殊鄰異域義讓交弘自吳之遇敵未有若此者也抗見國小主暴而晉德彌昌人積兼已之善而己無固本之規百姓懷嚴敵之德闔境有棄主之慮思所以鎮定民心緝寧外內奮其危弱抗權上國者莫若親行斯道以侔其勝使彼德靡加吾而此善流聞歸重邦國弘明遠風折衝于枕席之上校勝于帷幄之內傾敵而不以甲兵之力保國而不浚溝池之固信義感于寇讎丹懷體于先日豈設狙詐以危賢徇己身之私名貪外物之重我暗服之而不備者哉由是論之苟守局而保疆一卒之所能協數以相危小人之近事積詐以防物臧獲之餘慮威勝以求安明哲之所賤賢人君子所以拯世重範舍此而取彼者其道良弘故也吳志陸抗傳注傳玄言上終喪下短喪為但有父子無復君臣傅玄知無君臣之傷教而不知兼無父子為重豈不蔽哉且漢廢君臣之喪不降父子之服故四海黎庶莫不盡情于其親三綱之道二服恆用于私室而王者獨盡廢之豈所以孝治天下乎詩云猷之未遠其傅玄之謂也宋書禮志二諸葛武侯宅銘達人有作振此頽風雕欂蔚采鴟闌唯豐義範蒼生道格時雍自昔爰止于焉盤桓躬耕西畝永嘯東巒迹逸中林神凝巖端罔窺其奧誰測斯歡堂堂偉匠婉翮揚朝傾巖搜寶高羅九霄慶雲集矣鸞駕亦招藝文類聚六十四又初學記二十四盤桓作龍盤揚朝作陽朝亦招作三招
