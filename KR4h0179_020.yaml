body:
  text: 王珣奏追崇鄭太后按太常臣胤等議以春秋之義母以子貴故仲子成風咸稱夫人經云考仲子之宮明不配食也且漢文詔二太后並繫子號宜遠準春秋考宮之義近摹二漢不配之典尊號既正宜改築新廟顯崇尊稱則罔極之情申別建寢廟則嚴禰之道著繫子為稱兼明貴之所繇一舉而三義以允固哲王之高致可如胤等議追尊會稽太妃為簡皇太后也書三月四日珣頓首末冬衆感得七月書知問郎何如服弊憂之劣不具王珣頓首白淳化閣帖二與范寧書論釋慧持遠公持公孰愈高僧傳重與范寧書但令如兄誠未易有況弟復賢邪高僧傳林法師墓下詩序余以寧康二年命駕之剡石城山即法師之丘也高墳鬱為荒楚丘隴化為宿莽遺迹未滅而其人已遠感想平昔觸物悽懷世説琴贊穆穆和琴至至愔愔如彼清風泠焉經林藝文類聚四十四初學記十虎丘山銘虎丘山先名海涌山藝文類聚八孝武帝哀策文同軌畢至百司胥亞法物夕陳轀輬夙駕親執饋奠長號永夜懼鼓刻之遄盡哀良辰之莫借悲宮宇之寥廓痛聖儀之幽化夫至德無名固理絶稱謂然視史陳辭亦臣子所貴寄窮情于翰墨庶遺塵之髣佛其辭曰惟皇作極五德迭胤康實復夏武亦隆晉亹亹太宗希夷其韻鏡之者玄撫之者順於穆皇考嗣徽絶軌前聖後哲契合一揆心去其伐行遺其美廢華任誠捨筌存旨惟深通志群方咸秩惟幾成務能事斯畢未若我皇至則不疾恢恢天網疏而莫失居有以虛宰多以少簡則可從易則不擾信及豚魚澤被億兆湛然司契坐一八表園陵既衛威靈赫赫子來既構寢廟奕奕武曰止戈戎不極役文教聿修有恥且格迹有遠邇感無高深道之所被改色革音皓獸馴苑素羽棲林殊柯通理異蒂同根方融玄液陶鑄斯民雲韶侯奏比屋思淳積祐莫應天罰奄臻太山穨溝洪瀆竭津何殃之甚何酷之殷自罹旻凶二氣代變霜繁廣除風回高殿帷幕空張肴俎虛薦極聽無聞詳視罔見人神道殊吉凶有禮龜筮參謀埏隧告啓史臣考吉警者在陛攀援忪忪惟兄及弟龍輿肅以引邁前騼紛以抗旒城闕儼以整列馳道亙以通修感乎昔之所幸豈斯路之復由挽哀唱以翼衡駟悲鳴而顧輈違華宇之晰晰即永夜之悠悠奉靈櫬而長訣緬終天而莫收訴穹蒼以叫踊洞五內其若抽儻性命之可贖甘人百於山丘茫茫大運靡始不終哲王遺世貴在道融昭哉我皇萬代流風良史式述德音永隆藝文類聚十三祭除聘士文豫章徐先生陶精太和誕膺一德藏器高栖確爾特立貞一足以制群動純本足以息浮末宣尼有言不事王侯高尚其事若先生者抑亦當之矣限茲遐路無由造敬係佇靈宇乃情依依故貢薄祀昭述宿心神而有靈儻垂尚饗藝文類聚三十八告廟議中朝大事告天地先郊後廟通典五十五答徐邈書詹事彈肅一宮如尚書令中丞矣藝文類聚四十九御覽二百四十五見傅咸彈孫詹事或云是宮或云坊或云寺此東宮中別有坊又中庶子稱坊詹事稱寺寺同於九卿耳坊是通名如天朝之稱臺省也藝文類聚六十二雜帖珉頓首頓首此年垂竟悲懷兼割不自勝奈何奈何寒切體中比何似甚耿耿僕疾遂不差眠食少憂深遣書不次王珉頓首頓首淳化閣帖二十八日珉白比二書暫至未更近問懸情不適以可不吾羸疾故爾憂深力書不具王珉敬問淳化閣帖二何如僕故頓弊力書不次王珉頓首頓首上下何如僕上下大都蒙恩得書至之吾云今欲出耳吾此月急遣草四是王濟祖日欲必赴卿可剋過明吾當下解相待餐出亦遣報既至王家畢卿可豫檄光公令作一頓美食可投其飯也王珉相報淳化閣帖一論序高座師帛尸梨蜜多羅春秋吳楚稱子傳者以為先中國後四夷豈不以三代之胤行乎殊俗之禮以戎狄貪婪無仁讓之性乎然而卓世之秀時生於彼逸群之才或侔乎茲故知天授英偉豈俟於華戎自此已來唯漢世有金日磾然日磾之賢盡於仁孝忠誠德信純至非為明達足論高座心造峰極交俊以神風領朗越過之遠矣高僧傳一立琅邪王丕議今立之於大行皇帝屬則兄弟凡奠祭之文皆稱哀嗣斯蓋所以仰參昭穆自同繼統在茲一人不以私害義專以所後為正今皇太后德訓弘著率母儀於內主上既纂業承統亦何得不述遵於禮通典八十疏夷庚未入乘輿旋館文選辨亡論注引臧榮緒晉書殷祭議有非常之慶必有非常之禮殷祭舊準不差蓋施於經常爾至於義熙之慶經古莫二雖曰反正理同受命愚謂履運惟新於是乎始宜用四月宋書禮志三通典四百十九元興三年領司徒王謐丹楊尹孟昶議與釋慧遠書年始四十七而衰同耳順釋藏輦九又百五答桓玄書明沙門不應致敬王者領軍將軍吏部尚書中書令武岡男王謐惶恐死罪奉誨及道人抗禮至尊并見與八座書具承高旨容音之唱辭理兼至近者亦粗聞公道未獲究盡尋何庾二旨亦恨不悉以為二論漏於偏見無曉然懕心處真如雅誨夫佛法之興出自天竺宗本幽遐難以言辨既涉乎教故可略而言耳意以為殊方異俗雖所安每乖至於君御之理莫不必同今沙門雖意深於敬不以形屈為禮迹充率土而趣超方內者矣是以外國之君莫不降禮良以道在則貴不以人為輕重也尋大法宣流為日諒久年踰四百歷代有三雖風移政易而弘之不異豈不以獨絶之化有用於陶漸清約之風無害於隆平者乎故王者拱己不悢悢於缺戶沙門保真不自疑於誕世者也承以通生理物存乎王者考諸理歸實如嘉論三復德音不能已已雖欲奉酬言將無寄猶以為功高者不賞惠深者忘謝雖復一拜一起亦豈足答濟通之德哉公眷眄末遺猥見逮問輒率陳愚管不致嫌於所奉耳願不以人廢言臨白反側謐惶恐死罪沙門不拜俗事一答桓玄難難曰沙門之敬豈皆略形存心懺悔禮拜亦篤於事答曰夫沙門之道自以敬為主但津塗既殊義無降屈故雖天屬之重形禮都盡也沙門所以推宗師長自相崇敬者良以宗致既同則長幼成序資通有係則事與心應原佛法雖曠而不遺小善一介之功執亦應之積毫成山義斯著矣難曰君道通生則理應在本在三之義豈非情理之極哉答曰夫君道通生則理同造化夫陶鑄敷氣功則弘矣而未有謝惠於所稟措感於理本者何良以冥本幽絶非物像之所舉運通理妙豈鹿亦之能酬是以夫子云可使由之不可使知之此之謂也難曰外國之加非所應喻佛教之興亦其旨可知豈不以六夷驕強非常教所化故大設靈奇使其畏服答曰夫神道設教誠難以言辨意以為大設靈奇示以報應此最影響之實理佛教之根要今若謂三世為虛誕罪福為畏懼則釋迦之所明殆將無寄矣常以為周孔之化救其甚弊故言迹盡乎一生而不開萬劫之塗然遠探其言亦往往可尋孝悌仁義明不謀而自同四時之生殺則矜慈之心見又屢仰仲由之問亦似有深旨但教體既殊故此處常昧耳靜而求之殆將然乎難曰君臣之敬逾敦於禮如此則沙門不敬豈得以道在為貴哉答曰重尋高論以為君道運通理同三大是以前條已粗言意以為君人之道竊同高旨至於君臣之敬則理盡名教今沙門既不臣王侯故徑與之廢耳難曰歷代不革非所以為證也曩者晉人略無奉佛沙門徒衆皆是諸胡且王者與之不接故可任其方俗不為之檢耳答曰前所以云歷有年代者正以客養之道要當有以故耳非謂已然之事無可改之理也此蓋言勢之所至非㦎然所據也故人不接王者又如高唱前代之不論或在於此也難曰此蓋是佛法之功非沙門傲誕之所益今篤以祗敬將無彌濃其助哉答曰敬尋來論是不誣佛理也但傲誕之迹有虧大化誠如來誨誠如來誨意謂沙門之道可得稱異而非傲誕今若以千載之未淳風轉薄橫服之徒多非其人者敢不懷愧今但謂自理而默差可遺人而言道耳前答云不以人為輕重微意在此矣難曰若以功深惠重必略其謝則釋迦之德為是深邪為是淺邪若淺邪不宜以小道而亂大倫若深邪豈得彼肅其恭而此弛其敬哉答曰以為釋迦之道深則深矣而瞻仰之徒彌篤其敬者此蓋造道之倫必資行功行功之美莫尚於此如斯乃積行之所因來世之關鍵也且致敬師長功猶難抑況擬心宗極而可替其禮哉故雖俯仰纍劫而非謝惠之謂也沙門不拜俗事一重答桓玄難奉告并垂重難具承高旨此理微細至難措言又一代大事應時詳盡下官才非拔幽特之研析具妙難精詣益增茫惑但高音既臻不敢默已輒復率其短見妄酬來誨無以啓發容致祗用反側願復詢諸道人通才蠲其不逮公云宗致為是何耶若以學業為宗致者則學之所學故是發其自然之性耳苟自然有在所由而稟則自然之本居可知矣今以為宗致者是所趣之至道學業者日用之筌蹄今將欲趣彼至極不得不徦筌蹄以自運耳故知所假之功未是其絶處也夫積學以之極者必階粗以及妙魚獲而筌廢理斯見矣公以為神奇之化易仁義之功難聖人何緣捨所易之實道而為難行之末事哉其不然也亦以明矣意以為佛之為教與內聖永殊既云其殊理則無並今論佛理故當依其宗而立言也然後通塞之塗可得而詳矣前答所以云仁善之行不殺之旨其若似可同者故引以就此耳至於發言抗論津徑所歸固難得而一矣然愚意所見乃更以佛教為難也何以言之今內聖所明以為出其言善應若影響如其不善千里違之如此則美惡應於俄頃禍福交於目前且為仁由己弘之則是而猶有棄正而即邪背道而從欲者矣況佛教喻一生於彈指期要終於永劫語靈異之無位設報應於未兆取之能信不亦難乎是以化暨中國悟之者鮮故本起經云正言似反此之謂也公云行功者當計其為功之勞何得直以珍仰釋迦而云莫尚於此邪請試言曰以為佛道弘曠事數彌繁可以練神成道非唯一事也至於存心無倦於事能勞珍仰宗極便是行功之一耳前答所以云莫尚於此者自謂擬心宗徹其理難尚非謂禮拜之事便為無取也但既在未盡之域不得不有心於希通雖一介之輕微必終斯之所須也公云君臣之敬皆是自然之所生理篤於情本豈是名教之事邪敬揖高論不容間然是以前答云君人之道竊同高旨者意在此也至於君臣之敬事盡揖拜故以此為名教耳非謂相與之際盡於創迹也請復重申以盡微意夫太上之世君臣已位自然情愛則義著化本於斯時也則形敬蔑聞君道虛運故相忘之理泰臣道冥陶故事盡於知足因此而推形敬不與心為影響殆將明矣及親譽既生茲禮乃興豈非後聖之制作事與時應者乎此理虛邈良難為辨如其未允請俟高亮沙門不拜俗事一三答桓玄難重虧嘉誨云佛之為教以神為貴神之明暗各有本分師之為理在於發悟至於君道則可以申遂此生通其為道者也而為師無駭通之美君有兼師之德弘崇主之大禮析在三之深淺實如高論實如高論下官近所以脫言鄙見至於往反者緣顧問既華不容有隱乃更成別辨一理非但習常之惑也既重研妙旨理實恢邈曠若發矇於是乎在承已令庾桓施行其事至敬時定公私幸甚下官瞻仰所悟義在擊節至於濠上之誨不敢當命也沙門不拜俗事一與靜媛等疏告誘靜媛靜儀靜婓此晦便當假葬永痛抽剝心情分割不自勝念汝等追痛摧慟纏綿斷絶何可堪任痛當奈何當復奈何遣涕不次廞疏淳化閣帖三洛都賦甚河東鹽池玉潔水鮮不勞煮沃成之自然書鈔一百四十六引王冀洛都賦乃王廙之誤雞頭溫水魯陽神泉不釁自沸熱若焦然爛毛爚卵煮絹濯鮮痿瘵痱疴浸之則痊功邁藥石勳著不言初學記七引兩條玉井球欄嶷若積霜正殿雙翼是曰雨堂初學記七肇建三市廛開疆理列肆雲曼修層高峙初學記二十四挈壼司刻漏樽瀉流仙吏秉尺隨水沈浮御覽二若乃暮春嘉禊三巳之辰貴賤同遊方驥齊輪麗服靚妝祓乎洛濱流芳塞路炫日映雲北堂書鈔一百五十五御覽三十若乃黃甘荔支殊口遠珍雖非土方之所産重九譯而來臻御覽九百六十六銅馬朱櫻房陵緗李御覽九百六十八豹祠赤杏胡並丹柿甘液滋脆不經牙齒御覽九百六十八九百七十一瓜則桂枝栝摟緑𤬞青肌消暑蕩穢解渴療飢御覽九百七十八思逸民賦左披文以遘話講六藝之宏敷文選褚淵碑文注笙賦其制器也則取不周之竹曾城之匏生懸崖之絶嶺邈崛崒以崇高延修頸以亢首厭瑤口之陸離舞靈蛟之素鱗銜明珠於帶垂弱舌紙薄鉛錘內藏合松臘以密際糅彤丹以發光藝文類聚四十四初學記十六金清而玉振初學記十六親昵遠遊登山送離發千里之長思詠別鶴於路岐同上直而不倨曲而不挑疏音簡節樂不乃妙足可以易俗移風興洽至教弘義著於典謨兮歷萬代而彌劭同上白兔賦并序白兔賦并序丞相琅邪王始受旄節作鎮北方仁風所被回面革心昔周旦翼成越裳重譯而獻白雉著在前典歷代以為美談今在我王匡濟皇維而有白兔之應可謂重規纍矩不忝先聖也藝文類聚九十五曰皇大晉祖宗重光固坤厚以為基兮廓乾維以為綱方將朝服濟江傳檄舊國反梓宮於舊塋兮奉聖帝乎洛陽建中興之遐祚兮與二儀乎比長於是古之有德則納瑞而求安無德則不勝而為災赤烏降於周文兮尚稱曰休哉桑穀生於殷庭兮中宗克已以成仁雊雉登夫鼎耳兮武丁責躬而教純初學記二十九春可樂春可樂兮樂孟月之初陽冰泮渙以微流土冒橛而解剛野暄卉以揮緑山蔥蒨以發蒼藝文類聚三御覽二十吉辰兮上戊明靈兮唯社百室兮必集祈祭兮樹下濯茆兮葅韭齧蒜兮劈鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可御覽五百三十二弱簟平端御覽七百人若乃良辰三祖祈始吉元華壇峻口羽蓋幢幡書鈔一百五十五奏中興賦上疏臣託備肺腑幼蒙洪潤爰自齠齓至於弱冠陛下之所撫育恩侔於兄弟義同於交友思欲攀龍鱗附鳳翼者有年矣是以昔忝濮陽棄官遠迹扶持老母攜將細弱越長江歸陛下者誠以道之所存願託餘庇故也天誘其願遇陛下中興當大明之盛而守局遐外不得奉瞻大禮聞問之日悲喜交集昔司馬相如不得覩封禪之事慷慨發憤況臣情則骨肉服膺聖化哉又臣昔嘗侍坐於先后説陛下誕育之日光明映室白毫生於額之左相者謂當王有四海又臣以壬申歲見用為鄱陽內史七月四星聚於牽牛又臣郡有枯樟更生及臣後還京都陛下見臣白免命臣作賦時琅邪郡又獻甘露陛下命臣嘗之又驃騎將軍導向臣説晉陵有金鐸之瑞郭璞云必致中興璞之爻筮雖京房管輅不過也明天之歷數在陛下矣臣少好文學志在史籍而飄放遐外常與桀寇為對臣犬馬之年四十三矣未能上報天施而愆負屢彰恐先朝露填溝壑今微情不得上達謹竭其頑獻中興賦一篇雖未足以宣揚盛美亦是詩人嗟嘆詠歌之義也晉書王廙傳書甘四日廙白唯久白想適妙來行未面遲想得七月十三日告藉之等近日遣王秋書不言月行復半念汝獨思不可堪居奈何奈何雨涼不差淳化閣帖一嫂何如汝所患遂差未懸心不可言阿母蒙恩上下悉佳宜可行瘧如復斷要取末斷愁人宜復具日發與別惘惘不可言今遣使未北反書不足白復會日消息廙疏淳化閣帖二宰我讚翩翩宰我首名言語志表義章英辭風舉初學記十七保傅針保傅之賢明宗國用寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二或容江充御覽二百六婦德針團團明月魄滿則缺亭亭陽暉曜過則逝天地猶有盈虧況華豔之浮孽是以淑女鑒之戰戰乾乾相彼七出順此話言懼茲屋漏畏斯新垣在昧無愧幽不改虔藝文類聚四十釋奠表伏承仰遵古典以今月吉日釋奠先聖率土臣民順風載悅臣宿嬰重患不獲陪列豫覩肅肅穆穆之容仰望雲漢伏枕欣慨初學記十四上疏薦沈徑臣當藩衛山陵式遏戎狄雖義督群心人思自奮然方翦荊棘奉宣國恩艱難急病非才不濟吳興男子沈徑清操著於鄉邦真固足以幹事且臣今西文武義故吳興人最多若令徑參臣府事者見人既悅義附亦衆徑父充昔雖得罪先朝然其門戶纍蒙曠蕩不審可得特垂沛然許臣所上否晉書忠義沈徑傳王胡之遷平北將軍司州刺史鎮洛陽上疏與庾安西箋此間萬頃江湖撓之不濁澄之不清而百姓投一綸下一筌者皆奪其魚器不輸十匹則不得放不知漆園吏何得持竿不顧漁父鼓枻而歌滄浪也御覽八百三十四遺從弟洽書弟今二十九便居清顯要任敢不敬以先旨為弟啓義讓之路焉若吾年至四五十之間雖復朝廷超登公輔亦非吾所豫況降此以還者邪御覽二百二十引晉陽秋
