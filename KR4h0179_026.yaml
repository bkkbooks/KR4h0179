body:
  text: 卷二十六王羲之雜帖雜帖五羲之死罪小大悉以來未惶不可懷未復咨誨問懸情計賓命行應至遲下公還具承問妹極得散力以為至慰期等故爾耳因緣不多白羲之死罪不審定何日當北遇信復白遲承後問伏想清和士人皆佳適桓公十月末書為慰云所在荒甚可憂殷生數問北事勢復云何想安西以至能數面不或云頓歷陽爾耶無緣同為歎遲知問運民不可得而要當得甚慮叛散頃為此足勞人意八日羲之頓首多日不知君問得一昨書知君安善為慰僕比小差而疲劇昨若耶觀望乃苦輿上隱痛前後未有此也然一日一昔勞復不極以此為慰耳力不鄉里人樂著縣戶今送其名可為領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麵亦不以為佳亦自勞弊散係轉久此亦難以求泰不去人間而欲求方外此或速弊皆如君言便大熱足下晚可耳甚患此熱力不具王羲之白此書因周常侍想必至吾惟辨辨便知無復日也諸懷不可言知彼人已還吾此猶有小小往來不欲來者其野近當往就之耳不大思其方不見可久理而任之者悠然此可歎息得西問無他想彼人甚平安此粗佳玄度來數日為慰中郎女頗有所向不今時婚對自不可復得僕德意君頗冷不大都此亦當在君耶發瘧比日疾患欲無賴未面邑邑反不具王羲之白得書知問腫不差乏氣忽忽面近羲之報足下各如常昨還殊頓胸中淡悶于嘔轉劇食不可強疾高難下治乃甚憂之力不具王羲之得書知足下問吾既不佳賢內妹未差延期須狼毒市求不可得足下或有者分三兩停須故示得書知問吾夜來腹痛不堪見卿甚恨想行復來修齡來經日今在上虞月末當去重熙旦便西與別不可言不知安所在未審時意云何甚令人耿耿闊轉久勞想豈舍知足下常同之卒未近緣如何足下數令知問十一月四日羲之白冬中感懷深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食經日甚為虛頓力及不具王羲之白周益州送此卭竹杖鄉尊長或須今送不得執手此恨何深足下各自愛數惠告臨書悵然阮公故爾可憂時放恕大事今令速言何方守篤大灸不得力而從事以至甚無計自必出惟須小佳鐵石今出求救足下可復助且令得通家月末當至止虞妹亦俱去此蒸濕難為人得示知足下故爾堪行想不成病耳吾至無賴行剋王羲之頓首不得西問耿耿丘令送此宅圖云可得卌畝爾者為佳可與水丘共行視佳者決便當取問其賈謝生多在山下不復見且得書疾惡冷耿耿想數知問雖能還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔罔飛白不能乃佳意乃篤好此書至難或作復與卿羲之白昨故遣書當不相遇知君還喜慰足下時行想今善除猶耿耿僕時行以十一日而不除如比日便成委頓今日猶當小勝不知能轉佳不積不卿至劣劣力還不具王羲之白不審復何以永日多少看未九日當採菊不至日欲其行也但不知當晴不耳倫等還殊慰意增慨知足下疾患小佳當惠緣想示能果遲此善散非直思想而已也尋復有問足下以數示由為諸力不具月半哀感奈何奈何念邑邑罔極之至不可居處比日何似痺差不悒悒力知問王羲之頓首知彼乃爾切切汝乃獨坐但有憂邑懸遠不能得遣人且吾無復久意果去當南視汝等也一昨得安西六日書無他無所知說故不復付送讓都督表亦復常言耳如兄子書道嵩自必果今復與書督之足下勑令至并與遠書也尊夫人不和想小耳今以佳念纍息卿佳不吾故劣劣力知問王羲之敬問日五期結極以大先師之言皆著推此言之無驗如此事君當欲知故及宜停宅三月十六日羲之白一昨省不悉雨快君可不萬石轉差也灸得力不不得後問懸悒不知懷君云當有旨信遲望其至僕劣劣故遣不具還具示王羲之取卿女壻為長史休種知何似耿耿適欲遣書云得示知足下得涼以為佳甚慰知多疾患念勞心吾故不欲食比來以為事恐不可久邑邑思面行故果之王羲之此郡之弊不謂頓至於此諸逋滯非復一條獨坐不知何以為治自非常才所濟吾無故舍逸而就勞歎恨無所復及耳夏人事請託亦所未免小卻冀得小差頃日當何理想佳卿以得速還欲令今早去時反也省書增感切及反不具羲之報念足下罔戀之至不可居處白此已具委也前卻食小差數數便得疾政由不消化故二月草日羲之頓首二旬期等小祥日近傷悼深至切割心情奈何奈何近得告為慰力及數字王羲之羲之白昨得期書知君可耳百姓之命倒懸吾夙夜憂此時既不能開倉庾賑之因斷酒以救民命有何不可而刑猶至此使人歎息吾復何在便可放之其罰謫之制宜嚴重可如治日每知卿同在民之主卿事時了甚快群凶日夕云云此使鄴下一日為戰場極令人惆悵豈復有慶年之樂耶思卿一面無緣可歎可歎今往絲布單衣財一端示致意去夏得足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下遠惠之至胡母氏從妹平安故在永興居去此七十也吾在官諸理極差頃比復勿勿來示云與其婢問來信不得也知虞帥云桓公以至洛即摧破羌賊賊重命想必禽之王略始及舊都使人悲慨深此公威略實著自當求之於古真可以戰使人歎息知仁祖小差此慰可言適范生書如其語無異故須後問為定今以書示君虞義興適送此桓公摧寇罔不如志今以當平定古人之美不足比蹤使人歎慨無以為喻適知十五日問清和為慰復得南後問不想二庾速王之始興奴長就令人邑邑想無所至耳還具示問昨方回遂舉為侍中不知卒行不云相意未許爾者為佳比得其書云山海間民逃亡殊異永嘉乃以五百戶去深可憂深可憂此間不得至比足下郡內云何糧運日廣遠恐此不弊不已羲之報二謝致喪興公近便索然玄度來數日有疾患便復來阿萬小差阮公政耿耿懷祖可呼賀祭酒俱謝書云云今送二族舊對故欲結援諸葛若以家窮自當供助昏事欲速知決阮生何如此粗平安數問為慰大都夏冬自可足麥秋輒有違此亦人之常期等平安在此羸小差知諸賢佳數見范生亦得玄近書為慰又得孔郗王書亦云不能數何爾須江生可耳斷絶也尚未見傳女足下言極是有懷甚佳二月草日羲之白不可言得六日告為慰寒想各安善司馬與無還問耿耿僕可耳力不具王羲之白草二日羲之報近得書即日又得永興書甚慰想在道可耳吾疾故爾沈滯憂悴解日面近不具羲之報近日東陽絶無常憂心何可言想足下當盡能致敬和在彼尚來議還增耿耿數有想常達還此不快鄙人得夏常爾公為爾差念足下小大佳憂卿可耳想同數得問官奴婦産復委篤憂之深餘粗可耳知足下念差免憂之不具羲之白羲之頓首昨得書問所疾尚綴綴既不能眠食深憂慮懸吾情至不能不委嫂故不差豹奴晚不歸家隨彼弟向州也前書云至三月間到之何能盡情憂足下所惠極為慰也不謂也鶻等不佳令人斃見此輩吾衰老不復堪此服食而在人間此速弊分明且轉衰老政可知乃欲與彥仁集界上甚佳諸如此事皆所欣也平自可耳何所咨人外將何必拘小繩墨且令吳興不出界當可耳便因餘杭而行耶不自此會再舉難也君便可以僕書示之但俗多怪且在草澤者為爾扇動縱任恐惡之者衆源日有書徑此界中而值吾病不得見之萬恨萬恨似從魚浦不知何日當進足下必得見之也賢姊體中勝常想不憂也白屋之人復得遷轉極佳未委幾人吾齲痛所作讚又恐不任當示殷也十一月十三日羲之頓首頓首頃遘姨母哀哀痛摧剝情不自勝奈可奈何因反慘塞不次王羲之頓首頓首十二日告李氏甥得六日書為吾劣劣力不一一羲之白比奉對對兄以釋豈一汝不可言未知集聚日但有慨歎各慎護前與嫂試求屏風遂不得答為也十月五日羲之忽有感情兼深足下得不可至前得足下似行一書為慰故不適足下昨還如常耳雖不得旨問遠得足下書輒具問為慰吾頃胸中惡不欲食積日勿勿五日來小差七日羲之白三月十三日羲之頓首近反亦至念足下哀悼之至不可勝更寒外足下何如吾劣劣力遣知問王羲之頓首初月十三日山陰羲之報近欲遣此書停行無人不辨遣信昨至此且得去月十六日書雖遠為慰過囑卿佳不吾諸患殊劣劣方涉道憂悴力不具羲之報隔日不面懸遲何極計足下須人兼具此等事勢速令垂報也重告慰情吾腹中小佳體痺乏氣便轉差深以為慰慰足下意也王羲之頓首羲之白不審尊體比復何如遲復奉告羲之中冷無賴尋復白羲之白羲之頓首快雪時晴佳想安善未果為結力不次王羲之頓首山陰張侯舊志志道意甚勤至不知為盡心朝夕而已有所希耳一自任之耳當以君書示九日以當力見祠物當治護信到便遣來忽忽善錯也思言敘卒何期但有長歎念告信云舍子別送乃是北方物也何以欲此欲幾許奉橘三百枚霜未降未可多得白石枕殊佳物深感卿至裹鮓味佳令致君所須可示勿難當以語虞令紙筆精要深念貌至一物而無所出後信酬數日雨冷腎氣㾏腰復嗽動靜遇風緊陂湖泛漲船不可渡勿訝謝光祿鵝在山下懸情可愛羲之遣損惠野鴨一雙秋來未得始是嘗新遠能分遣但深佩耶二謝節日縈牽少睡鄿茶微炙善佳令姊差耶石首鯗食之消瓜成水此魚腦中有石如棊子野鴨亦有云此魚所化乾蝸青黛主風搐搦良鸕鷀糞白去䵟𪒟瘢黶令人色態此禽不卵生口吐其雛獨為異耳鷹嘴爪炙入麝香煎酥酒一盞服之治痔瘻有驗十七日羲之頓首又巴焦小服鼓酒至佳數用有驗直以純酒漬豉令汁濃便飲多少任意石脾入水即乾出水便濕獨活有風不動無風自搖天下物理豈可以意求惟上聖乃能窮理治頭悶或患癰腫頭不即潰者以此藥帖之皆良麻巴豆薰陸石芎窮松脂六物搗如米粒許少加其分頭悶處先其巴豆三分減一松脂剃去髮方寸以帛帖藥當病上帖之周時帖刮上爛皮以生麻油和石塗上當有黃水出為佳羲之上荷華想已殘處此過四夏到彼亦屢而獨不見其盛時是亦可訝豈亦有緣耶弊宇今歲植得千葉者數盆亦便發花相繼不絶今已開二十餘枝矣頗有可觀恨不與長者同賞相望雖不遠披對邈未可期伏可勝悵惘耶想清和士人佳也此平安安不過停數日日無為樂益增想想孔長史安善足下令知問纍有書也足下入年哀得俱還不思以事為歲州民王羲之死罪賢弟逝沒甚痛奈何白箋不備羲之頓首太尉門左不可言同此酸慨小大何如二妹佳為慰諸舍可何新婦委頓態人期弟各可不想今日能書暮必來宿也若宜日思夏羲之報諸賢子粗足自枝注示吾弱息毀弊大兒恆救命足令人心燋先是之歡於今皆為哀苦自非復衰年所堪豈復以既往纍心率事自難為懷如之何卿女母子粗平安喪際賢女動氣疾當時乃勿勿今以除也他等皆知孝思先日之歡於今皆為哀苦觸事切人處此而能令哀惻不經於心殆空語耳一至於此何所復言此粗平安修載來十餘日諸人近集存想明日當復悉來無由同增慨東比何為慰郎以也謝諸子往矣如何得書知足下問何萬來一昔不得眠便大乏足下念王羲之勞人意以書示妹汝母不多書尋更有信也致履足下各一量當嘗長久此草書嘗多勞亦知足下書字字新奇點點圓轉美不可再書得足下間下比來遲遲終不可也之果云云服足下五色石膏散身輕行動如飛也足下更與下七致之不治多少尋面言之委曲之事實亦人尋過江言散舊京先墓毀動奉諱號慟五內若割痛當奈何奈何王羲之頓首頓首頃日親親徑過諸婚經恤體力不復堪之故未復遣信耳二月二日汝婦母一夜亡親親傷怛汝不可言問足下旨為致誠答今旨意致來勿忘此意自決今以資嚴知不大疾患念勞心三月三日蘭亭詩序永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修褉事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一詠亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以游目騁懷足以極視聽之娛信可樂也夫人之相與俯仰一世或取諸懷抱悟言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣于所遇暫得于己快然自足曾不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間已為陳迹猶不能不以之興懷況修短隨化終期于盡古人云死生亦大矣豈不痛哉每覽昔人興感之由若合一契未嘗不臨文嗟悼不能喻之于懷固知一死生為虛誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列敘時人録其所述雖世殊事異所以興懷其致一也後之覽者亦將有感于斯文臨河敘永和九年歲在癸丑暮春之初會於會稽山陰之蘭亭修褉事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次是日也天朗氣清惠風和畼娛目騁懷信可樂也雖無絲竹管絃之盛一觴一詠亦足以畼敘幽情矣故列序時人録其所述右將軍司馬太原孫丞公等二十六人賦詩如左前餘姚令會稽謝勝等十五人不能賦詩罰酒各三斗世說企羡篇注遊四郡記永寧縣界海中有松門西岸及嶼上皆生松故名松門藝文類聚八十八又御覽九百五十三為會稽內史稱疾去郡於父墓前自誓文維永和十一年三月癸卯朔九日辛亥小子羲之敢告二尊之靈羲之不天夙遭閔凶不蒙過庭之訓母兄鞠育得漸庶幾遂因人乏蒙國寵榮進無忠孝之節退違推賢之義每仰詠老氏周任之誡常恐斯亡無日憂及宗祀豈在微身而已是用寤寐永歎若墜深谷止足之分定之於今謹以今月吉辰肆筵設席稽顙歸誠告誓先靈自今之後敢渝此心貪冒苟進是有無尊之心而不子也子而不子天地所不覆載名教所不得容信誓之誠有如曒日書論夫三端之妙莫先乎用筆六藝之奧莫若乎銀鉤昔秦丞相李斯見周穆王書七日興歎患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出群故知達其源者少暗其理者多近代以來多不師古緣情棄道才記姓名學不該贍聞見又寡致使成功不就虛費精力自非通靈感物不可與談斯道矣今刪李斯筆妙更加潤色總七條并作其形容列事如左貽諸子孫永為模範庶將來君子時復覽焉要先取崇山絶仞中兔毛八月九月收之筆頭長一寸管長五寸鋒齊要強者硯取煎涸新石潤澀相兼又浮津耀墨者其墨取廬山之松煙代郡之鹿角膠十年已上強如石者紙取東陽魚卵虛柔滑淨者然後靜神慮思揮襟作之先學執筆若真書去頭二寸一分若行草書去頭三寸一分執之下墨點畫芟波屈曲真草皆須盡一身之力而送之若初學先大書不得從小善鑒者不寫善寫者不鑒善筆力者多骨不善筆力多肉多骨微肉者謂之筋書多肉微骨者謂之墨豬多力豐筋者勝無力無筋者病一一從其消息而用之若作橫畫必須隱隱然可畏若作蹙鋒如長風忽起蓬勃一家若飄散離合如雲中別鶴遙遙然若作引戈如百鈞弩發若作抽針如萬歲枯藤若作屈曲如武人徑弩斤節若作波如崩浪雷奔若作鉤如山將岌岌然夫執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能豎者心手不齊意後筆前者敗若執筆遠而急心前筆後者勝又有十一種結搆員滿如篆法飄揚灑落如章草凶險可畏如八分窈窕出入如飛白耿介峙立如鶴頭鬱跋縱橫如古隸盡心存委曲每為字各一象其形斯道妙矣書道畢矣永和四年於上虞製記墨池編題衛夫人筆陳圖後夫紙者陳也筆者刀矟也墨者鍪甲也水硯者城池也心意者將軍也本領者副將也結構者謀略也揚筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先乾研墨凝神靜思預想字形大小偃仰平直振動令筋脈相連意在筆前然後作字若平直相似狀如算子上下方整前後齊平此不是書但得其點畫爾昔宋翼常作此書翼是鍾繇弟子繇乃叱之翼三年不敢見繇潛心改迹每畫一波常三過折筆每作一點常隱鋒而為之每作一橫畫如列陳之排雲每作一戈如百鈞之弩發每作一點如高峰墜石屈折如鋼鉤每作一牽如萬歲枯藤每作一放縱如驚蛇之透水翼先來書惡晉太康中有人於許下破鍾繇墓遂得筆勢論翼乃讀之依此法學名遂大振欲真書及行書皆依此法若欲學草書又有別法須緩前急後字體形勢狀等龍蛇相鉤連不斷仍須稜側起復用筆亦不得使齊平小大一等每作一字須有點處且作餘字總竟然後安點其點須空中遙擲筆作之其草書亦須象篆勢八分古隸相雜亦不得急令墨不入紙若急作意思淺薄筆即直過雖有章草及章程行押等不用此勢但用擊石波而已其擊石波者缺波也又八分更有一波謂之隼尾波其鍾公泰山銘及魏文帝受禪碑中已有此體夫書先須引八分章草入隸字中發人意氣若直取俗字不能先發羲之少學衛夫人書將謂大能及渡江北遊名山比見李斯曹喜等書又之許下見鍾繇梁鵠書又之洛下見蔡雍石經三體書又於從兄洽處見張昶華嶽碑始知學衛夫人書徒費年月爾羲之遂改本師仍於衆碑學習遂成書耳時年五十有三或恐風燭奄及聊遺教於子孫耳可藏石室千金勿傳永和十四年四月十三日書月儀日往月來元正首祚太簇告辰微陽始布罄無不宜和神養素筆經漢時諸郡獻兔毫出鴻都惟有趙國毫中用時人咸言兔毫無優劣管手有巧拙初學記二十一有人以緑沈漆竹管及鏤管見遺録之多年斯亦可愛玩詎必金寶雕琢然後為寶也初學記二十一昔人或以琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣初學記二十一采毫竟以麻紙裹柱根次取上毫薄薄布令柱不見然後安之初學記二十一
