body:
  text: 卷四十六傅玄鸚武賦奇毛曜體綠采含英鳳翔鸞踦孔質翠榮懸赬分于丹足婉朱咮之熒熒發言輒應若響追聲藝文類聚九十一初學記三十鬭雞賦玄羽黝而含曜兮素毛穎而揚精紅縹廁于微黃兮翠彩蔚而流清五色錯而成文兮質光麗而豐盈前看如倒傍視如傾目象規作觜似削成高膺峭峙雙翅齊平擢身竦體怒勢橫生爪似鍊鋼目如奔星揚翅因風撫翮長鳴猛志橫逸勢淩天廷或躑躅踟躕或蹀躡容與或爬地俯仰或撫翼未舉或狼顧鴟視或鸞翔鳳舞或佯背而引敵或畢命于強禦于是紛紜翕赫雷合電擊爭奮身而相戟兮竟隼鷙而鵰睨得勢者淩九天失據者淪九地徒觀其戰也則距不虛挂翮不徒拊意如飢鷹勢如逸虎藝文類聚九十一初學記三十鷹兔賦兔謂鷹曰汝害于物有益于世華髦被札彤管以制初學記二十一秋霜一下蘭艾俱落乘輿馬賦并序乘輿馬賦并序往日劉備之初降也太祖賜之駿馬使自至廄選之歷名馬以百數莫可意者次至下廄有的顱馬委棄莫視瘦悴骨立劉備撫而取之眾莫不笑之馬超破蘇氏塢塢中有駿馬百餘匹自超已下俱爭取肥好者而將軍龐惪獨取一騧馬形觀既醜眾亦笑之其後劉備奔于荊州馬超戰于渭南逸足電發追不可逮眾乃服焉御覽八百九十七目若曜星符采橫發高顛縣日雙壁象月頭似削成鬣似植髮延首高驤擢足軒跱氣蓋青雲勢凌萬里九方不能測其天機秦公不能究其妙理藝文類聚九十三繁姿屢發文選舞鶴賦注形便飛燕勢越驚鴻文選赭白馬賦注用之軍國則文武之功顯同上文榮其德武耀其威同上紫蓋飄以連翩文選顏延之元皇后哀策文注又沈約安陸王碑文注揮沬成霧流汗如珠初學記二十九馳射馬賦何逸群之奇駿生濛氾之遐濱附南方以定位表天駟于三辰儀乾行之剛健憑坤厚以託身豈驥德之足慕睎萬里之清塵藝文類聚九十三百馬齊興六驥孔閑金銜玉羈文勒鏤鞍明珂景朗華䩸采鮮御覽三百五十八三百五十九佷如革戾如膠鞭裁向腹奮尾跳尻御覽三百五十九耳小易使鼻大勢怒往來若鷹鷂超騰如逸虎御覽八百九十七良馬賦奮亹沛艾虎據麟跱望雲睇景乘虛四起縱鞍則行攬鞚則止御覽三百五十八金羈在首發以明珂鏤鞍采䩸織勒含華御覽三百五十九鞭不得搖手不及動忽然增逝肉飛骨踴同上飾以金羈申以玉纓結以輕軒節以和鈴同上走狗賦蓋輕迅者莫如鷹猛捷者莫如虎惟良犬之稟性兼二儁之勁武應天人之景暉順儀象而近處憑水木之和氣鍊金精以自輔統黔喙于秋方君太素之內寓諒韓盧其不抗豈晉獒之能禦既乃濟盧泉涉流沙踰三光跨大河希代來貢作珍皇家骨相多奇儀表可嘉足懸鉤爪口含素牙首類驤螭尾如騰虵修頸闊腋廣前捎後豐顱促耳長叉緩口舒節急筋豹耳龍形蹄如結鈴五魚體成勢似淩青雲目若泉中星轉視流光朱曜赤精震茹黃而慴宋鵲兮越妙古而揚名于是尋漏跡躡遺蹤形疾騰波勢如駭龍邈朝烏之輕機兮絕毚獸之逸軌漂星流而景屬兮逾窈冥而騰起陵岡越壑橫山超谷原無遁兔林無隱鹿顧芷隰以嬉游兮步蘭皋而騁足然後娛志苑囿逍遙中路屬精采以待蹤逐東郭之狡兔裔洋洋以衍衍逞妙觀于永路既迅捷其無前又閑暇而有度樂極情遺逸足未殫抑武烈而就羅兮順指麾而言旋歸功美于執絏兮其槃瓠之不虞感恩養而懷德兮願致用于後田聆輶車之鸞鑣兮逸猲獢而盤桓藝文類聚九十四初學記二十九猨猴賦余酒酣耳熱懽顏未伸遂戲猴而縱猿何瓌畋之驚人戴以赤幘襪以朱巾先裝其面又丹其脣揚眉蹙額若愁若瞋或長眠而抱勒或嚄咋而𪗳齗或顒仰而踟躕或悲嘯而吟呻既似老公又類胡兒或低眩而擇颯或抵掌而胡舞藝文類聚九十五初學記二十九蟬賦美茲蟬之純潔兮稟陰陽之微靈含精粹之貞氣兮體自然之妙形潛玄昭于后土兮雖在穢而逾馨經青春而未育兮當隆夏而化生忽神蛻而靈變兮奮輕翼之浮征翳密葉之重陰兮噪閑樹之肅清緣長枝而仰觀兮吸渥露之朝零泊无為而自得兮聆商風而和鳴聲嘒嘒以清和兮遙自託乎蘭林嗟群吟以近唱兮似簫管之餘音清擊畼于遐邇兮時感君之丹心初學記三十擬天問七月七日牽牛織女時會天河北堂書鈔一百五十五初學記四御覽八月中何有白兔擣藥御覽四天高而浮地焉所由胃行而如始於牽牛景曜日靈玄鳥攸生月為陰水白兔之形擬招魂雕楹文桷結修梁增臺列榭別有望設畫屏風文繡班上紀開闢圖自然北堂書鈔一百三十二屏風四合銘鄧錯班蘭膏明發相年所藻同上賀老人星表老人星見煇景光明聖主壽延享祚元吉自天之祐莫不抃舞藝文類聚一老人星見體色光明嘉占元吉弘無量之祐隆克昌之祚普天同慶率土含歡同上掌諫職上疏臣聞先王之臨天下也明其大教長其義節道化隆于上清議行于下上下相奉人懷義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通遠而天下賤守節其後綱維不攝而虛無放誕之論盈于朝野使天下無復清議而亡秦之病復發于今陛下聖德龍興受禪弘堯舜之化開正直之路體夏禹之至儉綜殷周之典文臣詠歎而已將又奚言惟未舉清遠有禮之臣以敦風節未退虛鄙以懲不恪臣是以猶敢有言晉書傅玄傳通典十四泰始初又議攷課散騎常侍傅玄皇甫陶以為政教穨敝風俗不淳上疏云云又見御覽六百二十三上疏陳要務臣聞舜舉五臣無為而化用人得其要也天下群司猥多不可不審得其人也不得其人一日則損不貲況積日乎典謨曰無曠庶官言職之不可久廢也諸有疾病滿百日不差宜令去職優其禮秩而寵存之既差而後更用臣不廢職于朝國無曠官之累此王政之急也臣聞先王分士農工商以經國制事各一其業而殊其務自士已上子弟為之立太學以教之選明師以訓之各隨其才優劣而授用之農以豐其食工以足其器商賈以通其貨故雖天下之大兆庶之眾無有一人遊手在其閒分數之法周備如此漢魏不定其分百官子弟不修經蓺而務交遊未知莅事而坐享天祿農工之業多廢或逐淫利而離其事徒繫名于太學然不聞先王之風今聖明之政資始而漢魏之失未改散官眾而學校未設游手多而親農者少工器不盡其宜臣以為宜亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已尊儒尚學貴農賤商此皆事業之要務也前皇甫陶上事欲令賜拜散官皆課使親耕天下享足食之利禹稷躬稼祚隆後世是以明堂月令著帝籍之制伊尹古之名臣耕于有莘晏嬰齊之大夫避莊公之難亦耕于海濱昔者聖帝明王賢佐俊士皆嘗從事于耕農矣王人賜官宂散無事者不督使學則當使耕無緣放之使坐食百姓也今文武之官既眾而拜賜不在職者又多加以服役為兵不得耕稼當農者之半南面食祿者參倍于前使宂散之官為農而收其租稅家得其實而天下之穀可以無乏矣夫家足食為子則孝為父則慈為兄則友為弟則悌天下足食則仁義之教可不令而行也夫為政之要計民而置官分民而授事士農工商之分不可斯須而廢也若未能精其防制計天下文武之官足為副貳者使學其餘皆歸之于農若百工商賈有長者亦皆歸之于農務農若此何有不贍乎虞書曰三載考績三考黜陟幽明是為九年之後乃有遷敘也故居官久則念立慎終之化居不見久則競為一切之政六年之限日月淺近不周黜陟陶之所上義合古制惟陛下裁之夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也仲尼有言人能弘道非道弘人然則尊其道者非惟尊其書而已尊其人之謂也貴其業者不妄教非其人也重其選者不妄用非其人也若此而學校之綱舉矣前春樂平太守曹志上欲為博士置卒史此尊儒之一隅也主者奏寑之今志典千里臣等竝受殊寵雖言辭不足以自申意在有益主者請寑多不施用臣恐草萊之士雖懷一善莫敢獻之矣晉書傅玄傳又群書治要三十引晉書又通典十四又十九水旱上便宜五事疏臣聞聖帝明王受命天時未必無災是以堯有九年之水湯有七年之旱惟能濟之以人事耳故洪水滔天而免沈溺野無生草而不困匱伏惟陛下聖德欽明時小水旱人未大飢下祗畏之詔求極意之言同禹湯之罪己侔周文之夕惕臣伏懽喜上便宜五事其一曰耕夫務多種而耕暵不熟徒喪功力而無收又舊兵持官牛者官得六分士得四分自持私牛者與官中分施行來久眾心安之今一朝減持官牛者官得八分士得二分持私牛及無牛者官得七分士得三分人失其所必不懽樂臣愚以為宜佃兵持官牛者與四分持私牛與官中分則天下兵作懽然悅樂愛惜成穀無有損棄之憂其二曰以二千石雖奉務農之詔猶不勤心以盡地利昔漢氏以墾田不實徵殺二千石以十數臣愚以為宜申漢氏舊典以警戒天下郡縣皆以死刑督之其三曰以魏初未留意于水事先帝統百揆分河堤為四部并本凡五謁者以水功至大與農事竝興非一人所周故也今謁者一人之力行天下諸水無時得徧伏見河堤謁者車誼不知水勢轉為他職更選知水者代之可分為五部使各精其方宜其四曰古以步百為畝今以二百四十步為一畝所覺過倍近魏初課田不務多其頃畝但務修其功力故白田收至十餘斛水田收數十斛自頃以來日增田頃畝之課而田兵益甚功不能修理至畝數斛已還或不足以償種非與曩時異天地橫遇災害也其病正在于務多頃畝而功不修耳竊見河堤謁者石恢甚精練水事及田事知其利害乞中書召恢委曲問其得失必有所補益其五曰臣以為胡夷獸心不與華同鮮卑最甚本鄧艾苟欲取一時之利不慮後患使鮮卑數萬散居人閒此必為害之勢也秦州刺史胡烈素有恩信于西方今烈往諸胡雖已無惡必且消弭然獸心難保不必其可久安也若後有動釁烈計能制之惟恐胡虜適困于討擊便能東入安定西赴武威外名為降可動復動此二郡非烈所制則惡胡東西有窟穴浮游之地故復為患無以禁之也宜更置一郡于高平川因安定西州都尉募樂徙民重其復除以充之以通北道漸以實邊詳議此二郡及新置郡皆使并屬秦州令烈得專御邊之宜晉書傳玄傳正朔服色議帝王受命應厤禪代則不改正朔遭變征伐則改之舜正月上日受終于文祖無改正之文唐虞正朔皆同明矣至殷周革命乃改魏受漢禪亦已不改至于服色皆從其本唯節幡用黃大晉以金德王天下順五行三統之序矣通典五十五五祀議禮大記云室中央中霤謂四霤之中也祭于漏井蓋失之矣七祀之文皆云祀行而無井祭竈而不祭井于事則闕夫設祀者非但報功而已亦神道設教使民慎之幽明也臣以為帝之都城宜祭一門正宮一門正室一戶井竈中霤亦各擇其一正者祭之御覽五百二十九客難振筆若天文運思若回雲七謨并序七謨并序昔枚乘作七發而屬文之士若傅毅劉廣世崔駰李尤桓麟崔琦劉梁桓彬之徒承其流而作之者紛焉七激七興七依七款七說七蠲七舉七設之篇于是通儒大才馬季長張平子亦引其源而廣之馬作七厲張造七辨或以恢大道而導幽滯或以黜瑰奓而託諷詠揚輝播烈垂于後世者凡十有餘篇自大魏英賢迭作有陳王七啟王氏七釋楊氏七訓劉氏七華從父侍中七誨竝陵前而邈後揚清風于儒林亦數篇焉世之賢明多稱七激工餘以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙哉吾無閒矣若七依之卓轢一致七辨之纏緜精巧七啟之奔逸壯麗七釋之精密閑理亦近代之所希也藝文類聚五十七御覽五百九十辯論鋒起𢲘虎摩龍御覽四百六十四佩崑山之美玉珥南海之明璫北堂書鈔一百三十五御覽七百十八公子曰三禾九變五味八珍玄水朱火蕙藉桂薪烹以九九之鼎調以伊摯之倫北堂書鈔一百四十二輕椒丹橘素薑紫蘭書鈔一百四十二和宮適甜撫角調酸書鈔一百四十二炰珠厓之麋鱉臛東海之游黿書鈔一百四十二又一百四十四一百四十五爚鳳皇之胎膾飛龍之肝五黃千品桂蠹熊蹯升撥馥不可勝原書鈔一百四十二初學記二十六彫胡之飯糅以游粱香秔九折穱䵂若霜書鈔一百四十四膏液荑柔合潤流芳書鈔一百四十四乃有三牲之和羹蕤賓之時麪忽游水而長引進飛羽之薄衍細如蜀繭之緒靡如魯縞之綫書鈔一百四十四引兩條膾錦膚臠斑胎飛刀浮切豪分縷解流采成文燁若紅綺動從風聚散如霧委書鈔一百四十四引三條于是乃有蒼梧之九醞中山之醇清名酎出於咸陽甘醪貢於宜城浮蟻雲沸淵亭逸味橫生書鈔一百四十八引兩條淵藪無不杖之歎書鈔十一連珠序連珠序所謂連珠者興于漢章帝之世班固賈逵傅毅三子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指說事情必假喻以達其旨而賢者微悟合于古詩勸興之義欲使歷歷如貫珠易觀而可悅故謂之連珠也班固喻美辭壯文章弘麗最得其體蔡邕似論言質而辭碎然其旨篤矣賈逵儒而不豔傅毅文而不典藝文類聚五十七初學記二十一御覽五百九十擬四愁詩序張平子作四愁詩體小而俗七言類也聊擬而作之名曰擬四愁詩魏德頌朱旗翳天玄甲炤路戎車萬駟逸驥千群孫武古今畫贊孫武論兵實妙于神奇正迭用變化無形北堂書鈔一百十三信陵君信陵先虎視龍驤謀嬴奮駭雷動北疆北堂書鈔一百十五漢高祖赫赫漢祖受命龍興五星協象神母告徵討秦滅項如日之升超從側陋光據萬乘藝文類聚十二漢明帝肅矣孝明仗法任刑勤綜萬機察下以情未弘道治用致太平專信俗儒非禮之經藝文類聚十二楊阜序君構潛謀以龍變應事機而虎發山西二水獲安者則君之勳也北堂書鈔一百十五太常趙咨并序天下信之如日月仰之如雲雨仁風翔于路衢禮讓行乎士女升光祿時亮天工四門順軌北堂書鈔三十九又五十三班婕妤斌斌婕妤履正修文進辭同輦以禮匡君納侍顯德讜對解紛退身避害志邈浮雲藝文類聚十五明德馬皇后明德馬后執貞履素光崇六行動遵禮度作后作母帝諮厥謀國賴內訓家應顯祚藝文類聚十五太子少傅箴夫金水無常方圓應形亦有隱括習以性成故近墨者黑聲和則響清形正則影直正人在側德義盈堂鮑肆先入蘭蕙不芳傅臣司訓敢告君王初學記十八御覽二百四十四吏部尚書箴明明王範制為九服君執常道臣有定職各有攸司乂用不慝貴無常尊賤不恆卑不明厥德國用顛危昔舜舉禹咎繇而雋乂在官夔龍出入朕命湯舉阿衡而不仁流屏周仲山甫亦允納言且表正而象平日夕而景側處喉舌者患銓衡之無常不患于不明故曰無謂隱微廢公任私無好自專違眾取怨是以古之君子無親無疏縱心大倫修己以道弘道以身易貴好爵書慎官人官不可妄授職不可闇受能者養之致福不能者弊之招咎衡臣司書敢告左右藝文類聚四十八初學記十一華嶽銘序華嶽銘序易稱法象莫大乎天地天以高明崇顯而嶽配焉地以廣厚為基而嶽體焉若夫太華之為鎮也五嶽列位而存其首三條分方而處其中故能參兩儀以比德協和氣之絪縕濟雲行而雨施興雷風以動物是以古先歷代聖帝明王莫不燔柴加牲尊而祀焉于虞書則西巡狩至于西嶽而親祭焉于禮則大司馬掌其分域而大宗伯典其禮祀也藝文類聚七初學記五劍銘并序劍銘并序道德不修雖有千金之劍何所用之先王觀變而服劍所以立武象也太上有象而已其次則親用之銘曰光文耀武以衛乃國筆銘韡韡彤管冉冉輕翰正色玄墨銘心寫言初學記二十一水龜銘鑄茲靈龜體象自然含出原水有似清泉潤彼玄墨染此弱翰申情寫意經緯群言御覽六百六鏡銘人徒覽于鏡止于見形鑒人可以見情北堂書鈔一百三十六杖銘杖正杖貞身正心安不安則傾不貞則危傾危之變厥身以隨書鈔一百三十三澡盤銘與其澡于水寍澡于德水之清猶可穢也德之修不可廢也書鈔一百三十五御覽七百十二席左端席銘閑居勿極其歡書鈔一百三十三初學記二十五席右端寢處毋忘其患書鈔一百三十三初學記二十五席左後居其安無忘其危初學記二十五席右後惑生于邪色禍成于多言初學記二十五燈銘晃晃華燈含滋炳靈素膏流液玄炷亭亭丹水揚輝飛景蘭亭初學記二十五燭銘煌煌丹燭焰焰飛光取則龍景擬象扶桑照彼玄夜炳若朝陽焚刑監世無隱不彰御覽八百七十印銘往者先王配天垂則乃設印章作信萬國取象晷度是銘是刻文明慎密直方其德本立道生歸乎玄默太上結繩下無荒慝初學記二十六御覽六百八十三冠銘居高無忘危在上無忘敬懼則安敬則正初學記二十六御覽六百八十四衣銘衣服從其儀君子德也衣以飾外德以修內內修外飾禮有制也裳銘上衣下裳天地則也服從其儀君子德也御覽六百九十六履銘戒之哉念履正無履邪正者吉之路邪者凶之徵初學記二十六御覽六百九十七被銘被雖溫無忘人之寒無厚于己無薄于人書鈔一百三十四御覽七百七棟銘國有維輔屋有棟梁室之傾尚可柱也心之傾不可輔也御覽百八十七龍銘麗哉神龍誕應陽精潛景九淵飛曜天庭屈伸從時變化無形偃伏汙泥上淩太清藝文類聚九十六靈蛇銘嘉茲靈虵斷而能續飛不須翼行不假足上騰霄霧下遊山嶽進此明珠預身龍族藝文類聚九十六御覽九百三十四口誡勿謂何有積怨致咎勿曰不傳伏流成川蟻孔潰河溜穴傾山藝文類聚十七江夏任君墓銘君諱倏承洪苗之高冑稟岐嶷之上姿質美珪璋志邈雲霄景行足以作儀範柱石足以慮安危弱冠而英名播乎遐邇拜江夏大守內平五教外運六奇邦國乂安飄塵不作銘曰峨峨任君應和秀生如山之峙如海之淳才行闡茂文武是經群后利德泊然弗營宜享景福光輔上京如何夙逝不延百齡藝文類聚五十太尉楊彪銘莅于少府考定百工北堂書鈔五十四太僕閑王御同上賓于鴻臚允正九儀同上鴻臚永寍太僕龐侯誄永寍太僕龐侯誄蒸蒸孝敬行著閨庭如蘭之芳如金之貞在亂不回處暗斯明仁象春日威配秋霜慈恩雨施惠化風揚嘉善獻親疾惡若讎品定人倫清濁異流將繼四祖世據削足天假其年主優其祿等勳伊呂比壽東嶽藝文類聚四十九祝祖文祖君自東百靈齊行翠蓋翩翩象輿琱箱王于進駕驂服調良北堂書鈔一百五十五
