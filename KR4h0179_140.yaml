body:
  text: 何瑾悲秋夜欣莫欣兮春日悲莫悲兮秋夜伊秋夜之可悲增沈懷于遠情歎授衣于豳詩感蕭瑟于宋生天寥廓兮高褰氣淒肅兮厲清燕泝陰兮歸飛雁懷陽兮寒鳴霜凝條兮漼漼露霑葉兮泠泠蓺文類聚三御覽十四又二十三杖贊嘉名藋藋雲質而杖之以協天秩書鈔一百三十三無患枕贊器物多祥君子攸宜有去有取慶合患離覺寐枕玩功用全施書鈔一百三十四沙門應致敬啟十二月三日侍中臣嗣之給事黃門侍郎臣袁恪之等言詔書如右神道冥昧聖詔幽遠陛下所宏者大爰逮道人奉佛者耳率土之民莫非王臣而以向化法服便抗禮萬乘之主愚情所未安拜啟之禮豈虧其道尊卑大倫不宜都廢若許其名教之外闕其拜敬之儀者請一斷引見啟可紀識謹啟沙門不拜俗事二再啟侍中臣嗣之等啟事重被明詔崇沖挹之至履謙光之道愚情眷眷竊有未安治道雖殊理至同歸尊親法教不乖老子稱四大者其尊一也沙門所乘雖異跡不超世豈得不同乎天民陛下誠欲弘之于上然卑高之禮化治之典愚謂宜俯順群心永為來式請如前啟謹啟沙門不拜俗事二三啟侍中祭酒臣嗣之言重被詔如右陛下至德圓靈使吹萬自己九流各徇其美顯昧并極其致靈澤幽流無思不懷群方所以資通天人所以交畼臣聞佛教以神慧為本道達為功自斯以還蓋是斂麤之用耳神理緬邈求之于自形而上者虔肅拜起無虧于持戒若行道不失其為恭王法齊敬于率土道憲兼隆內外咸得矣臣前受外任聽承疏短乃不知去春已有明論近在直被詔便率其愚情不懼允合還此方見斯事屢經神筆宗致悠邈理折微遠非臣駑鈍所能擊讚沙門禮已行之前代今大明既昇道化無外經國大倫不可有闕請如先所啟攝外施行謹啟沙門不拜俗事二四啟侍中祭酒臣嗣之言重奉詔自有內外兼弘者聖旨淵通道冠百王伏讀仰歎非愚賤所逮尊王祗法臣下之節是以拳拳頻執所守明詔超邈遠略常均臣暗短不達追用愧悚輒奉詔付外宣攝謹啟永始元年十二月二十四日上沙門不拜俗事二賦序鳥真野之性備于俯仰之間專視緩步有自卑之志御覽九百二十五溝井贊爰有邃井冽彼下泉引流重壤合曜青天蘊甘澄潔湛爾終年圖象懷惻寄旨嘉荃蓺文類聚九無患枕贊并序無患枕贊并序無患木名也言人枕之無患也御覽七百七爰茲素朴名為吉始匠人斯製以獻君子蓺文類聚八十九御覽九百五十九長隔災氣永集靈祉展轉枕之寤寐含喜北堂書鈔一百三十四樂社樹贊序樂社樹贊序余門前有一社樹盤根疏柯以非近世所植抗秀路左流陰庭宇莊周喻道于商丘之木匠石辨才于曲轅之轢由斯而觀之固可以悟微矣御覽五百三十二甘蕉贊扶疏似樹質則非木高舒垂蔭異秀延矚厥實惟甘味之無足蓺文類聚八十七御覽九百七十五懷香贊有卉惟翠因實制名濛濛綠葉荏苒弱莖寄芬微風寓秀閒庭懷而芳之為翫于情蓺文類聚八十一風賦有氣曰風出自幽冥蕭然而起寂爾而停雖宇宙之洪遠倏俄頃而屢經同神功于不疾等至道于無情胡馬感而增思風母殞而復生啟慘冬之潛蟄達青春之句萌因嚴霜以厲威順和澤以開榮故君德喻其靡草風人假以為名及其猛勢將奮屯雲結陰洪氣鬱彿殷雷發音勃然鼓作拂高淩深天無澄景嶺無停林六鶂為之退飛萬竅為之哀吟亦有飄泠之氣不疾不徐飀飀微扇亹亹清舒王喬以之控鶴列子以之乘虛若乃春惠始和重褐初釋遨步蘭皋遊眄平陌響詠空嶺朗吟竹柏穆開林以流惠疏神襟以清滌軒濠梁之逸興畼方外之冥適蓺文類聚一初學記一懷春賦夫榮凋之感人猶色象之在鏡事隨化而遷迴心無主而虛映眄秋林而情悲遊春澤而心令孰云知其所以乘天感而叩性雖四時之平分何陽節之清淑日婉孌以舒和氣有仁而無肅雷發響于南山雨漸澤于四溟啟潛蟄于九泉收靈虵于天庭修虹煥綠以東冏幽澗泮冰而流清鴻飄翮于歸風燕銜泥而來征鷙鳥感仁而革性鶗鴂乘化而變聲麥芃芃而含秀桑藹藹而敷榮華照灼以爛林葉婀娜以媚莖蓺文類聚三初學記三御覽二十秋夜悲九秋之為節物凋悴而無榮嶺穨鮮而殞綠木傾柯而落英履代謝以惆悵覩搖落而興情信皋壤而感人樂未畢而哀生秋夜清兮何秋夕之轉長夜悠悠而難極月皦皦而停光播商氣以清溫扇高風以革涼水激波以成漣露凝結而為霜凡有生而必凋情何感而不傷苟靈符之未虛孰茲戀之可忘何天懸之難釋思假畼之冥方拂塵襟于玄風散近滯于老莊攬逍遙之宏維總齊物之大綱同天地于一指等太山于毫芒萬慮一時頓渫情累豁焉都忘物我泯然而同體豈復壽夭于彭殤蓺文類聚三星傾暉以流素北堂書鈔一百五十四氣入肌以淒凜風灑林而蕭索同上白露霏以靜降同上遊園詠諒茲境之可懷究川阜之奇勢水窮清以徹鑒山鄰天而無際乘初霽之新景登北館以悠矚對荊門之孤阜傍漁陽之秀岳乘夕陽而含詠杖輕策以行遊襲秋蘭之流芬幙長猗之森修任緩步以升降歷丘墟而四周智無涯而難恬性有方而易適差一豪而遽乖徒理存而事隔故羈馬思其華林籠雉想其皋澤矧流客之歸思豈可忘于疇昔蓺文類聚六十五懷歸謠辭衡門兮至歡懷生離兮苦辛豈羈旅兮一慨亦代謝兮感人四運兮道盡化新兮歲故氣慘慘兮凝晨風悽悽兮薄暮雨雪兮交紛重雲兮四布天地兮一色六合兮同素山木兮摧披津壑兮凝沍感羈旅兮苦心懷桑梓兮增慕胡馬兮戀北越鳥兮依陽彼禽獸兮尚然況君子兮去故鄉望歸塗兮漫漫盼江流兮洋洋思涉路兮莫由欲越津兮無梁蓺文類聚十九上貞女解伏見西道縣治下里龍憐年始弱笄出適皮氏未逾半年婿京殞沒京兄弟三人相尋凋落外靡期功之親內絕胤嗣之繼憐貨其父母之資躬親機杼之勤數年之間三喪俱舉四節烝嘗于今不輟志存匪石之固行無片言之玷賢良屢聘誓而弗許守節窮居于今五十餘年矣詳觀之遺烈書于記傳者或毀髮膚之體以絕求者之望或自經溝中苟全不奪之志雖操存而身亡行立而形虧寡能兼全其道始終若斯者也憐蓋草萊之婦人耳生于幽谷之中長于荒榛之下目不見尺素之文耳不聞今古之說師心率已蹈茲四德抑可謂稟靈山岳自然天知者矣而彤管未揮令問不彰非所以表賢崇善激揚貞風也蓺文類聚十八修學校教貴郡之境山秀水清嶺舉雲霞之標澤流清曠之氣荊藍之璞豈不在茲蓺文類聚三十八七歡有巖棲先生者學道養生離親絕俗漱清泉蔭茂木慕赤松之清塵乃餐霞而絕穀朝隱大夫尋條援葛往而問之曰營中都以起館指土圭以正宮宅既平而土沃實商旅之所通究精巧之妙思盡土木之所窮宜軒高館北連修堂左互東序右列西廂飛甍雲構軒軒鏘鏘連棟抗榱若飛若翔幽籠納響素壁流光乃有傾城之色玉質鳳章手習清弄心達宮商子能從我而翫之乎大夫曰歲季月除大蜡始節繁霜朝氛淒風夕發策龍駟以偕逝問虞人于中林審蹊徑之所由知此澤之多禽前批猛獸後拉黃羆聲不得發爪不暇施此遊獵之壯觀子能從我而觀之乎大夫曰青陽開運和氣流人天無纖翳地無飛塵五湖靜波四瀆凝津命向方之嘉友聊汎舟以遊春此舟楫之駿遊子能從我而乘之乎大夫曰有嶧山之孤桐生千仞之峻嶠乘危巖以託根間丹霞而竦標若麗霜之淒切困寒風之蕭條若乃清秋遙夜器朗絃徹閑心理氣臨流鏡月伯牙揮爪以清弄鍾期中典而撫節子能從我而聽之乎大夫曰良疇沃壤傍山之阿靈澤津其根春露染其禾上蔭玄雲輕藹下流石泉清波含山澤之清潤結玉實于秋霜簡嘉穗以精微璀冰散而珠光釀縹醪于九秋蘊二日于三陽米望麴而冰消甕未啟而流芳此五穀之精液子能從我而嘗之乎大夫曰生乎三季之世隔乎大國之間戎馬生于郊畿英雄森以比肩意氣冠宇宙毫勢扼丘山強虜元師懸首太白勳勒王府功刊金石此不世之奇遇也子能從我而立之乎大夫曰蓋聞至道以無主員應囊籥以內盛無窮陰陽以煙熅咸化五行之守分相攻是以撫往運而長揖因歸風而迴軒挂長纓于朱闕反素褐于丘園靡閑風于林下鏡洋流之清瀾仰濁酒以箕踞間絲竹而晤言蓺文類聚五十七廬山神仙詩序潯陽有廬山者盤基彭蠡之西其崇標峻極辰光隔輝幽澗澄深積清百仞若乃絕阻重險非人跡之所遊窈窕沖深常含霞而貯氣真可謂神明之區域列真之苑囿矣太元十一年有樵採其陽者于時鮮霞褰林傾暉映岫見一沙門披法服獨在巖中俄頃振裳揮錫淩崖直上排丹霄而輕舉起九折而一指既白雲之可乘何帝鄉之足遠哉窮目蒼蒼翳然滅跡蓺文類聚七十八羈鶴吟序鄉人王氏有養鶴者摧翮虞人之手心悲志喪後三年羽翮既生翻然高逝有感余懷乃為之吟蓺文類聚九十木連理頌相彼神奇遠見禎祥同根連柯本枝俱昌皇基增構靈祚惟長運隆周室道均三王丕顯奕世依風載揚蓺文類聚九十八老子贊教由嚴宗化必有資深矣若人乃作皇師亦參儒訓道實希夷恂恂孔父是敬是祗蓺文類聚七十八孔公贊文王既沒微言將墜邈哉孔公龍見九二闡化繫象素王洙泗發揮中葉道映周季蓺文類聚二十初學記十七北叟贊樂為憂根禍為福始數極則旋往復迭起世人迷之橫生欣恥滔滔北叟獨亮玄理喪馬弗希折肱愈喜淡哉一生無泰無否蓺文類聚三十六庭前植稻苗贊蒨蒨喜苗離離階側弱葉繁蔚圓株疏植流津沃根輕露濯色蓺文類聚八十五初學記二十七長鳴雞贊精心妙覺獨曉冥冥風雨如晦不愆其鳴蓺文類聚九十一靈秀山銘巖巖靈秀積岨幽重傍嶺關岫乘標挺峰桂柏參幹芝菊亂叢翠雲久映爽氣晨蒙籠籠疏林穆穆閑房幽室冬暄清蔭夏涼神木奇生靈草真香雲鮮其色風飄其芳可以養性可以棲翔長生久視何必仙鄉蓺文類聚七弔鶴文余以玄冬修夜忽聞階前有鶴鳴遡寒風而清叫感淒氣而增悲屬聽未終余有感焉乃為文以弔之惟海隅之奇鳥資秀氣以誕生擬鸞皇而比翼超羽族而獨靈濯冰霜之素質颺九皋之奇聲啄荒庭之遺粒漱絕澗之餘清望雲舒而息翮仰霞而晨征輟王子之靈轡縶虞人之長纓辭丹穴之神友與雞鶩而同庭軒天衢而奔想顧樊籠而心驚獨中宵而增思負清霜而夜鳴資沖天之儁翮曾不殊于鳥雀稟櫺壽之修期忽同彫于秋薄匪物之足悲傷有理而橫落蓺文類聚九十荅譙王論孔釋書仰復淵旨匪邇伊教俯惟未造鞠躬汎對竊以為遂通資感涉悟籍緣誠微良因則河漢滋惑故待問擬乎撞鐘啟發俟于憤悱夫妙學窮理乃聖乃神光景燭八維頫仰觀九有然而運值百齡窅均萬劫者豈非嘉緣未構故業化莫孚哉是以聖靈輟軌斯文莫載靡得明徵理歸指斥宗致祗以微顯婉而成潛徙冥遠之生導三世之源積善啟報應之轍網宿昭仁蒐之苗弘信既以漸漬習成吝滯日袪然後道畼皇漢之朝訓敷永平之祀物無韗熒人斯草偃實知放華猶昏文宣未旭非旨睽以異逋諒理均而俱躓者附會玄遠孰夷冒言謬犯不韙輕率狂簡弘明集十二詣桓玄牋自頃世故睽離心事淪蘊明公啟晨光于積晦澄百流以一源世說文學篇雪贊資清以化乘氣以霏遇象能鮮即潔成暉世說文學篇又蓺文類聚二御覽五百八十八馳使報盧循毅兵眾甚盛成敗事係之于此宜并力摧之若此克捷天下無復事矣根本既定不憂上面不平也宋書武帝紀上道覆聞劉毅南上馳使報循甘樹賦伊冥造之緜緜兮纚群象于成遇嗟卉草之森秀兮將歸美于甘樹誕寄生于南楚兮播萬里而東布浸冷泉以搖根兮竦逸條以承露結密葉以舒蔭兮滌纖塵以開素仰清氣以旭晨兮流惠飆于薄暮雖飛榮于園沼兮契巒松之貞趣時屢遷而彌真兮淩寒暑而一度初學記二十八殷祭議殷無定月攷時致敬其禮意尚簡去年祠雖于日有差而情典允備宜仍以為正通典四十九元興三年又議臣尋升平已後殷祭皆在周內永和十年至今五十餘載三十月輒殷是依禮五年再殷而泰言非當若臣啟不允則責失奏彈通典四十九義熙三年殷祭議泰元元年四月應殷而禮官墮失建用十月本非正期不應即以失為始也宜以反初四月為始當用三年十月宋書禮志三義熙三年通典四十九作元興三年議殷祭表三歲一閏五年祭八年又祭兩頭如四實不盈三又十一年殷十四年殷凡間含二則十年四殷與禮五年再殷其議合矣通典四十九武陵王招魂葬議先太保生沒虜場求依太傅故事招魂葬案禮無招魂葬之文時人往往有招魂葬者皆由孝子哀情迷惑宜以禮裁不應聽遂通典一百三后服未終廢樂議周景王有后嫡子之喪既葬除服而宴樂叔向猶譏之今宜不懸周禮有憂則弛懸今天子蒙塵攝王不宜作樂但先人血祀不可廢耳魯莊公主已入廟閔公二年吉禘猶曰未可以吉是不係于入廟也謂不宜設樂通典一百四十七符問章皇后雖哀限未終后主已入廟當作樂不博士徐虔議
