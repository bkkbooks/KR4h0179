body:
  text: 卷五十一傅咸喜雨賦并序喜雨賦并序泰始九年自春不雨以涉夏節草木共然百姓以堯有九載之水湯有七年之旱恐遭斯運竝有懼心聖皇勞慮分使祈禱遍于群望余以太子洗馬兼司徒請雨百辟蒞事三朝而大雨降退作斯賦藝文類聚一百御覽十一于是祝融熾景羲和警轡亢陽火焚野無生類悠悠億兆同茲慘悴伊我皇之仁德兮配燾育于二儀屢刻躬而勤政兮廣請禱于靈祇孰謂天高其聽不遼孰謂神遠厥應孔昭潔齊致虔于茲三朝陰鬱怫而騰起陽菴薆而自消飛廉扇谷風之翼翼靈嶽興慶雲之飄颻遂乃重陰四會溟邈無垠方中降雨亘夜迄今生我百穀粒我蒸民昔洪水滔天于唐堯之朝亢旱為災于殷湯之世下民其咨莫能俾乂歷稔九七僅免斯害猶以疇咨為美談躬禱為勳伐藝文類聚二患雨賦夫何遠寓之多患兮懷霖雨之有經自流火以迄今兮歷九旬而無寧庶太清之垂曜兮覩日月之光明雲乍披而旋合霤暫輟而復零將收雷之要月棄嘉穀于已成前渴焉而不降後患之而弗晴惟二儀之神化奚水旱之有并湯亢陽于七載兮堯洪泛乎九齡天道且猶若茲況人事之不平藝文類聚二宋本初學記二感涼賦并序感涼賦并序盛夏困于炎熱熱甚不過旬日而復自涼以時之涼命親友曲會作賦云爾初學記三踐朱明之中月暑鬱隆以肇興赫融融以彌熾乃沸海而焦陵獸竄伏于幽林兮鳥垂翼而弗升珠汗隕于玉躬兮粉附身而沾凝于是景雲晨敷曜靈潛光陰氣聿升凱風載揚忽輕箑于坐隅兮思暖服于蘭房書鈔一百五十六藝文類聚五御覽三十四又七百十八神泉賦并序神泉賦并序余所居庭前有涌泉在夏則冷涉冬而溫溫則水物冬生冷則冰可以過每夏遊之不知歲之有暑耳惟茲神泉厥理難原在冬則溫既夏而寒混混洋洋載清載瀾遂乃壇以文石樹之柳𣏌密葉雲覆重蔭蔽沚氣泠泠以含涼風肅肅而恆起于時朱明紀運旭日馳光鬱鬱隆暑赫赫太陽盥玉體于素波身淒焉而自清不知天時之有暑忽謂繁霜之隕庭逮至旻秋既逝司寒騁節六合蕭條嚴風凜洌河洛輟流太陰凝結彼溰溰而含凍此灼灼而含熱緑竹猗猗荇藻青青是託斯茂是殖斯榮藝文類聚九小語賦楚襄王登陽雲之臺景差唐勒宋玉侍王曰能為小語者處上位景差曰么蔑之子形難為象晨登蟻埃薄暮不上朝炊半粒晝復得釀亨一小蝨飽于鄉黨唐勒曰攀蚊髯附蚋翼我自謂重彼不極邂逅有急相切逼竄于針孔以自匿宋玉曰折薜足以為擢舫粒糠而為舟將遠遊以遐覽越蟬溺以橫浮若涉海之無涯懼湮沒于洪流彌數旬而汔濟陟蟣蟻之崇丘未升半而九息何時遠乎杪頭藝文類聚十九申懷賦并序申懷賦并序余自咸寧謬為衆論所許補太子洗馬才不稱職而意常闕然御覽二百四十六何天施之弘普廁瓦礫于瓊瑛備東宮之妙選奉儲君之聖明穆穆清禁濟濟群英鸞翔鳳集羽儀上京芬芳竝發我穢其馨德音光宣我纍厥聲豈伊不愧顧影慚形雖自百于殞越懼恩隆而命輕命既輕而才下諒無補于明時塞賢哲之顯路而塵損之日滋匪耽榮而忘替實結戀之有違忍厚顏于寮類甘獲戾而受譏不悟皇恩之彌崇授大縣乎近畿畿云近而防遠情眷眷而含悲悲惻兼懷憂慮實深雍可南面千載晞心微微小子斯之莫任莫斯之任求仁在我將反初服畢志訓雅盡烏鳥之至情竭歡敬于膝下進抗疏以歸誠退抽簪而脂車庶所乞之克從永收迹于蓬廬藝文類聚二十六感別賦并序感別賦并序友人魯庶叔雅量宏濟思心遼遠余自少與之相長情相愛親有如同生其後選太子洗馬俄而謬蒙朝私猥忝斯職雖懼不稱而喜得與此子同班共事天下之遇未有若此周旋三載魯生遷尚書郎雖別不遠而情甚悵恨退作茲賦云爾御覽二百四十六嘉天地之交泰美萬物之會通悅朋友之攸攝慕管鮑之遐蹤退以文而會友欽公子之清塵信同聲之相應意未寫而情親誓稚好之齠齓分綢繆而日新蘭蕙含芬有時而馨龍驥踠足有時而征乾道變化時惟大明峨峨睦友載揚厥聲降聖宰之旌招曜羽儀之上京贊唐虞之嘉運超飛躍乎太清佩銀璜于帝側拖紫艾于天庭瞻神極之眇眇喜吾子之寵榮無荊玉之夜觀猥齊景于夜光敢有觀于斯舉欣與子而竝翔天啓其願自忝蘋蘩幼則同遊長則同班同心厥職其臭如蘭庶績未凝聖朝疇咨顯佐納言光綜萬機出順景而為偶入闃然而無依步虛宇以低回想宴笑之餘暉意纏綿而彌結淚雨面而霑衣藝文類聚三十弔秦始皇賦并序弔秦始皇賦并序余治獄至長安觀乎阿房而弔始皇曰傷秦政之為暴棄仁義以自亡搦紙申辭以弔始皇有姬失統命不于常六國既平奄有萬方政虐刑酷如火之揚致周章之百萬取發掘于項王疲斯民乎宮墓甚癸辛于夏商未旋踵而為墟屯麞麋乎廟堂國既顛而莫扶孰阻兵之為彊藝文類聚四十登芒賦并序登芒賦并序左光祿大夫濟北侯荀公前喪元妃及失令子葬于西芒有以感懷而作斯賦何天道之難忱信厥命之靡常匪彼生之不辰亦夫人之多殃惟濟北之初載夙遘旻而逢罹興瓜瓞之綿綿飛英聲以風馳庶家道之充昌保永祚于螽斯慍無妄之為災怨上皇之有違在德門之方隆乃降厲于元妃蘭房闃其無主衆孤煢而莫依孔臨川以永歎趙有感于九原覽登芒之哀賦諒聖賢之同情藝文類聚四十明意賦并序明意賦并序侍御史傅咸奉詔治獄作賦用明意云舍控款以彌載令棲遲以淹留吏砥身以存公古有死而無柔彼背正以從邪我沒世而是尢敷腎腸以為效兮豈文飾之足修感恩輸命心口自滅加我數年竭力效節春秋既不吾與日月忽其不屈周道兮如砥言人兮是由材曲兮枉橈朽木兮難抽藝文類聚五十四相風賦并序相風賦并序相風之賦蓋以富矣然辭義大同惟中書張令以太史相風獨無文飾故特賦之太僕寺丞武君賓樹一竹于前庭其上頗有樞機插以雞毛于以占事知來與彼無異斯乃簡易之至有殊太史相風張氏之賦非其至者也翟翟竹竿在武之庭厥用自然既修且貞插羽其首丹漆弗營經之營之不日而成御覽九紙賦蓋世有質文則治有損益故禮隨時變而器與事易既作契以代繩兮又造紙以當策猶純儉之從宜亦惟變而是適夫其為物厥美可珍廉方有則體潔性貞含章蘊藻實好斯文取彼之弊以為此新攬之則舒舍之則卷可屈可伸能幽能顯藝文類聚五十八初學記二十一引兩條御覽六百五若乃六親乖方離群索居鱗鴻附便援筆飛書寫情于萬里精思于一隅羽扇賦并序羽扇賦并序吳人截鳥翼而搖風既勝于方圓二扇而中國莫有生意滅吳之後翕然貴之其辭曰鳳凰于飛翽翽其羽況靈體以遐翔匪六翮其焉舉感扇揚之興風宜收之以清暑彼安衆之云妙差剖篾于毫縷體荏苒以輕弱侔縞素于齊魯此因資以為用不假裁于規矩雖靡飾于容好亦差池而有序上比烈于南箕下等美于箑甫藝文類聚六十九近興風于捲握豈遠嘯于金塘書鈔一百三十四似燕鴻之翕習象白鶴之群翔朱衣為之飄飄紱拂于丹梁書鈔同上熾九日之隆赫然高燎于扶桑熱熙天而灼地沸巨海而成湯書鈔一百五十六扇賦并序扇賦并序水不策驥陸不乘舟世無為而俎豆設時有虞而干戈滌御覽五十六天道行而不息四節代以相尋背青春之令月踐朱夏于斯今熱融融以太甚孰赫赫之可任汗珠隕以外流氣鬱結而內沈庶凱風之自南競清嘯而啓襟怨微飆之不興恨喬木之無陰搖輕羽之苒弱手才動而盡心心取盡于捲握尚何希乎北林下濟億兆上寧侯王是曰安衆清暑作涼蒙貴幸于斯時無日夜而有忘謂洪恩之可固終靡弊于君傍火星忽以西流悲風起乎金商秋日淒淒白露為霜體斂然以思暖御輕裘于溫房猥棄我其若遺去玉手而潛藏君背故而向新非余身之無良哀勞徒而靡報獨懷怨于一方書鈔一百三十四藝文類聚六十九狗脊扇賦蓋卑以自居君子之經孤寡不穀王侯修名尚不愧狗脊之為號亦焉顧九華之妙形御覽七百二櫛賦并序櫛賦并序夫才之治世猶櫛之理髮也理髮不可以無櫛治世不可以無才書鈔一百三十六御覽七百十四我嘉茲櫛惡亂好理一髮不順實以為恥雖日用而匪懈不告勞而自已苟以理而委任期竭力而沒齒藝文類聚七十御覽七百十四鏡賦從陰位于清商採秋金之剛精醮祝融以製度命歐冶而是營熾火罏以陶鑄飛光采于天庭書鈔一百三十六晞日月之光烈儀厥象乎曜靈清邈明水景若朝陽不將不迎應物無方不有心于好醜而衆形其必詳同實録于良史隨善惡而是彰猗猗淑媛峨峨后妃眷春榮之零悴懼玉顏之有衰盼清揚而自鏡競崇姱以相暉珥明璫之迢迢點雙的以發姿書鈔一百三十五若乃雲髻亂于首赬黛渝于色設有乏于斯器兮孰厥貌之能飾與喑瞽而同昧兮近有面而不識君子知貌之不可以不飾則內省而自針既見前而慮後則祗畏于幽深察明明之待瑩則以此而洗心覩日觀之有瑕則稽訓于儒紳夫然尚何厥容之有慢而厥思之有淫書鈔一百三十五又一百三十六藝文類聚七十初學記二十五御覽七百十七汙卮賦并序汙卮賦并序人有遺余琉璃卮者小兒竊弄墮之不潔意既惜之又有感物之汙辱乃喪其所以為寶況君子行身而可以有玷乎有金商之瑋寶稟乾剛之淳精歎春暉之定色越冬冰之至清爰甄陶以成器逞異域之殊形猥陷身于醜穢豈厥美之不惜與觴杓之長辭曾瓦匜之不若藝文類聚七十三御覽八百八畫像賦并序畫像賦并序先有畫卞和之像者雖具其事在素定見其泣血殘刖之刑情以悽然以為臧文仲知柳下惠之賢而不與立卞和自刖以有證相去遠矣戲畫其像于卞子之傍特赤其面以示猶有慚色辭曰惟年命之遒短速流光之有經疾沒世而不稱貴立身而揚名既銘勒于鍾鼎又圖像于丹青覽光烈之攸畫覩卞子之容形泣泉流以雨下灑血面而瀸纓痛兩趾之雙刖心惻悽以傷情雖髮膚之不毀覺害仁以偷生向厥趾之不刖孰夜光之見明人之不同爰自在昔臧知柳而不進和殘軀以證璧藝文類聚七十四御覽七百五十燭賦并序燭賦并序余治獄至長安在遠多懷與同行夜飲以忘愁顧帷燭之自焚以致用亦猶殺身以成仁矣蓋泰清垂象匪日不光向晦入冥匪火不彰故六龍銜燭于北極九日登曜于扶桑日中則昃月虧于望時邁靡停晝不于常背三接之昭昭即厥開之有傷何遠寓之多懷患冬夜之悠長獨耿耿而不寐待雞鳴之未央徒伏枕以展轉起然燭于間房揚丹輝之煒燁熾朱焰之煌煌俾幽夜而作晝繼列景乎朝陽慨顧景以增歎孰斯愁之可忘嘉湛露之愔愔遂命樽而設觴爾乃延僚屬酌醇清講三墳論五經高談既倦引滿行盈樂飲今夕實慰我情藝文類聚八十款冬花賦并序款冬花賦并序余曾逐禽登于北山于時仲冬之月也冰凌盈谷積雪被崖顧見款冬煒然始敷御覽九百九十二大觀本草九引始敷下多華豔二字惟茲奇卉款冬而生原厥物之載育稟淳粹之至精用能託體固陰利此堅貞惡朱紫之相奪患居衆之易傾在萬物之竝作故韜華而弗逞逮皆死以枯槁獨保質而全形藝文類聚八十一華豔春暉既麗且殊以堅冰為膏壤吸霜雪以自濡非天然之真貴曷能彌寒暑而不渝御覽九百九十二爾雅翼三藝香賦并序藝香賦并序先君作藝香賦辭美高麗有覩斯卉蔚茂馨香同遊使余為序御覽九百八十二攜昵友以消搖兮覽偉草之敷英慕君子之弘覆兮超託軀于朱庭俯引澤于丹壤兮仰汲潤乎泰清繁茲緑蕊茂此翠莖葉芟蓯以纖折兮枝阿那以回縈象春松之含曜兮鬱蓊蔚以蔥青藝文類聚八十一玉賦并序玉賦并序易稱乾為玉玉之美與天合德其在玉藻仲尼論之備矣非復鄙文所可稱述萬物資生玉稟其精體乾之剛配天之清故能珍嘉在昔寶用罔極夫豈君子之是比蓋乃王度之所式其為美也若此當其潛光荊野抱璞未理衆視之以為石獨見知于卞子曠千載以遐棄倏一旦而見齒為有國之偉寶禮神祇于明祀豈連城之足云嘉遭遇乎知己知己之不可遇譬河清之難俟既已若此誰亦泣血而刖趾藝文類聚八十三初學記二十七桑樹賦并序桑樹賦并序世祖昔為中壘將軍于直廬種桑一株迄今三十餘年其茂盛不衰皇太子入朝以此廬為便坐伊茲樹之僥幸蒙生生之渥惠降皇躬以斯植遂弘茂于聖世厥茂伊何其大連尋修柯遠揚洪條梢槮布簟枝之沃若播密葉以垂陰蔭華㝢而作涼清隆暑之難任以厥樹之巨偉登九日于朝陽且積小以高大生合抱于毫芒猶帝道之將升亦纍德以彌光湯躬禱于斯林用獲雨而興商惟皇晉之基命爰于斯而發祥從皇儲于斯館物無改于平生心惻切以興思思有感于聖明步傍徨以周覽庶髣佛于儀形藝文類聚八十八梧桐賦美詩人之攸貴兮覽梧桐乎朝陽蔚菶菶以萋萋兮鬱株列而成行夾二門以駢羅作館㝢之表章藝文類聚八十八停公子之龍駕息旅人之肩行瞻華實之離離想儀鳳之來翔初學記二十八舜華賦并序舜華賦并序佳其日新之美故種之前庭而為之賦覽中唐之奇樹稟沖粹之至清應青春而敷櫱逮朱夏而誕英布夭夭之纖枝發灼灼之殊榮紅葩紫蒂翠葉素莖含暉吐曜爛若列星朝陽照灼以舒暉逸藻采粲而光明罄天壤而莫儷何菱華之足營藝文類聚八十九儀鳳賦并序儀鳳賦并序鷦鷯賦者廣武張侯之所造也以其形微處卑物莫之害也而余以為物生則有害有害而能免所以貴乎才智也夫鷦鷯既無智足貴亦禍害未免免乎禍害者其唯儀鳳也藝文類聚九十仰天文以彌觀兮覽神象乎太清伊儀鳳之誕育兮稟朱行之淳精故能體該衆妙德備五靈穢惟塵之紛濁兮患俗網之易嬰心眇眇其悠遠兮意飄飄以遐征翔寥廓以輕舉兮淩清霄而絶形若乃龍飛九五時惟大明闡隆正道既和且平感聖化而來儀兮讚簫韶于九成隨時宜以行藏兮諒出處之有經豈以美而賈害兮固以德而見榮曠千載而莫覩兮忽翻爾而來庭應龍至兮庶有感于斯誠而君子之是忽兮賦微物以申情雖綺靡之可玩兮悲志大之所營敢砥鈍于末蹤兮則瓦礫于瑤瓊初學記三十鸚武賦有金商之奇鳥處隴坻之高松謂崇峻之可固然以慧而入籠披丹脣以授音亦尋響而應聲眄明眸以承顏側聰耳而有聽口才發而輕和密晷景而隨形言無往而不復似探幽而測冥自嘉智于君子足取愛而揚名藝文類聚九十一燕賦并序燕賦并序有言燕今年巢在此明歲故復來者其將逝翦爪識之其後果至焉燕燕于飛差池其羽何詩人之是興信進止之有序秋背陰以龍潛春晞陽而鳳舉隨時宜以行藏似君子之出處惡焚巢之凶醜患林野之多阻諒鳥獸之難群非斯人而誰與惟里仁之為美託君子之堂㝢逮來春而復旋意眷眷而懷舊一委身乃無餘豈改適而更赴藝文類聚九十二班鳩賦并序班鳩賦并序豫舍下種楸蔚然成林間居無為有時遊之顧見班鳩音聲可悅于是捕而畜之既而擾馴出之于籠無何失去其後時時一來飛翔低徊似有戀焉故聊為之賦御覽七百六十五又見九百二十一集茂樹之蔭蔚登弱枝以容與體郁郁以敷文音雍雍而有序情欽樂而是悅遂籠之于前㝢爾乃飲以神泉食之稻粱朝憩椒塗夕宿蘭房時連翩于庭柯見飛燕之頡頏慨感物而哀鳴聲楚切以懷傷仰華林而矯翼紛憎逝而高翔藝文類聚九十二黏蟬賦并序黏蟬賦并序櫻桃其為樹則多蔭其為果則先孰故種之于廳事之前時以盛暑逍遙其下有蟬鳴焉仰而見之聊命黏取以弄小兒退惟當蟬之得意于斯樹不知黏之將至亦猶人之得意于富貴而不虞禍之將來也有嘉果之珍樹蔚弘覆于我庭在赫赫之隆暑獨肅肅而自清遂寓目以周覽見鳴蜩于纖枝翳翠葉以長吟信厥樂之在斯苟得意于所歡曾黏住而莫知匪爾命之遵薄坐偷安而忘危嗟悠悠之耽寵請茲覽以自規藝文類聚九十七初學記三十御覽九百四十四九百六十九鳴蜩賦有嘒嘒之鳴蜩于台府之高槐物處陰而自慘奚厥聲之可哀秋日悽悽兮感時逝之若穨曷時逝之是感兮感年歲之我催孰知命之不憂詠梁木之有摧生世忽兮如寓求富貴于不回且明明以在公唯忠讜之是與佚履道之坦坦登高衢以自棲藝文類聚九十七青蠅賦幸從容以間居且遊心于典經覽詩人之有造刺青蠅之營營無纖芥之微用信作害之不輕既反白而為黑恆懷蛆以自盈穢美厚之鮮潔蟲嘉肴之芳馨滿堂室之薨薨孰閨寓之得清藝文類聚九十七蜉蝣賦并序蜉蝣賦并序讀詩至蜉蝣感其雖朝生暮死而能修其翼可以有興遂賦之御覽九百四十五有生之薄是曰蜉蝣育微微之陋質羌采采而自修不識晦朔無意春秋取足一日尚又何求戲停淹而委餘何必江湖而是游藝文類聚九十七螢火賦并序螢火賦并序余曾獨處夜不能寐顧見螢火意遂有感于是執以自照而為之賦其辭曰潛空館之寂寂兮意遙遙而靡寧夜耿耿而不寐兮憂悄悄而傷情哀斯火之湮滅兮近腐草而化生感詩人之攸懷兮覽熠耀于前庭不以姿質之鄙薄兮欲增輝乎太清雖無補于日月兮期自竭于陋形當朝陽而戢景兮必宵昧而是征進不競于天光兮退在晦而能明諒有似于賢臣兮于疏外而盡誠蓋物小而喻大兮固作者之所旌假乃光而諭爾熾兮庶有表乎潔貞藝文類聚九十七初學記三十御覽九百四十五叩頭蟲賦并序叩頭蟲賦并序叩頭蟲蟲之微細者然觸之輒叩頭人以其叩頭傷之不祥故莫之害也御覽九百五十一蓋齒以剛克而盡舌存以其能柔強梁者不得其死執雌者物莫之讎無咎生于惕厲悔吝來亦有由仲尼唯諾于陽虎所以解紛而免尢韓信非為懦兒出胯下而不羞何茲蟲之多畏人才觸而叩頭犯而不校誰與為讎人不我害我亦無憂彼螳蜋之舉斧豈患禍之能禦此謙卑以自牧乃無害之可賈將斯文之焉貴貴不遠而取譬雖不能觸類是長且書紳以自示旨一日而三省恆局蹐以祗畏然後可以蒙自天祐之吉無不利藝文類聚九十七
