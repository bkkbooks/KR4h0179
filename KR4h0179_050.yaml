body:
  text: 卷五十傅玄補遺下遺詔范蠡字少伯楚三戶人也使越滅吳已後乘輕舟游五湖王令人寫其狀恆朝禮之列仙云徐人也意林靈帝時榜門賣官于時太尉段熲司徒崔烈太尉樊陵司空張溫之徒皆入錢上千萬下五百萬以買三公熲數征伐有大功烈有北州重名溫有傑才陵能偶時皆一時顯士猶以貨取位而況于劉囂唐珍張皓之黨乎三國董卓傳注御覽八百二十八太祖又云湯武之王豈同士哉若以險固為資則不能應機而變化也三國魏武紀注明帝時太原人發冢破棺棺中有一生婦人將出與語生人也送之京師問其本事不知也視其冢上樹木可三十歲不知此婦人三十歲常生於地中邪將一朝欻然生偶與發冢者會也三國魏明紀注初劉表謂韓嵩曰今天下大亂未知所定曹公擁天子都許君為我觀其釁嵩對曰聖達節次守節嵩守節者也夫事君為君君臣名定以死守之今策名委質唯將軍所命雖赴湯蹈火死無辭也以嵩觀之曹公至明必濟天下將軍能上順天子下歸曹公必享百世之利楚國實受其祐使嵩可也設計未定嵩使京師天子假嵩一官則天子之臣而將軍之故吏耳在君為君則嵩守天子之命義不得復為將軍死也唯將軍重思無負嵩表遂使之果如所言天子拜嵩侍中遷零陵太守還稱朝廷曹公之德也表以為懷二大會僚屬數百人陳兵見嵩盛怒持節將斬之數曰韓嵩敢懷二邪衆皆恐欲令嵩謝嵩不動謂表曰將軍負嵩嵩不負將軍具陳前言表怒不已其妻蔡氏諫之曰韓嵩楚國之望也且其言直誅之無辭表乃弗誅而囚之後漢劉表傳注三國表傳注表既殺望之荊州士人皆自危也夫表之本心于望之不輕也以直忤情而讒言得入者以無容直之度也據全楚之地不能以成功者未必不由此也夷叔忤武王以成名丁公順高祖以受戮二主之度遠也若不遠其度惟褊心是從難乎以容民畜衆矣三國魏劉廙傳注越蒯通之後也深中足智魁傑有雄姿大將軍何進聞其名辟為東曹椽越勸進誅諸閹官進猶豫不決越知進必敗求出為汝陽令佐劉表平定境內表得以彊大詔書拜章陵太守封樊亭侯荊州平太祖與荀彧書曰不喜得荊州喜得蒯異度耳建安十九年卒臨終與太祖書託以門戶太祖報書曰死者反生生者不愧孤少所舉行之多矣魂而有靈亦將聞孤此言也三國劉表傳注蒯躬字叔孝性方嚴有容儀人望而畏之有過其門者皆整衣改容御覽三百八十張繡有所親胡車兒勇冠其軍太祖愛其健手以金與之繡聞之疑太祖欲因左右刺之遂反三國張繡傳注禰衡辨于言而剋于論見荊州牧劉表日所以自結于表者甚至表說之以為上賓衡稱表之美盈口而論表左右不廢繩墨于是左右因形而譖之曰衡稱將軍之仁西伯不過也唯以為不能斷終不濟者必由此也是言實指表智短而非衡所言也表不詳察遂疏衡而逐之衡以交絶于劉表智窮于黃祖身死名滅為天下笑者譖之者有形也三國魏荀彧傳注賈詡南見劉表表以容禮待之詡曰表平世三公才也不見事變多疑無決無能為也三國魏賈詡傳注太祖既誅袁談梟其首令曰敢哭之者戮及妻子于是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂造其首而哭之哀動三軍軍正白行其戮太祖曰義士也赦之三國魏王修傳注管寧字幼安北海朱虛人齊相管仲之後也昔田氏有齊而管氏去之或適魯或適楚漢興有管少卿為燕令始家朱虛世有名節九世生寧寧往見度語唯經典不及世事還乃因山為廬鑿壞為室越海避難者皆來就之而居旬月而成邑遂講詩書陳俎豆飾威儀明禮讓非學者無見也由是度安其賢民化其德邴原性剛直清議以格物度已下心不安之寧謂原曰潛龍以不見成德言非其時皆招禍之道也密遣令西還度庶子康代居郡外以將軍太守為號而內實有王心卑己崇禮欲官寧以自鎮輔而終莫敢發言其敬憚如此是時康又已死嫡子不立而立弟恭恭懦弱而康孽子淵而雋才寧曰廢嫡立庶下有異心亂之所由起也乃將家屬乘海即受徵寧在遼東積三十七年乃歸其後淵果襲奪恭位叛國家而南連吳僭號稱王明帝使相國宣文侯征滅之遼東之死者以萬計如寧所籌寧之歸也海中遇暴風餘船皆沒唯寧乘船自若時夜風晦冥船人盡惑莫知所泊忽望見有火光輒趣之得島島無居人又無火燼一門人忿然曰君責人亦大無道理今暗如漆何可以不把火照我當得覓鑽火具行人咸異焉以為神光之祐也皇甫謐曰積善之應也寧上書天子且以疾辭曰臣聞傅說發夢以感殷宗呂尚啓兆以動周文以通神之才悟於聖主用能匡佐帝業克成大勳臣之器朽實非其人雖貪清時釋體蟬蛻內省頑病日薄西山唯陛下聽野人山藪之願使一老者得盡微命書奏帝親覽焉司空陳群又薦寧曰臣聞王者顯善以消惡故湯舉伊尹不仁者遠伏見徵士北海管寧行為世表學任人師清儉足以激濁貞正足以矯時前雖徵命禮未優備昔司空荀爽家拜光祿先儒鄭玄即授司農若加備禮庶必可致至延西序坐而論道必能昭明古今有益大化明帝以寧為大夫賜一具衣一襲被一領安穩犢車一乘寧以衰亂之時世多妄變氏族者違聖人之制非禮命姓之意故著氏姓論以原本世系文多不載每所居姻親知舊鄰里有困窮者家儲雖不盈儋石必分以贍救之與人子言教以孝與人弟言訓以悌言及人臣誨以忠貌甚恭言甚順觀其行邈然若不可及即之熙熙然甚柔而溫因其事而導之於善是以漸之者無不化焉寧之亡天下知與不知聞之無不嗟歎醇德之所感若此不亦至乎三國魏管寧傳注胡徵君怡怡無不愛也雖僕隸必加禮焉外同乎俗內秉純潔心非其好王公不能屈年八十而不倦于書籍者吾于胡徵君見之矣三國魏管寧傳注武皇帝至明也崔琰徐奕一時清賢皆以忠信顯于魏朝丁儀閒之徐奕失位而崔琰被誅三國魏徐奕傳注郭嘉少有遠量漢末天下將亂自弱冠匿名迹密友結英雋不與俗接故時人多莫知惟識達者奇之年二十七辟司徒府太祖謂嘉曰本初擁冀州之衆青并從之地廣兵彊而數為不遜吾欲討之力不敵如何對曰劉項之不敵公所知也漢祖唯智勝項羽雖彊終為所禽嘉竊料之紹有十敗公有十勝雖兵彊無能為也紹繁禮多儀公體任自然此道勝一也紹以逆動公奉順以率天下此義勝二也漢末政失於寬紹以寬濟寬故不懾公糾之以猛而上下知制此治勝三也紹外寬內忌用人而疑之所任唯親戚子弟公外𥳑易而內機明用人無疑唯才所宜不閒遠近此度勝四也紹多謀少決失在後事公策得輒行應變無窮此謀勝五也紹因纍世之資高議揖讓以收名譽士之好言飾外者多歸之公以至心待人推誠而行不為虛美以儉率下與有功者無所吝士之忠正遠見而有實者皆願為用此德勝六也紹見人飢寒恤念之形于顏色其所不見慮或不及也所謂婦人之仁耳公于目前小事時有所忽至于大事與四海接恩之所加皆過其望雖所不見慮之所周無不濟也此仁勝七也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝八也紹是非不可知公所是進之以禮所不是正之以法此文勝九也紹好為虛勢不知兵要公以少克衆用兵如神軍人恃之敵人畏之此武勝十也太祖笑曰如卿所言孤何德以堪之也嘉又曰紹方北擊公孫瓚可因其遠征東取呂布不先取布若紹為寇布為之援此深害也太祖曰然太祖欲引軍還嘉曰昔項籍七十餘戰未嘗敗北一朝失勢而身死國亡者恃勇無謀故也今布每戰輒破氣衰力盡內外失守布之威力不及項籍而困敗過之若乘勝攻之此成禽也太祖曰善初劉備來降太祖以客禮待之使為豫州牧嘉言于太祖曰備有雄才而甚得衆心張飛關羽者皆萬人之敵也為之死用以嘉觀之備終不為人下其謀未可測也古人有言曰一日縱敵數世之患宜早為之所是時太祖奉天子以號令天下方招懷英雄以明大信未得從嘉謀會太祖使備要擊袁術嘉與程昱俱駕而諫太祖曰放備變作矣時備已去遂舉兵以叛太祖恨不用嘉之言太祖欲速征劉備議者懼軍出袁紹襲其後進不得戰而退失所據語在武紀太祖疑以問嘉嘉勸太祖曰紹性遲而多疑來必不速備新起衆心未附急擊之必敗此存亡之機不可失也太祖曰善遂東征備備敗奔紹紹果不出河北既平太祖多辟召青冀幽并知名之士漸臣使之以為省事掾屬皆嘉之謀也太祖又云哀哉奉孝痛哉奉孝惜哉奉孝太祖與荀彧書追傷嘉曰郭奉孝年不滿四十相與周旋十一年阻險艱難皆共罹之又以其通達見世事無所凝滯欲以後事屬之何意卒爾失之悲痛傷心今表增其子滿千戶然何益亡者追念之感深且奉孝乃知孤者也天下人相知者少又以此痛惜奈何奈何又與彧書曰追惜奉孝不能去心其人見時事兵事過絶于人又人多畏病南方有疫常言吾往南方則不生還然與共論計云當先定荊此為不但見計之忠厚必欲立功分棄命定事人心乃爾何得使人忘之三國魏郭嘉傳注太祖徵劉曄及蔣濟胡質等五人皆揚州名士每舍亭傳未嘗不講所以見重內論國邑先賢禦賊固守行軍進退之宜外料敵之變化彼我虛實戰爭之術夙夜不懈而曄獨臥車中終不一言濟怪而問之曄答曰對明主非精神不接精神可學而得乎及見太祖太祖果問揚州先賢賊之形勢四人爭對待次而言再見如此太祖每和說而曄終不一言四人笑之後一見太祖止無所復問曄乃設遠言以動太祖太祖適知便止若是者三其旨趣以為遠言宜徵精神獨見以盡其機不宜于猥坐說也太祖已探見其心矣坐罷尋以四人為令而授曄以心腹之任每有疑事輒以函問曄至一夜數十至耳居七日蜀降者說蜀中一日數十驚備雖斬之而不能安也太祖延問曄曰今尚可擊否曄曰今已小定未可擊也初太祖時魏諷有重名自卿相已下皆傾心交之其後孟達去劉備歸文帝論者多稱有樂毅之量曄一見諷達而皆云必反卒如其言孫權遣使求降帝以問曄曄對曰權無故求降必內有急權前襲殺關羽取荊州四郡備怒必大興師伐之外有彊寇衆心不安又恐中國乘其釁而伐之故委地求降一以卻中國之兵二則假中國之援以彊其衆而疑敵人權善用兵見策知變其計必出于此今天下三分中國十有其八吳蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲其內蜀攻其外我襲其內吳之亡不出旬月矣吳亡則蜀孤若割吳半蜀固不能久存況蜀得其外我得其內乎帝曰人稱臣降而伐之疑天下欲來者心必以為懼其殆不可孤何不且受吳降而襲蜀之後乎對曰蜀遠吳近又聞中國伐之便還軍不能止也今備已怒故興兵擊吳聞我伐吳知吳必亡必喜而進與我爭割吳地必不改計抑怒救吳必然之勢也帝不聽遂受吳降即拜權為吳王曄又進曰不可先帝征伐天下兼其八威震海內陛下受禪即真德合天地聲暨四遠此實然之勢非卑臣頌言也權雖有雄才故漢驃騎將軍南昌侯耳官輕勢卑士民有畏中國心不可彊迫與成所謀也不得已受其降可進其將軍號封十萬戶侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之義也我信其僞降就封殖之崇其位號定其君臣是為虎傅翼也權既受王位卻蜀兵之後外盡禮事中國使其國內皆聞之內為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寶隨時貢獻不敢失臣禮也無故伐我必欲殘我國家俘我人民子女以為僮隸僕妾吳民無緣不信其言也信其言而感怒上下同心戰加十倍矣又不從遂即拜權為吳王權將陸遜大敗劉備殺其兵八萬餘人備僅以身免權外禮愈卑而內行不順果如曄言曄事明皇帝又大見親重帝將伐蜀朝臣內外皆曰不可曄入與帝議因曰可伐出與朝臣言因曰不可伐曄有膽智言之皆有形中領軍楊暨帝之親臣又重曄持不可伐蜀之議最堅每從內出輒過曄曄講不可之意後暨從駕行天淵池帝論伐蜀事暨切諫帝曰卿書生焉知兵事暨謙謝曰臣出自儒生之末陛下過聽拔臣群萃之中立之六軍之上臣有微心不敢不盡言臣言誠不足采侍中劉曄先帝謀臣常曰蜀不可伐帝曰曄與吾言蜀可伐暨曰曄可召質也詔召曄至帝問曄終不言後獨見曄責帝曰伐國大謀也臣得與聞大謀常恐昧夢漏泄以益臣罪焉敢向人言之夫兵詭道也軍事未發不厭其密也陛下顯然露之臣恐敵國已聞之矣于是帝謝之曄見出責暨曰夫釣者中大魚則縱而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已乎子誠直臣然計不足采不可不精思也暨亦謝之曄能應變持兩端如此或惡曄于帝曰曄不盡忠善伺上意所趨而合之陛下試與曄言皆反意而問之若皆與所問反者是曄常與聖意合也復每問皆同者曄之情必無所復逃矣帝如言以驗之果得其情從此疏焉曄遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信矣以曄之明智權計若居之以德義行之以忠信古之上賢何以加諸獨任才智不與世士相經緯內不推心事上外困于俗卒不能自安于天下豈不惜哉曄子陶字季冶善名稱有大辨曹爽時為選部郎鄧揚之徒稱之以為伊呂當此之時其人意陵青雲謂玄曰仲尼不聖何以知其然智者圖國天下群愚如弄一丸于掌中而不能得天下玄以其言大惑不復詳難也謂之曰天下之質變無常也今見卿窮爽之敗退居里舍乃謝其言之過三國魏劉曄傳注杜畿漢御史大夫杜延年之後延年父周自南陽徙茂陵延年徙杜陵子孫世居焉畿自荊州還後居許見侍中耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之詰旦遣人謂紀曰有國士而不進何以居位既見畿知之如舊相識者遂進畿于朝彧稱畿勇足以當大難智能應變其可試之范先云既欲為虎而惡食人肉失所以為虎矣今不殺必為後患三國魏杜畿傳注畿與太僕李恢東安太守郭智有好恢子豐交結英俊以才智顯于天下智子沖有內實而無外觀州里弗稱也畿為尚書僕射二人各修子孫禮見畿既退畿歎曰孝懿無子非徒無子殆將無家君謀為不死也其子足繼其業時人皆以畿為誤恢死後豐為中書令父子兄弟皆誅沖為代郡太守卒繼父業世乃服畿知人三國魏杜畿傳注太祖將征柳城張遼諫曰夫許天下之會也今天子在許公遠北征若劉表遣劉備襲許據之以號令四方公之勢去矣太祖策表必不能任備遂行也三國魏張遼傳注永樂大典陳實亡天下致弔會其葬者三萬人制縗麻者以百數三國魏陳群傳注宋建椎牛禱賽終自焚滅文欽日祠祭事天斬于人手諸葛誕夫婦聚會神巫淫祀求福伏尸淮南舉族誅夷此天下所共見足為明鑒也三國魏諸葛誕傳注初劉備襲蜀丞相掾趙戩曰劉備其不濟乎拙于用兵每戰必敗奔亡不暇何以圖人蜀雖小區險固四塞獨守之國難卒并也徵士傅幹曰劉備寬仁有度能得人死力諸葛亮達治知變正而有謀而為之相張飛關羽勇而有義皆萬人之敵而為之將此三人者皆人傑也以備之略三傑佐之何為而不濟也三國蜀先主傳注御覽四百四十四張遼欲白太祖恐太祖之殺羽不白非事君之道乃歎曰公君父也羽兄弟耳遂白之太祖曰事君不忘其本天下義士也度何時能去遼曰羽受公恩必立效報公而後去也三國蜀關羽傳注姜維為人好立功名陰養死士不修布衣之業三國蜀姜維傳注曹公征柳城策將襲許三國吳孫策傳注孫策為人明果獨斷勇蓋天下以父堅戰死少而合其兵將以報讎轉鬭千里盡有江南之地誅其名豪威行鄰國及權繼其業有張子布以為腹心有陸議諸葛瑾步騭以為股肱有呂範朱然以為爪牙分任受職乘閒伺隙兵不妄動故戰少敗而江南安三國吳主孫權傳注馬先生傳馬先生鈞字德衡天下之名巧也少而游豫不自知其為巧也當此之時言不及巧焉可以言知乎為博士居貧乃思綾機之變不言而世人知其巧矣舊綾機五十綜者五十躡六十綜者六十躡先生患其喪功費日乃皆易以十二躡其奇文異變因感而作者猶自然之成形陰陽之無窮此輪扁之對不可以言言者又焉可以言校也先生為給事中與常侍高堂隆驍騎將軍秦朗爭論於朝言及指南車二子謂古無指南車記言之虛也先生曰古有之未之思耳夫何遠之有二子哂之曰先生名鈞字德衡鈞者器之模而衡者所以定物之輕重輕重無準而莫不模哉先生曰虛爭空言不如試之易效也于是二子遂以白明帝詔先生作之而指南車成此一異也又不可以言者也從是天下服其巧矣居京師都城內有地可以為園患無水以溉先生乃作翻車令童兒轉之而灌水自覆更入更出其功百倍于常此二異也其後人有上百戲者能設而不能動也帝以問先生可動否對曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使其形若輪平地施之潛以水發焉設為女樂舞象至令木擊鼓吹簫作山嶽使木人跳丸躑劍緣緪倒立出入自在百官行署舂磨鬭雞變巧百端此三異也先生見諸葛亮連弩曰巧則巧矣未盡善也言作之可令加五倍又患發石車敵人之于樓邊縣溼牛皮中之則墮石不能連屬而至欲作一輪縣大石數十以機鼓輪為常則以斷縣石飛擊敵城使首尾電至嘗試以車輪縣瓴甓數十飛之數百步矣有裴子者上國之士也精通見理聞而哂之乃難先生先生口屈不能對裴子自以為難得其要言之不已傅子謂裴子曰子所長者言也所短者巧也馬氏所長者巧也所短者言也以子所長擊彼所短則不得不屈以子所短難彼所長則必有所不解者夫巧者天下之微事也有所不解而難之不已其相擊刺必已遠矣心乖于內口屈于外此馬氏所以不對也傅子見安鄉侯言及裴子之論安鄉侯又與裴子同傅子曰聖人具體備物取人不以一揆也有以神取之者有以言取之者有以事取之者有以神取之者不言而誠心先達德行顏淵之倫是也以言取之者以變辨是非言語宰我子貢是也以事取之者若政事冉有季路文學子游子夏雖聖人之明盡物如有所用必有所試然則試冉季以政試游夏以學矣游夏猶然況自此而降者乎何者縣言物理不可以言盡也施之于事言之難盡而試之易知也今若馬氏所欲作者國之精器軍之要用也費十尋之木勞二人之力不經時而是非定難試易驗之事而輕以言抑人異能此猶以己智任天下之事不易其道以御難盡之物此所以多廢也馬氏所作因變而得是則初所言者不皆是矣其不皆是因不用之是不世之巧無由出也夫同情者相妒同事者相害中人所不能免也故君子不以人害人必以考試為衡石廢衡石而不用此美玉所以見誣為石荊和所以抱璞而哭之也于是安鄉侯悟遂言之武安侯武安侯忽之不果試也此既易試之事又馬氏巧名已定猶忽而不察況幽深之才無名之璞乎後之君子其鑒之哉馬先生之巧雖古公輸般墨翟王爾近漢世張平子不能過也公輪般墨翟皆見用于時乃有益于世平子雖為侍中馬先生雖給事省中俱不典工官巧無益于世用人不當其才聞賢不試以事良可恨也裴子者裴秀安鄉侯者曹羲也武安侯者曹爽也三國魏杜夔傳注參輯意林北堂書鈔一百十一藝文類聚四十四初學記十二白孔六帖八御覽三百三十六又五百八十一又七百五十二又八百二十五已下篇題缺安鄉亭侯曹羲為領軍將軍慕周公之下士賓客盈坐北堂書鈔六十四攄字曹羲弟萬歲侯為武衛將軍大縱酒作樂酒酣起為壽當傅子前憂亡流涕北堂書鈔六十四傅燮字南容奉寡嫂甚謹食孤姪如赤子御覽五百十二傅巽字公悌瓌偉博達有知人鑒識辟公府拜尚書郎後客荊州以說劉琮之功賜爵關內侯文帝時為侍中太和中卒巽在荊州目龐統為半英雄證裴潛終以清行顯統遂附劉備見待次于諸葛亮潛位至尚書令竝有名德及在魏朝魏諷以才智聞巽謂之必反卒如其言巽弟子嘏別有傳後漢劉表傳注三國劉表傳注何曾荀顗傳論以文王之道事其親者其穎昌何侯乎其荀侯乎古稱曾閔今曰荀何內盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之命有能行孝之道君子之儀表也詩云高山仰止景行行止令德不遵二夫子之景行者非樂中正之道也荀何君子之宗也穎昌侯之事親其盡孝子之道乎存盡其和事盡其敬亡盡其哀豫于穎昌侯見之矣見其親之黨如見其親六十而孺慕豫于穎昌侯見之矣晉書何曾傳傅嘏傳傅嘏字蘭若祖父睿代郡太守父充黃門侍郎是時何晏以材辨顯于貴戚之間鄧揚好變通合徒黨鬻聲名于閭閻而夏侯玄以貴臣子少有重名為之宗主皆求交于嘏而不納也嘏友人荀粲有清識遠志然猶怪之謂嘏曰夏侯泰初一時之傑虛心交子合則好成不合則怨至二賢不睦非國之利此藺相如所以下廉頗也嘏答之曰泰初志大其量能合虛聲而無實才何平叔言遠而情近好辨而無誠所謂利口覆邦國之人也鄧玄茂有為而無終外要名利內無關鑰貴同惡異多言而妒前多言多釁妒前無親以吾觀此三人者皆敗德也遠之猶恐禍及況昵之乎為河南尹河南尹內掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四會利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太密後尹李勝毀常法以收一時之聲嘏立司馬氏之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之郡有七百吏半非舊也河南俗黨五官掾功曹典選職皆授其本國人無用異邦人者嘏各舉其良而對用之官曹分職而後以次考核之其治以德教為本然持法有恆簡而不可犯見理識情獄訟不加檟楚而得其實不為小惠有所薦達及大有益于民事皆隱其端迹若不由己出故當時無赫赫之名吏民久而後安之為尚書事小大無不綜嘏既達治好正而有清理識要好論才性原本精微鮮能及之司隸校尉鍾會年甚少嘏以明智交會初李豐與嘏同州少有顯名早歷大官內外稱之嘏又不善也謂同志曰豐飾僞而多疑矜小失而昧于權利若處庸庸者可也自任機事遭明者必死豐後為中書令與夏侯玄俱禍卒如嘏言嘏自少與冀州刺史裴徽散騎常侍荀甝善徽甝早亡又與鎮北將軍何曾司空陳泰尚書僕射荀顗後將軍鍾育竝善相與綜朝事俱為名臣三國魏傅嘏傳注自敘史通內篇序傳傅氏之先出自陶唐傅說之後意林玄字休奕子咸字長虞晉書有傳意林楚漢之際有好事者作世本上録黃帝下逮漢末意林班固漢書因父得成遂沒不言彪殊異馬遷也意林人之涉世譬如奕棊苟不盡道誰無死地但不幸耳意林觀孟堅漢書實命代奇作及與陳宗尹敏杜橅馬嚴撰中興紀傳其文曾不足觀豈拘于時乎不然何不類之甚也是後劉珍朱穆盧植楊彪之徒又踵而成之豈亦各拘于時而不得自盡乎何其益陋也史通內篇核才不云在自敘篇今附歸漢書條後
