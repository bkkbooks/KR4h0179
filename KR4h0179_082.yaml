body:
  text: 虞聳穹天論天形穹隆當如雞子幕其際周接四海之表浮于元氣之上譬如覆奩以抑水而不沒者氣充其中故也日繞辰極沒西而還東不出入地中天之有極猶蓋之有斗也天北下于地三十度極之傾在地卯酉之北亦三十度人在卯酉之南十餘萬里故斗極之下不為地中當對天地卯酉之位耳日行黃道繞極極北去黃道百一十五度南去黃道六十七度二至之所舍以為長短也晉書天文志上宋書天文志一隋書天文志上與族子察書世之取士曾不招未齒于丘園索良才于總猥所譽依已成所毀依已敗上吾所以歎息也吳志虞翻傳注引會稽典録穹天論天形穹隆如笠而冒地之表浮元氣之上譬覆奩以抑水而不沒者氣充其中也日繞辰極沒酉而還東不入地中也御覽二公除祭表今之諸侯服其親皆與士同無復降殺大宗之家喪服纍仍若皆不祭是先人之享嘗永為有廢臣謂三月之後禮情漸殺若非父母之喪尚通內外服踰月既葬可祭宗廟通典五十二父母乖離議諸失父母者疑行服之制以禮除喪而歸未奔者無不除之制若廢祭絶嗣皆不可行宜詳條制萬代可述通典九十八悼楊皇后宜配食武帝議世祖武皇帝光有四海元皇后應乾作配元后既崩悼后繼作至楊駿肆逆禍延天母孝懷皇帝追復號諡豈不以鯀殛禹興義在不替者乎又太寧二年臣忝宗正帝譜泯棄罔所循案時博咨舊齒以定昭穆與故驃騎將軍華恆尚書荀嵩侍中荀邃因舊譜參論撰次尊號之重一無改替今聖上孝思祗肅禋祀詢及群司將以恢定大禮臣輒思詳伏見惠皇帝起居注群臣議奏列駿作逆謀危社稷引魯之文姜漢之呂后臣竊以文姜雖莊公之母實為父讎呂后寵樹私戚幾危劉氏案此二事異于今日昔漢章帝竇后殺和帝之母和帝即位盡誅諸竇當時議者欲貶竇后及后之亡欲不以禮葬和帝以奉事十年義不可違臣子之道務從豐厚仁明之稱表于往代又見故尚書僕射裴頠議悼后故事稱繼母雖出追服無改是以孝懷皇帝尊崇號諡還葬峻陵此則母子道全而廢事蕩革也于時祭于弘訓之宮未入太廟蓋是事之未盡非義典也若以悼后復位為宜則應配食世祖若以復之為非則譜諡宜闕未有位號居正而偏祠別室者也若以孝懷皇帝私隆母子之道特為立廟者此苟崇私情有虧國典則國譜帝諱皆宜除棄匪徒不得同祠于世祖之廟也晉書武悼楊皇后傳公除䄍祭論余身受公除歲終大䄍至敬兼興如當遂闕心所不安故咨之有議難曰禮素衣芻席不入廟門不以干神明之位緦喪既輕脫服而祭況嗣子當承祚者乎答曰高宗三年諒暗今則不爾帝王既葬縞素躬親宗廟之獻不以喪遂闕者蓋國之大事在祀與戎也且吉祭廷有金石鏗鏘之和今去凶制而奉蒸嘗干戚職而不振慎終之情不遠隨時之義亦通也通典五十二潭又自為論吳綱二嫡妻議法有大防禮無二嫡趙姬以君女之尊降身翟婦著在春秋此吳氏後妻所宜軌則通典六十八答訪四府君遷主漢氏韋玄成等以毀主瘞于園魏朝議者云應埋兩階閒且神主本在太廟若今別室而祭則不如永藏又四君無追號之禮益明應毀而祭通典四十八永和二年有司奏征西章郡潁川京兆四君毀主藏處尚書郎徐禪議云云又遣禪至會稽訪處士虞喜喜答答或問舊君服或問曰喪服經傳為舊君謂仕焉而已者鄭注曰仕焉而已謂老若廢疾而致仕者也今致仕與廢疾理得同不喜正之曰廢疾沈淪罔同人伍不淪臣道齊衰三月可也老而致仕臣禮既全恩既無替自應三年不得三月傳言仕焉而已者謂既仕而去義同人伍耳通典九十答孔瑚問庶子為人後其妻為本舅姑服孔瑚問虞喜曰愚謂庶子之妻不得如禮服其私親者以為身為宗主奉修祭祀以別尊卑故也凡婦服夫黨皆降一等唯公子厭至尊故其妻從輕而服重盡禮于皇姑則人情所許愚謂不得以公子為例喜答曰謂庶子為人後上繼祖禰此則厭于承重不得伸其私情故為所生止服緦麻其婦當依公子之妻盡禮皇姑從輕服重不繫于夫通典九十五又答孔瑚問玄孫之婦傳重孔瑚問虞喜曰假使玄孫為後玄孫之婦從服周曾孫之婦尚存才緦麻近輕遠重情實有疑虞喜答曰有嫡子者無嫡孫又若為宗子母服則不服宗子婦以此推玄孫為後若其母尚存玄孫之婦猶為庶不得傳重傳重之婦理當在姑矣通典九十六難賀循論父未殯而祖父死服案賀循喪服記云父死未殯而祖父死服祖以周既殯而祖父死三年此謂嫡子為父後者也父未殯服祖以周者父尸尚在人子之義未可以代重也喜以為三禮無有此條殆是脫失祖父正統非為旁親若父死未殯服祖但周則祖無倚廬傳重在誰假使祖為國君已為嫡孫祖歿已嗣此受封于祖祖之群臣服祖三年而已為嫡孫則服一周齊縗送葬斬杖無主雖云尸在未忍如大父何通典九十七安天論太史令陳季胄以先賢制木為儀名曰渾天御覽二言天體者三家渾蓋之術具存而宣夜之法絶滅有意續之而未遑也近見姚元道造昕天論又觀族祖河閒立意穹天論鄙意多喜以為天高窮于無窮地深測于不測天確乎在上有常安之形地魄焉在下有居靜之體當相覆冒方則俱方圓則俱圓無方圓不同之義也其光曜布列各自運行猶江海之有潮液萬品之有行藏也渾蓋之家依易立說云天運無窮或謂渾然包地或謂渾然而蓋愚謂若必天裹地似卵含黃則地是天中一物聖人何別為名而配天乎古之遺語日月行于飛谷謂在地中也不聞列星復流于地又飛谷一道何以容此且谷有水體日為火精水炭不共器得無傷日之明乎此蓋天所以為臣難也或難曰周禮有方圓之丘祭天地則知乾坤有方圓體也答曰郊祭大報天而主日配日月形圓丘似之非天體也方者別之于天尊卑異位何足怪哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方地卑不動天周其上故云周髀宣明也夜幽也幽明之數其術兼之故曰宣夜宋書天文志一隋書天文志上御覽二中山王睦立禰廟論譙與中山俱始封之君父非諸侯尊同敵體無所為厭竝立禰廟恩情兩伸荀議是也詔書所喻恐非禮意今上祭四代自以諸侯位尊得申其恩祭及四代不論毀且不毀為始封之君則譙王雖承父統禰廟亦在應毀之例不得長立也又安平獻王自為始封諸子雖別封而同為諸侯諸侯尊同不復各立此則公子為諸侯不得立禰廟也而譙王父非諸侯使與諸侯同列不得竝祭或難曰禮庶子不祭禰明其宗也若俱得祭父則竝統二嫡非明其宗也答曰若宗子與庶子位俱為士禰已有廟無為重設與公子為諸侯不立禰廟同也若尊卑不同則已恩得施竝祭無嫌也禮大夫三廟太祖百代不遷者也使大夫之後有庶統為諸侯者當上祭四代四代之前不得復祭若當奪宗則大夫太祖為廢其祀以此推之明得兼祭一者恩得伸隨代而毀一者繼太祖百代不替也通典五十一中山王睦乞立禰廟劉喜等議以為未得立廟荀顗議以為宜各得立廟詔從顗議又詔從劉喜前奏施行虞喜曰云云釋滯漢魏以來先儒論禮及喪服變除者皆言大夫降其旁親為士者一等時人或班駮行之自謂合禮案喪服經傳始封之君不臣諸父兄弟封君之子不臣諸父封君之孫盡臣之矣夫始封之君尚服諸父昆弟而始為大夫便降旁親尊者就重而卑者即輕輕重顛倒豈禮意哉然當有意此為據諸侯成例包于大夫以相兼通也如此則一代為大夫不降諸父二代為大夫不降兄弟三代為大夫皆降之古者貴大夫有采邑繼位不止一身魯之三桓鄭之七穆皆自此也或問曰今大夫雖不繼位亦有三代皆為大夫者名例相準必當隨古乎答曰古重今輕位無常居使吾處之志不存降通典九十三古者不降上下各以其親此殷以前也降殺之禮始之于周然先所未臣不忍即臣之故為之服也此當出逸禮採之以為義滕伯文為叔父齊衰既周代諸侯而從殷禮也若殷時諸侯通爾非獨一人指論滕伯欲以何明明其在周遠追于殷引古證今耳通典九十三通疑據文云父稅子不當其時則服之可知也當時雖服猶生不相見則恩義疏不責非時之恩于人以情恕之也若父以他故居異邦生已復更居一邦生弟然則例不稅服以生不相見故也文上言不及而下有弟字者明生不及相見理中可有弟矣已死而兄亦不稅此義兩施非衍也通典九十八喪服小記生不及祖父母諸父昆弟而父稅喪已則否劉智云弟衍字慈母雖賤服之如母明矣其父先亡已養于祖以祖母之服服之周可也不得復傳重三年同于繼祖母也通典九十八庶祖母慈祖母服或以當終身服喪如是曾閔所能僅行非凡人所逮也謂宜三年求之不得乃制服居廬祥禫而除通典九十八父母乖離釋疑若如鄭意既祔明月練而祭又明月祥此則葬至祥合為三月適足為一時何得言不同時而除練祥皆周之正數再祭當為練祥不得闕而用禫又案袁準云有練無祥失之矣鄭玄言練祥是也余謂喪服既終葬已踰月然猶再祭者存其大制耳此二祭蓋同日而異時時謂日也非三月之時禮亦有一日再祭檀弓云是日也以吉祭易喪祭通典一百三孫討逆殺于吉事江表傳所載不實志林初順帝時琅邪宮崇詣闕上師于吉所得神書于典陽泉水上白素朱界號太平青領道凡百卷順帝至建安中五六十歲于吉是時近已百年年在耄悼禮不加刑又天子巡狩問百年者就而見之敬齒以親愛聖王之至教也吉罪不及死而暴加酷刑是乃謬誅非所以為美也喜推考桓王之薨建女五年四月四日是時曹袁相攻未有勝負案夏侯元讓與石威則書袁紹破後也書云授孫賁以長沙業張津以零桂此為桓王于前亡張津于後死不得相讓譬言津之死意矣吳志孫討逆傳注吳主推五德之運以為土行用未祖辰臘土行以辰臘得其數矣土盛于戌而以未祖其義非也土生于未故未為坤初是以月令建未之月祖黃精于郊祖用其盛今祖用其始豈應運乎吳志大帝權傳注韋昭吳書不為丞相孫邵立傳吳之創基邵為首相史無其傳竊嘗怪之嘗問劉聲叔聲叔博物君子也云推其名位自應立傳項峻吳孚時已有注記此云與張惠恕不能後韋氏作史蓋惠恕之黨故不見書吳志大帝權傳注吳主論郊祀吳王糾駮郊祀之奏追貶匡衡謂之俗儒凡在見者莫不慨然以為統盡物理達于事宜至于稽之典籍乃更不通毛氏之說云堯見天因邰而生后稷故國之于邰命便事天故詩曰后稷肇祀庶無罪悔以迄于今言自后稷以來皆得祭天猶魯人郊祀也是以棫朴之作有積燎之薪文王郊酆經有明文匡衡豈俗而枉之哉文王雖未為天子然三分天下而有其二伐崇戡黎祖伊奔告天既棄殷乃眷西顧太伯三讓以有天下文王為王于義何疑然則匡衡之奏有所未盡案世宗立甘泉汾陰之祠皆出方士之言非據經典者也方士以甘泉汾陰黃帝祭天地之處故孝武因之遂立二畤漢治長安而甘泉在北謂就乾位而衡云武帝居甘泉祭于南宮此既誤矣祭汾陰在水之脽呼為澤中而衡云東之少陽失其本意此自吳事于傳無非恨無辨正之辭故矯之云吳志大帝權傳注諸葛恪不受呂岱戒初權病篤召恪輔政臨去大司馬呂岱戒之曰世方多難子每事必十思恪曰昔季文子三思而後行夫子曰再思可矣今君令恪十田明恪之劣也岱無以答當時咸謂之失言虞喜曰夫託以天下至重也以人臣行主威至難也兼二至而管萬幾能勝之者鮮矣自非採納群謀詢于芻蕘虛己受人恆若不足則功名不成勳績莫著況呂侯國之元耆智度經遠而甫以十思戒之而便以示劣見拒此元遜之疏乃機神不俱者也若因十思之義廣咨當世之務聞善速于雷動從諫急于風移豈得隕首殿堂死凶豎之刃世人奇其英辨造次可親而哂呂侯無對為陋不思安危終始之慮是樂春藻之繁華而忘秋實之甘口也昔魏人伐蜀蜀人禦之精嚴垂發六軍雲擾士馬擐甲羽檄交馳費褘時為元帥荷國任重而與來敏圍棊意無猒倦敏臨別謂褘君必能辦賊者也言其明略內定貌無憂色況長寧以為君子臨事而懼好謀而成者且蜀為蕞爾之國而方向大敵所規所圖惟守與戰何可矜已有餘晏然無戚斯乃性之寬𥳑不防細微卒為降人郭修所害豈非兆見于彼而禍成于此哉往聞長寧之甄文偉今覩元遜之逆呂侯二事體同故竝而載之可以鏡譏于後永為世鑒吳志諸葛恪傳注請祕府布紙表祕府中有布紙三萬餘枚不任寫御書而無所給愚欲請四百枚付著作史書寫起居注初學記二十一引兩條上疏請𥳑良將臣聞承平之世其教先文撥亂之運非武不剋故牧野之戰呂望杖鉞淮夷作難召伯專征玁狁為暴衛霍長驅故陰陽不和擢士為相三軍不勝拔卒為將漢帝既定天下猶思猛士以守四方孝文志存巨鹿馮唐進說魏尚復守詩稱赳赳武夫公侯干城折衝之佐豈可忽哉況今中州荒斃百無一存牧守官長非戎貊之族類即寇竊之幸脫陛下登阼威畼四遠故令此等反善向化然狼子獸心輕薄易動羯虜未殄益使難安周撫陳川相係背叛徐龕驕黠無所拘忌放兵侵掠罪已彰灼昔葛伯違道湯獻之牛吳濞失禮錫以几杖惡成罪著方復加戮龕之小醜何足不滅然豫備不虞古之善教矧乃有虞可不為防為防之術宜得良將將不素𥳑難以應敵壽春無鎮祖逖孤立前有徑虜後無係援雖有智力非可持久願陛下咨之群公博舉于衆若當局之才必允其任則宜獎厲使不顧命旁料𤕠猥或有可者厚加寵待足令忘身昔英布見慢恚欲自裁出觀供置然後致力禮遇之恩可不隆哉誠知山河之量非塵露可益神鑒之慮非愚淺所測然匹夫嫠婦猶有憂國之言況臣得廁朝堂之末蒙冠帶之榮者乎晉書虞預傳上書請舉賢才大晉受命于今五十餘載自元康以來王德始闕戎翟及于中國宗廟焚為灰燼千里無烟爨之氣華夏無冠帶之人自天地開闢書籍所載大亂之極未有若茲者也陛下以聖德先覺超然遠鑒作鎮東南聲教遐被上天眷顧人神贊謀雖云中興其實受命少康宣王誠未足喻然南風之歌可著而陵遲之俗未改者何也臣愚謂為國之要在于得才得才之術在于抽引苟其可用讎賤必舉高宗文王思佐發夢拔巖徒以為相載釣老而師之下至列國亦有斯事故燕重郭隗而三士競至魏式干木而秦兵退舍今天下雖斃人士雖寡十室之邑必有忠信世不乏驥求則可致而束帛未賁于丘園蒲輪頓轂而不駕所以大化不洽而雍熙有闕者也晉書虞預傳太興二年大旱詔求讜言直諫之士預上書諫曰云云父母乖離議子當越他境以求其舟楫所經人迹所至可前而進見難而退若山川之險非身所涉雖欲沒命則孝道不全宜廢榮利之勢居憔悴之戚純慘怛之行表德義之所先也通典九十八致雨議臣聞天道遺信地道貴誠誠信者蓋一儀所以生植萬物人君所以保乂黎蒸是以殺伐擬于震電推恩象于雲雨刑罰在于必信慶賞貴于平均臣聞閒者以來刑獄轉繁多力者則廣牽連逮以稽年月無援者則嚴其檟楚期于入重是以百姓嗷然感傷和氣臣愚以為輕刑耐罪宜速決遣殊死重囚重加以請寬徭息役務遵節儉砥礪朝臣使各知禁蓋老牛不犧禮有常制而自頃衆官拜授祖贈轉相夸尚屠殺牛犢動有十數醉酒流湎無復限度傷財敗俗所虧不少昔殷宗修德以消桑穀之異宋景善言以退熒惑之變楚國無災莊王是懼盛德之君未嘗無眚應以信順天祐乃隆臣學見淺暗言不足採晉書虞預傳咸和初夏旱詔衆官各陳致雨之意預議奏記會稽太守庾琛軍寇以來賦役繁數兼值年荒百姓失業是輕徭薄斂寬刑省役之時也自頃長吏輕多去來送故迎新交錯道路受迎者惟恐船馬之不多見送者惟恨吏卒之常少窮奢竭費謂之忠義省煩從簡呼為薄俗轉相放效流而不反雖有常防莫肯遵修加以王塗未夷所在停滯送者經年永失播植一夫不耕十夫無食況轉百數所妨不訾愚謂宜勒屬縣若令尉先去官者人船吏侍皆具條列到當依法減省使公私允當又今統務多端動加重制每有特急輒立督郵計今直兼三十餘人人船吏侍皆當出官益不堪命宜復減損嚴為之防晉書虞預傳與丞相王導箋伏見前祕書光祿大夫荀公生于積德之族少有儒雅之稱歷位內外在貴能降蘇峻肆虐乘輿失幸公處嫌忌之地有纍卵之危朝士為之寒心論者謂之不免而公將之以智險而不懾扶侍至尊繾綣不離雖無扶迎之勳宜蒙守節之報且其宣慈之美早彰遠近朝野之望許以台司雖未正位已加儀同至守終純固名定闔棺而薨卒之日直加侍中生有三槐之望沒無鼎足之名寵不增于前秩榮不副于本望此一時愚智所慷慨也今承大斃之後淳風頽散苟有一介之善宜在旌表之例而況國之元老志節若斯者乎晉書荀嵩傳與從叔父書近或聞諸君以預入寺便應委質則當親事不得徒己然預下愚過有所懷邪黨互瞻異同蜂至一旦差跌衆鼓交鳴毫釐之失差以千里此古人之炯戒而預所大恐也晉書虞預傳宗人共薦預為縣功曹欲使沙汰穢濁預與從叔父書晉書宣帝述上雖服膺文藝以儒素立德而雅有雄霸之量值魏氏短祚內外多難謀而鮮過舉必獨克知人拔善顯揚側陋王基鄧艾州泰賈越之徒皆起自寒門而著績于朝經略之才可謂遠矣御覽九十五
