body:
  text: 左九嬪離思賦生蓬戶之側陋兮不間習於文符不見圖畫之妙像兮不聞先哲之典謨既愚陋而寡識兮謬忝側於紫廬非草苗之所處兮恆怵惕以憂懼懷思慕之忉怛兮兼始終之萬慮嗟隱憂之忱積兮獨鬱結而靡訴意慘憒而無聊兮思纏綿以增慕夜耿耿而不寐兮魂憧憧而至曙風騷騷而四起兮霜皚皚而依庭日暗曖而無光兮氣懰栗以洌清懷愁戚之多感兮忠涕淚之自零昔伯瑜之婉孌兮每綵衣以娛親悼今日之乖隔兮奄與家為參辰豈相去之云遠兮曾不盈乎數尋何宮禁之清切兮欲瞻覩而莫因仰行雲以歔欷兮涕流射而沾巾惟屈原之哀感兮嗟悲傷於離別彼城闕之作詩兮亦以日而喻月況骨肉之相於兮永緬邈而兩絶長含哀而抱戚兮仰蒼天而泣血亂曰骨肉至親化為他人永長辭兮慘愴愁悲夢想魂歸見所思兮驚寤號咷心不自聊泣漣洏兮援筆舒情涕淚增零訴斯詩兮晉書左貴嬪傳相風賦闕孔雀賦戴緑碧之秀毛擢翠尾之修莖令芳桂之凝露食秋菊之落英耀丹紫之倏爍應晨風以悲鳴藝文類聚九十一鸚武賦色則丹喙翠尾緑翼紫頸秋敷其色春耀其榮藝文類聚九十一白鳩賦泰始八年鳩巢於廟闕而孕白鳩一隻毛色甚鮮金行之應也御覽九百二十一松柏賦何奇樹之英蔚記峻嶽之嵯峨被玄澗之逶迤臨淥水之素波擢修本之丸丸萃緑葉之芬葩敷纖莖之蘢蓯布秀葉之蔥青列疏實之離離馥幽藹而永馨紛翕習以披離氣肅肅以青泠應長風以鳴條似絲竹之遺聲稟天然之貞徑經嚴冬而不零雖凝霜而挺幹近青春而秀榮若君子之順時又似乎真人之抗貞赤松遊其下而得道文賓餐其實而長生詩人歌其榮蔚齊南山以永寧藝文類聚八十八初學記二十八涪漚賦覽庶類之肇化何涪漚之獨靈稟陰精以運景因落雨而結形不係根於獨立故假物以資生體珠光之皎皎若凝霜之初成色鮮熠以熒熒似融露之將渟亡不長消存不久寄其成不欲難其敗亦以易也藝文類聚八武帝納皇后頌峨峨華嶽峻極泰清巨靈導流河瀆是經惟瀆之神惟嶽之靈鍾於楊族載育盛明穆穆我后應期挺生含聰履哲岐嶷夙成如蘭之茂如玉之瑩越在幼沖休有令名飛聲八極翕習紫庭超妊邈姒比德皇英京室是嘉備禮致聘令月吉辰百僚奉迎周生歸韓詩人是詠我后戾至車服暉映登位太微明德日盛群黎欣戴函夏同慶翼翼聖皇睿哲孔純愍茲狂戾闡惠播仁蠲釁滌穢與時惟新沛然洪赦恩詔遐震后之踐祚囹圄虛陳萬國齊歡六合同欣坤神抃舞天人載悅興瑞降祥表精日月和氣煙熅三光朗烈既獲嘉時尋播甘雪玄雲暗藹靈液霏霏既儲既積待陽而晞曣晛沾濡柔潤中畿長亨豐年福祿永綏晉書左貴嬪傳藝文類聚十五楊皇后登祚頌闕德柔頌邈邈德柔越天之剛神以知來智以藏往含純溥生允矣君子展也大成執德純粹嶽峻川停履行高厲蕩乎其平敦興聖道率正不傾令問不已載路厥聲藝文類聚二十一芍藥花頌闕鬱金頌伊此奇草名曰鬱金越自殊域厥珍來尋芬香酷烈悅目欣心明德惟馨淑人是欽窈宨妃媛服之褵襟永重名實曠世弗沈藝文類聚八十一菊花頌英英麗質稟氣靈和春茂翠葉秋耀金華初學記二十七案藝文類聚八十一以為傅統妻辛氏作未知孰是神武頌闕虞舜二妃贊妙矣二妃體應靈符奉嬪于媯光此有虞沈湘示教靈德永敷惟斯美善諒無泯乎藝文類聚十五初學記十周宣王薑后贊昭昭宣王克復前制亹亹薑后乃激乃厲執心至公以恢明世藝文類聚十五班婕妤贊恂恂班女恭讓謙虛辭輦進賢辨祝理誣形圖丹青名侔樊虞孟軻母贊鄒母善導三徙成教鄰止庠序俎豆是效斷織激子廣以墳奧聰達知禮敷述聖道狂接輿妻贊接輿高潔懷道行謠妻亦冰清同味玄昭遺俗榮津志遠神遼荊武王夫人鄧曼贊天道惡盈極數則微邈哉鄧曼心映禍幾覩兆歎亡考德知衰賢智卓殊邈哉難追齊杞梁妻贊遭命不改逢時險屯夫卒莒場郊弔不賓哀崩高城訴情穹旻遂赴淄川託軀清津齊義繼母贊聖教玄化禮貴信誠至哉繼母行合典經不遺宿諾義割私情表德來裔垂則後生魯敬薑贊邈矣敬薑含德之英於行則高於理斯明垂訓子宗厲發奇聲宣尼三歎萬代遺馨已上並藝文類聚十八德剛贊溫溫德剛實秉道純履此聖義體此敦仁篤物博好靡疏靡親九族懷附邦邑望塵貴實賤華尚素安貧雖在崇高必若平民匪道之崇譬之生民褒飾之譽謂之謗身惟義是存惟道是遵藝文類聚二十一巢父惠妃贊泱泱長流沔沔清波思文巢惠載詠載歌垂綸一壑萬象匪多神乎畼矣緬同基阿藝文類聚三十六納楊后贊清和協極二儀降靈啓茲楊族仁哲誕生徽音內發有馥其馨玄符表運作合聖明文定厥祥考卜惟貞良辰納幣三光清明元公執摯嘉禮告成卿士庶僚爛其充庭赫赫華宗奕世載榮謙光其尊在滿戒盈受茲介福垂祚益齡藝文類聚十六元皇后誄伏惟聖善宣慈仁洽六宮含弘光大德潤四海妾聞之前志卑不誄尊少不誄長楊雄臣也而誄漢后班固子也而誄其父皆以述揚景仁顯之竹帛豈所謂三代不同禮隨時而作者乎藝文類聚十五惟泰始十年秋七月丙寅晉元皇后楊氏崩嗚呼哀哉昔有莘適殷薑姒歸周宣德中闈徽音永流樊衛二姬匡齊翼楚馬鄧兩妃亦毗漢主峨峨元后光嬪晉宇伉儷聖皇比蹤往古遭命不永背陽即陰六宮號咷四海慟心嗟余鄙妾銜恩特深追慕三良甘心自沈何用存思不忘德音何用紀述託辭翰林乃作誄曰赫赫元后出自有楊奕世朱輪耀彼華陽惟嶽降神顯茲禎祥篤生英媛休有烈光含靈握文異于庶薑和畼春日操厲秋霜疾彼攸遂敦此義方率由四教匪怠匪荒行周六親徽音顯揚顯揚伊何京室是臧乃娉乃納聿嬪聖皇正位閨閾惟德是將鳴珮有節發言有章仰觀列圖俯覽篇籍顧問女史咨詢竹帛思媚皇姑虔恭朝夕允釐中饋執事有恪于禮斯勞于敬斯勤雖曰齊聖邁德日新日新伊何克廣弘仁終溫且惠帝妹是親經緯六宮罔不彌綸群妾惟仰譬彼北辰亦既青陽鳴鳩告時躬執桑曲率導媵姬修成蠶蔟分繭理絲女工是察祭服是治祗奉宗廟永言孝思于彼六行靡不蹈之皇英佐舜塗山翼禹惟衛惟樊二霸是輔明明我后異世同軌亦能有亂謀及天府內敷陰教外毗陽化綢繆庶正密勿夙夜恩從風翔澤隨雨播中外禔福遐邇詠歌天祚貞吉克昌克繁則百斯慶育聖育賢教踰妊姒訓邁薑嫄堂堂太子惟國之元濟濟南陽為屏為藩本支菴譪四海蔭焉微斯皇妣孰茲克臻曰乾蓋聰曰聖允誠積善之堂五福所并宜享高年匪隕匪傾如彭之齒如聃之齡云胡不造于茲禍殃寢疾彌留寤寐不康巫咸騁術扁鵲奏方祈禱無應嘗藥無良形神既離載昏載荒奄忽崩殂湮精滅光哀哀太子南陽繁昌攀援不寐劈踴摧傷嗚呼哀哉闔宮號咷宇內震驚奔者填衢赴者塞庭哀慟雷駭流泲雨零歔欷不已若喪所生惟帝與后契闊在昔比翼白屋雙飛紫閣悼后傷後早即窀穸言斯既及涕泗隕落追維我后實聰實哲通于性命達于儉節送終之禮比素上世襚無珍寶含無明月潛輝梓宮永背昭晰臣妾哀號同此斷絶庭宇遏密幽室增陰空設帷帳虛置衣衾人亦有言神道難尋悠悠精爽豈浮豈沈豐奠日陳冀魂之臨孰云元后不聞其音乃議景行景行已溢乃考龜筮龜筮襲吉爰定宅兆克成玄室魂之往矣于以令日仲秋之晨啓明始出星陳夙駕靈輿結駟其輿伊何金根玉箱其駟伊何二駱雙黃習習容車朱服丹章隱隱轜軒辨絰繐裳華轂曜野素蓋被原方相仡仡旌旐翻翻挽童引歌白驥鳴轅觀者夾塗士女涕漣千乘萬騎迄彼峻山峻山峨峨層阜重阿弘高顯敞據洛背河左瞻皇姑右睇帝家惟存揆亡明神所嘉諸姑姊妹娣姒媵御追送塵軌號咷衢路王侯卿士雲會星布群官庶僚縞蓋無數咨嗟通夜東方云曙百祇奉迎我后安厝中外俱臨同哀並慕涕如連雲淚如湛露扃闓既闔窈窈冥冥有夜無晝曷用其明不封不樹山坂同形昔后之崩大火西流寒往暑過今亦孟秋自我銜恤鯈忽一周衣服將變痛心若抽逼彼禮制惟以增憂去此素衣結戀靈丘有始有終天地之經自非三光誰能不零存播令德沒圖丹青先哲之志以此為榮溫溫元后實宣慈焉撫育群生恩惠滋焉遺愛不已永見思焉懸名日月垂萬春焉嗚呼庶妾感四時焉言思言慕涕漣洏焉晉書左貴嬪傳藝文類聚十五萬年公主誄昔滿衣早智周晉夙成咸以岐嶷名存典經猗歟公主在幼剋哲方德比齒有邈先烈何德之盛而年或闕何華之繁而實不結雨墜風逝形影長滅赫赫京室河洛所經陰精發曜降茲淑靈篤生公主誕膺休楨秀出紫微日暉月明既睇豔姿徽音孔昭盼蒨其媚婉曼其嬌寵玩軒陛如瓊如瑤雖則弱齒雙德兼苞五福所集聞之先民積善鍾慶祐德輔仁宜終淑美光暉日新云何降戾景命不振曄曄榮曜芳蕤始芳可辜於天猥遇降霜煢煢稚魂飄飄遐翔於戲何辜痛茲不福生而何晚歿而何速酷矣皇靈謬哉司祿嗚呼哀哉日月載馳白露凝結自主薨徂奄離時節吉凶乖邈存亡異制將遷幽都潛神永翳嗚呼公主魂豈是綏岌岌靈轜駿駟騑騑挽僮齊唱悲音激摧士女歔欷高風增哀一日不見采蕭作歌況我公主形滅體訛精靈遷逝幽此中阿言思言念涕淚滂沱嗚呼哀哉藝文類聚十六又初學記十目録左貴嬪集有離思賦相風賦孔雀賦松柏賦涪漚賦納皇后頌楊皇后登祚頌芍藥花頌鬱金頌菊花頌神武頌四言詩四首武元皇后誄萬年公主誄御覽一百四十五矯詔授楚王瑋太宰太保欲為伊霍之事王宜宣詔今淮南長沙成都王屯宮諸門廢二公晉書楚王瑋傳賈后使惠帝為詔夜使黃門齎以授瑋瑋欲復奏黃門曰事恐漏泄非密詔本意瑋遂勒軍收太宰汝南王亮太保衛瓘殺之瑋坐矯制斬百姓為之立祠賈后先惡瓘亮又忌瑋故以計相次誅之案瑋傳似此詔賈后逼帝為之惠帝紀作賈后矯詔乞以王禮葬愍懷太子表遹不幸喪亡傷其迷悖又早短折悲痛之懷不能自已妾私心冀其刻肌刻骨更思孝道規為稽顙正其名號此志不遂重以酸恨遹雖罪在莫大猶王者子孫便以匹庶送終情實憐愍特乞天恩賜以王禮妾誠暗淺不識禮義不勝至情冒昧陳聞晉書愍懷太子傳天子拜敬保傅詔尊師重道帝王之所宜務況童幼方賴師訓之成宜令一遵先帝崇賢之禮通典六十七報卞壺詔市須成人更詳師傅之禮通典六十七答蔡謨等奏請臨朝詔帝幼沖當賴群公卿士將順匡救以酬先帝禮賢之意且是舊德世濟之美則莫重之命不墜祖宗之基有奉是其所以欲正位于內而己所奏懇到形于翰墨執省未究以悲以懼先后允恭謙抑思順坤道所以不距群情固為國計豈敢執守沖暗以違先旨輒敬從所奏晉書康獻褚后傳振恤詔今百姓勞弊其共思詳所以振恤之宜及歲常調非軍國所急者並宜停之晉書穆帝紀免蔡謨為庶人詔謨先帝師傅服事纍世且歸罪有司內訟思愆若遂置之於理情所未忍可依舊制免為庶人晉書蔡謨傳答殷融等重議敬父詔典禮誠所未詳如所奏是情所不能安也更詳之晉書康獻褚后傳通典六十七答何充詔具所啓舊典誠無以相易然此實所悚懼不寧者也通典六十七以蔡謨為光祿大夫詔前司徒謨以道素著稱軌行成名故歷事先朝致位台輔以往年之失用致黜責自爾以來闔門思愆誠合大臣罪已之義以謨為光祿大夫開府儀同三司晉書蔡謨傳歸政詔昔遭不造帝在幼沖皇緒之微眇若贅旒百辟卿士率遵前朝勸喻攝政以社稷之重先代成義僶俯敬從弗遑固守仰憑七廟之靈俯仗群后之力帝加元服禮成德備當陽親覽臨御萬國今歸事反政一依舊典晉書康獻褚后傳歸崇德宮手詔群公昔以皇帝幼沖從群后之議既以暗弱又頻丁極艱銜恤歷祀沈憂在疚司徒親尊德重訓救其弊王室之不壞實公是憑帝既備茲冠禮而四海未一五胡叛逆豺狼當路費役日興百姓困苦願諸君子思量遠算戮力一心輔翼幼主匡救不逮未亡人永歸別宮以終餘齒仰惟家國故以一言託懷晉書康獻褚后傳以琅邪王奕承大統詔帝遂不救厥疾艱禍仍臻遺緒泯然哀慟切心琅邪王奕明德茂親屬當儲嗣宜奉祖宗纂承大統便速正大禮以寧人神晉書廢帝紀以會稽王昱承大統詔丞相録尚書會稽王體自中宗明德劭令英秀玄虛神棲事外以具瞻允塞故阿衡三世道化宣流人望攸歸為日已久宜從天人之心以統皇極主者明依舊典以時施行晉書簡文帝紀答群臣奏請臨朝詔王室不幸仍有艱屯覽省啓事感增悲歎內外諸君並以主上春秋沖富加蒸蒸之慕未能親覽號令宜有所由苟可安社稷利天下亦豈有所執輒敬從所啓但暗昧之闕望盡弼諧之道晉書康獻褚后傳拯恤詔頃玄象或愆上天表異仰觀斯變震懼于懷夫因變致休自古之道朕敢不剋意復心以思厥中又三吳奧壤股肱望郡而旱水併臻百姓失業夙夜惟憂不能忘懷宜時拯恤救其雕困三吳義興晉陵及會稽遭水之縣尤甚者全除一年租布其次聽除半年受振貸者即以賜之晉書孝武帝紀賜米窮民詔頃日蝕告變水旱不適雖克己思救未盡其方其賜百姓窮者米人五斛晉書孝武帝紀歸政詔皇帝婚冠禮備遐邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典晉書康獻褚后傳收于法開令帝小不佳昨呼于公視脈但到門不前種種辭憚宜收付廷尉高僧傳四以琅邪王丕奉大統令帝奄不救疾胤嗣未建琅邪王丕中興正統明德懋親昔在咸康屬當儲二以年在幼沖未堪國難故顯宗高讓今義望情地莫與為比其以王奉大統晉書哀帝紀以廢帝奕為東海王令王室艱難穆哀短祚國嗣不育儲宮靡立琅邪王奕親則母弟故以入纂大位不圖德之不建乃至於斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢奕為東海王以王還第供衛之義皆如漢朝昌邑故事但未亡人不幸罹此百憂感念存歿心焉如割社稷大計義不獲己臨紙悲塞如何可言晉書廢帝紀下令減膳戎車屢警黎元阻飢而膳御豐靡豈與百姓同其儉約減損供給勿令遊過晉書穆章何后傳
