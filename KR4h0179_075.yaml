body:
  text: 張斐表上律法律今者政事之經萬機之緯藝文類聚五十四鄭鑄刑書晉作執秩趙制國律楚造僕區竝述法律之名申韓之徒各自立制同上張湯制越官律趙禹作朝會正見律御覽六百三十八律始于刑名者所以定罪制也終于諸侯者所以畢其政也王政布于上諸侯奉于下禮樂撫于中故有三才之義焉其相須而成若一體焉刑名所以經略罪法之輕重正加減之等差明發衆篇之多義補其章條之不足較舉上下綱領其犯盜賊詐僞請賕者則求罪于此作役水火畜養守備之細事皆求之作本名告訊為之心舌捕繫為之手足斷獄為之定罪名例齊其制自始及終往而不窮變動無常周流四極上下無方不離于法律之中也其知而犯之謂之故意以為然謂之失違忠欺上謂之慢背信藏巧謂之詐虧禮廢節謂之不敬兩訟相趣謂之鬭兩和相害謂之戲無變相擊謂之賊不意誤犯謂之過失逆節絶理謂之不道陵上僭貴謂之惡逆將害未發謂之戕唱首先言謂之造意二人對議謂之謀制衆建計謂之率不和謂之強攻惡謂之略三人謂之群取非其物謂之盜貨財之利謂之贓凡二十者律義之較名也夫律者當慎其變審其理若不承用詔書無故失之刑當從贖謀反之同伍實不知情當從刑此故失之變也卑與尊鬭皆為賊鬭之加兵刃水火中不得為戲戲之重也向人室廬道徑射不得為過失之禁也都城人衆中走馬殺人當為賊賊之似也過失似賊戲似鬭鬭而殺傷旁人又似誤盜傷縛守似強盜呵人取財似受賕囚辭所連似告劾諸勿聽治似故縱持質似恐猲如此之比皆為無常之格也五刑不𥳑正于五罰五罰不服正于五過意善功惡以金贖之故律制生罪不過十四等死刑不過三徒加不過六囚加不過五纍作不過十二歲纍笞不過千二百刑等不過一歲金等不過四兩月贖不計日日作不拘月歲數不疑閏不以加至死并死不復加不可纍者故有井數不可井數乃纍其加以加論者但得其加與加同者連得其本不在次者不以通論以人得罪與人同以法得罪與法同侵生害死不可齊其防親疏公私不可常其教禮樂崇于上故降其刑刑法間于下故全其法是故尊卑敘仁義明九族親王道平也律有事狀相似而罪名相涉者若加威勢下手取財為強盜不自知亡為縛守將中有惡言為恐猲不以罪名呵為呵人以罪名呵為受賕劫召其財為持質此六者以威勢得財而名殊者也即不求自與為受求所監求而後取為盜贓輸入河受為留難斂人財物積藏于官為擅賦加毆擊之為戮辱諸如此類皆為以威勢得財而罪相似者也夫刑者司理之官理者求情之機情者心神之使心感則情動于中而形于言畼于四支發于事業是故奸人心愧而面赤內怖而色奪論罪者務本其心審其情精其事近取諸身遠取諸物然後乃可以止刑仰手似乞俯手似奪捧手似謝擬手似訴拱臂似自首攘臂似格鬭矜莊似威怡悅似福喜怒憂歡貌在聲色奸貞猛弱候在視息出口有言當為告下手有禁當為賊喜子殺怒子當為戲怒子殺喜子當為賊諸如此類自非至精不能極其理也律之名例非正文而分明也若八十非殺傷人他皆勿論即誣告謀反者反坐十歲不得告言人即奴婢捍主主得謁殺之賊燔人廬舍積聚盜賊贓五匹以上棄市即燔官府積聚盜亦當與同毆人教令者與同罪即令人毆其父母不可與行者同得重也若得違物強取強乞之類無還贓法隨例畀之文法律中諸不敬違儀失式及犯罪為公為私贓入身不入身皆隨事輕重取法以例求其名也夫理者精玄之妙不可以一方行也律者幽理之奧不可以一體守也或計過以配罪或化俗以循常或隨事以盡情或趣舍以從時或推重以立防或引輕以就下公私廢避之宜除削輕重之變皆所以臨時觀釁者用法執銓者幽于未制之中采其根牙之徽致之于機格之上稱輕重于亮銖考輩類于參伍然後乃可以理直刑正夫奉聖典者若操刀執繩刀妄加則傷物繩妄彈則侵直梟首者惡之長斬刑者罪之大棄市者死之下髡作者刑之威贖罰者誤之誡王者立此五刑所以寶君子而逼小人也故為敕慎之經皆擬周易有變通之體焉欲令提綱而大道清舉略而王法齊其旨遠其辭文其言曲而中其事肆而隱通天下之志唯忠也斷天下之疑唯文也切天下之情唯遠也彌天下之務唯大也變無常體唯理也非天下之賢聖孰能與于斯夫形而上者謂之道形而下者謂之器推而行之謂之通化而裁之謂之格刑殺者似冬震曜之象髡罪者似秋雕落之變贖失者似春陽悔吝之疵也五刑成章輒相依準法律之義也晉書刑法志泰始三年賈充等表上新律其後張斐又注律表上之其要云云又見通典一百六十四御覽六百三十九又六百四十二六百四十九議原庾純敦敘風俗以人倫為先人倫之教以忠孝為主忠故不忘其君孝故不忘其親若孝必專心于色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子者必以情割其義在朝則從君之命在家則隨父之制然後君父兩濟忠孝各序純兄峻以父老求歸峻若得歸純無不歸之勢峻不得歸純無得歸之埋純雖自聞同不見聽近遼東太守孫和廣漢太守鄧良皆有老母良無兄弟授之遠郡辛苦自歸皆不見聽且純近為京尹父在界內時得自啓定省獨于禮法外處其貶黜斌愚以為非理也禮年八十一子不從政純有二弟在家不為違理又令年九十乃聽悉歸今純父實未九十不為違令罵辱宰相宜加放斥以明國典聖恩愷悌示加貶退臣愚無所清議晉書庾純傳賈充責純父老不歸供養純曰高貴鄉公何在詔免純官使據禮典正其臧否司徒西曹掾劉斌議云云又見通典六十八請原庾純表臣郡前尹關內侯純醉酒失常戊申詔書既免尹官以父篤老不求供養下五府依禮典正其臧否臣謹案三王養老之制八十一子不從政九十其家不從政斯誠使人子無闕孝養之道為臣不虧在公之節也臣聞先王制禮垂訓將來使能為俯就不能企及莫尚于周當其時也姬公留周伯禽之魯孝子不匱典禮無愆今公府議七十時制八十月制欲以駮奪從政之限削除爵土是為公旦立法還自越之魯侯為子即為罰首也石奮期頤四子列郡近太宰獻王諸子亦在藩外古今同符忠孝竝濟臣聞悔吝之疵君子有之尹性少飲多遂至沈醉尹醒聞之悼恨前失執謙引罪深自奏劾求入重法今公府不原所由而謂傲狠是為重罪過醉之言而沒迷復之義也臣聞父子天性愛由自然君臣之交出自義合而求忠臣必于孝子是以先王立禮敬同于父原始要終齊干所生如此猶患人臣罕能致身今公府議云禮律雖有常限至于疾病歸養不奪其志如此則為禮禁正直而陷人以詐違越王制開其殆原尹少履清苦事親色養歷職內外公廉無私此陛下之所以屢發明詔而尹之所以仍見擢授也尹行已也恭率下也敬先衆後己實是宿心一旦由醉責以暴慢案奏狀不忠不孝群公建議削除爵土此愚臣所以自悲自悼拊心泣血也案今父母年過八十聽令其子不給限外職誠以得有歸來之緣今尹居在郡內前每表屢蒙定省尹昆弟六人三人在家孝養不廢兄侍中峻家之嫡長往比自表求歸供養詔喻不聽國體法同兄弟無異而虛責尹不求供養如斯臣懼長假飾之名而損忠誠之實也夫禮者所以經國家定社稷也故陶唐之隆順考古訓周成之美率由舊章伏惟陛下聖德欽明敦禮崇教疇咨四嶽以詳典制尹以犯違受黜而所由者醉公以教義是責而所因者忿積忿以立義由醉以得罪禮律不復為斷文致欲以成法是以愚臣敢冒死亡之誅而恥不伸于盛明之世惟蒙哀察晉書庾純傳又通典六十八譙周頌抑抑譙侯好古述儒寶道懷真鑒世盈虛雅名美迹終始是書我后欽賢無言不譽攀諸前哲丹青是圖嗟爾來葉鑒茲顯模蜀志譙周傳注引益部耆舊傳薦范粲表操行高潔久嬰疾病可使郡縣輿致京師加以聖恩賜其醫藥若遂瘳除必有益于政晉書隱逸范粲傳條諸葛亮五事其一事曰亮刑法峻急刻剝百姓自君子小人咸懷怨歎法正諫曰昔高祖入關約法三章秦民知德今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮答曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以弘濟劉璋暗弱自焉已來有纍世之恩文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由于此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩竝濟上下有節為治之要于斯而著其二事曰曹公遣刺客見劉備方得交接開論伐魏形勢甚合備計稍欲親近刺者尚未得便會既而亮入魏客神色失措亮因而察之亦知非常人須臾客如廁備謂亮曰向得奇士足以助君補益亮問所在備曰起者其人也亮徐歎曰觀客色動而神懼視低而忤數奸形外漏邪心內藏必曹氏刺客也追之已越牆而走三事曰亮屯于陽平遣魏延諸軍并兵東下亮惟留萬人守城晉宣帝率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵候白宣帝說亮在城中兵少力弱亮亦知宣帝垂至已與相逼欲前赴延軍相去又遠回迹反追勢不相及將士失色莫知其計亮意氣自若敕軍中皆臥旗息鼓不得妄出菴幔又令大開四城門掃地卻灑宣常常謂亮持重而猥見勢弱疑其有伏兵于是引軍北趣山明日食時亮謂參佐拊手大笑曰司馬懿必謂吾怯將有彊伏循山走矣候邏還白如亮所言宣帝後知深以為恨四事曰亮出祁山隴西南安二郡應時降圍天水拔冀城虜姜維驅略士女數千人還蜀人皆賀亮亮顏色愀然有戚容謝曰普天之下莫非漢民國家威力未舉使百姓困于豺狼之吻一夫有死皆亮之罪以此相賀能不為愧于是蜀人咸知亮有吞魏之志非惟拓境而已五事曰魏明帝自征蜀幸長安遣宣王督張郃諸軍雍涼徑卒三十餘萬潛軍密進規向劍閣亮時在祁山旌旗利器守在險要十二更下在者八萬時魏軍始陳幡兵適交參佐咸以賊衆強盛非力所制宜權停下兵一月以并聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遣令去于是去者感悅願留一戰住者憤踊思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刀爭先以一當十殺張郃卻宣王一戰大克此信之由也蜀志諸葛亮傳注引王隱蜀記云晉初扶風王駿鎮關中司馬高平劉寶長史滎陽桓隰諸官屬土大夫共論諸葛亮于是談者多譏亮託身非所勞困蜀民力小謀大不能度德量力金城郭沖以為亮權智英略有踰管晏功業未濟論者惑焉條亮五事隱歿不聞于世者寶等亦不能復難扶風王慨然善沖之言莊子序夫莊子者可謂知本矣故未始藏其狂言言雖無會而獨應者也夫應而非會則雖當無用言非物事則雖高不行與夫寂然不動不得已而後起者固有閒矣斯可謂知無心者也夫心無為則隨感而應應隨其時言唯謹爾故與化為體流萬代而冥物豈曾設對獨遘而游談乎方外哉此其所以不經而為百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生之變而明內聖外王之道上知造物無物下知有物之自造也其言宏綽其旨玄妙至至之道融微旨雅泰然遣放放而不敖故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎淡泊鼓腹而游乎混芒至人極乎無親孝慈終于兼忘禮樂復乎己能忠信發乎天光用其光則其朴自成是以神器獨化于玄冥之境而源流深長也故其長波之所蕩高風之所扇畼乎物宜適乎民願弘其鄙解其懸灑落之功未加而矜夸所以散故觀其書超然自以為已當經崑崙涉太虛而游惚恍之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流倣佛其音影猶足曠然有忘形自得之懷況探其遠情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也宋本莊子劉寶孫為祖持重議孫為祖不三年喪服云孫為祖周案小記為祖後者祖母三年二文不同何以為正答曰經無孫為祖三年之文小記所云為祖母三年自謂無後養人子以為孫者耳喪服云為人後者三年為人後者或為子或為孫故經但稱為人後不列所後者名所以通人無貴賤為人後者用此禮也若荀太尉無子養兄孫以為孫是小記所謂為祖後者也夫人情不殊祖所養孫猶子而孫奉祖猶父故聖人稱情以定制為人後者無復父祖之差同三年也喪服傳父卒然後為祖後者斬此謂嫡孫為祖喪主當服斬不解傳意小記與傳但解經意耳稱者此祖為父之長子祖之嫡孫也以上厭于父父亡然後乃下為長子斬非孫上為祖斬也通典八十八孫為庶祖持重議曾祖是庶而祖父是嫡又是嫡孫矣若庶祖無嫡可傳則非正體乎上傳重之義也既無大夫士之位無嫡統之重孫為庶人父為士而有諸父嫡其孫生不主養祭非所及而所攝一家之重居諸父之右祖無重可傳而孫以重自居為父長子而以嫡孫繼祖推情處禮于義為乖凡祖是庶而父為長宜制齊縗通典八十八難劉寶孫為祖持重議難劉寶孫為祖持重議喪服小記祖父卒為祖母服者三年此謂孫為祖後也喪服父亡為母三年言為祖母三年祖父三年可知也為人後者以當收族而嚴宗廟也必以同宗丈子擇其昭穆之倫而立之不得高祖無子而立玄孫之序嚴宗廟者亦可以任繼養使鬼神有所享也案士二廟若立玄孫則所嚴之祖不及曾高而祖禰無鬼將何所饗乎荀太尉秩尊其統遠親宜廟有四孫之所得祭高祖也則于太尉為祖子所得祭高祖也今立孫但得祭祖而使曾祖不食是則先人將恐于為厲故知非立後之道也又臣從君服每降一等喪服為君之祖服用制君服三年明之也若如論意謂小記所言是為長子服者又當言父卒然後為子三年不得言祖父卒而為祖母後者三年又養人子為己孫與己自有孫豈異哉通典八十八孫為庶祖持重議凡所重明是先祖之體蓋非爵土財計之謂至于庶子之子為繼禰之宗則得為其子三年矣父尊其禰而子替祖服不貴正體而必云爵土忽其敬宗而重其財計承財計則為之服斬縗無産業則廢三年此非義矣又經有為君之祖服周是為臣從君服從服例降一等此則君為祖三年矣既為君而有父祖之喪謂父祖竝有廢疾不得受國而已受位于曾祖者也祖無受國無重可傳而猶三年斯蓋正統貴體之義不必以爵土傳已也體存則就養無方亡則庶子不祭所以達孝明宗吉凶異智故知生不主養者無害死掌其祀也而云祭非所及乖乎周孔之意爾斯人無祖矣通典八十八
