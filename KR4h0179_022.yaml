body:
  text: 卷二十二王羲之用筆賦秦漢魏至今隸書其惟鍾繇草有黃綺張芝至於用筆神妙不可得而詳悉也夫賦以布諸懷抱擬形於翰墨也辭曰何異人之挺發精博善而含章馳鳳門而獸據浮碧水而龍驤滴秋露而垂玉搖春條而不長飄飄遠逝浴天池而頡頏翱翔弄翮淩輕霄而接行詳其真體正作高強徑實方員窮金石之麗纖粗盡凝脂之密藏骨抱筋含文包質沒沒汨汨若濛泛之落銀鉤耀耀晞晞狀扶桑之挂朝日或有飄颻騁巧其若自然包羅羽客總括神仙李氏韜光類隱龍而怡情王喬脫屣欻飛鳧而上征或改變駐筆破真成草養德儼如威而不猛遊絲斷而還續龍鸞群而不諍髮指冠而皆裂據純鉤而耿耿忽瓜割兮互裂復交結而成族若長天之陳雲如倒松之臥谷時滔滔而東注乍紐山兮暫塞射雀目以施巧拔長蛇兮盡力草草眇眇或連或絶如花亂飛遙空舞雪時行時止或臥或蹶透嵩華兮不高踰懸壑兮非越信能經大緯地毗助王猷耽之玩之功積山丘吁嗟秀逸萬代嘉休顯允哲人於今鮮儔共六合而俱永與兩曜而同流鬱高峰兮偃蓋如萬歲兮千秋墨池編臨護軍教今所任要在於公役均平其羌太史忠謹在公者覆行諸營家至人告暢吾乃心其有老落篤癃不堪從役或有飢寒之色不能自存者區分處別自當參詳其宜御覽二百四十與會稽王箋與會稽王箋古人恥其君不為堯舜北面之道豈不願尊其所事比隆往代況遇千載一時之運顧智力屈於當年何得不權輕重而處之也今雖有可欣之會內求諸己而所憂乃重於所欣傳云自非聖人外寧必有內憂今外不寧內憂已深古之弘大業者或不謀於衆傾國以濟一時之功者亦往往而有之誠獨運之明足以邁衆暫勞之弊終獲永逸者可也求之於今可得擬議乎夫廟算決勝必宜審量彼我萬全而後動功就之日便當因其衆而即其實今功未可期而遺黎殲盡萬不餘一且千里饋糧自古為難況今轉運供繼西輸許洛北入黃河雖秦政之弊未至於此而十室之憂便以交至今運無還期徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼而莫敢吐誠往者不可諫來者猶可追願殿下更垂三思解而更張令殷浩荀羡還據合肥廣陵許昌譙郡梁彭城諸軍皆還保淮為不可勝之基須根立勢舉謀之未晚此實當今策之上者若不行此社稷之憂可計日而待安危之機易於反掌考之虛實著於目前願運獨斷之明定之於一朝也地淺而言深豈不知其未易然古人處閭閻行陳之間尚或于時謀國評裁者不以為譏況廁大臣末行豈可默而不言哉存亡所係決在行之不可復持疑後機不定之於此後欲悔之亦無及也殿下德冠宇內以公室輔朝最可直道行之致隆當年而未允物望受殊遇者所以寤寐長歎實為殿下惜之國家之慮深矣常恐伍員之憂不獨在昔麋鹿之遊將不止林藪而已願殿下暫廢虛遠之懷以救倒懸之急可謂以亡為存轉禍為福則宗廟之慶四海有賴矣報殷浩書報殷浩書吾素自無廟廊志直王丞相時果欲內吾誓不許之手迹猶存由來尚矣不於足下參政而方進退自兒婚女嫁便懷尚子平之志數與親知言之非一日也若蒙驅使關隴巴蜀皆所不辭吾雖無專對之能直謹守時命宣國家威德固當不同於凡使必令遠近咸知朝廷留心於無外此所益殊不同居護軍也漢末使太傅馬日磾慰撫關東若不以吾輕微無所為疑宜及初冬以行吾惟恭以俟命遺殷浩書遺殷浩書知安西敗喪公私惋怛不能須臾去懷以區區江左所營綜如此天下寒心固以久矣而加之敗喪此可熟念往事豈復可追願思弘將來令天下寄命有所自隆中興之業政以道勝寬和為本力爭武功作非所當因循所長以固大業想識其由來也自寇亂以來處內外之任者未有深謀遠慮括囊至計而疲竭根本各從所志竟無一功可論一事可記忠言嘉謀棄而莫用遂令天下將有土崩之勢何能不痛心悲慨也任其事者豈得辭四海之責追咎往事亦何所復及宜更虛己求賢當與有識共之不可復令忠允之言常屈於當權今軍破於外資竭於內保淮之志非復所及莫過還保長江都督將各復舊鎮自長江以外羈縻而已任國鈞者引咎責躬深自貶降以謝百姓更與朝賢思布平正除其煩苛省其賦役與百姓更始庶可以允塞群望救倒懸之急使君起於布衣任天下之重尚德之舉未能事事允稱當董統之任而喪敗至此恐闔朝群賢未有與人分其謗者今亟修德補闕廣延群賢與之分任尚未知獲濟所期若猶以前事為未工故復求之於分外宇宙雖廣自容何所知言不必用或取怨執政然當情慨所在正自不能不盡懷極言若必親征未達此旨果行者愚智所不解也願復與衆共之復被州符增運千石徵役兼至皆以軍期對之喪氣罔知所厝自頃年割剝遺黎刑徒竟路殆同秦政惟未加參夷之刑耳恐勝廣之憂無復日矣與殷浩書下官乃勸令畫廉藺於屏風北堂書鈔一百三十二御覽七百一與尚書僕射謝安書頃所陳論每蒙允納所以令下小得蘇息各安其業若不耳此一郡久以蹈東海矣今事之大者未布漕運是也吾意望朝廷可申下定期委之所司勿復催下但當歲終考其殿最長吏尤殿命檻車送詣天臺三縣不舉二千石必免或可左降令在疆塞極難之地又自吾到此從事常有四五兼以臺司及都水御史行臺文符如雨倒錯違背不復可知吾又暝目循常推前取重者及綱紀輕者在五曹主者涖事未嘗得十日吏民趨走功費萬計卿方任其重可徐尋所言江左平日揚州一良刺史便足統之況以群才而更不理正由為法不一牽制者衆思簡而易從便足以保守成業倉督監耗盜官米動以萬計吾謂誅剪一人其後便斷而時意不同近檢校諸縣無不皆爾餘姚近十萬斛重斂以資姦吏令國用空乏良可歎也自軍興以來征役及充運死亡叛散不反者衆虛耗至此而補代循常所在凋困莫知所出上命所差上道多叛則吏及叛者席卷同去又有常制輒令其家及同伍課捕課捕不禽家及同伍尋復亡叛百姓流亡戶口日減其源在此又有百工醫寺死亡絶滅家戶空盡差代無所上命不絶事起或十年十五年彈舉獲罪無懈息而無益實事何以堪之謂自今諸死罪原輕者及五歲刑可以充此其減死者可長充兵役五歲者可充雜工醫寺皆令移其家以實都邑都邑既實是政之本又可絶其亡叛不移其家逃亡之患復如初耳今除罪而充雜役盡移其家小人愚迷或以為重於殺戮可以絶姦刑名雖輕懲肅實重豈非適時之宜邪與謝安書復與君此章草所得極不為少而筆至惡殊不稱意知君嘗得小笙笙是名器往聞者若令諸君聞之皆當可不言而云見今笙者皆不以為佳恐是不能好也蜀中山水如峨眉山夏含霜雹碑板之所聞崑崙之伯仲也與吏部郎謝萬書古之辭世者或被髮佯狂或污身穢迹可謂艱矣今僕坐而獲免遂其宿心其為慶幸豈非天賜違天不祥頃東遊還修植桑果今盛敷榮率諸子抱弱孫遊觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲教養子孫以敦厚退讓戒以輕薄庶令舉策數馬倣佛萬石之風君謂此何如比當與安石東遊山海并行田視地利頤養間曠衣食之餘欲與親知時共歡宴雖不能興言高詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世甚欲希風數子老夫志願盡於此矣誡謝萬書以君邁往不屑之韻而俯同群辟誠難為意也然所謂通識正自當隨事行藏乃為遠耳願君每與士之下者同則盡善矣食不二味居不重席此復何有而古人以為美談濟否所由實在積小以致高大君其存之與人書張芝臨池學書池水盡黑使人耽之若是未必後之也吾書比之鍾張當抗行或謂過之張草猶當雁行張精熟過人臨池學書池水盡墨若吾耽之若此未必謝之後達解者知其評之不虛吾盡心精作亦久尋諸舊書惟鍾張故為絶倫其餘為是小佳不足在意去此二賢僕書次之須得書意轉深點畫之間皆有意自言所不盡得其妙者事事皆然平南李式論君不謝與所知書子敬飛白大有意雜帖十七日先書郗司馬未去即日得足下書為慰先書以具示復數字吾前東粗足作佳觀吾為逸民之懷久矣足下何以方復及此似夢中語耶無緣言面為歎書何能悉瞻近無緣省告但有悲歎足下小大悉平安也云卿當來居此喜遲不可言想必果言告有期耳亦度卿當不居京此既僻又節氣佳是以欣卿來也此信旨還具示問龍保等平安也謝之甚遲見卿舅可耳至為簡隔也六日知足下行至吳念違離不可居叔當西耶遲知問計與足下別草六年於今雖時書問不解闊懷省足下先後二書但增歎慨頃積雪凝寒五十年中所無想頃如常冀來夏秋間或復得足下問耳比者悠悠如何可言吾服食久猶為劣劣大都比之年時為復可耳足下保愛為上臨書但有惆悵省足下別疏具彼土山川諸奇揚雄蜀都左太沖三都殊為不備悉彼故為多奇益令其遊目意足也可得果當告卿求迎少人足耳至時示意遲此期真以日為歲想足下鎮彼土未有動理耳要欲及卿在彼登汶嶺峨眉而旋實不朽之盛事但言此心以馳於彼矣諸從並數有問粗平安唯修載在遠音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下別具不復乙乙得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所須知足下謂須服食方回近之未許吾此志知我者希此有成言無緣見卿以當一笑云譙周有孫高尚不出今為所在其人有以副此志不令人依依足下具示嚴君平司馬相如揚子雲皆有後否天鼠膏治耳聾有驗不有驗者乃是要藥朱處仁今所在往得其書信遂不取答今因足下答其書可令必達省別具足下小大問為慰多分張念足下懸情武昌諸子亦多遠宦足下兼懷並數問不老婦頃疾篤救命恆憂慮餘粗平安知足下情至旦夕都邑動靜清和想足下使還具時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日往言尋悲酸如何可言知有漢時講堂在是漢何帝時立此知畫三皇五帝以來備有畫又精妙甚可觀也彼有能畫者不欲因摹取當可得不信具告往在都見諸葛顒曾具問蜀中事云成都城池門屋樓觀皆是秦時司馬錯所修令人遠想慨然為爾不信一一示為欲廣異聞青李來禽櫻桃日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之此種彼胡桃皆生也吾篤喜種果今在田里惟以此為事故遠及足下致此子者大惠也彼所須此藥草可示當致虞安吉者昔與共事常念之今為殿中將軍前過云與足下中表不以年老甚欲與足下為下寮意其資可得小郡足下可思致之耶所念故遠及吾有七兒一女皆同生婚娶以畢惟一小者尚未婚耳過此一婚便得至彼今內外孫有十六人足慰目前足下情至委曲故具示玄度先乃可耳嘗謂有理因祠祀絶多感其夜便至此致之生而速之死每尋痛惋不能已已省君書增酸悲大分自不可移時至不可以智力救如此先生適書亦小小不能佳大都可耳此書因謝常侍信還令知問可令謝長史且消息數親問叔穆嘉賓並有問為慰知道長不孤得散力疾重而邇進退甚令人憂念遲信還知問婦安和婦故羸疾憂之燋心餘亦諸患君昨示欲見穆生敘讚今欲默語興廢之格粗當書爾不玄度好佳君謂何似從事經過崔阮諸人昨旦與書疾故示毒愁當增其疾吾如今尚劣劣又晚熱未有定發日有定示足下興耳迎書或欲留吾甚欲與俱而吾疾患遲速無常其竟云何足下今知問適太常司州鎮軍諸人草五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也野數言疏平安定太宰中郎適州將十五日告徐一癰方尺許口四寸云數如來小如差然疾源如此憂怛尚深故遣信治徐舍人書以示徐還示足下也不堪縲疑事列上台周青州視事今以當至下耶甚是事宜無方身世而任事者疾患如此使人短氣六月十九日羲之白使還得八日書知不佳爾何耿耿僕日弊而得此熱勿勿解日耳力遣不具王羲之白見尚書一日遣信以具必宜有行者情事恐不可委行使耶遲還具問亦以與尚書咨懷今復遣咨吳興也遠近清和士人平安荀侯定住下邳復遣軍下城此間民事愚智長歎乃亦無所隱如之何又須求雨以復為災卿彼何似江生佳須大活以始見之與人上蕭索可歎汝宜速下不可稽留計日遲望今日亦語劉長史令速近因得里人書想至知故面腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字令弟知聞耳姊適復二告安和郗故病篤無復他治為消息耳憂之深今移至田舍就道家也事畢當吾遣信視淑還母子平安為慰至恨不得暫見故未得下船道夷書云已得一宅想今安穩耳不政解此移趨知部兒不快何所在今已佳也耿耿信白與殷侯彼此格卿取卒喜慰氣滿無他治噉數合米來三日知足下哀感不佳耿耿吾下勢腹痛小差須用女蔞丸得應甚速也在我而已誠無所多云與謝豫州共入河不乃煩劇得安萬送書云六日可至諸賢云朝廷失之轉覺闕然與卿書同不有君子其能國乎此言深也但云卿當入何以如夢恐卿表將復經年想仁祖差時還內鎮慰人情耳皆在卿懷矣産婦兒萬留之月盡遣甚慰心得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所盡也弟預須遇之大事得其書無已已二謝云秋末必來計日遲望萬羸不知必俱不知弟往別停幾日決其兵為樂也尋分旦與江姚女和別殊當不可言也知庾丹陽差數深深致心致心得孔彭祖十七日具問為慰云襄經還蠡是反善之誠也於殷必得速還無復道路之憂比者尚懸悒得其去月書省之悲慨也上流近問不竟何日即路知謝定出居內所弘故重是不情廢情存大明或就卿圍棊邑散今雨寒未可以治謝江表付還得書知足下問吾骯骼拘痛俯仰欲不得此何理耶願輒與相見無盡治宜足下得益使之不疑也但月又未陰沈沈恐不可針不知何以救目前甚憂悴王羲之比信尋知足下有書可道知足下未能得果望近為然知得家問賢子動疾念甚憂慮懸得後問不分張何可久幼小故疾患無賴野大皆當以至不得還問懸心大得善悉也野當不能遏卿並轉茂清談足下小大佳也諸疾苦憂勞非一如何復得都下近問不吾得敬和草三日書無他重熙住定為善謝二侯山下多日不得復意問一昨晚還未得遣書得告知中冷不解更壯溫甚耿耿服何藥耶僕此日差勝尋知問王羲之頓首羲之頓首向又慘慘自舉哀乏氣勿勿知便當西且不相知來想熊能更言問力遣不次王羲之頓首七日告期痛念玄度未能心汝臨哭悲慟何可言言及惋塞夜市器俱不合用令摧之也吾平平但昨來念玄度體中便不堪之耶汝當須過殯還恆有悲惻王延期省妹轉佳慶不及啼不憶念奴殊不可言涼當迎之昨即得丹陽水上書與足下書同故不送昨諸書付還去冬遣使想久至乖離忽四年言之歎慨豈言所喻悠悠數十卒當何期汝等將慎為上知復何云念足下窮思兼至不可居處雨氣無已卿復何似耿耿善將息吾故劣力知問王羲之吾何當還汝尚小愁思兼至不可居處多疾足下前許歲未今暫還想必可爾故復白十一月十三日告期等得所高餘姚并吳興二十八日二疏知並平安慰吾平平比服寒食酒如似為佳力因王會稽不一一阿耶告知想大小皆佳丹陽頃極佳也云自有書不附此信耳大小問多患懸心想二奴母子佳遲卿問也吾去日盡欲留女過吾去自當送之想可垂許一出未知還期是以白意夫人涉道康和足下小大皆佳度十五日必濟江故二日知問須信還知定當近道迎足下也可令時還遲面以日為歲去冬臨臨安事近便欲決去而何侯不許事聞以有小寇今未便得果然故有移南意尚未可倉卒復信更具信汝也六日昨書信未得去時尋復逼或謂不可以不恭命遂不獲已處世之道盡矣何所復言丹陽旦送吾體氣極佳共在卿故處增思詠若可得耳要當須吾自南但增感塞十四日諸問如昨云西有伐蜀意復是大事速送袍來遂當發詔催吾帝王之命是何等事而辱在草澤憂歎之懷當復何言見足下一一昨送諸書令示卿想見之恐殷侯必行義望雖宜爾然今此集信為未易卿若便西者良不可言安復後問不想必停君諸舍疾苦差也便疾綿篤了不欲食轉側須人憂懷深小妹亦故進退不孤得散力煩不得眠食至少疾患經月兼燋勞不可言迎集中表親疏略盡實望投老得盡田里骨肉之歡此一條不謝二疏而人理難知此不知小卻得遂本心不交衰朽羸劣所憂營如此君視是頤養之功當有何理今都絶思此事也冀疾患差末秋初冬必思與諸君一佳集遣無益快共為樂欲以少日補頃者之慘戚也追尋前者意事豈可復得且當率目前及當此急要願諸君各保愛以俟此期未近見君有諸結力聊以當面各間意必欲省安西知今意無前郤也想君必俱賊勢可之者必進許洛無可不果相遇于一世豈可度之尋常以此至終故當極盡志氣之所托也君此意弘足然決在必行未復知問晴快卿轉勝向平復也猶耿耿想上下無恙力知問不具王羲之敬問日月如馳嫂棄背再周去月穆松大祥奉瞻廓然永惟悲摧情如切割汝亦增慕省疏酸感延期官奴小女並得暴疾遂至不救愍痛心奈何吾以西夕至情所寄惟在此等以禁慰餘年何意旬日之中二孫夭命日夕左右事在心目痛之纏心無復一至於此可復如何臨紙咽塞敬親今在剡其後復亡甚不可言穰鐵不知已得諸葛吝者君識之不才幹好佳往為錢塘著績又入僕府有以盡悉宰民之至也甚欲自托於明德云臨安春當缺爾者君能請不僕必欲言得佳長史亦當是君所須既得里人共事異常故乃爾須還告之人理不可得都絶每至屬致使人多歎十五日羲之報近甚倉卒得十三日音知卿佳慰之力及陽主書不一一羲之報會稽亦復與選論卿否吾誠勑勑於論事然於弟尚不惜小宜謂選官前意已佳可不復煩重卿更思必謂宜論者必有違矣上下安也和緒過見之欣然敬豫乃成委頓令人深憂江生亦連病今已差
