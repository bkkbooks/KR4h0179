body:
  text: 卷一百五十五李皓述志賦皓以緯世之量當呂氏之末為群雄所奉遂啓霸圖兵無血刃坐定千里謂張氏之業指期而成河西十郡歲月而一既而禿髮傉檀入據姑臧且渠蒙遜基宇稍廣于是慨然著述志賦焉其辭曰涉至虛以誕駕乘有輿于本無稟玄元而陶衍承景靈之冥符蔭朝雲之菴靄仰朗日之照煦既敷既載以育以成幼希顏子曲肱之榮遊心上典玩禮敦經蔑玄冕于朱門羡漆園之傲生尚漁父于滄浪善沮溺之耦耕穢鴟鳶之籠嚇欽飛鳳于太清杜世競于方寸絶時譽之嘉聲超霄吟于崇領奇秀木之陵霜挺修幹之青蔥經歲寒而彌芳情遙遙以遠寄想四老之暉光將戢繁榮于常衢控雲轡而高驤攀瓊枝于玄圃漱華泉之淥漿和吟鳳之逸響應鳴鷥于南岡時弗獲𩇕心往形留眷駕陽林宛首一丘衝風沐雨載沈載浮利害繽紛以交錯歡感循環而相求乾扉奄寂以重閉天池絶津而無舟悼貞信之道薄謝慚德于圜流遂乃去玄覽應世寡肇弱巾于東宮並羽儀于英倫踐宣德之祕庭翼明后于紫宸赫赫謙光崇明奕奕岌岌王居詵詵百辟君希虞夏臣庶夔益張王頽巖梁后墜壑淳風杪莽以永喪縉紳淪胥而覆溺呂發釁于閨牆厥搆擢以傾顛疾風飄于高木回湯沸于重泉飛塵翕以蔽日大火炎其燎原名都幽然影絶千邑闃而無煙斯乃百六之恆數起滅相因而迭然于是人希逐鹿之圖家有雄霸之想暗王命而不尋邀非分于無象故覆車接路而繼軌膏生靈于土壤哀餘類之忪懞邈靡依而靡仰求欲專而失逾遠寄玄珠于罔象悠悠涼道鞠焉荒凶杪杪余躬迢迢西邦非相期之所會諒冥契而來同跨弱水以建基躡崑嶇以為墉總奔駟之駭轡接摧轅于峻峰崇崖崨嶪重嶮萬尋玄邃窈窕磐紆嶔岑榛棘交橫河廣水深狐貍夾路梟鴟群吟挺非我以為用任至當如影響執同心以御物懷自彼于握掌匪矯情而任荒乃冥合而一往華德是用來庭野逸所以就鞅休矣時英茂哉雋哲庶罩網以遠籠豈徒射鉤與斬袂或脫梏而纓蕤或後至而先列採殊才于巖陸拔翹彥于無際思留侯之神遇振高浪以蕩穢想孔明于草廬運玄籌之罔滯洪操槃而慷慨起三軍以激鋭詠群豪之高軌嘉關張之飄傑誓報曹而歸劉何義勇之超出據斷嬌而橫矛亦雄姿之壯發輝輝南珍英英周魯挺奇荊吳昭文烈武建策烏林龍驤江浦摧堂堂之徑陳鬱風翔而雲舉紹樊韓之遠蹤侔徽猷于召武非劉孫之鴻度孰能臻茲大祐信乾坤之相成庶物希風而潤雨崏益既蕩二江己清穆穆盛勳濟濟隆平御群龍而奮策彌萬載以飛榮仰遺塵于絶代企高山而景行將建朱旗以啓路驅長轂而迅征靡商風以抗旆拂招搖之華旌資神兆于皇極協五緯之所寧赳赳于城翼翼上弼恣馘奔鯨截彼醜類且灑遊塵于當陽拯涼德于已墜間昌寓之驂乘暨襄城而案轡知去害之在茲體牧童之所述審機動之至微思遺餐而忘寐表略韻于紈素託精誠于白日晉書涼武昭王傳又十六國春秋九十一槐樹賦闕大酒容賦闕自稱涼公領秦涼二州牧奉表詣闕昔漢運將終三國鼎峙鈞天之曆數鍾皇晉高祖闡鴻基景文弘帝業嗣武受終要荒率服六合同風宇宙齊貫而惠皇失御權臣亂紀懷愍迍邅蒙塵于外懸象上分九服下裂眷言顧之普天同憾伏惟中宗元皇帝基天紹命遷幸江表荊陽蒙弘覆之矜五都為荒榛之藪故太尉西平武公軌當元康之初屬擾攘之際受命典方出撫此州威略所振聲蓋海內明盛繼統不隕前志長旌所指仍闢三秦義立兵強拓境萬里文桓嗣位奕葉載德囊括關西化被崑裔遐邇款藩世修職貢晉德之遠揚緊此州是賴大都督大將軍天錫以英挺之姿承七世之業志匡時難克隆先勳而中年降災兵寇侵境皇威遐邈同獎弗及以一方之師抗七州之衆兵孤力屈社稷以喪臣聞曆數相推歸餘于終帝王之興必有閏位是以共工亂象于黃農之間秦項篡竊于周漢之際皆機不旋踵覆餗成凶自戎狄陵華已涉百齡五胡僭襲期運將杪四海顒顒懸心象魏故師次東關趙魏莫不企踵淮南大捷三方欣然引領伏惟陛下道協少康德侔光武繼天統位志清函夏至如此州世篤忠義臣之群僚以臣高祖東莞太守雍曾祖北地太守柔荷寵前朝參忝時務伯祖龍驤將軍廣晉太守長寧侯卓亡祖武衛將軍天水太守安世亭侯弇毗佐涼州著功秦隴殊寵之降勒于天府妄臣無庸輒依竇融故事迫臣以義上臣大都督大將軍涼公領秦涼二州牧護羌校尉臣以為荊楚替貢齊桓興召陵之師諸侯不恭晉文起城濮之役用能勳光踐土業隆一匡九域賴其弘猷春秋恕其專命功冠當時美垂千祀況今帝居未復諸夏昏墊大禹所經奄為戎墟五嶽神山狄污其三九州名都夷穢其七辛有所言于茲而驗微臣所以叩心絶氣忘寢與食雕肝焦慮不逞寧息者也江涼雖遼義誠密邇風雲苟通實如脣齒臣雖名未結于天臺量未著于海內然憑賴纍祖寵光餘烈義不細辭以稽大務輒順群議亡身即事轅弱任重懼忝威命昔在春秋諸侯宗周國皆稱元以布時令今天臺邈遠正朔未加發號施令無以紀數輒年冠建初以崇國憲冀杖寵靈全制一方使義誠著于所天玄風扇于九壤殉命灰身隕越慷慨晉書涼武昭王傳又十六國春秋九十一義熙元年改元建初遣舍人黃始梁興間行奉表詣闕云云復奉表江山悠隔朝宗無階延首雲極翹企遐方伏惟陛下應期踐位景福自天臣去乙巳歲順從群議假統方城時遣舍人黃始奉表通誠遙余嶮曠未知達不吳涼懸邈蜂蠆衝衢方珍貢使無由展御謹副寫前章或希簡達臣以其歲進師酒泉戒戎廣平庶攘茨穢而黠虜恣睢未率威教憑守巢穴阻臣前路竊以諸事草創倉帑未盈故息兵案甲務農養士時移節邁茌苒三年撫劍歎憤以日成歲今資已足器械已充西招城郭之兵北引丁零之衆冀憑國威席捲河隴揚旌秦川承望詔旨盡節竭誠隕越為效又臣州界迥遠勍寇未除當須鎮副為行留部分輒假臣世子歆監前鋒諸軍事撫軍將軍護羌校尉督攝前軍為臣先驅又燉煌郡大衆殷制御西域管轄萬里為軍國之本輒以次子讓為寧朔將軍西夷校尉太煌太守統攝崑裔輯寧殊方自餘諸子皆在戎間率先士伍臣總攝大綱畢在輸力臨機制命動靜續聞晉書涼武昭王傳前表未報復遺沙門法泉間行奉表云云又見十六國春秋九十一手令誡諸子吾自立身不營世利經經涉纍朝通否任時初不役智有所要求今日之舉非本願也然事會相驅遂荷州士憂責不輕門戶事重雖詳人事未知天心登車理轡百慮填胸後事付汝等粗舉旦夕近事數條遭意便言不能次比至于杜漸防萌深識情變此當任汝所見深淺非吾敕誡所益也汝等雖年未至大若能克己纂修比之古人亦可以當事業矣苟其不然雖至白首亦復何成汝等其戒之慎之節酒慎言喜怒必思愛而知惡憎而知善動念寬恕審而後與衆之所惡勿輕承信詳審人核真偽遠佞諛近忠正蠲刑獄忍煩擾存高年恤喪病勤省案聽訟訴刑法所應和顏任理慎勿以情輕加聲色賞勿漏疏罰勿容親耳目人間知外患苦禁禦左右勿作威福勿伐善施勞逆詐億必以示己明廣加咨詢無自專用從善如順流去惡如探湯富貴而不驕者至難也念此貫心勿忘須臾寮佐邑宿盡禮承敬宴饗饌食事事留懷古今成敗不可不知退朝之暇念觀典籍面牆而立不成人也此郡世篤忠厚人物敦雅天下全盛時海內猶稱之況復今日實是名邦正為五百年鄉黨婚親相連至于公理時有小小頗回為當隨宜斟酌吾臨蒞五年兵難騷動未得休衆息役惠康士庶至于掩瑕藏疾滌除疵垢朝為寇讎夕委心膂雖未足希準古人粗亦無負于新舊事任公平坦然無類初不容懷有所損益計近便為少經遠如有餘庶亦無愧于前志也晉書涼武昭王傳又十六國春秋九十一寫諸葛亮訓誡應璩奉諫以勗諸子吾負荷艱難寧濟之勳未建雖外總良能憑股肱之力而戎務孔殷坐而待旦以維城之固宜兼親賢故使汝等未及師保之訓皆弱年受任常懼弗克以貽咎悔古今之事不可不知苟近而可師何必遠也覽諸葛亮訓勵應璩奏諫尋其始終周孔之教盡在中矣為國足以致安立身足以成名質略易通寓目則了雖言發往人道師于此且經史道德如採菽中原勤之者則功多汝等可不勉哉晉書涼武昭王傳又十六國春秋九十一顧命長史宋繇吾少離荼毒百艱備嘗于喪亂之際遂為此方所推才弱智淺不能一同河右今氣力惙然當不復起矣死者大理吾不悲之所恨志不申耳居元首之位者宜深戒危殆之機吾終之後世子猶卿子也善相輔導述吾平生勿令居人之上專驕自任軍國之宜委之于卿無使籌略乖衷失成敗之要晉書涼武昭王傳又十六國春秋九十一上已曲水宴詩序闕聖帝明王序頌闕忠臣孝子序頌闕烈士貞女序頌闕賢明魯顏回頌問一洞十達于神機用舍行藏配德聖師初學記十七麒麟頌一角圓蹄行中規矩遊必擇地翔而後處不入陷穽不罹網罟德無不王為之折股初學記二十九又御覽八百八十九作無德而至謂之折股辛夫人誄闕張顗諫用刑過嚴好治宮室疏涼土三分劫不久立并兼之本實在農戰懷遠之略事歸寬簡今入歲己來陰陽失序屢有賊風暴雨犯傷和氣是宜減膳徹懸側身修逆而更繁刑峻法宮室是務人力凋殘百姓愁悴致災之咎實此之由昔文王以百里而興二世以天下而亡前車之軌得失昭然太祖以天挺神姿應桓文之運流標萬里為西夏所推左取酒泉有易俯拾右開西域兵不血刃實為殿下開創崇規貽厥孫謀者也殿下不能奉承先志混一涼土侔蹤張后將何以下見先王乎沮渠蒙遜胡夷之傑內修政事外理英賢攻戰之際身同士卒百姓懷之威樂為用臣謂殿下非但不能平殄蒙遜亦懼蒙遜方為社稷之憂御覽三百二十二引蕭方等三十國春秋又晉書涼後主傳又十六國春秋九十二泛稱上疏言天變臣聞天之子愛人后殷勤至矣故政之不修則垂災譴以誡告之改者雖危必昌未景是也其不改者雖安必亡虢公是也殿下嗣位以來元年三月癸卯敦煌謙德堂陷八月效穀地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古敏謝仲舒頗亦聞道于先師且行年五十有九請為殿下略言耳目之所聞見不復能遠論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熙既為涼州藉秦氏兵亂規有全涼之地外不撫百姓內多聚斂建元十九年姑臧南門崩隕后于間豫堂二十年而呂光東反子敗于前身戮于後段業因群胡創亂遂稱制此方三年之中地震五十餘所既而先王龍興于瓜州蒙遜篡弒于張掖此皆目前之成事亦殿下之所聞知效穀先王鴻漸之始謙德即尊之室基陷地裂大凶之徵也日者大陽之精中國之象赤而無光中國將為胡夷之所陵滅諺曰野獸入家主人將去今狐上南門亦災之大也又狐者胡也天意若曰將有胡人入居于此城南面而君者也昔春秋之世星隕于宋襄公卒為楚所擒地者至陰胡夷之象當靜而動反亂天常天意若曰胡夷將震動中國中國若不修德將有宋襄之禍臣蒙先朝布衣之眷輒自同子弟之親是以不避忤上之誅昧死而進愚款願殿親仁善鄰養威觀釁罷宮室之務止遊畋之娛後宮嬪妃諸夷子女躬受分田身勸蠶績以清儉素德為榮息茲奢靡之費百姓租稅專擬軍國虛襟下士廣招英俊修秦氏之術以強國富俗待國有數年之積庭盈文武之士然後後命韓白為前驅納子房之妙算一鼓而姑臧可平長驅可以飲馬沍渭方東面而爭天下豈蒙遜之足憂不然臣恐社稷之危必不出紀晉書涼後主傳又十六國春秋九十二張披上書慶連理木生異枝同幹遐方有齊化之應殊本同心上下有莫二之固蓋至道之嘉祥大同之美徵晉書載紀沮渠蒙遜傳又見十六國春秋九十四闕名上書請修朝制設官分職所以經國濟時恪勤官次所以緝熙庶政當官者以匪躬為務受任者以忘身為效自皇綱初震戎馬生郊公私草創未遑舊式而朝士多違憲制不遵典章或公文御案在家臥署或事無可否望空而過至令黜陟絶于皇朝駮議寢于聖世清濁共流能否相雜人無勸兢之心苟為度日之事豈能憂公忘私奉上之道也今皇化日隆遐邇寧泰宜振肅綱維申修舊則晉書載紀沮渠蒙遜傳其群下上書云云又十六國春秋九十四石册河西三十年破帶石樂七年北堂書鈔一百六十引崔鴻北涼録沮渠蒙遜永和三年大風震電于電所得石册
