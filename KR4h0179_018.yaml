body:
  text: 何曾上魏明帝疏請隱核郡守臣聞為國者以清靜為基而百姓以良吏為本今海內虛耗事役衆多誠宜恤養黎元悅以使人郡守之權雖輕猶專任千里比之於古則列國之君也上當奉宣朝恩以致惠和下當輕利而除其害得其人則可安非其人則為患故漢宣稱曰百姓所以安其田里而無歎息愁恨之心者政平訟理也與我共此者其惟良二千后乎此誠可謂知政之本也方今國家大舉新有發調軍師遠征上下劬勞夫百姓可與樂成難與圖始愚惑之人能厭目前之小勤而忘為亂之大禍者是以郡守益不可不得其人才雖難備猶宜粗有威恩為百姓所信憚者臣聞諸郡守有年老或疾病皆委政丞掾不恤庶事或體性疏怠不以政理為意在官積年惠澤不加於人然於考課之限罪亦不至黜免故得經延歲月而無斥罷之期臣愚以為可密詔主者使隱核參訪郡守其有老病不隱親人物及宰牧少恩好修人事煩撓百姓者皆可徵還為更選代晉書何曾傳上魏明帝疏請選征遼東副將臣聞先王制法必全於慎故建官受任則置假副陳師命將則立監二宣命遣使則設介副臨敵交刃則參御右蓋以盡思謀之功防安危之變也是以在險當難則權足相濟隕缺不豫則才足相代其為國防至深至遠及至漢氏亦循舊章韓信伐趙張耳為二馬援討越劉隆副軍前世之迹著在篇志今懿奉辭誅罪精甲鋭鋒步騎數萬道路迥阻四千餘里雖假天威有征無戰寇或潛遁消散日月命無常期人非金石遠慮詳備誠宜有副今北軍諸將及懿所督皆為寮屬名位不殊素無定分統御之尊卒有變急不相鎮攝存不忘亡聖達所戒臣愚以為宜選大臣名將威重宿著者盛其禮秩遣詣懿軍進同謀略退為副佐雖有萬一不虞之變軍主有儲則無患矣魏志明帝紀注引魏名臣奏又晉書何曾傳議貶庾純凡斷正臧否宜先稽之禮律八十者一子不從政九十者其家不從政新令亦如之案純父年八十一兄弟六人三人在家不廢侍養純不求供養其於禮律未有違也司空公以純備位卿尹望其有加於人而純荒酒肆其忿怒臣以為純不遠布孝至之行而近惜常人之失應在譏貶晉書庾純傳賈充責純以父老不歸供養太傅何曾太尉荀顗驃騎將軍齊王攸議駮為舊君反服禮云違大夫之諸侯不反服則之天子亦不反服矣恂等已登天朝反服舊主與禮相違通典九十泰始中尚書令史恂等是故少府鮑融故吏假詣喪所行服散騎常侍何遵駮以為作武帝遺詔昔伊望作佐勳垂不朽周霍拜命名冠往代侍中車騎將軍行太子太保領前將軍楊駿經德履哲鑒識明遠毗翼二宮忠肅茂著宜正位上台擬迹阿衡其以駿為太尉太子太傅假節都督中外諸軍事侍中録尚書領前將軍如故置參軍六人步兵三千人騎千人移止前衛將軍珧故府若止宿殿中宜有翼衛其差左右衛三部司馬各二十人殿中都尉司馬十人給駿令得持兵仗出入晉書楊駿傳荀粲傳粲字倩奉粲諸兄並以儒術論議而粲獨好言道常以為子貢稱夫子之言性與天道不可得聞然則六籍雖存固聖人之粳粃粲兄俁難曰易亦云聖人立象以盡意繫辭焉以盡言則微言胡為不可得而聞見哉粲答曰蓋理之微者非物之象所舉也今稱立象以盡意此非通於意外者也繫辭焉以盡言此非言乎繫表者也斯則象外之意繫表之言固蘊而不出矣及當時能言者不能屈也又論父或不如從兄攸彧立德高整軌儀以訓物而攸不治外形慎密自居而已粲以此言善攸諸兄怒而不能回也太和初到京邑與傅嘏談嘏善名理而粲尚玄遠宗致雖同倉卒時或有格而不相得意裴徽通彼我之懷為二家騎驛頃之粲與嘏善夏侯玄亦親常謂嘏玄曰子等在世塗間功名必勝我但識劣我耳嘏難曰能勝功名者識也天下孰有本不足而末有餘者邪粲曰功名者志局所獎也然則志局自一物耳固非識之所獨濟也我以能使子等為貴然未必齊子等所為也粲常以婦人者才智不足論自宜以色為主驃騎將軍曹洪女有美色粲於是娉焉容服帷帳甚麗專房歡宴歷年後婦病亡未殯傅嘏往唁粲粲不哭而神傷嘏問曰婦人才色並茂為難子之娶也遺才而好色此自易遇今何哀之甚粲曰佳人難再得顧逝者不能有傾國之色然未可謂之易遇痛悼不能已歲餘亦亡時年二十九粲簡貴不能與常人交接所交皆一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人魏志荀彧傳注王弼傳弼幼而察惠年十餘好老氏通辨能言父業為尚書郎時裴徽為吏部郎弼未弱冠往造焉徽一見而異之問弼曰夫無者誠萬物之所資也然聖人莫肯致言而老子申之無已者何弼曰聖人體無無又不可以訓故不説也老子是有者也故恆言無所不足尋亦為傅嘏所知於時何晏為吏部尚書甚奇弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎正始中黃門侍郎纍缺晏既用賈充裴秀朱整又議用弼時丁謐與晏爭衡致高邑王黎於曹爽爽用黎於是以弼補臺郎初除覲爽請間爽為屏左右而弼與論道移時無所他及爽以此嗤之時爽專朝政黨與共相進用弼通俊不治名高尋黎無幾時病亡爽用王沈代黎弼遂不得在門下晏為之歎恨弼在臺既淺事功亦雅非所長益不留意焉淮南人劉陶善論縱橫為當時所推每與弼語常屈弼弼天才卓出當其所得莫能奪也性和理樂遊宴解音律善投壼其論道附會文辭不如何晏自然有所拔得多晏也頗以所長笑人故時為士君子所疾弼與鍾會善會論議以校練為家然每服弼之高致何晏以為聖人無喜怒哀樂其論甚精鍾會等述之弼與不同以為聖人茂於人者神明也同於人者五情也神明茂故能體沖和以通無五情同故不能無哀樂以應物然則聖人之情應物而無纍於物者也今以其無纍便謂不復應物失之多矣弼注易潁川人荀融難弼大衍義弼答其意白書以戲之曰夫明足以尋本幽微而不能去自然之性顏子之量孔父之所預在然遇之不能無樂喪之不能無哀又常狹斯人以為未能以情從理者也而今乃知自然之不可革足下之量雖已定乎胸懷之內然而隔踰旬朔何其相思之多乎故知尼父之於顏子可以無大過矣弼注老子為之指略致有理統注道略論注易往往有高麗言太原王濟好談病老莊常云見弼易注所悟者多然弼為人淺而不識物情初與王黎荀融善黎奪其黃門郎於是恨黎與融亦不終正始十年曹爽廢以公事免其秋遇癘疾亡時年二十四無子絶嗣弼之卒也晉景王聞之嗟嘆者纍日其為高識所惜如此魏志鍾會傳注案世説文學篇注引弼別傳其文小異甲乙問議甲失禮於家二嫡並存誠非人子所得正則乙景之子並當三年禮宜從重晉書禮志中訓子孫遺令夫生之有死自然之理吾年八十有五啓手何恨不有遺言使爾無述吾生值季末登庸歷試無毗佐之勳沒無以報氣絶但洗手足不煩沐浴勿纏尸皆浣故衣隨時所服所賜山玄玉佩衛氏玉玦綬笥皆勿以斂西芒上土自堅貞勿用甓石勿起墳壟穿深二丈椁取容棺勿作前堂布几筵置書箱鏡奩之具棺前但可施床榻而已糒脯各一盤玄酒一杯為朝夕奠家人大小不須送喪大小祥乃設特牲無違余命高柴泣血三年夫子謂之愚閔子除喪出見援琴切切而哀仲尼謂之孝故哭泣之哀日月降殺飲食之宜自有制度夫言行可覆信之至也推美引過德之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過於讓此五者立身之本顏子所以為命未之思也夫何遠之有晉書王祥傳謝表蒙賜臣單衣紫綃金革帶臣謹佩服終矢勿諼書鈔一百二十八答山簡書山子以正字拔人然未易可稱表庾亮為中書監中書令領軍庾亮清雅履正可中書監領軍如故御覽二百二十表王舒舒風概簡正允作雅人自多於邃最是臣少所知拔中間夷甫澄見語卿知處明茂弘茂弘已有令名真副卿清論處明親疏無知之者吾常以卿言為意殊未有得恐己悔之臣慨然曰君以此試頃來始乃有稱之者言常人正自患知之使過不知使負實舉賀循為賢良杜夷為方正疏臣聞有唐疇咨元凱時登漢武欽賢俊彥響應故能允協時雍敷崇盛化伏見太孫舍人會稽賀循處士盧江杜夷履道彌高清操絶俗思學融通才經王務循宰二縣皆有名績備僚東宮忠恪允著夷清虛沖淡與俗異軌考盤空谷肥遁匿迹蓋經國之良寶聘命之所急若得待詔公車承對册問必有忠讜良謨弘益政道矣晉書杜夷傳辭荊州牧疏昔漢祖以神武革命開建帝業繼以文帝之賢纂承洪緒清虛玄默擬迹成康賈誼歎息以為天下倒懸雖言有抑揚不失事體今聖朝肇建漸振宏綱往段匹磾遣使求效忠節尚未有勞便以方州與之今靳明等為國雪恥欲除大逆此之志望皆欲附翼天飛雖功大宜報亦宜有以裁之當杜漸防萌慎之在始中間不逞互生事變皆非忠義率以一朝之榮天下漸弊實由於此春秋之時天子微弱諸侯奢侈晉文思崇周室至有求隧之請襄王讓之以禮聞義而服自爾諸侯莫敢越度臣謂前者賊寇未殄苟以濟事朝廷諸所加授頗多爵位兼重今自臣以下宜加除之且以塞群小矜功之望夷狄無厭之求若復遷延顧望流俗使姦狡生心遂相怨謗指摘朝廷讒諛蜂起臣有以知陛下無以正之此安危之機天下之望臣門戶特受榮任備兼權重渥恩偏隆寵過公族行路廝賤猶謂不可臣獨何心可以安之臣一宗誤陛下傾覆亦將尋至雖復灰身剖心陛下追悔將何所及伏願諒臣至款及今際會小解散之並授賢雋少慰有識各得盡其所懷則人思競勸矣州牧之號所不敢當輒送所假侍中貂蟬又宜并官省職以塞群小覬覦之望晉書王敦傳上疏言王導導昔蒙殊寵委以事機虛己求賢竭誠奉國遂藉恩私居輔政之重帝王體遠事義不同雖皇極初建道教方闡惟新之美猶有所闕臣每慷慨於遐遠愧憤於門宗是以前後表疏何嘗不寄言及此陛下未能少垂顧眄暢臣微懷云導頃見疏外所陳如昨而其萌已著其為咎責豈惟導身而已群從所蒙並過才分導誠不能自量陛下亦愛忘其短常人近情恃恩昧進獨犯龍鱗迷不自了臣竊所自憂慮未詳所由惶愧踧踖情如灰土天下事大盡理實難導雖凡近未有穢濁之纍既往之勳疇昔之顧情好綢繆足以厲薄俗明君臣合德義同古賢昔臣親受嘉命云吾與卿及茂弘當管鮑之交臣忝外任漸冉十載訓誘之誨日有所忘至於斯命銘之於心竊猶眷眷謂前恩不得一朝而盡伏惟陛下聖哲日新廣延俊乂臨之以政齊之以禮頃者令導內綜機密出録尚書杖節京都并統六軍既為刺史兼居重號殊非人臣之體流俗好評必有譏謗宜省録尚書杖節及都督且王佐之器當得宏達遠識高正明斷道德優備者以臣暗識未見其才然於見人未踰於導加輔翼積年實盡心力霸王之主何嘗不任贀使能共相終始管仲有三歸反玷之譏子犯有臨河要君之責蕭何周勃得罪囹圄然終為良佐以導之才何能無失當令任不過分役其所長以功補過要之將來導性慎密尤能忍事善於斟酌有文章才義動靜顧問起豫聖懷外無過寵公私得所今皇祚肇建八表承風聖恩不終則遐邇失望天下荒弊人心易動物聽一移將致疑惑臣非敢苟私親親惟欲忠於社稷晉書王敦傳上疏罪狀劉隗劉隗前在門下邪佞諂媚譖毀忠良疑惑聖聽遂居權寵撓亂天機威福自由有識杜口大起事役勞擾士庶外託舉義內自封植奢僭過制乃以黃散為參軍晉魏以來未有此比傾盡帑藏以自資奉賦役不均百姓嗟怨免良人奴自為惠澤自可使其大田以充倉廩今便割配皆充隗軍臣前求迎諸將妻息聖恩聽許而隗絶之使三軍之士莫不怨憤又徐州流人辛苦經載家計始立隗悉驅逼以實己府當陛下踐阼之始投刺王官本以非常之慶使豫蒙榮分而更充征役復依舊名普取出客從來久遠經涉年載或死亡滅絶或自贖得免或見放遣或父兄時事身所不及有所不得輒罪本主百姓哀憤怨聲盈路身欲北渡以遠朝廷為名而密知機要潛行險慝進人退士高下任心姦狡叨餮未有隗比雖無忌宰嚭弘恭石顯未足為喻是以遐邇憤慨群后失望臣備位宰輔與國存亡誠乏平勃濟時之略然自忘駑駘志存社稷豈忍坐視成敗以虧聖美事不獲已今輒進軍同討姦孽願陛下深垂省察速斬隗首以謝遠近則衆望厭服皇祚復隆隗首朝懸諸軍夕退昔太甲不能遵明湯典顛覆厥度幸納伊尹之訓殷道復昌漢武雄略亦惑江充讒佞邪説至乃父子相屠流血丹地終能剋悟不失大綱今日之事有逾於此賢智故有先失後得者矣願陛下深垂三思咨詢善道則四海乂安社稷永固矣陛下昔鎮揚州虛心下士優賢任能寬以得衆故君子盡心小人畢力臣以暗蔽豫奉徽猷是以遐邇望風有識自竭王業遂隆惟新克建四海延頸咸望太平自從信隗已來刑罰不中街談巷議皆云如吳之將亡聞之惶惑精魂飛散不覺胸臆摧破泣血橫流陛下當全祖宗之業存神器之重察臣前後所啓奈何棄忽忠言遂信姦佞誰不痛心願出臣表咨之朝臣介石之幾不俟終日令諸軍早還不至虐擾晉書王敦傳上言父子生離服限自頃中原喪亂父子生乖或喪靈客寄奔迎阻隔而皆制服將向十載終身行喪非禮所許稱之者難空絶婚娶昔東關之役事同今日三年之後不廢婚宦苟南北圮絶非人力所及者宜使三年喪畢率由舊典也通典九十八與劉隗書頃承聖上顧眄足下今大賊未滅中原鼎沸欲與足下周生之徒戮力王室共靜海內若其泰也則帝祚於是乎隆若其否也則天下永無望矣晉書劉隗傳與王導書後自手筆大真別後幾日作如此事晉書溫嶠傳又魏書晉司馬紹傳作別來書敦頓首頓首蠟節忽過歲暮感悼傷悲意想自如常比苦腰痛憒憒得示知意及不以悉王敦頓首頓首淳化閣帖二
