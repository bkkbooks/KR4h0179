body:
  text: 安帝復以殷仲堪為荊州詔間以將軍憑寄失所朝野懷憂然既往之事宜其兩忘用乃班師回旆祗順朝旨所以改授方任蓋隨時之宜將軍大議誠感朕心今還復本位即撫所鎮釋甲休兵則內外寧一故遣太常茂具宣乃懷晉書殷仲堪傳以孔安國領東海王師詔領軍將軍孔安國貞慎清正出內播譽可以本官領東海王師必能導達津梁依仁遊藝晉書孔安國傳贈殷顗冠軍將軍詔故南蠻校尉殷顗忠績未融奄焉隕喪可贈冠軍將軍晉書殷顗傳命元顯釋服居職詔會稽王妃尊賢莫二朕義同所親今葬加殊禮一依琅邪穆太妃故事元顯夙令光懋乃心所寄誠孝性蒸蒸至痛難奪然不以家事辭王事陽秋之明義不以私限違公制中代之變禮故閔子腰絰山王逼屈良以至蹙由中軌容者外有禮無時賢哲斯順頒妃葬畢可居職如故晉書會稽王道子傳進吳隱之前將軍詔夫孝行篤於閏門清節厲乎風霜實立人之所難而君子之美致也龍驤將軍廣州刺史吳隱之孝友過人祿均九族菲已潔素儉愈魚飧夫處可欲之地而能不改其操饗惟錯之富而家人不易其服革奢務嗇南域改觀朕有嘉焉可進號前將軍賜錢五十萬穀千斛晉書吳隱之傳又群書治要三十引晉書反正江陵詔姦凶纂逆自古有之朕不能式遏杜漸以致播越賴鎮軍將軍裕英略奮發忠勇絶世冠軍將軍毅等誠心宿著協同嘉謀義聲既振士庶效節社稷載安四海齊慶其大赦凡諸畏逼事屈逆命者一無所問晉書安帝紀原桓胤詔夫善著則祚遠勳彰故事殊以宣子孟之忠蒙後晉國子文之德世嗣獲存故太尉沖昔藩陝西忠誠王室諸子染凶自貽罪戮念沖遺勤用悽于懷其孫胤宜見矜宥以獎為善可特全生命晉書桓胤傳改元大赦詔朕以寡德夙纂洪緒不能緝熙遐邇式遏姦宄逆臣桓玄乘釁肆亂乃誣罔天人纂據極位朕躬播越淪胥荒裔宣王之基眇焉以墜賴鎮軍將軍裕忠武英斷誠冠終古運謀機始貞賢協其契抆淚誓衆義士感其心故霜戈一揮巨猾奔迸三率稜威大憝授首而孽振猖狂嗣凶荊郢幸天祚社稷義旗載捷狡徒沮潰朕獲反正斯實宗廟之靈勤王之勳豈朕一人獨享伊祐思與億兆幸茲更始其大赦改元唯玄振一祖及同黨不在原例賜百官爵二級鰥寡孤獨穀人五斛大酺五日晉書安帝紀詔百官此非諸卿之過其還率職晉書安帝紀毛璩文處茂進爵詔夫貞松標於歲寒忠臣亮於國危益州刺史璩體識弘正誠契義旗受命偏師次於近畿匡翼之勳實感朕心可進征西將軍加散騎常侍都督益梁秦涼寧五州軍事行宜都寧屬太守文處茂宣讚蕃牧蒙險夷難可輔國將軍西夷校尉巴西梓潼二郡太守晉書毛寶附傳又詔毛瑾等西夷校尉瑾為持節監梁秦二州軍事征虜將軍梁秦二州刺史略陽武都太守瑾弟蜀郡太守瑗為輔國將軍寧州刺史同上案瑾瑗皆璩弟答釋慧遠詔陽中感懷知所患未佳甚情耿去月發江陵在道多諸惡情遲兼常本冀經過相見法師既養素山林又所患未痊邈無復因增其歎恨高僧傳六以劉裕為侍中車騎將軍詔古稱大者天地其次君臣所以列貫三辰神人代序諒理本於造昧而運用於萬葉故盈否時襲四靈通其變王道或昧貞賢拯其危天命所以永固人心所以攸穆雖夏周中傾賴靡申之績莽倫載竊實二代是維或乘資藉號或業隆異世猶詩書以之休詠記策用為美談未有因心撫民而誠發理應援神器於已淪若在今之盛者也朕以寡昧遭家不造越自遘閔屬當屯極逆臣桓玄乘舋縱慝窮凶恣虐滔天猾夏遂誣罔人神肆其纂亂祖宗之基既湮七廟之饗胥殄若墜淵谷未足斯譬皇度有晉天縱英哲使持節都督揚徐兗豫青冀幽并江九州諸軍事鎮軍將軍徐青二州刺史忠誠天亮神武命世用能貞明協契義夫響臻故順聲一唱二溟卷波英風振路宸居清翳暨冠軍將軍毅輔國將軍無忌振武將軍道規舟旗遄邁而元凶傳首回戈疊揮則荊漢霧廓俾宣元之祚永固於嵩岱傾基重造再集於朕躬宗廟歆七百之祐皇基融載新之命念功惟德永言銘懷固已道冠開闢獨絶終古書契以來未之前聞矣雖則功高靡尚理至難文而崇庸命德哲王攸先者將以弘道制治深關盛衰故伊望膺殊命之錫桓文饗備物之禮況宏徵不世顧邈百代者宜極名器之隆以光大國之盛而鎮軍謙虛自衷誠旨屢顯朕重逆仲父乃所以愈彰德美也鎮軍可進位侍中車騎將軍都督中外諸軍事使持節徐青二州刺史如故顯祚大邦啓茲疆宇宋書武帝紀上減省供奉詔自頃國難之後人物凋殘常所供奉猶不改舊豈所以視人如傷禹湯歸過之誠哉可籌量減省晉書安帝紀加贈檀憑之詔夫旌善紀功有國之通典沒而不朽節義之篤行故冀州刺史檀憑之忠烈果毅亡身為國既義敦其情故臨危授命考諸心迹古人無以遠過近者之贈意猶恨焉可加贈散騎常侍本官如故既隕身王事亦宜追論封賞可封曲阿縣公邑三千戶晉書檀憑之傳答尚書請撰國史詔先朝至德光被未箸方策宜流風緬代永貽將來者也便敕撰集宋書徐廣傳追贈何無忌詔無忌秉哲履正忠亮明允亡身殉國則契協英謨經綸屯昧則重氛載廓及敷政方夏實播風惠妖寇構亂侵擾邦畿投致討志清土略而事出慮外臨危彌厲握節隕難誠貫古賢朕用傷慟于厥懷其贈侍中司空本官如故諡曰忠肅晉書何無忌傳征劉毅詔制詔劉毅傲狠凶戾履霜日久中間覆敗宜即皓戮晉法含弘復蒙寵授曾不思愆內訟怨望滋甚賴宰輔藏疾特加遵養遂復推轂陝西寵榮隆泰庶能洗心感遇革音改意而長惡不悛志為姦宄陵上虐下縱逸無度既解督任江州非復所統而輒徙兵衆略取軍資驅斥舊戍厚樹親黨西府二局文武盈萬悉皆割留曾無片言肆心恣欲罔顧天朝又與從弟藩遠相影響招聚剽狡繕甲阻兵外託省疾實規伺隙同惡相濟圖會荊郢尚書左僕射謝混憑藉世資超蒙殊遇而輕佻躁脫職為亂階扇動內外連謀萬里是而可忍孰不可懷已詔太尉隨宜翦戮諸所處分一委公高算晉書劉毅傳文館詞林六百六十二詔大司馬太尉二府依舊辟召掾大司馬明德懋親太尉道勳光大並徽序彝倫燮和二氣髦俊引領思佐鼎飪而雅尚沖挹四門弗闢誠合大雅謙虛之道實違急賢贊世之務昔蒲輪載徵異人並出東平開府奇士嚮臻濟濟之盛朕有欽焉可敕二府依舊辟召必將明揚俊乂嗣軌前賢矣晉書恭帝紀詔大司馬大司馬地隆任重親賢莫二雖府受節度可身無致敬晉書恭帝紀案此安帝詔恭帝耳文選齊竟陵王行狀注引晉中興書恭帝詔云云誤進劉裕為宋公詔夫嵩岱配極則乾道增輝藩嶽作屏則帝王成務是以夏殷資昆彭之伯有周倚齊晉之輔鑒諸前典儀型萬代翼治扶危靡不由此太尉公命世天縱齊聖廣淵明燭四方道光宇宙爰自初迪則投勤王國妖蝥孔熾則功存社稷固以四維是荷萬邦攸賴者矣暨桓玄僭逆傾蕩四海公深秉大節靈武霆震弘濟朕躬再造王室每惟勳德銘于厥心遂北清海岱南夷百越荊雍稽服庸岷順軌剋黜方難式遏寇虐及阿衡王猷班序內外仰興絶風傍嗣逸業秉禮以整俗遵王以垂訓聲教遠被無思不洽爰暨木居海處之酋被髮雕題之長莫不忘其陋險九譯來庭此蓋播諸徽策靡究其詳者也曩者永嘉不綱諸夏幅裂終古帝居淪胥戎虜永言園陵率土同慕公明發遐慨撫機電征親董侯伯稜威致討旗旝首塗則八表響震偏師先路則多壘雲徹舊都載清五陵復禮百城屈膝千落影從自篇籍所載生民以來勳德懋功未有若此之盛者也昔周呂佐睿聖之主因三分之形把旄仗鉞一時指麾皆大啓疆宇跨州兼國其在桓文方茲尤儉然亦顯被寵章光錫殊品況乃獨絶百代顧邈前烈者哉朕每弘鑒古訓思遵令圖以公深秉沖挹用闕大禮天人引領于茲歷載況今禹迹齊軌九隩同文司勳抗策普天增佇遂公高挹大愆國章三靈眷屬朕實祇懼便宜顯答群望允崇盛典其進位相國總百揆揚州牧封十郡為宋公備九錫之禮加璽綬遠遊冠位在諸侯王上加相國緑綟綬宋書武帝紀中案九錫文傅亮作疑此及晉爵宋王詔亦亮作以無左證故編于此慰勞劉裕詔逋寇阻隘晏安假日舉斧函谷規延王誅群師勤王將離寒暑公躬秉鈇鉞稜威首塗戎輅載脂則郊壘疊卷崤陝甫踐則潼塞開扃姚泓窘逼棄城送死藍田偏師覆之霸川甲首成林俘獲蔽野偽首奔迸華戎雲集積紀逋寇旦夕夷殄宋書自序進宋公爵為王詔朕聞先王之蒞天下也上則大寶以尊德下則建侯以褎功是以成勳告就文命有玄圭之錫四海來王姬旦饗龜蒙之封夫翼聖宣績輔德弘猷禮窮元賞寵章希世況明保沖昧獨運陶鈞者哉朕以不德遭家多難雲雷作屯夷羿竊命失位京邑遂播蠻荊艱難卑約制命凶醜相國宋公天縱睿聖命世應期誠貫三靈大節宏發拯朕躬於巢幕回靈命於已崩固已道窮北面暉格八表者矣及外積全國之勳內纍戡黎之伐芟夷強妖之始蘊崇姦猾之源顯仁藏用之道六府孔修之績莫不雲行雨施能事畢舉諒已方軌於三五不容於典策者焉自永嘉喪師綿踰十紀五都分崩然正朔時暨唯三秦懸隔未之暫賓至令羌虜襲亂淫虐三世資百二之易守恃函谷之可關廟算韜略不謀之日久矣公命世撫運闡曜威靈內研諸侯之慮外致上天之罰故能倉兕甫訓則許鄭風偃鉦鉞未指則瀍洛霧披俾舊闕元陽復集萬國之軫東京父老重覩司隸之章俾朕負扆高拱而保大洪烈是用遠鑒前典延即群謀敬授殊錫光啓疆宇乘馬之制有陋舊章徽稱之美未窮上爵豈足以顯報懋功允塞民望藩輔王畿長轡六合者乎實以公每秉謙德卑不可踰難進之道以寵為戚是故降損盛制且有後命也自茲迄今洪勳彌劭稜威九河趙魏底服回轅崤潼連城冰泮遂長驅灞滻懸旍龍門逆虜姚泓係頸就擒百稔梗穢滌於崇朝祖宗遺憤雪於一旦涉禹之迹方行天下至于海外罔有不服功固萬世其寧惟永豈金石雅頌所能讚揚實可以告於神明勒銘嵩岱者已朕又聞之周道方遠則鸑鷟鳴岐二南播德則麟騶呈瑞自公大號初發爰暨告成靈祥炳煥不可勝紀豈伊素雉遠至嘉禾近歸而已哉朕每仰鑒玄應俯察人謀進惟道勳退惟國典豈得遂公沖挹而久蘊盛策便宜敬行大禮允副幽顯之望其進宋公爵為王以徐州之海陵東安北琅邪北東莞北東海北譙北梁豫州之汝南北潁川北南頓凡十郡益宋國其相國揚州牧領征西將軍司豫北徐雍四州刺史如故宋書武帝紀中以檀祇為宋領軍將軍詔宋國始立內外草創禁旅王要總司須才右將軍祗可為宋領軍將軍加散騎常侍宋書檀祗傳追贈毛璩及弟瑾瑗等詔故益州刺史璩西夷校尉瑾蜀郡太守瑗勤王忠烈事乖慮外葬送日近益懷惻愴可皆贈先所授官給錢三十萬布三百匹晉書毛寶附傳璩及弟瑾瑗并子姪之在蜀者為譙縱所沒義熙中始康太守時延祖上疏訟璩兄弟於是詔追贈魏詠之詔魏詠之器宇弘邵識局貞隱同獎之誠實銘王府敷績之效垂惠在人奄致隕喪惻愴于心可贈太常加散騎常侍晉書魏詠之傳詔今權順所請以申超世之美文選褚淵碑注引晉起居注安帝詔元功盛德超前絶後文選齊安陸王碑注引晉起居注安帝詔下書討桓玄豎子桓玄故大司馬不腆之息少懷狡惡長而不悛遂與王恭協同姦謀阻兵內侮三方雲集志在問鼎窺擬神器賴祖宗威靈宰輔神略忠義奮發罪人斯殞玄等猖狂失圖回舟鳥逝便宜乘會殲除姦源于時同異之論用惑廟策遂使王憲廢撓寵授非所猶冀玄當洗濯胸腑小懲大誡而狼心弗革悖慢愈甚割據江湘擅威荊郢矯命稱制與奪在手又對侍中王謐放肆醜言欲縱凶毒陵陷上京無君之心形於音翰不臣之迹日月彌著是可忍也孰不可懷宜明九伐以寧西夏尚書令後將軍元顯可為征討大都督督十八州諸軍事驃騎大將軍儀同三司以劉牢之為前鋒行征西將軍權領江州命司馬尚之入沔水魏書桓玄傳授劉裕策有扈滔天夷羿乘釁亂節于紀實撓皇極賊臣桓玄怙寵肆逆乃摧傾華霍倒拔嵩岱五嶽既夷六地易所公命世英縱藏器待時因心資敬誓雪國恥慨憤陵夷誠發宵寐既而歲月屢遷神器已遠忠孝幽寄實貫三靈爾乃介石勝機宣契畢舉訴蒼天以為正揮義旅而一驅奔鋒數百勢烈激電百萬不能抗限制路日直植城遂使衝鯨潰流暴鱗奔漢廟勝遠加重氛載滌二儀廓清三光返照事遂永代功高開闢理微稱謂義感朕心若夫道為身濟猶縻厥爵況乃誠德既深勳貫天人者乎是用建茲邦國永祚山河言念載懷匪云足報往欽哉俾屏余一人長弼皇晉流風垂祚暉烈無窮其降承嘉策對揚朕命宋書武帝紀上北征上疏請帥所蒞啓行戎路修敬山陵晉書恭帝紀復上疏乞奉辭陵廟臣推轂閫外將革寒暑不獲展情埏隧私心罔極伏願天慈特垂聽許使臣微誠粗申即路無恨晉書恭帝紀四府君祧主議太始之初虛太祖之位而緣情流遠上及征西故世盡則宜毀而宣皇帝正太祖之位又漢光武帝移十一帝主於洛邑則毀主不設理可推矣宜從范宣之言築別室以居四府君之主永藏而不祀也宋書禮志三義熙九年四月大司馬琅邪王德文議又略見晉書禮志上
