body:
  text: 卷四十七傅玄治體治國有二柄一曰賞二曰罰賞者政之大德也罰者政之大威也人所以畏天地者以其能生而殺之也為治審持二柄能使殺生不妄則其威德與天地並矣信順者天地之正道也詐逆者天地之邪路也民之所好莫甚于生所惡莫甚于死善治民者開其正道因所好而賞之則民樂其德也塞其邪路因所惡而罰之則民畏其威矣善賞者賞一善而天下之善皆勸善罰者罰一惡而天下之惡皆懼者何賞公而罰不二也有善雖疏賤必賞有惡雖貴近必誅可不謂公而不二乎若賞一無功則天下飾詐矣罰一無罪則天下懷疑矣是以明德慎賞而不肯輕之明德慎罰而不肯忽之夫威德者相須而濟者也故獨任威刑而無德惠則民不樂生獨任德惠而無威刑則民不畏死民不樂生不可得而教也民不畏死不可得而制也有國立政能使其民可教可制者其唯威德足以相濟者乎群書治要永樂大典官人世質則官少世文則吏多有虞氏官五十夏后氏百殷二百周三百永樂大典舉賢賢者聖人所與共治天下者也故先王以舉賢為急舉賢之本莫大正身而一其聽身不正聽不一則賢者不至雖至不為之用矣古之明君簡天下之良材舉天下之賢人豈家至而戶閲之乎開至公之路秉至平之心執大象而致之亦云誠而已矣夫任誠天地可感而況于人乎傅説巖下之築夫也高宗引而相之呂尚屠釣之賤老也文武尊而宗之陳平項氏之亡臣也高祖以為腹心四君不以小疪忘大德三臣不以疏賤而自疑其建帝王之業不亦宜乎文王內舉周公旦而天下不以為私其子外舉太公望天下稱其公周公誅弟而典刑立桓公任讎而齊國治苟其無私他人之與骨肉其于誅賞豈二法哉唯至公然後可以舉賢也夏禹有言知人則哲惟帝其難之因斯以談君莫賢于高祖臣莫奇于韓信高祖在巴漢困矣韓信去楚而亡窮矣夫以高祖之明困而思士信之奇材窮而願進其相遭也宜萬里響應不移景而相取矣然信歸漢歷時而不見知非徒不見知而已又將案法而誅之向不遇滕公則身不免于戮死不值蕭何則終不離于亡命幸而得存固水濱之餓夫市中之怯子又安得市人可驅而立半天下之功也哉蕭何一言而不世之交合定傾之功立豈蕭何知人之明絶于高祖而韓信求進之意曲于蕭何乎尊卑之勢異而高下之處殊也高祖勢尊而處高故思進者難蕭何勢卑而處下故自納者易然則居尊高之位者其接人之道固難而在卑下之地者其相知之道固易矣昔人知居上取士之難故虛心而下聽知在下相接之易故因人以致人舜之舉咎陶難得咎陶致天下之士易湯之舉伊尹難得伊尹致天下之士易故舉一人而聽之者王道也舉二人而聽之者霸道也舉三人而聽之者僅存之道也聽一人何以王也任明而致信也聽二人何以霸也任術而設疑也聽三人何以僅存也從二而求一也明主任人之道專致人之道博任人之道專故邪不得間致人之道博故下無所壅任人之道不專則讒説起而異心生致人之道不博則殊塗塞而良材屈使舜未得咎陶湯未得伊尹而不求賢則上下不交而大業廢矣既得咎陶既得伊尹而又人人自用是代大匠斫也君臣易位勞神之道也今之人或抵掌而言稱古多賢患世無人退不自三省而坐誣一世豈不甚邪夫聖人者不世而出者也賢能之士何世無之何以知其然舜興而五臣顯武王興而九賢進齊桓之霸管仲為之謀秦孝之強商君佐之以法欲王則王佐至欲霸則霸臣出欲富國強兵則富國強兵之人往求無不得唱無不和是以知天下之不乏賢也顧求與不求耳何憂天下之無人乎群書治要永樂大典授職夫裁徑尺之帛刊方寸之木不任左右必求良工者裁帛刊木非左右之所能故也徑尺之帛方寸之木薄物也非良工不能裁之況帝王之佐經國之任可不審擇其人乎故搆大廈者先擇匠然後簡材治國家者先擇佐然後定民大匠搆屋必大材為楝梁小材為榱橑苟有所中尺寸之木無棄也非獨屋有棟梁國家亦然大者為宰相此國之棟梁也審其棟梁則經國之本立矣經國之本立則庶官無曠而天工時敘矣群書治要永樂大典校工天下之害莫甚于女餝上之人不節其耳目之欲殫生民之巧以極天下之變一首之餝盈千金之價婢妾之服兼四海之珍縱欲者無窮用力者有盡用有盡之力逞無窮之欲此漢靈之所以失其民也上欲無節衆下肆情淫奓並興而百姓受其殃毒矣嘗見漢末一筆之柙雕以黃金飾以和璧綴以隨珠發以翠羽此筆非文犀之植必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履由是推之其極靡不至矣然公卿大夫刻石為碑鐫石為虎碑虎崇偽陳于三衢妨功喪德異端並起衆邪之亂正若此豈不哀哉夫經國立功之道有二一曰息欲二曰明制欲息制明而天下定矣群書治要永樂大典檢商賈夫商賈者所以伸盈虛而獲天地之利通有無而一四海之財其人可甚賤而其業不可廢蓋衆利之所充而積偽之所生不可不審察也古者民朴而化淳上少欲而下鮮偽衣足以暖身食足以充口器足以給用居足以避風雨養以大道而民樂其生敦以大質而下無逸心日中為市民交易而退各得其所蓋化淳也暨周世殷盛承變極文而重為之防國有定制下供常事役賦有恆而業不廢君臣相與一體上下譬之形影官恕民忠而恩侔父子上不徵非常之物下不供非常之求君不索無用之寶民不鬻無用之貨自公侯至于皂隸僕妾尊卑殊禮貴賤異等萬機運于上百事動于下而六合晏如者分數定也夫神農正其綱先之以無欲而咸安其道周綜其目一之以中典而民不越法及秦亂四民而廢常賤競逐末利而棄本業苟合一切之風起矣于是士樹姦于朝賈窮偽于市臣挾邪以岡其君子懷利以詐其父一人唱欲而億兆和上逞無厭之欲下充無極之求都有專市之賈邑有傾世之商商賈富乎公室農夫伏于隴畝而墮溝壑上愈增無常之好以徵下下窮死而不知所歸哀夫且末流濫溢而本源竭纖靡盈市而穀帛罄其勢然也古者言非典義學士不以經心事非田桑農夫不以亂業器非時用工人不以措手物非世資商賈不以適市士思其訓農思其務工思其用賈思其常是以上用足而下不匱故一野不如一市一市不如一朝一朝不如一用一用不如上息欲上息欲而下反真矣不息欲于上而欲求下之安靜此猶縱火焚林而索原野之不雕瘁難矣故明君止欲而寬下急商而緩農貴本而賤末朝無蔽賢之臣市無專利之賈國無擅山澤之民一臣蔽賢則上下之道壅商賈專利則四方之資困民擅山澤則兼并之路開而上以無常役下賦一物非民所生而請于商賈則民財暴賤民財暴賤而非常暴貴非常暴貴則本竭而末盈末盈本竭而國富民安未之有矣群書治要永樂大典仁論昔者聖人之崇仁也將以興天下之利也利或不興須仁以濟天下有不得其所若己推而委之于溝壑然夫仁者蓋推己以及人也故己所不欲無施于人推己所欲以及天下推己心孝于父母以及天下則天下之為人子者不失其事親之道矣推己心有樂于妻子以及天下則天下之為人父者不失其室家之歡矣推己之不忍于飢寒以及天下之心含生無凍餒之憂矣此三者非難見之理非難行之事唯不內推其心以恕乎人未之思耳夫何遠之有哉古之仁人推所好以訓天下而民莫不尚德推所惡以誡天下而民莫不知恥或曰恥者其至者乎曰未也夫至者自然由仁何恥之有赴谷必墜失水必溺人見之也赴穽必陷失道必沈人不見之也不察之故君子慎乎所不察不聞大論則志不宏不聽至言則心不固思唐虞于上世瞻仲尼于中古而知夫小道者之足羞也相伯夷于首陽省四皓于商山而知夫穢志者之足恥也存張騫于西極念蘇武于朔垂而知懷閭室者之足鄙也推斯類也無所不至矣德比于上欲比于下德比于上故知恥欲比于下故知足恥而知之則聖賢其可幾知足而已則固陋其可安也聖賢斯幾況其為慝乎固陋斯安況其為侈乎是謂有撿純乎純哉其上也其次得概而已矣莫非概也漸其概苟無邪斯可矣君子內省其身怒不亂德喜不亂義也孔子曰仁遠乎哉我欲仁斯仁至矣此之謂也若子方惠及于老馬西巴不忍而放麑皆仁之端也推而廣之可以及乎遠矣群書治要永樂大典義信蓋天地著信而四時不悖日月著信而昏明有常王者體信而萬國以安諸侯秉信而境內以和君子履信而厥身以立古之聖君賢佐將化世美俗去信須臾而能安上治民者未之有也夫象天則地履信思順以一天下此王者之信也據法持正行以不二此諸侯之信也言出乎口結乎心守以不移以立其身此君子之信也講信修義而人道定矣若君不信以御臣臣不信以奉君父不信以教子子不信以事父夫不信以遇婦婦不信以承夫則君臣相疑于朝父子相疑于家夫婦相疑于室矣小大混然而懷姦心上下紛然而競相欺人倫于是亡矣夫信由上而結者也故君以信訓其臣則臣以信忠其君父以信誨其子則子以信孝其父夫以信先其婦則婦以信順其夫上秉常以化下下服常而應上其不化者百未有一也夫為人上竭至誠開信以待下則懷信者歡然而樂進不信者赧然而回意矣老子不云乎信不足焉有不信也故以信待人不信思信不信待人信斯不信況本無信者乎先王欲下之信也故示之以款誠而民莫欺其上申之以禮教而民篤于義矣夫以上接下而以不信隨之是亦日夜見災也周幽以詭烽滅國齊襄以瓜時致殺非其顯乎故禍莫大于無信無信則不知所親不知所親則左右盡己之所疑況天下乎信者亦疑不信亦疑則忠誠者喪心而結舌懷姦者飾邪以自納此無信之禍也群書治要永樂大典禮樂傅子曰能以禮教興天下者其知大本之所立乎夫大本者與天地並存與人道俱設雖蔽天地不可以質文損益變也大本有三一曰君臣以立邦國二曰父子以定家室三曰夫婦以別內外三本者立則天下正三本不立則天下不可得而正天下不可得而正則有國有家者亟亡而立人之道廢矣禮之大本存乎三者可不謂之近乎用之而蔽天地可不謂之遠乎由近以知遠推己以況人此禮之情也商君始殘禮樂至乎始皇遂滅其制賊九族破五教獨任其威刑酷暴之政內去禮義之教外無列國之輔日縱桀紂之淫樂君臣競留意于刑書雖荷戟百萬石城造天威淩滄海胡越不動身死未收姦謀內發而太子已死于外矣胡亥不覺二年而滅曾無盡忠效節之臣以救其難豈非敬義不立和愛先亡之禍也哉禮義者先王之藩衛也秦廢禮義是去其藩衛也夫齎不訾之寶獨宿于野其為危敗甚于纍卵方之于秦猶有泰山之安易曰上慢下暴盜思代之其秦之謂與群書治要永樂大典法刑立善防惡謂之禮禁非立是謂之法法者所以正不法也明書禁令曰法誅殺威罰曰刑天地成歲也先春而後秋人君之治也先禮而後刑治世之民從善者多上立德而下服其化故先禮而後刑也亂世之民從善者少上不能以德化之故先刑而後禮也周書曰小乃不可不殺乃有大罪非終乃惟眚災然則心惡者雖小必誅意善過誤雖大必赦此先王所以立刑法之本也禮法殊塗而同歸賞刑遞用而相濟矣是故聖帝明王惟刑之恤惟敬五刑以成三德若乃暴君昏主刑殘法酷作五虐之刑設炮烙之辟而天下之民無所措其手足矣故聖人傷之乃建三典殊其輕重以定厥中司寇行刑君為之不舉樂哀矜之心至也八辟議其故而宥之仁愛之情篤也柔願之主聞先王之有哀矜仁愛議獄緩死也則妄輕其刑而赦元惡刑妄輕則威政墮而法易犯元惡赦則姦人興而善人困剛猛之主聞先王之以五刑糾萬民舜誅四凶而天下服也于是峻法酷刑以侮天下罪連三族戮及善民無辜而死者過半矣下民怨而思叛諸侯乘其弊而起萬乘之主死于人手者失其道也齊秦之君所以威制天下而或不能自保其身何也法峻而教不設也末儒見峻法之生叛則去法而純仁偏法見弱法之失政則去仁而法刑此法所以世輕世重而恆失其中也群書治要永樂大典重爵祿爵祿者國柄之本而貴富之所由不可以不重也然則爵非德不授祿非功不與二教既立則良士不敢以賤德受貴爵勞臣不敢以微功受重祿況無德無功而敢虛干爵祿之制乎然則先王之用爵祿不可謂輕矣夫爵者位之級而祿者官之實也級有等而稱其位實足利而周其官此立爵祿之分也爵祿之分定必明選其人而重用之德貴功多者受重爵大位厚祿尊官德淺功寡者受輕爵小位薄祿卑官厚足以衒宗黨薄足以代其耕居官奉職者坐而食于人既食于人不敢以私利經心既受祿于官而或營私利則公法繩之于上而顯議廢之于下是以仁讓之教存廉恥之化行貪鄙之路塞嗜欲之情滅百官各敬其職大臣論道于朝公議日興而私利日廢矣明君必順善制而後致治非善制之能獨治也必須良佐有以行之也欲治其民而不省其事則事繁而職亂知省其職而不知節其吏厚其祿也則下力既竭而上猶未供薄其祿也則吏競背公義營私利此教之所以必廢而不行也凡欲為治者無不欲其吏之清也不知所以致清而求其清此猶滑其源而望其流之潔也知所以致清則雖舉盜跖不敢為非不知所以致清則雖舉夷叔必犯其制矣夫授夷叔以事而薄其祿近不足以濟其身遠不足以及室家父母餓于前妻子餧于後不營則骨肉之道虧營之則奉公之制犯骨肉之道虧則怨毒之心生怨毒之心生則仁義之理衰矣使夷叔有父母存無以致養必不採薇于首陽顧公制而守死矣由此言之吏祿不重則夷叔必犯矣夫棄家門委身于公朝榮不足以庇宗人祿不足以濟家室骨肉怨于內交黨離于外仁孝之道虧名譽之利損能守志而不移者鮮矣人主不詳察聞其怨興于內而交離于外薄其名必時黜其身矣家困而身黜不移之士不顧私門之怨不憚遠近之謫死而後已不改其行上不見信于君下不見明于俗遂委死溝壑而莫之能知也豈不悲夫天下知為清之若此則改行而從俗矣清者化而為濁善者變而陷于非若此而能以致治者未之聞也群書治要永樂大典
