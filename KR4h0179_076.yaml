body:
  text: 卷七十六摯虞思遊賦并序思遊賦并序虞嘗以死生有命富貴在天天之所祐者義也人之所助者信也履信思順所以延福違此而行所以速禍然道長世短禍福舛錯怵迫之徒不知所守蕩而積憤或迷或放故借之以身假之以事先陳處世不遇之難遂棄彝倫輕舉遠遊以極常人罔惑之情而後引之以正反之以義推神明之應于視聽之表崇否泰之運于智力之外以明信天任命之不可違故作思遊賦其辭曰有軒轅之遐胄兮氏仲壬之洪裔數華穎于末葉兮晞靈根于上世準乾坤以斡度兮儀陰陽以定制匪時運其焉行兮垂太虛而遙曳戴朗月之高冠兮綴太白之明璜制文霓以為衣兮襲采雲以為裳要華電之煜爚兮珮玉衡之琳琅明景日以鑒形兮信煥曜而重光至美詭好于凡觀兮修稀合而靡呈燕石緹襲以華國兮和璞遙棄于南荊夏像韜塵于市北兮瓶罍抗方于兩盈鸞皇耿介而偏栖兮蘭桂背時而獨榮關寒暑以練真兮豈改容而爽情感昆吾之易越兮懷暉光之速暮羡一稔而三春兮尚含英以容豫悼曜靈之靡暇兮限天晷之有度聆鳴蜩之號節兮恐隕葉于凝露希前軌而增騖兮眷後塵而旋顧往者倏忽而不逮兮來者冥昧而未著二儀泊焉其無央兮四節環轉而靡窮星鳥逝而時反兮夕景潛而且融旻三后之在天兮歎聖哲之永終諒道修而命微兮孰舍盈而戢沖握隋珠與蕙若兮時莫悅而未遑彼未遑其何恤兮懼獨美之有傷蹇委深而投奧兮庶芬藻之不彰芳處幽而彌馨兮寶在夜而愈光逼區內之迫脅兮思攄翼乎八荒望雲階之崇壯兮願輕舉而高翔造庖犧以問象兮辨吉繇于姬文將遠遊于太初兮鑒形魄之未分四靈儼而為衛兮六氣紛以成群驂白獸于商風兮御蒼龍于景雲簡廝徒于靈圉兮從馮夷而問津召陵楊于遊溪兮旌王子于柏人前祝融以掌燧兮殿玄冥以掩塵形彯彯而遂遐兮氣亹亹而愈新挹玉膏于萊嵎兮掇芝英于瀛濱揖太昊以假憩兮聽賦政于三春洪範翕而復張兮百卉隕而更震睇玉女之紛彯兮執懿筐于扶木覽玄象之韡曄兮仍騰躍乎陽谷吸朝霞以療飢兮降廩泉而濯足將縱轡以逍遙兮恨東極之路促詔纖阿而右回兮覿朱明之赫戲蒞群神于夏庭兮回蒼梧而結知纚焦明以承旗兮駔天馬而高馳讒羲和于丹丘兮誚倒景之亂儀尋凱風而南暨兮謝太陽于炎離戚溽暑之陶鬱兮余安能乎留斯聞碧雞之長晨兮吾將往乎西遊奧浮鷁于弱水兮泊舳艫兮中流苟精粹之攸存兮誠沈羽以泛舟軼望舒以陵厲兮羌神漂而氣浮訊碩老于金室兮采舊聞于前修譏淪陰于危山兮問王母于椒丘觀玄鳥之參趾兮會根一之神籌擾毚兔于月窟兮詰姮娥于蓐收爰攬轡而旋驅兮訪北叟之倚伏乘增冰而遂濟兮凌固陰之所滀探龜蛇于幽穴兮瞰罔養之潛育哂倏忽之躁狂兮喪中黃于耳目偭燭龍而遊衍兮窮大明于北陸攀招搖而上躋兮忽蹈廓而淩虛登閶闔而遺眷兮俯玄黃于地輿召黔雷以先導兮覲天帝于清都觀渾儀以寓目兮拊造化之大爐爰辨惑于上皇兮稽吉凶之元符唐則天而民咨兮癸亂常而感虞孔揮涕于西狩兮臧考祥于婁句跖肆暴而保乂兮顏履仁而夙徂何否泰之靡所兮眩榮辱之不圖運可期兮不可思道可知兮不可為求之者勞兮欲之者惑信天任命兮理乃自得且以四位為匠乾川為均散而為物結而為人陽降陰升一替一興流而為川滯而為陵禍不可攘福不可徵其否兮有豫其泰兮有數成形兮未察靈像兮已固承明訓以發蒙兮審性命之靡求將澄神而守一兮奚飄飄而遐遊斐陳辭以告退兮主悖惘而永歎惟升降之不仍兮詠別易而會難願大響以致好兮盍息駕于一餐會司儀于有始兮延嘉賓于九乾陳鈞天之廣樂兮展萬舞之至歡枉矢鑠其在手兮狼弧翾其斯彎睨翟犬于帝側兮殪熊羆于靈軒爾乃清道夙蹕載輪修祖班命授號轙輈整旅兆司鬱以屆路兮萬靈森而陳庭豐隆軒其警衆兮鉤陳帥以屬兵堪輿竦而進時兮文昌肅以司行抗蚩尤之修旃兮建雄虹之采旌乘雲車電鞭之扶輿委移兮駕應龍青虬之容裔陸離俯遊光逸景倏爍徽霍兮仰流旌垂旄焱攸攕纚前湛湛而攝進兮後僸僸而方馳且啓行于重陽兮奄稅駕乎少儀跨列缺兮窺乾川揮玉關兮出天門涉漢津兮望崑崙經赤霄兮臨玄根觀品物兮終復魂形已消兮氣猶存眺懸舟之離離兮懷舊都之藹藹仍繁榮而督引兮將遄降而速邁華雲依霏而翼衡兮日月炫晃而映蓋蹈煙熅兮辭天衢心闣𦐇兮識故居路遂遒兮情欣欣奄忽歸兮反常閭修中和兮崇彝倫大道繇兮味琴書樂自然兮識窮達淡無思兮心恆娛晉書摯虞傳疾愈賦余體氣不和飲食漸損旬有餘日衆疾並除饋食纖纖而日鮮體貌廉廉而轉損校朝夕其未殊驗朔望而減本形容消而憔悴體質憊而狼狽內憂深而慮遠乃量餐而度帶講和緩之餘論尋越人之遺方考異同以求中稽衆術而簡良會異端于妙門乃歸奇于涉廛惟茲藥之攸造寶明中之皆堅丸以三七為劑服以四獻為程勢終朝而始發景未仄而身輕食信宿而異量體涉旬而告平藝文類聚七十五槐賦覽坤元之産殖莫茲槐之為貴爰表庭而樹門膺論道而正位爾乃觀其誕狀察其攸居豐融湛䨴蓊鬱枎疏上拂華宇下臨修渠湊以夷徑帶以通衢樂雙遊之黃鸝嘉別摯之王雎春棲教農之鳩夏憩反哺之烏鼓柯命風振葉致涼開明過于八闥兮重陰踰乎九房藝文類聚八十八初學記二十八御覽九百二十一鵁鶄賦有南州之奇鳥諒殊美而可嘉生九皋之曠澤遊江淮之洪波既翦翼以就養遂婉孌乎邦家鵁鶄呈儀若刻若畫鸞頸龜背戴玄珥白斑毛赬膺駮羽朱掖青不專紺纁不擅赤因宛點注希稠有適其在水也則巧態多姿調節柔骨一低一仰乍浮乍沒或遊或舞繽翻倏忽若乃陽故多陰殊方相求見水則喜睹火而憂藝文類聚九十二觀魚賦觀鱗族于彪池兮睨羽群于瀨涯乃有洧泉之鯉濯波之鰋瀺灂湧躍沒浪赴遠集于曲涯之隈逐于淡淡之深攢聚輻蹙或躍或沈倏樂攸驛眩目驚心徒極觀而無獲兮羡鮮肴之柔嘉于是六柱俱起參構橫羅編莞為棧束木激波奔突轉薄流不及瀾魚未驚而失行忽浪達于急湍諒形勝之得勢實有往而無反炮鱉膾鯉亦有庶羞肴核並陳既旨且柔泛溢灂于通溝因素波以獻酬騁微巧于浮觴競機捷于迅流既歡豫而不倦願窮晝而兼夜獨臨川而慷慨感逝者之不捨惟修名之求立戀景曜之西謝懼留連之敗德遂收歡而命駕是時也含懷湛遁需于酒食盤衎宴安歡情未極選興之言矯枉以直悅而不懌莫不歎息藝文類聚九十六初學記三十愍騷蓋明哲之處身固度時以進退泰則攄志于宇宙否則澄神于幽昧摛之莫究其外亟之罔識其內順陰陽以潛躍豈凝滯乎一概藝文類聚五十六遷宅誥惟太始三年九月上旬涉自洛川周于原阿乃卜昌水東黃水西背山面隰惟此良御覽五十六册隴西王泰為太尉文朕惟君行為時表親則宗臣論道經邦保乂皇家是用進登上台其上清三光下寧九域永欽洪範以康宇宙敬哉初學記十一御覽二百七泰始四年舉賢良方正對策策問曰頃日食正陽水旱為災將何所修以變大眚及法令有不宜于今為公私所患苦者皆何事凡平世在于得才得才者借耳目以聽察若有文武器能有益于時務而未見申敘者各舉其人及有負俗謗議宜先洗濯者亦各言之虞對曰臣聞古之聖明原始以要終體本以正末故憂法度之不當而不憂人物之失所憂人物之失所而不憂災害之流行誠以法得于此則物理于彼人和于下則災消于上其有日月之眚水旱之災則反聽內視求其所由遠觀諸物近驗諸身耳目聽察豈或有蔽其聰明者乎動心出令豈或有傾其常正者乎大官大職豈或有授非其人者乎賞罰黜陟豈或有不得其所者乎河濱山巖豈或有懷道釣築而未感于夢兆者乎方外遐裔豈或有命世傑出而未蒙膏澤者乎推此類也以求其故詢事考言以盡其實則天人之情可得而見咎徵之至可得而救也若推之于物則無忤求之于身則無尢萬物理順內外咸宜祝史正辭言不負誠而日月錯行夭癘不戒此則陰陽之事非吉凶所在也期運度數自然之分固非人事所能供御其亦振廩散滯貶食省用而已矣是故誠遇期運則雖陶唐殷湯有所不變苟非期運則宋衛之君諸侯之相猶能有感惟陛下審其所由以盡其理則天下幸甚臣生長蓽門不逮異物雖有賢才所未接識不敢瞽言妄舉無以疇咨聖問晉書摯虞傳諫改除普增位一等表臣聞昔之聖明不愛千乘之國而惜桐葉之信所以重至尊之命而達于萬國之誠也前乙巳赦書遠稱先帝遺惠餘澤普增位一等以酬四海欣戴之心驛書班下被于遠近莫不鳥騰魚躍喜蒙德澤今一旦更以主者思文不審收已往之詔奪已澍之施臣之愚心竊以為不可晉書摯虞傳時太廟初建詔普增位一等後以主者承詔失旨改除之虞上表典校五禮表臣典校故太尉顗所撰五禮臣以為夫革命以垂統帝王之美事也隆禮以率教邦國之大務也是以臣前表禮事稽留求速訖施行又以喪服最多疑闕宜見補定又以今禮篇卷煩重宜隨類通合事久不出懼見寢默蓋冠婚祭會諸吉禮其制少變至于喪服世之要用而特易失旨故子張疑高宗諒陰三年子思不聽其子服出母子遊謂異父昆弟大功而子夏謂之齊衰及孔子沒而門人疑于所服此等皆明達習禮仰讀周典俯師仲尼漸漬聖訓講肄積年及遇喪事猶尚若此明喪禮易惑不可不詳也況自此已來篇章焚散去聖彌遠喪制詭謬固其宜矣是以喪服一卷卷不盈握而爭説紛然三年之喪鄭云二十七月王云二十五月改葬之服鄭云服緦三月王云葬訖而除繼母出嫁鄭云皆服王云從乎繼寄育乃為之服無服之殤鄭云子生一月哭之一日王云以哭之日易服之月如此者甚衆喪服本文省略必待注解事義乃彰其傳説差詳世稱子夏所作鄭王祖經宗傳而各有異同天下並疑莫知所定而顗直書古經文而已盡除子夏傳及先儒注説其事不可得行及其行事故當還頒異説一彼一此非所以定制也臣以為今宜參采禮記略取傳説補其未備一其殊義可依準王景侯所撰喪服變除使類統明正以斷疑爭然後制無二門咸同所由又有此禮當班于天下不宜繁多顗為百六十五篇篇為一卷合十五餘萬言臣猶謂卷多文煩類皆重出案尚書堯典祀山川之禮惟于東嶽備稱牲幣之數陳所用之儀其餘則但曰如初周禮祀天地五帝享先王其事同者皆曰亦如之文約而義舉今禮儀事同而名異者輒別為篇卷煩而不典皆宜省文通事隨類合之事有不同乃列其異如此所減三分之一晉書禮志上奏定二社臣案祭法王為群姓立社曰太社王自為立社曰王社周禮大司徒設其社稷之壝又曰以血祭社稷則太社也又曰封人掌設王之社壝又有軍旅宜乎社則王社也太社為群姓祈報祈報有時主不可廢故凡祓社釁鼓主奉以從是也此皆二社之明文前代之所尊以尚書召誥社于新邑三牲各文詩稱乃立冢土無兩社之文故廢帝社惟立太社詩書所稱各指一事又皆在公旦制作之前未可以易周禮之明典祭法之正義前改建廟社營一社之處朝議斐然執古匡今世祖武皇帝躬發明詔定二社之義以為永制宜定新禮從二社晉書禮志上奏祀六宗案舜受終類于上帝禋于六宗望于山川則六宗非上帝之神又非山川之靈也周禮肆師職曰用牲于社宗黨正職曰春秋祭禜亦如之肆師之宗與社並列則班與社同也黨正之宗文不繫社則神與社異也周之命祀莫重郊社宗同于社則貴神明矣又月令孟冬祈于天宗則周禮祭禜月令天宗六宗之神也漢光武即位高邑依虞書禋于六宗安帝元初中立祀乾位禮同太社魏氏因之至景初二年大議其神朝士紛紜各有所執惟散騎常侍劉邵以為萬物負陰而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗是時考論異同而從其議漢魏相仍著為貴祀凡崇祀百神放而不致有其興之則莫敢廢之宜定新禮祀六宗如舊晉書禮志上明堂郊祀議案漢魏故事明堂祀五帝之神新禮云五帝即上帝即天帝也明堂遂除五帝之位惟祭上帝案仲尼稱郊祀后稷以配天宗祀文王于明堂以配上帝周禮祀天旅上帝祀地旅四望四望非地則上帝非天斷可識矣郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以遠祖明堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考郊堂兆位居然異體牲牢品物質文殊趣且祖考同配非謂尊嚴之美三日再祀非謂不黷之義其非一神亦足明矣昔在上古生為明王沒則配五行故太昊配木神農配火少昊配金顓頊配水黃帝配土此五帝者配天之神同兆之于四郊報之于明堂祀天大裘而冕五帝亦如之或以為五精之帝佐天育物者也前代相因莫之或廢晉初始從異議庚午詔書明堂及南郊除五帝之位惟祀天神新禮奉而用之前太醫令韓楊上書宜如舊祀五帝太康十年詔以施用宜定新禮明堂及郊祀五帝如舊議晉書禮志上通典四十四祀皋陶議故事祀皋陶于廷尉寺新禮移祀于律署以同祭先聖于太學也又故事祀以社日新禮改以孟秋之月以應秋政臣虞謹案虞書皋陶作士師惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在斷獄之成不在律令之始也太學之設義重太常故祭于太學是崇聖而從重也律署之置卑于廷尉移祀于署是去重而就輕也律非正署廢興無常宜如舊祀于廷尉又祭用仲春義取重生改用孟秋以應刑殺理未足以相易宜定新禮皆如舊晉書禮志上又藝文類聚四十九引摯虞新禮議又通典五十三御覽五百二十六引摯虞雜祀議廟設次殿議次殿所以為解息之處凡適尊以不顯為恭以由隱為順而設之于上位入自南門非謙厭之義宜定新禮皆如舊説釋服議古者無事故喪三年非訖葬除心喪也後代一日萬機故魏權制晉氏加以心喪非三年也通典八十挽歌議漢魏故事大喪及大臣之喪執紼者挽歌新禮以為挽歌出于漢武帝役人歌勞聲辭哀切遂以為送終之禮雖音曲摧愴非經典所制違禮設銜枚之義方在號慕不宜以歌為名除不挽歌案挽歌因唱和而為摧愴之聲銜枚所以全哀此亦以感衆雖非經典所載是歷代故事詩稱君子作歌惟以告哀以歌為名亦無所嫌宜定新禮如舊晉書禮志中通典八十六喪佩議周禮武賁氏士大夫之職也皆以兵守王宮國有喪故則衰葛執戈楯守門葬則從車而哭又成王崩太保命諸大夫以干戈內外警設明喪故之際蓋重宿衛之防去喪無所不佩謂服飾之事不謂防禦之用宜定新禮布衣劍如舊其餘如新制晉書禮志中吉駕導從議漢魏故事將葬設吉凶鹵簿皆有鼓吹新禮以禮無吉駕導從之文臣子不宜釋其衰麻以服玄黃除吉駕鹵簿又凶事無樂遏密八音除凶服之鼓吹虞案禮葬有祥車曠左則今之容車也既葬日中反虞逆神而還春秋傳鄭大夫公孫蠆卒天子追賜大路使以行士喪禮葬有稿乘車以載生之服此皆不唯載柩兼有吉駕之明文也既設吉駕則宜有導從以象平生之容明不致死之義臣子衰麻不得為身而釋以為君父則無不可顧命之篇足以明之宜定新禮設吉服導從如舊其凶服鼓吹宜除晉書禮志中御覽五百六十七公為所寓服議周禮作樂于刑厝之時而著荒政十二禮備制待物不以時衰而除盛典世隆而闕衰教也曩者王司徒失守播越自稱寄公是時天下又多此比皆禮之所及宜定新禮自如舊經晉書禮志中傍親服議虞謹案古者諸侯君臨其國臣諸父兄今之諸侯未同于古未同于古則其尊未全不宜便從絶期之制而令傍親服斬衰之重也諸侯既然則公孤之爵亦宜如舊昔魏武帝建安中已曾表上漢朝依古為制事與古異皆不施行施行者著魏科大晉采以著令宜定新禮皆如舊晉書禮志中御覽四百五十七師服議喪服無弟子為師服之制新禮弟子為師齊衰三月臣虞謹案自古弟子無師服之制故仲尼之喪門人疑于所服子貢曰昔夫子之喪顏回若喪子而無服請喪夫子若喪父而無服遂心喪三年此則懷三年之哀而無齊衰之制也群居入則絰出則否所謂弔服加麻也先聖為禮必易從而可傳師徒義誠重而服制不著歷代相襲不以為缺且尋師者以彌高為得故屢遷而不嫌修業者以日新為益故舍舊而不疑仲尼稱三人行必有我師焉子貢曰夫何常師之有淺教之師暫學之徒不可皆為之服義有輕重服有廢興則臧否由之而起是非因之而爭愛惡相攻悔吝生焉宜定新禮無服如舊晉書禮志中通典一百一御覽五百四十七為皇太孫服議太子初生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也天子無服殤之儀絶期故也宋書禮志二惠帝太安元年皇太孫尚薨有司奏御服齊衰期詔通議祕書監摯虞議又略見晉書摯虞傳
