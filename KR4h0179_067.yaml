body:
  text: 褚䂮白刺史王沈奉省教旨伏用感歎勞謙日昃思聞苦言愚謂上之所好下無不應而近未有極諫之辭遠無傳言之針者誠得失之事將未有也今使教命班下示以賞勸將恐拘介之士或憚賞而不言貪賕之人將貪利而妄舉苟不合宜賞不虛行則遠聽者未知當否之所在徒見言之不用謂設有而不行愚以告下之事可小須後晉書王沈傳沈為豫州刺史至鎮乃下教主簿陳廞褚䂮曰云云據下文褚䂮復白故此編入褚䂮文復白堯舜周公所以能致忠諫者以其款誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至若德不足以配唐虞明不足以並周公實不可以同冰炭雖懸重賞忠諫之言未可致也昔魏絳由和戎之功蒙女樂之賜管仲有興齊之勳而加上卿之禮功勳明著然後賞勸隨之未聞張重賞以待諫臣懸穀帛以求盡言也晉書王沈傳沈又教褚䂮復白沈無以奪之遂從䂮議上疏固請居藩臣以虛鄙才不周用過蒙國恩纍忝非據無勞受寵負愧實深豈可復加殊特之命顯號重疊臣有何勳可以克堪何顏可以冒進委身聖世豈復遺力實懼顛墜所誤者大今王略未振萬機至殷陛下宜委誠宰輔一遵先帝任賢之道虛己受成坦平心于天下無宜內示私親之舉朝野失望所損豈少晉書褚裒傳時有司以裒皇太后父議加不臣之禮拜侍中衛將軍録尚書事持節都督刺史如故裒上疏固請居藩重陳北伐事宜前所遣前鋒督護王頤之等徑造彭城示以威信後遣督護麋嶷進軍下邳賊即奔潰嶷率所領據其城池今宜速發以成聲勢晉書褚裒傳褉賦伊暮春之令月將解禊于通川淩元已之清晨遡微風之泠然川回瀾以澄映嶺峭崿以霏煙輕霞舒于翠崖白雲映乎青天風透林而自清氣扶嶺而載軒藝文類聚四御覽三十表論楊駿駿小器不可任以社稷晉書郭奕傳為諸葛穆答晉王令高世之君赦罪責功略小取大文選丘遲與陳伯之書注雖曰博納虛懷下開文選沈約齊安陸昭王碑文注與故人書與尚書令裴秀相知望其為益晉書裴秀傳與嵇茂齊書安白昔李叟入秦及關而歎梁生適越登嶽長謠夫以嘉遁之舉猶懷戀恨況乎不得已者哉惟別之後離群獨遊背榮宴辭倫好經迥路涉沙漠雞鳴戒旦則飄爾晨征日薄西山則馬首靡託尋歷曲阻則沈思紆結乘高遠眺則山川悠隔或乃回飆狂厲白日寢光踦𨄅交錯陵隰相望徘徊九皋之內慷慨重阜之巔進無所依退無所據涉澤求蹊披榛覓路嘯詠溝渠良不可度斯亦行路之艱難然非吾心之所懼也至若蘭茝傾頓桂林移植根萌未樹牙淺絃急常恐風波潛駭危機密發斯所以怵惕于長衢按轡而歎息也又北土之性難以託根投人夜光鮮不按劍將植橘柚于玄朔蒂華藕于修陵表龍章于裸壤奏韶舞于聾俗固難以取貴矣夫物不我貴則莫之與莫之與則傷之者至矣飄颻遠遊之士託身無人之鄉總轡遐路則有前言之艱懸鞍陋宇則有後慮之戒朝霞啓暉則身疲于遄征太陽戢曜則情劬于夕惕肆目平隰則遼廓而無覩極聽修原則淹寂而無聞吁其悲矣心傷悴矣然後乃知步驟之士不足為貴也若乃顧影中原憤氣雲踊哀物悼世激情風烈龍睇大野虎嘯六合猛氣紛紜雄心四據思躡雲梯橫奮八極披艱掃穢蕩海夷嶽蹴崑崙使西倒踏太山令東覆平滌九區恢維宇宙斯亦吾之鄙願也時不我與垂翼遠逝鋒巨靡加翅翮摧屈自非知命誰能不憤悒者哉吾子植根芳苑擢秀清流布葉華崖飛藻雲肆俯據潛龍之淵仰蔭棲鳳之林榮曜眩其前豔色餌其後良儔交其左聲名馳其右翱翔倫黨之間弄姿帷房之裏從容顧眄綽有餘裕俯仰吟嘯自以為得志矣豈能與吾同大丈夫之憂樂者哉去矣嵇生永離隔矣煢煢飄寄臨沙漠矣悠悠三千路難涉矣攜手之期邈無日矣思心彌結誰云釋矣無金玉爾音而有遐心身雖胡越意存斷金各敬爾儀敦履璞沈繁華流蕩君子弗欽臨書悢然知復何云文選晉書文苑趙至傳藝文類聚三十自敘嵇康謂至曰卿頭小鋭童子白黑分明覘占停謞有白起風御覽三百六十六表志賦并序表志賦并序據忝職門下在帷幄之末與群士敘齊登玉陛侍日月久矣出為冀州刺史犬馬戀主既有微情且志之所存不能無言因而賦之曰過承嘉惠擢身泰晨俯躡丹墀仰承三辰當樂夏之颽南蒙朱陽之和仁接鳴鸞之垂翼因神虬之光鱗浮眇末之纖質濟吾身于天津邈盧敖之所涉階多士之遺塵登九垓之虛軌覿汗漫之威神情飄飄而淩雲意髣佛于真人扶搖薄于懸圃增城鬱以嵯峨被羽衣之飛飛握若蕙之芳華蹈糾紛之絶軌攀大椿之疏柯意翹翹而慕遠思濯髮于天波悲落葉之思條情戀戀于昊蒼懷聖德之弘施情慘切而內傷感有莘之媵臣願致主于陶唐藝文類聚二十六逸民賦沐甘露兮餘滋握春蘭兮遺芳文選謝靈運徑竹斤澗越嶺溪行詩注登樓賦懷離客之遠思情慘憫而惆悵登茲樓而逍遙聊因高以遐望感斯州之厥域實帝王之舊疆挹呼沱之濁河懷通川之清漳原隰開闢蕩臻夷藪桑麻被野黍稷盈畝禮儀既度民繁財阜懷桑梓之舊愛信古今之同情鍾儀慘而南音莊舄感而越聲豈吾人之狹隘能去心而無營情戚戚于下國意乾乾于上京藝文類聚六十三船賦伊河海之深廣吁嗟綿邈而無垠彼限隔而靡覩兮此由茲而莫聞雖后土之同載兮實殊代而乖分嘉聖王之神化兮理通微而達幽悼民萌之隔塞兮愍王教之不周立成器以備用兮因垂象以造舟濟淩波之絶軌兮越巨川之玄流水無深而不渡兮路無廣而不由運重固之滯質雖載沈而載浮飄燕鼎于吳會轉金石于洪濤溯無涯之浩浩不抑進而輒留登揚侯之激浦兮方風翔而龍遊雖滔天而橫厲長抱樂而無憂且論器而比象似君子之淑清外質朴而無飾內空虛以受盈乘流則逝遇抵而停受命若響唯時而征不辭勞而惡動不偷安而自寧不貪財以徇功不憂力而欲輕豐儉隨乎質量所勝任乎本形雖不乘而常浮雖涉險而必正且其行無轍迹止無所根不疾而速忽若馳奔周遊曲折動與時併博載善施心無所營囊括品物受辱含榮唯載涉之所欲混貴賤于一門包涵通于道德普納比乎乾坤感斯用之卻廣信人道之所存藝文類聚七十一北堂書鈔一百三十七引兩條初學記二十五御覽七百七十引三條追遠詩序先君為巨鹿太守迄今三紀忝私為冀州刺史班詔次于郡傳宋書百官志下與劉原書薦王接夫騂騮不總轡則非造父之肆明月不流光則非隋侯之掌伏惟明府苞黃中之德耀重離之明求賢與能小無遺錯是以鄙老思獻所知竊見處士王接岐嶷雋異十三而孤居喪盡禮學過目而知義觸類而長斯玉鉉之妙味經世之徽猷也不患玄黎之不啓竊樂春英之及時晉書王接傳渤海劉原為河東太守以旌才為務同郡馮收試經為郎年七十餘薦接于原云云答弟廣平賀蠟詩序正元二年冬臘家君在陳郡余別在國舍不得集會弟廣平作詩以詒余余因答之藝文類聚五襄邑令傅渾頌君稟二儀之醇粹履元亨之貞和比德金玉而堅白不磨自處戶庭而名稱家邦不出門庭而聲播諸華矣弱冠而應式敘起家而右斯民其為政也同勵秋霜等惠春仁刑不濫疏賞不僭親儀天地之簡易則大道之清純是以其道易行其教易遵也凡我士民繈老攜幼惴惴而懷君之恩顒顒而戀君之德相與援衡軒而雨涕若赤子于父母也明明君侯臨下有赫克隆有光惠我咫尺于以具瞻有觀其宅乃冰其清乃玉其白風抗其高雲垂其澤宛荊未清淮夷孔熾春日萋萋我車既備光光我君爰登有司微微襄魯有坰斯記君有遺愛民有餘思敢揚斯頌垂之來志藝文類聚五十闕文申袁準從母論或曰案準以經云從母是其母姊妹從其母來為己庶母其親益重故服小功非通謂母之姊妹也宣舒曰二女相與行有同車之道坐有同席之禮其情親而比其恩曲而至由此觀之姊妹通斯同矣兄妹別斯異矣同者親之本異者疏之源也然則二女之服何其不重邪兄妹之服何其不輕邪曰同父而生父之所不降子亦不敢降故二女不敢相與重然則舅何故三月邪從母何故小功邪曰故母取其愛是以外王父之尊禮無厭降之道為人子者順母之情親乎母之類斯盡孝之道也是以從母重而舅輕也曰姑與叔父斯王父愛之所同也父之所不降子亦不敢降此叔父與姑所以服同而無降也通典九十二賀封諸侯王表臣聞軒轅二十五宗黃祚以繁姬姓建國七十周過其歷故禦侮莫如同德伏唯陛下聖哲欽明稽乾作則超五越三與靈協契天祚明德克昌祚胤秦王楚王淮南王光濟碩美冠于群后改建大國分鎮方嶽皇太子皇孫並啓土宇培敦潼索制弘往代內輸皇畿外蕃九服群生仰德向風懷義率土臣妾莫不稱慶藝文類聚五十一廟制議考工記左祖右社孔子曰周人敬鬼神而遠之近人而忠焉禮諸侯三門立廟宜在中門外之左宗廟之制外為都宮內各有寢廟別有門垣太祖在北左昭右穆次而南今宜為殿皆如古典通典四十七文獻皇后諡議大名必加茂實美號必附豐功臣以為宜諡曰文獻皇后諸侯廟議案禮諸侯五廟二昭二穆及太祖也今之諸王實古諸侯也諸侯不得祖天子當以始封之君為太祖百代不遷或謂之祧其非始封親盡則遷其沖幼紹位未踰年而薨者依漢舊制不列于宗廟四時祭祀于寢而已通典四十七燕國遷廟主之國議案禮凡告事以特牲又禮盛主以簞笥載以齋車即古之金輅也每舍奠焉又禮廟事考妣同席共饌一尸而祭以神合為一也今王之國迎廟主而行宜以發日夙興告廟迎主今無齋車當以犢車二主同車共祠合于古宗祀國遷掌奉主祏當侍從主車在王鹵簿前設導從每頓止傳主車于中門外左設脯醢醴酒之奠而後即安之通典四十八咸寧三年燕國遷廟主當之國時博士孫繫案云云繫疑育之誤告廟册議太常問今封建諸王為告廟不若告廟册與告諸主事異祝文同不當以竹册白簡隸書篆書也博士孫育議案尚書洛誥王命作册逸祝册唯告周公其後謂成王已冠命立周公後作為册書逸誥以告伯禽也又周公請命于三王乃納册于金縢匱中令封建諸王裂土樹蕃為册告廟篆書竹册執册以祝訖藏于廟及封王之日又以册告所封之王册文不同前以告廟祝文當竹册篆書以為告廟竹册之文即祝詞也舊告封王告改年號故事事訖皆當藏于廟以皆為册書四時享祀祝文事訖不藏故但禮稱祝文尺一白簡隸書而已通典五十五群臣為太子起坐議禮曰父在斯為子君在斯為臣侍坐于所尊見同等不起皆以為尊無二上故有所厭之義也昔衛綰不應漢景之召釋之正公門之法明太子事同于群臣群臣亦統一于所事應依同等不起之禮通典六十七晉制皇帝會公卿座位定太子後至孫育以為群臣不應起云云嫡子監國議案周禮典命職凡諸侯之嫡子誓于天子攝其君則下其君一等謂公之子如侯伯而執圭侯伯之子如子男而執璧春秋曹伯使其太子射姑來朝行國君之禮踐土之盟衛成公使其母弟武如會經書曰衛武蔡甲午序于諸侯又左傳冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖非太子之事也周制諸侯以功德入為王卿士則上卿理其國事今諸王公侯受任天朝而嫡子攝其君事則車服禮數國封大小領兵軍數自當如本制而王公侯遣上卿及軍將掌其事合于古議今之車服與古禮不同依禮應下其君一等其嫡子皆以有爵命印綬冠服佩玉之制宜如本令而嫡子但知其政不干其位君不可二尊無二上國相以下見嫡子宜如臣而不稱臣又禮非其臣則答拜國之命士上達于其君者嫡子宜答拜其文書稱嗣子宜曰王嗣子某公侯嗣子某子繫父爵明不專國也其燕見則稱第下文書表疏皆臣禮而不稱臣今之監司上官文書皆為記告嫡子監國其下群臣官文書宜稱告不言命稱教通典七十一晉博士孫敏等議諸王公城國宮室章服車旗議周禮上公九命為伯其國家宮室車旗衣服禮儀皆以九為節侯伯七命以七為節子男五命以五為節公之城蓋方九里宮方九百步侯伯之城方七里宮方七百步子男之城方五里宮方五百步又曰王之三公八命其卿六命及其出封皆加一等其國家宮室車旗衣服禮儀亦如之又如禮諸侯之城隅高七丈門阿皆五丈又禮諸侯以為殿屋今諸王封國雖有大小而所理舊城不如古制皆宜仍舊其造立宮室當有大小之差然周典奢大異于今儀步數之限宜隨時制又諸侯三重門內曰路門中門曰雉門外門曰庫門雉門之外設罕憲高五丈其正寢與廟同制恉殿屋四阿堂崇三尺此其舊典略可依也餘皆稱事取供而已旌旗斿數繁纓二車各以其命之等又曰金輅建大旗同姓以封象輅建大赤異姓以封今制從簡除之餘諸王從公者出就封朝祝之事宜輅車駟馬建大旗九斿畫蛟龍禮公之服自袞冕而下侯伯自鷩冕而下皆如王之服祭服宜玄冕朱裏玳玉三采九旒繅三色九就丹組纓玄衣纁裳畫九章以事宗廟其祀社稷山川及其群臣助祭者皆長冠玄衣其位不從公者皆以七為節其他則同諸王朝服依漢魏故事皆遠遊冠五時服佩山玄玉不復以國大小為差其群臣侍從冠服皆宜如服制令也諸王公應助祭案司服之職王祀昊天上帝則大裘而冕享先王則袞冕先公則鷩冕公之服自袞冕而下如王之服侯伯之服自鷩冕而下如公之服禮記王制曰制三公一命袞謂三公八命復加一命則服袞龍與王者之後同然則九命及二王之後乃服袞衣無升龍三公之服當從鷩冕而下太尉三公助祭宜服鷩冕七章冕繅九旒赤舄三公助導從外官不與齊祭者自可如舊通典七十一王侯兄弟繼統服議咸寧二年安平穆王薨無嗣以母弟敦上繼獻王後移太常問應何服博士張靖答宜依魯僖服閔三年例尚書符詰靖曰穆王不臣敦敦不繼穆與閔僖不同孫育宋昌議以穆王不之國敦不仕諸侯不應三年以義處之敦宜服本服一周而除主穆王喪祭三年畢乃吉祭獻王育云禮君之子孫所以臣諸兄者以臨國故也禮又與諸侯為兄弟服斬謂鄰國之臣于鄰國之君有猶君之義故也今穆王既不之國不臣兄弟敦不仕諸侯無鄰臣之義異于閔僖如符旨也但喪無主敦既奉詔紹國受重主喪典具祭祀記云大功者主人之喪有三年者則必為之再祭鄭氏注云謂死者從父昆弟來為喪主也有三年者謂妻若子幼少也再祭謂大小祥也穆妃及國臣于禮皆當三年此為有三年者敦當為之主大小雨祥祭也且哀樂不相雜吉凶不相干凶服在宮哭泣未絶敦遽主穆王之喪而國制未除則不得以本親服除而吉祭獻王也通典九十三七廟諱字議乙丑詔書班下尊諱唯從宣皇帝以來京兆府君以上皆不別著案禮士立二廟則諱王父以下天子諸侯皆諱群祖親盡廟遷乃捨故而諱新尊者統遠卑者統近貴者得申賤者轉降蓋所以殊名位之數禮上下之序也先代創業之主唯周追王夏殷以前未有聞焉顯考以下謂之親廟月祭屬近禮崇周武王時諸盩為顯考廟周人以諱事神固不以追王所不及而闕正廟之諱也禮大夫所有公諱又曰子與父同諱明君父之諱臣子不可以不諱也范獻子聘于魯問具敖之山魯人以其鄉對曰先君獻武之諱也此時獻武已為遠祖鄰國大夫猶以犯諱為失歸而作戒箸于春秋大晉龍興弘崇遠制損益因改思臻其極以為京兆府君以上雖不追王列在正廟臣下應諱禮有明義宜班下諱字使咸知所避上崇寅嚴之典下防僭同之繆通典一百四東宮鼓吹議鼓吹者蓋古之軍聲振旅獻捷之樂也施于時事不當後因以為制用之期會用之道路焉所以顯德明功振武和衆求使後世無亡其章率而合者也聞其音而德和省其詩而志正威儀足以化民俗制度足以和神人禮樂之教義有所指給鼓吹以備典章出入陳作因以移風易俗駮卞榷武帝喪禮議尚書顧命成王新崩傳遺命文物權用吉禮又禮卜家占宅朝服推此無不吉服也又巾車飾遣車及葬執蓋從方相玄衣裳此鹵簿所從出也今之吉駕亦象生之義凶服可除鼓吹吉服可設而不作通典七十九五禮駮魏氏天子一加三加嫌同諸侯育案玉藻記曰玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也其説謂皆始冠則是有次加之辭此二冠皆卑服質古勢不一加必重加朝祭之服以崇彌尊聖人制禮所以一時歷加衆服者今始成人卜擇合日而遍加之所以重始也若冠日有不加者後必不擇吉而服非重始也又禮器有以少為貴者冠不在焉記有彌尊喻志之言蓋以服從卑始象德日新不可先服尊服轉而即卑今嫌士禮喻志之文因從魏氏一加之制考之玉藻似非古典今三加者先冠皮辨次冠長冠後冠進賢冠以為彌尊于意又疑通典五十六七誘進趙女延麗人金華之幹珥明月之珍書鈔一百三十五作孫敏據下條知育之誤鏤藍畫丹實以餘梁鮮若朝雪流曜飛芳書鈔一百四十四枉水之黿膾天流之潛書鈔一百四十五相風賦序太僕傅侯命余賦之誠知武夫非荊寶之倫長庚啓明非曜靈之匹御覽八百九
