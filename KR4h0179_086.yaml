body:
  text: 成粲平樂市賦惟市之由興自帝炎之所創聚財貨以利用蓋私事之莫尚爾乃巷列千所羅居百族街衢相望連棟接屋則能目語額瞬動頞塞鼻談智于尺寸之間窺窬于分毫之利初學記二十四太常郭奕諡景議同諡非嫌號諡者國之大典所以厲時作教經天人之遠旨也固雖君父義有所不隆及在臣子或以行顯故能使上下邁德罔有怠荒臣願遠稽聖世同符堯舜行周同諡之禮舍漢魏近制相避之議又見通典一百四嫂叔服論嫂應有服作傳者橫曰無服蔣濟引娣姒婦證非其義論云喪服云夫為兄弟服妻降一等則專服夫之兄弟固已明矣尊卑相侔服無不服由此論之嫂叔大功可得而從通典九十二梨樹頌并序梨樹頌并序太康十年梨樹四枝其條與中枝合生于園圃皇太子令侍臣作頌嘉木時生瑞我皇祚修幹外揚隆枝內附翌翌皇儲克光其敬神啓其和人隆其盛降自玄圃合體連性時惟令月躬親北林樂在同人如蘭如金木之期應乃同其心同心之生啓自神明在心斯動于言斯形先民有則稱詩表情惟永作歌以休厥靈藝文類聚八十六初學記二十八司徒李胤誄闕闕乞為祖母薑還重表父翔少繼叔父榮榮早終不及持重今祖母薑氏亡主者以翔後榮從出降之制斷殷為大功假二十日愚以為翔既不及榮持重服雖名戶別繼奉養薑故如親子便依降例情制為輕且殷是翔之嫡子應為薑之嫡孫乞得依令遣寧去職通典九十六表世祖武皇帝擢臣負薪之中授臣著作佐郎典治天下文義數術乃撰諸志也北堂書鈔五十七引石瑞記太安元年前著作郎丘衆表稱云云使蜀弔孔明適子之墓冥漠無聲廟堂猶在松柏冬青遐哉邈矣長遊幽冥北堂書鈔一百二引王隱晉書表復起劉毅表復起劉毅禮凡卑者執勞尊者居逸是順敘之宜也司徒魏舒司隸校尉嚴詢與毅年齒相近往者同為散騎常侍後分授外內之職資塗所經出處一致今詢管四十萬戶州兼董司百僚總攝機要舒所統殷廣兼執九品銓十六州論議主者不以為劇毅但以知一州便謂不宜纍以碎事于毅太優詢舒大劣若以前聽致仕不宜復與遷授位者故光祿大夫鄭袤為司空是也夫知人則哲惟帝難之尚可復委以宰輔之任不可咨以人倫之論臣竊所未安昔鄭武公年過八十八為周司徒雖過懸車之年必有可用毅前為司隸直法不撓當朝之臣多所案劾諺曰受堯之誅不能稱堯直臣無黨古今所悉是以汲黯死于淮陽董仲舒裁為諸侯之相而毅獨遭聖明不離輦轂當世之士咸以為榮毅雖身偏有風疾而志氣聰明一州品第不足勞其思慮毅疾惡之心小過主者必疑其論議傷物故高其優禮令去事實此為機閣毅使絶人倫之路也臣州茂德惟毅越毅不用則清談倒錯矣晉書劉毅傳司徒舉毅為青州大中正尚書以毅懸車致仕不宜榮當作勞以碎務陳留相樂安孫尹表上書言楊泉楊泉清操自然徵聘終不移心書鈔六十三引晉録上疏請不試秀才答問損益當須博通古今明達政體必求諸墳索乃堪其舉臣所忝州往遭寇亂學校久替人士流播不得比之餘州策試之由當藉學功謂宜同孝廉例申與期限晉書甘卓傳上書請遷都壽春不圖厄運遂至于此戎狄交侵畿甸危逼臣輒與祖納裴憲華談孤惠等三十人伏思大計僉以殷人有屢遷之事周王有岐山之徙方今王都罄乏不可久居河朔蕭條崤函險澀宛都屢敗江漢多虞于今平夷東南為愈淮揚之地北阻塗山南抗靈嶽名川四帶有重險之固是以楚人東遷遂宅壽春徐邳東海亦足戍禦且運漕四通無患空乏雖聖上神聰元輔賢明居儉守約用保宗廟未若相土遷宅以享永祚臣謹選精卒三萬奉迎皇駕輒檄前北中郎將裴憲行使持節監豫州諸軍事東中郎將風馳即路荊湘江揚各先運四年米租十五萬斛布絹各十四萬匹以供大駕令王浚苟晞共平河朔臣等戮力以啓南路遷都弭寇其計並得皇輿來巡臣宜轉據江州以恢王略知無不為古人所務敢竭忠誠庶報萬分朝遂夕隕猶生之願晉書周馥傳永嘉四年與長史吳思司馬殷識上言教參軍杜夷優遊養素文選謝宣遠戲馬臺送孔令詩注讓太子少傅疏臣退自循省學不通一經智不效一官止足良難未能守分遂忝顯任名位過量不悟天鑒忘臣頑弊乃欲使臣內管銓衡外忝傅訓質輕蟬翼事重千鈞此之不可不待識而明矣若臣受負乘之責必貽聖朝惟塵之恥府仰愧懼不知所圖晉書周顗傳復肉刑議復肉刑以代死誠是聖王之至德哀矜之弘私然竊以為刑罰之輕重隨時而作時人少罪而易威則從輕而寬之時人多罪而難威則宜死刑而濟之肉刑平世所應立非救弊之宜也方今聖化草創人有餘姦習惡之徒為非未已截頭絞頸尚不能禁而乃更斷足劓鼻輕其刑罰使欲為惡者輕犯寬刑蹈罪更衆是為輕其刑以誘人于罪殘其身以加楚酷也昔之畏死刑以為善人者今皆犯輕刑而殘其身畏重之常人反為犯輕而致困此則何異斷刖常人以為恩仁邪受刑者轉廣而為非者日多踊貴屨賤有鼻者醜也徒有輕刑之名而實開長惡之源不如以殺止殺重以全輕權小停之須聖化漸著兆庶易威之日徐施行也晉書刑法志通典一百六十八尚書周顗等議上晉王疏臣聞取天下者常以無事及其有事不足以取天下故古之王者必應天順時義全而後取讓成而後得是以享世長久重光萬載也今議者以殿下化流江漢澤被六州功濟蒼生欲推崇尊號臣謂今梓宮未反舊京未清義夫泣血士女震動宜深明周公之道先雪社稷大恥盡忠言嘉謨之助以時濟弘仁之功崇謙謙之美推後己之誠然後揖讓以謝天下誰敢不應誰敢不從晉書周嵩傳又羅願新安志九諫疏忌王導等疏臣聞明君思隆其道故賢智之士樂在其朝忠臣將明其節故量時而後仕樂在其朝故無過任之譏將明其節故無過寵之謗是以君臣並隆功格天地近代以來德廢道衰君懷術以御臣臣挾利以事君君臣交利而禍亂相尋故得失之迹難可詳言臣請較而明之夫傅説之相高宗申召之輔宣王管仲之佐齊桓衰范之翼晉文或宗師其道垂拱受成委以權重終致匡主未有憂其逼已還為國蠹者也始田氏擅齊王莽篡漢皆藉封土之強假纍世之寵因暗弱之主資母后之權樹比周之黨階絶滅之勢然後乃能行其私謀以成篡奪之禍耳豈遇立功之主為天人所相而能運其姦計以濟其不軌者哉光武以王族奮于閭閻因時之望收攬英奇遂續漢業以美中興之功及天下既定頗廢黜功臣者何哉武力之士不達國體以立一時之功不可久假以權勢其興廢之事亦可見矣近者三國鼎峙並以雄略之才命世之能皆委賴俊哲終成功業貽之後嗣未有愆失遺方來之恨者也今王導王廙等方之前賢猶有所後至于忠素竭誠義以輔上共隆洪基翼成大業亦昔之亮也雖陛下乘奕世之德有天人之會割據江東奄有南極龍飛海嵎興復舊物此亦群才之明豈獨陛下之力也今王業雖建羯寇未梟天下蕩蕩不賓者衆公私匱竭倉庾未充梓宮沈淪妃后不反正委賢任能推轂之日也功業垂就晉祚方隆而一旦聽孤臣之言惑疑似之説乃更以危為安以疏易親放逐舊德以佞伍賢遠虧既往之明顧傷伊管之交傾巍巍之望喪如山之功將令賢知杜心義士喪志近招當時之患遠遺來世之笑夫安危在號令存亡在寄任以古推今豈可不寒心而哀歎哉臣兄弟受還無彼此之嫌而臣干犯時諱觸忤龍鱗者何誠念社稷之憂欲報之于陛下也古之明王思聞其過悟逆旅之言以明成敗之由故採納愚言以考虛實上為宗廟無窮之計下收億兆元元之命臣不勝憂憤竭愚以聞晉書周嵩傳上疏請周顗贈諡臣亡兄顗昔蒙先帝顧眄之施特垂表啓以參戎佐顯居上列遂管朝政並與群后共隆中興仍典選曹重蒙寵授忝位師傅得與陛下揖讓抗禮恩結特隆加以鄙族結婚帝室義深任重庶竭股肱以報所受凶逆所忌惡直醜正身陷極禍忠不忘君守死善道有隕無二顗之云亡誰不痛心況臣同生能不哀結王敦無君由來實久元惡之甚古今無二幸賴陛下聖聰神武故能摧破凶強撥亂反正以寧區宇前軍事之際聖恩不遺取顗息閔得充近侍臣時面啓欲令閔還襲臣亡父侯爵時卞壺庾亮並侍御坐壺云事了當論顯贈時未淹久言猶在耳至于譙王承甘卓已蒙清復王澄久遠猶在論議況顗忠以衛主身死王事雖嵇紹之不違難何以過之至今不聞復封加贈褒顯之言不知顗有餘責獨負殊恩為朝廷急于時務不暇論及此臣所以痛心疾首重用哀歎者也不勝辛酸冒陳愚款晉書周謨傳送兩足虎文般般白虎觀釁荊楚孫吳不逞金皇赫怒梅鼎祚西晉文紀引王隱晉書太康六年荊州送兩足虎時尚書郎索靖議稱半虎博令王鈐為文議向雄事禮雖云君不君臣不可以不臣當為小惡也三諫不從則去不見齒于其君則不敢立其朝至如仲子稱人以國士遇我我以國士報之人以凡人遇我我以凡人報之此猶輕于戎首則可逢而避之至死不往可也雄無詔敕逢避未可非也通典九十九白征西大將軍論復肉刑夫政未可立則思制度全育民命富國強兵叛盜之屬斷肢而已是好生惡殺叛盜皆死是好殺惡生也斷肢若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則皋陶作士此欲善其末則先制其本也自古多人猶惜民命得以禦寇況今千不遺一益宜存在以伐大賊今若得改之則歲所活數萬殺亦如之若此千載生各數萬斫肢之後隨刑使役不失民民不乏用富國強兵此之謂也御覽六百四十八引王隱晉書筆銘豈作其筆必兔之毫調利難禿亦有鹿毛藝文類聚五十八初學記二十二果賦杏或冬而實御覽九百六十八風賦爰太玄之遐始惟浮沈之剖分詳乾坤之至德莫風氣之獨尊配無形于大象化萬品于煙熅釋凝潤于黃壤降霈澤于蒼元生無常域潛無定棲擢昧聚發尋虛散歸肆六合以騁邁括毫毛而徘徊引沈性于未萌挫登形于已就宣剛柔之流化導四體之靈候若乃祝融司節炎精赫奕斂朱脣而長嘯承音響而來薄猥熻熠以盈扉洌纏綿以結幕九域蕩搖區宇揮霍藝文類聚一太公呂望表齊大公呂望者此縣人也失其大晉受命四海一統太康二年縣之西偏有盜發冢得竹策之書書藏之年當秦坑儒之前八十六歲其周志曰文王夢天帝服玄禳以立于令狐之津帝曰昌賜汝望文王再拜稽首太公于後亦再拜稽首文王夢之之夜太公夢之亦然其後文王見太公而訓之曰而名為望乎答曰唯名望文王曰吾如有所于見汝太公言其年月與其日且盡道其言臣此以得見也文王曰有之有之遂與之歸以為卿士其紀年曰康王六年齊太公望卒參考年數蓋壽百一十餘歲先秦滅學而藏于丘墓天下平泰而發其潛書所出正在斯邑豈皇天所以章明先哲著其名號光于百代垂示無窮者矣于是太公之裔孫范陽盧無忌自太子洗馬來為汲令般溪之下舊有壇場今隨廢荒而不治乃咨之碩儒訪諸朝吏僉以為太公功施于民以勞定國之典祀所宜不替且其山也能興雲雨財用所出遂修復舊祀名計偕勒以章顯烈俾萬載之後有所稱述其辭曰於鑠我祖時惟太公當殷之末德通上帝有命以錫周邦公及文王二夢惟同上帝命若時登庸遂作心膂寅亮天工肆伐大商克咸厥功建國胙土俾侯于東奮乎百世聲烈彌洪般溪之山明靈所託升雲降雨為膏為澤水旱癘疫是禳是禜來方禋祀莫敢不敬報以介福惠我百姓天地和舒四氣通正災害不作民無夭命嘉生蕃殖遠迸迄用康年稼穡茂盛凡我邦域永世受慶春秋匪解無口茲令太康十年三月丙寅朔十九日甲申造碑拓本奉詔詣終南山請雨文峨峨大石佐嶽通理含滋吐潤惠我四海初學記五石第九引王隱晉書答束晳問束晳問嫡子為出母無服母為子有何服步熊答但為父後故不得服耳母為之服周嫡子雖不服外祖猶為服緦麻也通典八十九束晳問曰繼母嫁從服當立廬不步熊答曰父卒繼母嫁如母居應倚廬通典八十九束晳問曰有父母喪遭外緦麻喪往奔不步熊答曰不得也若外祖父母喪非嫡子可往若姑姊妹喪嫡庶皆宜往奔也通典九十七束晳問步熊熊答曰禮已除不追耳未除當追服五月通典九十七小功不稅服束晳問步熊曰三年喪不葬五年後復葬當練不熊答曰禮云練祥之間必異月與此同也通典一百三答問問妻死更娶為前妻父母服不答此皆徒從服耳所從亡則已不服也通典九十五劉世明答陳氏問陳氏問劉世明曰其餘以麻終月數者注云謂旁親不指言衆子當除也然人皆分斷之于意不耳劉答云父謂衆子為庶子庶子不謂父為庶父也父得卑其庶子而降之庶子不得降其父也然子之于親體同服等非旁親之謂也喪服大功章女子之嫁者降伯叔父母及姑姊妹注謂此旁親而經無降父之文明衆子及女雖不承嫡猶非旁親也故記云兄弟之喪內除親喪外除外除者謂由外設飾以散其哀也故靈柩未安則服不變服不變則哀未衰未衰之喪不可卒除也然則未葬而除自謂旁親得以麻終者耳又問久而不葬葬後幾月日便可除世人有踰月者有既虞便除者夫改葬猶三月乃除情為不輕于改葬也若應三月乃除者廬帳亦當三月乃毀復有先後邪答曰記云三年而後葬者必再祭注云謂練祥也葬月虞明月練又明月祥記此亦得三月不為輕于改葬也禮虞而柱楣翦屏練而毀廬居堊室祥而席禫而床今此虞及練祥雖為局促猶追償其事若在異月以其本異歲也練祥之服變除之宜宜如其節也又問云三年而後葬及父在為母過期乃葬亦當復日中反虞安神位與不答云凡久而不葬則包諸過葬節者也為母既周亦為久而不葬矣夫虞所以安神也葬者動棺舉柩新離常處懼鬼神無所依歸所以將窆之間奠于墓左成壙而歸虞于殯宮不忍一日未有歸也今久而不葬棺槨動移鬼神不安無以為異練祥皆追此亦宜然又記云葬日虞是明文也毀除之節在士虞禮練而後遷廟不復在殯今此既葬明月練亦當以其月遷廟通典一百三核性賦趙荀卿著書言人性之惡弟子李斯韓非顧而相謂曰夫子之言性惡當矣未詳才之善否何如願聞其説荀卿曰天地之間兆族羅列同稟氣質無有區別裸蟲三百人最為劣爪牙皮毛不足自衛唯賴詐偽迭相嚼齧總而言之少堯多桀但見商鞅不聞稷契父子弟兄殊唯異計君臣朋友志乖怨結鄰國鄉黨務相吞噬臺隸僮豎唯盜雖竊面從背違意與口戾言如飴蜜心如蠻厲未知勝負便相陵蔑正路莫踐竟赴邪轍利害交爭豈顧憲制懷仁抱義祗受其斃周孔徒勞名教虛設蠢爾一概智不相絶推此而談孰疑孰黠法術之士能不噤齘仰則扼腕俯則攘袂荀卿之言未終韓非越席起舞李斯擊節長歌其辭曰形生有極嗜欲莫限達鼻耳開口眼納衆惡距群善方寸地九折坂為人作嶮易俄頃成此蹇多謝悠悠子悟之亦不晚藝文類聚二十一
