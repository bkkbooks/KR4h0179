body:
  text: 王沈王會賦伊月正之元吉兮應三統之中靈順天地以交泰協太蔟之玄精荷介祉于上帝兮祚聖皇以永貞華幄映于飛雲兮朱幕張于前庭絙青帷于兩階象紫極之崢嶸曜五旗于東序兮表雄虹而為旌備六代之象舞兮釐簫韶于九成晞玄夜以司晨兮望庭燎之高煬壯甲士之星羅兮偉干戚之飄揚臚人肅其齊列九賓穆以成行延百辟于和門等尊卑而奉璋齊八荒于蕃服兮咸稽首而來王初學記四朝四國于東巡宋書禮志一宴嘉賓賦朝陽曜景天氣和平君臣令德禮儀孔明酌羽觴以交歡兮接敬恭以中誠嘉膳備其八珍兮絲竹獻其妙聲樂周遍舞金奏克諧鍾儀之聽南風是哀義感君子慨然永懷思我王度求福不回惟禮終而贊退兮實繫心乎玉階初學記十四餞行賦六龍齊鑣鸞聲振振景動波回天行星陳御覽三百五十八曳招搖之修旗若蜿虹之垂天初學記二十二御覽三百四十馬腦勒賦有殊域之妙寶兮託靈山之曲阿傍洞空之幽溪兮洄緑泉之湍波書鈔一百五十八厥象伊何如規之盈鮫鱗紆鬱白黑殊形如米之潔如玉之貞固乾坤之所育兮匪雕鏤而自成爾乃施飾龍首加服鸞鑣和鈴鏘鏘回景逍遙御覽三百五十八車渠觶賦溫若騰螭之升天曜似游鴻之遠臻御覽八百八賀正表三辰改運元正肇祚自天降祉如日之升初學記四賀肅慎貢獻表楛矢陳于玉階書鈔十到豫州下教自古聖賢樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也自至鎮日未聞逆耳之言豈未明虛心故令言者有疑其宣下屬城及士庶若能舉遺逸于林藪黜姦佞于州國陳長吏之可否說百姓之所患興利除害損益昭然者給穀五百斛若達一至之言說刺史得失朝政寬猛令剛柔適者給穀千斛謂余不信明如皎日晉書王沈傳又下教夫德薄而位厚功輕而祿重貪夫之所徇高士之所不處也若陳至言于刺史興益于本州達幽隱之賢去祝鮀之佞立德于上受分于下斯乃君子之操何不言之有直言至理忠也惠加一州仁也功成辭賞廉也兼斯而行仁智之事何故懷其道而迷其國哉晉書王沈傳後生不聞先王之教而望政道日興不可得也文武竝用長久之道也俗化陵遲不可不革革俗之要實在敦學昔原伯魯不悅學閔馬父知其必亡將吏子弟優間家門若不教之必致游戲傷毀風俗矣晉書王沈傳與傅玄書省足下所著書言富理濟經綸政體存重儒教足以塞楊墨之流遁齊孫孟于往代每開卷未嘗不歎息也不見賈生自以過之乃今不及信矣晉書傅玄傳辟雍頌序辟雍頌序唐虞三代咸崇辟雍養老之制也親降萬乘之尊而執子弟之禮自春秋以來禮樂昏廢惟東京之後始創其義明堂之位復陳于洛邑書鈔天子親整法駕撫玉輅幸于雍宮親拜三老五更出于南門之外白帖祭先考東郡君文孝子沈敢昭告烈考東郡君沈亡母郭氏恪勤婦道齊孝之節克順于先姑天降氛氣雁門大夫人遘疾歷旬郭時又遇篤疾弗獲嘗禱夫人不幸遂至殞歿烈考卒承大變憂慟荒迷未詳聽察謂郭供養有闕遂載病大歸尋便殞亡烈考深用悼恨淡及沈仰惟烈考舊心鑒亡妣素行不迎之議考禮度衷未及施行淡不幸夭沒沈敢述淡意謀之通儒咨之邦族咸以為亡妣宜時改葬沈謹受命于征南君謹詣鄴迎郭靈柩以某月日安厝庶順烈考之舊心全祖親之慈愛者也通典一百二失題千乘雷動萬騎雲舒書鈔十六巡行請賜綦毋倪鼓吹表吳國臨戰牙門將張泰黃辰騎督綦毋倪勇捷效武破賊制勝此三人之所致也泰辰已亡今倪獨在昔伐蜀有小功斬牙門數人便加鼓吹至于滅一國而有未得鼓吹者臣愚昧請聖詔賜倪鼓吹存録猛將以盡武人之力也御覽五百六十七請補周馥為尚書郎表馥理識清正兼有才幹主定九品檢括精詳臣委任責成褒貶允當請補尚書郎晉書周馥傳御覽二百九請轉荀組為從事中郎表左西屬組文義貞素清識見稱宜轉中郎御覽二百九引晉中興書表立水碓洛陽百里內舊不得作水碓臣表上先帝聽臣立碓并攙得官地御覽七百六十二乞遣趙纂療病表臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事在醫署纂能針有方伎乞以纂名課考稱課醫給臣自療治御覽八百三十上書諫遣齊王攸之藩伏承聖詔憲章古典進齊攸為上公崇其禮儀遣攸之國昔周氏建國大封諸姬以藩帝室永世作憲至于公旦武王之弟左右王事輔濟大業不使歸藩明至親義著不可遠朝故也是故周公得以聖德光弼幼主忠誠著于金縢光述文武仁聖之德攸于大晉姬旦之親也宜贊皇朝與聞政事實為陛下腹心不二之臣且攸為人修潔義信加以懿親志存忠貞今陛下出攸之國假以都督虛號而無典戎幹方之實去離天朝不豫王政傷母弟王親之體虧友于款篤之義懼非陛下追述先帝文明太后待攸之宿意也若以攸望重于事宜出者今以汝南王亮代攸亮宣皇帝子文皇帝弟胄駿各處方任有內外之資論以後慮亦不為輕攸今之國適足長異同之論以損仁慈之美耳而今天下窺陛下有不崇親親之情臣竊為陛下不取也若以妃后外親任以朝政則有王氏傾漢之權呂産專朝之禍若以同姓至親則有吳楚七國逆亂之殃歷觀古今苟事輕重所在無不為害也不可事事曲設疑防慮方來之患者也唯當任正道而求忠良若以智計猜物雖親見疑至于疏遠者亦何能自保乎人懷危懼非為安之理此最有國有家者之深忌也愚以為太子太保缺宜留攸居之與太尉汝南王亮衛將軍楊珧共為保傅幹理朝事三人齊位足相持正進有輔納廣義之益退無偏重相傾之勢令陛下有篤親親之恩使攸蒙仁覆之惠臣同國休戚義在盡言心之所見不能默已私慕魯女存國之志敢陳愚見觸犯天威欲陛下事每盡善冀萬分之助臣而不言誰當言者晉書王渾傳為裴楷奏請解中書令楷受先帝拔擢之恩復蒙陛下寵遇誠竭節之秋也然楷性不競于物昔為常侍求出為河內太守後為侍中復求出為河南尹與楊駿不平求為衛尉及轉東宮班在時類之下安于淡退有識有以見其心也楷今委頓臣深憂之光祿勳缺以為可用今張華在中書王戎在尚書足舉其契無為復令楷入名臣不多當見將養勿違其志要其遠濟之益晉書裴楷傳奏彈虞濬等冒喪婚娶前以冒喪婚娶傷化悖禮下十六州推舉今本州中正各有言上太子家令虞濬有弟喪嫁女拜時鎮東司馬陳湛有弟喪嫁女拜時上庸太守王崇有兄喪嫁女拜時夏侯俊有弟子喪為息恆納婦恆無服國子祭酒鄒湛有弟婦喪為息蒙娶婦拜時蒙有周服給事中王琛有兄喪為息稜娶婦拜時并州刺史羊暨有兄喪為息明娶婦拜時征西長史牽昌有弟喪為息彥娶婦拜時湛職儒官身雖無服據為婚主案禮大功之末可以嫁子小功之末可以娶婦無齊縗嫁娶之文虧違典憲宜加貶黜以肅王法請臺免官以正清議通典六十元康二年司徒王渾奏奏對詔訪元會問計吏所宜詔問明年正旦會四方計吏入見臨朝當問所宜渾奏曰陛下欽明聖哲光于遠近明詔沖虛詢及芻蕘斯乃周文疇咨之求仲尼不恥下問也舊三朝元會前計吏詣軒下侍中讀詔計吏跪受臣以詔文相承已久無他新聲非陛下留心訪問之意也可令中書指宣明詔問方土異同所宜士人賢才秀異隱伏未達風俗好尚禮教之宜勸農務本以盡墾殖之利刑獄清理得無枉濫之失郡守長吏得無侵虐其勤心治政為民興利除害者訓化之績授以紙筆盡意陳聞以明聖指垂心四遠不復因循常辭且察其答對文義以觀計吏人才之實又先帝時正會後東堂見征鎮長史司馬諸王國卿諸州別駕今若不能別見可前詣軒下使侍中宣問以審察方國于事為便藝文類聚四御覽二十九竝引王渾集又見晉書王渾傳槐樹賦若夫龍升南陸火集正陽恢茲鬱陶靜暑無方鼓柯命風振葉致涼朗明過乎八闥重陰踰于九房初學記二十八太常郭奕諡景議案主者議諡避帝而不避后既不循古典不嫌同稱復乖近代不襲帝后之例夫無窮之祚名諡不一若皆相避于制難全如悉不避復非推崇事尊之禮宜依諱名之義但及七廟祖宗而不及遷毀之廟通典一百四太康八年十月太常上議故太常平陵男郭奕為景侯有司議奏以為大晉受命祖宗諡號群下未有同者蓋因近代淺情習于所見也奕諡與景皇帝同可改諡曰穆侍中王濟與羊璞成粲等議鍾夫人序德頌濟蒙天假星驅省疾文選顏延之宋郊祀歌注銓孫楚品狀天才英博亮拔不群晉書孫楚傳楚與濟友善濟為本州大中正銓邑人品狀至楚曰此人非卿所能目吾自為之乃狀楚與人書彥國吐佳言如鋸木屑霏霏不絶誠後進領袖也世說注案胡毋輔之字彥國奉高人風氣日上足散人懷世說主尺牘增兒微二字案澄第四子微
