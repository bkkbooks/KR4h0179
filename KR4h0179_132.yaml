body:
  text: 桓伊上馬具裝步鎧表臣過蒙殊寵受任西藩淮南之捷逆兵奔北人馬器鎧隨處放散于時收拾敗破不足貫連比年營繕並已修整今六合雖一餘燼未滅臣不以朽邁猶欲輸效力命仰報皇恩此志永絶銜恨泉壤謹奉輸馬具裝百具步鎧五百領並在尋陽請勒所屬領受晉書桓伊傳到江州上疏江州虛耗加連歲不登今餘戶有五萬六千宜并合小縣除諸郡逋米移州還鎮豫章晉書桓伊傳冬夏至寢鼓兵議陽實君道是以微陽初興慶其方盛寢鼓息兵不欲震蕩也禮尊無二若當助陰豈一之義何以明之彼月而蝕則惟其常此日而蝕于何不臧月蝕無救之道明矣通典七十八二節陰陽升降之極會通交代之日二氣既接剛柔始分君子遠慎諸物近慎諸已在冬欲靜在夏無躁百官靜事無刑以定寢鼓息兵其宜合同張侯曰冬夏二至慎微不異左傳曰凡分至啓閉必書雲物為備故也所重所慎于是在矣周禮太僕掌贊王鼓救日月亦如之左傳又曰月亦如之又曰非日月之眚不鼓皆正經也日長則賀君父道也下慶上會情交接也日短則不賀臣子道也鼓以動衆是以二至迎送同寢之也通典七十八寢鼓不出經傳或以漢興日蝕陰盛擊鼓助陽不應寢鼓也通典七十八明刻本作劉弘今從官本陳節戲事夫嬉戲都名動相剝非為治之本自今摴蒲擲馬諸不急戲宜一斷之藝文類聚七十四引庾翼集冬夏至寢鼓兵議案漢制有冬至絶事不聽政之條而無夏至也以此推之夏至不應寢政事通典七十八尋冬至寢鼓之義雖無正文恐有由耳夫天之德貴生惡殺冬至少陽初發萌芽之漸欲省方奉順動靜之象以應至道是以不省方事安能鳴鼓後代擬議寢之非為助陽也夏至少陰肇起殺氣自興否剝將至大盛方來宜有鼓鳴開關興兵駭旅施命四方誥其逆兆以遏小人方長之害二至之義否泰道異休戚有殊寢鼓之政不宜同也若以夏至俗人所重文武可息之一日不可前三後三等于冬至也通典七十八為簡文致桓溫書草寇難宜平時會宜接此實為國遠圖經略太算能弘斯會非足下而誰但以此興師動衆要當以資實為本運轉之艱古人之所難不可易之于始而不熟慮須所以深用惟疑在乎此耳然異常之舉衆之所駭遊聲噂誻想足下亦少聞之苟患失之無所不至或能望風振擾一時崩散如其不然者則望實並喪社稷之事去矣皆由吾暗弱德信不著不能鎮靜群庶保固維城所以內愧于心外慚良友吾與足下雖職有內外安社稷保家國其致一也天下安危繫之明德先存寧國而後圖其外使王基克隆大義弘著所望于足下區區誠懷豈可復顧嫌而不盡哉晉書高嵩傳答庾家訪孝庾后服皆準五屬為夫人周通典八十一孝后崩庾家訪服侍中高嵩答群臣敬太后父議夫子有云必也正名乎王者象天后者象地為兆庶父母尊莫重焉厚莫大焉若以后尊宜敬于親于后父母也便應有敬錯之禮典先無茲比今皇太后臨統朝政以主上富于春秋耳故事本尊之尊無復異也且諸侯為國藩翰北面稽首豈可得推崇為太上邪尋名定議請不應施敬也通典六十七四府君毀主議或疑陳于太祖者皆其後毀主憑案古義無別前後之文也禹不先鯀則遷主居太祖之上亦可無疑矣宋書禮志三不拜顏子議不拜顏子者案學堂舊有聖賢之象既備禮盡敬奉尼父以為師而未詳顏子拜揖之儀臣以聖者君道也師者賢臣道也若乃推堯舜禹于君位則稷契與我並為臣矣師玄風于洙泗則顏子吾同門也夫大賢恭已既揖讓于君德回也如愚豈越分于人師哉是以王聖佐賢而君臣之義著拜孔揖顏而師資之分同矣通典五十二妻已沒為妻父母服議徒從者所從亡則巳案鄭玄曰謂君母之黨又云有從重而輕者鄭玄曰妻之父母也然則從重而輕與徒從者本別禮天子諸侯服妻之父母明其義重也若謂徒從服必同者則妻從夫明與夫從妻其正對寧可復夫歿則已乎所據君母為異者且外祖之服本是親假而恩疏妻之父母本由義合通典九十五司徒符問國子博士博士張憑議新蔡王招魂葬議新蔡王所繼先王昔永嘉之難覆沒寇虜靈柩未返今求招魂靈案厝謹案禮典無招靈之文若藏虛棺以奉終則非原形之實埋靈爽于九泉則失事神之道懼非古人之情禮所未安也通典一百三答徐靈期問久喪未葬出適女除服徐靈期問張憑云親喪未葬出適女應除否答曰禮云久喪不葬主喪者不除又云主人不除此無緣獨施男子正嫡一人故當總謂男女衆子耳又無明文別言已出之女猶應除也今論者據已服周故謂宜從除例然緣情處意獨有所疑女隨外出降從周制至于居喪之例同于重者誠以性難可盡奪本重不得頓輕何必既降盡與周同禮者人情而已疑則從重若當釋縗絰以處殯宮襲吉服以對棺柩非孝子之所安也通典一百三答司徒符問妻已沒為妻父母服司徒符問太常云若妻已沒猶應服其父母不太常杜潛等答曰何以緦從服也明伉儷判對恭承宗廟推此言之意謂不以存亡為異也通典九十五安平王薨廢祭議禮有死于宮中闕一時之祀又案魏高堂隆議平原公主薨二月春祀不宜闕祭臣聞伯叔父同産昆弟庶子庶孫及次妃以下天子諸侯則降而不服于四時之祭無闕廢禮也漢文帝前代盛德之君也猶不忍以三年之喪妨廢孝享割損年月早葬速除追思祖考念在蒸嘗所以重宗廟也且宮中有死者三月不舉祭傳發于緦麻三月之章天子諸侯周大功皆降而不服何緦麻之有乎誠亦儒者之迷誤也通典五十二與某書十二月草五日逵白歲終感慘寒切足下何如遣不悉陳逵淳化閣帖四題云陳朝陳逵書釋文云晉西中郎將今檢陳書無此人晉書禮志中泰始末有博士陳逵又穆帝紀永和五年有西中郎將陳逵則其人也後漢史君頌山嶽降精川瀆耀靈猗歟史氏世濟其英忠其允塞嘉猷有聲從容燮理散誕飛纓含香青瑣敷奏丹庭有犯無隱唯言是聽王室斯賴諸侯以寧內侍帷幄外典專城為政以德察獄以情化俗草偃溪谷風清金相玉質不隕厥名處溢不驕居榮不憚視險如夷忘身逐叛駉頌美魯青蒲安漢執簡書愆姦邪逃竄匪君之忠孰能戡亂在昔隆漢姻婭皇家唯帝念功爵命屢加三台五鼎駙馬奉車腰佩兩印綬帶雙緺何彼穠矣常棣之華如圭不玷似玉無瑕節之以禮儉而不奢篤生我侯英略備舉有藝有才能文能武孝以奉親忠惟衛主赤眉始結白波猶侮執鋭破堅斬馘滅虜截彼長蛇殲斯猾豎策賞廟堂書勳王府功成弗居名立不取簡在帝心酬封祚土厥土惟何在溧之滸初食三千卒封萬戶葭菼揭揭麀鹿麌麌禾役旆旆原田膴膴俯營川陸魚鹽所聚蝗飛火滅還珠去虎子民輯悅建茲城宇大廈耽耽聽政之所祠堂石殿生靈攸處春秋兮祭祠不阻景定建康志與征西桓溫箋蔡徐州薨主簿服斬王征北薨于京都王丞相時在喪庭徐州主簿以服事咨公公謂輕重可依蔡侯時北中郎劉公薨于淮陰州主簿相承持重至郤太宰薨州主簿改服齊衰中興以來江南皆從之公卿以下至邑宰吏服其君齊衰則無從服之文而由來多有從服者陶大司馬遭兄子喪府州主簿從服時卞光祿經過自説為太傅主簿太傳喪母已不從服此是用晉令也郤太宰遭姊喪吏服為疑郤問譕秀言不應從服諸主簿仍便從服既服君旁親則服君便應重矣乃二公之薨府州主簿服齊衰通典九十九大功降服議伯叔父母姑姊妹皆夫家也妻體夫尊降其夫伯叔父母姑姊妹小功妾賤不敢降也通典九十一生不及祖父母不稅服議記云不及祖謂不及並代而不相服略昔親行其事時人咸不見許通典九十八難孫略大功降服議妻為夫之黨服降夫一等夫之姑姊妹宜小功妾服君之黨得與女君同豈以貴賤之故而異之縱妻之貴而可以略君乞姑姊妹者則應妾服每當與君同也君之為父母三年妾何以無其制乎通典九十一追駮步熊議不為前妻父母服步熊曰妻死更娶為前妻父母服不答此皆徒從服耳所從亡則已不服也季祖鍾駮曰夫婦應屬從也又夫婦合葬皆為妻妻之父母不得不服也通典九十五出後者為本父母服議案喪服云為人後者為其父母持重于大宗者降其小宗也案經傳為人後者固自降其親也所以降其親者已受重于大宗必為所後之父服斬故也制其體例若受重于大宗而不為所後之父服斬則自非輕所謂為人後者之義也凡既受命出為人後而不為所後之父制服服固非禮也還為其親斬亦非禮也均其失寧居過重無居過輕故失恩由義厭情為禮是以五服之疏屬有相為重者矣天性之父子有相為輕者矣屈伸進退有自來也今奉義則不為所後之父服崇恩復不成所生之喪二者並闕未知其詳將何所居且傳敘經意但為既後大宗無二斬之道非不斬之制也談者不疑為後而不為所後制服為非禮乃為反服親為傷教斯蓋惑之大者也若不服所後之父復抑其反崇本恩則是凡為後之子可有不服三年之也愚謂為後之子及所後服重則宜如禮降其所生若不及為所後制服則宜還為其親服斬衰之義例即知人心在可通矣通典九十六答問問曰其兄是嫡長家有封代弟是庶生遭所生艱先以第二兒後其嫡兄嫡兄早卒其兒于家為是小宗否答曰記云別子為祖繼別為宗繼禰為小宗今此兒乃係數代嫡伯父所承若是別子則為大宗百代不遷者也所承若是係禰則為小宗五代則遷者也小大之名係之伯父此非兒之謂也通典七十三答訪某國中尉虞某訪太常王冀云臺贈國王第二郎年在殤為世子臣當有服不冀云禮無從君服殤之文夫臣從君而服以其體尊承緒非繼成人與殤也苟為代嫡君為之服則臣以何而不從服乎若以禮無文者亦可不服長子之下殤也通典八十二答劉系之問凡不繼大宗而立後及為後而不為所後制服皆非禮也然據已為後則不得不後為後之制若庶子立後不繼祖宗已服無重可傳亦何居而不服庶子若先受重承事則制有疑謂當與庶祖母同通典九十六劉系之問為庶祖母服經無其文不知為有服不王冀答曰庶祖母服經誠無文然亦無不服之制以情例推之謂自應服何以言之禮妾子父沒為母伸三年子既得伸孫無由獨屈假令嫡祖在禮婦人不厭則無復所屈案禮唯有祖母文無嫡庶之別蓋以明尊尊之義而人莫敢卑其祖也禮記云為慈母後者為庶母可也為庶祖母可也此謂父妾無子父命子為之後或子或孫唯其班第既受命為後則服之無嫌由此言之妾之無後而託後于人者猶為之服況親子之孫而可有不服之義邪制服為允通典九十八三人讚運遘屯凶三孤丞立離禽嬰鳴邂逅同集式穀既熟和響具翕肇彼遠歧泯焉齊入初學記十七朱明張臣尉讚詩詠張仲今也朱明輶財敦友衣不表形寡妻屏穢棠棣增榮臣尉邈然醜類感誠初學記十七議周協拜下之敬猶違衆從禮情理之極不宜以多比為通晉書韓伯傳陳郡周協為謝安主簿居喪廢禮崇尚莊老脫落名教伯領中正不通協議為或人答殷靈符問昔亡伯喪未除而祖母見背從兄不廢父喪主而為祖母居廬郤太尉來弔不以為非禮也通典九十七辨謙論夫尋理辨疑必先定其名分所存所存既明則彼我之趣可得而詳也夫謙之為義存乎隆已者也以高從卑以賢同鄙故謙名生焉孤寡不穀人之同惡而侯王以自稱降其貴者也執御報射衆之所賤而君子以自目降其賢者也與夫山在地中之象其致豈殊哉捨此二者而更求其義雖南轅求冥終莫近也夫有所貴故有降焉夫有所美故有謙焉譬影響之與形聲相與而立道足者忘貴賤而一賢愚體公者乘理當而均彼我降挹之義于何而生則謙之為美固不可以語至足之道涉乎大方之家矣然君子之行已必尚于至當而必造乎匿善至理在乎無私而動之于降已者何誠由未能一觀于能鄙則貴賤之情立非忘懷于彼我則私已之纍存當其所貴在我則矜值其所賢能之則伐處貴非矜而矜已者常有其貴言善非伐而伐善者驟稱其能是以知矜貴之傷德者故宅心于卑素悟驟稱之虧理者故情存乎不言情存乎不言則善斯匿矣宅心于卑素則貴斯降矣夫所況君子之流苟理有未盡情有未夷存我之理未冥于內豈不同心于降挹洗之所滯哉體有而擬無者聖人之德有纍而存理者君子之情雖所滯不同其于遣之緣有斃而用降已之道由私我而存一也故懲忿窒欲著于損象卑以自牧實繫謙爻皆所以存其所不足拂其所有餘者也王生之談以至理無謙近得之矣云人有爭心善不可收假後物之迹以逃動者之患以語聖賢則可施之于下斯者豈惟逃患于外亦所以洗心于內也晉書韓伯傳王述碑述遷會稽太守淮海維揚皇基所託此蓋關河之重復泱泱大邦文選沈約齊安陸王碑文注又任昉齊竟陵文宣王行狀注
