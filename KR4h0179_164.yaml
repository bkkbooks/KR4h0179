body:
  text: 卷一百六十四釋僧肇答劉遺民書不面在昔佇想用勞慧明道人至得去年十二月疏并問披尋返覆欣若暫對涼風屆節頃常如何貧道勞疾多不佳耳信南返不悉八月十五日釋僧肇疏答服像雖殊妙斯不二江山雖緬理契即鄰所以望途致想虛襟有寄君既遂喜遁之志標越俗之美獨恬事外歎足方寸每一言集何嘗不遠喻林下之雅詠高致悠然清散未期厚自保愛每因行李數有承問願彼山僧無恙道俗通佳承遠法師之勝常以為欣慰雖未清承然服膺高軌企佇之勤為日久矣公以過順之年湛彌厲養徒幽巖抱一沖谷遐邇仰詠何美如之每亦翹一隅懸庇霄岸無由寫敬致慨良深君清對終日快有悟心之歡也即此大衆尋常什法師如宜秦王道性自然天機邁俗城塹三寶弘道是務由使異典勝僧自遠而至靈鷲之風萃於茲士領公遠舉乃千載之津梁也於西域還得方等新經二百餘部請大乘禪師一人三藏法師一人毗婆沙法師二人什法師於大石寺出新至諸經法藏淵曠日有異聞禪師於瓦宮寺教習禪道門徒數百夙夜匪懈雍雍肅肅致可欣樂三藏法師於中寺出律藏本末精悉若覩初制毗婆沙法師於石羊寺出舍利弗阿毗曇胡本雖未及譯時問中事發言奇新貧道一生猥參嘉運遇茲盛化自恨不覩釋迦祇洹之集餘復何恨而慨不得與清勝君子同斯法集耳生上人頃在此同止數年至於言話之際常相稱詠中途還南君與相見未更近問惘悒何言威道人至得君念佛三昧詠并得遠法師三昧詠及序此作興寄既高辭致清婉能文之士率稱其美可謂遊涉聖門扣玄關之唱也君與法師當數有文集因來何少什法師以午年出維摩經貧道時預德次參承之暇輒復條記成言以為注解辭雖不文然義承有本今因信持一本往南君間詳試可取看來問婉切難為郢人貧道思不關微兼拙于筆語且至趣無言言必乖趣云云不已竟何所辨聊以狂言訓示來旨耳疏云稱聖心冥寂理極同無雖處有名之中而遠與無同斯理之玄固常所彌昧者以此為懷自可忘言內得取定方寸復何足以人情之所異而求聖心之異乎疏曰談者謂窮靈極數妙盡冥符則寂照之名故是定慧之體耳若心體自然靈怕獨感則群數之應固以幾乎息矣意謂妙盡冥符不可以定慧為名靈怕獨感不可稱群以息兩言雖殊妙用常一迹我而乖在聖不殊也何者夫聖人玄心默照理極同無既曰為同同無不極何有同無之極而有定慧之名定慧之名非同外之稱也若稱生同內有稱非同若稱生同外稱非我也又聖心虛微妙絶常境感無不應會無不通冥機潛運其用不勤群數之應亦何為而息邪且夫心之有也以其有有有不自有故聖心不有有不有有故有無有有無有故則無無無無故聖心不有不無不有不無其神乃虛何者夫有也無也心之影響也言也象也影響之所攀緣也有無既廢則心無影響影響既淪則言象莫測言象莫測則道絶群方道絶群方故能窮靈極數窮靈極數乃曰妙盡妙盡之道本乎無寄夫無寄在乎冥寂冥寂故虛以通之妙盡存乎極數極數故數以應之數以應之故動與事會虛以通之故道超名外道超名外因謂之無動與事會因謂之有因謂之有者應夫真有強謂之然耳彼何然哉故經云聖智無知而無所不知無為而無所不為此無言無相寂滅之道豈曰有而為有無而無動乖靜靜而廢用邪而今談者多即言以定旨尋大方而徵隅懷前識以標玄存所存之必當是以聞聖有知謂之有心聞聖無知謂等太虛有無之境邊見所存豈是處中莫二之道乎何者萬物雖殊然性本常一不可而物然非不物可物於物則名相異陳不物於物則物而即真是以聖人不物於物不非物於物不物於物物非有也不非物於物物非無也非有所以不取非無所以不捨不捨故妙存即真不取故名相靡因名相靡因非有知也妙存即真非無知也故經云舨若於諸法無取無捨無知無不知此攀緣之外絶心之域而欲以有無詰者不亦遠乎請詰夫陳有無者夫智之生也極於相內法本無相聖智何知世稱無知者謂等本石太虛無情之流靈鑒幽燭形於未兆道無隱機寧曰無知且無知生於無知無無知也無有知也無有知也謂之非有無無知也謂之非無所以虛不失照照不失虛怕然永寂靡執靡拘孰能動之令有靜之使無邪若經云真般若者非有非無無起無滅不可説示於人何則言其非有者言其非是有非謂是非有言其非無者言其非是無非謂是非無非有非非有非無非非無是以須菩提終日説般若而云無所説此絶言之道知何以傳庶參玄君子有以會之耳又云宜先定聖心所以應會之道為當唯照無相邪為當咸覩其變也談者似謂無相與變其旨不一覩變則異乎無相照無相則失於撫會然則即真之義惑有滯也經云色不異空空不異色色即是空空即是色若如來旨觀色空時應一心見色一心見空若一心見色則唯色非空若一心見空則唯空非色然則空色兩陳莫定其本也是以經云非色者誠以非色於色不非色於非色若非色於非色太虛則非色非色何所明若以非色於色即非色不異色非色不異色色即為非色故知變即無相無相即變群情不同故教迹有異耳考之玄籍本之聖意豈復真偽殊心空有異照邪是以照無相不失撫會之功覩變動不乖無相之旨造有不異無造無不異有未嘗不有未嘗不無故曰不動等覺而建立諸法以此而推寂用何妨如之何謂覩變之知異無相之照乎恐談者脫謂空有兩心靜躁殊用故言覩變之知不可謂之不有耳若能捨己心於封內尋玄機於事外齊萬有於一虛曉至虛之非無者當言至人終日應會與物推移乘運撫化未始為有也聖心若此何有可取而曰未釋不取之理又云無是乃所以為真是無當乃所以為至當亦可如來言耳若能無心於為是而是於無是無心於為當而當於無者則終日是不乖於無是終日當不乖於無當但恐有是於無是有當於無當所以為患耳何者若真是可是至當可當則名相以形美惡是生生生奔競孰與止之是以聖人空洞其懷無識無知然居動用之域而止無為之境處有名之內而宅絶言之鄉寂寥虛曠莫可以形名得若斯而已矣乃曰真是可是至當可當未喻雅旨也恐是當之生物謂之然彼自不然何足以然耳夫言迹之興異途之所由生也而言有所不言迹有有所不迹是以善言言者求言所不能言善迹迹者尋迹所不能迹有所不迹是以善言言者求言所不能言善迹迹者尋迹所不能迹至理虛玄擬心已差況乃有言恐所示轉遠庶通心君子有以相期於文外耳高僧傳六出三藏記集三般若無知論夫般若虛玄者蓋是三乘之宗極也誠真一之無差然異端之論紛然久矣有天竺沙門鳩摩羅什者少踐大方研幾斯趣獨拔於言象之表妙契於希夷之境齊異學於迦夷揚淳風於東扇將爰燭殊方而匿耀涼土所以道不虛應應必有由矣弘始三年歲次星紀秦乘入國之謀舉師以來之意也北天之運數其然矣大秦天王者道契百王之端德洽千載之下遊刃萬機弘道終日信季俗蒼生所天釋迦遺法之所仗也時乃集義學沙門五百餘人於逍遙觀躬執秦文與什公參定方等其所開拓者豈唯當時之益乃纍劫之津梁矣余以短乏曾廁嘉會以為上聞異要始於時也然則聖智幽微深隱難測無相無名乃非言象之所得為試惘象其懷寄之狂言耳豈曰聖心而可辨哉試論之曰放光云般若無所有相伙生滅相道行云般若無所知無所見此辨智照之用而曰無相無知者何邪果有無相之知不知之照明矣何者夫有所知則有所不知以聖心無知故無所不知不知之知乃曰一切知故經云聖心無所知無所不知信矣是以聖人虛其心而實其照終日知而未嘗知也故能默耀韜光虛心玄鑒閉智塞聰而獨覺冥冥者矣然則智有窮幽之鑒而無知焉神有應會之用而無慮焉神無慮故能獨王於世表智無知故能玄照於事外智雖事外未始無事神雖世表終日域中所以俯仰順化應接無窮無幽不察而無照功斯則無知之所知聖神之所會也然其為物也實而不有虛而不無存而不可論者其唯聖智乎何者欲言其有無狀無名欲言其無聖以之靈聖以之靈故虛不失照無狀無名故照不失虛照不失虛故混而不渝虛不失照故動以接粗是以聖智之用未始暫廢求之形相未暫可得故寶積曰以無心意而現行放光云不動等覺而建立諸法所以聖迹萬端其致一而已矣是以般若可虛而照真諦可亡而知萬動可即而靜聖應可無而為斯則不知而自知不為而自為矣復何知哉復何為哉難曰夫聖人真心獨朗物物斯照應接無方動與事會物物斯照故知無所遺動與事會故會不失機會不失機故必有會於可會知無所遺故必有知於可知必有知於可知故聖不虛知必有會於可會故聖不虛會既知既會而曰無知無會者何邪若夫忘知遺會者則是聖人無私於知會以成其私耳斯可謂不自有其知安得無知哉答曰夫聖人功高二儀而不仁明逾日月而彌昏豈曰木石瞽其懷其於無知而已哉誠以異於人者神明故不可以事相求之耳子意欲令聖人不自有其知而聖人未嘗不有知無乃乖於聖心失於文旨者乎經云真般若者清淨如虛空無知無見無作無緣斯則知自無知矣豈待返照然後無知哉若有知性空而稱淨者則不辨於惑智三毒四倒皆亦清淨有何獨尊淨於般若若以所知美般若所知非般若所知自常淨故般若未嘗淨亦無緣致淨歎於般若然經云般若清淨者將無以般若體性真淨本無惑取之知本無惑取之知不可以知名哉豈唯無知名無知知自無知矣是以聖人以無知之般若照彼無相之真諦真諦無免馬之遺般若無不窮之鑒所以會而不差當而無見寂怕無知而無不知者矣難曰夫物無以自通故立名以通物物雖非名果有可名之物當於此名矣是以即名求物物不能隱而論云聖心無知又云無所不知意謂無知未嘗知知未嘗無知斯則名教之所通立言之本意也然論者欲一於聖心異於文旨尋文求實未見其當何者若知得於聖心無知無所辨若無知得於聖心知亦無所辨若二都無得無所復論哉答曰經云般若義者無名無説非有非無非實非虛虛不失照照不失虛斯則無名之法故非言所能言也言雖不能言然非言無以傳是以聖人終日言而未嘗言也今試為子狂言辨之夫聖心者微妙無相不可為有用之彌勤不可為無不可為無故聖智存焉不可為有故名教絶焉是以言知不為知欲以通其鑒不知非不知欲以辨其相辨相不為無通鑒不為有非有故知而無知非無故無知而知是以知即無知無知即知無以言異而異於聖心也難曰夫真諦深玄非智不測聖智之能在茲而顯故經云不得般若不見真諦真諦則般若之緣也以緣求智智則知矣答曰以緣求智智非知也何者放光云不緣色生識是名不見色又云五陰清淨故般若清淨般若即能知也五陰即所知也所知即緣也夫知與所知相有與而有相與而無相與而無故物莫之有相與而有故物莫之無物莫之無故為緣之所起物莫之有故則緣之所不能生緣所不能生故照緣而非知為緣之所起故知緣相因而生是以知與無知生於所知矣何者夫智以知所知取相故名知真諦自無相真智何由知所以然者夫所知非所知所知生於知所知既生知知亦生所知所知既相生相生即緣法緣法故非真非真故非真諦也故中觀云物從因緣有故不真不從因緣有故即真今真諦曰真真則非緣真非緣故無物從緣而生也故經云不見有法苶緣而生是以真智觀真諦未嘗取所知智不取所知此智何由知然智非無知但真諦非所知故真智亦非知而子欲以緣求智故以智為知緣自非緣於何而求知哉難曰論云不取者為無知故不取為知然後不取邪若無知故不取聖人則冥若夜遊不辨緇素之異邪若知然後不取知則異於取之答曰非無知故不取又非知然後不取知即不取故能不取而知難曰論云不取者誠以聖心不物於物故無惑取也無取則無是無是則無當誰當聖心而云聖心無所不知邪答曰然無是無當者夫無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當故經云盡見諸法而無所見者也難曰聖心非不能是誠以無是可是雖無是可是故當是於無是矣是以經云真諦無相故般若無知者誠以般若無有有相之知若以無相為無相有何纍於真諦也答曰聖人無無相也何者若以無相為無相無相即為相捨有而之無譬猶逃峰而赴壑俱不免於患之是以至人處有而不有居無而不無雖不取於有無然亦不捨於有無所以和光塵勞周旋五趣寂然而往怕爾而來恬淡無為而無不為難曰聖心雖無知然其應會之道不差是以可應者應之不可應者存之然則聖心有時而生有時而滅可得然乎答曰生滅者生滅心也聖人無心生滅焉起然非無心但是無心心耳又非不應但是不應應耳是以聖人應會之道則信若四時之質直以虛無為體斯不可得而生不可得而滅也難曰聖智之無惑智之無俱無生滅何以異之答曰聖智之無者無知惑智之無者知無其無雖同所以無者異也何者夫聖心虛靜無知可無可曰無知非謂知無惑智有知故有知可無可謂知無非曰無知也無知即般若之無也知無即真諦之無也是以般若之與真諦言用即同而異言寂即異而同同故無心於彼此異故不失於照功是以辨同者同於異辨異者異於同斯則不可得而異不可得而同也何者內有獨鑒之明外有萬法之實萬法雖實然非照不得內外相與以成其照功此則聖所不能同用也內雖照而無知外雖實而無相內外寂然相與俱無此則聖所不能異寂也是以經云諸法不異者豈曰續鳧截鶴夷嶽盈然後無異哉誠以不異於異故雖異而不異也故經云甚奇世尊於無異法中而説諸法異又云般若與諸法亦不一相亦不異相信矣難曰論云言用則異言寂則同未詳般若之內則有用寂之異乎答曰用即寂寂即用用寂體一同出而異名更無無用之寂而主於用也是以智彌昧照逾明神彌靜應逾動豈曰明昧動靜之異哉故成具云不為而過為寶積曰無心無識無不覺知斯則窮神盡智極象外之談也即之明文聖心可知矣物不遷論夫生死交謝寒暑迭遷有物流動人之常情余則謂之不然何者於光云法無去來無動轉者尋夫不動之作豈釋動以求靜必求靜於諸動必求靜於諸動故雖動而常靜不釋動以求靜故雖靜而不離動然則動靜未始異而惑者不同緣使真言滯於競辨宗途屈於好異所以靜躁之極未易言也何者夫談真則逆俗順俗則違真違真則迷性而莫返逆俗故言淡而無味緣使中人未分於存亡下士撫掌而弗顧近而不可知者其唯物性乎然而不能自己聊復寄心於動靜之際豈曰必然試論之曰道行云諸法本無所從來去亦無所至中觀云觀方知彼去去者不至方斯皆即動而求靜以知物不遷明矣夫人之所謂動者以昔物不至今故曰動而非靜我之所謂靜者亦以昔物不至今故曰動而非靜動而非靜以其不來靜而非動以其不去然則所造未嘗異所見未嘗同逆之所謂塞順之所謂通苟得其道復何滯哉傷夫人情之惑也久矣目對真而莫覺既知往物而不來而謂今物而可往往物既不來今物何所往何則求向物於向於向未嘗無責向物於今於今未嘗有於今未嘗有以明物不來未於向未嘗無故無知物不去覆而求今今亦不往是謂昔物自在昔不從今以至昔今物自在今不從昔以至今故仲尼曰回也見新交臂非故如此則物不相往來明矣既無往返之微朕有何物而可動乎然則旋風偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周復何怪哉噫聖人有言曰人命逝速速於川流是以聲聞悟非常以成道緣覺覺緣離以即真苟萬動而非化豈尋化以階道覆尋聖言微隱難測若動而靜似去而留可以神會難以事求是以言去不必去間人之常想稱住不必住釋人之所謂往耳豈曰去而可遣往而可留邪故成具云菩薩處計常之中而演非常之教摩訶衍論云諸法不動無去來處斯皆導達群方兩言一會豈曰文殊而乖其致哉是以言常而不住稱去而不遷不遷故雖往而常靜不住故雖靜而常往雖靜而常往故往而不遷雖往而常靜故靜而弗留矣然則莊生之所以藏山仲尼之所以臨川斯感往者之難留豈曰排今而可往是以觀聖人心者不同人之所見得也何者人則謂少壯同體百齡一質徒知年往不覺形隨是以梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也鄰人皆愕然非其言也所謂有力者負之而趨昧者不覺其斯之謂歟是以如來因群情之所滯則方言以辨惑乘莫二之真心吐不一之殊教乖而不可異者其唯聖言乎故談真有不遷之稱導俗有流動之説雖復千途異唱會歸同致矣而徵文者聞不遷則謂昔物不至今聆流動者而謂今物可至昔既曰古今而欲遷之者何也是以言往不必往古今常存以其不動稱去不必去謂不從今至古以其不來不來故不馳騁於古今不動故各性住於一世然則群籍殊文百家異説苟得其會豈殊文之能惑哉是以人之所謂住我則言其去人之所謂去我則言其住然則去住雖殊其致一也故經云正言似反誰當信者斯言有由矣何者人則求古於今謂其不住吾則求今於古知其不去今若至古古應有今古若至今乞應有古今而無占以知不來古而無今以知不去若古不至今今亦不至古事各性住於一世有何物而可去來然則四象風馳璇璣電卷得意毫微雖速而不轉是以如來功流萬世而常存道通百劫而彌固成山假就於始簣修途託至於初步果以功業不可朽故也功業不可朽故雖在昔而不化不化故不遷不遷故則湛然明矣故經云三災彌綸而行業湛然信其言也何者果不俱因因因而果因因而果因不昔滅果不俱因因不來今不滅不來則不遷之致明矣復何於去留踟蹰於動靜之間者哉然則乾坤倒覆無謂不靜洪流滔天無謂其動苟能契神於即物斯不遠而可知矣不真空論夫至虛無生者蓋是般若玄鑒之妙趣有物之宗極者也自非聖明特達何能契神於有無之間哉是以至人通神心於無窮窮所不能滯極耳目於視聽聲色所不能制者豈不以其即萬物之自虛故物不能纍其明者也是以聖人乘真心而理順則無滯而不通審一氣以觀化故所遇而順無滯而不通故能混雜致淳所遇而順適故能觸而一如此則萬象雖殊而不能自異不能自異故知象非真象象非真象故則雖象而非象則物我同根是非一氣潛微幽隱殆非群情之所盡故頃爾談論至於虛宗每有不同夫以不同而適同有何物而可同哉故衆競作而性莫同焉何則心無者無心於萬物萬物未嘗無此得在於神靜失在於物虛即色者明色不自色故雖色而未色也夫言色者但當色即色豈待色色而後為色哉此直語色不自色未領色之非色也本無者情尚於無多觸言以賓無故非有有即無非無無即無尋夫立文本之本旨者直以非有非真有非無非真無耳何必非有無此有非無無彼無此直好無之談豈謂順通事實即物情哉夫以物物於物則所物而可物以物物非物故雖物而非物是以物不即名而就實名不即物而履真然則真諦獨靜於名教之外豈曰文言之能辨哉然不能杜默聊復厝言以擬之試論之曰摩訶衍論云諸法亦非有相亦非無相中論云諸法不有不無者第一真諦也尋夫不有不無者豈謂滌除萬物杜塞視聽寂寥虛豁然後謂真諦者乎誠以即物順通故物莫之逆即偽即真故性莫之易性莫之易故雖無而有物莫之逆故雖有而無雖有而無所謂非有雖無而有所謂非無如此則非無物也物非真物物非物故於何而可物故經云色之性空非色敗空以明夫聖人之於物也即萬物之自虛豈待宰割以求通哉是以寢疾有不真之談超日有即虛之稱然則三藏殊文統之者一也故放光云第一真諦無成無得世俗諦故便有成有得夫有得即是無得之偽號無得即是有得之真名真名故雖真而非有偽號故雖偽而非無是以言真未嘗有言偽未嘗無二言未始一二理未始殊故經云真諦俗諦謂有異邪答曰無異也此經直辨真諦以明非有俗諦以明非無豈以諦二而二於物哉然則萬物果有其所以以不有有其所以不無有其所以不有故雖有而非有有其所以不無故雖無而非無雖無而非無無者不絶虛雖有而非有有者非真有若有不即真無不夷迹然則有無稱異其致一也故童子歎曰説法不有亦不無以因緣故諸法生瓔珞經云轉法輪者亦非有轉亦非無轉是謂轉無所轉此乃衆經之微言也何者謂物無邪則邪見非惑謂物有邪則常見為得以物非無故邪見為惑以物非有故常見不得然則非有非無者信真諦之談也故道行云心亦不有亦不無中觀云物從因緣故不有緣起故不無尋理即其然矣所以然者夫有若真有有自常有豈待緣而後有哉譬彼真無無是常無豈待緣而後無也若有不能自有待緣而後有者故知有非真有有非真有雖有不可謂之有矣不無者夫無則湛然不動可謂之無萬物若無則不應起起則非無以明緣起故不無也故摩訶衍論云一切諸法一切因緣故應有一刀諸法一切因緣故不應有一切無法一切因緣故應有一有法一切因緣故不應有尋此有無之言豈直反論而已哉若應有即是有不應言無若應無即是無不應言有言有是謂假有以明非無借無以辨非有此事一稱二其文有似不同苟領其所同則無異而不同然則萬法果有其所以不有不可得而有有其所以不無不可得而無何則欲言其有有非真生欲言其無事象既形象形不即無非真非實有然則不真空義顯於茲矣故放光云諸法假號不真譬如幻化人非無幻化人幻化人非真人也夫以名求物物無當名之實以物求名名無得物之功物無當名之實非物也名無得物之功非名也是以名不當實實不當名名實無當萬物安在故中觀云物無彼此而人以此為此以彼為彼彼亦以彼為此以此為彼此彼莫定乎一名而惑者懷必然之志然則彼此初非有惑者初非無既悟彼此之非有有何物而可有哉故知萬物非真假號久矣是以成其立強名之文園林託指馬之況如此則深遠之言於何而不在是以聖人乘千化而不變履萬惑而常通者以其即萬物之自虛不假而虛物也故經云甚奇草尊不動真際為諸法立處非離真而立處立處即真也然則道遠乎哉觸事而真聖遠乎哉體之則神宗本義本無實相法性性空緣會一義耳何則一切諸法緣會而生緣會而生則未生無有緣離則滅如其真有有則無滅以此而推故知雖今現有有而性常自空性常自空故謂之性空性空故故曰法性法性如是故曰實實相自無非推之使無故名本無言不有不無者不如有見常見之有邪見斷見之無耳若以有為有則以無為無有既不有則無無也夫不存無以觀法者可謂識法實相矣是謂雖觀有而無所取相然則法相為無相之相聖人之心謂住無所住矣三乘等觀性空而得道也性空者諸法實相也見法實相故云正觀若其異者便為邪觀設二乘不見此理則顛倒也是以三乘觀法無異但心有大小為差耳漚和般若者大慧之稱也諸法實相為之般若能不形澄漚和功也適化衆生謂之漚和不染塵纍般若力也然則般若之門觀空漚和之門涉有涉有未始迷虛故常處有而不染不厭有而觀空故觀空而不證是謂一念之力權慧具矣一切之力權慧具矣可思歷然可解泥洹盡諦者直結靜而已則生死永滅故謂盡耳無復別有一盡處耳
