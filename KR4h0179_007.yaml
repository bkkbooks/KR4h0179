body:
  text: 惠帝以司馬越楊邈為太子侍從詔隴西王世子越駙馬都尉楊邈竝可奉朝請侍從左右與太子游處書鈔五十八引晉起居注改元永平詔朕夙遭不造淹恤在疚賴祖宗遺靈宰輔忠賢得以眇身託于群后之上昧於大道不明于訓戰戰兢兢夕惕若厲乃者哀迷之際三事股肱惟社稷之重率遵翼室之典猶欲長奉先皇之制是以有永熙之號然日月踰邁已涉新年開元易紀禮之舊章其改永熙二年為永平元年晉書惠帝紀祕書監詔祕書綜理經籍考核古今課試署吏領四百人直專其事然後精詳中書自有職務相連統攝省事付丞理必未盡書鈔五十七引晉起居注又引王隱晉書惠帝永平元年詔封董猛為武安侯詔中常侍董猛固讓封邑其封為武安侯猛前求餘戶封三兄今皆封為亭侯御覽二百一引晉起居注以張華為中書監詔華體良清粹才識經濟前任中書有思謀之勤機密之要宜得其才以華為中書監加侍中書鈔五十七引王隱晉書以汝南王亮為太宰詔大司馬汝南王亮體道沖粹通識政理宣翼之績顯於本朝二南之風流於方夏將憑遠猷以康王化其以亮為大宰録尚書事入朝不趨劍履上殿增掾屬十人給千兵百騎與太保衛瓘對掌朝政晉書汝南王亮傳以王渾録尚書事詔司徒王渾秉德忠正器量弘遠歷位內外文武勛庸著在方策宜參弼機衡以亮天工其令録尚書事御覽二百十七書鈔五十九引晉起居注為楚王瑋發哀詔周公決二叔之誅漢武斷昭平之獄所不得已者廷尉奏瑋已伏法情用悲痛吾當發哀晉書楚王瑋傳以張華為儀同詔中書監光祿大夫張華歷世腹心情所憑賴故疇其勳績使儀同三司而虛沖挹損難違高尚其以華為光祿大夫儀同三司本職如故又給親信滿百人御覽二百四十三引晉起居注又書鈔五十二引王隱晉書兩條報陸機表薦張畼詔畼既為是人所稱便差代御覽二百五十三王戎開府詔尚書僕射光祿大夫王戎清虛履道謀猷沖遠揚歷任宣力四方入掌機衡官才允敘將澄清風俗顯一群望宜崇其職乃可贊成王化其以光祿大夫開府儀同三司北堂書鈔五十二引王隱晉書以王戎領吏部詔夫興治成務要在官人銓管之為任不可假授侍中中書令光祿大夫戎經德秉正鑒識明遠其以戎為領吏部北堂書鈔六十引晉起居注選東宮師友詔遹尚幼蒙今出東宮惟當賴師傅群賢之訓其游處左右宜得正人使共周旋能相長益者晉書愍懷太子傳太保衛瓘息庭司空隴西王泰息略太子太傅楊濟息毖太子太師裴楷息憲太子少傅張華息褘尚書令華廙息恆竝以道義之門有不肅之訓其令此六人更共往來與太子習數備賓友也報傅咸辭司隸校尉詔但當思必應繩中理威風自伸何獨劉毅晉書傅咸傳報傅咸劾王戎詔政道之本誠宜久於其職咸奏是也戎職在論道吾所崇委其解禁止晉書傅咸傳改中書著作隸祕書詔著作舊屬中書而祕書既典文籍今改中書著作為祕書著作晉書職官志又見通典二十六報司徒王渾等詔下殤小功可以嫁娶俊等簡忽喪紀輕違禮經皆宜如所正通典六十王渾奏虞濬夏侯俊等周喪嫁娶國子助教吳商祭酒裴頠議詔報謝玖進位淑妃詔才人謝玖進為淑妃御覽一百四十五引晉起居注皇后蠶服詔魏以來皇后蠶服皆以文繡非古義也今宜純服青以為永制晉輿服志給賜故平西將軍周處母詔處母年老加以遠人朕每愍念給其醫藥酒米賜以終年晉書周處傳贈馬敦詔今追贈牙門將軍印綬祠以少牢文選馬汧督誄注引王隱晉書詔問高禖壇石置此石來幾時出何經典今應復不御覽五百二十九元康六年高禖壇石破為二段詔問案隋書禮儀志二通典五十五載此事竝云六年今從惠帝紀列于八年以太子書及青紙示公卿詔遹書如此今賜死晉書愍懷太子傳立臨淮王臧為皇太孫詔咎徵數發姦回作變遹既逼廢非命而沒今立臧為皇太孫還妃王氏以母之稱太孫太妃太子官屬即轉為太孫官屬趙王倫行太孫太傅晉書愍懷太子傳自金墉反正詔朕以不德纂承皇統遠不能光濟大業綏靜四方近不能開門刑威式遏奸宄至使逆臣孫秀敢肆凶虐窺間王室遂奉趙王倫叨據天位鎮東大將軍齊王冏征北大將軍成都王穎征西大將軍河間王顒竝以明德茂親忠規允著首建大策匡救國難尚書漼共立大謀左衛將軍王輿與群公卿士協同謀略親勒本營斬秀及其二子前趙王倫為秀所誤與其子等已詣金墉迎朕幽宮旋軫閶闔豈在豫一人獨饗其慶宗廟社稷實有賴焉晉書惠帝紀石苞孫紹封詔故樂陵公石苞國祚莫繼其特以苞孫行為樂陵公書鈔四十八引晉起居注元康元年詔案元康蓋誤今從石崇傳編于復祚後以王戎為尚書令詔夫總百揆之得失管王政之開塞者端右之職也是以自漢代以來每選此官必慎其人司徒王戎可為尚書令通典二十二又見御覽二百十引晉書公孫淑妃進貴人詔峻陽園淑妃公孫明識貞粹今進位為貴人御覽一百四十五引晉起居注徙東萊王蕤詔大司馬以經識明斷高謀遠略猥率同盟安復社稷自書契所載周召之美未足比勳故授公上宰東萊王蕤潛懷忌妬包藏禍心與王輿密謀圖欲譖害收輿之日蕤與青衣共載微服奔走經宿乃還姦凶赫然妖惑內外又前表冏所言深重雖管蔡失道牙慶亂宗不復過也春秋之典大義滅親其徙蕤上庸晉書齊王攸附傳以楊超為騎都尉詔舅氏失道宗族隕墜渭陽之思孔懷感傷其以蓩亭侯楊超為奉朝請騎都尉以慰蓼莪之思焉晉書楊駿傳以琅邪王睿為通直詔散騎常侍琅邪王睿識清日新匪懈宜在機近其令睿通直也書鈔五十八引晉起居注報劉弘詔將軍文武兼資前委方夏宛城不守咎由趙讓將軍所遣諸軍剋滅群寇張奕貪禍距遺詔命將軍致討傳首闕庭雖有不請之嫌古人有專之之義其恢宏奧略鎮綏南海以副推轂之望焉晉書劉弘傳復故司空張華封爵詔夫愛惡相攻佞邪醜正自古而有故司空壯武公華竭其忠貞思翼朝政謀謨之勳每事賴之前以華弼濟之功宜同封建而華固讓至於八九深陳大制不可得爾終有顛敗危辱之慮辭義懇誠足勸遠近華之至心誓於神明華以伐吳之勳受爵於先帝後封既非國體又不宜以小功踰前大賞華之見害俱以奸逆圖亂濫被枉賊其復華侍中中書監司空公廣武侯及所沒財物與印綬符策遣使弔祭之晉書張華傳立成都王穎為皇太弟詔朕以不德纂承鴻緒于茲十有五載祻亂滔天奸逆仍起至乃幽廢重宮宗廟圮絶成都王穎溫仁惠和剋平暴亂其以穎為皇太弟都督中外諸軍事丞相如故晉書惠帝紀青筒詔敕中書體中不佳不堪出也引晉八王故事張方之亂逼上出謁宗廟上以青筒詔敕中書以豫章王熾為皇太弟詔天禍晉邦冢嗣莫繼成都王穎自在儲二政績虧損四海失望不可承重其以王還第豫章王熾先帝受子令聞日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參録朝政光祿大夫王衍為尚書左僕射安南軍虓安北將軍濬平北將軍騰各守本鎮高密王簡為鎮南將軍領司隸校尉權鎮洛陽東中郎將模為寧北將軍都督冀州鎮于鄴鎮南大將軍劉弘領荊州以鎮南土周馥繆胤各還本部百官皆復職齊王冏前應還第長沙王乂輕陷重刑封其子紹為樂平縣王以奉其嗣自頃戎車屢征勞負人力供御之物皆減三分之二戶調田租三分減一蠲除苛政愛人務本清通之後當還東京晉書惠帝紀封王基孫詔司空王基爵祚再絶其以故安陽令振次男恢紹封書鈔四十八引晉起居注封何攀為西城公策於戲在昔先王光濟厥世罔不開國列土建德表功也故逆臣楊駿謀危社稷搆兵飛矢集于殿廷白刃交於宮闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城為攀封國錫茲玄社苴以白茅永為晉藩輔往欽哉敬乃有土惠康黎元無或以隳爾顯烈華陽國志十一追贈馬敦策皇帝咨故督守關中侯馬敦忠勇果毅率厲有方固守孤城危逼獲濟寵秩未加不幸喪亡朕用悼焉今追贈牙門將軍印綬祠以少牢文選潘嶽馬滑督誄案元康四年有冊隴西王泰為太尉文乃摯虞作編入摯虞集追復太子冊皇帝使使持節兼司空衛尉伊策故皇太子之靈曰嗚呼維爾少資岐嶷之質荷先帝殊異之寵大啓土宇奄有淮陵朕奉遵遺旨越建爾儲副以光顯我祖宗祇爾德行以從保傅事親孝敬禮無違者而朕昧於凶搆致爾于非命之禍俾申生孝已復見于今賴宰相賢明人神憤怨用啓朕心詩厥有罪咸伏其辜何補於荼毒冤魂酷痛哉是用切怛悼恨震動於五內今追復皇太子喪禮反葬京畿祠以太牢魂而有靈尚獲爾心晉書懷愍太子傳追復齊王冏本封冊咨故大司馬齊王冏王昔以宗藩穆胤紹世緒於東國作翰許京允鎮靜我王室誕率義徒同盟觸澤克成元勳大濟潁東朕用應嘉茂績謂篤爾勞俾式先典以疇茲顯懿廓土殊分跨兼吳楚崇禮備物寵侔蕭霍庶憑翼戴之重永隆邦家之望而恭德不建取侮二方有司過舉致王于戮古人有言曰用其法猶思其人況王功濟朕身勳存社稷追維既往有悼於厥心哉今復王本封命嗣子還紹厥緒禮秩典度一如舊制使使持節大鴻臚即墓賜策祠以太牢魂而有靈祇服朕命肆寧爾心嘉茲寵榮晉書齊王冏傳愍懷太子哀策皇帝臨軒使洗馬劉務告於皇太子之殯曰咨爾遹幼稟英挺芬馨誕茂既荿髫齡高明逸秀昔爾聖祖嘉爾淑美顯詔仍崇名振同軌是用建爾儲副永統皇基如何凶戾潛構禍害如茲哀感和氣痛貫四時嗚呼哀哉爾之降廢實我不明牝亂沈災釁結禍成爾之逝矣誰百其形昔之申生含枉莫訟今爾之負抱冤於東悠悠有識孰不哀慟壼關干主千秋悟已異世同規古今一理皇孫啓建降祚爾子雖悴前終庶榮後始窀穸既營將寧爾神華髦電逝戎車雷震芒芒羽蓋翼翼縉紳同悲等痛孰不酸辛庶光來葉永世不泯晉書愍懷太子傳許劉實致仕詔昔虞任五帝致垂拱之化漢相蕭何興寧一之譽故能光隆於當時垂裕於百代朕紹天明命臨御萬邦所以崇顯政道者亦賴之於元臣庶尹畢力股胘以副至望而君年耆告老確然難違今聽君以侯就第位居三司之上秩祿準舊賜几杖不朝及宅一區國之大政將就詢於君副朕意焉晉書劉實傳與苟晞詔朕以不德戎車屢興上懼宗廟之纍下愍兆庶之困當賴方嶽為國藩翰公威振赫然梟斬藩桑走降喬朗魏植之徒復以誄除豈非高識明斷朕用委成加王彌石勒為社稷之憂故有詔委統六州而公謙分小節稽違大命非所謂與國同憂也今復遣詔便施檄六州協同大舉翦除國難稱朕意焉苟晞傳又見十六國春秋十一復詔苟晞討東海王越太傅信用姦佞阻兵專權內不遵奉皇憲外不協比方州遂令戎狄充斥所在犯暴留軍何倫抄掠宮寺劫剝公主殺害賢士悖亂天下不可忍聞雖惟親親宜明九伐詔至之日其宣告天下率齊大舉桓文之績一以委公其思盡諸宜善建弘略道澀故練寫副手筆示意晉書苟晞傳與琅邪王睿南陽王保詔夫陽九百六之災雖在盛世猶或遘之朕以幼沖纂承洪緒庶憑祖宗之靈群公義士之力蕩滅凶寇拯拔幽宮瞻望未達肝心分裂昔周召分陝姬氏以隆平王東遷晉鄭為輔今左右丞相茂德齊聖國之昵屬當恃二公掃除鯨鯢奉迎梓宮克復中興今幽并兩州勒卒三十萬直造平陽右丞相宜帥秦涼梁雍武旅三十萬徑詣長安左丞相帥所領精兵二十萬徑造洛陽分遣前鋒為幽并後駐赴同大限克成元勳晉書愍帝紀又詔琅邪王朕以沖昧纂承洪緒未能梟夷凶逆奉迎梓宮枕戈煩冤肝心抽裂前得魏浚表知公帥先三軍以據壽春傳檄諸侯協濟威勢想今漸進已達洛陽涼州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其會如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今為已至何許當須來旨便乘輿自出會除中原也公宜思弘謀猷勗濟遠略使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德昵屬宣隆冬夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也晉書愍帝紀下張軌詔朕以寡昧纂承大統未能梟除凶逆奉迎梓宮枕戈含冤肝心碎裂惟爾涼州刺史張軌乃心王室旌旗連絡萬里星赴進次汧隴便當協力濟難恢復神州故遣中常侍蘇馬拜爾為鎮西大將軍開府儀同三司加侍中封西平郡公十六國春秋七十授索綝衛將軍領太尉特進詔朕昔遇厄運遭家不造播越宛楚爰失舊京幸宗廟寵靈百辟宣力得從藩衛託乎群公之上社稷之不隕實公是賴宜贊百揆傅弼朕躬其授衛將軍領太尉位特進軍國之事悉以委之晉書引索靖附傳使琅邪王攝位詔遭運迍否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦奔潰卿指詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大恥晉書元帝紀手詔張實天步危運禍降晉室京師傾陷先帝晏駕賊庭朕流漂宛許爰暨舊京群臣以宗廟無主歸之於朕遂以沖眇之身託於王公之上自踐寶位四載于茲不能翦除巨寇以救危難元元兆庶乃遭塗炭皆朕不明所致羯賊劉載僭稱大號加禍先帝肆殺藩王深惟仇恥枕戈待旦劉曜自去年九月率其蟻衆乘虛深寇劫質羌胡攻沒北地麴允總戎在外六軍敗績侵逼京城矢流宮闕胡松等雖赴國難殿而無效圍塹千里外救不至糧盡人窮遂為降虜仰慚乾靈俯痛宗廟君世篤忠貞勳隆西夏四海具瞻朕所憑賴今進君大都督涼州牧侍中司空承制行事琅邪王宗室親賢遠在江表今朝廷播越社稷倒懸朕已詔王時攝大位君其協贊琅邪共濟艱運若不忘主宗廟有賴明便出降故夜見公卿屬以後事密遣黃門郎史淑侍御史王沖齎詔假授臨出寄命公其勉之晉書張實傳又見十六國春秋七十一詔群邪作逆傾洫五都文選辨命論注引干寶晉紀授張實策書維乃父武公著勳西夏頃胡賊狡猾侵逼近畿義兵鋭卒萬里相尋方貢遠珍府無虛歲方委專征蕩清九域昊天不弔凋余藩后朕用悼厥心惟爾俊劭英毅宜世表西海今授持節都督涼州諸軍事西中郎將涼州刺史領護羌校尉西平公往欽哉其闡弘先緒俾屏王室晉書張實傳又見十六國春秋七十一寒食散論寒食散之方雖出漢代而用之者寡靡有傳焉魏尚書何晏首獲神效由是大行於世服者相尋也世說言語篇注引秦丞相寒食散論案愍帝嗣封秦王為丞相姑附此俟考
