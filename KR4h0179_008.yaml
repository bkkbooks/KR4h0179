body:
  text: 元帝議小功不稅服制小功緦麻或垂竟聞問宜全服否得服其殘月以為永制通典九十八晉元帝制加王導領中書監錄尚書事詔昔荀公曾從中書監為尚書令人賀之乃發恚云奪我鳳皇池卿諸人賀我邪願足下處之勿疑蓺文類聚四十八引檀道鸞晉陽秋又見御覽二百二十命議溫嶠不拜散騎侍郎詔溫嶠不拜以未得改卜葬送朝議又頗有異同為審由此邪天下有闕塞行禮制物者當使禮可通經古人之制三年非情之所盡蓋存亡有斷不以死傷生耳要絰而服金革之役者豈營官邪隨王事之緩急也今桀逆未梟平陽道斷奉迎諸軍猶未得俓進嶠特一身於何濟其私艱而以理閡自疑不服王命邪其令三司八座門下三省外內群臣詳共通議如嶠比吾將親裁其中晉書禮志中又見通典一百二報有司奏治高車詔今日但治故乃近三十萬邪勿使過節整頓也北堂書鈔未刪改本一百三十九引晉起居注建武元年有司奏車府令戒嚴上作高車用雜總求處給請出上庫錢六十七萬六千六百詔云云詔議中郎李幹事前敦循所奏唯聞喪不得奔者作制如李幹比竟未決之宜急議定通典九十八復議李幹事詔組所陳不知父母存亡者令行服比於有情其尚有疑然要當詳議此理令可通經不得以難安隱而直爾置之皆一代事理道所宜先明通典九十八課督農功詔二千石長吏以入穀多少為殿最其非宿衛要任皆宜赴農使軍各自佃作即以為廩晉食貨志改元大赦詔制詔昔我高祖宣皇帝誕膺期運廓開皇基景皇帝文皇帝奕葉重光緝熙諸夏爰暨武皇帝應天順時受茲明命功格天地仁濟宇宙昇平刑措卅餘載矣昊天不融降此鞠凶懷帝短折越去王都天禍薦臻大行皇帝崩徂社稷無奉六合無主肆群后三司六事之人弘鑒古訓刑于興廢疇咨庶尹至于華戎致輯大命於朕躬余一人畏天之威用弗敢違遂登壇南岳受終文祖焚柴頒瑞告類上帝惟朕寡德績戎洪緒君臨四海惴惴憂懼若涉川冰罔知攸濟惟爾股肱爪牙之佐文武熊羆不貳心之臣用能宣力四方左右我先帝弼寍晉至輔余一人思與萬國共同休慶其大赦天下改建武二年為大興元年文館詞林六百六十八又見晉書元帝紀詔官吏昔之為政者動人以行不以言應天以實不以文故我清靜而人自正其次聽言觀行明試以功其有政績可述刑獄得中人無怨訟久而日新及當官軟弱茹柔吐剛行身穢濁脩飾時譽者各以名聞令在事之人仰鑒前烈同心戮力深思可以寬眾息役惠益百姓無廢朕命遠近禮贄一切斷之晉書元帝紀詔報孔愉所陳有正義輒敕外改之宋書禮志一中書侍郎孔愉奏若日有變便伐鼓於諸門有違舊典詔云云又見通典七十八禁招魂葬詔夫冢以藏形廟以安神今世招魂葬是埋神也其禁之御覽五百五十五又八百八十六引晉中興書東海王越妃裴痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮乃下詔詔二千石王室多故姦凶肆暴皇綱弛墜顛覆大猷朕以不德統承洪緒夙夜憂危思改其弊二千石令長當祇奉舊憲正身明法抑齊豪強存恤孤獨隱實戶口勸課農桑州牧刺史當互相檢察不得顧私虧公長吏有志在奉公而不見進用者有貪惏穢濁而以財勢自安者若有不舉當受故縱蔽善之罪有而不知當受闇塞之責各明慎奉行晉書元帝紀趍徐揚二州種麥詔徐揚二州土宜三麥可督令熯地投秋下種至夏而熟繼新故之交於以周濟所益甚大昔漢遣輕車使者氾勝之督三輔種麥而關中遂穰勿令後晚晉食貨志平糶詔亢旱穀貴百姓嗷嗷有資者貴糴貧嬴之民益困漢世穀貴官賤糶使價不超越謂之平準今雖無此可出關米萬斛使三分減一以平其價令貧困者悉得足以全秋也御覽三十五引晉中興書災異見詔百官陳得失朕以寡德纂承洪緒上不能調和陰陽下不能濟育群生災異屢興咎徵仍見壬子乙卯雷震暴雨蓋天災譴戒所以彰朕之不德也群公卿士其各上封事具陳得失無有所諱將親覽焉晉書元帝紀詔訪吳地先賢未旌錄者漢高經大梁美無忌之賢齊師入魯脩柳下惠之墓其吳之高德名賢或未旌錄者具條列以聞晉書元帝紀又見咸淳臨安志四十下刁協詔尚書令協抗志高亮才鑒博朗朕甚喜之初學記十一御覽二百十引晉中興書諸葛恢增秩詔自頃多難官長數易益有諸弊雖聖人猶久於其道然後化成況其餘乎漢宣帝稱與我共安天下者其惟良二千石斯言信矣是以黃霸等或十年或二十年而不徙所以能濟其中興之勳也賞罰黜陟所以明政道也會稽內史諸葛恢蒞官三年政清人和為諸郡首宜進其位班以勸風教今增恢秩中二千石晉書諸葛恢傳詔答諸葛恢今送一犀導小物耳然是情發於中而寄乎物御覽六百八十八引諸葛恢集今致琉璃盌一枚御覽七百六十引諸葛恢集今致琉璃枕一御覽八百八引諸葛恢集報荀崧請增博士詔崧表如此皆經國之務為政所由息馬投戈猶可講藝今雖日不暇給豈忘本而遺存邪可共博議者詳之晉書荀崧傳省務恤民詔天下凋弊加以災荒百姓困窮國用竝匱吳郡飢人死者百數天生蒸黎而樹之以君選建明哲以左右之當深思以救其弊昔吳起為楚悼王明法審令損不急之官除廢公族疏遠以附益將士而國富兵強況今日之弊百姓凋困邪且當去非急之務非軍事所須者皆省之晉書元帝紀又見咸淳臨安志四十加荀組綠尚書詔司徒荀組宜讚朝政今錄尚書給班劍六十人書鈔五十九引晉起居注議定改葬服詔制詔司徒表禮雖無墳墓毀廢正文然依附名例不為無准吾謂改葬緦通制也已修復不臨尸柩素服可也而士大夫率意輕重不同其下太常議定通典一百二許新蔡王滔還襲章武詔滔雖出養自有所生母新蔡太妃相待甚薄滔執意如此如其不聽終當紛紜更為不可今便順其所執還襲章武晉書宗室河間王洪傳詔更議宗廟祭儀吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情禮不安可依禮更處晉禮志上宋禮志三報鍾雅詔禮事宗廟自曾孫已下皆稱曾孫此非因循之失也義取於重孫可歷世共其名無所改也稱伯祖不安如所奏晉書鍾雅傳立懷德縣詔先公武王先考恭王臨君琅邪四十餘年惠澤加於百姓遺愛結於人情朕應天符創基江表兆庶宅心繈負子來琅邪國人在此者近有千戶今立為懷德縣統丹陽郡昔漢高祖以沛為湯沐邑光武亦復南頓優復之科一依漢氏故事晉書元帝紀以邵續子緝為北平將軍詔邵續忠烈在公義誠慷慨綏集荒餘憂國亡身功勳未遂不幸陷沒朕用悼恨于懷所統任重宜時有代其部曲文武已共推其息緝為營主續之忠誠著于公私今立其子足以安眾一以續本位即授緝使總率所統效節國難雪其家仇晉書邵續傳通議諡法詔古者皆諡名實相稱頃來有爵乃諡非聖賢本意通議之通典一百四太子釋奠詔未有高車可乘安車宋書禮志五釋奠太學詔吾識太子此事祠訖便請王公以下者昔在洛時嘗豫清坐也宋書禮志一以譙王氶為湘州刺史詔夫王者體天理物非群才不足濟其務外建賢哲以樹風聲內睦親親以廣藩屏是以太公封齊伯禽居魯此先王之令典古今之通義也我晉開基列國相望乃授琅邪武王鎮統東夏汝南文武總一淮許扶風梁王迭據關口爰暨東瀛作司并州今公族雖寡不逮曩時豈得替舊章乎散騎常侍右將軍譙王氶貞素款亮志存忠恪便藩左右恭肅彌著今以承監湘州諸軍事南中郎將湘州刺史晉書宗室譙王氶傳湘州南楚岨固以叔父居之書鈔七十二引晉中興書中州良人詔昔漢二祖及魏武皆免良人武帝時涼州覆敗諸為奴婢亦皆復籍此累化成規也其免中州良人遭難為揚州諸郡僮客者以備征役晉書元帝紀報賽不應告廟詔祈廟云報賽非奉尊上辭也吾意有疑以為舊山川有許報故雨賽非大事不應告廟臣子無要君之道黯稱賽于禮有違御覽五百二十九引晉中興書報刁協詔知難而退誠合兵家之言然小賊雖狡猾故成擒耳未戰而退先自摧衂亦古之所忌且邵存已據戰壘威勢既振不可退一步也晉書蔡豹傳治兵詔左右衛及諸營教習依大習儀作雁羽仗宋書禮志一以盧諶為員外散騎侍郎詔今以前司空從事中郎盧諶為散騎侍郎在員外御覽二百二十四引晉起居注下晉陵內史張闓詔夫二千石之任當勉勵其德綏齊所莅使寬而不縱嚴而不苛其於勤功督察便國利人抑彊扶弱使無雜濫真太守之任也若聲過其實古人所不取攻乎異端為政之甚害蓋所貴者本也晉書張闓傳以張闓為大司農詔丹陽侯闓昔以勞役部人免官雖從吏議猶未掩其忠節之志也倉廩國之大本宜得其才今以闓為大司農晉書張闓傳報周顗詔紹幼沖便居儲副之貴當賴軌匠以袪蒙蔽望之儼然斯不言之益何學之習邪所謂與田蘇遊忘其鄙心者便當副往意不宜沖讓晉書周顗傳誡周顗詔顗參副朝右職掌銓衡當敬慎德音式是百辟屢以酒過為有司所繩吾亮其極懽之情然亦是濡首之誡也顗必能克已復禮者今不加黜責晉書周顗傳贈諡故太尉劉琨詔故太尉廣武侯劉琨忠亮開濟乃誠王家不幸遭難志節不遂朕甚悼之往以戎事未加弔祭其下幽州便依舊弔祭贈侍中太尉諡曰愍晉書劉琨傳轉太常華恆為廷尉詔太常職主宗廟烝嘗敬重而華恆所疾不堪親奉職事夫子稱吾不與祭如不祭況宗伯之任職所司邪今轉恆為廷尉晉書華表附傳討王敦詔王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍也今親率六軍以誅大逆有殺敦者封五千戶侯召戴若思劉隗竝會京師晉書王敦傳又見魏書晉司馬睿傳以周顗王邃為左右僕射詔尚書分置左右僕射所以廣登賢俊經始萬機護軍周顗可左僕射領軍王邃可右僕射御覽二百二十一引晉起居注封少子昱為琅邪王詔先公武王先考恭王君臨琅邪繼世相承國嗣未立蒸嘗靡主朕常悼心子昱仁明有智度可以虔奉宗廟以慰罔極之恩其封昱為琅邪王食會稽宣城如舊晉書簡文帝紀詔朕膺天符創基江左文帝頭陁封碑注引晉中興書元帝詔弔贈楊邠策惟永嘉七年四月已未使持節都督江陽諸軍事鎮東大將軍琅邪王睿謹遣板命前衡陽內史楊君忠肅貞固守正不移口雖危逼節義可嘉不幸隕卒孤城甚悼之今列上尚書贈君淮南內史魂而有靈嘉茲寵榮嗚呼哀哉華陽國志十一追贈敬虞皇后冊皇帝咨前琅邪王妃虞氏朕祇順昊天成命用陟帝位悼妃夙徂徽音潛翳御於家邦靡所儀刑陰教有虧用傷于懷追號制諡先王之典今遣使持節兼太尉萬勝奉冊贈皇后璽綬祀以太牢魂而有靈嘉茲寵榮晉書元敬虞后傳蠲除法禁令禮樂不興則刑罰不中是以明罰敕法先王所慎自元康已來事故薦臻法禁滋漫大理所上宜朝堂會議蠲除詔書不可用者此孤所虛心者也晉書刑法志又見群書治要二十九引晉書又通典一百六十四以周玘為軍諮祭酒令以周玘為軍諮祭酒令玘奕世忠烈義誠顯著孤所欽嘉今以為軍諮祭酒將軍如故進爵為公祿秩僚屬一同開國之例晉書周處附傳下令許賀循辭中書令孤以寡德忝當大位若涉巨川罔知所憑循言行以禮乃時之望俗之表也實賴其謀猷以康萬機疾患有素猶望臥相規輔而固守撝謙自陳懇至此賢履信思順苟以讓為高者也今從其所執晉書賀循傳賜賀循床薦等物令循冰清玉潔行為俗表位處上卿而居身服物蓋周形而已屋室財庇風雨孤近造其廬以為慨然其賜六尺床薦席褥并錢二十萬以表至德畼孤意焉晉書賀循傳又見初學記十二御覽二百二十六引晉中興書又見御覽四百二十五引徐廣晉記改元大赦令令昔我高祖宣皇帝至德應期受天明命玄石著瑞肇基帝道景皇纂戎文皇扇烈重離宣曜庸蜀稽服武皇受終登陟帝位光宅天下九州順軌惠懷多難帝主不造夷狄豺狼肆其暴亂京都傾覆宗廟為墟孤悼心失圖靡知所措繕甲脩兵補結天網將以雪皇家之恥蕩鯨鯢之害然後謝責象魏歸身藩臣生死之志畢矣今百辟卿士億兆之人上陳靈符下稱人情同見翼戴若影響焉孤誓心不回至於三至於四有司固請所守有辭志不可奪孤逼於群吏之議用上奉蒸嘗虔祀祖考明告靈神以祇休命今立宗廟備百僚所以奉先帝傳晉祚總九牧保生靈也惟爾股肱爪牙之佐文武不貳心之臣其各立功立事以扶我帝室其與天下蕩滌瑕釁改往自新同率子來致天之罰其大赦天下孤老不能自存者賜帛二匹其殺祖父母及劉載石勒不從此令有能斬獲載首者封郡公食邑五千戶金二百斤絹萬匹斬勒首者封郡侯食邑三千戶金百斤絹五千匹其為載勒所詿誤者赦書到日解甲散兵各還所屬一無所問有能率眾從順隨本官及所領多少論其爵位被書後百日若故屯結遂附賊黨誅及三族改建興五年為建武元年文館詞林卷六百九十五答劉琨等令今方岳牧伯之佐股肱腹心之臣萬邦之內九服之外咸見翼戴以隆天威是用辭不獲已而居王位群覽所陳弘旨懮遠孤方當匡復帝祚豈可猥居極位昔有夏克復賴靡艾之勳周宣中興由申邵之佐二公鎮御幽朔忠以衛上建功極難實憑遠略夷難雪恥於是乎在蓺文類聚十三報劉琨勸進令豺狼肆毒薦覆社稷億兆顒顒延首罔繫是以居於王位以答天下庶以剋復聖主埽蕩讎恥豈可猥當隆極此孤之至誠著於遐邇者也公受奕世之寵極人臣之位忠允義誠精感天地實賴遠謀共濟艱難南北迥邈同契一致萬里之外心存咫尺公其撫寍華戎致罰醜類動靜以聞晉書劉琨傳以劉遐為下邳內史令遐忠勇果毅義誠可嘉以遐為下邳內史將軍如故晉書劉遐傳聽丹楊尹王導不用鼓蓋令導德重勳高孤所深倚誠宜表彰殊禮而更約已沖心進思盡誠以身率眾宜順其雅志式允開塞之機晉書王導傳禁居喪婚嫁令詩稱殺禮多婚以會男女之無夫家正今日之謂也可一解禁止自今以後宜為其防晉書劉隗傳世子文學王籍之居叔母喪而婚劉隗奏之帝下令賜杜夷穀令國子祭酒杜夷安貧樂道靜志衡門日不暇給雖原憲無以加也其賜穀二旦斛晉書杜夷傳報尚書令刁協令臨淄萬戶封又植少有美才能同遊田蘇者今晚生矇弱何論於此間封此兒不以寵稚子也亡弟當應繼嗣不獲已耳家丞庶子足以攝祠祭而已豈宜屈賢才以受無用乎晉書琅邪王煥傳荅群臣上尊號令孤以不德當厄運之極臣節未立匡救未舉夙夜所以忘寢食也今宗廟廢絕億兆無係群官庶尹咸勉之以大政亦何敢辭輒敬從所報晉書元帝紀遺賀循書夫百行不同故出處道殊因性而用各任其真耳當宇宙清泰彝倫攸敘隨運所遇動默在已或有遐棲高蹈輕舉絕俗逍遙養和恬神自足斯蓋道隆人逸勢使其然若乃時運屯弊主危國急義士救時驅馳拯世燭之武乘縋以入秦園綺彈冠而臣漢豈非大雅君子卷舒合道乎虛薄寡德忝備近親謬荷寵位受任方鎮飱服玄風景羨高矩常願棄結駟之軒軌策紫篳而造門徒有其懷而無從賢之實者何良以寇逆殷擾諸夏分崩皇居失御黎元荼毒是以日夜憂懼慷慨發志在竭節耳前者顧公臨朝深賴高算元凱既登巢許獲逸至於今日所謂道之云亡邦國殄悴群望顒顒實在君侯苟義久所在豈得讓勞居逸想達者亦一以貫之也庶稟徽猷以弘遠規今上尚書屈德為軍司謹遣參軍沈禎銜命奉授望必屈臨以副傾遲晉書賀循傳與杜夷書吾與足下雖情在忘言然虛心歷載正以足下羸疾故欲相省寍論常儀也晉書杜夷傳書安軍未報平和云如何深可為事也淳化閣帖一八月九日睿頓首忽中秋但有遠懷便微冷恆何如比殊不能佳惟勿得慰抱念及不多司馬睿頓首淳化閣帖一討石勒檄逆賊石勒肆虐河朔逋誅歷載游魂縱逸復遣凶黨石處季龍犬羊之眾越河南渡縱其鴆毒平西將軍祖逖帥眾討擊應時潰散今遣車騎將軍琅邪王裒等九軍銳眾三萬水陸四道徑造賊場受逖節度有能梟處季龍首者賞絹三千匹金五十斤封縣侯食邑二千戶又賊黨能梟送季龍首封賞亦同之晉書元帝紀又見十六國春秋十二
