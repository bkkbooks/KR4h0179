body:
  text: 郭璞二奏事臣以為珍奇靡麗之物誠是玩弄之所寶然非經國之至寶御覽八百二十奏請平刑臣聞上古象刑而民不犯中古明刑以致刑措故立刑以禁刑立殺以去殺重之以死所以求其生峻之以刑所以輕其死死由于法輕生存乎法重此亡防之成標也然則刑無輕重用之唯平非平法之為難思在斷之為難是以子皇行戮刖者忘痛釋之典刑民無怨色何者積之于誠也案癸酉詔書之旨專為邊城實之裔土濟當時一切之用非為經遠之法亦是中夏全平之時威御足指控制故可得行之矣欲役無賴子弟驅不逞之人聚之于空荒四維之地將以扞固牧圉未見其利也且濱接鯨猾密邇姦藪退未絶其丘窟之顧進無以塞其逋逃之門五流三居誠古之犯刑論之于今事實難行且律令以跨三代歷載所遵未易輕改者也是以刑法不專則名幸者興政令驟變則人志無繫子産患其如此故矯先正議事之制而立刑書之辟皆所以弼民心而正群惑者也藝文類聚五十四客傲客傲郭生曰玉以兼城為寶士以知名為賢明月不妄映蘭葩豈虛鮮今足下既以拔文秀于叢薈蔭弱根于慶雲陵扶搖而竦翮揮清瀾以濯鱗而響不徹于一皋價不登乎千金傲岸榮悴之際頡頏龍魚之間進不為諧隱退不為放言無沈冥之韻而希風乎嚴先徒費思于鑽味摹洞林乎連山尚何名乎夫攀驪龍之髯撫翠禽之毛而不得絶霞肆跨天津者未之前聞也郭生粲然而笑曰鷦鷯不可與論雲翼井蛙難與量海鰲雖然將袪子之惑訊以未悟其可乎乃者地維中絶乾光墜采皇運暫回廓祚淮海龍德時乘群才雲駭藹若鄧林之會逸翰爛若溟海之納奔濤不煩咨嗟之訪不假蒲帛之招羈九有之奇駿咸總之于一朝豈惟豐沛之英南陽之豪昆吾挺鋒驌驦軒髦杞梓競敷蘭荑爭翹嚶聲冠于伐木援類繁乎拔茅是以水無浪士巖無幽人刈蘭不暇爨桂不給安事錯薪乎且夫窟泉之潛不思雲翬熙冰之采不羡旭晞混光耀于埃藹者亦曷願滄浪之深秋陽之映乎登降紛于九五淪湧懸乎龍津蚓蛾以不才陸稿蟒蛇以騰鶩暴鱗連城之寶藏于褐裏三秀雖豔縻于麗采香惡乎芬賈惡乎在是以不塵不冥不驪不騂支離其神蕭悴其形形廢則神王迹粗而名生體全者為犧至獨者不孤傲俗者不得以自得默覺者不足以涉無故不恢心而形遺不外纍而智喪無巖穴而冥寂無江湖而放浪玄悟不以應機洞鑒不以昭曠不物物我我不是是非非忘意非我意意得非我懷寄群籟乎無象域萬殊于一歸不壽殤子不夭彭涓不壯秋豪不小太山蚊淚與天地齊流蜉蝣與大椿齒年然一闔一開兩儀之迹一沖一溢懸象之節渙沍期于寒暑凋蔚要乎春秋青陽之翠秀龍豹之委穎駿狼之長暉玄陸之短景故皋壤為悲欣之府胡蝶為物化之器矣夫欣黎黃之音者不顰蟪蛄之吟豁雲臺之觀者必閟帶索之歡縱蹈而詠採薺擁壁而歎抱關戰機心以外物不能得意于一弦悟往復于嗟歎安可與言樂天者乎若乃莊周偃蹇于漆園老萊婆娑于林窟嚴平澄漠于塵肆梅真隱淪乎市卒梁生吟嘯而矯迹焦先混沌而稿杌阮公昏酣而賣傲翟叟遁形以倏忽吾不能幾韻于數賢故寂然玩此員策與智骨晉書郭璞傳爾雅敘夫爾雅者所以通詁訓之指歸敘詩人之興詠總絶代之離詞辨同實而殊號者也誠九流之津涉六藝之鈐鍵學覽者之潭奧摛翰者之華苑也若乃可以博物不惑多識于鳥獸草木之名者莫近于爾雅爾雅者蓋興于中古隆于漢氏豹鼠既辨其業亦顯英儒贍聞之士洪筆麗藻之客靡不欽玩耽味為之義訓璞不揆檮昧少而習焉沈研鑽極二九載矣雖注者十餘然猶未詳備並多紛謬有所漏略是以復綴集異聞會稡舊説考方國之語采謠俗之志錯綜樊孫博關群言剟其瑕礫搴其蕭稂事有隱滯援據徵之其所易了闕而不論別為音圖用袪未寤輒復擁篲清道企望塵躅者以將來君子為亦有涉乎此也唐石經爾雅方言敘蓋聞方言之作出乎輶軒之使所以巡遊萬國采覽異言車軌之所交人迹之所蹈靡不畢載以為奏籍周秦之季其業隳廢莫有存者暨乎揚生沈淡其志歷載構綴乃就斯文是以三五之篇著而獨鑒之功顯故可不出戶庭而坐照四表不勞疇咨而物來能名考九服之逸言標六代之絶語類離詞之指韻明乖途而同致辨章風謠而區分曲通萬殊而不雜真洽見之奇書不刊之碩記也余少玩雅訓旁味方言復為之解觸事廣之演其未及摘其謬漏庶以燕石之瑜補琬琰之瑕俾後之瞻涉者可以廣寤多聞爾影宋本方言注山海經敘世之覽山海經者皆以其閎誕迂誇多奇怪俶儻之言莫不疑焉嘗試論之曰莊生有云人之所知莫若其所不知吾于山海經見之矣夫以宇宙之寥廓群生之紛紜陰陽之煦蒸萬殊之區分精氣渾淆自相濆薄遊魂靈怪觸象而構流形于山川麗狀于木石者惡可勝言乎然則總其所以乖鼓之于一響成其所以變混之于一象世之所謂異未知其所以異世之所謂不異未知其所以不異何者物不自異待我而後異異果在我非物異也故胡人見布而疑黂越人見罽而駭毳夫玩所習見而奇所希聞此人情之常蔽也今略舉可以明之者陽火出于冰水陰鼠生于炎山而俗之論者莫之或怪及談山海經所載而咸怪之是不怪所可怪而怪所不可怪也不怪所可怪則幾于無怪矣怪所不可怪則未始有可怪也夫能然所不可不可所不可然則理無不然矣案汲郡竹書及穆天子傳穆王西征見西王母執璧帛之好獻錦組之屬穆王享王母于瑤池之上賦詩往來辭義可觀遂襲昆崙之丘遊軒轅之宮眺鍾山之嶺玩帝者之寶勒石王母之山紀迹玄圃之上乃取其嘉木豔草奇鳥怪獸玉石珍瑰之器金膏燭銀之寶歸而殖養之于中國穆王駕八駿之乘右服盜驪左驂騄耳造父為御奔戎為右萬里長騖以周歷四荒名山大川靡不登濟東升大人之堂西燕王母之廬南轢黿鼉之梁北躡積羽之衢窮歡極娛然後旋歸案史記説穆王得盜驪騄耳驊騮之驥使造父御之以西巡狩見西王母樂而忘歸亦與竹書同左傳曰穆王欲肆其心使天下皆有車轍馬迹焉竹書所載則是其事也而譙周之徒足為通識瑰儒而雅不平此驗之史考以著其妄司馬遷敘大宛傳亦云自張騫使大夏之後窮河源惡覩所謂昆崙者乎至禹本紀山海經所有怪物余不敢言也不亦悲乎若竹書不潛出于千載以作徵于今日者則山海之言其幾乎廢矣若乃東方生曉畢方之名劉子政辨盜械之尸王頎訪兩面之客海民獲長臂之衣精驗潛效絶代縣符於戲群惑者其可以少寤乎是故聖王原化以極變象物以應怪鑒無滯賾曲盡幽情神焉廋哉神焉廋哉蓋此書跨世七代歷載三千雖暫顯于漢而尋亦寢廢其山川名號所在多有舛謬與今不同師訓莫傳遂將湮泯道之所存俗之所喪悲夫余有懼焉故為之創傳疏其壅閡闢其茀蕪領其玄致標其洞涉庶幾令逸文不墜于世奇言不絶于今夏后之迹靡刊于將來八荒之事有聞于後裔不亦可乎夫蘙薈之翔叵以論垂天之淩蹄涔之遊無以知絳虯之騰鈞天之庭豈伶人之所躡無航之津豈蒼兕之所涉非天下之至通難與言山海之義矣嗚呼達觀博物之客其鑒之哉道藏本山海經釋器鼎爾雅圖贊九牧貢金鼎出夏后和味養賢以無化有赫赫三事鑒于覆藝文類聚九十九金銀惟金三品揚越作貢五材之珍是謂國用務經軍農爰及雕弄藝文類聚八十三初學記二十七筆上古結繩易以書契經緯天地錯綜群藝日用不知功蓋萬世藝文類聚五十八初學記二十一圭玉作五瑞辨章有國君子鳴佩亦以表德永觀厥祭時惟文則藝文類聚八十三釋天星茫茫地理燦爛天文四靈垂象萬類群分眇觀六沴咎徵惟君藝文類聚一祭天地祭地肆瘞郊天致禋氣升太一精淪九泉至敬不文明德惟鮮藝文類聚一初學記一釋地比目魚比目之鱗別號王餘雖有二片其實一魚協不能密離不為疏藝文類聚九十九比翼鳥鳥有鶼鶼似鳧青赤雖云一質氣同體隔延頸離鳴翻能合翮藝文類聚九十九比肩獸蟨與岠虛乍兔乍鼠長短相濟彼我俱舉有若自然同心共膂藝文類聚九十九枳首蛇夔稱一足蛇則二首少不知無多不覺有雖資天然無異駢拇藝文類聚九十六釋山太室山嵩惟嶽宗華岱恆衡氣通元漠神洞幽明嵬然中立衆山之英藝文類聚七釋水水川瀆綺錯渙瀾流帶潛潤旁通經營華外殊出同歸混之東會藝文類聚八初學記六釋草蘼蕪蘼蕪善草亂之蛇床不隕其實自別以芳佞人似智巧言如簧藝文類聚八十一御覽九百八十三大觀本草七芙蓉芙蓉麗草一曰澤芝泛葉雲布映波赮熙伯陽是食饗比靈期藝文類聚八十二麻草皮之良莫貴于麻用無不給服無不加至物在邇求之好遐藝文類聚八十五萍萍之在水猶卉植地靡見其布漠爾鱗被物無常託孰之所寄藝文類聚八十二菊菊名日精布華玄月仙客薄采何憂華髮藝文類聚八十一又御覽九百九十六作仙客是尋薄採薄捋款冬吹萬不同陽煦陰蒸款冬之生擢穎堅冰物體所安焉知渙凝藝文類聚八十一芣苡車前之草別名芣苡王會之云其實如李名之相亂在乎疑似藝文類聚八十一卷施卷施之草拔心不死屈平嘉之諷詠以比取類雖邇興有遠旨藝文類聚八十一釋木柚厥苞橘柚精者曰柑實染繁霜葉鮮翠藍屈生嘉歎以為美談藝文類聚八十七御覽九百六十六九百七十三棗建國辨方外朝九棘因材制義赤心鯁直藹藹卿士亮此袞職初學記二十八御覽九百六十五梧桐桐實嘉木鳳凰所栖爰伐琴瑟八音克諧歌以永言噰噰喈喈藝文類聚八十八五果果蓏之品剖噬因宜雖曰微肴貴賤有差御覽九百六十四釋蟲蟬蟲之精潔可貴惟蟬潛蛻棄穢飲露恆鮮萬物皆化人胡不然藝文類聚九十七蚯蚓蚯蚓土精無心之蟲交不以分淫于阜螽觸而感物無乃常雄御覽九百四十七螳蜋螳蜋飛蟲揮斧奮臂當轍不回句踐是避勇士致斃勵之以義藝文類聚九十七御覽九百四十六蚍蜉蚍蜉瑣劣蟲之不才感陽而出應雨講台物之蕪懷自然知來御覽九百四十七尺蠖貴有可賤賤有可珍嗟茲尺蠖體此屈伸論配龍蛇見歎聖人藝文類聚九十七御覽九百四十八螢火熠耀宵行蟲之微么出自腐草煙若散熛物之相煦孰知其陶藝文類聚九十七初學記三十釋魚蚌萬物變蛻其理無方雀雉之化含珠懷璫與月盈虧協氣晦望藝文類聚九十七初學記二十七貝先民有作龜貝為貨貴以文采賈以小大簡則易資犯而不過藝文類聚八十四騰蛇騰蛇配龍因霧而躍雖欲升天雲罷陸漠材非所任難以久託藝文類聚九十六蟒蛇蠢蠢萬生咸以類長惟蛇之君是謂巨蟒小則數尋大或百丈藝文類聚九十六龜天生神物十朋之龜或遊于火或遊于蓍雖云類殊象二一歸亹亹致用極數盡幾藝文類聚九十六初學記三十釋鳥燕燕燕于飛瑞娥以卵玄玉爰發聖敬日遠商人是頌詠之弦管藝文類聚九十二翡翠翠雀麋鳥越在南海羽不供用肉不足宰懷璧其罪賈害以采藝文類聚九十二鼯鼠鼯之為鼠食煙棲林載飛載乳乍獸乍禽皮籍孕婦人為大任藝文類聚九十五釋獸貔書稱猛士如虎如貔貔蓋豹屬亦曰執夷白狐之云自是而非藝文類聚九十五麟麟惟靈獸與麇同體智在隱蹤仁表不抵孰為來哉宣尼揮涕藝文類聚九十八犀犀之為狀形兼牛豕力無不傾吻無不靡以賄嬰災因乎角猗藝文類聚九十五御覽八百九十猩猩能言之獸是謂猩猩厥狀似獾號音若嚶自然知往頗識物情藝文類聚九十五御覽九百八鼷鼠小鼠曰鼷實有螫毒乃食郊牛不恭是告厥譴惟明徵乎其覺鼫鼠五能之鼠伎無所執應氣而化翻飛鴽集詩人歌之無食我粒鼮鼠有鼠豹采厥號為鼮漢朝莫知郎中能名賞以束帛雅業遂盛鼠或以尾翔或以髯淩飛鼠鼓翰鯈然皆騰用無常所唯神斯憑藝文類聚九十五釋畜馬馬出明精祖自天駟十間六種各有名類三才五御駑駿異轡藝文類聚九十三羊月氏之羊其類在野厥高六尺尾亦如馬何以審之事見爾雅藝文類聚九十四
