body:
  text: 司馬彪駮祀六宗表臣以為帝在于類則禋者非天山川屬望則海岱非宗宗猶包山則望何秩焉伏與歆逵失其義也六合之間非制典所及六宗之數非一位之名陰陽之說又非義也竝五緯以為一分文昌以為二箕畢既屬於辰風師雨師復特為位玄之失也安國案祭法為宗而除其天地於上遺其四方於下取其中以為六宗四時寒暑日月衆星并水旱所宗者八非但六也傳曰山川之神則水旱厲疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之又曰龍見而雩如此禜者祀日月星辰山川之名雩者周人四月祭天求雨之稱也雪霜之災非夫禜之所禳雩祭之禮非正月之所祈周人之後說有虞之典故於學者未盡喻也且類於上帝即禮天也望於山川禜所及也案周禮云昊天上帝日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物又曰兆五帝於四郊四類四望亦如之無六宗之兆祭法云祭天祭地祭時祭寒暑日月星祭水旱祭四方及山林川澤丘陵能出雲為風雨見怪物皆是有天下者祭百神非此族也不在祀典復無六宗之文明六宗所禋即祭法之所及周禮之所祀即虞書之所宗不宜特復立六宗之祀也春官大宗伯之職掌玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗者四時五帝之屬也如此則群臣咸秩而無廢百禮遍修而不瀆於理為通續漢祭祀志中注晉武帝初司馬紹統表駮之云云案晉書司馬彪傳泰始初武帝親祠南郊彪上疏定議在郊祀志今晉書無郊祀志惟禮志上載彪二語蓋本傳所指乃舊晉書也與山巨源書根枝失據託命此別告求矜愍許見賑恤窮人易感悲喜兼懷承命之後情過挾纊御覽四百八十六續漢書敘先王立史官以書時事載善惡以為沮勸最教世之要也是以春秋不修則仲尼理之關雎既亂則師摯修之前哲豈好煩哉蓋不得已故也漢氏中興訖於建安忠臣義士亦以昭著而時無良史記述煩雜譙周雖已刪除然猶未盡安順以下亡缺者多彪乃討論衆書綴其所聞起於世祖終於孝獻編年二百録世十二通綜上下旁貫庶事為紀志傳凡八十篇號曰續漢書晉書司馬彪傳續漢書光武紀論昔羿浞篡夏數十年少康生為仍牧正能修德復厥勳大矣然尚有旅田及靡有鬲內外之助至於光武承王莽起自匹庶一民尺土靡有憑焉發迹於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國既定柔遠以德愛慎人命下及徭役武功既備抗文德修經術勳績宏矣御覽九十和帝紀論孝和年十四能折外戚驕橫之權即昭帝斃上官之類矣朝政遂一民安職業勤恤本務苑囿希幸遠夷稽服四域開泰郡國言符瑞八千餘品咸懼虛妄抑而不宣云爾御覽九十一上言張昌反狀妖賊張昌劉尼妄稱神聖犬羊萬計絳頭毛面挑刀走戟其鋒不可當請臺敕諸軍三道救助晉書張昌傳日蝕上言三司之任天地人也乾道不普故水旱為災人倫失敘故奸凶不禁乃者荊州之城妖菑仍興任城國都水流變赤近三巿之始日有蝕之孟陽節過堅冰未消臣等瑣才叨據高位可謂小人而乘君子之器宜就顯戮以答天意謹免冠徒跣上所假章綬北堂書鈔五十引晉八王故事太康七年正旦日蝕詔公卿大臣各上封事其咎安在汝南王亮與司徒舒司空瓘上言詔使冠復勿通表奏議刑法夫禮以訓世而法以整俗理化之本事實由之若斷不斷常隨輕重意則王憲不一人無所錯矣故觀人設教在上之舉守文直法臣吏之節也臣以去太康八年隨事異議周懸象魏之書漢詠畫一之法誠以法與時共義不可二令法素定而法為議則有所開長以為宜如頌所啓為永久之制晉書刑法志劉頌為三公尚書又上疏云云詔下其事太宰汝南王亮奏表山簡從事中郎缺用第三品中散大夫河內山簡清精履正才識通濟品儀第三也書鈔六十八引鎮東大將軍司馬胄表理馬敦疏敦固守孤城獨當窮寇以少禦衆載離寒暑臨危奮節保穀全城而雍州從事忌敦勳效極推小疵非所以褒獎元功宜解敦禁劾假授文選潘嶽馬汧督誄矯詔廢賈后中宮與賈謐等殺吾太子今使車騎人廢中宮汝等皆當從命賜爵關中侯不從誅三族晉書趙王倫傳永康元年四矯詔敕三部司馬迎惠帝復位詔吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老干農畝晉書趙王倫傳王輿以營兵七百餘人屯雲龍門使倫為詔下齊國相令忝受恩禮不稱惟憂至於官人敘才皆朝廷之事非國所宜裁也其令自上請之晉書六王修傳國相上長史缺典書令請求差選攸下令下教諸吏慎刑夫先王馭世明罰敕法鞭朴作教以正逋慢且唐虞之朝猶須督責前欲撰次其事使粗有常懼煩簡之宜未審其要故令劉程二君詳定然思惟之鄭鑄刑書叔向不韙范宣議制仲尼譏之令皆如舊無所增損其常節度所不及者隨事處決諸吏各竭乃心思同在公古人之節如有所闕以賴股肱匡佐之規庶以免負晉書齊王攸傳藩王自選長史議昔聖王封建萬國以親諸侯軌跡相承莫之能改誠以君不世居則人心偷幸人無常主則風俗僞薄是以先帝深覽經遠之統思復先哲之軌分土畫疆建爵五等或以進德或以酬功伏惟陛下應期創業樹建親戚聽使藩國自除長吏而今草創制度初立雖庸蜀順軌吳猶未賓宜俟清泰乃議復古之制晉書文六王齊王攸傳詔議藩王令自選國內長史攸奏議報不許王昌前母服議禮記生不及祖父母諸父昆弟而父稅喪已則否諸儒皆以為父以他故子生異域不及此親存時歸見之父雖追服子不從稅不責非時之恩也但不相見尚不服其先終而況前母非親所生義不踰祖莫往莫來恩絶殊隔而令追服殆非稱情立文之謂也以為昌不宜追服晉書禮志中案王昌事詳前竟陵王楙文節省議臣聞先王之教莫不先正其本務農重本國之大綱當今方隅清穆武夫釋甲廣分休假以就農業然守相不能勤心恤公以盡地利昔漢宣嘆曰與朕理天下者惟良二千石乎勤加賞罰黜陟幽明於時翕然用多名守計今地有餘羡而不農者衆加附業之人復有虛假通天下之謀則饑者必不少矣今宜嚴敕州郡檢諸虛詐害農之事督實南畝上下同奉所務則天下之穀可復古政豈患於暫一水旱便憂饑餒哉考績黜陟畢使嚴明畏威懷惠莫不自厲又都邑之內游食滋多巧技末業服飾奢麗富人兼羡猶有魏之遺弊染化日淺靡財害穀動復萬計宜申明舊法必禁絶之使去奢節儉不奪農時畢力稼穡以實倉廩則榮辱禮節由之而生興化反本於茲為盛晉書齊王攸傳詔以比年饑饉議所節省攸奏議云云與山濤書太子中庶子東宮顯職加侍接左右誠宜得篤粹有行檢之人想悉尊意必允衆望也藝文類聚四十九御覽二百四十五洗馬今之清選前後選文書才義也書鈔六十六武長嗣篤敏有器思今東宮洗馬缺同上太子舍人夏后湛秉心居正理識明徵應可郎也書鈔一百六十舍人今之清選也書鈔六十六書攸惶恐頓首頓首望近未得咨承以為委積比已秋風不審尊體何如冀行得稟受頓首頓首淳化閣帖三太子針伊昔上皇建國立君仰觀天文俯察地理創業恢道以安人承祀祚延統重故援立太子尊以弘道固以二已儲德既立邦有所恃夫親仁者功成邇佞者國傾故保相之材必擇賢明昔在周成旦奭作傅外以明德自輔內以親親立固德以義濟親則自然嬴廢公族其崩如山劉建子弟漢祚永傳楚以無極作亂宋以伊戾興難張禹佞給卒危強漢輔弼不忠禍及乃躬匪徒乃躬乃喪乃邦無曰父子不間昔有江充無曰至親匪二或容潘崇諛言亂真譖潤離親驪姬之讒晉侯疑申固親以道勿固以恩修身以敬勿託以尊自損者有餘自益者彌昏庶事不可以不恤大本不可以不敦見亡戒危覩安思存冢子司義敢告在閽晉書齊王攸傳又藝文類聚四十八上表理淮南王允故淮南王允忠孝篤誠憂國忘身討亂奮發幾於剋捷遭天凶運奄至隕歿逆黨遘惡并害三子冤魂酷毒莫不悲酸洎興義兵淮南國人自相率領衆過萬人人懷慷愾愍國統滅絶發言流涕臣輒以息超繼允後以慰存亡晉書武十三王淮南王允傳表立清河王覃為皇太子東宮曠然冢嗣莫繼天下大業帝王神器必建儲副以固洪基今者後宮未有孕育不可庶幸將來而虛天緒非祖宗之遺志社稷之長計也禮兄弟之子猶子故漢成無嗣繼由定陶孝和之絶安以紹興此先王之令典往代之成式也清河王覃神姿岐嶷慧智早成康王正妃周氏所生先帝衆孫之中於今為嫡昔薄姬賢明文則承立覃外祖恢世載名德覃宜奉宗廟之重統無窮之祚以寧四海顒顒之望覃兄弟雖竝出紹可𥳑令淑還以國胤不替其嗣輒咨大將軍穎及群公卿士咸同大願請具禮儀擇日迎拜晉書武十三王清河王遐傳奏理張華裴頠解系等臣聞興微繼絶聖主之高政貶惡嘉善春秋之美談是以武王封比干之墓表商容之閭誠幽明之故有以相通也孫秀逆亂滅佐命之國誅骨鯁之臣以斫喪王室肆其虐戾功臣之後多見泯滅至如張華裴頠各以見憚取誅於時解系解結同以羔羊竝被其害歐陽建等無罪而死百姓憐之今陛下更日月之光照布惟新之明命然此等諸族未蒙恩理昔欒郤降在皂隸而春秋傳其違幽王絶功臣之後棄賢者子孫而詩人以為刺臣備忝右職思竭股肱獻納愚誠若合聖意可令群官通議晉書張華傳又見解系傳奏劾王豹臣忿奸凶肆逆皇祚顛墜與成都長沙新野共興義兵安復社稷唯欲戮力皇家與親親宗室腹心從事此臣夙夜自誓無負神明而主簿王豹比有白事敢造異端謂臣忝備宰相必遘危害慮在一旦不祥之聲可蹻足而待欲臣與成都分陝為伯盡出蕃王上誣聖朝鑒御之威下長妖惑疑阻衆心噂𠴲背憎巧賣兩端訕上謗下讒內間外遘惡導奸坐生猜嫌昔孔丘匡魯乃誅少正子産相鄭先戮鄧析誠以交亂名實若趙高詭怪之類也豹為臣不忠不順不義輒敕都街考竟以明邪正晉書忠義王豹傳答鄭方孤不能致五闕若無子則不聞其過矣晉書齊王囧傳附
