body:
  text: 陳壽開府作牧第一權制第二南征第三北出第四計算第五訓厲第六綜核上第七綜核下第八雜言上第九雜言下第十貴和第十一兵要第十二傳運第十三與孫權書第十四與諸葛瑾書第十五與孟達書第十六廢李平第十七法檢上第十八法檢下第十九科令上第二十科令下第二十一軍令上第二十二軍令中第二十三軍令下第二十四右二十四篇凡十萬四千一百一十二字表上諸葛氏集目録臣壽等言臣前在箸作郎侍中領中書監濟北侯臣荀勖中書令關內侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賓然猶存録其言恥善有遺誠是大晉光明至德澤被無疆自古以來未之有倫也輒刪除復重隨類相從凡為二十四篇篇名如右亮少有逸群之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父玄避難荊州躬耕于野不求聞達時左將軍劉備以亮有殊量乃三顧亮于草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納及魏武帝南征荊州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建奇策身使孫權求援吳會權既宿服仰備又覩亮奇雅甚敬重之即遣兵三萬人以助備備得用與武帝交戰大破其軍乘勝克捷江南悉平後備西取益州益州既定以亮為軍師將軍備稱尊號拜亮為丞相録尚書事及備殂沒嗣子幼弱事無巨細亮皆專之于是外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至于吏不容奸人懷自厲道不拾遺彊不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視苞括四海退欲跨陵邊疆震蕩宇內又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮才于治戎為長奇謀為短理民之幹優于將略而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖己之長未能兼有故也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故使功業陵遲大義不及邪蓋天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以遠譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不忿信矣論者或怪亮文彩不豔而過于丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與群下矢誓故也亮所與言盡衆人凡士故其文指不得及遠也然其聲教遺言皆經事綜物公誠之心形于文墨足以知其人之意理而有補于當世伏惟陛下邁蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也謹録寫上詣箸作臣壽誠惶誠恐頓首頓首死罪死罪泰始十年二月一日癸巳平陽侯相臣陳壽上蜀志諸葛亮傳駮虞溥議王昌前母服溥駮一與之齊非大夫也禮無二嫡不可以竝耳春秋之義不以得寵而忘舊是以趙姬請迎叔隗而己下之若昌父及二母于今各存者則前母不廢已有明徵也設令昌父昔持前母所生之子來入中國而尚在者恐不謂母已黜遣從出母之服苟昌父無棄前妻之命昌兄有服母之理則昌無疑于不服晉書禮志中通典八十九太康元年侍郎山雄箸作郎陳壽等駮讓徵聘表臣以尩斃迷于道趣因病抽簪散髮林阜人綱否閉鳥獸為群陛下披榛采蘭并收蒿艾是以皋陶振褐不仁者遠臣惟頑蒙備食晉粟猶識唐人擊壤之樂宜赴京城稱壽闕外伏自惟忖瓶缶瑣器實非瑚槤之求稊稗之賤不中粢盛之用而小人無良致災速禍久嬰篤疾軀半不仁右腳偏小十有九載又服寒食藥違錯節度辛苦荼毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若溫瘧或類傷寒浮氣流腫四肢酸重于今困劣救求呼吸父兄見出妻息長訣仰迫天威不能淹留扶輿就道所苦加篤不任進路委身待罪伏枕歎息臣聞韶衛不竝奏雅鄭不兼御故郤子入周禍延王叔虞丘稱賢樊姬掩口君子小人禮不同器況臣糠䵃糅之雕胡庸夫錦衣不稱其服也竊聞同命之士咸以畢到唯臣疾疢抱釁床蓐雖貪明時懼斃命路隅設臣己不疾已遭堯舜之世執志箕山猶當容之臣聞上有明聖之主下有輸實之臣上有在寬之政下有委情之人仰唯陛下留神恕恩垂憐微命更旌瓌俊索隱于傅巖收釣于渭濱無令泥滓久濁清流臣聞鄒子一歎霜為之降杞妻一感城為大崩以臣況臣之乃知精誠不可以賤致古人言為虛也晉書皇甫謐傳上疏自稱草莽臣云云藝文類聚三十七題作讓徵聘表御覽七百四十亦作表各有刪節今合録之篇末尚有缺答辛曠書聞服有素委心無量加昔州壤通門舊儀虛想之積過于陵阜汛愛不遺猥降德音清喻爛煥情義款篤執誨欣然若饗太牢抱佩至眷銘乎心膂且箕山之叟超迹于堯帝之世首陽之老抗操于有周之隆故能名奮百代使聞之厲節皆經聖明之論所以邈世卓時者也至于鄙薄才頑行穢疾奪其志神迷其心因託虛靜遂竊美選聖上仁聰亮其辛苦每自陳訴輒見寬放雖大君有命實小人勿用也匪敢盤桓疾與榮競巾車順命非劣憊所堪也密雲雖興知枯木難植昔人有言欲之必為之辭豈來惠之謂矣猥承告示欲備七十木非梧桐豈敢棲鳳聞命悚灼如蹈春冰非苟崇謙實懼陷墜幸恕不假明亮志心藝文類聚三十七玄守論或謂謐曰富貴人之所欲貧賤人之所惡何故委形待于窮而不變乎且道之所貴者理世也人之所美者及時也先生年邁齒變飢寒不贍轉死溝壑其誰知乎謐曰人之所至惜者命也道之所必全者形也性形所不可犯者疾病也若擾全道以損性合安得去貧賤存所欲哉吾聞食人之祿者懷人之憂形強猶不堪況吾之弱疾乎且貧者士之常賤者道之實處常得實沒齒不憂孰與富貴擾神耗精者乎又生為人所不知死為人所不惜至矣喑聾之徒天下之有道者也夫一人死而天下號者以為損也一人生而四海笑者以為益也然則號笑非益死損生也是以至道不損至德不益何哉體足也如回天下之念以追損生之禍運四海之心以廣非益之病豈道德之至乎夫唯無損則至堅矣夫唯無益則至厚矣堅故終不損厚故終不薄苟能體堅厚之實居不薄之真立乎損益之外游乎形骸之表則我道全矣晉書皇甫謐傳釋勸論相國晉王辟余等三十七人及泰始登禪同命之士莫不畢至皆拜騎都尉或賜爵關內侯進奉朝請禮如侍臣唯余疾困不及國寵宗人父兄及我寮類咸以為天下大慶萬姓賴之雖未成禮不宜安寢縱其疾篤猶當致身余惟古今明王之制事無巨細斷之以情實力不堪豈慢也哉乃伏枕而歎曰夫進者身之榮也退者命之實也設余不疾執高箕山尚當容之況余實篤故堯舜之世士或收迹林澤或過門不敢入咎繇之徒兩遂其願者遇時也故朝貴致功之臣野美全志之士彼獨何人哉今聖帝龍興配名前哲仁道不遠斯亦然乎客或以常言見逼或以逆世為慮余謂上有寬明之主必有聽意之人天網恢恢至否一也何尤于出處哉遂究賓主之論以解難者名曰釋勸客曰蓋聞天以懸象致明地以含通吐靈故黃鍾次序律呂分形是以春華發萼夏繁其實秋風逐暑冬冰乃結人道以之應機乃發三材連利明若符契故士或同升于唐朝或先覺于有莘或通夢以感主或釋釣于渭濱或叩角以干齊或解褐以相秦或冒榜以安鄭或乘駟以救屯或班荊以求友或借術于黃神故能電飛景拔超次邁倫騰高聲以奮遠抗宇宙之清音由此觀之進德貴乎及時何故屈此而不伸今子以英茂之才游精于六藝之府散意于衆妙之門者有年矣既遭皇禪之朝又投祿利之際委聖明之主偶知己之會時清道真可以沖邁此真吾生濯髮雲漢鴻漸之秋也韜光逐藪含章未曜龍潛九泉硜炙執高棄通道之遠由守介人之局操無乃乖于道之趣乎且吾聞招搖昏回則天位正五班敘則人理定如今王命切至委慮有司上招忤主之纍下致駭衆之疑達者貴同可必獨異群賢可從何必守意方今同命竝臻飢不待餐振藻皇塗咸秩天官子獨棲遲衡門放形世表遜遁丘園不睨華好惠不加人行不合道身嬰大疢性命難保若其羲和促轡大火西頽臨川恨晚將復何階夫貴陰賤璧聖所約也顛倒衣裳明所針也子其鑒先哲之洪範副聖朝之虛心沖靈翼于雲路浴天池以濯鱗排閶闔步玉岑登紫闥侍北辰翻然景曜雜沓英塵輔唐虞之主化堯舜之人宣刑錯之政配殷周之臣銘功景鍾參敘彝倫存則鼎食亡為貴臣不亦茂哉而忽金白之輝曜忘青紫之班瞵辭容服之光粲抱弊褐之終年無乃勤乎主人笑而應之曰吁若賓可謂習外觀之暉暉未覩幽人之髣佛也見俗人之不容未喻聖皇之兼愛也循方圓于規矩未知大形之無外也故曰天玄而清地靜而寧含羅萬類旁薄群生寄身聖世託道之靈若夫春以陽散冬以陰凝泰液含光元氣混蒸衆品仰化誕制殊徵故進者享天祿處者安丘陵是以寒暑相摧四宿代中陰陽不治運化無窮自然分定兩克厥中二物俱靈是謂大同彼此無怨是謂至通若乃衰周之末貴詐賤誠牽于權力以利要榮故蘇子出而六主合張儀入而橫勢成廉頗存而趙重樂毅去而燕輕公叔沒而魏敗孫臏刖而齊寧蠡種親而越霸屈子疏而楚傾是以君無常籍臣無定名損義放誠一虛一盈故馮以彈劍感主女有反賜之說項奮拔山之力蒯陳鼎足之勢東郭劫于田榮顏闔恥于見逼斯皆棄禮喪真苟榮朝夕之急者也豈道化之本與若乃聖帝之創化也參德乎二皇齊風乎虞夏欲溫溫而和畼不欲察察而明切也欲混混若玄流不欲蕩蕩而名發也欲索索而條解不欲契契而繩結也欲芒芒而無垠際不欲區區而分別也欲暗然而內章不欲示白若冰雪也欲醇醇而任德不欲瑣瑣而執法也是以見機者以動成好遁者無所迫故曰一明一昧得道之概一弛一張合禮之方一浮一沈兼得其真故上有勞謙之愛下有不名之臣朝有聘賢之禮野有遁竄之人是以支伯以幽疾距唐李老寄迹于西鄰顏氏安陋以成名原思娛道于至貧榮期以三樂感尼父黔婁定諡于布衾干木偃息以存魏荊萊志邁于江岑君平因蓍以道著四皓潛德于洛濱鄭真躬耕以致譽幼安發令乎今人皆持難奪之節執不回之意遭拔俗之主全彼人之志故有獨定之計之不借謀于衆人守不動久安者不假慮于群賓故能棄外親之華通內道之真去顯顯之明路入昧昧之埃塵宛轉萬情之形表排託虛寂以寄身居無事之宅交釋利之人輕若鴻毛重若泥沈損之不得測之愈深真吾徒之師表余迫疾而不能及者也子議吾失宿而駭衆吾亦怪子較論而不折中也夫才不周用衆所斥也寢疾彌年朝所棄也是以胥克之廢丘明列焉伯牛有疾孔子斯歎若黃帝創制于九經岐伯剖腹以蠲腸扁鵲造虢而尸起文摯徇命于齊王醫和顯術于秦晉倉公發祕于漢皇華陀存精于獨識仲景垂妙于定方徒恨生不逢乎若人故乞命訴乎明王求絶編于天籙亮我躬之辛苦冀微誠之降霜故俟罪而窮處晉書皇甫謐傳篤終論玄晏先生以為存亡天地之定制人理之必至也故禮六十而制壽至于九十各有等差防終以素豈流俗之多忌者哉吾年雖未制壽然嬰疢彌紀仍遭喪難神氣損劣困頓數矣常懼天隕不期慮終無素是以略陳至懷夫人之所貪者生也所惡者死也雖貪不得越期雖惡不可逃遁人之死也精歇形散魂無不之故氣屬于天寄命終盡窮體反真故尸藏于地是以神不存體則與氣升降尸不久寄與地合形形神不隔天地之性也尸與土并反真之理也今生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺椁所以隔真故桓司馬石椁不如速朽季孫璵璠比之暴骸文公厚葬春秋以華元不臣楊王孫親土漢書以為賢于秦始皇如令魂必有知則人鬼異制黃泉之親死多于生必將備其器物用待亡者今若以存況終非即靈之意也如其無知則空奪生用損之無益而啓奸心是招露形之禍增亡者之毒也夫葬者藏也藏也者欲人之不得見也而大為棺椁備贈存物無異于埋金路隅而書表于上也雖甚愚之人必將笑之豐財厚葬以啓姦心或剖破棺椁或牽曳形骸或剝臂捋金環或捫腸求珠玉焚如之形不痛于是自古及今未有不死之人又無不發之墓也故張釋之曰使其中有欲雖固南山猶有隙使其中無欲雖無石椁又何戚焉斯言達矣吾之師也夫贈終加厚非厚死也生者自為也遂生意于無益棄死者之所屬知者所不行也易稱古之葬者衣之以薪葬之中野不封不樹是以死得歸真亡不損生故吾欲朝死夕葬夕死朝葬不設棺椁不加纏斂不修沐浴不造新服殯唅之物一皆絶之吾本欲露形入坑以身親土或恐人情染俗來久頓革理難今故粗為之制奢不石椁儉不露形氣絶之後便即時服幅巾故衣以蘧蒢裹尸麻約二頭置尸床上擇不毛之地穿坑深十尺長一丈五尺廣六尺坑訖舉床就坑去床下尸平生之物皆無自隨唯齎孝經一卷示不忘孝道蘧蒢之外便以親土土與地平還其故草使生其上無種樹木削除使生迹無處自求不知不見可欲則姦不生心終始無怵惕千載不慮患形骸與后土同體魂爽與元氣合靈真篤愛之至也若亡有前後不得移祔祔葬自周公來非古制制也舜葬蒼梧二妃不從以為一定何必周禮無問師工無信卜筮無拘俗言無張神坐無十五日朝夕上食禮不墓祭但月朔于家設席以祭百日而止臨必昏明不得以夜制服常居不得墓次夫古不崇墓智也今之封樹愚也若不從此是戮尸地下死而重傷魂而有靈則冤悲沒世長為恨鬼王孫之子可以為誡死誓難違幸無改焉晉書皇甫謐傳帝王世紀漢高祖論玄晏先生曰禮稱至道以王義道以霸觀漢祖之取天下也遭秦世暴亂不階尺土之資不權將相之柄發迹泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以聖居帝王之位無一定之制三代之美固難及矣御覽八十七光武論玄晏先生曰左氏春秋稱夏少康之起有田一成有衆一旅若漢之再命世祖不階成旅之功平暴反正遂建中興與夏康同美矣御覽九十高士傳焦先論或問皇甫謐曰焦先何人曰吾不足以知之也考之于表可略而言矣夫世之所常趣者榮味也形之所不可釋者衣裳也身之所不可離者室宅也口之所不能已者言語也必之不可絶者親戚也今焦先棄榮味釋衣服離室宅絶親戚閉口不言曠然以天地為棟宇暗然含至道之前出群形之表入玄寂之幽一世之人不足以挂其意四海之廣不能以回其顧妙乎與夫三皇之先者同矣結繩以來未及其至也豈群言之所能髣佛常心之所得測量哉彼行人所不能行堪人所不能堪犯寒暑不以傷其性居曠野不以恐其形遭驚急不以迫其慮離榮愛不以纍其心損視聽不以汙其耳目舍足于不損之地居身于獨立之處延年歷百壽越期頤雖上識不能尚也自羲皇已來一人而已矣魏志管寧傳注引高士傳列女傳龐娥親論玄晏先生以為父母之讎不與共天地蓋男子之所為也而娥親以女弱之微念父辱之酷痛感讎黨之凶言奮劍仇頸人馬俱摧塞亡父之怨魂雪三弟之永恨近古已來未之有也詩云修我戈矛與子同仇娥親之謂也魏志龐淯傳注三都賦序玄晏先生曰古人稱不歌而頌謂之賦然則賦也者所以因物造端敷弘體理欲人不能加也引而申之故文必極美觸類而長之故辭必盡麗然則美麗之文賦之作也昔之為文者非苟尚辭而已將以紐之王教本乎勸戒也自夏殷以前其文隱沒靡得而詳焉周監二代文質之體百世可知故孔子采萬國之風正雅頌之名集而謂之詩詩人之作雜有賦體子夏序詩曰一曰風二曰賦故知賦者古詩之流也至于戰國王道陵遲風雅寖頓于是賢人失志辭賦作焉是以孫卿屈原之屬遺文炳然辭義可觀存其所感咸有古詩之意皆因文以寄其心託理以全其制賦之首也及宋玉之徒淫文放發言過于實誇競之興體失之漸風雅之則于是乎乖逮漢賈誼頗節之以禮自時厥後綴文之士不率典言竝務恢張其文博誕空類大者罩天地之表細者入毫纖之內雖充車聯駟不足以載廣廈接榱不容以居也其中高者至如相如上林楊雄甘泉班固兩都張衡二京馬融廣成王生靈光初極宏侈之辭終以約簡之制煥乎有文蔚爾鱗集皆近代辭賦之偉也若夫土有常産俗有舊風方以類聚物以群分而長卿之儔過以非方之物寄以中域虛張異類託有于無祖構之士雷同影附流宕忘反非一時也曩者漢室內潰四海圮裂孫劉二氏割有交益魏武撥亂擁據函夏故作者先為吳蜀二客盛稱其本土險阻瓌琦可以偏王而卻為魏主述其都畿弘敝豐麗奄有諸華之意言吳蜀以擒滅比亡國而魏以交禪比唐虞既已著逆順且以為鑒戒蓋蜀包梁岷之資吳割荊南之富魏跨中區之衍考分次之多少計殖物之衆寡比風俗之清濁課士人之優劣亦不可同年而語矣二國之士各沐浴所聞家自以為我土樂人自以為我民良皆非通方之論也作者又因客主之辭正之以魏都折之以王道其物土所出可得披圖而校體國經制可得案記而驗豈誣也哉文選高士傳序孔子稱舉逸民天下之民歸心焉是以洪崖先生創高道于上皇之世許由善卷不降節于唐虞之朝自三代秦漢達乎魏興受命中賢之主未嘗不聘岩穴之隱追遁世之民是以易箸束帛之義禮有玄纁之制詩人發白駒之歌春秋顯子臧之節明堂月令以季春之月聘名士禮賢者然則高讓之士王政所先厲濁激貪之務也史班之載多所闕略梁鴻頌逸民蘇順科高士或録屈節雜而不純又近取秦漢不及遠古夫思其人愛其樹況稱其德而贊其事哉謐採古今八代之士身不屈于王公名不耗于終始自堯至魏凡九十餘人雖執節若夷齊去就若兩龔皆不録也高士傳明刊本又見御覽五一十自序士安每病母輒推燥居溼以視易單御覽七百三十七闕題護軍武士之官御覽二百四十引皇甫謐集
