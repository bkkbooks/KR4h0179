body:
  text: 卷三十七庾亮與郗箋昔于蕪湖反覆謂彼罪雖重而時弊國危且令方嶽道勝亦足有所鎮壓故共隱忍解釋陶公自茲迄今曾無悛改主上自八九歲以及成人入則在宮人之手出則唯武官小人讀書無從音句顧問未嘗遇君子侍臣雖非俊士皆時之良也知今古顧問豈與殿中將軍司馬督同年而語哉不云當高選侍臣而云高選將軍司馬督豈合賈生願人主之美習以成德之意乎秦政欲愚其黔首天下猶知不可況乃欲愚其主哉主之少也不登進賢哲以輔道聖躬春秋既盛宜復子明辟不稽首歸政甫居師傅之尊成人之主方受師臣之悖主上知君臣之道不可以然而不得不行殊禮之事萬乘之君寄坐上九亢龍之爻有位無人挾震主之威以臨制百官百官莫之敢忤是先帝無顧命之臣勢屈于驕姦而遵養之也趙賈之徒有無君之心是而可忍孰不可忍且往日之事含容隱忍謂其罪可宥良以時弊國危兵甲不可屢動又冀其當謝往釁懼而修已如頃日之縱是上無所忌下無所憚謂多養無賴足以維持天下公與下官並蒙先朝厚顧荷託付之重大姦不掃何以見先帝于地下願公深惟安國家固社稷之遠算次計公之與下官負荷輕重量其所宜晉書庾亮傳亮欲黜王導與郗鑒箋鑒不許故其事得息報溫嶠書吾憂西陲過于歷陽足下無過雷池一步也晉書庾亮傳與周邵書西陽一郡戶口差實非履道真純何以鎮其流遁詢之朝野僉曰足下今其上表請足下臨之無讓世説尢悔篇注引庾亮集追報孔坦書廷尉孔君神遊體離嗚呼哀哉得八月十五日書知疾患轉篤遂不起濟悲恨傷楚不能自勝足下方才中年素少疾患雖天命有在亦禍出不圖且足下才經于世世常須才況于今日倍相痛惜吾以寡乏忝當大任國恥未雪夙夜憂憤常欲足下同在外藩戮力時事此情未果來書奄至申尋往復不覺深隕深明足下慷慨之懷深痛足下不遂之志邈然永隔夫復何言謹遣報答并致薄祭望足下降神饗之晉書孔垣傳書亮白奉告書葙先為媞子作輒先以奉之研今作之支髮枕今作無作模若有可權付之亮再拜淳化閣帖三答郭預書別駕舊與刺史別乘同流宣王化于萬里者其任居刺史之半安可任非其人通典三十二御覽二百六十三並引庾亮集答王群咨為從父姊反服存沒禮終而喪其嗣此之無後雖復可哀然非復本宗之所知矣故不得以小功之末以亡者喪後而反服大功也通典九十九翟徵君贊夫所謂至人者體包傑量神凝域表該落萬動玄心獨融故能虬驤慶霄而不紲豢龍之轡鳳鳴瑤林而不屈伶倫之籠豈必欣太清而樂瓊藹哉顧蹄涔不足以濯神鬚翳薈不足以翔雲翮是故藐姑有綽約之廬箕阜有高嘯之宇唐勳表于玄庭夏功忘于虛室晉徵士南陽翟君稟逸韻于天陶含沖氣于特秀體虛任而委順恢昭曠而高蹈先生載營抱一泊然獨處神栖飆藹之表形逸巖澤之隅雖束帛仍降軺冕履招而弓旌屈于匪石帝命慚于虛復矣是以高風振宇宙遠詠冠當時方將表大庭于絶代恢玄解以釋紛仰朝霞而晞翼陵扶搖以獨翔景命不延卒于尋陽之南山哲人其萎高軌孰倣余欽若人之風常問道于無何之廬賓想玄珠主以瞻授沐道霑淳固以實而歸矣自昔之違于茲七稔何悟先生忽焉升遐感至德之長泯悼仁風之永翳標爾其傷潸然增欷乃援翰詠迹以宣來葉其辭曰卓哉先生逸韻遐超虯盤玉津鳳戢瓊條滌耳夏鼎高揖康朝洪崖邈矣玄迹載劭淳風沐世飛芳九霄藝文類聚三十六立行廟于白石告元帝先后逆臣蘇峻傾覆社稷毀棄三正汙辱海內臣亮等手刃戎首龔行天罰惟中宗元皇帝肅祖明皇帝明穆皇后之靈降鑒有罪剿絶其命翦此群凶以安宗廟臣等雖隕首摧軀猶生之年宋書禮志三咸和三年蘇峻覆亂京師溫嶠等入伐立行廟于白石告元帝先后釋奠祭孔子文維咸康三年荊豫州刺史都亭侯庾亮敬告孔聖明靈詩書煥于唐虞憲章盛于文武然後黎民時雍彝倫攸敘幽厲頽搆王綱絶紀高岸為谷六合錯否上陵夷而失教下苟免而無恥公以玄聖之靈應感圓通萬物我賴匪我求蒙夫子既沒洪範乖流秦雖慢道漢聿孔修洎我皇晉仰欽大猷宗聖既建遐胄俾侯令月吉辰祗陳大禮磬管鏘鏘威儀濟濟嘉奠既設欽若靈規心存鳳德尚想來儀神其歆之降鑒在斯藝文類聚三十八為成帝出令沙門致敬詔夫萬方殊俗神道難辨有自來矣達觀傍通誠當無怪況跪拜之禮何必尚然當復原先王所以尚之之意豈直好此屈折而坐遘槃辟哉固不然矣因父子之敬建君臣之序制法度崇禮秩豈徒然哉良有以矣既其有以將何以易之然則名禮之設其無情乎且今果將有佛邪將無佛邪有佛邪其道固弘無佛邪義將何取繼其信然將是方外之事方外之事豈方內所以體而當矯形骸違常務易禮典棄名教是吾所甚疑也名教有由來百代所不廢昧旦丕顯後世猶殆殆之為弊其故難尋而合當遠慕茫昧依希未分棄禮于一朝廢教于當世使夫凡流傲逸憲度又是吾之所甚疑也縱其信然縱其有之吾將通之于神明得之于胸懷耳軌憲宏模固不可廢之于正朝矣凡此等類皆晉民也論其材智又常人也而當因所説之難辨假服飾以陵度抗殊俗之傲禮直形體于萬乘又是吾所弗取也諸君並國器也悟言則當測幽微論治則當重國典苟其不然吾將何述焉沙門不拜俗事一省所陳具情旨幽昧之事誠非寓言所盡然其較略及夫人神之常度粗復有分例耳大都百王制法雖質文隨時然未有以殊俗參治恢誕雜化者也豈曩聖之不達而來聖之宏通哉且五戒之小善粗擬似人倫而更于世主略其禮敬邪禮重矣敬大矣為治之綱盡于此矣萬乘之君非好尊也區域之人非好卑也而卑尊不陳王教不得不一二之則亂斯曩聖所以憲章體國所宜不惑也通才博採往往備其事修之身修之家可矣修之國及朝則不可斯豈不遠也省所陳果亦未能了有之與無矣縱其了猶謂不可以參治而況都無而當以兩行邪沙門不拜俗事一宏明集用樂謨詔草光祿九卿列首且職典吏署選貢惟允其以散騎常侍謨為光祿勳書鈔五十三初學記十二並引庾冰集為兄亮上疏辭封臣謹詳先事亦曾聞臣亮對臣等之言懇懇于斯事是以屢自陳請將迄十年豈恃臣好讓而不肅恭顧曩時之釁近出宇下加先帝神武算略兼該是以役不踰時而凶強馘滅計之以事則功歸聖主推之于運則勝非人力至如亮等因聖略之弘得效所職事將何論功將何賞及後傷蹶責踰先功是以陛下優詔聽許亮實思自效以報天德何悟身潛聖世微志長絶存亡哀恨通貫心膂願陛下發明詔遂先恩則臣亮死且不朽晉書庾亮傳上疏辭封賞臣門戶不幸以短才贊務釁及天庭殃流邦族若晉典休明夷戮久矣而于時顛沛刑憲暫墜遂令臣等復得為時陳力徇國之臣因之而奮立功于大罪之後建義于顛覆之餘此是臣等所以復得視息于天壤王憲不復必明于往愆也此之厚幸可謂弘矣豈復得計勞納封受賞司勳哉願陛下曲降靈澤哀恕由中申命有司惠臣所乞則愚臣之願于此畢矣晉書庾冰傳出鎮武昌臨發上疏臣因循家寵冠冕當世而志無殊操量不及遠頃皇家多難釁故頻仍朝望國器與時殲落遂令天眷下墜降及臣身俯仰伏事于今五年上不能光贊聖猷下不能緝熙政道而陛下遇之過分求之不已復策敗駕之駟以冀萬里之功非天眷之隆將何以至此是以敢竭狂瞽以獻血誠願陛下暫屏旒纊以弘聽納今強寇未殄戎車未戢兵弱于郊人疲于內寇之侵逸未可量也黎庶之困未之安也群才之用未之盡也而陛下崇高事與下隔視聽察覽必寄之群下群下宜忠不引不進百司宜勤不督不勸是以古之帝王勤于降納雖日總萬機猶兼將相或借訟輿人或求謗芻蕘良有以也況今日之弊開闢之極而陛下曆數屬當其運否剝之難嬰之聖躬普天所以痛心于既往而傾首于將來者也實冀否終而泰屬運在今誠願陛下弘天覆之量地載之厚宅沖虛以為本勤訓督以為務廣引時彥詢于政道朝之得失必關聖聽人之情偽必達天聰然後覽其大當以總國綱躬儉節用堯舜豈遠大布之衣衛文何人是人古人有云非知之難行之難非行之難安之難也願陛下既思日側于勞謙納其起豫之情則天下幸甚矣臣朝夕伏膺猶不能畼臨疏徘徊不覺辭盡晉書庾冰傳與王羲之書得示連紙一丈致辭一千祇增其歎耳了無解于往懷藝文類聚三十一表陳南夷事東境國家所資侵擾不已逃逸漸多夷人常伺隙若知造鑄之利將不可禁晉書庾翼傳時東土多賦役百姓乃從海道入廣州刺史鄧嶽大開鼓鑄諸夷因此知造兵器翼表陳云云北伐至夏口上表臣近以胡寇有斃亡之勢暫率所統致討山北並分見衆略復江夏數城臣等以九月十九日發武昌以二十四日達夏口輒簡卒搜乘停當上道而所調借牛馬來處皆遠百姓所蓄穀草不充並多羸瘠難以涉路加以向冬野草漸枯往反二千或容躓頓輒便隨事籌量權停此舉又山南諸城每至秋水多燥涸運漕用功實為艱阻計襄陽荊楚之舊西接益梁與關隴咫尺北去洛河不盈千里土沃田良方城險峻水路流通轉運無滯進可以掃蕩秦趙退可以保據上流臣雖不武意略淺短荷國重恩志存立效是以授任四年唯以習戎為務實欲上憑聖朝威靈高略下藉士民義慨之誠因寇衰弊漸臨逼之而八年春上表請據樂鄉廣農蓄穀以伺二寇之釁而值天高聽邈未垂察照朝議紛紜遂令微誠不畼自爾以來上參天人之徵下採降俘之言胡寇衰滅其日不遠臣雖未獲長驅中原馘截凶醜亦不可以不進據要害思攻取之宜是以輒量宜入沔徙鎮襄陽其謝尚王愆期等悉令還據本戍須到所在馳遣啓聞晉書庾翼傳北伐上疏賊季龍年已六十奢淫理盡醜類怨叛又欲決死遼東皓雖驍果未必能固若此無掣手之虜則江南將不異遼左矣臣所以輒發良人不顧忿咎然東西形援未必齊舉且欲北進移鎮安陸入沔五百溳水通流輒率南郡太守王愆期江夏相謝尚尋陽太守袁真西陽太守曹據等精鋭三萬風馳上道并勒平北將軍桓宣撲取黃季欲并丹水搖蕩秦雍御以長轡用逸待勞比及數年興復可冀臣既臨許洛竊謂桓溫可渡戌廣陵何充可移據淮泗赭圻路永進屯合肥伏願表御之日便決聖聽不可廣詢同異以乖事會兵聞拙速不聞工之久也晉書庾翼傳與僚屬教頃聞諸君樗蒱有過差者初為是政事間暇以娛以甘故未有言也今知大相聚集漸以成俗聞之能不憮然御覽七百五十四引庾翼集書故吏從事中郎庾翼參軍事劉遐死罪白昨所啓龐遺孟𦐇所請求述上事事須檢校咨論光駕當出請不從詣録事中郎共詳處別白謹啓翼遐死罪死罪淳化閣帖三黃伯思云當是與陶侃啓已向季春感慕兼傷情不自任奈何奈何溫和足下何如吾哀勞何賴愛護時不足下須氣力孰若別時淳化閣帖三與王羲之書吾昔有伯英章草十紙過江顛狽遂乃亡失常歎妙迹永絶忽見足下答家兄書煥若神明頓還舊觀晉書王羲之傳報兄冰書殷君始往雖多驕豪實有風力之益亦似由有佳兒弟故小令物情難之自頃以來奉公更退私纍日滋亦不稍以此寥蕭之也既雅敬洪遠又與浩親善其父兄得失豈以小小計之大較江東政以傴儛豪強以為民蠹時有行法輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直打殺倉督監以塞責山遐作餘姚半年而為官出二千戶政雖不倫公強官長也而群共驅之不得安席紀睦徐寧奉王使糾罪人船頭到渚桓逸還復而二使免官雖皆前宰之惛謬江東事去實此之由也兄弟不幸橫陷此中自不能拔腳于風塵之外當共明目而治之荊州所統一二十郡唯長沙最惡而不黜與殺督監者復何異邪晉書庾翼傳殷浩父羡為長沙在郡貪殘兄冰與翼書屬之翼報曰云云與兄冰書歲星犯天關占云關梁當分比來江東無他故江道不艱難而石季龍頻年再閉關不通信使此復是天公憒憒無皂白之徵也晉書天文志下貽殷浩書當今江東社稷安危內委何褚諸君外託庾桓數族恐不得百年無憂亦朝夕而斃足下少標令名十餘年間位經內外而欲潛居利貞斯理難全且夫濟一時之務須一時之勝何必德均古人韻齊先達邪王夷甫先朝風流士也然吾薄其立名非真而始終莫取若以道非虞夏自當超然獨往而不能謀始大合聲譽極致名位正當抑揚名教以靜亂源而乃高談莊老説空終日雖云談道實長華競及其末年人望猶存思安懼亂寄命推務而甫自申述徇小好名既身囚胡虜棄言非所凡明德君子遇會處際寧可然乎而世皆然之益知名實之未定弊風欴未革也晉書殷浩傳與燕王慕容皓書今致朱漆銏三十張絳碧晝幡黑眊百副藝文類聚六十御覽三百四十一今致晝長鳴角一雙幡眊副御覽三百三十八今致孔雀眊二枚御覽三百四十一今致襦鎧一領兜鍪白眊百副御覽三百四十一三百五十六鄧百山昔送此犀皮兩當鎧一領雖不能精好謂是異物故復致之十六國春秋前燕録慕容皓下初學記二十二御覽三百五十六今致八尺丈二細桃枝簟十枚黃篾雙文簟二枚黃篾獨坐雙文簟一枚書鈔一百三十三御覽七百八今致細練十端竹練二端御覽八百十九答何充書中古以上未有母后臨朝女主當陽者也乃起漢耳雖或權宜僕所不然處也代主雖有幼蒙萬機寄于冢宰無以坤得臨乾矣當今后德賢明褚侯讜正得命參二阿衡遐邇之幸議者謂燕王不足為準竇武無拜文此制不出賢聖也武既受其爵位亦無不拜禮也鄭君之言適合情理今太后既臨天位褚侯便是人臣人臣而不拜君位受官而不循天則切所不安若不遠準古義雖為天王后猶曰吾季薑漢以前事不與今同漢加太上王太上未見崇戴即是子為天子而父為士者耳乃建崇號位冠帝王為喻也今褚侯由來晉臣不可得準通典六十七答參軍于瓚參軍于瓚陳節戲事曰夫嬉戲都名動相剝非為治之本自今樗蒱擲馬諸不急戲宜一斷之翼答曰今唯許其圍棊餘悉斷藝文類聚七十四引庾翼集答翟鏗甘露自古佳祥而頃天下多故何以致此且其味尚薄未知瑞應否而近得一白兔尚羸小且養之并上藝文類聚九十八上諷諫詩表陛下以聖明之德方隆唐虞之化而事役殷曠百姓凋殘以數州之資經贍四海之務其為勞弊豈可具言昔漢文居隆盛之世躬自儉約斷獄四百殆致刑厝賈誼歎息猶有積薪之言以古況今所以益其憂懼陛下明鑒天挺無幽不燭弘濟之道豈待瞽言臣受恩奕世思盡絲髮受任到東親臨所見敢緣弘政獻其丹愚伏願聽斷之暇少垂察覽晉書庾羲傳諫叔父翼徙鎮襄陽書承進據襄陽耀武荊楚且田且戍漸臨河洛使向化之萌懷德而附凶愚之徒畏威反善太平之基便在于旦夕昔殷伐鬼方三年而剋樂生守齊遂至歷載今皇朝雖隆無有殷之盛凶羯雖衰猶醜類有徒而沔漢之水無萬仞之固方城雖峻無千尋之險加以運漕供繼有泝流之艱征夫勤役有勞來之歎若窮寇慮逼送死一決東西互出首尾俱進則廩糧有抄截之患遠略乏率然之勢進退惟思不見其可此明暗所共見賢愚所共聞況于臨事者乎願回師反斾詳擇全勝修城池立壘壁勤耕農練兵甲若凶運有極天亡此虜則可泛舟燕澤方軌齊進水陸騁邁亦不踰旬朔矣願詳思遠猷算其可者晉書庾和傳
