body:
  text: 庾峻上疏請易風俗興禮讓臣聞黎庶之性人衆而賢寡設官分職則官寡而賢衆為賢衆而多官則妨化以無官而棄賢則廢道是故聖王之御世也因人之性或出或處故有朝廷之士又有山林之士朝廷之士佐主成化猶人之有股肱心膂共為一體也山林之士被褐懷玉太上棲于丘園高節出于衆庶其次輕爵服遠恥辱以全名最下就列位惟無功而能知止彼其清劭足以抑貪汙退讓足以息鄙事故在朝之士聞其風而悅之將受爵者皆恥躬之不逮斯山林之士避寵之臣所以為美也先王嘉之節雖離世而德合于主行雖詭朝而功同于政故大者有玉帛之命其次有几杖之禮以厚德載物出處有地既廊廟多賢才而野人亦不失為君子此先王之弘也秦塞斯路利出一官唯有處士之名而無爵列于朝者商君謂之六蝎韓非謂之五蠹時不知德惟爵是聞故閭閻以公乘侮其鄉人郎中以上爵傲其父兄漢祖反之大畼斯否任蕭曹以天下重四皓于南山以張良之勳而班在叔孫之後蓋公之賤而曹相咨之以政帝王貴德于上俗亦反于下故田叔等十人漢廷臣無能出其右者而未嘗干祿于時以釋之之貴結王生之襪于朝而其名愈重自非主臣尚德兼愛孰能通天下之志如此其大者乎夫不革百王之弊徒務救世之政文士競智而務入武夫恃力而爭先官高矣而意未滿功報矣其求不已又國無隨才任官制俗無難進易退之恥位一高雖無功而不見下已負敗而後見用故因前而升則處士之路塞矣又仕者黜陟無章是以普天之下先競而後讓舉世之士有進而無退大人溺于動俗執政撓于群言衡石為之失平清濁安可復分昔者先王患向之所以取天下者今之為弊是故功成必改其物業定必易其教雖以爵祿使下臣無貪陵之行雖以甲兵定功主無窮武之悔也臣愚以為古者大夫七十懸車今自非元功國老三司上才可聽七十致仕則士無懷祿之嫌矣其父母八十可聽終養則孝莫大于事親矣吏歷試無績依古終身不仕則官無秕政矣能小而不能大可降還蒞小則使人以器矣人主人以禮退人以禮人臣亦量能受爵矣其有孝如王陽臨九折而去官潔如貢禹冠一免而不著及知止如王孫知足如疏廣雖去列位而居東野與人父言依于慈與人子言依于孝此其出言合于國檢危行彰于本朝去勢如脫屣路人為之隕涕辭寵如金石庸夫為之興行是故先王許之而聖人貴之夫人之性陵上猶水之趣下也益而不已必決升而不已必困始于匹夫行義不敦終于皇輿為之敗績固不可不慎也下人并心進趣上宜以退讓去其甚者退讓不可以刑罰使莫若聽朝士時時從志山林往往間出無使入者不能復出往者不能復反然後出處交泰提衡而立時靡有爭天下可得而化矣晉書庾峻傳是時風俗趣競禮讓陵遲峻上疏祖德頌思文我祖降茲嶽靈綿綿之迹時惟初生天難忱斯駿命靡常世祚中衰官族消亡念惜底績惟乃舊章烈祖勤止其德允荒漢后不辟公族剝亂難起蕭牆政由豎官監彼天眚我不干時縱德遺寵顯志遁思均樂公侯逸豫無期烈祖底戒營茲垣墉曾孫篤之永世攸同藝文類聚二十遺敕子珉朝卒暮殯幅巾布衣葬不擇日御覽五百五十四引王隱晉書上表自劾司空公賈充請諸卿校并及臣臣不自量飲酒過多醉亂行酒重酌于公公不肯飲言語往來公遂訶臣父老不歸供養卿為無天地臣不服罪自引而更忿怒厲聲名公臨時喧譊遂至荒越案禮八十月制誠以衰老之年變難無常也而臣不惟生育之恩輸情自歸求養老父而懹祿貪榮久廢定省烏鳥之不若充位為三公論道興化以教義責臣是也而以枉錯直居下犯上醉酒迷荒昏亂儀度臣得以凡才擢授顯任易戒濡首論誨酒困而臣聞義不服過言盈庭黷慢台司違犯憲度不可以訓臣謹自劾請臺免臣官廷尉結罪大鴻臚削爵土敕身不謹伏須罪誅謹遣臣丞韓微上所佩河南尹章綬關內侯印綬晉書庾純傳通典六十八孫為祖持重議古者所以重宗諸侯代爵士大夫代祿防其爭競故明其宗今無國士代祿者防無所施又古之嫡孫雖在仕位無代祿之士猶承祖考家業上供祭祀下正子孫旁理昆弟敘親合族是以宗人男女長幼皆為之服齊縗今則不然諸侯無爵邑者嫡之子卒則其次長攝家主祭嫡孫以長幼齒無復殊制也又未聞今代為宗子服齊縗者然則嫡孫于古則有殊制于今則無異等今王侯有爵土者其所防與古無異重嫡之制不得不同至于大夫以下既與古禮異矣吉不統家凶則統喪考之情禮俱亦有違案律無嫡孫先諸父承財之文宜無承重之制通典八十八冰井賦嘉陰陽之博施兮美天道之廣宣萬物雜而無越兮不易類以相干或專陽負暑兮或固陰沍寒塗雖殊而同歸兮信協德而俱延于是孟冬之月群陰畢升霜雪紛其交淪兮流波結而成凌啓南墉之重隩兮將去熱以藏冰山人是取縣人是承納幽宮之邃宇兮靜恬淡以清澄抱堅精之玄素兮發川靈而長凝于是寒往暑來四時代序帝將攘患炎災是禦乃命有司啓彼潛戶寒風慘悴此焉清暑格炎靈之恣曜兮摧盛陽之暴怒弭和春之淒風兮遏溫夏之苦雨保百姓之艱難兮俾群生之寧處及至股肱或虧卿士殞喪寧神扇暑肅厲清涼用處凶禮無失典常美厚德之兼愛兮乃惠存以及亡爾乃攜我同類援我蒸徒將涉寒藪害氣是除攀靈艦而增舉爰自託于城隅仰瞻重構俯臨陰穴淒清驚冷觱發栗烈餘寒嚴悴淒若霜雪藝文類聚九初學記七接朱李于玄泉來甘瓜于清壽初學記二十八御覽九百六十八大槐賦并序大槐賦并序余去許都將歸洛京舍于嵩嶽之下而植斯樹焉遂作賦曰有殊世之奇樹生中嶽之重阿承蒼昊之純氣吸后土之柔嘉若夫赤松王喬馮夷之倫逍遙茂蔭濯纓其濱望輕霞而增舉垂高畼之清塵若其含真抱朴曠世所希降夏后之卑室作唐虞之茅茨潔昭儉以驕奢成三王之懿資故能著英聲于來世超群侶而垂暉仰瞻重幹俯察其陰逸葉橫被流枝蕭森下覆露沼上蔽高岑孤鵠徘徊寡雀悲吟清風時至惻愴傷心將騁軌以輕運安久留而涕淫藝文類聚八十八安石榴賦于時仲春垂澤華葉甚茂炎夏既戒忽乎零落是以君子居安思危在盛思衰可無懼哉乃作斯賦緑葉翠條紛乎蔥青丹華照爛曄曄熒熒遠而望之粲若摛繢被山阿迫而察之赫若龍燭耀緑波藝文類聚八十六御覽九百七意賦至理歸于渾一兮榮辱固亦同貫存亡既已均齊兮正盡死復何歎物咸定于無初兮俟時至而後驗若四節之素代兮豈當今之得遠且安有壽之與天兮或者情橫多戀宗統竟初不別兮大德亡其情願蠢動皆神之為兮癡聖惟質所建真人都遣穢纍兮性茫蕩而無岸縱驅于遼廓之庭兮委體乎寂寥之館天地短于朝生兮億代促于始旦顧瞻宇宙微細兮眇若豪鋒之半飄颻玄曠之域兮深莫畼而靡玩兀與自然竝體兮融液忽而四散晉書庾敳傳幽人針有物混成先天地生乃剖乃判二儀既分高卑以陳貴賤攸位榮辱相換乾道尚謙人神同符危由忽安溢緣釋虛苟識妙膏厥美有腴韓信耽齊殞首鍾室子房辭留高迹卓逸貴不足榮利不足希華繁則零樂極則悲歸數明白勢豈容違人徒知所以進而忘所以退穰侯安寵襄公失愛始乘夷道終嬰其類羲和升而就翳望舒滿而就虧盈挹之分自然之規悠悠庶人如何弗疑幽人守虛仰鑽玄遠敢草斯針敬咨黻冕藝文類聚三十六作庾凱當是寫刻誤上表諫遣齊王攸就國書稱帝堯克明俊德以親九族武王光有天下兄弟之國十有六人同姓之國四十人元勳睦親顯以殊禮而魯衛齊晉大啓土宇竝受分器所謂惟善所在親疏一也大晉龍興隆唐周之遠迹王室視屬佐命功臣咸受爵土而四海乂安今吳會已平詔大司馬齊王出統方嶽當遂撫其國家將準古典以垂永制昔周之選建明德以左右王室也則周公為太宰康叔為司寇聃季為司空及召芮畢毛諸國皆入居公卿大夫之位明股肱之任重守地之位輕也未聞古典以三之重出事之國者漢氏諸侯王位尊勢重在丞相三公上其入讚朝政者乃有兼官其出之國亦不復假台司虛名為隆寵也昔申無宇曰五大不在邊先儒以為貴寵公子公孫纍世正卿也又曰五細不在庭先儒以為賤妨貴少陵長遠閒親新閒舊小加大也不在庭不在朝廷為政也又曰親不在外羇不在內今棄疾在外鄭丹在內君其少戒之叔向有言公室將卑其枝葉先落公族公室之本而去之諺所謂芘焉而縱尋斧柯者也今使齊王賢邪則不宜以母弟之親尊居魯衛之常職不賢邪不宜大啓土宇表見東海也古禮三公無職坐而論道不聞以方任嬰之惟周室大壞宣王中興四夷交侵救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸宰相不得久在外也今天下已定六合為家將數延三事與論太平之基而更出之去王城二千里違舊章矣晉書庾專傳齊王攸之就國也下禮官議崇錫之物敷與博士太叔廣劉暾繆蔚郭頤秦秀傅珍等上表諫曰云庾亮讓中書監表臣亮言臣凡庸固陋少無撿操昔以中州多故舊邦喪亂隨侍先臣遠庇有道爰客逃難求食而已不悟徼時之福遭遇嘉運先帝龍興乘異常之顧既眷同國士又申之婚姻遂階親寵纍忝非服弱冠濯纓沐浴玄風頻繁省闥出總六軍十餘年閒位超先達無勞被遇無與臣比小人祿薄福過災生止足之分臣所宜守而偷榮昧進日爾一日謗讟既集上塵聖朝始欲自聞而先帝登遐區區微誠竟未上達陛下踐阼聖政維新宰輔賢明庶寮咸允康哉之歌實在至公而國恩不已復以臣領中書臣領中書則示天下以私矣何者臣于陛下后之兄也姻婭之嫌實與骨肉中表不同雖太上至公聖德無私然世之喪道有自來矣悠悠六合皆私其姻者也人皆有私則謂天下無公矣是以前後二漢咸以抑后黨安進婚族危向使西京七族東京六姓皆非姻黨各以平進縱不悉全決不盡敗今之盡敗更由姻昵臣歷觀庶姓在世無黨于朝無援于時植根之本輕也薄也苟無大瑕猶或見容至于外戚憑託天地勢連四時根援扶疏重矣大矣而財居權寵四海側目事有不允罪不容誅身既招殃國為之弊其故何邪直由婚媾之私群情之所不能免故率其所嫌而嫌之于國是以疏附則信姻進則疑疑積于百姓之心則禍成重闥之內矣此皆往代成鑒可為寒心者也夫萬物之所不通聖賢因而不奪冒親以求一才之用未若防嫌以明公道今以臣之才兼如此之嫌而使內處心膂外總兵權以此求治未之聞也以此招禍可立待也雖陛下二相其愚款朝士百寮頗識其情天下之人何可門到戶說使皆坦然邪夫富貴寵榮臣所不能忘也刑罰貧賤臣所不能甘也今恭命則愈違命則苦臣雖不達何事背時違上自貽患責邪實仰覽殷鑒量已知弊身不足惜為國取悔是以悾悾屢陳丹款而微誠淺薄未垂察諒憂惶屏營不知所厝以臣今地不可以進明矣且違命已久臣之罪又積矣歸骸私門以待刑書願陛下垂天地之鑒察臣之愚則雖死之日猶生之年矣文選晉書庾亮傳讓封永昌縣公表觀聖賢之于名爵敬戒之甚重豈先哲宜重之于古而聖朝可輕之于今邪譬猶回太陽以消湛露運滄海以灌燎火其功易成其事易立藝文類聚五十一薦翟陽郭翻表蓋聞舉逸拔幽帝王之高士旌德禮賢治道之所先是以西伯摽渭濱之伏而帝基以隆漢高延商洛之隱而王道以固仄陋無明之稱空谷廢白駒之詠恐千里之足屈于槽櫪之下贊世之才委于壟畝之閒若解其巾褐服以纓冕必能奮贊皇極敷訓彝倫藝文類聚五十三上疏乞骸骨臣凡鄙小人才不經世階緣戚屬纍忝非服叨竊彌重謗議彌興皇家多難未敢告退遂牒展轉便煩顯任先帝不預臣參侍醫藥登遐顧命又豫聞後事豈云德授蓋以親也臣知其不可而不敢逃命實以田夫之交猶有寄託況君臣之義道貫自然哀悲眷戀不敢違距且先帝謬顧情同布衣既今恩重命輕遂感遇忘身加以陛下初在諒暗先后親覽萬機宣通外內臣當其地是以激節驅馳不敢依違雖知無補志以死報而才下位高知進忘退乘寵驕盈漸不自覺進不能撫寧外內退不能推賢宗長遂使四海側心謗議沸騰祖約蘇峻不堪其憤縱肆凶逆事由臣發社稷傾覆宗廟虛廢先后以憂逼登遐陛下旰食踰年四海哀惶肝腦塗地臣之招也臣之罪也朝廷寸斬之屠戮之不足以謝祖宗七廟之靈臣灰身滅族不足以塞四海之責臣負國家其罪莫大實天所不覆地所不載陛下矜而不誅有司縱而不戮自古及今豈有不忠不孝如臣之甚不能伏劍北闕偷存視息雖生之日亦猶死之年朝廷復何理齒臣于人次臣亦何顏自次于人理臣欲投草澤思愆之心也而明詔謂之獨善其身聖旨不垂矜察所以重其罪也願陛下覽先朝謬授之失雖垂寬宥全其首領猶宜棄之任其自存自沒則天下粗知勸戒之綱矣晉書庾亮傳請放黜陶夏疏斌雖醜惡罪在難忍然王憲有制骨肉至親親運刀鋸以刑同體傷父母之恩無惻隱之心應加放黜以懲暴虐晉書陶侃傳侃薨夏為世子送侃喪還長沙夏弟斑先往長沙悉取國中器仗財物夏至殺斑亮上疏請留庾懌監秦州疏懌御衆𥳑而有惠州戶雖小賴其寬政佐等同惡大數不多且懌名號大不可以小故輕議進退其文武之心轉已安定賊帥艾秀遣使歸誠上洛附賊降者五百餘口冀一安穩無復怵惕晉書庾懌傳懌進監秦州氐羌諸軍事遣牙門霍佐迎將上妻子佐驅三百餘口亡入石季龍亮表上貶懌為建威將軍朝議欲召還亮上疏謀開復中原疏蜀胡二寇凶虐滋甚內相誅鋤衆叛親離蜀甚弱而胡尚強竝佃竝守修進取之備襄陽北接宛許南阻漢水其險足固其土足食臣宜移鎮襄陽之石城下并遣諸軍羅布江沔比及數年戎士習練乘釁齊進以臨河洛大勢一舉衆知存亡開反善之路宥逼脅之罪因天時順人情誅逋逆雪大恥實聖朝之所先務也願陛下許其所陳濟其此舉淮泗壽陽所宜進據臣輒𥳑練部分乞槐棘參議以定經略晉書庾亮傳斬陶稱上疏案稱大司馬侃之孽子父亡不居喪位荒耽于酒昧利偷榮擅攝五郡自謂監軍輒召王官聚之軍府故車騎將軍劉弘曾孫安寓居江夏及將楊恭趙韶竝以言色有忤稱放聲當殺安恭懼自赴水而死韶于獄自盡將軍郭開從稱往長沙赴喪稱疑開附其兄弟乃反縛懸頭于帆檣仰而彈之鼓棹渡江二十餘里觀者數千莫不震駭又多藏匿府兵收坐應死臣猶未忍直上且免其司馬稱肆縱醜言無所顧忌要結諸將欲阻兵搆難諸將惶懼莫敢酬答由是奸謀未即發露臣以侃勳勞王室是以依違容掩故表為南中郎將與臣相近思欲有以匡救之而稱豺狼愈甚發言激切不忠不孝莫此之甚苟利社稷義有專斷輒收稱伏法晉書陶侃傳皇子出後告廟議案禮大事則告祖禰小事則特告禰今皇子出嗣宜告禰廟宋書禮志四武昌開置學官教人情重交而輕賖好逸而惡勞學業致苦而祿答未厚由捷徑者多故莫肯用心洙泗邈遠風雅彌替後生放任不復憲章典謨臨官宰政者務目前之治不能間以典誥遂令詩書荒塵頌聲寂漠仰瞻俯省能弗歎慨自胡夷交侵殆三十年矣而未革面嚮風者豈威武之用盡抑文教未洽不足綏之邪昔魯秉周禮齊不敢侮范會崇典晉國以治楚魏之君皆阻帶山河憑城據漢國富民殷而不能保其強大吳起屈完所以為歎也由此言之禮義之固孰與金城湯池季路稱攝乎大國之閒加之以師旅因之以饑饉為之三年猶欲行其義方況今江表晏然王道隆盛而不能弘敷禮樂敦明庠序其何以訓彝倫而來遠人乎魏武帝于馳騖之時以馬上為家逮于建安之末風塵未弭然猶留心遠覽大學興業所謂顛沛必于是真通才也今使三時既務五教竝修軍旅已整俎豆無廢豈非兼善者哉便處分安學校處所籌量起立講舍參佐大將子弟悉令入學吾家子弟亦令受業四府博學識義通涉文學經綸者建儒林祭酒使班同三署厚其供給皆妙選邦彥必有其宜者以充此舉近臨川臨賀二郡竝求修復學校可下聽之若非束修之流禮教所不及而欲階緣免役者不得為生明為條制令法清而人貴又繕造禮器俎豆之屬將行大射之禮宋書禮志一通典五十三
