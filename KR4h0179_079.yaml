body:
  text: 秦秀上言王濬位號自大晉啓祚輔國之號率以舊恩此為王濬無功之時受九列之顯位立功之後更得寵人之辱號也四海視之孰不失望蜀小吳大平蜀之後二將皆就加三事今濬還而降等天下安得不惑乎吳之未亡也雖以三祖之神武猶躬受其屈以孫皓之虛名是以驚動諸夏每一小出雖聖心知其垂亡然中國輒懷惶怖當爾時有借天子百萬之衆平而有之與國家結兄弟之交臣恐朝野實皆甘之耳今濬舉蜀漢之卒數旬而平吳雖舉吳人之財寶以與之本非已分有焉而據與計校乎晉書秦秀傳王濬有平吳之勳而為王渾所譖毀以為輔國大將軍天下咸為之怨秀乃上言何曾諡議故太宰曾雖階世族之胤而少以高亮嚴肅顯登王朝事親有色養之名在官奏科尹之模此二者實得臣子事上之概然資性驕奢不循軌則朝野之論不可具言詩云節彼南山惟石巖巖赫赫師尹民具爾瞻言其德行高峻動必以禮耳丘明有言儉德之恭也侈惡之大也大晉受命勞謙隱約曾受寵二代顯赫纍世暨乎耳順之年身兼三公之位食大國之租荷保傅之貴秉司徒之均二子皆金貂卿校列于帝側方之古人責深負重雖舉門盡死猶不稱位而乃驕奢過度名被九域行不履道而享位非常有生之民咸怪其行以古義言之非惟失輔相之宜違斷金之利也穢皇代之美棄羔羊之節壤人倫之教生天下之醜示後生之傲莫大于此自近世以來宰臣輔相未有受垢辱之聲被有司之劾父子塵纍而蒙恩貸若曾者也周公弔二季之陵遲哀大教之不行于是作諡以紀其終曾參奉之啓手歸全易簀而沒蓋明慎終死而後已齊之史氏亂世陪臣耳猶書君賊纍死不懲況于皇代守典之官敢畏強盛而不盡禮管子有言禮義廉恥是謂四維四維不張國乃滅亡宰相大臣人之表儀若生極其情死又無貶是則帝室無政刑也王公貴人復何畏哉所謂四維復何寄乎謹案諡法名與實爽曰繆怙亂行曰醜曾之行已皆與此同宜諡為繆醜公古人闔棺之日然後誄行不以前善沒後惡也晉書秦秀傳又群書治要二十九引晉書又御覽五百六十二引干寶晉紀王昌前母服議案議者以禮無前妻之名依名絶之不為之服斯乃是也今兄弟不同居而各以路人相遇其母恐一體之愛從此絶矣古人之為未必案文唯稱情耳以為二母之子宜各相事皆如所生雖無成典期于相睦得禮意也若前妻之子不勝母之哀來言曰我母自盡禮于事夫為夫先祖所歆享為父志所嘉為人倫所欽敬便迎父喪歸于舊塋以其母祔矣則後妻之子寧可以據儒者之言以距之邪禮二妾之子父命令相慈養而使有三年之恩便同所生矣昌父何義不令二嫡依此禮乎父之執友有如子之禮況事兄之母乎然禮無明制非末學者所敢用心必不得已與其意而絶之不若意而事之故以為昌宜追前母三年二母之祔以先後為敘晉書禮志中通典八十九賈充諡議充位冠群后惟民之望舍宗族弗授而以異姓為後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親邪但以義推之則無父子耳又案詔書自非功如太宰始封後如太宰所取必己自出如太宰不得以為比然則以外孫為後自非元功顯德不之得也天子之禮蓋可然乎絶父祖之血食開朝廷之禍門案諡法昏亂紀度曰荒充宜諡曰荒晉書秦秀傳又御覽五百六十二引干寶晉紀臨軒遣使宜作樂議臨軒遣使應作樂放案太始中皇太子冠太子進而樂作位定而樂止王者諸侯雖殊尊卑至于禮秩或有同者冠之與拜俱為嘉禮是以準昔儀注謂宜作樂今符云至尊受太子拜時無鐘磬之樂也通典七十一又一百四十七聘悼楊后時上表歷觀古今一族二后未嘗以全而受覆宗之禍乞以表事藏之宗廟若如臣之言得以免禍晉書楊珧傳奏請建同姓古者建侯所以藩衛王室今吳寇未殄方嶽任大而諸王為帥都督封國既各不臣其統內于事重非宜又異姓諸將居邊宜參以親戚而諸王公皆在京都非扞城之義萬世之固駮停馬隆將士勛賞議前精募將士少加爵命者此適所以為誘引今隆全軍獨剋西土獲安不得便以前授塞此後功宜皆聽許以明要信與傅咸書昨遣人相視受罰云大重以為怛然相念杖痕不耐風寒宜深慎護不可輕也當飲酒令體中常暖為佳蘇治瘡急痛故寄往之御覽六百五十引傅咸集又八百五十八蘇作酥又與傅咸書江海之流混混故能成其深廣也天下大器非可稍了而相觀每事欲了生子癡了官事官事未易了也了事正作癡復為快耳左丞總司天臺維正八坐此未易居以君盡性而處未易居之任益不易也想慮破頭故具有白晉書傅咸傳上書論楊氏王莽五公兄弟相代今楊氏三公並在位而天變屢見臣竊為陛下憂之晉書楊珧傳王昌前母服議臣以為禮不二嫡所以重正也非徒如前議者防妒忌而已故曰一與之齊終身不改未有遭亂而二嫡苟嫡不可以二則昌父更娶之辰即前母義絶之日固不待言而可知矣議者以昌父無絶遣之言尚為正嫡恐犯禮虧教難以示後案昌父既策名魏朝更納後室豈得懷舊君于江表存外妻于讎國乎非徒時政之所禁乃臣道所宜絶設使昌父尚存二妻俱在今始會同必不使兩妻專堂二嫡執祭同為之齊也以此驗之故知後嫡立宜前嫡廢也即使父有兩立之言猶將以禮正之況無遺命可以服乎溥以為宜如猛議晉書禮志中通典八十九太康元年尚書都令吏虞溥議駮卞粹議王昌前母服喪從寧戚謂喪事尚哀耳不使服非其親也夫死者終也終事己故無絶道分居兩存則離否由人夫婦以判合為義今土隔人殊則配合理絶彼己更娶代己安得自同于死婦哉伯夷讓孤竹不可以為後王法也且既以為嫡後服復云為妾生則或貶或離死則同祔于葬妻專一以事夫夫懷二以接已開偽薄之風傷貞信之教于以純化篤俗不亦難乎今昌二母雖土地殊隔據同時並存何得為前母後母乎設使昌母先亡以嫡合葬而前母不絶遠聞喪問當復相為制何服邪夫制不應禮動而愈失夫孝子不納親于不義貞婦不昧進而苟容今同前嫡于死婦使後妻居正而或廢于二子之心曾無恧乎而云誣父棄母恐此文致之言難以定臧否也禮違諸侯適天子不服舊君然則昌父絶前君矣更納後室廢舊妻矣又何取于宜誅宜撫乎且婦人之有惡疾乃慈夫之所愍也而在七出誠以人理應絶故也今夫婦殊域與無妻同方之惡疾理無以異據己更娶有絶前之證而云應服于義何居晉書禮志中移告屬縣學所以定情理性而積衆善者也情定于內而行成于外積善于心而名顯于教故中人之性隨教而移善積則習與性成唐虞之時皆比屋而可封及其廢也而云可誅豈非化以成俗教移人心者哉自漢氏失御天下分崩江表寇隔久替王教庠序之訓廢而莫修今四海一統萬里同軌熙熙兆庶咸休息乎太和之中宜崇尚道素廣開學業以讚協時雍光揚盛化晉書虞溥傳獎訓學徒詔文學諸生皆冠帶之流年盛志美始涉學庭講修典訓此大成之業立德之基也夫聖人之道淡而寡味故始學者不好也及至期月所觀彌博所習彌多耳聞所不聞目見所不見然後心開意朗敬業樂群忽然不覺大化之陶己至道之入神也故學之染人甚于丹青丹青吾見其久而渝矣未見久學而渝者也夫工人之染先修其質後事其色質修色積而染工畢矣學亦有質孝悌忠信是也君子內正其心外修其行行有餘力則以學文文質彬彬然後為德夫學者不患才不及而患志不立故曰希驥之馬亦驥之乘希顏之徒亦顏之倫也又曰鍥而舍之朽木不知鍥而不舍金石可虧斯非其效乎今諸生口誦聖人之典體間庠序之訓比及三年可以小成而令名宣流雅譽日新朋友欽而樂之朝士敬而歎之于是州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究奇使楊班韜筆仲舒結舌亦惟才所居固無常人也然積一勺以成江河纍微塵以崇峻極匪志匪勤理無由濟也諸生若絶人間之務心專親學纍一以貫之積漸以進之則亦或遲或速或先或後耳何滯而不通何遠而不至邪晉書虞溥傳御覽六百七又六百十三舉秀才對策策曰今海內一統萬里同風天下有道莫斯之盛然北有未羈之虜西有醜施之氐故謀夫未得高枕邊人未獲晏然將何以長弭斯患混清六合對曰臣聞聖人之臨天下也祖乾綱以流化順谷風以興仁兼三才以御物開四聰以招賢故勞謙日昃務在擇才宣明巖穴垂光隱滯俊乂龍躍帝道以光清德鳳翔王化克舉是以皋陶見舉不仁者遠陸賈重漢遠夷折節今聖朝德音發于帷幄清風翔乎無外戎旗南指江漢席卷于戈西征羌蠻慕化誠闡四門之秋興禮教之日也故髦俊聞聲而響赴殊才望險而雲集虛高館以俟賢設重爵以待士急善過于飢渴用人疾于應響杜佞諂之門廢鄭聲之樂混清六合實由乎此雖西北有未羈之寇殊漠有不朝之虜征之則勞師得之則無益故班固云有其地不可耕而食得其人不可臣而畜來則懲而禦之去則備而守之蓋安邊之術也又策曰吳蜀恃險今既蕩平蜀人服化無攜二之心而吳人趑睢屢作妖寇豈蜀人敦朴易可化誘吳人輕鋭難安易動乎今將欲綏靜新附何以為先對曰臣聞漢末分崩英雄鼎峙蜀棲岷隴吳據江表至大晉龍興應期受命文皇運籌安樂順軌聖上潛謀歸命自化蜀染化日久風教遂成吳始初附未改其化非為蜀人敦愨而吳人易動也然殊俗遠境風土不同吳阻長江舊俗輕悍所安之計當先籌其人士使雲翔閶闔進其賢才待以異禮明選牧伯致以威風輕其賦斂將順咸悅可以永保無窮長為人臣者也又策曰聖人稱如有王者必世而後仁今天成地平大化無外雖胸奴未羈羌氐驕黠將修文德以綏之舞干戚以來之故兵戈載戢武夫寢息如此已可消鋒刃為田器罷尚方武庫之用未邪對曰夫唐堯歷載頌聲乃作文武相承禮樂大同清一八紘綏蕩無外萬國順軌海內斐然雖復被髮之鄉徒跣之國皆習章甫而入朝要衣裳以磬折夫大舜之德猶有三苗之征以周之代獫狁為寇雖有文德又須武備備豫不虞古之善教安不忘危聖人常誡無為罷武庫之常職鑠鋒刃為佃器自何倒載干戈苞以獸皮將帥之士使為諸侯于散樂休風未為不泰也又策曰夫法令之設所以隨時制也時險則峻法以取平時泰則寬網以將化今天下太平四方無事百姓承德將就無為而乂至于律令有所損益不對曰臣聞五帝殊禮三王異教故或禪讓以光政或干戈以攻取至于興禮樂以和人流清風以寧俗其歸一也今誠風教大同四海無虞人皆感化去邪從正夫以堯舜之盛而猶設象刑殷周之隆而甫侯制律律令之存何妨于政若乃大道四達禮樂交通凡人修行黎庶勵節刑罰懸而不用律令存而無施適足以隆太平之雅化飛仁風乎無外矣又策曰昔帝舜以二八成功文王以多士興周夫制化在于得人而賢才難得今大統雖同宜搜才實州郡有貢薦之舉猶未獲出群卓越之倫將時無其人有而致之未得其理也對曰臣聞興化立法非賢無以光其道平世理亂非才無以宣其業上自皇羲下及帝王莫不張皇綱以羅遠飛仁風以被物故得賢則教興失人則政廢今四海一統萬里同風州郡貢秀孝臺府簡良才以八紘之廣兆庶之衆豈當無卓越俊逸之才乎譬猶南海不少明月之寶大宛不乏千里之駒也異哲難見遠數難覩故唐堯太平之化二八由舜而甫顯殷湯革王之命伊尹負鼎而方用當今聖朝禮亡國之士接遐裔之人或貂蟬于帷幄或剖符于千里巡狩必有呂公之遇宵夢必有巖穴之感賢俊之出可企踵而待也晉書華談傳上箋求退談聞霸主遠聽以求才為務僚屬量身以審已為分故疏廣告老漢宣不違其志干木偃息文侯就式其廬談無古人之賢竊有懷遠之慕自登清顯出入二載執筆無贊事之功拾遺無補闕之繢過在納言暗于舉善狂寇未賓復乏謀策年向七十志力日衰素飧無勞實宜辭退謹奉還所假左丞相軍咨祭酒版晉書華談傳遺顧榮等書石冰之亂朝廷録敏微功故加越次之禮授以上將之任庶有韓盧一噬之效而本性凶狡素無識達貪榮干運逆天而動阻兵作威盜據吳會內用凶弟外委軍吏上負朝廷寵授之榮下孤宰輔過禮之惠天道伐惡人神所不祐雖阻長江命危朝露忠節令圖君子高行屈節附逆義士所恥王蠋匹夫志不可屈于期慕義隕首燕庭況吳會仁人並受國寵或剖符名郡或列為近臣而便辱身姦人之朝降節逆叛之黨稽顙屈膝不亦羞乎昔龔勝絶粒不食莽朝魯連赴海恥為秦臣君子義行同符千載遙度雅量豈獨是安昔吳之武烈稱美一代雖奮奇宛葉亦受折襄陽討逆雄氣志存中夏臨江發怒命訖丹徒賴先王承運雄謀人挺尚內倚慈母仁明之教外杖子布廷爭之忠又有諸葛顧步張朱陸全之族故能鞭笞百越稱制南州然兵家之興不出三世運未盈百歸命入臣今以陳敏倉部令史七第頑𤕠六品下才欲攝桓王之高蹤蹤蹈大皇之絶軌遠度諸賢猶當未許也諸君垂頭不能建翟義之謀而顧生俯眉已受羈絆之辱皇輿東軒行即紫館百僚垂纓雲翔鳳關廟勝之模潛運幃幄然後發荊州武旅順流東下徐州鋭鋒南據堂邑征東徑卒耀威歷陽飛越橫江之津泛舟涉瓜步之渚威震丹陽擒寇建業而諸賢何顏見中州之士邪小寇隔津音符道闊引領南望情存舊懷忠義之人何世蔑有夫危而不能安亡而不能存將何貴乎永長宿德情所素重彥先垂髮分著金石公胄早交恩紀特隆今伯義聲清好密結上欲與諸賢效翼紫宸建功帝籍如其不爾亦可泛舟河渭擊楫清歌何為辱身小寇之手以蹈逆亂之禍乎昔為同志今已殊域往為一體今成異身瞻江長歎非子誰思願圖良策以存嘉謀也晉書陳敏傳移前松滋令袁甫誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非高祖不長揖孔明躬耕南陽非劉氏不馳驅望雲霄而偶翮見鴻漸之輕羽瞻長塗而高鳴知騏驥之迅足御覽五十七又四百七並引晉中興書對別駕陳總問刺史嵇紹舉談秀才將行別駕陳總餞之因問曰思賢之主以求才為務進取之士以功名為先何仲舒不仕武帝之朝賈誼失分漢文之時此吳晉之滯論可辨此理而後別談曰夫聖人在上物無不理百揆之職非賢不居故山林無匿景衡門不棲遲至承統之王或是中才或復凡人居聖人之器處兆庶之上是以其教日頽風俗漸弊又中才之君所資者偏物以類感必于其黨黨言雖非彼以為是以所授有顏冉之賢所用有廟廊之器居官者日冀元凱之功在上者日冀堯舜之義彼豈知其政漸毀哉朝雖有求賢之名而無知才之實言雖當彼以為誣策雖奇彼以為妄誣則毀己之言入妄則不忠之責生豈故為哉淺明不見深理近才不覩遠體也是以言不用計不施恐死亡之不暇何論功名之立哉故上官昵而屈原放宰嚭寵而伍員戮豈不哀哉若仲舒抑于孝武賈誼失于漢文蓋復是其輕者耳故白起有云非得賢之難用之難非用之難信之難得賢而不能用用而不能信功業豈可得而成哉晉書華談傳尚書二曹論劉道貞問嶭令長在吳何官答曰為吏部尚書問曰吳待吏部如何餘曹答曰並通高選吏部特一時之俊劉曰晉魏以來俱爾獨謂漢氏重賊曹為是吳晉重吏部為非辥君曰八座秩同班等其選並清宜同一揆若人才或多或少選例難精如不得已吏部職掌人物人物難明謂吳晉為得而君何是古而非今劉難曰今吏部非為能判虛名舉沈朴者故録以成人位處三署選曹探卿論而用之耳無煩乎聰明賊曹職典刑獄刑難精是以欲重之答曰今之賊曹不能聽聲觀色以別真偽繇不能斷讞之尚書也夫在獄者率小人在朝者率君子小人易檢君子難精俱不得已吏部宜重賊曹宜輕也通典二十三引華談集新論夫體道者聖遊神者哲體道然後寄意形骸之外遊神然後窮變化之端故寂然不動而萬物為我用塊然元默而衆機為我運初學記十七
