body:
  text: 卷一百五十六李特改辛冉購募榜文能送六郡之豪李在閻趙楊上官及氐叟侯王一首賞百匹晉書載紀李特傳又十六國春秋七十六李雄復張駿書吾過為士大夫所推然本無心于帝王也進思為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室陵遲德聲不振引領東望有年月矣會獲來貺情在暗室有何巳巳知欲遠遵楚漢尊崇義帝春秋之義于斯莫大晉書載紀李雄傳張駿遣使遺雄書勸去尊號稱藩于晉雄復書云云又十六國春秋七十七李壽將入寇下書吳會遺燼久逋天誅今將大興百萬躬行天罰十六國春秋七十八李宏自趙還下令羯使來庭獻其楛矢晉書載紀石虎傳上又十六國春秋十六報龔壯省詩知意若今人所作賢哲之話言古人所作死鬼之常辭耳魏書李壽傳龔壯作詩七首託言應璩以諷壽壽報李勢降文偽嘉寧二年三月十七日略陽李勢叩頭死罪伏惟大將軍節下先入播流恃險因釁竊有汶蜀勢以暗弱復統末緒偷安荏苒未能改圖猥煩朱軒踐冒險阻將士狂愚干犯天威仰慚俯愧精魂飛散甘受斧鑕以釁軍鼓伏惟大晉天綱恢弘澤及四海恩過陽日逼迫倉卒自投草野即日到白水城謹遣私署散騎常侍王幼奉箋以聞并敕州郡投戈釋杖窮池之魚待命漏刻晉書載紀李劫傳又十六國春秋七十八閻式上疏定班位夫為國制法動尚仍舊漢晉故事惟太尉大司馬執兵太傅太保父兄之官論道之職司空司徒掌五教九土之差秦置丞相總領萬機漢武之末越以大將軍統政今國業初建凡百未備諸公大將班位有差降而競請施置不與典故相應宜立制度以為楷式晉書載紀李雄傳又見十六國春秋八十復羅尚書辛冉傾巧曾元小豎李叔平非將佐之才彧前為節下及杜景文論流徙之宜人懷桑梓孰不願之但往日初至隨穀傭賃一室五分復值秋潦乞須冬熟而信用讒搆終不見聽繩之大過窮鹿抵虎流民不肯延項受刃以致為變即聽彧言寬使治嚴不過去秋九月盡集十月進道今還鄉里何有如此也十六國春秋七十六龔壯上李壽封事臣聞陰有德必有陽報故于公理獄高門待封伏惟獻皇帝寬仁厚惠宥罪甚衆靈德洪洽誕鍾陛下陛下天性忠篤受遺建節志齊周霍誠貫神明而志緒違理顛覆顧命管蔡既興讒諛滋蔓大義滅親撥亂反正上指星辰昭告天地歃血盟衆舉國稱藩天應人悅白魚登舟霆震助威烈風順義神人允畼日月光明而論者未諭權時定制今淫雨泛濆重向百日禾嫁損傷加之飢疫百姓愁望或者天以監示陛下又前日之舉止以救禍陛下至心本無大圖而今久不變天下之人誰復分明知陛下本心者哉且玄宮之讖難知而盟誓顧違一旦疆埸有急內外騷動不可不深思長久之策永為子孫之計也愚謂宜尊前盟誓結援吳會以親天子彼必崇重封國歷世雖降階一等永為靈德宗廟相承福祉無窮君臣銘勳于上生民寧息于下通天下之高理弘信慎之美義垂拱南面歌詩興禮上與彭韋爭美下與齊晉抗德豈不休哉論者或言二州附晉必榮六郡人事之不便昔豫州入蜀荊楚人貴公孫述時流民康濟及漢征蜀殘民大半鍾鄧之役放兵大掠誰復別楚蜀者乎論者或不達安固之基惜其名位在昔諸侯自有卿相司徒司空宋魯皆然及漢藩王亦有丞相今義歸彼但當崇重豈當減削昔劉氏郡守令長方仕州郡者國亡主易故也今日義舉主榮臣賴寧可同日而論也論者又謂臣當為法正陛下覆臣如天養臣如地恣臣所安至于名榮漢晉不處臣復何為當侔法正論者或言晉家必責質任及徵兵代胡何以應之案晉不煩尺兵一國來附威卷四海廣地萬里何任之責胡之在北亦此之憂今平居有東北之虞縱令徵兵但援漢川猶差二門耳臣附託深重忘疾病之穢實感殊遇冀以微言少補明時常懼殞歿不寫愚心辜負恩顧謹進悾悾伏願罪戮華陽國志九又見十六國春秋七十八赫連勃勃築統萬城下書古人制起城邑或因山水或以義立名今城都己建萬堵斯作克成弗遠宜月美名朕方統一天下君臨萬邦可以萬為名十六國春秋六十六下書改姓疆連氏朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也古人氏族無常或以因生為氏或以王父之名朕將以義易之夫帝王者係天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意永享無疆大慶係天之尊不可令支庶同之其非正統皆以鐵伐為氏庶朕宗族子孫剛鋭如鐵皆堪伐人晉書載紀赫連勃勃傳又十六國春秋六十六大夏龍雀刀銘古之利器吳楚淇盧大夏龍雀名冠神都可以懷遠可以柔逋如風靡草威服九區水經河水注三刀劍録晉書載紀赫連勃勃傳又十六國春秋六十六與沮渠蒙遜盟文自金晉數終禍纏九服趙魏為長蛇之墟秦隴為豺狼之穴二都神京鞠為茂草蠢爾群生罔知憑賴上天悔禍運屬二家封疆密邇道會義親宜敦和好弘康世難爰自終古有國有家非盟誓無以昭神祗之心非斷金無以定終始之好然晉楚之成吳蜀之約咸口血未乾而尋背之今我二家契殊曩日言未終而有篤愛之心音一交而懷傾蓋之顧息風應之警同克濟之誠戮力一心共濟六合若天下有事則雙振義旗區域既清則並敦魯衛夷險相赴交易有無爰及子孫永崇斯好晉書載紀赫連勃勃傳又十六國春秋六十六胡義周統萬城功德銘夫庸大德盛者必建不刊之業道積慶隆者必享無疆之祚昔在陶唐數終厄運我皇祖大禹以至聖之姿當經綸之位鑿龍門而闢伊闕疏三江而決九河夷一元之窮災拯六合之沈溺鴻績侔于天地神功邁于造化故二儀降祉三靈叶贊揖讓受終光啓有夏傳世二十歷載四百賢辟相承哲王繼軌徽猷冠于玄古高範煥乎疇昔而道無常夷數或屯險王桀不綱綱漏殷氏用使金暉絶于中天神轡輟于促路然純曜未渝慶綿萬祀龍飛漠南鳳峙朔北長轡遠馭則西罩崑山之外密綱遐張則東緪滄海之表爰始逮今二千餘載雖三統迭制于崤函五德革運于伊洛秦雍成篡弒之墟周豫為爭奪之藪而朔謐爾主有常尊于上海代晏然物無異望于下故能控弦之衆百有餘萬躍馬長驅鼓行秦趙使中原疲于奔命諸夏不得高枕為日久矣是以偏師暫擬經陽摧隆周之鋒赫斯一奮平陽挫漢祖之鋭雖霸王繼蹤猶朝日之升扶桑英豪接踵若夕月之登濛汜自開闢已來未始聞也非夫卜世與乾坤比長鴻基與山嶽齊固孰能本枝于千葉重光于萬祀履寒霜而踰榮蒙重氛而彌耀者哉于是玄符告徵大猷有會我皇誕命世之期應天縱之運仰協天休俯順時望龍升北京則義風蓋于九區鳳翔天域則威聲格于八表屬姦雄鼎峙之秋當群凶嶽立之際昧旦臨朝日旰忘膳運籌命將舉無遺策親御六戎則有征無戰故偽秦以三世之資喪魂于關隴河源望旗而委質北虜欽風而納款德音著于柔服威刑彰于伐叛文教與武功並宣俎豆與干戈俱運五稔之間道風弘著暨乎七載而王猷允洽乃遠惟周文啓經始之基近詳山川究形勝之地遂營起都城開建京邑背夕山而面洪流左河津而右重塞高隅隱日崇墉際雲石郭天池周綿千里其為獨守之形險絶之狀固以遠邁于咸陽超美于周洛若乃廣五郊之義尊七廟之制崇左社之規建右稷之禮御太一以繕明堂模帝座而露寢閶闔披霄而山亭象魏排虛而嶽峙華林靈沼崇臺祕室通房連閣馳道苑園可以蔭映萬邦光覆四海莫不鬱然並建森然畢備若紫微之帶皇穹閬風之跨后土然宰司鼎臣群黎士庶僉以為重威之式有闕前王于是延王爾之奇工命班輸之妙匠搜文梓于鄧林採繡石于恆嶽九域貢以金銀八方獻其瓌寶親運神奇參制規矩營離宮于露寢之南起別殿于永安之北高搆千尋崇基萬仞玄棟鏤榥若騰虹之揚眉飛簷舒咢似翔鵬之矯翼二序啓矣而五時之坐開四隅陳設而一御之位建溫宮膠葛涼殿崢嶸絡以隋珠綷以金鏡雖曦望互升于表而中無晝夜之殊陰陽迭更于外而內無寒暑之別故善目者不能為其名博辨者不能究其稱斯蓋神明之所規模非人工之所經制若乃尋名以求類迹狀以效真據質以究名形疑妙出雖如來須彌之寶塔帝釋刀利之神宮尚未足以喻其麗方其飾矣昔周宣考室而詠于詩人閟宮有侐而頌聲是作況乃太微肇制清都啓建軌一文昌舊章惟始咸秩百神賓享萬國群生開其耳目天下詠其來蘇亦何得不播之管弦刊之金石哉乃樹銘都邑敷讚碩美俾皇風振于來葉聖庸垂乎不朽其辭曰於赫靈祚配乾比隆巍巍大禹堂堂聖功仁被蒼生德格玄穹帝錫玄圭揖讓受終哲王繼軌光闡徽風道無常夷數或不競金精南邁天輝北映靈祉踰昌世業彌盛惟祖惟父克廣休命如彼日月連光接鏡玄符瑞德乾運有歸誕鍾我后應圖龍飛落落神武恢恢聖姿名教內敷群妖外夷化光四表威截九圍封畿之制王者常經乃延輸爾肇建帝京土苞上壤地跨勝形庶民子來不日而成崇臺霄峙秀闕雲亭千榭連隅萬閣接屏晃若晨曦昭如列星離宮既作叩宇云施爰構崇明仰準乾儀懸甍風閲飛軒雲垂溫室嵯峨層城參差楹雕虬獸節鏤龍螭瑩以寶璞飾以珍奇稱因褒著名由實揚偉哉皇室盛矣厥章義高靈臺美隆未央邁軌三王貽則霸王永世重範億載彌光晉書載紀赫連勃勃傳又十六國春秋六十九
