body:
  text: 卷五十二傅咸議立二社表祭法王社太社各有其義天子尊事宗廟故冕而躬耕躬耕也者所以重孝享之粢盛致殷薦于上帝也穀梁傳曰天子親耕以供粢盛親耕故自報自為立社者為籍田而報者也國以人為本人以穀為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈籍田秋而報之也其論太社則曰王者布下圻內為百姓立之謂之太社不自立之于京都也景侯此論據祭法祭法大夫以下成群立社曰置社景侯解曰今之里社是也景侯解祭法則以置社為人間之社矣而別論復以太社為人間之社未曉此旨也太社天子為民而祀故稱天子社郊特牲曰天子太社必受霜露風雨以群姓之衆王者通為立社故稱太社也若夫置社其數不一蓋以里所為名左氏傳盟于清丘之社是也衆庶之社既已不稱太矣若復不立之京師當安所立乎祭法又曰王為群姓立七祀王自為立七祀言自為者自為而祀也為群姓者為群姓而祀也太社與七祀其文正等說者窮此因云墳籍但有五祀無七祀也案祭五祀國之太祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯解大厲曰如周杜伯鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為解而欲以口論除明文如此非但二社當是思惟景侯之後解亦未易除也前被敕尚書召誥乃社于新邑惟一太牢不立二社之明義也案郊特牲曰社稷太牢必援一牢之文以明社之無二則稷無牲矣說者則曰舉社則稷可知苟可舉社以明稷何獨不舉一以明二國之大事在祀與戎若有過而除之不若過而存之況存之有義而除之無據乎周禮封人掌設社壝無稷字今帝社無稷蓋出于此然國主社稷故經傳動稱社稷周禮王祭社稷則絺冕此王社有稷之文也封人設社壝之無稷字說者以為略文從可知也謂宜仍舊立二社而加立帝社之稷晉書禮志上宋書禮志四通典四十五太康九年詔曰社實一神其并二社之禮于是車騎司馬傅咸表重表駮成粲議太社如粲之論景侯之解文以此壞大雅云乃立冢土毛公解曰冢土大社也景侯解詩即用此說禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各割其方色土者覆四方也如此太社復為立京都也不知此論何從而出而與解乖上違經記明文下壞景侯之解臣雖頑蔽少長學門不能默已謹復續上晉書禮志上宋書禮志四通典四十五時成粲議稱景侯論太社不立京都欲破鄭氏學咸重表以為遷尚書左丞上表左丞職輕事重以賤制貴所以難居臣以暗劣猥忝斯任愧于不稱懼罪之及夙夜惶恐寢食無寧御覽二百十三理李含表臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風雖以此不能協和流俗然其名行峻厲不可得掩二郡竝舉孝廉異行尚書郭奕臨州含寒門少年而奕超為別駕太保衛瓘辟含為椽每語臣曰李世容當為晉匪躬之臣秦王之薨悲慟之哀感于人心百僚會喪皆所目見也今以含俯就王制如令除服葬後十七日乃親中正職時議謂之背戚居榮奪其中正而復閡于天子之喪既葬而除便云天朝殊尊援以為準非所宜言若天朝之喪既葬不除藩國之喪既葬而除藩國欲同不除乃當責云天朝殊尊援以為準非所宜言耳今天朝釋乎上而欲令藩國服乎下此為藩國之義隆而天朝之禮薄未諭此旨也又云諸王公皆終喪禮寧盡乃敘明以喪制宜隆務在敦重也夫寧盡乃敘明以哀其病耳異于天朝制使終喪未見斯文國制既葬而除既除而祔爰自漢魏迄乎聖晉皆所共行文皇帝升遐武帝崩殂世祖過哀陛下毀頓銜疚諒暗以終三年率土臣妾豈無攀慕遂服之心實以國制不可而踰故于既葬不敢不除天王之喪釋除于上藩國之臣獨遂于下此甚不可安復以秦王無後含應為喪主既使含應為喪主于今之制既葬應除而祔則應吉服以祭因曰王未有廟主無所遷不應除服秦王始封無所連祔靈主所居即便為廟不問國制云何而以無廟為貶含也以含今日之所行移博士使案禮文必也放勛之殂四海遏密八音至于三載世祖之崩曾不數旬釋然即吉引古繩今闔世皆應有貶何但李含不應除服今也無貶王制故也聖上諒暗哀聲不輟股肱近侍猶宜心喪不宜便行婚娶歡樂之事而莫云者豈不以大制不可而曲邪且前以含有王喪上請差代尚書敕王葬日在近葬訖含應攝職不聽差代葬訖含猶躊躇不時攝職司徒屢摘罰訪問以踧含含乃視事含承天臺之敕逼司徒之符然後攝職含之適職隨而擊之此為臺敕府符陷含于惡也若謂臺敕府符為傷教義則當據正不正符敕而唯含是貶含之困躓何足惜乎國制不可偏耳又含自以隴西之人雖戶屬始平非所綜悉自初見使為中正反覆言之司徒說非始平國人不宜為中正後為郎中令又自以選官引臺府為比以讓常山太守蘇韶辭意懇切形于文墨含之固讓乃在王未薨之前葬後躊躇窮于對罰而攝職耳臣從弟祗為州都意在欲隆風教議含已過不良之人遂相扇動冀挾名義法外致案足有所邀中正龐騰便割含品臣雖無祁大夫之德見含為騰所侮不勝其憤謹表以聞乞朝廷以時博議無令騰得濫行刀尺晉書李含傳秦王柬薨李含依臺議葬訖除喪趙浚奏含不應除喪傅咸上表理含又見通典八十八又言臣以國之大制不可而偏秦國郎中令李含承尚書之敕奉喪服之命既葬除服而中正龐騰無所據仗貶含品三等謂此未值漢魏以來施行之制具以表聞未嘗朝廷當云何騰等之論以秦王無後前又有詔以此謂含不應除服愚謂諸侯之制不得異于天朝就秦王有嗣于制亦自應除且秦王無後乃前有詔朝野莫不聞知而尚書下敕葬訖含自應攝職不應差代尋舉為臺郎又司徒摘罰訪問催含攝職如此臺府亦皆謂含既葬應除也相是純臣群臣之首奏令含釋服亦無餘疑至于含除便獨為罪竊謂有負于情臣之任事小大欲盡使在優崇況國之大制當垂將來心所不安而不敷寫謹重以聞乞中書見諾猶百慮當一得也通典八十八攝司隸上表臣既駑弱不勝重任加在哀疚假息日闋陛下過意授非所堪披露丹款歸窮上聞謬詔既往終然無改臣雖不能滅身以全禮教義無靦然虛忝隆寵前受嚴詔視事之日私心自誓隕越為報以貨賂流行所宜深絶切敕都官以此為先而經彌日月未有所得斯由陛下有以獎厲慮于愚戇將必死繫故自掩檢以避其鋒耳在職有日既無赫然之舉又不應弦垂翅人誰復憚故光祿大夫劉毅為司隸聲震內外遠近清肅非徒毅有王臣匪躬之節亦由所奏見從威風得伸也晉書傅咸傳表涼州民從軍之物先辦然後作衣御覽六百九十八上言宜省官務農陛下處至尊之位而修布衣之事親覽萬機勞心日昃在昔帝王躬自菲薄以利天下未有踰陛下也然泰始開元以暨于今十有五年矣而軍國未豐百姓不贍一歲不登便有菜色者誠由官衆事殷復除猥濫蠶食者多而親農者少也臣以頑疏謬忝近職每見聖詔以百姓饑饉為慮無能云補伏用慚恧敢不自竭以對天問舊都督有四今竝監軍乃盈於十夏禹敷土分為九州今之刺史幾向一倍戶口比漢十分之一而置郡縣更多空校牙門無益宿衛而虛立軍府動有百數五等諸侯復坐置官屬諸所寵給皆生于百姓一夫不農有受其飢今之不農不可勝計縱使五稼普收僅足相接暫有災患便不繼贍以為當今之急先并官省事靜事息役上下用心惟農是務也晉書傅咸傳上書請詰奢臣以為穀帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚于天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤隸乘輕驅肥古者人稠地狹而有儲蓄由于節也今者土廣人稀而患不足由于奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣晉書傅咸傳上書云云御覽二百十四作表上書陳選舉臣咸以為夫興化之要在于官人才非一流職有不同譬諸林木洪纖枉直各有攸施故明揚逮于仄陋疇咨無拘內外內外之任出處隨宜中間選用惟內是隆外舉既頽復多節目競內薄外遂成風俗此弊誠宜亟革之當內外通塞無所偏耳既使通塞無偏若選用不平有以深責責之苟深無憂不平也且膠柱不可以調瑟況乎官人而可以限乎伏思所限者以防選用不能出人不能出人當隨事而制無須限法法之有限其于致遠無乃泥乎或謂不制其法以何為責臣聞刑懲小人義責君子君子之責在心不在限也正始中任何晏以選舉內外之衆職各得其才粲然之美于斯可觀如此非徒御之以限法之所致乃委任之由也委任之懼甚于限法是法之失非己之尢尢不在己責之無懼所謂齊之以刑人免而無恥者也苟委任之一則慮罪之及二則懼致怨謗己快則朝野稱詠不善則衆惡是歸此之戰戰孰與倚限法以苟免乎晉書傅咸傳遭繼母憂上書咸身無兄弟到官之日喪祭無主文選任昉上蕭太傅固辭奪禮啓注引王隱晉書奏劾荀愷愷從兄喪自表赴哀詔聽之而未下愷乃造駿咸因奏曰死喪之戚兄弟孔懷同堂亡隕方在信宿聖恩矜憫聽使臨喪詔未下而便以行造急諂媚之敬無友于之情宜加顯貶以隆風教晉書傅咸傅奏劾夏侯駿令史張濟案行城東見有新立屋閒筣笓障二十丈推問是少府夏侯駿所作請免駿官奏劾夏侯承少府夏侯承取官田立私屋近小人委以家計令工匠竊盜官物附益于私所營唯利醜問充斥大臣穢濁無以為訓奏劾王戎書稱三載考績三載黜陟幽明今內外群官居職未朞而戎奏還既未定其優劣且送故迎新相望道路巧詐由生傷農害政戎不仰依堯舜典謨而驅動浮華虧敗風俗非徒無益乃有大損宜免戎官以敦風俗晉書王戎傳戎備位台輔兼掌選舉不能謐靜風俗以凝庶績至令人心傾動開張浮競中郎李重李義不相匡正請免戎等官晉書傅咸傅奏事尚書舊奏給介士二百人人給大銅口刀各一枚御覽三百四十五公品第一執圭坐侍臣之上特進品第二執皮帛坐侍臣之下以有舊制今啓特進宜執璧繼公書鈔五十二引傅咸集特進執皮帛坐侍臣之下門下屬漢武特進執璧已有舊制今特進宜執璧藝文類聚四十七引傅咸集上事自辨案令御史中丞督司百僚皇太子以下其在行馬內有違法憲者皆彈糾之雖在行馬外而監司不糾亦得奏之如今之文行馬之內有違法憲謂禁防之事耳宮內禁防外司不得而行故專施中丞今道路橋梁不修鬭訟屠沽不絶如此之比中丞推責州坐即今所謂行馬內語施于禁防既云中丞督司百僚矣何復說行馬之內乎既云百僚而不得復說行馬之內者內外衆官謂之百僚則通內外矣司隸所以不復說行馬內外者禁防之事已于中丞說之故也中丞司隸俱糾皇太子以下則共對司內外矣不為中丞專司內百僚司隸專司外百僚自有中丞司隸以來更互奏內外衆官惟所糾得無內外之限也而結一旦橫挫臣臣前所以不羅縷者冀因結奏得從私願也今既所願不從而敕云但為過耳非所不及也以此見原臣忝司直之任宜當正己率人若其有過不敢受原是以申陳其愚司隸與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之暗塞既所未譬皇太子為在行馬之內邪皇太子在行馬之內而得糾之尚書在行馬之內而不得糾無有此理此理灼然而結以此挫臣臣可無恨耳其于觀聽無乃有怪邪臣識石公前在殿上脫衣為司隸荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎晉書傅咸傳御史中丞解結以咸劾王戎為違典制越局侵官咸上事云云又御覽二百二十六引傅咸集作奏事司隸校尉教司隸校尉舊號臥虎誠以舉綱而萬目理提領而衆毛順御覽二百五十引傅咸集又教聞南市有蜀嫗作茶粥賣之廉事打破其器物使無為賣餅于市而禁茶粥以困老姥獨何哉北堂書鈔一百四十四又教屠牛酤酒鑿錢作錫皆有損害御覽八百二十八引傅咸集與楊駿箋事與世變禮隨時宜諒暗之不行尚矣由世道彌薄權不可假故雖斬焉在疚而躬覽萬幾也逮至漢文以天下體大服重難久遂制既葬而除世祖武皇帝雖大孝蒸蒸亦從時釋服制心喪三年至于萬幾之事則有不遑今聖上欲委政于公諒暗自居此雖謙讓之心而天下未以為善天下未以為善者以億兆顒顒戴仰宸極聽于冢宰懼天光有蔽人心既以若此而明公處之固未為易也竊謂山陵之事既畢明公當思隆替之宜周公聖人猶不免謗以此推之周公之任既未易而處況聖上春秋非成王之年乎得意忘言言未易盡苟明公有以察其悾款言豈在多晉書傅咸傅與汝南王亮箋楊駿有震主之威委任親戚此天下所以喧譁今之處重宜反此失謂宜靜默頤神有大得失乃維持之自非大事一皆抑遣比四造詣及經過尊門冠蓋車馬填塞街衢此之翕習既宜弭息又夏侯長容奉使為先帝請命祈禱無感先帝崩背宜自咎責而自求請命之勞而公以為少府私竊之論云長容則公之姻故至于此衛伯輿貴妃兄子誠有才章應作臺郎然未得東宮官屬東宮官屬前患楊駿親理塞路今有伯輿復越某作郎一犬吠形群犬吠聲懼于群吠遂至叵聽也咸之為人不能面從而有後言嘗觸楊駿幾為身禍況于殿下而當有惜往從駕殿下見語卿不識韓非逆鱗之言邪而欻摩天子逆鱗自知所陳誠額額觸猛獸之鬚耳所以敢言庶殿下當識其不勝區區前摩天子逆鱗欲以盡忠今觸猛獸之鬚非欲為惡必將以此見恕晉書傅咸傅致汝南王亮書咸以為太甲成王年在蒙幼故有伊周之事聖人且猶不免疑況臣既不聖王非孺子而可以行伊周之事乎上在諒暗聽于冢宰而楊駿無狀便作伊周自為居天下之安所以至死其罪既不可勝亦是殿下所見駿之見討發自天聰孟觀李肇與知密旨耳至于論功當歸美于上觀等已數千戶縣侯聖上以駿死莫不欣悅故論功寧厚以敘其歡心此群下所宜以實裁量而遂扇動東安封王孟李郡公餘侯伯子男既妄有加復又三等超遷此之熏赫震動天地自古以來封賞未有若此者也無功而厚賞莫不樂國有禍禍起當復有大功也人而樂禍其可極乎作此者皆由東安公謂殿下至止當有以正之正之以道衆亦何所怒乎衆之所怒在于不平耳而今皆更倍論莫不失望咸之愚冗不惟失望而已竊以為憂又討駿之時殿下在外實所不綜今欲委重故令殿下論功論功之事實未易可處莫若坐觀得失有居正之事宜也晉書傅咸傅答李斌書吾作左丞未幾而已吾為京兆雖心知此為不合然是家鄉親里自願便從俗耳時足下問吾當去否吾答鸚武子言阿安樂今到阿安樂何為不去御覽九百二十四答楊濟書衛公云酒色之殺人此甚于作直坐酒色死人不為悔逆畏以直致禍此由心不直正欲以苟且為明哲耳自古以直致禍者當自矯枉過直或不忠允欲以亢厲為聲故致忿耳安有悾悾為忠益而當見疾乎晉書傅咸傅違距上命稽留詔罰退思此罪在于不測才加罰黜退用戰悸何復以杖重為劇小人不德所好唯酒宜于養瘡可數致也御覽六百五十引傅咸集答曹志英氣泉涌逸藻波騰相諭草黃紙故事鋪不上皆取急與自頃多廢輒皆移病前門自今以後尚書鋪不上門斷急北堂書鈔三十二答辛曠詩序尚書左丞彈八座以下居萬機之會斯乃皇朝之司直天臺之管轄余前為右丞具知此職之要後忝此任黽勉從事日慎一日初學記十一引兩條前作傅玄後作傅咸通典二十二御覽二百十三竝作傅咸答潘尼詩序司州秀才潘正叔識通才高以文學溫雅為博士余性直而處清論褒貶之任作詩以見規雖褒飾之舉非所敢聞而斐粲之辭良可樂也答之雖不足以相酬報所謂盍各言志也藝文類聚三十一答欒弘詩序安樂令欒弘太傅巨平侯羊公辟未就而公薨後應司州之命舉秀才博文通濟之士余失和于府當換為護軍司馬賦詩見贈答之云爾答郭泰機詩序河南郭泰機寒素後門之士不知余無能為益以詩見激切可施用之才而況沈淪不能自拔于世余雖心知之而末如之何此屈非復文辭所了故直戲以答其詩云文選郭泰機答傅咸詩注皇太子釋奠頌生而知之上于皇儲以能而問處實若虛爰雕聖章玉采是敷蒸蒸皇儲既睿且聰神而明之夫豈發蒙謙以制禮靡事不恭乃修嘉薦于國之雍敬享先師以疇聖功亹亹皇嗣希心闕里企茲良辰卜近于市光光輿服穆穆容止祗奉聖靈躬承明祀濟濟儒生侁侁胄子清酒于觴匪宴斯喜欣道之弘自今以始藝文類聚三十八初學記十四御史中丞針并序御史中丞針并序百官之針以針王闕余承先君之蹤竊位憲臺懼有忝纍垂翼之責且造斯針以自勖勵不云自針而云御史中丞針者凡為御史中丞欲通以針之也詞曰煌煌天文衆星是環爰立執法其暉有煥執憲之綱秉國之憲鷹揚虎視肅清違慢謇謇匪躬是曰王臣既直其道奚顧其身身之不顧孰其弗震邦國若否山甫是明焉用彼相莫扶其傾淮南搆逆實憚汲生赫赫有國可無忠貞憂責有在繩必以直良農耘穢勿使能植無禮是逐安惜翅翼嗟爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慚于色得罪天子內省有恧是用作針惟以自敕初學記十二御覽二百二十六犀鉤銘并序犀鉤銘并序世稱雞駭之犀聞之父常侍曰犀之美者有光雞見影而驚故曰駭雞有以此鉤見遺者乃為之銘藝文類聚九十五御覽八百九十獸曰玄犀處自林麓食惟棘刺體兼五肉或有神表露以角含精吐英望如華燭置之荒野禽獸莫觸御覽八百九十直良農耘穢勿使能植無禮是逐安惜翅翼嗟爾庶寮各敬乃職無為罰先無怙厥力怨及朋友無慚于色得罪天子內省有恧是用作針惟以自敕初學記十二御覽二百二十六卭竹杖銘嘉茲奇竹質徑體直立比高節示世矜式藝文類聚六十九扇銘并序扇銘并序武都太守房仲發遺扇無以報之為銘以識之扇之為德蓋有云取于執政用為君清署涼風既興是焉屏處行藏惟時孔顏齊矩北堂書鈔一百三十四案此銘多誤字無從校正中郎將曹府君碑伊公立朝雅然正色既侍皇帷讜言常則北堂書鈔三十七襄邑侯誄言研其幾文豔春蘭北堂書鈔一百議魯相請尊祀孔子廟春秋傳言立在祀典則孔子是也宗聖適足繼絶世章盛德耳至于顯立言崇明德則宜如魯相所上魏志崔林傳博士傳祗議案此議當在景初正始之間而晉書言傅祗卒于永嘉末年六十九若非晉書有誤即此博士傳祗別是一人也今姑編入晉文俟考請原楊駿官屬啓昔魯芝為曹爽司馬斬關出赴爽宣帝義之尚遷青州刺史駿之僚佐不可加罰晉書傅祗傳與楊駿書未有帝王始崩臣下論功者也晉書傅祗傳自敘畼字世道年五歲散騎常侍扶風魯叔虎與先公甚友善以德量口喜與余戲嘗解余衣褶披其背脫余金鐶與侍者謂余當吝惜而余笑與之經數日不索遂于此見名言論甚重御覽六百九十一時請定九品以余為中正余以祖考歷代掌州鄉之論又兄宣年三十五立為州都令余以少年復為此任故至于上品以宿年為先是以鄉里素滯屈者漸得敘也御覽二百六十五
