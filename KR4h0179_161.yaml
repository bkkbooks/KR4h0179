body:
  text: 卷一百六十一釋慧遠答秦主姚興書欲令作大智論序以伸作者之意貧道聞懷大非小堵所容汲深非短綆所測披省之日有愧高命又體羸多疾觸事有廢不復屬意以來其日亦久來告之重輒粗輟所懷至於研究之美當復寄諸明德釋藏輦九又百五答王謐書古人不愛尺璧而重寸陰觀其所存似不在長年耳檀越既履順而遊性乘佛理以御心因此而推復何羡於遐齡邪聊想斯理久已得之為復酬來訊耳釋藏輦九又百五又世説答戴處士書釋慧遠頓首省君別示以偽慨然先雖未善相悉人物來往亦未始暫忘分明窮達非常智所測然依傍大宗似有定檢去秋與諸人共讀君論並亦有同異觀周郎所作答意謂世典與佛教是其中今封呈想暇日能力尋省廣弘明集二十又與戴處士書見君與周處士往復足為寡主然佛教精微難以事詰至於理玄數表義隱於經者不可服言但恨君作佛弟子未能留心聖典耳頃得書論亦未始暫忘年衰多疾不暇有答脫因講席之餘粗綴所懷今寄往試與同疑共尋若見其族則比干商臣之流可不思而得釋慧遠頓首廣弘明集二十與隱士劉遺民等書每尋疇昔遊心世典以為當年之華苑也及見老莊便悟名教是應變之虛談耳以今而觀則知沈冥之趣豈得不以佛理為先苟會之有宗則百家同致君諸人並為如來賢弟子也策名神府為日已久徒積懷遠之興而乏因籍之資以此永年豈所以勵其宿心哉意謂六齋日宜簡絶常務專心空門然後津寄之情篤來生之計深矣若染翰綴文可託興於此雖言生於不足然非言無以畼一詣之感因驥之喻亦何必遠寄古人廣弘明集三十二遣書通好鳩摩羅什釋慧遠頓首去歲得姚左軍書具承德問仁者曩絶殊域越自外境於時音譯未交聞風而悅但江湖難置以形乖為歎耳須知承否通之會懷寶來遊至止有問則一日九馳徒情欣雅味而無由造盡寓目望途固以增其勞佇每欣大法宣流三方同遇雖運鍾其末而趣均在昔誠未能扣律妙門感徹遺靈至於虛襟遣契亦無日不懷夫旃檀移植則異物同熏摩尼吐曜則衆珍自積是惟教合之道猶虛往實歸況宗一無像而應不以情者乎是故負荷大法者必以無執為心會友以仁者使功不自己若令法輪不停軫於八正之路三寶不輟音於將盡之期則滿願不專美於絶代龍樹豈獨善於前蹤今往比量衣裁願登高坐為著之并天漉之器此既法物聊以示懷高僧傳六重與鳩摩羅什書日有涼氣比復何如去月法識道人至聞君欲還本國情以悵然先聞君方當大出諸經故未欲便相咨求若此傳不虛衆恨可言今輒略問數十條事冀有餘暇一一為釋此雖非經中之大難要欲取決於君耳井報偈一章日本端竟何從起滅有無際一微涉動境成此穨山勢惑相更何乘觸理自生滯因緣雖無主開途非一世時無悟宗匠誰將握玄契末問尚悠悠相與期暮歲高僧傳六遣書通好曇摩流支佛教之興九行上國自分流巳來四百餘年至於沙門律戒所闕尤多頃有西域道士弗若多羅是罽賓人其諷十誦梵本有羅什法師通才博見為之傳譯十誦之中文始過半多羅早喪中途而寢不得究竟大業慨恨良深傳聞仁者齎此經自隨甚欣所遇冥運之來究竟大業慨恨良深傳聞仁者齎此經自隨甚欣所遇冥運之來豈人事而已邪想弘道為物感時而動叩之有人必情無所吝若能為律學之徒畢此經本開示梵行洗其耳目使始涉之流不失無上之津澡懷勝業日月彌朗此則惠深德厚人神同感矣幸願垂懷不乖往意一二悉諸道人所具高僧傳二答桓玄書大道淵玄其理幽深銜此高旨實如來談然貧道出家便是方外之賓雖未踐古賢之德取甚一往之志削除飭好落名求實若使幽冥有在故當不謝於俗人外似不盡內若斷金可謂見形不及道哀哉哀哉帶索枕石華而不實管見之人不足羡矣雖復養素山林與樹木何異夫道在方寸假練形為真卞和號慟於荊山患人不別故也昔聞其名今見其人故莊周悲慨人生天地之間如白駒之過隙以此而尋孰得久停豈可不為將來作資言學步邯鄲者新無功失其本質故使邯鄲人匍匐而歸百代之中有此一也豈混同以通之貧道巳乖世務形權於流俗欲於其中化未化者雖復沐浴踞傲奈疑結何一世之榮劇若電光聚則致離何足貪哉淺見之徒其惑哉可謂下士聞道而大笑之真可謂迷而不反也貧道形不出入才不應世是故毀其陋質被其割截之服理未能心冥玄化遠存大聖之制豈拾其本懷而酬高誨貧道年與時穨所患未痊乃復曲垂光慰怠慶交至檀越信心幽當大法所寄豈有一傷毀其本也將非波旬試嬈之言辭拙寡聞加酬高命蓋是火逆之懷耳弘明集十一與桓玄書論料簡沙門佛教陵遲穢雜日甚每一尋思憤慨盈懷常恐運出非意混然淪湑此所以夙宵歎懼忘寢與食者也見檀越澄清諸道人教實應其本心失涇以渭分則清濁殊流枉以宜正則不仁自遠推此而言符命既行必二理斯得然後令飾偽取容者自絶於假通之路信道懷真者無復有負俗之嫌如此則道世交興三寶復隆於茲矣貧道所以寄命江南欲託有道以存至業之隆替實由乎人植檀越當年則是貧道中興之運幽情所託己冥之在昔是以前後書疏輒以憑寄為先每尋告慰眷懷不忘但恐年與時乖不盡檀越盛隆之化耳今故咨白數條如別疏經教所開凡有三科一者禪思入微二者設味遺典三者興建福業三科誠異皆以律行為本檀越近制是大同於此是所不疑或有興福之人內不毀禁而迹非阿練若者或多誦經諷詠不絶而不能畼説義理者或年已宿長雖無三科可記而體性貞正不犯人非者凡如此輩皆是所疑今尋檀越所遣之例不堪問此而外物惶惑莫敢自寧故以別白夫形迹易察而真偽難辨自非遠鑒得之信難若是都邑沙門經檀越視聽者固無所疑若邊局遠司識不及遠則未達教旨或因符命濫及善人此最其深憂若所在執法之官意所未詳又時無宿望沙門可以求中得令送至大府以經高鑒者則於理為弘想檀越神慮已得之於心直是貧道常近之情不能不及耳若有族姓子弟本非役門或世奉大法或弱而天悟欲棄俗入道求作沙門推例尋意似不塞其清塗然要須咨定使洗心向味者無復自疑之情昔外國諸王多參懷聖典亦有因時助弘大化扶危救弊信有自來矣檀越每期情古人故復略敘所聞弘明集十二高僧傳六有節文答桓玄書詳省別告及八座書問沙門所以不敬王者音義在尊主崇上遠存名體徵引老氏同王侯於三大以資生運通之道故宜重其神器若推其末以尋其源咸稟氣於兩儀受形於父母則以生生通運之道為弘資存日用之理為大故不宜其德而遺其禮霑其惠而廢其敬此檀越立意之所據貧道亦不異於高懷求之於佛教以尋沙門之道理則不然何者佛經所明凡有二科一者處俗弘教二者出家修道處俗則奉上之禮尊親之敬忠孝之義表於經文在三之訓彰乎聖典斯與王制同命有若符契此一條全是檀越所明理不容異也出家則是方外之賓迹絶於物其為教也達患異緣於有身不存身以息患知生生由於稟化不順化以求宗求宗不由於順化故不重運通之資息患不自於存身故不貴厚生之益此理之與世乖道之與俗反者也是故凡在出家皆隱居以求其志變俗以達其道變俗服章不得與世典同禮隱居則宜高尚其迹夫然故能拯溺族於沈流拔幽根於重劫遠通三乘之津廣開天人之路是故內乖天屬之重而不違其孝外闕奉主之恭而不失其敬若斯人者自誓始於落簪立志成於暮歲如令一夫全德則道洽六親澤流天下雖不處王侯之位固已協契皇極大庇生民矣如此豈坐受其德虛霑其惠與夫尸祿之賢同其素餐者哉檀越頃者以有其服而無其人故澄清簡練容而不雜此命既宣皆人百其誠遂之彌深非言所喻若復開出處之迹以弘方外之道則虛襟者挹其遺風漱流者味其餘津矣若澄簡之後猶不允情其中或真偽相冒涇渭未分則可以道廢人固不應以人廢道以道廢人則宜去其服以人廢道則宜存其禮禮存則制教之旨可尋迹廢則遂志之歡莫由何以明其然夫沙門服章法用雖非六代之典自是道家之殊俗表之名器名器相涉則事乖其本事乖其本則禮失其用是故愛夫禮者必不虧其名器得之不可虧亦有自來矣夫遠遵古典者猶存告朔之餼羊餼羊猶可以存禮豈況如來之法服邪推此而言雖無其道必宜存其禮禮存則法可弘法可弘則道可尋此古今所同不易之大法也又袈裟非朝宗之服鉢盂非廊廟之器軍國異容戎華不雜剔髮毀形之人忽廁諸夏之禮則是異類相涉之像亦竊所未安檀越奇韻挺於弱年風流邁於季俗猶參究時賢以求其中此而推之必不以人廢言貧道西垂之年假日月以待盡情之所惜豈存一己苟恪所執蓋欲令三寶中興於命世之運明德流芳於百代之下耳若一旦行此佛教長淪如來大法於茲泯滅天人感歎道俗革心矣貧道幽誠所期復將安寄緣眷愚之隆故坦其所懷執筆悲悶不覺涕泗橫流矣沙門不拜俗事一夫稱沙門者何邪謂能發矇俗之幽昏啓化表之玄路方將以兼忘之道與天下同往仗布高者挹其遺風漱流者味其餘津若然雖大業未就觀其超步之迹所悟固已宏矣又袈裟非宗之服鉢盂非廊廟之器沙門塵外之人不應致敬王者高僧傳六與晉安帝書釋慧遠頓首陽月和暖願御膳順宜貧道先嬰重疾年衰益甚猥蒙慈詔曲重光慰感懼之深實百於懷幸遇慶會而形不自運此情此慨良無以喻高僧傳六答盧循書損餉六種深抱情至益智乃是一方異味即於僧中行之藝文類聚八十七御覽九百七十二沙門不敬王者論五篇并序晉成康之世車騎將軍庾冰疑諸沙門抗禮萬乘所明理何驃騎有答至元興中太尉桓公亦同此義謂庾言之未盡與八座書云佛之為化雖誕以茫浩推乎視聽之外以敬為本此出處不異蓋所期者殊非敬恭宜廢也老子同王侯於三大原其所重皆在於資生通運豈獨以聖人在位而比稱二儀哉將以天地之大德曰生通生理物存乎王者故尊其神器而理實唯隆豈是虛相崇重義存弘御而已沙門之所以生生資國存亦日用於理命豈有受其德而遺其禮沾其惠而廢其敬哉於時朝士名賢答者甚衆雖言未悟時並互有其美徒咸盡所懷而釐蘊於情遂令無上道服毀於塵俗亮到之心屈乎人事悲夫斯乃交喪之所由千載之否運深懼大法之將淪感前事之不忘故著論五篇究敘微微意豈曰淵壑之待晨露蓋是伸其罔極亦庶後之君子崇敬佛教者式詳覽焉在家一原夫佛教所明大要之出家為異出家之人凡有四科其弘教通物則功侔帝王化兼治道至於感俗悟時亦無世不有但所遇有行藏故以之廢興為隱顯耳其中可得論者請略而言之在家奉法則是順化之民情未變俗迹同方內故有天屬之愛奉主之禮禮敬有本遂因之而成教本其所因則功由在昔是故因親以教愛使民知其有自然之恩因嚴以教敬使民知其有自然之重二者之來實由冥應應不在今則宜尋其本故以罪對為刑罰使懼而後慎以天堂為爵賞使悅而後動此皆即其影響之報而明於教以因順為通而不革其自然也何者夫厚身存生以有封為滯纍根深固存我未忘方將以情欲為苑囿聲色為遊觀耽湎世樂不能自勉而特出是故教之所檢以此為涯而不明其外耳其外未明大則大同於順化故不可受其德而遺其禮沾其惠而發其敬是故悅釋迦之風者輒先奉親而敬君變俗投簪者必待命而順動若君親有疑則退求其志以俟同悟斯乃佛教之所以重資生助王化於治道者也論者立言之旨貌有所同故位夫內外之分以明在三之志略敘經意宣寄所懷出家二出家則是方外之賓迹絶於物其為教也達患纍緣於有身不存身以息患知生生由於稟化不順化以求宗求宗不由於順化則不重運通之資息忠不由於存身而不貴厚生之益此理之與形乖道之與俗反者也若斯人者自誓始於落簪立志形乎變服是故凡在出家皆遁世以求其志變俗以達其道變俗則服章不得與世典同禮遁世則宜高尚其迹夫然者故能拯溺俗於沈流拔玄根於重劫遠通三乘之津廣開天人之路如令一夫全德則道洽六親澤流天下雖不處王侯之位亦以協契皇極在宥生民矣是故內乖天屬之重而不違其孝外闕奉主之恭而不失其敬從此而觀故知超化表以尋宗理深而義篤昭泰息以語仁則功末而惠淺若然者雖將面冥山而而旋步猶或恥聞其風豈況與夫順化之民尸祿之賢同其孝敬者哉求宗不順化三問曰尋夫老氏之意天地以得一為大王侯以體順為尊得一故為萬化之本體順故有運通之功然則明宗必存乎體極體極必由於順化是故先賢以為美談衆論所不能異異夫衆論者則義無所取而云不順化何邪答曰凡在有方同稟生於大化雖群品萬殊精粗異貫統極而言唯有靈與無靈耳有靈則有情於化無靈則無情於化無情於化化畢而生盡生不由情故形朽而化滅有情於化感物而動動必以情故其生不絶其生不絶則其化彌廣而形彌積情彌滯而纍彌深其為患也焉可勝言哉是故經稱泥洹不變以化盡為宅三界流動以罪苦為場化盡則因緣永息流動則受苦無窮何以明其然夫生以形為桎梏而生由化有化以情感則神滯其本而智昏其照介然有封則所存唯已所涉唯動於是靈轡失御生塗日開方隨貪愛於長流豈一受而已哉是故反本求宗者不以生纍其神超落塵封者不以情纍其生不以情纍其生則生可滅不以生纍其神則神可冥冥神絶境故謂之泥洹泥洹之名豈虛稱也哉請推而實之天地雖以生生為大而未能令生者不死王侯雖以存存為功而未能令存者無患是故前論云達患纍緣於有身不存身以息患知生生由於稟化不順化以求宗義存於此義存於此斯沙門之所以抗禮萬乘高尚其事不爵王侯而沾其惠者也體極不兼應四問曰歷觀前史上皇已來在位居宗者未始異其原本本不可二是故百代同典咸一其統所謂唯天為大唯堯則之如此則非智有所不照自無外可照非理有所不盡自無理可盡以此而推視聽之外廓無所寄理無所寄則宗極可明今諸沙門不悟文表之意而惑教表之文其為謬也固已甚矣若復顯然有驗此乃希世之聞答曰夫幽宗曠邈神道精微可以理尋難以事詰既涉乎教則以因時為檢雖應世之見優劣萬差至於曲成在用感即民心而通其分分至則止其智之所不知而不關其外者也若然則非體極者之所不兼兼之者不可並御耳是以古之語大道者五變而形名可舉九變而賞罰可言此但方內之階差而猶不可頓設況其外者乎請復推而廣之以遠其旨六合之外存而不論者非不可論論之或乖六合之內論而不辨者非不可辨辨之惑疑春秋經世先王之志辨而不議者非不可議議之者或亂此三者皆即其身耳目之所不至以為關鍵而不關視聽之外者也因此而求聖人之意則內外之道可合而明矣常以為道法之與名教如來之與堯孔發致雖殊潛相影響出處誠異終期則同詳而辨之指歸可見理或有先合而後乖有先乖而後合先合而後乖者諸佛如來則其人也先乖而後合者歷代君王未體極之主斯其流也何以明之經云佛有自然神妙之法化物以權廣隨所入或為靈仙轉輪聖帝或為卿相國師道士若此之倫在所變現諸王君子莫知為誰此所謂合而後乖者也或有始創大業而功化未就迹有參差故所受不同或期功於身後或顯應於當年聖王則之而成教者亦不可稱算雖抑引無方必歸塗有會此所謂乖而後合者也若令乖而後合則擬步通塗者必不自崖於一揆若令先合而後乖則釋迦之與堯孔發致不殊斷可知矣是故自乖而求其合則知理會之必同自合而求其乖則悟體極多方但見形者之所不兼故惑衆塗而駭其異耳因茲而觀天地之道功盡於運化帝王之德理極於順通故雖曰道殊所歸一也不兼應者物不能兼受也若以對夫獨絶之教不變之宗固不得同年而語其優劣亦已明矣形盡神不滅五問曰論旨以化盡為至極故造極者必違化而求宗求宗不由於順化是以引歷代君王使同之佛教令體極之至以權居統此雅論之所託自必於大通者也求之實當理則不然何者夫稟氣極於一生生盡則消液而同無神雖妙物故是陰陽之所化耳既化而為生又化而為死既聚而為始又散而為終因此而推固知神形俱化原無異統精粗一氣始終同宅宅全則氣聚而有露宅毀則氣散而照滅散則反所受於天本滅則復歸於無物反覆終窮皆自然之數耳孰為之哉若令本異則異氣數合合則同化亦為神之處形猶火之在木其生必存其毀必滅形離則神散而罔寄木朽則火寂而靡託理之然矣假使同異之分昧而難明自無之説必存乎聚散聚散氣變之總名萬化之生滅故莊子曰人之生氣之聚聚則為生散則為死若使生為彼徒苦吾又何患古之善言道者必有以得之若果然邪至理極於一生生盡不化義可尋也答曰夫神者何邪精極而為靈者也精極則非卦象之所圖故聖人以妙物而為言雖有上智猶不能定其體狀窮其幽致而談者以常識生疑多同自亂其為誣也亦己深矣將欲言之是乃言夫不可言今於不可言之中復相與而依俙神也者圖應無生妙盡無名感物而動假數而行感物而非物故物化而不滅假數而非數故數盡而不窮有情則可以物感有識則可以數求數有精粗故其性各異智有明暗故其照不同推此而論則知化以情感神以化傳情為化之母神為情之根情有會物之道神有冥移之功但悟徹者反本惑理者逐物耳古之論道者亦未有所同請引而明之莊子發玄音於大宗曰大塊勞我以生息我以死又以生為人羈死為反真此所謂知生為大患以無生為反本者也文子稱黃帝之言曰形有靡而神不化以不化乘化其變無窮莊子亦云特犯人之形而猶喜若人之形萬化而未始有極此所謂知生不盡於一化方逐物不反者也二子之論雖未究其實亦嘗傍宗而有聞焉論者不尋無方生死之説而惑聚散於一化不思神道有妙物之靈而謂精粗同盡不亦悲乎火木之喻原自聖典失其流統故幽興莫尋微言遂淪於常教令談者資之以成疑向使時無悟宗之匠則不知有先覺之明冥傳之功沒世靡聞何者夫情數相感其化無端因緣密構潛相傳寫自非達觀孰識其變自非達觀孰識其會請為論者驗之以實火之傳於薪猶神之傳於形火之傳異薪猶神之傳異形前薪非後薪則知指窮之術妙前形非後形則悟情數之感深惑者見形極於一生便以謂神情俱喪猶覩火窮於一木謂終期都盡耳此由從養生之談非遠尋其類者也就如來論假今令神形俱化始自天本愚智資生同稟所受問所受者為受之於形邪為受之於神邪若受之形凡在有形皆化而為神矣若受之於神是以神傳神則丹朱與帝堯齊聖重華與瞽瞍等靈其可然乎其可然乎如其不可固知冥緣之搆著於在昔明暗之分定於形初雖靈物善運猶不能變性之自然況降茲已還還乎驗之以理則微言而有徵效之以事可無惑於大道論成後有退居之賓步朗月而宵遊相與共集法堂因而問曰敬尋雅論大歸可見殆無所間一日試重研究蓋所未盡亦少許處耳意以為妙門德式是變俗之殊制道家之名器施於君親固宜略於形敬今所疑者謂甫創難就之業遠期化表之功潛澤無現法之效棶報玄而未應乃今王公獻供信士屈體得無坐受其德陷乎早計之纍虛沾其惠貽夫素餐之譏邪主人良久乃應曰請為諸賢近取其類有人於此奉宣時命遠通殊方九譯之俗問王者以當資以餱糧錫以舉服不答曰然主人曰類可尋矣夫稱沙門者何邪謂其發蒙俗之幽昏啓化表之玄路方將以兼忘之道與天下同往使希高者挹其遺風漱流者味其餘津若然雖大業未就觀其超步之迹所悟固已弘矣然則運通之功資存之益尚未酬其始誓之心況答三業之勞乎又斯人者形雖有待情無近寄視夫四事之供若蟭蚊之過乎其前者耳濡沫之惠復焉足語哉衆寡於是始悟冥塗以開轍為功息心以淨畢為道乃欣然怡襟詠言而退晉元興三年歲次閼逢於時天子蒙塵人百其憂凡我同志僉懷綴旒之歎故因述斯論焉弘明集五沙門不拜俗事二又略見高僧傳六
