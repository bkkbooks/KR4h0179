body:
  text: 劉弘討斬張奕上表臣以凡才謬荷國恩作司方州奉辭伐罪不能奮揚雷廷折衝萬里軍退于宛分受顯戮猥蒙含宥被遣之職即進達所鎮而范陽王虓先遣前長水校尉張奕領荊州臣至不受節度擅舉兵距臣今張昌奸黨初平昌未梟擒益梁流人蕭條猥集無賴之徒易相扇動飆風駭蕩則滄海橫波苟患失之無所不至比須表上慮失事機輒遣軍討奕即梟其首奕雖貪亂欲為荼毒由臣劣弱不勝其任今奕肆心以勞資斧敢引覆餗之刑甘受專輒之罪晉書劉弘傳補選缺吏表被中詔敕臣隨資品選補諸缺吏夫慶賞刑威非臣所專且知人則哲聖帝所難非臣暗蔽所能斟酌然萬事有機毫釐宜慎謹奉詔書差所應用蓋崇化莫若貴德則所以濟屯故太上立德其次立功也頃者多難淳朴彌凋臣輒以徵士伍朝補零陵太守庶以懲波蕩之斃養退讓之操臣以不武前退于宛長史陶侃參軍蒯恆牙門皮初戮力致討蕩滅奸凶侃恆各以始終軍事初為都戰帥忠勇冠軍漢沔清肅實初等之勳也司馬法賞不踰時欲人知為善之速福也若不超報無以勸徇功之士慰熊羆之志臣以初補襄陽太守侃為府行司馬使典論功事恆為山都令詔惟令臣以散補空缺然沶鄉令虞潭忠誠烈正首唱義舉舉善以教不能者勸臣輒特轉潭補醴陵令南郡廉史仇勃母老疾困賊至守衛不移以致拷掠幾至隕命尚書令史郭貞張昌以為尚書郎欲訪以朝議遁逃不出昌質其妻子避之彌遠勃孝篤著于臨危貞忠厲于強暴雖各四品皆可以訓獎臣子長益風教臣輒以勃為歸鄉令貞為信陵令皆功行相參循名校實條列行狀公文具上晉書劉弘傳固請以皮初為襄陽太守表固請以皮初為襄陽太守表陟姻親舊制不得相監皮初之勳宜見酬報晉書劉弘傳朝廷以皮初雖有功名器宜慎不可授初乃以前東平太守夏侯陟為襄陽太守陟弘之壻也弘下教云云乃表云云詔聽之請詔東海王越等罷兵表范陽王虓欲代豫州刺史喬喬舉兵逐虓司空東海王越以喬不從命討之臣以為喬忝受殊恩顯居州司自欲立功于時以徇國難無他罪闕而范陽代之代之為非然喬亦不得以虓之非專威輒討誠應顯戮以懲不恪然自頃兵戈紛亂猜禍鋒生恐疑隙構于群王災難延于宗子權柄隆于朝廷逆順效于成敗今夕為忠明旦為逆翩其反而互為戎首載籍以來骨肉之禍未有如今者也臣竊悲之痛心疾首今邊陲無備豫之儲中華有杼軸之困而股肱之臣不惟國體職競尋常自相楚剝為害轉深積毀銷骨萬一四夷乘虛為變此亦猛獸交鬭自效于卞莊者矣臣以為宜速發明詔詔越等令兩釋猜嫌各保分局自今以後其有不被詔書擅興兵馬者天下共伐之詩云誰能執熱逝不以濯若誠濯之必無灼爛之患永有泰山之固矣晉書劉喬傳用皮初下教夫統天下者宜與天下同心化一國者宜與一國為任若必姻親然後可用則荊州十郡安得十女壻然後為政哉晉書劉弘傳弘以皮初補襄陽太守朝廷以初雖有功名器宜慎乃以前東平太守夏侯陟為襄陽太守陟弘之壻也弘下教下荊部教太康已來天下無虞遂共尚無為貴談莊老少有說事外託論公務內但共談笑今即同舟而載安可不人人致力邪文選干寶晉紀總論注引干寶晉紀又見御覽二百五十三録事參軍務舉善彈非令史亦各隨職事修習也北堂書鈔原本六十九禮名山大澤不封與共其利今公私并兼百姓無復厝于地當何謂邪速改此法又酒室中云齊中酒聽事酒猥酒同用麴米而優劣三品投醪當與三軍同其薄厚自今不得分別晉書劉弘傳舊制峴方二山澤中不許百姓捕魚弘下教與督將教吾昨鼓四中起聞西城上兵咳聲甚深即呼省之年過六十羸病無襦而督將差以持時持時備不虞耳此即無所防捍又老羸病凍不隱恤必致死亡督將豈可乃爾邪御覽七百四十三將士寒窮者給一韋袍復帽御覽六百九十三給賜巫衛教録事巫衛忠清厲節衣物不充賜單復依各一具恆令廚食給其家穀三百斛諸吏宜見賢思齊御覽四百二十六與劉喬箋與劉喬箋適承范陽欲代明使君明使君受命本朝列居方伯當官而行同獎王室橫見遷代誠為不允然古人有言牽牛以蹊人之田信有罪矣而奪之牛罰亦重矣明使君不忍亮直狷介之忿甘為戎首竊以為過何者至人之道用行舍藏跨下之辱猶宜俯就況于換代之嫌纖介之釁哉范陽國屬使君庶姓周之宗盟疏不閒親曲直既均責有所在廉藺區區戰國之將猶能升降以利社稷況命世之士哉今天下紛紜主上播越正是忠臣義士同心戮力之時弘實暗劣過蒙國恩願與使君共戴盟主雁行下風掃除凶寇救蒼生之倒懸反北辰于太極此功未立不宜乖離備蒙顧遇情隆于常披露丹誠不敢不盡春秋之時諸侯相伐復為和親者多矣願明使君回既往之恨追不二之蹤解連環之結修如初之好范陽亦將悔前之失思崇後信矣晉書劉喬傳與東海王越書適聞以吾州將擅舉兵逐范陽當討之誠明同異懲禍亂之宜然吾竊謂不可何者今北辰遷居元首移幸群后抗義以謀王室吾州將荷國重恩列位方伯亦伐鼓即戎戮力致命之秋也而范陽代之吾州將不從由代之不允但矯枉過正更以為罪耳昔齊桓赦射鉤之讎而相管仲晉文忘斬袪之怨而親勃鞮方之于今當何有哉且君子躬自厚而薄責于人今奸臣弄權朝廷困逼此四海之所危懼宜釋私嫌共存公義含垢匿瑕忍所難忍以大逆為先奉迎為急不可思小怨忘大德也苟崇忠恕共明分局連旗推鋒各致臣節吾州將必輸寫肝膽以報所蒙實不足計一朝之謬發赫然之怒使韓盧東郭相困而為豺狼之擒也吾雖庶姓負乖過分實願足下率齊內外以康王室竊恥同儕自為蠹害貪獻所懷惟足下圖之晉書劉喬傳析言古諺文堯舜至聖心脯脂桀紂無道肥膚三尺御覽三百七十八二社議漢氏及魏初皆立一社一稷至景初之時更立太社太稷又特立帝社云禮記祭法云王為群姓立社曰太社言為群姓下及士庶皆使立社非自立今竝立二社二神二位同時俱祭于事為重于禮為黷宜省除一社以從舊典通典四十五答馬昭馬昭非王肅曰周禮仲春令會男女殷頌天命玄鳥降而生商月令仲春玄鳥至之日祀于高禖玄鳥孚乳之月以為嫁娶之候孔朝答曰周官云凡娶判妻入子者皆書之此謂霜降之候冰泮之時正以禮婚者也次言仲春令會男女奔者不禁此婚期盡不待備禮玄鳥至祀高禖求男之象非嫁娶之候昭又難曰詩云有女懷春吉士誘之春日遲遲女心傷悲嘒彼小星三五在東綢繆束芻三星在隅我行其野蔽芾其樗倉庾于飛熠耀其羽凡此皆興于仲春嫁娶之候朝曰有女懷春謂女無禮過時故思春日遲遲蠶桑始起女心悲矣嘒彼小星喻妾侍從夫人蔽芾其樗喻行遇惡人熠耀其羽喻嫁娶盛飾皆非仲春嫁娶之候玄據期盡之教以為正婚則奔者不禁過于是月窮矣通典五十九上太常言楊旌舉孝廉楊旌遭伯母之喪幾時而被孝廉舉又已葬未及為人後不案旌以去六年二月遭伯母喪其年十一月葬十二月應舉不為人後鄉閭之論以孝廉四科高妙清白冠首不謂在哀之人禮之所責也通典一百一劉熹中山王立始祖廟議禮記王制諸侯五廟二昭二穆與太祖而五是則立始祖之廟謂嫡統承重一人得立耳假令支弟竝為諸侯始封之君不得立廟也今睦非為正統若立祖廟中山不得竝也後世中山乃得為睦立廟為後世子孫之始祖耳晉書高陽王睦傳睦封中山王自表乞依六蓼祀皋陶鄫杞祀相立廟事下太常依禮典平議博士祭酒劉熹等議又見通典五十一難孔朝二社議祭法為群姓立社若如朝議當言王使不得言為下云王為群姓立七祀諸侯自為立五祀若是使群姓私立何得踰于諸侯而祭七祀乎是為群姓立七祀乃王之祀也夫人取法于天取財于地普天率士無不奉祀而何言乎一神二位以為煩黷邪通典四十五三恪二王議漢魏為二王後夏殷周之後為三恪衛公署于前代為二王後于大晉在三恪之數應降稱侯祭祀制度宜與五等公侯同通典七十四矯公智母服議公智之父棄夾納王其在戶庭尚為己配苟有變悔自由可也還歸夾氏則他人矣去就出處各從所執豈復矯父所得制乎故出妻之禮夫使人致曰某不敏不能從而供粢盛使某也敢告主人曰某子不肖不敢避誅又曰歸當喪而出則除之然則相與之禮于是絶矣通典九十四楊旌周喪舉孝廉議禮周之喪卒哭而從政進貢達士為政之道也此敬君之命為下之順禮因殺而順君命可也今旌十二月被舉過葬之後因情哀殺而順君命三年之喪則終其服周之喪一月而已明情有重輕也又案律令無以喪廢舉之限通典一百一博士祭劉酒善議疑轉寫之誤劉克矯公智母服議父者子之天違父與違天同公曜父臨亡知其母無守志故敕公智還其母此為臨亡情正慮審也公曜幼小在此母懷抱其見慈長以至成人過于所生而母之亡喪不過啁噍之頃衣不釋綵食不損味居處自若古今未之有也夫孝子事其親事亡若事存也女子從人出之則歸命之則反上奉父母以為姑下有夫兒以為子制矯氏之家政修母氏之教命而怡然無戚言非我母也通典九十四楊旌周喪舉孝廉議案禮周喪之末可以弔人也君子之仕行其義也今以喪在四科之一雖無善稱亦應無咎通典一百一孝廉清白剋讓為德旌本周喪之戚猥當貢舉不能辭退詩人有言受爵不讓旌應貶矣通典一百一上疏駮六宗舊說禋于六宗禮祖考所尊者六也何以考之周禮及禮記王制天子將出類于上帝宜于社造于禰巡狩四方覲諸侯歸格于祖禰用特堯典亦曰肆類于上帝禋于六宗望于山川遍于群神班瑞于群后肆覲東后叶時月正日同律度量衡巡狩一歲以周爾乃歸格于藝祖用特臣以尚書與禮王制同事一義符契相合禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若如十家之說既各異義上下違背且沒乎祖之禮考之禮考之祀典尊卑失序若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也禮記曰夫政必本于天殽以降命命降于社之謂殽地降于祖廟之謂仁義降于山川之謂興作降于五祀之謂制度又曰祭帝于郊所以定天位也祀社于國所以列地利也祭祖于廟所以本仁也山川所以儐鬼神也五祀所以本事也又曰禮行于郊而百神受職焉禮行于社而百貨可極焉禮行于祖廟而孝慈服焉禮行于五祀而正法則焉故自郊社祖廟五祀義之修而禮之藏也凡此皆孔子所以祖述堯舜紀三代之教著在祀典首尾相證皆先天地次祖宗而後山川群神耳故禮祭法曰七代之所更變者禘郊宗祖明舜受終文祖之廟察璇璣考七政審已天命之定遂上郊廟當義合堯典則周公其人也郊祀后稷以配天宗祀文王于明堂以配上帝是以四海之內各以其職來祭者也居其位攝其事郊天地供群神之禮巡狩天下而遺其祖宗恐非有虞之志也五嶽視三公四瀆視諸侯皆以案先儒之說而以水旱風雨先五嶽四瀆從祖考而次上帝錯于肆類而亂祀典臣以十一家皆非也續漢祭祀志中注補晉武帝初幽州秀才張髦上疏
