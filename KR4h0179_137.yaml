body:
  text: 戴逵流火賦火憑薪以傳焰人資氣以享年苟薪氣之有歇何年焰之恆廷初學記二十五離興賦挾鳴琴于林下理纖綸于長浦回餞行于越江送猗人于西渚初學記十八棲林賦浪迹潁湄棲景箕岑文選江淹雜體詩注幽關忽其離楗玄風暖以雲穨文選頭陀寺碑文注與所親書近在剡如入官舍世說棲逸又見藝文類聚三十六答范寧問馬鄭二義書夫易者當使用日則廢月可得言易耳鄭以哭日準平生之月而謂之易且無服之殤非唯周親七歲以下也他親長中降而不服故傳曰不滿八歲以下皆為無服之殤也如馬義則以此文悉關諸服降之殤者若如鄭義諸降之殤當作何器邪若復哭其生月則緦麻之長殤決不可二百餘日哭鄭必推之于不哭則小功之親以志學之年成童而夭無哭泣之位恐非有情者之所允也通典九十一與遠法師書安公和南弟子常覽經典皆以禍福之來由于積行是以自少束修至于白首行不負于所知言不傷于物類而一生艱楚荼毒備經顧景塊然不盡唯己夫冥理難推近情易纏每中宵幽念悲慨盈懷始知修短窮達自有定分積善積惡之談蓋是勸教之言耳近作此釋疑論今以相呈想消息之餘脫能尋省戴安公和南釋藏輕三廣弘明集二十重與遠法師書安公和南閒作釋疑論以寄其懷故呈之匠者思聞啓誨既辱還告開示宗轍并送周郎難甚有趣致但理本不同所見亦殊今重伸鄙意答周復以相呈旨誠可求而辭不自畼想脫覽省戴公和南釋藏輕三廣弘明集二十答遠法師書安公和南辱告并見三報論旨喻宏遠妙畼理宗覽省反復欣悟兼懷弟子雖伏膺法訓誠信彌至而少遊人林遂不涉經學往以艱毒交纏聊寄之釋疑以自攄散此蓋情發于中而形于言耳推其俗見之懷誠為未盡然三報曠遠難以辭究弟子尋當索歸必覲展冀親承音旨益袪其滯諸懷寄之周居士戴安公和南廣弘明集二十山贊蔚矣名山亭亭洪秀竝基二儀嶢嶕雲構嵯峨積阻寥籠虛岫輕霞下拂神泉旁漱曰仁奚樂惟茲比壽藝文類聚七水贊水德淡中泉玄內鏡至柔好卑和協道性止鑒標貴上善興詠爰有幽人擁輪來映初學記六琴贊至人託玩導德宣情微旨虛遠感物悟靈初學記十六酒贊并序酒贊并序余與王元琳集于露立亭臨觴撫琴有味乎二物之閒遂共為之贊曰醇醪之興與理不乖古人既陶至樂乃開有客乘之隗若山頽目絶群動耳隔迅雷萬異既冥惟元有懷初學記二十六又略見書鈔一百四十八顏回贊神道天絶理非語象不有伊人誰憐誰仰際盡一時照無二朗契彼玄迹冥若影響藝文類聚二十尚長贊尚叟沖順庸行昏世和龍婉約玄識罔滯瞻彼崇高俄為塵翳亦有同好潛莊夙契超超增翥眇眇偕逝跡絶青崖影滅雲際藝文類聚三十六申三復贊嗜好深則天機淺名利集則純白離如此故識鑒逾昏驕淫彌太心與慎乖則理與險會然後役智以御險履險以逃害故陰陽寇其內人力政其外陰陽結則金石為之消人事至則雖智不足賴若然者雖翠幄華堂焉得而康之列鼎重味焉得而嘗之藝文類聚二十三閒遊贊昔神人在上輔其天理知溟海之禽不以籠樊服養櫟散之質不以斧斤致用故能樹之于廣漢棲之于江湖載之以大猷覆之以玄風使夫淳朴之心靜一之性咸得就山澤樂閒曠自此而箕嶺之下始有閒遊之人焉降及黃綺逮于臺尚莫不有以保其太和肆其天真者也具夫巖嶺高則雲霞之氣鮮林藪深則蕭瑟之音清其可以藻玄瑩素疵其皓然者舍是焉故雖援世之彥翼教之傑放舞雩以發詠聞乘桴而懍厲況乎道乖方內體絶風塵理楫長謝歌鳳逡巡蕩八疵于玄流澄雲崖而頤神者哉然如山林之客非徒逃人患避爭門諒所以翼順資和滌除機心容養淳淑而自適者爾況物莫不以適為得以足為至彼閒遊者奚往而不適奚待而不足故蔭映巖流之際偃息琴書之側寄心松竹取樂魚鳥則淡泊之願于是畢矣然奇趣難均玄契罕遇終古皆孤棲于一巖獨玩于一流苟有情而未忘有感而無對則綴斤寢絃之歎固已幽結于林中驟感于遐心為日久矣我故遂求方外之美略舉養和之具為雜贊八首畼其所託始欣閒遊之遐逸終感嘉契之難會以廣一往之詠以抒幽人之心云爾茫茫草昧綿邈玄世三極未鼓天人無際萬器既判靈朴乃翳實有神宰忘懷司契冥外旁通潛感莫滯總順巢禼兼應夷惠緬矣遐風超哉絶步顧揖百王仰怡泰素矜其天真外其囂務詳觀群品馳神萬慮誰能高佚悠然一悟藝文類聚三十六松竹贊猗歟松竹獨蔚山皋肅肅修竿森森長條藝文類聚八十八放達為非道論夫親沒而採藥不反者不仁之子也君危而屢出近關者苟免之臣也而古之人未始以彼害名教之體者何達其旨故也達其旨故不惑其迹若元康之人何謂好遁跡而不求其本故有捐本徇末之斃舍實逐聲之行是猶美西施而學其顰眉慕有道而折其巾角所以為慕者非其所以為美徒貴貌似而已矣夫紫之亂朱以其似朱也故鄉原似中和所以亂德放者似達所以亂道然竹林之為放有疾而為顰者也元康之為放無德而折巾者也可無察乎且儒家尚譽者本以興賢也既失其本則有色取之行懷情喪真以容貌相欺其斃必至于末僞道家去名者欲以篤實也苟失其本又有越檢之行情禮俱虧則仰詠兼忘其斃必至于本薄夫僞薄者非二本之失而為斃者必託二本以自通夫道有常經而斃無常情是以六經有失二政有弊苟乖其本固聖賢所無奈何也嗟夫行道之人自非性足體備暗蹈而當者亦曷能不棲情古烈擬規前修苟迷擬之然後動議之然後言固當先辨其趣舍之極求其用心之本識其枉尺直尋之旨採其被褐懷玉之由若斯塗雖殊而其歸可觀也跡雖亂而其契不乖也不然則流遁忘反為風波之行自驅以物自誑以僞外眩囂華內喪道實以矜尚奪其真主以塵垢翳其天正貽笑千載可不慎歟晉書戴逵傳釋疑論安處子問于元明先生曰蓋聞積善之家必有餘慶積不善之家必有餘殃又曰天道無親常與善人斯乃聖達之格言萬代之宏標也此則行成于己身福流于後世惡顯于事業獲罪乎幽冥然聖人為善理無不盡善積宜歷代皆不移行無一善惡惡相承亦當百世俱暗是善有常門惡有定族後世修行復何益哉又有束修履道言行無傷而天罰人楚百羅備嬰任性恣情肆行暴虐生保榮貴子孫繁熾推此而論積善之報竟何在乎夫五情六欲人心所常有斧藻防間外事之至苦苟人鬼無尤于趣舍何不順其所甘而強其苦哉請釋所疑以袪其惑先生曰善哉子之問也史遷有言天之報施善人何如哉荀悅亦云飾變詐而為姦詭者自足乎一世之間守道順理者不免飢寒之患二生疑之于前而未能辨吾子惑之于後不亦宜乎請試言之夫人資二儀之性以生稟五常之氣以育性有修短之期故有彭殤之殊氣有精粗之異亦有賢愚之別此自然之定理不可移者也是以堯舜大聖朱均是育瞽叟下愚誕生有舜顏回大賢早夭絶嗣商臣極惡令胤克昌夷叔至仁餓死窮山盜跖肆虐富樂自終比干忠正斃不旋踵張湯酷吏七世珥貂凡此比類不可稱數驗之聖賢既如彼求之常人又如此故知賢愚善惡修短窮達各有分命非積行之所致也夫以天地之元遠陰陽之廣大人在其中豈唯稊米之在太倉毫末之于馬體哉而匹夫之細行人事之近習一善一惡皆致冥應欲移自然之彭殤易愚聖于朱舜此之不然居可識矣然則積善積惡之談蓋施于勸教耳何以言之夫人生而靜天之性也感物而動性之欲也性欲既開流宕莫檢聖人之救其斃因神道以設教故理妙而化敷順推遷而抑引故功元而事適是以六合之內論而不議鑽之而不知所由日用而不見所極設禮樂以開其大朦名法以束其形跡賢者倚之以成其志不肖企及以免其過使孝友之恩深君臣之義篤長幼之禮序朋執之好著背之則為失道之人譏議以之起向之則為名教之士聲譽以之彰此則君子行己處心豈可須臾而忘善哉何必循教責實以期報應乎苟能體聖教之幽旨審分命之所鍾庶可豁滯于心府不祈驗于冥中矣處子乃避席曰夫理蘊千載念纏一生今聞吾子大通之論足以釋滯疑袪幽結矣僕雖不敏請佩斯言廣弘明集二十答周居士難釋疑論間以暇日因事致感脫作釋疑以呈法師既辱還告并送來難辭喻清口致有旨歸但自覺雖先觀者莫悟所見既殊孰是能正敬懷未悟請共盡之僕所為能審分命者自呼識拔常均妙鑒理宗校練名實比驗古今者耳不謂淪溺生死之域欣戚失得之徒也苟能悟彭殤之壽夭則知修短之自然察堯舜于朱均以得愚聖之有分推淵商之善惡足明冥中之無罰等比干盜跖可識禍福之非行既能體此難事然後分命可審不祈冥報耳若如來難宅情于理則理未可喻請求諸己其明效矣此乃未喻由于求己非為無理可喻也若舍己而外鑒必不遠而復矣難曰勸教之設必傍實而動直為訓之方不可以一塗而盡僕豈謂聖人為教反真空設邪答曰夫善惡生于天理是非由乎人心因天理以施教順人心以成務故幽懷體仁者挹元風而載悅肆情出轍者顧名教而內掬功元物表日用而忘其惠理蘊冥寂濤之不見其宗非違虛教以眩于世也是以前論云神道以設教故理妙而化敷順推遷而抑引故功功而事適者也難曰安于懷仁不沒其身臧會以僭有後魯國則分命所鍾于何而審元明之唱更為疑府矣答曰斯乃所以明善惡之有定不由于積行也若夫仁者為善之嘉行安于懷而受福僭者反理之邪事臧會為之而獲後良由分應沒身非履仁之所移命當為後非行僭之能罰豈異比干忠正而嬰割心之戮張湯酷吏而獲七世之祐哉苟斯理之不殊則知分命之先定矣乃同元明之有分非為成疑府也難曰古之君子知通否之來其過非新賢愚壽夭兆明是昔楚穆以福濃獲沒蔡靈以善薄受禍郤宛以釁深莫救未桓以愆微易唱答曰夫通否非新壽夭自昔信哉斯言是僕所謂各有分命者也若夫福濃獲沒釁深莫救此則報應之來有若影響蔡靈以善薄受禍商臣宜以極逆罹殃宋桓以愆微易唱邾文應用行善延年而罪同罰異福等報殊何明鑒于蔡宋而獨昧于楚邾乎君所為不祈驗于冥中影響自微不期在于應報而慶罰以彰于斯躓矣難曰然則天網恢恢疏而遂失邪莫見乎隱莫顯乎微但盈換藏于日用交賖昧于理緣答曰夫天理冥昧變狀難明且當推已兆于終古考應報之成跡耳至于善惡禍福或有一見斯自遇與事會非冥司之真驗也何以明之若其有司當如之治國長之一家善無微而不賞惡無纖而必罰使修行者保其素履極逆者受其酷禍然後積善之家被餘慶于後世積不善之家流殃咎乎來世乎而今則不然或惡深而莫誅或積善而禍臻或履仁義而亡身或行肆虐而降福豈非無司而自有分命乎若以盈換藏于日用交賖昧于理緣者但當報對遲晚不切目前耳非為善惡舛錯是非莫驗推斯而言人之生也性分夙定善者自善非先有其生而後行善以致于善也惡者自惡非本分無惡長而行惡以得于惡也故知窮達善惡愚智壽夭無非分命分命元定于冥初行跡豈能易其自然哉天網不失隱見微顯故是勸教之言耳非元明所謂本定之極致也既未悟妙推之有宗亦何分明之可審乎將恐向之先覺還為後悟矣言面未日聊以讜敘廣弘明集二十竹林七賢論嵇康字叔夜與東平呂安少相知友每一相思輒千里命駕御覽四百九嵇紹入洛或謂王戎曰昨于稠人中始見嵇紹昂昂然野鶴之在雞群藝文類聚九十阮籍字嗣宗性樂酒善嘯聲聞百步箕踞嘯歌酣放自若時蘇門山中忽有真人在焉籍親往尋其人于巖巔遂登嶺從之箕坐相對籍乃商略終古以問之仡然不應籍因對之長嘯有頃彼乃齗然笑曰可更作籍又嘯意盡退還半嶺巔然有聲若數部鼓吹顧瞻乃向人之嘯也藝文類聚十九御覽三百九十二魏朝封晉文王固讓公卿皆當喻旨司空鄭沖等馳使從阮籍求其文立待之籍時在袁孝尼家所宿醉扶而起書几板為文無所治定乃寫符信書鈔一百三十三御覽七百一十籍之抑渾蓋以渾未識已之所以為達也後咸兄子簡亦以曠達自居父喪行遇大雪寒凍遂詣浚儀令令為它賓設黍臛簡食之以致清議廢頓幾三十年是時竹林諸賢之風雖高而禮教尚峻逮元康中遂至放蕩越禮樂廣譏之曰名教中自有樂地何至于此樂令之言有旨哉謂彼非玄心徒利其縱恣而已世說任誕篇注籍歸遂著大人先生論所言皆胸懷閒本趣大意謂先生與己不異也觀其長嘯相和亦近乎目擊道存矣世說棲逸篇注籍與伶共飲步兵廚中竝醉而死此好事者為之言籍景元中卒而劉伶太始中猶在世說下之上注劉伶病酒渴甚從婦求酒婦捐酒毀器涕泣諫曰君飲太過非攝生之道必宜斷之伶曰甚善我不能自禁唯當祝鬼神自誓斷之耳便可具酒肉婦曰敬聞命供酒肉于神前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽便飲酒進肉隗然已醉矣世說任誕篇注云見竹林七賢論御覽四百八十劉伶嘗醉與俗人相忤其人攘袂而往必欲毆之伶顧而笑曰雞肋不足以安尊拳御覽二百七十一秀為此義讀之者無不超然若已出塵埃而窺絶冥始了視聽之表有神德玄哲能遺天下外萬物雖復使動競之人顧觀所徇皆悵然自有振拔之情矣世說文學篇注山濤與阮籍嵇康皆一面而契若金蘭濤妻韓氏嘗以問濤濤曰當年可為友者唯此二人耳妻曰負羈之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿具酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊輩亦當謂我識度勝御覽四百九又四百四十四鬲令袁毅為政貪濁賂遺朝廷以營虛譽嘗遺山濤絲百斤衆人莫不受濤不欲為異乃受之命內閣懸之梁上而不用也後毅事露案驗衆官令吏至濤所濤于梁上下絲已數年塵埃黃黑封印如初以付吏御覽四百九十三又八百十四咸寧中吳既平上將為桃林華山之事息役弭兵示天下以大安于是州郡悉去兵大郡置武吏百人小郡五十人時京師猶講武山濤因論孫吳用兵本意濤為人常簡默蓋以為國者不可以忘戰故及之世說識鑒篇注永寧之後諸王構禍狡虜欻起皆如濤言世說識鑒篇注濤之處選非望路絶故貽是言世說政事篇注王戎眸子洞徹視日而眼明不虧藝文類聚十七王戎幼而清秀魏明帝于宣武場上為欄苞虎牙使力士袒裼迭與之搏縱百姓觀之戎年七歲亦往觀焉虎乘間薄欄而吼其聲震地觀者無不辟易顛仆戎亭然不動帝于閣上見之使問姓名而異焉水經穀水注御覽八百九十二初籍與戎父渾俱為尚書郎每造渾坐未安輒曰與卿語不如與阿戎語就戎必日夕而返籍長戎二十歲相得如時輩劉公榮通士性尤好酒籍與戎酬酢終日而公榮不蒙一杯三人各自得也戎為物論所先皆此類世說簡傲篇注王戎女適裴氏用匱女為貸錢一萬久而不還女歸戎色不悅遽還錢乃釋御覽三百八十八王戎為侍中南郡太守劉肇遺戎筒中布五十端戎不受而厚報其書議者以為譏世祖患之為發詔議者乃息御覽八百二十王戎簡脫不持儀形好乘巴白馬雖為三司率爾私行巡省田園不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之御覽七百十六又八百九十七王濟嘗解禊洛水明日或問王濟曰昨日游有何論議濟曰張華善說史漢裴逸民敘前言往行袞袞可聽安豐侯道子房季札之間超然玄著藝文類聚四又五十五御覽三十俗傳若此潁川庾爰之嘗以問其伯文康文康云中朝所不聞江左忽有此論蓋好事者為之耳世說喪逝篇王濬沖為尚書令過黃公酒壚謂昔與嵇阮酣飲于此注云云阮咸善彈琵琶藝文類聚四十四諸阮前世皆儒學善居室唯咸一家尚道棄事好酒而貧舊俗七月七日法當曬衣諸阮庭中爛然錦綺咸時總角乃豎長竿挂大布犢鼻㡓于庭中人問之曰未能免俗聊復爾爾世說任誕篇注御覽六百九十六又八百十六藝文類聚四北堂書鈔一百五十五咸既追婢于是世議紛然自魏末沈淪閭巷晉咸寧中始登王途世說任誕篇注
