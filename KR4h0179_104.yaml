body:
  text: 卷一百零四陸雲祖考頌雲之世族承黃虞之苗緒裔靈根之遺芳用能枝播千條穎振萬葉繁衍固於三代饗祀存乎百世豈非皇慶之積祐神明之殷祥者哉在周之衰有媯之後將育于姜而貞龜發鳴鳳之兆周史表觀國之繇故能光宇營丘奄有東海支庶蕃廡而胤祚昌大矣遭世多難子孫蕩析逐于南土烈祖丞相邵侯顯考大司馬武侯明德睿哲沉雄特秀固上天所以繼跡前期惠成顧者也是以有吳雲興而邵侯龍見遂風騰海堣電斷荊楚運籌制勝底定經略文德光宣武功四克乃作台衡以御于王政天罔與先代比隆義問與前修接響固所謂汪洋浩浩不世出者哉武侯以光遠之度襲重規之範宣朗之明照曾暉之景故寅亮樞極則萬物淳曜緝熙有邦而宇內恪居及至中葉亂曰虎臣綏援既集而大難時弭德濟封域之內威揚函夏之表遂仍世作宰焜曜祖業車實襲軌裘不改帶元勳昺於光國洪烈著於隆家考德計功比之前代未有茂於此者也是以小子敢慕徽猷欽述芳烈雖不足以當朱弦之一唱發清廟之三歎蓋爾臣子之遺恩罔極之所處也乃作頌曰悠悠聖緒上帝是臨世篤其猷于顯徽音神風往播福祿來尋靈根既茂萬葉垂林繁盛海堣穎寧漢陰既曰寧止芳祐允淑乃步斯淳降神有陸赫矣二公應期載育明明邵侯允哲允謀睿心昭德叔問宣猷如日之升如川之至炎精既頽黃揮昺煥光宅海邦大造江漢王于出征二公斯難長驅致屆九有有判咸黜凶醜區域寧晏天祿未終大命有集卜食東夏元龜既襲聿來耶宮作蕃舊邑公徒斯振帝旅凱入於變時雍神道經始肅肅九命永言徽止公拜稽首對天子猗歟盛歟邵侯有作我考纂戎爰究爰度遠除尋軌崇基式廓昭明有家祖廟奕奕中葉虎臣稱亂西秦靈旆電揮伐鼓霆震會朝哀舉征不浹辰遐風遠掃萬里無塵有族斯祐念功在茲袞衣之宜遂作上司台光增朗方險載夷穆矣暉章有吳之旗我祖我考受言藏之曄曄藻裳再命同服騑騑四牡二世方轂分圭比瑞天秩底祿公堂峻趾華構重屋昔在二伊于殷有聲在漢之興亦曰韋平惟祖惟考履貞大亨邈彼披陽追蹤阿衡駿惠雨施景潤雲行洋洋玄化功濟其民風馳海表光被嶽濱二后重規世有哲人肅雍碩響萬載是振張二侯頌張氏之先蓋少昊氏之苗裔也其在春秋晉德方休而張老延譽爰暨有漢文成佐命於初基司空揚聲於末葉流長祚遠世不乏侯輔吳將軍文侯遭季末雲擾遂避難于東有吳之興實為謀主桓王即世援建太祖知命審於將萌先識鏡於未兆遂作上將輔成王業立朝無不易之方正色有犯顏之亮固所謂謇謇王臣古之遺直者也奮威將軍定侯明德光遠軌量弘濟文敏足以華國威略足以振衆重規繼體而大業暉崇故休祚頻繁寵靈仍世天秩之體彌彰而毀盈之心茲沖用能保寵固世考終碩問蓋竹帛之所光宣詠歌之所揄揚也乃作頌曰烈文遠祖肇自上皇金天淳曜遂濟窮桑真人有作飛龍在天留侯載見階雲自淵即謀神造啓運妙玄有漢再命度邑于東其在中葉誕育司空邈矣唐陵有恭斯庸寧行盈止世篤天祿神之聽思俾我戩穀繁過芳祐底之洪族洪族既昌再惠音徽於穆二侯仍世雙飛堂堂輔吳抑抑奮威如龍之躍如鳳之揮薄言戾止在彼紫微金卯紛若四海畔換文侯乃顧妙世達觀逝彼塗方度茲江漢鳴飛遵海聿來有亂遭家不造殲我明聖桓后肇揚侯承末命皇大蒸哉天保未定匪侯恤度宗緒孰正帝整我旅外簿四荒命作惟師時惟鷹揚遂登上將亮彼大皇底邑胙土命圭有璋蹇蹇我侯明發宿夜襲彼遺直興言有謨聿懷來忠王室之故猗歟定侯祗服清曜奕奕瓊範玉潤淑貌淵謂往藏朗思來照曾是徽章再世被荷庸勳開國明道隆家苾苾其芬淑問楊和有蔚其文如林之華皇矣帝祚受言既崇女有行作合儲宮條延延紫極穎衍皇寧舋舋定侯在盈思沖柢寵戒溢永懷慎終重光並曜播我芳風榮啓期讚榮啓期者周時人也值衰世之季末當王道頽凌遂隱居窮處遺物求己泝懷玄妙之門求意希微之域天子不得而臣諸侯不得而友行年九十被裘鼓琴而歌孔子過之問曰先生何樂答曰吾樂甚多天生萬物唯人為貴吾得為人矣是一樂也以男為貴吾又得為男是二樂也或皆不免於襁褓而吾行年九十是三樂也夫貧者士之常也死固命之終也居常待終當何憂乎孔子聽其音為之三日悲常被裘帶索行吟於路曰吾著裘者何求帶索者何索遂放志一丘滅景榛藪居真思樂之林利涉忘憂之沼以卒其天年榮華溢世不足以盈其心萬物兼陳不足以易其樂絶景雲霄之表濯志北溟之津豈非天真至素體正含和者哉友人有圖其象者命為之讚其辭曰芒芒至道天啓德心自昔逸民遁志山林邈矣先生如龍之潛夷明收察滅跡在陰傲世求己遺物自欽景遁瓊輝響和絶音戀彼丘園研道之微思樂寒泉薄採春蕤鳴弦清泛撫節高徽有聖戾止永言傷悲天造草昧負道實嘉於鑠先生既體斯和熊羆作祥黃髮皤皤耽此三樂遺彼世華翼翼彼路行吟以遊的的黻冕陋我輕裘永脫亂世受言一丘媚茲常道聊以忘憂逸民針余昔為逸民賦大將軍掾何道彥大府之俊才也作反逸民賦盛稱官人之美寵祿之華靡偉名位之大寶斐然其可觀也夫名者實之賓位者物之寄窮高有必顛之吝溢美有大惡之尤可不慎哉故為逸民針以戒反正焉浩浩太素制為兩儀經始君臣朝有俊弼野有逸民各有攸屆而後品物有倫在昔后帝齊物達觀賞不假爵教不示勸號諡莫設而生黎淳晏降迄中古黃象可觀而唐文有煥乃雕乃藻大朴既散朴之既散萬百熙心形為寵放神為利淫有翹者車命彼在林是故懷玉喪寶而被褐解襟恬亡智生與世或競匪智無鑒匪心伊鏡芒芒禹迹鞠為塗徑惟是每懷偏彼反正正反於寵既尸干祿相協厥居而豐其屋祿之既尸刑為爾司屋之既豐喪家于宮故非據之災戒之在凶人皆知存之為存而莫知得之為喪榮猶振穎墜若頽荒咎自專寵福在循牆是故保其安者常危而忘其存者不亡無休爾榮身實親名無謂爾崇神期好沖戒彼覆餗冒此棟隆慎微如顯乃保身以終自古在昔逸民有作相彼宇宙方之委舄夫豈無不休而好是沖漠是故名利之災至人攸恪謂豫未信無寧監于桑霍天明既畏神道無親善在求己慶由積仁無念爾本聿修厥淳執盈如虛乃反天真逸民司正敢告官人吳故丞相陸公誄惟赤烏八年二月粵乙卯吳故使持節郢州牧左都護丞相江陵郡侯陸公薨嗚呼哀哉皇朝迭紹成命昊天聖王作矣世有哲臣觀監在吳乃降斯神思皇我后應運對揚穎秀崇華景逸扶桑龍輝紫極鳳鳴玉堂舉旗清阻奮鉞夷荒悠結沉維峻極公綱將撫遠績括地九圍皇淳爽泰昊旻疾威生民如何哲人其頽登靈在天遺音播徽敢揚元勳表之素旗乃作誄曰濬哲我祖時文畯德玄粹納真清休載式本承慶輝駿惠罔極申錫多祜本支千億芳條遠蔭靈根茂植根條伊何苗黃裔舜長發有祥貽我祚晉神明之緒實蕃瑰雋和音嗣世不替碩彥明鑒在下降命上玄我公初載天嘏之純重光納照旋璣授銓仰儀喬嶽俯濯洪川清輝秀穎雲翹映晨肇彼岐嶷允迪天真先心則智率意斯仁秉夷清昧體靈協神神休載鑠九德兼和挹揮茂朴豐淳鎮華景峻凌高玄源踴波造辰竦隆彌海廓遐光備既淳逸軌爰超閎罔苞荒景靈渥耀山林嶽秀天光乃照窮化機神探頤衆妙駭塵氛埃澄響清肖恢淵博量騰嶮峻邵振綱宇表登軌絶蹈厥初藏器栖蟠海嶽披藻崑崙濯秀暘谷沉輝熙茂清塵熠鑠含章在淵發揮龍躍時復陽九承乾之衰有皇于井王軒徘徊爰茲赫奕需期雲飛天步皇輿載見太微華堂誕基委蛇自階鼎輝既隮嘉命乃集和美未飪宰物下邑康年屢登惠風時協在斷無頗于教斯輯金虎覿精戎車孔肆神寶播越天人釋位有命在茲帝思元帥委辨總干振翼虎噬威靈既授六軍有序乃誓我衆乃整我旅神干山立雄旗電舉懸旍泛陽即戎江滸我后日敬上帝臨豫靖端夙夜匪寧匪處經始綿綿滂沱惟海乃幹中軍入作內輔公侯陟降在帝左右關羽滔天作雲西土帝曰將軍整爾熊虎赫赫明明皇輿出祖龍舟照淵旟旐映野鋪敦江濆仍執醜虜荊南既集方嶮未夷天子命我撫之西垂公侯戾止威神緝熙虔劉作虐思輯子來妖旌北靡搴爾雄旗獷狓群蠻祁祁遺黎柔遠能和薄言綏之方堣肅清烈文雋武舍爵明堂冊勳天府天子曰咨我圖乃功錫爾青土建侯于東開國名墟光宅海邦分圭作寶軒輅以庸既受帝祐公用如大四鐵孔阜元戎杳藹淑旗飛藻綏章丞蓋振我輝靈四方于邁劉王負嶮寇我西鄰公侯赫怒干戈啓陳金鉞鏡日雲旗絳天凌岡襄嶽沉維括淵元王隕難鯨鯢墜鱗戎漢時殪方域清塵曹休東踰我疆斯越帝簡厥佐將命其傑乃俾我公啓行警伐江漢之滸恪恭授鉞揖帝整旅隱爾霆發桓桓神誅震驚魏方我公矯矯虎視元戎截彼醜旅效此武功武功既彰天威薄曜靈武震華邊垂清暴振旅凱入王假有廟假廟伊何本庸寵祚土田陪敦四牡載路出餞于郊此惟豫顧禮嘉嵩高樂和湛露改容肅至傾蓋寵步鞶帶翩紛珍裘阿那區宇惟寧繁遏帝祉於穆疇咨敷奏多士將庸元輔相惟天子僉曰公侯宜有爰止繡裳縟藻袞帶重紫遂虛上司命公登宰帝曰丞相朕嘉君德以茲軒冕往踐乃職宣爾睿心維黃協極邦國若否四方爾式公拜稽首欽翼明聖乃御機衡仰徽七政祗恪丕顯無易惟命巍巍天邑惟清四門公侯作弼煥炳皇文重輝熾景協風煙熅百神秩祀兆獻思淳克諧庶尹遂成帝勳時雍既濟王途克廣儀形我度軌物垂象後遐施歸崇廕惠仰茂德栖音廣問沉響洪範遠迪玄猷洞深靈澤崇藪天嶮垂陰翰飛樂嶮淵蟠泳沉澤豐泉丘潤博雲林遭世大過彝倫靡肅亹亹公侯思維雅俗發憤戎衣永言禮樂被分敦化荷戈思學體仁長物御風熙國睿鑒擢微玄輝鏡璞戒危膏粱收俊白屋五品時訓民神攸鑠我有奐文如曜如辰何以崇之匪闡伊人我有烈武如震如霆何以將之保大豐年思弘景業熙世登民克壯碩老秉鉞河津祉祚勿引早世幽神仰慕遺輝寤辟憂殷嗚呼哀哉永惟我公克明德心紛藹芳和被之惠林公侯沒矣孰嗣徽音名存體逝德茂形潛民之秉思好是嘔吟嗚呼哀哉惟帝念功寵命光大考諡典謨崇榮協泰安宮載考我公于邁輀軒啓塗先驅驚旆哀風結輿遺思馮蓋舍此休明即彼重藹攀慕靡及永戀光愛嗚呼哀哉晉故散騎常侍陸府君誄惟太康五年夏四月丙申晉故散騎常侍吳郡陸君卒嗚呼哀哉天降純嘏誕育俊乂才雄九奧德鍾三懿應運繼期顯微闡昧特恢大猷雍化熙世昊天不吊奄忽零墜嗚呼哀哉朝隕棠幹邦喪國輝帝欽遺烈士詠清機思經皇心痛浹民懷揮淚充邑惜慟盈畿敢述洪迹于茲素旗其辭曰於穆皇源時惟誕弘權輿有媯爰帝暨王徽音接響丕祚克昌乾鑒南眷誕降我祖顯考尚書納言帝宇正命惟允銓衡攸序篤生常侍固天所隆祚以靈粹陶以惠風道協體稟德與性鍾睿心遠暢淵思遐通瞻言潛覽克哲克聰耽精遐奧肆志篇章仰咨遺訓思齊曩蹤摛光啓晦微言是綱錯綜群藝精徹豪芒顯允間姿既明且緯敦敘泛愛經德紀義契闊邦族是綜是緯博約以禮陳錫載施雍雍閨闈克諧由仁率禮崇化色養寧親九族和睦德被宗姻猗猗髦俊祁祁縉紳鑽仰明範挹道希塵愷悌弘裕惠化是振潛機密暢靡幽不甄濯以清波權以明鈴旌善板築刊穢紫辰邦無偷幸靈不牟真沐浴玄源風移俗純儀德鄒甸比化泗濱耀略切輝既升末融爰蒞揚邑作尹名邦密邇帝畿大東小東宣敷五教敞化以崇徵無墜命興無廢功帝欽良政民懷穆風粵稽舊章率由典刑考績三載絀幽陟明超踐皇闥紆組垂纓奕世納言帝衡以平本崇曩烈堂構克榮征鼙屢振干戈未戢乃秉雄戟徵戎東邑四牡徂征威德以立爰守會稽青紱既襲帝曰欽哉疇咨群后改授顯服屯騎是撫雍容皇甸綜文經武時值大過士爽其德虔惟常侍高明柔直履冰察霜淪心遠測春存三季形志于色頻顣厄運載離咎慝靖亨思順曹氏匪革投辨釋紱浩思東嶽遁世無悶清源是濯馥風彌馨明徽載鑠皇途既闢天罔誕張運在九五違嶮即康猗歟高懿避風遠臧帝降大命丘園是揚祼將天邑舒藻舊京僉曰休哉昭德塞違乃升常伯補闕拾遺振纓紫極攄光太微奕奕玄冕熠熠貂璫仰耀皇維俯映明堂輿振鳴鸞體佩琮璜居德彌沖雖休匪康既跚君宿未跱鼎辰將陟太階弘載育民皇靈靡顧大命奄臻厲凶彌留倏忽頽湮嗚呼哀哉黃河難澄梁木易荒聖賢絶景希世齊光豈曰徒生實維天綱於鑠常侍本德昭仁俯鏗瑤響仰綴玉振其在克壯自蹇乘屯鳳翳靈條龍竄祕泉收逋匿耀洪略陶縕雖跚嘉運託景風雲瑰光既耀靈寶未闡弗慮皇圖銜恨徂遷嗚呼哀哉江河慕海丘陵樂山於惟君德齊聖廣淵群彥景附漸化濯真蓋以崇嚴函以裕淵西徂華源負澤慕塵幽萌潛暢滯思賴振六言六行匪君不肅五有三無匪君不極衡准失平匪君不直方榮遐邈匪君不式君其永沒民其焉則結思遺愛惟哀允惻嗚呼哀哉仲尼喪魯孺慕失聲國僑殞鄭邦無竽笙實惟常侍徽懿克明思懷士心信結民情聞者巷泣赴者風征八音輟響獻酢弗營羽楫翳川輕駕盈庭揮袂雲藹殞淚雨零嗚呼哀哉伊惟平生襲寵荷輝愷樂承明桑梓猶哀聿懷震丘言告言歸明德遠燭慮凶以吉雖則榮泰存亡是恤爰築新邑經始匪日眷懷不虞寧襯斯室王事靡盬皇畿是旋鳴和吉往曾未浹辰震旆凶歸輝景長泯痛感皇祗哀普四民嗚呼哀哉穆穆天子昭明有融乃命三人禮憲是崇賜以歸賻榮以贈終冠蓋南徂映族輝邦日薄南陸辰次天漢龜策協貞靈域載判明器既庇神道已羡縣象未登明星有爛軒車微動執紼同贊永棄高廈黃廬是館寧彼昏昧荒此輝粲幽房長鍵修夜靡旦翼翼輕蓋翩翩丹旗龍章舒藻旟旐有輝轜輪轇結玄駟徘徊人誰弗思靡思匪哀援扎心楚投翰餘悲嗚呼哀哉晉故豫章內史夏府君誄惟永寧元年五月二十五日晉故豫章內史夏府君卒嗚呼哀哉乾鑒育俊崇茲大猷景靈垂祐黃精協符濯蹤浩素闡志玄流熙光聖代邁勳九區哀彼造物殂命不均既褒斯美吝茲遐年祁祁搢紳泣涕流連故作斯誄著之不泯其辭曰於穆府君遠祖彌光功濟黎獻澤洽八荒披圖承禪襲化軒唐洪風既振遐曜休煌越殷自周紹膺遺祉亮節三恪侯服于祀悠悠訖茲徽烈不已奕世本弘厥美是紀惟神隆慶篤生府君玄祐秀朗揮景烟熅誕載豐美俊穎夙繁性與體和孝友穆融虔茲君親姻族睦崇情廣褒誘品物虛躬安仁履素接舊以沖澄鑒博映哲思惟文淪心衆妙洞志靈源探幽判疑沉欲焱分甄滯群祕義猶一貫崇規邈世體道而盤瞻言先機蔚藻騰翰處約由厚交順于顏文武未墜君惟克修百行殊揆君望斯周栖義初九戢翼洪條瓊輝四灼景問綢繆在昔我國元首載哲假寐俟旦思庸俊逸旃檢高麾體亦秩秩儀刑柳惠庶績惟穆既穆其績英風彌卲天子有命曾是在朝頻繁幃幄祗承皇曜神以測幽明以遠照目難識夷觀嶮改蹈譬彼清鑒莫塵其操五紀迭御載隆載傾南嶽頽鎮蔭輝素靈瑾瑜遷寶投跡上京兆萌未緝皇聖攸嗟韋臨猗氏接彼郇瑕道之以禮育之以和齊俗拯弊民靡不嘉振我翰音洋鑠諸華明明皇儲睿哲時招奮厥河滸矯足雲霄俄軒玄闢徽英揚飆光灼東朝髦士攸希媚茲一人亦既翰飛委蛇華閣陟降太微納言贊事淵裕徘徊習習和風惟穆惟宣亦曰武昌厥俗允新我后有命爰授俊臣君子云顧義在安親秉文共武言撫舊京仰肅慈顏俯熙典刑移彼滯汙泮宮時營衆否斯濟飛梟革聲春翹晞景振鷺在庭高墉未奮遭茲閔凶頻顣泣血三載以終哀響未歇臺命朝隆厥命伊何俾守南裔匪曰是屯託身虛概巾車既脂駕言將逝彝倫惟清路逼其序君之于遠乃恢斯緒思彼衆逸言尋厥楚暮瞻豐林晨看淵水濯奇以翹披途導軌彼湘之東地嶮俗危明德審罰替幽崇儀嚴不式刑仁扶物施威和咸振澤被遐畿皇道御世與民靡偏敷彼惠政濟此未均思一黔首濯溉義淵揖望皇命修翮徊翔循彼江濆乃眷豫章觀風樹政德音允張洪化既攄禮樂克昌間非秋厲惠淑春陽廣命俊乂惟弓與旃丘園靡滯鸞驥憑軒豈方伊類捉髮躬勤震我聲教邁嚮惟殷君化大揚自北而南君澤本沃河漢載咸慶輝雲蔭埿潤川漸將配皇宿登景具瞻昊天不弔乃降茲厲高祿朱融凶焱中燧寢疾彌留大命隕墜邦家不紀沉哀結世嗚呼哀哉式玩遺美君實克明懷光暢幽晞髮結清體德秉真審行居貞屈曳蹈機與世靡矜天命棐諶唯仁則延任道委分亮曰斯然孰云府君不聞其言永懷載念憂心孔艱曰兄曰弟篤愛纏綿晞光繼參融鴻振今君何之背世遐湮同生拊膺號哀瘁身眇眇孤微過庭曷遵天何忍斯于何之臻自君初邁既夷且榮今君反矣素旗垂銘雖光百辟託晷玄靈民慟于顯神孤于冥物從人感轅馬失征飄風悼響潛魚仰驚豐霄蹙蔭衆羽徊鳴嗚呼哀哉瞻彼日月歲聿云夕寒暑窮化四辰交錯日考三從案轡長薄藹矣轜軒脫駕窀穸背榮孤世寧神大漠丘陵竦廕閝闥寥窙寤摽惟哀心摧涕潵嗚呼哀哉咨豫與君恩親之微蒙恤于昔投纓瀾猗思周弱志永庇惠輝如何府君昭景長違願言詠眷載傷載悲昔我經年逝彼川路進闕趨奔退違陵墓仰瞻靈丘俯增永慕側剝肝懷哀其曷厝嗚呼哀哉
