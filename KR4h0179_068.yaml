body:
  text: 卷六十八夏侯湛寒雪賦嚴氣枯殺玄澤閉凝文選雪賦注集洪霰之淅瀝煥摧磊以索同上既增覆而纍鎮又加裘而兼衣同上野田游獸榛蕪棲鳥蛇枯虯于幽穴兮龍潛身于天表北堂書鈔一百五十八雷賦伊朱明之季節兮暑燻赫以盛興扶桑煒以揚燎兮雷火曄以南升大明黯其潛曜兮天地鬱以同蒸掣丹霆之焰焰兮奮迅雷之崇崇馳壯音于天上兮激駿響于地中徒觀其霰雹之所搖鑿火石之所燒爍雲雨之所澆沃流潦之所淹濯當衝則摧破遇披則殲溺山陵為之崩蕩群生為之震辟是以大聖變于烈風小雅肅于天高嗟乾坤之神祇兮信靈威之誕昭故先王制刑擬雷霆于征伐恢文德以經化兮耀武義以崇烈苟不合于大象兮焉濟道以成哲初學記一電賦攢雲間而飛火絳煙起于雲中御覽十三禊賦羡暮春之嘉辰美靈氣之和柔結方軌于泰路敷令節而宣遊爾乃鈴鳴擢翠旗垂繁纓微雲乘軒清風卷旌飛輪焱起良馬電驚車駕鱗萃男女霧會服煥羅縠翠翳連蓋縈香丸于素襟結九齡乎時外粲爛虺韡焜曄發越若乎朝春挺葩夕霞抱月爾乃臨清流背緑柯雲幕高接丹組四羅藝文類聚四初學記四大暑賦惟青春之謝兮接朱明之季月何太陽之赫曦乃鬱陶以興熱於是大呂統律祝融紀節蒸澤外熙太陰內閉若乃三伏相仍徂暑肜肜上無纖雲下無微風扶桑赩其增燌天氣曄其南升爾乃土墳地坼谷枯川竭寒泉潛沸冰井騰沫洪液蒸于單簟兮珠汗霑乎絺葛溫風翕其至兮若灑湯于玉質沃新水以達夕振輕箑以終日藝文類聚五初學記三又四歎秋賦陰籠景而下翳文選江淹雜體詩注梁田賦嬉于夷寧之廣陸步于大野之長京察田疇之疆畔兮觀遊雉之逸形御覽五十六沈朱李濫甘桃御覽九百六十七鞞舞賦專奇巧于樂府兮苞殊妙乎伶人匪繁手之末流兮乃皇世之所珍在廟則格祖考兮在郊則降天神納和氣于兩儀兮通克諧乎君臣協至美于九成兮等太上乎睿文初學記十五引兩條夜聽笳賦越鳥戀乎南枝胡馬懷夫朔風惟人情之有思乃否滯而發中南閭兮拊掌北閻兮鳴笳鳴笳兮協節分唱兮相和相和兮哀諧慘激畼兮清哀奏烽燧之初驚展從繇之歎乖伸棄兮更纏遷調兮故韻披涼州之妙參掣飛龍之奇引垂幽蘭之遊響來楚妃之絶歎放鵾雞之弄音散白雪之清變藝文類聚四十四繳彈賦張弱弓理繁繳望大群以送丸審遣放而必獲藝文類聚六十御覽三百五十獵兔賦爾乃乘露箱御良馬循乂接于廣漠弓矢連于曠野端眺蒿萊摘盱榛穢落目攢慨傍窺蓊薈視毚兔之所隱乃精望而審發弦絶箭激驚伏竝斃搜鱗危險覓歷岡阜留罾掛于重林疏罝結于通藪密驚視于草間暫見之于蒙茸擬以鋭殳規以良弓覩毫末而放鏃乃殪之于窟中或紛欻以驚騖影跳竦而揚白擢輕足之煢煢振遊形之躍躍弓不暇彎罝不及幕爾乃鷹鷂翻以飄揚徑翼謖而下猘馬釋控以長騁鬱騰虛而陵厲翕習于回阻之間繞繚于山澤之際盤迂遊田其樂泄泄心既倦兮日遷命輿駕兮將還息徒蘭圃秣驥華田目送歸鴻手揮五絃優哉遊哉聊以永年藝文類聚六十六又略見御覽三百五十三雀叉賦覽嘉藝之機巧持精思于雀叉收泉珍于八極納瓌異以表奇布太陽而擬法妙團團而應規于是妍姿英妙之徒相與競嬖寵竝修敕理桂襟整服飾黛玄眉之琰琰收紅顏而發色流盼間步輕袂翼翼恃炫豔以相邈常逍遙而侍側昔先王興道立教崇沖讓以致賢不留志于華好藝文類聚七十缸燈賦珠珍寶器奇像妙工取光藏煙致巧金銅融冶甄流陶形定容爾乃隱以金翳疏以華籠融素膏于回槃發朱耀于綺窗宣耀蘭堂騰明廣宇焰煜爚于茵筵煥照乎屏組藝文類聚八十秋日既逝冬夜攸長文選別賦注合歡被賦舉華鏡以自覽被玄鬢而垂白北堂書鈔一百三十六鏡六十五宜男花賦淑大邦之奇草兮應百則之休祥稟至真之靈氣兮顯嘉名以自彰冠衆卉之挺生兮承木德于少陽體柔性剛蕙潔蘭芳結纖根以立本兮靈渥液于青雲順陰陽于滋茂兮笑含章之有文遠而望之若丹霞照青天近而觀之若芙蓉鑒緑泉萋萋翠葉灼灼朱華曄若珠玉之樹煥若景宿之羅充后妃之盛飾兮登紫微之內庭回日月之暉光兮隨天運以盈虛藝文類聚八十一芙蓉賦臨清池以遊覽觀芙蓉之麗華潛靈藕于玄泉擢修莖乎清波煥然蔭沼灼爾星羅若乃回縈外散菡萏內離的出豔發葉恢花披緑房翠蒂紫飾紅敷黃螺圓出垂蕤散舒纓以金牙點以素珠固陂池之麗觀尊終世之特殊爾乃採淳葩摘圓質折碧皮食素實味甘滋而清美同嘉異乎橙橘參嘉果以作珍長充御乎口實藝文類聚八十二御覽九百七十五浮萍賦步長渠以遊目兮覽隨波之微草紛漂潎以澄茂兮羌孤生于靈沼因纖根以自滋兮乃逸蕩乎波表散圓葉以舒形兮發翠緑以含縹蔭修魚之華鱗兮翳蘭池之清潦既淡淡以順流兮又雍容以隨風有纏薄于崖側兮或回滯乎湍中紛上下以靡常兮漂往來其無窮仰熙陽曜俯憑緑水渟不安處行無定軌流息則寧濤擾則動浮輕善移勢危易蕩似孤臣之介立隨排擠之所往內一志以奉朝兮外結心以絶黨萍出水而立枯兮士失據而身枉覩斯草而慷慨兮固知直道之難爽藝文類聚八十二初學記二十七薺賦寒冬之日余登乎城跬步北園覩衆草之萎悴覽林果之零殘悲纖條之槁摧慜枯葉之飄殫見芳薺之時生被畦疇而獨繁鑽重冰而挺茂蒙嚴霜以發鮮含盛陽而弗萌在太陰而斯育永安性于猛寒羌無寧乎暖燠齊精氣于款冬均貞固乎松竹藝文類聚八十二石榴賦石榴賦覽華圃之嘉樹兮羡石榴之奇生滋玄根于夷壤兮擢繁幹于蘭庭霑靈液之粹色兮含渥露以深榮若乃時雨新希微風扇物藹萋萋以鮮茂兮紛扶輿以蓊鬱枝摻稔以環柔兮葉鱗次以周密纖條參差以窈窕兮洪柯流求以相拂于是乎青陽之末朱明之初翕微煥以摛采兮的窟㻧以揚敷接翠萼于緑葉兮冒紅牙以丹鬚赩然含蕤璀爾散珠若乃叢紈始裹聚葩方離潛暉蜿豔緑采未披照灼攢烈熒瑩玄垂雪酲解䬼怡神實氣冠百品以仰奇邁衆果而特貴藝文類聚八十六初學記二十八御覽九百七十安石榴賦安石榴賦實有嘉木名安石榴株條列畼索幹內樛丹輝綴于朱房緗的點于紅鬚煌煌煒煒熠耀入蕊似長離之棲鄧林若珊瑚之映流水光明燐爛含丹耀紫味滋芳袖色麗瓊蕊御覽九百七十愍桐賦有南國之陋寢植嘉桐乎前庭闡洪根以誕茂豐修幹以繁生納谷風以疏葉含春雨以濯莖濯莖夭夭布葉藹藹蔚童童以重茂蔭蒙接而相蓋蔽陰淡之南表覆陽阿之北外于是詰朝之暇步趾前廡春以遊目夏以清暑昔詩人之所稱美厥生之攸奇植匪岡其不滋識非條其不儀藝文類聚八十八朝華賦咨神樹之修異實積陽之純精蜿潛根以誕節據川壤以擢莖皎日升而朝華玄景逝而夕零逮明晨而繁沸若靜夜之衆星長莖攢起柔條列布擢靈柯于時雨滋逸采于豐露灼煌煌以煒煒獨崇朝而達暮于是茂樹蒼蒼纖枝翩翩潛光玉朗緑葉翠鮮藝文類聚八十九瓜賦入果林造瓜田摘虎掌拾黃班落蒂離母清于寒泉御覽九百七十八觀飛鳥賦見逸遊之高鳥邈飄揚而殊逝擢華毛以迅騖回徑翼以揚勢披六翮之聯翩振輕體之迢遞遂乃矜形遼廓馮虛安翔翩翻徘徊上下頡頏動素羽之習習亂白質于日光玩流氣以差池弄長風以抑揚攝雙翅以高舉舒修頸以儴佯目悅妙勢心嘉羽儀愛惠音之嚶嚶美弱翰之參差暫高淩于景外又抑身乎雲崖乍來乍往若懸若垂象流星之離天似圓物之墜危何斯遊之自得諒逸豫之可希苟臨川而羡魚亦歡翔而樂飛藝文類聚九十玄鳥賦觀羽族之群類美玄鳥之翔集順陰陽以出處隨寒暑而遊蟄擢翾翾之麗容揮連翩之玄翼挺參差之羞尾發緇素之鮮色及至大火西景商風吹衣凝霜淒其被草卉木槭以零稀遂匿形于深穴斂六翮而不飛含靜泊以充肌吸至和之精粹淡恬心以去欲故保生而不匱虞衆物之為害獨棄林而憑人不驚畏以自疏永歸馴而附親有受祥而皇祗故遺卵而生殷惟帝皇之嘉美置高禖以表神類鸞皇之知德象君子之安仁爾乃銜泥構巢營居傅桷積一喙而不已終纍泥而成屋拾柔草以自藉採懦毛以為蓐吐清惠之泠音永吟鳴而自足藝文類聚九十二春可樂春可樂兮樂東作之良時嘉新田之啓萊悅中疇之發菑桑冉冉以奮條麥遂遂以揚秀澤苗翳渚原卉耀阜春可樂兮樂崇陸之可娛登夷岡以迥眺兮超矯駕乎山隅綴雜華以為蓋集繁蕤以飾裳散風衣之馥氣納戢懷之潛芳鸚交交以弄音翠翾翾以輕翔招君子以偕樂攜淑人以微行藝文類聚三御覽五十六進櫻桃于玉盤御覽九百六十九援若流之緑芰秋可哀秋可哀兮哀秋日之蕭條火回景以西流天既清而氣高壤含素霜山結玄霄月延路以增夜日遷行以收暉屏絺綌于篋笥納綸縞以授衣秋可哀兮哀新物之陳蕪綢篠朔以斂稀密葉摵以隕疏雁擢翼于太清燕蟠形乎榛墟秋可哀兮哀良夜之遙長月翳翳以隱雲星朧朧而沒光映前軒之疏幌照後帷之間房拊輕衾而不寐臨虛檻而褰裳感時邁以興思情愴愴以含傷藝文類聚三初學記三秋可哀兮哀南畝之荒既采蕭于大陸兮又刈蘭乎崇岡御覽五十六秋夕哀秋夕兮遙長哀心兮永傷結帷兮中宇屣履兮間房聽蟋蟀之潛鳴覩遊雁之雲翔尋修廡之飛檐覽明月之流光木蕭蕭以被風階縞縞以受霜玉機兮環轉四運兮驟遷銜恤兮迄今忽將兮涉年日往兮哀深歲暮兮思繁藝文類聚三寒苦謠惟立冬之初夜天慘懍以降寒霜皚皚以被庭冰溏瀩于井幹草槭槭以疏葉木蕭蕭以零殘松隕葉于翠條竹摧柯于緑竿藝文類聚五長夜謠日暮兮初晴天灼灼兮遐清披雲兮歸山垂景兮照庭列宿兮皎皎星稀兮月明亭檐隅以逍遙兮盼大虛以仰觀望閶闔之昭晰兮麗紫微之暉煥藝文類聚十九山路吟夙駕兮待明陟山路兮遐征冒晨朝兮入大谷道逶迤兮嵐氣清攬轡兮抑馬踟蹰兮曠野曠野驅兮遼落崇嶽兮嵬崿丘陵兮連離卉木兮交錯淥水兮長流驚濤兮拂石藝文類聚七離親詠剖符兮南荊辭親兮遐征發軔兮皇京夕臻兮泉亭撫首兮內顧案轡兮安步仰戀兮後塗俯歎兮前路既感物以永思兮且歸身乎懷抱苟違親以從利兮匪曾閔之攸寶視微榮之瑣瑣兮知吾志之愈小獨申愧于一心兮慚報德之彌少藝文類聚二十江上泛歌悠悠兮遠征倏倏兮暨南荊南荊兮臨長江臨長江兮討不庭江水兮浩浩長流兮萬里洪浪兮雲轉陽侯兮奔起驚翼兮垂天鯨魚兮嶽跱蘼蕪紛兮被皋陸修竹鬱兮翳崖趾望江之南兮遨目桂林桂林蓊鬱兮鵾雞揚音淩波兮願濟舟楫不具兮江水深沈嗟回盼于北夏何歸軫之難尋藝文類聚八征邁辭上伊關兮臨川拊駿馬兮授鞍中衢兮載歎斂鞚兮盤桓御覽三百五十八泰始四年舉賢良方正對策民之初生未有上下之序長幼之紀穴居野處慢慍遊而苟作北堂書鈔一百五十八昆弟誥惟正月才生魄湛若曰咨爾昆弟淳琬瑫謨總瞻古人有言孝乎惟孝友于兄弟死喪之戚兄弟孔懷又曰周之有至德也莫如兄弟於戲古之載于訓籍傳于詩書者厥乃不思不可不行爾其專乃心一乃聽砥礪乃性以聽我之格言淳等拜手稽首湛若曰嗚呼惟我皇乃祖滕公肇釐厥德厥功以左右漢祖弘濟于嗣君用垂祚于後世世增敷前軌濟其好行美德明允相繼冠冕胥及以逮于皇曾祖愍侯寅亮魏祖用康乂厥世遂啓土宇以大綜厥勳于家我皇祖穆侯崇厥基以允釐顯志用恢闡我令業維我后府君侯祗服哲命欽明文思以熙柔我家道丕隆我先緒欽若稽古訓用敷訓典籍乃綜其微言嗚呼自三墳五典八索九丘圖緯六藝及百家衆流罔不探賾索隱鉤深致遠洪範九疇彝倫攸敘乃命世立言越用繼尼父之大業斯文在茲且九齡而我王母辥妃登遐我后孝思罔極惟以奉于穆侯之繼室蔡姬以致其子道蔡姬登遐隘于穆侯之命厥禮乃不得成用不祔于祖姑惟乃用騁其永慕厥乃以疾辭位用遜于厥家布衣席槀以終于三載厥乃古訓無文我后丕孝其心用假于厥制以穆于世父使君侯惟伯后聰明睿智奕世載德用慈友于我后我惟蒸蒸是處罔不克承厥誨用增茂我敦篤以播休美于一世厥乃可不遵惟我用夙夜匪懈日鑽其道而仰之彌高鑽之彌堅我用欲罷不敢豈唯豫躬是懼實令跡是奉厥乃晝分而食夜分而寢豈唯令跡是畏實爾猶是儀嗚呼豫其敬哉俞豫聞之周之有至德有婦人焉我母氏羊姬宣慈愷悌明粹篤誠以撫訓群子厥乃我齓齒則受厥教于書學不遑惟寧敦詩書禮樂孳孳弗倦我有識惟與汝服厥誨惟仁義惟孝友是尚憂深思遠祗以防于微翳義形于色厚愛平恕以濟其寬裕用緝和我七子訓諧我五妹惟我兄弟姊妹束修慎行用不辱于冠帶實母氏是憑豫其為政蕞爾惟母氏仁之不行是戚豫其望色思寬獄之不情教之不泰是訓豫其納戒思詳嗚呼惟母氏信著于不言行感于神明若夫恭事于蔡姬敦穆于九族乃高于古之人古之人厥乃千里承師矧我惟父惟母世德之餘烈服膺之弗可及景仰之弗可階汝其念哉俾群弟天祚于我家俾爾咸休明是履淳英哉文明柔順琬乃沈毅篤固惟瑫厥清粹平理謨茂哉俊哲寅亮總其弘肅簡雅瞻乃純鑠惠和惟我蒙蔽極否于義訓嗟爾六弟汝其滋義洗心以補豫之尤豫乃亦不敢忘汝之闕嗚呼小子瞻汝其見豫之長于仁未見豫之長于義也瞻曰俞以如何湛若曰我之肇于總角以逮于弱冠暨于今之二毛受學于先載納誨于嚴父慈母豫其敬忌于厥身而匡豫之纖介翼豫之小疵使豫有過未曾不知豫知之逌改惟沖子是賴豫親于心愛于中敬于穆厥乃口無擇言柔惠且直廉而不劌肅而不厲厥其成豫哉用集我父母之訓庶明勵翼邇可遠在茲瞻拜手稽首曰俞湛曰都在修身在愛人瞻曰吁惟聖其難之湛曰都厥不行惟難厥行惟易淳曰俞明而昧崇而卑沖而恆顯而賢同而疑厲而柔和而矜湛曰俞乃言厥有道淳曰俞祗服訓湛曰來琬汝亦昌言琬曰俞身不及于人不敢墮于勤厥故惟新湛曰俞瑫亦昌言瑫曰俞滋敬于己不滋敬于己惟敬乃恃無忘有恥湛曰俞謨亦昌言謨曰俞無忘于不可不虞形貌以心訪心于虞湛曰俞總亦昌言總曰俞若憂厥憂以休湛曰俞瞻亦昌言瞻曰俞復外惟內取諸內不忘諸外湛曰俞休哉淳等拜手稽首湛亦拜手稽首乃歌曰明德復哉家道休哉世祚悠哉百祿周哉又作歌曰訊德恭哉訓翼從哉內外康哉皆拜曰欽哉晉書夏侯湛傳
