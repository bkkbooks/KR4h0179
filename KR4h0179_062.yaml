body:
  text: 卷六十二孫綽名德沙門論目釋道安博物多才通經名理高僧傳五法苑珠林二十四出三藏記集十五竺道壹文鋒富贍世說言語篇注法汰高亮開達支愍度才鑒清出難謝萬八賢論體玄識遠者出處同歸世說文學篇注喻道論或有疑至道者喻之曰夫六合遐邈庶類殷充千變萬化渾然無端是以有方之識各期所見鱗介之物不達皋壤之事毛羽之族不識流浪之勢自得於窞井者則怪遊溟之量翻翥于數仞者則疑沖天之力纏束世教之內肆觀周孔之跡謂至德窮于堯舜微言盡乎老易焉復覩夫方外之妙趣寰中之玄照乎悲夫章甫之委裸俗韶夏之棄鄙俚至真絕于漫習大道廢于曲士也若窮迷而不遷者非辭喻之所感試明其旨庶乎有悟于其聞者焉夫佛也者體道者也道也者導物者也應感順通無為而無不為者也無為故虛寂自然無不為故神化萬物萬物之求卑高不同故訓致之術或精或麤悟上識則舉其宗本不順者復殃放酒者羅刑婬為大罰盜者抵罪三辟五刑犯則無赦此王者之常制宰牧之所司也若聖王御世百司明達則向之罪人必見窮測無逃形之地矣使姦惡者不得容其私則國無違民而賢善之流必見旌敘矣且君明臣公世清理治猶能令善惡得所曲直不濫況神明所莅無遠近幽深聰明正直罰惡祐善者哉故毫釐之功錙銖之釁報應之期不可得而差矣歷觀古今禍福之證皆有由緣載籍昭然豈可掩哉何者陰謀之門子孫不昌三世之將道家明忌斯非兵凶戰危積殺之所致邪若夫魏顆從治而致結草之報子都守信而受驄驥之錫齊襄委罪故有墜車之禍晉惠棄禮故有弊韓之困斯皆死者報生之驗也至于宣孟愍翳桑之饑漂母哀淮陰之憊竝以一餐拯其懸餒而趙蒙倒戈之祜母荷千金之賞斯一獲萬報不踰世故立德闇昧之中而慶彰萬物之上陰行陽曜自然之勢譬猶灑粒于土壤而納百倍之收地穀無情于人而自然之利至也或難曰報應之事誠皆有徵則周孔之教何不去殺而少正卯刑二叔伏誅邪荅曰客可謂達教聲而不體教情者也謂聖人有殺心乎曰無也荅曰子誠知其無心于殺殺固百姓之心耳夫時移世異物有薄淳結繩之前陶然太和暨于唐虞禮法始興爰逮三代刑網滋彰刀斧雖嚴而猶不懲至于君臣相滅父子相害吞噬之甚過於豺虎聖人知人情之固于殺不可一朝而息故漸抑以求厥中猶蝮蛇螫足斬之以全身癰疽附體決之以救命亡一以存十亦輕重之所權故刑依秋冬所以順時殺春蒐夏苗所以𥳑胎乳三驅之禮禽來則韜弓聞聲覩生肉至則不食釣而不綱弋不射宿其于蜫蟲每加隱惻至于議獄緩死眚災肆赦刑疑從輕寍失有罪流涕授鉞哀矜勿喜生育之恩篤矣仁愛之道盡矣所謂為而不恃長而不宰德被而功不在我日用而萬物不知舉茲以求足以悟其歸矣或難曰周孔適時而教佛欲頓去之將何以懲暴止姦統理群生者哉荅曰不然周孔即佛佛即周孔蓋外內名之耳故在皇為皇在王為王佛者梵語晉訓覺也覺之為義悟物之謂猶孟軻以聖人為先覺其旨一也應世軌物蓋亦隨時周孔救極弊佛教明其本耳共為首尾其致不殊即如外聖有深淺之跡堯舜世夷故二后高讓湯武時難故兩君揮戈淵默之與赫斯其跡則胡越然其所以跡者何嘗有際哉故逆尋者每見其二順通者無往不一或難曰周孔之教以孝為首孝德之至百行之本本立道生通于神明故子之事親生則致其養沒則奉其祀三千之責莫大無後體之父母不敢夷毀是以樂正傷足終身含愧也而沙門之道委離所生棄親即疏刓剔鬚髮殘其天貌生廢色養終絕血食骨肉之親等之行路背理傷情莫此之甚而云弘道敦仁廣濟群生斯何異斬刈根本而修枝榦而言不殞碩茂未之聞見皮之不存毛將安附此大乖于世教子將何以袪之荅曰此誠窮俗之所甚惑倒見之為大謬諮嗟而不能默已者也夫父子一體惟命同之故母嚙其指兒心懸駭者同氣之感也其同無閒矣故唯得其歡心孝之盡也父隆則子貴子貴則父尊故孝之為貴貴能立身行道永光厥親若匍匐懷袖日御三牲而不能令萬物尊己舉世我賴以之養親其榮近矣夫緣督以為經守柔以為常形名兩絕親我交忘養親之道也既已明其宗且復為客言其次者夫忠孝名不竝立穎叔違君書稱純孝石碏戮子武節乃全傳曰子之能仕父教之忠策名委質貳乃辟也然則結纓公朝者子道廢矣何則見危授命誓不顧親皆名注史筆事標教首記注者豈復以不孝為罪故諺曰求忠臣必于孝子之門明其雖小違于此而大順于彼矣且鯀放遐裔而禹不告退若令委堯命以尋父屈至公于私慼斯一介之小善非大者遠者矣周之泰伯遠棄骨肉託跡殊域祝髮文身存亡不反而論稱至德書著大賢誠以其忽南面之尊保沖虛之貴三讓之功遠而毀傷之過微也故能大革夷俗流風垂訓夷齊同餓首陽之上不恤孤竹之胤仲尼目之為仁賢評當者寍復可言悖德乎梁之高行毀容守節宋之伯姬順理忘生竝名冠烈婦德範諸姬秉二婦之倫免愚悖之譏耳率此以談在乎所守之輕重可知也昔佛為太子棄國學道欲全形以遁恐不免維縶故釋其鬚髮變其章服既外示不反內修𥳑易于是捨華殿而即曠林解龍袞以衣鹿裘遂垂條為宇藉草為茵去櫛梳之勞息湯沐之煩頓馳騖之轡塞欲動之門目遏玄黃耳絕淫聲口忘甘苦意放休戚心去于累胸中抱一載平營魄內思安般一數二隨三止四觀五還六淨遊志三四出入十二門禪定拱默山停淵淡神若寒灰形猶枯木端造六年道成號佛三達六通正覺無上雅身丈六金色焜燿光遏日月聲協八風相三十二好姿八十形偉群有神足無方于是遊步三界之表恣化無窮之境迴天儛地飛山結流存亡倏忽神變緜邈意之所指無往不通大範群邪遷之正路眾魔小道靡不尊服于斯時也天清地潤品物咸亨蠢蠕之生浸毓靈液枯槁之類改瘁為榮還照本國廣敷法音父王感悟亦升道場以此榮親何孝如之于是後進篤志之士被服弘訓思齊高軌皆由父老不異所尚承歡心而後動耳若有昆弟之列者則服養不廢既得弘修大業而恩紀不替且令逝沒者得福報以生天不復顧歆于世祀斯豈非兼善大通之道乎夫東鄰宰牛西鄰禴祀殷美黍稷周尚明德興喪之期于茲著矣佛有二十部經其四部專以勸孝為事慇懃之旨可謂至矣而俗人不詳其源流未涉其場肆便瞽言妄說輒生攻難以螢燭之見疑三光之盛芒隙之滴怪淵海之量以誣罔為辨以果敢為名可謂狎大人而侮天命者也宏明集三支道林者識清體順而不對于物玄道沖濟與神情同任此遠流之所以歸宗悠悠者所以未悟也高僧傳四近洛中有竺法行談者以方樂令江南有于道邃識者以對勝流皆當時共所見聞非同志之私譽也高僧傳四道賢論護公德居物宗巨源位登論道二公風德高遠足為流輩矣高僧傳一竺法護又見出三藏集記十三帛祖釁起于管蕃中散禍作于鍾會二賢竝以俊邁之氣昧其圖身之慮栖心事外輕世招患殆不異也高僧傳一帛遠法乘安豐少有機悟之鑒雖道俗殊操阡陌可以相準高僧傳四竺法乘潛公道素淵重有遠大之量劉伶肆意放蕩以宇宙為小雖高栖之業劉所不及而曠大之體同焉高僧傳四竺道潛支遁向秀雅尚莊老二子異時風好玄同矣高僧傳四支遁蘭公遺身高尚妙迹殆至人之流阮步兵傲獨不群亦蘭之儔也高僧傳四于法蘭咸有累騎之譏邃有清冷之譽何得為匹太平山銘嵬峨太平峻踰華霍秀嶺樊縕奇峰挺崿上干翠霞下籠丹壑有士冥遊默往寄託肅形枯林映心幽漠亦既覯止渙焉融滯懸棟翠微飛宇雲際重巒蹇產迴溪縈帶被以青松灑以素瀨流風佇芳翔雲停藹藝文類聚八漏刻銘二儀貞運聖鑒通玄數以氣徵理以象宣乃制妙漏挈壺是銓近取諸物遠贊自然累筒三階積水成淵器滿則盈乘虛赴下靈虯吐注陰蟲承寫昏明無隱其晷度陰陽是效其屈伸不下堂而天地理得設一器而萬事同倫藝文類聚六十八文選陸倕新刻漏銘注引兩條御覽二樽銘大匠體物妙思入神儀彼靈禽制氣為人虛以含有文以飾身湛此元醴延我嘉賓興懷寄詠聊以摽設詳觀茲器妙巧奇絕酌焉則注受滿則側吐寫適會未見其竭與之無若施而有節元應忘知功存不伐王公擬之德齊上哲藝文類聚七十三御覽七百六十一絹扇銘圓竹範素製為新扇靜若望月動若規電清風拂襟素暉流藉北堂書鈔一百三十四庾公誄咨予與公風流同歸擬量託情視公猶師君子之交相與無私虛中納是吐誠誨非雖實不敏敬佩弦韋永戢話言口誦心悲世說方正篇注輕詆篇注竝引綽集王長史誄余與夫子交非勢利心猶澄水同此玄味世說輕詆篇劉真長誄居官無官官之事處事無事事之心晉書劉惔傳丞相王導碑公冑興姬文氏由王喬玄聖陶化以啟源靈仙延祉以分流賢俊相承世冠海岱二儀交泰妙氣發暉醇曜所鍾公實應之玄性合乎道旨沖一體之自然柔畼協乎春風溫而侔于冬日信人倫之水鏡道德之標準也惠懷之際運在大過皇德不建神轡再絕獫狁孔熾凶類焱起公見機而作超然玄悟遂扶翼蕃王室協東岳弘大順以一群后之望仗王道以應天人之會于時乾維肇振創制理物中宗拱己雅仗賢相尚父之任具瞻在公存烹鮮之義殉易𥳑之政大略宏規卓然可述公雅好談詠恂然善誘雖管綜時務一日萬機夷心以延白屋之士虛己以招巖穴之俊逍遙放意不峻儀軌公軌國之鈞三十餘載時難世故備經之矣夷險理亂常保元吉匪躬而身全遺功而勳舉非夫領鑒玄達百鍊不渝孰能莫忤于世而動與理會者哉藝文類聚四十五太宰郄鑒碑公蓋黃帝之苗裔氏族所由皆紀于祖御史大夫之碑矣靈和誕授載有公侯至德碩量天實挺之琅邪王應天啟之運闡中興之道思延英賢以匡王業乃假兗州刺史金章仍割玄鉞載飾于時羯寇凶熾群逆猋起公奮其忠勇精貫白日信順為甲冑大節為城池故能摧卻凶寇全身濟功惟公德器純固體識深弘敦尚衡門則服膺曾閔毗亮皇極則憲章元凱篤誠簡于帝心明允著于莅政信鍾山之珪璧歲寒之靈木者也摛藻風雲策名帝錄肇階方尺遂隆台岳王室未休吾何以豫興言再慨思康天步將俾皇化歸之大素彼蒼者天曾不遐祚哲人其萎民斯攸慕嗟爾後昆式瞻宏度藝文類聚四十五太尉庾亮碑次黃中以啟曹鍾遐武于軒轅爰及晉代世號多士公吸峻極之秀氣誕命世之深量微言散于秋毫玄風畼乎德音闚門者貴其凝歭入室者議其通玄摽形者得之廊廟悟旨者期諸濠川提挈南翔息肩靈越會大君有命納妃德門自求多福辭不獲已鳳羽籠于華樊麟趾縶于椒房王敦阻兵翫權志窺神器乃轉公左衛將軍要雄戟以扶華轂勒武旅以翼豹尾死難之心義形于色親受中詔奔告方伯于是群后契盟同稟高謀巖栖懷德以嚮赴義拯神器于獸吻扶帝座于已傾王室之不壞翳伯舅是賴公以為戰伐之謀仁所恥聞況立德弘道年幾不惑闔門沈舟將遠迹山海詔累遣侍中黃門逼以嚴制知不獲免乃固求外任江外無烽燧之警宇內歸穆然之美公雅好所託常在塵垢之外雖柔心應世蠖屈其迹而方寸湛然固以玄對山水銘曰金德時昏乾綱絕紀素靈南映中宗蔚起誰其贊之數鍾伊公達人忘懷形隨運通再潛再躍婉若游龍藝文類聚四十六太傅褚襃碑公資清剛之正氣挺純粹之茂質深量體于自然沖識足乎弱冠含章內映而不運曒察之明玄識沈通而不以浮藻曜物穆然忘容塵務不干其度默爾獨得膚受莫測其奧加以溫恭孝友少思寡欲都督袞州刺史將以藩屏畿甸綏授分內會康皇晏駕太后臨朝總己之重民無異望乃徵將軍中書令錄尚書事公要終之識定于介石雖事已未來而情以本應顧以主少國危方難未夷思清函夏以一天宇且帝命所存以社稷為寄謀身雖重方此為輕深為意疾俛首撫順公志在芟夷兇類拯拔晉民繕甲練卒日不暇給者久矣遂見機而作遺其劍履將龍馬河洛電掃司豫廟算以逆徒尚繁困獸難逼命公還旆以俟齊舉雖元勳未捷義聲亦足以振暴于華夷矣銘曰邈邈遠遊亹亹令圖將激淮海灑滌中區雅業未究哲人其徂敢勒玄石敬刊高謨藝文類聚四十六司空庾冰碑君喻嵩巖之玄精挹清瀨之潔流貞質謀于白珪明操勵于南金雖名器未及而任盡臣道正身提衡銓括百揆知無不為謀必鮮過端委待旦則有心宣孟以約訓儉則擬議季文君平恒無私己謙寡欲當世之所難于君易之矣于是慨然遠鑒量己而退高挹帷幙投迹藩屏夫良玉以經焚不渝故其貞可貴竹柏以蒙霜保榮故見殊列樹治而不亂者有矣未有亂而彌治者也攷終以證始即事以懲心少長能一其度貴賤不二其道文康之雅量于是乎弘著矣銘曰洋洋俊潁巖巖神嵩流滌淳氣頗扇祥風篤生公侯情靈德充臨川擬潔仰華思崇履險思夷處滿思沖方恢遠猷皇極是贊繁霜夏被修梧摧幹人之云徂朝野咸歎儀刑永戢光風長煥藝文類聚四十七潁州府君碑君天縱傑邁奇逸卓犖茂才亮拔雅度恢廓通理遠鑒之識禮樂飾身之具固以足之于天仞冠之于縉紳出匡南位功深于爵金龜三曜沖懷再發道光古賢風改彫偽允可謂明德宏猷贊世之偉器者矣矯矯秀姿卓卓英韻他人之高及肩而已邀命有數託生皇代所忝之至人知其幸況在懷情而無自識但親勤未效違離已及低徊房禁攀戀罔遺藝文類聚五十桓玄城碑俯仰顯默之際優游可否之閒文選傅亮為宋公修張良廟教注孫綽子孫綽子黃帝之遊天衢奏鈞天之鼓建日月之旗乘琱雲之輿駕六翼之龍彭祖前驅松喬夾轂光景流而不見長風逐而不及發軔紫宮不崇朝而帀六合也北堂書鈔十六引三條御覽七十九海人與山客辨其方物海人曰橫海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里旁蔭數國海人曰東極有大人斬木為策短不可杖釣魚為鮮不足充餔法苑珠林三十七御覽七十二又三百七十七八百三十四九百五十二譙周說後主降魏可乎曰自為天子而乞降請命何恥之深乎夫為社稷死則死之為社稷亡則亡之先君正魏之篡不與同天矣推過于其父俛首而事讎可謂苟存豈大居正之道哉蜀志譙周傳注御覽四百四十七撫明鏡則好醜之貌可見文選謝靈運晚出西射堂詩注或問雅俗曰判風流正位分涇渭殊流雅鄭異調題帖分明標榜可觀斯謂之雅俗矣文選任昉哭范僕射詩注又為范雲讓吏部封侯第一表注沈約奏彈王源注任昉為百辟勸進今上牋注王儉褚淵碑注或問賈誼不遇漢文將退耕于野乎薄遊于朝乎文選謝朓休浴重還道中詩注秋霜被不凋其秀文選謝眺和八公山詩注或問人物曰察虛實審真偽斷成敗定終始斯可謂之人物矣文選任昉為蕭揚州薦士表注聖賢極其標榜有大力矣文選袁宏三國名臣贊注莊子多寄言渾沌得宗罔象得珠文選沈約宋書謝靈運傳論注由禮則雅不由禮則夷文選任昉王文憲集序注蓺妙者以入神文選新刻漏銘注貞人在冬則松竹在火則玉英文選陽給事誄注急電無停光疾雷無餘聲御覽十三道一者帝德充者王依仁仗義者霸無為而治者道也為能不待者德也存三亡國仁也責貢不入義也御覽七十六典籍文章之言也治出于天辭宣于仁御覽六百六何世之無才何才之無施良匠提斧斤造山林梁棟阿衡之才櫨柱楣椽之朴森然陳于目前大廈之器具矣御覽七百六十四仲尼見滄海橫流故務為舟航御覽七百七十動而不乘不理若泛舟而無柁御覽七百七一命駕而遊五都之市天下之貨畢陳矣御覽八百三十六火光明于天者燈燭何施焉御覽八百七十鳥窮則喙人窮則詐御覽九百十四阜有木焉木名時好御覽九百六十
