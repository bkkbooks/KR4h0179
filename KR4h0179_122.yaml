body:
  text: 卷一百二十二郭璞南山經桂山海經圖贊上桂生南裔拔萃岑嶺廣莫熙葩淩霜津穎氣王百藥森然雲挺藝文類聚八十九說文繫傳祝荼草旋龜𪁺𩿧鳥祝荼嘉草食之不飢鳥首蚖尾其名旋龜𪁺𩿧六足三翅竝翬道藏本山海經迷穀爰有奇樹産自招搖厥華流光上映垂霄佩之不惑潛有靈標藏本狌狌狌狌似狐走立行伏懷水挺方涎腥明目飛廉迅足豈食斯肉御覽九百八引前四句藏本白猿白猿肆巧由基撫弓應眄而號神有先中數如循環其妙無窮藝文類聚九十五御覽九百一十水玉水玉冰鱗潛映洞川赤松是服靈蛻乘煙吐納六氣升降九天藝文類聚七十八鹿蜀鹿蜀之獸馬質虎文攘首吟鳴矯矯騰群佩其皮毛子孫如雲御覽九百十三鯥魚號曰鯥處不在水厥狀如牛鳥翼蛇尾隨時隱見倚乎生死藏本御覽九百三十九引前四句類類之為獸一體兼二近取諸身用不假器窈窕是佩不知妒忌藏本猼𧦧猼𧦧似羊眼乃在背視之則奇推之無怪飲不恐懼厥皮可佩御覽九百十三灌灌鳥赤鱬魚厥聲如訶厥形如鳩佩之辨惑出自青丘赤鱬之狀魚身人頭藏本御覽九百三十九引末二句鴸鳥彗星橫天鯨魚死浪鴸鳴于邑賢士見放厥理至微言之無況藏本長右彘長右四耳厥狀如猴實為水祥見則橫流彘虎其身厥尾如牛藏本猾褱猾褱之獸見則興役膺政而出匪亂不適天下有道幽形匿跡藏本會稽山禹徂會稽爰朝群臣不虔是討乃戮長人玉匱表夏玄石勒秦藝文類聚八患有獸無口其名曰患害氣不入厥體無閒至理之盡出乎自然藏本纂雕瞿如鳥虎蛟纂雕有角聲若兒號瞿如三手厥狀似鵁魚身蛇尾是謂虎蛟藏本犀犀頭似豬形兼牛質角則併三分身互出鼓鼻生風壯氣隘溢藏本兕兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德藝文類聚九十五象象實魁梧體巨貌詭肉兼十牛目不踰豕望頭如尾動若丘徙藝文類聚九十五鳳皇鳳皇靈鳥實冠羽群八象其體五德其文附翼來儀應我聖君藝文類聚九十九育隧谷育隧之谷爰含凱風青陽既謝氣應祝融炎氛是扇以散鬱隆藏本鱄魚顒鳥顒鳥栖林鱄魚處川俱為旱徵災延普天測之無象厥類為玄御覽九百三十九白䓘白䓘睪蘇其汁如飴食之辟穀味有餘滋逍遙忘勞窮生盡期藏本西山經羬羊月氏之羊其類在野厥高六尺尾亦如馬何以審之事見爾雅初學記二十九華山華嶽靈峻削成四方爰有神女是挹玉漿其誰遊之龍駕雲裳藝文類聚七初學記五䳋渠赤鷩鳥文莖木鴖鳥䳋渠已殃赤鷩辟火文莖愈聾是則嘉果鴖亦衛災厥形惟麼藏本肥遺蛇肥遺為物與災合契鼓翼陽山以表亢厲桑林既禱倏忽潛逝藏本流赭沙則潛流亦有運赭于以求鐵趨在其下蠲牛之癘作采于社藏本黃雚草肥遺鳥囂獸浴疾之草厥子赭赤肥遺似鶉其肉已疫囂獸長臂為物好擲藏本豪彘剛鬣之族號曰豪狶毛如攢錐中有激矢厥體兼資自為牝牡藝文類聚九十五初學記二十九御覽九百三十橐𩇯有鳥人面一腳孤立性與時反冬出夏蟄帶其羽毛迅雷不入藏本桃枝竹類産巴厥名桃枝叢薄幽薈從風蔚猗簟以寧寢杖以扶危書鈔一百三十三藝文類聚六十九蓇容草溪邊獸櫟鳥有華無實蓇容之樹邊溪類狗皮厭妖蠱黑文赤翁鳥愈隱痔藏本杜衡狌狌奔人杜衡走馬理固須因體亦有假足駿在感安事御者藏本礜石稟氣方殊件錯理微礜石殺鼠蠶食而肥物性雖反齊之一歸藏本𤣎如𤣎如之獸鹿狀四角馬足人手其尾則白貌兼三形攀木緣石藏本數斯鳥𤛎獸鸓鳥數斯人腳厥狀似鴟𤛎獸大眼有鳥名鸓兩頭四足翔若合飛藏本鸚鵡鸚鵡慧鳥棲林啄蕊四指中分行則以觜自貽伊籠見幽坐伎藝文類聚九十一初學記三十鸞鳥鸞翔女床鳳出丹穴拊翼相和以應聖哲擊石靡詠韶音其絶藝文類聚九十九書鈔一百五十八鳧徯鳥朱厭獸鳧徯朱厭見則有兵類異感同理不虛行推之自然厥數難明藏本蠻蠻比翼之鳥似鳧青赤雖云一形氣同體隔延頸離鳥翻飛合翮藏本丹木玉膏丹木煒煒沸沸玉膏黃軒是服遂攀龍豪眇然升遐群下鳥號藏本瑾瑜玉鍾山之寶爰有玉華光采流映氣如虹霞君子是佩象德間邪藝文類聚八十三鍾山之子鼓欽䲹欽䲹及鼓是殺祖江帝乃戮之昆侖之東二子皆化矯翼亦同藏本鰩魚見則邑穰厥名曰鰩經營二海矯翼間霄唯味之奇見歎伊庖藏本神英招槐江之山英招是主巡遊四海撫翼雲儛實惟帝囿有謂玄圃藏本榣木榣惟靈樹爰生若木重根增駕流光旁燭食之靈化榮名仙録藏本崑崙丘崑崙月精水之靈府惟帝下都西羌之宇嵥然中峙號曰天柱藝文類聚七神陸吾肩吾得一以處昆侖開明是對司帝之門吐納靈氣熊熊魂魂藏本土螻獸欽原鳥土螻食人四角似羊欽原類蜂大如鴛鴦觸物則斃其鋭難當藏本鶉鳥沙棠實薲草司帝百服其鳥名鶉沙棠之實惟果是珍爰有奇菜厥號曰薲藏本沙棠安得沙棠制為龍舟泛彼滄海眇然遐遊聊以逍遙任彼去留藏本神長乘九德之氣是生長乘人狀豹尾其神則凝妙物自潛世無得稱藏本西王母天帝之女蓬髮虎顏穆王執贄賦詩交歡韻外之事難以具言藏本積石積石之中實出重河夏后是導石門湧波珍物斯備比奇崑阿藏本白帝少昊少昊之帝號曰金天磈氏之官亦在此山是司日入其景則員藏本猙章峨之山奇怪所宅有獸似豹厥色惟赤五尾一角鳴如擊石藏本畢方畢方赤文離精是炳旱則高翔鼓翼陽景集乃流災火不炎正藏本文貝先民有作龜貝為貨貝以文彩賈以大小簡則易從犯而不過藏本天狗乾麻不長天狗不大厥質雖小攘災除害氣之相王在乎食帶藏本江疑獓𤝱獸𪇱鳥江疑所居風雲是潛獸有獓𤝱毛如披蓑𪇱鳥一頭厥身則兼藏本青鳥山名三危青鳥所憩往來崑崙王母是隸穆王西征旋軫斯地藝文類聚九十一御覽九百二十七神耆童顓頊之子嗣作火正鏗鎗其鳴聲如鍾磬處于騩山唯靈之盛藏本帝江質則混沌神則旁通自然靈照聽不似以聰強為之名曰在帝江藏本獂獸鵸鵌三頭獂獸三尾俱禦不祥消凶辟眯君子服之不逢不韙藏本當扈鳥飛以翼當扈則鬚廢多任少沛然有餘輪運于轂至用在無藏本白狼矯矯白狼有道則遊應符變質乃銜靈鉤惟德是適出殷見周藝文類聚九十九又御覽九百九十白虎甝虪之虎仁而有猛其質載皓其文載炳應德而擾止我交境藏本神魑蠻蠻髯遺魚其音如吟一腳人面鼠身鱉頭厥號曰蠻目如馬耳食厭妖變藏本駮駮惟馬類實畜之英騰旄驤首噓天雷鳴氣無不淩吞虎辟兵藝文類聚九十五御覽八百九十二櫰木櫰之為木厥形似槤若能長服拔樹排山力則有之壽亦宜然藏本窮奇獸螺魚孰湖獸窮奇如牛蝟毛自表濛水之螺匪魚伊鳥孰湖之獸見人則抱藏本鳥鼠同穴山鵌鼵二蟲殊類同歸聚不以方或走或飛不然之然難以理推藏本鰠魚物以感應亦不數動壯士挺劍氣激江湧鰠魚潛淵出則民悚御覽九百三十九𩶯魮魚形如覆銚苞玉含珠有而不積泄以尾閭暗與道會可謂奇魚御覽九百三十九丹木爰有丹木生彼洧盤厥實如瓜其味甘酸蠲痾辟火用奇桂蘭藏本北山經水馬馬實龍精爰出水類渥窪之駿是靈是瑞昔在夏后亦有何駟藏本䑏疏獸鵸鵌鳥何羅魚厭火之獸厥名䑏疏有鳥自化號曰鵸鵌一頭十身何羅之魚藏本鯈泊和損平莫慘于憂詩詠萱草山經則鯈壑焉遺岱聊以盤游藏本御覽九百三十七引前四句孟槐孟槐似貆其豪則赤列象畏獸凶邪是辟氣之相勝莫見其迹藏本鰼鰼魚鼓翮一運十翼翩翻厥鳴如鵲鱗在羽端是謂怪魚食之避燔藏本御覽九百三十九引前四句橐駝駝惟奇畜肉鞍是被迅騖流沙顯功絶地潛識泉源微乎其智藝文類聚九十四又初學記二十九作徵乎其智又御覽九百一末句作徵其智慧寓鳥孟極足訾獸鼠而傅翼厥聲如羊孟極似豹或倚無良見人則呼號曰足訾藏本耳鼠跖實以足排虛以羽翹尾翻飛奇哉耳鼠厥皮惟良百毒是禦藏本幽頞幽頞似猿俾愚作智觸物則笑見人佯睡好用小慧終是嬰繫藏本御覽九百十三引前四句鵁鳥毛如雌雉朋翔群下飛則籠日集則蔽野肉驗針石不勞補寫藏本諸犍獸白鵺竦斯鳥諸犍善吒行則銜尾白鵺竦斯厥狀如雉見人則跳頭文如繡藏本磁石磁石吸鐵琥珀取芥氣有潛通數亦冥會物之相感出乎意外藝文類聚六旄牛牛充兵機兼之者旄冠于旌鼓為軍之標匪肉致災亦毛之招藏本長蛇長蛇百尋厥鬣如彘飛群走類靡不吞噬極物之惡盡毒之厲藝文類聚九十六窫窳諸懷獸䲃魚肥遺蛇窫窳諸懷是則害人䲃之為狀半鳥半鱗肥遺之蛇一頭兩身藏本御覽九百三十九引中二句山𤟤山𤟤之獸見乃歡唬厥性善投行如矢激是惟氣精出則風作御覽九百十二狕閭𩣡馬獨𤞞有獸如豹厥文惟縟閭善躍嶮𩣡馬一角虎狀馬尾號曰獨𤞞藏本鮆魚陽鑒動日土蛇致宵微哉鮆魚食而不驕物有所感其用無標藏本御覽九百三十九引下四句狍梟狍梟貪婪其目在腋食人未盡還自齦割圖形妙鼎是謂不若藏本𪄀𪃑禦暍之鳥厥名𪄀𪃑昏明是互晝隱夜覿物貴應用安事鸞鵠藏本居暨獸囂鳥三桑居暨豚鳴如彙赤毛四翼一目其名曰囂三桑無枝厥樹唯高藏本䮝獸䮝獸四角馬尾有距涉歷歸山騰險躍岨厥貌惟奇如是旋舞藏本䴅鳥象蛇𩹴父魚有鳥善驚名曰䴅䴅象蛇似雉自生子孫𩹴父魚首厥體如豚藏本御覽九百三十九引末二句天馬龍馮雲遊騰蛇假霧未若天馬自然淩翥有理懸運天機潛御藏本鶌居鶌居如烏青身黃足食之不飢可以辟穀內厥惟珍配彼丹木藏本飛鼠或以尾翔或以髯淩飛鼠鼓翰翛然背騰用無常所惟神是馮初學記二十九酸與景山有鳥稟形殊類厥狀如蛇腳三翼四見則邑恐食之不醉藏本鴣𪄶黃鳥鴣𪄶之鳥食之不瞧爰有黃鳥其鳴自叫婦人是服矯情易操藏本精衛炎帝之女化為精衛沉形東海靈爽西邁乃銜木石以填攸害藝文類聚九十二䍶䍶羆九獸大蛇䍶䍶似羊眼在耳後竅生尾上號曰羆九幽都之山大蛇牛詬藏本東山經鱅鱅魚𤡆𤡆獸䖪鼠魚號鱅鱅如牛虎駮𤡆𤡆之狀似狗六腳䖪鼠如雞見則旱涸藏本御覽九百三十九引前二句堪㐨魚軨軨獸堪㐨軨軨殊氣同占見則洪水天下昏墊豈伊妄降亦應牒讖藏本䖺䗤䖺䗤蛇狀振翼灑光憑波騰逝出入江湘見則歲旱是維火祥藏本狪狪蚌則含珠獸胡不可狪狪如豚被褐懷禍患難無由招之自我藏本珠蟞魚澧水之鱗狀如浮肺體兼三才以貨賈害厥用既多何以自衛藏本御覽九百三十九引前四句犰狳犰狳之獸見人佯眠與災協氣出則無年此豈能為歸之于天藏本朱獳朱獳無奇見則邑駭通感靡誠維數所在因事而作未始無待藏本狸力獸鵹胡鳥狸力鵹胡或飛或伏是惟土祥出興功築長城之役同集秦域藏本獙獙蠪蚳獸潔鉤鳥獙獙如狐有翼不飛九尾虎爪號曰蠪蚳潔鉤似鳧見則民悲藏本峳峳治在得賢亡由夫人峳峳之來乃致狡賓歸之冥應誰見其津藏本妴胡精精獸鮯鮯魚妴胡之狀似麋魚眼精精如牛以尾自辨鮯鮯所潛厥深無限藏本蠵龜水圓三方潛源溢沸靈龜爰處掉尾養氣莊生是感揮竿傲貴初學記三十猲狙獸鬿雀猲狙狡獸鬿雀惡鳥或狼其體或虎其爪安用甲兵擾之以道藏本芑木馬維剛駿塗之芑汁不勞孫陽自然間習厥術無方理有潛執藏本茈魚薄魚有魚十身蘪蕪其臭食之和體氣不下溜薄之躍淵是為災候當康獸䱻魚當康如豚見則歲穰䱻魚鳥翼飛乃流光同出殊應或災或祥藏本合窳豬身人面號曰合窳厥性貪殘物靡不咀至陰之精見則水雨藏本蜚蜚之為名體似無害所經枯竭甚于鳩厲萬物攸懼思爾遐逝廣韻八未引郭璞山海經讚今東山經注讚作銘攸懼作斯懼餘皆同而藏本之讚絶異疑莫能明蜚則災獸跂踵厲深會所經涉竭水槁林稟氣自然體此殃淫藏本
