body:
  text: 卷二十四王羲之雜帖雜帖方回遂舉為侍中都下書云殷生議論殊異處憂之道故思同歲寒盡對此書還論亦不能佳體懷省無所乏然卿供給人士及使役吏人論者亦謂大任意在世中政自不得不小俯仰同異卿復為意卿此懷亦當玄同不能勉人耳見尚書一日遣信以具必宜有行者情事恐不可委行使耶遲還具問亦以與尚書諮懷今復遣諮吳興也官舍佳也節氣不適可憂彼云何昨得羲書比佳甚慰甚慰得官奴晉寧書賓平安念懸心此粗佳一日書此一一民以頃情事不可不懃思自補節勤以食噉為意乃勝前者而氣力所堪不如自喪初不哭不能不有時惻愴然便非所堪哀事損人故最深益知不可不豁之知足下數祖伯諸人問助慰絕不得兄子問懸念可言此於南北群從書皆佳道沖書平安汝當改葬不可云勞沖遇此事或復連留省告一一足下此舉由來吾所具卿所云皆是情言然權事慮之重則當廢情以從宜非書所悉見卿一一吾涉冬節便覺風動日日增甚至去月十日便至委篤事事如去春但為輕微耳尋得小差固爾不能轉勝沈滯進退體氣肌肉便大損憂懷甚深今尚得坐起神意為復可耳直疾不除晝夜無復聊賴不知當得蹔有間還得復其寫不如今忽忽日前耳手亦惡欲不得書示令足下知問七月十五日羲之白秋日感懷深得五日告甚慰晚熱盛君比可不遲復後問僕平平力及不一一王羲之白知君患隱何以及爾是為疲之極也一知此事恐不可以不絕骨肉之愛無論人事也乃甚憂君若自量過歎患不以輕心者一事不爾當何理耶羲之報鄙故勿勿飲日三斗小行四升至可憂慮如桓公書旨闕其不去恐不能平此信過不得熙書想其書一一也小大佳不賓轉勝皆謝之賢妹大都勝前至不欲食篤羸恆令人憂餘粗佳阿刁近來到卞上下皆佳姜夫數白得書知足下且欲顧何以不進耶向與謝生書說欲往知登停山停山非所辯故可共集謝生處登山可他日耶王羲之白不得君家書疏多往來皆平安耳今年此夏節氣至惡當令人危幼小疾苦故爾憂勞不可言想非無他旱不傷白田耳七月二十一日羲之白昨十七日告為慰極有秋氣君比可耳力及不一一王羲之頓首近復因還信書至也得九日問亦云鄙平平想得涼轉勝以疾乃服法必解此意來月必欲就到家而得其問云尚多溪毒當復小卻耳僕故有至臨川意尚未定自更有果南行者還乃得至壽春耳得都九日問無他得豫章書為慰想以具問昨得都十七日書賊徑還蠡臺不攻譙是其反善之誠也想殷生得過此者猶令人憂期諸處分猶未定羊參軍旦夕至也遲面一一殷廢責事便行也令人歎悵無已安石定目絕令人悵然一爾恐未卒有散理期諸處分猶未定憂縣益深念君馳情又遣從事發遣君無復坐理交疾患何以堪此何以堪此恐屬無所復厝懷即乖大小不可言且憂君以疾他曳不易得司州書轉佳此慶慰可言云與君數數或採藥山崖可願樂遙想而已云必欲剋餘杭之遲期此不可言要須君旨問僕事中久宜蹔東復令白便行還便行當至剡槌上二十日後還以示政當與君前期會耳遲此情兼二三昨暮得無奕阿萬此月二日書甚近清和耳羌賊故在許下自當了也桓公未有行日阿萬定吳興未復弘道近書見與弘遠書恐卿不得久坐何如休稚玄佳不想數得足下旨令知問矇風膠今年似晚來年其主不起首者想或可得借乎得反又獲示知足下發動脅腫卿此疾苦甚似期一一想消一當轉佳為何治也吾為亦劣大都復是平平隔耳許日前後有其效何喻冀涼日晚散耳尋復知問王羲之羲之頓首賢女殯歛永畢情以傷惋不能已已兄足下愍悴深至何可為心奈何奈何不能無時之痛憂卿便深今何如患深達既往吾志勿勿力知問臨書惻惻王羲之頓首賢室何如何可為心惟絕難與人理耳諸患猶爾憂勞深似江侯足下遺臨惙次冷取書斷酒事終不見許然守之尚堅弟亦當思同此懷此郡斷酒一年所省百餘萬斛米乃過於租此救民命當可勝言近復重論相賞有理卿可復論知數致苦言於相時弊亦何可不耳頗得應對不吾書未被答得桓護軍書云口米增運皆當停為善問董祥吾亦問之冀必來兵時得之甚佳頃日憒憒不暇復此省示及乃復憶之耳周公東征四國是遑誠心款著謂之累積頻頻書想至陰寒想自勝常皇矣漢祖纂堯羲之死罪荀葛各一國佐命宗臣觀其轍迹實奇士也然荀獲譏於憂卒意長恨恨謂其弘濟之心宜被大道諸葛經國達治無間然處事而無玷累獲全名於數代至於建鼎足之勢未能忘已所謂命世大才以天下為心者容得爾乎前試論意久欲呈多疾憒憒遂忘致今送願因暇日可垂試省大期賢達興廢之道不審謂粗得阡陌不信所懷願告某中并爾郎子意同異復云何邈然無諮敘之期每賜翰墨使如蹔展羲之死罪足下各可不都五日書今送謝即至想源得免豺狼耳王羲之羲之死罪死罪近因周參軍白牒伏想必達此春以過時速與深兼哀傷摧切割心情奈何奈何須臾寒食節不審尊體何如不承問以經月馳企民疾根治滯了無差候轉久憂深叔遣信自力粗白不宣備羲之死罪死罪墳墓在臨川行欲改就吳中終是所歸中軍往以還田一頃烏澤田二頃吳興想弟可還以與吾故示想弟居意故如往言忠終高也是以思同之此三頃田樂吳舊耳云卿軍府甚多田也宜須一用心吏可差次忠良十九日羲之頓首明二旬增感切奈何奈何得十二日書知佳為慰僕左邊大劇且食少至虛乏力不一一王羲之頓首十二日告李氏甥得六日書為吾劣劣力不一一羲之白羲之死罪復蒙殊遇求之本心公私愧歎無言以喻去月十一日發都違遠朝廷親舊乖離情懸兼至良不可言且轉遠非徒無諮覲之由音問轉復難通情慨深矣故旨遣承問還願具告羲之死罪群從彫落將盡餘年幾何而禍痛至此舉目摧喪不能自喻且和方左右時務公私所賴一旦長逝相為痛惜豈惟骨肉之情言及摧惋永往奈何表妹委篤示致問荒憒不得此熱不能不取給腹中便復惡無賴羲之死罪累白想至雨快想比安和遲復承問下官劣劣日前可力白不具王羲之死罪皆以具示復自耳羊參軍尋至具一一子期諸人何似耿耿心制行終不可居處餘皆平安也及以令弟食後來想必如期果之小晚恐不展也故復旨示羲之報增運白米來者云必行此無所復云吾於時地甚疏卑致言誠不易然太老子以在大臣之末要為居時任豈可坐視危難今便極言於相并與殷謝書皆封示卿勿廣宣之諸人皆謂盡當今事宜直恐不能行耳足下亦不可思致若言耶人之至誠故當有所面不爾坐待死亡耳吾復五六日至東縣還復至問想官舍佳見護軍近書甚慰仁祖轉嘉然疾根不除尚令人憂復得問未復反書甚慰入月共至窟山看甘橘思君宜深想鐵已還旦夕展也故復旨示羲之報小大佳也不得尚書中書問耿耿得業書慰之亦得業書為慰今付還安方決去不言言即卿書致適阮兒書其氣散暴處便危篤憂之怛怛貴奴差不想不成大病傷寒可畏令人憂當盡消息也蚶二斛厲二斛前示噉蚶得味今旨送此想噉之故以為佳比來食日幾許得味不具示若治風教可弘今忠著於上義行於下雖古之逸士亦將眷然況下此者觀頃舉厝君子之道盡矣今得護軍還君屈以申時玄平頃命朝有君子曉然復謂有容足地常如前者雖患九天不可階九地無所逃何論於世路萬石僕雖不敏不能期之以道義豈苟且若復以此進退直是利動之徒耳所不忍為所不以為上方寬博多通資生有十信之覺是所委息乃有南眷情足謂何以密示一勿宣此意為與卿共思之省以付火諸暨始寧屬事自可得如教丹陽意簡而理通屬所無復逮錄之煩為佳想君不復須言謝丹陽亦云此語君想大小皆佳知賓猶爾耿耿想得夏節佳也念君勞心賢姊大都轉差然以故有時嘔食不已是老年衰疾久亦非可倉卒大都轉差為慰以大近不復服散當將陟釐也此藥為益如君告大都夏冬自可足麥秋輒有違此亦人之常期等平安在此羸小差知諸賢佳數見范生亦得玄近書為慰又得孔郗王書亦云不能數何爾須江生可耳斷絕也尚未見傳女足下言極是有懷甚佳大婚定芳勢道也先生頃可耳今日略至遲委垂知樂公可為之慰桃膠易得可以少耶專一物不移乃不忠也充迎不致意知陽意事迎願人之善行政五十日不復得問懸情皆佳也何貽云得潁陽書平安慰意不得吳諸人問懸遲之古之御世者乃志小天下今封域區區一方任耳而恒憂不治為時恥之但今卿重熙之徒必得申其道更自行有餘力相弘也甲夜羲之頓首向遂大醉乃不憶與足下別時向至道家乃解尋憶乖離其為歎恨言何能喻聚散人理之常亦復何云惟願足下保愛為上以俟後期故旨遣此信取足下過江問臨紙情塞王羲之頓首足下識先日之言信信具前得君書即有反想至也謂君前書是戲言耳亦或謂君當是舉不失親在安石耳省君今示頗知如何老僕之懷謂君體之方復致斯言愧誠心之不著若僕世懷不盡前者自當端坐觀時直方其道或將為世大明耶政有救其弊筭之熟悉不因放恕之會得期於奉身而退良有已良有已此共得之心不待多言又餘年幾何而逝者相尋此最所懷之重者頃勞藥石之資如有萬一方欲思盡頤養過此以往未之敢聞言盡於今也知諸賢往數見范生亦得其近書為慰又得孔生書亦云不能數何爾耶江生可耳斷絕冀涼集也得司州十六日書諸疾患至憂之至深矣有斷未想桓公數便亦知謝生大得情和至慰安以當至吳興遲見之也知須米告求常如雲此便大乏勑以米五十斛與卿有無當其何以論借今有教勑付米可送之數上下問如常何可得集耶念馳情未異果為結念致問不得東陽問想卿婦遂平復耳聾佳不謝之幼小頃可行華母子平安知足下故望蹔還歲內何理過歲必有理不思存足下復得一敘平生當可言得卿書尋省反復但有悲慨比者且當數致年知畢力果思遲言面不可復得此與范期後月五日遂乃剋耳還遣旨進頃猶小差欲極遊目之娛而吏卒守之可歎耳陽化果似小可何日得卿諸人鄙疾進退憂之甚深使自表求解職時以許乃當是公私大計然此舉不深又不宜是之於始二三無所成可以示從女其劣欲知消息足下所欲餘姚地輒勑驗所須輒告此雨過將為災想彼不必同苗稼好也比見敬祖小大可耳念孫阮諸人皆何似耿耿尚書中郎諸人皆佳比面雖近隔殊思卿度還旦夕吾頃胸中惡不欲食積日勿勿五六日來小差尚甚虛劣且風大動舉體急痛何耶賴力及足下家信不能悉王羲之十一月四日右將軍會稽內史瑯邪王羲之敢致書司空高平郗公足下上祖舒散騎常侍撫軍將軍會稽內史鎮軍儀同三司夫人右將軍劉女誕晏之允之允之建威將軍錢塘令會稽都尉義興太守南中郎將江州刺史衛將軍夫人散騎常侍荀文女誕希之仲之及尊叔廙平南將軍荊州刺史侍中驃騎將軍武陵康侯夫人雍州刺史濟陰郗說女誕頤之胡之耆之美之胡之侍中丹陽尹西中郎將司州刺史妻常侍譙國夏侯女誕茂之承之羲之妻太宰高平郗鑒女誕玄之凝之肅之徽之操之獻之肅之授中書郎驃騎諮議太子左率不就徽之黃門郎獻之字子敬少有清譽善隸書咄咄逼人仰與公宿舊通家光陰相接承公賢女淑質直亮確懿純美敢欲使子敬為門閭之賓故具書祖宗職諱可否之言進退惟命羲之再拜良深路滯久矣況今季末無所多怪足荒何䘏於此足下志嶠外有由來及然以勢觀之卿入貴於不令耳書政當爾王羲之白知以智之所無奈何不復稍憂此誠理也然之懷何能已已乎未能得面書何所悉怛深得近期蹔還故因教初月日親往為慰思後諸能數不想昨咁兄以日此粗佳二謝叔喪興公近便索然玄度來數日有疾患便復來阿萬小差大事問有重慮安佳行來遇大蕩然阮公政散耿懷祖可呼賀祭酒俱足下欲同至上虞一宿還無所廢吾初至便與長史俱行無不可不吾為卿任此聲者但此懷自不復得闕之於時小大皆佳也度有近問不得上虞甚佳足下當能相就不思面卿前云當來何能果也遲散無喻吾後月當出以省念示下近欲麻紙適成今付三百寫書竟訪得不得其人示之省書知定疑來汝居長謂所養雖小要為喪主劉夫人靈坐在堂政爾遠來于禮誠不可違所以狼狽遠迎汝情地信難忍交恐有性念慮得來想慰釋實引是以不復思此耳若汝能割遣無益得過喪制遂來居此乃事宜也若自量不能違哀念須吳等旦夕相喻者當來汝當自若吾意盡此也若來大小祥當復出者殊更良昌若汝不出農當單出汝能遣農速行不諸宜皆當自詳計審日遲望而更未定殊更悵恨不可言此乃為汝求宅謂汝來居止理軍千何可久處而情事不得從意可歎可歎終果來居者故當為汝求也以書示農初月二日羲之頓首忽然此年感遠兼傷情痛切心奈何奈何念君哀窮奄經新故仰慕崩絕豈可堪忍比各何似相憂不忘當深消息以全勉為大僕衰老殆是日不如日力知問王羲之頓首思率府朝得書知問足下差但尚頓極之不一一初月一日羲之報忽然改年感思兼傷不能自勝奈何奈何冀更寒諸疚比復何似不得問多日懸心不可言吾猶小差甚尚劣力遣不知羲之報卿各何罪似先羸而處至痛憂涕深重得之思寬遣吾竝乏劣自力不報悉此上下可耳出外解小分張也須產往迎慶思之不可言知靜婢面猶爾甚懸心袁妹當來悲慰不言下家當慰意令知之期小女四歲暴疾不救哀愍痛心奈可奈何吾衰老情之所寄惟在此等奄失此女痛之纏心不能已已可復如何臨紙情酸知靜婢猶未佳懸心可小須留爾十月十五日羲之頓首月半哀傷切心奈何奈何不可居忍得十三日書知問此何以恒耿耿吾至勿勿小佳更致問王羲之頓首謝范新婦得富春還諸道路安穩甚慰心比日涼即至平安也上下集聚欣慶也華等佳不自新婦母子去寂寞難言思子輩不可言羲之死罪伏想朝廷清和稚恭遂進鎮東西齊舉想剋定有期也羲之死罪死罪羲之白乖違積年每懷辛苦痛切心肝惟同此情當可居處羲之腳不踐地十五年無由奉展比欲奉迎不審能垂降不豫惟哽故先承問羲之再拜再昔來熱如小有覺然晝故難堪知足下患之云故以圍棊是不為患吾其爾無佳自得此熱憔悴終日未果如何王羲之頓首五月二十七日州民王羲之死罪死罪此夏復便半惟違離眾情兼至時增傷悼頃水雨未之有不審尊體如何得疾除也不承近問馳企民自服橡屑下斷體氣便自差強此物益人斷下去陟釐劫樊遠也以為良方出何是真此之謂謹及因青州白牒不備羲之死罪死罪寒伏想安和小大悉佳奉展乃具羲之死罪見子卿具一一荒民惠懷最要也甚以欣慰惟願不倦為善承留此生當廣陵任佳此生處事以驗海陵江間殊令人有懷也羲之死罪死罪想元道弘廣平安道克當得還不羲之頓首涼君可不女差不耿耿想比能果力不王羲之頓首頓首阮侯止於界上耳向書已具不復一一王羲之白昨得殷侯答書今寫示君承無怒意既而意謂速思順從或有怨理大小宜盤桓或至嫌也想復深思驗同罪十二月十日羲之白近復追付期想先後皆至昨得二十七日告知君故乏劣腹痛甚懸情災雨比日復何似善消息遲後問復平平不一一王羲之白知尋遣家信遲具問向遣書想夜至得書知足下問當遠行諸懷何可言十一必早發想至足下如向期也行當是防民流逸不以為利耶此於郡為由上守郡更尋詳若不由上命而斷中求絕者此為以利卿絕之是也更尋詳具白若不由上縱民所之恐有如向者流散之患可無善詳具聞君欲船輒勑給所須告之得君戲詠承念至此年乃未見
