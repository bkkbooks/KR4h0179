body:
  text: 王接為愍懷太子服議愍懷太雖已建立所謂傳重而非正體者也依喪禮及鄭氏説制服不得與嫡同應從庶例天子諸侯不為庶子服聖上于愍懷無服之喪難者曰君父立之與后所生同矣焉有既為太子而復非嫡乎答曰嫡庶定名非建立所易喪服庶子為其母緦不言嫡子為其妾母而曰庶子為其母許其為後庶名猶存矣通典八十一司隸從事王接議贈恤嵇紹議夫謀人之軍軍敗則死之謀人之國國危則亡之古之道也蕩陰之役百官奔北惟嵇紹守職以遇示道可謂臣矣又可稱痛矣今山東方欲大舉宜明高節以號令天下依春秋褒三纍之義加紹致命之賞則遐邇向風莫敢不肅矣晉書王接傳報潘滔書今世道交喪將遂剝亂而識智之士鉗口韜筆禍敗日深如火之燎原其可救乎非榮斯行欲極陳所見冀有覺悟耳晉書王接傳懷秋賦去時來時慘淒悼秋氣之可悲御覽二十五父母乖離議今雖父子分乖存亡不定昔宋岱母離隔吳平其母尚存推此安可必其無異乎故先明授受不廢謂宜使婚宦及時也通典九十八陳詵後妻之子為前妻服議案禮不二嫡故惠公元妃孟子孟子卒繼室以聲子諸侯猶爾況庶人乎士喪禮曰繼母本實繼室故稱繼母者事之如嫡故曰如母也詵不能遠慮避難以亡其妻李氏非犯七出見絶于詵始不見絶終又見迎養姑于堂子為首嫡列名黃籍則詵之妻為詵也妻則為暉也母暉之制服無所疑矣禮為繼母服而不為前母服者如李比類曠世所希前母既終乃有繼母後子不及前母故無制服之文然礿祠蒸嘗未有不以前母為母者亡猶母之況其存乎詵有老母不可以莫之養妻無歸期納妾可也李雖沒賊尚有生冀詵尋求之理不盡而便娶妻誠詵之短也然隴畝之夫不達禮義考之傳記不勝施孝叔之妻失身于郤犨而不棄者以非其罪也詵有兩妻非故犯法李鄙野人而能臨危請活姑命險不忘順可謂孝婦矣議者欲令在沒略之中必全苦操有隕無二是望凡人皆為宋伯姬也詵雖不應娶妻要以嚴為妻妻則繼室本非嫡也雖云非嫡義在始終寧可以詵不應二妻而己涉二庭乎若能下之則趙姬之義若云不能官當有制先嫡後繼有自來矣衆議貶譏太峻故略序異懷晉書禮志中通典八十九降幕祠議琵琶出于弦笙簧基于絲竹御覽五百八十三劉隗上言王籍周喪娶妻事文學王籍有叔母服未一月結吉娶妻虧俗傷化宜加貶黜輒下禁止妻父周嵩知籍有喪而成婚無王孫恥奔之義失為父之道王廙王彬于籍親則叔父皆無君子幹父之風應清議者任之鄉論通典六十司直劉隗上言奏劾祖約約幸荷殊寵顯位選曹銓衡人物衆所具瞻當敬以直內義以方外杜漸防萌式遏寇害而乃變起蕭牆患生婢妾身被刑傷虧其膚髮群小噂誻囂聲遠被塵穢清化垢纍明時天恩念垢猶復慰喻而約違命輕出既無明智以保身又孤恩廢命宜君貶黜以塞衆謗晉書祖約傳約妻無男而性妒約亦不敢違忤嘗夜寢于外忽為人所傷疑其妻所為約求去職帝不聽約便從右司馬營東門私出司直劉隗劾奏劾梁龕夫嫡妻長子皆杖居廬故周景王有三年之喪既除而宴春秋猶譏況龕匹夫暮宴朝祥慢服之愆宜肅喪紀之禮請免龕官削侯爵顗等知龕有喪吉會非禮宜各奪俸一月以肅其違晉書劉隗傳廬江太守梁龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同會隗奏奏劾阮抗宋挺挺蔑其死主而專其室悖在三之義傷人倫之序當投之四裔以禦魑魅請除挺名禁錮終身而奮武將軍太山太守阮抗請為長史抗經文緯武剖符東藩當庸勳忠良昵近仁賢而褒求贓汙舉頑用嚚請免抗官下獄理罪晉書劉隗傳丞相行參軍宋挺本揚州刺史劉陶門人陶亡後挺娶陶愛妾以為小妻建興中挺又盜割官布六百餘匹正刑棄市遇赦免既而奮武將軍阮抗請為長史隗劾奏奏可奏請追除宋挺名符旨挺已喪亡不復追貶愚蠢意暗未達斯義昔鄭人斫子家之棺漢明追討史遷經傳褒貶皆追書先世數百年間非徒區區欲釐當時亦將作法垂于來世當朝亡夕沒便無善惡也請曹如前追除挺名為民録妾還本顯證惡人班下遠近晉書劉隗傳挺病死隗又奏從之奏劾周莛劉胤李匡奏劾周莛劉胤李匡古之為獄必察五聽三槐九棘以求民情雖明庶政不敢折獄死者不可復生刑者不可復續是以明王哀矜用刑曹參去齊以巿獄為寄自頃蒸荒殺戮無度罪同斷異刑罰失宜謹案行督運令史淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復下流四尺五寸百姓喧譁士女縱觀咸曰其冤伯息忠訴辭稱枉云伯督運訖去二月事畢代還無有稽乏受賕使役罪不及死軍是戍軍非為征軍以乏軍興論于理為枉四年之中供給運漕凡諸徵發租調百役皆有稽停而不以軍興論至于伯也何獨明之捶楚之下無求不得囚人畏痛飾辭應之理曹國之典刑而使忠等稱冤明時謹案從事中郎周莚法曹參軍劉胤屬李匡幸荷殊寵並登列曹當思敦奉政道詳法慎殺使兆庶無枉人不稱訴而今伯枉同周青冤魂哭于幽都訴靈恨于黃泉嗟歎甚于杞梁血妖過于崩城懷情抱恨雖沒不忘故有殞霜之應夜哭之鬼伯有晝見彭生為豕刑殺失中妖眚並見以古況今其揆一也皆由莚等不勝其任請皆免官晉書劉隗傳建興中丞相府斬督運令史淳于伯而血逆流隗又奏奏劾周顗顗幸荷殊寵列位上寮當崇明憲典協和上下刑于左右以御于家邦而乃縱肆小人群為凶害公于廣都之中白日刃尉遠近訩嚇百姓喧譁虧損風望漸不可長既無大臣檢御之節不可對揚休命宜加貶黜以肅其違晉書劉隗傳周嵩嫁女門生斷道解廬斫傷二人建康左尉赴變又被斫隗劾嵩兄顗云云奏定父母乖離制諸軍敗亡失父母未知吉凶者不得營宮歡樂皆使心喪有犯君子廢小人戮通典九十八御史中丞劉隗奏上答王敦書魚相忘于江湖人相忘于道術竭股肱之力效之以忠貞吾之志也晉書劉隗傳劉波上孝武帝疏臣聞天地以弘濟為仁君道以惠下為德是以禹湯有身勤之績唐虞有在豫之誥用能惠被蒼生勳流後葉宣帝開拓洪圖始基成命爰及文武曆數在躬而猶虛心側席卑已崇物然後知積纍之功重勤王之業艱先君之德弘貽厥之賜厚惠皇不懷委攻內任遂使神器幽淪三光翳曜園陵懷九泉之感宮廟集胡馬之迹所謂肉食失之于朝黎庶暴骸于外也賴元皇帝神武應期祚隆淮海振乾綱于已墜紐絶維而更張陛下承宣帝開始之宏基受元帝克終之成烈保大定功戢兵靜亂故使負鱗橫海之鯨僭位滔天之寇望雲旗而宵潰覩太陽而霧散巍巍蕩蕩人無名焉而頃年已來天文違錯妖怪屢生會稽先帝本封而地動經年昔周之文武有魚烏之瑞君臣猶懷震悚況今災變衆集曾莫之疑公旦有勿休之誡賈誼有積薪之喻臣鑒先徵竊惟今事是以敢肆狂瞽直言無諱往者先帝以玄風御世責成群后坐運天綱隨化委順故忘曰計之功收歲成之用今禮樂征伐自天子出相王賢雋協和百揆六合承風天下響振而鈞臺之詠弗聞景亳之命未布將群臣之不稱陛下用之不盡乎凡聖王之化莫不敦崇忠信存正棄邪傷化毀俗者雖親雖貴必疏而遠之清公貞修者雖微雖賤必親而近之今則不然此風既替利競滋甚朋黨比周毀譽交興鑽求苟進人希分外見賢而居其上受祿每過其量希旨承意者以為奉公共相讚白者以為忠節舉世見之誰敢正言陛下不明必行之法以絶穿鑿之源者恐脫因疲倦以誤視聽且苻堅滅亡于今五年舊京殘毀山陵無衛百姓塗炭未蒙拯援伏願遠觀漢魏衰滅之由近覽西朝傾覆之際超然易慮為于未有則靈根永固社稷無虞臣豈誣一朝之人皆無忠節但任非其才求之不至耳今政煩役殷所在凋斃倉廩空虛國用傾竭下民侵削流亡相屬略計戶口但咸安已來十分去三百姓懷蜉蝣之歎下泉興周京之思昔漢宣有云與我共治天下者其惟良二千石乎是以臨下有方者就加璽贈法苛政亂者恤刑不赦事簡于上人悅于下今則不然告時乞職者以家斃為辭振窮恤滯者以公爵為施古者為百姓立君使之司牧今者以百姓恤君使之蠶食至乃貪污者謂之清勤慎法者謂之怯劣何反古道一至于此陛下雖躬自節儉哀矜于上而群寮肆欲縱心于下六司垂翼三事拱默故有識者覩人事以歎息觀天眚而大懼昔宋景退熒惑之災殷宗消鼎雉之異伏願陛下仰觀大禹過門之志俯察商辛沈湎之失遠思國風恭公之刺深惟定薑小臣之喻暫回聖恩大詣群后延納衆賢訪以得失令百寮率職人言損益察其所由觀其所以審識群才助鼎和味克念作聖以答天休則四海宅心天下幸甚臣亡祖先臣隗昔荷殊寵匪躬之操猶存舊史有志無時懷恨黃泉及臣几劣復蒙罔極之眷恩隆纍世實非糜身傾宗所能上報前作此表未氶得通暴嬰篤疾恐命在奄忽貪及視息望達遇情氣力惙然不能自宣晉書劉波傳列侯不臣蕃國表昔為晉陵內史在東海國封內時世孫幼小太妃秉政前史內遷授除拜日及當時之官皆上疏拜閣純執臣之禮闓自以雖爵有五等然執圭受瑞俱為列國無相臣之體又晉制拜列侯為相內史于天朝不曰陪于蕃國不稱臣臣以從古則懼有行簡之譏隨俗有恐失君臣之訓經國垂範宜有定準乞出臣表下八座參詳答報于氏養兄子率為後議賀嶠妻于氏表與群妻陶氏所稱不同陶辭嶠妻于氏無子夫群命小息率為嶠嗣一年嶠妾張生纂故驃騎將軍顧榮謂群嶠已有男宜使率還問與為人後者不故司空賀循取從子紘為子鞠養之恩皆如率循後有晚生子遣紘歸本率今欲嶠即便見遣于表養率以為己子非謂為人後立六義十疑以明為後不並存之稱生言長嫡死乃言後存己異名又云乞養人子而不以為後見于何經名不虛立當有所附以古者無此事也今人養子皆以為後于又云為人後者族人選支子為之嗣非謂如率為嫡先定庶幼後生而以為譏此乃正率宜去非所以明其應留也且率以若子之輕義奪至親之重恩是不可之甚也于知禮廡養子之交故欲因今世乞子之名而博引非類之物為喻謂養率可自然成子避其與後之譏乎通典六十九難荀交駮陳留出城夫昔宋不城周春秋所譏特蠲非體宜應減夫晉書荀奕傳時將繕宮城尚書符下陳留王使出城夫荀奕駮云云尚書張闓僕射孔愈難奕云云亦重駮云云百枝燈賦曄若雲停爛已星布藝文類聚八十楠榴枕賦楠榴枕賦委之玳瑁席停之象牙床御覽八百七體非一變姿難稱學蜿若蟠虯翩似駮鶴氤氳雲霧旁成山嶽北堂書鈔一百三十四引孫惠棚稻枕賦陳禹謨本改作楠榴枕以御覽校之改是繀車賦惟工藝之多門偉英麗乎創形擬老氏之共轂兮應天運以回行乘轉屈以成歸兮不辭勞以自傾故其用同造物功參天地軒轅垂衣因斯以濟袞冕龍旗用康上帝勳存王室惠流皂隸觀口微風興于輪端霧雨散于𨌘輻制以靈木絡以奇竹危朝日以投員兮準暈月以造象若洪輪之仕雍兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或口綿組或匹綾羅舒皎腕于輕輪兮擬景乎鏡華絲成妙于指端兮號推幽而相和象蟋蟀之鳴戶兮類寒蟬之鳴家御覽八百二十五龜賦有緇衣之大夫兮衣玄繡之衣裳乘輕車之岌岌兮駕雲霧而翱翔風雨為之電奮兮五免赫以焜煌初學記三十御覽九百三十一泛舟于清泠之淵垂竿于巖澗之下文選謝朓始出尚書省詩注諫齊王囧惠聞天下五難四不可而明公皆以居之之捐宗廟矣主忽十乘之重躬貫甲胄犯冒鋒刃此一難也奮三百之卒決全勝之策集四方之衆致英豪之士此二難也舍殿堂之尊居單幕之陋安囂塵之慘同將士之勞此三難也驅烏合之衆當凶強之敵任神武之略無疑阻之懼此四難也檄六合之內著盟信之誓升幽宮之帝復皇祚之業此五難也大名不可久荷大功不可久任大權不可久執大威不可久居未有行其五難而不以為難遺其不可而謂之為可惠竊所不安也自永熙以來十有一載人不見德惟戮是聞公族構篡奪之禍骨肉遭梟夷之刑郡王被囚檻之困妃主有離絶之哀歷觀前代國家之禍至親之亂未有今日之甚者也良史書過後嗣何觀天下所以不去于晉符命長存于世者主無嚴虐之暴朝無酷烈之政武帝餘恩獻王遺愛聖慈惠和尚經人心四海所係實在于茲今明公建不世之義而未為不世之讓天下惑之思求所悟長沙成都魯衛之密國之親親與明公計功受賞尚不自先今公宜放桓文之勳邁臧札之風芻狗萬物不仁其化崇親推近功遂身退委萬機于二王命方嶽于群后耀義讓之旗鳴思歸之鑾宅大齊之墟表泱泱之風垂拱青徐之域高枕營丘之藩金石不以銘高八音不足以贊美姬文不得專聖于前太伯不得獨賢于後今明公忘亢極之悔忽窮高之凶棄五嶽之安居纍卵之危外以權勢受疑內以百揆損神雖處高臺之上逍遙重仞之墉及其危亡之憂過于潁翟之慮群下竦戰莫之敢言惠以衰亡之餘遭陽九之運甘矢石之禍赴大王之義脫褐冠胄從戎于許契闊戰陳功無可記當隨風塵待罪初服屈原放斥心存南郢樂毅適趙志戀北燕況惠受恩偏蒙識養雖復暫違情隆二臣是以披露血誠冒昧干忤言入身戮義讓功舉退就鈇鑕此惠之死賢于生也晉書齊王囧傳詭稱南嶽逸士秦祕之以書干東海王越詭稱南嶽逸士秦祕之以書干東海王越天禍晉國遘茲危運歷觀危亡其萌有漸枝葉先零根株乃斃伏惟明公咨睿哲之才應神武之略承衰亂之餘當傾險之運側身昏讒之俗局蹐凶諂之間執夷正立則取疾姦佞抱忠懷直則見害賊臣餔糟非聖性所堪苟免非英雄之節是以感激于世發憤忘身抗辭金門則謇諤之言顯扶翼皇家則匡主之功著事雖未集大命有在夫以漢祖之賢猶有彭成之恥魏武之能亦有濮陽之失孟明三退終于致果句踐喪衆期于擒吳今明公名著天下聲振九域公族歸美萬國宗賢加以四王齊聖仁明篤友急難之感同獎王室股肱爪牙足相維持皇穹無親惟德是輔惡盈福謙鬼神所讚以明公達存亡之符察成敗之變審所履之運思天人之功虎視東夏之藩龍躍海隅之野西咨河間南結征鎮東命徑吳鋭卒之富北有幽并率義之旅宣喻表徐啓示群王旁收雄俊廣延秀傑糾合攜二明其賞信仰惟天子蒙塵鄴宮外矯詔命擅誅無辜豺狼篡噬其事無遠夫心火傾移喪亂可必太白橫流兵家攸杖歲鎮所去天厭其德玄象著明謫譴彰見違天不祥奉時必剋明公思安危人神之應慮禍敗前後之徵弘勞謙日昃之德躬吐握求賢之義傾府竭廟以振貧乏將有濟世之才渭濱之士含奇謨于朱脣握神策于玉掌逍遙川嶽之上以俟真人之求目想不世之佐耳聽非常之輔舉而任之則元勳建矣祕之不天值此衰運竊慕墨翟申包之誠詙涉荊棘重繭而至櫛風沐雨來承禍難思以管穴毗佐大猷道險時吝未敢自顯伏在川泥繫情宸極謹先白箋以啓天慮若猶沈吟際會徘徊二端徼幸在險請從恕宥之例明公今旋軫臣子邦宛轉名義之國指麾則五嶽可傾呼吸則江湖可竭況履順討逆執正伐耶是烏獲摧冰賁育拉朽猛獸吞狐泰山壓卵因風燎原未足方也今時至運集天與神助復不能鵲起于慶命之會拔劍于時哉之機恐流濫之禍不在一人自先帝公王海內名士近者死亡皆如蟲獸尸元曳于糞壤形骸捐于溝澗非其口無忠貞之辭心無義正之節皆希目下之小生而惑終焉之大死凡人知友猶有刎頸之報朝廷之內而無死命之臣非獨祕之所恥惜乎晉世之無人久矣今天下喁喁四海注目社稷危而復安宗廟替而復紹惟明公兄弟能弘濟皇猷國之存亡在斯舉矣祕之以不才之姿而值危亂之運竭其狗馬之節加之忠貞之心左屬平亂之鞬右握滅逆之矢控馬鵠立計日俟命時難獲而易失機速變而成禍介如石焉實無終日自求多福惟君裁之晉書孫惠傳為東海王討成都王檄文穎稟性強暗增崇位號阿比奄官專任孟政遂使恣睢殺活由已疾諫好讒小人滿側官以賄成位以錢獲囚以貨生獄以幣解百官卷舌朝野隱伏案穎之罪書記未有禍甚叔帶逆隆魯桓為子則不孝為臣則不忠為弟則不順為主則不仁四惡具矣豺狼之性有甚無悛藝文類聚五十八與淮南內史朱誕書馬援擇君凡人所聞不意三陸相攜暴朝殺身傷名可為悼歎吳志陸抗傳注不意三陸相攜暗朝一旦湮滅道業淪喪痛酷之深荼毒難言國喪雋望悲豈一人晉書陸雲傳三馬哀辭序余于物特所留心而所服三馬一時離羈感田子之愛遂作哀文云爾御覽三百五十九祭金鼓文赫矣皇威用伐不庭金鼓麾旗以昭其聲御覽三百三十八
