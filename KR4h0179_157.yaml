body:
  text: 佛圖澄謝趙主石虎勞問陽月初暖願御膳順宜貧道先嬰重疾年衰益甚邈蒙慈詔曲垂光慰感懼之至十百於懷幸遇慶會而形不自運此情此慨良無以喻釋藏輦高僧傳臨化遣人辭石虎物理必遷身命非保貧道焰幻之軀化期已及既荷恩殊重故逆以仰聞釋藏輦高僧傳合首楞嚴經記此經本有記云支讖所譯出讖月支人也漢桓靈之世來在中國其博學淵妙才思測微凡所出經類多深玄貴尚實中不在文飾今之小品阿闍世伅真般舟悉讖所出也又有支越字恭明亦月支人也其父亦漢靈帝之世來獻中國越在漢生似不及見讖也又支亮字紀明資學於讖故越得受業於亮焉越才學深徹內外備通以季世尚文時好簡略故其出經頗從文麗然其屬辭析理文而不越約而義顯真可謂深入者也以漢末沸亂南度奔吳從黃武至建興中所出諸經凡數十本自有別傳記録亦云出此經今不見復有異本也然此首楞嚴經自有小不同辭有豐約文有晉梵較而尋之要不足以為異人別出也恐是越嫌讖所譯者辭質多梵音所異者刪而定之其所同者述而不改二家各有記録耳此一本於諸本中辭最省便又少梵音遍行於世即越所定者也至大晉之初有沙門支法護白衣竺叔蘭並更譯此經求之於義互相發明披尋三部勞而難兼欲令學者即得其對今以越所定者為母護所出者為子蘭所譯者繫之其所無者輒於其位記而別之或有文義皆同或有義同而文有小小增減不足重書者亦混以為同雖無益於大趣分部章句差可見耳釋藏迹七合維摩詰經序蓋維摩詰經者先哲之格言弘道之宏標也其文微而婉厥旨幽而遠可謂唱高和寡故舉世罕覽然斯經梵本出自維邪離在昔漢興始流茲土於時有優婆塞支恭明逮及於晉有法護叔蘭此三賢者並博綜稽古研機極玄殊方異音兼通開解先後譯傳別為三經同本人殊出異或辭句出入先後不同或有無離合多少各異或方言訓古字乖趣同或其文梵越其趣亦乖或文義混雜在疑似之間若此之比其塗非一若其偏執一經則失兼通之功廣披其三則文類難究余是以合兩令相附以明所出為本以蘭所出為子分章斷句使事類相從令尋之者瞻上視下讀彼案此足以釋乖迂之勞易則易知矣若能參考校異極數通變則萬流同歸百慮一致庶可以闢大通於未寤闔同異於均致若其配不相疇儻失其類者俟後明哲君子刊之從正釋藏迹八人物論法深學義淵博名聲蚤著弘道法師也世説文學篇注悟鋭有神才辭通辨世説言語篇注法畼自敘其美成實論波利質多天樹其香則逆風而聞世説文學篇注眼識不待到而知虛塵假空與明故得見也若眼到色到色間則無空明如眼觸目不能見彼當知眼識不到而知依如此説則眼不往形不入遙屬而見也世説文學篇注譬喻經序譬喻經者皆是如來隨時方便四説之辭敷演弘教訓誘之要牽物引類轉相證據互明善惡罪福報應皆可寤心免彼三塗如今所聞億未載一而前後所寫互多復重今復撰集事取一篇以為十卷比次首尾皆令條別趣使易了於心無疑願率土之賢有所遵承永升福堂為將來基釋藏迹九銅像銘建武六年歲在庚子宮寺道人法新僧行所造法苑珠林二十二孫彥曾妾王慧得銅像有銘答支遁書欲來便給未聞巢由買山而隱高僧傳四潛還郯𡵙山遁致書潛求買𡵙山之側沃洲潛答上書告辭哀帝遁頓首言敢以不才希風世表未能鞭後用愆靈化蓋沙門之義法出佛之聖雕淳反朴絶欲歸宗遊虛玄之肆守內聖之側佩五戒之貞毗外王之化諧無聲之樂以自得為和篤慈愛之孝蠕動無傷銜撫恤之哀永悼不仁秉未兆之順遠防宿命挹無位之節履亢不侮是以哲王御世南面之重莫不欲其風尚安其逸軌探其順心略其形敬故令歷代彌新矣陛下天鍾聖德雅尚不倦道遊靈模日吳忘御可謂鍾鼓晨極聲滿天下清風既劭莫不幸甚上願陛下齊齡二儀弘敷至法去陳信之妖誣尋丘禱之弘議絶小塗之致泥奮宏轡於夷路若然者太山不淫季氏之旅得一以成靈王者非員丘而不禋得一以永貞若使貞靈各一人神相忘君君而下無親舉神神而呪不加靈玄德交被民荷冥祐恢恢六合成吉洋之宅洋洋大晉為元亨之宇常無為而萬物歸宗執大象而天下自往國典刑殺則有司存焉若生而非惠則賞者自得戮而非怒則罰者自刑弘公器以厭神意提詮衡以極冥量所謂天何言哉四時行焉貧道野逸東山與世異榮菜蔬長阜漱流清壑襤縷畢世絶窺皇階不悟乾光曲曜猥被蓬蓽頻奉明詔使詣上京進退惟咎不知所厝自到天庭屢蒙引見優遊賓禮策以微言每愧才不拔滯理無拘新不足對揚玄模允塞視聽踧踖侍人流汗位席曩四翁赴漢干木蕃魏皆出處有由默語適會今德非昔人動靜乖理遊魂禁省鼓言帝側將困非據何能有為且歲月僶俯苔斯之嘆況復同志索居綜習遼落回首東顧孰能無懷上願陛下特蒙放遣歸之林薄以鳥養鳥所荷為優謹露板以聞伸其愚管裹糧望路伏待慈詔釋藏輦七又轂四與桓玄書論州符求沙門名籍隆安三年四月五日京邑沙門等頓白夫標極有宗則仰之者至理契神冥則沐浴彌深故尼父素空顏氏流連豈不以道隆德盛直往忘返者哉貧道等雖人凡行薄奉修三寶愛自天至信不待習但日損功德無心增愾賴聖主哲王復躬弘其道得使山居者騁業城旁者間逆緣皇澤曠灑朽幹蒙榮然沙門之於世也猶虛舟之寄大壑耳其來不以事退亦乘間四海之內意自無宅邦亂則振錫孤遊道洽則欣然俱萃所以自遠而至良有以也將振宏綱於季世展誠心於百代而頃頻被州符求沙門名籍煎切甚急未悟高旨野人易懼抱憂日深遂使禪人失靜勤士廢行喪精絶氣達旦不寐索然不知何以自安伏願明公扇唐風於上位待白足於其下使懷道獲濟有志俱全則身亡體盡畢命此矣天聽殊邈或未具簡謹於上聞伏追悚息弘明集十二與高驪道人論竺法深書上坐竺法深中州劉公之弟子體德貞峙道俗綸綜往在京邑維持法綱內外俱贍弘道之匠也頃以道業靖濟不耐塵俗考室山澤修德就間今在剡縣之𡵙山率合同遊論道説義高栖皓然遐邇有詠以晉寧康二年卒於山館春秋八十有九高僧傳四逍遙論夫逍遙者明至人之心也莊生建言大道而寄指鵬鷃鵬以營生之路曠故失色於體外鷃以任近而笑遠有矜伐於心內至人乘天正而高興遊無窮於放浪物物而不物於物則遙然不我得玄感不為不疾而速則逍然靡不適此所以為逍遙也若夫有欲當其所足足於所足快然有似天真猶飢者一飽渴者一盈豈忘蒸嘗於糗糧絶觴爵於醪醴哉苟非至足豈所以逍遙乎世説文學篇注妙觀章即色論夫色之性也不自有色色不自有雖色而空故曰色即為空色復異空世説文學篇注引支道林集大小品對比要鈔序夫般若波羅密者衆妙之潚府群智之玄宗神王之所由如來之照功其為經也至無空豁廓然無物者也無物於物故能齊於物無智於智故能運於智是故夷三脫於重玄齊萬物於空同明諸佛之始有盡群靈之本無登十住之妙階趣無生之徑路何者邪賴其至無故能為用夫無也者豈能無哉無不能自無理亦不能為理理不能為理則理非理矣無不能自無則無非無矣是故妙階則非階無生則非生妙由乎不妙無生由乎生是以十住之稱興乎未足定號舨若之智生乎教迹之名是故言之則名生設教則智存智存於物實無迹也名生於彼理無言也何則至理冥壑歸乎無名無名無始道之體也無可不可者聖之慎也苟慎理以應動則不得不寄言宜明所以寄宜畼所以言理冥則言廢忘覺則智全若存無以求寂希智以忘心智不足以盡無寂不足以冥神何則故有存於所存有無於所無存乎存者非其存也希乎無者非其無也何則徒知無之為無莫知所以無知存之為存莫知所以存希無以忘無故非無之所無寄存以忘存故非存之所存莫若無其所以無忘其所以存忘其所以存則無存於所存遺其所以無則忘無於所無忘無故妙存妙存故盡無盡無則忘玄忘玄故無心然後二迹無寄無有冥盡是以諸佛因般若無始明萬物之自然衆生之喪道溺精神乎欲淵悟群俗以妙道漸積損以至無設玄德以廣教守谷神以存虛齊衆首於玄同還群靈乎本無蓋聞出小品者道士也嘗遊外域歲數悠曩未見典載而不詳其姓名矣嘗聞先學共傳云佛去世後從大品之中鈔出小品世傳其人唯目之以淳德驗之以事應明其致而己亦莫測其由也夫至人也覽通群妙凝神玄冥靈虎響應感通無方建同德以接化設玄教以悟神述往迹以搜滯演成規以啓源或因變以求通事濟而他息適全以王分分足則教廢故理非乎變變非乎理教非乎體體非乎教故千變萬化莫非理外神何動哉以之不動故應變無窮無窮之變非聖在物物變非聖聖未始於變故教遺興乎變理滯生乎權接應存乎物理致同乎歸而辭數異乎本事備乎不同不同之功由之萬品神悟遲速莫不緣分分暗則功重言積而後悟質明則神朗觸理則玄湯輕之與重未始非分是以聖人之為教不以功重而廢分分易而存輕故群品所以悟分功所以成必須重以運通因其宜以接分為悟者之功重非聖教之有煩令統所以約教功所以全必此待統以適任約文以領玄領玄則易通因任則易從而物未悟二本之不異統致同乎宗便以言數為大小源流為精粗文約謂之小文殷謂之大順常之為通因變之為舞守數之為得領統之為失而彼揩文之徒羈見束教頃著阿含神匱分淺才不經宗儒墨大道域定聖人志局文句詰教難權謂崇要為達諒領統為傷宗須徵驗以明實效應則疑伏是以至人順群情以徵理取驗乎淵油明小品之體本塞群疑幽滯因物之徵驗故示驗以應之今不可以趣徵於一驗目之為淳德效喪於事實謂之為常人而未達神化之權統玄應於將來畼濟功於殊塗運無方之一致而察殊為異統觀奇化為逆理位大寶為欣王聚濟貨欲始徒知至聖之為教而莫知所以教是以聖人標域三才玄定萬品教非一途應物萬方或損教違無寄通適會或抱一御有繫文明宗崇聖典為世軌則夫體道盡神者不可詰之以言教遊無蹈虛者不可求之於形器是以至人於物遂通而已明乎小大之不異畼玄標之有寄因順物宜不拘小派或以大品辭茂事廣喻引宏奧雖窮理有外終於玄同然其明宗統一會致不異斯亦大聖之時教百姓之分致苟以分致之不同亦何能求簡於聖哉若以簡不由聖豈不寄言於百姓夫以萬聲鐘響響一以持之萬物感聖聖亦寂以應之是以聲非乎響言非乎聖明矣且神以知來夫知來者莫非其神也機動則神朗神朗則逆鑒明夫來往常在鑒內是故至人鑒將來之希纂明才致之不並簡教逆以崇順擬群智之分向關者易知希之者易行而大品言數豐具辭領富溢問對奧衍而理統宏邃雖玄宗易究而詳事難備是以明夫為學之徒須尋迹旨關其所往究覽宗致標之興盡然後悟其所滯統其玄領或須練紘群問明其酬對探幽研賾盡其妙致或以教衆數溢諷讀難究欲為寫崇供養力致無階諸如此例群仰分溢窺者絶是故出小品者參引王統簡領群目筌域事數標判由宗以小品而辭喻清約運旨亹亹然其往往明宗而標其會致使宏統有所於理無損自非至精孰其明矣又察其津塗尋其妙會覽始原終研極奧旨領大品之王標備小品之玄致縹縹焉覽津乎玄味精矣盡矣無以加矣斯人也將神王於冥津群形於萬物量不可測矣宜求之於筌表寄之於玄外惟昔聞之曰夫大小品者出於本品本品之文有六十萬言今遊天竺未適於晉今此二鈔亦興於大本出者不同也而小品出之在先然斯二經雖同出於本品而時往往有不同者或小品之所具大品所不載大品之所備小品之所闕所以然者或以二者之事同互相以為賴明其本一故不並矣而小品至略玄總事要舉宗大品雖辭致婉巧而不喪本歸至於説者或以專句推事而不尋況旨或多以意裁不依經本故使文流相背義致同乖群義偏狹喪其玄旨或失其引統錯徵其事巧辭偽辨以為經體雖文藻清逸而理統乖宗是以先哲出經以梵為本小品雖鈔以大為宗推梵可以明理徵大可以驗小若苟任胸懷之所得背聖教之本旨徒嘗於新聲苟競於異常異常未足以徵本新聲不可以經宗而遺異常之為談而莫知傷本之為傷本則失統失統則理滯理滯則或殆若以殆而不思其源困而不尋其本斯則外不關於師資內不由分得豈非仰資於有知自塞於所尋困蒙於所滯自窮於所通進不暗常退不研新説不依本理不經宗而忽詠先舊毀呰古人非所以為學輔其自然者也夫物之資生靡不有宗事之所由莫不有本宗之與本萬物之源矣本喪則理絶根巧則枝傾此自然之數也未紹不然矣於斯也徒有天然之才淵識邈世而未見大品覽其源流明其理統而欲寄懷小品率意造義欲寄其分得標顯自然希邈常流徒尚名實而竭其才思玄格聖言趣悅群情而乖本違宗豈相望乎大品也哉如其不悟將恐遂其所惑以罔後生是故推考異同驗其虛實尋流窮源各有歸趣而小品引宗時有諸異或辭倒事同而不乖旨歸或取其初要廢其後致筌次事宗倒其首尾或散在群品略撮玄要時有此事乖互不同又大品事數甚衆而辭曠浩衍本欲推求本宗明驗事旨而用思甚多勞審功又寡且稽驗廢事不覆速急是故余今所以例玄事以駢比標二品以相對明彼此之所在辨丈小之有先雖理惑非深奧而事對之不同故採其所究精粗並兼研盡事迹使驗之有由故尋源以求實趣定於理宗是以考大品之宏致驗小品之總要搜玄沒之所存求同異之所寄口口有在尋之有軌爾乃貫綜首尾推步玄領究其槃結辨其凝滯使文不違旨理無負宗棲驗有寄辨不失徵且於希詠之徒浪神遊宗陶冶玄妙推尋源流關虛考實不亦夷易乎若其域乖體極對非理標或其所寄者願俟將來摩訶薩幸為研盡備其未詳也釋藏迹八八關齋會詩序間與何驃騎期當為合八關齋以十月二十二日集同意者在吳縣土山墓下三日清晨為齋始道士白衣凡二十四人清和肅穆莫不靜畼至四日朝衆賢各去既樂野室之寂又有掘藥之懷遂便獨住於是乃揮手送有歸有望路之想靜拱虛房悟外身之真登山采藥集巖水之娛遂援筆染翰以慰二三之情廣弘明集三十上詠禪思道人詩序孫長樂作道士坐禪之像并而讚之可謂因俯對以寄誠心求參焉於衡軛圖巖林之絶勢想伊人之在茲余精其制作美其嘉文不能默己聊著詩一首以繼於左廣弘明集三十上釋迦文佛像讚并序釋迦文佛像讚并序夫立人之道曰仁與義然則仁義有本道德之謂也昔姬周之末有大聖號佛天竺釋王白淨之太子也俗氏母族厥姓裘曇焉仰靈胄以丕承藉俊哲之遺芳吸中和之誕化稟白淨之皓然生自右脅弱而能言諒天爵以不加為貴誡逸祿以靡須為足故常夕惕上位逆旅紫庭紆軫儲宮擬翮區外俄而高逝周覽郊野四闢皇扉三鑒疾苦風人厲辭以激興乃甘心受而莫逆訊大猷於有道慨在茲之致淹遂乃明發假征棲遲幽間脫皇儲之重任希無待以輕舉褫龍章之盛飾貿窮巖之襹褐資送之儔自崖而反矣爾乃抗志匪石安仁以山斑卉匡居摧心立盟釐安般之氣緒運十算以質心併四籌之八記從二隨而簡巡絶送迎之兩際緣妙一於鼻端發三止之矇秀洞四觀而合泯五陰遷於還府六情虛於靜林涼五內之欲火廓太素之浩心渥般若以進德潛七住而挹玄搜冥魚於六絶齒既立而廢筌豁萬劫之積習同生知於當年掩五濁以擅曜嗣六佛而徵傳偉準丈六體佩圓光啓度黃中色豔紫金運動陵虛悠往倏忽八音流芳逸豫揚彩妙覽未兆則卓絶六位曲成己著則化隆三五沖量弘乎太虛神蓋宏於兩儀易簡待以成體太和擬而稱邵圓蓍者象其神寂方卦者法其智周照積祐之留詳元宿命以制作或綢之以德義或疏之以沖風亮形搖於日新期妙主於不盡美既青而青藍逞百練以就粹導庶物以歸宗拔堯孔之外楗屬八億以語極罩墳索以興典掇道行之三無絡聃周以曾玄神化著於西域若朝暉升於晹谷民望景而興行猶曲調諧於宮商當是時也希夷緬邈於羲風神奇卓絶於皇軒蔚彩沖漠於周唐頌昹有餘於鄒魯信可謂神化之都領皇王之宗謨也年逾縱心泯迹泥洹夫至人時行而時止或隱此而顯彼迹絶於忍士冥歸於惟衛俗徇常以駭奇固以存亡而統之至於靈覺欴性三界殄悴豁若川傾頽如乾墜黔首與永夜同幽冥流與涸津並匱六度與崩岑俱褫三乘與絶軸解轡門徒泣血而心喪百靈銜哀而情悸夫道高者應卑因巡者親譽故不祈哭而哭豈非兼忘天下易使天下兼忘難靈風播越環周六合歷數終於赤縣後死所以與聞景仰神儀而事絶於千載祇洹既已漂落玉樹卒亦荒蕪道喪人亡時亦已矣遁以不才仰遵太猷追朝陽而暨附桑榆而未升神馳在昔願言再欽遂援筆興古述厥遐思其詞曰太上邈矣有唐統天孔亦因周籧廬三傳明明釋迦實惟帝先應期睿作化融竺乾交養恬和濯粹沖源邁軌世王領宗中玄堂構洪模指秀負靈峻誕崑嶽量裒太清太像罕窺乃圓其明玄音希和文以八聲煌煌慧炬燭我宵征人欽其哲孰識其冥望之霞舉即亦雲津威揚夏烈溫柔晞春比器以形卓機以神卷即煙滅騰亦龍伸鼓舞舟壑靈氣惟新誰與茲作獨運陶鈞三無衷玄八億致遠二部既弘雙翰惟典充以瓌奇恬以易簡藏諸蘊櫝實之令善可善善因乃讚乃演致存言性豈伊弘闡日月貞朗顯晦周遍生如紛霧曖來已晞至人全化迹隨世微假云泥洹言告言歸遺風六合佇方赤畿象罔不存誰與悟機鏡心乘翰庶覿冥暉廣弘明集十六阿彌陀佛像讚并序阿彌陀佛像讚并序夫六合之外非典籍所模神道詭世豈意者所測故曰人之所知不若其所不知每在常輒欲以所不能見而斷所未能了故令井蛙有坎宅之矜馮夷有秋水之伐故其冥矣余遊大方心倦無垠故以靜暇復伸諸奇麗佛經記西方有國國名安養回遼迥邈路踰恆沙非無待者不能遊其疆非不疾者焉能致其速其佛號阿彌陀晉言無量壽國無王制班爵之序以佛為君三乘為教男女各化育於蓮華之中無有胎孕之穢也館宇宮殿悉以七寶皆自然縣搆制非人匠苑囿池沼蔚有奇榮飛沈天逸於淵藪逝寓群獸而率真閶闔無扇於瓊林玉響天諧於簫管冥霄隕華以闔境神風拂故而納新甘露徵化以醴被蕙風導德而芳流聖音應感而雷響慧澤雲垂而沛清學文吸兮而貴言真人冥宗而之廢玩五度馮虛以入無般若遷知而出玄衆妙於茲大啓神化所以永傳別有經記以録其懿云此晉邦五末之世有奉佛正戒諷誦阿彌陀經誓生彼國不替誠心者命終靈逝化往之彼見佛神悟即得道矣遁生末蹤忝廁殘迹馳心神國非所敢望乃因匠人圖立神表仰瞻高儀以質所天詠言不足遂復係以微頌其詞曰王猷外釐神道內綏皇矣正覺實兼宗師泰定軫曜黃中秀姿恬智交泯三達玄夷啓境金方緬路悠回於彼神化悟感應機五度砥操六慧研微空有同狀玄門洞開詠歌濟濟精義順神玄肆洋洋三乘詵詵藏往摹故知來惟新二才孰降朗滯由人造化營域雲構峨峨紫館辰峙華宇星羅玉闈通方金墉啓阿景傾朝日豔蔚晨霞神提回互九源曾深浪無筌忘鱗罕餌淫澤不司虞駭翼懷林有客驅徒雨埋機心甘露敦洽蘭蕙助馨化隨雲濃俗與風清葳蕤消散雲飆掃英瓊森諧響八音文成珉瑤沱粲芙渠晞陽流澄其潔蕊播其香潛爽冥萃載哲來翔孕景中葩結雲幽芳類諸風化妙兼於長邁軌一變同規坐忘廣弘明集十六文殊師利讚童真領玄致靈化實悠長昔為龍種覺今則夢遊方惚恍乘神浪高步維耶鄉擢此希夷質映彼虛間堂觸類興清遘目繫洞兼忘梵釋欽嘉會間邪納流芳彌勒讚大人規玄度弱喪升虛遷師通資自廢釋迦登幽間彌勒承神第聖録載靈篇乘乾因九五龍飛兜率天法鼓震玄宮逸響亮三千晃晃凝素姿結加曜芳蓮寥朗高懷興八音畼自然恬智冥徼妙縹眇詠重玄磐紆七七紀應運蒞中幡挺此四八姿映蔚華林園亹亹玄輪奏三攄在昔緣維摩詰讚維摩體神性陵化昭機庭無可無不可流浪入形名民動則我疾人恬我氣平恬動豈形影形影應機情玄韻乘十哲頡頏傲四英亡期遇濡首亹亹讚死生善思菩薩讚玄和吐清氣挺茲命世童登臺發春詠高興希遐蹤乘虛感靈覺震網發童蒙外見憑寥廓有無自冥同忘高故不下蕭條數仞中因華請無著陵虛散芙容能仁畼玄句即色自然空空有交映迹冥知無照功神期發筌悟豁爾自靈通法作菩薩不二入菩薩讚乃昔有嘉會茲日多神靈維摩發淵響請定不二名玄音將進和法作率所情亹亹玄心運寥寥音氣清粗二標起分妙一寄無生閈首菩薩讚閈首齊吾我造理因兩虛兩虛似得妙同象反人粗何以絶塵迹忘一歸本無空同何所貴所貴在恬愈不眴菩薩讚有愛生四淵淵況世路永未若觀無得德物物自靜何以虛靜間恬智翳神穎絶迹遷靈梯有無無所騁不眴冥玄和栖神不二境善宿菩薩讚體神在忘覺有慮非理盡色來投虛空響朗生應軫託陰遊重冥冥亡影迹隕三界皆勤求善宿獨玄泯善多菩薩讚自大以跨小小者亦駭大所謂大道者遺心形名外都忘絶鄙當冥默自玄會善多體沖姿豁豁高懷泰首立菩薩讚為勞由無勞應感無所思悠然不知樂物通非我持渾形同色欲思也誰及之嘉會言玄志首立必體茲月光童子讚靈童綏神理恬和自交忘弘規愍昏俗統體稱月光心為兩儀蘊迹為流溺梁英姿秀乾竺名播赤縣鄉神化詭俗網玄羅摯遊方丘巖積陳痾長驅幸玉堂汲引興有待冥歸無盡場戢翼栖高嵎淩風振奇芳已上並廣弘明集十六法護像讚護公澄寂道德淵美微令穹谷枯泉漱水邈矣護公天挺弘懿濯足流沙傾拔玄致高僧傳一又法苑珠林七十九引冥祥記于法蘭像讚于氏超世綜體玄旨嘉遁山澤仁感虎兕高僧傳四又法苑珠林七十九引冥祥記于道邃像讚英英上人識通理清朗質玉瑩德音蘭馨高僧傳四座右銘勤之勤之至道非彌奚為淹滯弱喪神奇茫茫三界眇眇長羈煩勞外湊冥心肉馳徇赴欽渴緬邈忘疲人生一世涓若露垂我身非我云云誰施達人懷德知安必危寂寥清舉渥纍禪池謹守明禁雅玩玄規綏心神道抗志無為寥朗三蔽融冶六疵空同五陰虛豁四肢非指喻指絶而莫離妙覺既陳又玄其知宛轉平任與物推移過此以往勿議勿思敦之覺父志在嬰兒高僧傳四天台山銘序天台山銘序往天台當由赤城山為道徑文選天台山賦注神無形論有形便有數數則有盡神既無盡故知無形高僧傳與釋道安書稱竺僧敷敷公研微秀發非吾等所及也高僧傳
