body:
  text: 王彪之廬山賦廬山彭澤之山也雖非五嶽之數穹隆嵯峨實峻極之名山也水經廬江水注水賦寂間居以遠詠託上善以寄言誠有無而大觀鑒希微於清泉泉清恬以夷淡體居有而用玄渾無心以動寂不凝滯于方圓湛幽邃以納污泯虛柔以勝堅或浤浪於無外或纖入於無間故能委輸而作四海決導而流百川承液而生雲雨涌凝而為甘泉初學記六井賦考五材之物化寂冥感而資靜水帶地而壤潤月流天而宵炯燧鑽木而發火益穿坤而構井摹玄羲之靈爻仰東宿之飛景步土脈測水泉方欄結轆轤懸懸沈瓶而玄汲飛纖綆而幽牽於是杳黃壚之邃鮮潤下之潔澄瀾恬以清泠渟泓朗以寥戾協大陰以化液體上善以流惠初學記七三伏焦暑亢陽重授輕飆不弱纖雲不覆初學記四閩中賦林繡白鷴御覽九百二十四木則藤虹籠采於峻藂流星麗光於高林御覽九百五十三果則椑朱柿扶餘枇杷御覽九百七十一于壇侯栗御覽九百六十四又九百七十四竹則苞甜赤箬縹箭班弓度世推節征合實中篔簹函人桃枝育蟲緗箬素筍彤竿緑筒攢岡坻之苯䔿漫原澤之蓊蒙齊民要術十初學記二十八藥草則表珠黃連奉柏決明蓯蓉鹿茸漏蘆松榮痊疴則年永練質則翰生御覽九百八十四賦於是乎統體而詠之文選任昉王文憲集序注引王彪之賦正納皇后禮王者之於四海無非臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始以定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安月臣下之卑而稱天父之名以行大禮遠尋古禮無王者此制近求史籍無王者此比於情不安於義不通案咸寧二年納悼皇后時弘訓太后母臨天下而無命戚屬之臣為武皇父兄主婚之文又考大晉已行之事咸寧故事不稱父兄師友則咸康華恆所上合於舊也臣愚謂今納后儀制宜一依咸康故事晉書禮志下宋書禮志一通典五十八納采版文璽書皇帝咨前太尉參軍都鄉侯何琦混元資始肇經人倫爰及夫婦以奉宗廟天地社稷謀於公卿咸以為宜率由舊典今使使持節崇德衛尉領太常彪之兼宗正散騎侍郎綜以禮納采晉書穆章何后傳又禮志下通典五十八問名版文皇帝曰咨前某官侯何兩儀配合承天統物正位乎內必俟令族重申舊典今使使持節某官彪之某官綜以禮問名晉書禮志下通典五十八納吉版文皇帝曰咨前某官何人謀龜從僉曰貞吉敬順典禮今使使持節某官彪之某官綜以禮納吉晉書禮志下通典五十八納徵版文皇帝曰咨某官某侯何之族女有母儀之德窈窕之姿如山如河宜奉宗廟永奉天祚以玄纁皮帛馬羊錢璧以章典禮今使使持節兼司徒光祿勳關內侯恪崇德衛尉領太常彪之以禮納徵晉書禮志下通典五十八請期版文皇帝曰咨前某官某侯何謀於公卿大筮元龜罔有不臧率遵典禮今使使持節某官彪之某官綜以禮請期晉書禮志下通典五十八迎后版文皇帝曰咨前某官某侯何歲吉月令吉日惟某率由典禮今遣使持節兼太保侍中太宰武陵王晞太尉某以禮迎晉書禮志下通典五十八冊立皇后何氏文維升平元年八月皇帝使使持節兼太保侍中太宰武陵王晞冊命散騎侍郎女何氏為皇后咨爾易階乾坤詩首關雎王化之本實由內輔是故皇英嬪虞帝道以光妊姒母周胤嗣克崇皇后其祗勖厥德以肅承宗廟虔恭中饋盡敬婦道帥導六宮作範儀於四海皇天無親惟德是依可不慎歟通典五十八整市教古人同市朝者豈不以衆之所歸宜必去行物近檢校山陰市多不如法或店肆錯亂或商估沒漏假冒豪彊之名擁護貿易之利凌踐平弱之人專固要害之處屬城承寬亦皆如之初學記二十四上書論皇太子納妃用玉璧虎皮或者虎取威猛有斑彩蔚玉象德而有溫潤圭璋亦玉之美者豹皮彩蔚以譬君子王肅納徵辭云玄纁束帛儷皮雁羊前漢亦無周羊之禮鄭氏婚物贊曰羊者祥也婚之有羊自漢末始通典五十八案鄭衆卒於建初八年而云漢末蓋誤涉康成耳上書論皇后拜訖上禮上禮唯酒犢而已犢十頭酒十二斛王公已下名在三節祥瑞自簡慶賀録者悉賀左傳曰會吳於繒吳徵百牢子服景伯曰周制上物不過十二天之大數也太學博士雖不在賀而常小會者同悉應上禮通典五十九升平元年臺符問皇后拜訖何官應上禮上禮悉何用太常王彪之上書上言開陵皇太后服二學博士荀訥曹耽等議如右臣雖與之同議議各有辭太后臨朝稱制體同皇極則亦宜服緦議有二君之嫌通典一百二奏議陳留王廢疾求立後臣按訥耽二議為許其所陳也各無明文臣以為經史所記未有南面稱孤而以病疾退為庶人者也勵纂封先代近四十年位在朝賓今以疾退既廢之後若同庶人則名賤而役廝處以朝官則職替而班下以舊禮則制重而無位量茲三義莫知其禮宗廟享祭禮有假攝古今依禮行之有由來矣通典七十四奔喪議昔太寧之難奔赴無過三年之限恭皇后不宜踰先制禮為君之母妻居處飲食衎爾君已除喪而後聞喪不稅而責其奔此臣所疑也且宜一依濛所上通典八十婚禮不賀議按婚禮不賀不樂傳稱子罕如晉賀夫人既無明文又傳不云禮也禮娶婦之家三日不舉樂至於不賀無三日之斷通典五十九永和三年納后議賀不王彪之議婚不舉樂議婚禮不樂鼓吹亦樂之總名儀注所以無者為婚禮也臣伏重詳禮云婚禮不作樂幽陰之義樂陽氣也又云娶婦之家三日不舉樂思嗣親也自王者下達迎大駕鹵簿及至尊升太極竝闕此條當是依三日不舉樂之禮愚謂殿庭設大駕鹵簿鼓吹竝可備儀而已通典五十九升平元年八月符問迎皇后大駕應作樂不太常王彪之議魏晉舊制晝夜漏既盡門鳴鼓鳴鐘吉凶鼓鐘常用非樂也舊儀皇帝乘輿列閶闔掖門鳴鼓鐘所以聲告內外耳今自應施鐘若他事會黃門侍郎舉麾舊應作宮懸金石之樂鳴鐘鼓中朝無宮懸設軒懸中興已來無此樂故唯作鼓吹鳴鐘以擬宮懸金石耳婚禮三日不作樂經典明文愚謂宜如舊儀至尊升殿舉麾作樂迎皇后大駕不應鼓吹通典同上蘭臺太常主者按云云彪之又議日食廢朝會議永和中殷浩輔政又欲劉邵議不卻會王彪之議曰禮云諸侯旅見天子不得終禮而廢者四自會卒暴有之非謂先存其事而僥幸史官推術錯謬敨不先廢通典七十八太后為親屬舉哀議若至尊自應舉哀外族於朝堂是也自若不舉哀唯應從太后遠出朝堂未喻其禮謂從舉哀之禮自中朝迄於中興朝廷已粗有常儀至尊為內族於東堂舉哀則三省從臨為外族及大臣於朝堂舉哀則八座丞郎從臨至尊之奉太后即率朝臣之儀又盡家人之禮二三情敬實兼參臣子今不應自舉哀者謂應從太后臨於式乾殿太后位西面東向至尊位北面南向通典八十一褚太后為從弟舉哀尚書王彪之議駮彭城國李太妃諡議由於婦人無爵既從夫爵則已無實爵以從為稱也以從為稱則無諡可知春秋婦人有諡者周末禮壞耳故服虔注聲子之諡非禮也杜氏注惠公仲子亦云非禮婦人無諡泰始以來藩國王妃無有諡者中興敬后登祚乃追諡耳琅邪武王諸葛妃恭王夏侯妃元帝猶抑蒸蒸之至不追諡今彭城太妃不應諡通典一百四省官并職議為政之道以得賢為急非謂雍容廊廟摽的而已固將蒞任贊時職思其憂也得賢之道在於蒞任蒞任之道在於能久久於其道天下化成是以三載考績三考黜陟不收一切之功不採速成之譽故勳格辰極道融四海風流遐邈聲冠百代凡庸之族衆賢能之才寡才寡於世而官多於朝焉得不賢鄙共貫清濁同官官衆則闕多闕多則遷速前後去來更相代補非為故然理固然耳所以職事未修朝風未澄者也職事之修在於省官朝風之澄在於并職官省則選清而得久職并則吏簡而俗靜選清則勝人久於其事事久則中才猶足有成今內外百官較而計之固應有并省者矣六卿之任太常望雅而職重然其所司義高務約宗正所統蓋鮮可以并太常宿衛之重二衛任之其次驍騎左軍各有所領無兵軍校皆應罷廢四軍皆罷則左軍之名不宜獨立宜改游擊以對驍騎內官自侍中以下舊員皆四中興之初二人而已二人對直或有不周愚謂三人於事則無闕也凡餘諸官無綜事實者可令大官隨才住所帖而領之若未能頓廢自可因缺而省之委之以職分責之以有成能否因考績而著清濁隨黜陟而彰雖緝熙之隆康哉之歌未可使庶官之選差清蒞職之日差久無奉祿之虛費簡吏寺之煩役矣晉書王彪之傳案此因桓溫陳便宜七事因上議云云以御覽二百三及桓溫傳互證自明帝加元服議禮雖有喪冠當是應冠之年服制未終若須服終便失應冠之年故也禮所以冠無定時月春夏不可便用秋冬若今歲內修復未畢入新年卜仲春之日加元服不失年不失禮今便準喪冠闕饗樂而行事誠有倚傍然加袞冕火龍煥然以準喪儀情有不體若別有事必速加元服權諸輕重不須修復畢者便當準喪冠耳通典五十六孝武將冠太常王彪之議新年至尊當加元服今若依成帝故事用三元日者冠有金石之樂恐修山陵未必於樂便闕禮冠自卜日又云夏葛履冬皮履無定時不必三元也按晉故事及兩漢皆非三元當任時事之宜耳通典五十六近訪得成皇帝加元服儀注闕無拜廟事按禮冠皆於廟儀禮云既畢賓出主人送於廟門明必在廟近代以來不復在廟成皇帝既加元服拜太廟以告成蓋亦猶擬在廟之儀今既加元服亦應拜廟通典五十六優遇陳留王議禪讓之始王與繼嗣之末孫降殺殊矣是以春秋之會杞不火異列宋不殊位今陳留王朝會自任其來則無繩墨之準既以來朝則應有常次至於大會升殿雖無上位然無殊別之座名同朝録將事有例且朝録蓋是紀官名之簡通典七十四優賻陳留王議山陽公薨故事給絹二百匹山陽於今稍遠今可特給絹布二百匹錢三十萬宜少優於山陽通典七十四諱議凡訓體憲章經典無文者則當準已行之舊令議者所從是右丞議也按右丞議云門縣改名既頒天下則朝臣不得不諱意以為門縣名以犯先帝所生之諱故先帝時改之與明穆皇后臨朝除光祿勳字義體同爾竝皆頒下著令知官名之改非頒下令人皆諱之也謂尚書奏事詣先帝令上書為諱耳太后及朝臣竝應諱之義今者奏事詣太后何諱之有而乃稱太后制書遠推之乎議又諭以父之所諱竊以父子天性君臣異族君之所諱何必盡同元明哀三帝之朝無以所生之諱頒行天下今人皆同諱則臣不同子之一隅也明臣之所諱君之母妻諱者諱小君之諱耳且四海之人皆小君之臣妾非生之臣妾也以小君之諱列於諱榜故天下同諱所生之諱不列諱榜故天下不同諱於時主相賢明朝多雋彥今所應準而議云非今所議竊所未達又云母以子貴三帝之母不以子貴邪議又云章皇太妃之喻殆非今嫌既不解哀帝所生何以獨非今嫌又今上即位所生李淑妃諱何以不頒下天下與簡文皇帝順皇后諱率土同諱之乎中興有八帝迄今上五帝有所生豈可四帝所生普天下不諱而簡文帝所生獨率土同諱乎謂王尚書傅郎議為允通典一百四太后父喪廢樂議今若鐘懸鼓吹皆可以作者其餘羽毛絲竹奚為廢之竊所未喻元皇后秋崩武帝咸寧元年饗萬國設樂恭皇后夏崩成帝咸康八年饗萬國不盡徹樂未詳二帝故事孰得孰失且恭皇后崩垂向周月朝行權制六宮煥然故以即吉經時雖尊於萬國然於帝為卑不盡徹樂之詔或指在於斯也縱令咸康末不盡徹樂以為合禮亦非所以證今明喻也禮云母有喪聲聞焉則不舉樂夫人之事親尊自王者達於庶人不以貴賤異禮也皇太后始居至哀縗服在躬號哭無時鼓鐘歌簫之音實聞於內殿非禮所謂不舉樂之說今所欲存者輕所為廢者重略輕崇重附禮合情敦於禮訓於是乎在意如前議謂應設鼓懸鐘而不作通典一百四十七喪不數閏啓或以閏附七月宜用閏月除者或以閏名雖附七月而實以三旬別為一月故應以七月除者臣等與中軍將軍沖參詳一代大禮宜準經典三年之喪十三月而練二十五月而畢禮之明文也陽秋之義閏在年內則略而不數明閏在年外則不應取之以越朞忌之重禮制祥除必正朞月故也晉書禮志中寧康二年七月簡文帝崩再周而遇閏王彪之啓答臺符問小功服成婚二王出後二國禮為人後隆本親一等又云為姑姊妹適人者小功二王應制小功之服禮小功絶哭可以娶妻下殤之小功則不可先儒之說本齊衰之親故除喪而後可婚今二王雖以出後降服本亦齊衰之親情例如禮不應成婚通典六十東晉臺符廬陵公主薨琅邪東海二王於禮為應得婚與否太常王彪之云云答撫軍訪郊祀有赦中興以來郊祀往往有赦愚意常謂非宜何者黎庶不達其意將謂郊祀必赦至此時凶愚之輩復生心於僥幸矣晉書王彪之傳時當南郊簡文帝為撫軍執政訪彪之應有赦不答云云從之上箋陳雷弱兒事弱兒等容有詐僞浩未應輕進晉書王彪之傳與會稽王箋王濛女有同生之衰計其日月尚未絶器豈可成婚凡在君子猶愛人以禮況崇化之主邪以此為聖朝故事寧可執訓當今宣流後裔忝備禮官情有不安謹具白所懷通典六十王者君臨萬國以禮義聲教也今若皇子獨違規矩恐遐邇之譏必不許也且自元康以來朝臣之家犯禮婚者不見重責故尚書僕射裴頠當代名士於時以兄弟子喪末為息拜時其息服除也議者謂父子竝應貶責兄弟子下流之喪不同於姑古者諸侯絶周而卿大夫之喪在殯猶不舉樂不以本周喪未葬行嘉禮也況廬陵長公主於禮法不應絶服況喪未葬乎通典六十答會稽王書女有大功服若初婚者禮例無許既已拜時猶復不同昔中朝許侍中等曾議此事以為拜時不應以喪為疑倚傍經禮甚有理據談者多謂是殿下可視而量之通典五十九會稽王道子與王彪之書彪之答云云與揚州刺史殷浩書太史上元日合朔談者或有疑應卻會與不昔建元元年亦元日合朔庾車騎寫劉孔才所論以示八座於時朝議有謂孔才所論為不得禮議荀令從之是勝人之一失也何者禮云諸侯旅見天子入門不得終禮而廢者四太廟火日蝕后之喪雨霑服失容尋此四事之指自謂諸侯雖已入門而卒暴有之則不得終禮非為先存其事而徼幸史官推術錯謬故不豫廢朝禮也夫三辰有災莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶豈朕是將虔天災罪已之謂且檢之事實合朔之儀至尊靜躬殿堂不聽攻事冕服御坐門闥之制與元會禮異自不得兼行則當權其事宜合朔之禮不輕於元會元會有可卻之禮唯合朔無可廢之義謂應依建元故事卻元會魏志劉劭傳注又御覽二十九引晉起居注答孔嚴論蔡謨諡書按諡法布德執義曰穆謂此名目殊為不輕太始初張皇后大寧庾太后竝諡曰穆魏司空陳泰王昶賀循皆名士也竝諡曰穆此與蔡公名體相應中朝復諡亦不勝單安平獻王孚齊獻王攸竝單諡自頃復諡者非大晉舊典必重復諡也蓋是近來儒官相承近意耳皆顧命重勳或居分陝或處阿衡蔡公存謙素之懷不當此任於今詠之所以不復諡欲令異於數公所以標沖虛述德美也又中朝及中興曾居師傅及録臺事者亦皆不復諡山李二司徒吾族父安豐侯近賀司空荀太尉覬周光祿顗或曾師傅或曾總録竝不復諡吾謂此諡弘美不應翻改按諡法條有限而應諡者無限亦何得令名德必皆齊同遠準周之文武則後代不應復得通用此名近挍晉朝舊比山濤荀覬周顗諡康羊祜荀勖同諡成此例甚衆不可悉載近朱伯高諡簡時尚書符卻已不應與和嶠同諡蔡為太常據上論可同理甚有義遂便施行蔡家固當有比故事準例如此復無所為疑通典一百四二疏畫詩序余自求致仕政事纍詔不聽因扇上有畫二疏事作詩一首以述其美書鈔一百三十四御覽七百五十伏犧讚悠悠皇犧體寂神澄無為而化世道之凝下知有之冥感自興因應之跡畫象結繩初學記九議郊祀不得三公行事既殯郊祀自是天子當陽有君存焉稟命而行何所辨也齊之興否豈如今日之比乎議者又云今宜郊故是承制所得命三公行事又郊天極尊唯一而已故非天子不祀也庶人以上莫不蒸嘗嫡子居外庶子執事禮文炳然未有不親受命而可祭天者又武皇受禪用二月郊元帝中興以三月郊今郊時未過日望輿駕無為欲速無據使皇輿旋返更不得親奉宋書禮志三安帝元興三年宋高祖討桓玄走之已卯告義功於南郊是年帝蒙塵江陵未返其明年應郊朝議以為依周禮宗伯攝職三公行事尚書左丞王納之獨云云又見通典四十三與東海王越書裴郃在此雖不治事然識量弘淹此下人士大敬附之魏志裴潛傳注與揚州論討陳敏計賊今下屯固橫江御覽三百三十七復據烏江皆塹壘彭排鹿角步安嚴峻以襲歷陽諸軍御覽三百三十七書寒佳不張丞婚事云何是良對足下可時合知女決也王邃白淳化閣帖三
