body:
  text: 卷九十六陸機浮雲賦有輕虛之艷象無實體之真形原厥本初浮沉混并六律籥應八風時邁玄陰觸石甘澤雱霈勢不崇朝露彼無外若層臺高觀重樓疊閣或如鐘首之鬱律乍似塞門之寥廓若靈園之列樹攢寶耀之炳粲金柯分玉葉散緑翹明巖英煥龍逸蛟起熊厲虎戰鸞翔鳳翥鴻驚鶴奮鯨鯢泝波鮫鰐衝遁若秬鬯揚芒嘉穀垂頴朱絲亂紀羅袿失領飛仙凌虛隨風遊聘有若芙蓉群披蕣華總會車渠繞理瑪瑙縟文龜甲錯黿龍鱗集輕浮之衆采廁五色之藻氣貫元虛於太素薄紫微而竦戾太平御覽卷一又見北堂書鈔卷一百五十白雲賦攄神景於八幽合洪化乎烟熅充宇宙以播象協元氣而齊勳發憤靈石擢性洪流興曜曾泉升跡融丘盈八紘以餘憤雖彌天其未泄豈假期於遷晷邁崇朝而倏忽紅蕊發而菡萏金翹援而合葩神收鬼化弼性違序鳥殊類而比栖獸異跡而同處蛟引翳而並潛龍攀鴻而雙舉鸞舞角以軒罷鷙企翮而延佇長城曲蜿采閣相扶聳瑤臺之巀嶭構瓊闥之離婁雄虹矯而垂天翠鳥軒而扶日感時賦悲夫冬之為氣亦何憯懍以蕭索天悠悠其彌高霧鬱鬱而四幕夜綿邈其難終日晼晚而易落敷層雲之葳蕤墜零雪之揮霍冰冽冽而寢興風漫漫而妄作鳴枯條之泠泠飛落葉之漠漠山崆巃以含瘁川蜲蛇而抱涸望八極以曭漭普宇宙而寥廓伊天時之方慘曷萬物之能歡魚微微而求偶獸嶽嶽而相攢猿長嘯於林杪鳥高鳴於雲端矧余情之含瘁恆睹物而增酸歷四時之迭感悲此歲之已寒撫傷懷以嗚咽望永路而汍瀾結濃霜于露室凝行雨于雲根北堂書鈔一百五十二祖德賦咨時文之懿祖膺降神之靈曜栖九德以弘道振風烈以增劭彼劉公之矯矯固雲網之逸禽既憑形以傲物諒傅翼而栖林伊我公之秀武思無幽而弗昶形鮮烈於懷霜澤溫惠乎挾纊收希世之洪捷固山谷而為量西夏坦其無塵帝命赫而大壯登具瞻於太階濯長纓乎天漢解戎衣以高揖正端冕而大觀戢靈武於既曜恢時文於未煥騰絶風以逸鶩庶遐蹤於公旦藝文類聚卷二十走雄孫於長浪收希世之洪捷因山谷而為量西夏坦其無塵帝命赫而大壯北堂書鈔卷一百十九思親賦悲桑梓之悠曠愧蒸嘗之弗營指南雲以寄款望歸風而效誠年歲俄其聿暮明星爛而將清回飆肅以長赴零雪紛其下穨羡纖枝之在幹悼落葉之去枝存顧復之遺志感明發之所懷居辭安而厭苦養引約而摧豐忘天命之晚暮願鞠子之速融兄瓊芳而蕙茂弟蘭發而玉暉感瑰姿之晚就痛慈景之先違天步悠長人道短矣異途同歸無早晚矣述先賦仰先后之顯烈懿暉祚之允輯應遠期於已曠昭前光於未戢抱朗節以遐慕振奇迹而峻立在虐臣之貪禍據西山而作違招長轂於河畔飲冀馬乎江湄頓雲網而潛泳揮神戈而外臨敵罔隆而弗夷逆無微而不禽茂德韡其既休元勳曄而薦舉襲袞服於太階配三台乎其所是故其生也榮雖萬物咸被其仁其亡也哀雖天網猶失其綱嬰國命以逝止亮身沒而吳亡藝文類聚卷二十豪士賦并序豪士賦并序夫立德之基有常而建功之路不一何則循心以為量者存乎我因物以成務者繫乎彼存夫我者隆殺止乎其域繫乎物者豐約唯所遭遇落葉俟微飆以隕而風之力蓋寡孟嘗遭雍門以泣而琴之感以末何者欲隕之葉無所假烈風將墜之泣不足繁哀響也是故苟時啓於天理盡於民庸夫可以濟聖賢之功斗筲可以定烈士之業故曰才不半古而功已倍之蓋得之於時勢也歷觀古今徼一時之功而居伊周之位者有矣夫我之自我智士猶嬰其纍物之相物昆蟲皆有此情夫以自我之量而挾非常之勳神器暉其顧盻萬物隨其俯仰心玩居常之安耳飽從諛之說豈識乎功在身外任出才表者哉且好榮惡辱有生之所大期忌盈害上鬼神猶且不免人主操其常柄天下服其大節故曰天可讎乎而時有袨服荷戟立乎廟門之下援旗誓衆奮於阡陌之上況乎代主制命自下裁物者哉廣樹恩不足以敵怨勤興利不足以補害故曰代大匠斫者必傷其手且夫政由寧氏忠臣所為慷慨祭則寡人人主所不久堪是以君奭鞅鞅不悅公旦之舉高平師師側目博陸之勢而成王不遣嫌吝於懷宣帝若負芒刺於背非其然者歟嗟乎光于四表德莫富焉王曰叔父親莫昵焉登帝天位功莫厚焉守節沒齒忠莫至焉而傾側顛沛僅而自全則伊生抱明允以嬰戮文子懷忠敬而齒劍固其所也因斯以言夫以篤聖穆親如彼之懿大德至忠如此之盛尚不能取信於人主之懷止謗於衆多之口過此以往惡睹其可安危之理斷可識矣又況乎叨大名以冒道家之忌運短才而易聖哲所難者哉身危由於勢過而不知去勢以求安禍積起於寵盛而不知辭寵以招福見百姓之謀己則申宮警守以崇不畜之威懼萬民之不服則嚴刑峻制以賈傷心之怨然後威窮乎震主而怨行乎上下衆心日陊危機將發而方偃仰瞪眄謂足以夸世笑古人之未工忘己事之已拙知曩勳之可矜暗成敗之有會是以事窮運盡必於顛仆風起塵合而禍至常酷也聖人忌功名之過己惡寵祿之踰量蓋為此也夫惡欲之大端賢愚所共有而遊子徇高位於生前志士思垂名於身後受生之分唯此而已夫蓋世之業名莫大焉震主之勢位莫盛焉率意無違欲莫順焉借使伊人頗覽天道知盡不可益盈難久持超然自引高揖而退則巍巍之盛仰邈前賢洋洋之風俯冠來籍而大欲不乏於身至樂無愆乎舊節彌效而德彌廣身愈逸而名愈劭此之不為彼之必昧然後河海之跡堙為窮流一簣之釁積成山嶽名編凶頑之條身厭荼毒之痛豈不謬哉故聊賦焉庶使百世少有寤云世有豪士兮遭國顛沛攝窮運之歸期當衆通之所會苟時至而理盡譬摧枯而振敗因天地以運動恆才瑣而功大於是禮極上典服盡暉崇儀北辰以葺宇實蘭室而桂宮撫玉衡而樞極運萬物乎掌中伊天道之剛健猶時至而必保日罔中而弗昃月何盈而不闕襲覆車之危軌笑前乘之未完若知險而退止趨歸蕃而自戢推璇璣以長謝顧萬物而高揖訖浮雲以邁志豈咎𠫤之能集擠為山以自隕歎禍至於何及遂志賦并序遂志賦并序昔崔篆作詩以明道述志而馮衍又作顯志賦班固作幽通賦皆相依倣焉張衡思玄蔡雍玄表張叔哀系此前世之可得言者也崔氏簡而有情顯志壯而泛濫哀系俗而時靡玄表雅而微素思玄精練而和惠欲麗前人而優游清典漏幽通矣班生彬彬切而不絞哀而不怨矣崔蔡沖虛溫敏雅人之屬也衍抑揚頓挫怨之徒也豈亦窮達異事而聲為情變乎余備托作者之末聊復用心焉武定鼎於洛汭胡受瑞於汝墳繇鳴鳳於百祀啓敬仲乎方震苟天光之所照豈舜族之必陳厭禋祀於故墟饗禴祭於東鄰禰八葉而松茂舞九韶乎降神系姜叟於海曲表滄流以遠震仰前蹤之綿邈豈孤人之能胄匪世祿之敢懷傷茲堂之不搆理或睽而後合道有夷而弗順傅栖巖而神交伊荷鼎以自進蕭綢繆於豐沛故攀龍而先躍陳頓委於楚魏亦凌霄以自濯伍被刑而伏劍魏和戎而擁樂彼殊塗而並致此同川而偏溺禍無景而易逢福有時而難學惟萬物之運動雖紛糾而相襲隨性類以曲成故圓行而方立要信心而委命援前修以自程擬遺跡於成軌詠新曲於故聲任窮達以逝止亦進仕而退耕庶斯言之不渝抱耿介以成名扶興王以成命延衰期乎天祿文選卷二一謝宣遠張子房詩注懷土賦并序懷土賦并序余去家漸久懷土彌篤方思之殷何物不感曲街委巷罔不興詠水泉草木咸足悲焉故述斯賦背故都之沃衍適新邑之丘墟遵黃川以葺宇被蒼林而卜居悼孤生之已晏恨親沒之何速排虛房而永念想遺塵其如玉眇綿邈而莫覯徒佇立其焉屬感亡景於存沒惋隤年於拱木悲顧盻而有餘思俯仰而自足留茲情於江介寄瘁貌於河曲玩通川以悠想撫征轡而躑躅伊命駕之徒勤慘歸途之良難愍栖鳥於南枝吊離禽於別山念庭樹以悟懷憶路草而解顏甘堇荼於飴茈緯蕭艾其如蘭神何寢而不夢形何興而不言行思賦背洛浦之遙遙浮黃川之裔裔遵河曲以悠遠觀通流之所會啓石門而東縈沿汴渠其如帶託飄風之習習冒沉雲之藹藹商秋肅其發節玄雲霈而垂陰涼風淒其薄體零雨鬱而下淫覩川禽之遵渚看山鳥之歸林揮清波以濯羽藏緑葉而弄音行彌久而情勞途愈近而思深羡品物以獨感悲綢繆而在心嗟逝官之未久年荏苒而歷茲越河山而託景眇四載而遠期孰歸寧之弗樂獨抱感而弗怡乘丁水之捷岸排泗川之積沙行魏陽之枉渚水經注卷二十五泗水思歸賦并序思歸賦并序余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征職典中兵與聞軍政懼兵革未息宿願有違懷歸之思憤而成篇節運代序四時相推寒風肅殺白露霑衣嗟行邁之彌留感時逝而懷悲彼離思之在人恆戚戚而無歡悲緣情以自誘憂觸物而生端晝輟食而發憤宵假寐而興言羡歸鴻以矯首挹谷風而如蘭歲靡靡而薄暮心悠悠而增楚風霏霏而入室響泠泠而愁豫既遨遊乎川沚亦改駕乎山林伊我思之沉鬱愴感物而增深歎隨風而上逝涕承纓而下尋冀王事之暇豫庶歸寧之有時候涼風而警策指孟冬而為期願靈暉之促景恆立表以望之絶音塵於江介託影響乎洛湄文選卷十三謝莊月賦注別賦伊公子之可懷悲永別之局期悼同居之無樂曾不踰乎一朞經春秋之寒暑常戚戚而不怡登九層而修觀超臨遠以相思藝文類聚卷三十歎逝賦并序歎逝賦并序昔每聞長老追計平生同時親故或雕落已盡或僅有存者余年方四十而懿親戚屬亡多存寡昵交密友亦不半在或所曾共遊一塗同宴一室十年之內索然已盡以是思哀哀可知矣乃為賦曰伊天地之運流紛升降而相襲日望空以駿驅節循虛而警立嗟人生之短期孰長年之能執時飄忽其不再老晼晚其將及懟瓊蕊之無徵恨朝霞之難挹望湯谷以企豫惜此景之屢戢悲夫川閲水以成川水滔滔而日度世閲人而為世人冉冉而行暮人何世而弗新世何人之能故野每春其必華草無朝而遺露經終古而常然率品物其如素譬日及之在條恆雖盡而不寤雖不寤而可悲心惆焉而自傷亮造化之若茲吾安取夫久長痛靈根之夙殞怨具爾之多喪悼堂搆之頽瘁愍城闕之丘荒親彌懿其已逝交何戚而不亡咨余命之方殆何視天之茫茫傷懷悽其多念戚貌瘁而鮮歡幽情發而成緒滯思叩而興端慘此世之無樂詠在昔而為言居充堂而衍宇行連駕而比軒彌年時其詎幾夫何往而不殘或冥邈而既盡或寥廓而僅半信松茂而柏悅嗟芝焚而蕙歎苟性命之弗殊豈同波而異瀾瞻前軌之既覆知此路之良難啓四體之深悼懼茲形之將然毒娛情之寡方怨感目之多顏諒多顏之感目神何適而獲怡尋平生於響像覽前物而懷之步寒林以悽惻玩春翹而有思觸萬類以生悲歎同節而異時年彌往而念廣塗薄暮而意迮親落落而日稀友靡靡而愈索顧舊要於遺存得十一於千百樂隤心其如忘哀緣情而來宅託末契於後生余將老而為客然後弭節安懷妙思天造精浮神淪忽在世表寤大暮之同寐何矜晚以怨早指彼日之方除豈茲情之足攪感秋華於衰木瘁零露於豐草在殷憂而弗違夫何云乎識道將頤天地之大德遺聖人之洪寶解心纍於末迹聊優游以娛老愍思賦并序愍思賦并序豫屢抱孔懷之痛而奄復喪同生姊銜恤哀傷一載之間而喪制便過故作此賦以紓慘惻之感時方至其倏忽歲既去其晼晚樂來日之有繼傷頽年之莫纂覽萬物以澄念怨伯姊之已遠尋遺塵之思長瞻日月之何短升降乎階際顧盻兮屏營雲承宇兮藹藹風入室兮泠泠僕從為我悲孤鳥為我鳴大暮賦并序大暮賦并序夫死生是得失之大者故樂莫甚焉哀莫深焉使死而有知乎安知其不如生如遂無知耶又何生之足戀故極言其哀而終之以達庶以開夫近俗云夫何天地之遼闊而人生之不可久長日引月而並隕時維歲而俱喪諒歲月之揮霍豈人生之可量知自壯而得老體自老而得亡顧黃墟之杳杳悲泉路之翳翳挫千乘猶一毫當何數乎智慧徒假願於須臾指夕景而為誓忽呼吸而不振奄神徂而形斃顧萬物而遺恨收百慮而長逝撫崇塗而難親停危軌之將遊雖萬乘與洪聖赴此塗而俱稅於是六親雲起姻族如林爭塗淹淚望門舉音敷幄席以悠想陳備物而虞靈仰寥廓而無見俯寂寞而無聲肴饛饛其不毀酒湛湛而每盈屯送客於山足伏珽道而哭之扃幽戶以大畢訴玄闕而長辭歸無塗兮往不反年彌去兮逝彌遠彌遠兮日隔無塗兮曷因庭樹兮葉落暮草兮根陳松柏兮鬱鬱飛鳥兮翩翩播芳塵之馥馥文選卷三十謝朓和王著作八公山詩注觀細木而悶遲覩洪櫝而念槥三國志卷二注引又見太平御覽卷五五一幽人賦世有幽人漁釣乎玄渚彈雲冕以辭世披霄褐而延佇是以物外莫得窺其奧舉世不足揚其波徑秋不能雕其葉芳春不能發其華超塵冥以絶緒豈世網之能加應嘉賦并序應嘉賦并序友人有作嘉遁賦與余者作賦應之號曰應嘉云傲世公子體逸懷遐意邈澄霄神夷靜波仰群軌以遙企頓駿羽以婆娑寄沖氣於大象解心纍於世羅襲三閭之奇服詠南榮之清歌濯下泉於浚澗泝凱風於卷阿指千秋以厲響俟寂寞之來和懷前修之倣佛覿幽人乎所過抱玄景以獨寐含清風而寤語發蘭音以清唱摻玉懷而喻豫於是葺宇中陵築室河曲軌絶千途而門瞻百族假妙道以達觀考賁龜而貞卜苟形骸之可忘豈投簪其必谷方介丘於尺阜託雲林乎一木佇鳴條以招風聆哀音其如玉窮覽物以盡齒將弭迹於餘足感丘賦泛輕舟於西川背京室而電飛遵伊洛之坻渚沿黃河之曲湄覩墟墓於山梁託崇山以自綏見兆域之藹藹羅魁封之纍纍於是徘徊洛涯弭節河干佇盻留心慨爾遺歎仰終古以遠念窮萬緒乎其端伊人生之寄世猶水草乎山河應甄陶以歲改順通川而日過爾乃申舟人以遂往橫大川而有悲傷年命之倏忽怨天步之不幾雖履信而思順曾何足以保茲普天壤其弗免寧吾人之所辭願靈根之晚墜指歲暮而為期生矜跡於當世死同宅乎一邱翳形骸以下淪兮漂營魂而上浮隨陰陽以融冶託山原以為疇妍媸混而為一孰云識其所修必妙代以遠覽兮夫何徇乎區陳初學記卷十四
