body:
  text: 苻朗外苻子太公涓釣于隱溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣焉太公涓洈石隱崖不餌而釣仰詠俛唫及暮而釋芉其䣛所處之崖怕若曰其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣邪念蓬萊釣巨海摧竿投綸五百年矣未嘗得一魚方吾猶一朝耳御覽八百三十四又九百三十五家策苻朗棄千釣之劍抱朴子趨而進目夫千金利劍剖割之所存焉苻子之書大道之所居焉何夫子棄大而存小乎苻朗不應書鈔一百一又一百二十二御覽三百四十四巳干篇名闕黃帝將適昆虞之丘中路逢容成子乘翠華之蓋建日月之旗驂紫虯御雙烏黃帝命方明避路謂容成子曰吾將釣于一壑栖于一丘御覽七十九黃帝謂其友無為子曰我勞天下矣疲于形役請息駕于玄圃子宜代之無為子曰焉能棄我之逸而為君之勞哉乃攀龍而俱去御覽七十九堯以天下讓巢父巢父曰君之牧天下亦猶予之牧孤犢君牧天下是各有其所牧矣君焉用惴惴然以所牧而與之余無用天下為也于是牽犢而去蓺文類聚九十四許由謂堯曰坐于華殿之上面隻闕之下君之榮己願亦已足矣夫堯曰余坐于華殿之舡森然而松生于棟余立于櫺扉之內霏焉而雲生于牖雖面雙闕無異乎崔嵬之冠冠蓬萊雖背墉郭無異乎迴巒之縈崑崙余安知其所以榮御覽八十又略見書鈔十二虞帝遜禹于洞庭張樂成于洞庭之野于是望韶石而九奏路史發揮五禹讓天下于奇子奇日子曰君之佐舜勞庂鑿山川通河漢首無髮股無毛故舜也以勞報子我扛而逸不能為君之勞矣蓺文類聚十一御覽八十二又四百二十四務光自投于河盧奴之伯以赤鯉送之御覽九百三十六太伯將讓其國于季歷謂其傅曰太王欲以一國之事而以嗣我我其羞之吾聞至人也不君一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉蓺文類聚二十一御覽四百二十四武王以天下讓岐封子岐封子曰敦勿勿然以天下為事君往矣余不忍聞之御覽四百二十四漢王聞宋勝子方牧羊于巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命于先生而委國政焉宋勝子矍然而顧謂使者曰是何言與今漢王待四海之士與十群之羊其于職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也乃逃于陰山之陽御覽八百三十三志存四海之外書鈔十二堯舜之智桀紂以為不智堯舜以為智惡知堯舜之非桀紂桀紂之非堯舜乎蓺文類聚二十一朔人有獻燕昭王以大豕者曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣邦人謂之豕仙王乃命豕宰養六十五年大如沙墳足如不勝其骿王異之令衡官橋而量之折十橋豕不量又命水官舟而量之其重千鈞其群臣言于王曰是豕無用燕相謂王曰奚不饗之王乃命宰夫即膳之豕既死乃夕見夢于燕相曰造化勞我以豕形食我以人穢吾患其生久矣今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以稉糧之珍而欣君之惠將報子焉後燕相涉于魯津有赤龜奉璧而獻之蓺文類聚二十六又九十六初學記二十九白孔六帖九十八御覽九百三又九百三十一心能善知人者如明鏡善自知者如蚌鏡鏡以曜明故鑒人蚌以含珠故內照蓺文類聚七十御覽七百十七齊景公好馬命善畫者圖而訪之殫百乘之價期年而不得像過實也今使愛賢之君攷古籍以求其人雖期百年亦不可得也蓺文類聚九十三御覽八百九十七苻子觀于龍門有一魚奮鱗鼓鬐而登乎龍門而為龍又一術士淩波泝流而不陷挂鈴行歌飄浪于龍門而終日棲遲而不化苻子曰彼同功而事異迹一而理二夫何哉無乃魚以實應而人以偽求乎蓺文類聚九十六東海有鼇焉冠蓬萊而浮游于滄海騰躍而上則千雲之峰邁類于群岳沈沒而下則隱天之丘潛嶠于重泉有紅蟻者聞而悅之與群蟻相邀乎海畔欲觀鼇之行焉月餘日鼇潛未出群蟻將反遇長風激浪崇濤萬仞海中沸地雷震群蟻曰此將鼇之作也數日風止雷默海中隱淪如𡵒其高概天或遊而西群蟻曰彼之冠山何異我之戴笠也消搖乎壤封之巔歸伏乎窟穴之下此乃物我之失自己而然何用數百里勞形而觀之乎蓺文類聚九十七御覽九百四十七晉公子重耳奔齊與五臣游乎大澤之中見蜘蛛布其網曳其繩而執豸以食之公子重耳乃撫僕之手駐駟而觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智布其網曳其繩而執豸以食之況乎人之有智而不能廓垂天之網布絡地之蠅以供方丈之御是曾不如蜘蛛之智孰不可謂之人乎咎犯曰公子慎勿言也若終行之則有邦有嗣也蓺文類聚九十七御覽九百四十八不安其昧而樂其明也是猶飛蛾去暗赴燈而死者也蓺文類聚九十七御覽八百七十又九百五十一楚之文子魯之周子齊之狂子三子相與居乎泰山之陽處乎環堵之室蓽不扇蓋茨不翳而高歌不輟宋本初學記十八御覽四百八十五至人之道也如鏡有明有照有引有致初學記二十五白孔六帖十三有驢仙者享年五百歲負乘而不輟歷無定主大驛于天下初學記二十九白孔六帖九十七御覽九百一老氏之師名釋迦文佛法苑珠林六十九盛魄重輪六合俱照非日月能乎御覽三水生于石未有居山而溺者火生于木未有抱樹而燋者御覽五十一又九百五十二桀觀炮烙于瑤臺謂闕龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉龍逢曰天下苦之而君為樂臣為君股肱孰有心悅而股肱不悅乎桀曰聽子諫諫得我改之諫不得我刑之龍逢曰臣嘗觀君之冕非其冕也而冕危石君之履非其履也而履春冰未有冠危石而不壓蹈春冰而不陷者也桀乃笑而應之曰是日亡則與俱亡子知我之亡而不自知亡乎子且就炮烙之刑我觀子亡子不知我亡龍逢布武而趨行歌曰造化勞我以生息我以炮烙去故涉新我樂而人不知乃赴火而死御覽八十二又二百八四百七十五六百四十七六百八十六魯侯欲以孔子為司徒將召三桓而議之乃謂左丘明曰寡人欲以孔子為司徒而授以魯政焉寡人將欲詢諸三子左丘明曰孔丘聖人與夫聖人任政過在離位焉君雖欲謀其將弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞為千金之裘而與孤謀其皮欲具少牢之珍而與羊謀其羞言未率孤相率逃于重丘之下羊相呼藏于深林之中故周人十年不制一裘五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓議之亦與狐謀裘與羊謀羞哉于是魯侯遂不與三桓謀而丘為司徒御覽二百八又六百九十四秦穆公伐晉及河將勞師而醪惟飲一鍾蹇叔曰一醪可投河而飲也穆公乃以一醪投河三軍醉矣御覽二百八十一為道者損而月章為名者日章而月損御覽四百三玄冥子謂由有子曰子有師乎由有子曰吾將以萬物為師矣御覽四百四春秋華林傳曰不知不言其所以仁御覽四百十九惠子家窮餓數日不舉火乃見梁王王曰夏麥方孰請割以與子可乎惠子曰施來方遇群川之水長有一人溺流而下呼施救之施應曰吾不善游方將為子告急于東越之王𥳑其善游者以救子可乎溺人曰我得瓢之力則活矣子方告急于東越之王簡其善游者以救我是不如求我于重淵之下魚龍之腹矣御覽四百八十六鄭人有逃暑于孤林之下者日流影移而徙衽以從陰及至暮反席于樹下及月流影移復徙衽以從陰而患露之濡于身其陰逾去而其身逾溼是巧于用晝而拙于用夕奚不處曜而辭陰反林自露此亦愚之至也御覽四百九十九陶朱富者朱公喪其中子鄰人往弔之朱公方擁膝蹲踞奉頭而笑鄰人曰聞有喪將唁子致哀朱公曰生不致哀死唁何鄰人之不通御覽五百六十一有澤父者冠葭蘆之笠納口鹿之履莎裳褐衣緩步而去書鈔一百二十九御覽六百九十三晉之相者桓氏世傳于楚善以道假乎射焉常以其所不射而射之患晝之不足以卒歲故以夜而燭之御覽七百四十五夏王使羿射于方尺之皮徑寸之的乃命羿曰子射之中則賞子以萬金之費不中則削子以千邑之地羿容無定色氣戰于胸中乃援弓而射之不中更射之又不中夏王謂傅彌仁曰斯羿也發無不中而與之賞罰則不中的者何也傅彌仁曰若羿也喜懼為之災萬金為之患矣人能遺其喜懼去其萬金則天下之人皆不愧于羿矣夏王曰口人聞子之言始得無欲之道御覽七百四十五荊山不貴玉鮫人不貴珠御覽八百五天雖廓矣野人猶有罩翳之勤御覽八百三十四顏子有疾三日不食人問之曰吾師食非丹不食茹非芝不茹故七百歲子何不吮瑤以延生咀蕊以養齡也御覽八百四十九吾與玄朱觀東海釋四馬乎𡺁山玄朱中路而亡馬苻子使人求之不獲使鬼索之而獲御覽八百九十七六合不可妄知故良馬在其中矣請以六合之觀觀之也御覽八百九十七魏文侯見宋陵子三仕不富文侯曰何貧宋陵子曰臣見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣鄰者與之從此觀之焉知富者非貧貧者非富也御覽九百二齊景公謂晏子曰寡人既得寶千乘聚萬駟矣方欲珍懸黎會金玉其得之邪奚若晏嬰曰臣聞琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肺不食非鳳血不飲其食也常飢而不飽其飲也常渴而弗充生未幾何夭其天年而死金玉之珍乃非為君之患也御覽九百二十七齊魯爭汶陽之田魯侯有憂色魯有隱者周豐往觀焉曰臣嘗晝寢愀然聞群蝨之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨爭之日夜不息相殺者大半蝨父止之曰我與爾所慮不過容口奚用竊爭交戰為哉群蝨止今君以七百里地為之君臣亦以為足矣而以汶陽數步之田惑君之心曾不如一蝨之智竊為君羞之魯侯曰善御覽九百五十一木生蠋蠋盛而木枯石生金金𧢢而石流御覽九百五十二苻子登乎太山下臨千仞之淵上蔭百尺之松蕭蕭然神王乎一丘矣言不出乎耒㭒心不過乎俗人其猶木大守脂瓦雞司晨矣御覽九百五十三又書鈔一百三十五脂篇引末二語趙之相者曰林氏有九子皆賢國人美而稱之號曰九德之父十德之門趙王疾之乃使擇其果之繁者伐之其父曰果之茂者猶伐之況其人乎吾將以爾為累矣去之則免乃攜老持子逃于白雲之巖終身不返趙人思之御覽九百六十四鄰人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯御覽九百九十四渭原誓王景略受國厚恩任兼內外今與諸軍深入賊地宜各勉進不可退也願戮力行閒以報恩顧受明爵明君之朝慶觴父母之室不亦美乎晉書載紀苻堅傳上又十六國春秋三十六與此小異上疏讓輔國將軍伏見散騎常寺陽平公融明德懿親光祿散騎西河任群忠貞淑慎處士京兆朱彤博識聽辨竝宜左右彌綸暉贊九棘愚臣庸鄙請避賢路十六國春秋三十六圍鄴上疏臣以甲子之日大殲醜類賴陛下仁愛之志使六州士庶不覺易主自非守迷違命一無所害十六國春秋三十六鎮冀州上疏請代臣前所以朝聞夕拜不顧艱虞者正以方難未夷軍機權速庶竭命戎行甘馳驅之役敷宣王化盡筋骨之效故僶俛從事叨據負乘可謂恭王命于濟時俟太平于今日今聖德格于皇天威靈被于八表弘化已熙六合清泰竊敢披貢丹誠請避賢路設官分職各有司存豈應孤任愚臣以速傾敗東夏之事非臣區區所能康理願徙授親賢濟臣顛墜若以臣有鷹犬微勤未肯損棄者乞待罪一州效盡功命徐方始賓淮汝防重六州處分府選便宜輒以悉停督任弗可虛曠深願時降神規晉書載紀王猛傳又十六國春秋四十二上疏讓司空臣聞乾象盈虛惟后則之位稱以才官非則曠鄭武翼周仍世載詠王叔昧寵政替身亡斯則取成敗之殷監為臣之炯戒竊惟鼎宰崇重參路太階宜妙盡時賢對揚休命魏祖以文和為公貽笑孤后千秋一言致相匈奴哂之臣何庸狷而應斯舉不但取嗤鄰遠實令為虜輕秦昔東野窮馭顏子知其將敝陛下不復料度臣之才力私懼敗亡是及且上虧憲典臣何顏處之雖陛下私臣其如天下何願迴日月之鑒矜臣後悔使上無過授之謗臣蒙覆燾之恩晉書載紀王猛傳又十六國春秋四十二疾少瘳上疏不圖陛下以臣之命而虧天地之德開闢以來未之有也臣聞報德莫如盡言謹以垂沒之命竊獻遺款伏惟陛下威烈振乎八荒聲教光乎六合九州百郡十居其七平燕定蜀猶如拾芥夫善作者不必善成善始者不必善終是以古先哲王知功業之不易兢兢業業如臨深谷伏惟陛下追蹤前聖天下幸甚十六國春秋三十七遺張天錫書吾受詔救儼不令與涼州戰今當深壁高壘以聽後詔曠日持久恐二家俱獘非良策也若將軍退舍吾執儼而東將軍徙民西旋不亦可乎十六國春秋七十四遺慕容筑書國家今已塞成皋之險杜盟津之路大駕虎旅百萬自軹關取鄴都金墉窮戍外無救援城下之師將軍所監豈三千敝卒所能支也十六國春秋二十九為書諭張天錫昔貴先公稱藩于劉石者惟審于彊弱也今論涼土之力則損于往時語大秦之德則非一趙之匹而將軍翻然自絕無乃非宗廟之福也歟夫以秦之威旁振無外可以回弱水使東流返江河使西注關東既平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不遠宜深算妙慮自求多福無使六世之業一旦而墜地也十六國春秋三十六又七十四宣檄州郡大行皇帝棄背萬國四海無主征東大將軍長樂公先帝元子聖武自天受命荊南威鎮衡海分陝東都道被夷夏仁澤光于宇宙德聲侔于下武永與空蚝等謹順天人之望以季秋吉辰奉公紹承大統銜哀即事棲谷總戎枕戈得旦志雪大恥慕容垂為封豕于關東泓沖繼凶于京邑致乘輿播越宗社淪傾羌賊姚萇我之牧土乘釁滔天親為大逆有生之巨賊也永累葉受恩世荷將相不與驪山之戎滎澤之狄共戴皇天同履厚土諸牧伯公侯或宛沛宗臣或四七勳舊豈忍舍破國之醜豎縱殺君之逆賊乎主上龍飛九五實協天心靈祥休瑞史不輟書投戈效義之士幾三十餘萬少康光武之功可旬朔而成今以衛將軍俱石子為前軍師司空張蚝為中軍都督武將猛士風烈雷震志殄元兇義無他顧永謹奉乘輿恭行天罰君臣始終之義在三忘軀之誠戮力同之以建晉鄭之美晉書載紀苻丕傳又十六國春秋三十九又檄州郡昔夏有窮夷之難少康起焉王莽毒殺平帝世祖重光漢道百六之運何代無之天降喪亂羌古猾夏先帝晏駕賊庭京師鞠為戎穴神州蕭條生靈塗炭天未亡秦社稷有奉主上聖德恢弘道侔光武所在宅心天人歸屬必當隆中興之功復配天之美姚萇殘虐慕容垂凶暴所過滅戶夷烟毀發丘墓毒徧存亡痛纏幽顯雖黃巾害于九州赤眉之暴于四海方之未為甚也今素秋將及行師令辰公侯牧守壘主鄉豪或戮力國家乃心王室各率所統以孟冬上旬會大駕于臨晉晉書載紀苻丕傳又十六國春秋三十九臨刑上疏臣以趙建武四年從京兆劉湛學明于圖記謂臣曰新平地古顓頊之墟里名曰雞閭記云此里應出帝王寶器其名曰延壽寶鼎顓頊有云河上先生為吾隱之于威陽西北吾之子孫有艸付臣又土應之湛又云吾嘗齋于室中夜有流星大如半月落于此地斯蓋是乎願陛下誌之平七州之後出于壬之年晉書載紀苻堅傳下又十六國春秋三十八上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨齊曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛討逆十曰易𥳑弘大十六國春秋三十六上言攻晉彭城晉沛郡太守戴遂以卒數千戍彭城臣請率精銳五萬攻之願更遣重將討淮南諸城晉書載紀苻堅傳上諫苻堅臣聞堯舜茅茨周卑宮室故致和平慶隆八百始皇窮極奢麗嗣不及孫願陛下則采人掾之不斲鄙瓊室而不居敷純風于天下流休範于無窮賤金玉珍穀帛勤恤民隱勸課農桑捐無用之器棄難得之貨敦至道以厲薄俗修文德以懷遠人然後一軌九州同風天下刑措既登告成東岳蹤軒皇以齊美哂二漢之徒封臣之願也晉書載紀苻堅傳上又十六國春秋三十七宣檄三輔義感君子利動小人吾等生逢先帝堯舜之化累世受恩非常伯納言之子即節校牧守之胤而可坐視豺狼忍害君父祼尸薦棘痛結幽泉山林無松隧之兆靈主無清廟之頌賊臣莫大之甚自古所未聞雖茹荼之苦銜蓼之辛何以諭之姚萇窮凶肆虐毒被人神于圖讖厤數萬無一分而敢妄竊重名厚顏瞬息日月固所不照二儀實亦不育皇天雖欲絕之亦將假手于忠節凡百君子皆夙漸神化有懷義方含恥而存孰若蹈道而沒乎晉書載紀苻登傳又見十六國春秋四十奏天變太白犯東井東井秦之分野太白罰星必有暴兵起于京師晉書載紀苻生傳又見魏書苻生傳蒯城石圅銘秦建元十年造銅虎馬御覽百八十三引郡國志蒯城大廳前有石圅長二尺高一尺人不敢開銘云廣武將軍產碑維大秦建元四年歲在丙辰十月一日廣武將軍節使持節冠軍將軍益州刺史上黨公之元孫三代侍中右卿建忠將軍撫護軍扶風大守遷壽匡侯之胤子諱產字君君悉德淵高韻絕流文柔武烈令問孔脩拱持挺匡畋懿主忠訓殊異宰政欽干顯授池陽令稱揚德和戎翟綏懷即授征西大將軍右司馬敷教殊方西茂著乃業蕭于今也君臨此城漸再累紀享而惠和導識于當垂君當列封司馬即廣武司馬孟巨節將軍董建軍楊建軍郎建武將軍王柴鷹揚將軍董槃躬臨南界與馮翊護軍苟輔參分所刊石山為方西至洛水東齊定陽南北七百東西二百水統戶三萬領吏千人將三口赫赫皇秦誕鍾應靈臨有萬邦威畼八九域攸同明徽音流詠基年有成政脩匹首道刊石碑拓本
