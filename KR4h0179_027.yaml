body:
  text: 王凝之風賦起玄朔之重雲驅東極之洪濤越四溟而蓬勃經五嶺而蕭條其鼓水也無川不涉靡流不往溟海天回江湖雲蕩藝文類聚一劾范寧表豫章郡居此州之半太守臣寧入參機省出宰名郡而肆其奢濁所為狼籍郡城先有六門寧悉改作重樓復更開二門合前為八私立下舍七所臣伏尋宗廟之設各有品秩而寧自置家廟又下十五縣皆使左宗廟右社稷準之太廟皆資人力又奪人居宅工夫萬計寧若以古制宜崇自當列上而敢專輒惟在任心州既聞知即符從事制不復聽而寧嚴威屬縣惟令建立願出臣表下大常議之禮典晉書范寧傳書八月草九日告庾氏女明便授衣感逝悲歎念增遠思得郗中書書說汝勉難安隱深慰懸心微冷産後何似宜佳消息吾竝更不佳憂之遺不次凝之等書淳化閣帖三渙之等白不審二嫂常患復何如馳情倫直等平安計嫂倫奴巳應在道企遲適東五日動靜最差速姑如復小勝冀遂和耳猶不寧餘上下故常患反側此悉佳渙之等白淳化閣帖三得信承嫂疾不減憂灼寧可復言吾便欲往恐不見汝等湖水泛漲不可渡遂復隔絶不然尋巳往彼故遣疏知吾遠懷不具徽之等告淳化閣帖三操之等白得職婢書慰意知年光數問可不不得姜順消息懸心操之頓首淳化閣帖三為中書令啓琅琊王為中書監表中書職掌詔命非輕才所能獨任自晉建國嘗命宰相參領中興以來益重其任故能王言彌徽德音四塞者也進書訣表臣獻之頓首言臣年二十四隱林下有飛鳥左手持紙右手持筆惠臣五百七十九字臣未經一周形勢髣佛其書文章不續難以究識後載周以兵寇充斥道路修阻乞食揚州市上一老母姓沈字光姜惠臣一餐無以答其意臣於匙面上作一夜字令便市賃近觀者三遠觀者二未經數日遂獲千金所有書訣謹別録投進伏乞機務燕閒留神披覽不勝萬幸臣獻之頓首墨池編明謝安忠勳疏故大傅臣安少振玄風道譽洋溢弱冠遐棲則契齊箕皓應運釋褐而王猷允塞及至載宣威靈強猾消殄功勳既融投韍高讓且服事先帝眷隆布衣陛下踐阼陽秋尚富盡心竭智以輔聖明考其潛躍始終事情繾綣實大晉之雋輔義篤於曩臣矣伏惟陛下留心宗臣澄神於省察辭中令書外出謂公私可安耳勳賞既湊亦已息望但使明公不遺有會不忘亦何憂便餧耶民志不慕高情不忘榮懇懇祈訴惟願離今任耳餘無所擇伏度朝恩不過存愍故舊使蓬莤與蘭蕙齊榮耳明詔爰發恩已被矣榮實厚矣必何須拜而治順許而弛今日君臣之際差可得適願樂也若民有纖芥少裨聖化亦當求自策效而能臨殊寵必欲免耶思之實熟萬無此理古來亦未有量力而致深罪者蔡司徒立帝王於御床詔驛數反其不祗順正止於免黜耳此外希不矜體者違命誠為深愆曲從實復過此伏度天海容納必當哀許仰憑仁眷惟願垂救動成塵穢轉難為顏乃欲覲謁忽患齒痛疼慘無賴語迫罔知所厝冒復啓訴謹草一呈磬竭款實謂為粗盡一豪虛矯神明殛之若民可作尚書令而使四海推懕者亦人誰不堪勳德蓋世尚當有讓況民凡鄙而可寇竊耶王懷祖先輩名流作此職可謂僉允桓宣武窺尚書門猶言此中無人固知當之未易也劉既不便彌不自宣故寄之翰墨益增繁忤飢渴還旨願不作悠悠常誨耳獻之死罪州民王獻之呈與郗超書彥伯已入殊足頓興往之氣故知捶撻自難為人冀小郤當復差耳雜帖得諸慰意吾故冀惡尋視汝又告未復東近動靜馳情昨即遣行為不至耶如省二十三日獻之問得十九日書之間後何如吾故劣力不一一王獻之問向聞游諸懸作今退念時事覽之後復慨然五月十二日獻之白節過感懷深至念痛傷難勝得五日告知君轉勝甚慰甚慰雨過此復何如想消息日平復也謹僕近暴不佳如惡氣當時極惡賴即退耳故虛劣勿勿還不多王獻之白知祖希佳為慰慰數不得書其云至水門增深款之思想轉深省告知君亦同如今未知面期近遠此慨可言惟深保愛數音問尋故旨取君消息適得元直二十三日疏送白鮓今送十褁似並猶堪噉獻之白信明還東有還書願送來已今分明至著都上慰之吾故沈頓思見之故想時能問疾得來先報之不能得自致者旨取車王獻之答獻之白兄靜息應佳何以復小惡耶伏想比消息理盡轉勝耳礜石深是可疑事兄喜患散輒發癰勢為積乃不易願復更思獻之惟賴消息內外極生冷而心腹中恆無他此一事是差但疾源不除自不得佳論事當隨宜思之也獻之白獻之白承姊故常惡不審得春氣復何如冬馳情餘安和至寧此故耳獻之白育等可不轉思見之知恩慕不中忽動小行多晝夜十二四起所去多又風不差腳更腫轉欲書疏自不可已惟絶歎於人理耳二妹復平平昨來山下差靜岐當還吾當托桓江州助汝此不辨得遣人船迎汝當具東改枋枋三四吾小可當自力無湖迎汝故可得五六十人小枋諸謝當有便是見今當語之大理盡此信還一一白胛痛不可堪而比作書欲不能成之相過終無復日悽切在心未嘗暫撥一日臨坐目想勝風但有感慟當復如何常謂人之相得古今洞盡此處殆無恨于懷但痛神理與此而窮耳盡此感深殆無冥處常恨況相遇之難而乖其所同省告不覺滻流既已往矣亦復何言獻之諸舍復何如吾家多患憂面以問慰情不知可耳承永嘉比復患下上下諸疾患乃爾燋馳豈可懷不審今復何如嫂即平和耳貞壽不成病不鵝還慰姊意今已嘗向發分張諸懷可言殊嘗復憂懸婢腹痛見差不劉家疾患即差秀已還也諸女無日事懸心阮新婦何日至慰姊目下獻之白承姑比日復小進退其爾不得一極和憂悚猶深不審以服散未必得力耳比驎相聞故云惡懸懷使君數得書也獻之白節過歲終衆感纏心伏惟同之奉月初告承極不平復頭眼半體疢恆惡兄告說姊故殊黃瘦憂馳可言釁切不審尊體復何如眠食轉進不氣力漸復克耳遲復旨告獻之故爾獻之願餘上下安和知婢日夕疏慰意育故羸懸心倪比健也適奉永嘉去月十一日動靜故常患不寧諸女無復消息獻之再拜夏節近感思深惟窮號崩絶不可忍處晴快不審體中何似食噉復多少甚馳情不審諸舍復何如未復西動靜不寧此多患反側願深寬勉故承問思戀無往不慰省告對之悲塞未知何日復得奉見何以喻此心惟願盡珍重理遲此信反復知動靜十二月草七日具疏操之獻之再拜歲盡無復日感思兼懷不自勝兄亦同之奈何奈何奉十二日告承掾安和慰馳情姊三兄諸患故爾不損憂馳晴快不審尊體竝復何如遲復來告操之故平平已再服散冀得力獻之亦忘憒勿謹拜疏不具操之等再拜衛軍猶未平和而哀勞殊未得盡消息理常以不寧僕射得散力甚慰表解臺職不知得恕不復冠軍告懸企獻之白不謂鄱陽一門艱故至此追尋悲惋益不自勝奈何奈何政坐視其滅盡使人悲熟賴子高在此不爾無可成獻之阮新婦勉身得雄甚善散騎殊常喜也雖奉對積年可以為盡日之歡常苦不盡觸類之暢方欲與姊極當年之足以之偕老豈謂乖別至此諸懷悵塞實深當復何繇日夕見姊耶俯仰悲咽實無已無已唯當絶氣耳夏日感思兼悼切割心懷痛當奈何奈何得思道書慰意薄熱汝比各可不吾並故諸惡勞益勿勿獻之白疏獻之白思戀轉不可言瞻近而未得奉見但有歎息遲諸信還具動靜獻之白白東告具天寶疾患問何其倉卒乏子孫當欣倫早成家以此娛上下豈謂奄失此女愍惜深至惻切心懷嫂哀念當可為心情願不可保使人惋惋悲政當隨事豁之耳嫂先積弊復有此痛心不審不乃惡不甚以憂馳眠食復多少願遣無益盡消息理吾十一日發吳興違遠兄姊感戀無喻慶等別不可言比奉告故多患姊經感極頓憂馳益深適咨議十六日告風疾故爾反側餘可行未東動靜不寧吾宜速吳與丞別兄進猶戀罔勞亦極惡馳情二女晚生皆佳未復華姜疏比來得直疏故惡故足當視華也汝兒女並可不草九日獻之白昨遂不奉恨深體中復何如弟甚頓勿勿不具獻之再拜承服腎氣丸故以為佳獻之比服黃耆甚勤平平耳亦欲至十齊當可知得書為慰吾先夜遂大得服湯酒諸治漸折故頓極難勞知足下便去不得面別怏恨深保愛臨書增懷王獻之玄度時往來以此為慰興公使適還數日具都下問人情所憂良可歎息諸從數問齡前來經日極為差云仁祖欲請為軍司不知行不慕容有易賴意耶薄冷足下沈痼已經歲月豈宜觸此寒耶人生稟氣各有攸處想示消息益部耆舊傳今送想催驅寫取耳慎不可過淹留吾去月從孫家求信次頓爾頻為亂反側餳大佳柳六惠言餳可常餌亦覺有益耳前告先以陳事意必是更有家信未知期說見德遠書所致人耶何可足下今耶一月草九日告仲宗奉世諸兒禍變無常黃門隕背哀痛摧剝不自勝任奈何奈何及書感塞父姑告令外甥欲問郗新婦更篤憂慮深何必不耳企遲此大都如常秀順至慰意順心痛委頓焦勞消息亦不可不恆精以經心向秋冷疾下亦應防也獻之下斷來恆患頭項痛復小爾耳近與鐵石共書令致之想久達不得君問以復經月懸情豈可言頃更寒不適頗有時氣君頃各可耳遲旨問僕大都小佳然疾根聚在右髀腳重痛不得轉動左腳又腫疾候極是不佳幸食眠意事為復可可冀非臧病耳知鐵石前往快作樂諸君善處世一達於當年不復過此僕端坐將百日為尸居解日耳不知那得一散懷何其相思之深臨書意塞玄度何來遲深令人憂懸耶常謂有理因祠監多感足下共事甚善然所造極難想足下每思先後卿豈須言親親不已意耳安石停此過半日猶得一宿送近道所以致歎何物喻之一十當浦陽諸懷兒不可言且不復得卿送有諸歎今此貪上道平平昨來山下差靜岐當還慶等已至也鵝差不甚懸心宜道尋去奴定西諸分張少言鴨頭丸故不佳明當必集當與君相見不審阿姨所患得差否極令懸惻想東陽諸妹當復平安不審頃者情事漸差耶彼郡今戴甚不能佳不知早晚至當遂至郡深相望豹奴此月惟省一書亦不足慰懷深悉足下情素耳鄱陽書停諸舍便有月未具散騎書知情至草草未發遣奉去月餘承婦等復不能差深憂慮耳獻之白不審疾得損未極憂及更能出入未前書云至於散情嫂疾苦療得所深喜慰想必為問敬和晚際似差耶諸舍也能向諸弟各也獻之白極熱敬惟府君此月內得書來時幾得問希此消息極悶悶軍中復如何患膿不能潰意甚無賴君有好藥必時復與府中多少極濟事耶承冠軍故爾不覺轉勝灸無所覺憂馳深汝燋悚可言服油得力更能停噉麵只五六日停也不至絶艱辛也足下明當必果想即日如何深想憶近奉阿姑告知平安極慰人意獻之遂不堪暑氣力恆惙恐是惡風大都將息近似小卻白承舍內分違近豫遂就難以喻濟理獻之白復面悲積蕃首以不佳耿耿僕近動散委頓雖轉折猶惙然發止尚以未定日冀以言首力還不復耳還此今有書何以至不知諸舍故多患念勞以今差也得領軍書故在風丹楊書常疾動耿耿亦云得鄱陽近書為慰丹楊疾者不果來甚悵恨得西問不寇復云何令人邑邑具示獻之言月終伏惟哀傷不可任不審尊體諸患復何如悚息謹言疏不備獻之言東家尚未欲下李參軍無政日有此議能自來此方寸無使聞上極不妙之事獻之頓首八月十九日具疏操之獻之再拜昨日諸願悉達奉上告慰馳心極冷不審尊體復何如操之創故不差常惡亦故爾憒憒獻之昨來復下如欲作㿃殊乏極服石的丸冀得力謹上不具操之等再拜獻之白不審尊體復何如昨夜眠多少願盡寬喻理憂馳可復言若得消息者獻之嫂等承更惡不審頃痊復不必須散時終得力耶此藥甚佳想姊舉體不能行履服遂差安西且無恙府君屬有和稀久滯行路同人絶得此心故當攜其長幼詣汝上下知彼駱驛有書示不足以慰吾意耶冬間必欲至足下所居承使君明練不謂漸有勝也君數集聚然其大都可耳吾止於月半間耶鄱陽歸鄉承修東轉有理吾賢畢欲事必俟勝歡慰于懷耶吾終權宜至承今年飢饉仰惟年支都乏絶不謂乖又至於此耶吾腳尚未差極憂也獻之等再拜不審海鹽諸舍上下動靜比復常憂之姊告無他事崇虛劉道士鵝群竝復歸也獻之等當須向彼謝之獻之等再拜敬祖日夕還山陰與嚴使君聞頗多歲月今屬天寒擬適遠為當奈何奈何爾豈不令念姊遠路不能追求耳獻之死罪授衣諸感悲情伏惟哀慕兼慟痛毒難居見徐俊并使君書承比極勝但承此凶問當復大頓耳比日憂馳無復意不審尊體云何腳及耳痛氣得此哀號何如先大惡時灸創特不堪此不乃為患眠食幾許使君今地實難為識然所以為識政在此耳當今可復使不萬全不願其以多算難易得之便自可令不為因絫耳比者忉怛當不可言當不可言獻之死罪兄伯蕭索寡會遇酒則酣暢忘反乃自可矜想彼悉佳汝復見諸女不此近下故爾耳獻之白奉別告承安和慶慰極冷不審尊體復何如獻之比日如復小勝因夜行忽復下如欲作㿃今服藥盡溫燥理冀當可耳然異極都不得復小失和卿惡亦不復得妄近生冷體氣頓至此令人絶歎行有佳酒便服十二月割至不中秋不復不得想未復還慟理為即甚省如何然勝人何慶等慶等大軍日寒涼得告承諸惡復灸極嘗慘痛悲灼僕病正自不差疾久自目深悲企甚積既慘塞居疾係以罪黜二三不出職門近疑所敘似不益企恨秋牽借請有人當復敘耳南中佳音一一小慰解數月也吾甚憂慮卿君何如耶獻之今送梨三百顆晚雪殊不能佳鏡湖澄徹清流瀉注山川之美使人應接不暇保母志琅琊王獻之保母姓李名意如廣漢人也在母家志行高秀歸王氏柔順恭勤善屬文能草書解釋老旨趣年七十興寧三年歲在乙丑二月六日無疾而終仲冬季望葬會稽山陰之黃閼岡下殉以曲水小硯交螭方壺樹雙松於墓土立貞石而志之悲夫後八百餘載知獻之保母宮于茲土者尚焉
