body:
  text: 顧臻臻請除雜伎樂表臣聞聖王制樂讚揚治道養以仁義防其邪淫上享宗廟下訓黎民體五行之正音協八風以陶氣宮聲正方而好義角聲堅齊而率禮絃歌鐘鼓金石之作備矣故通神至化有率舞之感移風改俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入莒之屬皮膚外剝肝心內摧敦彼行葦猶謂勿踐矧伊生民而不惻愴加以四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序而足以踏天道頭以履地紀反兩儀之順傷彝倫之大方今夷狄對岸外禦為急兵食七升忘身赴難過泰之戲日稟五斗方掃神州經略中甸若此之事不可示遠宜下太常纂備雅樂簫韶九成惟新于盛運功德頌聲永箸于來葉此乃詩所以燕及皇天克昌厥後者也雜伎而傷人者皆宜除之流𥳑儉之德邁康哉之詠清風既行民應如草此之謂也愚管之誠惟垂采察晉書樂志下宋書樂志一舊唐書樂志二御覽五百六十九祥禫議杜元凱注春秋左傳云天子諸侯雖卒哭除喪至于當其練祥之日必設位而哭明不復禫也且先朝故事無有禫儀蓋君子行禮不求變俗而博士徐禪意欲以求六月二十二三大祥二十五六而禫三日之中衣服無異而立二節皆背先儀又非𥳑易之法也忌日舉哀如昔成制禮云除喪者卜其遠日避不懷也謂當擇月末以還大祥除四起縞冠受以白幍徙月後吉不宜立異屢改也仲尼曰三年之喪二十五月而畢哀痛未盡思慕未至然服以是斷者豈不送死有已復生有節也哉又云天地已易四時已變是以象之而欲二十二三日除縞辨二十五六日禫哭禮玉藻曰縞冠素紕既祥之冠也所謂大祥而素縞麻衣也釋禫之禮云禫祭則黃衣玄冠矣既祭乃服禫朝服綅冠踰月玄端以居復平常焉如士禮之條又無禫哭也且日時未改忌月未過便復常節恐非天王情禮大晉之典也今無受禫之服又無改易之祭三日之閒哀樂不變而立無名之哭近背先帝畫一之美遠違仲尼殊月之說議曰詳案前儀則禮經云三年之喪自天子達雖有其說無聞服制所引武王崩既葬成王冠襄王崩嗣王未再再賜齊侯胙皆可為明徵當以萬機至繁百度須理如同臣庶喪制唯祀與戎多闕漢文彌留之際不詳前代舊規深慮大政之廢遂施易月之令若候同軌畢至嗣君然後免喪俗薄風澆或生舋難執古道者則云齊斬三年適權宜者遂稱以日易月禮經雖云七月而葬漢魏以降多一兩月內山陵禮終窀穸之期不必七月除服之制止于反虞魯史足徵二可無致惑庶情理兩得政教無虧矣通典八十博士謝諶議本又作謝況官本作謝玩疑皆誤答張祖高問張祖高問謝沈曰諸侯祭五廟先諏日卜吉而行事為祭五廟諸畢邪案儀視殺延尸厥明行事晏朝乃闋五廟盡爾將終日不了若異日未見其義沈答曰五廟同時助祭者多晏朝乃闋季氏建暗繼之以燭雖有強力之容肅敬之心皆倦怠也子路為宰與祭室事交乎戶堂事交乎階晏朝而退孔子聞之曰誰謂由不知禮通典四十八張祖高問士服天王云何要記唯道大夫服君及家臣服大夫耳不說士恐有脫誤鄭云士服君亦斬衰無明文而雜記云士居堊室此則士制周邪士下吏服士恐亦應同謝沈答曰朝廷之士服天王斬衰禮之明文也邑宰外任之士居堊室制周要記非脫誤是𥳑略耳通典八十一答王氏問王氏問謝沈云祖父特進衛將軍海陵亭恭侯應立五廟不沈答亭侯雖小然特進位高似諸侯也又問曾祖父侍御史得入特進恭侯廟不答父為士子為諸侯尸以士服祭以諸侯之禮御史雖為士應自入恭侯廟也通典四十八為出繼母不服議夫禮緣人情而為之制雖以義督親然實以恩斷義案繼母如母謂其在父之室事之猶母見育猶子故同之所生齊服下章云父卒繼母嫁從為之服報此明父繼母出則不服矣繼母出自他族與已無名從以配父在有母之尊親撫養已故亦喪之如母及其出也既不終養育之恩又棄為母之名若不從而見育則不服亦其宜矣通典九十四請旌孝子許孜疏臣聞聖賢明訓存乎舉善褒貶所興不遠千載謹案所領吳寧縣物故人許孜至性孝友立節清峻與物恭讓言行不二當其奉師則在三之義盡及其喪親實古今之所難咸稱殊類致感猛獸弭害雖臣不及見然備聞斯語竊謂蔡順董黯無以過之孜沒積年其子尚在性行純愨今亦家于墓側臣以為孜之履操世所希逮宜標其令跡甄其後嗣以疇既往以獎方來陽秋傳曰善善及其子孫臣不達大體請臺量議晉書孝友許孜傳答孫安國書獲書文略旨辭理亦兼情雖欣清酬未喻乃懷區區不已請尋前本本亦不謂物都不化但化者各自得其所化頽者亦不失其舊體孰主陶是載混載判言口然之至分而不可亂也如此豈徒一更而已哉將與無窮而長更矣終而復始其數歷然未能知今安能知更蓋積悲忘言咨求所通豈云唯慰聊以寄散而已矣宏明集五更生論善哉向生之言曰天者何萬物之總名人者何天中之一物因此以談今萬物有數而天地無窮然則無窮之變未始出于萬物萬物不更生則天地有終矣天地不為有終則更生可知矣尋諸舊論亦云萬兆懸定群生代謝聖人作易已備其極窮神知化窮理盡性苟神可窮有形者不得無數是則人物有定數彼我有成分有不可滅而為無彼不得化而為我聚散隱顯環轉于無窮之塗賢愚壽夭還復其物自然貫次毫分不差與運泯復不識不知遐哉邈乎其道冥矣天地雖大渾而不亂萬物雖衆區已別矣各自其本祖宗有序本支百世不失其舊又神之與質自然之偶也偶有離合死生之變也質有聚散往復之勢也人物變化各有其往往有本分故復有常物散雖混淆聚不可亂其往彌遠故其復彌近又神質冥期符契自合世皆悲合之必離而莫慰離之必合皆知聚之必散而莫識散之必聚未之思也豈遠乎若者凡今生之生為即昔生生之故事即故事于體無所厝其意與已冥終不自覺孰云覺之哉今談者徒知向我非今而不知今我故昔我耳達觀者所以齊死生亦云死生為寤寐誠哉是言釋藏車五宏明集五圍碁賦序司空從事中郎庾仲初性好圍碁終不達碁旨言文則觸類而生對局則冥然而窮何所解如後之易所礙如此之難哉御覽七百五十三與范汪論婚事禮非拜時拜時出于末世耳將以世族多虛吉事宜速故以好歲拜時新年便可婚也藝文類聚四十答范汪問中書郎范汪問劉惔曰從妹與荀始文婚已及好歲拜時又從叔父德度喪會叔親患危篤欲令荀氏迎從妹盡婦敬于夫氏以有此喪為難故為此議拜時出于近代將以宗族多虞吉事宜速故好歲拜新年便可迎也惡歲可迎是拜時已成婦也在塗之婦猶服夫氏況已交拜禮成便當迎是長還也惔答云荀今從叔喪三月小功之服禮云小功之末可以納妻如此自可比初婚何疑通典五十九酒針爰建上業曰康曰狄作酒于社獻之明辟仰郊昊天俯祭后土歆禱靈祇辨定賓主啐酒成禮則彝倫攸序此酒之用也初學記二十六又略見書鈔一百四十八恭皇后大祥忌日臨哭議案博士議恭皇后再周欲依三年之議至尊東堂舉哀群臣詣陵哭臣案禮為王后服無三年之制左傳叔向云王一歲而有三年之喪二焉謂三年而後娶達子之志耳禮喪大記曰祥而外無哭者禫而內無哭者文子之喪既除越人來弔受于廟門之外垂涕洟而不哭明喪既過無哭禮不詣墓而接于廟外今后服既過至尊無緣舉哀群臣不應詣陵而哭也通典八十一駮王濛奔喪制若如濛議見在官者已拘于制度不得奔赴至于既去雖不及哀臣子之情何得不暫致身哉臣謂喪紀雖過去職者故宜遠赴通典八十咸康中論徐恩龍事徐恩龍娶姨妹為婦婦亡而諸弟以姨妹為嫂嫂叔無服不復為姨妹行喪右丞徐萬謂宜然今議者以嫂無服不得為姨妹服不解服之為害義也為傷情邪為尊厭也所為尊厭者父在為母尊卑體異故可得厭耳今嫂妹一人之體兼此尊卑何所厭也齊衰衣各與大功之麻同皆兩服之所以敘親親之情今以嫂叔之嫌不為姨妹制服絶親親之義傷恩昵之道殆非聖人為服之本意乎徐彥難曰本雖中外姨兄弟之親一為嫂叔便當以公義厭私不為尊卑之厭也衆曰女人外屬以夫氏為公以公厭不為叔服可也叔以嫂是姨妹復何公厭而不服邪彥重難曰若以此服為親則不聞親服無報又公義在于夫氏豈在嫂邪衆曰就如難旨制公在叔不在嫂雖有姨妹之親就于公義不得服之猶可也若叔有厭則嫂無厭雖姨妹為嫂必服之為叔之姨兄而見服則姨為嫂之姨妹何獨不見服哉若不相服則絶此親豈聖人之意乎苟姨妹得服姨兄兄亦應服何無報哉彥重難曰若姨妹為嫂而為之服必也正名將謂之何衆答曰今姨妹為嫂何服者以正名故也言嫂則姨妹不從焉言姨妹則嫂不與焉名別若此故可服也嫂自無服吾不為之服姨妹有服吾為之緦麻吾自服姨妹奚為強謂之服嫂也哉見嫂應拜見姨妹不拜也今嫂妹同體今我自拜嫂而謂我拜姨妹不亦惑哉彥重難曰彥以為姨妹為嫂而不服者正以無復姨妹之名故耳衆答曰不解姨妹為嫂便無復姨妹之名削其氏族滅其名號邪為變化分離嫂留而去妹邪為我嫂者是姨妹也何不得兩全哉彥難曰若如告言嫂則姨妹不從言姨妹則嫂不從未審定言嫂邪言姨妹邪衆答曰一人合兩親似一人兼兩官當其事則舉其名以應其義何拘以一名一稱哉言嫂則拜之言姊妹則服之各有所施不以此而滅彼耳彥曰平存許其稱嫂而拜則姨妹也至于亡歿便稱姨妹不拜則非復嫂也懼一人之心不得以昨日平安為嫂明日終亡為姨妹也衆曰吾得存之與亡為嫂為妹不復異也為我嫂故拜之是姨妹故服之情理自通何以云拜便不得制服制服便不得拜乎彥重難曰若隨其名別其義則著服臨尸不復拜也衆答曰見姨妹之尸不可以不服臨亡嫂之喪不可以不拜拜自為嫂服施為妹服隨其親拜應其名別其義斯之謂矣通典九十五論庾左丞孫見事庾左丞孫見遭族父喪父已絶服又是姨弟見問當服不徐答以為當服右丞徐彥重難曰禮云尊祖故敬宗敬宗則收族收族者序以昭穆也何得以姨弟之服加于宗父乎于情乃可無傷于義實為有當也衆答曰禮為曾祖高祖三月又改葬緦麻服所尊又臨至親之葬而服之最輕者豈損所尊之服乎今族父無服姨弟有服自為姨弟服何為輕服服宗父乎難云于義有害者不解害何義邪天生族父為吾姨弟非吾貶退所為何不敬宗之有族父應拜而姨弟不應拜今族父為姨弟今不可以姨弟不應得拜而不為族父拜也猶不可以族父無服而不為姨弟服也若姨弟犯過吾不顧族父與姨弟共身同體恕而容之此不可也于其死亡以姨弟服之正合禮記絶族無施服而親者屬文通典九十五三國評臧洪為郡將守死洪敦天下名義救舊君之危其恩足以感人情義足以勵薄俗然袁亦知己親友致位州郡雖非君臣且實盟主既受其命義不應二袁曹方睦夾輔皇室呂布反覆無義志在逆亂而邈超擅立布為州牧其于王法乃一罪人也曹公討之袁氏弗救未為非理也洪本不當就袁請兵又不當還為怨讎為洪計者苟力所不足可奔他國以求赴救若謀力未展以待事機則宜徐更觀釁效死于超何必誓守窮城而無變通身死殄民功名不立良可哀也魏志臧洪傳注靳允母為呂布所執而守范不去允于曹公未成君臣母至親也于義應去昔王陵母為項羽所拘母以高祖必得天下因自殺以固陵志明心無所係然後可得成事人盡死之節衛公子開方仕齊積年不歸管仲以為不懷其親安能愛君不可以為相是以求忠臣必于孝子之門允宜先救至親徐庶母為曹公所得劉備乃遣庶歸欲為天下者恕人子之情也曹公亦宜遣允魏志程昱傳注先主假黃權偏將軍權既忠諫于主又閉城堅守得事君之禮武王下車封比于之墓表商容之閭所以大顯忠賢之士而明示所貴之旨先主假權將軍善矣然猶薄少未足彰忠義之高節而大勸為善者之心蜀志黃權傳注顧雍斷呂臺獄雍不以呂一見毀之故而和顏悅色誠長者矣然開引其意問所欲道此非也一奸險亂法毀傷忠賢吳國寒心自太子登陵遜已下切諫不能得是以潘濬欲同手劍之以除國患疾惡忠主義形于色而今乃發起令言若一稱枉邪不申理則非録獄本旨若承辭而奏之吳主儻以敬丞相所言而復原宥伯言承明不當悲慨哉懷敘本無私恨無所為嫌故詈辱之疾惡意耳惡不仁者其為仁也季武子死曾點倚其門而歌子晳創發子産催令自裁以此言之雍不當責懷敘也吳志顧雍傳注全琮散父米數千斛以贍吳士禮子事父無私財又不敢私施所以避尊上也棄命專財而以邀名未盡父子之禮吳志全琮傳注是儀本姓氏以孔融嘲改姓是古之建姓或以所生或以官號或以祖名皆有義體以明氏族故曰胙之以土而命之氏此先王之典也所以明本重始彰示功德子孫不忘也今離文析字橫生忌諱使儀易姓忘本誣祖不亦謬哉教人易姓從人改族融既失之儀又不得也吳志是儀傳注是儀辨刁嘉罪是儀以羈旅異方客仕吳朝值讒邪殄行當嚴毅之威命縣漏刻禍急危機不雷同以害人不苟免以傷義可謂忠勇公正之士雖祁奚之免叔向慶忌之濟朱雲何以尚之忠不諂君勇不懾聳公不存私正不黨邪資此四德加之以文敏崇之以謙約履之以和順保傅二宮存身愛民不亦宜乎吳志是儀傳注鍾離牧讓稻牧蹈長者之規問者曰如牧所行犯不不校又從而救之直而不有又還而不受可不謂之仁讓乎哉答曰異乎吾所聞原憲之問于孔子曰克伐怨欲不行焉可以為仁乎孔子曰可以為難矣仁則吾不知也惡不仁者其為仁矣今小民不展四體而認人之稻不仁甚矣而牧推而與之又救其罪斯為讓非其義所救非人非所謂惡不仁者苟不惡不仁安得為仁哉蒼梧梧澆娶妻而美讓于其兄尾生篤信水至不去而死直躬好直證父攘羊申鳴奉法盡忠于君而執其父忠信直讓此四行者聖賢之所貴也然不貴蒼梧之讓非讓道也不取尾生之信非信所也不許直躬之直非直體也不嘉申鳴之忠非忠意也今牧犯而不校還而不取可以為難矣未得為仁讓也夫聖人以德報德以直報怨而牧欲以德報怨非也必不得已二者何從吾從孔子也吳志鍾離牧傳注周魴下髮夫人臣立功效節雖非一塗然各有分也為將執桴鼓則有必死之義志守則有不假器之義死必得所義在不苟魴為郡守職在治民非君所命自占誘敵髮剔髮膚以徇功名雖事濟受爵非君子所美吳志周魴傳注上恭皇后大祥忌日臨哭事太學禮官謂至尊行先后之喪亦同齊縗今再周及忌日無復祥變之事謂不可躬行臣案無經傳明文則不應出若晦日東堂舉哀由朝處參議而事無指條通典八十一博士徐禪上恭皇后大祥忌日臨哭事康帝改元告廟議案魯文公之書即位也僖公未葬蓋改元之道宜其親告不以喪闕昔代祖受終亦在諒暗既正其位于天郊必告成命于父祖事莫大于正位禮莫盛于改元傳曰元始也首也善之長也故君道重焉謂應告通典五十五康帝諱議謹案輒關博士王質胡納許翰議案爾雅無舊訓非可造立五山之名取其大而高也其詩曰於皇時周陟其高山高山則岱衡華恆也周禮謂之五嶽詩人謂之高下字無詁訓而有二名今若舉名別之宜曰高取義為訓宜如前曰嵩通典一百四康帝諱嶽是五山之大名四府君遷主議禮去祧為壇去壇為墠歲祫則祭之今四祖遷主可藏之石室有禱則祭于壇墠晉書禮志上宋書禮志三通典四十八永和二年褚太后敬父議臣聞成均之法導以忠孝歷代同之故鄭玄議王庭正君臣之禮私覿全父子之親是大順之道案先朝羊玄之羊后之父也公朝之敬躬秉臣節后之歸寧亦執子道雖無記注今朝士備職而先蠶儀乃太康中事至惠帝之代在之便自不可同漢代四說之異歷代垂疑此論不成由來尚矣通典六十七永和九年殷祭議春秋左氏傳曰歲祫及壇墠終禘及郊宗石室許慎稱舊說曰終者謂孝子三年喪終則禘于太廟以致新死者也通典四十九非荀是虞議中山王睦立禰廟愚等謂尊祖敬宗禮之所同若列國秩同則祭歸嫡子所以明宗也嫡輕庶重禮有兼享所以致孝也今譙王為長既享用重祿中山之祀無以加焉二國兩祭禮無所取詔書禁之是也詔稱安乎獻王諸子竝封不可各令立廟是荀畼之義美矣然虞謂中山父非諸侯而祭更闕疑如禮意也虞徵士答衛將軍虞喜以嫡為大夫庶為諸侯諸侯禮重應各立廟禪謂為允矣喜曰尊同體敵恩情兩伸諸兄弟俱始為諸侯命數無降今士庶始封之君尚得上祭四代不拘于嫡以貴異之況已尊同五等更嫌不得其均用豐禮竝祭四代所以寵之理非替宗此蓋先王以孝理天下肅恭明祀之達義也昔周公有王功魯立文王之廟鄭有平王東遷之勳特令祖厲是為榮之非計享之祭在于周室魯鄭豈得過之哉通典五十一中山王睦乞立禰廟荀顗議以為中山譙宜各得立廟虞喜以為得兼祭徐禪非荀是虞為康帝改元告廟文維建元元年正月甲子孝曾孫嗣皇帝諱謹遣使持節兼大尉某官某甲敢昭告于皇祖高祖宣皇帝諱以眇身屬膺明命為兆人主惟神器之重夙夜祗厲夫首元正位改物承天先王之典刑建國之大禮今改咸康八年為建元元年享祖宗之保佑膺乾坤之休靈敢薦告事一元大武薌合薌萁嘉薦庶羞清滌清酌明告于皇祖高祖宣皇帝穆皇后張氏尚享通典五十五駮蔡謨奏正會儀注王者觀時設教至于吉凶殊斷不易之道也今四方觀禮陵有儐弔之位庭奏宮懸之樂二禮兼用哀樂不分體國經制莫大于此晉書樂志下咸康七年三月杜皇后崩尚書蔡謨奏八年正會惟作鼓吹鐘鼓其餘伎樂盡不作侍中張澄給事黃門侍郎陳逵駮以為又議今大禮雖降事吉于朝然儐弔顯于園陵則未滅有哀禮服定于典文義無盡吉是以咸寧之會有徹樂之典實先朝稽古憲章垂式萬世者也晉書樂志下恭皇后大祥忌日臨哭議案禮小記曰大功者主人之喪有三年者則必為之再祭鄭玄云有三年者謂妻若子幼少也再祭謂練祥也凡人子之生必有天地父母之道故記有君薨而生子之禮今二皇子之育雖在恭后崩後于禮是為有三年子幼少者也則必為之有二祥之祭杜元凱云天子諸侯雖卒哭除服其練祥日必有位矣今皇子出承國蕃故王后喪諸侯卑不得為主夫喪無主禮有正文至尊統天承重則為主在聖躬也乃同先帝先后于考妣哀禮終于今晦吉禘始于來朔非人臣之所主也記云為王后周服母之義虞書曰百姓如喪考妣三年遏密恭后母育天下臣子有喪妣之恩古門人于師無服心喪三年祥日之哭所以終哀非服喪三年矣今聖代不可守以循常之名例當博納同異斟酌而用焉通典八十一
