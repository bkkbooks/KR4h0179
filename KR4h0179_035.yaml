body:
  text: 應貞臨丹賦陟綿岡之迢邈臨窈谷之濬遐覽丹源洌泉眷縣流之清派漱玄瀨而漾沚順黃崖而蕩博激重巖之絶根拂崇丘之飛崿然後陰乘洞出邊澮旁開倏熠高騖皓暚覓長懷盤溢鬱沒雲轉飆回屏側為之飛隕壁岸為之陂隤列以青林蔭以緑枝柳松蓊葺于其側楊柳婀娜乎其下則高溜承崖縣泉屬嶺別流分注冰瑩玉靜清波引鏡形無遁影藝文類聚八安石榴賦余往日職在中書時直廬前有安石榴樹枝葉既盛華實甚茂故為之作賦挹微露以鮮采承輕風而動葩南拂陰簷北扇陽阿其旁則有大廈崇房重廊高廡皇籍帝典圖書之府時移節變大火西旋月葩結秀朱實星縣膚折理阻爛若珠駢藝文類聚八十六初學記二十八引兩條御覽九百七十蒲桃賦結繁子之礧落兮英蘢總而彌房御覽九百七十二釋左雜論芍藥之羹爽口之食書鈔一百四十二七華千乘方轂萬騎龍翥書鈔十六杖針高明執之戒在驕蕩書鈔一百三十三朱杖銘朱杖者其初蓋譙郡諸德聲之有也其木青豐端而徑甚德聲為杖之宜也天作之杖于譙之株奧幹特挺非柘非榆書鈔一百三十三引三條華覽強弩連城長戟指塞御覽三百五十三崇文大夫唱二陰陽運潛玄風扇厲鷹隼騰揚貍搏噬書鈔一百五十四革林備言錫命羽蓋朱輪奚氏本造後裔飾膺以代步屏以從容輪斬并合出入道同追仁越義惟禮是恭御覽七百七十五童子為天子服議案禮喪服諸侯為天子斬今廣陵王列土建國古之諸侯宜從臣例又禮童子不居廬不杖不菲廣陵王未冠吳王章郡王卑幼不應居廬古但有冠無幘漢始制幘可如今服卷幘通典八十一魏晉故事皇子廣陵王年十一孫為祖服周當為臣服從本親服皇弟吳王年十章郡王年七又當倚廬服成人禮著何幘服應琳議上表請興復農官夫一人不耕天下必有受其飢者而軍興以來征戰運漕朝廷宗廟百官用度既已殷廣下及工商流寓僮僕不親農桑而遊食者以十萬計不思開立美利而望國足人給豈不難哉古人言曰飢寒並至堯舜不能使野無寇盜貧富并兼雖皋陶不能使強不陵弱故有國有家者何嘗不務農重穀近魏武皇帝用棗祗韓浩之議廣建屯田又于征伐之中分帶甲之士隨宜開墾故下不甚勞而大功克舉也間者流人奔東吳東吳今儉皆已還反江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官天勞報賞皆如魏氏故事一年中與百姓二年分稅三年計賦稅以使之公私兼濟則倉盈庾億可計日而待也昔高祖使蕭何鎮關中光武令寇恂守河內魏武委鍾繇以西事故能使八表夷蕩區內輯寧今中蕭條未蒙疆理此兆庶所以企望壽春一方之會去此不遠宜選都督有文武經略者遠以振河洛之形勢近以為徐豫之藩鎮綏集流散使人有攸依專委農功令事有所局趙充國農于金城以平西零譇葛亮耕于渭濱規抗上國今諸軍自不對敵皆宜齊課晉書食貨志又通典二大興中三吳大飢後軍將軍應詹上表上疏陳便宜先王設官使君有常尊臣有定卑上無苟且之志下無覬覦之心下至亡秦罷侯置守本替末陵綱紀廢絶漢興雖未能興復舊典猶雜建侯守故能享年享世殆參古迹今大荒之後制度改創宜因斯會釐正憲則先舉盛德元功以為封首則聖世之化比隆唐虞矣性相近習相遠訓導之風宜慎所好魏正始之間蔚為文林元康以來賤經尚道以玄虛宏放為夷達以儒術清儉為鄙俗望白署空顯以台衡之望尋文謹案目以蘭薰之器永嘉之弊未必不由此也今雖有儒官教養未備非所以長育人材納之軌物也宜修辟雍崇明教義先令國子受訓然後皇儲親臨釋奠則普天尚德率土知方矣晉書應詹傳又文選干寶晉記總論注引晉紀兩條上疏讓封觀陽侯臣聞開國承家光啓土宇唯令德元功乃宜封錫臣雖忝當一隊策無微略勞不汗馬猥以疏賤倫亞親密暫廁被練列勤司勳乞回謬恩聽其所守晉書應詹傳為江州臨行上疏夫欲用天下之智力者莫若使天下信之也商鞅移木豈禮也哉有由而然自經荒弊綱紀頽陵清直之風既澆糟粃之俗猶在誠宜濯以滄浪之流漉以吞舟之網則幽顯明別於變時雍矣弘濟茲務在乎官人今南北雜錯屬託者無保負之纍而輕舉所知此博采所以未精職理所以多闕今凡有所用宜隨其能否而與舉主同乎褒貶則人有慎舉之恭官無廢職之吝昔冀缺有功胥臣蒙先茅之賞子玉敗軍子文受蒍賈之責古既有之今亦宜然漢朝使刺州行部乘傳奏事猶恐不足以辨彰幽明弘宣政道故復有繡衣直指今之艱弊過于往昔宜分遣黃散若中書郎等循行天下觀採得失舉善彈違斷截苟且則人不敢為非矣漢宣帝時二千石有居職修明者則入為公卿其不稱職免官者皆還為平人懲勸必行故歷世長久中間以來遷不足競免不足懼或有進而失意退而得分蒞官雖美當以素論降替在職實劣直以舊望登敘校遊談為多少不以實事為先後以此責成臣未見其兆也今宜峻左降舊制可二千石免官三年乃得敘用長史六年戶口折半道里倍之此法必明使天下知官難得而易失必人慎其職朝無惰官矣都督可課佃二十頃州十頃郡五頃縣三頃皆取文武吏醫卜不得撓亂百姓三臺九府中外諸軍有可減損皆令附農市息末伎道無遊人不過一熟豐穰可必然後重居職之俸使祿足以代耕頃大事之後遐邇皆想宏略寂然未副宜早振綱領肅起群望晉書應詹傳啓呈杜韜書並上言韜益州秀才素有清望文理既優幹事兼美往因使流寓居詹郡界其貞心堅白詹所委究李驤為變樂鄉劫略良善韜時出家財招募忠勇登壇歃血義誠慷慨會驤攻燒南平韜遂東下巴漢與湘中鄉人相遇推其素望遂相憑結論韜本情非首作亂階者也然破湘川實韜之罪亦由兵交其間遂使滋蔓案韜今書血誠亦至矣昔朱鮪自疑于洛陽光武指河水以明心鮪感義歸誠終展力報施受封侯之寵由恕過以録功也詹竊謂今者當圮運之會思弘遠猷故齊赦射鉤之誅晉貰斬袪之戮用能濟翼戴之高勳隆一匡之美譽況韜等素無斯愆而稽顙投命邪以為可遣大使宣揚聖旨雲澤沾之于上百姓沐浴于下則上下交泰江左無風塵之虞矣晉書杜韜傳薦韋泓于元帝自遭喪亂人士易操至乃任運固窮耿介守節者鯊矣伏見議郎韋泓年三十八字元量執心清沖才識備濟躬耕隴畝不煩人役靜默居常不豫政事昔年流移來在詹境經寇喪資一身特立短褐不掩形莩蔬不充朝而抗志彌厲不遊非類顏回不改其樂泓有其分明公輔亮皇室恢維宇宙四門開闢英彥鳧藻收春花于京輦採秋實于巖藪而泓抱璞荊山未剖和璧若蒙銓召付以列曹必能協隆鼎味緝熙庶績者也晉書應詹傳疾篤與陶侃書每憶密計自沔入湘頡頏繾綣齊好斷金子南我東忽然一紀其間事故何所不有足下建功嶠南旋鎮舊楚吾承乏幸會來忝此州圖與足下進共竭節本朝報恩幼主退以申尋平生纏綿舊好豈悟時不我與長即幽冥永言莫從能不慨悵今神州未夷四方多難足下年德並隆功名俱盛宜務建洪範雖休勿休至公至平至謙至順即自天祐之吉無不利人之將死其言也善足下察吾此誠晉書應詹傳讓著作表自司隸校尉奉至臣父五世著作不絶邦族以為美談崔駰三世相繼其後無聞若乃談遷接武彪固踵迹向歆著美亦各一世之良史也書鈔五十七引應亨集讓著作表又見初學記十二通典二十六與州將箋誨命欲求佳別駕自頃諸府大開搜延路廣海無遺蚌山無逸璞僕歸數日臥思始得一人陳國有袁琇字惠瑛者才識可以經于治亂棲跱可以勸礪後進亨具所服聞而未嘗接顏文言也又宗令文早有名輩相與通家門素所具抑亦其次御覽二百六十三又與州將箋夫公正治化之本德教之基公則無私正則無邪無私無邪而患政教之不行未之有也昔叔向論叔魚之罪石碏討石厚之亂祁奚稱解狐之賢臧紇思孟孫之愛春秋嘉之敦崇世教經乎百王厝乎盛衰其義不傾公正之德宏矣希矣明君之所以總天下賢臣之所以奉君上士庶之所以繫仰德化之所以美盛公正也可不勉哉御覽四百二十九應翊像讚序王莽居攝以病告歸後赤眉賊攻其所居城糧盡翌以私穀數十萬斛賑城中于時粟斛錢數萬民莫不稱其仁御覽三十五又八百四十贈四王冠詩序永平四年外弟王景系兄弟四人並冠故貽之詩初學記十四作後漢誤御覽五百四十諫賀龍見表昔龍降鄭時門之外子産不賀龍降夏廷沫流不禁卜藏其漦至周幽王禍釁乃發易稱潛龍勿用陽在下也證據舊典無賀龍之禮晉書劉毅傳又五行志下作昔龍漦夏廷禍發周室龍見鄭門子産不賀又見群書治要三十引晉書與今傳同因天陰上言必有阿黨之臣姦以事君者當誅而不誅故也晉書劉毅傳後陰氣解而復合毅上言云云五行志中作上疏末句作而不赦也上疏請罷中正除九品臣聞立政者以官才為本夫九品有八損而官才有三難皆興替之所由也人物難知一也愛憎難防二也情偽難明三也三者雖聖哲在上嚴刑督之猶不可治故堯求俊乂而得四凶三載考績而叨殄得成使世主雖有上聖之明而無考察之法授凡庸之才而去賞罰之勸則為聞姦豈徒四族側陋何望于時哉今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢愛憎決于心情偽由于已公無考校之負私無告訐之忌榮黨棋越威福擅行用心百態求者萬端廉讓之風滅苟且之俗成天下訩訩但爭品位不聞推讓流俗之過一至于此竊為聖朝恥之愚心之所非者不可以一概論輒條列其事夫名狀以當才為清品輩以得實為平治亂安危之要不可不允清平者政化之美也枉濫者亂敗之惡也不可不察然人才異能備體者寡器有大小達有早晚前鄙後修宜受日新之報抱正違時宜有質直之稱度遠闕小宜得殊俗之狀任直不飾宜得清實之譽行寡才優宜獲器任之用是以三仁殊塗而同歸四子異行而鈞義陳平韓信笑侮于邑里而收功于帝王屈原伍胥不容于人主而顯名于竹帛是篤論之所明也今之中正不精才實務依黨利不鈞稱尺務隨愛憎所欲舉者獲虛以成譽所欲下者吹毛以求疵前鄙後修者則引古以病今古賢今病者則考虛以覆過質直者罪以違時阿容者善其得和度遠者責以小檢才近者美其合俗齊量者以己為限高下逐強弱是非由愛憎憑權附黨毀平從親隨世興衰不顧才實衰則削下興則扶上一人之身旬日異狀或以貨賂自通或以計協登進附託者必達守道者困悴無報于身必見割奪有私于己必得其欲凌弱黨強以植後利是以上品無寒門下品無勢族暨時有之皆曲有故慢主罔時實為亂源損政之道一也置州都者本取州里清識咸所歸服將以鎮異同一言議不謂一人之身了一州之才一人不審便為坐廢若然自仲尼之聖以上至于庖犧莫不有過失則皆可廢何獨責于中人者哉若殊不修自可更選今重其任而輕其人所立品格還訪刁攸攸非州里之所歸非職分之所置今訪之歸正于所不服決事于所不職以長讒搆之源以生乖爭之兆似非立都之本旨理俗之深防也主者既善刀攸攸之所下而復選以二千石已有數人劉良上攸之所下石公罪攸之所行駮違之論橫于州里嫌讎之隙結于大臣夫桑妾之訟禍及吳楚鬭雞之變難興魯邦況乃人倫交爭而部黨興刑獄滋生而禍根結損政之道二也本立格之體將謂人倫有序若貫魚成次也為九品者取下者為格謂才德有優劣倫輩有首尾也今之中務自遠者則仰割一國使無上人穢劣下比則拔舉非次并容其身公以為格坐徇其私君子無小人之怨官政無繩姦之防使得上欺明主下亂人倫乃使優劣易地首尾倒錯推貴異之器使在凡品之下負戴不肖越在成人之首損政之道三也陛下踐阼開天地之德弘不諱之詔納忠直之言以覽天下之情太平之基不世之法也然賞罰自王公以至于庶人無不加法置中正委以一國之重而無賞罰之防人心多故清平者寡故怨訟者衆聽之則告訐無己禁絶則侵枉無極與其理訟之煩猶俞侵枉之害今禁訟訴則杜一國之口培一人之勢使得縱橫無所顧憚諸受枉者抱怨積直獨不蒙天地無私之德而長壅蔽于邪人之銓使上明不下照下情不上聞損正之道四也昔在前聖之世欲敦風俗鎮靜百姓隆鄉黨之義崇六親之行禮教庠序以相率賢不肖于是見矣然鄉老書其善以獻天子司馬論其能以官于職有司考績以明黜陟故得天下之人退而修本州黨有德義朝廷有公正天下大治浮華邪佞無所容厝今一國之士多者千數或流徙異邦或給役殊方猶不識其面況能盡其才力乎而中正知與不知將定品狀必采譽于臺府納毀于流言任己則有不識之蔽聽受則有彼此之偏所知者以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之譽又非朝廷考績之課遂使進官之人棄近求遠背本趨末位以求成不由行立品不校功黨譽虛妄損政之道五也凡所以立品設狀者求人才以理物也非虛飾名譽相為好醜雖孝悌之行不施朝廷故門外之事以義斷恩既以在官職有大小事有劇易各有功報此人才之實效功分之所得也今則反之于限當報雖職之高還附卑品無績于官而獲高敘是為抑功實而隆虛名也故狀無實事諧文浮飾品不校功黨譽虛妄上奪天朝考績之分下長浮華朋黨之事損政之道六也凡官不同事人不同能得其能則成失其能則敗今九品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨繫縶選舉使不得精于才宜況今九品所疏則削其長所親則飾其短徒結白論以為虛譽以治風俗則狀無實行以宰官職則品不料能百揆何以得理萬機何以得修損政之道七也前九品詔書善惡必書以為褒貶當時天下少有所忌今之九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷清濁同流以植其私故反違前品大其行勢以驅動衆人使必歸已進者無功以表勸退者無惡以成懲懲勸不明則風俗汙濁天下之人焉得不懈于德行而鋭于人事乎損政之道八也由此論之選中正而非其人授權勢而無賞罰或缺中正而無禁檢故邪黨得肆枉濫從橫雖職名中正實為姦府事名九品而有八損或恨結于親親猜生于骨肉當身困于敵讎子孫離其殃咎斯乃歷世之患非徒當今之害也是以時主觀時立法防姦消亂靡有常制故周因于殷有所損益至于中九品上聖古賢皆所不為豈蔽于此事而有不周哉將以政化之宜無取于此也自魏立以來未見其得人之功而生讎薄之纍毀風敗俗無益于化古今之失莫大于此愚臣以為宜罷中正除九品棄魏氏之弊法更立一代之美制愚臣以為便也晉書劉毅傳又群書治要三十引晉書又通典十四又略見御覽二百六十五引劉毅集奏劾劉肇南郡太守劉肇以布五十匹雜物遺前豫州刺史王戎請檻車徵付廷尉治罪除名終身駁有司奏琅邪王倫事王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪當以親貴議減不得闕而不論宜自于一時法中如友所正晉書趙王倫傳倫坐使散騎將劉緝買工所將盜御裘廷尉杜友正緝棄市倫當與緝同罪有司奏倫爵重屬親不可坐諫議大夫劉毅駮奏劾王渾謹案司徒王渾蒙國厚恩備位鼎司不能上佐天子調和陰陽下遂萬物之宜使卿大夫各得其所敢因劉輿距扞詔使私欲大府興長獄訟昔陳平不答漢文之問邴吉不問死人之變誠得宰相之體也既興刑獄怨懟而退舉動輕速無大臣之節請免渾官右長史楊丘亭侯劉肇便辟善柔苟于阿順請大鴻臚削爵土晉書劉暾傳司徒王渾王簿劉輿獄辭連暾將收付廷尉渾不欲使府有過欲距劾自舉之與暾更相曲直渾怒便遜位還第暾乃奏渾曰云云奏理羊皇后奉被手詔伏讀惶悴臣案古今書籍亡國破家毀喪宗祊皆由犯衆違人之所致也陛下遷幸舊京廓然衆庶悠悠罔所依倚家有跂踵之心人想鑾輿之聲思望大德釋兵歸農而兵纏不解處處互起豈非善者不至人情猜隔故邪今上官已犯闕稱兵焚燒宮省百姓喧駭宜鎮之以靜而大使卒至赫然執藥當詣金墉內外震動謂非聖意羊庶人門戶殘破廢放空宮門禁峻密若絶天地無緣得與姦人搆亂衆無智愚皆謂不然刑書猥至罪不值辜人心一憤易致興動夫殺一人而天下喜悅者宗廟社稷之福也今殺一枯窮之人而令天下傷慘臣懼凶豎乘間妄生變故臣忝司京輦觀察衆心實以深憂宜當含忍不勝所見謹密啓聞願陛下更深與太宰參詳勿令遠近疑惑取謗天下晉書惠羊后傳河間王顒矯詔以后屢為姦人所立遣尚書田淑敕留臺賜后死詔書纍至司隸校尉劉暾與尚書僕射荀藩河南尹周馥馳上奏曰云云劉暾傳作上表理后無罪
