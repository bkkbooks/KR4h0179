body:
  text: 卷九十九陸機五等諸侯論夫體國經野先王所慎創制垂基思隆後葉然而經略不同長世異術五等之制始於黃唐郡縣之治創自秦漢得失成敗備在典謨是以其詳可得而言夫先王知帝業至重天下至曠曠不可以偏制重不可以獨任任重必於借力制曠終乎因人故設官分職所以輕其任也並建五長所以弘其制也於是乎立其封疆之典財其親踈之宜使萬國相維以成盤石之固宗庶雜居以定維城之業又有以見綏世之長御識人情之大方知其為人不如厚己利物不如圖身安上在於悅下為己在乎利人故易曰悅以使民民忘其勞孫卿曰不利而利之不如利而後利之之利也是以分天下以厚樂而己得與之同憂饗天下以豐利而我得與之共害利博則恩篤樂遠則憂深故諸侯享食土之實萬國受世及之祚矣夫然則南面之君各務其治九服之民知有定主上之子愛于是乎生下之體信於是乎結世治足以敦風道衰足以禦暴故強毅之國不能擅一時之勢雄俊之士無所寄霸王之志然後國安由萬邦之思治主尊賴群后之圖身譬猶眾目營方則天網自昶四體辭難而心膂獲乂三代所以直道四王所以垂業也夫盛衰隆敝理所固有教之廢興繫乎其人愿法期於必涼明道有時而闇故世及之制敝於強禦厚下之典漏於末折侵弱之釁遘自三季陵夷之禍終于七雄昔者成湯親照夏后之鑒公旦目涉商人之戒文質相濟損益有物故五等之禮不革于時封畛之制有隆焉爾者豈玩二王之禍而闇經世之算乎固知百世非可懸御善制不能無敝而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始權其多福慮終取其少禍非謂侯伯無可亂之符郡縣非致治之具也故國憂賴其釋位主弱憑其翼戴及承微積敝王室遂卑猶保名位祚垂後嗣皇統幽而不輟神器否而必存者豈非事勢使之然歟降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨饗其利主憂莫與共害雖速亡趣亂不必一道顛沛之釁實由孤立是蓋思五等之小怨忘萬國之大德知陵夷之可患闇土崩之為痛也周之不競有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝振矜遠國先叛故強晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能闚關勝廣之敢號澤哉借使秦人因循周制雖則無道有與共弊覆滅之禍豈在曩日漢矯秦枉大啟侯王境土踰溢不遵舊典故賈生憂其危晁錯痛其亂是以諸侯阻其國家之富憑其士民之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黥徒西京病於東帝是蓋過正之災而非建侯之累也然呂氏之難朝士外顧宋昌策漢必稱諸侯逮至中葉忌其失節割削宗子有名無實天下曠然復襲亡秦之軌矣是以五侯作威不忌萬邦新都襲漢易於拾遺也光武中興纂隆皇統而猶遵覆車之遺轍養喪家之宿疾僅及數世姦軌充斥卒有強臣專朝則天下風靡一夫縱橫則城池自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑征鼙震於閫宇鋒鏑流乎絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄惠振於晉鄭豈若二漢階闥暫擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志歟蓋遠績屈於時異雄心挫於卑勢爾故烈士扼腕終委寇仇之手中人變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奧主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救劫弒之禍民望未改而已見大漢之滅矣或以諸侯世位不必常全昏主暴君有時比跡故五等所以多亂今之牧守皆以官方庸能雖或失之其得固多故郡縣易以為治夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何則其不治哉故先代有以之興矣苟或衰陵百度自悖鬻官之吏以貨準才則貪殘之萌皆如群后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為利圖物何以徵之蓋企及進取仕子之常志修己安民良士之所希及夫進取之情銳而安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為己土眾皆我民民安己受其利國傷家嬰其病故前人欲以垂後後嗣思其堂搆為上無苟且之心群下知膠固之義使其並賢居治則功有厚薄兩愚處亂則過有深淺然則探八代之制幾可以一理貫秦漢之典殆可以一言蔽矣演連珠五十首演連珠五十首臣聞日薄星迴穹天所以紀物山盈川沖后土所以播氣五行錯而致用四時違而成歲是以百官恪居以赴八音之離明君執契以要克諧之會臣聞任重於力才盡則困用廣其器應博則凶是以物勝權而衡殆形過鏡則照窮故明主程才以效業貞臣底力而辭豐臣聞髦俊之才世所希乏丘園之秀因時則揚是以大人基命不擢才於后土明主聿興不降佐於昊蒼臣聞世之所遺未為非寶主之所珍不必適治是以俊乂之藪希蒙翹車之招金碧之巖必辱鳳舉之使臣聞祿放於寵非隆家之舉官私於親非興邦之選是以三卿世及東國多衰弊之政五侯並軌西京有陵夷之運臣聞靈輝朝覯稱物納照時風夕灑程形賦音是以至道之行萬類取足於世大化既洽百姓無匱於心臣聞頓網探淵不能招龍振綱羅雲不必招鳳是以巢箕之叟不眄丘園之幣洗渭之民不發傅巖之夢臣聞鑑之積也無厚而照有重淵之深目之察也有畔而眡周天壤之際何則應事以精不以形造物以神不以器是以萬邦凱樂非悅鐘鼓之娛天下歸仁非感玉帛之惠臣聞積實雖微必動於物崇虛雖廣不能移心是以都人冶容不悅西施之影乘馬班如不輟太山之陰臣聞應物有方居難則易藏器在身所乏者時是以充堂之芳非幽蘭所難繞梁之音實縈絃所思臣聞智周通塞不為時窮才經夷險不為世屈是以凌飆之羽不求反風曜夜之目不思倒日臣聞忠臣率志不謀其報貞士發憤期在明賢是以柳莊黜殯非貪瓜衍之賞禽息碎首豈要先茅之田臣聞利眼臨雲不能垂照朗璞蒙垢不能吐暉是以明哲之君時有蔽壅之累俊乂之臣屢抱後時之悲臣聞郁烈之芳出於委灰繁會之音生於絕絃是以貞女要名於沒世烈士赴節於當年臣聞良宰謀朝不必借威貞士衛主脩身則足是以三晉之強屈於齊堂之俎千乘之勢弱於陽門之哭臣聞赴曲之音洪細入韻蹈節之容俯仰依詠是以言苟適事精粗可施士苟適道修短可命臣聞因雲灑潤則芬澤易流乘風載響則音徽自遠是以德教俟物而濟榮名緣時而顯臣聞覽影偶質不能解獨指跡慕遠無救於遲是以循虛器者非應物之具玩空言者非致治之機臣聞鑽燧吐火以續湯谷之晷揮翮生風而繼飛廉之功是以物有微而毗著事有瑣而助洪臣聞春風朝煦蕭艾蒙其溫秋霜宵墜芝蕙被其涼是以威以齊物為肅德以普濟為弘臣聞性之所期貴賤同量理之所極卑高一歸是以準月稟水不能加涼晞日引火不必增輝臣聞巧盡於器習數則貫道繫於神人亡則滅是以輪匠肆目不乏奚仲之妙瞽叟清耳而無伶倫之察臣聞絕節高唱非凡耳所悲肆義芳訊非庸聽所善是以南荊有寡和之歌東野有不釋之辯臣聞尋烟染芬薰息猶芳徵音錄響操終則絕何則垂於世者可繼止乎身者難結是以玄晏之風恒存動神之化已滅臣聞託闇藏形不為巧密倚智隱情不足自匿是以重光發藻尋虛捕景大人貞觀探心昭忒臣聞披雲看霄則天文清澄風觀水則川流平是以四族放而唐劭二臣誅而楚寧臣聞音以比耳為美色以悅目為歡是以眾聽所傾非假北里之操萬夫婉孌非俟西子之顏故聖人隨世以擢佐明主因時而命官臣聞出乎身者非假物所隆牽乎時者非克己所勖是以利盡萬物不能叡童昏之心德表生民不能救捿遑之辱臣聞動循定檢天有可察應無常節身或難照是以望景揆日盈數可期撫臆論心有時而謬臣聞傾耳求音眡優聽苦澄心徇物形逸神勞是以天殊其數雖同方不能分其慼理塞其通則並質不能共其休臣聞遯世之士非受匏瓜之性幽居之女非無懷春之情是以名勝欲故偶影之操矜窮愈達故凌霄之節厲臣聞聽極於音不慕鈞天之樂身足於蔭不假垂天之雲是以蒲密之黎遺時雍之世豐沛之士忘桓撥之君臣聞飛轡西頓則離朱與矇瞍收察懸景東秀則夜光與珷玞匿耀是以才換世則俱困功偶時而並劭臣聞示應於近遠有可察託驗於顯微或可包是以寸管下傃天地不能以氣欺尺表逆立日月不能以形逃臣聞絃有常音故曲終則改鏡無畜影故觸形則照是以虛己應物必究千變之容挾情適事不觀萬殊之妙臣聞柷敔希聲以諧金石之和鼙鼓踈擊以節繁絃之契是以經治必宣其通圖物恒審其會臣聞目無常音之察耳無照景之神故在乎我者不誅之於己存乎物者不求備於人臣聞放身而居體逸則安肆口而食屬厭則充是以王鮪登俎不假吞波之魚蘭膏停室不思銜燭之龍臣聞衝波安流則龍舟不能以漂震風洞發則夏屋有時而傾何則牽乎動則靜凝係乎靜則動貞是以淫風大行貞女蒙冶容之誨淳化殷流盜跖挾曾史之情臣聞達之所服貴有或遺窮之所接賤而必尋是以江漢之君悲其墜屨少原之婦哭其亡簪臣聞觸非其類雖疾不應感以其方雖微則順是以商飆漂山不興盈尺之雲谷風乘條必降彌天之潤故闇於治者唱繁而和寡審乎物者力約而功峻臣聞烟出於火非火之和情生於性非性之適故火壯則烟微性充則情約是以殷墟有感物之悲周京無佇立之跡臣聞適物之技俯仰異用應事之器通塞異任是以鳥栖雲而繳飛魚藏淵而網沉賁鼓密而含響朗笛踈而吐音臣聞理之所守勢所常奪道之所閉權所必開是以生重於利故據圖無揮劍之痛義重於身故臨川有投跡之哀臣聞圖形於影未盡纖麗之容察火於灰不覩洪赫之烈是以問道存乎其人觀物必造其質臣聞通於變者用約而利博明其要者器淺而應玄是以天地之賾該於六位萬殊之曲窮於五絃臣聞情見於物雖遠猶踈神藏於形雖近則密是以儀天步晷而脩短可量臨淵揆水而淺深難察臣聞虐暑薰天不減堅冰之寒涸陰凝地無累陵火之熱是以吞縱之強不能反蹈海之志漂鹵之威不能降西山之節臣聞理之所開力所常達數之所塞威有必窮是以烈火流金不能焚景沉寒凝海不能結風臣聞足於性者天損不能入貞於期者時累不能淫是以迅風陵雨不謬晨禽之察勁陰殺節不凋寒木之心丞相箴夫導民在簡為政以仁仁實生愛簡亦易遵罔疏下睦禁密巧繁深文碎教伊何能存故人不可以不審任不可以不忠捨賢昵讒則喪爾邦且偏見則昧專聽悔疑耳目之用亦各有期夫豈不察而帷牆隔之矜己任智是蔽是欺德無遠而不復惡何適而不追存亡日鑒成敗代陳人咸知鏡其貌而莫能照其身吳大帝誄皇聖膺期有命太素承亂下萌清難天步我皇明明固天寔生體和二合以察三精濯暉育慶懷祥載榮率性而和因心則靈厥靈伊何克聖克仁茂對四象克配乾坤齊明日月考詳鬼神誕自幼沖叡哲宿照甄化無形探景絕曜巍巍聖姿文武既俊有覺德徽兆民欣順將熙景命經營九圍登跡岱宗班瑞舊圻上玄匪惠早零聖暉神廬既考史臣獻貞龍輴啟殯霄載紫庭辰旒飛藻凶旗舉銘崇華熠爍翠蓋繁纓千乘結駟萬騎重營簫鼓振響和鑾流聲動軫閶闔永背承明顯步萬官幽驅百靈隨化太素即宮杳冥億兆同慕泣血如零吳太常顧譚誄遷吏部尚書才長於銓衡而綜核人物文選卷三八任昉為范尚書讓吏部封侯第一表注引吳大司馬陸公誄我公承軌高風肅邁明德繼體徽音奕世昭德伊何克俊克仁德周能事體合機神禮交徒候敬睦白屋踧踖曲躬吐食揮沐爰及鰥寡賑此惸獨孚厥惠和脫驂分祿乃命我公誕作元輔位表百辟名茂群后因是荊人造我寧宇備物典策主冠及斧龍旂飛藻靈鼓樹羽質文殊塗百行異轍人玩其華鮮識其實於穆我公因心則哲經綸至道終始自結德與行滿美與言溢愍懷太子誄明明皇子成命既駿保乂皇家載生淑胤茂德克廣仁姿朗雋當克無疆光紹有晉如何不吊暴離咎艱曾是遘愍匪降自天肇傾運祚遂喪華年嗚呼哀哉沉雲既祛日月增暉靈寵可贈冤魂難追舊物東反靈柩西歸傷我惠后寂焉翳滅銜哀駿奔凶服就列追慕徽塵興言斷絕敢誄遺風庶存芳烈其辭曰巍巍皇基奕奕紫微有命既集天祿永綏篤生太子纂德承茂平紹大烈時惟洪冑奇穎發翹清藻在秀誕自幼蒙逮事武皇展矣太子播此瓊芳允矣聖祖無言不臧婉孌乘輿名裕德昌龍集庚戌日月改度赫赫明明我皇登祚厥登伊何皇統是荷華紱重采翠蓋垂葩鸞旗阿那玉衡吐和聿來在宮體亮而誠肅雍皇極思媚紫庭亦既涉學遵師盛道何年之妙而察之早讜言必復乖義則考惟天有命太子膺之惟皇有慶太子承之當究遐年登茲胡耇緝熙有晉克構帝宇如何晨牝穢我朝聽仰索皇家惟臣明聖惴惴太子終溫且敬銜辭即罪掩淚祗命顯加放流潛肆鴆毒痛矣太子乃離斯酷謂天蓋高訴哀靡告鞠躬引分顧景摧剝嗚呼哀哉凡民之喪有戚有姻太子之歿傍無昵親跼蹐嚴宮絕命禁闈幽柩偏寄孤魂曷歸嗚呼太子生冤歿悲匹夫有怨尚或殯霜矧乃太子萬邦攸望普天扼腕率土懷傷精感六沴咎徵紫房爰茲元輔啟我令圖王赫斯怒天誅靡逋攙搶叱掃元凶服辜仁詔引咎哀策東徂光復寵祚紹建藐孤於時暉服粲焉畢陳庭旅舊物堂有故臣孰云太子不見其人嗚呼哀哉既濟洛川靈旆左廻三軍悽裂都邑如隤慨矣寤歎念我愍懷毗陵侯君誄同志奔走戚友相尋臨穴嗚乎洒淚山林北堂書鈔一百五十八晉劉處士參妻王氏夫人誄猗猗嘉穎朝陽方翹烈風嚴霜殞此秀條璇璣倏忽四序競征清商激宇蟋蟀吟櫺吳大司馬陸公少女哀辭吳大司馬陸公少女哀辭冉冉晞陽不遂其茂曄曄芳華彫芳落秀遵堂涉室髣髴興想人皆有聲爾獨無響吳丞相陸遜銘吳丞相陸遜銘魏大司馬曹休侵我北鄙乃假公黃鉞統御六師及中軍禁衛而攝行王事主上執鞭百司屈膝三國志吳書陸邈傳注引弔蔡邕文彼洪川之方割豈一簣之所堙故尼父之惠訓智必愚而後賢諒知道之已妙曷信道之未堅忽甯子之保己效萇叔之違天冀澄河之遠日忘朝露之短年吊魏武帝文一首并序吊魏武帝文一首并序元康八年機始以臺郎出補著作游乎秘閣而見魏武帝遺令慨然歎息傷懷者久之客曰夫始終者萬物之大歸死生者性命之區域是以臨喪殯而後悲覩陳根而絕哭今乃傷心百年之際興哀無情之地意者無乃知哀之可有而未識情之可無乎機答之曰日蝕由乎交分山崩起於朽壤亦云數而已矣然百姓怪焉者豈不以資高明之質而不免卑濁之累居常安之勢而終嬰傾離之患故乎夫以迴天倒日之力而不能振形骸之內濟世夷難之智而受困魏闕之下已而格乎上下者藏於區區之木光于四表者翳乎蕞爾之土雄心摧於弱情壯圖終於哀志長算屈於短日遠跡頓於促路嗚呼豈特瞽史之異闕景黔黎之怪頹岸乎觀其所以顧命冢嗣貽謀四子經國之略既遠隆家之訓亦弘又云吾在軍中持法是也至於小忿怒大過失不當效也善乎達人之讜言矣持姬女而指季豹以示四子曰以累汝因泣下傷哉曩以天下自任今以愛子託人同乎盡者無餘而得乎亡者無存然而婉孌房闥之內綢繆家人之務則幾乎密與又曰吾婕妤妓人皆著銅雀臺於臺堂上施八尺床繐帳朝晡上脯糒之屬月朝十五日輒向帳作妓汝等時時登銅雀臺望吾西陵墓田又云餘香可分與諸夫人諸舍中無所為學作履組賣也吾歷官所得綬皆著藏中吾餘衣裘可別為一藏不能者兄弟可共分之既而竟分焉亡者可以勿求存者可以勿違求與違不其兩傷乎悲夫愛有大而必失惡有甚而必得智慧不能去其惡威力不能全其愛故前識所不用心而聖人罕言焉若乃繫情累於外物留曲念於閨房亦賢俊之所宜廢乎於是遂憤懣而獻吊云爾接皇漢之末緒值王塗之多違佇重淵以育鱗撫慶雲而遐飛運神道以載德乘靈風而扇威摧群雄而電擊舉勍敵其如遺指八極以遠略必翦焉而後綏釐三才之闕典啟天地之禁闈舉修網之絕紀紐大音之解徽掃雲物以貞觀要萬塗而來歸丕大德以宏覆援日月而齊暉濟元功於九有固舉世之所推彼人事之大造夫何往而不臻將覆簣於浚谷擠為山乎九天苟理窮而性盡豈長算之所研悟臨川之有悲固梁木其必顛當建安之三八實大命之所艱雖光昭於曩載將稅駕於此年惟降神之綿邈眇千載而遠期信斯武之未喪膺靈符而在茲雖龍飛於文昌非王心之所怡憤西夏以鞠旅泝秦川而舉旗踰鎬京而不豫臨渭濱而有疑冀翌日之云瘳彌四旬而成災詠歸塗以反旆登崤澠而朅來次洛汭而大漸指六軍曰念哉伊君王之赫奕寔終古之所難威先天而蓋世力盪海而拔山厄奚險而弗濟敵何強而不殘每因禍以禔福亦踐危而必安迄在茲而蒙昧慮噤閉而無端委軀命以待難痛沒世而永言撫四子以深念循膚體而穨歎迨營魄之未離假餘息乎音翰執姬女以嚬瘁指季豹而漼焉氣衝襟以嗚咽㖒垂睫而汍瀾違率土以靜寐戢彌天乎一棺咨宏度之峻邈壯大業之允昌思居終而恤始命臨沒而肇揚援貞吝以惎悔雖在我而不臧惜內顧之纏綿恨末命之微詳紆廣念於履組塵清慮於餘香結遺情於婉孌何命促而意長陳法服於帷座陪窈窕於玉房宣備物於虛器發哀音於舊倡矯戚容以赴節掩零淚而薦觴物無微而不存體無惠而不亡庶聖靈之響像想幽神之復光苟形聲之翳沒雖音景其必藏徽清絃而獨奏進脯糒而誰嘗悼繐帳之冥漠怨西陵之茫茫登雀臺而群悲眝美目其何望既睎古以遺累信簡禮而薄葬彼裘紱於何有貽塵謗於後王嗟大戀之所存故雖哲而不忘覽遺籍以慷慨獻茲文而悽傷
