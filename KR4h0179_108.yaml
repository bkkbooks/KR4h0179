body:
  text: 劉琨為并州刺史到壺關上表臣以頑蔽志望有限因緣際會遂忝過任九月末得發道險山峻胡寇塞路輒以少擊衆冒險而進頓伏艱危辛苦備嘗即日達壺口關臣自涉州疆目覩困乏流移四散十不存二攜老扶弱不絶于路及其在者鬻賣妻子生相捐棄死亡委危白骨橫野哀呼之聲感傷和氣群胡數萬周匝四山動足遇掠開目覩寇唯有壺關可得告糴而此二道九州之險數人當路則百夫不敢進公私往反沒喪者多嬰守窮城不得薪采耕牛既盡又乏田器以臣愚短當此至難憂如循環不遑寢食臣伏思此州雖云邊朔實邇皇畿南通河內東連司冀北捍殊俗西禦強虜是徑弓良馬勇士精鋭之所出也當須委輸乃全其命今上尚書請此州穀五百萬斛絹五百萬匹綿五百萬斤願陛下時出臣表速見聽處晉書劉琨傳請封索頭猗盧為代郡公表晉書劉琨傳宋書索虜傳請增荀藩位號表司空荀藩朝廷之舊臣奕世忠勤乃心皇家具瞻之望唯藩而已宜增位號授分陝之重永令臣等有所憑準御覽二百八引荀氏家傳謝拜大將軍都督并州表陛下略臣大愆録臣小善猥蒙天恩光授殊寵顯以蟬冕之榮崇以上將之位伏省詔書五情飛越臣聞晉文以郤縠為元帥而定霸功高祖以韓信為大將而成王業咸有敦詩閲禮之德戎昭果毅之威故能振豐功于荊南拓洪基于河北況臣凡陋擬蹤前哲俯懼折鼎慮在覆餗昔曹沫三北而收功于柯盟馮異垂翅而奮翼于澠池皆能因敗為成以功補過陛下宥過之恩已隆而臣自新之善不立臣雖不逮預聞前訓恭讓之節臣猶庶幾所以冒承寵命者實欲沒身報國輒死自效要以致命寇場盡其臣節至于寵榮之施非言辭所謝又謁者史蘭殿中中郎王春等繼至奉詔臣俯尋聖旨伏紙飲淚臣聞夷險流行古今代有靈厭皇德曾未悔禍蟻狄縱毒于神州夷裔肆虐于上國七廟闕禋祀之饗百官喪彝倫之序梓宮淪辱山陵未兆率土永慕思同考妣陛下龍姿日茂睿質彌光升區宇于既穨崇社稷于已替四海之內肇有上下九服之萌復覩典制伏惟陛下蒙塵于外越在秦郊蒸嘗之敬在心桑梓之思未克臣備位歷年才質駑下丘山之釁已彰亮釐之效未著頃以時宜權假位號竟無殪戎之績而有負乘之纍當肆刑書以明黜陟是以臣前表上聞敢緣愚款乞奉先朝之班苟存偏師之職赦其三敗之愆收其一功之用得騁志虜場快意大逆雖身膏野草無恨黃墟陛下偏恩過隆曲蒙擢拔遂授上將位兼常伯征討之務得從事宜拜命驚惶五情戰悸懼于隕越以為朝羞昔申胥不徇伯舉而成公壻之勳伍員不從城父而濟入郢之庸臣雖頑凶無覬古人其于被堅執鋭致身寇讎所謂天地之施群生莫謝不勝受恩至深謹拜表陳聞晉書劉琨傳又表逆胡劉聰敢率犬羊馮陵輦轂人神發憤遐邇奮怒伏省詔書相國南陽王保太尉涼州刺史軌糾合二州同恤王室冠軍將軍允護軍將軍綝總齊六軍戮力國難王旅大捷俘馘千計旌旗首于晉路金鼓振于河曲崤函無虔劉之警汧隴有安業之慶斯誠宗廟社稷陛下神武之所致含氣之類莫不引領況臣之心能無踊躍臣前表當與鮮卑猗盧剋今年三月都會平陽會胸羯石勒以三月三日徑掩薊城大司馬博陵公浚受其偽和為勒所虜勒勢轉盛欲來襲臣城塢駭懼志在自守又猗盧國內欲生姦謀幸盧警慮尋皆誅滅遂使南北顧慮用愆成舉臣所以泣血宵吟扼腕長歎者也勒據襄國與臣隔山寇騎朝發夕及臣城同惡相求其徒實繁自東北八州勒滅其七先朝所授存者唯臣是以勒朝夕謀慮以圖臣為計窺伺間隙寇鈔相尋戎士不得解甲百姓不得在野天網雖張靈澤未及唯臣孑然與寇為伍自守則稽聰之誅進討則勒襲其後進退唯谷首尾狠狽徒懷憤踊力不從願慚怖征營痛心疾首形留所在神馳寇庭秋穀既登胡馬已肥前鋒諸軍並有至者臣當首啓戎行身先士卒臣與二虜勢不並立聰勒不梟臣無歸志庶憑陛下威靈使微意獲展然後隕首謝國沒而無恨晉書劉琨傳讓司空表晉書劉琨傳文佚勸進表否泰之運古今迭有宗子有明德曷常不由多難以隆中興故獫允殘周以啓宣王巨猾竊漢乃發光武陛下天授至德聰明神武勞謙恭己卑以自牧體伯禽經營之誠行公旦吐握之事上崇勤王之義下垂庇民之量收羅俊乂任賢以能綏爰陝東化流無外戎狄荒服請事率職重譯納貢不遠萬里功高德劭遐邇歸心況陛下道邁大宗勳莫與二且以親以賢義實兼之是以琨敢緣天文人事徵祥之應昧死上事以奉尊號願陛下無常心以群心為心忘其身以萬物為公則宗廟蒸嘗不替于今逆虜逋寇一討而滅無負于天下無愧于七后矣藝文類聚十三又表臣聞台宿在天實承辰極股肱雖卑同體元首臣負乘前朝過充三吏國之崇替有與憂喜臣聞德合兩儀者固以四海為公智周萬物者不以一身為私舜禹揖讓以陟帝位湯武征伐以濟時難彼四王者遘會不同登受有異至夫外己存物憂世遺躬其致一也期于愛民治國應變合道以為天下利而已矣況宗廟是陛下之宗廟百姓是大晉之百姓邪陛下若忽七廟之重拒天人之心絶而不繼困而不拯則宗廟不歆其禋祀群生無所措其手足矣況臣班具臣之列荷纍世之恩上懷國家之統俯絶烏鳥之情者哉昔伍員發怒手撻平王之墓灌夫慷慨身搴吳濞之旗皆能宣其臣節攄其私忿戮尸斬將存亡罔恨臣誠無若人之才實有此人之憤苟得上憑天威展其微效雖隕九泉猶以明白同上又表陛下之躬執謙光允恭克讓俯從吏議示總萬機布曠蕩之詔開自新之路海隅漸惠朔南暨聲有生之倫咸被嘉慶陛下量包宇宙明眸三辰靈祇稽應華戎同戴加以王室中微邦基將絶遺民元元屬命陛下陛下以德則無所與讓言事固所負荷誠宜遺小禮存大務援據圖録居正宸極上副祖宗之心下一兆庶之望臣聞必也正名前聖大之春秋傳曰名以出信名苟不正則事有不從信苟不立則禮義或愆乃載籍之明誡開塞之所由也同上又表建興五年三月癸未朔十八日辛丑使持節散騎常侍都督河北并冀幽三州諸軍事領護軍胸奴中郎將司空并州刺史廣武侯臣琨使持節侍中都督冀州諸軍事撫軍大將軍冀州刺史左賢王渤海公臣磾頓首死罪上書臣琨臣磾頓首頓首死罪死罪臣聞天生蒸民樹之以君所以對越天地司牧黎元聖帝明王鑒其若此知天地不可以乏饗故屈其身以奉之知黎元不可以無主故不得已而臨之社稷時難則戚藩定其傾郊廟或替則宗哲纂其祀所以弘振遐風式固萬世三五以降靡不由之臣琨臣磾頓首頓首死罪死罪伏惟高祖宣皇帝肇基景命世祖武皇帝遂造區夏三葉重光四聖繼軌惠澤侔于有虞卜年過于周氏自元康以來艱禍繁興永嘉之際氛厲彌昏宸極失御登遐醜裔國家之危有若綴旒賴先后之德宗廟之靈皇帝嗣建舊物克甄誕受欽明服膺聰哲玉質幼彰金聲夙振冢宰攝其綱百辟輔其治四海想中興之美群生懷來蘇之望不圖天不悔禍大災薦臻國未忘難寇害尋興逆胡劉曜縱逸西都敢肆犬羊陵虐天邑臣等奉表使還仍承西朝以去年十一月不守主上幽劫復沈虜庭神器流離再辱荒逆臣每覽史籍觀之前載厄運之極古今未有苟在食土之毛含氣之類莫不叩心絶氣行號巷哭況臣等荷寵三世位廁鼎司承問震惶精爽飛越且悲且惋五情無主舉哀朔垂上下泣血臣琨臣磾頓首頓首死罪死罪臣聞昏明迭用否泰相濟天命未改曆數有歸或多難以固邦國或殷憂以啓聖明是以齊有無知之禍而小白為五伯之長晉有驪姬之難而重耳主諸侯之盟社稷靡安必將有以扶其危黔首幾絶必將有以繼其緒伏惟陛下玄德通于神明聖姿合于兩儀應命世之期紹千載之運夫符瑞之表天人有徵中興之兆圖讖垂典自京畿隕喪九服崩離天下囂然無所歸懷雖有夏之遘夷羿宗姬之離犬戎蔑以過之陛下撫寧江左奄有舊吳柔服以德伐叛以刑抗明威以攝不類杖大順以肅宇內純化既敷則率土宅心義風既畼則遐方企踵百揆時敘于上四門穆穆于下昔少康之隆夏訓以為美談宣王之興周詩以為休詠況茂勳格于皇天清輝光于四海蒼生顒然莫不欣戴聲教所加願為臣妾者哉且宣王之胤惟有陛下億兆攸歸曾無與二天祚大晉必將有主主晉祀者非陛下而誰是以邇無異言遠無異望謳歌者無不吟詠徽猷獄訟者無不思于聖德天地之際既交華裔之情允洽一角之獸連理之木以為休徵者蓋有百數冠帶之倫要荒之衆不謀而同辭者動以萬計是以臣等敢考天地之心因函夏之趣昧死以上尊號願陛下存舜禹至公之情狹巢由抗矯之節以社稷為務不以小行為先以黔首為憂不以克讓為事上以慰宗廟乃顧之懷下以釋普天傾首之望則所謂生繁華于枯荑育豐肌于朽骨神人獲安無不幸甚臣琨臣磾頓首頓首死罪死罪臣聞尊位不可久虛萬機不可久曠虛之一日則尊位以殆曠之浹辰則萬機以亂方今踵百王之季當陽九之會狡寇窺窬伺國瑕隙齊人波蕩無所繫心安可以廢而不恤哉陛下雖欲逡巡其若宗廟何其若百姓何昔者惠公虜秦晉國震駭呂郤之謀欲立子圉外以絶敵人之志內以固闔境之情故曰喪君有君群臣輯穆好我者勸惡我者懼前事之不忘後代之元龜也陛下明並日月無幽不燭深謀遠慮出自胸懷不勝犬馬憂國之情遲覩人神開泰之路是以陳其乃誠布之執事臣等各忝守方任職在遐外不得陪列闕庭共觀盛禮踊躍之懷南望罔極謹上臣琨謹遣兼左長史右司馬臣溫嶠主簿臣辟閭訓臣磾遣散騎常侍征虜將軍清河太守領右長史高平亭侯臣榮劭輕車將軍關內侯臣郭穆奉表臣琨臣磾等頓首頓首死罪死罪文選藝文類聚十三晉書元帝紀上言請以樓煩等五縣地處索頭猗盧上言請以樓煩等五縣地處索頭猗盧盧兄駝有救騰之功舊勳宜録請移五縣民于新興以其地處之宋書索虜傳薦任光文伏見別駕從事任光識量簡大執心貞固使得對揚紫庭必能撫翼霜露增崇台曜任蒙亮采以弘急賢之義初學記二十上太子箋聰以七月十六日復決計送死臣即自東下率中山常山之卒並合樂平上黨諸軍未旋之間而晉陽傾潰與丞相箋不得進軍者實困無食殘民鳥散擁髮徒跣録召之日皆披林而至衣服藍縷木弓一張荊矢十發編草盛糧不盈十日夏則桑椹冬則䝁豆視此哀歎使人氣索想吳孫韓白猶或難之況以琨怯弱凡才而當率此以殄強寇書鈔一百五十六御覽三十五又四百八十九並引王隱晉書昔車騎感猗駝救州之勳表以代郡封駝為代公見聽時大駕在長安會值戎事道路不通竟未施行盧以封事見託琨實為表上追述車騎前意即蒙聽許遣兼謁者僕射拜盧賜印及符册浚以此見責戎狄封華郡誠為失禮然蓋以救斃耳亦猶浚先以遼西封務勿塵此禮之失浚實啓之浚遂與盧爭代郡舉兵擊盧為所破紛錯之由始結于此雁門郡有五縣在陘北盧新并塵官國甚強盛從琨求陘北地以並遣三萬餘家散在五縣間既非所制又于琨殘弱之計得相聚集未為失宜既徙陘北五縣著陘南盧因移頗侵逼浚西陲圍塞諸軍營浚不復見恕危弱而見罪責琨傾身竭辭北和猗盧遂引大衆躬啓戎行即具白太傅切陳愚見取賊之計聰宜時討勒不可縱而宰相意異所慮不同更憂苟晞馮嵩之徒而稽二寇之誅遣使節抑挫臣鋭氣臣即解甲遣盧衆歸國浚設壇場有所建立稱皇太子平昌以九月遇禍世子時鎮隴右故得無恙焦求雖出塞鄉有文武膽幹苟晞用為陳留太守獨在河南距當石勒撫綏有方琨以求行領兗州刺史後聞荀公以李述為兗州以素論門望不可與求同日而論至于膽幹可以處危權一時之用李述亦不能及求而王玄年少便欲共討求琨以求已與玄搆隙便召還而州界民物甚不安服述二千石及文武大姓連遣信使求刺史是以遣兄子演代求領兗州事往年春正月遣詣鄴至是斬王桑走趙固云云今勒據襄國逼近鄴城故令演轉南演今住在廩丘而李述郤鑒並欲爭兗州或云為荀公所用或云為明公所用大寇未殄而自共尋干戈此亦大潰也輒敕演謹自守而已傳長安消息主上是秦王致裘一領亦達其情耳答晉王箋謹當躬自執佩馘截二虜晉書劉琨傳與親故書吾枕戈待旦志梟逆虜常恐祖生先吾著鞭晉書劉琨傳答太傅府書僭遣使驛離間其部落淵遂怖懼一大于南奔蒲子雜虜歸降萬有餘落聰彌入上黨龐惇不能禦安居失利韓述授首封田之敗黃肅不還浹辰之間名將仍殄即重遣江陶都尉張倚領上黨太守疾據襄垣續遣鷹揚將軍趙擬梁余都尉李茂與倚并力輕行夜襲賊捐棄輜車宵遁而退追尋討截獲三分之二當聰彌之未走烏丸劉虎搆為變逆西招白部遣使致任稱臣于淵殘州困弱內外受敵輒背聰而討虎自四月八日攻圍與兄弟書單于但欲得碧汝不可不檢送之御覽八百九與兄子南兗州刺史演書前得安州乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶恆假真茶汝可信信致之御覽八百六十七又北堂書鈔一百四十四引末三句吾患體中煩悶常仰真茶汝可信致之也與石勒書將軍誕稟雄姿勇略自然大呼于紛擾之中奮臂于駭亂之際發迹河朔席捲兗豫飲馬江淮折衝漢沔雖自古名將未足為諭所以攻城而不有其民略地而不有其土聚徒百萬而莫為己用翕爾雲合忽復星散周流天下而無容足之地百戰百勝而無尺寸之功將軍豈知其然乎存亡決在得主成敗要在所附得主則為義兵附逆則為賊衆義兵雖敗而功業必成賊衆雖剋而終必殄滅者也昔赤眉盛于東海黃巾連帶三州張昌李辰僭逆荊豫或擁衆百萬橫逸宇宙所以一旦敗亡正以兵出無名聚而為亂劉聰父子戎狄凡才乘釁肆毒寇虐人神殺父害弟偷竊位號自古及今豈有聰比而可以正天下者乎見將軍明鑒灼然所宜懸了者也況附聰之斃漸以彰著資財不為己用名位不可得守有若晨霜秋露氛霧之氣雖朝凝而夕消暫見而尋沒也今將軍附賊而望為民主不亦難乎將軍以天挺之質威振宇內擇有德而推崇隨時望而歸之勳義堂堂長享遐貴背聰則禍除向主則福至採納往誨翻然改圖天下不足定蟻寇不足掃成敗之數有似呼吸吹之則寒噓之則溫今相授侍中持節車騎大將軍領護胸奴中郎將襄城郡公總內外之任兼華戎之號顯封大郡以表殊能將軍其受之副遠近之望也自古以來誠無戎人而為帝王者至于名臣建功業者則有之矣今之遲想蓋以天下大亂當須雄才遙聞將軍攻城野戰合于機神雖不視兵書暗與孫吳同契所謂生而知之者上學而知之者次但得精騎五千以將軍之才何向不摧至心實事皆張儒所具晉書載紀石勒傳藝文類聚二十四又見十六國春秋十一書膽識堅定臨難無苟免之意移檄州郡已與代公方謀討勒勒走伏無地求拔幽都效善將來今當便遣六修南襲平陽除僭偽之逆類降知死之逋羯順天副民翼戴皇家斯乃曩年積誠靈祐之所致也其聽所請受任通和十六國春秋十二勒知命思愆收纍年之咎求拔幽都效善將來令聽所請受任通和散騎常侍劉府君誄爰自上葉帝堯之胤堂堂漢祖豁豁高韻茂載孝景克紹前訓穆矣靖王開國作鎮惟祖惟父乃光有晉積行纍仁世篤忠順是用感和誕育奇俊淑質英挺金聲玉振嗟乎君侯仍寢斯疾命不可延中年殞卒衝飆摧華閬風雕實如可贖兮人百其質存若燭龍銜曜沒若庭燎俱滅搢紳頽範于高模邦國彌悴于隕哲藝文類聚四十八與段匹磾盟文天不靜晉難集上邦四方豪傑是焉扇動乃憑陵于諸夏俾天子播越震蕩罔有攸底二虜交侵區夏將泯神人乏主蒼生無歸百罹備臻死喪相枕肌膚潤于鋒鏑骸骨曝于草莽千里無煙火之廬列城有兵曠之邑茲所以痛心疾首仰訴皇穹者也臣琨蒙國寵靈叨竊台嶽臣磾世效忠節忝荷公輔大懼醜類猾夏王旅殞首喪元盡其臣禮古先哲王貽厥後訓所以翼戴天子敦序同好者莫不臨之以神明結之以盟誓故齊桓會于邵陵而群后加恭晉文盟于踐土而諸侯茲順加臣等介在遐鄙而與主相去迥遼是以敢干先典刑牲歃血自今日既盟之後皆盡忠竭節以翦夷二寇有加難于琨磾必救加難于磾琨亦如之繾綣齊契披布胸懷書功金石藏于王府有渝此盟亡其宗族俾墜軍旅無其遺育藝文類聚三十三上趙王倫疏請宥東萊王蕤北海王實衆不相及惡止其身此先哲之弘謀百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛無責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御衆設從衆以發姦其所由來蓋三代之斃法耳蕤實獻王之子明德之胤宜蒙特宥以全穆親之典晉書文六王傳渡江誓祖逖不能清中原而復濟者有如火江晉書祖逖傳又御覽四百八十引晉中興書
