body:
  text: 卷一百五十四張軌下令將歸老宜陽吾在州八年不能靖綏區域又值中州兵亂秦隴倒懸加以寢患委篤實思斂迹避賢但負荷重任未便輒遂不圖諸人橫興此變是不明吾心也吾視去貴州如脫屣耳欲遺主簿尉髦奉表詣闕便速投脂轄將歸老宜陽晉書張軌傳又十六國春秋七十遺令吾無德于今疾病彌留殆將命也文武將佐咸當弘盡忠規務安百姓上思報國下以寧家素棺薄葬無藏金玉善相安遜以聽朝旨晉書張軌傳又十六國春秋七十馳檄關中主上搆危遷幸非所普天分崩率士喪氣秦王天挺聖德神武應期世祖之孫王今為長凡我晉人食土之類龜筮克從幽明同款宜𥳑令辰奉登皇位今遣前鋒督護宋配帥步騎二萬徑至長安翼衛乘輿折衝左右西中郎將實率中軍三萬武威太守張琠帥胡騎二萬駱驛繼發仲秋中旬會于臨晉晉書張軌傳又十六國春秋七十遺韓稚書今王綱紛撓牧守宜戮力勤王適得雍州檄云卿稱兵內侮吾董任一方義在伐叛武旅三萬駱驛繼發伐木之感心豈可言古之行師全國為上卿若單馬軍門者當與卿共平世難也晉書張軌傳又十六國春秋七十張實求直言令忝紹前蹤庶幾刑政不為百姓之患而比年饑旱殆由庶事有缺竊慕針誦之言似補不逮自今有面刺孤罪者酬以東帛翰墨陳孤過者答以筐篚謗言于市者報以羊米晉書張實傳又十六國春秋七十一遺南陽王保書王室有事不忘投軀孤州遠域首尾多難是以前遣賈騫瞻望公舉中被符命敕騫還軍忽聞北地陷沒寇逼長安胡嵩不進麴允持金五百請救于嵩是以決遣騫等進軍度嶺會聞朝廷傾覆為忠不達于主遣兵不及于難痛慨之深死有餘責今更遣韓璞等唯公合是從晉書張實傳又十六國春秋七十一遺令吾官非王命位由私議苟以集事豈敢榮之氣絶之日當以白帢入棺勿以朝服殮以彰吾志十六國春秋七十一張駿上疏請討石虎李期東西隔塞踰歷年載夙承聖德心繫本朝而江吳寂蔑餘波莫及雖肆力修塗同盟靡恤奉詔之日悲喜交并天恩光被褒崇輝渥即以臣為大將軍都督陝西秦雍涼州諸軍事休寵振赫萬里懷戴嘉命顯至銜感屏營伏惟陛下天挺岐嶷堂構晉室遭家不造播幸吳楚宗廟有黍離之哀園陵有殄廢之痛普天咨嗟含氣悲傷臣專方命一方職在斧鉞遐域僻陋勢極秦隴勒雄既死人懷反正謂石虎李期之命曾不崇朝而皆篡繼凶逆鴟目有年東西遼曠聲援不接遂使桃蟲鼓翼四夷喧譁向義之徒更思背誕鉛刀有千將之志螢燭希日月之光是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懷目前之安替四祖之業馳檄布告徒設空文臣所以宵吟荒漠痛心長路者也且兆庶離主漸冉經世先老消落後生靡識忠良受梟懸之罰群凶貪縱橫之利懷君戀故日月告流雖時有尚義之士畏逼首領哀歎窮廬臣聞少康中興由于一旅光武嗣漢衆不滿百祀夏配天不失舊物況以荊陽慓悍臣州突騎吞噬遺羯在于掌握哉願陛下敷弘臣慮永念先績敕司空鑒征西亮等泛舟江沔使首尾俱至也晉書張駿傳又十六國春秋七十二下令境中昔鯀殛而禹興芮誅而缺進唐帝所以殄洪災晉侯所以成五霸法律犯死罪朞親不得在朝今盡聽之唯不宜內參宿衛耳晉書張駿傳又十六國春秋七十二飛魚山海經圖讚飛魚如鮒登雲遊波御覽九百三十九穀敦山有獸其名為穀麟形一角初學記二十九馬第四張重華上疏請伐秦季龍自斃遺燼遊魂取亂侮亡覩機則發臣今遣前鋒都督裴恆帥步騎七萬遙出隴上以俟聖朝赫然之咸山東騷擾不足厝懷長安膏腴宜速平蕩臣守任西荒山川悠遠大誓六軍不及聽受之末猛將鷹揚不豫告成之次瞻雲望日孤憤義傷彈劍慷慨中情蘊結晉書張重華傳又十六國春秋七十三下書攝帝位昔金行失馭戎狄亂華胡羯氐羌咸懷竊璽我武公以神武撥亂保寧西夏貢款勤王旬朔不絶四祖承光忠誠彌著往受晉禪天不所知謙沖遜讓四十年于茲矣今中原喪亂華裔無主群后僉以九州之望無所依歸神祇嶽瀆罔所憑係逼孤攝行大統以一四海之心辭不獲己勉從衆議待掃穢二京蕩清周魏然後迎帝舊都謝罪天闕思與兆庶同茲更始晉書張祚傳又十六國春秋七十三張天錫答索商吾非好行行有得也觀朝榮則敬才秀之士玩芝蘭則愛德行之臣覩松竹則思貞操之賢臨清流則貴廉潔之行覽蔓草則賤貪穢之吏逢飆風則惡凶狡之徒若引而申之觸類而長之庶無遺漏矣晉書張天錫傳又十六國春秋七十四遺郭瑀書先生潛光九皋懷真獨遠心與至境冥符志與四時消息豈知蒼生倒懸四海待拯者乎孤忝承時運負荷大業思與賢明同贊帝道昔傳說龍翔殷朝尚父鷹揚周室孔聖車不停軌墨子駕不俟旦皆以黔首之禍不可以不救君不獨立道由人弘故也況今九服分為狄場二都盡為戎穴天子僻陋江東名教淪于左衽創毒之甚開闢未聞先生懷濟世之才坐觀而不救其于仁智孤竊惑焉故遣使者虛左授綏鶴企先生乃眷下國晉書隱逸郭瑀傳又十六國春秋七十四張琠表留張軌魏尚安邊而獲戾充國盡忠而被譴皆前史之所譏今日之明鑒也順陽之為劉陶守闕者千人刺史之蒞臣州若慈母之于赤子百姓之愛臣軌若旱苗之得膏雨伏聞信惑流言當有遷代民情嗷嗷如失父母今戎夷猾夏不宜騷動一方晉書張軌傳又十六國春秋七十宋纖上疏辭張祚臣受生方外心慕太古生不喜存死不悲沒素有遺屬屬諸知識在山投山臨水投水處澤露形在人親士聲聞書疏勿告我家今當命終乞如素願晉書隱逸宋纖傳又十六國春秋七十四楊宣宋纖畫像頌為枕何石為漱何流身不可見名不可求晉書隱逸宋纖傳又十六國春秋七十五馬岌上言宜立西王母祠酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山此山有石室玉堂珠璣鏤飾煥若神宮宜立西王母祠以裨朝廷無疆之福晉書張駿傳宋纖石壁銘丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心晉書隱逸宋纖傳又十六國春秋七十五謝艾獻晉帝表發三緯地乘六御天靖掃妖氛廣清異類十六國春秋七十五上疏言趙長張祚事權幸用事公室將危乞聽臣入侍長寧侯祚及趙長等將為亂宜盡逐長等十六國春秋七十五密令與楊初今遣舍人孔章特口論要密將軍可差腹心人詣致珊瑚鞭勒香瓔一具遺王擢王擢狐疑于將軍父子事得施矣御覽三百五十九又十六國春秋七十五索遐諫張重華殿下承四聖之基當升平之會荷當今之任憂率土之塗炭宜躬親萬機開延英乂風夜乾乾勉于庶政自頃內外囂然皆云去賊投誠者應即撫慰而彌日不接國老朝賢當虛己引納詢訪政事比多經句積朔不留意接之文奏入內歷月不省廢替見務注情于棊奕之閒繾綣左右小臣之娛不存將相遠大之謀至仗親臣不言朝吏杜口愚臣所以回惶忘寢與食也今王室如燬百姓倒懸正是殿下銜膽茹辛厲心之日深願垂心朝政延納直言周爰五美以成六德損彼近習弭塞外聲修政聽朝使下觀而化晉書張重華傳重華自以連破勍敵頗怠政事希接鑋客司直索遐諫云云重華覽之大悅議迎秋禮天子崩諸侯薨未殯五祀不行既殯而行之魯宣三年天王崩不廢郊祀今聖上統承大位百揆惟新宜在璿璣玉衡以齊七政立秋萬物將成殺氣之始其于王事杖麾誓衆釁鼓禮神所以討逆除暴成功濟務寧宗廟社稷致天下之福不可廢也晉書張重華傳又十六國春秋七十三是月有司議遣司兵趙長迎秋西郊謝艾以春秋之義國有大喪廢搜狩之禮宜待踰年別駕從事索遐議云云紀錫上疏諍時政臣聞東野善驟而敗其駕秦氏富強而覆其國馬力己盡求之勿休人既勞竭役之無己故也造父之御不盡其馬明王之治必恤其民十六國春秋七十四呂光平西域還上疏惟龜茲據三十六國之中制彼侯王之命入其國城天驥龍麟腰裊丹髦萬計盈廄雖伯槳更生衛賜復出不能辨也御覽八百九十五引十六國春秋今十六國春秋末多一句云所獲珍寶以萬萬計據晉書載紀則此語在敘事中非疏文也下書討乞伏乾歸乾歸狼子野心前後反覆朕方東清秦趙勒銘會稽豈令豎子鴟峙洮南且其兄弟內相離閒可乘之機無過今也其敕中外戒嚴朕當親討晉書載紀呂光傳又十六國春秋八十一遺楊軌書自羌胡不靖郭黁叛逆南藩安否音問兩絶行人風傳云卿擁逼百姓為黁脣齒卿雅志忠貞有史魚之操鑒察成敗遠侔古人豈宜聽納姦邪以虧大美陵霜不雕者松柏也臨難不移者君子也何圖松柏雕于微霜而雞鳴己于風雨郭黁巫卜小數時或誤中考之大理率多虛謬朕宰化寡方澤不逮遠致世事紛紜百城離叛戮力一心同濟巨海者望之于卿也今中倉積粟數百千萬東人戰士一當百餘入則言笑晏晏出則武步涼州吞黁咀業綽有餘暇但與卿形雖君臣心過父子朕欲全卿名節不使貽笑將來晉書載紀呂光傳又十六國春秋八十一禿髮利鹿孤下令封爵孤以寡昧謬膺統緒思所以弘濟艱難經略區宇者必藉股肱之力自今二千石令長清高有惠化者其皆封亭侯關內侯延耆老以訪政事十六國春秋八十八求極言吾無經濟之才忝承業統自負乘在位三載于茲雖夙夜惟寅思弘道化而刑政未能允中風俗尚多凋弊戎車屢駕無闢境之功務進賢彥而下猶蓄滯豈所任非才將吾不明所致也二三君子其極言無諱吾將覽焉晉書載紀禿髮利鹿孤傳又十六國春秋八十八遺令昔我諸兄弟傳位非子者蓋以泰伯三讓周道以興故也我武王踐阼實曆垂諸樊之試終能克昌家業者其在車騎乎吾寢疾惙頓是將不濟內外多虞國機務廣其令車騎嗣業經緯百揆以成先王之志十六國春秋八十八史皓極言古之王者行師以全軍為上破國次之拯溺救焚東征西怨今不以綏寧為先惟以徙戶為務安土重遷故有離叛所以斬將克城土不加廣今取士拔才必先弓馬文章學藝為無用之條非所以來遠人垂不朽也孔子曰不學禮無以立宜建學校開庠序選耆德碩儒以訓胄子晉書載紀禿髮利鹿孤傳宗敞理王尚疏臣州荒裔鄰帶寇讎居泰無垂拱之安運否離傾覆之難自張氏頽基德風絶而莫扇呂數將終梟鶚以之翻翔群生嬰罔極之痛西夏有焚如之禍幸皇鑒降春純風遠被刺史王尚受任垂滅之州策成難全之際輕身率下躬儉節用勞逸豐約與衆同之勸課農桑時無廢業然後振王威以掃不庭回天波以蕩氛穢則群逆冰摧不俟朱陽之曜若秋風隕籜豈待徑風之威何定遠之足高營平之獨美經始甫爾會朝算改授使希世之功不終于必成易失之機踐之而莫展當其時而明其事者誰不慨然既遠役遐方劬勞于外雖未效酬恩而在公無闕自至京師二旬于今出車之命莫逮萋斐之責惟深以取呂氏宮人裴氏及殺逃人薄禾等為南臺所禁天鑒玄鏡暫免囹圄譏繩之文未離𥳑墨裴氏年垂知命首髮二毛嫠居本家不在尚室年邁姿陋何用送為邊藩要捍衆力是寄禾等私逃罪應憲墨以殺止殺安邊之義也假若以不送裴氏為罪者正闕奚官之一女子耳論勳則功重言瑕則過微而執害者吹毛求疵忘勞記過斯先哲所以泣血于當年微臣所以仰天而灑淚且尚之奉國歷事二朝能否效于既往優劣𥳑在聖心就有微過功足相補宜弘罔極之施以彰覆載之恩臣等生自西州無翰飛之翼久沈僞政絶進趣之途及皇化既沾投竿之心冥發遂策名委質位忝吏端主辱臣憂故重繭披款惟陛下亮之晉書載紀姚興傳上涼州別駕宗敝治中張穆主簿邊憲胡威等上疏理王尚云云又見十六國春秋五十七
