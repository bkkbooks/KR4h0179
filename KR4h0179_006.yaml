body:
  text: 卷六武帝下王濬唐彬等詔濬彬東下掃除巴丘與胡奮王戎共平夏口武昌順流長騖直造秣陵與奮戎審量其宜杜預當鎮靜零桂懷輯衡陽大兵既過荊州南境固當傳檄而定預當分萬人給濬七千給彬夏口既平奮宜以七千人給濬武昌既了戎當以六千人給彬太尉充移屯項總督諸方晉書武帝紀又與王濬詔軍人乘勝猛氣益壯便當順流長騖直造秣陵晉書王濬傳濬上表自理曰臣前被庚戌詔書太尉賈充總統諸方自鎮東大將軍胄及渾濬彬等皆受充節度晉書王濬傳濬上書自理曰又前被詔書東堂小會詔江表初平天下同其歡豫王公卿士各奉禮稱慶其於東堂小會設樂使加於常藝文類聚三十九引晉起居注讓王濬不受王渾節度詔伐國事重宜令有一前詔使將軍受安東將軍渾節度渾思謀深重案甲以待將軍云何徑前不從渾命違制昧利甚失大義將軍功勳簡在朕心當率由詔書崇成王法而於事終恃功肆意朕將何以令天下晉書王濬傳原王濬詔濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便令與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一眚掩之晉書王濬傳有司奏濬表既不列前後所被七詔月日又赦後違詔不受渾節度大不敬付廷尉科罪詔云云封琅邪王胄子為停侯詔琅邪王胄督率所統連據塗中使賊不得相救又使琅邪相劉弘等進軍逼江賊震懼遣使奉僞璽綬又使長史王恆率諸軍渡江破賊邊守獲督蔡機斬首降附五六萬計諸葛靚孫奕等皆歸命請死功勳茂著其封子二人為亭侯各三千戶賜絹六千匹晉書琅邪王胄傳進王渾封爵詔使持節都督揚州諸軍事安東將軍京陵侯王渾督率所統遂逼秣陵令賊孫皓救死自衛不得分兵上赴以成西軍之功又摧大敵獲張悌使皓塗窮勢盡面縛乞降遂平定秣陵功勳茂著其增封八千戶進爵為公封子澄為亭侯弟湛為關內侯賜絹八千匹晉書王渾傳以唐彬為右將軍詔廣武將軍唐彬受任方隅東禦吳寇南臨臨蠻越撫寧疆場有綏禦之績又每慷慨志在立功頃者征討扶疾奉命首啓戎行獻俘授馘勳效顯著其以彬為右將軍都督巴東諸軍事晉書唐彬傳封孫皓為歸命侯詔孫皓窮迫歸降前詔待之以不死今皓垂至意猶愍之其賜號為歸命侯進給衣服車乘田三十頃歲給穀五千斛錢五十萬絹五百匹綿五百斤皓太子瑾拜中郎諸子為王者拜郎中吳志孫嗣主傳三太康元年四月詔晉書作五月詔答有司睦退靜思愆改修其德今有爵土不但以赦江陽險遠其以高陽郡封之宋書高陽王睦傳睦封中山王咸寧中貶封丹水縣侯太康初詔復爵有司奏封江陽王帝云云答衛瓘等奏請封禪詔今逋寇雖殄外則障塞有警內則民庶未康此盛德之事所未議也晉書禮志下宋書禮志三又詔今陰陽未和刑政未當百姓未得其所豈可以勒功告成邪同上又詔衛瓘等勿下五府議封禪雖蕩清江表皆臨事者之勞何足以告成方望群后思隆大化以寧區夏百姓獲乂與之休息斯朕日夜之望無所復下諸府矣勿復為煩同上又詔方當共思弘道以康庶績且俟他年無所復紛紜也同上又詔報三公有司勿議封禪所議誠列代之盛事也然今未可以爾使報絶之同上進封張華為廣武縣侯詔尚書關內侯張華前與故太傅羊祜共創大計遂典掌軍事部分諸方算定權略運籌決勝有謀謨之勳其進封為廣武縣侯增邑萬戶封子一人為亭侯千五百戶賜絹萬匹晉書張華傳復置左右僕射詔尚書舊置左右僕射所以恢演政典協宣庶績中間久廢其復置之書鈔五十九御覽二百十一引晉起居注省州牧詔上古及中代或置州牧或置刺史置監御史皆總綱紀而不賦政治民之事任之諸侯郡守昔漢末四海分崩因以吳蜀自擅自是刺史內親民事外領兵馬此一時之宜爾今賴宗廟之靈士大夫之力江表平定天下合之為一當韜戢干戈與天下休息諸州無事者罷其兵刺史分職皆如漢氏故事出頒詔條入奏事京城二千石專治民之重監司清峻於上此經久之體也其便省州牧續漢郡國志三注補引晉太康初武帝詔賜故司徒李胤等家錢穀詔故司徒李胤太常彭灌竝履忠清儉身沒家無餘積賜胤家錢二百萬穀千斛灌家半之宋書李胤傳封延祚為樂平王詔弟祚早孤無識情所哀愍幼得篤疾日冀其差今遂廢痼無復後望意甚傷之其封為樂平王使有名號以慰吾心晉書樂平王延祚傳以荀良為魏郡太守詔方今天下無事所重唯民魏君大都會也太守宜得其才其以荀良為魏郡太守書鈔七十四引晉起居注遣石鑒歸田詔昔雲中守魏尚以斬首不實受刑武牙將軍田順以詐增虜獲自殺誣罔敗法古今所疾鑒備大臣吾所取信往者西事公欺朝廷以敗為得竟不推究中間黜免未久尋復授用冀能補過而乃與下同詐所謂大臣義得爾乎有司奏是也顧未忍耳今遣歸田里終身不得復用勿削爵土也晉書石鑒傳親祀朝日詔禮儀宜有常若如所奏與故太尉所撰不同復為無定制也閒者方難未平故每從所奏今戎事弭息惟此為大晉書禮志上宋書禮志一有司奏春分依舊請車駕祀朝日寒溫不適可不親出詔云云以石偉為議郎詔吳故光祿大夫石偉秉志清白皓首不渝雖處危亂廉節可紀年己過邁不堪遠涉其以偉為議郎加二千石秩以終厥世吳志孫休傳注引楚國先賢傳答山濤薦許奇等詔案其資歷悉自足為郡守各以在職日淺則宜盡其政績不宜速他轉也御覽二百六十八引山公啓事手詔山濤君以道德為世模表況自先帝識君遠意吾將倚君以穆風俗何乃欲舍遠朝政獨高其志耶吾之志懷故不足以喻乎何來言至懇切也且當以時自力深副至望君不降志朕不安席晉書山濤傳以山濤為司空詔濤道高德茂器宇淵濟宜贊三事以敷五教書鈔五十二引王隱晉書與司徒山濤詔君年耆德茂朝之碩老是以授君台輔之位而遠崇克讓至于反覆良用於邑君當終始朝政翼輔朕躬晉書山濤傳又詔山濤君翼贊朝政保乂皇家匡佐之勳朕所倚賴司徒之職實掌邦教故用敬授以答群望豈宜沖讓以自抑損邪已敕斷章表晉書山濤傳齊王攸之國詔古者九命作伯或入毗朝政或出御方嶽周之呂望五侯九伯實得征之侍中司空齊王攸明德清畼忠允篤誠以母弟之親受台輔之任佐命立勳劬勞王室宜登顯位以稱具瞻其以為大司馬都督青州諸軍事侍中如故假節將本營千人親騎帳下司馬大車皆如舊增鼓吹一部官騎滿二十人置騎司馬五人餘主者詳案舊制施行晉書齊王攸傳以韓謐為賈充世孫詔太宰魯公充崇德立勳勤勞佐命北世殂隕每用悼心又胤子早終世嗣未位古者列國無嗣取始封支庶以紹其統而近代更除其國至於周之公旦漢之蕭何或豫建元子或封爵元妃蓋尊顯勳庸不同常例太宰素取外孫韓謐為世子黎民後吾退而斷之外孫骨肉至近推恩計情合於人心其以諡為魯公世孫以嗣其國自非功如太宰始封無後如太宰所取必以己自出不如太宰皆不得以為比晉書賈充傳贈諡羊琇詔琇與朕有先后之親少小之恩歷位外內忠允茂著不幸早薨朕甚悼之其追贈輔國大將軍開府儀同三司賜東園祕器朝服一襲錢三十萬布百匹諡曰威晉書外戚羊琇傳以荀勗為光祿大夫詔勗明哲聰達經識天序有佐命之功兼博洽之才久典內任著勳弘茂詢事考言謀猷允誠宜登大位毗贊朝政今以勖為光祿大夫儀同三司開府辟召守中書監侍中侯如故晉書荀勗傳庾等除名詔等備為儒官不念奉憲制不指答所問敢肆其誣罔之言以干亂視聽而是議主應為戮首但及家人竝自首大信不可奪秦秀傅珍前者虛妄幸而得免復不以為懼當加罪戮以彰凶慝猶復不忍皆丏其死命秀珍等竝除名晉書庾純傳以魏舒為左僕射領選曹詔吏部掌敘人倫治化之本也宜得忠正舊德尚書右僕射魏舒寬泰弘毅潛通有才識其以舒為左僕射領選曹御覽二百十一引晉起居注以朱整為吏部尚書詔選曹銓管人才宜得忠恪寡欲抑華崇本者尚書朱整周慎敬讓以道素自居是其人也其以整為吏部尚書北堂書鈔六十御覽二百十四竝引晉起居注給九卿車詔依漢故事給九卿朝車駕及安車各一乘宋書禮志五以何邵為侍中詔議郎何邵已歷試朝位博雅有拾遺顧問庂才其以邵為侍中書鈔五十八引晉起居注太康四年詔報劉毅詔政德未修誠未有以膺受嘉祥省來示以為瞿然賀慶之事宜詳依典義動靜數示晉書劉毅傳又群書治要三十引晉書詔定皇后躬蠶禮古者天子親籍以供粢盛后夫人躬蠶以備祭服所以聿遵孝敬明教示訓也今籍田有制而蠶禮不修由中間務多未暇崇備今天下無事宜修禮以示四海其詳依古典及近代故事以參今宜明年施行晉書禮志上宋書禮志一詔一廟七室仍舊古雖七廟自近代以來皆一廟七室於禮無廢於情為敘亦隨時之宜也其便仍舊晉書禮志上宋書禮志三太康六年群臣又議奏曰古者七廟異所宜如禮詔又曰慕容廆襲破夫餘下詔存恤夫餘王世守忠孝為惡虜所滅甚愍念之若其遺類足以復國者當為之方計使得存立晉書東夷夫餘傳答汝南王亮等詔夫陰陽失序朕干天道刑政失中之所致也其使冠履勿復通表北堂書鈔五十引晉八王故事因災異求直言詔比年災異屢發日蝕三朝地震山崩邦之不臧實在朕躬震蝕之異其咎安在將何施行以濟其愆公卿大臣各上封事極言其故勿有所諱晉書武帝紀宋書五行志五又略見開元占經九以張建為給事中詔郎中張建忠篤履素為江表士大夫所稱宜在中朝其以建為給事中初學記十二御覽二百二十一竝引晉起居注以馮紞為散騎常侍詔尚書馮紞忠亮在公歷職內外勤恪匪懈而疾未差屢求放退其以紞為散騎常侍賜錢二十萬床帳一具初學記十二御覽二百二十四竝引晉起居注以隴西王泰為鎮西將軍詔關中內屏京畿外藩河右北扞戎狄南鎮巴漢宜任懿親以靜西土隴西王泰秉心誠亮思度弘遠北堂書鈔六十四引晉起居注太子侍從進品詔太子家令太子率更令率更僕東宮之達官也其進品第五秩與中庶子左右衛率同職擬光祿勳北堂書鈔六十六引晉起居注四條郡治詔昔先王御俗以興至治未有不先成民事者也漢宣識其如此是以歎息良二千石今之士大夫多不樂出宰牧而好內官今欲皆先經外郡治民著績然後入為常伯納言及典兵宿衛黃門散騎中書郎藝文類聚四十八御覽二百二十又二百五十九竝引晉起居注答王濟成粲等議諡郭奕詔非言君臣不可同正以奕諡景不相當耳諡所以旌德表行案諡法一德不懈為簡奕忠毅清直立德不渝宜諡曰簡晉書郭奕傳通典一百四太康八年十月太常上議故太常平陵男郭奕為景侯有司議奏以為大晉受命祖宗諡號群下未有同者蓋因近淺情習于所見也奕諡與景皇帝同可改諡曰穆侍中王濟等議君臣不嫌同諡武帝詔云云糾舉群吏詔興化之本由政平訟理也二千石長吏不能勤恤人隱而輕挾私故興長刑獄又多貪濁煩撓百姓其敕刺史二千石糾其穢濁舉其公清有司議其黜陟令內外群官舉清能拔寒素晉書武帝紀定二社一稷如魏制詔社稷一神而相襲二位衆議不同何必改作其便仍舊一如魏制晉書禮志上宋書禮志四通典四十五詔賜梁柳粟陽平太守梁柳治績尤異賜粟千斛秩中二千石北堂書鈔三十九引王隱晉書封安平王孫承詔安平獻王孫承昔以父早亡不建大祚以縣封之今以三縣封為武邑王引晉起居注案安平王孚傳作南宮縣王此武邑為異以王琛為太子庶子詔尚書郎王琛每所陳論意在忠讜其以為太子庶子御覽二百四十五引晉起居注改建宗廟詔往者乃魏氏舊廟處立廟既雍翳不顯又材木弱小至今中間有跌撓之患今當修立不宜在故處太僕寺南臨甬道地形顯敞更於此營之主者依典禮施行御覽五百三十一引晉起居注武帝太安中詔又引王隱晉書太康十年大廟成遷神主於新廟案晉書禮志太康六年因廟陷當更修創至十年乃更改築於宣陽門內窮極壯麗則太安非也今改正復明堂及南郊五帝位詔孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望四望非地則明堂上帝不得為天也往者衆議除明堂五帝位考之禮文正經不通且詩序曰文武之功起於后稷故推以配天焉宣帝以神武創業既以配天復以先帝配天於義亦所不安其復明堂及南郊五帝位晉書禮志上宋書禮志三通典四十二封皇孫遹為廣陵王詔遹既長且仁可令以遹為廣陵王以廣陵臨淮為封國邑五萬戶引王隱晉書詔徵陸喜等十五人僞尚書陸喜寺十五人南士歸稱並以貞潔不容皓朝或忠而獲罪或退身修志放在草野主者可皆隨本位就下拜除敕所在以禮發遣須到隨才授用晉書陸雲附傳夕牲詔夕牲而令布司行事非也改擇上旬他日宋書禮志一太康中報劉頌詔得表陳封國之制宜如古典任刑齊法宜復內刑及六州將士之役居職之宜諸所陳聞具之知卿乃心為國也動靜數以聞晉書劉頌傳荀勛守尚書令詔周之冢宰今尚書令皆古百揆之任以其亮采惠疇熙帝之載實允於此勖肆力先朝庸勳超格受終之揆協于大麓故受以此位也書鈔五十九引曹嘉之晉紀賜荀勛詔尚書令荀勖既久羸毀可賜乳酪太官隨日給之御覽八百五十八引晉太康起居注案今本御覽不云詔又無既久可三字張采所輯本如此疑宋本也或別有所據也今據補録賜石蜜五升御覽八百五十七引晉太康起居注以王仲為治書侍御史詔故司空王基夙為先帝授任基子肖書郎仲雖復清途猶未免楚撻其以仲為治書侍御史書鈔六十二引太康起居注武帝詔案魏志王基子徽早卒孫廙仲蓋幼子基傳未見張采所據書鈔仲字作沖未審孰是出清商掖庭詔今出清商掖庭及諸才人奴女保林已下二百七十餘人還家御覽百四十五引晉武帝起居注以御府物賜王公詔御府內省珠玉玩好之物皆以賜王公也御覽八百二引王隱晉書袁奧從九卿詔太中大夫新蔡男袁奧志高口口行誼優異可從九卿崇重之例給吏四人書鈔五十六引晉録論趙享詔議郎趙享質稟純粹思議通濟學之有舊方欲敘授而得此薦意常念之書鈔五十六引晉起居注諸王中尉詔諸王中尉及諸軍皆典兵以備不虞乃有著中戰衣木履持長矛者此為兒戲而無相憚懾也御覽三百五十三引太康起居注刺史詔刺史銜命國之外臺其非所部而在境者刺史并糾之引晉起居注許司徒魏舒致仕詔司徒劇陽子舒體道弘粹思量經遠忠肅居正在公盡規入管銓衡官人允敘出贊袞職敷弘五教惠訓播流德聲茂著可謂朝之俊乂者也而屢執沖讓辭旨懇誠申覽反覆省用憮然蓋成人之美先典所與難違至情今聽其所執以劇陽子就第位同三司祿賜如前几杖不朝賜錢百萬床帳簟褥百副以舍人四人為劇陽子舍人置官騎十人使光祿勳奉策主者詳案典禮令皆如舊制晉書魏舒傳賜恤魏舒詔舒唯一子薄命短折舒告老之年處窮獨之苦每念怛然為之嗟悼思所以散愁養氣可更增滋味品物仍給賜陽燧四望繐窗戶皂輪車牛一乘庶出入觀望或足散憂也晉書魏舒傳報華嶠手詔輒自消息無所為慮晉書華嶠傳帝疾小瘳嶠表賀因微諫帝手詔報許司空衛瓘致仕詔司空瓘年未致仕而遜讓歷年欲及神志未衰以果本情至真之風實感吾心今聽其所執進位太保以公就第給親兵百人置長史司馬從事中郎掾屬及大車官騎麾蓋鼓吹諸威儀一如舊典給廚田十頃園五十畝錢百萬絹五百匹床帳簟褥主者務令優備以稱吾崇賢之意焉晉書衛瓘傳衛瓘給騎兵詔太保衛瓘明允篤誠有匪躬之志其給千兵騎百人北堂書鈔五十二御覽二百六竝引晉起居注以盧浮為博士詔盧浮修行明經以為國子博士書鈔六十七引晉起居注𤕠從僕射詔司馬璞貞固和祥有識見才幹以堇為冗從僕射書鈔六十三引晉武帝起居注案璞堇必有一誤晉初宗室亦無此名璞堇蓋覲之誤琅邪王胄子也詔封域相近吾傷切之書鈔四十六引晉起居注武帝詔敕戒郡國計吏諸郡國守相令長務盡地利禁游食商販其休假者令與父兄同其勤勞豪勢不得侵役寡弱私相置召晉書食貨志又略見武帝紀策告故侍中羊祜皇帝使謁者杜宏告故侍中太傅巨平成侯祜昔吳為不恭負險稱號郊境不闢多歷年所祜受任南夏思靜其難外揚王化內經廟略著德推誠江漢歸心舉有成資謀有全策昊天不弔所志不卒朕用悼恨于厥心乃班命群帥致天之討兵不踰時一征而滅疇昔之規若合符契夫賞不失勞國有彝典宜增啓土宇以崇前命而重違公高讓之素今封夫人夏侯氏萬歲鄉君食邑五千戶又賜帛萬匹穀萬斛晉書羊祜傳策詔告故太傅羊祜廟故太傅巨平侯羊祜造建平吳之規潛謀遠略與衆殊慮勳業不遂然蕩滅之計悉如祜策固能夷曠世之寇拯生民之患勛烈宏著而寵不逮身其遣使以克定之功策告祜廟昔漢封蕭何夫人為侯以崇顯元功亦古之令典封祜夫人為萬歲鄉君食邑五千戶賜絹萬匹湖北通志李興撰羊祜碑策齊王攸於戲惟命不于常天既遷有魏之祚我有晉既受順天明命先建群后越造王國于東土錫茲青社用藩翼我邦家茂哉無怠以永保宗廟晉書齊王攸傳策護羌校尉彭祈群秉心公亮所蒞有方不幸殞歿朕其痛惜彭祈碑東堂策問賢良方正夏侯湛等十七人頃日食正陽水旱為災將何所修以變大眚及法令有不宜於今為公私所患苦者皆何事凡平世在於得才得才者亦借耳目以聽察若有文武器能有益於時務而未見申敘者各舉其人及有負俗謗議宜先洗濯者亦各言之晉書摯虞傳策問賢良郤詵等蓋太上以德撫時易簡無文至于三代禮樂大備制度彌繁文質之變其理何由虞夏之際聖明係踵而損益不同周道既衰仲尼猶曰從周因革之宜又何殊也聖王既沒遺制猶存霸者迭興而翼輔之王道之缺其無補乎何陵遲之不反也豈霸德之淺歟期運不可致歟且夷吾之智而功止於霸何哉夫昔人之為政革亂亡之弊建不刊之統移風易俗刑措不用豈非化之盛歟何修而嚮茲朕獲承祖宗之休烈于茲七載而人未服訓政道罔述以古況今何不相逮之遠也雖明之弗及猶思與群賢慮之將何以辨所聞之疑昧獲至論於讜言乎加自頃戎狄內侵災害屢作邊氓流離征夫苦役豈政刑之謬將有司非其任歟各悉乃心究而論之上明古制下切當今朕之失德所宜振補其正議無隱將敬聽之晉書郤詵傳策問賢良阮种等在昔哲王承先之序光宅宇宙咸用規矩乾坤惠康品類休風流衍彌于千載朕應踐洪運統位七載於今矣惟德弗嗣不明于政宵興畼厲未燭厥猷子大夫韞韥道術儼然而進朕甚嘉焉其各悉乃心以闡喻朕志深陳王道之本勿有所隱朕虛心以覽焉晉書阮种傳等問秀才華談等今四海一統萬里同風天下有道莫斯之盛然北有未羈之虜西有醜施之氏故謀夫未得高枕邊人未獲晏然將何以長弭斯患混清六合吳蜀恃險今既蕩平蜀人服化無攜二之心而吳人趑睢屢作妖寇豈蜀人敦朴易可化誘吳人輕鋭難安易動乎今將欲綏靜新附何以為先聖人稱如有王者必世而後仁今天成地平大化無外雖胸奴未羈羌氏驕黠將修文德以綏之舞千戚以來之故兵戈載戢武夫寢息如此已可消鋒刃為佃器罷尚方武庫之用未邪夫法令之設所以隨時制也時險則峻法以取平時泰則寬網以將化今天下太平四方無事百姓承德將就無為而乂至於律令應有所損益不昔帝舜以二八成功文王以多士興周夫制化在於得人而賢才難得今大統雖同宜搜才實州郡有貢薦之舉猶未獲出群卓越之倫將時無其人有而致之未得其理也晉書華談傳書省啓知既下須防具具揚州寒到有者比尚擬之動靜更啓也數遣信還淳化閣帖一受禪告類上帝文皇帝臣炎敢用玄牡明告於皇皇后帝魏帝稽協皇運紹天明命以命炎曰昔者唐堯熙隆大道禪位虞舜舜又以禪禹邁德垂訓多歷年載暨漢德既衰太祖武皇帝撥亂濟時扶翼劉氏又用受禪於漢粵在魏室仍世多故幾於顛墜實賴有晉匡拯之德用獲保厥肆祀弘濟於艱難此則晉之有大造於魏也誕惟四方之民罔不祗順開國建侯宣禮明刑廓清梁崏苞懷函夏興仁揚越八紘同軌遐邇馳義祥瑞屢臻天人協應無思不服肆豫憲章三后用集大命于茲炎惟德不嗣辭不獲命於是群公卿士百辟庶僚黎獻陪隸暨於百蠻君長僉曰皇天鑒下求民之瘼既有成命固非克讓所得距違天序不可以無統人神不可以曠主炎虔奉皇運寅畏天威敢不欽承休命敬簡元辰升壇受禪告類上帝以永答民望敷佑萬國惟明德是饗晉書武帝紀宋書禮志三
