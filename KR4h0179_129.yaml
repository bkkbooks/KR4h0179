body:
  text: 殷融上言奔赴山陵不須限制司徒西曹屬王濛以周年為限不及者除名付之鄉論臣以為名教興于義厚忠孝發于自然不嚴而著不肅而成者也舊禮國有大諱外任不得離部冗散之人發哀公巷初無課限有不奔之制案永平初先帝稱宣帝遺詔乃不得令子弟詣陵唯蕩陰奔赴多不建乃始為其制以篤一時顧觀人情未有肅愧徒興𥳑默正足以彰至道之不弘表臣子之不義宜遵前代聞凶行喪三日而已通典八十成帝崩尚書殷融上言奏并襄陽郡縣襄陽石城疆埸之地對接荒寇諸荒殘寄治縣民戶家少可并合之咸康八年尚書殷融奏顯贈刁協議王敦惡逆罪不容誅則協之善亦不容賞若以忠非良圖謀事失算以此為責者蓋在于譏議之閒耳即凶殘之誅以為國刑將何以沮勸乎當敦專逼之時慶賞威刑專自已出是以元帝慮深崇本以協為比事由國計蓋不為私昔孔寧儀行父從君于昏楚復其位者君之黨故也況協之比君在于義順且中興四佐位為朝首于時事窮計屈奉命違寇非為逃刑謂宜顯贈以明忠義晉書刁協傳奔赴山陵議據周魯有喪而魯人不弔孔子所答曾子當謂國內卿大夫耳非如今日見在方外者也通典八十后父不應拜后議天性之至父子之道人倫之序君臣之義性因至親故情禮無二義緣序立故尊嚴無上易曰有父子然後有君臣有君臣然後有禮義生焉故資父事君教之至也以貴而臣其所尊故子爵不加于父也夫以帝皇之尊猶無臣妾父母之義況后從尊于帝而令父母執臣妾乎而鄭玄復云公朝與歸寧別有二制尊卑迭用拜謁更施亦未詳斯議為何所據御覽一百三十五議自頃多難國度屢空匹夫有重繭之勞武士有執戈之勳御覽三百五十一石榴賦余以暇日散愁翰林覩潘張石榴二賦雖有其美猶不盡善客為措辭故聊為書之賦曰或珠離于璚琬或玉碎于雕觴璘彬灑映曄紫嬰緗煥若瑤英之攢鍾瓛粲若靈蚌之含珠璫御覽九百七十與除邈書其晨當著吉服除服不當竟此日以吉服接客當兄舊服見客邪禮曰服其除服卒事反喪服庾太尉大喪中除妻服曰帢對客終日今齊服既同且下流宜無嫌于變吉服也竟此一日然後反喪服邪竝通典九十七殷允有兄子喪應除兄服與除邈書杖銘二老晨征匪杖不遠四皓降趾匪杖不反翼德扶耆匪杖焉資輔相天地匪賢而誰荃蕙雖秀才非貞質異端雖美道無玄術杖必不橈無取苒弱人貴一德勿惑穿鑿藝文類聚六十九又略見書鈔一百三十三祭徐孺子文惟太元六年龍集荒落冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠漢故聘士豫章徐先生惟君資純玄粹舍真太和卓爾高尚道映南嶽逍遙環堵萬物不干其志負褐行吟軒冕不易其樂時攜虛榻佇金蘭之眷千里命契寄生芻之詠非夫超悟身名遁世無悶者孰若是乎夫誠素自中微物為重蘋藻是歆實過牲牢藝文類聚三十八御覽五百二十六為武康縣教自今郭邑居民有死喪者可令送兩坩粥書鈔一百四十四御覽八百五十九引殷康集明慎奔車之上無仲尼覆舟之下無伯夷蓋言慎也御覽四百三十古人云驕奢人之殃恭儉福之場御覽四百三十一上言宜令清官子姪入學臣聞弘化正俗存乎禮教輔性成德必資于學先王所以陶鑄天下津梁萬物間邪納善潛被于日用者也故能疏通玄理窮綜幽微一貫古今彌綸治化且夫子稱回以好學為本七十希仰以善誘歸宗雅頌之音流詠千載聖賢之淵範哲王所同風自大晉中興肇基江左崇明學校修建庠序公卿子弟竝入國學尋值多故訓業不終陛下以聖德玄一思隆前美順通居方導達物性興復儒肆僉與後生自學建彌年而功無可名憚業避役就存者無幾或假託親疾真僞難知聲實渾亂莫此之甚臣聞舊制國子生皆冠族華胄比列皇儲而中者混雜蘭艾遂令人情恥之子貢去朔之餘羊仲尼猶愛其禮況名實兼喪面牆一世者乎若以當今急病未遑斯典權宜停廢者別一理也若其不然宜依舊準竊謂群臣內外清官子姪普應入學制以程課今者見生或年在扞格方圓殊趣宜聽其去就各從所安所上謬合乞付外參議宋書禮志一太元元年國子祭酒殷茂上言通典五十三作太元十年李太后服議太皇太后名稱雖尊而據非正體主上纂承宗祖不宜持重謂齊服為安通典八十一隆安四年太常殷茂議遺王羲之書悠悠者以足下出處足觀政之隆替如吾等亦謂為然至如足下出處正與隆替對豈可以一世之存亡必從足下從容之適幸徐求衆心卿不時起復可以求美政不若豁然開懷當知萬物之情也晉書王羲之傳遺褚裒書足下今之太上皇也後魏書張普惠傳易象論聖人知觀器不足以達變故表圓應于蓍龜圓應不可為典要故寄妙迹于六爻六爻周流唯化所適故雖一畫而吉凶竝彰微一則失之矣擬器託象而慶咎交著繫器則失之矣故設八卦者蓋緣化之影迹也天下者寄見之一形也圓影備未備之象一形兼未形之形故盡二儀之道不與乾坤齊妙風雨之變不與巽坎同體矣世說文學篇注游園賦爾乃杖策神游以詠以吟落葉掩蹊果下成林御覽八百二十四將離賦爾乃理轡杖策或乘或步行悲歌以諧歡朗長嘯以啓路藝文類聚十九太子令朝廷遂為吾營室顧吾不才而大興役費深用愧惕冬氣已應作者殊常寒苦可使監殿舍人一月賚酒肉稱勞賜之吾蒙月俸錢上生塵無所用之可以供事御覽八百三十六引殷仲堪集上白鹿表巴陵縣清水山得白鹿一頭白者正色鹿者景福嘉義藝文類聚九十五表賜騣馬一匹書鈔十九奏請巴西等三郡不戍漢中尚書下以益州所統梁州三郡人丁一千番戍漢中益州未肯承遣仲堪乃奏之曰夫制險分國各有攸宜劍閣之隘實蜀之關鍵巴西梓潼宕渠三郡去漢中遼遠在劍閣之內成敗與蜀為一而統屬梁州蓋定鼎中華慮在後伏所以分斗絶之勢開荷戟之路自皇居南遷守在岷卭襟帶之形事異曩昔是以李勢初平割此三郡配隸益州將欲重復上流為習坎之防事經英略歷年數紀梁州以統接曠遠求還得三郡忘王侯設險之義背地勢內外之實盛陳事力之寡弱飾哀矜之苦言今華陽乂清汧隴順軌關中餘燼自相魚肉梁州以論求三郡益州以本統有定更相牽制莫知所從致令巴宕二郡為群獠所覆城邑空虛士庶流亡要害膏腴皆為獠有今遠慮長規宜保全險塞又蠻獠熾盛兵力寡弱如遂經理乖繆號令不一則劍閣非我保醜類轉難制此乃藩扞之大機上流之至要昔三郡全實正差文武三百以助梁州今浮沒蠻獠十不遺二如逐食鳥散資生未立苟順符指以副梁州恐公私困斃無以堪命則劍閣之守無擊柝之儲號令選用不專于益州虛有監統之名而無制御之用懼非分位之本旨經國之遠術謂今正可更加梁州文武五百合前為一千五百自此之外一仍舊貫設梁州有急蜀當傾力救之晉書殷仲堪傳與相王箋奉所賜馬鎧既足以獎厲懦心又以光華遠任御覽三百五十六所致玉佩光潤清越御覽六百九十二與徐邈書后者婦人之貴號在妻則言后在母則加大禮天子之妃稱后關睢曰后妃之德后妃二名其義一也設使皇后處內貴妾必不可稱妃通典七十二致謝玄書胡亡之後中原子女鬻于江東者不可勝數骨肉星離荼毒終年怨苦之氣感傷和理誠喪亂之常足以懲戒復非王澤廣潤愛育蒼生之意也當世大人既慨然經略將以救其塗炭而使理至于此良可歎息願節下弘之以道德運之以神明隱心以及物垂理以禁暴使足踐晉境者必無懷戚之心枯槁之類莫不同漸天潤仁義與干戈竝運德心與功業俱隆實所期于明德也頃聞抄掠所得多皆採樵飢人壯者欲以救子少者志在存親行者傾筐以顧念居者吁嗟以待延而一旦幽縶生離死絶求之于情可傷之甚昔孟孫獵而得麑使秦西以歸之其母隨而悲鳴不忍而放之孟孫赦其罪以傅其子禽獸猶不可離況于人乎夫飛梟惡鳥也食桑椹猶懷好音雖曰戎狄其無情乎苟感之有物非難化也必使邊界無貪小利強弱不得相陵德音一發必聲振沙漠二寇之黨將靡然向風何憂黃河之不濟函谷之不開哉晉書殷仲堪傳答徐農人問徐農人問殷仲堪曰禮服高祖父母齊縗三月若其父承重者為當服周為故自服其本服邪若服其本服不以父重而增者假如元孫持高祖重元孫之子來孫本都無服父服三年而子吉服俱非喪紀差降之義若來孫本無服而今有服則曾元孫宜以父承重而加也進退迷惑不知所行殷答曰祖父在而祖母沒則父服厭周祖父後亡則父服三年而孫之服一定無變是知孫之于祖自有正服不以父服為升降又疑元孫承重來孫無變案禮記有子姪之服苟恩盡親異縞冠元武非為無變矣徐又問曰父在為母雖服以周斷至練禫廬杖大制無虧故孫得遂其本服若父出後降祖在不杖周則孫不得同父之服明矣若父還反重又當從父升亦明矣如此升降由父不得恆自定也未有斬服不異至親而子正制三月之外或都無服者也他人同爨而為之緦縞冠元武微廁吉飾求之五服故為無變他人之不若此所大惑也殷又答曰父在為母先王明義屈之以周服而情未有異也哀親故寢苫枕凷毀瘠杖而後起創巨痛深弗可頓奪故漸之以祥練申之以禫月此蓋有由不變其本則降矣子有降而孫得遂仲堪所謂不隨父升降者也通典九十六水贊大象無形氣以分粗淡淡沖津質有雖虛清瀾可瀨明激弗渝孰能懷之泛然靡拘藝文類聚八琴贊五音不彰孰表大音至人善寄畼之雅琴聲由動發趣以虛乘初學記十六藝文類聚四十四作虛深天聖論天者為萬物之根本冥然而不言百姓生而不有其功萬物成而不疲其勞聖者承天之照用天之業聖宣其道者也初學記十七答桓玄四皓論桓玄在南郡論四皓來儀漢庭孝惠以立而惠帝柔弱呂后凶忌此數公者觸彼塵埃欲以救斃二家之中各有其黨奪彼與此其讎必興不知匹夫之志四公何以逃其患素履終吉隱以保生者其若是乎以其文贈仲堪仲堪乃答之曰隱顯默語非賢達之心蓋所遇之時不同故所乘之塗必異道無所屈而天下以之獲寧仁者之心未能無感若夫四公者養志巖阿道高天下秦網雖虐游之而莫懼漢祖雖雄請之而弗顧徒以一理有感汛然而應事同賓客之禮言無是非之對孝惠以之獲安莫由報其德如意以之定藩無所容其怨且爭奪滋生主非一姓則百姓生心祚無常人則人皆自賢況夫漢以劍起人未知義式遏姦邪特宜以正順為寶天下大器也苟亂亡見懼則滄海橫流原夫若人之振策豈為一人之廢興哉苟可以畼其仁義與夫伏節委質可榮可辱者道迹懸殊理勢不同君何疑之哉又謂諸呂強盛幾危劉氏如意若立必無此患夫禍福同門倚伏萬端又未可斷也于時天下新定權由上制高祖分王子弟有盤石之固社稷深謀之臣森然比肩豈瑣瑣之祿産所能傾奪之哉此或四公所預于今亦無以辨之但求古賢之心宜存之遠大耳端本正源者雖不能無危其危易持苟啓競津雖未必不安而其安難保此最有國之要道古今賢哲所同惜也晉書殷仲堪傳節有宜藥惑最禮體狂觴為酒悅醉德惡藝文類聚七十三誄荊門晝掩間庭晏然文選顏延之贈王太常詩注合社文夫社之為祀遠哉故大夫以成群斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風尊先聖之明誥潔齊牲牢庶乎自古以來一日之澤然三人之行必有其師故優選中正立三老者惟公理以御衆稽舊章以作憲御覽五百三十二罪釁解尚書表臣聞洪波振壑川無恬鱗驚飆拂野林無靜柯何者勢弱則受制于巨力質微則莫以自保于理雖可得而言于臣實非所敢喻昔桓玄之世誠復驅迫者衆至于愚臣罪實深矣進不能見危授命忘身殉國退不能辭粟首陽拂衣高謝遂乃宴安昏寵叨昧僞封錫文篡事曾無獨固名義以之俱淪情節自茲兼撓宜其極法以判忠邪會鎮軍將軍臣裕匡復社稷大弘善貸佇一戮于微命申三驅于大信既惠之以首領復引之以縶維于時皇輿否隔天人未泰用忘進退惟力是視是以僶俯從事自同全人今宸極反正惟新告始憲章既明品物思舊臣亦胡顏之厚可以顯居榮次乞解所職待罪私門違謝闕庭乃心愧戀謹拜表以聞臣某云云文選晉書殷仲文傳藝文類聚五十四
