body:
  text: 卷九十五潘尼安身論蓋崇德莫大乎安身安身莫尚乎存正存正莫重乎無私無私莫深乎寡欲是以君子安其身而後動易其心而後語定其交而後求篤其志而後行然則動者吉凶之端也語者榮辱之主也求者利病之幾也行者安危之決也故君子不妄動也動必適其道不徒語也語必經于理不苟求也求必造于義不虛行也行必由于正夫然用能免或繫之凶享自天之祐故身不安則殆言不從則悖交不審則惑行不篤則危四者行乎中則患憂接于外矣憂患之接必生于自私而興于有欲自私者不能成其私有欲者不能濟其欲理之至也欲苟不濟能無爭乎私苟不從能無伐乎人人自私家家有欲眾欲竝爭群私交伐爭則亂之萌也伐則怨之府也怨亂既構危害及之得不懼乎然棄本要末之徒戀進忘退之士莫不飾才銳智抽鋒擢穎傾側乎勢利之交馳騁乎當塗之務朝有彈冠之朋野有結綬之友黨與熾于前榮名扇其後握權則赴者鱗集失寵則散者瓦解求利則託刎頸之懽爭路則構刻骨之隙于是浮偽波騰曲辯雲沸寒暑殊聲朝夕異價駑蹇希奔放之迹鈆刀競一割之用至于愛惡相攻與奪交戰誹謗噂𠴲毀譽縱橫君子務能小人伐技風頹于上俗獘于下禍結而恨爭也不彊患至而悔伐之未辨大者傾國喪家次則覆身滅祀其故何邪豈不始于私欲而終于爭伐哉君子則不然知自私之害公也故後外其身知有欲之傷德也故遠絕榮利知爭競之遘災也故犯而不校知好伐之招怨也故有功而不德安身而不為私故身正而私全慎言而不適欲故言濟而欲從定交而不求益故交立而益厚謹行而不求名故行成而名美止則立乎無私之域行則由乎不爭之塗必將通天下之理而濟萬物之性天下猶我故與天下同其欲己猶萬物故與萬物同其利夫能保其安者非謂崇生生之厚而耽逸豫之樂也不忘危而已有期進者非謂窮貴寵之榮而藉名位之重也不忘退而已存其治者非謂嚴刑政之威而明司察之禁也不忘亂而已故寢蓬室隱陋巷披短褐茹藜藿環堵而居易衣而出苟存乎道非不安也雖坐華殿載文軒服黼繡御方丈重門而處成列而行不得與之齊榮用天時分地利甘布衣安藪澤沾體塗足耕而後食苟崇乎德非不進也雖居高位饗重祿執權衡握機祕功蓋當時勢侔人主不得與之比逸遺意慮沒才智忘肝膽棄形器貌若無能志若不及苟正乎心非不治也雖繁計策廣術藝審刑名峻法制文辯流離議論絕世不得與之爭功故安也者安乎道者也進也者進乎德者也治也者治乎心者也未有安身而不能保國家進德而不能處富貴治心而不能治萬物者也然思危所以求安慮退所以能進懼亂所以保治戒亡所以獲存也若乃弱志虛心曠神遠致徙倚乎不拔之根浮遊乎無垠之外不自貴于物而物宗焉不自重于人而人敬焉可親而不可慢也可尊而不可遠也親之如不足天下莫之能狎也舉之如易勝而當世莫之能困也達則濟其道而不榮也窮則善其身而不悶也用則立于上而非爭也舍則藏于下而非讓也夫榮之所不能動者則辱之所不能加也利之所不能勸者則害之所不能嬰也譽之所不能益者則毀之所不能損也今之學者誠能釋自私之心塞有欲之求杜交爭之原去矜伐之態動則行乎至通之路靜則入乎大順之門泰則翔乎寥廓之宇否則淪乎渾冥之泉邪氣不能于其度外物不能擾其神哀樂不能盪其守死生不能易其真而以造化為工匠天地為陶鈞名位為糟粕勢利為埃塵治其內而不飾其外求諸己而不假諸人忠肅以奉上愛敬以事親可以御一體可以牧萬民可以處富貴可以居賤貧經盛衰而不改則庶幾乎能安身矣晉書潘尼傳又略見藝文類聚二十三乘輿箴并序乘輿箴并序易稱有天地然後有人倫有父子然後有君臣傳曰大者天地其次君臣然君臣父子之道天地人倫之本未有以先之者也故天生蒸人而樹之君使司牧之將以導群生之性而理萬物之情豈以寵一人之身極無量之欲如斯而已哉夫古之為君者無欲而至公故有茅茨土階之儉而後之為君有欲而自利故有瑤臺瓊室之侈無欲者天下共推之有欲者天下共爭之推之之極雖禪代猶脫屣爭之之極雖劫殺而不避故曰天下非一人之天下乃天下之天下安可求而得辭而已者乎夫修諸己而化諸人出乎邇而見乎遠者言行之謂也故人主所患莫甚于不知其過而所美莫美于好聞其過若有君于此而曰予必無過唯其言而莫之違斯孔子所謂其庶幾乎一言而喪國者也蓋君子之過如日月之蝕過也人皆見之更也人皆仰之雖以堯舜湯武之盛必有誹謗之木敢諫之鼓盤杅之銘無諱之史所以閑其邪僻而納諸正道其自維持如此之備故箴規之興將以救過補闕然猶依違諷喻使言之者無罪聞之者足以自誡先儒既援古義舉內外之殊而高祖亦序六官論成敗之要義正辭約又盡善矣自虞人箴以至于百官非唯規其所司誠欲人主斟酌其得失焉春秋傳曰命百官箴王闕則亦天子之事也尼以為王者膺受命之期當神器之運總萬機而撫四海簡群才而審所授孜孜于得人汲汲于聞過雖廷爭面折猶將祈請而求焉至于箴規諫之順者曷為獨闕之哉是以不量其學陋思淺因負擔之餘嘗試撰而述之不敢斥至尊之號故以乘輿目篇蓋帝王之事至大而古今之變至眾文繁而義詭意局而辭野將欲希企前賢髣髴崇軌譬猶丘坻之望華岱恆星之繫日月也其不逮明矣頌曰元元遂初芒芒太始清濁同流玄黃錯跱上下弗形尊卑靡紀赫胥悠哉大庭尚矣皇極肇建兩儀既分彝倫永序萬邦已紛國事明王家奉嚴君各有攸尊德用不勤羲農已降暨于夏殷或禪或傳乃質乃文太上無名下知有之仁義不存而人歸孝慈無為無執何欲何思忠信之薄禮刑實滋既譽既畏以侮以欺作誓作盟而人始叛疑煌煌四海藹藹萬乘匪賢焉倚匪哲焉憑左輔右弼前疑後丞一日萬機業業兢兢夫出其言善則千里是應而莫余違亦喪邦有徵樞機之動式以廢興殷監不遠若之何勿懲且厚味腊毒豐屋生災辛作璇室而夏興瑤臺糟丘酒池象筯玉杯厥肴伊何龍肝豹胎惟此哲婦職為亂階殷用喪師夏亦不恢是以帝堯在位茅茨不翦周文日昃昧旦丕顯夫德輶如毛而或舉之者鮮故湯有慚德武未盡善叔世道衰末俗化淺耽樂逸遊荒淫沈湎不式古訓而好是佞辯不遵正路而覆車是踐成敗之效載在先典匪唯陵夷厥世用殄故曰樹君如之何將民是司牧視之猶傷而知其寒燠故能撫之斯柔而敦之斯睦無遠不懷靡思不服夫豈厭縱一人而玩其耳目內迷聲色外荒馳逐不修政事而終于顛覆昔唐氏授舜舜亦命禹受終納祖丕承天序放桀惟湯剋殷伊武故禪代非一姓社稷無常主四嶽三塗九州之阻彭蠡洞庭殷商之旅虞夏之隆非由尺土而紂之百剋卒于絕緒故王者無親唯在擇人傾蓋惟舊白首乃新望由釣夫伊起有莘負鼎鼓刀而謀合聖神夫豈借官左右而取介近臣蓋有國有家者莫云我聰或此面從或謂我智聽受未易甘言美疾尟不為累由夷逃寵遠于脫屣柰何人主位極則侈知人則哲惟帝所難唐朝既泰四族作奸周室既隆而管蔡不虔匪我二聖孰弭斯患若九德咸受儁乂在官君非臣莫治臣非君莫安故書美康哉而易貴金蘭有皇司國敢告納言晉書潘尼傳又略見藝文類聚十一燈箴序夫水火者所以佐理天地清成大化也在天則日月麗焉在地則水火存焉御覽八百六十九戴侍中銘雅論弘博逸藻波騰書鈔益州刺史楊恭侯碑益州刺史楊恭侯碑君乾靈之醇德挺一世之殊量稟天然不渝之操體蘭石芳堅之質夫其器膺弘濟智能周達窮不怨否顯不矜泰履行則為模楷吐言則成隱括德實充于內而光華發乎外也君發迹州國委質明主自景皇帝攝政文皇帝繼業值天下多虞疆埸未靜以君先帝所拔懷寶後時而深達遠識有經國之量故為腹心謀臣而監度政事焉君出則𥳑練熊羆職司是圖入則從容諷議盡規帷幄其所以進可替否決疑定策者皆言效于既往而事𥳑于帝心君再臨司官三撫名郡方將宣文德以來遠建武功于所牧銘曰天生蒸民有類有則誕育恭表應期秀特文兼六行武備七德忠肅弘毅柔嘉溫克機事無瑕臨疑不惑我謀既精我化既清澤流河朔勳著王庭西南未夷侯其是寍上天不惠早世潛靈藝文類聚五十給事黃門侍郎潘君碑君遇孫秀之難闔門受禍故門生感覆醢以增慟乃樹碑以紀事潘岳碣君深達治體垂化三宰文選任昉王文憲集序注遺王接書摯虞卞玄仁竝謂足下應和鼎味可無以應秀才行晉書王接傳永寍初舉秀才友人滎陽潘滔遺接書上安東將軍牋諫為鄭貴嬪祈禱廢事昔文王父子兄弟乃有三聖可謂窮理者也而文王日晏不暇食周公一沐三握髮何哉誠以一日萬機不可不理一言蹉跌患必及之故也當今衰季之末屬亂離之運而天子流播豺狼塞路公宜露營野次星言夙駕伏軾怒蛙以募勇士懸膽于庭以表辛苦貴嬪未安藥石實急禱祀之事誠復可修豈有便塞參佐白事斷賓客問訊今彊賊臨境流言滿國人心萬端去就紛紜願沖虛納下廣延儁彥思畫今日之要塞鬼道淫祀弘九合之勤雪天下之恥則群生有賴開泰有期矣晉書顧榮傳上書言南土人士陸士光貞正清貴金玉其質甘季思忠款盡誠膽幹殊快殷慶元質略有明規文武可施用榮族兄公讓明亮守節困不易操會稽楊彥明謝行言皆服膺儒教足為公望賀生沈潛青雲之士陶恭兄弟才幹雖少實事極佳凡此諸人皆南金也晉書顧榮傳榮又言云云書奏皆納之與親故書傳長虞為司隸勁直忠果劾按驚人雖非周才偏亮可貴也晉書傅咸傳與楊彥明書吾為齊王主簿恆慮禍及見刀與繩每欲自殺但人不知耳晉書顧榮傳與鄉人書士光氣息裁屬慮其性命言之傷心矣晉書陸曄傳議祀南北郊表太始中合二至之祀于二郊北郊之月古無明文或以夏至或同用陽復漢光武正月辛未始建北郊此則與南郊同月及中興草刱百度從簡合北郊于一丘憲章未備權用斯禮蓋時宜也至咸和中議別立北郊同用正月魏承後漢正月祭天以地配而稱周禮三王之郊一用夏正宋書禮志三康帝建元元年將北郊有疑議太常顧和表云云于是從和議表濟南王宜奪服為人後者降其所生奪天屬之性明至公之義降殺節文著于周典案濟南王統昔為庶母居廬持重違冒禮度肆其私情宜以禮奪服通典八十二穆帝永和中尚書令顧和表云云上言拜三公不應設樂服冕臨軒拜三公不應有樂和云禮無其文案衛宏撰漢儀拜丞相亦無樂古之燕饗有樂者以畼賓主之歡耳今拜三公事畢于階庭禮成于拜立歡宴未無事于樂又案六冕之服主于祭祀唯婚特用之他事未見服冕者故拜公不應服冕通典七十一咸康三年諫假保母周氏名號疏周保祐聖躬不遺其勳第舍供給擬于戚屬恩澤所加已為過隆若假名號記籍未見明比惟漢靈帝以乳母趙嬈為平氏君此末代之私恩非先代之令典且君舉必書將軌物垂則書而不法後嗣何觀晉書顧和傳奏復冕旒舊章舊冕十有二旒皆用玉珠今用雜珠等非禮若不能用玉可用白璇晉書顧和傳中興舊章多闕而冕旒飾以翡翠珊瑚及雜珠等和奏成帝下大常改之奏劾謝尚擅殺陳幹事尚先劾姦贓罪入甲戌赦聽自首減死而尚近表云幹包藏姦猾輒收行刑幹事狀自郡非犯軍戎不由都督案尚蒙親賢之舉荷文武之任不能為國惜體平心聽斷內挾小憾肆其威虐遠近怪愕莫不解體尚忝外屬宥之有典至于下吏宜正刑辟晉書顧和傳奏禁喪服違制禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺節文著于周典案汝南王統為庶母居廬服重江夏公衛崇本由疏屬開國之緒近喪所生復行重制違冒禮度肆其私情閭閻許其過厚談者莫以為非則政道陵遲由乎禮廢憲章穨替始于容違若弗糾正無以齊物皆可下太常奪服若不祗王命應加貶黜晉書顧和傳奔喪議案禮記曾子問父母之喪既引及塗聞君薨如之何穀梁傳曰周人魯人各有喪周人弔魯人不弔周人雖有喪遣人可也魯人當親行事故不弔也通典八十康帝建元初尚書僕射顧和議移國子博士自理郡將曹公昔臨獘國見接有布衣之交高游盡歡謂千年可畢不意後會逼為功曹尋被州召不為公察孝也欲深其罪崇飾虛名以惑明時宙雖不德數受教于君子寍有故將之喪而忘奔赴之哀過蒙殊恩忝佐方岳銜命守制無因致身禮聞父母喪不得奔赴為位斂髮成踊襲絰割孝子之心以終君之命謂之禮也往聞喪設位盡哀仰則先哲俯順王度儀型古典不失舊物若此為罪不敢逃刑聞凶則因發健步書弔嫡孫健步迴說喪己還東阿留書付其從子綜宙尋被召為博士王事敦我不皇啟處如宙凶薄天討其罪孤獨無子代之哀人也案穀梁傳曰周人有喪魯人有喪周人弔魯人不弔魯人曰吾君親之者也使大夫則不可周人喪魯人不弔是其下成康未為久也禮無臣祭君之文時俗之所行非先王之令典也庶子不得祭父臣之祭君也求之禮傳無弔祭之文通典九十九
