body:
  text: 何楨許都賦元正大饗壇彼東南旗幕峨峨簷宇弘深宋書禮志一景福鬱枕以雲起飛棟鳥企而翼舒文選陸倕石闕銘注乃然百枝盛庭燎北堂書鈔一百五十五表省函關易稱王公設險守其國孟軻云古者關譏而不征關險之設所由尚矣藝文類聚六引何楨集正始六年為弘農太守表省函關為舊君反服議禮為貴臣貴妾緦麻三月夫貴之施賤猶論恩紀以制服況嘗為臣吏禮遇恩紀優劣不同焉可同之一例今以為辟舉正職之吏宜依古為舊君服不論違適之異皆齊縗三月其餘郡吏聞喪盡哀而已通典九十又宋書禮志二泰始四年尚書何楨奏故辟舉綱紀吏不計違適皆反服舊君齊衰三月箋凡二日蝗生此謂見其始生知其處所可得言初上蝗事云縣及下部各不旱見至今生翅能飛臣輒躬親撲滅布在及下部各不旱見至一頃田中往往十步五步一頭案其言事蝗之枚數可得而知也藝文類聚一百玄壽賜名敘新婦荀氏所生女以歲在丁丑四月五日日始出時生此月斗建巳其日又巳其時加卯甲乙卯皆東南春夏天地動發萬物茲之三月吉之善時也又于易卦震值在卯巽位在巳震為長男巽為長女而此女孫正用茲日斯時始旦日月豈依先祖之靈實臨祐之玄髮素顏婦人之上姿也壽考無疆先民之至願也故賜名曰玄壽焉御覽三百六十二與周浚箋書貴克讓易大謙光斯古文所詠道家所崇前破張悌吳人失氣龍驤因之陷其區宇論其前後我實緩師動則為傷事則不及而今方競其功彼既不吞聲將虧雍穆之弘興矜爭之鄙斯愚情之所不取也晉書周浚傳浚隨王惲代吳惲欲與王濬爭功惲箋與浚浚諫止惲不納賀正表琁衡運周元正肇祚伏惟陛下應乾納祜與天同休初學記四請徵虞喜疏臣聞二八舉而四門穆十亂用而天下安徽猷克闡有自來矣方今聖德欽明思恢遐烈旌輿整駕俟賢而動伏見前賢良虞喜天挺貞素高尚邈世束修立德皓首不倦加以傍綜廣深博聞強識鑽堅研微有弗及之勤處靜味道無風塵之志高枕柴門怡然自足宜使蒲輪紆衡以旌殊操一則翼贊大化二則敦勵薄俗晉書虞喜傳奏言沙門不應敬王者尚書令冠軍撫軍都鄉侯臣充散騎常侍左僕射長平伯臣翜散騎常侍右僕射建安伯臣恢尚書關中侯臣懷守尚書昌安子臣廣等言世祖武皇帝以盛明革命肅祖明皇帝聰聖玄覽豈于時沙門不易屈膝顧以不變其修善之法所以通天下之志也愚謂宜遵承先帝故事于義為長釋藏冠一沙門不應拜俗事一又奏尚書令冠軍撫軍都鄉侯臣充散騎常侍左僕射長平伯臣翜散騎常侍右僕射建安伯臣恢尚書關中侯臣懷守尚書昌安子臣廣等言詔書如右臣等暗短不足以讚揚聖旨宣畼大義伏省明詔震懼屏營輒共尋詳有佛無佛固非臣等所能定也然尋其遺文讚其要旨五戒之禁實助王化賤昭昭之名行貴冥冥之潛操行德在于忘身抱一心之清妙且興自漢世迄于今日雖法有隆衰而弊無妖妄神道經久未有其比也夫詛有損也祀必有益臣之愚誠實願塵露之微增潤嵩岱區區之祝上裨皇極今一令其拜遂壞其法令修善之俗廢于聖世習實生常必致愁懼隱之臣心竊所未安臣雖蒙蔽豈敢以偏見疑誤聖聽直謂世經三代人更明聖今不為之制無虧王法而幽冥之路可無擁滯是以復陳愚誠乞垂省察謹啓釋藏冠一沙門不拜俗事一臣充等言臣等雖誠暗蔽不通遠旨至于乾乾夙夜思修王度寧苟執偏管而亂大倫邪直以漢魏逮晉不聞異議尊卑憲章無或暫虧也今沙門之慎戒專然及為其禮一而已矣至于守戒之篤者亡身不吝何敢以形骸而慢禮敬哉每見燒香祝願必先國家欲福祜之隆情無極已奉上崇順出于自然禮儀之簡蓋是專一守法是以先聖御世因而弗革也天網恢恢疏而不失臣等屢屢以為不令致拜于法無虧因其所利而惠之使賢愚莫敢不用情則上有天覆地載之施下有守一修善之人謹復陳其愚淺願蒙省察謹啓釋藏冠一沙門不拜俗事一弘明集褚太后敬父議如禪所正可敕御史左將軍入在公廷則修臣敬皇太后歸寧之日則全子禮申諭內外奉行通典六十七與庾翼書褚將軍還朝值太后臨朝時議褚侯雖后父乃晉臣也宜用鄭議或謂諸王宜不拜耳乃不稱臣燕王非比也又云竇武雖受爵太后録尚書事而漢無拜文為疑故恐大義乖錯褚侯既不拜便是異姓太上皇也此巍巍亦庶姓不敢安通典六十七請修五嶽祠唐虞之制天子五載一巡狩順時之方柴燎五嶽望于山川遍于群神故曰因名山升中千天所以昭告神祇饗報功德是以災厲不作而風雨寒暑以時降及三代年數雖殊而其禮不易五嶽視三公四瀆視諸侯著在經記所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大串川之祠而正立之祀可以闕哉自永嘉之亂神州傾覆茲事替矣惟灊之天柱在王略之內也舊臺選百戶吏卒以奉其職中興之際未有官守廬江郡常遣太史兼假四時禱賽春釋寒而冬請冰自咸和迄于今又復隳替計今非典之祠可謂非一考其正名則淫昏之鬼推其糜費則百姓之蠹而山川大神更為簡缺禮俗頽紊人神雜擾公私奔惑漸以繁滋良由頃國家多難日不暇給草建廢滯事有未遑今元憝已殲宜修舊典嶽瀆之域風教所被來蘇之衆咸蒙德澤而神祇禋祀未之或甄巡狩柴燎其廢尚矣崇明前典將俟皇輿北旋稽古憲章大釐制度其五嶽四瀆宜增修之處但俎豆牲牢祝嘏文辭舊章靡記可令禮官作式歸諸誠簡以達明德馨香如斯而已其諸妖孽可粗依法令先去其甚俾邪不黷正晉書禮志上宋書禮志通典五十五追駁江統許遐拜時遭喪議夫正名者道理之本然拜時非古而行之歷代遂以成俗古者布其几筵恭告祖禰將納他族以奉宗祀父親醮子而命之迎女受父母之遺以涉夫氏之庭而交拜敬之禮在塗喪紀定矣服制既正齊功卒哭可迎此不闕于古而通于今議是也然婚姻之道公私急務愚以為拜時及一日二日之婦婦名既正即宜一揆其衾裯未接歸葬其黨通典五十九天子敬父議父母之尊擬則天地君親之道資敬是同今承命運君臨率土而父以子食天祿不敢子天子以明王者之道而子雖以為天子必有尊也推斯以言父自必臣天位之君而子自必尊天性之父通典六十七為曾祖後服議卿士之家別宗無後宗緒不可絶若昆弟以孫若曾孫後之理宜然也禮緣事而興不應拘常以為礙也魏之宗聖遠繼宣尼琦從父以孫繼族祖荀顗無子以兄孫為嗣此成比也通典九十六論前母黨服夫子曰必也正名乎正名者理道之本禮之大者也文條或闕而附例可明禮云生不及祖父母昆弟而父稅喪己則不若與祖乖違父既歿而聞喪豈可拘以本制不稅而廢其正服乎若未生而伯叔母終終為伯叔父後繼嗣之道雖同原情之實則異今必從于所養而反疑于為本乎諸侯國人生不及先代之君于其陵廟亦必曰君也此公義之正名也前母之尊固家人正稱也其易了如皎日太康初博議王昌前母服公府卞粹以為母之非親而服三年者非一也前母名同尊正義存配父蓋以生不及故無其制非于義不可也元康中有改葬前母而疑其服司徒左長史胡濟以前母父之元妃所生則家之嫡長應制如改葬之服于時二代無曰不允自茲以來行之不殊禮母卒自為母之黨服母出則不為母之黨服而為繼母之黨服故尊其所從則不敢不服服有所逼則不得自伸外服無二而必宜有一如向所論必所繼不及伯叔母之黨居然可見矣明以名禮為制者不計恩逮與不也答納采文皇帝嘉命訪婚陋族備數采擇臣之從祖弟先臣散騎侍郎準之遺女未間教訓衣履若人欽承舊章肅奉典制前太尉參軍都鄉侯糞土臣何琦頓首稽首再拜承制詔晉書穆章何皇后傳通典五十八答問名文皇帝嘉命使者彪之到重宣中詔問臣名族臣族女父母所生先臣故光祿大夫雩婁侯楨之遺玄孫先臣故豫州刺史關內侯惲之曾孫先臣故安豐太守關內侯睿之孫先臣故散騎侍郎準之遺女外出自于先臣故尚書左丞孔胄之外曾孫先臣故待中關內侯夷之外孫女年十七欽承舊章肅奉典制前某官某侯糞土臣何琦稽首頓首再拜欽承制詔答納吉文皇帝嘉命使者彪之重宣中制大卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制前某官某侯糞土臣何琦稽首頓首再拜承制詔答納徵文皇帝嘉命使者某重宣中制降婚卑陋崇以上公寵以豐禮備物典册欽承舊章肅奉典制前某官某侯云云再拜承制詔答請期文皇帝嘉命使者彪之重宣中制告曰惟八月壬子可迎臣欽承舊章肅奉典制前某官某侯再拜承制詔答迎后文皇帝嘉命使者晞重宣中制令月吉辰備禮以迎上公宗卿兼至副介近臣百兩臣螻蟻之族猥承大禮憂懼戰悸欲承舊章肅奉典制前某官某侯糞土臣某謹因使者兼某官某王晞上謹答並晉書禮志下通典五十八太皇太后服議太皇太后名位允正體同皇極理制備盡情禮彌伸春秋之義母以子貴既稱夫人禮服從政故成風著夫人之號昭公服三年之喪子于父之所生體尊義重且禮祖不厭孫固宜遂服無屈而緣情立制若嫌明文不存則疑從重應同為祖母後齊衰周永安皇后無服但一舉哀百官亦一周通典八十奏請延訪三公古者三公坐而論道內參六官之事外與六卿之教或處三槐兼聽獄訟稽疑之典謀及卿士陛下聖德欽明垂心萬機猥發明詔儀刑古式雖唐虞疇咨周文翼翼無以加也自今以往國有大政可親延群公詢納讜言其軍國所疑延詣省中使侍中尚書咨論所宜若有疾疢不任覲會臨時遣侍訊訪晉書李胤傳王毖子昌前母服議毖為黃門侍郎江南已叛石厚與焉大義滅親況于毖之義可得以為妻乎晉書禮志中案王昌事詳前竟陵王楙文奏議齊王攸之藩伏聞大司馬齊王當出藩東夏備物盡禮同之二伯今陛下為聖君稷契為賢臣內有魯衛之親外有齊晉之輔坐而守安此萬世之基也古之夾輔王室同姓則周公其人也異姓則太公其人也皆身在內五世反葬後雖有五霸代興桓文譎主下有請隧之僭上有九錫之禮終于譎而不正驗于尾大不掉豈與召公之歌棠棣周詩之詠鴟梟同日論哉今聖朝創業之始始之不諒後事難工幹植不強枝葉不茂骨鯁不存皮膚不充自羲皇以來豈是一姓之獨有欲結其心者當有磐石之固夫欲享萬世之利者當與天下議之故天之聰明自我人之聰明秦魏欲獨擅其威而財得沒其身周漢能分其利而親疏為之用此自聖主之深慮日月之所照事雖淺當深謀之言雖輕當重思之志備位儒官若言不及禮是志寇竊知忠不言義所不敢志以為當如博士等議晉書曹志傳肉刑議嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常苟免犯法乃衆黥刖彰罪而民甚恥且創制墨黥刖見者知禁彰罪表惡亦足以畏所以易曰小懲大戒豈蹈惡者多邪假使惡多尚不致死無妨産育苟必行殺以止殺為惡縱寡積不己將至無人天無以大君無以尊矣故古人寧過不殺不寧輕積殺是以為上寧寬得衆不寧急積殺若乃于張聽訟刑以止刑可不革舊過此以往肉刑宜復假令漢文于張承大亂之後創基七十國寡民稀止禁刑書鞭杖為治也肉刑于死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未之喻也藝文類聚五十四移冀州大中正臣以元康四年為先定公薨背還濟北穀城墓宅安厝太學博士趙國蘇宙昔先公臨趙以宙為功曹後為察孝前臣遭難宙為鎮東司馬趙之故吏有致身敘哀者有在職遣奉版者唯宙名諱不至宙今典禮學之官口誦義言不可廢在三之義于宙應見論貶通典九十九元康中趙郡吏蘇宙不奔弔于郡將中郎關中侯曹臣移冀州大中正云云
