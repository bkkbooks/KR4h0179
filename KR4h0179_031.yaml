body:
  text: 荀顗議故吏為舊君服表禮臣為君斬縗三年與子為父同以進登天朝絶無舊君之心廢反服之禮非所以敦風崇教今使仕者反服舊君于義為弘通典九十昌邑侯滿瑋庶妹服議諸侯絶周大夫絶緦然則尊同周以及緦皆如本親喪服經曰君為姑妹女子子嫁于國君者傳曰何以大功尊同也又曰大夫為伯叔父母子昆弟昆弟之子為士者傳曰何以大功尊不同也然則尊不同則降不待所臣乃絶之諸侯尊重大夫尊輕以大夫尊降其親則知諸侯雖所不臣絶不服也通典九十三賜諡議若賜諡而道遠不及葬者皆封策下屬遣所承長吏奉策即家祭賜諡晉書甲乙問議春秋竝后匹嫡古之明典也今不可以犯禮竝立二妻不別尊卑而遂其失也故當斷之以禮先至為嫡後至為庶景子宜以嫡母服乙乙子宜以庶母事景昔屈建去芰古人以為違禮而得禮景子非為抑其親斯自奉禮先後貴賤順敘之義也晉書禮志中太尉荀顗議上疏請增置博士臣聞孔子有云才難不其然乎自喪亂以來經學尢寡儒有席上之珍然後能弘明道訓今處學則闕朝廷之秀仕朝則廢儒學之美昔咸寧太康元康永嘉之中侍中常侍黃門之深博道奧通洽古今行為世表者領國子博士一則應對殿堂奉酬顧問二則參訓門子以弘儒學三則祠儀二曹及太常之職以得藉用質疑今皇朝中興美隆往初宜憲章令軌祖述前典世祖武皇帝聖德欽明應運登禪受終于魏崇儒興學治致升平經始明堂營建辟雍告朔班政鄉飲大射西閣東序河圖祕書禁籍臺省有宗廟太府金墉故事太學有石經古文先儒典訓賈馬鄭杜服孔王何顏尹之徒章句傳注衆家之學置博士十九人九州之中師徒相傳學士如林猶選張華劉實居太常之官以重儒教傳稱孔子沒而微言絶七十子終而大義乖自頃中夏殄瘁講誦遏密斯文之道將墜于地陛下聖哲龍飛闡弘祖烈申命儒術恢崇道教樂正雅頌于是乎在江揚二州先漸聲教學士遺文于今為盛然方之疇昔猶千之一也臣學不章句才不弘道階緣光寵遂忝非服方之華實儒風邈遠思竭駑駘庶增萬分願斯道隆于百代之上縉紳詠于千載之下伏聞節省之制皆三分置二博士舊員十有九人今五經合九人準古計今猶未中半九人以外猶宜增四願陛下萬機餘暇時垂省覽周易一經有鄭玄注其書根源誠可深惜宜為鄭易置博士一人儀禮一經所謂曲禮鄭玄于禮特明皆有證據宜置鄭儀禮博士一人春秋公羊其書精隱明于斷獄宜置博士一人穀梁簡約隱要宜存于世置博士一人昔周之衰下陵上替臣弒其君子弒其父上無天子下無方伯善者誰賞惡者誰罰綱紀亂矣孔子懼而作春秋諸侯諱妒懼犯時禁是以微辭妙旨義不顯明故曰知我者其唯春秋罪我者其唯春秋時左丘明子夏造膝親受無不精究孔子既沒微言將絶于是丘明退撰所聞而為之傳其書善禮多膏腴美辭張本繼末以發明經義信多奇偉學者好之儒者稱公羊高親受子夏立于漢朝辭義清俊斷決明審多可採用董仲舒之所善也穀梁赤師徒相傳暫立于漢時劉向父子漢之名儒猶執一家莫肯相從其書文清義約諸所發明或是左氏公羊所不載亦足有所訂正是以三傳竝行于先代通才未能孤廢今去聖久遠斯文將墜與其過廢寧過而立也臣以為三傳雖同一春秋而發端異趣案如三家異同之說義則戰爭之場辭亦劍戟之鋒于理不可得共博士宜各置一人以傳其學宋書禮志一又晉書荀嵩傳通典五十三皆有刪節議王式事禮繼母嫁從為之服報其犯出者無服案式母之求去式父之遣竝無例若以父母之過非式所得言及式奉親盡禮而母自求去者過在母矣式之追服可謂過厚若乃六親有違繼就非禮宜訪之中正宗老非禮官所得逆裁通典九十四大興三年太常曲陵公荀嵩騎都尉蕭輪議云云議上元帝廟號禮祖有功宗有德元皇帝天縱聖哲光啓中興德澤侔于太戊功惠邁于漢宣臣敢依前典上號曰中宗晉書荀嵩傳答卞壺論劉嘏同姓為昏如嘏所執苟在限內雖遠不可苟在限外不遠可通也吾無以異之王伯與鄭玄高雋弟子也為子稚賓取王處道女也當得禮意于時清談盡無譏議今難者雖苦竟不能折其理春秋不伐有辭謂嘏不應見責通典六十與王導書三年當大禘愍帝已居子位復居父位且子雖齊聖不先父食此君即父也此為愍帝是先帝之父懷帝是愍帝之父惠帝是懷帝之父二代更重四代所以為疑處也通典四十八與王敦書誠以長蛇未翦別詳宗祖先帝應天受命以隆中興中興之主寧可隨世數而遷毀敢率丹直詢之朝野上號中宗卜日有期不及重請專輒之愆所不敢辭晉書荀嵩傳蒲萄賦靈運宣流休祥允淑懿彼秋方乾元是畜有蒲萄之珍偉應淳和而延育藝文類聚八十七讓樂事表臣掌著作又知祕書今覆校錯誤十萬餘卷書不可倉卒復兼他職必有廢頓者也薦李胤為司徒表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李胤忠亮高潔堪處台輔御覽二百八引荀勖對詔薦三公保傅表三公保傅宜得其人若使楊珧參輔東宮必當仰稱聖意尚書令衛瓘吏部尚書山濤皆可為司徒如以瓘新為令未出者濤即其人晉書荀勖傳時太尉賈充司徒李胤竝薨太子太傅又闕勖表陳從之讓尚書令表昔六官所掌冢宰為首秦漢公卿贊以丞相御史為冠今者尚書令總此三者非臣駑暗所宜忝竊書鈔五十九引荀勖集讓豫州大中正表被敕以臣為豫州大中正臣與州閭鄉黨初不相接臣本州十郡方于他州人數倍多品藻人物以正一州清論此乃臧否之本風俗所重御覽二百六十五引荀勖集奏校試笛律中所出御府銅管二十五具太常樂部郎劉秀等校試其三具與杜夔左延年律法同其二十二具視其名題尺寸是笛律也問協律中郎將列和云昔魏明帝時令和承受笛聲以作此律欲使學者別居一坊歌詠講習依此律調至于都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也藝文類聚五御覽十六竝引晉諸公贊又見晉書律曆志上又見宋書律志奏條牒諸律問列和意狀昔先王之作樂也以振風蕩俗饗神祜賢必協律呂之和以節八音之中是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宮此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度考以正律皆不相應吹其聲均多不諧合又辭先師傳笛別其清濁直以長短工人裁制舊不依律是為作笛無法而和寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂憲于後者也謹條牒諸律問和意狀如左及依典制用十二律造笛象十二枚聲均調和器用便利講肄彈擊必合律呂況乎宴饗萬國奏之廟堂者哉雖伶夔曠遠至音難精猶宜儀形古者以求厥衷合乎經禮于制為詳若可施用請更部笛工選竹造作下太樂樂府施行平議諸杜夔左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毀勖又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東箱長笛正聲已長四尺二寸今當復取其下徵之聲于法聲濁者笛當長計其尺寸乃五尺有餘和昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輒應一律也案太樂四尺二寸笛正聲均應蕤賓以十二律還相為宮推法下徵之孔當應律大呂大呂笛長二尺六寸有奇不得長五尺餘輒令太樂郎劉秀鄧昊等依律作大呂笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓箏宋同吹笛以為雜引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而令調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宮商角徵不孔調與不調以何檢知和辭先師相傳吹笛但以作曲相語為某曲當舉某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依案舊像訖但吹取鳴者初不復校其諸孔調與不調也案周禮調樂金石有一定之聲是故造鐘磬者先依律調之然後施于廂懸作樂之時諸音皆受鐘磬之均即為悉應律也至于饗宴殿堂之上無廂懸鐘磬以笛有一定之調故諸絃歌皆從笛為正是為笛猶鐘磬宜必合于律呂如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正唯取竹之鳴者為無法制輒令部郎劉秀鄧昊王豔魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律呂之義作樂音均高下清濁之調當以何名之和辭每合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然案周禮奏六樂乃奏黃鍾歌大呂乃奏太簇歌應鍾皆以律呂之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺二寸者應無射之律若宜用長笛執樂者曰請奏無射周語曰無射所以宣布哲人之令德示民軌儀也二尺八寸四分四釐應黃鍾之律若宜用短笛執樂者曰請奏黃鍾周語曰黃鍾所以宣養六氣九德也是則歌奏之義當合經禮考之古典于制為雅晉書律曆志上宋書律志奏諫用伊羡趙咸為中書舍人晉武帝時門下啓通事令史伊羡趙咸為中書舍人對掌文法勖奏以為不可御覽二百二十二引荀勖集今天下幸賴陛下聖德六合為一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法為政皆愚臣所未達者昔張釋之諫漢文謂獸圈嗇夫不宜見用邴吉住車明調和陰陽之本此二人豈不知小吏之惠誠重惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付內常侍以臣所聞明帝時唯有通事劉泰等官不過與殿中同號耳又頃言論者皆云省官減事而求益吏者相尋矣多云尚書郎大令史不親文書乃委付書令史及幹誠吏多則相倚也增置文法之職適恐更耗擾臺閣臣竊謂不可晉書荀勖傳甲乙問議昔鄉里鄭子群娶陳司空從妹後隔呂布之亂不復相知存亡更娶鄉里蔡氏女徐州平定陳氏得還遂二妃竝存蔡氏之子字元釁為陳氏服嫡母之服事陳公以從舅之禮族兄宗伯曾責元釁謂抑其親鄉里先達以元釁為合宜不審此事粗相似否晉書禮志中安豐太守程諒先已有妻後又娶遂立二嫡前妻亡後妻子勳疑所服中書令張華造甲乙問王昌前母服議昔鄭子群娶陳司空從妹後隔呂布之亂不知存亡更娶蔡氏女徐州平後陳氏得還遂二妃竝存蔡氏之子元疊為陳氏服嫡母之服族兄宗伯曾責元疊謂抑其親鄉里先達以元疊為合宜通典八十九又陳遣王公之國議如詔準古方伯選才使軍國各隨方面為都督誠如明旨至于割正封疆使親疏不同誠為佳矣然分裂舊土猶懼多所搖動必使人心忽擾思惟竊宜如前若于事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經遠實不成制度然但虛名其于實事略與舊郡縣鄉亭無異若造次改奪恐不能不以為恨今方了其大者以為五等可須後裁度凡事雖有久而益善者若臨時或有不解亦不可忽晉書荀勖傳省吏議省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之于本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化篤義行崇敦睦使昧寵忘本者不得容而僞行自息浮華者懼矣重敬讓尚止足令賤不妨貴少不陵長遠不閒親新不閒舊小不加大淫不破義則上下相安遠近相信矣位不可以進趣得譽不可以朋黨求則是非不妄而明官人不惑于聽矣去奇技抑異說好變舊以徼非常之利者必加其誅則官業有常人心不遷矣事留則政稽政稽則功廢處位者而孜孜不怠奉職司者而夙夜不懈則雖在挈瓶而守不假器矣使信若金石小失不害大政忍忿捐以容之簡文案略細苛令之所施必使人易視聽願之如陽春畏之如雷震勿使微文煩撓為百吏所黷二三之命為百姓所饜則吏竭其誠下悅上命矣設官分職委事責成君子心競而不力爭量能受任思不出位則官無異業政典不奸矣凡此皆愚所謂省事之本也苟無此愆雖不省吏天下必謂之省矣若欲省官私謂九寺可并于尚書蘭臺宜省付三府然施行歷代世之所習是以久抱愚懷而不敢言至于省事實以為善若直作大例皆減其半恐文武衆官郡國職業及事之興廢不得皆同凡發號施令典而當則安儻有駁者或致壅否凡職所臨履先精其得失使忠信之官明察之長各裁其中先條上言之然後混齊大體詳宜所省則令下必行不可搖動如其不爾恐適惑人聽比前行所省皆須臾輒復或激而滋繁亦不可不重晉書荀勖傳時又議省州郡縣半吏以赴農功勖議以為云云為晉文王與孫晧書聖人稱有君臣然後有上下禮義是故大必字小小必事大然後上下安服群生獲所逮至末塗純德既毀勦民之命以爭彊于天下違禮順之至理則仁者弗由也方今主上聖明覆幬無外僕備位宰輔屬當國重惟華夏乖殊方隅圮裂六十餘載金革亟動無年不戰暴骸喪元困悴罔定每用悼心坐以待旦將欲止戈興仁為百姓請命故分命偏師平定蜀漢役未經年全軍獨克于時猛將謀夫朝臣庶士咸以奉天時之宜就征討之軍藉吞敵之勢宜遂回旗東指以臨吳境舟師泛江順流而下陸軍南轅取徑四郡兼成都之械漕巴漢之粟然後以中軍整旅二方雲會未及浹辰可使江表底平南夏順軌然國朝深惟伐蜀之舉雖有靜難之功亦悼蜀民獨罹其害戰于綿竹者自元帥以下竝受斬戮伏尸蔽地血流丹野一之于前猶追恨不忍況重之于後乎是故旋師案甲思與南邦共全百姓之命夫料力忖勢度資量險遠考古昔廢興之理近鑒西蜀安危之效隆德保祚去危即順屈己以寧四海者仁哲之高致也履危偷安隕德覆祚而不稱于後世者非智者之所居也今朝廷遣徐紹孫彧獻書喻懷若書御于前必少留意回慮革算結歡弭兵共為一家惠矜吳會施及中土豈不泰哉此昭心之大願也敢不承受若不獲命則普天率土期于大同雖重干戈固不獲已也吳志歸命侯傳注引漢晉春秋今餉雜色綾十端縠三端細縑十匹藝文類聚八十五御覽八百十六引兩條又八百十八答王琛書答王琛書王陶丘州人廟盜鮮卑金頭寶帶十二枚書鈔一百二十九上穆天子傳序序古文穆天子傳者太康二年汲縣民不準盜發古冢所得書也皆竹簡素絲編以臣勖前所考定古尺度其簡長二尺四寸以墨書一簡四十字汲者戰國時魏地也案所得紀年蓋魏惠成王子今王之冢也于世本蓋襄王也案史記六國年表自今王二十一年至秦始皇三十四年燔書之歲八十六年及至太康二年初得此書凡五百七十九年其書言周穆王遊行之事春秋左氏傳曰穆王欲肆其心周行于天下將皆使有車轍馬跡焉此書所載則其事也王好巡守得盜驪騄耳之乘造父為御以觀四荒北絶流沙西登昆侖見西王母與太史公記同汲郡收書不謹多毀落殘缺雖其言不典皆是古書頗可觀覽謹以二尺黃紙寫上請事平以本簡書及所新寫竝付祕書繕寫藏之中經副在三閣謹序穆天子傳道藏本議定父子生離哀制表有六親相失及不知父母沒地者以未指得亡死之閒沒地處所情慮無異然以未審指的希萬一之存未忍舉哀則有終身之戚不涉吉事或推一身承一宗之重傳祖考遺體無心婚娶遂令宗祀絶滅于一人及犯不孝莫大無後之罪此實難處熬臣以為此非聖人不以死傷生之教也兩路相通久無音問殯可知矣但不了死地耳如此之徒宜以王法斷之令舉哀制服勤三年凶不過三年此近亡于禮者之禮也通典九十八請議定改葬服制表王路漸通士人得視冢墓多聞凶問朝野所行不同或有輕重斬杖者復有制齊衰三月緦麻三月者直素服盡哀者人生不同性有厚薄是以聖人制禮居中使賢者俯就不肖者企及臣謂墓毀之制改葬緦麻當包之矣鄭康成王子雍皆云棺毀見尸痛之極也今遇賊見毀理無輕重也以禮無明文行者致異臣以為宜使明禮大臣議為正通典一百二霍原不應舉寒素議寒素者當謂門寒身素無世祚之資原為列侯顯佩金紫先為人閒流通之事晚乃務學少長異業年踰始立草野譽未洽德禮無聞不應寒素之目晉書李重傳燕國中正劉沈舉霍原為寒素司徒左長荀組以為云云駁尚書符下陳留王使出城夫昔虞賓在位書稱其美詩詠有客載在雅頌今陳留王位在三公之上坐在太子之右故答表曰書賜物曰與此古今之所崇體國之高義也謂宜除夫役晉書荀奕傳重駁春秋之末文武之道將墜于地新有子朝之亂于時諸侯逋替莫肯率職宋之于周實有列國之權且同已勤王而主之者晉客而辭役責之可也今之陳留無列國之勢此之作否何益有無臣以為宜除于國職為全同上駁讀秋令尚書三公曹奏讀秋令儀注新荒以來舊典未備臣等參議武皇帝時光祿大夫臣華恆議以秋與夏盛暑常闕不讀令在春冬則不廢也夫先王所以順時讀令者蓋後天而奉天時正服尊嚴之所重今服章所闕加比熱隆赫臣等謂可如恆議依故事闕而不讀晉書禮志上宋書禮志二通典七十咸和五年六月有司奏讀秋令兼侍中散騎常侍荀奕兼黃門侍郎散騎侍郎曹宇駁云云詔可元會敬司徒議三朝之首宜明君臣之體則不應敬若他日小會自可盡禮又至尊與公書手詔則曰頓首言中書為詔則云敬問散騎優冊則曰制命今詔文尚異況大會之與小會理豈得同晉書荀奕傳
