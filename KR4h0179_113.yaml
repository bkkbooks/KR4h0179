body:
  text: 華簡上言風師雨師不得避諱案周禮大宗伯職云槱燎祀司中司命風師雨師此禮文正稱應如丙辰詔書不改其名通典一百四為流人上表流人十萬餘口非漢中一郡所能振贍東下荊州水遄迅險又無舟船蜀有倉儲人復豐稔宜令就食晉書載紀李特傳元康中關西流人數萬家入漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劍閣苾至漢中受流人貨賂反為表云云朝廷從之密上流民表流民剛戇而蜀人懦弱客主不能相饒宜移還其本土不者與東三郡隘地觀其情態漸不可長將移秦雍之禍于梁益矣倉庫虛竭無以應鋒鏑之急必益聖朝西顧之憂並見華陽國志八又晉書載紀李特傳與此小異與秀才對策瞻聞有國有家者皆欲邁化隆政以康庶績垂歌億載永傳于後然而俗變事斃得不隨時雖經聖哲無以易也故忠斃質野敬失多儀周鑒二王之斃崇文以辨等差而流遁者歸薄而無款誠款誠之薄則又反之于忠三代相循如水濟火所謂隨時之義救斃之術也羲皇簡朴儛為而化後聖因承所務或異非賢聖之不同世變使之然耳今大晉闡元聖功日躋承天順時九有一貫荒服之君莫不來同然而大道既往人變由久謂當今之政宜去文存朴以反其本則兆庶漸化大和可致也周制明堂所以崇其祖以配上帝敬恭明祀永光孝道也其大數有六古者聖帝明王南面而聽政其六則以明堂為主又其正中皆云太廟以順天時施行法令宗祀養老訓學講肄朝諸侯而選造士備禮辨物一教化之由也故取其宗祀之類則曰清廟取其正室之貌則曰太廟取其室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧雍異名同事其實一也是以蔡雍謂之一物興隆之政務在得賢清平之化急于拔才故二八登庸則百揆序有亂十人而天下泰武丁擢傅巖之徒周文攜渭濱之士居之上司委之國政故能龍奮天衢垂勳百代先王身下白屋搜楊仄陋使山撫扶蘇之才野無伐檀之詠是以化厚物感神祇來應翔鳳飄颻甘露豐墜醴泉吐液朱草自生萬物滋茂日月重光和氣四塞大道以成序君臣之義敦父子之親明夫婦之道別長幼之宜自九州被八荒海外移心重譯入貢頌聲穆穆南面垂拱也今貢賢之塗已闓而教學之務未廣是以主競之志恆鋭而務學之心不修若闢四門以延造士宣于教以明令德考績殿最審其優劣厝之百寮置之群司使調物度宜節宣國典必協濟康哉符契往代明良來應金蘭復存也二儀分則兆庶生兆庶生則利害作利害之作有由而然也太古之時化道德之教賤勢力而貴仁義仁義貴則強不陵弱衆不暴寡三皇結繩而天下泰非惟象刑緝熙而已也且太古知法所以遠獄及其末不失有罪是以獄用彌繁而人彌暴法令滋章盜賊多有書曰惟敬五刑以成三德叔世道衰既興三辟而文公之斃又加族誅淫刑淪胥感傷和氣化染後代不能變改故漢祖指麾而六合響應魏承漢末因而未革將以俗變由久權時之宜也今四海一統人思反本漸尚簡朴則貪夫不競尊賢黜否則不仁者遠爾則斟參夷之刑除挾誅之律品物各順其生緝熙異世而偕也蓋聞陰陽升降山澤通氣初九純卦潛龍勿用泉源所託其溫宜也若夫水潤下火炎上剛柔燥溼自然之性故陽動而外陰靜而內內性柔弱以含容為質外動剛直以外接為用是以金水之明內鑒火日之光外輝剛施柔受陽勝陰伏水之受溫含容之性也政因時以興機隨物而動故聖王究窮通之源審始終之理適時之宜期于濟世皇代質朴禍難不作結繩為信人知所守大道既離智惠擾物夷險不同否泰異數故唐虞密皇人之網夏殷繁帝者之法皆廢興有由輕重以節此窮神之道知化之術隨時之宜非有降殺也晉書紀瞻傳舉秀才尚書郎陸機策之瞻對勸進表陛下性與天道猶復役機神于史籍觀古人之成敗今世事舉目可知不為難見二帝失御宗廟虛廢神器去晉于今二載梓宮未殯人神失御陛下膺籙受圖特天所授使六合革面遐荒來庭宗廟既建神主復安億兆向風殊俗畢至若列宿之綰北極百川之歸巨海而猶欲守匹夫之謙非所以闡七廟隆中興也但國賊宜誅當以此屈己謝天下耳而欲逆天時違人事失地利三者一去雖復傾匡于將來豈得救祖宗之危急哉適時之宜萬端其可綱維大業者惟理與當晉祚屯否理盡于今促之則得可以隆中興之祚縱之則失所以資姦寇之權此所謂理也陛下身當厄運纂承帝緒顧望宗室誰復與讓當承大位此所謂當也四祖廓開宇宙大業如此今五都燔爇宗廟無主劉載竊弄神器于西北陛下方欲高讓于東南此所謂揖讓而救火也臣等區區尚所不許況大人與天地合德日月並明而可以失機後時哉晉書紀瞻傳久疾上疏臣疾疢不痊曠廢轉久比陳誠款未見哀察重以尸素抱罪枕席憂責之重不知垂沒之餘當所投厝臣聞易失者時不再者年故古之志士義人負鼎趣走商歌于市誠欲及時效其忠規名傳不朽也然失之者億萬得之者一兩耳常人之情貪求榮利臣以凡庸邂逅遭遇勞無負鼎口不商歌橫逢大運頻類叨竊雖思慕古人自效之志竟無毫釐報塞之效而犬馬齒衰衆疾廢頓僵臥救命百有餘日叩棺曳襟日頓一日如復天假之年蒙陛下行葦之惠適可薄存性命枕息陋巷亦無由復廁八座升降臺閣也臣目冥齒墮胸腹冰冷創既不差足復偏跛為病受困既以荼毒七十之年禮典所遺衰老之徵皎然露見臣雖欲勤自藏護隱伏何地臣之職掌戶口租稅國之所重方今六合波蕩人未安居始被大化百度草創發卒轉運皆須人力以臣平強兼以晨夜尚不及事今俟命漏刻而當久停機職使王事有廢若朝廷以之廣恩則憂責日重以之序宮則官廢事斃須臣差則臣日月衰退今以天慈使官曠事滯臣受偏私之宥于大望亦有虧損今萬國革面賢俊比迹而當虛停好爵不以縻賢以臣穢病之餘妨官固職誠非古今點進之急惟陛下割不已之仁賜以敝帷隕仆之日得以藉尸時銓俊乂官修事舉臣免罪戮死生厚幸晉書紀瞻傳請徵郗鑒疏臣聞皇代之興必有爪牙之佐干城之用帝王之利器也故虞舜舉十六相而南面垂拱伏見前輔國軍郗鑒少立高操體清望峻文武之略時之良幹昔與戴若思同辟推放荒地所在孤特衆無一旅救援不至然能綏集殘餘據險歷載遂使凶寇不敢南侵但士衆單寡無以立功既統名州又為常伯若使鑒從容臺闥出內王命必能盡抗直之規補袞職之闕自先朝以來諸所授用已有成比戴若思以尚書為六州都督征西將軍復加常侍劉隗鎮北陳眕鎮東以鑒年時則與若思同以資則俱八座況鑒雅望清重一代名器聖明以至公臨天下惟平是與是以臣寢頓陋巷思盡聞見惟開聖懷垂問臣導冀有亮釐萬分之一晉書紀瞻傳書瞻白昨信來攜今蓋又貧家無以將意今粉二斗少香所謂物微意存者也力書不多紀瞻頓首淳化閣帖三易太極論顧榮曰太極者蓋謂混沌之時矇昧未分日月含其輝八卦隱其神天地混其體聖人藏其身然後廓然既變清濁乃陳二儀者象陰陽交泰萬物始萌六合闓拓老子云有物混成先天地生誠易之太極也而王氏云太極天地愚謂未當夫兩儀之謂以體為稱則是天地以氣為名則名陰陽今若謂太極為天地則是天地自生無生天地者也老子又曰天地所以能長且久者以其不自生故能長久一生二二生三三生萬物以資始沖氣以為和原元氣之本求天地之根恐疑以此為準也瞻曰昔庖犧畫八卦陰陽之理盡矣文王仲尼係其遺業三聖相承共同一致稱易準天無復其餘也夫天清地平兩儀交泰四時推移日月輝其間自然之數雖經諸聖孰知其始吾子云矇昧未分豈其然乎聖人人也安得混沌之初能藏其身于未分之內老氏先天之言此蓋虛誕之説非易者之意也亦謂吾子神通體解所不應疑意者直謂太極極盡之稱言其理極無復外形外形既極而生兩儀王氏指向可謂近之古人舉至極以為驗謂二儀生于此非復謂有父母若必有父母非天地其孰在晉書紀瞻傳錢神論有司空公子富貴不齒盛服而遊京邑駐駕平市里顧見綦母先生班白而徒行公子曰嘻子年已長矣徒行空手將何之乎先生曰欲之貴人公子曰學詩乎曰學矣學禮乎曰學矣學易乎曰學矣公子曰詩不云乎幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心禮不云乎男贄玉帛禽鳥女贄榛粟棘修易不云乎隨時之義大矣哉吾視子所以觀子所由豈隨世哉雖曰已學吾必謂之未也先生曰吾將以青談為筐篚以機神為幣帛所謂禮云禮云玉帛云乎哉者已公子拊髀大笑曰固哉子之云也既不知古又不知今當今之急何用清談時易世變古今異俗富者榮貴貧者賤辱而子尚質而子守實無異于遺劍刻船膠柱調瑟貧不離于身名譽不出乎家室固其宜也昔神農氏沒黃帝堯舜教民農桑以幣帛為本上智先覺變通之乃掘銅山俯視仰觀鑄而為錢故使內方象地外員象天大矣哉錢之為體有乾有坤內則其方外則其圓其積如山其流如川動靜有時行藏有節市并便易不患耗折難朽象壽不匱象道故能長久為世神實親愛如兄字曰孔方失之則貧弱得之則富強無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後處前者為君長在後者為臣僕君長者豐衍而有餘臣僕者窮竭而不足詩云哿矣富人哀哉煢獨豈是之謂乎錢之為言泉也百姓日用其源不匱無遠不往無深不至京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視錢之所祐吉無不利何必讀書然後富貴昔呂公欣悅于空版漢祖克之于嬴二文君解布裳而被錦繡相如乘高蓋而解犢鼻官尊名顯皆錢所致空版至虛而況有實嬴二雖少以致親密由是論之可謂神物無位而尊無勢而熱排朱門入紫闥錢之所在危可使安死可使活錢之所去貴可使賤生可使殺是故忿諍辨訟非錢不勝孤弱幽滯非錢不拔怨仇嫌恨非錢不解令問笑談非錢不發洛中朱衣當途之士愛我家兄皆無己己執我之手抱我終始不計優劣不論年紀賓客輻輳門常如市諺云錢無耳可暗使豈虛也哉又曰有錢可使鬼而況于人乎子夏云死生有命富貴在天吾以死生無命富貴在錢何以明之錢能轉禍為福因敗為成危者得安死者得生性命長短相祿貴賤皆在乎錢天何與焉天有所短錢有所長四時行焉百物生焉錢不如天達窮開塞振貧濟乏天不如錢若臧武仲之智卞莊子之勇冉求之藝文之以禮樂可以為成人矣今之成人者何必然雖孔方面已夫錢窮者能使通達富者能使溫暖貧者能使勇悍故曰君無財則士不來君無賞則士不往諺曰官無中人不如歸田雖有中人而無家兄何異無足而欲行無翼而欲翔使才如顏子容如子張空手掉臂何所希望不如早歸廣修農商舟車上下役使孔方凡百君子同塵和光上交不接名譽益彰藝文類聚六十六又晉書隱逸魯褒傳御覽八百三十六黃銅中方叩頭對曰僕自西方庚辛分王諸國處處皆有長沙越巂僕之所守黃金為父白銀為母鉛為長男錫為適婦伊我初生周末時也景王尹世大鑄也茲也貪人見我如病得醫飢饗大牢未之踰也初學記二十七御覽八百三十六請采録陳壽三國志表昔漢武帝詔曰司馬相如病甚可遣悉取其書使者得其遺書言封禪事天子異焉臣等案故治書待御史陳壽作三國志辭多勸誡明乎得失有益風化雖文豔不若相如而質直過之願垂采録晉書陳壽傳為愍懷太子服議聖上統緒無所他擇踐阼之初拜于南郊告于天地謁于祖廟明皇儲也正體承重豈復是過通典八十一冠禮儀永平元年正月戊子冠中外四孫立于步廣里舍之阼階設一席于東廂引冠者以長幼次于席南東上賓宗人立于西廂東面南上堪立于東軒西南面西上陳元服于席上宗人執儀以次呼冠者各應曰諾宗人申誡之曰以歲之正以月之令兄弟具來咸加爾服棄爾幼志順爾成德敬慎威儀惟人之則壽考惟祺永受景福冠者高跪而冠各自著布興再拜從立于賓南上酌四杯酒各拜醮而飲事訖上堂向御史府君再拜訖冠者皆東面坐如常燕禮時賓宗人東平王隆叔祚王循道安王業建始此皆古禮也但以意斟酌從其簡者耳通典五十六梁王彤諡議彤位為宰相責深任重屬尊親近且為宗師朝所仰望下所具瞻而臨大節無不可奪之志當危事不能舍生取義愍懷之廢不聞一言之諫淮南之難不能因勢輔義趙王倫篡逆不能引身去朝宋有蕩氏之亂華元自以不能居官曰君臣之訓我所司也公室卑而不正吾罪大矣夫以區區之宋猶有不素飧之臣而況帝王之朝有苟容之相此而不貶法將何施謹案諡法不勤成名曰靈彤見義不為不可為勤宜諡曰靈晉書梁王彤傳永康二年薨博士陳留蔡充議諡云云重議彤為宗室臣而國亂不能匡主顛不能扶非所以為相故春秋譏華元樂舉謂之不臣且賈氏之酷烈不甚于呂后而王陵猶得杜門趙王倫之無道不甚子殷紂而微子猶得去之近者太尉陳準異姓之人加弟微有射鉤之隙亦得託疾辭位不涉偽朝何至于彤親倫之兄而不得去乎趙盾入諫不從出亡不遠猶不免于責況彤不能去位北面事偽主乎宜如前議加其貶責以廣為臣之節明事君之道晉書梁王彤傳梁國常侍孫霖及彤親黨稱枉臺乃下符云云充重議云云朝廷從充議彤故吏復追訴不巳改諡曰孝沖太孫殤服議臣子不殤君父者此謂臣子尊其加父不敢殤之耳非為有臣子便為成人不服殤也案漢平帝年十四而崩群臣奏臣不殤君宜加元服後漢許慎鄭玄論立廟亦唯謂臣子不上殤耳又長子自以正體于上不以命誓也又命庶孫四歲則誓之古嫡子何獨十九不誓喪服君為嫡子長殤大功鄭玄曰天子亦如之所言臣不殤君者自謂如太孫等之臣不殤耳太子唯尊于東宮東官臣不殤之耳今太孫未冠婚四歲而齊縗成人之禮于太廟愚謂不可愍懷若在太孫當依庶殤不祭通典八十二
