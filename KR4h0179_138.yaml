body:
  text: 蘇彥芙渠賦偉芙蓉之菡萏耀煒燁之丹花舒紅采于緑沼映的皪于朱霞藝文類聚八十二浮萍賦余嘗泛舟遊觀鼓楫川湖覩浮萍之飄浪乃觸水而自居體任適以應會亦隨遇而靡拘伊弱卉之無心合至理之冥符藝文類聚八十二秋夜長晨暉電流以西逝間宵漫漫其未央牛女隔河以延佇列宿雙景以相望輕雲飄霏以籠朗素月披曜而舒光時禽鳴于庭柳節蟲吟于戶堂零葉紛其交萃落英颯以散芳覩遷化之遒邁悲榮枯之靡常貞松隆冬以擢秀金菊吐翹以淩霜藝文類聚二鵝詩序時暫出郡忽聞鵝鳴聲甚哀急乃云野人所致外吏規為方便以俟送客聞之悵然又感莊生善鳴之雁若其無音將充庖廚豈得放任矯翮籠樊藝文類聚九十一舜華詩序其為花也色甚鮮麗迎晨而榮日中則衰至夕而零莊周載朝菌不知晦朔況此朝不及夕者乎苟映采于一朝耀穎于當時焉識夭壽之所在哉余既玩其葩而歎其榮不終日藝文類聚八十九女貞頌序昔東阿王作楊柳頌辭義慷慨旨在其中余今為女貞頌雖事異于往作蓋亦以厲冶容之風也女貞之樹一名冬生負霜蔥翠振柯淩風故清士欽其質而貞女慕其名或樹之于雲堂或植之于階庭藝文類聚八十九語針孔子曰余欲無言又曰天何言哉赫胥之世大庭之治玄風陶鼓率直放志熙熙群動無欲無事逮于三季奔競茲彰雷動風駭飛辨雲翔戰國紛擾爭霸稱彊爾乃遊說縱橫騁技時王銜刃懷毒吐膏示芳利動春露害重冬霜四紀若馳七都翦亡爰茲末俗扇風簸揚先意承旨原情察鄉擯爾籩豆和樂且康藝文類聚十九隱几銘良匠造器妙巧應規俯仰灼照商略神奇假物興思須以忘疲北堂書鈔一百三十三邛竹杖銘安不忘危任在所杖秀矣雲竹徑直條畼節高質貞霜雪彌亮圓以應物直以居當妙巧無功奇不待匠君子是扶逍遙神王藝文類聚六十九又略見書鈔一百三十三楠榴枕銘珍木之奇文鬱理鮮廉稜方正密滑貞堅朝景西翳夕舒映天書倦接引酣樂流連繼以高詠研精上玄頤神靖魄須以寧眠藝文類聚七十御覽七百七柏枕銘寢貴無想氣和體平御心以道間邪以誠色空無著故能忘情北堂書鈔一百三十四藝文類聚七十蘇子夫人生一世若朝露之託于桐葉耳其與幾何後漢王符傳注藝文類聚八十八初學記二六帖二御覽十二歲華紀麗三微生與婦人期不來水至抱橋柱而死藝文類聚九引蘇子車渠馬腦出于荒外今冀州之土曾未得其奇也藝文類聚八十四十二作士蘭以芳自燒膏以肥自焫翠以羽殃身蚌以珠破體是以公孫賀得丞相而涕泣而知滿之有毀朝之有莫也北堂書鈔九十九御覽九百八十三行務應規步慮投矩文選陸機長安有狹邪行注蜀郡鄧公呼吸成霧初學記二御覽十五天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以抑馳御覽七十六夫帶方寸之印拖丈八之組戴貂鶡之尾建千丈之城游五里之衢走卒警䟆叫呼而行此諸侯之所謂榮華時俗之所謂富貴也御覽四百七十又九百二十四不食八珍何以知味之奇不為文學何以知世之資御覽六百七立君臣設尊卑杜將漸防未萌莫過乎禮哀王道傷時政莫過乎詩導陰陽示悔吝莫過乎易明善惡著廢興吐辭令莫過乎春秋量遠近賦九州莫過乎尚書和人情動風俗莫過乎樂治刑名審法術莫過乎商韓載百王紀治亂莫過乎史漢孟軻之徒溷淆其間世人見其才易登其意易過于是家著一書人書一法雅人君子投筆硯而高視御覽六百八房麗者趙之賢人立東門之外有行商車轄亡麗告之不悟復更告商人怒曰吾轄自亡何須汝告惠加于己而反怒之吾欲比之草木草木有心矣御覽七百七十三象以牙喪身不能去其白薰以芳自燒不能去其香御覽九百八十三嘲范寧古方宋陽里子少得其術以授魯東門伯魯東門伯以授左丘明遂世世相傳及漢杜子夏鄭康成魏高堂隆晉左太沖凡此諸賢竝有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩蘊于胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非但明目乃亦延年晉書范寧傳寧常患目痛就中書侍郎張湛求方湛因嘲之列子注序湛聞之先父曰吾先君與劉正輿傅穎根皆王氏之甥也竝少遊外家舅始周始周從兄正宗輔嗣皆好集文籍先并得仲宣家書幾將萬卷傅氏亦世為學門三君總角競録奇書及長遭永嘉之亂與穎根同避難南行車重各稱力竝有所載而寇虜彌盛前途尚遠張謂傅曰今將不能盡全所載且共料簡世所希有者各各保録今無遺棄穎根于是唯齎其祖玄父咸子集先君所録書中有列子八篇及至江南僅有存者列子唯餘楊朱說符目録三卷比亂正輿為揚州刺史先來過江復在其家得四卷尋從輔嗣女壻趙季子家得六卷參校有無始得全備其書大略明群有以至虛為宗萬品以終滅為驗神惠以凝寂常全想念以著物自喪生覺與化夢等情巨細不限一域窮達無假智力治身貴于肆任順性則所之皆適水火可蹈忘懷則無幽不照此其旨也然所明往往與佛經相參大歸同于老莊屬辭引類特與莊子相似莊子慎到韓非尸子淮南子玄示旨歸多稱其言遂注之云爾列子道藏本後漢紀論蔡雍為朱穆諡夫諡者上之所贈非下之所造顏冉至德不聞有諡蔡朱二子各以衰代臧否不立故私諡也御覽五百六十二論張松法正劉璋愚弱而守善言斯亦宋襄公徐偃王之徒未為無道之主也張松法焉雖君臣之義不正然固已委名附質進不顯陳事勢若韓嵩劉光之說劉表退不告絶奔亡若陳平韓信之去項羽而兩端攜二為謀不忠罪之次也蜀志劉璋傳注易集解序蜜蜂以兼采為味書鈔一百四十七引易注序依向秀本經典釋文敘録皇子廟議皇子依如大夫禮應立後宜先告權為行廟告于禮無文宜先行廟告嗣而後迎繼嗣之身案禮君薨嗣子生太祝裨冕告于廟既葬嗣子生祝告于廟明夫宗廟者神靈之所宅是以存亡吉凶必先告于廟古今不革之制三代不易之典豈有興滅繼絶傳祀百代而誣亡者之靈滅告生之義邪緣情依禮謂宜先告于靈後迎繼嗣之身通典四十七太元六年博士沈寂議穀梁傳云公子之重視大夫則王子一例也請皇子廟祭用大夫禮三廟牲用少牢若繼嗣之身未準大夫祭用士禮宜權立行廟告嗣而後迎繼嗣之身通典四十七太元八年又議皇子雖有廟然無子不立廟故詔使立後蒸嘗之祀稱皇帝有命命某繼嗣通典四十七難范寧往因禮親反因禮疏何嫌頓盡乎未若相遺于江湖既還宜各反服也通典九十六范寧云甲無子取乙為後甲晚白生子乙歸本家後甲終必當有服江熙難朝臣上禮太子議案武帝咸寧中諸王新拜有司近臣諸王公主上禮今皇太子國之儲副既已崇建普天同慶謂宜上禮奉賀通典七十太元十二年臺符問皇太子既拜朝臣奉賀應上禮否太學博士庾弘之議優遇陳留王議陳留王前代之後遇以上賓之禮皇太子雖國之儲副在人臣之位今謂班次宜在王下通典七十四太元十二年答殷仲堪問荊州刺史殷仲堪問禮文如是此指釋有緦麻服而猶得祭者也當不普言新喪之親于所祭者邪別駕庾睿功曹滕惔主簿劉恬答曰尋禮文當是指明有緦服可以祭耳不以新喪之親于所祭者有服為疑今世中傳重者而有從祖小功之服服既除恐不得以二祖服近而不祭也通典五十二明堂議郊以配天故配之以后稷明堂祀帝故配之以文王由斯言之郊為皇天之位明堂為上帝之廟故徐邈以配之為言必有神主郊為天壇則明堂非文廟矣通典四十四太元十三年褚爽表稱太子名議禮記曰夫人之諱雖質君之前臣不諱也案夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名父前子名又周公告父皆稱武王名益可明矣通典一百四太元十九年義興太守褚爽上表稱太子名下太學議徐乾議殷祭議三年一祫五年一禘經傳記籍不見補殷之文宋書禮志三義熙二年通典四十九作元興三年上表請修孔廟臣聞教者治化之本人倫之始所以誘達群方進德興仁譬諸土石陶冶成器雖復百王殊禮質文參差至于斯道其用不爽自中華湮沒闕里荒毀先王之澤寢聖賢之風絶自此迄今將及百年造化有靈否終以泰河濟夷徙海岱清通黎庶蒙蘇鳧藻奮化而典訓弗敷雅頌寂蔑久凋之俗大斃未改非演迪斯文緝熙宏猷將何以光贊時雍克隆盛化哉事有如賒而實急此之謂也亡父先臣回綏集邦邑歸誠本朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頓軌式穨弛萬世宗匠忽焉淪廢仰瞻俯慨不覺涕流既達京輦表求興復聖祀修建講學至十四年十一月十七日奉被明詔采臣鄙議敕下兗州魯郡準舊營飾故尚書令謝石令臣所須列上又出家布薄助興立故鎮北將軍譙王恬版臣行北魯縣令賜許供遣二臣薨徂成規不遂陛下體唐堯文思之美訪宣尼善誘之勤矜荒餘之凋昧愍聲教之未浹愚謂可重符兗州刺史遂成舊廟蠲復數戶以供掃灑并賜給六經講立庠序延請宿學廣集後進使油然入道發剖琢之功運仁義以征伐敷道德以服遠何招而不懷何柔而不從所為者微所弘甚大臣自致身輦轂于今八稔違親轉積夙夜匪寧振武將軍何淡之今震扞三齊臣當隨反裴回天邑感戀罔極乞臣表付外參議宋書禮志一上疏陳五違今臺府局吏直衛武官及僕隸婢兒取母之姓者本臧獲之徒無鄉邑品第皆得命議用為郡守縣令竝帶職在內委事于小吏手中僧尼乳母競進親黨又受貨賂輒臨官領衆無衛霍之才而比方古人為患一也臣聞佛者清遠玄虛之神以五誡為教絶酒不淫而今之奉者穢慢阿尼酒色是耽其違二矣夫致人于死未必手刃害之若政教不均暴濫無罪必夭天命其違三矣盜者未必躬竊人財江乙母失布罪由令尹今禁令不明劫盜公行其違四矣在上化下必信為本昔年下書敕使盡規而衆議兼集無所採用其違五矣尼僧成群依傍法服五誡粗法尚不能遵況精妙乎而流惑之徒競加敬事又侵漁百姓取財為惠亦未合布施之道也晉書會稽王道子傳答郤敬輿書至理深玄非言象所喻也文選褚淵碑安般守意經序夫意也者衆苦之萌基背正之元本荒迷放蕩浪逸無涯若狂夫之無所麗愛惡充心耽昏無節若夷狄之無君微矣哉即之無像尋之無眹則豪末不足以喻其細迅矣哉僨蹻惚恍昫匝宇宙則奔電不足以比其速是以彈指之間九百六十轉一日一夕十三億想念必響報成生死裁一身所種滋蔓彌劫凡在三界倒見之徒溺喪淵流莫能自反正覺慈愍開示慧路防其終凶之源漸塞忿欲之微兆為啓安般之要徑泯生滅以冥寂伸道品以養恬建十慧以入微縶九神之逸足防七識之洪流故曰守意也若乃制伏粗垢拂剗漏結者亦有望見貿樂之士閉色聲于視聽遏塵想以禪寂乘靜泊之禎祥納色天之嘉祚然正志荒于華樂昔習沒于交逸福田矜執而日零毒根迭興而罪襲是以輪回五趣億劫難拔嬰羅欲網有劇深牢由于無慧樂定不惟道門使其然也至于乘慧入禪亦月三輩或畏苦滅色樂宿泥洹志存自濟不務兼利者為無著乘或仰希妙相仍有遣無不建大悲練盡緣縛者則號緣覺菩薩者深達有本畼因緣無達本者有有自空畼無者因緣常寂自空故不出有以入無常寂故不盡緣以歸空住理而有非所縛非縛故無無所脫苟厝心領要觸有悟理者則不假外以靜內不因禪而成慧故曰阿惟越致不隨四禪也若欲塵翳心慧不常立者乃假以安般息其馳想猶農夫之淨地明鏡之瑩剗矣然則耘耨不以為地地淨而種滋瑩剗非以為鏡鏡淨而照明故開士行禪非為守寂在遊心于玄冥矣肇自發心悲盟弘普秉權積德忘期安衆衆雖濟而莫脫將廢知而去筌矣是謂菩薩不滅想取證也此三乘雖同假禪靜至于建志厥初各有攸歸故學者宜恢心宏模植栽于始也漢之季世有捨家開士安清字世高安息國王之太子也審榮辱之浮寄齊死生乎一貫遂脫屣于萬乘抱玄德而遊化演道教以發矇表神變以源之于時俊乂歸宗釋華崇實者若禽獸之從麟鳳麟介之赴虯蔡矣又博綜殊俗善衆國音傳授斯經變為晉文其所譯出百餘萬言探畼幽賾淵玄難測此安般典其文雖約義關衆經自淺至精衆行具舉學之先要孰乎踰者乎行者欲凝神反朴道濟無外而不循斯法者何異刖夫之陟太山無翅而圖升虛乎釋迦如來妙慧足于曩劫歷無數以潛化至于衆生運會圓滿告成而猶現行六年以為教端者誠以鎮一紛邪莫尚茲也由是而觀可不務歟敷染習沈冥積罪歷劫生與佛乖弗覩神化雖以微祚得稟遺典而情想繁蕪道根未固仰欣聖軌未一暫履夕惕戰懼惄焉如搗是以誠心諷習以鍾識習每遭明睿輒咨疑滯然冥宗己遠義訓小殊乃采集英彥戢而載焉雖粗聞大要未悟者衆于是復率愚思推檢諸數尋求明證遂相繼續撰為注義并抄撮大安般修行諸經事相應者引而合之或以隱顯相從差簡搜尋之煩經道弘深既非愚淺所能裁衷又辭意鄙拙萬不畼一祗增理穢敢云足以闡融妙旨乎實欲私記所識以備遺忘而已耳儻有覽者願亮不逮正其愚謬焉釋藏跡六出三藏記集六食檄蒸太湖夭頭之白蘭肉乳之豚飢倉之雞色如玳瑁骨解肉離書鈔一百四十五又取灄湖獨穴之鯉赤山後陂之蓴伺漉冷豉及熱應分食畢作躁酒炙宜傳酒便清香肉則豆不㹀麞肶若波潘急火中炙脂不得熏親君子延嘉賓終日宴聞香者躑躅干咽者塞門羅奠碗子五十有餘牛䐑口搗炙鴨脯魚熊白麞脯糖蟹濡臺車𧑃主甜滋味遠來日醉之後悶下慷除應有蔗漿木瓜元李楊梅五味橄欖石榴玄拘葵羹脫煮各下一杯御覽八百四十九大市覆罌之蒜東里獨老之醯大鹽雜以姜菽叛好使之春韭書鈔一百四十六御覽八百五十五又八百六十六竝催廚人來作茶餅熬油煎蔥例苶以絹當用輕羽拂取飛麵馴軟中適然後水引細如委綖白如秋練羹杯半在才得一咽十杯之後顏解體潤御覽八百六十洛成時與桓郎箋桓宣武令下官將千二百人奄襲營值天洪雨器仗沾溼塹廣深丈餘鹿角五重樓櫓嚴設自四更二唱攻逼至小食時不剋御覽三百三十七荀子耳賦夫惡勞而希逸實萬物之至誠何斯耳之不辰託荀子而宅形在瘠土而長勤無須臾之閒寧預清談而閉塞開鄙穢而聰明竭微聽于門閣採群下之風聲藝文類聚十七議錢耿殺妻事尋建康獄竟囚錢耿癲疾發作毆殺妻折無他變故將死之人不蒙哀矜之施無知之吏加以大辟之刑懼非古原心定罪之議御覽七百三十九與王荊州忱書君須復飲不廢止之將不獲已邪通人識士纍于此物古人屏爵棄邑焚罍毀榼書鈔一百四十八引兩條道論夫道以至虛順通聖人以忘懷兼應初學記十七論命存亡壽夭咸定冥初文選辨命論注上疏劾茹千秋等驃騎咨議參軍茹千秋協附宰相起自微賤竊弄威權衒賣天官其子壽齡為樂安令贓私狼藉畏法奔逃竟無罪罰傲然還縣又尼姏屬類傾動亂時穀賤人饑流殣不絶由百姓單貧役調深刻又振武將軍庾恆鳴角京邑主簿戴良夫苦諫被囚殆至亡命而恆以醉酒見怒良夫以執忠廢棄又權寵之臣各開小府施置吏佐無益于官有損于國晉書會稽王道子傳報諸葛長民書下官目義熙以來首尾十載遂忝三州七郡今此杖節常懼福過禍生實思避盈居損富貴之旨非所敢當宋書劉敬宣傳
