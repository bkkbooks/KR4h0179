body:
  text: 卷四十三杜預律序律者八以正罪名令者八以存事制二者相須為用書鈔四十五藝文類聚五十四御覽六百三十八春秋左氏傳序春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀遠近別同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史大事書之于策小事簡牘而已孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也韓子所見蓋周之舊典禮經也周德既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章仲尼因魯史策書成文考其真僞而志其典禮上以遵周公之遺制下以明將來之法其教之所存文之所害則刊而正之以示勸誡其餘則皆即用舊史史有文質辭有詳略不必改也故傳曰其善志又曰非聖人孰能修之蓋周公之志仲尼從而明之左丘明受經于仲尼以為經者不刊之書也故傳或先經以始事或後經以終義或依經以辨理或錯經以合異隨義而發其例之所重舊史遺文略不盡舉非聖人所修之要故也身為國史躬覽載籍必廣記而備言之其文緩其旨遠將令學者原始要終尋其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤煥然冰釋怡然理順然後為得也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者皆據舊例而發義指行事以正褒貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而畼之也其經無義例因行事而言則傳直言其歸趣而已非例也故發傳之體有三而為例之情有五一曰微而顯文見于此而義起在彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參會不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱避璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻捷之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盜三叛人名之類是也推此五體以尋經傳觸類而長之附于二百四十二年行事王道之正人倫之紀備矣或曰春秋以錯文見義若如所論則經當有事同文異而無其義也先儒所傳皆不其然答曰春秋雖以一字為褒貶然皆須數句以成言非如八卦之爻可錯綜為六十四也固當依傳以為斷古今言左氏春秋者多矣今其遺文可見者十數家大體轉相祖述進不成為錯綜經文以盡其變退不守丘明之傳于丘明之傳有所不通皆沒而不說而更膚引公羊穀梁適足自亂預今所以為異專修丘明之傳以釋經經之條貫必出于傳傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端蓋丘明之志也其有疑錯則備論而闕之以俟後賢然劉子駿創通大義賈景伯父子許惠卿皆先儒之美者也末有穎子嚴者雖淺近亦復名家故特舉劉賈許穎之違以見同異分經之年與傳之年相附比其義類各隨而解之名曰經傳集解又別集諸例及地名譜第曆數相與為部凡四十部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之說釋例詳之也或曰春秋之作左傳及穀梁無明文說者以為仲尼自衛反魯修春秋立素王丘明為素臣言公羊者亦云黜周而王魯危行言遜以避當時之害故微其文隱其義公羊經止獲麟而左氏經終孔丘卒敢問所安答曰異乎余所聞仲尼曰文王既沒文不在茲乎此制作之本意也歎曰鳳鳥不至河不出圖吾已矣夫蓋傷時王之政也麟鳳五靈王者之嘉瑞也今麟出非其時虛其應而失其歸此聖人所以為感也絶筆于獲麟之一句者所感而起固所以為終也曰然則春秋何始于魯隱公答曰周平王東周之始王也隱公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚胤也若平王能祈天永命紹開中興隱公能弘宣祖業光啓王室則西周之美可尋文武之迹不墜是故因其曆數附其行事采周之舊以會成王義垂法將來所書之王即平王也所用之曆即周正也所稱之公即魯隱也安在其黜周而王魯乎子曰如有用我者吾其為東周乎此其義也若夫制作之文所以彰往考來情見乎辭言高則旨遠辭約則義微此理之常非隱之也聖人包周身之防既作之後方復隱諱以避患非所聞也子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也先儒以為制作三年文成致麟既以已妖妄又引經以至仲尼卒亦又近誣據公羊經止獲麟而左氏小邾射不在三叛之數故余以為感麟而作作起獲麟則文止于所起為得其實至于反袂拭面稱吾道窮亦無取焉文選唐石經春秋傳春秋左氏傳後序太康元年三月吳寇始平余自江陵還襄陽解甲休兵乃申抒舊意修成春秋釋例及經傳集解始訖會汲郡汲縣有發其界內舊冢者大得古書皆簡編科斗文字發冢者不以為意往往散亂科斗書久廢推尋不能盡通始者藏在祕府余晚得見之所記大凡七十五卷多雜碎怪妄不可訓知周易及紀年最為分了周易上下篇與今正同別有陰陽說而無彖象文言繫辭疑于時仲尼造之于魯尚未播之于遠國也其紀年篇起自夏殷周皆三代王事無諸國別也唯特記晉國起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隱公之元年正月也皆用夏正建寅之月為歲首編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也推校哀王二十年太歲在壬戌是周赧王之十六年秦昭王之八年韓襄王之十三年趙武靈王之二十七年楚懷王之三十年燕昭王之十三年齊湣王之二十五年也上去孔丘卒百八十一歲下去今太康三年五百八十一歲哀王于史記襄王之子惠王之孫也惠王三十六年卒而襄王立立十六年卒而哀王立古書紀年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王其著書文意大似春秋經推此足見古者國史策書之常也文稱魯隱公及邾莊公盟于姑蔑即春秋所書邾儀父未王命故不書爵曰儀父貴之也又稱晉獻公會虞師伐虢滅下陽即春秋所書虞師晉師滅下陽先書虞賄故也又稱周襄王會諸侯于河陽即春秋所書天王狩于河陽以臣召君不可以訓也諸若此輩甚多略舉數條以明國史皆承告據實而書時事仲尼修春秋以義而制異文也又稱衛懿公及赤翟戰于洞澤疑洞當作泂即左傳所謂熒澤也齊國佐來獻玉磬紀公之甗即左傳所謂賓媚人也諸所記多與左傳符同異于公羊穀梁知此二書近世穿鑿非春秋本意審矣雖不皆與史記尚書同然參而求之可以端正學者又別有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春師春似是鈔集者人名也紀年又稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放大甲于桐乃自立也伊尹即位放大甲七年大甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之左氏傳伊尹放大甲而相之卒無怨色然則大甲雖見放還殺伊尹而猶以其子為相也此為大與尚書敘說大甲事乖異不知老叟之伏生或致昏忘將此古書亦當時雜記未足以取審也為其粗有益于左氏故略記之附集解之末焉長曆釋例曰書稱朞三百六旬有六日以閏月定四時成歲允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日其實五日四分日之一日一日行一度而月日行十三度十九分度之七有畸日官當會集此之遲速以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之閒所以異于他月也積此以相通四時八節無違乃得成歲其微密至矣得其精微以合天道則事敘而不愆故傳曰閏以正時時以作事事以厚生生民之道于是乎在然陰陽之運隨動而差差而不已遂與曆錯故仲尼丘明每于朔閏發文蓋矯正得失因以宣明曆數也桓十七年日有食之得朔而史闕其日單書朔僖十五年日食亦得朔而史闕朔與日故傳因其得失竝起時史之謬兼以明其餘日食或曆失其正也莊二十五年經書六月辛未朔日有食之鼓用牲于社周之六月夏之四月所謂正陽之月也而時曆誤實是七月之朔非六月故傳云非常也唯正月之朔慝未作日有食之于是乎有用幣于社伐鼓于朝明此食非用幣伐鼓常月因變而起曆誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例欲以明諸侯之禮也此乃聖賢之微旨而先儒所未喻也昭十七年夏六月日有食之而平子言非正陽之月以誣一朝近于指鹿為馬故傳曰不君矣且因以明此月為得天正也劉子駿造三統曆以修春秋春秋日食有甲乙者三十四而三統曆唯得一食曆術比諸家既最疏又六千餘歲輒益一日凡歲當纍日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古以來諸論春秋者多述謬誤或造家術或用黃帝以來諸曆以推經傳朔日皆不得諧合日食于朔此乃天驗經傳又書其朔日食可謂得天而劉賈諸儒說皆以為月二日或三日公違聖人明文其蔽在于守一元不與天消息也余感春秋之事嘗著曆論極言曆之通理其大指有云天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限纍日為月纍月為歲以新故相序不得不有毫毛之差此自然之理也故春秋日有頻月而食者有曠年而不食者理不得一而算守恆數故曆無有不差失也始失于毫毛而尚未可覺積而成多以失弦望朔晦則不得不改憲以從之書所謂欽若昊天曆象日月星辰易所謂治曆明時言當順天以求合非為合以驗天者也推此論之春秋二百餘年其治曆通變多矣雖數術絶滅還尋經傳微旨大量可知時之違謬則經傳有驗學者固當曲循經傳月日日食以考朔晦以推時驗而見皆不然各據其學以推春秋此無異度己之跡而欲削他人之足也余為曆論之後至咸寧中有善算者李修夏顯依論體為術名乾度曆表上朝廷其術合日行四分之數而微增月行用三百歲改憲之意二元相推七十餘歲承以強弱強弱之差蓋少而適足以遠通盈縮時尚書及史官以乾度曆與太始曆參校古今記注乾度曆殊勝太始曆上勝官曆四十五事今其術具存時又并考古今十曆以驗春秋知三統曆之最疏也今具列其時得失之數又據經傳微旨證據及失閏者考日辰朔晦以相發明為經傳長曆如左諸經傳證據及失閏違時文字謬誤皆甄發之雖未必其得天蓋是春秋當時之曆也學者覽焉續漢律曆志中注永樂大典本春秋釋例晉書律曆志下宗譜別子者君之嫡妻之子長子之母弟也君命為祖其子則為大宗常有一主審昭穆之序辨親疏之別是故百代不遷若無子則支子為後雖七十無主婦若殤死則衰絰加一等以兄弟之列代之殤無為父道兄弟昭穆同故也死皆為之齊衰其月數各隨親疏為限雖尊雖出嫁猶不敢降也屬絶則為之齊縗三月若始封君相傳則自祖始封君其支子孫皆宗大宗然則繼體君為宗中之尊支庶莫敢宗之是以命別子為宗主一宗奉之故曰祖者高祖也言屬逮于君則就君屬絶于君則適宗子家也而說者或云君代代得立大宗或云別子之母弟亦得為祖或云命妾子為別子其適妻子則遷宗于君皆非也別子之弟子孫無貴賤皆宜宗別子之子孫小宗一家之長也同族則宗之其服隨親疏為比姊妹出嫁不敢降之五屬斷服則不宗之矣通典七十三遺令古不合葬明于終始之理同于無有也中古聖人改而合之蓋以別合無在更緣生以示教也自此以來大人君子或合或否未能知生安能知死故各以己意所欲也吾往為臺郎嘗以公事使過密縣之邢山山上有冢問耕父云是鄭大夫祭仲或云子産之冢也遂率從者祭而觀焉其造冢居山之頂四望周達連山體南北之正而邪東北向新鄭城意不忘本也其隧道唯塞其後而空其前不填之示藏無珍寶不取于重深也山多美石不用必集洧水自然之石以為冢藏貴不勞工巧而此石不入世用也君子尚其有情小人無利可動歷千載無毀儉之致也吾去春入朝因郭氏喪亡緣陪陵舊義自表營洛陽城東首陽之南為將來兆域而所得地中有小山上無舊冢其高顯雖未足比邢山然東奉二陵西瞻宮闕南觀伊洛北望夷叔曠然遠覽情之所安也故遂表樹開道為一定之制至時皆用洛水圓石開隧道南向儀制取法于鄭大夫欲以儉自完耳棺器小斂之事皆當稱此晉書杜預傳又北堂書鈔一百六十御覽五百五十四竝引王隱晉書集要凡挽天子六紼諸侯四大夫士二御覽五百五十二自述少而好學在官則勤于吏治在家則滋味典籍書鈔九十七杜預集序預為鎮南將軍觀兵于江男女降者百萬餘口軍中為之謠曰以計待戰一當萬書鈔一百十九上疏請平吳臣數參訪吳楚同異孫皓荒淫凶逆荊揚賢愚莫不嗟怨且觀時運宜速征伐若今不伐天變難預令皓卒死更立賢主文武各得其所則彊敵也臣作船七年日有朽敗又臣年已七十死亡無日三者一乖則難圖也誠願陛下無失事機晉書王濬傳上書自理臣前被庚戌詔書曰軍人乘勝猛氣益壯便當順流長騖直造秣陵臣被詔之日即便東下又前被詔書云太尉賈充總統諸方自鎮東大將軍胄及渾濬彬等皆受充節度無令臣別受渾節度之文臣自達巴丘所向風靡知孫皓窮踧勢無所至十四日至牛渚去秣陵二百里宿設部分為攻取節度前至三山見渾在北岸遣書與臣可暫來過共有所議亦不語臣當受節度之意臣水軍風發乘勢造賊城加宿設部分行有次第無緣得于長流之中回船過渾令首尾斷絶須臾之閒皓遺使歸命臣即報渾書并寫皓箋具以示渾使速來當于石頭相待軍以日中至秣陵暮乃被渾所下當受節度之符欲令臣明十六日悉將所領還圍石頭備皓越逸又索蜀兵及鎮南諸軍人名定見臣以為皓已來首都亭無緣共合空圍又兵人定見不可倉卒皆非當今之急不可承用中詔謂臣忽棄明制專擅自由伏讀嚴詔驚怖悚栗不知軀命當所投厝豈惟老臣獨懷戰灼三軍上下咸盡喪氣臣受國恩任重事大常恐託付不效孤負聖朝故投身死地轉戰萬里被蒙寬恕之恩得從臨履之宜是以憑賴威靈幸而能濟皆是陛下神策廟算臣承指授效鷹犬之用耳有何勳勞用恃功肆意寧敢昧利而違聖詔臣以十五日至秣陵而詔書以十六日起洛陽其閒懸闊不相赴接則臣之罪責宜蒙察恕假令孫皓猶有螳螂舉斧之勢而臣輕軍單入有所虧喪罪之可也臣所統八萬餘人乘勝席卷皓以衆叛親離無復羽翼匹夫獨立不能庇其妻子雀鼠貪生苟乞一活耳而江北諸軍不知其虛實不早縛取自為小誤臣至便得更見怨恚竝云守賊百日而令他人得之言語噂沓不可聽聞案春秋之義大夫出疆猶有專輒臣雖愚蠢以為事君之道唯當竭節盡忠奮不顧身量力受任臨事制宜苟利社稷死生以之若其顧護嫌疑以避咎責此是人臣不忠之利實非明主社稷之福也臣不自料忘其鄙劣披布丹心輸寫肝腦欲竭股肱之力加之以忠貞庶必掃除凶逆清一宇宙願令聖世與唐虞比隆陛下粗察臣之愚款而識其欲自效之誠是以授臣以方牧之任委臣以征討之事雖燕王之信樂毅漢祖之任蕭何無以加焉受恩深重死且不報而以頑疏舉錯失宜陛下弘恩財加切讓惶怖怔營無地自厝願陛下明臣赤心而已晉書王濬傳復上表自理被壬戌詔書下安東將軍所上揚州刺史周浚書謂臣諸軍得孫皓寶物又謂牙門將李高放火燒皓僞宮輒公文上尚書具列本末又聞渾案陷上臣臣受性愚忠行事舉動信心而前期于不負神明而已秣陵之事皆如前所表而惡直醜正實繁有徒欲構南箕成此貝錦公于聖世反白為黑夫佞邪害國自古而然故無極破楚宰嚭滅吳及至石顯傾亂漢朝皆載在典籍為世所戒昔樂毅伐齊下城七十而卒被讒閒脫身出奔樂羊既反謗書盈篋況臣頑疏能免讒慝之口然所望全其首領者實賴陛下聖哲欽明使浸潤之譖不得行焉然臣孤根獨立朝無黨援久棄遐外人道繼絶而結恨彊宗取怨豪族以纍卵之身處雷霆之衝繭栗之質當豺狼之路其見吞噬豈抗脣齒夫犯上干主其罪可救乖忤貴臣則禍在不測故朱雲折檻嬰逆鱗之怒慶忌救之成帝不問望之周堪違忤石顯雖闔朝嗟歎而死不旋踵此臣之所大怖也今渾之支黨姻族內外皆根據磐牙竝處世位聞遣人在洛中專共交構盜言孔甘疑惑觀聽夫曾參之不殺人亦以明矣然三人傳之其母投杼今臣之信行未若曾參之著而讒構沸騰非徒三夫之對外內扇助為二五之應夫猛獸當途麒麟恐懼況臣脆弱敢不悚栗僞吳君臣今皆生在便可驗問以明虛實前僞中郎孔攄說云二月武昌失守水軍行至孫皓出案行石頭還左右兵人皆跳刀大呼云要當為陛下一死戰決之魏帝尚以千人定天下況今有數萬衆自足辨事皓意大喜謂必能然便開庫藏盡出金寶以賜與之小人無狀得便持走皓懼乃圖降首降使適去左右劫奪財物略取妻妾放火燒宮皓逃身竄首恐不脫死臣至遣參軍主者救斷其火耳周浚以十六日前入皓宮臣時遣記室吏往觀書籍浚使收縛若有遺寶則浚前得不應移蹤後人欲求苟免也臣前在三山得浚書云皓散寶貨以賜將士府庫略虛而今復言金銀篋笥動有萬計疑臣軍得之言語反覆無復本末臣復與軍司張牧汝南相馮紞等共入觀皓宮乃無席可坐後日又與牧等共視皓舟船渾又先臣一日上其船船上之物皆渾所知見臣之案行皆出其後若有寶貨渾應得之又臣將軍素嚴兵人不得妄離部陳閒在秣陵諸軍凡二十萬衆臣軍先至為土地之主百姓之心皆歸仰臣臣切敕所領秋毫不犯諸有市易皆有伍任證左明從券契有違犯者凡斬十三人皆吳人所知也餘軍縱橫詐稱臣軍而臣軍類皆蜀人幸以此自別耳豈獨浚之將士皆夷齊而臣諸軍悉聚盜跖邪時有八百餘人緣石頭城劫取布帛臣牙門將軍馬潛即收得二十餘人并疏其督將姓名移以付浚使得自科結而寂無反報疑皆縱遣絶其端緒也又聞吳人言前張悌戰時所殺財有二千人而渾浚露布言以萬計以吳剛子為主簿而遣剛至洛欲令剛增斬級之數可具問孫皓及其諸臣則知其定審若信如所聞浚等虛詐尚欺陛下豈惜于臣云臣屯聚蜀人不時送皓欲有反狀又恐動吳人言臣皆當誅殺取其妻子冀其作亂得騁私忿謀反大逆尚以見加其餘謗𠴲故其宜耳渾案臣瓶磬小器蒙國厚恩頻繁擢敘遂過其任渾此言最信內省慚懼今年平吳誠為大慶于臣之身更受咎纍既無孟側策馬之好而令濟濟之朝有讒邪之人虧穆穆之風損皇代之美由臣頑疏使致于此拜表流汗言不識次晉書王濬傳
