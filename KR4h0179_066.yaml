body:
  text: 劉伶酒德頌有大人先生者以天地為一朝萬㫷為須臾日月為扃牖八荒為庭衢行無轍迹居無室廬幕天席地縱意所如止則操卮執瓢動則挈榼提壼唯酒是務焉知其餘有貴介公子縉紳處士聞吾風聲議其所以乃奮袂攘襟怒目切齒陳說禮法是非鋒起先生于是方奉罌承槽銜杯漱醪奮髯箕踞枕麴藉糟無思無慮其樂陶陶兀爾而醉慌爾而醒靜聽不聞雷霆之聲熟視不見太山之形不覺寒暑之切肌利欲之感情俯觀萬物之擾擾如江漢之載浮萍二豪侍側焉如蜾裸之與螟蛉世說文學篇注文選晉書劉伶傳藝文類聚七十二作武帝遺詔昔伊望作佐勳垂不朽周霍拜命名冠往代侍中車騎將軍行太子太保領前將軍楊駿經德履哲鑒識明遠毗翼二宮忠肅茂著宜正位上台擬跡阿衡其以駿為太尉太子太傅假節都督中外諸軍事侍中録尚書領前將軍如故置參軍六人步兵三千人騎千人移止前衛將軍珧故府若止宿殿中宜有翼衛其差左右衛三部司馬各二十人殿中都尉司馬十人給駿令得持兵仗出入晉書楊駿傳武帝疾篤楊皇后奏帝以父駿輔政便召中書華廙令何劭口宣帝旨使作遺詔后對廙劭以呈帝帝視而無言駿遂當寄託之重賀武帝疾瘳表伏惟聖體漸就平和上下同慶不覺忭舞臣等愚戇竊有微懷以為收功于所忽事乃無悔慮禍于垂成祚乃日新唯願陛下深垂聖明遠思所忽之悔以成日新之福沖靜和氣嗇養精神頤身于清𥳑之宇留心于虛曠之域無厭世俗常戒以忽群下之言則豐豐日延天下幸甚晉書華嶠傳散騎常侍謝表非臣典筆申辭所能陳表御覽二百二十四引華嶠集祕書監謝表伏見詔書以臣為祕書監加位常伯昔劉向父子世典史籍馬融通博三入東觀非臣膚淺所敢擬跡通典二十六御覽二百三十三引華嶠集奏皇后宜修蠶禮先王之制天子諸侯親耕藉田千畝后夫人躬蠶桑宮今陛下以聖明至仁修先王之緒皇后體資生之德合配乾之義而坤道末光蠶禮尚缺以為宜依古式備斯盛典晉書禮志上太康六年譜敘歆少以高行顯名為下邽令漢室方亂乃與同志鄭泰等六七人避世自武關出道遇一丈夫獨行願得與俱皆哀欲許之歆獨曰不可今已在危險之中禍福忠害義猶一也無故受人不知其義既已受之若有進退可中棄乎衆不忍卒與俱行此丈夫中道墮井皆欲棄之歆乃曰已與俱矣棄之不義相率共還出之而後別去衆乃大義之魏志華歆傳注世說德行篇注孫策略有揚州盛兵徇豫章一郡大恐官屬請出郊迎歆曰無然策稍進復白發兵又不聽及策至一府皆造閣請出避之乃笑曰今將自來何遽避之有頃門下白曰孫將軍至請見乃前與歆共坐談議良久夜乃別去義士聞之皆長歎息而心自服也策遂親執子弟之禮禮為上賓是時四方賢士大夫避地江南者甚衆皆出其下人人望風每策大會坐上莫敢先發言歆時起更衣則論議歡譁歆能劇飲至石餘不亂衆人微察常以其整衣冠為異江南號之曰華獨坐魏志華歆傳注文帝受禪朝臣三公已下竝受爵位歆以形色忤時徙為司徒而不進爵魏文帝久不懌以問尚書令陳群曰我應天受禪百辟群后莫不人人悅喜形于聲色而相國及公獨有不怡者何也群起離席長跪曰臣與相國曾臣漢朝心雖悅喜義形其色亦懼陛下實應且憎同上歆淡于財欲前後寵賜諸公莫及然終不殖産業陳群常歎曰若華公可謂通而不泰清而不介者矣同上歆有三子表字偉容年二十餘為散騎侍郎時同僚諸郎共平尚書事年少竝兼厲鋒氣要君名譽尚書事至或有不便故遺漏不視及傳書者去即入深文論駮惟表不然事或有不便輒與尚書共論盡其意主者固執不得已然後共奏議司空陳泰等以此稱之仕晉歷太子少傅太常稱疾致仕拜光祿大夫性清淡常慮天下退理司徒李胤司隸王密等常稱曰若此人者不可得而貴不可得而賤不可得而疏中子博歷三縣內史治有名跡少子周黃門侍郎常山太守博學有文思中年遇疾終于家表有三子長子廙字長駿魏志華歆傳注御覽二百二十四漢後書江革毛義論孔子稱孝莫大于嚴父嚴父莫大于配天則周公其人也子路曰傷哉貧也生無以養死無以葬子曰啜菽飲水孝也鐘鼓非樂云之本而器不可去三牲非孝養之主而養不可廢夫務器而忘本樂之過也崇養以傷行養之纍也故定以道養則周公之祀致四海之祭定以義養則仲由之粥無驕慢之性夫患啜菽粥之粗干祿以求養是以祿親也孜孜以致孝孝成而祿厚者此能以義養也孔子稱孝哉閔子騫人不間于其父母兄弟之言言其孝皆合于道莫可復間也先代石氏父子稱孝子慶相齊人慕其孝而治此殆所謂孝乎惟孝友于兄弟施于有政是亦為政也若二子者推至誠以為行行信于心而感于人以成名受祿可謂能孝養也袁宏後漢紀十一丁鴻論論語稱夫子溫良恭儉讓以得之行首乎故嘗請論之孔子曰太伯其可謂至德也已矣三以天下讓民無德而稱焉孟子曰聞伯夷之風者貪夫廉懦夫有立志然則太伯出于不苟得未始有於讓也是以太伯稱賢人後之人慕而徇之夫有徇則激詭生而取與妄矣故夫鄧彪劉愷讓其弟以取義使弟非服而已享其名其于義不亦薄乎又況乎干有國之紀而使將來者妄舉措哉古之君子立言非將以啓天下之方悟者立行非獨善其身將以訓乎哉原丁鴻之心其本主于忠愛何其終悟而從義也以此殆知其徇尚異于數世也袁宏後漢紀十三郎顗論漢之十葉王莽篡位聞道術之士西門君惠李守等多稱讖云劉秀為天子自光武為布衣時數言此及後終為天子故甚信其書鄭興以忤意見疏桓談以遠斥憂死及明章二帝祖述此意故後世爭為圖緯之學以矯世取資是以通儒賈逵馬融張衡朱穆崔實荀爽之徒忿其若此奏皆以為虛妄不經宜悉收藏之惟斯事深奧善言古者必有驗于今善言天者必有驗于人而託云天之曆數陰陽占候今所宜急也占候術數能仰瞻俯察參諸人事禍福吉凶既應引之教義亦有著明此蓋道術之有益于後世為後人所尚也遠宏後漢紀十八王允論夫士以正立以謀濟以義成若王允之推董卓而分其權伺其閒而弊其罪當此之時天下之難解矣本之皆主于忠義也故推卓不為失正分權不為不義伺間不為狙詐是以謀濟義成而歸于正也魏志董卓傳注祠太廟執觴爵懷愍議今聖上繼武皇帝宜準漢世祖故事不親執觴爵宋書禮志三太興三年太常華恆議又上言廟制今上承繼武帝而廟之昭穆四世而已前太常賀循博士傅純竝以為惠懷及愍宜別立廟然臣愚謂廟當以客主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而巳推此論之宜還復豫章潁川全拘七廟之禮又上言詔下詳議兄弟相繼藏主室議彼符宗廟宜時有定處恆案前議以為七代制之正也若兄弟旁及禮之變也則宜為神主立室不宜以室限神主今有七室而神主有十宜當別立臣以為聖朝已從漢制今聖上繼武帝廟之昭穆四代而已前太常賀循博士傅純等竝以為惠懷愍三帝別立寢廟臣以為廟當以容主為限亦無常數據殷祭六廟而有二祖三宗不毀又漢之二祖寢廟各異明功德之君自當特立若拘七室則殷之末代當祭禰而已準之前議知以七為正不限之七室故雖有兄弟旁及至禘祫不越昭穆則豫章潁川宜全七代之禮案周官有先公先王之廟今宜為京兆以上別立三室于太廟西廂宣皇帝得正始祖之位惠懷二帝不替而昭穆不闕于禮為安通典四十八大興三年太常華恆議又略見宋書禮志三置儒林祭酒教今大義穨替禮典無宗朝廷滯義莫能攸正常以慨然宜特立此官以弘其事軍咨祭酒杜夷棲情玄遠確然絶俗才學精博道行優備其以為儒林祭酒晉書華軼傳上表陳五事臣受恩三世剖符守境試用無績沈伏數年犬馬之力無所復堪陛下弘廣納之聽採狂夫之言原臣侵官之罪不問于忤之愆天地恩厚于臣足矣臣聞忠臣之于其君猶孝子之于其親進則有欣然之慶非貪官也退則有戚然之憂非懷祿也其意在于不忘光君榮親情所不能已已者也臣伏自悼私懷至恨生長荒裔而久在外任自還抱疾未嘗覲見陛下竟不知臣何人此臣之恨一也遭運會之世值有事之時而不能垂功名于竹帛此臣之恨二也逮事聖明之君而尩悴羸劣陳力又不能當歸死于地下此臣之恨三也哀二親早亡隕兄弟竝凋喪孝敬無復施于家門此臣之恨四也夏之日忽以過冬之夜尋復來人生百歲尚以為不足而臣中年嬰災此臣之恨五也慚日月之所養愧昊蒼而無報此臣之所以懷五恨而歎息臨歸路而自悼者也語有之曰華言虛也至言實也苦言藥也甘言疾也臣欲言天下太平而靈龜神狐未見仙芝萐莆未生麒麟未游乎靈禽之囿鳳凰未儀于太極之庭此臣之所以不敢華言而為佞者也昔漢高祖初定天下于時戍卒婁敬上書諫曰陛下取天下不與成周同而欲比隆成周臣竊以為不侔於是漢祖感悟深納其言賜姓為劉氏又顧謂陸賈曰為我箸秦所以亡而吾所以得之者賈乃作新語之書述敘前世成敗以為勸戒又田肯建一言之計非親子弟莫可使王齊者而受千金之賜故世稱漢祖之寬明博納所以能成帝業也今之言世者皆曰堯舜復興天下已太平矣臣獨以為未亦竊有所勸焉且百王垂制聖賢吐言來事之明鑒也孟子曰堯不能以天下與舜則舜之有天下也天與之也昔舜為相堯崩三年之喪畢舜避堯之子於南河天下諸侯朝覲者獄訟者不之堯之子而之舜舜曰天也乃之中國踐天子位焉若居堯之宮逼堯之子非天所與者也曩昔西有不臣之蜀東有僭號之吳三主鼎足竝稱天子魏文帝率萬乘之衆受禪于靡陂而自以德同唐虞以為漢獻即是古之堯自謂即是今之舜乃謂孟軻孫卿不通禪代之變遂作禪代之文刻石垂戒班示天下傳之後世亦安能使將來君子皆曉然心服其義乎然魏文徒希慕堯舜之名推新集之魏欲以同于唐虞之盛忽骨肉之恩忘藩屏之固竟不能使四海賓服混一皇化而于時群臣莫有諫者不其過矣哉孫卿曰堯舜禪讓是不然矣天下者至重也非至彊莫之能任至大也非至辨莫之能分至衆也非至明莫之能見此三至者非聖人莫之能盡由此言之孫卿孟軻亦各有所不取焉陛下受禪從東府入西宮兵刃耀天旌旗翳日雖應天順人同符唐虞然法度損益則亦不異於昔魏文矣故宜資三至以彊制之而今諸王有立國之名而無襟帶之實又蜀地有自然之險是歷世姦雄之所窺𨵦逋逃之所聚也而無親戚子弟之守此豈深思遠慮杜漸防萌者乎昔漢文帝據已成之業六合同風天下一家而賈誼上疏陳當時之勢猶以為譬如抱火厝于積薪之下而寢其上火未及然因謂之安此言誠存不忘亡安不忘亂者也然臣之慺慺亦竊願居安思危無曰高高在上常念臨深之義不忘履冰之戒盡除魏世之弊法綏以新政之大化使萬邦欣欣喜戴洪惠昆蟲草木咸蒙恩澤朝廷詠康哉之歌山藪無伐檀之人此固天下所視望者也陛下自初踐阼發無諱之詔置針諫之官赫然寵異諤諤之臣以明好直言之信恐陳事者知直言之不用皆杜口結舌祥瑞亦曷由來哉臣無陸生之才不在顧問之地蓋聞主聖臣直義在于有犯無隱臣不惟疏遠未信而言敢歷論前代隆名之君及亡敗之主廢興所由又博陳舉賢之路廣開養老之制崇必信之道又張設議者之難凡五事以聞臣之所言皆直陳古今已行故事非新聲異端也辭義實淺不足採納然臣私心誠謂有可發起覺悟遺忘願陛下察臣愚忠愍臣狂直無使天下以言者為戒疾痛增篤退念桑梓之詩惟孤死之義輒取長休歸近墳墓顧瞻宮闕繫情皇極不勝丹款遣息穎表言其一曰臣聞善有章也著在經典惡有罰也戒在刑書上自遠古下洎秦漢其明王霸主及亡國暗君故可得而稱至于忠蹇賢相及佞諂姦臣亦可得而言故朝有諤諤盡規之臣無不昌也任用阿諛唯唯之士無不亡也是有國者皆欲求忠以自輔舉賢以自佐而亡國破家者相繼皆由任失其人所謂賢者不賢忠者不忠也臣謹言前任賢所由興任不肖所以亡者堯之末年四凶在朝而不去八元在家而不舉然致天平地寧四門穆穆其功固在重華之為相夏癸放于鳴條商辛梟于牧野此俱萬乘之主而國滅身擒由不能屬任賢相用婦人之言荒淫無道肆志沈宴作靡靡之樂長夜之飲于是登糟丘臨酒池觀牛飲望肉林龍逢忠而被害比干諫而剖心天下之所以歸惡者也太甲暴虐顛覆湯之典刑于是伊尹放之桐宮而能改悔反善三年而後歸于亳既已放而復還殷道微而復興諸侯咸服號稱太宗實賴阿衡之盡忠也周室既衰諸侯竝爭天王微弱政遂陵遲齊桓公淫亂之主耳然所以能九合一匡之功有尊周之名誠管夷吾之力及其死也蟲流出門豈非任豎貂之過乎且一桓公之身得管仲其功如彼用豎貂其亂如此夫榮辱存亡實在所任可不審哉秦本伯翳之後微微小邑至秦仲始大有車馬禮樂侍御之好焉自穆公至于始皇皆能留心待賢遠求異士招由余于西戎致五羖于宛市取丕豹于晉卿迎蹇叔于宗里由是四方雄俊繼踵而至故能世為彊國吞滅諸侯奄有天下兼稱皇帝由謀臣之助也道化未淳崩于沙丘胡亥乘虐用詐自立不能弘濟統緒克成堂構而乃殘賊仁義毒流黔首故陳勝吳廣奮臂大呼而天下響應于是趙高逆亂間樂承指二世窮迫自戮望夷子嬰雖立去帝為王孤危無輔四旬而亡此田邪臣擅命指鹿為馬所以速秦之禍也秦失其鹿豪傑競逐項羽既得而失之其咎在烹韓生而范增之謀不用假令羽既距項伯之邪說斬沛公于鴻門都咸陽以號令諸侯則天下無敵矣而羽距韓生之忠諫背范增之深計自謂霸王之業已定都彭城還故鄉為晝被文繡此蓋世俗兒女之情耳而羽榮之是故五載為漢所擒至死尚不知覺悟乃曰天亡我非戰之罪甚痛矣哉且夫士之歸仁猶水之歸下禽之走曠野故曰為川驅魚者獺也為藪驅雀者鸇也為湯武驅人者桀紂也漢高祖起于布衣提三尺之刃而取天下用六國之資無唐虞之禪豈徒賴良平之奇謀盡英雄之智力而已乎亦由項氏為驅人也子孫承基二百餘年逮成帝委政舅家使權勢外移安昌侯張禹者漢之三公成帝保傅也帝親幸其家拜禹床下深問天災人事禹當惟大臣之節為社稷深慮忠言嘉謀陳其災患則王氏不得專權寵王莽無緣乘勢位遂託雲龍而登天衢令漢祚中絶也禹佞諂不忠挾懷私計徒低仰于五侯之閒苟取容媚而已是以朱雲抗節求尚方斬馬劍欲以斬禹以戒其餘可謂忠矣而成帝尚復不寤乃以為居下訕上廷辱保傅罪死無赦詔御史將雲下欲急烹之雲攀殿折檻幸賴左將軍辛慶忌叩頭流血以死爭之若不然則雲已摧碎矣後雖釋檻不修欲以彰明直臣誠足以為後世之戒何益于漢室所由亡也哉然世之論者以為亂臣賊子無道之甚者莫過于莽此亦猶紂之不善不如是之甚也傳稱莽始起外戚折節力行以要名譽族稱孝朋友歸仁及其輔政成哀之際勤勞國家動見稱述然于時人士詣闕上書薦莽者不可稱紀內外群臣莫不歸莽功德遭遇漢室中微國嗣三絶而太后壽考為之宗主故莽得遂策命孺子而奪其位也昔湯武之興亦逆取而順守之耳向莽深惟殷周取守之術崇道德務仁義履信實去華僞施惠天下十有八年恩足以感百姓義足以結英雄人懷其德豪傑竝用如此宗廟社稷宜未滅也光武雖復賢才大業詎可冀哉莽即位之後自謂得天人之助以為功廣三王德茂唐虞乃自驕矜奮其威詐班宣符讖震暴殘酷窮凶極惡人怨神怒冬雷電以驚其耳目夏地動以惕其心腹而莽猶不知覺悟方復重行不順時之令竟連伍之刑佞媚者親幸忠諫者誅夷由是天下忿憤內外俱發四海分崩城池不守身死于匹夫之手為天下笑豈不異哉其所由然者非取之過而守之非道也莽既屠肌六合雲擾劉聖公已立而不辨盆子承之而覆敗公孫述又稱帝于蜀漢如此數子固非所謂應天順人者徒為光武之驅除者耳夫天下者蓋亦天下之天下非一人之天下也殷商之旅其會如林矢于牧野維豫侯興又曰侯服于周天命靡常由此言之主非常人也有德則天下歸之無德則天下叛之故古之明王其勞心遠慮常如臨川無津涯于是法天地象四時隆恩德敬大臣近忠直遠佞人仁孝著乎宮牆弘化洽乎兆庶為平直如砥矢信義感人神雖有椒房外戚之寵不受其委曲之言雖有近習愛幸之豎示聽其姑息之辭四門穆穆闢而不闔待諫者而無忌恆戰戰栗栗不忘戒懼所以欲永終天祿恐為將來賢聖之驅除也且臣聞之懼危者常安者也憂亡者恆存者也使夫有國之君能安不忘危則本枝百世長保榮祚名位與天地無窮亦何慮乎為來者之驅除哉傳有之曰狂夫之言明主察焉其二曰士之立業行非一概吳起貪官母死不歸殺妻求將不孝之甚然在魏使秦人不敢東向在楚則三晉不敢南謀曾參閔騫誠孝子也不能宿夕離其親豈肯出身致死涉危險之地哉今大晉應期運之所授齊聖美于有虞而吳人不臣稱帝私附此亦國之羞也陛下誠欲致熊羆之士不二心之臣使奮威淮浦震服蠻荊者故宜疇咨博采廣開貢士之路薦巖穴舉賢才徵命考試匪俊莫用今臺閣選舉徒塞耳目九品訪人唯問中正故據上品者非公侯之子孫則當塗之昆弟也二者苟然則篳門蓬戶之俊安得不有陸沈者哉其三曰昔田子方養老馬而窮士知所歸況居天下之廣居立天下之正位行天下之大道乎昔明王聖主無不養老老人衆多未必皆賢不可悉養故父事三老所以明孝宗事五老所以明敬孟子曰吾老以及人之老吾幼以及人之幼今天下雖定而華山之陽無放馬之群桃林之下未有休息之牛故以吳人尚未臣服故也夫飢者易為食渴者易為飲天下元元瞻望新政願陛下思子方之仁念犬馬之勞思帷蓋之報發仁惠之詔廣開養老之制其四曰法令賞罰莫大乎信古人有言人而無信不知其可況有養人以惠使人以義而可以不信行之哉臣前為西郡太守被州所下己未詔書羌胡道遠其但募取樂行不樂勿彊臣被詔書輒宣恩廣募示以賞信所得人名即條言征西其晉人自可差簡丁彊如法調取至于羌胡非恩意告諭則無欲度金城河西者也自往每興軍渡河未曾有變故刺史郭綏勸帥有方深加獎勵要許重報是以所募感恩利賞遂立績效功在第一今州郡督將竝已受封羌胡健兒或王或侯不蒙論敘也晉文猶不貪原而失信齊桓不惜地而背盟況聖主乎其五曰昔周漢之興樹親建德周因五等之爵漢有河山之誓及其衰也神器奪于重臣或祚移于他人故滅周者秦非姬姓也代漢者魏非劉氏也于今國家大計使異姓無裂土專封之邑同姓竝據有連城之地縱復令諸王後世子孫還自相并蓋亦楚人失繁弱于雲夢尚未為亡其弓也其于神器不移他族則始祖不遷之廟萬年億兆不改其名矣大晉諸王二十餘人而公侯伯子男五百餘國欲言其國皆小乎則漢祖之起俱無尺土之地況有國者哉將謂大晉世世賢聖而諸侯之胤常不肖邪則放勳欽明而有丹朱瞽叟頑凶而有虞舜天下有事無不由兵而無故多樹兵本廣開亂原臣故曰五等不便也臣以為可如前表諸王宜大其國增益其兵悉遣守藩使形勢足以相接則陛下可高枕而臥耳臣以為諸伯子男名號皆宜改易之使封爵之制祿奉禮秩竝同天下諸侯之例臣聞與覆車同軌者未嘗安也與死人同病者未嘗生也與亡國同法者未嘗存也況夫巍巍大晉方將登太山禪梁父刻石書勳垂示無窮宜遠鑒往代興廢深為嚴防使箸事奮筆必有紀焉昔伊尹恥其君不為堯舜此臣所以私懷慷愾自忘輕賤者也晉書段灼傳上疏追理鄧艾故征西將軍鄧艾心懷至忠而荷反逆之名平定巴蜀而受夷滅之誅臣竊悼之惜哉言艾之反也以艾性剛急矜功伐善而不能協同朋類輕犯雅俗失君子之心故莫肯理之臣敢昧死言艾所以不反之狀艾本屯田掌犢人宣皇帝拔之于農吏之中顯之于宰府之職處內外之官據文武之任所在輒有名績固足以明宣皇帝之知人矣會值洮西之役姜維有斷隴右之志官兵失利刺史王經困于圍城之中當爾之時一州危懼隴右懍懍幾非國家之有也先帝以為深憂重慮思惟可以安邊殺敵莫賢于艾故授之以兵馬解狄道之圍圍解留屯上封承官軍大敗之後士卒破瞻將吏無氣倉庫空虛器械殫盡艾修治備守欲積穀彊兵以待有事是歲凶旱少雨艾為區種之法身被烏衣手執耒耜以率先將士上下相感莫不盡力艾持節守邊所統萬數而身不離僕虜之勞親執士民之役非執節忠勤孰能若此故落門段谷之戰能以少擊多摧破彊賊斬首萬計先帝知其可任遂委艾以廟勝成圖指授長策艾受命忘身龍驤麟振前無堅敵蜀地阻險山高谷深而艾步乘不滿二萬束馬懸車自投死地勇氣淩雲將士乘勢故能使劉禪震怖君臣面縛叉手屈膝軍不踰時而巴蜀蕩定此艾固足以彰先帝之善任矣艾功名已成亦當書之竹帛傳祚萬世七十老公復反欲何所求哉艾以禪初降遠郡未附誠恃養育之恩心不自疑矯命承制權安社稷雖違常科有合古義原心定罪事可詳論故鎮西將軍鍾會有吞天下之心忌艾威名知必不同因其疑似搆成其事艾被詔書即遣彊兵束身就縛不敢顧望誠自知奉見先帝必無當死之理也會受誅之後艾參佐官屬部曲將吏愚戇相聚自共追艾破壞檻車解其囚執艾在困地是以狼狽失據夫反非小事若懷惡心即當謀及豪傑然後乃能興動大衆不聞艾有腹心一人臨死口無惡言獨受腹背之誅豈不哀哉忠而受誅信而見疑頭縣馬市諸子并斬故見之者垂涕聞之者歎息此賈誼所以慷慨于漢文天下之事可為痛哭者良有以也陛下龍興闡弘大度釋諸嫌忌受誅之家不拘敘用聽艾立後祭祀不絶昔秦民憐白起之無罪吳人傷子胥之冤酷皆為之立祠今天下民人為艾悼心痛恨亦猶是也臣以為艾身首分離捐棄故土謂可聽艾門生故吏收艾尸喪歸葬舊墓還其思宅以平蜀之功紹封其孫使艾闔棺定諡死無所餘恨赦冤魂于黃泉收信義于後世葬一人而天下慕其行埋一魂而天下歸其義所為者寡而悅者衆則天下徇名之士思立功之臣必投湯火樂為陛下死矣魏志鄧艾傳泰康三年議郎段灼上疏理艾又見晉書段灼傳又群書治要二十九引晉書陳時宜臣聞天時不如地利地利不如人和三里之城五里之郭圜圍而攻之有不剋者此天時不如地利城非不高池非不深穀非不多兵非不利委而去之此地利不如人和然古之王者非不先推恩德結固人心人心苟和雖三里之城五里之郭不可攻也人心不和雖金城湯池不能守也臣推此以廣其義舜彈五絃之琴詠南風之詩而天下自理由堯人可比屋而封也曩者多難姦雄屢起攪亂衆心刀鋸相乘流死之孤哀聲未絶故臣以為陛下當深思遠念杜漸防萌彈琴詠詩垂拱而已其要莫若推恩以協和黎庶故推恩足以保四海不推恩不足以保妻子是故唐堯以親睦九族為先周文以刑于寡妻為急明王聖主莫不先親後疏自近及遠臣以為太宰司徒衛將軍三王宜留洛中鎮守其餘諸王自州征足任者年十五以上悉遣之國為選中郎傅相才兼文武以輔佐之聽于其國繕修兵馬廣布恩信必撫下猶子愛國如家君臣分定百世不遷連城開地為晉魯衛所謂磐石之宗天下服其彊矣雖云割地譬猶囊漏貯中亦一家之有耳若慮後世彊大自可豫為制度使得推恩以分子弟如此則枝分葉布稍自削小漸使轉至萬國亦後世之利非所患也昔在漢世諸呂自疑內有朱虛東牟之親外有諸侯九國之彊故不敢動搖于今之宜諸侯彊大是為太山之固非我族類其心必異而魏法禁錮諸王親戚隔絶不祥莫大焉閒者無故又瓜分天下立五等諸侯上不象賢下不議功而是非雜糅例受茅土似權時之宜非經久之制將遂不改此亦煩擾之人漸亂之階也夫國之興也由于九族親睦黎庶協和其衰也在于骨肉疏絶百姓離心故夏邦不安伊尹歸殷殷邦不和呂氏入周殷監在于夏后去事之誡誠來事之鑒也晉書段灼傳又陳時宜昔伐蜀募取涼州兵馬羌胡健兒許以重報五千餘人隨艾討賊功皆第一而乙亥詔書州郡將督不與中外軍同雖在上功無應封者唯金城太守楊欣所領兵以逼江由之勢得封者三十人自金城以西非在欣部無一人封者苟在中軍之例雖下功必侯如州郡雖下功高不封非所謂近不重施遠不遺恩之謂也臣聞魚懸由于甘餌勇夫死于重報故荊軻慕燕丹之義專諸感闔閭之愛匕首振于秦庭吳刀耀于魚腹視死如歸豈不有由也哉夫功名重賞士之所競不平致怨由來久矣詩云尸鳩在桑其子七兮淑人君子其儀一兮臣以為此等宜蒙爵封晉書段灼傳
