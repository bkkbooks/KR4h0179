body:
  text: 卷一百二十郭璞巫咸山賦并序巫咸山賦蓋巫咸者實以鴻術為帝堯醫生為上公死為貴神豈封斯山而因以名之乎伊巫咸之名山崛孤停而嵥峙體岑峭以隆穨冠崇嶺以峻起配華霍以助鎮致靈潤乎百里爾乃寒泉懸涌浚湍流帶林薄叢蘢幽蔚隱藹八風之所歸起游鳥之所喧會潛瑕石揚蘭茝回翔鵷集淩鷮鷦翳禽鳥栖陽以晨鳴熊虎窟陰而夕㘁藝文類聚七江賦咨五才之竝用實水德之靈長惟岷山之導江初發源乎濫觴聿經始于洛沫攏萬川乎巴梁衝巫峽以迅激躋江津而起漲極泓量而海運狀滔天以渺茫總括漢泗兼包淮湘并吞沅澧汲引沮漳源二分于崌崍流九派乎潯陽鼓洪濤于赤岸淪餘波乎柴桑網絡群流商榷涓澮表神委于江都混流宗而東會注五湖以漫漭灌三江而漰沛滈汗六州之域經營炎景之外所以作限于華裔壯天地之嶮介呼吸萬里吐納靈潮自然往復或夕或朝激逸勢以前驅乃鼓怒而作濤峨嵋為泉陽之揭玉壘作東別之標衡霍磊落以連鎮巫廬嵬崛而比嶠協靈通氣濆薄相陶流風蒸雷騰虹揚霄出信陽而長邁淙大壑與沃焦若乃巴東之峽夏后疏鑿絶岸萬丈壁立赮駮虎牙嵥豎以屹崒荊門闕竦而盤礴圓淵九回以懸騰湓流雷詬而電激駭浪暴灑驚波飛薄迅澓增澆涌湍疊躍砯巖鼓作漰湱澩灂㵗㶔訇𣸎潰濩泧漷潏湟淴泱㶖㴸㶒瀹漩澴滎瀯偎灅濆瀑溭淢濜溳龍鱗結絡碧沙瀢沱而往來巨石硉矹以前卻潛演之所汨淈奔溜之所磢錯崖隒為之泐嵃崎嶺為之巖崿幽澗積岨礐硞䃕礭若乃曾潭之府靈湖之淵澄淡汪洸瀇滉淵泫泓汯浻澋涒鄰㘤潾混浣灦渙流映揚焆溟漭渺湎汗汗沺沺察之無象尋之無邊氣滃渤以霧杳時鬱律其如煙類胚渾之未凝象太極之構天長波浹泄峻湍崔嵬盤渦谷轉淩濤山頽陽侯砐硪以岸起洪瀾涴演而雲回峾淪溛瀤乍浥乍堆豃如地裂豁若天開觸曲崖以縈繞駭崩浪而相礧鼓㕉窟以漰渤乃湓湧而駕隈魚則江豚海狶叔鮪王鱣䱻鰊鰧鮋鯪鰩鯩鰱或鹿鮥象鼻或虎狀龍顏鱗甲鏙錯煥爛錦斑揚鰭掉尾噴浪飛唌排流呼哈隨波遊延或爆采以晃淵或嚇鰓乎巖閒介鯨乘濤以出入鯼鮆順時而往還爾其水物怪錯則有潛鵠魚牛虎蛟鉤蛇蜦鱄鱟蝞鱝𪓛𪓬𪓹王珧海月土肉石華三蝬𧉈江鸚螺蜁蝸璅蛣腹蟹水母目蝦紫蚢如渠洪蚶專車瓊蚌晞曜以瑩珠石𧉧應節而揚葩蜛蝫森衰以垂翹玄蠣磈磊而碨䃁或泛瀲于潮波或混淪乎泥沙若乃龍鯉一角奇鶬九頭有鱉三足有龜六眸赬蟞胏躍而吐璣文魮磬鳴以孕璆䖺䗤拂翼而掣耀神蜧蝹蜦以沈遊𩣡馬騰波以噓蹀水兕雷咆乎陽侯淵客築室于巖底鮫人構館于懸流雹布餘糧星離沙鏡青綸競糾縟組爭映紫菜熒曄以叢被緑苔鬖髿乎研上石帆蒙籠以蓋嶼蓱實時出而漂泳其下則金礦丹礫雲精燭銀珕珋璿瑰水碧潛珉鳴石列于陽渚浮磬肆乎陰濱或熲彩輕漣或焆曜崖鄰林無不溽岸無不津其羽族也則有晨鵠天雞鴢鷔鷗𩿁陽鳥爰翔于以玄月千類萬聲自相喧聒渥翮疏風鼓翅𦒑䎉揮弄灑珠拊拂瀑沫集若霞布散如雲豁産毻積羽往來勃碣橉杞稹薄于潯涘荔槤森嶺而羅峰桃枝篔簹實繁有叢葭蒲雲蔓䙬以蘭紅揚皓毦擢紫茸蔭潭隩被長江繁蔚芳蘺隱藹水松涯灌芊萰潛薈蔥蘢鯪鯥䟸局于垠隒猵獺睒瞲乎厱空迅蜼臨虛以騁巧孤玃登危而雍容夔㸸翹踛于夕陽鴛雛弄翮乎山東因岐成渚觸㵎開渠漱壑生浦區別作湖磴之以瀿瀷泄之以尾閭標之以翠蘙泛之以遊菰播匪藝之芒種挺自然之嘉蔬鱗被菱荷攢布水蓏翹莖瀵蕊濯穎散裹隨風猗委與波潭沱流光潛映景炎霞火其旁則有雲夢雷池彭蠡青草具區洮滆朱滻丹漅極望數百沆漾皛溔爰有包山洞庭巴陵地道潛逵傍通幽岫窈窕金精玉英瑱其裏瑤珠怪石琗其表驪虯摎其址梢雲冠其㟽海童之所巡遊琴高之所靈矯冰夷倚浪以傲睨江妃含嚬而矊眇撫淩波而鳧躍吸翠霞而夭矯若乃宇宙澄寂八風不翔舟子于是搦棹涉人于是㩘榜漂飛雲運艅艎舳艫相屬萬里連檣泝洄沿流或漁或商赴交益投幽浪竭南極窮東荒爾乃穎氛祲于清旭覘五兩之動靜長風颹以增扇廣莫䬅而氣整徐而不䬐疾而不猛鼓帆迅越䞟漲截泂淩波縱柂電往杳溟䨴如晨霞孤征眇若雲翼絶嶺倏忽數百千里俄頃飛廉無以睎其蹤渠黃不能企其景于是蘆人漁子擯落江山衣則羽褐食惟蔬鮮栫澱為涔夾潀羅筌筒灑連鋒罾䍣比船或揮輪于懸崎或中瀨而橫旋忽忘夕而宵歸詠採菱以叩舷傲自足于一嘔尋風波以窮年爾乃域之以盤巖豁之以洞壑疏之以沱泛鼓之以朝夕川流之所歸湊雲霧之所蒸液珍怪之所化産傀奇之所窟宅納隱淪之列真挺異人乎精魄播靈潤于千里越岱宗之觸石及其譎變鯈恍符祥非一動應無方感事而出經紀天地錯綜人術妙不可盡之于言事不可窮之于筆若乃岷精垂曜于東井陽侯遁形乎大波奇相得道而宅神乃協靈爽于湘娥駭黃龍之負舟識伯禹之仰嗟壯荊飛之擒蛟終成氣乎大阿悍要離之圖慶在中流而推戈悲靈均之任石歎漁父之櫂歌想周穆之濟師驅八駿于黿鼉感交甫之喪佩愍神使之嬰羅煥大塊之流形混萬盡于一科保不虧而永固稟元氣于靈和考川瀆而妙觀實莫著于江河文選藝文類聚八鹽池賦水潤下以作鹹莫斯鹽之最靈傍峻嶽以發源池茫爾而海渟嗟玄液之潛潤羌莫知其所生熙金葩之融炎穎躍結而淪成狀委蛇其若漢流漫漫以漭漭吁鑿鑿以粲粲色皓然而雪朗揚赤波之煥爛光旰旰以晃晃隆陽映而不燋洪涔沃而不長磊崔確鍔剡棊方玉潤膏津雪白淩岡粲如散繭煥若布璋于是漫丹盤薄搜重床紫淪灑炎紅華籠光爛然漢明晃爾霞赤望之絳蒸即之雪積翠塗內映赬液外冪動而愈生損而滋益若乃煎海鑠泉或凍或漉所贍不過一鄉所營不過鍾斛飴戎見珍于西鄰火井擅奇乎巴濮豈若茲池之所産帶神邑之名嶽吸靈潤于河汾總膏液乎澮涑藝文類聚九又書鈔一百四十六引六條井賦益作井龍登天鑿后土洞黃泉潛源洊臻潏潏涓涓幽溟圓停瀠洞深玄爾乃冠玉檻甃鱗錯鼓鹿盧揮徑索飛輕袪之繽紛手爭騖而互搦長縲委蛇以曾縈兮瑤甕龍騰而灑激氣霧集以杳冥兮聲雷駭而漰灂乃回澄以靜映狀冏然而鏡灼挹之不損停之不溢莫察其源動而愈出信潤下而德施壯邑移以不改獨星陳于丘墟兮越百代而猶在守虛靜以玄淡兮不東流而注海藝文類聚九初學記七太平御覽一百八十九怪季桓之穿費兮乃獲羊于土缶重華窘而龍化兮子求鑒以忘醜初學記七流寓賦戒雞晨而星發至猗氏而方曉觀屋落之隳殘顧但見乎丘棗嗟城池之不固何人物之希少越南山之高嶺修焦丘之微路駭斯徑之峻絶感王陽而增懼詰朝發于解池辰中暨乎河北思此縣之舊名蓋曩日之魏國詠詩人之流歌信風土之儉刻背茲邑之迥逝何險難之多歷望陝城于南涯存虢氏之疆埸實我姓之攸出邈有懷乎乃迹陟函谷之高關壯斯勢之險固過王城之丘墉想穀洛之合鬭惡王靈之壅流奇子喬之輕舉遊華輦而永懷乃憑軾以寓目思文公之所營蓋成周之墟域藝文類聚二十七南郊賦于是時惟青陽日在方旭我后方將受命于靈壇乃改步而鳴玉升金軒撫太僕揚六鸞齊八騄列五幡于一元兮靡日月乎黃屋矯陵烏以偵候兮整豹尾于後屬武騎仡以清道兮被練煥以波燭爾乃造廣場戾壇庭百寮山立萬乘雲屯延祝史肆玉牲登圓丘揖太清禮群望告皇靈天澄其氣日朗其精飛廉鼓舞于八維兮豐隆擊節于九冥祝融穆清而肅侍兮陽侯淡以中停于是司烜戒燧火烈具炳宗皇祖而郊祀增孝思之惟永郊寰之內區域之外雕題辨服被髮左帶駿奔在壇不期而會峨峨群辟蚩蚩黎庶翹懷聖猷思我王度事崇其簡服尚其素化無不融萬物自鼓振西北之絶維隆東南之橈柱廓清紫衢電掃神宇風馬桂林抗旌琳圃五嶽不足以題其勳九韶不足以贊其舞饗駭鬼方聲震岷隴倒景望風龍漢企踵爛若列星之環辰咸雲騰而海涌此蓋和氣旁通玄羅潛總自然之感鼓而遂動藝文類聚三十八初學記十三弊梓擢秀于祖邑水經贛水注藝文類聚十登百尺樓賦在青陽之季月登百尺以高觀嘉斯遊之可娛乃老氏之所歎撫淩檻以遙想乃極目而肆運情眇然以思遠悵自失而潛慍瞻禹臺之隆崛奇巫咸之孤峙美鹽池之滉汙察紫氛而霞起異傅巖之幽人神介山之伯子揖首陽之二老招鬼谷之隱士嗟王室之蠢蠢方構怨而極武哀神器之遷浪指綴旒以譬主雄戟列于廊技戎馬鳴乎講柱寤苕華而增怪歎飛駟之過戶陟茲樓以曠眺情慨爾而懷古藝文類聚六十三蜜蜂賦嗟品物之蠢蠢惟貞蟲之明族有叢瑣之細蜂亦策名于羽屬近浮遊于園薈遠翱翔乎林谷爰翔爰集蓬轉飆回紛紜雪亂混沌雲頽景翳耀靈響迅風雷爾乃眩猿之雀下林天井青松冠谷赤蘿繡嶺無花不纏無陳不省吮瓊液于懸峰吸赮津乎晨景于是回鶩林篁經營堂窟繁布金房疊構玉室應青陽而啓戶咀嚼華滋釀以為蜜自然靈化莫識其術散似甘露凝如割肪冰鮮玉潤髓滑蘭香窮味之美極甜之長百藥須之以諧和扁鵲得之而術良靈娥御之以豔顏爾乃察其所安視其所託恆據中而虞難營翠微而結落徽號明于羽族閽衛固乎管籥誅戮峻于鐵鉞招徵速乎羽檄集不謀而同期動不安而齊約大君以總群民又協氣于零雀每先馳而葺宇番巖穴之經略書鈔一百四十七引四條藝文類聚九十七御覽九百二十八又八百五十七誤作郭珍蚍蜉賦惟洪陶之萬殊賦群形而遍灑物莫微于昆蟲屬莫賤乎螻蟻淫淫奕奕交錯往來行無遺迹鶩不動埃迅雷震而不駭激風發而不動虎賁比而不懾龍劍揮而不恐乃吞舟而是制無小大與輕重因無心以致力果有象乎大勇出奇膠于九真流赬液其如血飾殷人之喪輿在四隅而交結濟齊國之窮師兮由東山之高垤感萌陽以潛出兮知將雨而封穴伊斯蟲之愚昧乃先識而似哲書鈔一百五十八藝文類聚九十七御覽九百四十七龜賦應交甫之喪佩愍神使之纓羅初學記三十辭尚書郎表今當以劣弱之質充督責之官以無用之才管繁劇之任且臺郎清選論望宜允北堂書鈔六十引兩條省刑疏臣聞春秋之義貴元慎始故分至啓閉以觀雲物所以顯天人之統存休咎之徵臣不揆淺見輒依歲首粗有所占卦得解之既濟案爻論思方涉春木王龍德之時而為廢水之氣來見乘加升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭以義推之皆為刑獄殷繁理有壅濫又去年十二月二十九日太白蝕月月者屬坎群陰之府所以照察幽情以佐太陽精者也太白金行之星而來犯之天意若曰刑理失中自壞其所以為法者也臣術學庸近不練內事卦理所及敢不盡言又去秋以來沈雨跨年雖為金家涉火之祥然亦是刑獄充溢怨歎之氣所致往建興四年十二月中行丞相令史淳于伯刑于市而血逆流長標伯者小人雖罪在未允何足感動靈變致若斯之怪邪明皇天所以保祐金家子愛陛下屢見災異殷勤無已陛下宜側身思懼以應靈譴皇極之謫事不虛降不然恐將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖以益陛下旰食之勞也臣謹尋案舊經尚書有五事供禦之術京房易傳有消復之救所以緣咎而致慶因異而邁政故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招患此自然之符應不可不察也案解卦繇云君子以赦過宥罪既濟云思患而豫防之郊祀者以通天人之誠感因農祥而祈事上乃致敬于黃靈下以播惠于萌黎者也臣愚以為于卦之義既郊之後宜發哀矜之詔引在豫之責蕩除瑕釁贊陽布惠使幽斃之人應養生以悅育否滯之氣隨谷風而紓散此亦寄時事以制用藉開塞而曲成者也臣竊觀陛下貞明仁恕體之自然天假其祚奄有區夏啓重光于已昧廓四祖之遐武祥靈表瑞人鬼獻謀應天順時殆不尚此然陛下即位以來中興之化未闡雖躬綜萬機勞逾日昃玄澤未加于群生聲教未被乎宇宙臣主未寧于上黔細未輯于下鴻雁之詠不興康哉之歌不作者何也杖道之情未著而任刑之風先彰經國之略未震而軌物之迹屢遷夫法令不一則人情惑職次數改則覬覦生官方不審則秕政作懲勸不明則善惡渾此有國者之所慎也臣竊為陛下惜之夫以區區之曹參猶能遵蓋公之一言倚清靖以鎮俗寄市獄以容非德音不忘流詠于今漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄況刑又是禮之糟粕者乎夫無為而為之不宰以宰之固陛下之所體者也恥其君不為堯舜者亦豈惟古人是以敢肆狂瞽不隱其懷若臣言可採或所以為塵露之益若不足採所以廣聽納之門願陛下少留神鑒賜察臣言晉書郭璞傳因天變上疏臣以頑昧近者冒陳所見陛下不遺狂言事蒙御省伏讀聖詔歡懼交戰臣前云升陽未布隆陰仍積坎為法象刑獄所麗變坎加離厥象不燭疑將來必有薄蝕之變也此月四日日出山六七丈精光潛暗而色都赤中有異物大如雞子又有青黑之氣共相薄擊良久方解案時在歲首純陽之月日在癸亥全陰之位而有此異殆元首供禦之義不顯消復之理不著之所致也計去微臣所陳未及一月而便有此變益明皇天留情陛下懇懇之至也往年歲末太白蝕月今在歲始日有咎謫曾未數旬大眚再見日月告釁見懼詩人無曰天高其鑒不遠故宋景言善熒惑退次光武寧亂呼沱結冰此明天人之懸符有若形影之相應應之以德則休祥臻酬之以怠則咎徵作陛下宜恭承靈譴敬天之怒施沛然之恩諧玄同之化上所以允塞天意下所以弭息群謗臣聞人之多幸國之不幸赦不宜數實如聖旨臣愚以為子産之鑄刑書非政事之善然不得不作者須以救斃故也今之宜赦理亦如之隨時之宜亦聖人之所善者此國家大信之要誠非微臣所得干預今聖朝明哲思弘謀猷方闢四門以亮采訪輿誦于群心況臣蒙珥筆朝末而可不竭誠盡規哉晉書郭璞傳皇孫生上疏有道之君未嘗不以危自持亂世之主未嘗不以安自居故存而不忘亡者三代之所以興也亡而自以為存者三季之所以廢也是以古之令主開納忠讜以弼其違摽顯功直用攻其失至乃聞一善則拜見規誡則懼何者蓋不私其身處天下以至公也臣竊惟陛下符運至著勳業至大而中興之祚不隆聖敬之風未躋者殆由法令太明刑教太峻故水至清則無魚政至察則衆乖此自然之勢也臣去春啓事以囹圄充斥陰陽不和推之卦理宜因郊祀作赦以蕩滌瑕穢不然將來必有愆陽苦雨之災崩震薄蝕之變狂狡蠢戾之妖其後月餘日果薄鬭去秋以來諸郡竝有暴雨水皆洪潦歲用無年適聞吳興復欲有搆妄者咎徵漸成臣甚惡之頃者以來役賦轉重獄犴日結百姓困擾甘亂者多小人愚嶮共相扇惑雖勢無所至然不可不虞案洪範傳君道虧則日蝕人憤怨則水涌溢陰氣積則下代上此微理潛應已著實于事者也假令臣遂不幸謬中必貽陛下側席之憂今皇孫載育天固靈基黔首顒顒實望惠潤又歲涉午位金家所忌宜于此時崇恩布澤則火氣潛消災譴不生矣陛下上承天意下順物情可因皇孫之慶大赦天下然後明罰敕法以肅理官克厭天心慰塞人事兆庶幸甚禎祥必臻矣臣今所陳暫而省之或未允聖旨久而尋之終亮臣誠若所啓上合願陛下勿以臣身廢臣之言臣言無隱而陛下納之適所以顯君明臣直之義耳晉書郭璞傳諫留任谷宮中疏任谷所為妖異無有因由陛下玄鑒廣覽欲知其情狀引之禁內供給安處臣聞為國以禮正不聞以奇邪所聽惟人故神降之吉陛下𥳑默居正動遵典刑案周禮奇服怪人不入宮況谷妖詭怪人之甚者而登講肄之堂密邇殿省之側塵點日月穢亂天聽臣之私情竊所以不取也陛下若以谷信為神靈所憑者則應敬而遠之夫神聰明正直接以人事若以谷為妖蠱詐妄者則當投畀裔土不宜令褻近紫闈若以谷或是神祗告譴為國作眚者則當克己修禮以弭其妖不宜令谷安然自容肄其邪變也臣愚以為陰陽陶蒸變化萬端亦是孤貍魍魎憑假作慝願陛下採臣愚懷特遣谷出臣以人乏忝荷史任敢忘直筆惟義是規晉書郭璞傳時暨陽人任谷因耕息于樹下忽有一人著羽衣就淫之既而不知所在谷遂有娠積月將産羽衣人復來以刀穿其陰下出一蛇子便去遂成宦者後詣闕上書自云有道術帝留谷于宮中璞復上疏諫禁荻地疏不宜禁荻地禮云名山大澤不封蓋欲與民通才共利不獨專之也
