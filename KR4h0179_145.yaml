body:
  text: 卷一百四十五闕名詔若不少順沖旨降損盛制文選褚淵碑注引晉起居注帝詔云云今之尚書令皆古之百揆之任也文選齊竟陵王行狀注引王隱晉書詔云云晉令常以蝗向生時各部吏案行境界行其所由勒生苗之內皆令周遍藝文類聚一百車駕出入相風己前侍御史令史御覽九中書為詔令記會時事典作文書也初學記十一御覽二百二十博士皆取履行清潔通明典義若散騎中博侍郎太子中庶子以上乃得召試諸生有法度者及白衣試丘高等拜郎中御覽二百三十六諸縣率千餘戶置一小學滿千戶竝之御覽五百三十四諸葬者皆不得入祠堂石碑石表石獸御覽五百八十九諸度關及乘船筏上下經津者皆有寫一通付關吏御覽五百九十八獄屋皆當完固厚其草蓐家人餉饋獄卒為溫暖傳致去家遠無餉饋者悉給廩獄卒作食寒者與衣疾者與醫藥御覽六百四十三奴婢亡加銅青若墨黥兩眼後再亡黥兩頰上三七橫鯨目下皆長一寸五分廣五分御覽六百四十八應受杖而體有瘡者督之也御覽六百五十犯免官錮三年御覽六百五十一凡民不得私煮鹽有犯者四歲刑所在主吏二歲刑書鈔一百四十六使信節皆鳥書之御覽六百八十一皇太子及妃諸王纁朱綬郡公主朱綬郡侯暗朱綬御覽六百八十二公府長史官品第六銅印墨綬朝服進賢兩梁冠掾屬官品第七朝服進賢一梁冠宋書禮志五第一品已下不得服羅綃御覽八百十六第七品已下始服金叉第三品已上蔽結爵叉北堂書鈔一百三十六朝服皂緑中單衣御覽六百九十五旄頭羽林著常腰襦御覽六百九十五元帝時有奏太極殿設絳帳帝詔曰漢文以上書皂囊為帷冬可青布夏可青葛御覽六百九十八欲作漆器物賣者各先移主吏者名乃得作皆當淳漆者布骨器成以朱題年月姓名御覽七百五十六乘傳出使遭喪以上即自表聞聽得白服乘騾車到副使攝事宋書禮志五又見御覽七百七十二山鹿白豹遊毛狐白貂領黃貂班白鼲子渠搜國裘皆禁服也御覽六百十四步搖蔽髻皆以禁物御覽七百十五織成衣為禁物御覽八百十六士卒百工履色無過緑青百婢履色無過經青古儈賣者皆當著巾帖額題所儈賣者及姓名一足著黑履一足著白履御覽六百九十六儈駔者皆當著巾白帖額題所儈駔者及姓名一足著白履一足著墨履御覽八百二十八士卒百工都得著假髻御覽七百十五百工不得服大絳紫襈假髻真珠啼耳文屏玳瑁越疊以飾路張乘犢車御覽七百七十三士卒百工不得服瑱璫御覽七百十八士卒百工不得服真珠璫珥書鈔一百三十五御覽八百二士卒百工不得服犀玳瑁御覽八百七士卒百工不得服越疊御覽八百二十坐廬使者皆不得宿四上御覽八百二十八諸有虎皆作檻穽蘺柵皆施箝捕得大虎賞絹三匹御覽八百九十二翡鳥不得西度隴御覽九百二十四諸官有秩支子守護者置吏一人御覽九百五十九夷其民守護棕皮者一身不輸之御覽九百五十九閬中縣置守黃甘吏一人御覽九百六十六諸宮有梨守護者置吏一人御覽九百六十九諸官有秩者守護橙者置吏一人御覽九百七十一其上黨及平陽輸上麻二十二斤下麻三十六斤當絹一匹課應田者枲麻加半畝御覽九百九十五喪葬令長史卒官吏皆斬衰以喪服理事若代者至皆除之通典九十九議諡劉毅表劉毅宜諡以申毅忠允匪躬贈右光祿大夫儀同三司斯誠聖朝考績以著勳之美事也案諡者行之迹而號者功之表今毅功德竝立而有號無諡于義不體竊以春秋之事求之諡主于行而不繫爵然漢魏相承爵非列侯則皆沒其高行而不加之諡至使三事之賢臣不如野戰之將士臣願聖代舉春秋之遠制改近代之舊服通典一百四大興三年有司表因火災上書漢王氏五侯兄弟迭任今楊氏三公竝大大位故天變屢見竊為陛下憂之晉書五行志下太康十年十月含章鞫室等火時有上書云云奏改景初曆為泰始曆王者祖氣而奉其口終晉于五行之次應尚金金生于已事于酉終干丑宜祖以酉日臘以丑日改景初曆為泰始曆宋書曆志一泰始元年有司奏奏請即魏宮立廟奏請即魏宮立廟有司奏置七廟武帝重其役詔宜權立一廟群臣議奏上古清廟一宮尊遠神祇逮至周室制為七廟以辨宗祧聖旨深弘遠迹上世敦崇唐虞舍七廟之繁華遵一宮之遠旨昔舜承堯禪受終于文祖遂陟帝位蓋三十載月正元日又格于文祖遂陟帝位此則虞氏不改唐廟因仍舊官可依有虞氏故事即用魏廟晉書禮志上宋書禮志三通典四十七奏正朔服色唐堯舜禹不以易祚改制至于湯武各推行數宣尼答為邦之問則曰行夏之時輅冕之制通為百代之言益期于從政濟治不繫于行運也今大晉繼三皇之蹤踵舜禹之迹應天從民受禪有魏宜一用前代正朔服色皆如有虞遵唐故事于義為弘宋書禮志二太始三年九月群公奏奏并圓方二丘古者郊丘不異宜并圓方二丘更修壇兆二至合祀通典四十二太始二年十一月有司奏云云奏皇太后喪制前代故事倚廬巾施凷縑帳蓐素床以布巾裹凷草軺輦板輿細犢車皆施縑裏宋書禮志二泰始四年皇太后崩有司奏云云詔不聽但令以布衣車而己其餘居喪之制一如禮文又奏請除服大行皇太后當以四月二十五日安厝故事虞著衰服既虞而除其內外官寮皆就朝晡臨位御除服訖各還所次除衰服晉書禮志中宋書禮志二泰始四年四月有司奏又奏世有險易道有汙隆所遇之時異誠有由然非忽禮也方今戎馬未散王事至殷交須聽斷以熙庶績昔周康王始登翌室猶戴冕臨朝降于漢魏既葬除釋諒暗之禮自遠代而廢矣惟陛下割高宗之制從當時之宜敢固以請晉書禮志中宋書禮志二有司又奏奏廟物先帝舊物藏之于廟所存舊物麻繩為細拂以明儉約也北堂書鈔一百三十六引晉要事泰始四年有司奏奏議諸王冠禮十五成童國君十五而生子以明可冠之儀又漢魏遣使冠諸王非古典通典五十六泰始六年南宮王承年十五依舊應冠有司奏議奏留太學生太學生七千餘人才任四品聽留宋書禮志一晉太始八年有司奏奏劾羊祜祜所統八萬餘人賊衆不過三萬祐頓兵江陵使賊備得設乃遣楊肇偏軍入險兵少糧懸軍人挫衄皆違詔命無大臣節可免官以侯就第晉書羊祐傳吳西陵督步闡舉城來降吳將陸抗攻之甚急詔祜迎闡祐率兵五萬出江陵遣荊州刺史楊肇攻抗不剋闡竟為抗所擒有司奏祜云云坐貶平南將軍免楊肇為庶人奏定侯國入朝諸侯之國其王公以下入朝者四方各為二番三歲而周周則更始臨時有故則明年來朝明年朝後更滿三歲乃朝不得依恆數朝禮皆執璧如舊朝之制不朝之歲各遣卿奏聘宋書禮志一通典七十四太始中有司奏奏請聽華廙襲封廙所坐除名削爵一時之制廙為世子著在名簿不聽襲嗣此為刑罰再加諸侯犯法八議平處者褒功重爵也嫡統非犯終身棄罪廢之為重依律應聽襲晉書華廙傳大鴻臚何遵奏廙免為庶人不應襲封請以表世孫混嗣表有司奏奏定王昌前母服設令有人于此父為敦煌太守而子後任于洛若父娶妻非徒不見乃可不知及其死亡不得不服但鞠養已者情哀而不相見名制雖戚念之心殊而為之服一也又兩后匹嫡自謂違禮不謂非常之事而以禮處之也昔子思二哭出母于廟其門人曰庶氏之母死何謂哭于孔氏之廟子思懼改哭于他室若昌不制服不得不告其父母掘其前母之尸徙之他地若其不徙昌為罪人何則異族之女不得祔于先姑藏其墓次故也且夫婦人牽夫猶有所尊趙姬之舉禮得權通故先史詳之不譏其事耳今昌之二母各已終亡尚無竝主輕重之事也昌之前母宜依叔隗為比若亡在昌未生之前者則昌不應復服生及母存自應如禮以名服三年輒正定為文章草下太常報楙奉行晉書禮志中泰康元年尚書八座以為云云請限田宅王公以國為家京城不宜復有思宅今未暇作諸國邸當使城中有往來之處近郊有芻藁之田今可限之國王公侯京城得有宅一處近郊田大國十五頃次國十頃小國七頃城肉無宅城外有者皆聽留之男子一人占田七十畝女子三十畝其丁男課田五十畝丁女二十畝次丁男半之女則不課其官第一品五十頃每品減五頃以為差第品十頃而又各以品之高卑蔭其親屬多者及九族少者三代國賓先賢之後士人子孫亦如之而又得蔭人以為衣食客及佃客量給官品以為差降通典一平吳之後有司奏奏止朝日春分依舊車駕朝日寒溫未適可不親出宋書禮志一太康二年有司奏詔不許奏給車廷尉三官及諸部掾職在鄰輦者給白蓋小車又給卿寺從官屬平興車六乘重車一乘北堂書鈔一百三十九引晉起居注泰康四年有司奏奏定昏禮昏禮納徵大昏用玄纁束帛加圭馬二駟王侯玄纁束帛加璧乘馬大夫用玄纁束帛加羊古者以皮馬為庭實天子加穀圭諸侯加大璋可依周禮改璧用璋其羊鴈酒米玄纁如故諸侯昏禮加納采吉期迎各帛五匹及納徵馬四匹皆令夫家自備唯璋官為具之宋書禮志一太康八年有司奏奏遂殷祖母服禮無不及還重之制翔自應降姜殷無緣還重通典九十六尚書奏奏夕牲十一月一日合朔奠冬蒸夕牲同日可有司行事宋書禮志一太康中有司奏議詔不許奏河閒女更生精誠之至感于天地故死而更生在常禮之外非禮之所處刑之所裁斷以還開冢者武帝世河閒有男女相悅許配男從軍父母以女別適女憂死男還悲痛遂發冢開棺即活因負還其夫爭之廷尉奏奏諸王宜修耕藉古諸侯耕藉百畝躬秉耒耜以奉社稷宗廟以勸率農功今諸王治國宜依修耕藉之義晉書禮志上宋書禮志一武帝未有司奏奏廢楊太后皇太后陰漸姦謀圖危社稷飛箭繫書要募將士同惡相濟自絶于天魯侯絶文姜春秋所許蓋以奉順祖宗任至公于天下陛下雖懷無己之情臣下不敢奉詔可宣敕王公于朝堂會議晉書武悼楊皇后傳群公有司奏又奏駿藉外戚之資居冢宰之任陛下既居諒暗委以重權至乃陰圖凶逆布樹私黨皇太后內為脣齒叶同逆謀禍釁既彰背桿詔合阻兵負衆血刃宮省而復流書募衆以獎凶黨上背祖宗之靈下絶億兆之望昔文姜與亂春秋所貶呂宗叛戾高后降配宜廢皇太后為峻陽庶人晉書武悼楊皇后傳有司又奏奏刑法宜依劉頌啓事昔先王議事以制自中古以來執法斷事既己立法誠不宜復求法外小善也若常以善奪法則人逐善而不忌法其害甚于無法也案啓事欲令法令斷一事無二門郎令史已下應復出去駮案隨事以聞也晉書刑法志劉頌為三公尚書又上疏侍中太宰汝南王亮奏于是門下屬三公云云奏劾王衍衍與司徒梁王肜書寫呈皇太子手與妃及衍書陳見誣之狀肜等伏讀辭旨懇惻衍備位太臣應以義責也太子被誣得罪衍不能守死善道即求離婚得太子手書隱蔽不出志在苟免無忠謇之操宜加顯責以厲臣節可禁錮終身晉書王衍傳衍女為愍懷太子妃太子為賈后所誣衍懼自表離婚賈后既廢有司奏衍云云奏治高車車府令戒嚴上作高車用雜總求處給請出上庫錢六十七萬六千六百北堂書鈔未刪改本一百三十九引晉起居注建武元年有司奏奏溫嶠不應辭職案如衆議去建武元年九月下辛未令書依禮文父喪未葬唯喪主不除以他故未葬人子之情不可居殯而除故期于畢葬無遠近之斷也若亡遇賊難喪靈無處求索理絶固應三年而除不得固從未葬之例也若骨肉殲于寇害死亡漫于中原而繼以遺賊未滅亡者無收殯之實存者又闕于奔赴之禮而人子之情哀痛無斷輒依未葬之義久而不除若遂其情則人居無限之喪非有禮無時不得之義也諸如此皆如東闕故事限行三年之禮畢而除也唯二親生離吉凶未分服喪則凶事未據從吉則疑于不存心憂居素出自人情有如此者非官制之所裁今嶠以未得改卜奔赴纍設疾辭案辛未之制已有成斷皆不得復遂其私情不服王命以虧法憲參議可如前詔嶠受拜重告中丞司徒諸如嶠比者依東閣故事辛未今書之制晉書禮志中通典一百二建武元年有司奏奏讀夏令今月十六日立夏案五年六月三十日門下駮依武皇夏闕讀令今正服漸備四時讀今是祗述天和隆赫之道謂今故宜讀夏令宋書禮志二通典七十咸和六年三月有司奏奏納皇后儀注今迎皇后依昔成恭皇后入宮御物而儀注至尊袞冕升殿毛頭不設求量處又案昔迎恭皇后唯伯青龍旗其餘皆即御物今當臨軒遣使而立五牛旗毛頭畢罕竝出即用舊茌制故至今闕宋書禮志一通典五十八康帝建元元年納后褚氏而儀注陛者不設毛頭殿中御史奏奏議京兆府君遷主十月殷祭京兆府君當遷祧室昔征西豫章潁川三府君毀主中興之初權居天府在廟門之西咸康中大常馮懷表續太廟奉還于西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世遠祖長在太祖之上昔周室太祖世遠故遷有所歸今晉廟宣皇為主而四祖居之是屈祖就孫也殷祫在上是代太祖也晉書禮志上宋書禮志三穆帝永和二年七月有司奏奏劾蔡謨司徒謨頃以常疾久逋育王命皇帝臨軒百僚齊立俯僂之恭有望于謨若志存止退自宜致辭闕庭安有人君卑勞終日而人臣曾無一酬之禮悖慢傲上罪同不臣臣等參議宜明國憲請送廷尉以正刑書晉書蔡謨傳永和八年公卿奏奏皇后為太妃服至尊緦麻三月皇后齊縗案周禮有後輕而服重公子為公所厭故不得申舅不厭婦故得以本服通典九十五哀帝興寧中哀靖皇后有章太妃之喪尚書奏云云綦母邃駮奏君臣不嫌同諡文武舉其一致聖賢有時而同故文王經緯天地孔文之不恥下問所以為文也遠稽周典嘉號通乎上下近惟太康改諡匪嫌同稱自頃議者或乖體尚之實非所以經綸無窮永代垂式王欣之所表抑實舊典宜如所陳通典一百四太元四年尚書奏奏宜敕徐廣撰國史臣聞左史述言右官書事乘志顯于晉鄭春秋著乎魯史自皇代有造中興記者道風帝典煥乎史策而太和以降世歷三朝玄風聖迹倏為疇古臣等參詳宜敕著作郎徐廣撰成國史晉書徐廣傳宋書徐廣傳議明堂南郊除五帝坐五帝即天也五氣隨時異王故殊其號耳名雖有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而己北郊又除先後配祀宋書禮志三通典四十二泰始二年正月群臣議議奏并丘郊古者丘郊不異宜并圜丘方澤于南北郊更修治壇兆其二至之祀合于二郊宋書禮志三是年十一月有司又議奏又見通典四十二賜諡議太尉荀顗所撰定體統通敘五等列侯以上嘗為郡國太守內史郡尉牙門將騎督以上薨者皆賜諡通典一百四八座議議奏改郭奕諡大晉受命祖宗諡號群下未有同者蓋因近代淺情習于所見也奕諡與景皇帝同可改諡曰穆通典一百四太康八年十月太常上諡故太常平陵男郭奕為景侯有司議奏以為高禖壇石議禮無高禖置石之文未知設造所由既己毀破無可改造詩說高辛氏有𥳑狄吞卵之祥今此石有吞卵之象蓋俗說所為而史籍無記但可收聚復于舊處而已御覽五百二十九永平八年高禖壇上石破為二段詔問置此石來幾時出何經典今應復不博士議理解系等議系等清公正直為奸邪所疾無罪橫戮冤痛已甚如大司馬所啓彰明枉直顯宣當否使冤魂無愧無恨為恩大矣晉書解系傳齊王囧起義時奏理張華裴頠解系歐陽建等冤八坐議平法律議昔先王議事以制自古以來執法斷事既以立法誠不宜求法外小善也若以善奪法則人逐善而不忌法其害甚于無法也案啓事欲今法令斷一事無二門即令吏以下應復出法駮案隨以事聞也通典一百六十六元康初三公尚書劉頌上疏平法律于是門下屬議云云議溫嶠不應辭職昔伍員志復私讎先假侯之力東奔闔閭位為上將然後鞭荊王之尸若嶠以母未葬沒在胡者虜者乃應竭其智謀仰憑皇靈使逆寇冰消反哀墓次豈可稍以乖嫌廢其遠圖哉晉書溫嶠傳除散騎侍郎嶠以母亡不獲歸葬苦請北歸詔三公八坐議其事皆曰云云案此即禮志中所載西陽王羕等議而文全異今故分録之釋難淳于睿舊君服議或難曰今去官從故官之品則同在官之制也故應為其君服斬王肅賀循皆言老疾三諫去者為舊君服齊則明今以老疾三諫去者不得從故官之品可知矣今論者欲使解職歸者從老疾三諫去者例為君服齊失之遠矣釋曰案令諸去官者從故官之品其除名不得從例今但言諸去從故官之品不分別老疾三諫去者則三諫去得從故官之例王賀要記猶自使老疾三諫去者為舊君服齊然則去官從故官之例敢見臣服斬皆應服齊明矣夫除名伏罪不得從故官之例以有罪故耳老疾三諫去者豈同徐名者乎又解職者嘗在于朝今歸家門與老疾三諫去者豈異而為難者殊其服例哉又難曰案禮先儒說為君服齊唯年老廢疾與待放之臣而已老歸者無復為臣之道放退者終身不復入君之朝臣之義絶宜降而服齊衰解職者後將復仕無離絶之事固應服斬二者各異豈得相準釋曰古者年老廢疾乃得致仕閔子騫曰古之道不即人心退而致仕孔子善之此非老而致仕之例禮亦當為舊君服齊衰不唯年老廢疾待放而已也夫君退臣苟非墜諸淵之虐臣雖去此仕彼亦無絶道況以老疾歸家不出國內而可絶乎禮臣三諫不從不得已而去若君能悔過納諫聞命駿奔何為終身不入君朝乎君為八父母人于君有子道尊君之義臣人一耳而禮臣為君服斬云為君服齊者別親疏明貴賤也老疾待放之臣與民同服者亦以疏賤故也而難者不察疏賤厭降乃云絶其舊君悖于禮矣解職者既已疏賤與老疾去者無異寧可必己後可還仕與自同于見臣為其君服斬乎如令後可還仕便得同見臣之制三諫去者一時罷退後可還仕方于解職未始有殊二臣之服例皆應齊而難者偏許三諫去者服齊使去職者服斬難以言通論矣又難曰王者無外天子之臣雖致仕歸家在朝無異不得稱君為舊而服齊衰也釋曰京師方千里之地謂之畿其餘以封諸侯畿內之人服天子齊衰畿外之人則不能以為天子有內外之差王者以天下為家夷狄之土亦莫不統故曰無外之義非所以論服也書曰臣為朕股肱耳目宣力四方言君臣相與共政事有一體之義親而貴故君臣之名生焉致仕者疏賤不得復託體去尊故謂之舊君凡在職稱君而俱服斬去職亦宜稱舊而俱服齊通典九十符詰博士蔡充賈氏專權趙王倫篡逆皆力制朝野彤勢不得去而責其不能引身去朝義何所據晉書梁王彤傳永康二年薨蔡允議諡曰靈梁國常侍孫霖及彤親黨稱枉臺乃下符曰云云充重議如前朝廷徒充議彤故吏復追訴不已改諡曰孝符問國子博士妻已亡為妻父母服案禮云君母之父母服小功傳曰君母在則不敢不從服君母不在則不服喪服小記曰為君母後者君母卒則不服其黨又曰為母之君母母卒則不服徒從者所從亡則已也若母猶然妻可知矣今云不以存亡為異何所據邪通典九十五永和中司徒符問太常云若妻已沒猶應服其父母不太常杜潛答不以存亡為異司徒又問國子博士又符問太常迎后應作樂案儀注云皇后列人自閶闔掖門鳴鐘鼓填門露仗如儀注之條案諸門唯有鼓無鐘既云鳴鐘則應施鐘既施鐘則施建鼓若如寺卿今意不作樂者當復安懸而不作通典五十九升平元年八月符問迎皇后大駕應作樂不博土胡訥太常王彪之議婚禮不作樂蘭臺太常主者案云云請崇德褚太后臨朝啓王室多故禍艱仍臻國憂始周復喪元輔天下惘然若無攸濟主上雖聖資奇茂固天誕縱而春秋尚富如在諒暗蒸蒸之思未遑庶事伏惟陛下德應坤厚宣慈聖善遭家多艱臨朝親覽光大之美化洽在昔謳歌流詠播溢無外雖有莘熙殷妊姒隆周未足以喻是以五謀克從人鬼同心仰望來蘇懸心日月夫隨時之義周易所尚寧固社稷大人之任伏願陛下撫綜萬機釐和政道以慰祖宗以安兆庶不勝憂國喁喁至誠晉書康獻褚后傳簡文崩孝武幼沖桓溫又薨群臣啓云云
